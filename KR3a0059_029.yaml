body:
  text: 西山讀書記卷二十九宋真德秀撰孔門諸子之學語德行顔淵閔子騫冉伯牛仲弓顔淵已見今以閔冉事列於後子曰孝哉閔子騫人不間於其父母昆弟之言此章已具前篇今欲見諸子之淺深故復出焉解義則不録餘倣此季氏使閔子騫為費宰閔子騫曰善為我辭焉如有復我者則吾必在汶上矣史記曰不仕大夫不食汙君之祿閔子侍側誾誾如也魯人為長府閔子騫曰仍舊貫如之何何必改作朱子曰長府藏名藏貨財曰府為蓋改作之子曰夫人不言言必有中言不妄發發必當理惟有德者能之南軒曰貨財之府無故改為得無示人以崇利聚斂之意乎按閔子言行見於論語者唯此四章合而觀之見其躬至孝之行辭不義之祿氣和而正言謹而確此其所以亞於顔子而與曽子並稱也與伯牛有疾子問之自牖執其手曰亡之命矣夫斯人也而有斯疾也斯人也而有斯疾也侯氏曰伯牛以德行稱亞於顔閔故其將死也孔子尤痛惜之子曰雍也可使南面朱子曰南面者人君聽治之位言仲弓寬洪簡重有人君之度也仲弓問子桑伯子子曰可也簡仲弓曰居敬而行簡以臨其民不亦可乎居簡而行簡無乃太簡乎子曰雍之言然仲弓問仁子曰出門如見大賔使民如承大祭已所不欲勿施於人仲弓曰雍雖不敏請事斯語矣或曰雍也仁而不佞子曰焉用佞禦人以口給屢憎於人不知其仁焉用佞子謂仲弓曰犂牛之子騂且角雖欲勿用山川其舍諸朱子曰犂雜文騂赤色周人尚赤牲用騂角角周正中犧牲也用用以祭也山川山川之神也言人雖不用神必不舍也仲弓父賤而行惡故夫子以此譬之言父之惡不能廢其子之善如仲弓之賢自當見用於世也然此論仲弓云爾非與仲弓言也范氏曰以瞽瞍為父而有舜以鯀為父而有禹古之聖賢不係於世類尚矣子能改父之過變惡以為美則可謂孝矣或問云云程子欲去曰字蓋嫌於與其子言而其論仲弓云爾非與仲弓言也此説得之蓋以論語考之其歎顔淵未見其止乃淵死後之言此其例也言語宰我子貢宰我問曰仁者雖告之曰井有仁焉其從之也子曰何為其然也君子可逝也不可陷也可欺也不可罔也宰豫晝寢子曰朽木不可雕也糞土之牆不可杇也於豫與何誅子曰始吾於人也聽其言而信其行今吾於人也聽其言而觀其行於豫與改是宰我問三年之喪期已久矣云云宰我出子曰豫之不仁也孟子宰我曰以豫觀於夫子賢於堯舜逺矣史記曰宰我問五帝之德子曰豫非其人也又宰我為臨淄大夫與田常作亂夷其族孔子恥之蘇氏古史曰太史公云云余以為宰我之賢列於四科其師友淵源所從來逺矣雖為不善不至於從畔弒逆君父也不幸平居有晝寢短喪之過儒者因遂信之蓋田常之亂本與闞止爭闞止亦子我也田常殺闞止而宰我蒙其惡名豈不哀哉且使宰我信與田常之亂常既殺闞止弒簡公則尚誰族宰我者事必不然矣又李斯曰田常陰取齊國殺宰豫於庭因殺簡公信如此説則宰我乃田常之仇為齊攻田常者非與常作亂矣要知由闞止亦曰子我故戰國諸子誤以為宰我皆不足信也語子曰賜也始可與言詩已矣告諸往而知來者子貢問君子子曰先行其言而後從之子貢問曰賜也何如子曰女器也曰何器也曰瑚璉也朱子曰器者有用之成材夏曰瑚商曰璉周曰簠簋皆宗廟盛黍稷之器而飾以玉器之貴重而華美者也子貢聞孔子以君子許子賤故以己為問而孔子告之以此然則子貢雖未至於不器其亦器之貴者歟南軒曰子貢之問蓋欲因師言以省己之所未至也而夫子告之抑揚髙下所以長善而救其失者備矣謂之器則固適於用然未若不器之周也謂之瑚璉則以其美質可以薦之宗廟也然瑚璉雖貴未免於可器且賜也味聖人之言意即其所至而勉其所未至則亦何有窮極哉按前篇子曰君子不器朱子曰器者各適其用而不能相通成德之士體無不具用無不周非特為一才一藝而已黃氏曰萬物皆備於我反身而誠樂莫大焉人具是性以生則萬事萬物之理無一不具於此性之中顧為氣質所拘物欲所蔽故偏而不通耳惟夫格物致知誠意正心使天下之理無不明無不實則心之全體無所不具而措之於用宜其無不周也又豈可以器言哉子謂子貢曰女與回也孰愈對曰賜也何敢望回回也聞一以知十賜也聞一以知二子曰弗如也吾與女弗如也子貢曰我不欲人之加諸我也吾亦欲無加諸人子曰賜也非爾所及也子曰賜不受命而貨殖焉億則屢中子貢方人子曰賜也賢乎哉夫我則不暇朱子曰方比也乎哉疑辭比方人物而較其長短雖亦窮理之事然專務為此則心馳於外而所以自治者踈矣故褒之而疑其詞復自貶以深抑之謝氏曰聖人責人辭不迫切而意已獨至如此南軒曰擬議人之優劣非知者其能之乎故亦可謂之賢而曰夫我則不暇求之他人不若篤其在已也聖人抑揚之間所以長善救失者宜深味也以上皆聖人稱許之詞然所以勉其不及者亦甚至矣子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也蓋至此非復前日之子貢矣子曰賜也女以豫為多學而識之者與對曰然非與曰非也豫一以貫之叔孫武叔語大夫於朝曰子貢賢於仲尼朱子曰武叔魯大夫名州仇子服景伯以告子貢子貢曰譬之宫牆賜之牆也及肩窺見室家之好牆卑室淺夫子之牆數仞不得其門而入不見宗廟之美百官之富七尺曰仞不入其門則不見其中之所有言牆髙而宫廣也得其門者或寡矣夫子之云不亦宜乎此夫子指武叔黃氏曰叔孫武叔以子貢賢於仲尼子禽亦以仲尼豈賢於子貢自今觀之則二人之識見固繆矣然其敢於為此論者亦豈無説且其所謂子貢之賢者何也物之廣博者其藏畜也必髙厚其中狹小則其外必卑薄此理之自然非其固為是髙厚卑薄之殊也人之常情有如是之力量然後有如是之識見故處下者不足以窺髙而淺近易見則人情之所共喜也豈惟宫牆為然哉雨露之澤物人皆知其為功而元氣之密運則人莫得而窺其際也子貢三稱夫子一稱宫牆一稱日月一以天喻之其論愈精此子貢之所以為達也叔孫武叔毁仲尼子貢曰無以為也仲尼不可毁也他人之賢者丘陵也猶可踰也仲尼日月也無得而踰焉人雖欲自絶其何傷於日月乎多見其不知量也無以為猶言無用為此土髙曰丘大阜曰陵日月喻其髙自絶謂以毁謗自絶於孔子多與祇同適也不知量謂不自知其分量南軒曰子貢善喻如宫牆日月之喻皆可謂切矣丘陵固可踰太山雖髙然猶有可踰之理至於日月之行天則孰得而踰之哉人之議日月者初無損於日月之明徒為自絶於日月而已矣陳子禽謂子貢曰子為恭也仲尼豈賢於子乎為恭謂為恭敬推遜其師也子貢曰君子一言以為知一言以為不知言不可不慎也責子禽不謹夫子之不可及也猶天之不可階而升也階梯也大可為也化不可為也故曰不可階而升夫子之得邦家者所謂立之斯立道之斯行綏之斯來動之斯和其生也榮其死也哀如之何其可及也立之謂植其生也道引也謂教之也行從也綏安也來歸附也動謂鼓舞之也和所謂於變時雍言其感應之妙神速如此榮謂莫不尊親哀則如喪考妣程子曰此聖人之神化上下與天地同流者也謝氏曰觀子貢稱聖人語乃知晚年進德蓋極於髙逺也夫子之得邦家者其鼓舞群動捷於桴鼓影響人雖見其變化而莫窺其所以變化也蓋不離於聖而有不可知者存焉此殆難以思勉及也南軒曰子貢以日月喻聖人之不可踰矣復以天之不可階升喻聖人之不可及尤為切至也蓋大而化之非復思勉所及學者至此無所用其力是豈不猶天之不可階而升乎所謂立之斯立道之斯行綏之斯來動之斯和者不疾而速不行而至惟天下至誠感無不通也其生也榮其死也哀民心戴之如天親之如父母也子貢知足知此其所造抑深矣黃氏曰子禽之問見於論語者凡三於夫子聞政則疑其有所求於伯魚則疑夫子之私其子於此章則又疑子貢之賢於仲尼其為人粗率而淺陋可知一言之善則可以為知一言之不善則遂為不知知與不知係於一言之間此言之不可不謹也由志學而立由立而不惑由可欲而有諸已由有諸已而充實皆可以階而升至於知天命有光輝已非有階級可漸次而進若夫耳順不踰矩化而不可知則德盛仁熟莫知其所以然而然但見其仰之髙鑽之堅瞻之在前忽然在後是豈得而階升也哉立之道之綏之動之皆聖人政化之施斯立斯行斯來斯和皆天下感動之速榮謂賴之以生故以為榮幸哀謂失其所依故為之哀戚子貢之稱夫子者如此或曰子貢知足以知聖人今乃不言其德而稱其得邦家之效何也曰天之德不可形容即其生物而見其造化之妙聖人之德不可形容即其感人而見其神化之速天下之理實大則聲宏本深而末茂感動之淺深遲速未有不視其德之所至者也聖人道全德備髙明博厚則其感於物者如此因其感於物以反觀聖人之道豈不曉然而易見也哉此子貢之所以為善言聖人也孟子孔子沒三年之喪畢門人治任將歸子貢反築室於場獨居三年然後歸自性與天道而下數章見子貢學力之進如此朱子曰顔子而下穎悟莫如子貢左氏傳邾隱公來朝子貢觀焉見二公執玉之髙卑而知其將死亡曰髙仰驕也卑俯替也驕近亂替近疾君為主其先乎既而皆如其言孔子曰賜不幸而言中是使賜多言也與論語億則屢中合故附此又史記曰子貢利口巧辭孔子常黜其辨又載其説齊田常事曰子貢一出存魯亂齊破吳強晉而霸越蘇氏曰此戰國説客設為子貢之辭以自託於孔氏而太史公信之耳孔子有言誦詩三百授之以政不達使於四方不能專對雖多亦奚以為孔門所謂言語者初止於此至於子貢加之以巧辨可以解紛結救患難而已若如公孫衍張儀騁其説辭傾覆諸侯以快意一時此則孔氏所諱也政事冉有季路季康子問仲由可使從政也與子曰由也果於從政乎何有曰賜也可使從政也與曰賜也達於從政乎何有曰求也可使從政也與曰求也藝於從政乎何有由也千乘之國可使治其賦也不知其仁也求也千室之邑百乘之家可使為之宰也不知其仁也冉求曰非不説子之道力不足也子曰力不足者中道而廢今女畫朱子曰力不足者欲進而不能畫者能進而不欲謂之畫者如畫地以自限也胡氏曰夫子稱顔回不改其樂冉求聞之故有是言然使求恱夫子之道誠如口之恱芻豢則必將盡力以求之何患力之不足哉畫而不進則日退而已矣此冉求之所以局於藝也南軒曰為仁未有力不足者故仁以為己任死而後已焉今冉求患力之不足非力不足也乃自畫耳所謂中道而廢者也士之學聖人不幸而死則已矣此則可言力不足也不然而或止焉則皆為自畫耳畫者非有以止之而自不肯前也愚按此章乃求也受病之源惟不能自強以進學故義利取舍之分不明而茍以從人無正救之益而有順從之失也季氏旅於泰山子謂冉有曰女弗能救與對曰不能子曰嗚呼曽謂泰山不如林放乎朱子曰旅祭名泰山在魯地禮諸侯祭封內山川季氏祭之僣也冉有名求時為季氏宰救謂救其陷於僭竊之罪嗚呼歎辭言神不享非禮欲季氏知其無益而自止又進林放以勵冉有也范氏曰冉有從季氏夫子豈不知其不可告也然而聖人不輕絶人盡己之心安知冉有之不能救季氏之不可諌也既不能正則美林放以明泰山之不可誣是亦教誨之道也季氏富於周公而求也為之聚斂而附益之子曰非吾徒也小子鳴鼓而攻之可也孟子曰冉求為季氏宰無能改於其德而賦粟倍他日孔子曰求非我徒也云云朱子曰周公以王室至親有大功位冢宰其富宜矣季氏以諸侯之卿而富過之非攘奪其君刻剝其民何以得此冉有為季氏宰又為之急賦稅以益其富非吾徒絶之也小子鳴鼓而攻之使門人聲其罪以責之也聖人之惡黨惡而害民也如此然師嚴而友親故己絶之而猶使門人正之又見其愛人之無己也范氏曰冉有以政事之才施於季氏故為不善至於如此由其心術不明不能反求諸身而以仕為急故也或問冉求學於夫子於門弟子中亦可謂明達者今乃為季氏聚斂何邪曰冉求之失不待於聚斂而後見自其仕於季氏則已失之矣蓋當是之時達官重仕皆為公族之世宦其下則尺地一民皆非國君之有士唯不仕則已仕則未有不仕於大夫者也冉求豈亦習於衰世之風而不自知其為非與然使之仕於季氏而能勸之黜其強僭而忠於公室則庶乎小貞之吉矣今乃反為之聚斂使權臣愈強而公室愈不振故孔子云云蓋不自知其學之未至而以從仕為士之常職是以漸靡而至於此耳曰然則夫子曷為不於其仕季氏焉責之也曰聖人以不仕為無義而猶望之以小貞之吉也南軒曰此哀公十年用田賦之事也冉有時為季氏宰考左氏之國語蓋嘗以此事訪於夫子而卒莫之救私門益以封殖則公家益以衰弱此求之所以得罪於聖門為深也原求所以至此蓋不能如閔子見幾而作因循陵遲而不自知也有志於學者亦鑒諸季子然問仲由冉求可謂大臣與朱子曰子然季氏子弟自多其家得臣二子故問之子曰吾以子為異之問曽由與求之問異非常也曽猶乃也輕二子以抑季然也所謂大臣者以道事君不可則止今由與求也可謂具臣矣具臣謂備臣數而已曰然則從之者與意二子既非大臣然則從季氏之所為而已子曰弒父與君亦不從也言二子雖不足於大臣之道然君臣之義則聞之熟矣弒逆大故必不從之蓋深許二子以死難不可奪之節而又以隂折季氏不臣之心也尹氏曰季氏專權僭竊二子仕其家而不能正也知其不可而不能止也可謂具臣矣是時季氏已有無君之心故自多其得人意其可使從己也故曰弒父與君亦不從也其庶乎二子可免矣求也退故進之由也兼人故退之季氏將伐顓臾朱子曰顓臾國名魯附庸也冉有季路見於孔子曰季氏將有事於顓臾按左傳史記二子仕季氏不同時此云爾者疑子路嘗從孔子自衛反魯再仕季氏不久而復之衛也孔子曰求無乃爾是過與冉求為季氏聚斂尤用事故夫子獨責之夫顓臾昔者先王以為東蒙主且在邦域之中矣是社稷之臣也何以伐為東蒙山名先王封顓臾於此山之下使主其祭在魯地七百里之中社稷猶云公家是時四分魯國季氏取其二孟孫叔孫各取其一獨附庸之國尚為公臣季氏又欲取以自益故孔子言顓臾乃先王封國則不可伐在邦域之中則不必伐是社稷之臣則非季氏所當伐也此事理之至當不易之定體而一言盡其曲折如此非聖人不能也冉有曰夫子欲之吾二臣者皆不欲也夫子指季孫冉有實與謀以孔子非之故歸咎於季氏孔子曰求周任有言曰陳力就列不能者止危而不持顛而不扶則將焉用彼相矣周任古之良史陳布也列位也相瞽者之相也言二子不欲則當諫諫而不聽則當去也且爾言過矣虎兕出於柙龜玉毁於櫝中是誰之過與兕野牛也柙檻也櫝匱也言在柙而逸在櫝而毁典守者不能辭其過明二子居其位而不去則季氏之惡己不得不任其責也冉有曰今夫顓臾固而近於費今不取後世必為子孫憂固謂城郭完固費季氏之私邑此則冉求之飾辭然亦可見其實與季氏之謀矣孔子曰求君子疾夫舍曰欲之而必為之辭欲之謂貪其利丘也聞有國有家者不患寡而患不均不患貧而患不安蓋均無貧和無寡安無傾寡謂民少貧謂財乏均謂各得其分安謂上下相安季氏之欲取顓臾患寡與貧耳然是時季氏據國而魯君無民則不均矣君弱臣強互生嫌隙則不安矣均則不患於貧而和和則不患於寡而安安則不相疑忌而無傾覆之患夫如是故逺人不服則修文德以來之既來之則安之內治修然後逺人服有不服則修文德以來之不當勤兵於逺今由與求也相夫子逺人不服而不能來也邦分崩離析而不能守也子路雖不與謀而素不能輔之以義亦不得為無罪故并責之逺人謂顓臾分崩離析謂四分公室家臣屢叛而謀動干戈於邦內吾恐季孫之憂不在顓臾而在蕭牆之內也干楯也戈戟也蕭牆屏也言不均不和內變將作其後哀公果欲以越伐魯而去季氏謝氏曰當是時三家強公室弱冉求又欲伐顓臾而附益之夫子所以深罪之為其瘠魯以肥三家也洪氏曰二子仕於季氏凡季氏所欲為必以告於夫子則因夫子之言而救止者宜亦多矣伐顓臾之事不見於經傳其以夫子之言而止也與或問首章之説曰蘇氏所推兩條考之尤密蘇氏曰舊説以蕭牆之憂為陽虎之難以吾考之定公五年陽虎始專季氏囚桓子至九年欲殺桓子不克而出奔齊前此者季氏之所為惟虎之聽非二子之罪也定公五年孔子年四十有七冉有少孔子二十有九歲蓋年十八而已未能相季氏也定公十二年子路為季氏宰哀公十一年冉求為季氏宰皆見於春秋則伐顓臾非陽虎出奔之前其在季康子之世歟哀公七年季康子伐邾以召吳寇故曰逺人不服而不能來也十五年公孫宿以成叛故曰邦分崩離析而不能守也公患三桓之侈也而欲以越去之故曰吾恐季孫之憂不在顓臾而在蕭牆之內也但蕭牆之禍亦本泛言非預知哀公以越伐魯之事也曰然則所謂均無貧和無寡安無傾者奈何曰是時季氏據魯之半而公室無尺地一民之勢不均甚矣是時四分魯國季氏取其二而二家各有其一不均則臣疑其君而以貧為憂矣憂貧而求富不已則君疑其臣而至於不和矣不和則臣益自疑而常懼於衆少矣憂寡而求衆愈甚則君益疑之而至於不安矣以臣亢君而不安至此則雖欲長保其祭祀而無傾危之患其可得哉必也痛自貶損以復於諸侯千乘大夫百乘之制則均而不患於貧矣君臣輯睦則和而不患於寡矣子孫長久世守職業則安而不至於傾矣此在當時蓋有難顯言者故夫子微辭以告之語雖略而意則詳矣釋曰三家之罪在於四分公室而私有之此其姦名犯分之大惡也若以此而加之罪則其不可仕明矣馴習既久以為當然故孔門弟子亦有仕於其家者仕於其家則不復知有魯矣冉有之言曰固而近於費今不取後世必為子孫憂則但知費為季氏之邑而子孫者為季氏子孫謀也豈復知有魯哉其於夫子社稷之臣之語蓋懵然莫覺也夫子不均不安之語又專指魯以發之其旨切矣以求由之賢蔽於習俗安於豢養尚不復知義理之正况下此者乎此君子所以貴窮理也南軒曰季氏卿也而上僭其君其下觀之亦將不奪不饜是徒以顓臾為子孫憂而不知禍之起於蕭牆蓋有理之必然者矣冉有但知為宰者當任其家事而昧於幾微暗於逺大如此則為具臣而已矣愚按孔子與門弟子言未有若此之反復詳悉者亦以其不可故邪按左傳齊師伐魯求以武城人三百為己從乎逆齊師於郊求用矛以帥衆遂入齊師獲甲首八十齊人宵遁杜氏曰仲尼之徒皆忠於魯國語子曰由誨女知之乎知之為知之不知為不知是知也朱子曰子路好勇蓋有強其所不知以為知者故夫子告之曰我教女以知之之道乎但所知者以為知所不知者以為不知如此則雖或不能盡知而無自欺之弊亦不害其為知矣况由此而求之又有可知之理乎南軒曰子路勇於進於知與不知之間容有察之未精者故夫子語之以知之之道蓋於其所已知與其所未知者皆能察其實而無自欺非心平氣和守約務實者莫之能也於此而博學審問慎思明辨則其不知者亦將終知之矣故曰是知也言是乃知之道也不然強以不知為知是則終身不知而已黃氏曰不知為不知是知也其亦有説乎曰是非之心智之端也是是非非見得分明便是智之發見而人之所以為知也若以是為非以非為是則是愚懵無識之人也今有人焉所知之事則以為知所不知之事則以為不知乃是非之心自然發見如此智孰大焉心之虛明是非昭著故夫子以為是知也子曰道不行乘桴浮於海從我者其由與子路聞之喜子曰由也好勇過我無所取材子曰由之瑟奚為於丘之門程子曰言其聲之不和與己不同也家語曰子路鼓瑟有北鄙殺伐之聲蓋其氣質剛勇而不足於中和故其發于聲者如此門人不敬子路子曰由也升堂矣未入於室也門人以夫子之言遂不敬子路故夫子釋之升堂入室喻入道之次第言子路之學己造乎髙明正大之域特未深入精微之奧耳未可以一事之失而遽忽之也南軒曰以瑟為言者蓋瑟之聲音象其中之所存也子路之氣稟偏於剛雖其學之所至氣質不為不變然於其所偏終有化之未能盡者在聖人之門為有未和也斯言所以警子路而進之而門人聞此遂有不敬子路之意蓋未知子路之所至與夫聖人發言之意也故復從而開曉之夫自得其門而入以至於升堂其為次序淺深亦已多矣其於用力亦可謂至矣獨未極夫閫奧之地耳由室而言在堂者則為未至所當勉以進也由宫牆之外而望其升堂者則不亦有間乎聖人斯言非特以發明子路亦所以使門人知學之有序也子路曰子行三軍則誰與子曰暴虎馮河死而無悔者吾不與也必也臨事而懼好謀而成者也子曰片言可以折獄者其由也與朱子曰片言半言折斷也子路忠信明決故言出而人信服之不待其辭之畢也子路無宿諾宿留也猶宿怨之宿急於踐言不留其諾也記者因夫子之言記此以見子路所以取信於人者由其養之有素也尹氏曰小邾射以句繹奔魯曰使季路要我吾無盟矣千乘之國不信其盟而信子路之一言其見信於人可知矣一言而折獄者信在言前人自信之故也不留諾所以全其信也子路有聞未之能行唯恐有聞子疾病子路使門人為臣病間曰久矣哉由之行詐也無臣而為有臣吾誰欺欺天乎朱子曰夫子時以去位無家臣子路欲以家臣治其喪其意雖尊聖人而未知所以尊也夫子既差而知其事故言無臣而為有臣則是欺天而已其責子路深矣且豫與其死於臣之手也無寧死於二三子之手乎且豫縱不得大葬豫死於道路乎范氏曰曽子將死起而易簀曰吾得正而斃焉斯已矣子路欲尊夫子而不知無臣之不可為有臣是以陷於行詐罪至欺天君子之於言動雖微不可不謹夫子深懲子路所以警學者也楊氏曰非知至而意誠則用智自私不如行其所無事往往自陷於行詐欺天而莫之知也其子路之謂乎或問云云曰胡氏云此必夫子失司寇之時未致其事之前也若夢奠則子路死於衛久矣孔子初未嘗知為臣之事而曰吾誰欺者引咎歸己以深責子路也或曰如使夫子疾病不間非禮之臣遂以奉終豈不仰纍聖德乎曰夫子倘至大故耳目所接有異必將正之矣聖人病則不能無若其方寸決不以病而懵也南軒曰所謂天者理而已理不應有而強使之有故曰欺天子路孔門之髙弟而所見若是之偏者蓋意有毫釐之差則流於欺詐而不自覺此君子之所以戰兢自持而每懼其或偏也子曰衣敝縕袍與衣狐貉者立而不恥者其由也與不忮不求何用不臧子路終身誦之子曰是道也何足以臧子路使子羔為費宰子曰賊夫人之子子路曰有民人焉有社稷焉何必讀書然後為學子曰是故惡夫佞者子路曰衛君待子而為政子將奚先子曰必也正名乎子路曰有是哉子之迂也奚其正子曰野哉由也君子於其所不知蓋闕如也子見南子子路不恱在陳絶糧從者病莫能興子路愠見曰君子亦有窮乎子曰君子固窮小人窮斯濫矣子曰由知德者鮮矣子路曰君子尚勇乎子曰君子義以為上君子有勇而無義為亂小人有勇而無義為盜又六言六蔽章曰好勇不好學其蔽也亂按史記子路性鄙好勇志力伉直冠雄雞佩猳豚陵暴孔子孔子設禮稍誘子路子路後儒服委質因門人請為弟子由也唁朱子曰唁粗俗也傳稱唁者謂俗論也若由也不得其死然史記子路死孔悝之難子曰自吾得由惡言不聞於耳孟子曰或問乎曽西曰吾子與子路孰賢曽西蹙然曰吾先子之所畏也曰然則吾子與管仲孰賢曽西艴然不悅曰爾何曽比豫於管仲管仲得君如彼其專也行乎國政如彼其久也功烈如彼其卑也爾何曽比豫於是楊氏曰孔子言子路之才曰千乘之國可使治其賦也使其見於施為如是而已其於九合諸侯一正天下固有所不逮也然則曽西推尊子路如此而羞比管仲者何哉譬之御者子路範我馳驅而不獲者也管仲詭遇而獲禽耳曽西仲尼之徒故不道管仲之事孟子曰子路人告之以有過則喜周子曰仲由喜聞過而令名無窮焉文學子遊子夏子遊問孝子曰今之孝者是謂能養至於犬馬皆能有養不敬何以别乎子遊為武城宰子曰女得人焉爾乎曰有淡臺滅明者行不由徑非公事未嘗至於偃之室也朱子曰淡臺姓滅明名字子羽徑路之小而捷者公事如飲射讀法之類不由徑則動必以正而無見小欲速之意可知非公事不見邑宰則其有以自守而無枉己徇人之私可見矣楊氏曰為政以人才為先故孔子以得人為問如滅明者觀其二事之小而其正大之情可見矣後世有不由徑者人必以為迂不至其室人必以為簡非孔氏之徒其孰能知而取之愚謂持身以滅明為法則無茍賤之羞取人以子遊為法則無邪媚之惑子之武城聞絃歌之聲夫子莞爾而笑曰割雞焉用牛刀子遊對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也子曰二三子偃之言是也前言戲之耳子遊曰喪致乎哀而止子夏問孝子曰色難有事弟子服其勞有酒食先生饌曽是以為孝乎子曰起豫者商也始可與言詩已矣子謂子夏曰女為君子儒無為小人儒子夏為莒父宰問政子曰無欲速無見小利欲速則不達見小利則大事不成子夏曰雖小道必有可觀者焉致逺恐泥是以君子不為也子夏曰日知其所亡月無忘其所能可謂好學也已矣子夏曰博學而篤志切問而近思仁在其中矣子夏曰百工居肆以成其事君子學以致其道子夏曰大德不踰間小德出入可也子遊曰子夏之門人小子當灑掃應對進退則可矣抑末也本之則無如之何子夏聞之曰噫言遊過矣君子之道孰先傳焉孰後倦焉譬諸草木區以别矣君子之道焉可誣也有始有卒者其唯聖人乎禮記子夏喪其子而喪其明曽子弔之曰吾聞之朋友喪明則哭之曽子哭子夏亦哭曰天乎豫之無罪也曽子怒曰商女何無罪也吾與女事夫子於洙泗之間退而老於西河之上使西河之上疑女於夫子爾罪一也鄭氏曰言其不稱師喪爾親使民未有聞焉爾罪二也言居親喪無異稱喪爾子喪爾明爾罪三也而曰女何無罪與子夏投其杖而拜曰吾過矣吾過矣吾離群而索居亦已久矣按史記孔子既沒子夏居西河教授為魏文侯師樂記有文侯問樂事朱子曰曽子之下篤實莫如子夏子張學干祿子曰多聞闕疑慎言其餘則寡尤多見闕殆慎行其餘則寡悔言寡尤行寡悔祿在其中矣子張問士何如斯可謂之達矣子曰何哉爾所謂達者子張對曰在邦必聞在家必聞子曰是聞也非達也夫達也者質直而好義察言而觀色慮以下人在邦必達在家必達夫聞也者色取仁而行違居之不疑在邦必聞在家必聞子張問行子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉立則見其參於前也在輿則見其倚於衡也夫然後行子張書諸紳子張曰士見危致命見得思義祭思敬喪思哀其可已矣子張曰執德不𢎞信道不篤焉能為有焉能為亡子夏之門人問交於子張子張曰子夏云何對曰子夏曰可者與之其不可者拒之子張曰異乎吾所聞君子尊賢而容衆嘉善而矜不能我之大賢與於人何所不容我之不賢與人將拒我如之何其拒人也師也辟朱子曰辟便辟也謂習於容止少誠實也子遊曰吾友張也為難能也然而未仁曽子曰堂堂乎張也難與並為仁矣禮記子張病召申詳而語之曰君子曰終小人曰死鄭氏曰申詳子張子欲使執喪成己志也死之言澌也事卒為終澌盡為死吾今日其庶幾乎按史記子張之次曰曽參曰淡臺滅明曽子已别見淡臺併見子遊事中史記曰滅明字子羽狀貌甚惡欲事孔子孔子以為材薄既己受業退而修行行不由徑非公事不見卿大夫南遊至江從弟子三百謹取舍去就名施乎諸侯孔子曰吾以言取人失之宰豫以貌取人失之子羽子謂子賤君子哉若人魯無君子者斯焉取斯朱子曰子賤姓宓名不齊上斯此人下斯此德子賤蓋能尊賢取友以成其德者夫子既歎其賢而又言魯無君子則此人何所取以成此德乎因以見魯之多賢也蘇氏曰稱人之善必本其父兄師友厚之至也或問云云曰胡氏吳氏亦有可取者胡氏曰家語云子賤少孔子曰子賤有才智德愛為單父宰民不忍欺以年計之孔子卒時子賤方年二十餘歲意其進師夫子退從諸弟子遊而切磋以成其德者故夫子嘆之如此吳氏曰説苑云子賤為單父宰所兄事者五人所友者十一人皆教子賤以治人之術按史記子賤為單父反命孔子曰此國有賢不齊者五人教不齊所以治者孔子曰惜哉不齊所治者小所治者大則庶幾矣憲問恥子曰邦有道榖邦無道穀恥也朱子曰憲原思也榖祿也邦有道不能有為邦無道不能獨善皆可恥也憲之狷介其於邦無道榖之可恥固知之矣至於邦有道榖之可恥則未必知也故夫子因其問并言之以廣其志克伐怨欲不行焉可以為仁矣子曰可以為難矣仁則吾不知也子謂公冶長可妻也雖在縲絏之中非其罪也以其子妻之朱子曰長之為人無所考而夫子稱其可妻其必有以取之矣又言其人雖嘗陷於縲絏之中而非其罪則固無害於可妻也夫有罪無罪在我而已豈以自外至者為榮辱哉南軒曰公冶長雖在縲絏而非其罪則其人能謹於行可知其所遇特無妄之災耳子謂南容邦有道不廢邦無道免於刑戮以其兄之子妻之朱子曰南宫韜也又名適字子容諡敬叔以其謹於言行故能見用於治朝免禍於亂世也南容三復白圭孔子以其兄之子妻之南宫適問於孔子曰羿善射奡蕩舟俱不得其死然禹稷躬稼而有天下夫子不答南宫適出子曰君子哉若人尚德哉若人按史記南宫之次曰曽蒧曰顔路曰商瞿曰髙柴顔路惟請車一事見於論語商瞿傳云孔子傳易於商瞿瞿傳楚人馯臂子弓然瞿傳易不見論語姑附此子曰吾與點也全文見氣象篇孟子敢問何如斯可謂狂矣萬章問曰如琴張曽晳牧皮者孔子之所謂狂矣何以謂之狂也曰其志嘐嘐然曰古之人古之人夷考其行而不掩焉者也柴也愚朱子曰柴姓髙字子羔愚者知不足而厚有餘家語記其足不履影啓蟄不殺方長不折執親之喪泣血三年避難而行不徑不竇可以見其為人矣子路使子羔為費宰章見學篇檀弓記其二事一曰季子臯葬其妻犯人之禾申詳以告曰請庚之子臯曰孟氏不以是罪豫朋友不以是非豫以吾為邑長於斯也買道而葬後難繼也鄭氏曰恃寵虐民非也其一曰成人有其兄死而不為衰者聞子臯將為成宰遂為衰由前則未可謂知為政之理由後則有言之化焉豈其學力之所進有月異而歲不同者邪子使漆雕開仕對曰吾斯之未能信子説朱子曰開字子若斯指此理而言信謂真知其如此而無毫髮之疑也開自言未能如此未可以治人故夫子恱其篤志程子曰漆雕開已見大意故夫子恱之又曰古人見道分明故其言如此謝氏曰開之學無所考然聖人使之仕必其材可以仕矣至於心術之微一毫不自得不害其為未信此聖人所不能知而開自知之其材可以仕而其器不安於小成他日所就其可量乎夫子所以説之也或問漆雕開未能自信而程子以為已見大意此理已明何也曰人惟不見其大也故安於小唯見之不明也故若存若亡一出一入而不自知其所至之淺深也今開之不安於小也如此則固非有以見乎其大不能矣卒然之間一言之對若目有所見而手有所指者且其驗之於身又如此其切而不容自欺也則其所見之明又何如哉然曰見大意則於其細微容或有所未盡曰理已明則固未必見其反身而誠也程子又以開與曽點並稱敢問二子孰為賢乎曰論其資稟之誠慤則開優於點語其見處超詣脫然無毫髮之纍則點賢於開然開之進則未已也南軒曰夫子使之仕知其可以施於有政也而開自謂斯未能信蓋胸中一毫有未盡不敢以自欺也其篤志近思之功為何如哉則其所至蓋未可量也故子説然則學者自謂能信者其未知用其力者與按史記開之次曰公伯寮其人無足記者今闕之司馬牛問君子子曰君子不憂不懼曰不憂不懼斯謂之君子矣乎子曰內省不疚夫何憂何懼司馬牛憂曰人皆有兄弟我獨亡子夏曰商聞之矣死生有命冨貴在天君子敬而無失與人恭而有禮四海之內皆兄弟也君子何患乎無兄弟也司馬牛問仁子曰仁者其言也訒曰其言也訒斯謂之仁矣乎子曰為之難言之得無訒乎史記曰牛多言而躁樊遲問知子曰務民之義敬鬼神而逺之可謂知矣問仁子曰仁者先難而後獲可謂仁矣樊遲從遊於舞雩之下曰敢問崇德修慝辨惑子曰善哉問先事後得非崇德與攻其惡無攻人之惡非修慝與一朝之忿忘其身以及其親非惑與樊遲問仁子曰愛人問知子曰知人樊遲未達子曰舉直錯諸枉能使枉者直樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可棄也樊遲請學稼子曰吾不如老農請學為圃曰吾不如老圃樊遲出子曰小人哉樊須也有子曰其為人也孝弟而好犯上者鮮矣不好犯上而好作亂者未之有也君子務本本立而道生孝弟也者其為仁之本與有子曰禮之用和為貴先王之道斯為美小大由之有所不行知和而和不以禮節之亦不可行也有子曰信近於義言可復也恭近於禮逺恥辱也因不失其親亦可宗也哀公問於有若曰年飢用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也對曰百姓足君孰與不足百姓不足君孰與足禮記有子問於曽子曰聞喪於夫子乎鄭氏曰喪謂仕失位也曰聞之矣喪欲速貧死欲速朽有子曰是非君子之言也曽子曰參也聞諸夫子也有子又曰是非夫子之言也曽子曰參也與子遊聞之有子曰然然則夫子有為言也曽子以斯言告于子遊子遊曰甚哉有子之言似夫子也昔者夫子居於宋見桓司馬自為石椁三年而不成夫子曰若是其靡也死不如速朽之愈也死之欲速朽為桓司馬言之也南宫敬叔反必載寶而朝敬叔仲孫閲也嘗失位去魯得反載其寶來朝於君夫子曰若是其貨也喪不如速貧之愈也喪之欲速貧為敬叔言之也曽子以子遊之言告於有子有子曰然吾固曰非夫子之言也曽子曰子何以知之有子曰夫子制於中都四寸之棺五寸之椁以斯知不欲速朽也昔者夫子失魯司寇將之荆蓋先之以子夏又申之以冉有以斯知不欲速貧也子夏子遊子張以有若似聖人一節已見曽子事中史記謂孔子沒弟子思慕有若狀似夫子弟子相與師之如夫子時他日弟子問月宿畢而不雨商瞿四十而有子有若默然無以應弟子起曰此非子之座也蘇氏曰茍至於君子未有無恥者也孟子稱禹崩益避啓於箕山之陰朝覲訟獄者皆不之益而之啓然後益不敢踐天子位太史公稱孔子既沒弟子以有若貌類孔子師之及問而不答乃斥去之夫以益有若之賢而其無恥至此極與且月宿畢而雨不應商瞿四十而生子此卜祝之事而鄙儒所以謂孔子聖人者戰國雜説類此者多矣孟子猶擇而况太史公乎語赤也束帶立於朝可使與賓客言也不知其仁也又言志章見後篇適齊乘肥馬衣輕裘見史記按史記赤之次曰巫馬期見昭公知禮章又家語宓子賤為單父宰鳴琴而單父治巫馬期為單父戴星而出戴星而入單父亦治期之次曰梁鱣曰顔幸曰冉儒曰曹恤曰伯及曰公孫龍皆不見於論語故略之以上敘孔門諸子之學自閔冉而下雖以四科為次第然十哲之云先儒已非之子張而下雖以史記為序然諸子學力之淺深人品之髙下初不以是為準也西山讀書記卷二十九
