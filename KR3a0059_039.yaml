body:
  text: 西山讀書記卷三十九宋真德秀撰日月星辰書堯典乃命羲和欽若昊天厯象日月星辰敬授人時朱子曰此兼命二氏四子作為厯象以授民欲其及時以趨事也若順也昊廣大之意也厯所以紀數之書也象所以觀天之器璣衡之屬是也日陽精一日而繞地一周月隂精一月而與日一㑹星二十八宿衆星為經金木水火土五星為緯皆是也辰以日月所㑹分周天之度為十二次也人時為耕穫蠶績之侯凡民事早晚之所關也分命羲仲宅嵎夷曰暘谷寅賓出日平秩東作日中星鳥以殷仲春厥民析鳥獸孳尾此以下四節言厯既成而分職以頒布且考驗之恐其推步之或差也宅居也嵎夷東表之地蓋官在國都而統治之方其極至此非往居於東也曰𤾉谷者以日之所出而名之也寅敬也賓禮接之如賓客也出日方出之日蓋以春分之旦朝方出之日而識其初出之景也平均秩序作起也東作春月嵗功方興所當作起之事也蓋以厯之節氣早晚均次其先後之宜以授有司也日中者晝得其中也蓋晝夜皆五十刻春主陽故以晝言也星鳥南方朱鳥七宿殷中也仲春者春分之氣蓋以日晷中星驗春之中也析分散也先是冬寒民聚於隩至是則以民之散處而驗其氣之溫也乳化曰孳交接曰尾以物之生育而驗其氣之和也申命羲叔宅南交平秩南訛敬致日永星火以正仲夏厥民因鳥獸希革申重也南交南方交趾之地訛化也謂夏月時物長盛所當變化之事也敬致周禮所謂春夏致日蓋以夏至之日中祠日而識其景如周禮所謂日至之景尺有五寸謂之地中者也永長也日永晝六十刻也星火東方蒼龍七宿火謂大火夏至之中星也因析而又析也以氣愈熱而民愈散也希革毛希而革易也分命和仲宅西曰昧谷寅餞納日平秩西成宵中星虛以殷仲秋厥民夷鳥獸毛毨西謂西極之地曰昧谷以日所入而名之也餞禮送行者之名納日方納之日也蓋以秋分之暮夕方納之日而識其景也西成秋月物成之時所當成就之事也宵夜也此時亦晝夜各五十刻秋主隂且避春之日中故舉宵以見日也星虛北方𤣥武七宿虛星秋分之中星也夷平也暑退而人氣平也毛毨毛落更生潤澤鮮好也申命和叔宅朔方曰幽都平在朔易日短星昴以正仲冬厥民隩鳥獸􅩝毛朔方北荒之地謂之朔者朔之為言蘇也萬物至此死而復蘇猶月之晦而有朔也日行至是則淪於地中萬象幽暗故曰幽都在察也朔易冬月嵗事已畢除舊更新所當改易之事也日短晝四十刻也冬而主隂然無所避故直言日也星昴西方白虎七宿昴星冬至之中星也隩室之內也氣寒而民聚於內也􅩝毛亦以寒而生細毛以自溫也蓋既命羲和造厯制器而又分方與時使各驗其實以審夫推步之差聖人之敬天勤民其謹如是是以術不違天而政不失時也今按中星或以象言或以次言或以星言者蓋星適當昏中則以星言如星虛星昴是也星不當中而適當其次者則以次言如星火是也次不當中而適介於兩次之間者則以象言如星鳥是也聖人作厯推考參驗以識四時中星其立言之法詳密如此又按堯冬至日在虛昏中昴今日在斗昏中壁而中星古今不同者蓋天有三百六十五度四分度之一嵗有三百六十五日四分之一天度四分之一而有餘嵗日四分之一而不足故天度常平運而舒日運常內轉而縮天漸差而西嵗漸差而東此即嵗差之由唐一行所謂嵗差者日與黃道俱差者是也古厯簡易未立差法但隨時占候修改以與天合至東晉虞喜始以天為天以嵗為嵗乃立差法以追其變約以五十年而退一度何承天以為太過乃倍其年而又反不及至隋劉焯取二家中數為七十五年蓋為近之而亦未為精密也帝曰咨汝羲暨和朞三百有六旬有六日以閏月定四時成嵗允釐百工庶績咸熙咨嗟也嗟歎而告之也暨及也朞猶周也嵗周三百六十五日四分日之一而曰三百有六旬有六日者舉成數也按天體至圓周圍三百六十五度四分度之一繞地左旋常一日一周而過一度日麗天而少遲一日繞地一周無餘而常不及天一度積三百六十五日九百四十分日之二百三十五而與初躔㑹是一嵗日行之數也月麗天而尤遲一日常不及天十三度十九分度之七積二十九日九百四十分日之四百九十九而與日㑹十二㑹得全日三百四十八餘分之積五千九百八十八如日法九百四十而一得六不盡三百四十八通計得日三百五十四九百四十分日之三百四十八是一嵗月行之數也嵗有十二月月有三十日三百六十者嵗之常數也故日行而多五日九百四十分日之二百三十五者為氣盈月行而少五日九百四十分日之五百九十二者為朔虛合氣盈朔虛而閏生焉故一嵗閏率則十日九百四十分日之八百二十七三嵗一閏則三十二日九百四十分日之六百單一五嵗再閏則五十四日九百四十分日之三百七十五十有九嵗七閏則氣朔分齊是為一章也故積之三年而不置閏則春之一月入於夏而時漸不定矣子之一月入於丑而嵗漸不成矣積之之久至於三失閏則春皆入夏而時皆不定十二失閏則子皆入丑而嵗全不成矣蓋其名實乖戾寒暑反易既為可笑而農桑庶務皆失其時為害尤甚故必以餘置閏而後四時不差而嵗功得成以此信治百官而衆功皆廣也洪範王省惟嵗卿士惟月師尹惟日嵗月日時無易百穀用成乂用明俊民用章家用平康嵗月日時既易百穀用不成乂用昏不明俊民用微家用不寧庶民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨易豐彖曰日中則昃月盈則食天地盈虛與時消息而况於人乎况於鬼神乎程子曰日中盛極則當昃映月既盈滿則有虧缺盈虛謂盛衰消息謂進退天地之運亦隨時進退也坎為水為月離為火為日為電春秋𫝊晉侯謂伯瑕曰何謂六物對曰嵗時日月星辰是謂也何謂辰對曰日月之㑹是謂也杜氏曰一嵗日月十二㑹所㑹謂之辰故以配日謂以子丑配甲乙也正義曰四時一終曰嵗取嵗星行一次也年取年穀一熟是言嵗即年也時謂四時日謂十日從甲至癸也月從正月至十二月也星二十八宿也辰謂日月所㑹一嵗十二㑹從子至亥也辰時也言日月聚㑹有時也書𦙍征乃季秋月朔辰弗集于房注辰日月所㑹房所舍之次集合也不合則日食可知正義引昭七年云云是辰謂日月之㑹日月俱右行於天日行遲月行疾日每日行一度月日行十三度十九分度之七計二十九日過半月已行天一周又逐及日而與日聚㑹此聚㑹為辰一嵗十二㑹故為十二辰即子丑寅卯之屬是也房謂室之房也故為所舍之次集㑹也㑹即是合日月當聚共舍今言日月不合於舍則是日食可知也日食者月掩之也月體掩日月被日映即不成共處故以不集言日食也記月令正義曰按老子曰道生一一生二二生三三生萬物道生一者一則混元之氣與大初大始大素同又與易之太極禮之太一其義不殊皆為氣形之始也一生二謂混元之氣分為二二則天地也與易之兩儀禮之太一分為天地同也二生三者三才也三生萬物謂天地人既定萬物備生其間也分為天地說有多家形狀之殊凡有六等一曰蓋天二曰渾天形如彈丸地在其中天包其外猶如雞卵白之繞黃揚雄桓談張衡蔡雍陸績王肅鄭𤣥之徒並所依用三曰宣夜四曰昕天五曰穹天六曰安天今禮記是鄭氏所注當用鄭義渾天為說案鄭氏考靈曜云天者純陽清明無形如鄭此言則天是太虛本無形體但指諸星運轉以為大耳但諸星之轉從東而西必三百六十五日四分日之一星復舊處星既左轉日則右行亦三百六十五日四分日之一至舊星之次即以一日之行而為一度計二十八宿一同天凡三百六十五度四分度之一是天之二周之數也天如彈丸圓圜三百六十五度四分度之一渾天之體雖繞於地地則中央平正天則北髙南下北極髙於地三十六度南極下於地三十六度然則北極之下日十六度嘗見不沒南極之上三十六度常沒不見月是隂精日為陽精故周髀云日猶火月猶水火則外光水則含景故月光生於日所照魄生於日所蔽當日則先盈就日則明盡京房云月與星辰隂者也有形無光日照之乃有光先師以為日似彈丸月似鏡體或以為月亦似彈丸日照處則明不照處則暗陽精為日日分為星故其字日下生也孟春之月日在營室昏參中旦尾中鄭氏曰日月之行一嵗十二㑹聖王因其㑹而分之以為大數焉觀斗所建命其四時孟春者日月㑹於娵訾而斗建寅之辰也凡記昏明中星者為人君南面而聽天下視時候以授民事正義曰云日月之行一嵗十二㑹者同昭七年正義鄭注周禮大師職云十一月辰在星紀丑十二月辰在𤣥枵子正月辰在娵訾亥二月辰在降婁戌三月辰在大梁酉四月辰在實沈申五月辰在鶉首未六月辰在鶉火午七月辰在鶉尾巳八月辰在夀星辰九月辰在大火卯十月辰在析木寅此是一嵗十二㑹也按大師正義日辰與建質處正謂此也娵訾是亥次之號斗謂北斗循天而轉行一月建一辰也其日甲乙日之行春東從青道發生萬物月為佐時萬物皆解孚甲自抽軋而出因以為日名焉乙不為月名者君統臣功也正義曰日之行春東從青道者以星辰之次謂之黃道春時星辰西遊黃道近西黃道之東謂之青道日體不移依舊而行當青道之上故曰東從青道云月為之佐者以日月皆經天而行月依從青道隂佐於陽故云為之佐也知月依從東道者以緯云月行九道九道者並與日同而青道二黃道東赤道二黃道南白道二黃道西黑道二黃道北并黃道而為九道並與日同也云物抽軋而出因以為日名者以日能生養萬物因物之出以為日功之名也云乙不為月名者君統臣之功也者月既佐日同有甲乙之功今獨以甲乙為日名不以為月名者日統領月之功猶若君統領臣之功以為己功也仲春季春日在甲乙同不重舉仲春之月日在奎昏弧中旦建星中仲春者日月㑹於降婁而斗建卯之辰也弧在輿鬼南建星在斗上季春之月日在胃昏七星中旦牽牛中季春者日月㑹於大梁而斗建辰之辰孟夏之月日在畢昏翼中旦婺女中孟夏者日月㑹於實沈而斗建巳之辰其日丙丁丙之言炳也日之行夏南從赤道長育萬物月為之佐時萬物皆炳然著見而强大又因以為日名焉仲夏之月日在東井昏亢中旦危中仲夏者日月㑹於鶉首而斗建午之辰也季夏之月日在栁昏火中旦奎中季夏者日月㑹於鶉火而斗建未之辰也中央土火休而盛德在土也其日戊巳戊之言茂也巳之言起也日之行四時之間從黃道月為之佐至此萬物皆枝葉茂盛其含秀者抑屈而起故因以為日名焉孟秋之月日在翼昏建星中旦畢中孟秋者日月㑹於鶉尾而斗建申之辰也其日庚辛庚之言更也辛之言新也日之行秋西從白道成熟萬物月為之佐萬物皆肅然更改秀發新成又因以為日名焉仲秋之月日在角昏牽牛中旦觜觿中仲秋者日月㑹於夀星而斗建酉之辰也季秋之月日在房昏虛中旦栁中季秋者日月㑹於大火而斗建戌之辰也孟冬之月日在尾昏危中旦七星中孟冬者日月㑹於析木之津而斗建亥之辰也其日壬癸壬之言任也癸之言揆也日之行冬北從黑道閉藏萬物日為之任時萬物懷任於下揆然萌芽又因以為日名焉仲冬之月日在斗昏東壁中旦軫中仲冬者日月㑹於星紀而斗建子之辰也季冬之月日在婺女昏婁中旦氐中季冬者日月㑹於𤣥枵而斗建丑之辰也是月也日窮于次月窮于紀星回于天數將幾終言日月星辰運行於此月皆周匝於故處也次舍也紀㑹也正義曰日窮于次月窮于紀者紀猶㑹也去年季冬與日相㑹於𤣥枵自此以來月與日相㑹在於他辰至此月窮盡遂復㑹於𤣥枵故云云星回于天者謂二十八宿隨天而行每日雖周天一匝早晚不同至此月復其故處與去年季冬早晚相似故云云數將幾終者幾近也以去年季冬至今年季冬三百五十四日未滿三百六十五日未得正終唯近於終故云云禮運天秉陽垂日星地秉隂竅於山川播五行于四時和而后月生也是以三五而盈三五而闕鄭氏曰秉猶持也言天持陽氣施生照臨下也竅孔也言地持隂氣出納於山川以舒五行於四時此氣和乃后月生而上配日若臣功成進爵位也一盈一闕屈伸之義也必三五者播五行于四時也正義曰播謂播散五行金木水火土之氣於春夏秋冬之四時也和而后月生也者若四時不合日月乖度寒燠失所則月不得依時而生若五行四時調和道度不失而后月依時而生也云一盈一闕屈伸之義也者盈謂月光盈滿若臣之進受髙位是其伸也闕謂月光虧損若臣之退就下位是其屈也愚按日星麗乎天陽之為也山川麗乎地隂之為也秉者主持之謂陽主精氣故為日星之光日太陽也星少陽也隂主形質故為山川之竅播者布也謂隂陽二氣分為五行而布於四時也和猶合也謂隂陽和合而月始生也月太隂也本有質而無光其光虧也以受日光之多少月之朔也始與日合越三日而明生八日而上弦其光半十五日而望其光滿此所謂三五而盈也既望而漸虧二十二日而下弦其虧半三十日而晦其光盡此所謂三五而闕也方其晦也是為純隂故魄存而光泯至日月合朔而明復生焉和而月生蓋取此義注疏之說恐非又鄉飲酒義日月者三日則成魄三月則成時朱子曰魄者月之有體而無光處也故書言哉生明旁死魄皆謂月生三日月初生時也凡言既生魄即謂月十六日月始闕時也今此篇兩言月三日而成魄則是漢儒専門陋學未嘗讀尚書者之言耳禮器大明生于東月生于西此隂陽之分夫婦之位也陳氏曰禮記云云詩曰日居月諸出自東方又曰東方之日東方之月蓋月之始則生於西其後則生於東孟子曰日月有明容光必照焉程子曰日月之明有本故容光必照君子之道有本故無不及也朱子曰明者光之體光者明之用楚詞天問出自湯谷次于䝉汜自明及晦所行幾里朱子曰湯音陽次舍也汜水涯也書云宅嵎夷曰暘谷即湯谷也爾雅云西至日所入為大䝉即䝉汜也此問一日之間日行幾里乎答之曰湯谷䝉汜固無其所然日月出水乃升於天其西下又入於水故其出入似有處所而所行里數厯家以為周天赤道一百七十萬四千里日一晝夜而一周也春秋二分晝夜各行其半而夏長冬短一進一退又各以其什之一焉夜光何德死則又育厥利維何而顧莵在腹莵一作兔與免同夜光月也死其晦也育生也月之生也此問月有何德乃能死而復生月何利而顧望之莵常居其腹乎答曰厯家舊說月朔則去日漸逺故魄死而明生既望則去日漸近故魄生而明死至晦而朔則又逺日而明復生所謂死而復育也此說誤矣若果如此則未望之前西近東逺而始生之明當在月東既望之後東近西逺而未死之明却在月西矣安得未望載魄於西既望終魄於東而遡日以為明乎故惟近世沈括之說乃為得之蓋括之言曰月本無光猶一銀丸日曜之乃光耳光之初生日在其傍故光側而所見才如鈎日漸逺則斜照而光稍滿大抵如一彈丸以粉塗其半側視之則粉處如鈎對視之則正圓也近嵗王普又申其說曰月生明之夕但見其一鈎至日月相望而人處其中方得見其全明必有神人能凌到景旁日月而往參其間則雖弦晦之時亦得見其全明而與望夕無異耳以此觀之則知月光常滿但人自所立處視之有偏有正故見其光有盈有虧非既死而復生也若顧莵在腹之問則世俗桂間蛙兔之𫝊其惑久矣或者以為日月在天如兩鏡相照而地居其中四旁皆空水也故月中微黑之處乃鏡中大地之影略有形似而非真有是物也斯言有理足破千古之疑矣月只是受日光月質常圓不曽缺如圓毬只有一面受日光望日日在酉月在卯正相對受光為盛天積氣上面徑只中間空為日月來往地在天中不甚大四邉空有時月在天中央日在地中央則光從四旁上受於月其中昏暗便是地影望以後日與月行便差背向一畔相去漸漸逺其受光面不正至朔行又相遇日與月正緊相合日便蝕無光月或從上過或從下過亦不受光受日光但小耳何闔而晦何開而明角宿未旦曜靈安藏闔閉户也開闢户也隂闔而晦陽開而明角亢東方星旦明也曜靈日也此問何所開闔而為晦明且東方未明之時日安所藏其精光乎答曰晦明之問前屢發之其實亦隂陽消息之所為耳陽息而闢則日出而明隂消而闔則日入而暗又何疑乎角宿固為東方之宿然循天運轉不常在東古經之言多假借也日之所出乃地之東方未旦則固已行於地中特未出地面之上耳程子曰日月隂陽之精氣也又曰日月隂陽發見盛處日月薄蝕而旋復者不能奪其常也天地日月一也月受日光而日不為之虧然月之光乃日之光也天氣降而至於地地中生物者皆天也惟無成而代有終耳北辰自是不動只不動便為氣之主故為星之最尊也朱子曰北辰是那中間無星處些子不動是天之樞紐北辰無星緣人要取此為極不可無箇記認所以就其旁取一小星謂之極星問極星動不動曰也動只是他近那辰處雖動不覺如那射糖盤子樣北辰便是中心椿子極星便是近椿底㸃子雖也隨盤轉緣近椿子便動動得不覺今以管窺極星見其動去只在管裏面不動出去向來人只說北極不動至本朝人方推得是北極只在北辰邉頭而極星依舊動又一說那空無星處謂之辰康節說日月星辰自是四件辰是那天上分為十二段底即十二辰天壤也此說是每一辰各有幾度謂如日月宿於角幾度即所宿處是辰也故曰日月所㑹謂之辰又論五峯說極星有三箇極星不動殊不可曉若以天運譬如極盤則極星只是中間蒂子所以不動若是三箇不動則不可轉矣邵子曰日行陽度則盈行隂度則縮賓主之道也月逺日則明生而遲近日則魄生而疾君臣之義也張氏曰自冬至以後行陽度而漸長夏至以後行隂度而漸短雖以陽臨隂為客之禮亦不敢自肆此君所以禮臣夫所以禮婦也諸厯家說月一日至四日行最疾日夜行十四度餘五日至八日行次疾日夜行十三度餘自九日至十九日其行遲日夜行十一度餘二十日至二十三日行又小疾日夜行十二度餘二十四至晦行又大疾日夜行十四度餘以月均之則日得十三度之七也逺日則明生而行遲近日則魄生而行疾有君臣之義焉故易三多譽四多懼陽消則生隂故日下而月西出也隂盛敵陽故日望而月東出也天為父日為子故天左旋日右行日為夫月為婦故日東出月西生也張氏曰初三日日初入時月在庚上哉生明見西方八日為上弦日初入時月在丁上十五日為望日初入時月在甲上盛於東方十六日將出時月在辛上哉生魄見平旦二十三下弦日將出時月在丙上三十日為晦月與日合在乙上月本無光借日以為光及其盛也遂與陽敵為人君者可不慎哉天左旋日右行日東出月西生父子夫婦之道隂陽之義也月望亦東出者敵陽也非常道也朱子曰二日第一節之中月生明之時也蓋始受一陽之光而昏見於西方庚地八日第二節之中月上弦之時受二陽之光而昏見南方丁地十五日第三節之中月既望之時全受日光盛滿而昏見於東方之甲地是為乾體十六日第四節之始也始受下一隂為巽而其魄以平旦而沒於西方辛地二十三日第五節之中復生中一陽為艮而下弦以平旦而沒於南方丙地三十日第六節之終全變三陽而光盡體伏於西北一月六節既盡而禪於後月復生震卦云震一兊二乾三巽四艮五坤六每五日為一節朔旦震始用事日月隂陽交感之祗道家象此以為修煉之法此參同注也因附於此日月之相食數之交也日望月則月食月掩日則日食猶水火之相尅是以君子用智小人用力張氏曰日月相對謂之望日月相㑹謂之晦日常食於朔月常食於聖正如水火之相尅水之尅火掩而克之小人用力也火之尅水必隔物焉君子用智也月近日無光為晦月敵日而光盛為望然日食於朔月食於望乃知小人在外雖盛必自危而其柔弱狎比之時多能為君此則慮與不慮之間所以易戒履霜而不懼揚庭也日月一年十二㑹十二望而有食有不食者交則食不交則不食也所以有交不交者日行黃道月行九道也亦有交而不食者同道而相避也月體本黑受日之光而白張氏曰月體本黑者隂也受日之光而白者得陽之氣也太陽為日太隂為月少陽為星少隂為辰日月星辰交而天之體盡之矣月者日之影也情者性之影也陽中有隂隂中有陽天之道也陽中之陽日也陽中之隂月也以其陽之類故能見於晝隂中之陽星也所以見於夜隂中之隂辰也天壤也陽中陽日也陽中隂月也隂中陽星也隂中隂辰也柔中柔水也柔中剛火也剛中柔土也剛中剛石也張子曰五緯五行之精氣也所以知者以天之星辰獨此五星以色言之文有驗以心取之亦有此說按漢天文志嵗星曰東方春木於人五常仁也五事貌也熒惑曰南方夏火禮也視也太白曰西方秋金義也言也辰星日北方冬水知也聽也填星曰中央季夏土信也思心也仁義禮智以信為主貌言視聽以心為主故四星皆失填星乃為之動地純隂凝聚於中天浮陽轉旋於外此天地之常體也常星不動純繫於天與浮陽運旋而不窮者也日月五星逆天而行并包乎地者也地在氣中雖順天左旋其所繫辰象隨之稍遲則反從而右爾間有緩速不齊者七政性殊也月隂精反乎陽者也故其右行最速日為陽精然其質本隂故其右行雖緩亦不純繫乎天如常星不動金水附日前後進退而行者其理精深存乎物感可知矣填星地類然根本五行雖其行最緩亦不純繫乎地也火者亦隂質為陽萃焉然其氣比日而微故其遲倍日惟水九嵗一衰故嵗厯一辰辰者日月一交之次有嵗之象也右論日月五星天左旋此真至粗之論耳不考日月出沒常星昏曉之變愚謂在天而運者惟七曜而已常星所以為晝夜者直以地氣乘機左旋於中故使恆星河漢因北為南日月因天隱見太虛無體則無以驗其遷動於外也日質本隂月質本陽故於朔望之際精魄反交則光為之食虧盈法月於人為近日逺在外故月受日光常在於外人視其終初如鈎之曲及其中天也如半璧然此虧盈之驗也月所位者陽故受日之光不受日之精相望中弦則光為之蝕精之不可以二也日月雖以形相物考其道則有施受健順之差焉星月金水受光於火日隂受而陽施也隂陽之精互藏其宅則各得其所安故日月之形萬古不變日月得天得自然之理也非蒼蒼之形也朱子曰星亦受日之光凡天地之光皆日也太一如人主北極如帝都問上蔡謂北極為天之樞也以其居中故謂之北極以其周建於十二辰之舍故謂之北辰不知然否曰以其居中不動衆星環向為天樞軸天形如雞子旋轉極如一物橫亘在中兩頭稱定一頭在地上是為北極一頭在地下是為南極又曰太乙曰太一是帝座即北極也以星辰位言之謂之太乙以其居之處言之謂之北極云云緯星隂中之陽經星陽中之隂蓋五星皆是地上木火土金水之氣上結而成却受日光經星却是陽氣之餘凝結者但經星則閃爍開闔其光不定緯星則不然縱有芒角其本體之光亦自不動細視之可見右論日月星辰按張子曰日月星辰之事聖人不言必是顔子輩皆已理㑹得更不須言也以張子之說推之則日月星辰之事亦學者所當講也然今所載止取聖賢之言庶知其大概而已若史志所書厯家所算自當别焉非此所能該也雷霆風雨之屬易震為雷巽為風坎為水離為電按諸卦有坎者或為雲或為雨記月令仲春是月也雷乃發聲始電蟄蟲咸動唘户始出先雷三日奮木鐸以令兆民曰雷將發聲有不戒其容止者生子不備必有凶災鄭氏曰主戒婦人有娠者也容止謂動靜正義曰雷是陽氣之聲將發與隂相衝蔡雍云季冬雷在地下則雉應而雊孟春動於地之上則蟄蟲應而振出至此升而動於天之下其聲發揚以雷出有漸故云乃云始電者電是陽光陽微則光不見此月陽氣漸升以擊於隂其光乃見故云始電蔡氏云迅雷風烈孔子必變玉藻曰迅雷甚雨則必變雖夜必興衣服冠而坐所以畏天威也小人不畏天威懈慢褻瀆或至夫婦交接君子制法不可指斥言之故曰有不戒其容止者言此時夫婦交接生子支體性情必不備其父母必有灾仲秋是月也雷乃收聲蟄蟲坯户雷始收聲在地中動內物也正義曰知動內物者以雷是陽氣主於動不惟地中潛伏而已至十一月一陽初生震下坤上復卦用事震為動坤為地是動於地下是終此月為始故云動內物也仲尼閒居天有四時春秋冬夏風雨霜露無非教也地載神氣神氣風霆風霆流形庶物露生無非教也正義曰神氣謂神妙之氣化也言神氣者氣從地出又風著於土雷出於地故神氣風雷偏屬於地程子曰電者隂陽相軋雷者隂陽相擊也軋者如石相磨而火光出者電便有雷擊者是也末句疑有誤字風雷二物相益者也風烈則雷迅雷激則風怒兩相助益所以為益霜露星之氣異乎雨雪又曰霜與露不同霜金氣星月之氣露亦星月之氣星感得其氣即為霜如言露結為霜非也朱子曰霜只是露結成雪只是雨結成古人云露是星月之氣不然今髙山頂上雖晴亦無露露只是自下蒸上人言極西髙山上亦無雨雪或問髙山無霜露其理如何曰上面氣漸清風漸緊雖微有霧氣便吹散了所以不結若雪只是雨遇寒而嚴凝故髙寒處雪先消雹者隂陽相搏之氣蓋沴氣也聖人在上無雹雖有不為灾按左氏昭四年王正月大雨雹季武子問於申豐曰雹可禦乎對曰聖人在上無雹雖有不為灾鄭氏曰雨水陽也雪雹隂也雨水而伏隂薄之則凝而為雹雨雪而愆陽薄之則合而為霰故程子云沴氣也霹靂天地之怒氣也問人有不善霹靂震死是人懷不善之心聞霹靂震懼而死否曰是雷震之也問有使之者否曰人之作惡與天地之惡氣相擊搏遂以震死云云如人之怒固自有正然怒時必為之作惡是怒亦惡氣也怒氣與惡氣相感故爾曰雷所擊處必有火何也雷自有火動極陽生自然之理易言密雲不雨自我西郊自西則隂先唱也故雲雖密而不雨長安西風而雨終未記此理須是自東自北而風則雨自南自西則不雨何者東北屬陽陽唱而隂和故雨西南隂也隂唱則陽不和故不雨云云今西風而雨山勢使然龍隂物也出則濕氣蒸然自出龍之興雲不足怪雲從龍風從虎云云如濕物在日中氣亦自出雖木石之微感隂氣尚亦有氣則龍之興雲不足怪虎行處則風自生邵子曰陽得隂而為雨隂得陽而為風剛得柔而為雲柔得剛而為雷無隂則不能為雨無剛則不能為雷雨柔也而屬隂隂不能獨立故待陽而後興雷剛也而屬體體不能自用必待陽而後發也張氏曰陽唱而隂從則流而為雨隂格而陽薄則散而為風剛唱而柔從則流而為雲柔畜而剛動則激而成雷客主先後隂陽順逆不同也風雨自天而降故言隂陽雲雷自地而升故言柔剛天陽也陽必資隂故無隂則不能為雨陽得隂然後聚而成體也地隂也隂必資陽故無陽則不能為雷隂得陽然後發而成聲也此言隂陽之相資也雨之形柔也屬隂者本乎天之氣也隂不能獨立待陽而後興者天之隂資乎天之陽也雷之聲剛也屬體者出乎地之形也體不能自用必待陽而後發者地之隂資乎地之陽也大抵隂陽匹敵雖曰相資然隂無能為必待陽而後有為君臣父子夫婦之義也陽來則生陽去則死天地間所主者一陽而已是故陽一而隂一陽尊而隂卑别而言之則天為陽地為隂合而言之則天有隂陽地亦有隂陽隂陽氣也剛柔形也既以隂陽言天則必以剛柔言地然地有柔剛天亦有柔剛所以先生之言錯綜而用之也風氣也麗乎陽雨形也麗乎隂雲象也近乎形雷聲也近乎氣氣皆可以言天形皆可以言地自其始而言則風雨為隂陽雲雷為柔剛要其終而言則雲雷亦得言隂陽風雨亦得言柔剛或由天而地或由地而天蓋以天地相交上下同用也雲行雨施電發雷震亦各從其類也張氏曰隂陽和則氣蒸為雲澤流為雨激則光發為電聲震為雷和者陽先而隂從之激者陽盛而隂制之也吹噴吁呵呼風雨雲霧雷言相類也張氏曰吹為風噴為雨吁為雲呵為霧呼為雷此人與天地相類者也然所以不相類者人有心而天無心其裁成輔相則天有賴乎人及其機巧詐辨則人不若天矣有雷則有電有電則有風雨生於水露生於土雷生於石電生於火雷與風同為陽之極故有電必有風張氏曰雷者震之氣也電者離之氣也風者巽之氣也陽為重隂所制怒氣發而為雷怒而極激而為電隂已不能制矣散而為風則反制隂也故風與雷皆為陽之極雨者水之氣蒸則為雲凝則為雪露者土之氣升則為霧結則為霜雷出於石電生於火有雷則為電火出於石也木之堅非雷不能震草之柔非露不能潤張氏曰木者地之剛雷亦地之剛草者地之柔露亦地之柔剛能相制柔能相益張子曰隂性凝聚陽性發散隂聚之陽必散之其勢均散陽為隂纍則相持為雨而降隂為陽得則飄揚為雲而升故雲物班布太虛者隂為風驅餘聚而未散者也凡隂氣凝聚陽在內者不得出則奮擊而為雷霆陽在外者不得入則周旋不舍而為風其聚有逺近虛實故雷風有小大暴緩和而散則為霜雪雨露不和而散則為戾氣曀霾隂嘗散緩受交於陽則風雨調寒暑正朱子曰橫渠此論極分曉陽為隂纍則相持為雨而降陽氣正升忽遇隂氣則相持而下為雨蓋陽氣輕隂氣重故陽氣為隂壓墜而下也隂為陽得則飄揚為雲而升隂氣正升忽遇陽氣則助之飛騰而上為雲也隂氣凝聚陽在內者不得出則奮擊而為雷霆陽氣伏於隂氣之內不得出故爆開而為雷也陽在外者不得入則周旋不舍而為風隂氣凝結於內陽氣欲入不得則旋繞於外不已而為風至吹散隂氣乃已也和而散則為霜雪雨露不和而散則為戾氣曀霾戾氣飛雹之類曀霾黃霧之類皆隂陽邪惡不正之氣所以雹水穢濁或青黑色又按隋文帝欲六月殺人大理少卿趙綽爭之帝曰六月豈無雷霆我則天而行何不可之有胡氏曰雨露猶人君之惠澤雷霆猶人君號令生成萬物之時固有雷霆而雷霆未嘗殺物隋文取則雷霆而乘怒殺人其違天多矣或問雷霆何為而然者有形耶有神耶曰古人未之言也然先逹大儒亦嘗明其理矣蓋天地之間無非隂陽聚散闔闢之所為也可以神言不可以形論非如異端所謂龍車石斧鬼鼓火鞭怪誕之難信也故其言曰隂氣凝聚陽在內而不得出則奮擊而為雷霆雖聖人復起不能易矣凡聲陽也光亦陽也光發而影隨之陽氣奮擊欲出之勢也電緩小則震亦緩小電迅大則震亦迅大震電交至則必有雨震而不電電而不震則無雨由隂氣凝聚之有踈緩迅密也曰世人所得雷斧者何物也曰此猶星隕而為石也本乎天者氣而非形偶隕於地則成形矣然而不盡然也曰雷之破山壞廟折木殺人者何也曰先儒以為隂陽之怒氣也氣鬱而怒方爾奮擊偶或值之則遭震矣然而不盡然也曰電之閃爍激疾如金虺飛騰之狀何謂也曰電之發也惟光爾適映雲際則如是不當乎雲之際而在同雲之中則無是矣凡天地造化之迹茍不以理推必入於幻怪僞誕之說而終不能明故君子窮理之為要也天象者陽中之隂風霆者隂中之陽雷霆感動雖速然其所由來亦漸􅤔蝀者隂氣薄而日氣見也有一日其全見者是隂氣薄處不全見者是隂氣厚處朱子曰雪花所以必六出者六者隂數天地自然之數也太隂𤣥精石亦六稜龍水物也其出與陽氣交蒸故能成雨然雨者隂陽之氣蒸鬱而成非必龍之為也問龍行雨之說曰云云密雲不雨尚往也蓋止下氣上升故未能雨必是上氣蔽蓋無發泄處方能有雨又曰如甑有蓋其氣鬱蒸而汗下則為雨甑不蓋其氣散而不收則為霧風與天相似旋轉未嘗息也今此處無風蓋或旋在那處或旋在上面都不可知如夏多南風冬多北風蓋亦可見雷者氣鬱積之極而迸散者也如今之爆杖雪非能為豐年其所以然者以其凝結陽氣在地至來嵗發達而生長萬物故也雨與露不同雨氣昏而露氣清也露與霧不同露氣肅而霧氣昏也露之結為霜也然露滋物而霜殺物愚按露未凝則陽也故生凝則隂矣故殺右論雷霆風雨之屬西山讀書記卷三十九
