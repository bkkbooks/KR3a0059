body:
  text: 西山讀書記卷三宋真德秀撰心書大禹謨帝曰人心惟危道心惟微惟精惟一允執厥中此舜命禹之詞朱子曰心之虛靈知覺一而已矣而以為有人心道心之異者以其或生於形氣之私或原於性命之正而所以為知覺者不同是以或危殆而不安或微妙而難見爾然人莫不有是形故雖上智不能無人心亦莫不有是性故雖下愚不能無道心二者雜於方寸之間而不知所以治之則危者愈危微者愈微而天理之公卒無以勝夫人欲之私矣精則察夫二者之間而不雜也一則守其本心之正而不離也從事於斯無少間斷必使道心常為一身之主而人心每聽命焉則危者安微者著而動靜云為自無過不及之差矣堯舜以來未有議論時先有此言聖人心法無以易此經中此意極多所謂擇善而固執之擇善即惟精也固執即惟一也又如博學審問慎思明辨皆惟精也篤行是惟一也中庸明善惟精也誠身惟一也大學致知格物非惟精不可能誠意則惟一學者只是學此理孟子以後失其傳亦只是失此問如此則人心純為不善矣乎曰非也但謂之人心便有口鼻耳目之欲易為物誘所以謂之惟危聖人亦未嘗無人心其好惡皆與人同各當其則是所謂道心也有道理底人心便是道心人受天地之中以生道心合下先得但有此形氣道心便隔了一重所以釋氏嘗説父母未生前一著便厭棄人心欲併去之殊不知道心即在這裏人心是此心有知覺有嗜欲者感於物而動此豈能無但為物誘而至於陷溺則為害耳故聖人以為人心有知覺嗜欲無所主宰則流而忘反不可據以為安故曰危道心則是義理之心可以為人心主宰而人心據之為準者也且以飲食言之凡飢渴而欲飲食者人心也然必有義理存焉有可以食有不可以食如子路食於孔悝之類與夫嗟來之食此皆不可食者也又如父之慈其子子之孝其父常人亦能之此道心之正也茍父一虐其子則子必狠然以悖其父此人心之所以危也惟舜則不然雖其父欲殺之而舜之孝未嘗替此道心也故當使人心每聽道心之區處方可然此道心却雜出於人心之間微而難見故必須精之一之而後中可執謂之人心固未以為悉皆邪惡謂之危亦未以為便致凶咎但既不主於理而主於形則其流為邪惡以致凶咎亦不難矣非若道心必善而無惡有安而無傾有準的而可憑據也人心是血氣和合做成先生以手指身嗜欲之類皆從此出故危道心則本來稟受得仁義禮智之心聖人以此二者對待而言政欲察之精而守之一也察之精則兩箇界限分明專一守著道心不令人欲得以干犯欲生惡死人心也惟義所在道心也道心是義理上發出來底人心是人身上發出來底雖聖人不能無人心如飢食渴飲之類雖小人亦時有道心如惻隱羞惡之類一心只在道上少間人心自降伏恰似都無人心一般陸子靜云舜若以人心為全不好則須使人去之今只説危者不可據以為安爾言精者欲其精察而不為所雜也此言亦是道心惟微者此心難明有時發見些子有時不見了惟聖人能辨之精守得徹頭徹尾學者則須擇善而固執之大抵人心道心只是一箇不是兩箇物觀下惟精惟一可見人只有一箇心知覺從道理上去便是道心知覺從聲色臭味上去便是人心只爭得些子人心人欲也此語有病謂之危者未便是不好只是危險欲墮未墮之間若以道心主之則危者自安若縱其欲則墮入於惡而不止於危也喜怒人心也然無故而喜無故而怒與喜至於過而不能禁怒至於甚而不能制是皆為人心所使也須是喜其所當喜怒其所當怒乃是道心勉齋黃氏答李貫之問曰喜怒哀樂屬乎氣故曰人心感物而動易陷於惡故曰危仁義禮智屬乎理故曰道心以理而動無迹可見故曰微人心之中子細辨别孰為道心擇之至精知之事也人心之中識得道心此心之發純一不雜守之事也道即中也存之於內故曰道心形之於外故曰中道在內者一而不雜則在外者信其能執而不變矣此是畫定圖説又曰所論發不中節為人心者非也雖聖賢不能無人心但人心之發悉合於理則為道心精者不以人心雜乎道心亦未安精乃知之事謂子細辨别識其所謂道心也惟一則守其道心欲其純一也圖內又以執中為道心中乃道心之發於事無過不及之謂也大抵此章之義所失有三其一不合以人心便為不善其二不分别精一為知與守其三不應以執中為道心而不知其為心之形於事貫之又書蒙教三失因再以章句序考之乃知本自分明序文曰以其或生於形氣之私或賦於性命之正此即來諭屬乎氣為人心屬乎理為道心之謂也序文又曰人莫不有是形故雖上智不能無人心人莫不有是性故雖下愚不能無道心二者雜於方寸之間而不知所以治之則危者愈危微者愈微此言雖上智亦不免二者之雜但上智知所以治之耳前日誤以二者雜於方寸之間一句作不好看了便以人心為不善故謂發不中節為人心又以踰其則為人心殊不察夫所謂屬乎氣者蓋生而有之豈反得名於中與不中踰與不踰之後哉序文又曰精則察夫二者之間而不雜也一則守其本心之正而不離也察與守二字甚明其曰不雜者亦謂分别二者毋令混雜耳某乃謂不以人心雜乎道心則上面不見精擇意思下面先侵惟一界分亦使向下惟一二字反成剩語矣序文又云危者安微者著而動靜云為自無過不及之差矣此即道心之形於事者也序文明白如此而讀之不詳妄有云云今得所示圖説蒙蔽釋然為幸多矣然尚有欲求教者性本無惡反之而後為惡凡所謂不善者皆或過或不及失其本然之故以此言之人之所得以生者惟有一理更無他物今也一心之中既有所謂道心以理而動者又有所謂人心感物而動者不知此所謂人心者自何時何處已與道心相對而出耶竊謂極本窮源只是一理至於被命受生之後則理之屬乎氣者為人心理之不雜乎氣者為道心如此推之是否黃氏又答曰有此身便有此知覺便識得聲色臭味喜怒哀樂此人心也於聲色臭味喜怒哀樂識其所當然此道心也只是一箇知覺本來完具非二物旋合湊而來也但一則屬乎氣而動一則根乎性而發故有人心道心之分耳理之屬乎氣為人心未安謂之人心則不主理而言也李公晦復以書問曰夫所謂人心者人欲也程説私也朱説所謂道心者天理也程説公也朱説耳目口鼻之欲人欲之私也若喜怒哀樂則情也其所當然之則乃性也情則道之用性則道之體也豈可指以為人欲之私乎故中庸以未發為中發而中節為和無非以道言也而斥之以為人心可乎必為此説則必無喜無怒無哀無樂乃為道心也黃氏答曰來諭以喜怒哀樂為非人心必欲專指飲食男女為人心此蓋認喜怒哀樂過於善認人心過於惡是以其説卒不能合也人心不可全謂之惡若全謂之惡則不但危而已喜怒哀樂不可全謂之善若全謂之善則不應又有不中節也伊川及朱先生人心之説語意自不同不可合而為一伊川直作惡説朱先生只將作人所不能無説語自不同今合而一之非也要之人心特發於形氣之私聖愚賢不肖皆不能無不可便謂之人欲愚按朱子語録有曰程子云人心人欲故危殆道心天理故精微惟精以致之惟一以守之如此方能執中此言盡之而文集所載與學者書亦有取人心私欲之説黃氏乃以為二先生之説不同者蓋中庸章句序書大禹謨傳乃親筆著述而語録文集特一時問答之辭故也又黃氏以喜怒哀樂為人心而公晦乃辨其不然蓋嘗思之喜怒哀樂發於氣者也而其理則根於性中庸所謂未發之中中節之和以理言者也禮運之所謂七情左氏之所謂六志以氣言者也以氣言則謂之人心以理言則謂之道心黃以氣言李以理言是以不同若辨朱程之説不可合一則黃氏乃不易之論也又勉齋别段謂七情皆人心既以人心為未是人欲又以七情為人心何也蓋欲字單言之則未發善惡七情皆未分善惡如欲善欲仁固皆善也若耳目口鼻之欲亦只是形氣之私未可以惡言若以天理人欲對言之則如陰陽晝夜之相反善惡於是判然矣朱子形氣之私四字權衡輕重允適其當非先儒所及也或謂私者公之反安得不為惡此則未然蓋所謂形氣之私者如飢食渴飲之類皆吾形體血氣所欲豈得不謂之私然皆人所不能無者謂之私則可謂之惡則未也但以私滅公然後為惡耳然黃氏以七情為人心蓋謂七者皆人心之發耳學者不可便以情為心蓋心該動靜情則專指動處其界限又不可不明也江西學者有以朱子所謂形氣之私為未安者曰私即是惡謂之上智不能無可乎愚答之曰私者猶言我之所獨耳今人言私親私恩之類是也其可謂之惡乎又問六經中會有謂私非惡者否愚曰雨我公田遂及我私言私其豵獻豜于公如此類以惡言之可乎其人乃服詩大明之七章曰殷商之旅其會如林矢于牧野維豫侯興上帝臨女無二爾心吕氏曰紂以天子之威如林之衆來戰武王方自眇然諸侯而起茍較強弱而計衆寡其心必疑二矣然當是時武王方一心以奉天討若上帝實臨之較計之私豈得而容哉曰云云蓋為勉之之詞以形容武王奉天討之心也又曰無二無虞上帝臨女此魯頌閟宫之辭亦述武王伐紂之事愚謂詩意雖主伐紂而言然學者平居諷詠其辭凛然如上帝之實臨其上則所以為間邪存誠之助顧不大哉又見義而無必為之勇或以利害得喪二其心者亦冝味此言以自決也書周官恭儉惟德無載爾偽作德心逸日休作偽心勞日拙此成王告百官之辭東萊吕氏曰從事於實則心廣體胖日以休泰從事於偽則雖殫其智慮左蔽右隱人之視已如見肺肝日彰其拙矣天下之至逸而無憂者莫如德天下之至勞而無益者莫如偽畢命兹殷庶士席寵惟舊怙侈滅義服美于人驕淫矜誇將由惡終雖收放心間之惟艱資富能訓惟以永年惟德惟義時乃大訓不由古訓于何其訓此康王命畢公之詞按放心二字始見於此蓋康王欲畢公以德與義間殷士之心而變其驕淫矜誇之習也然則學者欲自間其心舍德義何以哉德以身言義以事言詩靈雨既零命彼倌人星言夙駕説于桑田匪直也人秉心塞淵騋牝三千此美衛文公之詩程子曰須是塞淵然後騋牝三千塞淵有義理鄭氏曰塞充實也淵深也張氏曰虛明如淵也朱子曰塞則多不明塞淵則實而明猶曰誠明云爾又燕燕之詩亦曰仲氏任只其心塞淵仲氏謂戴媯也以婦人而能若是學者可不勉乎然其道無他中有主故實私不能蔽故明不曰明而曰淵尤當深味桑柔之三章曰君子實維秉心無競誰生厲階至今為梗愚嘗聞四明樓氏曰君子之所以實維君子者以其秉心無競而已蓋持心公平而無爭競之私則禍亂之源塞一有競心則厲階生矣此牛李之禍所以相尋而無窮也此説雖未必詩之本指然亦學者所當深味而實體之也詩蒸民之次章曰仲山甫之德柔嘉維則令儀令色小心翼翼此尹吉甫美宣王能任仲山甫而作鄭氏曰翼翼恭敬也按詩稱文王與仲山甫皆以小心翼翼為言玩其辭旨可見聖賢氣象泮水之六章曰濟濟多士克廣德心桓桓于征狄彼東南蒸蒸皇皇不吳不揚不告于訩在泮獻功孔氏曰謂心德寬洪無褊躁也李氏曰人心可謂廣矣惟為血氣所使一毫髮之利則忿而爭其心於是乎隘矣愚按克廣德心一語學者所宜深體多士謂虎臣東南斥淮夷狄當作剔謂剔治之也多士惟能廣其德心故雖有剔治淮夷之功而能蒸蒸然厚皇皇然美不歡譁不大聲不爭訟惟在泮獻功而已士居功名之間茍不能然未有不為渾濬之爭者况德度弗洪則於天下之事無一之可為又非但處功名而已陳壽譏魏文帝謂其不能邁志存道克廣德心然則為人君者尤所當知也子曰飽食終日無所用心難矣哉不有博奕者乎為之猶賢乎已李氏曰聖人非教人博奕也所以甚言無所用心之不可爾南軒張氏曰飽食而無所用心則放越而莫知其極凡惡之所由生也博奕雖不足道然方其為之意專乎此比之放越而莫知其極者尤為愈焉爾愚按論語言心處甚少從心所欲不踰矩與回心不違仁及此章而已前二章已别見大學所謂修身在正其心者身有所忿懥則不得其正有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正程子曰身有之身當作心朱子曰忿懥怒也蓋是四者皆心之用而人所不能無者然一有之而不能察則欲動情勝而其用之所行或不能不失其正矣心不在焉視而不見聽而不聞食而不知其味心有不存則無以檢其身是以君子必察乎此而敬以直之然後此心常存而身無不修也此謂修身在正其心或問人之有心本以應物今乃以為有所喜怒憂懼則不得其正然則必如稿木死灰乃為得其正也曰人之一心湛然虛明如鑑之空如衡之平以為一身之主者固其真體之本然而喜怒憂樂隨感而應妍媸俯仰因物藏形者乃其用之所不能無者也故其未感之時至虛至靜所謂鑑空衡平之體雖鬼神有不得窺其際者固無得失之可名及其感物之際而所應者又皆中節則其鑑空衡平之用流行不滯正大光明是乃所以為天下之逹道亦何不正之有哉惟其事物之來有所不察應之既或不能無失且又不能不與俱往則其喜怒憂懼必有動乎中者而此心之用始有不得其正者耳傳者之意非以心之應物便為不得其正也惟是此心之靈既曰一身之主茍得其正而無不在是則耳目鼻口四肢百骸莫不有所聽命以共其事而其動靜語默出入起居唯吾所使而無不合於理如其不然則身在於此而心馳於彼血肉之軀無所管攝其不為仰面貪看鳥回頭錯應人者幾希矣孔子所謂操則存舍則亡孟子所謂求其放心從其大體者蓋皆謂此學者可不深念而屢省之哉好樂恐懼忿懥憂患只要從無處發出不可先有在心下四者人不能無只是不要他留而不去如所謂有所則是被他為主於內心反為他動也心不可有一物外面酬酢萬變只是隨分限應去都不關自家心事才係於物心便為其所動其所以係於物者有三或事未來而自家先有箇期待底心或事已過却長留胸中不能忘或正應事時意有偏重這都是為物所繫縛既為物所繫縳事到面前應之便差如何會得其正聖人之心瑩然虛明隨物隨應此心元不曽有這物事又曰此心先有忿懥時這下面便不得其正如鏡有人形在裏面第二人來便照不得稱盤上加一錢則稱一錢物便成兩錢重心若先有怒更有當怒事來便成兩分怒有當喜事來便減了半分喜好樂憂患亦是如此孟子曰大人者不失其赤子之心者也朱子曰大人之心通逹萬變赤子之心則純一無偽而已然大人之所以為大人正以其不為物誘而有以全其純一無偽之本然是以擴而充之無所不知無所不能而極其大也大人事事理會得只是無許多巧偽曲折便是赤子之心赤子之心純一無偽而大人之心亦純一無偽但赤子是無知覺底純一無偽大人是有知覺底純一無偽赤子之心不可盡謂已發亦有未發處按吕氏以赤子之心為未發程子為已發而未逺乎道已見前卷中和注南軒曰赤子之心無聲色臭味之誘無智巧作為之私云云孟子曰富歲子弟多賴凶歲子弟多暴非天之降才爾殊也其所以陷溺其心者然也今夫牟麥播種而耰之其地同樹之時又同浡然而生至於日至之時皆熟矣雖有不同則地有肥磽雨露之養人事之不齊也故凡同類者舉相似也何獨至於人而疑之聖人與我同類者故龍子曰不知足而為屨我知其不為蕢也屨之相似天下之足同也口之於味有同耆也易牙先得我口之所耆者也如使口之於味也其性與人殊若犬馬之與我不同類也則天下何耆皆從易牙之於味也至於味天下期於易牙是天下之口相似也惟耳亦然至於聲天下期於師曠是天下之耳相似也惟目亦然至於子都天下莫不知其姣也不知子都之姣者無目者也故曰口之於味也有同耆焉耳之於聲也有同聽焉目之於色也有同美焉至於心獨無所同然乎心之所同然者何也謂理也義也聖人先得我心之所同然耳故理義之悅我心猶芻豢之悅我口程子曰在物為理處物為義體用之謂也孟子言人心無不悅理義者但聖人則先知先覺乎此耳非有以異於人也又曰理義之悅我心猶芻豢之悅我口此語親切有味須實體察得理義之悅心真猶芻豢之悅口始得集義吕氏曰我心同然即天理天德孟子言同然者恐人有私意蔽之茍無私意我心即天心謝氏曰嘗問伊川先生養心莫善於寡欲此一句如何先生曰此一句淺不如理義之悅心猶芻豢之悅口最親切有滋味云云見前朱子曰理只是事物當然底道理義是事之合宜處孟子曰牛山之木嘗美矣以其郊於大國也斧斤伐之可以為美乎是其日夜之所息雨露之所潤非無萌蘖之生焉牛羊又從而牧之是以若彼濯濯也人見其濯濯也而以為未嘗有材焉此豈山之性也哉朱子曰牛山齊之東南山也邑外謂之郊言牛山之木前此固嘗美矣今為大國之郊伐之者衆故失其美耳息生長也日夜之所息謂氣化流行未嘗間斷故日夜之間凡物皆有所生長也萌芽也蘖芽之旁出者也濯濯光潔之貌材材木也言山木雖伐猶有萌蘖而牛羊又從而害之是以至於光潔而無草木也雖存乎人者豈無仁義之心哉其所以放其良心者亦猶斧斤之於木也旦旦而伐之可以為美乎其日夜之所息平旦之氣其好惡與人相近也者幾希則其旦晝之所為又梏亡之矣梏之反覆則其夜氣不足以存夜氣不足以存則其違禽獸不逺矣人見其禽獸也而以為未嘗有才焉者是豈人之情也哉良心者本然之善心即所謂仁義之心也平旦之氣謂未與物接之時清明之氣也好惡與人相近言得人心之所同也梏械也反覆展轉也言人之良心雖已放失然其日夜之間亦必有所生長故平旦未與物接其氣清明之際良心必猶有發見者但其發見至微而旦晝所為之不善又已隨而梏亡之如山木既伐猶有萌蘖而牛羊又牧之也晝之所為既有以害其夜之所息夜之所息又不能勝其晝之所為是以展轉相害至於夜氣之生日以寖薄而不足以存其仁義之良心則平旦之氣亦不能清而所好惡遂與人逺矣故茍得其養無物不長茍失其養無物不消山木人心其理一也孔子曰操則存舍則亡出入無時莫知其鄉惟心之謂與孔子言心操之則在此捨之則失去其出入無定時亦無定處如此孟子引之以明心之神明不測得失之易而保守之難不可頃刻失其養學者當無時而不用其力使神清氣定常如平旦之時則此心常存無適而非仁義也程子曰心豈有出入亦以操舍而言耳操之之道敬以直內而已聞之師曰人理義之心未嘗無唯持守之即在爾若於旦晝之間不至梏亡則夜氣愈清夜氣清則平旦未與物接之時湛然虛明氣象自可見矣孟子發此夜氣之説於學者極有力宜熟玩而深省也問旦晝不梏亡則是養得這夜氣清明曰不是靠氣為主蓋要此氣養仁義之心如水之養魚水多則魚鮮水涸則魚病養得這氣盛則仁義之心亦完氣少則仁義之心亦微矣孟子此段首尾正為良心設人多將夜氣便做良心説非也蓋言夜氣至清足以存得此良心耳平旦之氣亦清亦以存吾良心故其好惡之公猶與人相近但此心存得不多時至旦晝所為則梏亡之矣所謂梏者人多謂梏亡其夜氣亦非也謂旦晝之為能梏亡其良心耳問平旦之氣先生曰氣清則能存固有之良心如旦晝之所為有以汨亂其氣則良心為之不存矣然暮夜止息稍不紛擾則良心又復生長譬如一井水終日攪動便渾了至夜稍歇則便有清水出所謂夜氣不足以存者便是攪動得太甚則雖有止息時亦不能清矣氣與理本相依旦晝所為不害於理則夜氣之所養益厚夜之所息既有助於理則旦晝之所為益無不當矣日間梏亡者寡則夜氣自然清明虛靜至平旦亦然旦晝應事接物亦莫不然梏如被他禁械在那裏更不容他動心一放時便是斧斤之戕牛羊之牧一收斂在此便是日夜之息雨露之潤問夜氣曰前輩皆無明説某因將孟子反覆熟讀方看得出後看程子却説夜氣之所存者良知良能也與臆見合以此知觀書不可茍熟讀深思道理自見惟其神明不測所以有出入惟其能出入所以神明不測范純夫之女謂心豈有出入程先生聞之曰此女雖不識孟子却能識心是否曰此一段説正要人看孟子舉孔子之言曰出入無時莫知其鄉此别有説伊川言純夫女却能識心心却易識只是不識孟子之意問操則存曰心不是死物須把做活看不爾則是釋氏入定坐禪操存者只是於應事接物之時事事中理便是存若處事不當便是心不在只是兀然守在這裏忽有事至吾前操底便散了却是舍則亡也問未應接時如何曰只是戒慎恐懼而已又曰只要提他醒便是操求於操存皆兼動靜而言非塊然默守之謂存亡出入一章乃是正説心之體用其妙不測如此非獨能安靜純一亦能周流變化學者須是著力照管豈專為其已放者而言耶今專指其安靜純一者為良心則於其體用有不周矣又曰自寂然不動以至感而遂通天下之故無非此心之妙南軒曰日夜之所息者蓋人雖終日汨汨於物欲然亦有休息之時也程子曰息有二義訓休息亦訓生息息所以生也云云非有出入因操舍而言也操則在此舍則不存焉矣以其在此則謂之入可也以其不存焉則謂之出可也又曰涪人譙定從伊川學以其所見作牧牛圖如非禮勿視則牛眼白非禮勿聽則耳白非禮勿言則口白非禮勿動然後身白藉溪得其圖以寄猶子太原張之書室一日母翁夫人見之指心曰只這裏轉了後那得許多事按此可與范太史女論心一段參觀故附此孟子曰仁人心也義人路也仁者心之德程子所謂心如榖種仁則其生之性是也然但謂之仁則人不知其切於已故反而名之曰人心則可以見其為此身酬酢萬變之主而不可須臾失矣義者行事之宜謂之人路則可以見其為出入往來必由之道而不可須臾舍矣舍其路而弗由放其心而不知求哀哉哀哉二字最宜詳味令人惕然有深省處人有雞犬放則知求之有放心而不知求程子曰心至重雞犬至輕雞犬放則知求之心放而不知求豈愛其至輕而忘其至重哉弗思而已矣朱子曰上兼言仁義而此下專論求放心者能求放心則不違於仁而義在其中矣學問之道無他求其放心而已矣學問之道固非一端然其道則在於求其放心而已蓋能如是則志氣清明義理昭著而可以上逹不然則昏昧放逸雖曰從事於學而終不能有所發明矣程子曰聖賢千言萬語只是欲人將已放之心約之使反復入身來自能尋向上去下學而上逹也此乃孟子開示要切之言程子又發明之曲盡其指學者宜服膺而勿失也又曰放心謂心本善而流於不善是放也問孟子説求放心從仁人心也説來莫是收此心便是仁朱子曰也只是存得此心可以存此仁若只收此心更無動用生意又濟得甚麼所以程先生曰自能尋向上去這是已得此心方可做去不是塊然守得這心便了又問放心還當將放了心重新收來還只存此心便是不放曰不是將已縱出底收將轉來如七日來復非是已往之陽重來復生舊底已去這裏自然生出來學問之道無他求其放心而已不是學問之道只有求放心一事乃是學問之道皆是求放心如聖賢一言一語都是此理程先生説得如此自家自看不出問賀孫曉得否賀孫曰如程先生説吾作字甚敬只此便是學這也可以收放心非是要字好先生曰然如灑掃應對博學審問慎思明辨皆所以求放心孟子以放心比雞犬可謂善喻然雞犬猶有放失求不得若心則求著便在或者錯看明道之語謂是收拾放心遂如釋氏守個空寂不知其意謂收心只有得善端漸能充廣非如釋氏徒守空寂而已此心常在私欲自無著處知得心放此心便在這裏求放心非以一心求一心只求底便是已收之心操則存非以一心操一心只操底便是已存之心知求則心在矣所謂存所謂收只是喚醒而已覺處即心何更求為此用力甚不多但要常知提醒惺惺自然光明出入無時莫知其鄉存養主一使之不走作乃善求放心乃為學根本田地既能如此向上更做窮理工夫方見所存之心所具之理不是兩事隨應自然中節方是儒者事業不然却與釋子坐禪攝念無異孟子曰今有無名之指屈而不信非疾痛害事也如有能信之者則不逺秦楚之路為指之不若人也指不若人則知惡之心不若人則不知惡此之謂不知類也明道程先生曰人於外物奉身者事事要好只有自家一箇身與心却不要好茍得外物好時却不知道自家身與心已先不好了也孟子曰人之於身也兼所愛兼所愛則兼所養也無尺寸之膚不愛焉則無尺寸之膚不養也所以考其善不善者豈有他哉於已取之而已矣體有貴賤有小大無以小害大無以賤害貴養其小者為小人養其大者為大人朱子曰賤而小者口體也貴而大者心志也今有場師舍其梧檟養其樲棘則為賤場師焉養其一指而失其肩背而不知也則為狼疾人也飲食之人則人賤之矣為其養小以失大也飲食之人無有失也則口腹豈適為尺寸之膚哉南軒曰飢渴飲食是亦理也人所為賤之者以其徒知口腹之養而失其大者耳如使飲食之人而無有失也者則口腹豈但為養其尺寸之膚固亦理義之所存也不立其大者則役於血氣而為人欲先立乎其大者則本諸身心而為至理人欲流則口腹之須何有窮極此人之所以逺道而不知也天理明則一飲一食之微亦莫不有則焉此人之所以同歸聖人而通乎天地也公都子問曰均是人也或為大人或為小人何也孟子曰從其大體為大人從其小體為小人曰均是人也或從其大體或從其小體何也曰耳目之官不思而蔽於物物交物則引之而已矣心之官則思思則得之不思則不得也此天之所以與我者先立乎其大者則其小者不能奪也此為大人而已矣朱子曰官之為言司也耳司聽目司視各有所職而不能思是以蔽於外物既不能思而蔽於外物則亦一物而已又以此物交於外物其引之而去不難矣心則能思而以思為職凡事物之來心得其職則得其理而物不能蔽失其職則不得其理而物來蔽之此三者皆天之所以與我者而心為大若能有以立之則事無不思而耳目之欲不能奪之矣此所以為大人也范浚心針曰茫茫堪輿俯仰無垠人於其間眇然有身是身之微太倉稊米參為三才曰惟心耳往古來今孰無此心心為形役乃獸乃禽惟口耳目手足動靜投間抵隙為厥心病一心之微衆欲攻之其與存者嗚呼幾希君子存誠克念克敬天君泰然百體從令朱子曰孟子説先立乎其大者此語最有力且看他下一箇立字昔有人問譙先生為學之道譙曰某只是先丘乎其大者它之學亦自有要卓然竪起自心便是立所謂敬以直內也先立其大者則小者不能奪今忘前失後心不主宰被物引將去致得膠擾所以窮它理不得南軒解此章全不提掇立字而曰以思為主心不立而徒思吾未見其可也今按南軒曰先立云云言心為之主則耳目不能以移有以宰之故也故君子之動以理小人之動以物動以理者心得其宰而動以物者心放而欲流其何有極也然所謂思者非泛然無統也泛而無統則思之亂也不得謂心之官矣事事物物皆有所以然其所以然者天之理也思其所以然而循天理之所無事則雖日與事物接而心體無乎不在斯則為大人矣南軒所重在思字故朱子云云孟子曰飢者甘食渴者甘飲是未得飲食之正也飢渴害之也豈惟口腹有飢渴之害人心亦皆有害朱子曰口腹為飢渴所害故於飲食不暇擇而失其正味人心為貧賤所害故於富貴不暇擇而失其正理人心亦皆有害趙氏謂人心為利欲所害此説甚長愚謂飢渴害其知味之性則飲食雖不甘亦以為甘利欲害其仁義之性則所為雖不可亦以為可人能無以飢渴之害為心害則不及人不為憂矣人能不以貧賤之故動其心則過人逺矣南軒曰人心虛明知覺萬理森然其好惡是非本何適而非正惟夫動於私欲則有所忿懥有所恐懼有所好樂有所憂患而其正理始昧矣人能正其心不使外物害之如飢渴之害於口腹則無適而非天理之所存矣孟子謂高子曰山徑之蹊間介然用之而成路為間不用則茅塞之矣今茅塞子之心矣朱子曰徑小路也蹊人行處也介然倐然之頃也用由也路大路也為間少頃也茅塞茅草生而塞之也言理義之心不可少有間斷也南軒曰此言學者初聞善道其心無不欣慕而開明猶山徑之有蹊間也由是而體認充廣朝夕於斯則德進而業廣矣猶用之而成路也茍惟若有若亡而不用其力則內為氣習所蔽外為物欲所誘向之開明者幾何不復窒塞邪然則山徑之蹊間在夫用與不用士之於學亦係於思與不思而已思則通不思則塞矣荀子曰君子大心則天而道小心則畏義而節小人則不然大心則慢而暴小心則淫而傾朱子曰君子心大則是天心心小則如文王之翼翼小人心大則放肆心小則偏隘私吝耳目鼻口能各有接而不相能也夫是之謂天官心居中虛以治五官夫是之謂天君聖人清其天君正其天官心卧則夢偷則自行使之則謀朱子曰佛家有所謂流注想最害事所以為山禪師云參禪幾年至今不能斷得流注想此即荀子偷則自行之心也愚按偷則自行謂我無以主宰而聽命於動也使之則謀謂我有以主宰而惟我所以云云虛一而靜謂之清明本文清明之上有大字愚按虛謂無物欲之礙一謂無思慮之雜如是而又靜以養之是之謂清明非於三者之外又有清明也心者形之君也而神明之主也出令而無所受令楊氏曰心出令以役百體不為百體所使也心枝則無知傾則不精二則疑惑枝散也傾邪也心一則見理明故散則無知心正則見理的故傾則不精二則散之東又之西故疑惑枝與二相近枝又甚於二也道經曰人心之危道心之微危微之幾惟明君子而後能知之故人心譬如槃水正錯而勿動則湛濁在下而清明在上則足以見須眉而察理矣湛澄也濁謂沉泥滓也理謂肌膚之文理也微風過之湛濁動於下清明亂於上則不可以得大形之正也心亦如是矣故導之以理養之以清物莫之傾則足以定是非決嫌疑矣小物引之則其正外易其心內傾則不足以決庶理也言此者以喻心不一於道異端所蔽則惑矣愚按荀子論心前數章皆可取若此章則可疑蓋心之虛靈知覺者萬理具焉初豈有一毫之汙濁哉自夫汨於物欲而後有汙濁耳學者必盡去物欲之害則本然之清明自全今曰湛濁在下而清明在上是物懲之害初未嘗去但伏而未作耳其可恃以為安邪水不能不遇風長川巨浸泓澄無底雖大風不能使之濁心不能不應物欲盡理明表裏瑩徹雖酬酢萬變不能使之昏無風則清有風則濁者塵滓之伏於下也靜之則明動之則昏者利欲之藏於中也心也者道之工宰也工能成物宰能生物心之於道一然也揚子或問神曰心請問之濳天而天濳地而地天地神明而不可測者也心之濳也猶將測之况於人乎况於事倫乎敢問濳心於聖曰昔者仲尼濳心於文王矣逹之顔淵亦濳心於仲尼矣未逹一間耳天神天明照知四方天精天粹萬物作類人心其神矣乎此下云操則存舍則亡能常操而存者其惟聖人乎龜山楊氏曰聖人不待操而自存今刪去按揚子默而好深湛之思故其言如此濳之一字最冝深味天惟神明故照知四方惟精粹故萬物作類人心之神明精粹本亦如此惟不能濳故神明者昏而精粹者雜不能燭理而應物也漢趙氏曰天之執持綱維以正二十八宿者北辰也北辰居其所而衆星共之心者人之北辰也北辰北極天之樞也朱子感興詩微月墜西嶺爛然衆星光明河斜未落斗柄低復昂感此南北極樞軸遙相當太乙有常居仰瞻獨煌煌中天照四國三辰環侍旁人心要如此寂感無邉方愚按北辰常不移故能為列宿之宗人心常不動故能應萬物之變不動非無所運用之謂也順理而應不隨物而遷雖動猶靜也程子曰心一也有指體而言者寂然不動是也有指用而言者感而遂通天下之故是也惟觀其所見何如耳朱子曰寂然不動是性感而遂通是情橫渠所謂心包性情者也此説最為穩當又曰中有主則實實則外患不能入自然無事吕與叔患思慮多不能驅除程子曰此正如破屋中禦冦東面一人來未逐得西面又一人至矣左右前後驅逐不暇蓋其四面空踈盜固易入無緣作得主定又如虛器入水水自然入若以一器實之以水火何能入來蓋云云又曰有主則虛虛則邪不能入無主則實實謂物來奪之大凡人心不可二用用於一事則它事不能入者事為之主也事為之主尚無思慮紛擾之患若主於敬又焉有此患乎其全文云學者先務固在心志然有謂欲屏去聞見知思則是絶聖棄智有欲屏去思慮患其紛擾則須坐禪入定如明鑑在此萬物畢照是鑑之常難為使之不照人心不能不交感萬物難為使之不思慮若是免此惟是心有主如何為主敬而已矣云云問伊川先生言有主則實又曰有主則虛於此二者如何分别朱子曰這箇只是有主於中外邪不能入自其有主於中言之則謂之實自其外邪不入言之則謂之虛又曰若無主於中則目之欲從這裏入耳之欲也從這裏入凡有所欲皆入這裏便滿了如何得虛因舉林用中作主一銘曰有主則虛神守其都無主則實鬼闞其室又曰有人胸中常若有二人焉欲為善如有惡以為之間欲為不善又若有羞惡之心者本無二人此正交戰之驗也持其志使氣不能亂此大可驗其全文曰人心作主不定正如一箇翻車流轉動搖無須臾停所感萬端若不做一箇主怎生奈何張天祺嘗言自得數年上著牀便不得思量才不思量後須強把他這心來制縛亦須寄寓一形象皆非自然君實自謂吾得術矣只管念箇中字又為中所繫縳且中字亦何形象云云要之聖賢必不患心疾又曰學者患心慮紛亂不能寧此則天下公病學者只要立箇心又曰司馬子微作坐忘論是所謂坐馳也朱子曰他只是要得虛靜都無事但只管要得忘便不忘是馳也按坐忘論有云不著一物自入虛無又曰心法猶眼纎毫入眼眼則不安小事關心心必動亂既有動病難入定門修道之要急在除病病若不除終難得定又曰此心從來未慣獨立怎無所托難以自安縱得暫安還復散亂隨起隨制務令不動久久調熟自得安間無問晝夜行住坐卧及應事之時常須作意安之若心得定則須安養莫令觸惱少得定力即堪自樂漸漸馴狎惟益自逺又曰外事都絶無以干心然後端坐內觀正覺覺一念起即須滅除隨起隨滅務令安靜晝夜勤行須臾不替不依一物而心常住煩惱念想隨覺則除有所見聞如不見聞即是非善惡不入於心心不受外名曰虛心心不逐外名曰安心心安而虛道自來居又曰有事無事常若無心處靜處喧其志惟一若心不動又須放任寬急得中常自調息制而無著放而不逸處喧無動處事無惱者此真宅也又曰以無事為真宅以有事為應迹若水與鏡遇物見形子微之論如此蓋其説欲盡絶外事不使關心是乃所以為多事也此程子所以有譏焉若所謂有事無事常若無心以無事為真宅有事為應迹等語則亦在所可取也又曰人主心不定視心如冦賊不可制不是事纍心乃是心纍事愚謂一事有一事之理人能安定其心順其理以應之則事既得所心亦不勞若擾擾焉以私心處之則事必不得其當而其心亦無須臾之寧人徒知事之纍心不知乃心之纍事也又曰人多思慮不能自寧只是作心主不定惟是止於事為人君止於仁之類如舜之誅四凶四凶已作惡舜從而誅之舜何與焉人不止於事只是攪他事不能使物各付物物各付物則是役物為物所役則是役於物有物必有則須是止於事程子又嘗言人有四病四病皆不由自家只是心須教由自家此即做心主之謂也又曰心要在腔子裏問云云若慮事應物時心當如何朱子曰思慮應接亦不可廢但身在此心須在此問心如何得在腔子裏曰敬便在腔子裏又曰心不可有一事明道在澶州日修橋少一長梁曽博求之民間後因出入見林木之佳者必起計度之心因語以戒學者云云問凡事須思而後通安可謂心不可有一事朱子曰事如何不思但事過則不留於心可也又曰人心常要活則周流無窮而不滯於一隅朱子曰活者不死之謂又曰人於夢寐亦可以卜自家所學之淺深如夢寐顛倒即是心志不定操存不固問人心所繫著之事夜夢見之莫不害否程子曰雖是善事心亦是動凡事有眹兆入夢者亦無害捨此皆是妄動人心便要定使他思時方思乃是今人都由心曰心誰使之曰以心使心則可人心自由便放去也問以心使心之説上心字即是道心專以理義言下心字即是人心以形氣言以心使心是道心為主而人心聽命否朱子曰亦是如此然觀程先生之意只是説自作主宰耳愚按周禮占夢有六夢一曰正夢謂無所感動平安自夢也二曰噩夢謂驚愕而夢也三曰思夢謂覺時所思念而夢也四曰寤夢謂覺時所道而夢也五曰喜夢謂喜悅而夢也六曰懼夢謂恐懼而夢也程子所謂眹兆入夢者正夢也問者謂心所繫著而夢者思夢也正夢則無不正思夢則有正有邪若高宗之夢説孔子之夢周公皆思夢也所思者正故其夢亦正趙武靈王之夢吳娃漢武帝之夢木人梁武帝之夢諸侯朝覲亦思夢也所思者邪故其夢亦邪致堂胡氏曰心宫萬物之至靈非但藏往亦能知來凡天地古今之所有無一外乎此者無明晦古今逺近通塞之間此人之所以有夢夢之所以多變也然聖人誠存則其夢治若夫思慮紛擾神情不定則所夢雜亂或正或邪亦與旦晝之所為等耳善學者既謹其言動而又必驗諸夢寐之間也問人心之靈如日間未應接之前固是寂然未發若夜間有夢之時亦是此心已動猶晝之有思如其不夢未覺正當大寐之時亦可謂寂然未發否朱子曰寤寐者心之動靜也有思無思者又動中之動靜也有夢無夢者又靜中之動靜也但寤陽而寐隂寤清而寐濁寤有主而寐無主故寂然感通之妙必於寤而言之上二條皆言夢寐之理故附於此有人言無心程子曰謂無私心則可謂之無心則不可也龜山楊氏曰六經不言無心而佛氏言之心不可無不言修性而揚雄言之性不待修獵自謂無此好周茂叔曰何言之易也但此心潛隱未發一日萌動復如初矣後十二年因見果知未也又曰罪已責躬不可無然亦不當長留心胸為悔孫思邈曰膽欲大而心欲小可以為法矣問云云朱子曰膽大是千萬人吾往處天下萬物不足以動其心貧賤不能移威武不能屈皆是膽大小心只是畏敬之謂如文王小心翼翼曾子戰戰兢兢臨深履薄是也又曰戰戰兢兢方能為糾糾武夫公侯干城之事愚謂必有文王之小心然後能一怒以安天下之民邵子曰心為太極愚謂心者萬理之總會故云云又曰心一而不分故能應萬物此君子所以虛心而不動也愚謂心虛者無物欲之窒也虛則一一則能應萬物又曰先天學心法也圖皆自中起萬化萬事生乎心也張氏曰先天圖自坤而生者始於復自乾而生者始於姤皆在天地之中者心也故先天之學為心法而主乎誠又曰言之於口不若行之於身行之於身不若盡之於心言之於口人得而聞之行之於身人得而見之盡之於心神得而知人之聰明猶不可欺况神之聰明乎是知無愧於口不若無愧於身無愧於身不若無愧於心無口過易無身過難無身過易無心過難南軒張氏既記時習之室又曰夫習之有斷絶者心過有以害之也心過尤難防一萌於中雖非視聽所及而吾時習之功已間斷矣察之緩則滋長矣惟人安於故常以為微而忽焉此豈可使之熟也哉今日一念之差而不痛以求改則明日兹念重生矣積而熟時習之功銷矣不兩立也是以君子懼焉萌於中必覺覺則痛懲而絶之如分桐葉然不可復續如此則過境自踈時習之功專以至於德以凝道顔子之不二一絶不復生也故名吾室曰不二按南軒之用力於遏絶心過也如此可為學者法故附焉張子曰心清時少亂時多其清時視明聽聰四體不待羈束而自然恭謹其亂時反是何也蓋用心未熟客慮多而常心少也習俗之心未去而實心未完也人又要得剛剛則守得定不回進道勇敢朱子曰張子此言大段精切又曰客慮是泛泛底思慮習俗之心便是從來習染偏勝等心實心是義理底心又曰正心之始當以己心為嚴師凡有動作則知所懼如此一二年間守得牢固則自然心正矣又曰定然後有光明若常移易不定何由光明易大抵以艮為止止乃光明下文云故大學定而至於能慮人心多則無由光明愚按多者思慮紛雜之謂又曰大其心則能體天下之物物有未體則心為有外世人之心止於見聞之狹聖人盡性不以見聞梏其心其視天下無一物非我孟子謂盡心則知性知天以此天大無外故有外之心不足合天心問體之義如何朱子曰此是置心在物中究見此理如格物致知之意與體物之體不同此體字是體察之體否曰須認得如何唤做體察今官司文書行移所謂體量體究是這樣體字或曰是將自家這身入那事物裏面去體認否曰然猶云體羣臣也程子曰天理一字却是自家體帖出來是這樣體字橫渠云云蓋天大無物不包物理所在一有所遺則吾心為有外便與天心不相似孟子云云此自是橫渠意孟子本意只是説窮理之至則心自然極其全體而無餘非是要大其心而後知性知天也問如何是有外之心曰只是有私意便內外扞格只見得自家身已凡物皆不與己相關便是有外之心橫渠此説固好只管如此説相將便無規矩無歸著且如夫子為萬世道德之宗都説得語意平易從得夫子之言便是無外之實若便要説天大無外則此心便易瞥入虛空裏去愚按朱子云云蓋慮其弊至此學者未可以是遽疑張子之説也又曰心大則百物皆通心小則百物皆病問云云朱子曰此心小是卑陋狹隘事物來都沒奈何打不去只管見礙都是病如要敬則礙和要仁則礙義要剛則礙柔這裏只著得一箇更著兩箇不得為敬便一向拘束為和便一向放肆仁便煦煦姑息義便粗暴決裂心大便能容天下萬物有這物皆有這道理有那物則又有那道理並行而不相悖並育而不相害龜山楊氏曰列子言廢心用形心不可廢也孟子曰勿忘勿助長也廢則忘矣廢心而用形是殆猖狂妄為烏能中乎愚按廢心用形之説形動而心不動也今佛氏之語亦然又曰孟子一部只是要正人心教人存心養性收其放心至論仁義禮智則以惻隱羞惡辭讓是非之心為之端論邪説之害則曰生於其心害於其政論事君則欲格君心之非千變萬化只説從心上來人能正心則事無足為者矣問正心誠意如何便可以平天下曰後世自是無人正心正得心其效自然如此此心一念之間毫髮有差便是不正其全文云須是於喜怒哀樂之未發得其所謂中於已發得其所謂和然後謂之正今按未發一語以程子才思則是已發之説質之有所未安故刪去朱子曰自古聖賢皆以心地為本古人言志帥心君須心有主張始得心在羣妄自然退聽學者常用提省此心使如日之升則羣邪自息其下云他本自光明廣大自家只著些子力去提省照管他便了不要苦著力苦著力反不是人之一心當應事時常如無事時乃善三國朱然終日欽欽如在行陳學者持此則心嘗不放矣學者為學且要收拾此心都在義理上安頓則久而於物欲自輕於義理自重其下云須是義理之心重於物欲則見理必端的自有欲罷不能之意其於物欲自無暇及之矣學者工夫只在喚醒上或問人放縱時自能收斂莫是喚醒否曰放縱只為昏昧之故能喚醒則自不昏昧不昏昧則自不放縱矣心之虛靈無有限量如六合之外思之即至前乎千百世之已往後乎千萬世之方來皆在目前人為利欲所昏所以不見此理又因論心先生曰這箇神明不測至虛至靈是甚次第然人莫不有此心多是但有利欲被利欲將這個心包了人心虛靈無所不明禽獸則昏人若以私欲蔽其虛靈即是禽獸矣人與禽獸不同惟此而已人須是掃去氣稟私欲使胸次虛靈洞徹吾之心即天地之心而今講學便要去得不與天地相似處心無限量與天地同其大但為物欲間隔故小爾又曰此心曠然無一毫私意直與天地同量便有天下一家中國一人底意思心只放寬平不要先有私意隔礙聖人之心曠然如太空了無一物聖人之心如鑑事物之來若大若小四方八面莫不順而應之此心元不曾有此物自古無放心底聖賢一念之微所當深謹心不專靜純一故思慮不精明要須養得此心虛明專靜使道理從此流出乃善問知覺是心之靈固如此抑氣之為邪曰不專是氣是先有知覺之理理未知覺氣聚成形理與氣合便能知覺又曰所覺者心之理能覺者氣之靈問心是知覺性是理心與理如何得貫通為一曰不須去貫通本來貫通問如何本來貫通曰理無心則無著處問五行在人為五臟然心却具得五行之理以心虛靈之故否曰心屬火是個光明發動底物所以具得許多道理又發明心字曰一言以蔽之曰生而已矣天地之大德曰生人受天地之氣以生故此心之仁則生矣問心之為物衆理具足所發之善固出於心至所發不善皆氣稟物欲之私亦出於心否曰固非心之本體然亦是出於心也又問此所謂人心否曰然又問心有善惡否曰心是動底物事自然有善惡且如惻隱是善也見孺子入井而無惻隱之心便是惡矣離著善便是惡然心之本體未嘗不善孔子不説心只就事實上説孟子始説心愚謂孔子雖不言心然其教人於言忠信行篤敬居處恭執事敬與人忠上用功則所謂存心收放心固在其中矣又四非三戒絶四正心上功夫又四勿三戒知其非禮而勿之者心也知其當戒而戒之亦心也子絶四意必固我皆心之病也好仁惡不仁者心之正也則孔子未嘗不言心特不指言其本體耳此孔孟所以同道也學問之道無他求其放心而已矣又曰凡有四端於我者知皆擴而充之矣孟子之言甚善人之一心在外者要收入來在內者要推出去孟子一部書無非此意又曰世間只有個闔闢中外人以自體察取心一本云心在外者要收向裏心在內者却推出去一收一放一闔一闢道理森然愚謂收之使入者大本之所以立推之使出者逹道之所以行不收是謂無體不推是謂無用太極之有動靜人心之有寂感一而已矣人心活物當動而動當靜而靜動靜不失其時則其道光明是乃本心全體大用如何須要棲之淡泊然後為得且此心果為何物又何如其棲也耶答許順之棲心淡泊語右專言心西山讀書記卷三
