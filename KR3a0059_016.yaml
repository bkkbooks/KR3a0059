body:
  text: 西山讀書記卷十六宋真德秀撰才德春秋傳季文子曰昔髙陽氏有才子八人髙陽帝顓頊之號八人其苗裔蒼舒隤敳檮戭大臨尨降庭堅仲容叔達此即垂益禹臯陶之倫庭堅即臯陶字齊聖廣淵明允篤誠天下之民謂之八愷髙辛氏有才子八人髙辛帝嚳之號八人亦其苗裔伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍此即稷契朱虎熊羆之倫忠肅共懿宣慈惠和天下之民謂之八元此十六族也世濟其美不隕其名以至於堯堯不能舉舜臣堯舉八愷使主后土以揆百事莫不時序地平天成舉八元使布五教於四方父義母慈兄友弟恭子孝內平外成下文云昔帝鴻氏有不才子掩義隱賊好行凶德醜類惡物頑嚚不友是與比周天下之民謂之渾敦少皥氏有不才子毁信廢忠崇飾惡言靖譖庸回服讒搜慝以誣盛德天下之民謂之窮竒顓頊氏有不才子不可教訓不知話言告之則頑舍之則嚚傲狠明德以亂天常天下之民謂之橈杌此三族也世濟其凶增其惡名以至於堯堯不能去縉雲氏有不才子貪於飲食冒於貨賄侵欲崇侈不可盈厭聚斂積實不知紀極不分孤寡不恤窮匱天下之民以比三凶謂之叨餮舜臣堯賓四門流四凶族渾敦窮竒檮杌叨餮投諸四裔以禦魑魅是以堯崩而天下如一同心戴舜以為天子以其舉十六相去四凶也愚按齊聖廣淵明允篤誠忠肅共懿宣慈惠和皆德也而此謂之才掩義隱賊好行凶德醜類惡物頑嚚不友毁信廢忠崇飾惡言靖譛庸回服讒搜慝之屬皆不德也此謂之不才則古之所謂才與德蓋通言之也子曰如有周公之才之美使驕且吝其餘不足觀也已朱子曰才美謂智能技藝之美驕矜夸吝鄙嗇也程子曰此甚言驕吝之不可也蓋有周公之德則自無驕吝若但有周公之才而驕吝焉亦不足觀矣此是為有才而無德者言南軒曰此言才美之不足恃當以德為貴也古之聖人如周公者才藝之多故借以明之驕則無以來天下之善吝則不能與人共由於善雖才美如周公亦何為哉舜有臣五人而天下治朱子曰禹稷契臯陶伯益武王曰豫有亂臣十人馬氏曰亂治也十人謂周公旦召公奭太公望畢公榮公太顛閎夭散宜生南宫適其一人謂文母朱子曰劉侍讀以為子無臣母之義蓋邑姜也九人治外邑姜治內或曰亂本作糾古治字也孔子曰才難不其然乎唐虞之際於斯為盛有婦人焉九人而已才難蓋古語而孔子然之也才者德之用也言周室人才之多唐虞之際乃盛於此降自夏商皆不能及然猶但有此數人耳是才之難得也南軒曰此所謂才者能全盡夫天生此民之才也如左氏稱才子必齊聖廣淵明允篤誠之類子曰驥不稱其力稱其德也朱子曰驥善馬之名德謂調良也尹氏曰驥雖有力其稱在德人有才而無德則亦奚足尚哉或問才受乎天德繫乎習乃重才而輕德者何也曰人受天地之中以生是德也固已根於其性之所有特人不能皆生知而安行故賴學以成之耳非因學而後有也豈可以其專繫乎習而不受乎天哉若以氣禀而言則才之與德皆有自然勉强之差又不得專以才為天賦德為人為也司馬公論智伯以金與竹為才以鎔範矯揉為德其失正與此同至於蘇氏之書又以才難强而德易勉其失之端不過如此而其末流遂至於貴才而賤德則其失益甚而其為天下後世之禍也益深矣南軒曰驥之得稱為其德不為其力也而况於君子豈不以尚德為貴乎茍無其德雖曰有才其得謂之君子乎又南宫適曰禹稷躬稼而有天下羿善射奡蕩舟皆不得其死然夫子不答南宫適出子曰君子哉若人尚德哉若人亦與此章同指云又顔淵曰既竭吾才此才謂才力也子曰才不才亦各言其子也此才指資質而言也盆成括仕於齊孟子曰死矣盆成括盆成括見殺門人問曰夫子何以知其將見殺曰其為人也小有才未聞君子之大道也則足以殺其軀而已矣朱子曰恃才妄作所以取禍徐氏曰君子道其常而已括有死之道焉設使幸而獲免孟子之言猶信也南軒曰才如辨給敏捷之類小有才而未聞大道則必求所以用其才謂聰明智力之可以有為而不知理義之顧若是者極其才而不知所止不至於顛覆而不已故盆成括仕於齊而孟子知其必見殺也蓋不聞道則為才所役聞道則有以為用矣所謂道者非他也理義之存乎人心者也於此有聞則其進退語默之際皆有所據而才有所不敢恃矣故夫人之有才本不足以為人害惟其無所本而徒用其才於是才始足以病已甚至於有取死之道反不若魯鈍無才之為愈也夫小有才而未聞道者身且不能保而為國者乃信而用之亡國敗家其何日之有愚按此才與有才而驕吝之才同若所謂天降之才與不善非才之罪也不能盡其才則指其根於性者而言如才子才難之才也程子曰才與誠一則周天下之治又曰才與至誠合則可以有為愚按此才指才能而言誠即德也近於溫公之說司馬氏曰夫才與德異而世俗莫之能辨通謂之賢此其所以失人也夫聰察强毅之謂才正直中和之謂德才者德之資也德者才之帥也是故才德兼亡謂之愚人德勝才謂之君子才勝德謂之小人下文云凡取人之術茍不得聖人君子而與之與其得小人不若得愚人何則君子挾才以為善小人挾才以為惡挾才以為善者善無不至矣挾才以為惡者惡亦無不至矣愚者雖欲為不善智不能周力不能勝譬之乳狗搏人人得而制之小人智足以遂其姦勇足以决其暴是虎而翼者也其為害豈不多哉夫德者人之所嚴而才者人之所愛愛者易親嚴者易疏是以察者多蔽於才而遺於德自古昔以來國之亂臣家之敗子才有餘而德不足以至以顛覆者多矣故為國家者茍能審於才德之分而知所先後又何失人之足患哉愚按聖賢之所謂才有與德合而言者才子之才才難之才是也有與德分而言者有才而驕吝小有才而未聞大道是也才子之才才難之才即所謂德也然不曰德而曰才者德專以其本體而言才兼以其著於用者而言才子才難之才體用之兼全者也德者何仁義禮智是也此所謂體也才者何仁義禮智之發是也此所謂用也自仁而發則為惠利自義而發則為斷制自禮而發則為辨别自智而發則為明察此才也而皆本乎德也若夫子所謂有才而驕吝孟子所謂小有才而未聞大道則與德分而言之者也分而言之則所謂才者專指智能技藝而言周公之才才之大者也盆成括之才才之小者也才大而驕吝猶不足觀况小才而未聞大道其能免於戮乎此乃深警世人以智能技藝自矜而不勉乎德者也蓋自春秋之後以才稱者類不本乎德故酆舒之不道而人稱其才智伯之好亂而人亦稱其才其實二人之才皆盆成括之類而非八元十亂之比聖賢憂之故不得不析而二之以曉當世此所謂與德分而言者司馬溫公之論以聰察强毅為才正直中和為德其信然耶曰正直中和蓋合性情之善而言所謂才之體也聰察者智之所明强毅者義之所發所謂德之用也然聰察而不苛强毅而不暴即正直也中和也即所謂德也溫公以二者謂之才而不指其本於德亦其措詞之未備者也又謂才德兼全謂之聖人德勝才謂之君子才勝德謂之小人其果然耶曰以正直中和之體兼聰察强毅之用此所謂全德也德全則才亦全矣中庸謂天下至聖為能聰明睿智足以有臨也寬毅溫柔足以有容也發强剛毅足以有執也齊莊中正足以有敬也文理密察足以有别也蓋唯聖為能兼五者之全非五者之全則不足以言聖若大賢以下則隨其分量或略具而未能充或得其四三而不足於一二若是者雖視聖人為有間然亦不失為君子之才故臯陶謨有六德三德之分小大不同皆適於用若夫似聰察而實小慧似强毅而實暴猛此世俗之所謂才而質諸賢聖之論則正所謂不才者也蓋才本於德雖有所未備不害為君子才不本乎德雖有所可喜不免為小人以是而觀則君子小人之分定矣大抵溫公之於此纎悉委曲雖有所未周而其立論之大㫖終有補於世學者於其言之當者固無所復議而其所未周者亦不可不致思也然德根於性者也性無不善而德與才乃有偏全之異何邪曰此所謂氣質之性也前性命篇論之詳矣今夫木一也而有松柏之材有樗櫟之材松柏之材禀之善者也樗櫟之材禀之惡者也故莊子以松柏為受命之獨而謂樗櫟之木為不才人之才不才亦猶是也然物之禀一定而不移人之性雖失而可復故學進則德進德進而才亦進矣是又學者之所當勉故併著之於此云右兼論才德道德子張曰執德不𢎞信道不篤焉能為有焉能為亡朱子曰有所得而守之太狹則德孤有所聞而信之不篤則道廢焉能為有亡猶言不足為輕重或問𢎞之為寬廣奈何曰此以人之量而言也蓋人之所以體道者存乎德而其所以執德者存乎量量有大小之不同故人之所以執德有𢎞而有不𢎞也夫總羣言該衆理而不自以為博兼百善具衆美而不自以為得知足以周萬物而於天下之事有不深察才足以濟衆務而於天下之事有不屑為恢恢乎其胸中嘗若有餘地焉此非其量之大則其所以執德者孰能如是之寬廣而不迫哉易所謂寬以居之而曽子所謂可以任天下之重者正謂此耳其量之小者一善之得則先為主而若不可以有所容一事之當則喜自負而若不可以有所加小有知則必欲用其知小有才則必欲試其才所謂執德不𢎞者蓋如此雖其所守之固若不可奪然亦安能為有亡哉黃氏曰或問以寬廣為𢎞乃集注未改之前之說然與今集注之意實相通而有所發明故不得而不存也篤堅確也易所謂確乎不拔而曽子所謂死而後巳者正謂此耳觀子張之二言則為學之道信非褊心狹量質薄氣弱者之所可及也執德須𢎞不可道已得此道理不信更有道理須是既下工夫又下工夫已理㑹又理㑹若只理㑹得三二分便以謂只消恁地也得如此者非是無只是不𢎞故子張云焉能為有焉能為亡𢎞便知道理儘有自家心下儘有地步寬濶著得他在問執德不𢎞先生曰言其不廣也才狹隘則容受不得不特是不能容人自家亦自不能容故才有片善必自矜見人之善必不好人告之以過亦不受從狹隘上生萬般病痛南軒曰執德𢎞則進德有地信道篤則志道不回茍惟不然雖有為善之心亦若存若亡不能為有亡也程子曰信道不篤則執德無由𢎞志道據德見言仁篇周子曰動而正曰道用而和曰德匪仁匪義匪禮匪智匪信悉邪也邪動辱也甚焉害也故君子慎動按道德二字並言始見於禹誓師之詞曰蠢兹有苖昏迷不恭侮慢自賢反道敗德道者常行之正路背之故言反德者固有之實理失之故言敗然其所以反之敗之之由則昏迷不恭侮慢自賢而已然則敬慢之分天理人欲之所由判歟又老子曰失道而後德失德而後仁失仁而後義失義而後禮非知道德者也其辨見異端篇右兼言道德中書帝曰人心惟危道心惟微惟精惟一允執厥中朱子曰蓋自上古聖神繼天立極其道統之傳有自來矣其見於經則允執厥中者堯之所以受舜也人心惟危道心惟微惟精惟一允執厥中者舜之所以授禹堯之一言至矣盡矣舜復加之以三言者蓋必如是而後堯之言可庶幾也餘見道心篇論語堯曰咨爾舜天之厯數在爾躬允執其中四海困窮天祿永終此堯命舜而禪以帝位之辭或問云云曰聖賢所言中有二義大本者喜怒哀樂未發之時之理其氣象如此也中庸云者理之在事而無過不及之地也此曰允執其中蓋以其在事者而言若天下之大本則不可得而執矣且聖人之道時止時行夫豈專以塊然不動者為是而守之哉書仲虺之誥王懋昭大德建中于民以義制事以禮制心孟子曰湯執中林氏曰德貴乎日新故勉之以懋昭大德民受天地之中以生惟其因物有遷故陷溺而不知返聖人先得人心之所同故揭以示之昭大德者是乃所以建中也而為王氏學者乃曰懋昭大德者所以極髙明而處乎已建中於民者所以道中庸而同乎人夫髙明中庸豈可分為二致耶蔡氏曰中者天下之所同有也然非君建之則民不能以自中而禮義者所以建中者也義者心之裁制禮者理之節文以義制事則事得其宜以禮制心則心得其正內外合德而中道立酒誥丕惟曰爾克永觀省作稽中德上文曰庶士有正越庶伯君子其爾大克羞耉惟君爾乃飲食醉飽云云爾尚克羞饋祀爾乃自介用逸按此乃武王誥教庶正庶伯之詞欲其能長自觀省每有動作必稽乎中德無過與不及也中德即中道也即身而言則曰中德即事而言則曰中道穆王命君牙為大司徒曰𢎞敷五典式和民則爾身克正罔敢弗正民心罔中惟爾之中愚按自堯舜禹相授以中道為出治之本三代聖賢之君率而循之成王之命蔡仲曰康濟小民率自中至穆王此言尤得建中於民之意至吕刑之作一曰中二曰中蓋用刑之際少有過差則民有不得其死者以穆王髦荒而猶知此理豈非去文武成王為未逺猶有得於見聞之舊歟易乾文言九二曰龍德而正中者也程子曰以龍德而處正中者也在卦之正中為得正中之義九三重剛而不中九四同按易以二五為中故九二曰龍德正中九五曰飛龍在天皆以得中故也初則勿用三則危四則或上則有悔夫乾天德聖人之事也必以中為貴以不中為戒則天下之至善豈有過於中乎今以諸卦言中之義附於此䝉亨以亨行時中也程子曰䝉之能亨以亨道行也所謂亨道時中也時謂得君之應中謂處得其中得中則時也按本卦坎下艮上六五下應九二六五為䝉之主九二發䝉者也故程子云然需位乎天位以正中也九五需于酒食貞吉象曰酒食貞吉以中正也程子曰以五得中正而盡其道也按本卦乾下坎上訟利見大人尚中正也九五訟元吉程子曰以中正居尊位治訟者也治訟得其中正所以元吉也元吉大吉而盡善也吉大而不盡善者有矣本卦坎下乾上師九二在師中吉無咎六五象曰長子帥師以中行也程子曰長子謂二以中正之德合于上而受任以行為得其宜也按本卦坎下坤上比原筮元永貞無咎以剛中也程子曰推原筮决相比之道得元永貞而後可以無咎所謂元永貞如五是也以陽剛居中正盡比之善者也以陽剛居尊位為君德元也居中得正能永而貞也卦辭本泛言比道彖言元永貞者九五以剛處中正故也九五顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位正中也程子曰顯比所以吉者以其所居之位得正中也處正中之地乃由正中之道也比以不偏為善故云正中凡言正中者其處正得中也比與隨是也言中正者得中與正也訟與需是也按本卦坤下坎上小畜剛中而志行乃亨程子曰二五居中剛中也陽性上進下復乾體志在於行也剛居中為剛而得中又為中剛言畜陽則以柔巽言能亨則由剛中以成卦之義言則為陰畜陽以卦才言則陽為剛中按本卦乾下巽上二五皆陽爻六四為主履剛中正履帝位而不疚光明也程子曰九五以陽剛中正尊履帝位茍無疚病則履道之至善光明者也按本卦兑下乾上泰九二包荒用馮河不遐遺朋亡得尚于中行程子曰四者處泰之道也包荒謂有包容荒穢之量用馮河謂以剛果之道以濟深越險也不遐遺謂不遺事之微隱與賢才之在僻陋者朋亡謂絶去朋比之私有此四者則能合於九二之德故曰得尚于中行言能配合中行之義尚配也六五以祉元吉中以行願也程子曰所以能獲祉福且元吉者由其以中道合而行其素願也有中德所以能任剛中之賢所聽從者皆其志願也剛中之賢謂九二按本卦乾下坤上同人柔得中而應乎乾曰同人程子曰柔得位謂二以陰居陰得其正位也五中正而以中正應之得中而應乎乾也五剛健中正而二以柔順中正應之各得其正其德同也故為同人象曰文明以健中正而應君子正也按本卦離下乾上大有柔得尊位大中而上下應之曰大有程子曰五以陰居君位柔得尊位也處中得大中之道也為諸陽所宗上下應之也夫居尊執柔固衆之所歸也又有虛中文明之德故上下同志應之所以為大有也按本卦乾下離上豫六二介于石不終日貞吉象曰不終日貞吉以中正也程子曰能不終日而貞且吉者以有中正之德也中正故其守堅而能辨之早去之速爻言六二處豫之道為教之意深矣本卦坤下震上蠱九二幹母之蠱不可貞象曰幹母之蠱得中道也程子曰二得中道而不過剛幹毋蠱之善者也不可貞之義已見前按本卦巽下艮上臨六五知臨大君之宜吉象曰大君之宜行中之謂也程子曰君臣道合蓋以氣類相求五有中德故能倚任剛中之賢得大君之宜成知臨之功蓋由行其中德也人君之於賢才非道同德合豈能用也按本卦兑下坤上觀大觀在上順而巽中正以觀天下程子曰五居尊位以剛陽中正之德為下所觀其德甚大故曰大觀在上下坤而上巽是能順而巽也五居中正以巽順中正之德為觀於天下也按本卦坤下巽上噬嗑柔得中而上行雖不當位利用獄也程子曰六五以柔居中為用柔得中之義上行謂居尊位雖不當位謂以柔居五而不當而利於用獄者治獄之道全剛則傷於嚴暴過柔則失於寬縱五為用獄之主以柔處剛而得中得用獄之宜也以柔居剛為利用獄以剛居柔為利否曰剛柔質也居用也用柔非治獄之宜也按本卦震下離上大畜九二輿說輹象曰輿說輹中無尤也程子曰二為六五所畜止勢不可進也五據在上之勢豈可犯也二雖剛健之體然其處得中道故進止無失雖至於進度其勢之不可則止而不行如車輿說去輪輹謂不行也動不失宜故無過尤也善莫善於剛中柔中者不至於過義耳剛中中而才也按本卦乾下艮上大過剛過而中巽而說行利有攸往乃亨程子曰言卦才之善也剛雖過而二五皆得中是處不失中道也下巽上兑是以巽順和說之道而行也在大過之時以中道巽說而行故利有攸往乃所以能亨也習坎維心亨乃以剛中也程子曰維其心可以亨通者乃以其剛中也中實為有孚之象至誠之道何所不通以剛中之道而行則可以濟險難而亨通也離柔麗乎中正故亨是以畜牝牛吉程子曰二五以柔順麗於中正所以能亨人能養其至順以麗中正則吉故曰養牝牛吉也或曰二則中正也五以陰居陽得為正乎曰離主於所麗五中正之位六麗於正位乃為正也六二黃離元吉象曰黃離元吉得中道也程子曰二居中得正麗於中正也黃中之色文之美也文明中正美之盛也故云黃離以文明中正之德上同於文明中順之君其明如是所麗如是大善之吉也象曰所以得元吉者以其得中道也不云正者離以中為重所以成文明由中也正在其中矣恆九二悔亡象曰九二悔亡能久中也程子曰在恆之義居得其正則常道也九陽爻居陰位非常理也處非其常本當有悔而九二以中德而應於五五復居中以中而應中其處與動皆得中也是能恆久於中也能恆久於中則不失正矣中重於正中則正矣正不必中也九二以剛中之德而應於中德之勝也足以亡其悔也又曰所以得悔亡者由其能恆久於中也人能恆久於中豈止亡其悔德之善也按本卦巽下震上大壯九二貞吉象曰九二貞吉以中也程子曰二雖以陽剛當大壯之時然居柔而處中是剛柔得中不過於壯得貞正而吉也又曰所以貞正而吉者以其得中道也中則不失正况陽剛而乾體乎按本卦乾下震上晉六二晉如愁如貞吉受兹介福于其王母象曰受兹介福以中正也程子曰六二在下上無應援以中正柔和之德非强於進者也故於進為可憂愁如謂其進之難也然守其貞正則當得吉王母祖母也謂陰之至尊者指六五也二以中正之道自守雖上無應援不能自進然其中正之德久而必彰上之人自當求之蓋六五大明之君與之同德必當求之加之寵祿受介福於王母也介大也又曰受兹介福以中正之道也人能守中正之道久而必亨况大明在上而同德必受大福也按本卦坤下離上睽柔進而上行得中而應乎剛是以小事吉程子曰方睽乖之時六五以柔居尊位有說順麗明之善又得中道而應剛雖不能合天下之暌成天下之大事亦可以小濟是以於小事吉也五以明而應剛不能致大吉何也曰五陰柔雖應二而暌之時相與之道未能深固故二必遇主於巷五噬膚則無咎也天下暌散之時必君臣剛陽中正至誠協力而後合也按本卦兑下離上蹇利西南往得中也不利東北其道窮也程子曰蹇之時利於處平易西南坤方為順易東北艮方為險阻九上居五而得中正之位是往而得平易之地故為利也九五大蹇朋來象曰大蹇朋來以中節也程子曰五居君位而在蹇難之中是天下之大蹇也當蹇而又在險中亦為大蹇大蹇之時而二在下以中正相應是其朋助之來也方天下之蹇而得中正之臣相輔其助豈小也得朋來而無吉何也曰未足以濟蹇也二之中正固有助矣欲以陰柔之助濟天下之難非所能也又曰上下中正而弗濟者臣之才不足也按本卦艮下坎上解九二田獲三狐得黃矢貞吉象曰九二貞吉得中道也程子曰九二以陽剛得中之才上應六五之君用於時者也天下小人常衆剛明之君在上則明足以照之威足以攝之剛足以斷之故小人不敢用其情然猶常存警戒慮其有間而害正也六五以陰柔居尊位其明易蔽其威易犯其斷不果而易惑小人一近之則移其心矣况難方解而治之初其變尚易二既當用必須能去小人則可以正君心而行其剛中之道田者去害之事狐者邪媚之獸三狐指卦之三陰時之小人也獲謂能變化除去之如田之獲狐也獲之則得中直之道乃貞正而吉也黃中色矢直物黃矢謂中直也羣邪不去君心一入則中直之道無由行矣桓敬之不去武三思是也又曰所謂貞吉者得其中道也除去邪惡使中直之道得行乃正而吉也按本卦坎下震上損九二利貞征凶弗損益之象曰九二利貞中以為志也程子曰二以剛中當損剛之時居柔而說體上應六五陰柔之君以柔說應上則失其剛中之德故戒所利在貞正也征行也離乎中則失其貞正而凶矣守其中乃貞也弗損益之不自損其剛貞則能益其上乃益之也若失其剛貞而用柔說適足以損之而已非損巳而益上也世之愚者有雖無邪心而惟知竭力順上為忠也蓋不知弗損益之之義也又曰九居二非正也處說非剛也而得中為善若守其中德何有不善豈有中而不正者豈有中而有過者所謂利貞謂以中為志也志存乎中則自正矣大率中重於正中則正矣正不必中也能守中則有益於上矣按本卦兑下艮上益利有攸往中正有慶程子曰五以陽剛中正居尊位二復以中正應之是以中正之道益天下受其福慶也六三益之用凶事無咎有孚中行告公用圭程說已見專言信篇六四中行告公從利用為依遷國程子曰四當益時處近君之位居得其正以柔巽乎上而下順應於初之剛陽如是可以益於上也唯處不得其中而所應又不中是不足於中也故云若行得中道則可以益於君上告於上而獲從矣以柔巽之體非有剛特之操故利用為依遷國為必依附於上也遷國順下而動也上依剛中之君而致其益下順剛陽之才以行其事利用如是也自是國邑民不安其居則遷遷國者順下而動也按本卦震下巽上夬九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也程子曰夬者陽决陰君子决小人之時不可忘戒備也陽長將極之時而二處中居柔不為過剛能知戒備處夬之至善者也內懷兢惕而外嚴誡號雖莫夜有兵戎亦可勿恤矣又曰莫夜有兵可懼之甚也然可勿恤者以自處之善也既得中道又知惕懼何事之足恤也九居二雖得中然非正其為至善何也曰陽决陰君子决小人而得中豈有不正也九五莧陸夬夬中行無咎象曰中行無咎中未光也程子曰五雖剛陽中正居尊位然切近於上六說體而卦獨一陰陽之所比也五為决陰之主而反比之其咎大矣故必决其决如莧陸然則於其中行之德為無咎也中行中道也莧陸今所謂馬齒莧也暴之難乾感陰氣之多者也而脆易折五若如莧陸雖感於陰而决斷之易則於中行無過咎矣不然則失其中正也感陰多之物莧陸為易斷故取為象又曰卦辭言夬夬則於中行為無咎矣象復盡其義曰中未光也夫人心正意誠乃能極中正之道而篤實光輝五心有所比以義之不可而决之雖行於外不失中正之義可以無咎然於中道未得為光大也蓋人心一有所欲則離道矣夫子於此示人意深矣按本卦乾下兑上姤剛遇中正天下大行也程子曰以卦才言也五與二皆以陽剛居中與正以中正相遇也君得剛中之臣臣遇中正之君君臣以剛陽遇中正其道可以大行於天下矣九五以把包瓜含章有隕自天象曰九五含章以中正也程子曰九五下亦無應非有遇也然得遇之道故終必有遇夫上下之遇由相求也杞髙木而葉大處髙體大而可以包物者把也美實之在下者瓜也美而居下賢者側微之象也九五尊居髙位而下求賢才以全髙而求至下猶以杞葉而包瓜能自降屈如此又其內藴中正之德充實章美人君如是則無有不遇所求者也雖屈巳求賢若其德不正賢者不屑也故必含蓄章美內積至誠則有隕自天矣猶云自天而降言必得之也自古人君至誠降屈以中正之道求天下之賢未有不遇者也髙宗感於夢寐文王遇於漁釣皆由是道也又曰所謂含章謂其含藴中正之德也德充實則成章而有光輝按本卦巽下乾上萃聚也順以說剛中而應故聚也程子曰萃之義聚也順以說以卦才言也上說而下順為上以說道使民而順於人心下說上之政令而順從於上既上下順說又陽剛處中正之位而下有應助如此故能聚也欲天下之萃才非如是不能也六二引吉無咎象曰引吉無咎中未變也程子曰引者相牽也人之交相求則合相持則離二與五為正應當萃者也而相逺又在羣陰之間必相牽引則得其萃矣五居尊位有中正之德二亦以中正之道往與之萃乃君臣和合也其所共致豈可量也是以吉而無咎又曰萃之時以得聚為吉故九四為得上下之萃二與五雖正應然異處有間乃當萃而未合者也故能相引而萃則吉而無咎以其有中正之德未遽至改變變則不相引矣或曰二既有中正之德而象云未變辭若不足何也曰羣陰比處乃其類聚方萃之時居其間能自守不變逺須正應剛立者能之二陰柔之才以其有中正之德可覬其未至於變耳故象含其意以存戒也按本卦坤下兑上升柔以時升巽而順剛中而應是以大亨程子曰柔升謂坤上行也巽既體卑而就下坤乃順時而上升以時也謂時當升也柔既上而成升則下巽而上順以巽順之道升可謂時矣二以剛中之道應於五五以中順之德應於二能巽而順其升以時是以元亨也按本卦坤上巽下困貞大人吉以剛中也程子曰困而能貞大人所以吉也蓋其以剛中之道也五與二是也非剛中則當困而失其正矣九二困于酒食象曰困于酒食中有慶也程子曰酒食人所欲所以施惠也二以剛中之才而處困之時未能施惠於人然守其剛中之德必能致亨而有福慶也雖使時未亨通守其才德亦君子之道亨乃有慶也按本卦坎下兑上井巽乎水而上水井井養而不窮也改邑不改井乃以剛中也程子曰巽入於水下而上其水者井也井之養物不有窮已取之而不竭德之常也邑可改井不可遷亦其德之常也二五之爻剛中之德其常乃如此卦之才與義合也九五井冽寒泉食象曰寒泉之食中正也程子曰五以陽剛中正居尊位其才其德盡善盡美井冽寒泉食也冽謂甘潔甘潔而寒可為人食於井道為至善也九五中正之德為至善之義按本卦巽下坎上鼎巽而耳目聰明柔進而上行得中而應乎剛是以元亨程子曰下體巽為巽順於理離明而中虛於上為耳目聰明之象凡離在上者皆云柔進而上行柔在下之物乃居尊位進而上行也以明居尊而得中道應乎剛能用剛陽之道也五居中而又以柔而應剛為得中道其才如是所以能元亨也六五鼎黃耳金鉉利貞象曰鼎黃耳中以為實也程子曰五在鼎上耳之象也鼎之舉措在耳為鼎之主也五有中德卦云黃耳鉉加耳者也二應於五來從於耳者鉉也二有剛中之德陽體剛中色黃故金鉉五文明得中而應剛二剛中巽體而上應才無不足也相應至善矣所利在貞固而已六五居中應中不至於失正而質本陰柔故戒以貞固於中也又曰六五以得中為善是以中為實德也五之所以聰明應剛為鼎之主得鼎之道皆由得中也震六五震往來厲億無喪有事象曰震往來厲危行也其事在中大無喪也程子曰六五雖以陰居陽不當位為不正然以柔居剛又得中乃有中德者也不失中則不違於正矣所以中為貴也諸卦二五雖不當位多以中為美三四雖當位或以不中為過中常重於正者蓋中則不違於正正不必中也天下之理莫善於中於六二六五可見五之動上往則柔不可居動之極下來則犯剛是往來皆危也當君位為動之主隨宜應變在中而已故當億度無喪失其所有事而已所有之事謂中德茍不失中雖有凶不至於凶也億度謂圖慮求不失中也五所以危由非剛陽而無助若以剛陽有助為動之主則能亨矣往來皆危時則甚難但期於不失中則可自守以柔主動固不能致亨濟也又曰往來皆厲行則有危也動皆有危唯在無喪其中而已大無喪以無喪為大也上六震索索視矍矍征凶象曰震索索中未得也程子曰索索消索不存之狀謂其志氣如是六以陰居震動之極其驚懼之甚志氣殫索也矍矍不安定貌志氣索索則視瞻回徨以陰柔不中正之質而處震動之極故征則凶也所以恐懼自失如此以未得於中道也使之得中則不至於索矣艮六五艮其輔言有序悔亡象曰艮其輔以中正也程子曰五君位艮之主也主天下之止者也而陰柔之才不足以當此義故止以在上取輔之義言之人所當止而止者唯言行也五在上故以輔言輔言之所由出也艮於輔則不妄出而有序也言輕發而無序則有悔止之於輔則悔亡也有序中節有次序也又曰五之所善者中也艮其輔謂止於中也言以得中為正止之于輔使不失中乃得正也漸其位剛得中也程子曰所謂位者五以剛陽中正得尊位也本卦艮下巽上歸妹六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也說見夫婦篇本卦兑下震上旅小亨柔得中乎外而應乎剛止而麗乎明是以小亨旅貞吉也程子曰六上居五柔得中乎外也麗於上下之剛順乎剛也下艮止上離麗止而麗乎明也柔順而得在外之中所止能麗於明是以小亨得旅之貞正而吉也按本卦艮下離上巽剛巽乎中正而志行柔皆順乎剛是以小亨程子曰以卦才言也陽剛居巽而得中正巽順於中正之道也陽性上其志在以中正之道上行也又上下之柔皆巽順於剛其才如是雖內柔可以小亨也九二巽在牀下用史巫紛若吉無咎象曰紛若之吉得中也程子曰二居巽時以陽處陰而在下過於巽者也牀人之所安巽在牀下是過於巽過所安矣人之過於卑巽非恐怯則諂說皆非正也二實剛中雖巽體而居柔為過於巽非有邪心也史巫通誠意於神明者也紛若多也茍至誠安于謙巽能使通誠意者多則吉而無咎謂其誠足以動人也人不察其誠意則以過巽為諂矣又曰二以居柔在下為過巽之象而能使通其誠意者衆多紛然由得中也陽居中為中實之象中既誠實則人自當信之所以吉而無咎九五貞吉悔亡象曰九五之吉位正中也程子曰九五之吉以處正中也得正中之道則吉而其悔亡也正中謂無過無不及正得其中也處柔巽與出命令唯得中為善失中則悔也節亨剛柔分而剛得中程子曰節之道自有亨義事有節則能亨也又卦之才剛柔分處剛得中而不過亦所以為節所以能亨也九五甘節吉往有尚象曰甘節之吉居位中也程子曰九五剛中居尊位為節之主所謂當位以節中正以通者也在巳則安行天下則說從節之甘美者也其吉可知以此而行故可嘉尚又曰既居尊位又得中道所以吉而有功節以中為貴得中則正矣正不能盡中也按本卦兑下坎上中孚柔在內而剛得中程子曰二柔在內中虛為誠之象二剛得上下體之中中實為孚之象所以為中孚也按本卦兑下巽上小過柔得中是以小事吉也剛失位而不中是以不可大事也程子曰柔得中二五居中也陰柔得位能致小事吉耳不能濟大事也剛失位而不中是以不可大事大事非剛陽之才不能濟三不中四失位是以不可大事小過之時自不可大事而卦才又不堪大事與時合也按本卦艮下震上既濟初吉柔得中也程子曰二以柔順文明而得中故能成既濟之功二居下體方濟之初也而又善處是以吉也九二婦喪其茀勿逐七日得象曰七日得以中道也程子曰二以文明中正之德上應九五剛陽中正之君宜得行其志也然五既得尊位時已既濟無復進而有為矣則於在下賢才豈有求用之意故二不得遂其行也自古既濟而能用人者鮮矣以唐太宗之用言尚怠於終况其下者乎於斯時也則剛中反為中滿坎離乃為相戻矣二陰也故以婦言茀婦人出門以自蔽者也喪其茀則不可行矣二不為五之求用則不得行如婦之喪茀也然中正之道豈可廢也時過則行矣逐者從物也從物則失其素守故戒勿遂自守不失則七日當復得也卦有六位七則變矣七日得謂時變也雖不為上所用中正之道無終廢之理不得行於今必行於異時也聖人之勸戒深矣又曰中正之道雖不為時所用然無終不行之理故喪茀七日當自得謂自守其中異時必行也不失其中則正矣按本卦離下坎上未濟亨柔得中也程子曰以卦才言也所以能亨者以柔得中也五以柔居尊位居剛而應剛得柔之中也剛柔得中處未濟之時可以亨也九二曳其輪貞吉象曰九二貞吉中以行正也程子曰在他卦九居二為居柔得中無過剛之義於未濟聖人深取卦象以為戒明事上恭順之道餘已見君臣篇又曰九二得正而吉者以曳輪而得中道乃正也按易之言中惟在二五蓋必所居之位得中而後所行之道得中所居之位體也所行之道用也有體斯有用矣論語子曰中庸之為德也其至矣乎民鮮久矣朱子曰中者無過不及之名庸常也言民鮮此德今已久矣南軒曰德合於中庸則至當無以復加矣中者言其理之無過不及也庸者言其可常而不易也世衰道微民汨於私意以淪胥其常性鮮有是德久矣夫子蓋嘆之也子貢問師與商也孰賢子曰師也過商也不及朱子曰子張才髙意廣而好為茍難故常過中子夏篤信謹守而規模狹隘故常不及曰然則師愈與愈猶勝也子曰過猶不及道以中庸為至賢智之過雖若勝於愚不肖之不及然其失中則一也尹氏曰中庸之為德也其至矣乎夫過與不及均也差之毫釐繆以千里故聖人之教抑其過引其不及歸於中道而已或問楊墨之學出於師商信乎曰胡氏論之當矣其言曰楊朱即莊周所謂楊子居者與老聃同時墨翟又在楊朱之前宗師大禹而晏嬰學之者也以為出於二子者則其考之不詳甚矣愚按賢智之過愚不肖之不及朱子蓋泛言之非指子夏而言也南軒曰子張髙明故常開擴子夏敦篤故常收斂開擴則未免有過收斂則未免有不及然二子之過不及甚微特未得其中而已夫子謂猶不及過與不及為未得其中則均也今以論語所載二子之言行觀之其所為過與不及者蓋亦可得而見矣按下章求退故進之由兼人故退之朱子以為一進一退所以約之于義理之中而使無過不及之患亦此意别見教人篇子曰不得中行而與之必也狂狷乎狂者進取狷者有所不為也朱子曰行道也狂者志極高而行不掩狷者智不及而守有餘聖人本欲得中道之人而教之然既不可得而徒得謹厚之人則未必能自振拔而有為也故不若得此狂狷之人猶可因其志節而激厲裁抑之以進於道非與其終於此而已矣南軒曰中行謂中道上行狂者所見髙明而行有未及乎其見狷者所守堅確而見有未得乎其理不得中行則斯二者亦可以與之進而裁之於中也蓋狂者力行以踐之則其見不差狷者致知以明之則其守不失其中可得矣中庸程子曰不偏之謂中不易之謂庸中者天下之正道庸者天下之定理此篇乃孔門傳受心法子思恐其久而差也故筆之於書以授孟子其書始言一理中散為萬事末復合為一理放之則彌六合卷之則退藏於密其味無窮皆實學也善讀者玩索而有得焉則終身用之有不能盡者也朱子曰中者不偏不倚無過不及之謂庸平常也問名篇之義程子專以不偏為言吕氏專以無過不及為說二者固不同矣子乃合而言之何也曰中一名而有二義程子固言之矣今以二說推之不偏不倚云者程子所謂在中之義未發之前無所偏倚之名也無過不及者程子所謂中之道也見諸行事各得其中之名也蓋不偏不倚猶立而不近四旁心之體地之中也無過不及猶行而不先不後理之當事之中也故於未發之大本則取不偏不倚之名於已發而時中則取無過不及之義語固各有當也然方其未發雖未有無過不及之可名而所以為無過不及之本體實在於是及其發而得中也雖其所主不能不偏於一事然其所以無過不及者是乃無偏倚者之所為而於一事之中亦未嘗有所偏倚也故程子又曰言和則中在其中言中則含喜怒哀樂在其中而吕氏亦云當其未發此心至虛無所偏倚故謂之中以此心而應萬事之變無往而非中矣是則二義雖殊而實相為體用此愚於名篇之義所以不得取此而遺彼也曰庸字之義程子以不易言之而子以為平常何也曰唯其平常故可常而不可易若驚世駭俗之事則可暫而不得為常矣二說雖殊其致一也但謂之不易則必要於久而後見不若謂之平常則直驗於今之無所詭異而其常久而不可易者可兼舉也况中庸之云上與髙明為對而下與無忌憚者相反其曰庸言之信庸行之謹又以見夫雖細微而必信謹則其名篇之義以不易而為言者又孰若平常之為切乎曰然則所謂平常將不為淺近茍且之云乎曰不然也所謂平常亦曰事理之當然而無所詭異云爾是故非有甚高難行之事而亦豈同流合汚之謂哉既曰當然則自君臣父子日用之常推而至於堯舜之禪授湯武之放伐其變無窮亦無適而非平常矣曰此篇首章先明中和之義次章乃及中庸之說至其名篇乃不曰中和而曰中庸者何哉曰中和之中其義雖精而中庸之中實兼體用且其所謂庸者又有平常之意焉則比之中和其所該者尤廣而於一篇大㫖精粗本末無所不盡此其所以不曰中和而曰中庸也未發之中是體時中之中是用中庸之中是兼以其發而中節無過不及者得名故周子曰惟中者和也中節也天下之達道也中庸只是一個道理以其不偏不倚故謂之中以其不差異可常行故謂之庸未有中而不庸者亦未有庸而不中者惟中故平常堯授舜舜授禹都是當其時合如此做做得恰好此所謂中也中即平常也不如此便非中便不是平常以至湯武之事亦然中庸該得中和之義庸是見於事和是發於心庸該得和喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之達道也全文并說巳見性情篇仲尼曰君子中庸小人反中庸君子之中庸也君子而時中小人之中庸也小人而無忌憚也朱子曰中庸者不偏不倚無過不及而平常之理乃天命所當然精微之極致也惟君子為能體之小人反是王肅作小人之反中庸也程子亦以為然今從之君子之所以為中庸者以其有君子之德而又能隨時以處中也小人之所以反中庸者以其有小人之心而又無所忌憚也蓋中無定體隨時而在是乃平常之理也君子知其在我故能戒謹不睹恐懼不聞而無時不中小人不知有此則肆欲妄行而無所忌憚矣輯略程子曰君子之於中庸也無適而不中則其心與中庸無異體矣小人之於中庸無所忌憚則與戒慎恐懼者異矣是其所以反中庸也又曰欲知中庸無如權須是時而為中若以手足胼胝閉户不出二者之間取中便不是中若當手足胼胝則於此為中當閉户不出則於此為中權之為言稱錘之義也何物為權義也蘇季明問君子時中莫是隨時否曰是也中字最難識須是默識心通且試言一㕔則中央為中一家則㕔中非中而堂為中言一國則堂非中而國之中為中推此類可見矣且如初寒時則薄裘為中如盛寒而用初寒之裘則非中也三過其門不入在禹稷之世為中若居陋巷則不中矣居陋巷在顔子之時為中若三過其門不入則非中也或曰男女不授受之類皆然曰是也男女不授受中也在喪祭則不如此矣又曰可以仕則仕可以止則止可以久則久可以速則速皆時也未嘗不合中故曰君子而時中又曰萬物無一物失所便是天理時中張子曰時中之義甚大須精義入神始得觀其㑹通行其典禮此方是真義理也行其典禮而不達其㑹通則非時中者矣君子要多識前言往行以蓄其德者以其看前言往行熟則自能見得時中吕氏曰時中者當其可之謂也時止則止時行則行當其可也可以仕則仕可以止則止可以速則速可以久則久當其可也曽子子思易地則皆然禹稷顔回同道當其可也舜不告而娶周公殺管蔡孔子以微罪行當其可也小人見君子之時中唯變所適而不知當其可而欲肆其姦心濟其私欲或言不必信或行不必果則曰唯義所在而已然實未嘗知義之所在有臨喪而歌人或非之則曰是惡知禮意然實未嘗知乎禮意猖狂妄行不謹先王之法以欺惑流俗此小人之亂德先王之所以必誅而不以聽者也又曰執中無權雖君子之所惡茍無忌憚則不若無權之為愈游氏曰以性情言之則為中和以德行言之則為中庸其實一道也君子者道中庸之實也小人則竊中庸之名而實背之是中庸之賊也故曰反中庸或問有謂中所以立常權所以盡變不知權則不足以應物知權則中有時乎不必用矣是否楊氏曰知中則知權不知權則是不知中也如一尺之物約五寸而執之中也一尺而厚薄大小之體殊則所執者輕重不等矣猶執五寸以為中是無權也蓋五寸之執長短多寡之中而非厚薄小大之中也欲求厚薄小大之中則釋五寸之約唯輕重之知而其中得矣故權以中行中因權立中庸之書不言權其曰君子而時中蓋所以為權也又曰中者豈執一之謂哉亦貴乎時中也時中者當其可之謂也堯授舜舜授禹受之而不為泰湯放桀武王伐紂而不為貪伊尹放太甲君子不以為篡周公誅管蔡天下不以為逆以其事觀之豈不異哉聖人安行而不疑者蓋當其可也後世聖學不明昧執中之權而不通時措之宜故徇名失實流而為之噲之讓白公之爭自取絶滅者有之矣至或臨之以兵而為忠小不忍而為仁皆失是也或問小人之中庸王肅程子悉加反字蓋叠上文之語然諸說皆謂小人實反中庸而不知其為非乃敢自以為中庸而居之不疑如漢之胡廣唐之吕溫栁宗元者則其所謂中庸是乃所以為無忌憚也如此則不煩增字而理亦通矣朱子曰小人之情狀則誠有若此者矣但以文勢考之則未然蓋論一篇之通體則此章乃引夫子所言之首章且當略舉大端以分别君子小人之趣向未嘗遽及此意之隱微也若論一章之語脉則上文方言君子中庸而小人反之其下乃當平解兩句之義以盡其意不應偏解上句而不解下句又遽别生他說也故疑王肅之本為得其正而未必肅之所增程子從之亦不為無所據而臆决也諸說皆從鄭本雖非本文之意然所以發明小人之情狀則亦曲盡其妙而足以警乎鄉願亂德之姦矣今存吕氏以備觀考他不能盡録也子曰中庸其至矣乎民鮮能久矣朱子曰過則失中不及則未至故惟中庸之德為至然亦人所同得初無難事但世教衰民不興行故鮮能之今已久矣子曰道之不行也我知之矣知者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也朱子曰道者天理之當然中而已矣知愚賢不肖之過不及則生禀之異而失其中也知者知之過既以道為不足行愚者不及知又不知所以行此道之所以常不行也賢者行之過既以道為不足知不肖者不及行又不求所以知此道之所以常不明也人莫不飲食也鮮能知味也道不可離人自不察是以有過不及之弊或問知愚之過不及宜若道之所以不明也賢不肖之過不及宜若道之所以不行也今其互言之何也曰測度深微揣摩事變能知君子之所不必知者知者之過乎中也昏昧蹇淺不能知君子之所當知者愚者之不及乎中也知之過者既唯知是務而以道為不足行愚者又不知所以行也此道之所以不行也刻意尚行矜世駭俗能行君子之所不必行者賢者之過乎中也卑汚茍賤不能行君子之所當行者不肖者之不及乎中也賢之過者既唯行之是務而以道為不足知不肖者又不求所以知也此道之所以不明也然道之所謂中者是乃天命人心之正當然不易之理固不外乎人生日用之間特行而不著習而不察是以不知其至而失之耳故曰人莫不飲食也鮮能知味也知味之至則必嗜之而不厭矣知道之中則必守之而不失矣輯略程子曰知者過之若是聖人之知豈更有過又曰聖人與理為一故無過無不及中而已矣其他皆以心處這箇道理故賢者常失之過不肖者常失之不及吕氏曰諸子百家異端殊技其設心非欲理義之不當然卒不可以入堯舜之道者所知有過不及之害也疏明曠達以中為不足守出於天地範圍之中淪於虛無寂寞之境窮高極深要之無所用於世此過之害也蔽䝉固滯不知所以為中泥於刑名度數之末節徇於耳目聞見之所及此不及之害也二者所知一過一不及天下欲蹈乎中庸而無所歸此道之所以不行也賢者欲處其厚不肖者常處其薄曽子執親之喪水漿不入口者七日高柴泣血三年未嘗見齒雖本於厚而滅性傷生無義以節之者也宰豫以三年之喪為巳久食稻衣錦而自以為安墨子之治喪也以薄為其道既本於薄又徇生逐末不勉於恩以厚之也二者所行一過一不及天下欲擇乎中庸而不得此道之所以不明也楊氏曰若佛氏之寂滅莊生之荒唐絶類離倫不足以經世道之所以不行也此知者過之也若楊氏之為我墨氏之兼愛過乎仁義者也而卒至於塞路道之所以不明也此賢者過之也自知賢愚不肖觀之則賢知宜愈矣至其妨於道則過猶不及也子曰舜其大知也與舜好問而好察邇言隱惡而揚善執其兩端用其中於民其斯以為舜乎朱子曰舜之所以為大知者以其不自用而取諸人也邇言者淺近之言猶必察焉其無遺善可知然於其言之未善者則隱而不宣其善者則播而不匿其廣大光明又如此則人孰不樂告以善哉兩端謂衆論不同之極致蓋凡物皆有兩端如小大厚薄之類於善之中又執其兩端而量度以取中然後用之則其擇之審而行之至矣然非在我之權度精切不差何以與此此知之所以無過不及而道之所以行也邇言猶所謂尋常言語也尋常言語人之所忽而舜好察之非洞見道體無精粗差别不能然也孟子曰自耕稼陶漁以至為帝無非取諸人者又曰聞一善言見一善行若决江河沛然莫之能禦此皆好察邇言之實也伊川曰造道深後雖聞常人語言至淺近之事莫非義理是如此兩端如厚薄輕重執其兩端用其中於民非謂止於二者之間取中當厚即厚上是中當薄即薄上是中輕重亦然輯略吕氏曰舜之知所以為大者樂取諸人以為善而已好問好察邇言隱惡而揚善皆樂取諸人者也兩端過與不及也執其兩端乃所以用其時中猶持權衡而稱物輕重皆得其平故舜之所以為舜取諸人用諸民皆以能執兩端而不失中也一本云好問則無賢不肖無貴賤無長幼皆在所問好察邇言者流俗之諺野人之語皆在所察廣問合乎衆講者也邇言出於無心者也雖未盡合乎理義而理義存焉其惡者隱而不取其善者舉而從之此善與人同之道也楊氏曰道之不行知者過之也故以舜大知之事明之舜好問而好察邇言取諸人以為善也隱惡而揚善與人為善也取諸人以為善人必以善告之與人為善人必以善歸之皆非小智自私之所能為也執其兩端所以權輕重而取中也由是而用於民雖愚者可及矣此舜所以為大知而道之所以行也或問云云朱子曰兩端之說吕楊為優子曰人皆曰豫知驅而納諸罟擭陷阱之中而莫之知辟也人皆曰豫知擇乎中庸而不能期月守也朱子曰擇乎中庸辨别衆理以求所謂中庸即上章好問用中之事也期月匝一月也言知禍而不知辟以况能擇而不能守皆不得為知也吕氏曰中庸者天下之所知天下之所共行猶寒而衣飢而食渴而飲不可須臾離也衆人之情厭常而喜新質薄而氣弱雖知不可離亦不能久也惟君子之學自明而誠明而未至乎誠雖心悅而不去然知不可不思行不可不勉在思勉之分而氣不能無衰志不能無懈故有日月至焉者有三月不違者皆德之可久者也若至乎誠則不思不勉至於常久而不息非聖人其孰能之子曰回之為人也擇乎中庸得一善則拳拳服膺而弗失之矣朱子曰拳拳奉持之貌服猶著也膺胸也奉而著之心胸之間言能守也顔子蓋真知之故能擇能守如此此行之所以無過不及而道之所以明也或問此其稱回之賢何也曰承上章不能期月守者而言如回之賢而不過則道之所以明也蓋能擇乎中庸則無賢者之過矣服膺弗失則非不肖者之不及矣然則兹賢也乃其所以為知也與輯略程子曰顔子擇中庸得善則拳拳中庸如何擇如博學之又審問之又愼思之又明辨之所以能擇中庸雖然學問思辨亦何所據乃識中庸此則存乎致知此則在學者自加功也大凡於道擇之在乎智守之在乎仁斷之在乎勇吕氏曰擇乎中庸可守而不能久知及之而仁不能守之者也知及之仁不能守之自謂之知安在其為知也與雖得之必失之故君子之學自明而誠明則能擇誠則能守能擇知也能守仁也如顔子者可謂能擇而能守也髙明不可窮博厚不可極則中道不可識仰之彌高鑽之彌堅瞻之在前忽然在後察其志也非見聖人之卓不足謂之中隨其所至盡其所得據而守之則拳拳服膺而不敢失勉而進之則既竭吾才而不敢緩此所以恍惚前後而不可為像求見聖人之止欲罷不能也或問云云朱子曰吕氏之言親切確實足以見其深潛縝密之意但求見聖人之止一句文義未安耳子曰天下國家可均也爵祿可辭也白刃可蹈也中庸不可能也朱子曰三者知仁勇之事天下之至難也然不必其合於中庸則質之近似者皆能以力為之若中庸則雖不必皆如三者之難然非義精仁熟而無一毫人欲之私者不能及也三者難而易中庸易而難此民之所以鮮能也或問中庸不可能何也曰此亦承上章之意以三者之難明中庸之尤難也蓋三者之事人之所難然皆取必於行而無擇於義且或出於氣質之偏而事勢之迫未必從容而中節也若曰中庸則雖無難行之事然天理渾然無過不及茍一毫之私意有所未盡則雖欲擇而守之而擬議之間忽已墮於過與不及之偏而不自知矣此其所以雖若甚易而實不可能也故程子以克已最難言之其㫖深矣問天下國家可均爵祿可辭白刃可蹈謂資質之近於智而力能勉者皆足以能之若中庸則四邊都無所倚者淨淨潔潔不容分毫力曰中庸便是三者之間非是别有箇道理只於三者做得那恰好處便是中庸不然只可謂之三事輯略程子曰克巳最難故曰中庸不可能也吕氏曰此章言中庸之難也均之為言平治也周官冡宰均邦國平治之謂也平治乎天下國家智之所能也遜千乘之國辭萬鍾之祿廉者之所能也犯難致命死而無悔勇者之所能也三者世之所難也然有志者率皆能之中庸者世之所謂易也然非聖人其孰能之唯其以為易故以為不足學而不察以為不足行而不守此道之所以不行也子路問强朱子曰子路好勇故問强子曰南方之强與此方之强與抑而强與抑語辭而汝也寬柔以教不報無道南方之强也君子居之寬柔以教謂含容巽順以誨人之不及也不報無道謂橫逆之來直受之而不報也南方風氣柔弱故以含忍之力勝人為强君子之道也衽金革死而不厭北方之强也而强者居之衽席也金戈兵之屬革甲胄之屬北方風氣剛徑故以果敢之力勝人為强强者之事也故君子和而不流强哉矯中立而不倚强哉矯國有道不變塞焉强哉矯國無道至死不變强哉矯此四者汝之所當强也矯强貌詩曰矯矯虎臣是也倚偏著也塞未達也國有道不變未達之所守國無道不變平生之所守也此則所謂中庸之不可能者非有以自勝其人欲之私不能擇而守也君子之强孰大於是夫子以是告子路者所以抑其血氣之偏而進之以德義之勇也或問此其記子路之問强何也曰亦承上章之意以明擇中庸而守之非强不能而所謂强者又非世俗之所謂强也蓋强者力有以勝人之名也凡人和而無節則必至於流中立而無依則必至於倚國有道而富貴或不能不改其平素國無道而貧賤或不能久處乎窮約非持守之力有以勝人者其孰能及之故此四者汝子路之所當强也南方之强不及强者也北方之强過乎强者也四者之强强之中也子路好勇故聖人之言所以長其善而救其失者類如此曰和與物一故疑於流而以不流為强中立本無所依又何疑於倚而以不倚為强哉曰中立固無所倚也然凡物之情惟强者為能無所倚而獨立弱而無所倚則其不傾側而偃仆者幾希矣此中立之所以疑於必倚而不倚之所以為强也國有道則有達之理故不變其未達之所守國無道則有不幸而死之理故不變其平生之所守不變其未達之所守易不變其平生之所守難子曰素隱行怪後世有述焉吾弗為之矣朱子曰素按漢書當作索蓋字之誤也素隱行怪言深求隱僻之理而過為詭異之行也然以其足以欺世而盜名故後世或有稱述之者此知之過而不擇乎善行之過而不用其中不當强而强者也聖人豈為之哉君子遵道而行半塗而廢吾弗能已矣遵道而行則能擇乎善矣半塗而廢則力之不足也此其知雖足以及之而行有不逮當强而不强者也已止也聖人於此非勉焉而不敢廢蓋至誠無息自有所不能止也君子依乎中庸遁世不見知而不悔唯聖者能之不為索隱行怪則依乎中庸而已不能半塗而廢是以遁世不見知而不悔也此中庸之成德知之盡仁之至不賴勇而裕如者正吾夫子之事而猶不自居也故曰唯聖者能之而已輯略程子曰素隱行怪是過者也半塗而廢是不及者也不見知而不悔是中者也愚按素隱二字三國志方技傳亦作索隱或謂以中庸名書而言中者僅止於篇首之十一章然則費隱以下皆非中乎曰不然夫所謂中者豈有他哉天道之自然人道之當然不可過不可不及者即中也自此以下或言天道之自然如鳶飛魚躍之類是也或言人道之當然如道不逺人之類是也何往而非中哉朱子謂中庸一書不越乎誠之一字愚亦謂此書所言無一非中中與誠豈二物哉學者即全書而細味之自可識矣不必以正言中處方為中也西山讀書記卷十六
