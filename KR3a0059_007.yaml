body:
  text: 西山讀書記卷七宋真德秀撰仁下記禮運仁者義之本也順之體也得之者尊仲尼燕居子曰郊社之禮所以仁鬼神也嘗禘之禮所以仁昭穆也饋奠之禮所以仁死喪也射鄉之禮所以仁鄉黨也食饗之禮所以仁賓客也鄭氏曰仁猶存也凡存此所以全善之道也兩君相見揖讓而入門入門而縣興揖讓而升堂升堂而樂闋下管象武夏籥序興陳其薦俎序其禮樂備其百官如此而后君子知仁焉鄭氏曰知仁焉知禮樂之所存也表記子曰以德報怨則寬身之仁也以怨報德則刑戮之民也呂氏曰以德報怨雖過於寬而本於厚未害其為仁也以怨報德則反易天常天下之亂民法所當誅者也子曰無欲而好仁者無畏而惡不仁者天下一人而已矣是故君子議道自巳而置法以民無欲而好仁無畏而惡不仁所謂性之者也安仁者也非聖人不足以性仁茍志於仁矣無惡也則衆人皆可以為仁以聖人之所性而議道則道無不盡以衆人之可為而置法則法無不行雖然法非貶乎道也君臣父子倫順刑名之間性命之理具焉雖有未能上達猶庶幾乎弗畔此衆人之所能及子曰仁有三與仁同功而異情與仁同功其仁未可知也與仁同過然後其仁可知也仁者安仁知者利仁畏罪者強仁呂氏曰仁者安仁無欲而好仁無畏而惡不仁者也知者利仁有欲而好仁者也畏罪而強仁有畏而惡不仁者也三者之功同歸於仁而其情則異此堯舜性之湯武身之五伯假之之異也功者人所貪也假之者有之故齊桓公九合諸侯一匡天下雖湯武之舉不過乎是而其情則不同故其仁未可知也過者人所辟也皆不幸而致焉故周公使管叔監殷管叔以殷畔過於愛兄而已孔子對陳司敗以昭公知禮過於諱君而已皆出乎情而無偽故其仁可知也仁者右也道者左也仁者人也道者義也厚於仁者薄於義親而不尊厚於義者薄於仁尊而不親右者人之所有事也左者居於不用之地而助右之所不及者也仁者人之體也將有為也將有行也非仁不可也故曰仁者右也又曰仁者人也道者天之理也仁至於不可行不可節則理有所不得已以助仁之所不及者義也故曰道者左也又曰道者義也仁莫隆於父子父子之道親親也義莫重於君臣君臣之道尊尊也厚於此則薄於彼厚於彼則薄於此惟知其所以為左右則尊尊親親並行而不悖無厚薄之間也子言之仁有數義有長短小大中心憯怛愛人之仁也率法而強之資仁者也詩曰豐水有芑武王豈不仕詒厥孫謀以燕翼子武王蒸哉數世之仁也國風曰我今不閲皇恤我後終身之仁也呂氏曰仁有數者仁為器重為道逺隨其所舉之多寡所至之逺近皆可以謂之仁故管子之功微子之去箕子之囚比干之死皆得以仁名語仁之重則堯舜其猶病諸此仁所謂取數多也中心憯怛誠發於性者也率法而強之外鑠於仁者也發於性者誠心感動無待於外也外鑠者循仁之迹而勉為者也以其誠心愛人故曰愛人之仁以其有取於外故曰資仁此所發淺深之數也數世之仁終身之仁此所施逺近之數也故曰仁有數義有長短大小者義無定體惟其所宜而已宜長則長宜短則短宜大則大宜小則小如孔子可以仕則仕可以止則止可以久則久可以速則速禮有以髙為貴有以下為貴有以大為貴有以小為貴之類也故曰義有長短小大此章論仁而及義者仁之數亦義也子曰仁之為器重其為道逺舉者莫能勝也行者莫能致也取數多者仁也夫勉於仁者不亦難乎是故君子以義度人則難為人以人望人則賢者可知己矣呂氏曰以義度人者盡義以度人也盡義以求人非聖人不足以當之故難為人舉今之人相望則大賢愈於小賢小賢愈於不賢故賢者可知此亦以數而言仁者也君子之自待必全盡而後已子曰中心安仁者天下一人而已大雅曰德輶如毛民鮮克舉之我儀圖之惟仲山甫舉之愛莫助之小雅曰髙山仰止景行行止子曰詩之好仁如此鄉道而行中道而廢忘身之老也不知年數之不足也俯焉日有孳孳而後已儒行溫良者仁之本也敬慎者仁之地也寬裕者仁之作也孫接者仁之能也禮節者仁之貌也言談者仁之文也歌樂者仁之和也分散者仁之施也儒者兼此而有之猶且不敢言仁也其尊讓有如此者射義射者仁之道也射求正諸己己正而後發發而不中則不怨勝己者反求諸己而已矣呂氏曰仁者之道不怨天不尤人行有不至反求諸己而已蓋以仁為己任無待於外有君子無所不用其學故於射也得反己之道焉齊宣王問曰齊桓晉文之事可得聞乎孟子對曰仲尼之徒無道桓文之事者是以後世無傳焉臣未之聞也無以則王乎曰德何如則可以王矣曰保民而王莫之能禦也朱子曰保愛護也曰若寡人者可以保民乎哉曰可曰何由知吾可也曰臣聞之胡齕曰王坐於堂上有牽牛而過堂下者王見之曰牛何之對曰將以釁鐘王曰舍之吾不忍其觳觫若無罪而就死地對曰然則廢釁鐘與曰何可廢也以羊易之不識有諸曰有之曰是心足以王矣百姓皆以王為愛也臣固知王之不忍也王見牛之觳觫而不忍殺即所謂惻隱之心仁之端也擴而充之則可以保四海矣故孟子指而言之欲王察識而擴充之也愛猶吝也王曰然誠有百姓者齊國雖褊小吾何愛一牛即不忍其觳觫若無罪而就死地故以羊易之也曰王無異於百姓之以王為愛也以小易大彼惡知之王若隱其無罪而就死地則牛羊何擇焉王笑曰是誠何心哉我非愛其財而易之以羊也宜乎百姓之謂我愛也異怪也隱痛也擇猶分也言牛羊皆無罪而死何所分别而以羊易牛乎孟子故設此難欲王反求而得其本心王不能然故卒無以自解也曰無傷也是乃仁術也見牛未見羊也君子之於禽獸也見其生不忍見其死聞其聲不忍食其肉是以君子逺庖厨也術謂法之巧者蓋殺牛既所不忍釁鐘又不可廢於此無以處之則此心雖發而終不得施矣然見牛則此心已發而不可遏未見羊則其理未形而無所妨故以羊易牛則二者得以兩全而無害此所以為仁之術也聲謂將死而哀鳴也蓋人之於禽獸同生而異類故用之以禮而不忍之心施於聞見之所及其所以必逺庖厨者亦以預養是心而廣為仁之術也王説曰詩云他人有心豫忖度之夫子之謂也夫我乃行之反而求之不得吾心夫子言之於我心有戚戚焉此心之所以合於王者何也戚戚心動貌王因孟子之言而前日之心復萌乃知此心不從外得然猶未知所以反其本而推之也曰有復於王者曰吾力足以舉百鈞而不足以舉一羽明足以察秋毫之末而不見輿薪則王許之乎曰否今恩足以及禽獸而功不至於百姓者獨何與然則一羽之不舉為不用力焉輿薪之不見為不用明焉百姓之不見保為不用恩焉故王之不王不為也非不能也今恩以下孟子之言也蓋天地之性人為貴故人之與人又為同類而相親是以惻隱之發則於民切而於物緩推廣仁術則仁民易而愛物難今王此心能及物矣則其保民而王非不能也但自不肯為耳曰不為者與不能者之形何以異曰挾太山以超北海語人曰我不能是誠不能也為長者折枝語人曰我不能是不為也非不能也故王之不王非挾太山以超北海之類也王之不王是折枝之類也是心固有不待外求擴而充之在我而已何難之有老吾老以及人之老幼吾幼以及人之幼天下可運於掌詩云刑于寡妻至于兄弟以御于家邦言舉斯心加諸彼而已故推恩足以保四海不推恩無以保妻子古之人所以大過人者無他焉善推其所為而已矣今恩足以及禽獸而功不至於百姓者獨何與老以老事之也吾老謂吾之父兄人之老謂人之父兄幼以幼畜之也吾幼謂我之子弟人之幼謂人之子弟運於掌言易也骨肉之親本同一氣又非但若人之同類而已故古人必由親親推之然後及於仁民又推其餘然後及於愛物皆自近以及逺自易以及難今王反之則必有故矣故復推本而再問之權然後知輕重度然後知長短物皆然心為甚王請度之言物之輕重長短人所難齊必以權度度之而後可見若心之應物則其輕重長短之難齊而不可不度以本然之權度又有甚於物者今王恩及禽獸而功不至於百姓是其愛物之心重且長而仁民之心輕且短失其當然之序而不自知也故上文既發其端而於此請王度之也抑王興甲兵危士臣構怨於諸侯然後快於心與孟子以王愛民之心所以輕且短者必其以是三者為快也然三事實非人心之所快有甚於殺觳觫之牛者故指以問王欲其以此而度之也王曰否吾何快於是將以求吾所大欲也不快於此者心之正也而必為此者欲誘之也欲之所誘者獨在於是是以其心尚明於他而獨暗於此此其愛民之心所以輕且短也曰王之所大欲可得聞與王笑而不言曰為肥甘不足於口與輕暖不足於體與抑為采色不足視於目與聲音不足聽於耳與便嬖不足使令於前與王之諸臣皆足以供之而王豈為是哉曰否吾不為是也曰然則王之所大欲可知己欲辟土地朝秦楚蒞中國而撫四夷也以若所為求若所欲猶緣木而求魚也王曰若是其甚與曰殆有甚焉緣木求魚雖不得魚無後災以若所為求若所欲盡心力而為之後必有災曰可得聞與曰鄒人與楚人戰則王以為孰勝曰楚人勝曰然則小固不可以敵大寡固不可以敵衆弱固不可以敵強海內之地方千里者九齊集有其一以一服八何以異於鄒敵楚哉蓋亦反其本矣今王發政施仁使天下仕者皆欲立於王之朝耕者皆欲耕於王之野商賈皆欲藏於王之市行旅皆欲出於王之塗天下之欲疾其君者皆欲赴訴於王其如是孰能禦之發政施仁所以王天下之本也近者悅逺者來則大小強弱非所論矣蓋力求所欲則所欲者反不可得能反其本則所欲者不求自至王曰吾惛不能進於是矣願夫子輔吾志明以教我我雖不敏請嘗試之曰無恆産而有恆心者惟士為能若民則無恆産因無恆心茍無恆心放辟邪侈無不為己及陷於罪然後從而刑之是罔民也焉有仁人在位罔民而可為也是故明君制民之産必使仰足以事父母俯足以畜妻子樂歲終身飽凶年免於死亡然後驅而之善故民之從之也輕今也制民之産仰不足以事父母俯不足以畜妻子樂歲終身苦凶年不免於死亡此惟救死而恐不贍奚暇治禮義哉王欲行之則蓋反其本矣使民有常産者又發政施仁之本也五畝之宅樹之以桑五十者可以衣帛矣雞豚狗彘之畜無失其時七十者可以食肉矣百畝之田勿奪其時八口之家可以無飢矣謹庠序之教申之以孝悌之義頒白者不負戴於道路矣老者衣帛食肉黎民不飢不寒然而不王者未之有也此言制民之産之法也趙氏曰八口之家次上農夫也此王政之本常生之道故孟子為齊梁之君各陳之也楊氏曰為天下者舉其心加諸彼而已然雖有仁心仁聞而民不被其澤者不行先王之道故也故以制民之産告之此章言人君當黜霸功行王道而王道之要不過推其不忍之心以行不忍之政而已齊王非無此心而奪於功利之私不能擴充以行仁政雖以孟子反復曉告精切如此而蔽固已深終不能悟是可歎也或問仁術字當何訓曰術猶方便也又曰術字本非不好底只緣後人把做變詐看了便道是不好却不知天下事有難處處須著有個巧底道理始得以羊易之是用術處有此術則自家仁心方得流行南軒曰保民云者保赤子之保宣王自視歉然懼力之不足而不知保民之道雖甚大其端則不逺患不能察識擴充之耳故孟子引見牛之事以告使知不忍之心已實有之反而推之也夫宣王坐堂上牽牛過堂下而不忍之心於此蓋不出於計較作為而其端因物發見也曰是心足以王矣言不忍之心王所固有是足以王也方見牛而不忍者無以蔽之而其愛物之端發見也而不能加恩於民者有以蔽之而仁民之理不著也然即夫愛物之端可以知夫仁民之理素具能反而循其不忍之實其所謂仁民者固可得也老吾老以及人之老幼吾幼以及人之幼所謂由一本而推之也文王之刑于寡妻至于兄弟以御于家邦亦舉斯心以加諸彼而已蓋無非此心之所存也聖人雖無事乎推然其自身以及家自家以及國亦固有序矣推恩足以保四海者愛無所不被也不推恩無以保妻子失其所為愛之理也夫行王政者其心非欲傾他國以自利也惟其以生民困苦為己任行吾之所當為而天下歸心焉耳夫欲辟土地朝秦楚自世俗之務功名者言之則以為有志而自聖賢觀之則特出於忮求矜伐之私耳宣王惟汲汲於濟其私故顛沛錯亂非惟不能克濟而禍患從之蹈乎欲者固危殆之道也若由孟子所言以發政施仁為事則是為公理之所存可大之業自爾馴致此天理人欲之分也孟子曰以力假仁者霸霸必有大國以德行仁者王王不待大湯以七十里文王以百里朱子曰假仁者本無是心而借其事以為功也以德行仁則自吾之得於心者而推之無適而非仁也以力假仁力與仁二以德行仁德便是仁南軒曰以德行仁至誠惻怛本於其心而形於事為如木之有本水之有源也以力服人者非心服也力不贍也以德服人者中心悅而誠服也如七十子之服孔子也王霸之心誠偽不同故人之所以應之者其不同亦如此鄒氏曰以力服人者有意於服人而人不敢不服以德服人者無意於服人而人不能不服從古以來論王霸者多矣未有若此之深切著明也孟子曰仁則榮不仁則辱今惡辱而居不仁是猶惡濕而居下也朱子曰此只是為下等人言若是上等人豈以榮辱之故而後行仁哉南軒曰仁者非有意於榮仁者固榮也在身則心和而氣平德性尊而暴慢逺在家則父子親而兄弟睦夫婦義長幼序推之於國而國治施之於天下而天下平無往而不榮也若夫不仁之人咈理而徇欲一身將不能以自保而況於其他乎夫人之情孰不惟辱之是惡而自處於不仁則以私欲蔽之而昧夫榮辱之幾故也孟子曰離婁之明公輸子之巧不以規矩不能成方員師曠之聰不以六律不能正五音堯舜之道不以仁政不能平治天下今有仁心仁聞而民不被其澤不可法於後世者不行先王之道也朱子曰仁心愛人之心也仁聞者有愛人之聲聞於人也先王之道仁政是也范氏曰齊宣王不忍一牛之死以羊易之可謂有仁心梁武帝終日一食疏素宗廟以麵為犧牲斷死刑必為之涕泣天下知其慈仁可謂有仁聞然而宣王之時齊國不治武帝之末江南大亂其故何哉有仁心仁聞而不行先王之道故也故曰徒善不足以為政徒法不能以自行有其心無其政是謂徒善有其政無其心是謂徒法詩云不愆不忘率由舊章遵先王之法而過者未之有也詩大雅假樂之篇愆過也率循也章典法也所行不過差不遺忘者以其循用舊典故也聖人既竭目力焉繼之以規矩準繩以為方員平直不可勝用也既竭耳力焉繼之以六律正五音不可勝用也既竭心思焉繼之以不忍人之政而仁覆天下矣此言古之聖人既竭耳目心思之力然猶以為未足以遍天下及後世故制為法度以繼續之則其用不窮而仁之所被廣矣故曰為髙必因丘陵為下必因川澤為政不因先王之道可謂智乎丘陵本髙川澤本下為髙下者因之則用力少而成功多矣鄒氏曰自章首至此論以仁心仁聞行先王之道是以惟仁者宜在髙位不仁而在髙位是播其惡於衆也仁者有仁心仁聞而能擴而充之以行先王之道者也播惡於衆謂貽患於下也孟子曰規矩方員之至也聖人人倫之至也欲為君盡君道欲為臣盡臣道二者皆法堯舜而已矣不以舜之所以事堯事君不敬其君者也不以堯之所以治民治民賊其民者也孔子曰道二仁與不仁而已矣朱子曰法堯舜則盡君臣之道而仁矣不法堯舜則慢君賊民而不仁矣二端之外更無他道出乎此則入乎彼矣可不謹哉南軒曰仁與不仁此為二途顧所由如何耳不仁亦謂之道者謂不仁之道也如堯舜之為是由夫仁之道也若幽厲之為是由夫不仁之道也暴其民甚則身弒國亡不甚則身危國削名之曰幽厲雖孝子慈孫百世不能改也言不仁之禍必至於此可懼之甚也孟子曰三代之得天下也以仁其失天下也以不仁國之所以廢興存亡者亦然天子不仁不保四海諸侯不仁不保社稷卿大夫不仁不保宗廟士庶人不仁不保四體今惡死亡而樂不仁是猶惡醉而強酒南軒曰仁者人之道人道既廢則雖有四體不能行持是不仁者乃趨死亡之道也云云雖然此特未能真知不仁之可以死亡耳使其真知不仁者之可以死亡則如蹈水火之不敢為矣孟子曰詩云商之孫子其麗不億上帝既命侯于周服侯服于周天命靡常殷士膚敏祼將于京孔子曰仁不可為衆也夫國君好仁天下無敵朱子曰孔子因讀此詩而言有仁者則雖十萬之衆不能當之故國君好仁則必無敵於天下也今也欲無敵於天下而不以仁是猶執熱而不以濯也詩云誰能執熱逝不以濯孟子曰不仁者可與言哉安其危而利其災樂其所以亡者不仁而可與言則何亡國敗家之有朱子曰安其危利其災者不知其為危災而反以為安利也所以亡者謂荒淫暴虐所以致亡之道也不仁之人私欲固蔽失其本心故其顛倒錯亂至於如此所以不可告以忠言而卒至於敗亡也孟子曰桀紂之失天下也失其民也失其民者失其心也得天下有道得其民斯得天下矣得其民有道得其心斯得民矣得其心有道所欲與之聚之所惡勿施爾也民之歸仁也猶水之就下獸之走壙也朱子曰壙廣野也言民之所以歸乎此以其欲之在乎此也故為淵驅魚者獺也為叢驅爵者鸇也為湯武驅民者桀與紂也今天下之君有好仁者則諸侯皆為之驅矣雖欲無王不可得已今之欲王者猶七年之病求三年之艾也茍為不畜終身不得茍不志於仁終身憂辱以陷於死亡南軒曰孟子所謂諸侯皆為之驅者非利乎他人之為己驅也特言其理之常然者耳循夫天理而無利天下之心而天下歸之此三王之所以王也假是道而亦以得天下者漢唐是也故秦為漢驅者也隋為唐驅者也孟子曰仁之勝不仁也猶水勝火今之為人者猶以一杯水救一車薪之火也不熄則謂之水不勝火此又與於不仁之甚者也朱子曰與猶助也仁之能勝不仁必然之理也但為之不力則無以勝不仁而人遂以為真不能是我之所為有以深助於不仁者也以正勝邪須做得十分工夫方勝得他正如人身正氣稍不足邪便得以干之矣亦終必亡而已矣言此人之心亦且自怠於為仁終必并與其所為而亡之矣趙氏曰言為仁不至而不反諸己也南軒曰此為有志於仁而未力者言也仁與不仁特係乎操舍之間而天理人欲分焉天理存則人欲消固不兩立也故以水勝火喻之然用力於仁貴於久而不舍若一暴而十寒倐得而復失則暫存之天理豈能助無窮之人欲哉學者觀於此其可斯須而不存是心乎天理浸明則人欲浸消矣及其至也純是天理以水勝火不其然乎孟子曰五穀者種之美者也茍為不熟不如荑稗夫仁亦在乎熟之而已矣朱子曰荑稗草之似穀者也其實亦可食然不能如五穀之美也但五穀不熟則反不如荑稗之熟猶為仁而不熟則反不如他道之有成是以為仁必貴乎熟而不可徒恃其種之美又不可以仁之難熟而甘為他道之有成也尹氏曰日新而不已則熟南軒曰此勉學者為仁貴乎有成也仁者人之所以為人也然為之而不至則未可謂成人況於乍明乍暗若存若亡無篤實悠久之功則終亦必亡而已矣云云未至於顔子之地皆未可語夫熟淳于髠曰先名實者為人也後名實者自為也夫子在三卿之中名實未加於上下而去之仁者固如此乎朱子曰名聲譽也實事功也言以名實為先而為之者是有志於救民也以名實為後而不為者是欲獨善其身者也名實未加於上下謂上未能正其君下未能濟其民也孟子曰居下位不以賢事不肖者伯夷也五就湯五就桀者伊尹也不惡汙君不辭小官者柳下惠也三子者不同道其趨一也一者何也曰仁也君子亦仁而已矣何必同朱子曰仁者無私心而合天理之謂楊氏曰伊尹之就湯以三聘之勤也其就桀也湯進之也湯豈有伐桀之心哉其進伊尹以事之也欲其悔過遷善而已伊尹既就湯則以湯之心為心矣及其終也人歸之天命之不得已而伐之耳若湯初求伊尹即有伐桀之心而伊尹遂相之以伐桀是以取天下為心也以取天下為心豈聖人之心哉南軒曰淳于髠以孟子為卿於齊未久而遽去疑其為自為而非仁者之所為蓋髠徒知以為人為仁而不知仁之理存乎性者也故伯夷之不以賢事不肖伊尹之五就柳下惠之不惡不辭而皆為趨於仁以其皆本於天理之正故爾若徇夫為人之名以為仁而咈乎性之理則所謂愛之本先亡而其所以為愛者特其情之流爾豈不反害於仁乎孟子曰萬物皆備於我矣朱子曰此言理之本然也大則君臣父子小則事物細微其當然之理無一不具於性分之內也反身而誠樂莫大焉誠實也言反諸身而所備之理皆如惡惡臭好好色之實然則其行之不待勉強而無不利矣其為樂孰大於是強恕而行求仁莫近焉強勉強也恕推己以及人也反身而誠則仁矣其有未誠則是猶有私意之隔而理未純也故當凡事勉強推己及人庶幾心公理得而仁不逺也此章言萬物之理具於吾身體之而實則道在我而樂有餘行之以恕則私不容而仁可得反身而誠蓋知之已至而自然循理所以樂強恕而行是知之未至且恁地把捉勉強做去少間到純熟處便是仁問反身而誠是大賢以上事強恕求仁是學者身分上事否曰然又曰反身而誠只是箇真知真實知得則滔滔行將去見得萬理與我為一自然其樂無涯所以伊川云異日見卓爾有立於前然後不知手之舞足之蹈正此意也萬物不是萬物之迹只是萬物之理橫渠曰萬物皆備於我矣言萬物皆素定於我也行有不慊於心則餒矣故反身而誠樂莫大焉若不是實做工夫到這裏如何見得恁地誠是有此理檢校自家身分果無欠闕事君真箇忠事親真箇孝仰不愧於天俯不怍於人其樂孰大於此反身而誠孟子之意主於誠字言反身而實有此理也為父而實有慈為子而實有孝豈不快活若反身不誠是無此理但有恐懼而已豈得樂哉未至於反身而誠處且逐事要推己及人庶幾心公理得更好仔細看這般處不可將恕字低看了求仁莫近於恕恕字甚緊孟子曰仁言不如仁聲之入人深也程子曰仁言謂以仁厚之言加於民仁聲如仁聞謂有仁厚之實而為衆所稱道者也此尤見仁德之昭著故其感人之尤深也善政不如善教之得民也政謂法度禁令所以制其外也教謂道德齊禮所以格其心也孟子曰君子之於物也愛之而弗仁於民也仁之而弗親親親而仁民仁民而愛物朱子曰物謂禽獸草木愛謂取之有時用之有節程子曰仁推己及人如老吾老以及人之老於民則可於物則不可統而言之則皆仁分而言之則有序楊氏曰其分不同故所施不能無差等所謂理一而分殊者也尹氏曰何以有是差等一本故也無偽也南軒曰理一而分殊者聖人之道也蓋究其所本則固原於一而循其所推則不得不殊明乎此則知仁義之未嘗不相須矣孟子曰不仁哉梁惠王也仁者以其所愛及其所不愛不仁者以其所不愛及其所愛朱子曰親親而仁民仁民而愛物所謂以其所愛及其所不愛也公孫丑曰何謂也梁惠王以土地之故糜爛其民而戰之大敗將復之恐不能勝故驅其所愛子弟以殉之是之謂以其所不愛及其所愛也以土地之故及其民以民之故及其子弟皆以其所不愛及其所愛也此章言仁人之恩自內及外不仁之禍由疏及親南軒曰此愛者仁之道也而有所不愛者是為私意所隔而愛之理蔽於內也善推其所為則自親以及疏雖各有差等而愛無不加焉至於不仁者則不能推矣不能推故日以陷溺不惟無以及於人且將併與其親愛者亦不之恤此豈仁之道哉孟子曰盡信書則不如無書吾於武成取二三策而已矣程子曰取其奉天伐暴之心反政施仁之法而已仁人無敵於天下以至仁伐至不仁而何其血之流杵也朱子曰武成言武王伐紂紂之前徒倒戈攻於後以北血流漂杵孟子言此則其不可信者然書本意乃謂商人自相殺非謂武王殺之也孟子之設此言懼後世之惑且長不仁之心耳孟子曰有人曰我善為陳我善為戰大罪也國君好仁天下無敵焉南面而征北狄怨東面而征西夷怨曰奚為後我武王之伐殷也革車三百兩虎賁三千人王曰無畏寧爾也非敵百姓也若崩厥角稽首征之為言正也各欲正己也焉用戰南軒曰征之為言正也人望其來正己也而何戰之有哉若不志於仁而徒欲以巧力取勝則天下孰非吾敵勝與負均為殘民而逆天也戰陳君子之所不取而大司馬有教戰之法何也先王之制兵亦仁政之大者所以禁暴止亂而救民之生也有兵斯有用兵之法非若後世詭譎之為者蓋明其節制一其號令使之服習而其本則出於仁義是以無敵於天下若弛兵撤禁以召後侮而曰吾好仁而已是烏所謂仁者哉孟子曰不仁而得國者有之矣不仁而得天下未之有也朱子曰言不仁之人騁其私智可以盜千乘之國而不可以得丘民之心鄒氏曰自秦以來不仁而得天下者有矣然皆一再傳而失之猶不得也所謂得天下者必如三代而後可南軒曰不仁而得國亦得其土地而已顧豈得其民人之心哉然則是終可保乎孟子之言所當深味而不可執辭以害意也孟子曰仁也者人也合而言之道也朱子曰仁者人之所以為人之理也然仁理也人物也以仁之理合於人之身言之乃所謂道者也程子曰率性之謂道是也或曰外國本人也之下有義也者宜也禮也者履也智也者知也信也者實也凡二十字今按如此則理極分明然未詳其是否也仁者人也人之所以為人者以其有此而已人之所以得名以其仁也言仁而不言人則不見理之所寓言人而不言仁則人不過是一塊血肉耳必合而言之方見得道理出來此仁字不是别物即是這人底道理將這仁與人合便是道程子謂此猶率性之謂道也如中庸仁者人也是對義者宜也意又不同人字是以人身言之人自有生意是言仁之生道也中庸説仁字又密上言修身以道修道以仁便説仁者人也是切己言之孟子是統而言之南軒曰仁者人也仁謂仁之理人謂人之身仁字本自人身上得名合而言之則人而仁矣是乃人之道也故伊川曰仁固是道道却是總名蓋人之生其愛之理具其性是乃所以為人之道者惟其私意日以蔽隔故其理雖存而人不能合之則人道亦幾乎息矣惟君子以克己為務己私既克無所蔽隔而天理睟然則人與仁合而為人之道得矣董子曰仁人者正其誼不謀其利明其道不計其功程子云此董生所以度越諸子按本傳仲舒為江都相事易王王問曰越王勾踐與大夫泄庸種蠡謀伐吳遂滅之孔子稱殷有三仁寡人亦以為越有三仁仲舒對曰臣聞昔者魯君問柳下惠吾欲伐齊何如柳下惠曰不可歸而有憂色曰吾聞伐國不問仁人此言何為至於我哉徒見問之且猶羞之況設詐以伐吳乎由此言之越本無一仁夫仁人者正其誼不謀其利明其道不計其功是以仲尼之門五尺之童羞稱五伯為其先詐力而後仁義也董子之言如此蓋自孟子以後未有及之者故以繼於孔孟之後又按文中子曰荀氏有二仁焉其生也以救時其死也以明道彧攸父子雖有死生之殊要皆輔曹以篡漢者也其可謂之仁乎其可與三仁例論乎仲淹以明道自任而其言若是其不及董子也逺矣問心與仁何異程子曰心譬如穀種生之性是仁陽和發處乃情也問仁者愛之理朱子曰理便是性緣裏面有這愛之理所以發出來無不愛程子曰心如穀種其生之性乃仁也生之性便是愛之理也仁只是天地發育生生底道理程子所謂譬如穀種仁則其生之性玩此則仁可識矣愚按程子此語最精切且兼盡心性情之妙故以此為論仁之首天地之大德曰生天地絪緼萬物化醇萬物之生意最可觀此元者善之長也斯所謂仁也問萬物之生意最可觀朱子曰物之初生其去本未逺故好看及幹成葉茂却不好看如赤子入井時惻隱怵惕之心只些子仁見得時却好看到得發政施仁其仁周廣便看不得何處是仁又曰周茂叔窗前草不除曰觀天地生物氣象心生道也有是心斯具是形以生惻隱之心人之生道也雖桀跖不能無是以生但戕賊之以滅天耳朱子曰天地生物之心是仁人之稟賦接得此天地之心方能有生故惻隱之心在人亦為生道也心生道也乃是得天地之心以生生物便是天地之心醫書言手足痿痺為不仁此言最善名狀全文已見博施濟衆注又曰醫家以不認痛癢謂之不仁人以不知覺不認義理為不仁譬最近勉齋黃氏曰程子言手足痿痺為不仁其義何也或以為痿痺者不識痛癢之謂也如此則覺者為仁仁可以覺言乎曰愚嘗聞之師矣所謂仁者當於氣已不貫一句求之手足之所以痿痺者以吾之氣不貫乎手足耳手足之譬則人物也痿痺則吾之心不屬乎彼彼雖有疾痛頑然而莫之知也氣無不貫則一身無痿痺之處此心無不達則天下無疾痛莫覺之人故論仁者當觀其心愚按黃氏之論至矣然初學猶有未悉者夫手足不仁者非謂手足自不仁也蓋手足本吾一體而風痺之人血氣不貫於手足便與不屬己相似人與物亦本吾一體緣頑忍之人此心不貫於人物亦與不屬己相似風痺之人不仁於手足頑忍之人不仁於民物皆以其不屬己故也殊不知天地吾之父母已與人雖有彼我之異人與物亦有貴賤之殊要皆天地之子本同一體只緣私意橫生天理滅絶便以人已為二致亦如手足本是吾身之物只緣風邪所中血氣隔塞遂以手足為外物手足者民物之譬也風邪者私意之譬也人無私意之害則民物之休戚自然相關一見赤子入井則此心為之怵惕無風邪之病則四肢之痛癢亦自然相關雖小小疾苦此心亦為之痛楚當如此玩味方曉程子痿痺不仁之意又按遺書曰剛毅木訥質之近乎仁者也力行學之近乎仁也若夫至仁則天地為一身而天地之間品物萬形為四肢百體豈有肢體而不愛者哉聖人仁之至也獨能體是心而已曷嘗支離多端而求之於外乎故能近取譬者仲尼所以示子貢可為仁之方也醫書有以四體風頑謂之四體不仁為其疾痛不以纍其心故也夫手足在我而疾痛不與知焉非忍而何世之忍心無恩者其自棄亦若是而已此章與前章醫書云云意義全同但記之者異故附注於此訂頑乃仁之體也問云云李公晦曰以天地萬物為一體而無一毫私意以間之非仁體而何程子曰公而以人體之故為仁全文云仁之道只須道一公字公只是仁之理不可將公便喚做仁云云只為公則物我兼照故仁所以能恕所以能愛恕則仁之施愛則仁之用也又曰仁道難名惟公近之非以公便為仁問公而以人體之則為仁朱子曰公是仁之方法人是仁之材料有此人方有此仁蓋有形氣便具此生理若無私意間斷則人身全體皆是仁又曰公只是一箇理仁是人心本仁人而不公則害夫仁故必體此公在人身上以為之體則無所害其仁而仁流行矣公在仁之前恕與愛在仁之後公則能仁仁則能恕能愛問恕則仁之施愛則仁之用施與用如何别曰恕是分俵那愛底如一桶水愛是水恕是分俵此水何處一杓何處二杓故謂之施愛是仁之用恕所以施愛者又曰仁之發處自是愛恕是推那愛底愛是恕之所推者若不是恕去推那愛那愛亦不能及物公而以人體之此句本似有病然若真個曉得方知這一句説得來所以程子曰公近仁蓋這個仁在這個人字上元自有這個仁合下便帶得來只為不公所以蔽塞了不出來若能公仁便流行譬如溝中水被沙土壅塞故水不流若能去了沙土水即流矣非是外面别擔水來放溝中是溝中原有此水只是被物壅遏去其塞水便流行如克己復禮為仁所謂克己去其私而已矣能去其私則天理便自流行矣不是克己了又别討個天理來放在裏面也故曰公近仁恕與愛本皆出於仁然非公則安能恕安能愛陳淳曰仁如水愛如水之潤恕是水之流先生是之天心所以至仁者惟公耳人能至公即是仁尹焞曰仁者公而已矣伊川曰何謂也曰能好人能惡人伊川曰善涵養又云何以仁惟公可以盡之伊川曰思而至此學者所難及也云云愚按上章皆以公為近仁此章謂公即仁當詳之仁則一不仁則二問云云朱子曰仁則公公則通天下只是一箇道理不仁則私意變詐百出而不一也程子曰孟子云惻隱之心仁也後人遂以愛為仁愛自是情仁自是性豈可專以愛為仁孟子言惻隱之心仁之端也既曰仁之端則不可便謂之仁退之言博愛之謂仁非也仁者固博愛然便以愛為仁則不可朱子曰仁者愛之理理是根愛是苗愛是情愛之理是仁仁者愛之理愛者仁之事仁者愛之體愛者仁之用仁是未發愛是已發愛之理愛自仁出也問韓愈博愛之謂仁曰是指情為性問周子説愛曰仁與博愛之説如何曰愛曰仁猶曰惻隱之心仁之端也是就愛處指出仁若博愛之謂仁之謂便是把博愛做仁了然不同未發時只喚做仁仁却無形影既發後方喚做愛愛却有形影未發而言仁可以包義禮智既發而惻隱可以包恭敬辭讓是非四端者端如萌芽相似惻隱方是從仁裏面發出來底問仁者愛之理看孔門答問仁多矣如克己等類愛字恐未足以盡之曰必著許多工夫所以全得那仁發出來便能愛如克己復禮如居處恭執事敬這處豈便是仁所以喚醒那仁若私欲昏蔽這裏便死了豈復有仁問伊川曰仁主乎愛愛便是仁否曰仁主乎愛者仁發出來便做那慈愛底事愛是仁之發謂愛是仁却不得程子曰學者先須識仁仁者渾然與物同體義禮智皆仁也下文云識得此理以誠敬存之而已不須防檢不須窮索若心懈則有防心茍不懈何防之有理有未得故須窮索存久自明安待窮索此道與物無對大不足以明之天地之用皆我之用孟子言萬物皆備於我須反身而誠乃為大樂若反身不誠則猶是二物有對以己合彼終未有之又安得樂訂頑意思乃備言此體以此意存之更有何事必有事焉而勿正心勿忘勿助長未嘗致纎毫之力此其存之之道若存得便合有得蓋良知良能原不喪失以昔日習心未除故須存養此心久則可奪舊習此理至約惟患不能守能既體之而樂亦不患不能守也朱子曰明道學者須先識仁一段説話極好只是説得太廣學者難入程子曰敬以直內義以方外仁也或問云云如何以此便謂之仁朱子曰亦是仁也若能到私欲淨盡天理流行處皆可謂之仁如博學篤志切問近思則仁在其中克己復禮亦是仁出門如賓使民如祭亦是仁居處恭執事敬與人忠亦是仁看從那路入但從一路入做到極處便是仁程子曰把捉不定便是不仁或問人心紛擾時難把捉先生曰真個是難把持不能久又被事物及間思慮引將去孟子牛山之木一章最要看操之則存舍之則亡或云把持不能久勝物欲不去先生曰這個不干别人事雖是難亦須自著力把持常惺惺不要放倒覺得物欲來便著緊不要隨他去若説把持不得勝他不去是自壞也更説甚為仁由己而由人乎哉張子曰天體物而不遺猶仁體事而無不在也禮儀三百威儀三千無一物之非仁也昊天曰明及爾出王昊天曰旦及爾遊衍無一物之不體也朱子曰體物猶言為物之體也蓋物物有個天理體事謂事事是仁做出來如禮儀三百威儀三千須是仁做始得凡言體便是做他那骨子問云云以見物物各有天理事事皆有仁曰然天理在物上仁體在事上本謂物以天為體事以仁為體緣須著從上説故如此下語問昊天曰明云云莫是言人之所以為人者皆天之所為故雖起居動作之頃而所謂天者未嘗不在也曰公説天體物不遺既説得是則所謂仁體事而無不在者亦不過如此今所以理會不透祇是以天與仁為有二也今須將聖賢言仁處就自家身上思量久之自見橫渠此語是將赤心片片説與人荀揚何嘗有此上蔡謝氏曰心者何也仁是己仁者何也活者為仁死者為不仁今人身上麻痺不知痛癢謂之不仁桃杏之核可種而生者謂之桃仁杏仁言有生之意推此仁可見矣又曰有知覺識痛癢便喚做仁又曰仁是四肢不仁之仁不仁是不識痛癢仁是識痛癢又曰晉伯甚好學初理會仁字不透吾因曰世人説仁只管著愛上怎生見得仁只如力行近乎仁關愛甚事却近乎仁推此類具言之晉伯悟曰公説仁字正與尊宿門説禪一般又曰儒之仁佛之覺朱子曰桃仁杏仁種著便生不生是死物所以名之曰仁以生意論仁謝子得之問知覺是仁否曰仁然後有知覺問知覺可以求仁否曰不可仁之一字上蔡只説得知仁孔子便説為仁却是要做工夫去為仁豈可道知得了便休如今學問流為禪上蔡為之首知覺自是智之事在四德為貞所以近仁者若無智便起這仁不得張無垢以覺為仁則是以智為仁二先生之前學者全不知有仁凡聖賢言仁處不過只作愛字看自二先生以來學者始知理會仁字不敢只作愛説然其流復不免有弊者蓋專務説仁而於操存涵泳之功不加無復優遊厭飫之味克己復禮之實不但其蔽也愚而已而又一向説病愛字懸空揣摸既無真實見處故其為説驚怪恍惚弊病百端殆又不若只作愛字看之為愈也竊謂若實欲求仁固莫若力行之近但不學以明之則有冥行之患故其蔽愚若主敬致知交相為用則無此蔽矣若且欲曉得仁之名義則又不若且將愛字推求若見得仁之所以為愛而愛之不能盡仁則仁之名義意思瞭然在目矣初不必求之恍惚有無之間也孟子之言知覺謂知此事覺此理乃學之至而知之盡也上蔡之言知覺謂識痛癢能酬酢者乃心之用而知之端也二者亦不同矣然其大體皆智之事也今以言仁所以多矛盾而少契合也夫以愛名仁固不可然愛之理則所謂仁之體也天地萬物與吾一體固所以無不愛然愛之之理則不為是而有也須知仁義禮智四字一般皆性之德乃天然本有之理無所為而然者但仁乃愛之理生生之道故即此而又可以包四者所以為學之要耳大抵理會仁字須并義禮智三字通看方見界分分明血脈貫通近世學者貪説仁字而忽略三者所以無所據依卒併與仁而不識也謂仁者心有知覺則可謂心有知覺謂之仁則不可問先生説仁是生意不知是仁之體否曰凡説知覺説痛癢皆是言血氣之性正如告子説生之謂性佛言作用是性如此説時却是人性與禽獸相似禽獸亦有知覺亦識痛癢遂謂禽獸為仁可乎前輩言醫家以風痺為不仁謂善狀仁者蓋取象比類之言非便指識痛癢有知覺為仁仁自是理當於義理上求之問謝氏以覺訓仁為活物要於日用間覺得這箇活物便見仁體而先生不取其説何也曰若識得仁體則所謂活物皆可通也但他説得自有病痛必竟如何是覺又如何是活物又却别將此個意思去覺那個活物方寸紛擾何以為仁上蔡之説一轉而為張子韶張子韶一轉而為陸子靜南軒張氏曰仁者必覺而覺不可以訓仁侯子嘗及之矣今之學者囂囂然自以為我知之者只是弄精神耳烏能進乎實地哉又上蔡之罪人也按近世慈湖楊氏曰智者覺之初仁者覺之全其原亦出於此或問一日靜坐見一切事平等皆在我和氣中此是仁否謝氏曰只是靜中工夫只是心虛氣平也須是應事時有此氣象方好愚按上蔡此語甚善故附此龜山楊氏問學者曰孺子將入井而見之者必有惻隱之心疾痛非在己也而為之疾痛何也對曰出於自然不可已也曰安得自然如此若體究此理知其所從來則仁之道不逺矣李似祖問何以知仁楊氏曰孟子以惻隱之心為仁之端平居試以此體察久久自見因問云云朱子屢舉以告學者因言君之所以仁蓋君是箇主腦百姓皆屬他管自然著仁愛非為不得已方如此父之所以慈子之所以孝蓋父子本同一氣一身分作兩箇自然恩愛相屬豈容強為哉且以五常言之初有陰陽便有春夏秋冬金木水火土故賦於人便有仁義禮智信仁則屬春屬木且看春間發生之初和氣藹然非仁愛而何緣他本原處有箇仁所以發於用者自然如此問論語言仁何語最為精切曰皆仁之方也若正所謂仁則未之嘗言惟孟子言仁人心也最為精切又曰孔子告諸弟子只是言仁之方蓋擴之使從此來以至於仁若仁之本體則未嘗言又問讀論語以何為要曰要在知仁孔子説仁處最宜玩味曰孔子説仁處甚多尤的當是何語曰皆的當但其門人所至有不同故其答之亦異只如言剛毅木訥近仁自此而求之仁之道亦自可知朱子仁説曰天地以生物為心者也而人物之生又各得夫天地之心以為心者也故語心之德雖其總攝貫通無所不備然一言以蔽之則曰仁而已矣蓋天地之心其德有四曰元亨利貞而元無不統其運行焉則為春夏秋冬之序而春生之氣無所不通故人之為心其德亦有四曰仁義禮智而仁無不包其發用焉則為愛恭宜别之情而惻隱之心無所不貫故論天地之心者則曰乾元坤元則四德之體用不待悉數而足論人心之妙者則曰仁人心也則四德之體用亦不待遍舉而該蓋仁之為道乃天地生物之心即物而在情之未發而此體已具情之既發而其用不窮誠能體而存之則衆善之源百行之本莫不在是此孔門之教所以必使學者汲汲於求仁也其言曰克己復禮為仁言能克去已私復乎天理則此心之體無不在而此心之用無不行也又曰居處恭執事敬與人忠則亦所以存此心也又曰事親孝事兄悌及物恕則亦所以行此心也又曰求仁得仁則以讓國而逃諫伐而餓為能不失乎此心也又曰殺身成仁則以欲甚於生惡甚於死為能不害乎此心也此心何心也在天地則坱然生物之心在人則溫然愛人利物之心包四德而貫四端者也或曰若子之言則程子所謂愛情仁性不可以愛為仁者非歟曰不然程子之所謂以愛之發而名仁者也吾之所論以愛之理而名仁者也蓋所謂性情者雖其分域之不同然其脈絡之通各有攸屬者則曷嘗判然離絶而不相管哉吾方病夫學者誦程子之言而不求其意遂至於判然離愛而言仁故特論此以發明其遺意而子顧以為異乎程子之説不亦誤哉或曰程氏之徒言仁多矣蓋有謂愛非仁而以萬物與我為一為仁之體者矣亦有謂愛非仁而以心有知覺釋仁之名者矣今子之言若是然則彼皆非歟曰彼謂物我為一者可以見仁之無不愛矣而非仁之所以為體之真也彼謂心有知覺者可以見仁之包乎智矣而非仁之所以得名之實也觀孔子答子貢博施濟衆之問與程子所謂覺不可以訓仁者則可見矣子尚安得復以此論仁哉抑泛言同體者使人含胡昏緩而無警切之功其弊或至於認物為己者有之矣專言知覺者使人張皇迫躁而無沈潛之味其弊或至於認欲為理者有之矣一忘一助二者蓋胥失之而知覺之云者於聖門所示樂山能守之氣象尤不相似子尚安得復以此而論仁哉先生既為仁説南軒以書論難今略具往復之語於此問天地以生物為心此語恐未安答竊謂此語恐未有病蓋天地之間品物萬形各有所事惟天確然於上地隤然於下一無所為只是生物而已故易曰天地之大德曰生程子亦曰天只是以生為道所謂以生為道者非謂將生來做道凡若此類恐當且認正意不以文害辭可也問不忍之心可以包四者乎答孟子論四端自首章至孺子入井皆只是發明不忍之心一端而已初無義禮智之説至下文乃云無四者之心非人也此可見不忍之心足以包夫四端蓋仁包四德故其用亦如此問云云答人生而靜四德具焉曰仁曰義曰禮曰智皆根於心而未發所謂理也性之德也及其發見則仁者惻隱義者羞惡禮者恭敬智者是非各因其體以見其本所謂情也性之發也是皆人性之所以為善也但仁乃天地生物之心而在人者故特為衆善之長雖列於四者之目而四者不能外焉易傳所謂專言之則包四者亦是正指生物之心而言非别有包四者之仁而又别有主一事之仁也惟是即此一事便包四者此則仁之所以為妙也云云問程子之所謂正謂以愛名仁者答按程子曰仁性也愛情也豈可便以愛為仁此正不可認情為性耳非謂仁之性不發於愛之情而愛之情不本於仁之性也某前説以性之發對愛之理而言正分别性情之異處來諭乃云若專以愛命仁乃是指其用而遺其體言其情而略其性察之亦不審矣蓋所謂愛之理者是乃指其體性而言且見性情體用各有所主而不相離之妙與所謂遺體而略性者正相南北也問元之為義不專主於生答曰竊詳此語恐有大病請觀諸天地而以易彖文言程傳反覆求之當見其意此乃義理根源不容有毫釐之差也再書又云謹按程子言仁本末甚備今撮其大要不過數語蓋曰仁者生之性也而愛其情也孝悌其用也公者所以體仁猶言克己復禮為仁也學者於前三言可以識仁之名義於後一言可以知其用力之方矣今不深考其本末指意之所在但見其分别性情之異便謂愛之與仁了無干涉見其以公為近仁便謂直指仁體最為深切殊不知仁乃性之德而愛之本因其性之有仁是以其情能愛但或蔽於有我之私則不能盡其體用之妙惟克己復禮曠然大公然後此體渾全此用昭著動靜本末血脈貫通爾程子之言意蓋如此非謂愛之與仁無相涉也夫性發為情情根於性未有無性之情無情之性各為一物而不相管者公者所以體仁亦非謂公之一字便是直指仁體也仁是本有之性生物之心惟公為能體之非因公而後有也由漢以來以愛言仁之弊正為不察性情之辨而遂以情為性耳今欲矯其弊反使仁字泛然無所歸宿而性情遂至於不相管可謂矯枉過直是亦枉而已矣其弊將使學者終日言仁而實未嘗識其名義程子之意恐不如此南軒復書略曰仁之説前日之意蓋以為推原其本人與天地萬物一體也是以其愛無所不至猶人之身無尺寸之膚而不貫則無尺寸之膚不愛也故以惟公近之之語形容仁體最為深切而以所言愛字只是明得其用耳後來詳所謂愛之理之説方見其親切蓋探其本則未發之前愛之理存乎性是乃仁之體也察其動則已發之際愛之施被乎物乃仁之用也前日又謂元之義不專主於生物者疑只云生物説生生之意不盡今詳所謂生物者亦無不盡矣二先生往返切摩始若異而終歸於同故略載於此孟子曰仁人心也此言最親切心自是仁若能保養存得此心不患他不仁孔門學者問仁不一聖人答之亦不一然大槩不過要人保養得此而已又曰學者須是求仁所謂求仁者不放此心聖人只教人求仁蓋仁義禮智四者仁足以包之若存得仁自然頭頭做著不用逐事安排故曰茍志於仁矣無惡也看大學亦要識此意所謂顧天命無他求其放心而已又曰仁是無形迹事孟子恐人理會不得便説道只人心便是却不是把仁來形容人心乃是把人心來指示仁所謂放其心而不知求蓋存得此心便是仁若此心放了又理會甚仁今人之心靜時昏動時擾皆是放了又曰仁是本心之德存得此心便無不仁如説克己復禮亦只是要得私欲去後本心常存耳或謂無私欲是仁朱子曰謂無私然後仁則可謂無私即是仁則不可蓋惟無私而後仁始見如無所壅底而後水方行又曰五峯云人有不仁心無不仁此説極好人有私欲却遮蔽了不見仁然中心仁依舊在如水被泥塞所以不流泥土既去水仍舊只在所以克己復禮為仁只是克了私意仁依然在那裏學者克己復禮工夫到私欲盡後便粹然是天地生物之心或問仁曰無以為也須是誠去打疊私欲然後子細體驗本心之德是甚氣象毋徒講文義而已矣又曰惟無私然後仁惟仁然後與天地萬物為一體或曰與天地萬物為一體是仁或曰無私是仁朱子曰無私是仁之前事與天地萬物為一體是仁之後事要在二者之間識得如何是仁云云欲識仁字大槩當即不仁之人觀之蓋其心頑如鐵石不認義理專認己私是以謂之不仁識此氣象則仁之為道可推而知矣孔子亦有偏言之者愛人是也孟子亦有專言之者仁人心是也又曰孔子只是説為仁工夫至孟子方解仁字之義理然仁字又兼兩路非一言之可盡故孔子教人亦有兩路克己即孟子仁人心之説愛人即孟子惻隱之説又答學者言日前所示教引巧言令色剛毅木訥兩條以為聖人所以開示知仁之方使之自得竊有疑焉蓋此兩語正是聖人教人實下工夫防患立心之一術果能戒巧令務純朴則心不恣縱而去仁為近矣非徒使之由是而知仁也大抵向來之説多是苦心殫力要識仁字故其説愈巧而氣象愈薄近日究觀聖人垂教之意却是要人躬行實踐直內勝私使輕浮刻薄貴我賤物之私潛消於冥冥之中而吾之本心渾厚慈良公平正大之體常存而不失便是仁處其用工著力隨人淺深各有次第要之須待力行久熟實到此地方知此意味非可以臆度料想而知亦不可臆度料想而得也又云王信伯在館中范伯達言人須是使萬物一一皆歸吾仁王指窗以問曰此窗還歸仁否范默然某見當答曰此窗不歸仁何故不打壞了如人處事但箇箇處得是便是天下歸仁凡論語中答諸弟子問仁如告之以主敬行恕先難後獲之類無往不是藥人之病則是其人未到仁者地位未可以抽關啓鑰告之且為之安下一箇為仁根腳待根腳平正牢固然後却可語之以仁曰此段看得大有病告樊遲三語便與告顔淵仲弓都無異故程子曰此是徹上徹下語安得謂姑為之立根腳乎若此只是安立根腳即不知如何方是正下手為仁處耶或問吕氏孟子惻隱説曰蓋實傷吾心非譬之也然後知天下皆吾體生物之心皆吾心彼傷則我傷非謀慮所及非勉強可能此所謂皆吾體皆吾心者亦只是以同理言之否曰非但同理亦同氣也以上諸説皆剖析語孟言仁之要義故附此南軒張氏仁説曰人之性仁義禮智四德具焉其愛之理則仁也宜之理則義也讓之理則禮也知之理則智也是四者雖未形而其理固根於此則體實具於此矣性之中只有是四者萬善皆管乎是焉而所謂愛之理者是乃天地生物之心而其所由生者也故仁為四德之長而又可以兼包焉惟性之中有是四者故其發見於情則為惻隱羞惡辭遜是非之端而所謂惻隱者亦未嘗不貫通焉此性情之所以為體用而心之道則主乎性情者也人惟己私蔽之以失其性之理而為不仁甚至於為忮為忍豈人之情也哉是以為仁莫要乎克己己私既克則廓然大公而其愛之理素具於性者無所蔽矣則與天地萬物血脈貫通而其用亦無不周矣故指愛以名仁則迷其體程子所謂愛是情仁是性謂此而愛之理則仁也指公以為仁則失其真程子所謂仁道難名惟公近之不可便指公為仁者謂此而公者人之所以能仁也夫靜而仁義禮智之體具動而惻隱羞惡辭遜是非之端達其名義位置固不容相奪倫然而惟仁者為能恭儉而有節是禮之所存也惟仁者為能知覺而不昧是智之所存者也此可見其兼包而貫通者是以孟子於仁統言之曰仁人心也亦猶在易乾坤四德而統言乾元坤元也然則在學者其可不以求仁為要而為仁其可不以克己為道乎按南軒仁説與朱子大指悉同可以觀二先生之學矣又曰愛者仁之施也而愛不足以名仁恕者仁之方也而恕不足以言仁知覺者仁之幾也而知覺不足以言仁公平者仁之則也而公平不足以言仁極廣大者仁之體也而廣大不足以言仁至親切者仁之用也而親切不足以言仁然以是數者精思而力體焉則亦可以知仁矣又答學者曰近者學者論仁字多是要見得仁字意思縱使逼真亦終非實得看論語中聖人所言只欲人下工夫升髙自下陟遐自邇循序積習自有所至又曰垂諭仁之説若只將做周流無滯凝氣象看了却只是想像願於日用間更因其發見苗裔而深察默求之勿舍勿棄當灼然見其樞機之所由發者矣又曰謝上蔡論語序前面發得甚好但後面説天地同流處太多適所以啓學者想象不帖實之心聖人教人大抵只説做工夫工夫到處自然見得若先與之説道理如何彼便想象去論語中皆是從自家身上一言一行做去如顔子問仁則曰克己復禮為仁顔子便問克己之目蓋下克己工夫將久自見得到仁處也按以上數條皆足以破近世空言想象之弊故附此又遂初賦云皇降衷于下民兮粵惟其常猗於穆而難名兮惟生之良翕衆美而具存兮不顯其光彼孩提而知愛親兮豈外鑠繄中藏年燁燁而寖長兮紛事物之交相非元聖之生知兮懼日逺而日忘緣氣稟之所偏兮橫流始夫濫觴感以動兮不止乃厥初之或戕既志帥之莫御氣決驟以翺翔六情放而曷禦百骸弛而孰強自青陽而逆旅暨黃髮以茫茫儻矍然於中道盍反求於厥初厥初如何夫豈逺歟彼匍匐以向阱我惻隱之卷如驗端倪之所發識大體之權輿如寐而聰如迷而途知睨視之非遐乃本心之不渝嗚呼豫既知其然兮豫惟以遂之若火始然而泉始達兮惟不息以終之豫視兮毋流豫聽兮毋從豫言兮毋易豫動兮以躬惟自反兮於理兹日新兮不窮逮充實而輝光信天質之本同極神存而過化亘萬世以常通嗚呼此羲文之所謂復而顔氏之所以為萬世道學之宗歟此賦示人以體驗踐行之實尤為切至學者猶當深味也昔有問仁於程子者子曰此在諸君自思之將聖賢言仁處類聚觀之體認出來又曰義訓宜禮訓别知訓知仁當何訓説者謂訓覺訓人皆非也當合觀孔孟言仁處大槩研窮之二三歲得之未晚也至南軒張先生裒洙泗言仁為一編而朱子乃以書告之曰類聚孔孟言仁處求夫其説程子為人之意可謂深切然專一如此却不免於欲速好徑之心滋入耳出口之弊亦不可不察南軒報書曰教之求仁正恐其有此弊耳朱子復書前日所謂正為近日學者厭煩就簡避迂求捷相沿之盛方且趨於薄恐益長其計獲欲速之心而反陷於不仁爾然却不思所類諸説其中下學上達之方蓋已無所不具茍能深玩而力行之則又安有此弊今得來諭始悟前説之非然猶恐不能人人皆肯如此慤實用功則亦未免過計之憂不知可更作一後序略采此意以警後之學者否不然或只盡載此諸往返議論以附其後如何南軒然之遂悉載其語於卷首嗚呼二先生之為學者慮也至矣今類輯此編亦恐有如二先生所慮者故書之篇末以自警云右專言仁西山讀書記卷七
