body:
  text: 西山讀書記卷二十八宋真德秀撰堯舜禹湯文武𫝊授虞書允執厥中帝王𫝊心之要典也語堯曰咨爾舜天之厯數在爾躬允執其中四海困窮天祿永終朱子曰此堯命舜而禪以帝位之辭厯數帝王相繼之次第猶嵗時氣節之先後也允信也中者無過不及之名四海之人困窮則君祿亦永絶矣戒之也舜亦以命禹即虞書所載危微精一之訓是也已見前篇曰豫小子履敢用𤣥牡敢昭告於皇皇后帝有罪不敢赦帝臣不蔽簡在帝心朕躬有罪無以萬方萬方有罪罪在朕躬此引商書湯誥之辭蓋湯既放桀而告諸侯也與書文大同小異曰上當有湯字履蓋湯名用𤣥牡夏尚黑未變其禮也簡閲也言桀有罪已不敢赦而天下賢人皆上帝之臣己不敢蔽簡在帝心惟帝所命此述其初請命而伐桀之詞也又言君有罪非民所致民有罪實君所為見其厚於責己薄於責人之意此其告諸侯之辭也周有大賚善人是富此以下述武王事賚豫也武王克商大賚於四海見周書武成篇此言其所富者皆善人也詩序云賚所以錫豫善人蓋本於此雖有周親不如仁人百姓有過在豫一人此周書秦誓之詞孔氏曰周至也言紂至親雖多不如周家之多仁人謹權量審法度修廢官四方之政行焉權稱錘也量斗斛也法度禮樂制度皆是也興滅國繼絶世舉逸民天下之民歸心焉興滅繼絶謂封黃帝堯舜夏商之後舉逸民謂釋箕子之囚復商容之位三者皆人心之所欲也所重民食喪祭武成曰重民五教惟食喪祭寬則得衆信則民任焉敏則有功公則說此於武王之事無所見恐或泛舉帝王之道也楊氏曰論語之書皆聖人微言而其徒傳守之以明斯道者也故於終篇具載堯舜咨命之言湯武誓師之意與夫施諸政事者以明聖學之所傳者一於是而已所以著明二十篇之大㫖也孟子於終篇亦厯叙堯舜湯文孔子相承之次皆此意也南軒曰此篇所載帝王之事孔子之所常言門人列於末章所以示後世之大法也黃氏曰論語末篇厯叙堯舜禹湯武王相傳之道而先之以執中可謂得其要矣至其下乃泛及于賞善罰惡責己恕人大綱小紀本數末度無不具舉者蓋帝王之道初無精粗惟其合於天理當於人心者是其所以為道也所謂執中者正以其事事物物無適而非中也是豈空虛無據而可謂之中乎哉然後知聖賢相傳之道無非實理非若老釋氏空無之謂也子畏於匡曰文王既沒文不在茲乎朱子曰道之顯者謂之文不曰道而曰文謙辭也茲此也孔子自謂天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如豫何馬氏曰文王既沒故孔子自謂後死者言天若欲喪此文則必不使我得與於此文今我既得與於此文則是天未欲喪此文也天既未欲喪此文則匡人其奈我何言必不能違天害己也南軒曰文王既沒文不在茲聖人以斯文為己任也己之在與亡斯文之喪與未喪係焉是豈人之所能為哉天也不曰喪已而曰喪斯文蓋己之身即斯文之所在也子曰甚矣吾衰也久矣吾不復夢見周公朱子曰孔子盛時志欲行周公之道故夢寐之間如或見之至其老而不能行也則無復是心而亦無復是夢矣故因此而自歎其衰之甚也程子曰孔子盛時寤寐常存行周公之道及其老也則志慮衰而不可以有為矣蓋存道者心無老少之異而行道者身老則衰也或問孔子不夢周公之說程子以為初實未嘗夢也如何曰孔子自言不夢之久則其前固嘗夢之矣程子之意蓋嫌於因思而夢者故為此說其義則精矣然恐非夫子所言之本意也衛公孫朝問於子貢曰仲尼焉學子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉夫子焉不學而亦何嘗師之有朱子曰文武之道謂文王武王之謨訓功烈與凡周之禮樂文章皆是也在人言人有能記之者又曰此言未墜落於地而猶在人耳賢者則能記其道之大者不賢者則能記其道之小者皆有文武之道夫子皆師之也或問何以言文武之道為周之禮樂也曰此固好髙者之所不樂聞然其文意不過如此以未墜在人之云者考之則可見矣若曰道無適而非唯所取而得則又何時墜地且何必賢者識其大不賢者識其小而後得師耶此所謂人正謂老𣆀萇𢎞郯子師襄之儔耳若入太廟而每事問焉則廟之祝史亦其一師也大率近世學者習於老佛之言皆有厭薄事實貪騖髙逺之意故其說常如此不可以不戒也然彼所謂無適而非者亦豈離於文章禮樂之間哉但子貢本意則正指其事實而言不如是之空虛恍惚而無所據也南軒曰文武之道謂周家之制度典章在當時猶有存者未至盡泯也在人所識何如賢者則識其大者不賢者則識其小者至如鄉黨之間其冠昏喪祭日用飲食亦習乎其教而不自知也然則夫子焉往而非學唯善之主而初無常師也此其所以能集文武之道而極其大全歟中庸仲尼祖述堯舜憲章文武朱子曰祖述者遠宗其道憲章者近守其法游氏曰中庸之道至仲尼而集大成故此書之末以仲尼明之道著於堯舜故祖述焉法詳於文武故憲章焉呂氏曰祖述者推本其意憲章者循守其法孟子宰我曰以豫觀於夫子賢於堯舜遠矣程子曰語聖則不異事功則有異夫子賢于堯舜語事功也蓋堯舜治天下夫子又推其道以垂教萬世堯舜之道非得孔子則後世亦何所據哉或問三代以前只是說中說極至孔門答問說者便是仁何也朱子曰說中說極今人多錯㑹了文義今未暇詳說但至孔門仁字則是列聖相傳到此方漸次說到親切處爾夫子之所以賢於堯舜亦其一端也孟子曰舜生於諸馮遷於負夏卒於鳴條東夷之人也文王生於岐周卒於畢郢西夷之人也地之相去也千有餘里世之相後也千有餘嵗得志行乎中國若合符節先聖後聖其揆一也朱子曰揆度也其揆一者言度之而其道無不同也范氏曰言聖人之生雖有先後逺近之不同然其道則一也南軒曰先聖後聖莫非一揆孟子獨舉舜與文王言之者蓋其地相去為最逺而世相去為最久故耳所謂得志行乎中國者聖人之道化行乎天下是所謂行志者也然自今觀之舜與文王所值之時周旋於父子君臣之際者蓋不同矣孟子謂若合符節者何耶蓋道一而已其所以一者天之理也若夫人為則萬殊矣聖人者純乎天理者也純乎天理則其云為注措莫非天之所為而有二乎哉故舜之所以事瞽瞍者是文王所以事王季者也而文王之事紂是舜所以事堯者也文王之憂勤是舜無為而治者也舜與文王易地則皆然何者舜與文王皆天也使其間有一毫不相似則不曰若符節之契矣然舜與文王之所以為天者則抑有道矣堯舜文王生知之聖也亦必學以成之惟精惟一允執厥中者舜之學也緝熙敬止克宅厥心者文王之學也即其生知之聖而學以成之此其所以為天之無疆也學者讀此章深究所以一者於此有得則先聖後聖之心可得而識矣孟子曰舜明於庶物察於人倫由仁義行非行仁義也說已見前孟子曰禹惡㫖酒而好善言湯執中立賢無方文王視民如傷望道而未之見武王不泄邇不忘逺周公思兼三王以施四事其有不合者仰而思之夜以繼日幸而得之坐以待旦朱子曰此承上章言舜因厯叙羣聖以繼之而各舉其一事以見其憂勤愓厲之意蓋天理之所以常存人心之所以不死也程子曰孟子所稱各因其一事而言非謂武王不能執中立賢湯却泄邇忘逺也人謂各舉其盛亦非也聖人亦無不盛南軒曰於是四者而窺四聖人之心則可見其運而不息化而不滯其天地之心歟孟子曰王者之迹熄而詩亡詩亡然後春秋作晉之乘楚之檮杌魯之春秋一也其事則齊桓晉文其文則史孔子曰其義則丘竊取之矣朱子曰此承上章列叙羣聖因以孔子之事繼之而孔子之事莫大於春秋故特言之孟子曰君子之澤五世而斬小人之澤五世而斬豫未得為孔子徒也豫私淑諸人也朱子曰私猶竊也淑善也人謂子思之徒也孟子言豫雖未得親受業於孔子之門然聖人之澤尚存猶有能傳其學者故我得聞孔子之道於人而私竊以善其身蓋推尊孔子而自謙之辭至此又承上三章厯叙舜禹至於周孔而以是終之其辭雖謙然其所以自任之重亦有不得而辭者矣孟子曰昔者禹抑洪水而天下平周公兼夷狄驅猛獸而百姓寧孔子成春秋而亂臣賊子懼詩云戎狄是膺荆舒是懲則莫我敢承無父無君是周公所膺也我亦欲正人心息邪說距詖行放淫辭以承三聖者豫豈好辨哉豫不得已也詳見後篇孟子曰由堯舜至於湯五百有餘嵗若禹臯陶則見而知之若湯則聞而知之趙氏曰五百嵗而聖人出天道之常然亦有遲速不能正五百年故言有餘也尹氏曰知謂知其道也由湯至於文王五百有餘嵗若伊尹萊朱則見而知之若文王則聞而知之趙氏曰萊朱湯賢臣或曰即仲虺也由文王至於孔子五百有餘嵗若太公望散宜生則見而知之若孔子則聞而知之散氏宜生名文王賢臣也由孔子而來至於今百有餘嵗去聖人之世若此其未遠也近聖人之居若此其甚也然而無有乎爾則亦無有乎爾林氏曰孟子言孔子生今時未逺鄒魯相去又近然而已無有見而知之者矣則五百餘嵗之後又豈復有聞而知之者乎朱子曰按此言雖若不敢自謂己得其傳而憂後世遂失其傳然乃所以自見其有不得辭者而又以見夫天理民彛不可泯滅百世之下必將有神㑹而心得之者耳故於篇終厯序羣聖之統而終之以此所以明其傳之有在而又以俟後聖於無窮也其指深哉南軒曰道不為古今而有加損聖人先得我心之所同然者耳茍得其所同然則雖越宇宙與親見之何以異哉愚按臯陶伊尹萊朱太公望散宜生皆與斯道之傳今考之臯陶謨伊訓太甲咸有一德諸篇則二人之學至精至粹其得與羣聖之列也宜哉萊朱若誠仲虺則固伊尹之亞也太公望於書無所見惟大戴禮踐阼篇武王問道於太公望公奉丹書以入所陳者敬義仁之道其所以為文武之師者亦豈茍哉後世特以為兵家之祖蓋未然也散宜生之名一見於書而傳道之事則無所考至于獨言文王而不及武王周公則以父子同道舉文王則餘在其中故爾或者遂謂孟子有不取武王之意豈其然耶韓子曰斯道何道也曰斯吾所謂道也非向所謂老與佛之道堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔子傳之孟軻軻之死不得其傳焉荀與揚擇焉而不精語焉而不詳程子曰退之因學文日求所未至遂有所得如曰軻之死不得其傳似此言語非蹈襲前人又非鑿空撰出必有所見若無所見不知言所傳者何事張子曰孔孟而後其心不傳如荀揚皆不能知以上總叙堯舜禹湯文武周孔傳授然其所傳之道若堯舜禹之中湯文之敬武王之極周公之禮樂孔子之六經與凡心學性學之類各已散見諸篇合而觀之然後見聖賢傳授之全體又非此篇所能悉該也孔子顔曾傳授語顔淵問仁子曰克己復禮為仁一日克己復禮天下歸仁焉為仁由己而由人乎哉顔淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顔淵曰回雖不敏請事斯語矣說己見言仁篇子曰回也其心三月不違仁其餘則日月至焉而已矣說己見言仁篇顔淵喟然嘆曰仰之彌髙鑽之彌堅瞻之在前忽然在後朱子曰仰彌髙不可及鑽彌堅不可入在前在後恍惚不可為象顔淵深知夫子之道無窮盡無方體而嘆之也夫子循循然善誘人博我以文約我以禮循循有次序貌誘引進也博文約禮教之序也言夫子道雖髙妙而教人有序也侯氏曰博我以文致知格物也約我以禮克己復禮也程子曰此顔子稱聖人最切要處聖人教人惟此二事而已欲罷不能既竭吾才如有所立卓爾雖欲從之末由也已此顔子自言其學之所至也蓋悅之深而力之盡所見益親而又無所用其力也吳氏曰所謂卓爾亦在乎日用行事之間非所謂窈𡨕昏默者程子曰到此地位工夫尤難直是峻絶又大段著力不得楊氏曰可欲之謂善充而至于大力行之積也大而化之則非力行所及矣此顔子所以未達一間也胡氏曰無上事而喟然嘆此顔子學既有得故述其先難之故後得之由而歸功於聖人也髙堅前後語道體也仰鑽瞻忽未領其要也唯夫子循循善誘先博我以文使我通古今達事變然後約我以禮使我尊所聞行所知如行者之赴家食者之求飽是以欲罷而不能盡心盡力不少休廢然後見夫子所立之卓然雖欲從之末由也已是蓋不怠所從必欲至乎卓立之地也抑斯嘆也其在請事斯語之後三月不違之時乎夫子教顔子只是博文約禮兩事自堯舜以來便如此說惟精便是博文惟一便是約禮博我以文是要四方八面却見得周匝無遺至於約之以禮又要逼向身己上來無一毫之不盡瞻仰鑽忽見得猶未親切在如有所立卓爾方始親切雖欲從之末由也己只是腳步未到蓋不能得似聖人從容中道也或問云云曰此是顔子當初尋討不著時節仰之煞髙一層之上又有一層鑽之又堅透一重又有一重瞻之却似前又到著力趕上又却在後然夫子教人又却循循善誘既博之以文又約之以禮只如此教我去下工夫久而後見道體卓爾立在這裏此已得親切處然雖欲從之却又末由也己此是顔子未達一間時說己當初捉摸不著時事顔子初見聖人之道廣大如此欲向前求之轉覺無下手處退而求之則見聖人所以循循善誘者不過博文約禮於是就此處竭力求之而所見始親切的當如有所立卓爾在前而嘆其峻絶著力不得也顔子仰鑽瞻忽初是捉摸不著夫子不就此啓發顔子只博之以文約之以禮令有用功處顔子做這工夫漸見得分曉至于欲罷不能已是住不得了及夫既竭吾才如此精專方見夫子動容周旋無不中處皆是天理之流行卓然如此分曉到這裏只有個生熟顔子生些少未能渾化如夫子故曰雖欲從之末由也已問云云曰未到這裏須著力到這處自是用力不得如孔子六十而耳順七十而從心這處如何用力得只熟了自然恁地去橫渠曰大可為也化不可為也在熟之而已所謂瞻之在前忽然在後只是個中庸不可能蓋聖人之道是個恰好底道理所以不可及自家才著意去做不知不覺又蹉過了且如恭而安固是聖人不可及處到得自家才著意去學時便恭而不安了此其所以不可能只是難得到那恰好處不著意又失了才著意又過了所以難橫渠曰髙明不可窮博厚不可極則中道不可識蓋顔子之歎也雖說得拘然亦自說得好或曰伊川過不及之說亦是此意否曰然南軒曰誦味此章則顔子學聖人終始之功孔子教人先後之序與夫聖人之道之至皆可得而研求矣黃氏曰此章髙堅前後之嘆所立卓爾之言顔子之見固非後學所可窺測然以其不可窺測也故言之者往往流於恍惚無所據依之地敢于為言者反借老佛之說以議聖人其不敢者則委之於虛無不可測識之域故此章最為難曉惟吳氏以為亦在日用常行之間者最為切實今竊以其意而推之夫聖人之道固髙明廣大不可幾及然亦不過性情之間動容之際飲食起居交接應酬之務君臣父子兄弟夫婦之常出處去就辭受取舍以至於政事設施之間無非道之所寓其所謂髙堅前後者他人于此或未能無纎毫之私或未能逹義理之正或未能通權變之宜或未能極從容之妙故仰之但見其髙鑽之但見其堅或前或後而無定所也顔子用力亦不過於博文約禮之間而竭其力則見益精行益熟而於聖人情性動容以至政事設施之類皆有以見其當然之則卓然立乎其前耳初非有深逺不可窮詰之事也以上三章乃孔顔傳心要指今本胡氏之說以問仁為首不違仁次之此章又次之餘章則係於後云子曰吾與回言終日不違如愚退而省其私亦足以發回也不愚朱子曰不違者意不相背有聽受而無問難也私謂燕居獨處非進見請問之時發謂發明所言之理愚聞之師曰顔子深潛純粹其於聖人體段已具其聞夫子之言默識心融觸處洞然自有條理故終日言但見其不違如愚人而已及退省其私則見其日用動靜語默之間皆足以發明夫子之道坦然由之而無疑然後知其不愚也或問先儒之說曰曾氏胡氏張敬夫之說亦善曾氏曰入乎耳著乎心默而識之故不違如愚退而察其踐履則布乎四體形乎動靜故足以發胡氏曰顔子之質鄰於生知故聞夫子之言心通默識不復問辨反如愚蒙之未逹者及侍坐而退夫子察其燕私則其視聽言動皆能以聖人所教隨用發見然後知向之所謂愚者乃所謂上智也然聖人久已知顔子之不愚矣而必曰退而省其私之云者所以見其非無證之空言且以明進德之功必內外相符隱顯一致欲學者之謹其獨也嗚呼夫子與回言終日則言多矣而今存者無幾可勝惜哉張敬夫曰夫子之言顔子皆能體之於日用間所以夫子退而省其私而知其足以發明斯道乃其請事斯語之驗也問顔子省其私不必指燕私只是他自作用處曰便是這意思但恐沒著落只得說燕私謂如人相對坐心意默有趨向亦是私如謹獨之獨亦非特在幽隱人所不見處只他人之所不知雖在衆中便是獨也問亦足以發莫是所以發明夫子所言之㫖否曰然且如夫子告以非禮勿視聽言動顔子受用不復更問如何是禮與非禮但是退而省察顔子之所為則直是視聽言動無非禮也此則足以發明夫子之言也問李先生謂顔子聖人體段已具莫只是言個模樣否曰然顔子去聖人不爭多其所以不及聖人者只是須待聖人之言觸其機乃能通曉爾問默識心融如何曰融如消融相似融如雪之在湯若不融一句只是一句在胸中如何發得出來如人飲若不消化如何能滋益體膚如孔子告曾子一貫之語他人聞之只是個一貫曾子聞之便能融化發得忠恕之說出來子謂子貢曰女與回也孰愈對曰賜也何敢望回回也聞一以知十賜也聞一以知二朱子曰一數之始十數之終二者一之對也顔子明睿所照即始而見終子貢推測而知因此而識彼無所不恱告往知來是其驗矣子曰弗如也吾與女弗如也與許也胡氏曰子貢方人夫子既語以不暇又問其與回孰愈以觀其自知如何聞一知十上知之資生知之亞也聞一知二中人以上之資學而知之才也子貢平日以己方回見其不可企及故喻之如此夫子以其自知之明而又不難於自屈故既然之又重許之此其所以終聞性與天道不特聞一知二而已或問云云曰胡氏亦得其㫖胡氏曰聞一知十舉始知終無不盡也聞志學則知從心不踰矩之妙聞可欲之善則知聖而不可知之神聞一知二者序而進類而達也語以出告反面而知昏定晨省語以徐行後長而知天顯克恭子曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂賢哉回也朱子曰顔子之貧如此而處之泰然不以改其樂故夫子深歎美之程子曰顔子之樂非樂簞瓢陋巷也不以貧寠纍其心而改其所樂也故夫子稱其賢又曰簞瓢陋巷非可樂蓋自有樂爾其字當玩味自有深意又曰昔受學於周茂叔每令尋仲尼顔子樂處所樂何事按程子之言引而不發蓋欲學者深思而而自得之今亦不敢妄為之說學者但當從事於博文約禮之誨以至於欲罷不能而竭其才則庶乎有以得之矣或問顔樂之說程子答鮮于侁之問其意何也曰程子蓋曰顔子之心無少私欲天理渾然是以日用動靜之間從容自得而無適不樂不待以道為可樂然後樂也問學者看文字如何對曰方思量顔子樂處先生曰不用思量他只是博我以文約我以禮然後見得天理分明日用間義理純熟不被人欲來苦楚自恁地快活而今只去博文約禮便自見得若只索之於杳𡨕無朕之際何益只要著實用工問顔子樂處曰未到他地位如何便能知得他樂處且要得就他實下工夫處做下稍亦須會到他樂時節顔子胸中自有樂地雖貧寠不以纍其心不是將那不以貧寠纍心底做樂明道曰百官萬務金革百萬之衆曲肱飲水樂亦在其中問伊川所謂其字當玩味是如何曰是元有此樂問濓溪教程子尋孔顔樂處如何曰先賢到樂處己自成就向上了非初學所能求况今師非濓溪友非二程不如且就聖賢著實用工處求之如克己復禮致謹於視聽言動之間久久當自純熟充達向上處孔顔雖同此樂然顔子未免有意問云云曰不要去孔顔身上問只去自家身上討問程子曰使顔子以道為樂則非顔子周子顔子章又却似言以道為樂先生曰顔子之樂非是自家有這道至富至貴只管把來玩弄後樂見得這道理後自是樂故曰見其大則心泰心泰則無不足無不足則富貴貧賤處之一也問云云曰程子之言但謂聖賢之心與道為一故無適而不樂若以道為一物而樂之則心與道二非所以為顔子爾若某人之云乃老佛緒餘非程子本意又問伊川云云曰如何曰樂道之言不失只是說得不精切故如此告之今便以為無道可樂却走作了問如鄒侍郎引此謂今日始見伊川面已入禪去曰然曾㸃之樂是見得如此顔子之樂是工夫到那裡南軒曰此不可以想像求也惟用力於克己則庶幾其得之耳黃氏曰集注或問二說不同何也曰博文約禮顔子所以用其力於前天理渾然顔子所以求其功於後博文則知之明約禮則守之固凡事物當然之理既無不洞曉而窮通得喪與凡可憂可喜之事舉不足以纍其心此其所以無少私欲天理渾然蓋有不期樂而樂者矣子謂顔淵曰用之則行舍之則藏惟我與爾有是夫尹氏曰用舍無與於己行藏安於所遇命不足道也顔子幾於聖人故亦能之朱子曰用之則行舍之則藏此八字極要人玩味若他人用之則無可行舍之則無可藏唯孔顔先有此事業在己分內若用之則見成將出來舍之則藏了他人豈有是哉故下文云唯我與爾有是夫有是二字當如此首問命不足道也曰如常人用之則行乃所願舍之則藏是自家命恁地不得已不奈何聖人無不得已底意思聖人用我便行舍我便藏無不奈何底意思何消得更言命聖人說命只是為中人以下說如道之將行將廢聖人欲曉子服景伯故以命言只看義理如何都不問那命雖使前面做得去若義去不得也只不做若中人之情則見前面做不得了方休方委之於命若使前面做得定不肯己所謂無可奈何而安之若命也此固賢於世之貪冒無知者矣然實未能無求之之心也聖人更不問命只看義如何貧富貴賤惟義所在所謂安於所遇也如顔子之安于陋巷他那曾計較命如何南軒曰用之則行舍之則藏龍德正中隨時隱見者也蓋君子所性大行不加窮居不損道固自若也因時用舍而有行藏耳惟顔子幾於此故足以與此南軒初本云其行也豈有意於行之其舍也豈有意於藏之朱子曰聖人固無意必然亦謂無私意期必之心耳若其救時拯物之意皇皇不舍豈可謂無意於行哉至於舍之而藏則雖非其所欲謂舍之而猶無意於藏則亦過矣若果如此則是孔顔之心漠然無情於應物推而後行曵而後往如佛老之為也聖人與異端不同處正在於此不可不察也程子於此但言用舍無與已行藏安於所遇詳味其言中正微密不為矯激過髙之說而語意卓然自不可及其所由來者逺矣子曰語之而不惰者其回也與范氏曰顔子聞夫子之言而心解力行造次顛沛未嘗違之如萬物得時雨之潤發榮滋長何有於惰此羣弟子所不及也子曰回也非助我者也於吾言無所不說朱子曰助我若子夏之起豫因疑問而有以相長也顔子於聖人之言默識心通無所疑問故夫子云然其詞若有憾焉其實乃深喜之胡氏曰夫子之於回豈其以助我望之蓋聖人之謙德又以深贊顔子云爾子曰回也其庶乎屢空朱子曰庶近也言近道也屢空數至空匱也不以貧寠動心而求富故屢至於空匱也言其近道又能安貧也賜不受命而貨殖焉億則屢中命謂天命貨財生殖也億意度也言子貢不如顔子之安貧樂道然其才識之明亦能料事而多中也程子曰子貢之貨殖非若後人之豐財但此心未忘耳然此亦子貢少時事至聞性與天道則不為此矣范氏曰屢空者簞食瓢飲屢絶而不改其樂也天下之物豈有可動其中者哉貧富在天而子貢以貨殖為心則是不能安受天命其言而多中者億而已非窮理樂天者也夫子嘗曰賜不幸言而中是使賜多言也聖人不貴言也如是或問屢空之說曰空為匱乏其說舊矣何晏始以為虛中受道蓋出老莊之說非聖言本意也胡氏亦論之曰以屢空為虛中受道聖人之言未嘗如是之僻而晦也屢而有間是頻復矣方其不空之時與庸人亦奚逺哉此得之矣且下文以子貢貨殖方知尤見舊說之不易也易大傳子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也說見廣大學篇中庸子曰回之為人也擇乎中庸得一善則拳拳服膺而弗失之矣說己見前許以上皆聖人稱之辭語顔淵問為邦朱子曰顔子王佐之才故問治天下之道曰為邦者謙辭子曰行夏之時夏時謂以斗柄初昏建寅之月為嵗首也天開於子地闢於丑人生於寅故斗柄建此三辰之月皆可以為嵗首而三代迭用之夏以寅為人正商以丑為地正周以子為天正也然時以作事則歲月自當以人為紀故孔子嘗曰吾得夏時而說者以為夏小正之屬蓋取其時之正與其令之善而於此又以告顔子也乘殷之輅商輅木輅也輅者大車之名古者以木為車而已至商而有輅之名蓋始異其制也周人飾以金玉則過侈而易敗不若商輅之朴素渾堅而等威己辨為質而得其中也服周之冕周冕有五祭服之冠也冠上有覆前後有旒黃帝以來蓋已有之而制度儀等至周始備然其為物小而加於衆體之上故雖華而不為靡雖費而不及奢夫子取之蓋亦以為文而得其中也樂則韶舞取其盡善盡美放鄭聲逺佞人鄭聲淫佞人殆放謂禁絶之鄭聲鄭國之音佞人卑諂辨給之人殆危也程子曰問政多矣惟顔淵告之以此蓋三代之制皆因時損益及其久也不能無弊周衰聖人不作故孔子斟酌先王之禮立萬世常行之道發此以為之兆爾由是求之則餘皆可考也張子曰禮樂治之法也放鄭聲逺佞人法外意也一日不謹則法壞矣虞夏君臣相飭戒意蓋如此又曰法立而能守則德可久業可大鄭聲佞人能使人喪其所守故放逺之尹氏曰此所謂百王不易之大法孔子之作春秋蓋此意也孔顔雖不得行之於時然其為治之法可得而見矣或問商周之政正朔何以不如夏之得其正也曰陽氣雖始於黃鍾而其月為建子然猶潛於地中而未有以見其生物之功厯丑轉寅而三陽始備于是叶風乃至盛德在木而春氣應焉古之聖人以是為生物之始改嵗之端蓋以人之所共見者言之未有知其所由始也至於商周始以征伐有天下於是更其正朔定為一代之制以新天下之耳目而有三統之說然以言乎統則改嵗之義不明而凡四時五行之序皆不得其中正此孔子所以論考三王之制而必行夏之時也曰周輅為過侈何也曰夫輅者身之所乘足之所履其為用也賤矣運行振動任重致逺其為物也勞矣且一器而工聚焉則其為費也廣矣賤用而貴飾之則不稱物勞而華飾之則易壞費廣而又增費之則傷財周輅之所以為過侈與曰周冕之不為侈奈何曰加之首則體嚴而用約詳其制則等辨而分明此周冕所以雖文而不為過也夏商之制雖不可考然意其必未備者矣問程子云云曰兆猶言凖則也謂以此四者為凖則餘可推也屏山劉氏曰顔氏終日如愚論語所載惟發二問一為仁一為邦夫子答之皆極天理人事之大者天理謂克己復禮全一性之天也人事謂行夏時乘商輅服周冕樂韶舞也原易之用內焉惟窮理盡性外焉惟開物成務顔子盡之雖無諸子之著撰謂之通易可也此章蓋聖人許顔子以王佐之事業又家語魯定公問於顔回曰子亦聞東野畢之善為御乎對曰善則善矣然其馬將必佚二日馬佚公召回曰吾子奚以知之回曰以政知之昔者帝舜巧於使民造父巧於使馬舜不窮其民力造父不窮其馬力是以舜無佚民造父無佚馬今東野畢之御也升馬執轡容體正矣步驟馳騁朝禮畢矣厯險致逺馬力盡矣然猶求進不已以此知之公曰善吾子之言其義大矣願進乎曰臣聞之鳥窮則喙獸窮則攫人窮則詐馬窮則佚自古及今未有窮其下而無危者也公恱以告孔子孔子曰夫其所以為顔回者此之類也豈足多哉按顔子在陋巷而於帝王經世之事無所不講此學者所當法也顔淵死子曰噫天喪豫天喪豫朱子曰悼道無傳若天喪己也顔淵死子哭之慟從者曰子慟矣曰有慟乎非夫人之為慟而誰為朱子曰慟哀過也夫人謂顔淵言其死可惜哭之宜慟非他人之比也胡氏曰痛惜之至施當其可皆性情之正也史記回年二十九髮盡白蚤死孔子哭之曰自吾有回門人益親子謂顔淵曰惜乎吾見其進也未見其止也朱子曰顔子既沒之後子惜之言其方進而未已也或問云云曰惟胡氏為盡善胡氏曰顔淵曰舜何人也豫何人也有為者亦若是此吾往者也冉求曰非不悅子之道力不足也此吾止者也其進其止皆非他人所能此君子所以自强不息也南軒曰此顔子既沒之後夫子稱之之詞蓋其日進無疆于聖為幾矣然未至于聖則猶有所進焉至于聖則止矣所謂止者大而化之止于中而成乎天也此顔子所以有雖欲從之末由也已之歎與哀公問弟子孰為好學孔子對曰有顔回者好學不遷怒不二過不幸短命死矣今也則亡未聞好學者也說見學篇曾子曰以能問於不能以多問於寡有若無實若虗犯而不校昔者吾友嘗從事於斯矣朱子曰友馬氏以為顔淵是也顔子之心惟知義理之無窮不見物我之有間故能如此程子曰此顔子之所以為大賢後之學者有一善而自足哀哉謝氏曰不知有餘在我不足在人不必得為在己失為在人非幾於無我者不能也或問能矣而問於不能多矣而問於寡不幾於巧僞以近名乎曰愚嘗聞之於師矣曰顔子深知義理之無窮惟恐一善之不盡故雖能而肯問於不能雖多而肯問於寡以求盡乎義理之無窮者而已非挾其能而故問也但自他人觀之則見其如此耳謝說意蓋如曰孟子之自反不如顔氏之不校信乎曰孟子所言學者反身修德之事若顔子則心理渾然不待自反物我一致不見可校者也二者優劣固不待言而喻矣然自學者則隨其所至之深淺而用力各有所當不可以此廢彼而反陷于躐等之失也曰有謂犯而不校非特自反且有包之之意焉有彼之之意焉有愧之之意焉莫非理也其說然乎曰夫犯而不校固不待於自反今曰非特自反則既失之矣且其所謂包之者驕也彼之者狹也愧之者薄也是豈顔子之心哉曰吳氏曰子貢多聞故於顔子見其聞一知十曾子力行故又見其如此信乎其優入聖域也此說如何曰即其言足以見三子之氣象亦善言也此章乃朋友稱許之辭孟子昔者竊聞之子夏子游子張皆有聖人之一體冉牛閔子顔淵則具體而微此公孫丑之問一體猶一肢也具體而微謂有其全體但未廣大耳孟子曰禹稷顔回同道全章見時中篇又舜何人也見性善篇揚子昔仲尼潛心文王矣達之顔淵亦潛心仲尼矣未達一間矣子雲論顔子凡數條今獨取此周子曰顔子一簞食一瓢飲在陋巷人不堪其憂而不改其樂夫富貴人所愛者也顔子不愛不求而樂乎貧者獨何心哉天地間有至貴至愛可求至愛之間當有貴可二字而異乎彼者見其大而忘其小焉爾此即周子之教程子每令尋仲尼顔子樂處所樂何事者也然學者當深思而實體之不可但以語言解㑹而已見其大則心泰心泰則無不足無不足則貴富貧賤處之一也一則能化而齊故顔子亞聖齊字意復恐或有誤或曰化大而化也齊齊於聖也亞則將齊而未全之名也學顔子之所學已見學篇子曰豫欲無言天何言哉四時行焉百物生焉然則聖人之藴微顔子殆不可見發聖人之蘊教萬世無窮者顔子也聖同天不亦深乎朱子曰蘊中所蓄之名也仲尼無迹顔子微有迹故孔子之教既不輕發又未嘗自言其道之蘊而學之者唯顔子得其全故因其進修之迹而後孔子之蘊可見猶天不言而四時行百物生也夫子之道如天惟顔子得之夫子許多大意思盡在顔子身上發見如天地生物即在物上盡見天地純粹之氣謂之發者乃亦足以發之發不必待顔子言之而後發也顔子所以發聖人之蘊恐不可以一事言蓋聖人全體大用無不一一於顔子身上發見也程子曰學者欲得其正必學顔子有凖的顔孟於孔子其知之深淺同只是顔子尤溫淳淵懿近聖人氣象又曰顔子不動聲氣孟子則動聲氣矣又曰人須學顔子有顔子之德則有孟子之事功孟子者禹稷之事功也又曰孟子才髙學之無可依据學顔子入聖人為近有用力處又曰孟子有功於道為萬世之師其才雄只見雄才便是不及聖人處人須當學顔子便入聖人氣象或曰顔子為人似乎怯曰孰勇於顔子觀其言曰舜何人也豫何人也有為者亦若是有若無實若虛之類抑可謂大勇矣朱子亦曰顔子非懦善底人開口便問為邦孔子便語以四代禮樂愚謂顔子克己復禮即雷天大壯氣象非知仁勇之備其孰能之問顔子所好何學曰學以至聖人之道也全文已見論學篇其末云所未至者守之也非化之也又曰大而化之只是謂理與己一其未化者如人操尺度量物用之尚未免有差若至於化者則已便是尺度尺度便是已顔子正在此若化則便是仲尼也張子曰樂正子顔淵知欲仁矣樂正子不致其學足為信人善人志於仁無惡而已顔子好學不倦合仁與智具體聖人獨未至於聖人之止耳又曰顔子未至於聖人猶是心粗朱子曰顔子渾渾無迹有舉先生舊語問曰顔子優於湯武如何見得曰公且自做工夫這般處說不得據自看得覺顔子渾渾無㾗迹以上皆後賢論述之辭此章專叙顔子傳授愚按堯舜以及周孔其可見者相傳之大概爾至孔子之授顔子則本末盡見聖人之蘊無復遺餘蓋希顔所以希孔而堯舜禹湯文武周公之道從可知矣夫人心惟危道心惟微惟精惟一允執厥中堯舜禹相傳之要指也克已復禮為仁孔顔相傳之要指也以言語求之蓋甚不同矣然孔子之所謂己即舜之所謂人心孔子之所謂禮即舜所謂道心克而復即精一之功而仁之與中又名異而實同者也蓋合乎義理之正而無過不及者中也純乎義理之正而不雜之以私欲者仁也未有中而不仁亦未有仁而不中者即此推之凡聖賢相傳之心法皆可一以貫之矣語子曰參乎吾道一以貫之曾子曰唯子出門人問曰何謂也曾子曰夫子之道忠恕而已矣愚按此亦孔門傳授心法與告顔子克己復禮一也故以為首章說見前篇曾子曰吾日三省吾身為人謀而不忠乎與朋友交而不信乎傳不習乎朱子曰盡已之謂忠以實之謂信傳謂受之於師習謂熟之於已曾子以此三者日省其身有則改之無則加勉其自治誠切如此可謂得為學之本矣而三者之序則又以忠信為傳習之本也尹氏曰曾子守約故動必求諸身謝氏曰諸子之學皆出於聖人其後愈逺而愈失其真獨曾子之學專用心於內故傳之無弊觀於子思孟子可見矣惜乎其嘉言善行不盡傳於世也其幸存而未泯者其可不盡心乎問未為人謀未交朋友時所謂忠信如何做工夫朱子引程子雞鳴為善只是主敬之說曰只是存養此心在這裏照管勿差失此便是不動而敬不言而信處曾子守約不是守那約只是所守者約耳曾子之學大率力行之意多曾子守約是於朴實頭省力處用功南軒曰曾子以此三者自省可謂為己篤實之功矣曽子曰士不可以不𢎞毅任重而道逺仁以為己任不亦重乎死而後已不亦逺乎說見言仁篇曾子曰可以託六尺之孤可以寄百里之命臨大節而不可奪也君子人與君子人也說見君臣篇曽子有疾召門弟子曰啓豫足啓豫手詩云戰戰兢兢如臨深淵如履薄氷而今而後吾知免夫小子朱子曰曽子平日以為身體受於父母不敢毁傷故於此使弟子開其衾而視之詩小旻之篇戰戰恐懼兢兢戒謹臨淵恐墜履氷恐陷也曽子以其所保之全示門人言其所以保之之難如此至於將死而後得免於毁傷也小子門人也語畢而又呼之以致反復丁寧之意其警之深矣程子曰君子曰終小人曰死君子保其身以沒為終其事也故曽子以為全歸則免矣尹氏曰父母全而生之子全而歸之曽子臨終而啓手足為是故也非有得於道能如是乎范氏曰身體猶不可虧也况虧其行以辱其親乎或問以易簀為死生無變於己者奈何曰昔朝詹事嘗問此義於程子程子曰禮也朝曰今人蔽於老佛之說則不謂之禮而謂之達矣程子然之不知或人之說禮為重乎是未可知也集義程子曰顔子沒後得聖人之道者曽子也觀其啓手足之言可以見矣所傳者子思孟子皆其學也曾子有疾孟敬子問之曽子言曰鳥之將死其鳴也哀人之將死其言也善君子所貴乎道者三動容貌斯逺暴慢矣正顔色斯近信矣出辭氣斯遠鄙倍矣籩豆之事則有司存說見敬篇或問此章之說曰胡氏所考曾子之事則善胡氏曰曽子之疾見於此者二而見於檀弓者一愚嘗考其事之先後切意此章最先前章次之而易簀之事最在其後乃垂絶時語也當是時也氣息奄奄僅在而聲為律身為度心即理理即心其視死生猶晝夜然夫豈異教坐亡幻語不誠不敬者所可倣佛學者誠能盡心於此則可以不惑於彼也按程子曰曾子易簀之意心是理理是心聲為律身為度也胡氏蓋本諸此愚謂曾子之啓手足也蓋以為知免矣而易簀一節猶在其後使其終於大夫之簀猶為未正也全歸之難如此學者其可不戰兢以自省歟記檀弓曾子寢疾病樂正子春坐於牀下曾元曾申坐於足童子隅坐而執燭童子曰華而睆大夫之簀與子春曰止曾子聞之瞿然曰呼華而睆大夫之簀與曾子曰然斯季孫之賜也我未之能易也元起易簀曾元曰夫子之病革矣不可以變幸而至於旦請敬易之曾子曰爾之愛我也不如彼君子之愛人也以德細人之愛人也以姑息吾何求哉吾得正而斃焉斯已矣舉扶而易之反席未安而沒程子曰曾子傳聖人學其德後來不可測安知其不至聖人如言吾得正而斃且休理㑹文字只看他氣象極好彼他所見處大後人雖有好言語只被氣象卑終不類道又曰曾子疾病只要以正不慮死與武王殺一不辜行一不義得天下不為同心又曰曾子易簀之際其氣之微可知只為他志已定故雖死生許大事亦動他不得孟子昔者孔子沒三年之外門人治任將歸入揖於子貢相嚮而哭皆失聲然後歸子貢反築室於場獨居三年然後歸他日子夏子張子游以有若似聖人欲以所事孔子事之彊曾子曾子曰不可江漢以濯之秋陽以暴之皓皓乎不可尚已朱子曰有若似聖人蓋其言行氣象有似之者如檀弓所記子游謂有若之言似夫子之類是也所事孔子所以事夫子之禮也江漢水多言濯之潔也秋日燥烈言暴之乾也皓皓潔白貌尚加也言夫子道德明著光輝潔白非有若所能倣佛也以上皆紀曾子言行末章形容聖人之語非知德之至者其能及是語子曰柴也愚參也魯師也辟由也唁朱子曰魯鈍也程子曰參也竟以魯得之又曰曽子之學誠篤而已聖門學者聰明才辨不為不多而卒傳其道乃質魯之人爾故學以誠實為貴也尹氏曰曽子之才魯故其學也確所以能深造乎道也楊氏曰曽子在孔門當時以為魯學道宜難於他人然子思之中庸聖學所賴以傳者也考其淵源乃自曽子由此觀之聰明才智未必不害道而剛毅木訥信乎於仁為近矣南軒曰曾子之魯其為學篤實故卒能深造於道此章乃聖人目曾子之辭然必在曰唯之前無疑也孝經仲尼閒居曾子侍坐子曰參先王有至德要道以順天下民用和睦上下無怨女知之乎曽子避席曰參不敏何足以知之子曰夫孝德之本也教之所由生也此章見曽子之學由孝而入孔子以此授之亦傳道之一端也禮記所舉曽子論孝數條與孟子稱曾子之孝皆已見五典篇不重出然學曾子者必自孝始可也又大學正經朱子以為孔子之言而曾子述之其傳十章則曾子之意而門人述之其序所以為大學之書蓋孔子取先王之法誦而傳之以詔後世三千之徒莫不聞其說而曾氏之傳獨得其宗云程子曰顔子默識曽子篤信得聖人之道者二人也朱子曰曾子之為人敦厚質實而其學專以躬行為主故其真積力久而得以聞乎一貫之妙然其所以自守而終身者則固未嘗離乎孝敬信讓之規而其制行立身又專以輕富貴守貧賤不求人知為大朱子曾子序曰昔孔子沒門人惟曾氏為得其傳其後孔子之孫子思樂正子春公明儀之徒皆從之學而子思又得其傳以授孟軻故其言雜見論語孟氏書及他傳語者為多然皆散出不成一家之言而世傳曾子書者乃獨取大戴禮之十篇以充之其言語氣象視論孟檀弓篇所載相去逺甚豫友劉子澄蓋病其然因輯此書以傳學者而其精粗純駁之際尤致意焉熹嘗考之竊以謂云云是以從之游者所聞雖或甚淺亦不失為謹厚修潔之人所記雖或甚踈亦必有以切於日用躬行之實蓋雖或附而益之要亦必為如是之言然後得以自託於其間也然則是七篇者等而别之雖有內外雜篇之殊而其大致皆為有益於學者非他書所及也誠能志其大而必謹其小厯其淺而徐望其深則庶乎其無躐等之病而有日新之功矣按其書有曰曾子曰尊其所聞則髙明行其所知則光大髙明光大不在乎他加之意而已即仲舒所引也其他多名言學者自當詳味又按禮記曾子問一篇雖所問皆禮文之變然古之學者未有不以博文為先而三千三百皆道體之所形文多不載於此要當顓考云孔門唯一顔子天資至純粹到曾子便過於剛與孟子相似世衰道微人欲橫流不是剛徑有腳跟底人定立不住又曰曾子語言盛水不漏問顔曾以下皆致曲否曰顔子體段巳當曾子則是致曲一一推之至答一貫之問則渾合矣因論中庸致曲及此以上後賢論述之辭此章專叙曾子傳授西山讀書記卷二十八
