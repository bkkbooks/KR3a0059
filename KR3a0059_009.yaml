body:
  text: 西山讀書記卷九宋真德秀撰仁義易大傳立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義朱子曰隂陽成象天道之所以立也剛柔成質地道之所以立也仁義成德人道之所以立也道一而已隨事著見故有三才之别而於其中又各有體用之分焉其實則一太極也陽也剛也仁也物之始也隂也柔也義也物之終也勉齋黃氏曰天之道不外乎隂陽寒暑往來之類是也地之道不外乎剛柔山川流峙之類是也人之道不外乎仁義事親從兄之類是也隂陽以氣言剛柔以質言仁義以理言雖若有所不同然仁者陽剛之理也義者隂柔之理也其實則一而已天地亦大矣人以藐然之身乃與天地並立而為三至其為道則又與天地混然而無間其可不知所以自立哉非陽剛隂柔則雖天地不能以自立不仁不義則亦不可以謂之人矣不謂之人則與禽獸奚異哉由仁義則與天地並立而無間由不仁不義則無以自别於禽獸學者其亦知所擇矣天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義按易之並言仁義者前章及此而已在天地則曰生在聖人則曰仁仁之義蓋可識矣又小人不恥不仁不畏不義亦並言仁義之一也記天地嚴凝之氣始於西南而盛於西北此天地之尊嚴氣也此天地之義氣也天地溫厚之氣始於東北而盛於東南此天地之盛德氣也此天地之仁氣也東方者春春之為言蠢也産萬物者聖也南方者夏夏之為言假也養之長之假之仁也西方者秋秋之為言愁也愁之以時察守義者也北方曰冬冬之為言中也中者藏也是以天子之立也左聖鄉仁右義偕藏也讀為揫斂也察猶察察嚴殺之貌南鄉鄉仁貴長大萬物也正義曰春為仁夏為禮今春為聖夏為仁者春夏皆生養萬物俱有仁恩之義故此夏亦仁也聖既生物言之則謂之聖故東方為聖也各以義言之理亦通也中者藏也中庸哀公問政子曰文武之政布在方䇿其人存則其政舉其人亡則其政息人道敏政地道敏樹夫政也者蒲盧也故為政在人取人以身修身以道修道以仁朱子曰仁者天地生物之心而人得以生者所謂元者善之長也言人君為政在於得人而取人之則又在修身能仁其身則有君有臣而政無不舉矣仁者人也親親為大義者宜也尊賢為大親親之殺尊賢之等禮所生也人指人身而言具此生理便自然有惻怛慈愛之意深體味之可見宜者分别事理各有所宜也禮則節文斯二者而已聖賢言仁便有箇溫厚慈祥之意帶箇愛底道理下便言親親為大問修道以仁繼之以仁者人也何為下面又添義禮曰仁便有義如陽便有隂親親尊賢皆仁之事親之尊之其中有箇差等便是義與禮親親在父子如此在宗族如彼所謂殺也尊賢有當事之者有當友之者所謂等也問仁即是道如何説修道以仁曰道是泛説仁是切要底孟子見梁惠王王曰叟不逺千里而來亦將有以利吾國乎孟子對曰王何必曰利亦有仁義而已矣朱子曰仁者心之德愛之理義者心之制事之宜也王曰何以利吾國大夫曰何以利吾家士庶人曰何以利吾身上下交征利而國危矣萬乘之國弒其君者必千乘之家千乘之國弒其君者必百乘之家萬取千焉千取百焉不為不多矣茍為後義而先利不奪不厭未有仁而遺其親者也未有義而後其君者也王亦曰仁義而已矣何必曰利此章言仁義根於人心之固有天理之公也利心生於物我之相形人欲之私也循天理則不求利而自無不利徇人欲則求利未得而害己隨之所謂毫釐之差千里之謬此孟子之書所以造端託始之深意學者所宜精察而明辨也或問人之所以為性者五而獨舉仁義何也曰天地之所以生物者不過乎隂陽五行實一隂陽也故人之所以為性者雖有仁義禮智信之殊然曰仁義則其大端已舉矣曰然則其或主於愛或主於宜而所施亦有君親之不同者也曰仁者人也其發則專主於愛而愛莫切于愛親故人仁則必不遺其親矣義者宜也其發則事皆得其宜而所宜者莫大於尊君故人義則必不後其君矣曰子謂仁義未嘗不利則是所謂仁義者乃所以為求利之資乎曰不然也仁義天理之自然也居仁由義循天理而不得不然者也然仁義得於此則君臣父子之間以至於天下之事自然無一物之不得其所者而初非有求利之心也易所謂義之和者正謂此爾曰然則孟子何不以是為言也曰仁義固無不利矣然以是為言則人之為仁義也不免有求利之心焉一有求利之心則利不可得而害至矣此孟子所以拔本塞源而救其弊也心之制亦是就義之全體處説事之宜是就千條萬緒各有所宜處説事之宜非是就在外之事説看甚麼事來時當面便有箇宜處這便是義問心之德愛之理俱以體言心之制事之宜俱以用言否曰心之德是渾淪説愛之理方説到深切處心之制却是説義之體程子所謂處物為義是也揚雄言義以宜之韓愈言行而宜之之謂義若以義為宜則義有在外意思須如程子言處物為義是則處物者在心而非外也事之宜雖若在外然所以制其宜則在心也所謂事之宜方是指那事物當然之理未説到處置合宜處聖賢之言所以要辨别教分明但只要向義邊一直去更不通商量第二著才説義乃所以為利固是義有大利存焉若行義時便説道有利則此心便傾邪向那邊去故孟子云云董仲舒亦分明説不謀其利不計其功齊宣王問曰湯放桀武王伐紂有諸孟子對曰於傳有之曰臣弒其君可乎曰賊仁者謂之賊賊義者謂之殘殘賊之人謂之一夫聞誅一夫紂矣未聞弒君也朱子曰害仁者凶暴淫虐滅絶天理故謂之賊害義者顛倒錯亂傷敗彛倫故謂之殘一夫言衆叛親離不復以為君也南軒曰夫仁義之在天下彼豈能殘賊之哉實自殘賊於厥躬耳為君如此則上焉斷棄天命下焉不有民物謂之一夫不亦宜乎孟子曰自暴者不可與有言也自棄者不可與有為也言非禮義謂之自暴也吾身不能居仁由義謂之自棄也仁人之安宅也義人之正路也仁宅見前篇矢人函人章義者宜也乃天理之當行無人欲之邪曲故曰正路曠安宅而弗居舍正路而弗由哀哉言道本固有而人自絶之是可哀哉此聖賢之深戒學者所當猛省也孟子曰人之所以異於禽獸者幾希庶民去之君子存之舜明於庶物察於人倫由仁義行非行仁義也朱子曰人物之生同得天地之理以為性同得天地之氣以為形其不同者獨人於其間得形氣之正而能有以全其性為少異耳雖曰少異然人物之所以分實在於此衆人不知此而去之則名雖為人而實無以異於禽獸君子知此而存之是以戰兢惕厲而卒能有以全其所受之理也明則有以識其理察則有以盡其理之詳物理固非度外而人倫尤切於身故其知之有詳略之異在舜則皆生而知之也由仁義行非行仁義則仁義已根於心而所行皆從此出非以仁義為美而後勉強行之所謂安而行之也此則聖人之事不待存矣尹氏曰存之者君子也存者聖人也由仁義行存者能之舜明於庶物察於人倫明察是見得事事物物之理無一毫之未盡所謂仁義者皆不待求之於外此身此心便渾然都是仁義問云云若學者須是行仁義始得曰這便如三月不違意他是平日身常在仁義內即恁地行出學者身在外且須去求仁義就上行然又須以由仁義行為凖的方得或言由仁義行好行仁義便有善利之分曰豈不見上有舜字惟舜便由仁義行他人須窮理知其為仁為義從而行之且如仁者安仁知者利仁既未能安仁亦須是利仁利仁豈不是好底知仁之為利而行之不然則以人欲為利矣南軒曰由仁義行非行仁義者行仁義猶為二物也由仁義行則如目視而耳聽手持而足履無非是矣若舜者可謂全其所以為人者而無虧欠矣未至於舜皆為未盡也孟子曰仁人心也義人路也舍其路而弗由放其心而不知求哀哉人有雞犬放則知求之有放心而不知求學問之道無他求其放心而已矣朱子曰仁者心之德程子所謂心如榖種仁則其生之性是也然但謂之仁則人不知其切於己故反而名之曰人心則可以見其為此身酬酢萬變之主而不可須臾失矣義者行事之宜謂之人路則可以見其為出入往來必由之道而不可須臾舍矣哀哉二字最宜詳味令人惕然有深省處上兼言仁義而下專論求放心者能求放心則不違於仁義在其中矣餘詳見前求放心章宋牼將之楚孟子遇於石丘曰先生將何之曰吾聞秦楚搆兵我將見楚王説而罷之楚王不悅我將見秦王説而罷之二王我將有所遇焉曰軻也請無問其詳願聞其指説之將何如曰我將言其不利也曰先生之志則大矣先生之號則不可先生以利説秦楚之王秦楚之王悅於利以罷三軍之師是三軍之士樂罷而悅於利也為人臣者懷利以事其君為人子者懷利以事其父為人弟者懷利以事其兄是君臣父子兄弟終去仁義懷利以相接然而不亡者未之有也先生以仁義説秦楚之王秦楚之王悅於仁義而罷三軍之師是三軍之士樂罷而悅於仁義也為人臣者懷仁義以事其君為人子者懷仁義以事其父為人弟者懷仁義以事其兄是君臣父子兄弟去利懷仁義以相接也然而不王者未之有也南軒曰事一也而情有異則所感與其所應皆不同是以古之謀國者以理義不以利害此天理人欲之所以分而治忽之所由係蓋不可不謹於其源也夫説二君而使之罷兵非不善也然由宋牼之説而説之以利使其能從亦利心耳罷兵雖息一時之事而徇利實傷萬世之彛自衆人論之惟欲其説之行而不睹其害於後在君子則寧説之不行不忍失正理而啓禍源也故使二君悅於利而聽從則三軍之士樂罷而悅於利以至于觀聽之間亦莫不動焉上下憧憧徒知利之為利則凡私己而自便者無不為也人欲肆行君臣父子兄弟之大倫亦且不暇恤矣則豈非危亡之道乎由孟子之説而説以仁義使二君幸而聽則是其心復於正道三軍之士樂罷而悅於仁義則皆知仁義為重將於君臣父子兄弟之際無非以是心相與人心正而治道興矣三代之所以王者用此道也然則其説則一而所以説者異毫釐之間霄壤之分可不謹哉學者有見於此則知五霸之在春秋為功之首而罪之魁也又知曽西之所以卑管晏而尊子路者也則庶乎知入德之門矣孟子曰人之所不學而能者其良能也所不慮而知者其良知也朱子曰良者本然之善也程子曰良知良能皆無所由乃出於天不係於人孩提之童無不知愛其親也及其長也無不知敬其兄也親親仁也敬長義也無他達之天下也南軒曰良云者有本然之義有善之義蓋其本然者無非善也不學而能不慮而知則無一毫人為加乎其間天之所為而性之所有也孩提之童無不知愛其親及其長莫不知敬其兄此其知豈待於慮乎而其能也又豈待於學乎此所謂良知良能也然此章下文獨言知者蓋知常在先也愛敬者良心之大端蓋親親為仁敬長為義人道不越是而已能存是心而達之則仁義之道不可勝窮矣雖然人之良能良知如飢而食如渴而飲手持而足履亦何莫非是乎何孟子獨以愛親敬長為言也蓋飢食渴飲手持足履之類固莫非性之自然形乎氣體者也形乎氣體則有天理有人欲循其自然固莫非天理毫釐之差則人欲亂之矣若愛敬之所發則仁義之淵源故孟子之所以啓告之者專指夫此揭天理之粹以示人也若異端舉物而遺則天理人欲混淆而莫識其源為弊有不可勝言者矣王子墊問曰士何事孟子曰尚志曰何謂尚志曰仁義而已矣殺一無罪非仁也非其有而取之非義也居惡在仁是也路惡在義是也居仁由義大人之事備矣朱子曰志字與父在觀其志之志同蓋未見於所行而方見於所存也南軒曰尚志者以立志為先也主乎仁義所謂志也不主乎仁義則倀倀然何所據乎謂之志不立可也殺一無罪非其有而取之舉二事者欲其推類而知仁義之所存也夫殺一無罪而非仁由是而體之則仁之所以能愛者可得而推矣非其有而取之為非義由是而體之則義之所以為宜者亦可得而推矣居仁由義居則不違由則不離也居仁則體立由義則用行大人之事亦不越此而已矣學者可不以尚志為先乎黃氏曰論語一書未嘗以仁義對言而孟子言仁義者不一而足蓋夫子教人無非仁義之道使人油然入於仁義而不自知也孟子憫斯世之迷惑故開關啓鑰直指人心而明告之也五常百行皆性所有而獨言仁義者何也仁義蓋其總名而五常百行其支𣲖也孟子曰人皆有所不忍達之於其所忍仁也人皆有所不為達之於其所為義也人能充無欲害人之心而仁不可勝用也人能充無穿窬之心而義不可勝用也人能充無受爾汝之實無所往而不為義也朱子曰惻隱羞惡之心人皆有之故莫不有所不忍不為此仁義之端也然以氣質之偏物欲之蔽則於他事或有所不能者但推所能達之於所不能則無非仁義矣充滿也穿穴窬牆皆盜之事也能推所不忍以達其所忍則能滿其無欲害人之心而無不仁者矣能推其所不為以達其所為則能滿其無穿窬之心而無不義矣爾汝人所輕賤之稱人雖或有貪昧隱忍而甘受之者然其中必有慚忿而不肯受之之實人能即此而推之使其充滿無所虧缺則無適而非義矣南軒曰人皆有所不忍皆有所不為此其秉彛之不可殄滅也然有所不忍矣而於他則忍之有所不為矣而於他則為之此豈有異心哉為私欲所蔽而生道息故也若以其所不忍而達之於其所忍豈非仁之方乎以其所不為而達之於所為豈非義之方乎達謂達於用充謂充其所有者也此章始言仁義而末獨言義何也蓋仁義體用相須者也人之不仁者以非義害之也不為非義而後仁可得而存故反復再三推而言之使人知所用力也荀子曰處仁以義然後仁學者有以此説為當理者蓋謂施仁而不以義則兼愛無别不足以為仁矣愚謂此不知仁之論也蓋仁義雖曰對立然仁未嘗不兼義仁者體也義者用也有體斯有用也以其體而言之則仁者之心無不周遍所謂理一也至其施之則親親與仁民不同仁民與愛物不同所謂分殊也即所謂義也程子之論西銘盡之矣必若荀子之言則仁未足以為仁必處之以義然後仁也如此則仁小於義義大於仁矣豈理也哉揚子曰君子於仁也剛於義也柔問仁是柔如何却屬剛義是剛如何却屬柔朱子曰仁剛陽是一樣意思義柔陰是一樣意思蓋仁本是柔底物事發出來却剛但看萬物發生時便恁地奮迅出來有剛底意思義本是剛底物事發出來却柔但看萬物肅殺時便恁地收斂憔悴有柔底意思又問揚子雲云如何曰仁體柔而用剛義體剛而用柔洙曰此豈所謂陽根隂隂根陽邪先生曰然陽主進隂主退陽主息隂主消進而息者其氣強消而退者其勢弱此隂陽之所以為柔剛也陽剛溫厚居東南主春夏而以作長為事隂柔嚴凝居西北主秋冬而以斂藏為事作長為生斂藏為殺此剛柔之所以為仁義也以此觀之則隂陽剛柔仁義之位豈不曉然而彼揚子雲之所謂於仁也剛於義也柔者乃自其用處之末流言之蓋亦所謂陽中之隂隂中之陽固不妨自為一義但不可以雜乎此而論之爾問立天之道云云則仁當屬隂先生曰仁何嘗屬隂袁機仲力爭要以仁屬隂引揚子之言為證殊不知仁之定體自是屬陽至論君子所學則又就其地位上説如何拘得按前一假正答袁書也周子曰天以陽生萬物以隂成萬物生仁也成義也朱子曰隂陽以氣言仁義以道言故聖人在上以仁育萬民以義正萬民程子曰仲尼言仁未嘗兼義獨於易曰立人之道曰仁與義而孟子言仁必以義配蓋仁者體也義者用也知義之為用而不外焉者可與語道矣世之論義者多外之不然則混然無别非知仁義之説者也龜山楊氏曰西銘理一而分殊知其理一所以為仁知其分殊所以為義所謂分殊猶孟子言親親而仁民仁民而愛物其分不同故所施不能無差等耳或曰如是則體用果離而為二矣曰用未嘗離體也以人觀之四肢百骸具於一身者體也至其用處則首不可以加屨足不可以納冠蓋即體而言而分已在其中矣朱子曰此論分别異同各有歸趣朱子曰仁義如隂陽只是一氣陽是正長底氣隂是方消底氣仁便是方生底義義便是收回底仁問仁義之為體用何也曰仁存諸心性之所以為體也義制夫事性之所以為用也然以其性而言之則皆體也以其情而言之則皆用也以隂陽言之則義體而仁用也以存心制事言之則仁體而義用也錯綜交羅惟其所當莫不各有條理焉程子仁體義用之言特舉其一爾又曰仁義相對為體用仁自有仁之體用義自有義之體用又曰去得不仁不義則所行便是仁義下文云那得一箇在不仁不義與仁義之中底物事不是人欲便是天理不是天理便是人欲所以謂欲知舜與跖之分者無他利與善之間也所隔甚不多天命之性流行發用見於日用之間無一息之不然無一物之不體其大端全體即所謂仁而於其間事事物物莫不各有自然之分如方維上下定位不易毫釐之間不可差繆即所謂義立人之道不過二者初未嘗相離也又朱子少時嘗以書問延平李氏曰大抵仁者正是天理流動之機以其包含和粹涵育融漾不可名核故特謂之仁其中自然文理密察各有定體處便是義只此二字包括人道已盡義固不出乎仁之外仁亦不離乎義之內也然則理一而分殊是乃本然之仁義李氏報曰推測到此甚密加以涵養何慮不見道也仁義而有窮則天道之隂陽亦有窮也蘇明允書以為權衡之論為仁義之窮而作此非知仁義之言夫舒而為陽慘而為隂孰非天地生物之心哉仁義之於人亦猶是已若云云而可乎右兼言仁義仁禮孟子曰君子所以異於人者以其存心也君子以仁存心以禮存心仁者愛人有禮者敬人朱子曰此仁禮之施愛人者人恆愛之敬人者人恆敬之此仁禮之驗有人於此其待我以橫逆則君子必自反也我必不仁也必無禮也此物奚宜至哉其自反而仁矣自反而有禮矣其橫逆由是也君子必自反也我必不忠自反而忠矣其橫逆由是也君子曰此亦妄人也已矣如此則與禽獸奚擇哉於禽獸又何難焉是故君子有終身之憂無一朝之患也乃若所憂則有之舜人也我亦人也舜為法於天下可傳於後世我猶未免為鄉人也是則可憂也憂之如何如舜而已矣若夫君子所患則亡矣非仁無為也非禮無行也如有一朝之患則君子不患矣此所謂存心與存其心不同只是處心又曰所以異於人以其處心與人不同問自反而忠之忠曰忠者盡已也盡已者仁禮無一毫不盡我猶未免為鄉人此便是知恥知恥則進學不得不勇南軒曰其欲如舜者非慕夫舜之事功也欲如舜之盡其道為難也為法於天下可傳於後世言舜為人倫之至也其憂不如舜者豈但憂之而已哉而所以則而效之者惟恐不及也故曰憂之如何如舜而已矣揚子曰人必其自愛也然後人愛諸人必其自敬也然後人敬諸自愛仁之至也自敬禮之至也未有不自愛敬而人愛敬之者也右兼言仁禮仁智易大傳與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛其全章云易與天地凖故能彌綸天地之道仰以觀於天文俯以察於地理是故知幽明之故原始要終故知死生之説精氣為物遊魂為變是故知鬼神之情狀云云下文云範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神無方而易無體朱子曰易道之大聖人用之如此天地之道知仁而已知周萬物者天也道濟天下者地也知且仁則知而不過矣旁行者行權之知也不流者守正之仁也既樂天理而又知天命故能無憂而其知益深隨處皆安而無一息之不仁故能不忘其濟物之心而仁益篤蓋仁者愛之理愛者仁之用故其相為表裏如此春秋傳仲尼曰臧文仲其不仁者三不知者三下展禽杜氏曰栁下惠也文仲知下惠之賢而使在下位論語曰臧文仲其竊位者與知栁下惠之賢而不與立也廢六關塞關陽關之屬凡六關所以塞絶末流而廢之妾織蒲三不仁也家人販席言其與民爭利作虛器謂居蔡山節藻梲論語子曰臧文仲居蔡山節藻梲何如其知也朱子曰當時以文仲為知孔子言其不務民義而諂瀆鬼神如此安得為知揚氏曰以山節藻梲居蔡是猶以已養養鳥也焉得知南軒曰所貴乎知者為其明義理之是非也僭上失禮之事而處之不疑則其昧理而悖於義孰大於是按禮記家不藏龜故南軒以為僭上縱逆祀躋僖公祀爰居海鳥曰爰居止於魯東門文仲以為神命國人祀之文二年愚按孔子之言雖為臧文仲而發然即其所謂不仁不知者則仁知之義可知矣蓋舍其所當用之人而使澤不得以及民爭其所不當爭之利而使民不得以自養此文仲之不仁也後之人欲反其失則居顯位者其可不以舉賢揚善為事乎食厚祿者其可不以捐利豫民為心乎去其不仁者則仁可幾矣龜所以卜而居之以華侈之室而不知其亡益躋後君於先君之上而不知其非禮海鳥而祀之以盛樂而不知其不能享此文仲之不知也後之人欲反其失則凡求媚於鬼神要福於冥漠而不循其禮之正不察其理之有無者其可不戒之乎去其不知者則知可幾矣若徒知文仲之失而無自反自克之功則雖終日誦聖經之訓言銖較古人之失得終於亡補而已論語樊遲問知子曰務民之義敬鬼神而逺之可謂知矣問仁曰仁者先難而後獲可謂仁矣朱子曰專用力於人道之所宜而不惑於鬼神之不可知智者之事也先其事之所難而後其效之所得仁者之心也程子曰人多信鬼神惑也而不信者又不能敬能敬而逺可謂知矣又曰先難者克己也以所難者為先而不計其獲仁也吕氏曰當務為急而不求所難知力行所知不憚所難為或曰問仁而告之以先難後獲何也曰為是事者必有是效亦天理之自然也然或先計其效而後為其事則其事雖公而意則私雖有成功亦利仁之事而已若夫仁者則先為其事而不計其效知循天理之自然而無欲利之私心也董子所謂仁人者正其誼不謀其利明其道不計其功正謂此爾然正誼未嘗不利明道豈必無功但不從夫功利者而為之爾民者人也義者宜也如詩所謂民之秉彛即人之義也此則人之所宜為者不可不務也此而不務而反求之幽冥不可測識之間而欲避禍以求福此豈謂之智者哉問有一毫計功之心便是私欲曰是獲有期望之意學者之於仁工夫最難但先為人所難為不必有期望之心可也先難後獲只是我合做事便自做將去更無下面一截才有計獲之心便不是了大抵學者為其所不得不為者至於人欲盡而天理全則仁在是矣我先有箇云我欲以此去為仁便是先獲也南軒曰難莫難於克己勉為其難不計所獲循循不已久自有所至若先有期獲之意則固已自纍其心而有害於天理矣無妄之六二不耕穫不災畬而象曰未富也蓋此義也仁者安仁知者利仁見前言仁篇子曰知者樂水仁者樂山知者動仁者靜知者樂仁者壽朱子曰樂喜好也知者達於事理而周流無滯有似於水故樂水仁者安於義理而厚重不遷有似於山故樂山動靜以體言樂壽以效言也動而不括故樂靜而有常故壽程子曰非體仁知之深者不能如此形容之知者動然他見得許多道理分明只是行其所無事其理甚簡雖動而實未嘗不靜仁者靜然其見得天下萬事萬理皆在吾心莫不相關雖靜而未嘗不動動不是勞攘紛擾靜不是塊然死守這與樊遲問仁知章相須自有互相發明處問仁者樂山是就成德上説先難後獲是就初學上説曰也只一般只有箇生熟聖賢是已熟底學者學者是未熟底聖賢仁者一身渾然全是天理故靜而樂山且壽壽是悠久之意知者周流事物之間故動而樂水且樂樂是處得當理而不擾之意若以配隂陽則仁配春主發生故配陽動知配冬主伏藏故配隂靜然隂陽動靜又各互為其根不可一定求之也此在學者默而識之或問知者動仁者靜如太極圖説則知為靜仁為動如何曰這道理直看一樣橫看一樣子貢説學不厭為智教不倦為仁子思却言成已為仁成物為知仁固有安靜意思然施行却有運用之意智是潛伏淵深底道理至發出則有運用然至於運用各當其理而不可易處又不專於動南軒曰動靜者仁智之體樂水樂山言其體則然也動則樂靜則壽行所無事不其樂乎常永貞固不其壽乎雖然知之體動而理各有安靜固在其中矣仁之體靜而周流不息動亦在其中矣動靜交見體用一源非深體者莫能識也樊遲問仁子曰愛人問知子曰知人樊遲未達曽氏曰遲之意蓋以愛欲其周而知有所擇故疑二者之相悖爾子曰舉直錯諸枉能使枉者直朱子曰舉直錯枉者知也使枉者直則仁矣如此則二者不唯不相悖而反相為用矣樊遲退見子夏曰鄉也吾見於夫子而問知子曰舉直錯諸枉能使枉者直何謂也子夏曰富哉言乎舜有天下選於衆舉臯陶不仁者逺矣湯有天下選於衆舉伊尹不仁者逺矣伊尹湯之相也不仁者逺言人皆化而為仁不見有不仁者若其逺去爾使枉者直也子夏蓋有以知夫子之兼仁智而言矣程子曰聖人之語因人而變化雖若有淺近者而其包含無所不盡觀於此章可見矣非若他人之言語近則遺逺語逺則不知近也尹氏曰學者之問也不獨欲聞其説又必欲知其方不獨欲知其方又必欲為其事如樊遲未達故又問焉而猶未知其何以為之也及退而問諸子夏然後有以知之使其未喻則必將復問矣既問於師又辨諸友當時學者之務實學也如此愛人知人自相為用若不論枉與直一例去愛他便不得大抵惟先於知能愛其所當愛只此兩句自包上下此所以為聖人之言愛人知人是仁智之用聖人何故但以仁智之用告樊遲却不告之以仁智之體蓋尋這用便可以知其體蓋用即是體中流出也問云云曰尋常説仁智一個是慈愛一個是辨别各自向一路惟是舉直錯諸枉能使枉者直方見得仁智合一處仁裏面有智智裏面有仁南軒曰原人之性其愛之理乃仁也知之理乃知也仁者視萬物猶一體而况人與我同類乎故仁者必愛人然則愛人果可以盡仁乎以愛人則可以盡仁則不可而其所以愛人者乃仁之所存也至於問知而論以知人者亦猶是爾中庸誠者非自成己而已也所以成物也成己仁也成物知也性之德也合外內之道也故時措之宜也朱子曰誠雖所以成己然既有以自成則自然及物而道亦行於彼矣仁者體之存智者用之發是皆吾性之所固有而無內外之殊既得於己則見於事者以時措之而皆得其宜也集略程子曰成己須是仁而推成己之道及物即是智吕氏曰誠雖自成也道雖自道也非有我之得私也與天下同之而已故思成己必思所以成物是所謂仁智之具也性之所固有合內外而無間也夫天大無外造化發育皆在其間自無內外之别人有是形而為形所造故有內外內外一生則物自物已自己與天地不相似矣原人受中以生安有物我之異內外之别哉故具仁與智無己無物誠一以貫之合天地而施化育故能時措之宜也又曰子貢曰學不厭智也教不倦仁也學不厭所以成己此則成己為仁教不倦所以成物此則成物為智何也夫盡性以成己則仁之體也推是以成物則智之事也自成德而言也學不厭所以致吾知教不倦所以廣吾愛自入德而言也此子思子貢之言所以異也朱子曰吕氏所論子貢子思所言之異亦善而猶有未盡者蓋子貢之言主於知子思之言主于行故各就其所重而有賔主之分亦不但為成德入德之殊而已也孟子昔者子貢問於孔子曰夫子聖矣乎孔子曰聖則吾不能我學不厭而教不倦也子貢曰學不厭智也教不倦仁也仁且智夫子既聖矣朱子曰學不厭智之所以自明教不倦者仁之所以及物孟子曰知者無不知也當務之為急仁者無不愛也急親賢之為務堯舜之知而不遍物急先務也堯舜之仁不遍愛人急親賢也朱子曰知者固無不知然常以所當務者為急則事無不治而其為知大矣仁者固無不愛然常急於親賢則恩無不洽而其為仁博矣不能三年之喪而緦小功之察放飯流啜而問無齒決是之謂不知務此章言君子之於道識其全體則心不狹知所先後則事有序豐氏曰知不急於先務雖遍知人之所知遍能人之所能徒弊精神而無益於天下之治矣仁不急於親賢雖有仁民愛物之心小人在位無由上達聰明日蔽于上而惡政日加於下此孟子所謂不知務也先生因是推言學者亦有當務如孟子論今樂古樂則與民同樂乃樂之本學者所當知也若欲明其聲音節奏特樂之一事爾學者須要窮其原本放得大水下來則如海潮之至大船小船莫不浮動如講學既能其大者則小小文義自是該通若只於淺處用功則必不免沈滯之患矣南軒曰自身以至於下皆有當務蓋天下之事未有無先後者傳曰知所先後則近道矣此所以貴乎格物也雖然孟子之所喻特言舍大而徇小者為不知務爾非謂能三年之喪則緦小功有不足察無放飯流啜則齒決有不必問也先後具舉本末畢貫此為學者又不可以不知也右兼言仁智仁孝孔子曰仁人不過乎物孝子不過乎物是故仁人之事親如事天事天如事親是故孝子成身鄭氏曰物猶事也事親事天孝敬同也孝經曰事父孝故事天明舉無過事以孝事親乃所以成身右兼言仁孝智仁禮子曰知及之仁不能守之雖得之必失之朱子曰智足以知此理而私欲間之則無以有之於身矣知及之仁能守之不莊以蒞之則民不敬知此理而無私欲以間之則所知者在我而不失矣然猶有不莊者蓋氣質之偏或有厚於內而不嚴於外者是以民不見其可畏而慢易之也知及之仁能守之莊以蒞之動之不以禮未善也動之謂動民也猶曰鼓舞而作興之云爾禮為義理之節文學至於仁則善有諸已而大本立矣蒞之不莊動之不以禮乃其氣稟學問之小疵然亦非盡善之道也故夫子歷言之使知德愈全則責愈備不可以為小節而忽之也問克己復禮為仁便是極了今却又有莊以蒞之與動之以禮底工夫如何曰人自有此心純粹更不走失而於接物應事時少些莊嚴底意思自不足以使人敬此便是未善處問此是要本末工夫兼備否曰固是但先有知及之仁能守之做箇根本了却方好去檢點其餘便無處無事不善若根本不立又有何可檢點處問知及仁守曰此是説講學莊以蒞之以後是説為政南軒曰知及乎此而仁不能守此則未能保之於己也仁能守之則在己者實矣又須莊以蒞之而後內外相成而無弊而又欲動之以禮然後為盡善動之以禮者以禮教民風動之也此雖言為政之道至此而後善然所以成己亦一而已孟子曰愛人不親反其仁治人不治反其智禮人不答反其敬行有不得者皆反求諸己其身正而天下歸之詩云永言配命自求多福右兼言智仁禮勇子曰知者不惑仁者不憂勇者不懼朱子曰明足以燭理故不惑理足以勝私故不憂氣足以配道義故不懼此學之序也問知是格物致知仁是存養勇是克治否先生曰是勇謂持守堅固問中庸力行近乎仁又似勇者不懼意思曰交互説都是智者直是見得分曉故不惑問智不惑一假能明理便能無私否曰亦有人明理不能去私欲然去私欲必先明理惟聖人自誠而明可以先言仁後言智至於教人當以智為先問子罕智仁勇章與憲問仁智勇章何以次序不同曰成德以仁為先進學以智為先此誠而明明而誠也中庸言三德之序如何曰此亦為學者言又問何以勇皆序在後曰末後做工夫不退轉此方是勇問仁者不憂曰仁者心與理一心純是道理看甚麼事不問大小改頭換面來自家此心各有一個道理應副去不待事來方始安排所以自不煩惱今人有這事却無這道理便處置不去所以憂又曰仁者理即是心心即是理有一事來便有一理以應之所以無憂問無憂似未是仁先生曰今人學問百種只是要克己復禮若能克去私意純是天理自無所憂如何不是仁仁者天下之公私欲不萌而天下之公在我何憂之有孟子説配義與道無是餒也今有見得道理分明而反懾怯者氣不足也南軒曰不惑者見理明也不憂者其樂深也不懼者其守固也子曰君子道者三我無能焉仁者不憂知者不惑勇者不懼子貢曰夫子自道也朱子曰自責以勉人也道言也自道猶云謙辭尹氏曰成德以仁為先進學以智為先故夫子之言其序有不同如此王彥霖問心一也有曰云云何也程子曰此只是名其德爾其理一也得其道而不憂者仁之事也因其不憂故曰此仁也智勇亦然凡名其德千百皆然但此三者達德之大者也仁者不憂智者不惑勇者不懼德之序也知者不惑仁者不憂勇者不懼學之序也知以知之仁以守之勇以行之中庸知仁勇三者天下之達德也所以行之者一也此章當連天下之達道五參看朱子曰謂之達德者天下古今所同得之理也一則誠而已矣達德雖人所同得然一有不誠則人欲間之而德非其德矣程子曰所謂誠者止是誠實此三者三者之外更别無誠輯略知仁勇三者天下之達德學之要也又曰智知仁守勇決又曰大凡於道擇之則在乎知守之則在乎仁斷之則在乎勇人之於道患在不能擇不能守不能斷子曰好學近乎知力行近乎仁知恥近乎勇此言未及乎達德而求以入德之事吕氏曰愚者自是而不求自私者徇人欲而忘反懦者甘為人下而不辭故好學非知然足以破愚力行非仁然足以忘私知恥非勇然足以起懦上章既言達德之名恐學者無所從入故又言其不逺者以示之使由是而求之則可以入德也此節之指惟吕氏之言淵慤有味庶幾得之孟子對曰王請無好小勇夫撫劒疾視曰彼惡敢當我哉此匹夫之勇敵一人者也王請大之詩云王赫斯怒爰整其旅以遏徂莒以篤周祜以對於天下此文王之勇也文王一怒而安天下之民書曰天降下民作之君作之師惟曰其助上帝寵之四方有罪無罪惟我在天下曷敢有越厥志一人衡行於天下武王恥之此武王之勇也武王亦一怒而安天下之民今王亦一怒而安天下之民民惟恐王之不好勇也此言人君能懲小忿則能養大勇除暴救民以安天下矣南軒曰勇有大小血氣之勇勇之小也義理之勇勇之大也以血氣為勇則其勇不出於血氣之內勢力可勝也利害可絀也義理之勇不以血氣勢力無所加利害無所絀也故曰王請無好小勇欲其擴於義理也夫聖人非無怒也其動不以血氣而以理可怒在彼而理在此聖人何加毫末乎以文武之事觀之則可見矣曽子聞大勇於夫子章已見前養氣篇揚子或問勇曰軻也曰何軻也曰軻也者謂孟軻也若荆軻君子盜諸請問孟軻之勇曰勇於義而果於德不以貧富貴賤死生動其心其於勇也其庶乎或曰顔子之為人也近於怯子曰孰勇於顔子觀其言曰舜何人也豫何人也有為者亦若是有若無實若虛之類抑可謂大勇矣程子曰人之學不進只是不勇禮聘義所貴於勇敢者貴其敢行禮義也故勇敢強有力者天下無事則用之於禮義天下有事則用之於戰勝用之於戰勝則無敵用之於禮義則順治按左氏晉狼瞫為右先軫黜之狼瞫怒其友曰盍死之瞫曰吾未獲死所其友曰吾與女為難瞫曰周志有之勇則害上不登于明堂死而不義非勇也共用之為勇吾以勇求右無勇而黜亦其所也謂上不我知黜而宜乃知我矣子姑待之及彭衙既陳以其屬馳秦師死焉晉師從之大敗秦師君子謂狼瞫於是乎君子狼瞫在春秋未得為賢大夫而所謂死而不義非勇也其言有可取者故附此右專言勇西山讀書記卷九
