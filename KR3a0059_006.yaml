body:
  text: 西山讀書記卷六宋真徳秀撰仁書仲虺之誥曰克寬克仁彰信兆民此稱湯之辭伊尹曰民罔常懐懐于有仁此告太甲之辭六經言仁始於此虞書所謂好生之徳安民則惠即仁也而未有仁之名至是而名始著大抵言仁之用至孔子而後言仁之體復六二象曰休復之吉以下仁也程子曰為復之休美而吉者以其能下仁也仁者天下之公善之本也初復於仁二能親而下之是以吉也朱子曰伊川語録中説仁者以天地萬物為一體説得太寛無捉摸處易傳只云四徳之元猶五常之仁偏言則一事專言則包四者又云仁者天下之公善之本也易傳只此兩處説仁極平正確實學者且當玩此此是程子手筆也李守約曰天下之公是無一毫私心善之本是萬善從此出論語有子曰君子務本本立而道生孝弟也者其為仁之本與朱子曰務專力也本猶根也仁者愛之理心之徳也為仁猶曰行仁與者疑詞謙退不敢質言也程子曰徳有本本立則其道充大孝弟行於家而後仁愛及於物所謂親親而仁民也故為仁以孝弟為本論性則以仁為孝弟之本或問孝弟為仁之本此是由孝弟可以至仁否曰非也謂行仁自孝弟始孝弟是仁之一事謂之行仁之本則可謂是仁之本則不可葢仁是性也孝弟是用也性中只有箇仁義禮智四者而已曷嘗有孝弟来然仁主於愛愛莫大於愛親故曰孝弟也者其為仁之本與集義明道先生曰孝弟本其所以生乃為仁之本或問為仁先從愛物推如何伊川先生曰不愛其親而愛他人者謂之悖徳不敬其親而敬他人者謂之悖禮故君子親親而仁民仁民而愛物能親親豈不能仁民能仁民豈不能愛物仁民而推親親墨子也或問仁何以為愛之理也曰人禀五行之秀以生故其為心也未發則具仁義禮智信之性以為之體已發則有惻隠羞惡㳟敬是非誠實之情以為之用葢木神曰仁則愛之理也而其發為惻隠火神曰禮則敬之理也而其發為㳟譲金神曰義則宜之理也而其發為羞惡水神曰智則别之理也而其發為是非土神曰信則實有之理也而其發為忠信是皆天理之固然人心之所以為妙也仁之所以為愛之理於此其可推矣或曰仁為愛之理矣又以為心之徳何哉曰仁之道大不可以一言而盡也程子論乾四徳之元猶五常之仁偏言則一事專言則包四者推此而言則可見矣葢仁者五常之首而包四者惻隠之體也而貫四端故仁之為義偏言之則曰愛之理此章孝弟為仁之本是也專言之則曰心之徳下章所謂巧言令色鮮矣仁是也其實愛之理所以為心之徳是以聖門之學必以求仁為要而語其所以行之者則必以孝弟為先論其所以賊之者則必以巧言令色為甚記語者所以列二章於首章之次而其序又如此欲學者知仁為急而識其所當務與其所可戒也曰程子以孝弟為行仁之本而又曰論性則以仁為孝弟之本何也曰仁之為性愛之理也其見於用則事親從兄仁民愛物皆其為之之事也此論性而以仁為孝弟之本者然也但親者我之所自出兄者同出而先我故事親而孝從兄而弟乃愛之先見而尤切若君子以此為務而力行之至於行成而徳立則自親親而仁民自仁民而愛物其愛有差等其施有漸次而為仁之道生生而不窮矣此孝弟所以為行仁之本也曰然則所謂性中但有仁義禮智而無孝弟者又何耶曰此亦以為自性而言則始有四者之名而未有孝弟之目耳非謂孝弟之理不本於性而生於外也曰然則禮義智信為之亦有本耶曰有請問之曰亦孝弟而已矣但以愛親而言則為仁之本也其順乎親則為義之本也敬乎親者則為禮之本也其知此者則為智之本也其誠此者則為信之本也葢人之所以為五常百行之本無不在此孟子之論仁義禮智樂之實者正為是爾此其所以為至徳要道也歟引程子云云譬如一粒粟生出為苖仁是粟孝弟是苖便是仁為孝弟之本又如木有根有幹有枝有葉親親是根仁民是幹愛物是枝葉便是行仁以孝弟為本性中只有仁義禮智四者仁便包攝孝弟在其中但未發出來未有孝弟之名耳非孝弟與仁各是一物性中只有仁而無孝弟也仁所包攝不止孝弟凡慈愛之屬皆所包也伊川云為仁以孝弟為本事之本守之本之類是也論性以仁為孝弟之本天下之大本之類是也黄氏曰先師嘗言二程子之解釋經義非諸儒所能及程伯子曰孝弟本其所以生乃為仁之本此語最深切葢推原孝弟之理本於父母之所以生所以為行仁之本也或曰仁者愛之理心之徳先師言之詳矣而學者未之能曉也曰仁性也既曰愛又曰心何也天地之大徳曰生天地之所以為徳語其全體而極其大用不過曰生而已生之外無他道也天地以是為心而人得天地之心以為心故其所以為仁者愛是也仁固主於愛然人之一心有仁有義有禮有智其所以為徳者非一然仁包四徳而貫四端則凡吾心之全徳莫非仁也論仁之所專主而至切者則曰愛論仁之所兼統而至廣者則曰心不若是不足以盡其義也曰愛矣而又曰愛之理心矣而又曰心之徳何也曰愛自是情仁自是性程子言之矣愛非所以言仁也曰愛之理則是仁者乃愛之理而非愛也葢指性而言也合性與知覺有心之名張子言之矣言心則合性知覺而言曰心之徳則專指此心所得之理所謂性也而凡所具之理皆在其中矣既曰愛之理心之徳則釐而為二矣又曰其實愛之理所以為心之徳何也曰論其專主而至切者固曰愛之理然其兼統而至廣者亦豈離乎愛之理哉故春者生意之生也夏者生意之長也秋者生意之歛也冬者生意之藏也葢無適而非生意也方其靜也則一生意足以包四徳及其動也則一生意足以貫四端則愛之理心之徳又豈有二事哉但别而言之庻其部分位置截然不亂又合而言之使其倫理脉絡渾然無間是則先師之意也孔門教人莫切於求仁歴代諸儒推明其義卒無至當之論自程子一為主一事包四者之言而先師立愛之理心之徳六字以斷之而又一離一合以極其指歸使天命人心之奥聖賢典訓之㣲一旦粲然大明其功豈可量哉子曰巧言令色鮮矣仁朱子曰巧好令善也好其言善其色致飾於外務以悦人則人欲肆而本心之徳亡矣聖人詞不廹切專言鮮則絶無可知程子曰知巧言令色之非仁則知仁矣或問辭欲巧令儀令色何以異於此章所謂巧言令色乎曰為己為人之不同而已意誠在於為己則容貌辭氣之間無非持養用力之地一有意於為人而求其説己則心失其正而鮮仁矣只馳心於外便是不仁南軒張氏曰此所謂巧言令色欲以悦人之觀聽者其心如之何故為鮮矣仁或曰君子之於言色未嘗有所茍也則闕君子之修身謹於言辭容色之間乃所以體察在己之實事是求仁之要也子曰人而不仁如禮何人而不仁如樂何㳺氏曰人而不仁則人心亡矣其如禮樂何哉言雖欲用之而禮樂不為之用也程子曰仁者天下之正理失正理則無序而不和李氏曰禮樂待人而後行茍非其人則雖玉帛交錯鐘皷鏗鏘亦將如之何哉問禮樂不為用是如何曰不仁之人渾是一團私意自不奈禮樂何禮樂須是中和温厚底人方行得若不仁之人與禮樂不相關安得為之用中心斯須不和不樂則鄙詐之心入之外貌斯須不莊不敬則慢易之心失之既不和樂不莊敬如何行得禮樂問游氏之説則指在外禮樂言之如玉帛鐘皷之類程子所謂無序不和則主在内者言之如何曰兩説只是一意在我者既無序而不和在外之禮樂亦不為我用問仁者心之徳也不仁之人心徳既亡方寸之中絶無天理平日運量酧酢盡是非僻邪淫之氣無復本心之正如此等人雖周旋於玉帛鐘皷之間其於禮樂判為二物其如禮樂何先生曰然南軒曰此聖人使人知禮樂之原也不仁之人雖欲為禮樂其如禮樂何葢是心存而後敬與和生無禮樂之所由興也子曰里仁為美擇不處仁焉得知朱子曰里有仁厚之俗為美擇里而不居於是焉則失其是非之本心而不得為知矣謝氏曰孟子因擇術嘗引此矣故繼之曰夫仁天之尊爵也人之安宅也莫之禦而不仁是不智也今當以此論為證問謝氏之説如何朱子曰聖人本語只是説居必擇鄉游必擇士之意南軒曰里居也里仁為美言人以居仁為美也人以居仁為美茍不知擇而處焉是不智也擇而處之乃利仁之事然處之之乆則將安之矣愚按三先生之説不同正當叅繹子曰不仁者不可以乆處約不可以長處樂仁者安仁知者利仁朱子曰約窮困也利猶貪也葢深知篤好而必欲得之者也不仁之人失其本心乆約必濫乆樂必淫惟仁者則安其仁而無適不然知者則利於仁而不易所守葢雖深淺之不同然皆非外物所能奪矣謝氏曰仁者心無内外逺近精粗之間非有所存而自不亡非有所理而自不亂如目視而耳聽手持而足行也知者謂之有所見則可謂之有所得則未可有所存斯不亡有所理斯不亂未能無意也安仁則一利仁則二安仁者非顔閔以上去聖人為不逺不知此味也諸子雖有卓越之才謂之見道不惑則可然未免於利之也先生再三誦安仁則一利仁則二之語以為解中未有及此者因歎云此公見識直是髙問利仁莫是南軒所謂有所為而為者否曰有所為而為不是好底與知者利仁不同仁者温厚篤實義理自然充足不待思而為之而所為皆是義理其心常怡怡地所謂仁也知者知有是非而取正於義理以求其是而去其非所謂智也安仁者不知有仁如腰之忘帶足之忘屨利仁者是見得就之則利去之則害非顔閔以上不知此味到顔閔地位知得此味猶未到安處也南軒曰自非上智生知之流則利仁之事正所當用力爾子曰唯仁者能好人能惡人朱子曰惟之為言獨也葢無私心然後好惡當於理程子所謂得其公正者是也游氏曰好善而惡惡天下之同情然人每失其正者心有所繫而不能自克也惟仁者無私心所以能好惡也公正字相少不得公是心裏公正是好惡當理子曰茍志於仁矣無惡也朱子曰茍誠也志者心之所之也其心誠在於仁則必無為惡之事矣楊氏曰茍志於仁未必無過舉也然而為惡則無矣或問或以惡字為去聲為志於仁無所嫉惡如何曰上章適言惟仁者能好人能惡人則仁人曷嘗無所好惡哉今曰無惡然則謂其獨有所好可乎故胡氏力排其説以為貪無惡之美名失仁人之公道非知仁者葢得之矣然此又有説焉葢仁固公矣而主於愛故仁者於物之當好者則欣然悦而好之有所不得不惡者則惻然不得已而惡之是以好惡各當其物而愛之理未嘗不行乎好惡之間也以此而觀則胡氏之言其亦未免於偏與先生問學者茍志於仁矣無惡也與士志於道而恥惡衣惡食者未足與議也前言志於仁則無惡後言志於道而猶有此病其志則一而其病不同如何諸生言不合先生曰仁是最切身底道理志於仁大段是親切做工夫底所以為無惡志於道則説得來濶凡人有心向學皆志於道也若雖有志而泛泛不切則未必不為外物所動南軒曰志於仁則無不善葢元者善之長志乎此則何惡之有子曰富與貴是人之所欲也不以其道得之不處也貧與賤是人之所惡也不以其道得之不去也朱子曰不以其道得之謂不當得而得之然於富貴則不處於貧賤則不去君子之審富貴而安貧賤也如此君子去仁惡乎成名言君子所以為君子以其仁也若貪富貴而厭貧賤則是自離其仁而無君子之實矣何所成其名乎君子無終食之間違仁造次必於是顛沛必於是終食者一飯之頃造次急遽茍且之時顛沛傾覆流離之際葢君子之不去乎仁如此不但富貴貧賤取舍之間而已也言君子之為仁自富貴貧賤取舍之間以至於終食造次顚沛之頃無時無處而不用其力也然取舍之分明然後存養之功密存養之功密則其取舍之分益明矣去仁如孟子去齊之去我元有此仁而自離去之也富貴貧賤方是就粗處説終食不違以後方説得細密然不先立得粗的根脚後靣許多細密工夫更無安頓處須是先能於富貴不處於貧賤不去方可説上至細處去若見利則趨見便則奪更説甚麽正如貧而無諂富而無驕與貧而樂富而好禮相似若未能無諂無驕如何說得樂好禮子曰我未見好仁者惡不仁者好仁者無以尙之惡不仁者其為仁矣不使不仁者加乎其身朱子曰夫子自言未見好仁者惡不仁者葢好仁者真知仁之可好故天下之物無以加之惡不仁者真知不仁之可惡故其所以為仁者必能絶去不仁之事而不使少有及於其身此皆成徳之事故難得而見之也有能一日用其力於仁矣乎我未見力不足者言好仁惡不仁者雖不可見然或有人果能一旦奮然用力於仁則我又未見其力有不足者葢為仁由己欲之則是而志之所至氣必至焉故仁雖難能而至之亦易也葢有之矣我未之見也葢疑詞謂有用力而力不足者葢人之氣質不同故疑亦容或有此昏弱之甚欲進而不能者但我偶未之見耳葢不敢終以為易而又歎夫人之莫肯用力於仁也此章言人之成徳雖難其人然學者茍能實用其力則亦無不可至之理但用力而不至者今亦未見其人焉此夫子所以反覆而歎惜之也或問無以尙之之義如何曰李氏曰好仁如好色舉天下之物無有以尚之若有以尚之則其好可移矣曰為仁者亦用力乎曰蘇氏言之矣蘇氏曰仁之可好甚於美色不仁之可惡甚於惡臭而人終不知所趨避者物有以蔽塞之也解其蔽逹其塞不用力可乎故曰自勝者强又曰克己復禮為仁問好仁者不幾於安乎曰未也好仁惡不仁皆利仁之事問有能一日用其力曰此心散漫放肆一聳動時便在這裏雖曰用力却不大段用力問集註云云曰須是立志為先這氣便隨他志如大將指揮一出三軍皆隨若能立志氣皆由我使人之所以萎衰柔弱只是志不立志立氣便生若真箇要求仁豈患力不足有引范氏曰惡不仁者不若好仁之為美又援吕氏説以為惡不仁者劣於好仁曰好仁惡不仁不必分優劣聖人謂好仁者無以尚之非以好仁者不可過也謂人之好仁如好好色更無以尚之者此誠於好仁者也其曰惡不仁者其為仁矣不使不仁者加乎其身者惡不仁如惡惡臭惟恐惡臭之及吾身此誠於惡不仁者也南軒曰既曰有能一日用其力於仁矣乎我未見力不足者又曰葢有之矣我未之見也所以待天下與勉學者之意反復抑揚可謂𢎞大而深切矣愚按南軒之説謂葢有用力於仁者但我偶未之見耳似得聖人忠厚之意更詳之子曰人之過也各於其黨觀過斯知仁矣朱子曰黨類也程子曰人之過也各於其類君子常失於厚小人常失於薄君子過於愛小人過於忍尹氏曰於此觀之則人之仁不仁可知矣吳氏曰後漢呉祐謂掾以親故受汙辱之名所謂觀過知仁是也按此亦但言人雖有過猶可即此而知其厚薄非謂必俟其有過而後賢否可知也或問觀過之説曰劉氏之説亦善曰周公使管叔監殷而管叔以殷畔魯昭公實不知禮而孔子以為知禮實過也然周公愛其兄孔子厚其君乃所以為仁也所謂君子過於厚與愛者雖然是過然其血脉猶是從仁中來小人之過於薄與忍便是失其本心矣又曰厚與愛畢竟從仁上發来其血脉可見禮記謂仁者之過易辭仁者之過只是事上差錯故易説不仁之過是有私意故難説此亦觀過知仁意聖人之言寛舒無所偏失如云觀過斯知仁矣猶曰觀君子之過斯固仁之所存也若於此而欲求仁之體則失聖人過幸人知意與人同過之言説得太巧失於廹切問南軒闕以黨為偏其説以為偏者過之所由生也觀者詳視之謂今君子之偏在是從而觀之則仁可識矣此説如何先生不闕南軒語説今本與朱子集註畧同又荅學者問闕説乃見前説甚有病来説云云大似釋氏講學不可老草葢過須是子細玩味方見聖人當時立言意思過於厚者謂之仁則不可然心之不逺者可知比夫過於薄甚至於為忮為忍者其相去不亦逺乎請用此意體認乃見仁之所以為仁之義不至渺茫恍惚矣詳此則韋齋記之云非其定論也或曰雍也仁而不佞子曰焉用佞禦人以口給屢憎於人不知其人焉用佞朱子曰佞口才也仲弓為人厚重簡黙而時人以佞為賢故美其優於徳而病其短於才也佞人以口取辦而無情實徒多為人憎惡耳我雖未知仲弓之仁然其不佞乃所以為賢不足以為病也或疑仲弓之賢而夫子不許其仁何也曰仁道至大非全體而不息者不足以當之如顔子亞聖猶不能無違於三月之後况仲弓雖賢未及顔子聖人固不得而輕許之也所謂全體不息者此心具十全道理若只見得九分亦不是全體所以息者是私欲間之無一毫私欲方是不息黄氏曰集注於為仁之本言仁而斷之曰仁者愛之理心之徳深味六字之義則仁之道無餘藴矣至此言盡仁之道而又斷之曰非全體而不息者不足以當之深味全體不息四字則學者而求至於仁其至之標的又昭然而可見矣前後十字之約而仁之道有前軰諸儒累十百言言而莫能究者非深造而實體者何足以知之其發前賢之未發而有功於後學大矣學者不可不深思也或曰集註於令尹子文陳文子章引師説曰當理而無私心與此章所謂全體而不息者有以異乎曰以後章當理無私心之五字較之此章之言則此章全體二字已足以該後章五字之義加之以不息二字則又後章未盡之㫖故後章雖引師説以為據而或問之中乃曰仁者心之徳而天之理也自非至誠盡性通貫全體如天地一元之氣化育流行無少間息不足以名之亦足以見前説之義尤詳且密也愚按集義程子曰佞辯才也人有之則多入於不善故夫子云焉用佞范氏曰佞口才也時人以為賢故謂雍也仁而不佞夫子亦惟好仁而惡佞佞者不必能行也仁者不必能言也故佞則不仁仁則不佞多言而尚口取憎之道也尹氏曰雍也仁矣或疑其不佞子謂既仁矣惡所用佞因言佞者禦人以口給屢為人所憎仁者安所用之乎諸説皆以不知其仁指佞者而言與朱子説異當詳之孟武伯問子路仁乎子曰不知也朱子曰子路之於仁葢日月至焉者或在或亡不能必其有無故以不知告之又問子曰由也千乗之國可使治其賦也不知其仁也求也何如子曰求也千室之邑百乘之家可使為之宰也不知其仁也赤也何如子曰赤也束帶立於朝可使與賓客言也不知其仁也或問諸説有併與三子之才而不之取以為習衰世仕於諸侯大夫之事而不能有以自樂者何如曰治賦為宰與賓客言皆有國家者所不可廢之事雖當隆盛之時仕天子之朝亦豈能一無事於此而直以從容風議為髙哉元祐議論意趣多類此此所以墮於一偏之見也問雖全體未是仁茍於一事上能當理而無私心亦可謂之一事之仁否曰才説仁便用以全體言若一事能盡仁便是他全體是仁若全體有虧這一事必不能盡仁才説箇仁便包盡許多事無不當理而無私者所以三子當不得聖人只許其才渾然天理便是仁一毫私意便不是仁子張問曰令尹子文三仕為令尹無喜色三已之無愠色舊令尹之政必以告新令尹何如子曰忠矣曰仁矣乎曰未知焉得仁朱子曰令尹官名楚上卿執政者也子文姓鬭名糓於菟其為人也喜怒不形物我無間知有其國而不知有其身其忠盛矣故子張疑其仁然其所以三仕三已而告新令尹者未知其皆出於天理而無人欲之私也是以夫子但許其忠而未許其仁也崔子弑齊君陳文子有馬十乘棄而違之至於他邦則曰猶吾大夫崔子也違之之一邦則又曰猶吾大夫崔子也違之何如子曰清矣曰仁矣乎曰未知焉得仁崔子齊大夫名杼齊君莊公名光陳文子亦齊大夫名須無十乘四十匹也違去也文子潔身去亂可謂清矣然未知其心果見義理之當然而能脫然無所累乎抑不得已於利害之私而猶未免於怨悔也故夫子特許其清而不許其仁愚聞之師曰當理而無私心則仁矣今以是而觀二子之事雖其制行之髙若不可及然皆未有以見其必當於理而真無私心也子張未識仁體而悦於茍難遂以小者信其大者夫子之不許也宜哉讀者於此更以上章不知其仁後篇仁則吾不知之語并與三仁夷齊之事觀之則彼此交盡而仁之為義可識矣今以他書考之子文之相楚所謀者無非僣王猾夏之事文子之仕齊既失正君討賊之義又不數歲而復反於齊焉則其不仁亦可見矣子曰囘也其心三月不違仁其餘則日月至焉而已矣朱子曰三月言其乆仁者心之徳心不違仁者無私欲而有其徳也日月至焉者或日一至焉或月一至焉能造其域而不能乆也程子曰三月天道小變之節言其乆也過此則聖人矣不違仁只是無纎毫私欲少有私欲便是不仁尹氏曰此顔子於聖人未逹一間者也若聖人則渾然無間斷矣張子曰始學之要當知三月不違與日月至焉内外賓主之辨使心意勉勉循循而不能已過此幾非在我者或問仁人心也則心與仁宜一矣而又曰心不違仁則心之與仁又若二焉者何也曰孟子之言非以仁訓心也葢以仁為心之徳也人有是心則有是徳矣然私欲亂之則或有是心而不能有是徳此衆人之心所以每至於違仁也克己復禮私欲不萌則即是心而是徳存焉此顔子之心所以不違於仁也故所謂違仁者非有兩物而相去也所謂不違者非有兩物而相依也深體而黙識於言意之表則庻乎其得之矣曰其以三月期何也曰顔子之於仁熟矣然以其猶有待於不違而後一也是以至於踰時之乆而或不能無念慮之差焉然其復不逺則其心之本然者又未嘗有所失也向使假之年大而化之則其心與仁無待於不違而常一又豈復可以三月期哉張子内外賓主之辨葢曰不違者仁在内而我為主也日月至仁仁在外而我為客也誠知此辨則其不安於客而求為主於内必矣故曰使心意勉勉循循而不能已也其曰過此幾非在我者則豈以用功至此而極矣過此以往則必徳盛仁熟而自至而非吾力之所能與也與又程子曰日月至焉與乆而不息者所見規模雖畧相似而其氣味意象逈然有别須心潜黙識玩索乆之而後自得朱子曰非其身親而實有之亦豈能發明至此耶仁與心本是一物才被私欲一隔便與仁相違却成二物若私欲既無則心與仁不相離便合成一物心猶鏡仁猶鏡之明鏡本來明被塵一蔽便不明若塵垢去則鏡明矣顔子是三月之乆無塵垢其餘或日一次無塵垢少間又暗或月一次無塵垢餘日皆暗亦不可知三月只是言乆爾非謂三月後必違也如不貳過過便是違仁問不知其仁註云云曰不是三月以後一向差去但其於這道理乆後須畧間斷若無些子間斷便全是天理便是聖人顔子一似主人長在家裏三月而後或有出去時節便㑹囘歸其餘是賔或一日一至或一月一至在内之日多即是主在内之日少即是客此即内外賓主之辨問張子云云曰學者只要勉勉循循而不能已故能如此後靣雖不大段著力也自做去如推車相似得轉動便滔滔自行不待著力而自不能已過此幾非在我謂過三月不違非工夫所能及如末由也己真是著力不得又曰幾非在我如易傳中説過此以徃未之或知之意問囘心三月不違仁先生曰如何是心如何是仁對曰心是知覺底仁是理先生曰耳無有不聦目無有不明心無有不仁然耳有時不聦目有時不明心有時不仁問莫是心與理合而為一否曰不是合心自是仁然私欲一動便不仁三月不違之違猶白中之黑日月至焉之至猶黑中之白南軒曰人具生道以生其心未有不仁者也一毫私欲萌於中則違於仁矣惟不逺而復者私欲不萌故其仁無時而不存焉三月言其乆而熟也而猶不違焉未若聖人之渾然無間也日月至焉與三月不違者固亦異矣然非見道明而用力堅亦未易日月至也由是而不已焉則亦可馴致矣黄氏曰心不違仁則心與仁二仁人心也則心與仁一二説不同而集注乃合而言之其義精矣或曰張子曰合性與知覺有心之名故心之為義有專指知覺而言者心不違仁是也有合性與知覺而言者仁人心是也張子言内外賓主或問以為日月至焉仁在外三月不違仁在内或曰仁非有内外也孟子曰仁人之安宅也言仁之理如至安之宅也譬之三月不違則心為主在仁之内如身為主在宅之内也日月至焉則心為賔在仁之外如身為賓在宅之外也此兩義者與集註少異姑存之以備參考子曰志於道朱子曰志者心之所之之謂道則人倫日用之間所當行者是也知此而心必之焉則所適者正而無他岐之惑矣據於徳據者執守之意徳則行道而有得於心者也得之於心而守之不失則終始惟一而有日新之功矣依於仁依者不違之謂仁則私欲盡去而心徳之全也功夫至此而無終食之違則存養之熟無適而非天理之流行矣游於藝游者玩物適情之謂藝則禮樂之文射御書數之法皆至理所寓而日用之不可闕者也朝夕游焉以博其義理之趣則應務有餘而心亦無所放矣此章言人之為學當如是也葢學莫先於立志志道則心存於正而不他據徳則道得於心而不失依仁則徳性常用而物欲不行游藝則小物不遺而動息有養學者於此有以不失其先後之序輕重之倫焉則本末兼該内外交養日用之間無少間隙而涵養從容忽不自知其入於聖賢之域矣志於道方有志焉據於徳一言一行之謹亦是徳依於仁仁是衆善總㑹處志謂至誠懇惻念念不忘道者日用當然之理徳者得之於身也既得之守不定亦㑹失了須是據守方得徳者吾之所自有非自外而得也以仁義禮智觀之可見韓退之云徳足乎已無待於外説得也好這處先要就志於道上理㑹這是个生死路頭如得此路是了只管向此路念念不忘處己也在是接人也在是講論也在是思索也在是今人把捉不定一出一入或東或西以夫子大聖猶且從志學做來今要做工夫須看聖人志於學處是如何這處見得定後節節有下工夫處據於徳徳者得也便是我自得底不是徒恁地知得若徒知得不能得之於己似説别人底於己何干預如事親能孝便是我得這孝事君能忠便是我得這忠説到徳便是成就這道方可有據處但據於徳固是有得於心然亦恐怕有走作時節其所存主處須是依於仁到游藝雖似非所急然亦少不得所以助其存主也志於道方是要去做事親欲盡其孝事兄欲盡其弟至於據於徳則事親能盡其孝事兄能盡其弟已有可據底地位依於仁則自朝至暮此心無不在這裏這許多徳縂攝貫穿都活了然藝亦不可不去理㑹如禮樂射御書數一件理㑹不得此心便覺滯礙惟是一一去理㑹這道理脉絡方始一一流通又却養得這个道理以此知大則道無不包小則道無不入小大精粗皆無渗漏都是做工夫處故曰語大天下莫能載語小天下莫能破仁者人之本心也依如依乎中庸之依相依而不捨之之意如所謂君子無終食之間違仁是也藝是小學工夫若論先後則藝為先而三者為後若論本末則三者其本而藝其末文中子説志道據徳依仁而後藝可游此説得自好志道至依仁一節密似一節志於道則心心念念惟在人倫日用之所當行者决不向利欲邉去其志定矣據於徳如孝親弟長等事皆吾之所自得而行之者慮有照管不到時節當據守之而弗失則吾之所得者實矣依於仁則全其本心之徳而不間於人欲之私生生之體自然流行不息工夫至此亦云熟矣此三節自立脚大綱以至工夫精察如此游於藝是行有餘力則以學文之意未知是否先生曰然宰我問曰仁者雖告之曰井有仁焉其從之也子曰何為其然也君子可逝也不可陷也可欺也不可㒺也朱子曰劉聘君云有仁之仁當作人今從之從謂從之於井而救之也宰我信道不篤而憂為仁之陷害故有此問逝謂使之徃救陷謂陷之於井欺謂誑之以理之所有㒺謂昩之以理之所無葢身在井上乃可以救井中之人若從之於井則不復能救之矣此理甚明人所易曉仁者雖切於救人而不私其身然不應如此之愚也南軒曰宰我發此問亦不可不謂之切問也謂仁者惟知求仁而患難有所不恤也夫子之所以告之者理則無不盡矣葢其可逝可欺者惻隠之形不逆詐不億不信也而其不可陷不可㒺者理不可昩故也於此亦可以究仁者之心也冉有曰夫子為衛君乎子貢曰諾吾將問之入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨出曰夫子不為也朱子曰君子居是邦不非其大夫况其君乎故子貢不斥衛君而以夷齊為問夫子告之如此則其不為衛君可知矣葢伯夷以父命為尊叔齊以天倫為重其遜國也皆求所以合乎天理之正而即乎人心之安既而各得其志焉則視棄其國猶敝屣爾何怨之有若衛輒之據國拒父而惟恐失之其不可同年而語明矣程子曰伯夷叔齊遜國而逃諫伐而餓終無怨悔夫子以為賢故知其不與輒也論子貢問衛君事曰若使當時子貢往問輒事不唯夫子未必答便答亦不能盡若一問便止亦未見分明再問怨乎便見得子貢善問纔説道求仁而得仁又何怨便見得夷齊兄弟所處無非天理蒯輒父子所向無非人欲二者相去天淵矣問子貢欲知為衛君何故問夷齊怨不怨曰一是兄弟遜國一是父子爭國此是則彼非可知孔子論伯夷謂求仁得仁又何怨司馬子長作伯夷傳但見得伯夷滿身是怨蘇子由伯夷論却好按蘇氏曰伯夷叔齊之出也父子之間必有間言焉而能脱身以逺於亂安於喪亡不以舊惡為怨故凡言伯夷之不怨以譲國言之也問蘇氏閒言之説果可據乎先生曰伯夷既長且賢其父無故舍之而立叔齊此必有故故蘇氏疑之觀子貢問怨乎之義似或有此意然聖賢之心志於求仁便有甚死讎亦消融了何怨之有南軒曰叔齊之讓伯夷以為伯夷之長當立無兄弟之義而何以為國乎伯夷之不受國以為叔齊之立父命也無父子之義而何以為國乎之二人者寕去國而存此矣衛輒之事國人以為蒯瞶既得罪於先君而出奔而輒受先君之命宗國不可以無主則立輒而拒蒯聵可也曾不思蒯瞶父也輒子也父子之義先亡矣國其可一日立乎在輒之分寧委國而全其父子可也故子貢以夷齊之事為問方是時夫子在衛輒立之事葢難言也賜也㣲其詞以測聖人之㫖可謂善為辭者矣中有所悔恨皆謂之怨其曰怨乎者謂二子者委國而去獨不顧其宗國而有所不足於中乎夫子告之以求仁而得仁謂二人者求夫天理之安而已夫豈利害之計乎明乎此而後知古人所以處身謀國之宜矣子曰仁遠乎哉我欲仁斯仁至矣朱子曰仁者心之徳非在外也放而不求故有以為逺者反而求之則即此而在矣夫豈逺哉程子曰為仁由己欲之則至何逺之有問斯仁至矣云云曰昔者亡之今忽在此如自外而至耳如易言來復實非自外而来也南軒曰不曰至於仁而曰斯仁至矣葢仁非有方所可以往至也欲仁而仁至我固有之矣曾子曰士不可以不𢎞毅任重而道逺朱子曰𢎞寛廣也毅强忍也非𢎞不能勝其重非毅無以致其逺仁以為己任不亦重乎死而後己不亦逺乎仁者人心之全徳而必欲以身體而力行之可謂重矣一息尚存此志不容少懈可謂逺矣程子曰𢎞而不毅則無規矩而難立毅而不𢎞則隘陋而無以居之又曰𢎞大剛毅然後能勝重任而逺到又曰顔子𢎞且毅孟子毅勝𢎞西銘言𢎞之道重擔子須硬脊漢方擔得朱子曰𢎞雖只是寛廣若只把做度量寛容看便不得此𢎞字便是執徳不𢎞之𢎞謂如人有許多道理及至學來下梢却做得狹窄了便是不𢎞葢緣只以己為是他人之言雖善亦不信如此狹小何緣得𢎞須是凡人之善皆有以受之集衆善之謂𢎞問是寛以居之否曰然如人能𢎞道是以𢎞為開擴却是作用𢎞是事事着得道理也着得事物也着得順來也着得逆來也着得富貴也着得貧賤也着得所謂𢎞者不但是容受得人須容受得許多衆理若執着一見便自以為是他説更入不得便是滯於一隅如何得𢎞如何勝得重任問𢎞是心之體毅是心之力曰心體是多少大大而天地之理纔思量便在這裡若是世上淺心底人有一兩件事便着不得毅是立脚處堅忍强厲擔負得去底意思𢎞是無所不容心裏無足時不説我徳己如此便住如無底之谷擲一物於中無有窮盡時若有滿足之心便不是𢎞毅是忍耐持守着力去做道理自是个大底物事無所不包若小着這心如何承載得起𢎞了却要毅𢎞則都包得在裏又須分别是非有規矩始得𢎞是事事着得如進學也要𢎞接物也要𢎞事事要𢎞若不𢎞只見得這一邉不見那一邉只得些小便自足毅是發處勇猛行得來强忍毅是𢎞之發用處曽子之學大抵如孟子之勇觀此章與臨大事不可奪與彼富吾仁之説則其勇可知若不勇如何主張得住子罕言利與命與仁朱子曰罕少也程子曰計利則害義命之理㣲仁之道大故夫子罕言之問夫子與門人言仁多矣而曰罕言何也曰夫子與門人答問其言不勝其多而言仁尤其切要者故門人備記之而所記止於此則亦可謂之罕言矣况所言之仁亦不過泛及為仁之事至於仁之本體則未嘗直指以告人也仁者性之徳也然必忠信篤敬克己復禮然後能至若多言仁則學者憑虚躐等而反害於仁矣罕言仁者恐人輕易看了不知切己上做工夫南軒曰所謂命與仁者凡夫子之所言何莫非此理而何隠乎爾也在學者潜心如何耳然夫子未嘗指言也謂之罕亦可矣顔淵問仁子曰克己復禮為仁一日克己復禮天下歸仁焉為仁由己而由人乎哉朱子曰仁者本心之全徳克勝也己謂身之私欲也復反也禮者天理之節文也為仁者所以全其心之徳也葢心之全徳莫非天理而亦不能不壊於人欲故為仁者必有以勝私欲而復於禮則事皆天理而本心之徳復全於我矣歸猶與也又言一日克己復禮則天下之人皆與其仁極言其效之甚速而至大也又言為仁由己而非他人所能預又見其幾之在我而無難也日日克之不以為難則私欲净盡天理流行而仁不可勝用矣程子曰非禮處便是私意既是私意如何得仁須是克盡己私皆歸於禮方始是仁又曰克己復禮則事事皆仁故曰天下歸仁謝氏曰克己須從性偏難克處克將去顔淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顔淵曰囘雖不敏請事斯語矣目條件也顔淵聞夫子之言則於天理人欲之際巳判然矣故不復有所疑問而直請其條目也非禮者己之私也勿者禁止之辭是人心之所以為主而勝私復禮之機也私勝則動容周旋無不中禮而日用之間莫非天理之流行矣事如事事之事請事斯語顔子黙識其理又自知其力有以勝之故直以為己任而不疑也程子曰顔淵問克己復禮之目子曰非禮勿視非禮勿聽非禮勿言非禮勿動四者身之用也由乎中而應乎外制於外所以飬其中也顔淵事斯語所以進於聖人後之學聖人者宜服膺而勿失也因箴以自警其視箴曰心兮本虚應物無迹操之有要視為之則蔽交於前其中則遷制之於外以安其内克己復禮乆而誠矣其聽箴曰人有秉彛本乎天性知誘物化遂亡其正卓彼先覺知止有定閑邪存誠非禮勿聽其言箴曰人心之動因言以宣發禁躁妄内斯静專矧是樞機興戎出好吉凶榮辱惟其所召傷易則誕傷煩則支己肆物忤出悖來違非法不道欽哉訓辭其動箴曰哲人知幾誠之於思志士勵行守之於為順理則裕從欲惟危造次克念戰兢自持習與性成聖賢同歸按此章問答乃傳授心法切要之言非至明不能察其幾非至健不能致其决故惟顔子得聞之而凡學者不可以不勉也程子之箴發明親切學者尤宜深玩或問顔淵問仁而夫子告之以此何也曰人受天地之中以生而仁義禮智之性具於其心仁雖專主於愛而實為心體之全徳禮則專主於敬而實天理之節文也然人有是身則耳目口體之間不能無私欲之累以違於禮而害夫仁則自其一身莫適為主而事物之間顛倒錯亂葢無所不至矣此聖門之學所以汲汲於求仁而顔子之問夫子特以克己復禮告之葢欲其克去有己之私欲而復於天理之本然則夫本心之全徳將不離乎此而無不盡也然人特患於不為耳誠能一旦用力於此則本心之全徳在我而天下之善將無不由是而出天下雖大亦孰有不與其仁者乎然己者人欲之私也禮者天理之公也一心之中二者不容並立而其相去之間不能以毫髪出乎此則入乎彼出乎彼則入於此矣是其克與不克復與不復如手反復如背屈伸誠欲為之其機固亦在我而已夫豈他人之所得與哉顔子之質幾於聖人故其問仁夫子告之獨為切要而詳盡耳曰然則顔子請問其目而夫子告以四勿之云何也曰顔子聞夫子克己復禮之言葢己洞然黙識仁之為體矣然夫子所謂克己復禮者必有條目而後可以從事於其間也故復問以審之而夫子以此告之也葢禮為天理之節文而其用無所不在以身而言則視聽言動四者足以該之矣四者之間由粗而精由小而大所當為者皆禮也所不當為者皆非禮也禮即天之理也非禮則己之私也於是四者謹而察之知其非禮而勿以止焉則是克己之私而復於禮矣且非禮而勿視聽者防其自外入而動於内者也非禮而勿言動者謹其自内出而接於外者也内外交進為仁之功不遺餘力矣顔子於是請事斯語而力行之所以三月不違而卒進乎聖人之域也然熟味聖言以求顔子之所用力其機特在勿與不勿之間而己自是而反則為天理自是而流則為人欲自是而克念則為聖自是而罔念則為狂特在毫忽之間耳學者可不謹其所擇哉顔子平生只是受用克己復禮四箇字顔子克己如紅爐上一㸃雪克己如誓不與賊俱生克伐怨欲不行如薄伐玁狁至於太原逐出境而已或曰克己是勝己之私之謂克否曰然或問克己之私有三氣禀物欲人我是也不知那个是夫子所指者曰三者皆在裏然非禮勿視聽言動則耳目口體之欲較多又問克者勝也不如以克訓治較穏先生曰治字緩只减得一二分也是治聖人所以下个克字譬如相殺相似定要克勝了方住禮是自家本有底所以説箇復不是待克了己方去復禮克得那一分人欲去便復得這一分天理來克得二分己私去便復得二分禮來問克己復禮疑若克己後便己是仁不知復禮還又是一重工夫否曰己與禮對立克去己後必復於禮然後為仁若克去己私便無一事則克之後須落空去也且如坐當如尸立當如齋此禮也坐而箕踞立而跛倚此己私也克去己私則不容箕踞而跛倚然必如尸如齋方合禮問克齋記云克己者所以復禮非克己之外别有所謂復禮之功如何先生曰便是當時説得太快了明道先生謂克己則私心去自能復禮便是實問一日克己復禮如何天下便歸仁曰若真能一日克己復禮則天下有歸仁之理這處亦如在家無怨在邦無怨意思在家無怨一家歸其仁在邦無怨一邦歸其仁告仲弓者止於邦家顔子則以其極者告之問所以謂之禮而不謂之理者莫是禮便有凖則有着實處否先生曰只説理恐虚了這箇禮是那天理節文教人有凖則處又曰惟其使此禮字便有檢束之意若只説天理便泛了又曰所以頓着這禮字時便有規矩凖繩可見非禮勿視説文謂勿字似旗脚此旗一麾三軍盡退工夫只在勿上纔見非理來則以勿字禁止之纔禁止便克去纔克去便能復禮問非禮勿視聽言動㸔來都在視上先生曰不專在視上聽亦然緣有視聽便引惹得言動所以先説視聽後説言動坐間舉佛家亦有克己底話先生曰所以不可行者却無復禮一段事既克己若不復禮如何得問聖人言仁處如克己復禮一句最是得仁之全體否曰聖人告人如居處㳟執事敬與人忠之類無非言仁若見得時何處不是全體何嘗見有半體仁但克己復禮一句尤親切爾問集注謂天下皆與其仁後却載伊川語謂事事皆仁恰似兩般如何曰惟其事事皆仁所以天下歸仁問事事皆仁曰人能克己則日間所行事皆無私意而合天理耳問謝氏説克己須從性偏難克處克將去此性是氣質之性否曰然然亦無難易凡氣質之偏處皆須從頭克去問程子謂制之於外以安其内却是與克伐怨欲不行底相似先生曰克己工夫其初如何便㑹自然也須禁制始得到養得熟後便私意自漸漸消磨去今人須要簡易處做却不知若不自難處入如何得到易處問視聽之間或明知其不當視而自接乎目明知其不當聽而自接乎耳奈何曰視與見不同聽與聞不同如非禮之色自過乎目自家不可有要視之之心非禮之聲自過乎耳自家不可有要聽之之心然這處是也難古人於此亦有以禦之如云姦聲亂色不留聰明淫樂慝禮不接心術動箴云云曰思是動於内為是動於外葢思於内不可不誠為於外不可不守然專誠於思而不守於為不可專守於為而不誠於思亦不可思是動之㣲為是動之著克己復禮為仁是做得這工夫到這地位便是仁上蔡却説知仁識仁煞有病問或問中論克己銘之非如何曰克己之已未是對人物言吕與叔遂謂己既不正物我並觀則雖天下之大莫不在吾仁之中説得來恁地大故人皆喜其快殊不知未是如此曰如此則與叔之意與下文克己之目全不干渉此只是自修之事未道着外靣在先生曰須是恁地思之且道視聽言動干人甚事問天下歸仁先生曰克己復禮則事事皆是天下之人聞之見之莫不皆與其為仁也又曰有幾處被前軰説得來大今收拾不得謂如君子所過者化本只言君子所居而人自化所存者神本只言所存主處便神妙横渠却云性性為能存神物物為能過化上蔡便道唯其所存者神是以所過者化此等言語人皆爛熟以為必須如此説纔不如此説便不快意矣游定夫以克己復禮與佛理一般只存想此道理而已若只以想像言克復則與下截非禮勿視四句有何干渉克齋記曰性情之徳無所不備而一言足以盡其妙曰仁而已所以求仁者葢亦多術而一言足以舉其要曰克己復禮而己葢仁也者天地所以生物之心而人物所得以為心者也惟其得夫天地生物之心以為心是以未發之前四徳具焉曰仁義禮智而仁無不統已發之際四端著焉曰惻隠羞惡辭讓是非而惻隠之心無所不通此仁之體用所以涵育渾全周流貫徹專一心之妙而為衆善之長也然人有是身則有耳目口鼻四肢之欲而或不能無害夫仁人而不仁則其所以㓕天理窮人欲者將無所不至此君子之學所以汲汲於求仁而求仁之要亦曰去其所以害仁者而己葢非禮而視人欲之害仁也非禮而聽人欲之害仁也非禮而言且動焉人欲之害仁也知人欲之所以害仁者在是於是乎有以㧞其本塞其原克之克之而又克之以至於一旦豁然欲盡而理純則其胸中之所存者無不粹然天地生物之心而藹乎其若春陽之温哉黙而成之固無一理之不具而無一物之不該也感而通焉則無事不得於理而無物之不被其愛矣又曰克復之云雖若各為二事其實天理人欲相為消長故克己者乃所以復禮而非克己之外别有復禮之功也南軒曰克盡己私一由於禮斯為仁矣禮者天則之不可踰也其本在於篤敬而發於三千三百之目皆禮也克己復禮者此言克己之至也天下歸仁者無一物之不體無一事之不該也愚按集注以天下歸仁為天下之人皆與其仁學者葢多疑之若克齋記所云黙而成之固無一理之不具而無一物之不該感而通焉則無事之不得於理而無物之不被其愛為得體用之全又日日克之一句亦不若一旦豁然之云為得聖言之本㫖更詳之仲弓問仁子曰出門如見大賓使民如承大祭己所不欲勿施於人在邦無怨在家無怨仲弓曰雍雖不敏請事斯語矣朱子曰敬以持己恕以及物則私意無所容而心徳全矣内外無怨亦以其效言之使以自考也餘見後敬恕篇按克己復禮乾道也主敬行恕坤道也顔冉之學其髙下淺深於此可見然學者誠能從事於敬恕之間亦將無己之可克矣或問一章之説曰修己以敬則私意無所萌矣推己以恕則私意無所施矣如是則天理流行内外一致而仁在我矣至於在邦在家而無怨惡於我者則是敬恕之功而仁之效也夫為仁非以求是效也而并言之葢將使之以是自考耳夫子告顔淵之言非大段剛明者不足以當之茍惟不然只且就告仲弓處着力告仲弓之言只是淳和底人皆可守這兩節一似易之乾一似易之坤聖人於乾説忠信所以進徳也修辭立其誠所以居業也説得煞廣大於坤只説敬以直内義以方外葢乾是純剛健之徳坤是純和柔之徳一日克己復禮其剛健勇决一上便做了若所以告仲弓者是教他平穏做去緩緩地消磨譬如服藥克己是一服見效敬恕是漸漸醫治克己復禮如撥亂反正主敬行恕如持盈守成聖人説話隨人淺深克己工夫較難敬恕工夫到後只一般所謂敬則無己可克克己是殺賊工夫敬恕是防賊工夫問克己復禮何以謂之乾道主敬行恕何以謂之坤道曰乾道奮發而有為坤道靜重而持守顔子之於仁如天旋地轉雷動風行仲弓則歛藏嚴謹做將去伊川曰質美者明得盡查滓便渾化却與天地同體其次惟莊敬以持養之顔子則明得盡者也仲弓則莊敬特養之者也先立於敬然後能行其恕司馬牛問仁子曰仁者其言也訒朱子曰訒忍也難也仁者心存而不放故其言若有所忍而不易發葢其徳之一端也夫子以牛多言而躁故告之以此使其於此而謹之則所以為仁之方不外是矣曰其言也訒斯謂之仁矣乎子曰為之難言之得無訒乎牛意仁道至大不但如夫子之所言故夫子又告之以此葢心常存故事不茍事不茍故其言自有不得而易者非强閉之而不出也程子曰雖為司馬牛多言故及此然聖人之言亦止此為是愚謂牛之為人如此若不告之以其病之所切而况以為仁之大概語之則以彼之躁必不能深思以去其病而終無自以入徳矣故其告之如此葢聖人之言雖有髙下大小之不同然其切於學者之身而皆為入徳之要則又初不異也只看説話容易底人便是心放了不仁者不識痛癢得説便説如人夣寐中語謹言不妄發即求仁之端仁者之言自然訒學仁者當謹言語以操持此心南軒曰人之易其言也以其未知用力也知用力則言敢易乎哉故仁者之言必訒子曰如有王者必世而後仁朱子曰王者謂聖人受命而興也三十年為一世仁謂教化浹也程子曰所謂仁者風移俗易民歸於仁天下變化之時此非積乆何以能致其曰必世理則然也欲民皆仁非必世安可又曰所謂仁者以天理流行融液洞澈而無一物之不體也舉一世而言固無一人不然即一人而言而又無一事之不然求之詩書惟成康之世為足以當之南軒曰使民皆由於仁非仁心涵養之深仁政薰陶之乆莫能然也樊遲問仁子曰居處㳟執事敬與人忠雖之夷狄不可棄也胡氏曰樊遲問仁者三此最先先難次之愛人其最後乎餘見敬篇朱子曰聖門教人多以數語能使人自存其心如居處㳟之類是也纔㳟則心自不放黄氏曰此章言極平易學者欲體仁以此思之可也居處指幽獨而言未有事者也執事指應事而言未渉乎人也與人指接物而言則渉乎人矣能㳟敬而忠則天理常存而人欲不萌又能無適而不然則流行而無所間斷仁之為道孰外於此子曰剛毅木訥近仁程子曰木者質樸訥者遲鈍四者質之近乎仁者也楊氏曰剛毅則不屈於物欲木訥則不至於外馳故近仁朱氏䟦蘇氏剛説曰剛之所以近仁為其不詘於欲而能有以全其本心之徳不待見於治人然後可知也憲問克伐怨欲不行焉可以為仁矣子曰可以為難矣仁則吾不知也朱子曰此亦原憲以其所能而問也克好勝伐自矜怨忿恨欲貪欲有是四者而能制之使不得行可謂難矣仁則天理渾然自無四者之累不行不足以言之也程子曰人而無克伐怨欲惟仁者能之有之而能制其情使不行斯亦難能也謂之仁則未也此聖人開示之深惜乎憲之不能再問也或曰四者不行固不得為仁矣然亦豈非所謂克己之事求仁之方乎曰克去己私以復乎禮則私欲不留而天理之本然者得矣若但制而不行則是未有㧞去病根之意而容其潜藏隠伏於胸中也豈克己求仁之謂哉學者察於二者之間則其所以求仁之功益親切而無滲漏矣或問程子以為聖人開示之深而原憲不能再問使憲也再問夫子告之宜奈何曰聖人未發之㫖夫孰能測之然以程子之意而言則四者之不行亦制其末而不行於外爾若其本則固著之於心而不能去也譬之木焉不去其根則萌蘖之生自不能己制而不行日力亦不給矣且雖或能制之終身不見於外而其鬰屈不平之意乃鬬進於胸中則夫所謂仁者亦且殫殘蔽害而不能以自存矣必也絶其萌芽蹶其根本不使少有毫髪留於心念之間則於仁也其庻幾乎嗚呼非程子之學之至何足以及此然以為學者茍不能深省而力行之則亦徒為無當之大言而己故雖發之而亦有所不敢盡其言者其㫖深矣問克伐與克己不同先生曰只是箇出入意克己是入來勝己克伐是外去勝人問克伐怨欲不行如何曰此譬如停賊在家豈不為害若便趕將出去則禍根絶矣然人非特不能克去此害却有與他打做一片者問學者用功且能於此不行亦可先生曰須是克己涵養以敬於其方萌時絶之若至於克伐怨欲欲其不行只是遏得住一旦决裂大可憂克己者是從根源上一刀兩斷便斬絶了更不復萌不行底只是禁制他不要出來他那欲為之心未嘗忘問原憲是合下見得如此已足還是氣昏力弱没奈何曰是他從來把這箇做好只要得不行便了所以學者須要窮理緣他見得道理未盡便把這箇做仁較之世人沉迷私欲他一切不行已是多少好惟是聖道廣大只恁地不濟事須着進向上去將克伐怨欲都無始得若藏蓄在這裏只是做病南軒曰克伐怨欲不行可謂能制其私欲矣然克伐怨欲之根猶在也若夫仁者之心則四者之病無自而萌焉欲進於是其惟克己乎子曰君子而不仁者有矣夫未有小人而仁者也謝氏曰君子志於仁矣然毫忽之間心不在焉則未免為不仁也南軒曰斯須之間心不在焉則為不仁是故君子戰兢是持而惟恐失之也若小人則戕賊陷溺雖秉彛之端不容盡泯而亦不能以自逹也子路曰桓公殺公子糾召忽死之管仲不死曰未仁乎朱子曰子路疑管仲忘君事讎忍心害理不得為仁也子曰桓公九合諸侯不以兵車管仲之力也如其仁如其仁不以兵車言不假威力也如其仁言誰如其仁者又再言以深許之葢管仲雖未得為仁人而其利澤及人則有仁之功矣或問管仲不死之説曰程子至矣但以薄昭之言證桓公之為兄則荀卿嘗謂桓公殺兄以争國而其言固出於薄昭之前矣葢不可以此證其必然但以春秋公糓所書之文為據而參以此章之言斷之可也葢聖人之於人有功則稱其功有罪則數其罪不以功掩罪亦不以罪掩功今於管仲但稱其功不言其罪則可見不死之無害於義而桓公子糾之長少亦從以明矣又下所謂匹夫匹婦之為諒者正指召忽之於子糾猶石乞於白公耳至於程子又謂若使管仲所事者正而不死其難則後雖有大功聖人豈復稱之則愚恐記者之失也葢曰不與其事桓公則可曰不稱其功則不可記者豈因彼言以為此而遂失之也與曰管仲生死之是非决一時之義爾程子又謂若使管仲不死而無功則是貪生惜死而不若匹夫匹婦之為諒若未免於先功而後義且管仲又何以自必其後之有功耶曰召忽之失在於輔子糾以争國而不在於死管仲之得在於九合之功而不在於不死後功固不可期而其在我者固可必但其得就此功而免於匹夫匹婦之諒則亦幸而已矣後之君子有不幸而處此者茍自度其無管仲之才是殆不若為召忽之不失其正也此又程子言外之意讀者不可以不察也范氏以九合為仁之大以死節為義之小是謀利計功之言其害理甚矣若聖人之心果出於此則行一不義殺一不辜而得天下亦何憚而不為之乎謝氏以管仲於子糾君臣之義未正故可以不死亦非也夫仲之可以不死者正以小白兄而子糾弟耳若使糾兄而當立則齊國之士君臣之義無所逃矣况如管仲䇿名委質親北面而君之安得幸其未得入國而死乃托於君臣之義未正而不死其難哉以召忽為傷勇仲之不死為徙義而夫子予仲之不死恐亦非聖人之意也夫子特以忽之功無足稱而其死不為過管仲之不死亦未害義而其功有足褒耳固非予仲之生而貶忽之死也問管仲之心既已不仁何以有仁者之功曰如漢髙祖唐太宗未可謂之仁人然秦隋殘虐之極二君一旦出而平定天下拯救生民豈非仁者之功耶管仲之功亦猶是也南軒曰夫子所以稱管仲者仁之功也問其仁而獨稱仁之功則其淺深亦可知矣其告子貢亦然若二子問管仲仁乎則所以告之者異矣聖人問答抑揚之意學者當深味之愚按如其仁如其仁朱子以為誰如其仁或者以為夫子之意葢謂如其九合不以兵車之事是亦仁也葢指此一事而許其仁此説近是子貢曰管仲非仁者與桓公殺公子糾不能死又相之朱子曰子貢意不死猶可又相之則己甚矣子曰管仲相桓公霸諸侯一匡天下民到於今受其賜㣲管仲吾其被髪左袵矣霸與伯同長也匡正也尊周室攘夷狄皆所以正天下也㣲無也袵衣衿也被髪左袵夷狄之俗也豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也諒小信也莫之知人不知也程子曰桓公兄也子糾弟也仲私於所事輔之以争國非義也桓公殺之雖過而糾之死實當仲始與之同謀遂與之同死可也知輔之争為不義將自免以圖後功亦可也故聖人不責其死而稱其功若使桓弟而糾兄管仲所輔者正桓奪其國而殺之則管仲之與桓不可同世之讎也若計其後功而與其事桓聖人之言無乃害義之甚啓萬世反復不忠之亂乎如唐之王珪魏徴不死建成之難而從太宗可謂害於義矣後雖有功何足贖哉愚謂管仲有功而無罪故聖人獨稱其功王魏先有罪而後有功則不以相掩可也子曰志士仁人無求生以害仁有殺身以成仁朱子曰志士有志之士仁人則成徳之人理當死而求生則其心有不安矣是害其心之徳也當死而死則心安而徳全矣程子曰實理得之於心自别實理者實見得是實見得非也古人有捐軀隕命者若不實見得惡能如此須是實見得生不重於義生不安於死也故有殺身以成仁者只是成就一箇是而已或問殺身成仁之説曰仁者心之徳而萬理具焉一有不合於理則心不能安而害其徳矣順此理而不違則身雖可殺而此心之全此理之正浩然充塞於天地之間夫孰得而亡之哉曰其謂殺身成仁而不曰義何也曰仁義體一而用殊故君子之於事有以仁决者有以義决者以仁决者此章之言是也以義决者孟子論欲有甚於生惡有甚於死是也葢仁人不以所惡傷所好之體義士不以所賤易所貴之宜仁者吾心之正理志士仁人無求生以害仁有殺身以成仁須知道求生害仁時雖以無道得生却是抉破了我心中之全理殺身成仁時吾身雖死却得此理全學問只要心裏見得分明便從上面做去如殺身成仁不是自家計較要成仁方死只是見得生為不安死為安便自殺身旁人見得便説能成仁此旁人之言非我之心要如此所謂經徳不囘非以干禄哭死而哀非為生也若有一毫為人之心便不是了南軒曰仁人於理之當然如飢食渴飲也志士謂志於仁者亦能擇而處之矣子貢問為仁子曰工欲善其事必先利其器居是邦也事其大夫之賢者友其士之仁者朱子曰賢以事言仁以徳言夫子嘗謂子貢悦不若巳者故以是告之欲其有所嚴憚切磋以成其徳也程子曰子貢問為仁非問仁也故孔子告之以為仁之資而已事賢友仁便是要琢磨勉勵以至於仁如欲克己而未能克己欲復禮而未能復禮須要更相勸勉乃為有益南軒曰器利則事善若所事與所友泛而不知擇則其亡焉者不自知矣子曰民之於仁也甚於水火水火吾見蹈而死者矣未見蹈仁而死者也朱子曰民之於水火所頼以生不可一日無其於仁也亦然但水火外物而仁在己無水火不過害人之身而不仁則失其心是仁有甚於水火而尤不可以一日無者也况水火或有時而殺人仁則未嘗殺人亦何憚而不為哉李氏曰此夫子勉人為仁之語下章放此子曰當仁不讓於師朱子曰當仁以仁為己任也雖師亦無所遜言當勇往而必為也葢仁者人所自有而自為之非有争也何遜之有程子曰為仁在己無所與遜若善名在外則不可不遜所謂不讓者猶程子所謂不可將第一等事讓與别人做者其事則謂顔子曰舜何人也有為者亦若是者而已大抵此與上章皆勉人為仁之語然上章為凡民都不知仁而憚於為之者發此章為學者粗知仁之為美而不知勇於有為者發各有所當云子張問仁於孔子孔子曰能行五者於天下為仁矣請問之曰㳟寛信敏惠㳟則不侮寛則得衆信則人任焉敏則有功惠則足以使人朱子曰行是五者則心存而理得矣於天下言無適而不然猶所謂雖之夷狄不可棄者五者之目葢因子張所不足而言耳任倚仗也又言其效如此問㳟寛信惠固是求仁之方但敏字於仁工夫似不甚親切莫是人之為事求悠悠則此心便間斷多否曰不止是悠悠葢不敏便有怠忽之意纔怠忽便心不存而間斷多便是不仁也南軒曰能行此五者於天下則其心公平而周徧可知矣然㳟其本歟㣲子去之箕子為之奴比干諫而死孔子曰殷有三仁焉朱子曰三人之行不同而同出於至誠惻怛之意故不拂乎愛之理而有以全其心之徳也楊氏曰此三人者各得其本心故同謂之仁或問三子之心同出於至誠惻怛則可見矣抑何以知其所處之各適其可耶曰按史記此事先後皆不同惟殷紀以為㣲子先去比干乃諌而死然後箕子佯狂為奴為紂所囚者近是葢㣲子帝乙元子當以先王宗祀為重義當早去又决知紂之不可諫也故遂去之而不以為嫌比干少師義當力諌雖知其不可諌而不可已也故遂以諌死而不以為悔箕子見比干之死則知己之不可諌且不忍復死以累其上也見㣲子之去則知己之不必去且不忍復去以背其君也故佯狂為奴而不以為辱此可以見三仁之所當為易地皆然矣或以為箕子以天畀九疇未傳而不敢死則其為説迂矣同謂之仁者以其皆無私而各當理也無私故得心之體而無違當理故得心之用而不失此其所以全心之徳而謂之仁與曰然則史記三子之事與夫子言先後不同何也曰史所書者事之實此所記者以事之難易為先後耳或問言仁與集注不同集注者改本也然則或問之説為不當乎黄氏曰非也先師言仁之義則固以心之徳愛之理為主矣言人之所以至於仁則以無私心而皆當理也仁之為義固該體用而與惻隠對言則仁主於體而未及於用也今曰愛之理心之徳則於仁之義為最切也然仁曰愛之理而為仁之用仁固心之徳而一動一静亦無非此徳之所暨也或問之言指三子之所以至於仁而言也集注之言正指仁之義而言也然其曰不拂乎愛之理而有以全其心之徳曰全曰不拂則或問之意亦在其中矣讀者識之可也南軒曰三人者皆當其時當其位處之盡其道者也其立紂之朝所以維持宗社之心至矣而有不得已焉則各自靖以獻於先王詳味㣲子一篇則可見三子之所為深切至到者矣孔氏曰稱其為仁以其至誠惻怛克盡其道故也子夏曰博學而篤志切問而近思仁在其中矣朱子曰四者皆學問思辨之事耳未及乎力行而為仁也然從事於此則心不外馳而所存自熟故曰仁在其中矣程子曰博學而篤志切問而近思何以言仁在其中矣學者要思得之了此便是徹上徹下之道又曰學而不博則不能守約志不篤則不能力行切問近思在己者則仁在其中矣又曰近思者以類而推蘇氏曰博學而志不篤則大而無成泛問逺思則勞而無功問云云曰此全未是説仁處方是尋討箇求仁門路當從此去漸見效在其中謂有此理耳問云云如何謂之仁曰非是便為仁如言行寡尤悔非所以干禄而禄在其中父子相為隠非直而直在其中博學篤志切問近思未便是仁然學者用力於此仁亦在其中矣問博學與近思亦不相妨否先生曰博學是都要理㑹過近思是注心着力處博學是箇大規模近思是漸進工夫如大學明明徳於天下是大規模其中格物致知誠意正心修身齊家等便是次苐處如博學亦豈一日便都學得了亦是漸漸學去曰篤志未説到行處否曰篤志只是至誠懇切以求之若只管泛濫外面博學更不懇切其志便成放而不知求底心便是頑麻不仁底人惟篤志又切問近思便有歸宿處此心不泛濫走作只在這窠坎裏仁便在其中問程子云云莫便是先生所謂從事於此則心不外馳而所存自熟之意乎曰然於是四者中見得箇仁底道理便是徹上徹下之道問以類而推曰節節推將去今人不曽以類而推葢不曽先理㑹一件却理㑹一件若理㑹得一件逐件推將去相次亦不難問何謂類推曰此語道得好不要驀越不要陡頓只是就近傍那曉得處挨將去如這一件理㑹得透了又因這件推去做那一件如讀書讀第一段了便推第一段之類去讀第二叚自此以往只管恁地去次第都能理㑹得若開卷便要獵一過如何得直卿曰是理㑹得孝便推去理㑹得弟否曰只是傍易曉底挨將去如理㑹得親親即類推去仁民仁民是親親之類理㑹得仁民便推類去愛物愛物是仁民之類如刑于寡妻便推類去至于兄弟至于兄弟便推類去御于家邦如修身便推類去齊家齊家便推類去治國只是一歩了又一歩南軒曰博學篤志切問近思不可便以此為仁而仁不外是也學者從事於此而不計其獲則循序而有至葢不可以欲速而臆度也聖門論仁大抵如此黄氏曰云云或曰何以知四者之專主於心之所存而言曰人惟無所用其心則其心泛濫而不一志之篤則此心常有所定向而不泛濫矣問不切思不近則其所用心皆在吾身之外切問而近思則皆求其在己者而無復外馳之患矣人能盡此四者則雖學問思辨之事而自有以得夫操存涵養之效所以謂仁在其中也子游曰吾友張也為難能也然而未仁朱子曰子張行過髙而少誠實惻怛之意曾子曰堂堂乎張也難與並為仁矣朱子曰堂堂容貌之盛言其務外自髙不可輔而為仁亦不能有以輔人之仁也范氏曰子張外有餘而内不足故門人皆不與其為仁子曰剛毅木訥近仁寧外不足而内有餘庻可以為仁矣南軒曰雖有髙明之見卓絶之行謂之難能則可而不害其為未仁也堂堂氣象所以為難與並仁也歟葢是道也須深潜縝密親切篤至而後可以進故如愚之顔子聖人許其不違仁而堂堂之張曾子以為難與並為仁也子貢曰我不欲人之加諸我也吾亦欲無加諸人子曰賜也非爾所及也朱子曰子貢言我所不欲人加於我之事我亦不欲以此加之於人此仁者之事不待勉强故夫子以為非子貢所及程子曰我不欲人之加諸我吾亦欲無加諸人仁也施諸己而不願亦勿施於人恕也恕則子貢或能勉之仁則非所及矣朱子曰此伊川晩年仁熟方看得如此分曉説得如此明白無者自然而然勿者禁止之謂此所以為仁恕之别又曰生底是恕熟底是仁勉强底是恕自然底是仁有計較有賭當底是恕無計較無賭當底是仁南軒曰此與己所不欲勿施於人施諸己而不願亦勿施於人同意然而彼二言者皆為仁之方恕之道也故皆有勿辭若子貢之言不欲人之加於己者即欲不加諸人是則不待禁止油然公平物我一視仁者之事也其曰非爾所及者正所以勉其强恕而抑其躐等也此章及後章皆兼言仁恕故移置此子貢曰如有博施於民而能濟衆何如可謂仁乎子曰何事於仁必也聖乎堯舜其猶病諸朱子曰博廣也仁以理言通乎上下聖以地言則造其極之名也乎者疑而未定之辭病心有所不足也言此何止於仁必也聖人能之乎則雖堯舜之聖其心猶有所不足於此也以是求仁愈難而愈逺矣夫仁者己欲立而立人己欲逹而逹人以己及人仁者之心也於此觀之可以見天理之周流而無間矣狀仁之體莫切於此能近取譬可謂仁之方也已譬喻也方術也近取諸身以己所欲譬之他人知其所欲亦猶是也然後推其所欲以及於人則恕之事而仁之術也於此勉焉則有以勝其人欲之私而全其天理之公矣程子曰醫書以手足痿痹為不仁此言最善名狀仁者以天地萬物為一體莫非己也認得為己何所不至若不屬己自與己不相干如手足之不仁氣己不貫皆不屬己故博施濟衆乃聖人之功用仁至難言故止曰己欲立而立人己欲逹而逹人能近取譬可謂仁之方也已欲令如是觀仁可以得仁之體又曰論語言堯舜其猶病諸者二夫博施者豈非聖人之所欲然必五十乃衣帛七十乃食肉聖人之心非不欲少者亦衣帛食肉也顧其養有所不瞻爾此病其施之不博也濟衆者豈非聖人之所欲然治不過九州聖人非不欲四海之外亦兼濟也顧其治有所不及爾此病其濟之不衆也推此以求修已以安百姓則為病可知茍以吾治己足則便不是聖人吕氏曰子貢有志於仁徒事髙逺未知其方孔子教之以於己取之庻近而可入是乃為仁之方雖博施濟衆亦由此進或問博施濟衆必也聖乎此言必聖人而後能之乎曰不然此正謂雖聖人亦有所不能爾必也聖乎葢以起下文堯舜病諸之意猶曰必也射乎而後言射之有争也曰仁恕之别何也曰凡己之欲即以及人不待推以譬彼而後施之者仁也以己之欲譬之於人知其必欲此而後施之者恕也此其從容勉强固有淺深之不同然其實皆不出乎常人一念之間學者亦反求諸己而足矣豈必博施濟衆務為聖人之所不能者然後得之乎博施濟衆是無盡底地頭堯舜儘無下手處仁通上下但克己私復還天理便是仁何必博施而後為仁若必待如此則有終身不得仁者矣子貢凡三問仁聖人三告之以推己度物想得子貢髙明於推己處有所未盡己欲立便立人己欲逹便逹人此仁者之事能近取譬此為仁之方今人便以欲立欲逹為能近譬則誤矣問博施濟衆曰此是仁者事功若把此為仁則只是中天下而立者才能如此便都無人做得問己欲立而立人己欲逹而逹人與我不欲人加諸我吾亦欲無加諸人一般都是以己及物能取譬與己所不欲勿施於人一般都是推己及物曰然以己之欲立者而立人以己之欲逹者而逹人以己及物無些私意如堯克明俊徳以親九族九族既睦平章百姓百姓昭明恊和萬邦黎民於變時雍以至於欽若昊天歴象日月星辰敬授人時底道理都擁出来又如周禮一書周公所以立下許多條貫皆是廣大心中流出或問此章程子作一統説先生作二段如何謂分仁恕先生曰某之説即非異於程子葢程子之説如大屋一般某之説如在大屋下分别㕔堂房室初無異也欲立立人欲逹逹人正指仁之本體葢己欲立則思處置他人也立己欲逹則思處置他人也逹放開眼目推廣心胸其氣象如此安得不謂仁之本體彼子貢所問是就事上説却不就心上説吕氏云雖博施濟衆也須自此始某甚喜其説南軒曰博施濟衆之義固大然特以見大功用而非所以明仁也聖亦仁之成名非謂仁未及乎此也以仁之為道不當如此求也故夫子既告之以博施濟衆之大而又語之以仁焉仁者公天下之理而無物我之私故己欲立而立人己欲逹而逹人仁者之心也欲進乎是其唯近取譬乎近取譬者體之於吾心而推之此恕之道也所以為仁之方也於其方而用力則可以進於仁焉知能近取譬為仁之方則知以博施濟衆言仁者其亦泛而無統矣子貢問曰有一言而可以終身行之者乎子曰其恕乎己所不欲勿施於人朱子曰推己及物其施不窮故可以終身行之尹氏曰學貴於知要子貢之問可謂知要矣孔子以是告之求仁之方也推而極之雖聖人之無我不出乎此終身行之不亦宜乎問言恕不及忠曰分言忠恕有忠而後恕獨言恕則忠在其中若不能恕則其無忠可知恕是忠之發處若無忠做恕不出此章專言恕故附於仁恕之後若其他兼言忠恕者悉附於曾子一貫章西山讀書記卷六
