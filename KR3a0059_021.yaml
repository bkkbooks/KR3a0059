body:
  text: 西山讀書記卷二十一宋真德秀撰師道語子曰溫故而知新可以為師矣朱子曰溫尋繹也故者舊所聞新者今所得言學能時習舊聞而每有新得則所學在我而其應不窮故可以為人師若夫記問之學則無得於心而所知有限故學記譏其不足以為人師正與此意互相發也或問云云曰故者昔之所已得者也新者今之所始得者也昔之所得雖曰既為吾有然不時加反復尋繹之功則亦未免廢忘荒落之患而無所據以知新矣然徒能溫故而不能有以得夫前日之未得者則見聞雖富誦説雖勤亦若無源之水而已其積雖多終有窮盡亦將何以授業解惑而待學者無已之求哉學記曰記問之學不足以為人師者正謂此耳唯能尋繹其所已得者而每有得於其所未得者焉則譬諸觀人昨日識其面而今日識其心矣於以為師其庶矣乎夫子之言所謂可云者正所以明夫未至此者不足以為師非以為能如是而為師有餘也且昔程子晚而自言吾年二十時解釋經義與今無異然其意味則今之視昔為不同矣此溫故知新之大者學者以是為的而深求之則足以見夫義理之無窮矣南軒曰程子有云如此處極要理會若只認溫故知新可以為人師則氣象窄狹矣學者推此一端庶幾可以味聖賢之辭意記學記君子知至學之難易而知其美惡然後能博喻張子曰知學者至乎學之難易又知其資質之美惡能博喻然後能為師能為師然後能為長能為長然後能為君故師也者所以學為君也是故擇師不可不慎也鄭氏曰師善則善記曰三王四代惟其師此之謂乎四代虞夏殷周凡學之道嚴師為難嚴尊敬也師嚴然後道尊道尊然後民知敬學記問之學不足以為人師鄭氏曰記問謂豫誦雜難雜説至講時為學者論之此或時師不心解或學者所未能問必也其聽語乎必待其問乃説之力不能問然後語之語之而不知雖舍之可也孟子曰人之患在好為人師南軒曰學莫病於自足古之所謂師者學明行修人從而師之而非有欲人師己之心也人師乎己從而以己之善善之其答問論辨之際亦有互相發者故教學相長也若有好為人師之意則是乃矜已自大之私萌乎其中欲以益於人而不知其先損於己此其所以可懼也王勉曰學問有餘人資於己不得已而應之可也若好為人師則自足而不復有進矣周子或問曰曷為天下善曰師曰何謂也曰性者剛柔善惡中而已矣不達曰剛善為義為直為斷為嚴毅為幹固惡為猛為隘為強梁柔善為慈為順為巽惡為懦弱為無斷為邪佞惟中也者和也中節也天下之達道也聖人之事也故聖人立教俾人自易其惡自至其中而止矣故先覺覺後覺暗者求於明而師道立矣師者所以攻人之惡正人之不中而已矣師道立則善人多善人多則朝廷正而天下治矣此所以為天下善也右論師道教法語子曰中人以上可以語上也中人以下不可以語上也朱子曰語告也言教人者當隨其髙下而告語之則其言易入而無躐等之弊也南軒曰聖人之道精粗雖無二致但其施教則必因其材而篤焉蓋中人以下之質驟而語之太高非惟不能以入且將妄意躐等而有不切於身之弊亦終於下而已矣故就其所及而語之是乃所以使之切問近思而漸進於高遠也子曰自行束修以上吾未嘗無誨焉朱子曰古者相見必執贄以為禮束修其至薄者蓋人之有生同具此理故聖人之於人無不欲其入於善但不知來學則無往教之理故苟以禮來則無不有以教之也子曰不憤不啓不悱不發舉一隅不以三隅反則不復也朱子曰憤者心求通而未得之意悱者口欲言而未能之貌啓謂開其意發謂達其辭物之有四隅者舉一可知其三反者還以相證之義復再告也上章已言聖人誨人不倦之意因并記此欲學者勉於用力以為受教之地也程子曰憤悱誠意之見於色辭者也待其誠至而後告之既告之又必待其自得乃復告爾又曰不待憤悱而發則知之不能堅固待其憤悱而發則沛然矣或問反之為還以相證何也曰如易所謂原始反終者也南軒曰此聖人教人之法也學貴於思思而後有得憤悱者思慮積久鬱而未暢誠意懇切形於外也憤則見於顔色悱則發於辭氣於是而啓其端發其蔽則庶幾聽之之專而感之之深也然告之亦舉一隅耳待其以三隅反而後復之此古之教者所以為從容而使人繼志之道也若不以三隅反則是未能因吾言而推類茍遽以復之則亦於彼無力矣子曰二三子以我為隱乎吾無隱乎爾吾無行而不與二三子者是丘也朱子曰諸弟子以夫子之道髙深不可幾及故疑其有隱而不知聖人作止語默無非教也故夫子以此言曉之與猶示也程子曰聖人之道猶天然門弟子親炙而冀及之然後知其髙且逺也使誠以為不可及則趨向之心不幾於怠乎故聖人之教常俯而就之如此非獨使資質庸下者勉思企及而才氣髙邁者亦不敢躐易而進也呂氏曰聖人體道無隱如天象昭然莫非至教常以示人而人自不察讀此章因云須要看聖人如何是無行不與二三子處又曰此章衆人説得玄妙似禪不如程子説穩當南軒曰道無乎不在聖人其何隱乎所謂無行而不與二三子者蓋視聽言動之際無非教也二三子固亦皆具是理若能體之自近而實用力焉則知聖人果無毫髮之可隱也在二三子勉之何如耳子以四教文行忠信程子曰教人以學文修行而存忠信也忠信本也朱子曰其初須是講學講學既明而後修於行所行雖善然更須反之於心無一毫不實處乃是忠信問文行為先忠信為次之説如何曰世上也自有初間難曉底人便做忠信與説未得且教讀書漸漸壓伏身心教定方可與説問行有餘力則以學文如何曰彼將教子弟而使之知大概也此則教學者深切用工也南軒曰忠信本一事然忠則實諸己信則篤諸人在學者當以為兩事而並勉也子曰吾有知乎哉無知也有鄙夫問於我空空如也我叩其兩端而竭焉朱子曰孔子謙言己無知識但其教人雖於至愚不敢不盡耳叩發動也兩端猶言兩頭言終始本末上下精粗無所不盡程子曰聖人之教人俯就之若此猶恐衆人以為高逺而不親也聖人之道必降而自卑不如此則人不親賢人之言則引而自髙不如此則道不尊觀於孔子孟子可見矣尹氏曰聖人之言上下兼盡即其近衆人皆可與知極其至則雖聖人亦無以加焉是之謂兩端如答樊遲之問仁智兩端竭盡無餘藴矣若夫語上而遺物則豈聖人之言哉南軒曰兩端者語近而逺者未嘗不具語卑而髙者未嘗不存形而上曰道形而下曰器道與器非異體也聖人有隱乎爾哉在學者體之何如耳子曰衣敝緼袍與衣狐貉者立而不恥者其由也與不忮不求何用不臧子路終身誦之子曰是道也何足以臧朱子曰終身誦之則自喜其能而不復求進於道矣故夫子復言此以警之謝氏曰恥惡衣惡食學者之大病善心不存蓋由於此然以衆人而能此則可以為善矣子路之賢宜不止此而終身誦之則非所以進於日新也故激而進之南軒曰學之無窮自不忮不求而勉焉以至於聖不可知其等級固有次第也苟終身誦夫不忮不求而已則亦不過於利仁者之事而有所止也聖人先後抑揚所以成德達材之道可謂至矣子曰從我於陳蔡者皆不及門也德行顔淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子遊子夏朱子曰孔子嘗厄於陳蔡之間弟子多從之者此時皆不在門故孔子思之蓋不忘其相從患難之中也弟子因孔子之言記此十人而并目其所長分為四科孔子教人各因其材於此可見程子曰四科乃從夫子於陳蔡者爾門人之賢者固不止此曾子傳道而不與焉故知十哲世俗論也又曰孔子教人各因其材有以言論入者有以德行入者或問四科之目何也曰德行者潛心體道默契於中篤志力行不言而信者也言語者善為辭令也政事者達於為國治民之事者也文學者學於詩書禮樂之文而能言其意者也蓋夫子教人使各因其所長以入於道然其序則必以德行為先誠以躬行云云其卒莫之能及者則以其自暴自棄而已子曰豫欲無言朱子曰學者多以語言觀聖人而不察其天理流行之實有不待言而著者是以徒得其言而不得其所以言故夫子發以警之子貢曰子如不言則小子何述焉子貢正以言語觀聖人者故疑而問之子曰天何言哉四時行焉百物生焉天何言哉四時行百物生莫非天理發見流行之實不待言而可見聖人一動一靜莫非妙道精義之發亦天而已豈待言而顯哉此亦開示子貢之切惜乎其終不喻也程子曰孔子之道譬如日星之明猶患門人未能盡曉故曰豫欲無言顔子則便默識其他則未免疑問故曰小子何述又曰天何言哉四時行焉百物生焉則可謂至明白矣按此與前篇無隱之意相發學者詳之孺悲欲見孔子孔子辭以疾將命者出户取瑟而歌使之聞之朱子曰孺悲嘗學士喪禮於孔子當是時必有以得罪者故辭以疾而又使知其非疾以警教之也程子曰此孟子所謂不屑之教誨所以深教之也南軒曰孺悲之不見疑在棄絶之域矣取瑟而歌使將命者聞之是亦教誨之而終不棄也聖人之仁天地生物之心與記學記古之教者家有孰黨有庠術有序國有學鄭氏曰術當為遂古者仕焉而已者歸教於閭里朝夕坐於門門側之堂謂之孰比年入學學者每嵗來入也中年考校中猶間也卿大夫間歲考學者之德行道藝周禮三歲大比乃考焉中丁仲反間間厠之間一年視離經辨志離絶斷句讀也辨志謂别其心意所趣向三年視敬業樂羣五年視博習親師七年視論學取友謂之小成九年知類通達知事義之比比必履反強立而不反強立謂臨事不惑不反不違失師道謂之大成夫然後足以化民易俗近者悅服而逺者懷之此大學之道也張子曰離經離析經之章句也事師而至於親敬則學之篤而信其道也論學取友能講論其學而取友必端也知類通達比物醜類是也九年者言其大略人性有遲敏氣有昏明豈可齊也強立而不反可與立也學至於立則自能不息以至於聖人而教者可以無恨矣朱子曰按鄭注張説皆是也辨志者自能分别其心所趨向如為義為利為君子為小人也敬業者專心致志以事其業也樂羣者樂於取益以輔其仁也博習者積纍精專次第該遍也親師者道同德合愛敬兼盡也論學者知言而能論學之是非取友者知人而能識人之賢否也知類通達聞一知十而觸類貫通也強立不反知止有定而物不能移也蓋考校之法逐節之中先觀其學業之淺深徐察其志行之虛實讀者深味之以見進學之驗記曰蛾子時術之其此之謂乎蛾魚起反蚍蜉也蚍蜉之子微蟲耳時術蚍蜉之所為其功乃復成大垤疏曰蚍蜉所為謂銜土也大學之教也時教必有正業退息必有居有常居也學朱子曰今按上句鄭注孔疏讀時字居字句絶而學字自為一句恐非文意當以也字學字為句絶時教如春夏禮樂秋冬詩書之類居學謂居其所學如易之言居業蓋當時所習如下文操縵博依興藝藏修息遊之類所以學者能安其學而信其道不學操縵不能安弦縵采曰反雜弄也疏曰弦瑟琴之屬若不先學調弦雜弄則手指不便故不能安弦也不學博依不能安詩博依廣譬喻也張子曰依聲之依永者也不學雜服不能安禮雜服冕服皮辨之屬張子曰服事也雜服灑掃應對投壺沃盥細碎之事又曰道本至樂古之教人先使有以樂之者如操縵博依雜服如此已心樂樂則道義生今無此以致樂專義理自得以為樂然學者太苦思不從容第恐進鋭退速苦其難而不知其益莫能安樂也不興其藝不能樂學樂五孝反興之為言喜也歆也藝謂禮樂書射數張子曰禮樂之文如琴瑟笙磬言人皆能之以中制節射御亦必合如禮樂之文如不失其馳舍矢如破騶虞和鸞動必相應也書數其用雖小但施於簡䇿然莫不出於學故人有倦時又用此以遊其志所以使之樂學也故君子之於學也藏焉修焉息焉遊焉藏謂懷抱之修習也息謂作勞休止於之息遊謂間暇無事於之遊夫然故安其學而親其師樂其友而信其道是以雖離師輔而不反也今之教者呻其占畢多其訊呻吟也占視也簡謂之畢訊猶問也言今之師自不曉經之義但吟誦所視簡之文多其難問也言及於數朱子曰數謂形名度數言及於數欲以窮學者之所未知非求其本也進而不顧其安使人不由其誠教人不盡其材張子曰人未安之又進之未喻之又告之徒使人生此節目不盡其材不顧安不由誠皆是施之妄也教人至難必盡人之材乃不誤人觀可及處然後告之聖人之明直若庖丁之解牛皆知其隙刃投餘地無全牛矣故使人必由其誠教人必盡其材人之材足以有為但以其不由於誠則不盡其材若曰勉率而為之則豈有由其誠哉其施之也悖其求之也佛夫然故隱其學而疾其師苦其難而不知其益也朱子曰隱其學謂以其學為幽隱而難知如曰二三子以我為隱之意雖終其業其去之必速速疾也學不心解則忘之易教之不刑猶成也其此之由乎大學之法禁於未發之謂豫鄭氏曰謂年未十五時朱子曰今按此但謂豫為之防其事不一不必皆謂十五時也當其可之謂時可謂年二十成人時朱子曰當其可謂適當其可告之時事亦不一不當以年為斷不陵節而施之謂孫不陵節謂不教長者才者以小教幼者鈍者以大也施猶教也孫順也相觀而善之謂摩朱子曰觀人之能而於己有益如以兩物相摩而各得其助也此四者教之所由興也發然後禁則扞格而不勝格胡客反勝音升教不能勝其情欲格讀如凍􅏖之􅏖扞堅不可入之貌疏曰今人謂地堅為􅏖時過然後學則勤苦而難成雜施而不孫則壞亂而不修獨學無友則孤陋而寡聞燕朋逆其師燕猶褻也朱子曰按大戴禮保傅篇作左右之習反其師明此燕朋是私褻之友所謂損者三友之類燕辟廢其學朱子曰燕辟謂私褻之談無益於學而反有所害也此六者教之所由廢也君子既知教之所由興又知教之所由廢然後可以為人師也故君子之教喻也道而弗牽強而弗抑開而弗達道示之以道塗也抑猶推也開為發頭角道而弗牽則和強而弗抑則易開而弗達則思和易以思可謂善喻矣學者有四失教者必知之人之學也或失則多或失則寡或失則易或失則止此四者心之莫同也張子曰為人則多好髙則寡不察則易苦難則止知其心然後能救其失也多與易則抑之寡與止則進之教也者長善而救其失者也善歌者使人繼其聲善教者使人繼其志朱子曰繼聲繼志皆謂為發其端而不究其説使人有所玩索而自得之也其言也約而達微而臧罕譬而喻可謂繼志矣朱子曰三者皆不務多言而使人自得之意孟子曰中也養不中才也養不才故人樂有賢父兄也如中也棄不中才也棄不才則賢不肖之相去其間不能以寸朱子曰無過不及之謂中足以有為之謂才養謂涵育薰陶俟其自化也賢謂中而才也樂有賢父兄者樂其終能成已也為父兄者若以子弟之不賢遂遽絶之而不能教則吾亦過中而不才矣其相去之間能幾何哉南軒曰此所謂中者以德言才者以質言惟有德者為能涵養性情而無過不及之患故謂之中而其倚於一偏者不能自正者則謂之不中天資美茂如忠厚剛毅明敏之類皆謂之才而其資稟之不美以陷於刻薄柔懦愚暗之流則謂之不才父兄之於子弟也見其有不中不才也則當思所以教之教之之道莫如養之養云者如天地涵養萬物其雨露之所濡雷風之所振和氣之薰陶寧有間斷乎哉故物以生遂焉父兄之所以養其子弟當若是也寬裕以容之義理以漸之忠信以成之開其明而袪其惑引之以其方而使之自喻此皆養之之方也孟子曰羿之教人射必志於彀學者亦必志於彀朱子曰羿善射者也志猶期也彀弓滿也滿而後發射之法也學謂學射大匠誨人必以規矩學者亦必以規矩大匠工師也規矩匠之法也此章言事必有法然後可成師舍是則無以教弟子舍是則無以學曲藝且然况聖人之道乎南軒曰彀者弩張向的處也射者期於中鵠也然羿之教人使志於彀鵠在彼而彀在此心存乎此雖不中不逺矣學者學為聖賢也聖賢曷為而可至哉求之吾身而已求之吾身其則蓋不逺心之所同然者人所固有也學者亦存此而已存乎此則聖賢之門墻可漸而入也規矩所以為方員也大匠誨人使之用規矩而已至於巧則非大匠之所能誨存乎其人焉然巧固不外乎規矩也學者之於道其為有漸其進有序自灑掃應對至於禮儀之三百威儀之三千猶木之有規矩也亦循乎此而已至於形而上之之事則在其人所得何如形而上者固不外乎灑掃應對之間也舍是以求道是猶舍規矩以求巧也此章所舉二端教人者與受教於人者皆不可以不知孟子曰教亦多術矣豫不屑之教誨也者是亦教誨之而已矣朱子曰多術言非一端屑潔也不以其人為潔而拒絶之所謂不屑之教誨也其人若能感此退自修省則是亦我教誨之也尹氏曰言或抑或揚或與或不與各因其才而篤之無非教也南軒曰屑與不屑就不屑去之屑同訓輕教人之道不一而足聖賢之教人固不倦也然有時而不輕其教誨者非拒之也是亦所以教誨之也然就不屑誨之中亦有數端焉或引而不發而使之自喻或懼其躐等而教之有序聖賢之書若是者多矣又有以其信之未篤則不留於門使自求之如孟子之於曹交以其行之未善則拒而不見而使之知之如孔子之於孺悲凡此亦皆為不輕其教誨而乃使所以教誨之也蓋聖賢言動無非教也在學者領略之何如耳天之於物亦然傳曰天有四時雨露雷風無非教也孟子曰君子之所以教者五朱子曰下文五者蓋因人品高下或相去逺近先後之不同有如時雨化之者時雨及時之雨也草木之生播種封殖人力已至而未能自化所少者雨露之滋耳及此時之雨也則其化速矣教人之妙亦由是也若孔子之於顔曾是已有成德者有達財者財與材同此各因其所長而教之者也成德如孔子之於冉閔達財如孔子之於由賜有答問者就所問而答之若孔孟之於樊遲萬章也有私淑艾者艾音乂私竊也淑善也艾治也人或不能及門受業但聞君子之道於人而竊以善治其身是亦君子教誨之所及若孔子孟子之於陳亢夷之是也孟子亦曰豫未得為孔子徒也豫私淑諸人也此五者君子之所以教也聖賢施教各因其材小以成小大以成大無棄人也南軒曰記曰當其可之謂時所謂有如時雨化之者也言如時雨之造化萬物也今夫物之萌者欲發甲者欲拆於是時也而雨及之則皆得以遂矣蓋不先不後當其可而適與之會無待於彼之求也君子之教其察之精矣於其告之得之者如物之被時雨焉其於欲達未達之間所賴者深矣龜山楊氏以為如告曾子以吾道一以貫之是也蓋曾子未嘗問而夫子呼以告之當其可也成德者因其有德而成之如顔閔仲弓之徒其德之所存雖存乎其人而成之者聖人也達材者因其材而達之如賜之達由之果求之藝雖其天資所稟而達之使盡其材則教之功也夫成德達財答問固在其中而又有所謂答問者此則專為凡答其問者也雖鄙夫之空空所以答之者亦無非竭兩端之教也又有所謂私淑艾者焉蓋不在於言辭之間躬行於身而觀者化焉凡動容周旋之間無非教也君子之善治其身非為教人也身修而教在其中成已成物之道也其所以教不越是五者然私淑艾者又其本也按私淑艾之説二先生不同公孫丑曰道則高矣美矣宜若登天然似不可及也何不使彼為可幾及而日孳孳也孟子曰大匠不為拙工改廢繩墨羿不為拙射變其彀率朱子曰彀率彎弓之限也言教人者皆有不可易之法不容自貶以徇學者之不能君子引而不發躍如也中道而立能者從之引引弓也發發矢也躍如如踊躍而出也因上文彀率而言君子教人但授以學之之法而不告以得之之妙如射者之引弓而不發矢然其所不告者已如踊躍而見於前矣中者無過不及之謂中道而立言其非難非易能者從之言學者當自勉也此章言道有定體教有成法卑不可抗高不可貶語不能顯默不能藏引而不發謂漸啓其端而不竟其説躍如謂義理昭著如有物躍然於心目之間南軒曰公孫丑之意以為孟子之道髙大學者有難進之患欲少抑而就之庶其可以幾及而為之孳孳也夫聖人之道天下之正理不可過也不可不及也自卑者視之以為甚髙而不知其高之為中也自隘者視之以為甚大而不知大之為常也徇彼而遷就則非所以為道矣故孟子以大匠之繩墨羿之彀率為譬夫繩墨而可改則非所以為繩墨矣彀率而可變則非所以為彀率矣君子之教人引而不發引之使向方而發則係於彼也躍如者言其自得之如有所興起於中也蓋理義素存乎其心向也陷溺而今焉興起耳道以中為至中道而立其能者固從之其不能者亦莫如之何也已亦猶大匠設繩墨羿為彀率以示人其能與不能則存乎其人耳中道而立能者從之此正大之體而天地之情也雖然學者於聖賢之言當以身體之以心驗之循其所謂繩墨彀率者而勿舍焉及其久也將自有得不然而先起求躍之意則是蘄獲助長為害祗甚矣公都子曰滕更之在門也若在所禮而不答何也孟子曰挾貴而問挾賢而問挾長而問挾有勳勞而問挾故而問皆所不答也滕更有二焉趙氏曰二謂挾貴挾賢也尹氏曰有所挾則受道之心不專所以不答也朱子曰此言君子雖誨人不倦又惡夫意之不誠者南軒曰受道者以虛心為本虛則受挾則私意先橫於胸中而可告語乎故空空之鄙夫聖人未嘗不竭兩端之教而滕更之在門若在所禮而不答也使滕更思其所以不答之故於其所挾致力以消弭之其庶幾乎然則孟子之不答是亦誨之而已矣孟子曰梓匠輪輿能與人規矩不能使人巧尹氏曰規矩法度可告者也巧則在其人雖大匠亦末如之何也已蓋下學可以言傳上達必由心悟莊周所論斫輪之意如此按莊子輪扁曰斫輪徐則甘而不固疾則苦而不入不徐不疾得之於手而應之於心口不能言有數存焉臣不能以喻臣之子臣之子不能得之於臣是以行年七十而老斫輪或問古之道如是之明後世之道如是不明其故何也程子曰此無他知道者多即道明知道者少即道不明也知者多少亦由乎教也以魯國言之止及今之一大州然一時間所出大賢十餘人豈不是有教以致然也蓋是聖人既出故有許多賢者以後世天下之大經二千年間求如一顔閔者不可得也君子之教人或引之或拒之各因其所虧者成之而已孟子之不受曹交未嘗知道固在我而不在人也故使歸而求之孔子教人常俯就不俯就則門人不親孟子教人常髙致不髙致則門人不尊又曰聖人之道如天然與衆人之識甚殊邈也門人弟子既親炙而後益知其髙逺既若不可以及則趨望之心高矣故聖人之教常俯而就之事上臨喪不敢不勉君子之常行不困於酒尤其近也而以己處之者不獨使天資之下者勉思企及而才之髙者亦不易乎近矣坎之六四納約自牖人心有所蔽有所通通者明處也當就其明處而告之求信則易也非惟告於君者如此為教者亦然夫教必就人之所長所長者心之所明也從其心之所明而入然後推及其餘孟子所謂成德達才是也教人之術若童牛之牿當其未能觸時已先制之善之大者其次則豶豕之牙豕之有牙既已難制以百方制之終不能使之改惟豶其勢則性自調伏雖有牙亦不能為害如有不率教之人却須置其檟楚别以道格則其不須檟楚將自化矣説書必非古意轉使人薄學者須是潛心積慮優遊涵養使之自得今一日説盡只是教得薄至如漢時説下帷講誦猶未必説書朱子白鹿學規曰父子有親君臣有義夫婦有别長幼有序朋友有信右五教之目堯舜使契為司徒敬敷五教即此是也學者學此而已而其所以學之之序亦有五焉其别如左博學之審問之慎思之明辨之篤行之右為學之序學問思辨四者所以窮理也若夫篤行之事則自修身以至於處事接物亦各有要其别如左言忠信行篤敬懲忿窒欲遷善改過右修身之要正其義不謀其利明其道不計其功右處事之要已所不欲勿施於人行有不得反求於己右接物之要某竊觀古昔聖賢所以教人為學之意莫非使之講明義理以修其身然後推以及人非徒欲其務記覽為詞章以釣聲名取利祿而已也今人之為學者則既反是矣然聖賢所以教人之法具存於經有志之士固當熟讀深思而問辨之苟知其理之當然而責其身以必然則夫規矩禁防之具豈待他人設之而有所持循哉近世於學有規其待學者為已淺矣而其為法又未必古人意也故今不復施於此堂而特取凡聖賢所以教人為學之大端條而揭之諸君其相與講明遵守而責之於身焉則夫思慮云為之際其所以戒謹而恐懼者必有嚴於彼者矣其有不然而或出於此言之所棄則彼所謂規者必將取之固不得而略也諸君其亦念之哉東萊呂氏曰學規曰凡預此集者以孝弟忠信為本其不順於父母不友於兄弟不睦於宗族不誠於朋友言行相反文過遂非者不在此位既預集而或犯同志者規之規之不可責之責之不可告於衆而共勉之終不悛者除其籍凡預此集者聞善相告聞過相警患難相恤逰居必以齒相呼不以丈不以爵不以爾汝會講之容端而肅羣居之容和而莊箕踞跛倚喧譁擁併謂之不肅狎侮戲謔謂之不莊舊所從師歲時往來道路相遇無廢舊禮母得品藻長上優劣訾毁外人文字郡邑政事鄉閭人物稱善不稱惡毋得干謁投獻請託毋得互相品題高自標置妄分清濁語毋褻毋謏毋妄毋雜妄語非特以虛為實如期約不信出言不情增加長大之類皆是雜語凡無益之談皆是毋狎非類親戚故舊或非士類情禮自不可廢但不當狎昵毋親鄙事如賭博鬬驅蹴踘籠養撲淳酣飲酒肆赴試代筆及自投兩副卷閲非僻文字之類其餘自可類推又髙氏修學門庭云凡為學之道必先致誠不誠未有能至焉者也何以見其誠居處齋莊志意凝定不妄言不苟笑開卷伏讀必起恭敬如對聖賢掩卷沉思必根義理以間邪僻行之悠久習與性成便有聖賢前輩氣象凡為學之道必須一言一句自求已事如六經語孟中我所未能當勉而行之或我所行未合於六經語孟中便思改之先務躬行非止誦書作文而已凡講究經旨須是且將正本反復誦讀求聖人立言措意務於經內自有所得若反復誦讀至於二三十遍以至五七十遍求其意義不得然後以古注證之古注訓釋不明未可通曉方考諸家解義擇其當者取一家之説以為定論不可泛泛莫知所適從也凡閲子史必須有所折衷六經語孟其子史之折衷也譬如法家之有律令格式賞功罰罪合於律令格式者為當不合於律令格式者為不當諸子百家之言合於六經語孟者為是不合於六經語孟者為非以此夷考古之人而去取之鮮有失矣故學者當以六經為律令格式以語孟為斷案諸子百家則其情疑也凡欲閲史必且專意於一家其餘悉屏去俟閲一史畢歷歷默記然後别取一史而閲之如此有常不數年諸史可以偹記苟閲一史又雜以他史紛然交錯於前則皓首不能通一史矣凡看史當先視其人之大節然後考其細行善則效之惡則以為戒焉所以為吾躬行之益徒記其事而誦其書非所謂學凡學者有科舉之纍則於躬行之道分矣然憂國憂民之心未能忘焉則姑應之不當戚戚然患得患失所為文不可趨時不可迎合主司之意凡取友必須趨向正當切磋琢磨有益於己者若乃邪僻卑汙與夫柔佞不情相誘為非者謹勿近之凡見人有一行之善則當學之勿以其同時同處貴耳賤目焉凡見人片文隻字可矜式隨手録之聞人有一言半句可以覺悟後學既默記之汲汲焉惟恐失之此之謂好學凡在朋儕中切戒自滿惟虛故能受滿則無所容人不我告則止於此耳不能日益也故一人之見不足以兼十人我能取之十人是兼十人之能矣取之不已至於百人千人則在我者可量也哉凡求益之道在於能受盡言或議論經旨有見不到或制撰文字有所未工以至凡在己者或有未善人能為我盡言之我則致恭盡禮虛心而納之果有可從則終身服膺而不忘其或不可從則退而自省概之以道不得發赤而惡其逆已也髙氏名登字彥先漳浦人號東溪先生其言亦有補於學者故附於此右論教法小學大學禮記曰凡生子擇於諸母與可者必求其寬裕慈惠溫良恭敬慎而寡言者使為子師諸母衆妾也可者傅御之屬也子師教示以善道者司馬溫公曰子始生求乳母必擇良家婦人稍溫謹者乳母不良非惟敗亂家法兼令所飼之子性行亦類之子能食食教以右手能言男唯女俞食食上如字下音嗣唯干癸反俞然也溫公曰子能言教之自名及唱喏萬福安置稍有知則教之以恭敬尊長有不識尊卑長幼者則嚴詞禁之注曰古有胎教况於己生子始生未有知固舉以禮况於己有知孔子曰幼成若天性習慣如自然顔氏家訓曰教婦初來教兒嬰孩故在謹其始此其理也若夫子之初生也使之不知尊卑長幼之禮遂至侮詈父母驅擊兄姊父母不知詞禁反笑而奬之彼既未辨好惡謂禮當然及其既長習已成性乃怒而禁之不可復制於是父疾其子子怨其父殘忍悖逆無所不至此蓋父母無深識逺慮不能防微杜漸溺於小慈養成其惡故也男鞶革女鞶絲鞶步干反鞶小囊盛帨巾者男用韋女用綿帛六年教之數與方名數謂一十百千萬方名謂東西南北溫公曰始習書字七年男女不同席不共食早其别也溫公曰始誦孝經論語次及諸經八年出入門户及即席飲食必後長者始教之讓後胡豆反長丁丈反後凡長者之長同示以亷恥九年教之數日數所主反朔望與六甲也溫公曰始為之講解使曉義理十年出就外傅外傅教學之師也十年以後有學無教居宿於外學書計衣不帛襦袴襦音儒袴苦故反書謂六書計謂九數不用帛為襦袴太溫傷陰氣也禮帥初帥朔律反帥循也行皆遵習先日所為朝夕學幼儀言從朝至夕學幼少奉事長者之儀請肄簡諒肄以二反肄習也簡書篇數也諒言語信實也請肄請於長者習學之也溫公曰自是以往可以博觀羣書然必擇其精要者而誦之如禮記內則學記大學中庸樂記之類其異端非聖賢之書傳宜禁之勿使妄觀以惑亂其志觀書皆通始可學文辭十有三年學樂誦詩舞勺勺章略反樂謂六樂之器勺籥也舞籥文舞也成童舞象學射御成童十五以上舞象武舞也謂用干戈之小舞也射謂五射御謂五御二十而冠始學禮可以衣裘帛舞大夏冠古亂反衣於既反冠加冠也禮謂五禮二十成人血氣強盛可衣裘帛大夏禹樂樂之文武備者也惇行孝弟博學不教內而不出行如字又下孟反廣博學問不可為師教人藴蓄其德在內而不可出言為人謀慮三十而有室始理男事室猶妻也男事受田給政役也博學無方孫友視志孫音遜方猶常也至此學無常在志所好也孫順也順於朋友視其志意所尚也四十始仕方物出謀發慮物猶事也方物出謀則謀不過物方物發慮則慮不過物道合則服從不可則去五十為大夫服官政統一官之政也七十致事致其事於君而告老女子溫公曰女子六歲始習女工之小者七歲誦孝經論語九歲講解論語孝經及列女傳女戒之類略曉大意注曰古之賢女無不觀圖史以自鑒如曹大家之徒皆精通經術議論明正今人或教女子以作歌詩執俗樂殊非所宜也伊川程先生曰先夫人侯氏七八歲時誦古詩曰女子不夜出夜出秉明燭自是日暮則不復出房閣既長好文而不為辭章見世之婦女以文章筆札傳於人者則深以為非安定胡先生曰鄭衛之音導淫以教女子非所宜也十年不出恆居內也姆教婉娩聽從姆音茂婉紆晚反娩音晚姆女師也婉謂言語娩謂容貌溫公曰柔順貌執麻枲治絲繭織紝組紃枲思里反繭古典反紝女金反組音祖紃音巡紝謂繒帛組紃俱絛也薄闊為組似繩為紃學女事以共衣服共音恭溫公曰蠶桑織績裁縫及為飲膳不惟正是婦人之職兼欲使之知衣食所來之艱難不敢恣為奢麗至於纂組華巧之物亦不必習也觀於祭祀納酒漿籩豆葅醢禮相助奠葅臻魚反相息亮反當及女時而知也納謂置酒漿籩豆葅醢之等於神坐禮相助奠謂以禮相長者之事而助其饋奠十有五年而笄笄今簮也此謂應年許嫁者女子許嫁笄未許嫁則二十而笄二十而嫁有故二十三年而嫁故謂父母之喪聘則為妻奔則為妾聘問也妻之言齊也以禮見問則得與夫敵體妾之言接也言得接見於君子不得與之敵體也按朱子小學之書先載胎教之法而後以此章繼之列女傳曰古者婦人妊子寢不側坐不邊立不蹕不食邪味割不正不食席不正不坐目不視邪色耳不聽淫聲夜則令瞽誦詩道正事如此則生子形容端正才過人矣此言妊子之時必慎所感感於善則善感於惡則惡也合列女傳與內則二篇觀之則始終之教略備矣尚書大傳公卿之大子大夫元士之適子十有三年始入小學見小節焉踐小義焉二十入大學見大節焉踐大義焉故入小學知父子之道長幼之節入大學知君臣之義上下之位故為君則君為臣則臣為父則父為子則子又保傅傳漢志所記入學之年不同詳見丙記然非大體所係不必深攻也程子曰古者八歲入小學十五入大學擇其才可教者聚之不肖者復之農畝蓋士農不易業既入學則不治農然後士農判古之士者自十五入學至四十乃仕其間自有二十五年學又無利可趨則所志可知須去趨善便自此成德後之人自童稚間已有汲汲趨利之志何由得向善故古人必使四十而仕然後志定朱子曰小學教之以事如禮樂射御書數及孝悌忠信之事大學教之以理如格物致知及所以為忠信孝悌者又曰古者小學已自養得是聖賢㺽璞但未有聖賢許多知見及其長也令入大學使之格物致知長許多知見古者小學已自暗養成了到長來只就上加光飾如今全失了小學工夫只得教人且把敬作主收斂身心却方可下工夫又曰古人小學教之以事便自養得他心不知不覺自好了到得漸長漸更歷通達事物將無所不能今人既無本領只去理會許多間技藝反以害心大學章句序曰大學之書古之大學所以教人之法也蓋自天降生民莫不與之以仁義禮智之性然其氣質之稟或不能齊是以不能皆有以知其性之所有而全之也一有聰明睿知能盡其性者出於其間則天必命之以為億兆之君師使之治而而教之以復其性此伏羲神農黃帝堯舜所以繼天立極而司徒之職典樂之官所由設也三代之隆其法寖備然後王宫國都以及閭巷莫不有學人生八歲則自王公以下至於庶人之子弟皆入小學而教之灑掃應對進退之節禮樂射御書數之文及其十有五年則自天子之元子衆子以至公卿大夫元士之適子與凡民之俊秀皆入大學而教之以窮理正心修己治人之事此又學校之教大小之節所以分也夫以學校之設其廣如此教之之術其次第節目之詳又如此而所以為教則又皆本於人君躬行心得之餘不待求之民生日用彛倫之外是以當世之人無不學其學焉者無不有以知其性分之所固有職分之所當為而各俯焉以盡其力此古昔盛時所以治隆於上俗美於下而非後世之所可及也及周之衰賢聖之君不作學校之教不修時則有若孔子之聖而不得君師之位以行其政教於是獨取先王之法誦而傳之以詔後世若曲禮少儀內則弟子職諸篇固小學之支流餘裔而此篇者則因小學之成功以著大學之明法外有以極其規摹之大而內有以盡其節目之詳也三千之徒蓋莫不聞其説而曾氏之傳獨得其宗於是作為傳義以發其意及孟子沒而其傳泯焉則其書雖存而知者鮮矣右總論小學大學小學易蒙以養正聖功也程子曰未發之謂蒙以純一未發之蒙而養其正乃作聖之功也發而後禁則扞格而難勝養正於蒙學之至善也語子曰弟子入則孝出則弟謹而信泛愛衆而親仁行有餘力則以學文説見前子遊曰子夏之門人小子當灑掃應對進退則可矣抑末也本之則無如之何朱子曰子遊譏子夏弟子於威儀容節之間亦可矣然此小學之末耳推其本如大學正心誠意之事則無有子夏聞之曰噫言遊過矣君子之道孰先傳焉孰後倦焉譬諸草木區以别矣君子之道焉可誣也有始有卒者其惟聖人乎倦如誨人不倦之倦區猶類也言君子之道非以其末為先而傳之非以其本為後而倦教但學者所至自有淺深如草木之有大小其類固有别矣若不量其淺深不問其生熟而槩以髙且逺者強而語之則是誣之而已君子之道豈可如此若夫始終本末一以貫之則惟聖人為然豈可責之門人小子乎程子曰君子教人有序先傳以小者近者而後教以大者逺者非先傳以近小而後不教以逺大又曰灑掃應對便是形而上者理無小大故也故君子只在慎獨又曰聖人之道更無精粗從灑掃應對與精義入神通貫只一理雖灑掃應對只看所以然如何又曰凡物有本末不可分本末為兩段事灑掃應對是其然必有所以然又曰自灑掃應對上便可到聖人事愚按程子第一條説此章文義最為詳盡其後四條皆以明精粗本末其分雖殊而理則一學者當循序而漸進不可捨末而求本蓋與第一條之意實相表裏非謂末即是本但學其末而本便在此也或問既曰理無大小又以為教人有序何也曰無大小者理也有序者事也正以理無大小而無不在以教人者不可以不由其序而有所遺也蓋由其序則事之本末巨細無不各得其理而理之無大小者莫不隨其所在而無所遺不由其序而舍近求逺處下窺高則不惟其所妄意者不可得而理之全體固已虧於切近細微之中矣此所以理無大小而教人者尤欲由其序也集義程子曰性命孝弟只是一統事就孝悌中便可盡性至命灑掃應對進退與盡性命亦是一事無有本末無有精粗謝氏曰古人須要就灑掃應對上養取誠意出來楊氏曰聖人所謂性與天道者豈嘗離夫灑掃應對進退之間哉故其始也即此以為學其卒也非離此而為道呂氏曰古之童子未冠為長者役而其心安焉蓋古之教養之道必本諸孝悌孝悌之心雖主於惻隱恭敬之端孝弟之行常在於灑掃應對執事走趨之際蓋凡有血氣者未有安於事人者也今使之知長之可敬甘於僕役而不辭是所以存其良心折其敖慢之氣然後可與進於德矣南軒曰小子習為灑掃應對進退之事是之謂小學由是而致夫知則存乎其人是之謂大學至於充之而盡亦初不離乎灑掃應對進退之間若以此為末而别求所謂本則是析本末為二體形而上者與形而下者不相管屬其為弊蓋有不可勝言者矣黃氏曰程子之言精矣然初學讀之尤莫有知其説者以易考之其曰形而上者蓋對形而下者而言形非有象之可見特因下文形而下者而為文言器乃形而下而道則形而上也形而上謂超乎事物之表專指夫事物之理而言也灑掃應對事雖至粗然其所以然者便是至精之理其曰理無大小者非以灑掃應對為小形而上者為大也蓋不但至大之事方有形而上之理雖至小之事亦有之故曰理無大小也其曰精義入神者蓋言精究義理極其微妙以至入神神者理之妙而不可測者今其所精之義至於入神則義之至精者也如夫子之言性與天道之類是也程子引此以與灑掃應對對言蓋以至粗之事對至精之義也至精之義與至粗之事固不同然至粗之事其所以然者即至精之義也其曰是其然必有所以然者然之為言猶曰如此其如此者謂灑掃應對之節文也所以如此者謂有此理而後其節文之著見者如此也其曰便可到聖人事者蓋灑掃應對雖至小亦不過由天理之全體而著見於事物之節文聖人之所以為聖人者初不外乎此理特其事事物物皆由此理而不勉不思從容自中耳然嘗以集注所引程子四段細推之則首言理無大小以見事有小大而理則一也次言道無精粗以見學有精粗而道則一也又次言是其然必有所以然所以發明十二段所以無小大無精粗之意又次言便可至聖人事則亦以其所以然而無小大精粗者為之也亦足以見編次之意至精而不苟矣或曰集注又以程子第一條説夲章文意為詳盡者然乎曰此亦取其所釋傳與倦之義為詳盡耳然以先後二字考之則程子先後以教者所施之次第而言集注先後以義理之精粗而言則程子之説又不若集注之説為當也闕黨童子將命或問之曰益者與子曰吾見其居於位也見其與先生並行也非求益者也欲速成者也朱子曰禮童子當隅坐隨行孔子言吾見此童子不循此禮非能求益但欲速成耳故使之給使令之役觀少長之序習揖遜之容蓋所以抑而教之非寵而異之也南軒曰夫子之意以為童子當為童子之事而已童子坐則隅不敢居於位也行則左右不敢與先生並行也今居位而並行是不安乎童子之所為而自進於成人之列有躐等之意無自卑之心焉能以求益乎故以為欲速成者而已如物之生循其序而生理達焉若欲速成則反害其生矣故聖門之學先之以灑掃應對進退之事所以長愛敬之端而防敖惰之萌使之循循而有進也其可忽諸記曲禮曰幼子常視毋誑程子曰自幼子常視毋誑以上便是教以聖人事愚按聖誠而已矣教以毋誑者欲其誠也又曰立必正方不傾聽鄭氏曰習其自端正長者與之提攜則兩手奉長者之手習其扶持長者疏曰為兒長大方當供養扶持長者故先使學之令習便也負劒辟咡詔之則掩口而對負謂置之於背劒謂挾之於旁辟咡詔之謂傾頭與語口旁曰咡使之掩口而對習其向尊者屛氣也張子曰古之小兒便能敬事長者與之持攜則兩手奉長者之手問之則掩口而對蓋稍不敬事便不忠信故教小兒先須安詳恭敬弟子職曰先生施教弟子是則溫恭自虛所受是極朱子曰必虛其心然後能有所容極謂盡其本原也見善從之聞義則服溫柔孝弟毋驕恃力志毋虛邪行必正直遊居有常必近有德顔色整齊中心必式夙興夜寐衣帶必飭朝益暮習小心翼翼一此不懈是謂學則按此篇見於管子其下又有蚤作受業饌饋乃食灑掃執燭請袵退習等章朱子已著之儀禮經傳之十卷今不能盡紀獨取學則條於此云程子曰古人生子能食能言而教之大學之法以豫為先人之幼也知思未有所主便當以格言至論日陳於前雖未曉知且當薰聒盈耳充腹久自安習若固有之雖以他言惑之不能入也若為之不豫及乎稍長私意偏好生於內衆口辨言鑠於外欲其純完不可得也又曰古人雖胎教與保傅之教猶勝今日庠序鄉黨之教古人自幼學耳目遊處所見皆善至長而不見異物故易以成就今人自少所見皆不善才能言便習穢惡日消月鑠更有甚天理皆盡然尚以些秉彛消鑠盡不得故且恁過一日之中起多少巧偽萌多少機穽據此箇薰蒸以氣動氣宜乎聖賢之不生和氣之不兆也又曰教人未見意趣必不樂學且教之歌舞如古詩三百篇皆古人作如關雎之類正家之始故用之鄉人用之邦國日使人聞之此等詩其言簡奧今人未易曉欲别作詩略言教童子灑掃應對事親事長之節令朝夕歌之似當有助又曰憂子弟之輕俊者只教以經學念書不得令作文字子弟凡百玩好皆奪志至於書札於儒者事最近然一向好著亦自喪志如王虞顔栁輩誠是好人則有之曾見有善書者知道否平生精力一用於此非惟徒廢時日於道便有妨處足知喪志也朱子曰古人八歲入小學便有涵養之功今皆無之則大學存養格物須當並進又曰古人於小學中已自把捉成了故於大學之道無所不可今人既無小學之功却當以敬為本又曰陸子壽言古者教小子弟自能言能食即有教以至灑掃應對之類皆有所習故長大則易語今人自小子即教之屬對稍長則教作虛誕之文皆壞其性質者某嘗欲做一小學規使人自小教之便有法如此亦須有益先生曰只倣禪苑清規樣為之自好又曰天命非所以教小子只説箇理義大槩或以灑掃應對之類作段子亦可每嘗疑曲禮衣毋撥足毋蹶將上堂聲必揚將入户視必下等皆是古人初教小兒語列女傳孟母又添二句曰將入門問孰存又小學嘉言篇載楊文公家訓童稚之學不止記誦養其良知良能當以先入之言為主日記故事不拘今古必先以孝弟忠信禮義亷恥等事如黃香扇枕陸績懷橘叔敖陰德子路負米之類只如俗説便曉此道理久久成熟德性若自然矣右專言小學愚按小子之學如事親事長之禮灑掃應對之節雜見於曲禮少儀諸書已取而載於事親事長等篇今復列數條於此其詳則已備於朱子小學之書學者自當熟復此不盡録西山讀書記卷二十一
