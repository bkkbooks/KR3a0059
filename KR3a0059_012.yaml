body:
  text: 西山讀書記卷十二宋真徳秀撰君臣論語子曰事君盡禮人以為諂也黄氏曰孔子於事君之禮非有所加也如是而後盡耳程子曰聖人事君盡禮當時以為諂若他人言之必曰我事君盡禮小人以為諂而孔子之言止於如此聖人道大徳宏此亦可見按鄉黨君在踧踖如也與與如也入公門鞠躬如也如不容立不中門行不履閾過位色勃如也足躩如也其言似不足者攝齊升堂鞠躬如也屏氣似不息者出降一等逞顔色怡怡如也沒階趨翼如也復其位踧踖如也吉月必朝服而朝君賜食必正席先嘗之侍食於君君祭先飯疾君視之東首加朝服拖紳君命召不俟駕行矣又曰拜下禮也今拜乎上泰也雖違衆吾從下凡此皆所謂事君之禮也禮記将適公所宿齋戒居外寝沐浴史進象笏書思對命既服習容觀玉聲乃出揖私朝煇如也登車則有光矣玉藻左氏晉靈公不君趙宣子驟諫公患之使鉏麑賊之晨往寝門闢矣盛服将朝尚早坐而假寐麑退嘆而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死此将朝之禮儀禮始見于君執摯至下容彌蹙鄭氏曰促恭慤貌此始見之禮禮記大夫出入君門由闑右鄭氏曰臣統於君此出入君門之禮君命召雖賤人大夫士必自御之鄭氏曰御當為迓迓迎也君雖使賤人來必自出迎之尊君命也君命召無諾孟子曰孔子當仕有官職而以其官召之也凡君召以三節二節以走一節以趨鄭氏曰節所以明信輔君命使使召臣急則持二緩則持一玉藻此趍召之禮君若賜之爵則越席再拜稽首受登席祭之飲卒爵而俟君卒爵然後授虚爵君子之飲酒也受一爵而色洒如也鄭氏曰洒如肅敬貌二爵而言言斯禮已言言和敬貌三爵而油油以退油油說敬貌禮飲過三爵則敬殺可以去矣玉藻此侍燕之禮若君賜之食則君祭先飯偏嘗膳飲而俟君命之食然後食鄭氏曰君祭先飯食其祭食臣先飯示為君嘗食也此謂君與之禮食膳謂進庶羞既嘗庶羞則飲俟君之徧嘗也若有将食者則俟君之食然後食将食猶進食謂膳宰也膳宰進食則臣不嘗食周禮云膳夫授祭品嘗食王乃食士相見禮此侍食之禮賜果於君前其有核者懐其核鄭氏曰嫌棄尊者物也君賜車馬乘以拜賜衣服服以拜賜敬君惠也玉藻此受賜之禮凡為君使者已受命君言不宿于家鄭氏曰急君命也言謂有故所問也若使人于君所則必朝服而命之使者反則必下堂而受命鄭氏曰此臣有所告請於其君也曲禮下同此受命請命之禮執天子之器則上衡諸侯則平衡鄭氏曰謂髙於心彌敬也此衡謂與心平凡執主器執輕如不克執主器操幣圭璧則尚左手行不舉足車輪曳踵克勝也重慎之也尚左手尊左也車輪謂行不絶地立則磬折垂佩主佩倚則臣佩垂主佩垂則臣佩委君臣俛仰之節倚謂附於身小俛則垂大俛則垂于地此執器俛仰之體大夫士下公門式路馬以足蹙路馬有誅齒路馬有誅鄭氏曰廣敬也衛靈公與夫人夜坐聞車聲轔轔至闕而止過闕復有聲公問夫人曰知此為誰夫人曰此蘧伯玉也公曰何以知之夫人曰妾聞禮下公門式路馬所以廣敬也夫忠臣孝子不為昭昭信節不為冥冥惰行蘧伯玉衛之賢大夫也仁而有智敬於事上此其人必不以闇昧廢禮是以知之公使人視之果伯玉也以上皆言事君之禮傳記所載不止於此姑志其畧云子曰君子之事君也進思盡忠退思補過将順其美匡救其惡故上下能相親子路問事君子曰勿欺也而犯之朱子曰犯謂犯顔諫争范氏曰犯非子路之所難也而以不欺為難故夫子教以先勿欺而後犯南軒曰盡誠而不欺犯顔而納忠事君之義大要盡是矣然勿欺其本也勿欺矣則誠信充積一不得已有時而犯之則有以感動也若忠信有所不足則於事君之道為未盡而徒以犯顔為事亦鮮味矣如内交要譽惡其聲之類一毫之萌皆為欺也以子路之剛强懼其果於犯也故告之以勿欺為主黄氏曰偽言不直謂之欺直言無隠謂之犯欺與犯正相反夫子之告子路乃是一戒一勸兩面平説之辭若反覆以觀則能勿欺而不能犯則未免有回護之失能犯矣而不能勿欺則未免有矯飾之病此又不可以不戒也季子然問仲由冉求可謂大臣與子曰吾以子為異之問曽由與求之問所謂大臣者以道事君不可則止今由與求也可謂具臣矣曰然則從之者與子曰弑父與君亦不從也朱子曰以道事君者不從君之欲不可則止者必行已之志南軒曰大臣不枉道以狥人其不合則有去而已由求為季氏之臣坐觀其失而不能去直尸禄備數而已故曰具臣然則從之者與季氏意其不能止則當無不從也方是時季氏無君之心已著矣謂弑父與君亦不從者非惟言由求所長抑可使之聞而懼也或曰此何必由求而後能之曽不知順從之臣其始也惟利害之是狥而已履霜堅氷之不戒馴習蹉跌以至於從人而弑君父者多矣如荀彧劉穆之之徒其始從曹操劉裕之時亦豈遂欲弑父與君哉惟其漸浸順長而勢卒至此耳子曰鄙夫可與事君也與哉其未得之也患得之既得之患失之何氏曰患得之謂患不能得之茍患失之無所不至矣小則吮疽䑛痔大則弑父與君皆生於患失而已胡氏曰許昌靳裁之有言曰士之品大概有三志於道徳者功名不足以累其心志於功名者富貴不足以累其心志於富貴而已矣則亦無所不至矣志於富貴即孔子所謂鄙夫也南軒曰患得患失者以得失為事也患得者患無以得之也惟其有是心故既得則患失矣其患失之心乃患得之心也若是則几可以勿失者皆在所必為而亦何所不至哉自古亂臣賊子其初亦豈敢遽有簒弑之萌惟其患失之心蹉跌至此故夫未得則患得既得則患失患失則無所不至履霜堅氷馴致其道也然則患得患失之萌是乃弑父與君之原也聖人謂為鄙夫者盖區區惟己私之狥不亦鄙乎按眉山蘇氏曰李斯憂蒙恬之奪其權則立二世以亡秦盧把懼李懐光之數其惡則誤徳宗以再亂其心本生於患失其禍乃至於喪邦乃知聖人之言良不為過亦名論也晉丕鄭曰事君者從其義不阿其惑國語曰晉獻公將黜太子申生而立奚齊里克丕鄭荀息相見里克曰夫史蘇之言將及矣其若之何荀息曰吾聞事君者竭力以役事不聞違命君立臣從何貳之有丕鄭曰吾聞云云必立太子里克曰我不識義亦不阿惑吾其静也三大夫乃别愚按三大夫所見不同惟丕鄭之言大臣之言也而荀息一於阿惑里克一於中立遂成新城之禍惜哉方里克許驪姬以中立丕鄭曰惜也不如曰不信以疏之亦固太子以擕之多為之故以變其志志少疏乃可間也今子曰中立况固其謀彼有成矣難以得間未幾卒如其言亦可謂善謀矣鄭又云事君者君為我心制不在我亦名言也鄭在晉雖不得為賢大夫而其言有可法者故録之晏子曰君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無争心左氏傳齊景公至自田晏子侍子猶馳而造焉公曰唯據與我和夫晏子對曰據亦同也焉得為和公曰和與同異乎對曰異和如羮焉水火醯醢鹽梅以烹魚肉燀之以薪宰夫和之齊之以味濟其不及以洩其過君子食之以平其心君臣亦然云云故詩曰亦有和羮既戒既平騣嘏無言時靡有争今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之若琴瑟之専一誰能聴之同之不可也如是禮記曰為人臣者有諫而無訕有亡而無疾頌而無讇諫而無驕鄭氏曰亡去也疾惡也頌謂將順其美驕謂言行謀從恃知而慢愚謂無驕者不䛕其君之美以驕其心也鄭説恐非怠則張而相之廢則埽而更之謂之社稷之役廢政教壊亂無可因也役為也少儀為人臣之禮不顯諫鄭氏曰謂明言其君之惡不幾㣲也三諫而不聴則逃之君臣有義則合無義則去愚按不顯諫與事父母幾諫之義同當參玩也曲禮豫章黄氏詩曰誰云君臣難是亦父子間大雅稱補衮不言能犯顔此意宜深味也子云善則稱君過則稱己則民作忠君陳曰爾有嘉謀嘉猷入告爾后于内女乃順之于外曰此謀此猷惟我后之徳於乎是惟良顯哉坊記子曰事君欲諫不欲陳鄭氏曰謂陳其過於外也詩云心乎愛矣瑕不謂矣中心蔵之何日忘之瑕之言胡也謂猶告也表記景子曰内則父子外則君臣人之大倫也父子主恩君臣主敬丑見王之敬子也未見所以敬王也曰惡是何言也齊人無以仁義與王言者豈以仁義為不美也其心曰是何足與言仁義也云爾則不敬莫大乎是我非堯舜之道不敢以陳於王前故齊人莫如我敬王也朱子曰景丑所言敬之小者也孟子所言敬之大者也孟子事君無義進退無禮言則非先王之道者猶沓沓也故曰責難於君謂之恭陳善閉邪謂之敬吾君不能謂之賊范氏曰人臣以難事責於君使其君為堯舜之君者尊君之大也開陳善道以禁閉君之邪心唯恐其君或陷於有過之地者敬君之至也謂其君不能行善道而不以告者賊害其君之甚也南軒曰責難於君者以先王事業望其君不敢以君為難也孟子曰人不足與適也政不足間也惟大人為能格君心之非君仁莫不仁君義莫不義君正莫不正一正君而國定矣朱子曰言人君用人之非不足過讁行政之失不足非間惟有大人之徳則能格其君心之不正以歸于正而國無不治矣大人者大徳之人正已而物正者也程子曰天下之治亂繫乎人君之仁不仁耳心之非即害於政不待乎發之於外昔者孟子三見齊王而不言事曰我先攻其邪心心既正然後天下之事可得而理也夫政事之失用人之非智者能更之直者能諫之然非心存焉則事事而更之後復有其事將不勝其更矣人人而去之後復用其人將不勝其去矣是以輔相之軄必在乎格君心之非然後無所不正而欲格君心之非者非有大人之徳則亦莫之能也南軒曰格之為言感通至到也書曰格于上帝盖君心之非不可以氣力勝必也感通至到而使之自消靡焉所謂格也盖積其誠意一動静一語默無非格之之道也若心非未格則雖責其人才更其政事幸其見聴而肯改易他日之所用所行亦未必是也何者其源不正不可勝救也心非既格則人才政事皆將源源而日新矣然而格君之業非大人則不能若在已之非猶有未之能覺者而將何以盡夫感通之道哉後世道學不明論治者不過及於人才政事而已孰知其本在於君心而格君之本乃在於吾心乎魯欲使慎子為將軍孟子曰不教民而用之謂之殃民殃民者不容於堯舜之世一戰勝齊遂有南陽然且不可慎子勃然不悦曰此則滑釐所不識也曰吾明告子天子之地方千里不千里不足以待諸侯諸侯之地方百里不百里不足以守宗廟之典籍周公之封於魯為方百里也地非不足而儉於百里太公之封於齊也亦為方百里也地非不足也而儉於百里今魯方百里者五子以為有王者作則魯在所損乎在所益乎徒取諸彼以與此然且仁者不為況於殺人以求之乎君子之事君也務引其君於當道志於仁而已朱子曰當道謂事合於理志仁謂心在於仁孟子曰今之事君者曰我能為君辟土地充府庫今之所謂良臣古之所謂民賊也君不鄉道不志於仁而求富之是富桀也我能為君約與國戰必克今之所謂良臣古之所謂民賊也君不鄉道不志於仁而求為之强戰是輔桀也由今之道無變今之俗雖與之天下不能一朝居也南軒曰此章大抵與前章意同戰國之臣所以事君者徒以能富國强兵為急而其君亦固以此為臣之忠於我而孟子以為民賊何哉盖君不鄉道不志於仁而但欲之為富强之計則君益以驕肆而民益以憔悴是上成君之惡而下絶民之命也當時諸侯乃以民賊為良臣豈不痛哉孟子之言曰由今之道無變今之俗雖與之天下不能一朝居此聖賢拔本塞源之道今之道功利之道也今之俗功利之俗也由是道不變其俗本源既差縱使其間節目之善亦終無以相逺也故必以不由其道為先不由其道則由仁義之道矣由仁義之道變而為仁義之俗然後名正言順而事可成也所謂不能一朝居者功利既勝人紀墮喪雖得天下何以維持主守之乎故功愈就而害愈深利愈大而禍愈速富國强兵之說至於秦可謂獲其利矣然自始皇初并天下固已在絶滅之中人心内離豈復為秦之臣也哉孟子謂雖與天下不能一朝居者寧不信乎知此義然後可以謀人之國矣孟子謂蚔鼃曰子之辭靈丘而請士師似也為其可以言也今既數月矣未可以言與蚔鼃諫於王而不用致為臣而去齊人曰所以為蚔鼃則善矣所以自為則吾不知也公都子以告曰吾聞之也有官守者不得其職則去有言責者不得其言則去我無官守我無言責也則吾進退豈不綽綽然有餘裕哉朱子曰官守以官為守者言責以言為責者孟子居賓師之位未嘗受禄故其進退之際寛裕如此尹氏曰進退久速各當於理而已齊宣王問卿孟子曰王何卿之問也王曰卿不同乎曰不同有貴戚之卿有異姓之卿王曰請問貴戚之卿曰君有大過則諫反復之而不聴則易位王勃然變乎色曰王勿異也王問臣臣不敢不以正對王色定然後請問異姓之卿曰君有過則諫反復之而不聴則去朱子曰大過謂足以亡其國者易位易君之位更立親戚之賢者盖與君有親親之恩無可去之義以宗廟為重不忍坐視其亡故不得已而至於此若異姓不合則可去盖君臣以義合故也此章言大臣之義親疎不同守經行權各有其分貴戚之卿小過非不諫也但必大過而不聴乃可易位異姓之卿大過非不諫也雖小過而不聴已可去矣然三仁貴戚不能行之於紂而霍光異姓乃能行之於昌邑此又委任權力之不同不可以執一論也南軒曰非謂貴戚之卿諫君反復而不從便可以易位盖極其理而言之有可以易位之道所謂以正對也或謂斯言不亦過乎盖對宣王之問不如是無以深警其心也愚按貴戚易位之説非後世之所得行君有大過惟當反復極言如屈平劉向之為爾平諫懐疾聴雖放流睠顧楚國繫心懐王不忘欲反冀幸君之一悟俗之一改也其存君興國而欲反覆之一篇之中三致意焉至無可奈何而後已可謂忠矣然忿而沈淵則過也致堂胡氏嘗論之曰世謂屈原劉向皆同姓之臣忠言著於當時文采表於後世未易以優劣判以愚觀之向盖優於原也向厯事三帝前經恭顯擅朝後值王鳯顓政殺戮忠諫之時上則正言譏刺懇懇納忠下則官雖不遷禍亦不及豈非徳信有孚周身無闕故邪原則偏介悻直掲掲然衆邪之中上忤君心下取衆疾昧於不可則止之道怨刺强聒無所容身懐沙赴流智斯下矣胡氏之論向甚當然於平則貶之太過必如朱子曰原之為人其志行雖或過於中庸而不可以為法然皆出於忠君愛國之誠心然後為當其實爾又同姓之卿雖無可去之義若其君有大惡而不可諫易位之事又不得行宗社将危豈容坐待則㣲子去之亦有明義存焉其惡雖未如紂然非可事之君義不當食其禄則魯之叔肸可以為法春秋宣十有七年公弟叔肸卒榖梁傳曰叔肸賢之也其賢之何也宣弑而非之也非之則胡為不去也曰兄弟也何去而之與之財則曰我足矣織屨而食終身不食宣公之食春秋貴之因時制義初無定法也又按孟子反覆二字最宜親體前世人臣因有見君之過失姑一言以塞責者曰吾亦嘗諫之云爾而不從非吾責也此其用心既欲茍全爵位又欲厭塞公言張華之所以見屈於張林而不能自免也必反覆而諫諫而不從則去此人臣之正法孟子之言胡可易哉孟子去齊尹士語人曰不識王之不可以為湯武則是不明也識其不可然且至則是干澤也千里而見王不遇故去三宿而後出晝是何濡滯也士則兹不悦髙子以告曰夫尹士惡知予哉千里而見王是予所欲也不遇故去豈予所欲哉予不得已也予三宿而後出晝於予心猶以為速王庶幾改之王如改諸則必反予夫出晝而王不予追也予然後浩然有歸志予雖然豈舍王哉王猶足用為善王如用予則豈徒齊民安天下之民舉安王庶幾改之予日望之朱子曰浩然如水之流不止也楊氏曰齊王天資朴實如好勇好貨好色好世俗之樂皆以直告而不隠故足以為善若乃其心不善而謬為大言以欺人是人終不可與入堯舜之道矣予豈若是小丈夫然哉諫於其君而不受則怒悻悻然見於其面去則窮日之力而後宿哉尹士聞之曰士誠小人也此章見聖賢行道濟時汲汲之本心愛君澤民惓惓之餘意李氏曰於此見君子憂則違之之情而荷蕢者所以為果也孟子曰予日望之孟子非不知道之行否有命而拳拳不已者吉凶與民同患之心也學者所宜反覆詳味之若夫諫而不用則怒悻悻然見於其面去則窮日之力則是私意之所發其諫也固無未言之感而其去也豈復有忠厚之氣哉考槃刺鄭莊公不能繼先公之業使賢者之退窮處考槃在澗碩人之寛獨寐寤言永矢弗諼毛氏曰考成槃樂也程氏曰賢者之退窮處澗谷間雖徳體寛裕而心在朝廷寤寐不能忘懐深念其不得以善道告君故陳其由也楊氏曰矢如臯陶矢厥謨之矢自陳其不能忘君考槃在阿碩人之薖獨寐寤歌永矢弗過毛氏曰阿薖寛大貌楊氏曰自陳不得過君之朝考槃在陸碩人之軸獨寐寤宿永矢弗告蘇氏曰軸槃桓不行從容自廣之謂也張子曰考槃之詩永矢弗過弗告解以永不復告君過豈是賢者之言楊氏曰考槃云云説者曰誓不過君之朝非也昔有以問常立者立曰古之人盖有視其君如冦讎者此尤害理雖其時君使賢者退而窮處為可罪夫茍一日有悔過遷善之心復以用我我必復立其朝何終不過之有鄭介夫説畧同羔裘大夫以道夫其君也國小而迫君不用道好潔其衣服逍遙遊燕而不能自强於政治故作是詩也鄭氏曰以道去其君者三諫不從待放於郊得玦乃去孔氏曰公羊傳云大夫已去三年待放范甯以為君賜之環則還賜之玦則往故荀卿云召人以環絶人以玦羔裘逍遙狐裘以朝豈不爾思勞心忉忉毛氏曰羔裘以逰燕狐裘以適朝范氏曰急於遊燕而怠於政治此賢人所以去也夫忠臣之事君言不用而去之不得已也其心豈舍君哉故曰云云羔裘翺翔狐裘在堂豈不爾思我心憂傷鄭氏曰翺翔猶逍遙也羔裘如膏日出有曜豈不爾思中心是悼朱子曰羔裘色潤澤如脂膏所漬日色照之則有光耀檜風又鄭風狡童之詩曰彼狡童兮不與我言兮維子之故使我不能餐兮彼狡童兮不與我食兮維子之故使我不能息兮昭公之昏淫國人以狡童目之其不君可知矣不與我食其踈棄賢者又可知矣賢者猶憂之念之至于不能食息況於猶足為善者乎又樂毅曰古之君子交絶不出惡聲忠臣去國不顯其名劉向曰忠臣雖在畎畆猶不忘君惓惓之義也其言皆忠厚可法故附以上言事君之道與夫言不行而去去而不忘其君者皆人臣所當知也栢舟言仁而不遇也衛頃公之時仁人不遇小人在側鄭氏曰不遇者君不受己之志也張氏曰不遇非不達也不受其志也汎彼栢舟亦汎其流耿耿不寐如有隠憂㣲我無酒以敖以遊毛氏曰興也汎汎流貌栢木宜為舟耿耿猶儆儆也隠痛也非我無酒可以敖遊忘懐也我心匪鑒不可以茹亦有兄弟不可以據薄言往愬逢彼之怒毛氏曰茹度也長樂王氏曰責我心之如鑒必能度形猶責周公必知管蔡之叛而不使之責孟子必識齊王之不可為湯武而不應其聘朱氏曰鑒能度物而我不能但以兄弟宜可據依而不知其不可也故或往愬焉而反逢其怒耳范氏曰此公族之臣也故僚類皆兄弟我心匪石不可轉也我心匪席不可卷也威儀棣棣不可選也毛氏曰石雖堅尚可轉席雖平尚可卷棣棣富而閑習也歐陽氏曰其意謂石席可轉卷我匪石席故不可轉卷也吕氏曰不可選也言威儀閑習自有常度不可選擇以避禍也翟方進謂馮參君侯以王舅見廢不得在公卿位今五侯至尊貴也與之並列宜少詘節卑體視有所宗而君侯盛修容貌以威嚴加之此非所以下五侯而自益者也參性好禮儀不改其常操憂心悄悄愠于羣小覯閔既多受侮不少静言思之寤辟有摽毛氏曰悄悄憂貌愠怒也閔病也静安也辟拊心也摽拊心貌歐陽氏曰愠于羣小羣小愠仁人也王氏曰國亂而君昏則小人衆而君子獨君子憂而小人樂君子之憂者憂其國而已憂其國則與小人異趣其為小人所愠固其理也故曰憂心悄悄愠于羣小小人得志則為䜛誣以病君子君子既病矣則又從而侮之故曰覯閔既多受侮不少其曰既多不少者以著小人之衆也日居月諸胡迭而㣲心之憂矣如匪澣衣静言思之不能奮飛孔氏曰居諸者語助也檀弓云何居注云居語助也歐陽氏曰日居月諸胡迭而㣲者謂仁人傷衛日往月來而漸㣲爾猶言日朘月削也范氏曰如匪澣衣者中垢而不濯也不能奮飛者鬱陶無所發也鄭氏曰臣不遇於君猶不忍去厚之至也北門刺仕之不得志也言衛之忠臣不得其志爾楊氏曰忠信重禄所以勸士也衛之忠臣至于窶貧莫知其艱則無勸士之道仕之所以不得志也先王視臣如手足豈有以事敦遺之而不知其艱哉然不擇事而安之無懟憾之辭知其無可奈何而歸之於天所以為忠臣也張氏曰此詩忠臣所自作也出自北門憂心慇慇終寠且貧莫知我艱已焉哉天實為之謂之何哉爾雅曰慇慇憂也李氏曰爾雅云窶貧也兼言之以見其貧之甚也張氏曰出自北門是㳺息偶出北門因有此言也朱氏曰衛之忠臣不得其志因行出北門而有所感心為之憂慇慇然盖出北門背明向隂亦處亂世事暗君之比也鄭氏曰詩人事君無二志自決歸之於天王事適我政事一埤益我我入自外室人交徧讁我已焉哉天實為之謂之何哉鄭氏曰王事國有王命役使之事蘇氏曰政事國之政事毛氏曰適之埤厚也讁責也朱氏曰王事既適我矣政事又一埤益我其勞如此而窶貧之甚室人無以自安而交徧讁我則其困於内外極矣王事敦我政事一埤遺我我入自外室人交徧摧我已焉哉天實為之謂之何哉韓詩云敦迫也毛氏曰遺加也摧沮也以上二詩一則不見遇於君困於羣小而不忍舍去一則不得志於時窘於貧窶而安之若命皆人臣所宜知然栢舟同姓之臣故所處如此曾子曰可以託六尺之孤可以寄百里之命臨大節而不可奪也君子人與君子人也朱子曰其才可輔幼君攝國政其節至于死生之際而不可奪可謂君子矣與疑詞也决詞設為問答所以深著其必然也程子曰節操如是可謂君子矣問云云本是兼才節説然𦂳要却在節操曰不然三句都是一般説須是才節兼全方謂之君子若無其才而徒有其節雖死何益如受人託孤之責我雖無欺孤之心却為他人所欺即是我不能受人之託受人百里之命我雖無竊命之心却為他人所竊亦是我不能受人之寄矣徒能守節不能了事只是枉死濟得甚事如晉荀息是也所謂君子者豈是拱手端坐無所能為之人耶故伊川説君子者才徳出衆之名孔子曰君子不器既曰君子須是事事理會得方可若但有節無才亦喚作好人只是不濟得事爾問此三句如霍光當得否曰霍光亦當得上二句如許后事大節已奪矣譬如有猷有為有守託孤寄命是有猷有為臨大節而不可奪是有守霍光雖有猷有為只是無所守聖人言語渾全温厚曾子便恁地剛勁有孟子氣象即此語可見也晉荀息曰臣竭其股肱之力加之以忠貞其濟君之靈也不濟則以死繼之國語晉獻公立奚齊為太子使荀息傅之公疾召之曰以是藐諸孤辱在大夫其若之何稽首而對曰云云公曰何謂忠貞對曰公家之利知無不為忠也送往事居耦俱無猜貞也公卒里克丕鄭以三公子之徒作亂将殺奚齊先告荀息曰三怨将作秦晉輔之子将何如荀息曰將死之里克曰君殺正而立不正廢長而立幼如之何荀息曰吾與先君言矣不可以貳能欲復言而愛身乎雖無益也將焉辟之里克殺奚齊荀息立公子卓克又殺之荀息死之息可謂不食言矣按荀息阿獻公之惑而立奚齊不得為忠然其言有可取者使當申生將廢之時而能引義力争未必不見從不從而死則於義得矣不死於申生而死於奚齊其何謂耶故司馬文正公嘗論之以為左氏之志所以貶荀息而非襃也今特以其言之善而錄之亦因以為戒也狐突曰子之能仕父教之忠古之制也策名委質貳乃辟也杜氏曰質音贄各書於所書之冊屈膝而事之則不可以貳辟罪也今臣之子名在重耳有年數矣若又召之教之貳也父教子貳何以事君左氏晉懐公命無從亡人期期而不至無赦狐突之子毛及偃久從重耳在秦弗召懐公執狐突曰子來則免對曰云云刑之不濫君之明也臣之願也淫刑以逞誰則無罪臣聞命矣乃殺之解揚曰君能制命為義臣能承命為信信載義而行之為利謀不失利以衛社稷民之主也義無二信信無二命君之賂臣不知命也受命以出有死無霣又可賂乎臣之許君以成命也死而成命臣之禄也寡君有信臣下臣獲考死又何求杜氏曰欲為義者不行兩信欲行信者不受二命考成也左氏楚子圍宋晉使解揚如宋使無降楚曰晉師悉起将至矣鄭人囚而獻諸楚楚子厚賂之使反其言不許三而許之登諸樓車使呼宋人而告之遂致其君命楚子将殺之使與之言曰爾既許不糓而反之何故非我無信汝則棄之速即爾刑對曰云云楚子舍之以歸按漢景帝時吳楚反漢使路中大夫告梁使勿下為吳所得誘之使反其言路大夫陽許之卒致其君命與解揚事畧同然揚獲免而大夫死亦無愧於人臣之義矣史失其名惜哉箴尹曰君天也天可逃乎左氏傳宣三年楚滅若敖氏箴尹克黄使於齊還及宋聞亂其人曰不可以入矣箴尹曰棄君之命獨誰受之云云遂歸復命而自拘於司敗王思子文之治楚國也曰子文無後何以勸善使復其位改命曰生按鬭椒作亂楚滅其族箴尹克黄子文之孫鬭椒之族也人臣不幸而遭此則如箴尹之所處者得之矣又以君為天始見於此故録之齊王蠋曰忠臣不事二君烈女不更二夫史記樂毅破齊聞晝邑人王蠋賢令軍中環邑三十里無入使人請蠋蠋謝不往燕人曰不來吾且屠晝邑蠋曰云云齊王不用吾諫故退而耕於野國破君亡吾不能存而又欲劫之以兵吾與其不義以生不若死遂經其頸於樹枝自奮絶脰而死齊人聞之曰王蠋布衣也義不北面於燕況在位食禄者乎乃相聚如莒求諸子立為襄王肥義曰貞臣也難至而節見忠臣也累至而行明史記趙武靈王愛少子何二十七年大朝於東宫傳國立子何為王肥義為相國傅王武靈王自號為主父封長子章為代安陽君章素侈心不服其弟立主父又使田不禮相章也李兑謂肥義曰公子章黨衆而欲大田不禮忍殺而驕二人相得必有隂謀夫小人有欲輕慮淺謀徒見其利而不顧其害同類相推俱入禍門以吾觀之必不久矣子任重而勢大亂之所始禍之所集也子必先患仁者愛物而智者避禍於未形不仁不智何以為國子奚不稱疾毋出傳政於公子成毋為怨府毋為禍梯肥義曰不可昔者主父以王屬義也曰毋變而度毋異而慮堅守一心以沒而世義再拜受命而藉之今畏不禮之難而忘吾藉變孰大焉進受嚴命退而不全負孰大焉變負之臣不容於刑諺曰死者復生生者不愧吾言已在前矣吾欲全吾言安得全吾身且夫云云子則有賜而忠我矣雖然吾有語在前者也終不敢失李兑曰諾子勉之矣吾見子止今年矣涕泣而出李兑數見公子成以備田不禮之事異日肥義謂信期曰公子與田不禮甚可憂也其於義也聲善而實惡此為人也不子不臣吾聞之也姦臣在朝國之殘也䜛臣在中主之蠧也此人貪而欲大内得主而外為暴矯令為慢以擅一旦之命不難為也禍且逮國今吾憂之夜而忘寐飢而忘食盜賊退入不可不備自今以來若有召王者必見吾而我将先以身當之無故而王乃可入信期曰善哉四年朝羣臣安陽君亦以朝主父令王聴朝而自從旁觀窺羣臣宗室之禮見其長子章傫然反北面為臣心憐之欲分趙而王章於代計未決而輟主父及王逰沙丘異宫公子章即以其徒與田不禮作亂詐以主父令召王肥義先入殺之髙信即與王戰公子成與李兑自國至乃起四邑之兵入距難殺公子章及田不禮滅其賊黨以定王室按肥義不忍背君命而全其身可謂忠矣然知田不禮之必亂不能預為之備而止患於未形僅能以身當其難而已使無公子成李兑入而討賊則惠文王必死於亂義雖忠其何益乎然其言有可法者故併錄其事以為戒是亦前章取荀息之義也李兑有知幾之智又有定亂之材其過肥義逺矣然沙丘之圍併及主父而弑之是自陷於亂臣賊子之域也仁與智果安在乎士大夫不幸受任於危難之時必有狥國之忠而輔之以弭亂之謀然後可不然則是一肥義而已矣嗚呼難哉爰盎曰社稷臣主在與在主亡與亡漢爰盎傳絳侯為相朝罷趨出意甚得盎進曰丞相何如人也文帝曰社稷臣盎曰所謂功臣非社稷臣也云云方諸吕用事劉氏不絶如帶是時絳侯為太尉本兵柄不能正吕后崩大臣共誅諸吕遇會其成功所謂功臣非社稷臣按盎此言本以傾絳侯耳然所謂主在與在主亡與亡則名論也故録之以上皆言事君之節子㳺曰事君數斯辱矣朋友數斯疏矣程子曰數煩數也胡氏曰事君諫不行則當去導友善不納則當止至於瀆則言者煩聴者厭矣是以求榮而反辱求親而反䟽也范氏曰君臣朋友皆以義合故其事同子曰事君敬其事而後其食朱子曰後與後獲之後同食禄也君子之食也有官守者修其職有言責者盡其忠皆以敬吾之事而已不可先有求禄之心也南軒曰事君者主於敬其事而已後其食猶後獲之意然則為貧而仕則奈何孔子嘗為委吏矣亦曰會計當而已矣盖亦以敬其事為主也若曰為貧而仕食焉而已遑恤其事則失其義矣子曰事君慎始而敬終鄭氏曰輕交易絶君子所取表記子曰不以舜之所以事堯者事君不敬其君者也全文見前仁篇文中子房𤣥齡問事君之道子曰無私又問正主庇民之道曰先遺其身夫能遺其身然後無私無私然後能至公至公然後以天下為心矣文中子曰不以伊尹周公之道康其國非大臣也不以霍光諸葛亮之心事其君者皆具臣也程子曰為臣之道當含晦其章美有善則歸之於君乃可常而得正上無忌惡之心下得恭順之道也易坤六三傳世儒有論魯祀周公以天子禮樂以為周公能為人臣不能為之功則可用人臣不得用之禮樂是不知人臣之道也夫居周公之位則為周公之事由其位而能為者皆所當為也周公乃盡其軄耳師九二傳臣之於君竭其忠誠致其才力乃顯比其君之道也用之與否在君而已不可阿䛕逢迎求其比已比九五傳當君道方否之時處逼近之地所惡在居功取忌而已若能使動必出於君命威柄一歸於上則无咎而其志行可以濟時之否矣否九四傳為臣之道當使恩威一出於上衆心皆隨於君若人心從已危疑之道也居此地者奈何唯孚誠積於中動為合於道以明哲處之則又何咎隨九四傳大臣之任上畜止人君邪心下畜止天下之惡人人之惡止於初則易既盛而後禁則扞格而難勝故上之惡既甚則雖聖人救之不能免違拂下之惡既甚則雖聖人治之不能免刑戮莫若止之於初如童牛加梏則元吉也大畜六四傳以人臣而當重任必常懐危厲則吉如伊尹周公何嘗不憂勤兢畏故得終吉頤上九傳以剛强之臣事柔弱之君當内存至誠不假文飾於外故曰利用禴謂尚誠敬也上下之交不以誠其能久乎萃六二傳夫君子之事上也不得其心則盡其至誠以感發其志意而已茍誠意能動則昏蒙可開也柔弱可輔也雖不正可正也古人之事庸君常主而克行其道者己之誠意上達而君見信之篤耳管仲之相桓公孔明之輔後主是也豐六二傳大臣當險難之時唯至誠見信於君其交固而不可解又能開明君心則可保无咎矣夫欲上之篤信唯當盡其質實而已多儀而尚飾莫如燕享之禮故以燕享喻之言當不尚浮飾唯以質實所用一樽之酒二簋之食復以瓦缶為器質之至也其質實如此又須納約自牖納約謂進結於君之道牖開通之義室之暗也故設牖所以通明自牖言自通明之處以況君心所明處詩云天之牖民毛公訓牖為道亦開通之謂人臣以忠信善道結於君心必自其所明處乃能入也人心有所蔽有所通所蔽者暗處也所通者明處也當就其明處而告之求信則易也且如君心蔽於荒樂唯其蔽也故爾雖力抵其荒樂之非如不省何必於所不蔽之事推而及之則能悟其心矣自古能諫其君者未有不因其所明者也故訐直强勁者率多取忤而温厚明辨者其説多行如漢祖愛戚姬將易太子是其所蔽也羣臣争之者衆矣嫡庶之義長幼之序非不明也如其蔽而不察何四老者髙祖素知其賢而重之此其不蔽之明心也故因其所明而及其事則悟之如反手且四老人之力孰與周昌叔孫通然而不從彼而從此者由攻其所蔽與就其明之異耳坎六四傳當睽之時君心未合賢臣在下竭力盡誠期使之信合而已至誠以感動之盡力以扶持之明義理以致其知杜蔽惑以誠其意如是宛轉以求其合也遇非枉道迎逄也巷非邪僻曲徑也故曰未失道也暌九二傳又按南軒荅人書曰來諭謂事最忌激觸然所謂激觸者要當平心易氣審處其理期於中節而已若欲遷就囘互於當然而不然枉尋而以求直尺而曰吾所畏者激觸也无乃終墮於姦邪之域人欲愈肆而天理愈滅歟觀伊川解遇主于巷一爻意極明切後人不知乃以己私窺聖人之意其失大矣人臣之義當以王陵為正以上亦言事君之道每條各發一義皆人臣所當知也孟子曰有事君人者事是君則為容悦者也朱子曰阿狥以為容逢迎以為悦此鄙夫之事妾婦之道也有安社稷臣者以安社稷為悦者也言大臣之計安社稷如小人之務悦其君眷眷於此而不忘也有天民者達可行於天下而後行之者也民者無位之稱以其全盡天理乃天之民故謂之天民必其道可行於天下然後行之不然則寧沒世不見知而不悔不肯小用其道以狥於人也張子曰必功覆斯民然後出如伊吕之徒有大人者正已而物正者也大人徳盛而上下化之所謂見龍在田天下文明者此章言人品不同略有四等容悦佞臣不足言安社稷則忠矣然猶一國之士也天民則非一國之士也然猶有意也唯其所在則物无不化惟聖者能之南軒曰以事是君為容悦者慕爵禄而從君者也以安社稷為悦者則志存乎功業者也與為容悦者固有間矣然未及乎道義者盖志存乎功業則茍可就其功業而遂其志則亦所屑為矣古之人惟守道明義而已故雖有盖世之功業在前可為而在我者有一毫未安則不敢徇也盖功業一時之事而良心萬世之彛故也所謂天民者必明見夫達而其道可行于天下而後行之盖其所主在道而非必於行也謂之天民者言能全夫天生此民之理也天之生民也其理無不具而人之虧欠者多矣故程子謂天民為能踐形者也以其在下而未達故謂之民大人者即天民之得時得位者也若伊尹之在莘野則為天民出而佐商則為大人也正已而物正者已正而物自正也秦漢而下其間號為賢臣者極於以安社稷為悦而已語夫天民之事業則鮮矣荀子有態臣者有簒臣者有功臣者有聖臣者内不足使一民外不足使距難百姓不親諸侯不信然而巧敏佞説善取寵乎上是態臣者也楊氏曰以佞媚為容態上不忠乎君下善取譽乎民不恤公道通義朋黨比周以環主圗私為務是簒臣者也環主環繞其主不使賢臣得用圗謀也簒臣者簒奪其君政也内足使一民外足使距難民信之士信之上忠乎君下愛百姓而不倦是功臣者也上則能尊君下則能愛民政令教化形下如影應卒遇變齊給如響推類接譽以待無方曲成制象是聖臣者也此明應卒遇變之意無方無常也推其比類接其聲譽言見其本而知其未也待之無常謂不滯於一隅也委曲皆成制度法象言物至而應無非由法不茍而行之也聖無所不通之謂也故齊之蘇秦楚之州侯秦之張儀可謂態臣者也韓之張去疾趙之奉陽齊之孟嘗可謂簒臣者也晉之咎犯齊之管仲楚之孫叔敖可謂功臣矣殷之伊尹周之太公可謂聖臣矣是人臣之論也從命而利君謂之順從命而不利君謂之諂逆命而利君謂之忠逆命而不利君謂之簒不恤君之榮辱不恤國之臧否偷合茍從以持祿養交而已耳謂之國賊君有過謀過事将危國家殞社稷大臣父子兄弟有能進言於君用則不去不用則去謂之諫有能進言於君用則可不用則死謂之争有能比知同力率羣臣百吏而相與强君矯君君雖不安不能不聴遂以解國之大患除國之大害成於尊君安國謂之輔有能抗君之命竊君之重反君之事以安國之危除君之辱功伐足以成國之大利謂之佛故諫争輔佛之人社稷之臣也國君之寳也伊尹箕子可謂諫矣比干子胥可謂争矣平原君之於趙可謂輔矣信陵君之於魏可謂佛矣傳曰從道不從君此之謂也有大忠者有次忠者有下忠者有國賊者以徳復君而化之大忠也以徳調君而補之次忠也以是諫非而怒之下忠也不恤君之榮辱不恤國之臧否偷安茍容以之持禄養交而已耳國賊也若周公之於成王可謂大忠矣若管仲之於桓公可謂次忠矣若子胥之於夫差可謂下忠矣若曹觸龍之於紂可謂國賊矣按荀子之言醇疵相半然其大槩有可取者姑録之以上言人臣優劣之差亦事君者所當深知而審處也又鶡冠子有師臣友臣僕臣之目盖為人主用人而發此不録然所謂僕臣者正孟子所謂以事君為容悦荀子所謂態臣是也故眉山蘇氏有云僕𨽻之臣諾諾唯唯士大夫志在禄位而偷安茍容無復責難陳善之義者皆所謂僕臣也少有羞惡之心者其可為乎定公問君使臣臣事君如之何孔子對曰君使臣以禮臣事君以忠朱子曰二者皆理之當然各欲自盡而已吕氏曰使臣不患其不忠患禮之不至事君不患其無禮患忠之不足尹氏曰君臣以義合者也故君使臣以禮則臣事君以忠南軒曰使臣以禮如所謂敬大臣體羣臣之類是也事君以忠如所謂無以有已有犯無隠之類是也孟子謂齊宣王曰君之視臣如手足則臣視君如腹心君之視臣如犬馬則臣視君如國人君之視臣如土芥則臣視君如寇讎王曰禮為舊君有服何如斯可為服矣曰諫行言聴膏澤下於民有故而去則君使人導之出疆又先於其所往去三年不反然後收其田里此之謂三有禮焉如此則為之服矣今也為臣諫則不行言則不聴膏澤不下於民有故而去則君摶執之又極之於其所往去之日遂收其田里此之謂寇讎寇讎何服之有朱子曰極窮也窮之於其所往之國如晉錮欒盈也潘興嗣曰孟子告齊王之意猶孔子對定公之意也而其言有迹不若孔子之渾然也盖聖賢之别如此楊氏曰君臣以義合者也故孟子為齊王深言報施之道使知為君者不可不以禮遇其臣耳若君子之自處則豈應其薄乎孟子曰王庶幾改之予日望之君子之言盖如此南軒曰此所以深警宣王也若夫在為人臣者之分君雖待我者有未至我所以事君者可以不自盡乎是當玩孟子三宿出晝之心則庶乎其得之矣按檀弓穆公問於子思曰為舊臣反服古與子思曰古之君子進人以禮退人以禮故有舊君反服之禮也今之君子進人若将加諸膝退人若将墜諸淵毋為戎首不亦善乎又何反服之禮之有孟子之言盖本乎此以上言君臣交盡其道右言君臣之義西山讀書記卷十二
