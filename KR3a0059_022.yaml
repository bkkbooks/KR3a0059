body:
  text: 西山讀書記卷二十二宋真德秀撰大學大學之道在明明德在親民在止於至善程子曰親當新朱子曰大學者大人之學也明明之也明德者人之所得乎天而虛靈不昧以具衆理而應萬事者也但為氣禀所拘人欲所蔽則有時而昏然其本體之明則有未嘗息者故學者當因其所發而遂明之以復其初也新者革其舊之謂也言既自明其明德又當推以及人使之亦有以去其舊染之汚也止者必至於是而不遷之意至善則事理當然之極也言明明德新民皆當止於至善之地而不遷蓋必有以盡夫天理之極而無一毫人欲之私也此三者大學之綱領也或問大學之道吾子以為大人之學何也曰此對小子之學言之也曰敢問其為小子之學何也曰愚於序文已略陳之而古法之宜於今者亦既輯而為書矣學者不可以不之考也曰吾聞君子務其逺者大者小人務其近者小者今子方將語人以大學之道而又欲其考乎小學之書何也曰學之大小固有不同然其為道則一而已是以方其幼也不習之於小學則無以收其放心養其德性而為大學之基本及其長也不進之於大學則無以察夫義理措諸事業而收小學之成功是則學之大小所以不同特以少長所習之異宜而有髙下淺深先後緩急之殊非若古今之辨義利之分判然如薰蕕氷炭之相反而不可以相入也今使幼學之士必先有以自盡乎灑掃應對進退之間禮樂射御書數之習俟其既長而後進乎明德新民以止於至善是乃次第之當然又何為而不可哉曰幼學之士以子之言而得循序漸進以免於躐等陵節之病則誠幸矣若其年之既長而不及乎此者欲反從事於小學則恐其不免於扞格不勝勤苦難成之患欲直從事於大學則又恐其失序無本而不能以自達也則如之何曰是其歲月之已逝者則固不可得而復追矣若其工夫之次第條目則豈遂不可得而復補耶蓋吾聞之敬之一字聖學所以成始而成終者也為小學者不由乎此固無以涵養本原而謹夫灑掃應對進退之節與夫六藝之教為大學者不由乎此亦無以開發聰明進德修業而致夫明德新民之功也是以程子發明格物之道而必以是為說焉不幸過時而後學者誠能用力於此以進乎大而不害兼補乎其小則其所以進者將不患於無本而不能以自達矣其或摧頽已甚而不足以有所兼則其所以固其肌膚之㑹筋骸之束而養其良知良能之本者亦可以得之於此而不患其失之於前也顧以七年之病而求三年之艾非百倍其功不足以致之若徒歸咎於既往而所以補之於後者又不能以自力則吾見其扞格勤苦日有甚焉而身心顛倒眩瞀迷惑終無以為致知力行之地矣况欲有以及乎天下國家也哉曰然則所謂敬者又若何而用力耶曰程子於此嘗以主一無適言之矣嘗以整齊嚴肅言之矣至其門人謝氏之說則又有所謂常惺惺法者焉尹氏之說則又有所謂其心收斂不容一物者焉觀是數說足以見其用力之方矣曰敬之所以為學之始終也奈何曰敬者一心之主宰而萬事之本根也知其所以用力之方則知小學之不能無賴於此以為始知小學之賴此以始則夫大學之不能無賴乎此以為終者可以一以貫之而無疑矣蓋此心既立而由是格物致知以盡事物之理則所謂尊德性而道問學由是誠意正心以修其身則所謂先立其大者而小者不能奪由是齊家治國以及平天下則所謂修己以安百姓篤恭而天下平是皆未始一日而離乎敬也然則敬之一字豈非聖學始終之要也哉問云云曰天道流行發育萬物其所以為造化者隂陽五行而已而所謂隂陽五行者又必有是理而後有是氣及其生物則又必因是氣之聚而後有是形故人物之生必得是理然後有以為健順仁義禮智信之性必得是氣然後有以為魂魄五藏百骸之身周子所謂無極之真二五之精妙合而凝者正謂是也然以其理而言之則萬物一原固無人物貴賤之殊以其氣而言之則得其正且通者為人得其偏且塞者為物是以或貴或賤而不能齊也彼其賤而為物者既牿於形氣之偏塞而無以充其本體之全矣惟人之生乃得其氣之正且通者而其性為最貴故其方寸之間虛靈洞徹萬理咸備蓋其所以異於禽獸者正在於此而其所以為堯舜而能參天地贊化育者亦不外焉是則所謂明德者也然其通也或不能無清濁之異其正也或不能無美惡之殊故其所賦之質智愚賢不肖又有不能同者必其上智大賢之資乃能全其大體而無少不明其有不及乎此則其所謂明德者已不能無蔽而失其全矣况乎又以氣質有蔽之心接乎事物無窮之變則其目之欲色耳之欲聲口之欲味鼻之欲臭四肢之欲安佚所以害乎其德者又豈可勝言也哉二者相因反覆深固是以此德之明日益昏昧而此心之靈所知者不過情欲利害之私而已然而本明之體終有不可得而昧者是以雖其昏蔽之極而介然之頃一有覺焉即此空隙之中而其本體已洞然矣是以聖人施教既養之於小學之中而後開以大學之道其必先之以格物致知之說者所以啓其明之之端也繼之以誠意正心修身之目者則又以致其明之之實也夫既有以啓其明之之端又有以致其明之之實則吾之所得於天而未嘗不明者豈不超然無有氣質物欲之纍而復得其本體之全哉是則所謂明明德者而非有所作為於性分之外也然其所謂明德者又人人之所同得而非有我之得私也吾既有以自明矣視彼衆人之同得而不能自明者方甘心迷惑沒溺於卑汙茍賤之中而不自知也豈不為之惻然而思有以教之哉故必推吾之所自明者以及之始於齊家中於治國而終及於平天下使皆有以自眀而去其舊染之汚是則所謂新民者而亦非有所付畀增益之也然德之在已而當明與其在民而當新則又皆非人力之所為而吾之所以明而新之者又非可以私意茍且而為也是其所以得之於天而見於日用之間者莫不各有本然一定之則程子所謂以其義理精微之極有不可得而名者故始以至善目之而傳所謂君之仁臣之敬子之孝父之慈與人交之信乃其目之大者也衆人之心固莫不有是而或不能知學者雖或知之而亦鮮能必至於是而不去此為大學之教者所以慮其理雖粗復而有不純已雖粗克而有不盡且將無以盡夫修己治人之道故必指是而言以為明德新民之標的也欲明德而新民者誠能求必至是而不容其少有過不及之差焉則其所以去人欲而復天理者無毫髮之遺恨矣大抵大學一篇之指不出乎八事而八事之要又不出乎此三者此愚所以斷然以為大學之綱領也天之賦於人物者謂之命人與物受之者謂之性主於一身者謂之心有得於天而光明正大者謂之明德明德未嘗息時時發見於日用之間如見非義而羞惡見孺子入井而惻隱皆明德之發見也如此推之極多但當因其所發而推廣之明德者人之所得於天而虛靈不昧以具衆理應萬事者也禪家則但以虛靈不昧者為性而無具衆理以下之事聖人教人只在大學第一句明明德上又曰為學只在此一句君子存之存此而已小人去之去此而已一念竦然自覺其非便是明之之端明明德須是自家見得這道理光明燦爛常在目前始得人知己德之不明而欲明之只這便是明德就這裡便明將去至善只是十分好處猶今人言極好明明德是下手做至善是行到極處明明德是知止至善是守明德新民皆當止於極好處止之為言未到此處便住不可謂止到得此而不能守亦不可言止至善只是明德極盡處知止而后有定定而后能靜靜而后能安安而后能慮慮而后能得止者所當止之地即至善之所在也知之則志有定向靜謂心不妄動安謂所處而安慮謂處事精詳得謂得其所止問云云曰此推本上文之意言明德新民所以止於至善之由也蓋明德新民固皆欲其止於至善然非先有以知夫至善之所在則不能有以得其所當止者而止之如射者固欲其中夫正鵠然不先有以知其正鵠之所在則不能有以得其所當中者而中之也知止云者物格知至而於天下之事皆有以知其至善之所在是則吾所當止之地也能知所止則方寸之間事事物物皆有定理矣理既有定則無以動其心而能靜矣心既能靜則無所擇於地而能安矣能安則日用之間從容閒暇事至物來有以揆之而能慮矣能慮則隨事觀理極深研幾無不各得其所止之地而止之矣然既真知所止則其真得所止固已不甚相逺其間四節蓋亦推言其所以然之故有此四者非如孔子之志學以至從心孟子之善信以至聖神實有等級之相懸為終身經歷之次序也又曰此與中庸明動變化相類皆不甚相逺物有本末事有終始知所先後則近道矣明德為本新民為末知止為始能得為終本始所先末終所後知止是如射者之於的得止是已中其的若知止了自住不得問事物何以别曰對言則事是事物是物獨言物則事亦在其中物亦有該事而言者如仁人不過乎物所謂物亦只是事古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物明明德於天下者使天下之人皆有以明其明德也心者身之所主也誠實也意者心之所發也實其心之所發欲其一於善而毋自欺也致推極也知猶識也推極吾之知識欲其所知無不盡也格至也物猶事也窮至事物之理欲其極處無不到也此八者大學之條目也問云云何也曰此言大學之序其詳如此蓋綱領之條目也格物致知誠意正心修身者明明德之事也齊家治國平天下者新民之事也格物致知所以求知至善之所在自誠意以至於平天下所以求得夫至善而止之也所謂明明德於天下者自明其明德而推以新民使天下之人皆有以明其明德也人皆有明其明德則各誠其意各正其心各修其身各親其親各長其長而天下無不平矣然天下之本在國故欲平天下者必先有以治其國國之本在家故欲治國者必先有以齊其家家之本在身故欲齊家者必先有以修其身至於身之主則心也一有不得其本然之正則身無所主雖欲勉强以修之亦不可得而修矣故欲修身者必先有以正其心而心之發則意也一有私欲雜乎其中而為善去惡或有未實則心為所纍雖欲勉强以正之亦不可得而正矣故欲正心者必先有以誠其意若夫知則心之神明妙衆理而宰萬物者也人莫不有而或不能使其表裏洞然無所不盡則隱微之間真妄錯雜雖欲勉强以誠之亦不可得而誠矣故欲誠意者必先有以致其知致者推致之謂如喪致乎哀之致言推之而至於盡也至於天下之物則必各有所以然之故與其所當然之則所謂理也人莫不知而或不能使其精粗隱顯䆒極無餘則理所未窮知必有蔽雖欲勉强以致之亦不可得而致矣故致知之道在乎即事觀理以格夫物格者極至之謂如格於文祖之格言窮之而至於極也此大學之條目聖賢相傳所以教人為學之次第至為纎悉然漢魏以來諸儒之論未聞有及之者至唐韓子乃能援以為說而見於原道之篇則庶幾其有聞矣然其言極於正心誠意而無曰致知格物云者則是不探其端而驟語其次亦未免於擇焉不精語焉不詳之病矣何乃以是而議荀楊哉致知是自我而言格物是就物而言若不格物何緣得知格物是零細說致知是全體說致知是吾心之知如一面鏡子本全體通明只被物所昏而今逐旋磨去使四邉皆照見其明無所不到所謂窮理者事事物物各自有一事一物底道理窮之須要周盡若見得一邉不見一邉便不該通窮之未得更須欵曲推明天理在人終有明處窮理之初如攻堅物必尋其罅隙可入之處乃從而擊之則用力為不難孟子論四端便各自有個柄靶仁義禮智皆有頭緒可尋即其所發之端而求其可見之體莫非可窮之理也致知所以求為真知真知是要徹骨都見得透不言窮理而言格物者蓋言理則無可捉摸理與物有時而離言物則理自在自是離不得又曰人多把這道理作懸空底物大學所以說個格物便是要人就事物上理㑹如此方見得實體所謂實體非就事物上見不得問或問中云云何謂妙衆理曰大凡道理皆是我自有之物非從外得所謂知者便只是知我底道理非是以我之知去知彼道理也道理固本有用知方發得出來若無知道理何從而見所以謂之妙衆理猶言能運用衆道也運用字有病故只下得妙字問莫不有以知夫所以然之故與其所當然之則當然之則如君之仁臣之敬子之孝父之慈所以然之故如君何故用仁臣何故用敬父何故用慈子何故用孝曰所以然之故只是上面一層如君之所以仁蓋君是個主腦百姓人民土地皆屬他管自是合著仁愛以一家言之為家長者便用愛一家之人自是理合如此若天使之然如父之所以慈子之所以孝蓋父子本同一氣只是一人之身分成二個其恩愛相屬有不期然而然者其他大倫皆然皆天理使之如此也且以仁言之只天地生這物時便有個仁自源頭處便如此了義禮智亦然蓋自本原而已然非旋安排使如此也昔龜山問一學者當見孺子入井時其心怵惕惻隱何故如此曰出於自然龜山曰豈可止說自然如此了便休須是知其所自來龜山此說極好物格而后知至知至而后意誠意誠而后心正心正而后身修身修而后家齊家齊而后國治國治而后天下平物格者物理之極處無不到也知至者吾心之所知無不盡也知既盡則意可得而實矣意既實則心可得而正矣修身以上明明德之事也齊家以下新民之事也物格知至則知所止矣意誠以下皆得所止之序也問云云何也曰此覆說上文之意也物格者事物之理各有以詣其極而無餘之謂也理之在物者既詣其極而無餘則知之在我者亦隨所詣而無不盡矣知無不盡則心之所發能一於理而無自欺矣意不自欺則心之本體物不能動而無不正矣心得其正則心之所處不至陷於所偏而無不修矣身無不修則推之天下國家亦舉而措之耳豈外此而求之智謀功利之末哉曰篇首之言明明德以新民為對則固專以自明為言矣後段於平天下者復以明明德言之則似新民之事亦在其中何其言之不一而辨之不明耶曰篇首三言者大學之綱領也而以其賔主對待先後次第言之則明明德者又三言之綱領也至此後段然後極其體用之全而一言以舉之以見夫天下雖大而吾心之體無不該事物雖多而吾心之用無不貫蓋必析之有以極其精而不亂然後合之有以盡其大而無餘此又言之序也問致知之致知至之至有何分别曰上以致字是推致方為也下一至字是已至物格知至處是凡聖關物未格知未至縱如何亦是凡人須是物格知至方能循循不已入聖賢之域又曰物格知至後雖有不善亦是白地上黑㸃物未格知未至縱善也只是黑地上白㸃致知誠意乃學者二個關致知乃夢與覺之關誠意乃惡與善之關透得致知之關即覺不然則夢透得誠意之關則善不然則惡問心與意之别曰心言其統體意是就其中發出致知知之始誠意行之始問心者身之主意者心之發既是意發於心則意當聽命於心可也今曰意誠而后心正則是心反聽命於意也曰心之本體何嘗不正所以不得其正者蓋由邪惡之念勃然而興有以動其心故也譬之水本自瑩淨因波濤洶湧遂為所激而動也大學一篇有二個大節目物格知至是一個意誠心正是一個過此二關便可直前行去又說大學次序曰致知格物是窮此理誠意正心修身是體此理齊家治國平天下只是推此理要做三節看自天子以至於庶人一是皆以修身為本一是一切也正心以上皆所以修身也齊家以下則舉此而措之耳其本亂而末治者否矣其所厚者薄而其所薄者厚未之有也以上大學經文蓋孔子之意而曽子述之其傳十章則曾子之意而門人記之也本謂身也所厚謂家也曰自天子以至於庶人一是皆以修身為本其本亂而末治者否矣其所厚者薄而其所薄者厚未之有也何也曰此結上文二節之意也以身對天下國家而言則身為本而天下國家為末以家對國與天下而言則其理雖未嘗不一然其厚薄之分亦不容無差等矣故不能格物致知以誠意正心而修其身則本必亂而末不可治不親其親不長其長則所厚者薄而無以及人之親長此皆必然之理也孟子所謂於所厚者薄無所不薄其言蓋亦本於此云曰治國平天下者天子諸侯之事也卿大夫以下蓋無與焉今大學之教乃例以明明德於天下為言豈不為思出其位犯非其分而何以得為為己之學哉曰天之明命有生之所同得非有我之得私也是以君子之心豁然大公其視天下無一物而非吾心之所當愛無一事而非吾職之所當為雖或勢在匹夫之賤而所以堯舜其君堯舜其民者亦未嘗不在其分內也又况大學之教乃為天子之元子衆子公侯卿大夫士之適子與國之俊選而設是皆將有天下國家之責而不可辭者則其所以素教而預養之者安得不以天下國家為己事之當然而預求有以正其本清其原哉後世教學不明為人君父者慮不足以及此而茍狗於目前是以天下之治日常少亂日常多而敗國之君亡家之主常接迹於當世亦可悲矣論者不此之監而反以聖法為疑亦獨何哉大抵以學者而視天下之事以為己事之所當然而為之則雖甲兵錢榖籩豆有司之事皆為己也以其可以求知於世而為之雖割股廬墓弊車羸馬亦為人耳善乎張子敬夫之言曰為己者無所為而然者也此其語意之深切蓋有前賢所未發者學者以是而日日省焉則有以察乎善利之間而無毫釐之差矣子謂正經蓋夫子之言而曾子述之其傳則曾子之意而門人記之何以知其然也曰正經辭約而理偹言近而指逺非聖人不能及也然以其無他左驗且意其或出於古昔先民之言也故疑之而不敢質至於傳文或引曾子之言而又多與中庸孟子者合則知其成於曾氏門人之手而子思以授孟子無疑也蓋中庸之所謂明善即格物致知之功其曰誠身即誠意正心修身之效也孟子之所謂知性者物格也盡心者知至也存心養性修身者誠意正心修身也其他如謹獨之云不慊之說義利之分常言之序亦無不吻合焉者故程子以為孔氏之遺書學者之先務而論孟猶處其次焉亦可見矣曰程子之先是書而後論孟又且不及乎中庸何也曰是書垂世立教之大典通為天下後世而言者也論孟應機接物之微言或因一時一事而發者也是以是書之規摹雖大然其首尾該備而綱領可尋節目分明而工夫有序無非切於學者之日用論孟之為人雖切然而問者非一人記者非一手或先後淺深之無序或抑揚進退之不齊其間蓋有非初學日用之所及者此程子所以先是書而後論孟蓋以其難易緩急言之而非以聖人之言為有優劣也至於中庸則又聖門傳授極致之言尤非後學之所易得而聞者故程子之教未遽及之豈不又以為論孟既通然後可以此乎蓋不先乎大學無以提挈綱領而盡論孟之精微不參之論孟無以融貫㑹通而極中庸之歸趣然不㑹其極於中庸則又何以建立大本經綸大經而讀天下之書論天下之事哉以是觀之則務講學者固不可不急於四書而讀四書者又不可不先於大學亦已明矣今之教者乃或棄此不務而先以他說先焉其不溺於虛空流於功利而得罪於聖門者幾希矣康誥曰克明德康誥周書克能也太甲曰顧諟天之明命太甲商書顧謂常目在之也諟猶此也或曰審也天之明命即天之所以與我而我之所以為德者也常目在之則無時不明矣帝典曰克明峻德皆自明也帝典堯典虞書峻大也或問克明德者何也曰此言文王能明其德也人莫不知德之當明而欲明之然氣禀拘於前物欲蔽於後雖欲明之而有不克也文王之心渾然天理亦無待於克之而自明矣然猶云爾者亦見其獨能明之而他人不能又以見夫未能明者不可不致其克之之功也曰顧諟明命何也曰人受天地之中以生人之明德即天所以命我而至善之所存也是其全體大用蓋無時而不發見於日用之間人惟不察於此是以汨於人欲而不知所以自明常目在焉而真若其參於前倚於衡也則成性存存而道義出矣曰克明峻德何也曰堯能明其大德也曰是三者固皆自明之事然其言之亦有序乎曰康誥通言明德而已太甲則明天之未始不為人而人之未始不為天也帝典則專言成德之事而極其大焉其言之淺深亦略有序矣自人受之則曰明德自天言之則曰明命今人冥然皆不知有這明命須時時照管若常目在前則凛然不敢放肆見許多道理都在這裏問克明德曰德之明與不明只在人之克與不克須是真個㑹明其明德顧諟云云非謂有一物常在目前可見只是常存此心知得有這道理光明不昧方其未接物之時此理固湛然清明及其遇事酬應此理亦隨處發見只要常提撕省察念念不忘存養既久則是理愈明雖欲忘之自不可得問天命至微恐不可目在之曰參前倚衡豈是有物可見問德如明珠常自光明但要時加拂拭耳若為物欲所蔽即為珠為泥涴然光明之性依舊自在須要常存得此心則便見得此性問天之未始不為人云云曰人之性本無不善而日用之間莫不有當然之則所謂天理也人若每事做得是則便合天理天人本只一理若理㑹得此意則天何嘗大人何嘗小也又問云云曰天即人人即天人之始生得於天也既生此人則天又在人矣凡語言視聽動作皆天也只今說話天便在這裏顧諟是常要省察光明燦爛照在目前以上明明德傳湯之盤銘曰茍日新日日新又日新盤沐浴之盤也銘名其器以自警也茍誠也湯以人之洗濯其心以去惡如沐浴其身以去垢故銘其盤言誠能一日有以滌其舊染之汗而自新則當因其已新者而日日新之又日新之不可少有間斷也康誥曰作新民鼓之舞之之謂作言振起其自新之民也詩曰周雖舊邦其命維新詩大雅文王之篇言周國雖舊至於文王能新其德以及於民而始受天命也是故君子無所不用其極自新新民皆欲止於至善也或問盤之有銘何也曰盤者常用之器銘者自警之辭也古之聖賢兢兢業業固無時而不戒謹恐懼然猶恐其有所怠忽而或忘之也是以於其常用之器各因其事而刻銘以致戒焉欲其常接乎目每警乎心而不至於忽忘也然則沐浴之盤而其所刻之辭如此何也曰人之有是德猶其有是身也德之本明猶其身之本潔也德之明而利欲昏之猶身之潔而塵垢汙之也一旦存養省察之功真有以去其前日利欲之昏而日新焉則亦猶其疏瀹澡雪而有以去其前日塵垢之汙也然既新矣而所以新之之功不繼則利欲之交將復有如前日之昏猶既潔矣而所以潔之之功不繼則塵垢之集將復有如前日之汙也故必因其已新而日日新之又日新之使其存養省察之功無少間斷則明德常明不復為利欲之昏亦如人之一日沐浴而日日沐浴又無日而不沐浴使其疏㵸澡雪之功無少間斷則身常潔清而不復為舊染之汚昔成湯所以反之而至於聖者正惟有得於此故稱其德者有曰不邇聲色不殖貨利又曰以義制事以禮制心有曰從諫弗咈改過不吝又曰與人不求偹檢身若不及此皆足以見其日新之實至于所謂聖敬日躋云者則其言愈約而意愈切矣然本湯之所以得此又其學于伊尹而有發焉故伊尹自謂與湯咸有一德而於復政太甲之初復以終始惟一時乃日新為丁寧之戒云曰此言新民而引此何也曰此自其本而言之蓋以是為自新之本而新民之端也曰康誥之言作新民者何也曰武王之封康叔也以商之餘民染紂汚俗而失其本心也故作康誥之書而告之以此欲其有以鼓舞而作興之使之振奮踴躍以去其惡而遷于善舍其舊而進乎新也然此豈聲色號令之所能及哉亦自新而已矣曰詩之言其命維新何也曰言周之有邦自后稷以來千有餘年至于文王聖德日新而民亦丕變故天命之以有天下是其邦雖舊而命則新也蓋民之視效在君而天之視聽在民君德既新則民德必新民德既新則天命之新亦不旋日矣曰所謂君子無所不用其極何也曰以結上文詩書之意也蓋盤銘言自新也康誥言新民也文王之詩自新新民之極也故曰云云極即至善之云也用其極者求其止於是而已矣以上新民傳詩云邦畿千里惟民所止詩商頌𤣥鳥之篇邦畿王者之都也止居也言物各有所當止之處也詩云緡蠻黃鳥止于丘隅子曰於止知其所止可以人而不如鳥乎緡詩作綿見詩小雅綿蠻之篇綿蠻鳥聲丘隅岑蔚之處子曰以下孔子說詩之辭言人當知所當止之處也詩云穆穆文王於緝熙敬止為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信詩文王之篇穆穆深逺之意於歎美辭緝繼續也熙光明也敬止言其無不敬而安所止也引此而言聖人之止無非至善五者乃其目之大者也學者於此究其精微之藴而又推類以盡其餘則於天下之事皆有以知其所止而無疑矣詩詞拈出敬字須玩或問云云曰此因聖人之止以明至善之所在也蓋天生蒸民有物有則是以萬物庶事莫不各有當止之所但所居之位不同則所止之善不一故為人君則其所當止者在于仁為人臣則其所當止者在于敬為人子則其所當止者在于孝為人父則其所當止者在于慈與國人交則其所當止者在于信是皆天理人倫之極致而發于人心之不容己者而文王之所以為法于天下可傳于後世者亦不能加毫末于是焉但衆人類為氣禀物欲之所昏故不能常敬而失其所止惟聖人之心表裏洞然無有一毫之蔽故連續光明自無不敬而所止者莫非至善不待知所止而後得所止也故傳引此詩而厯陳所止之實固天下後世得以取法焉學者于此誠有以見其發於本心之不容己者而緝熙之使其連續光明無所間斷則其敬止之功也是亦文王而已矣詩所謂上天之載無聲無臭儀刑文王萬邦作孚正此意也曰子說詩既以敬止之止為語助之辭而於此書又以為所止之義何也曰古人引詩斷章或姑借其辭以明己意未必皆取本文之義也曰五者之目詞約而義該矣子之說乃復有所謂究其精微之藴而推類以通之者何耶曰舉其德之要而總名之則一言足矣論其所以為是一言者則其始終本末豈一言之所能盡哉得其名而不得其所以名則仁或流于姑息敬或墮於阿諛孝或陷父而慈或敗子且其為信未必不為尾生白公之為也又况傳之所陳姑以見物各有止之凡例其于大倫之目猶且闕其二焉茍不推類以通之亦何以盡天下之理哉詩云瞻彼淇澳菉竹猗猗有斐君子如切如磋如琢如磨瑟兮僴兮赫兮喧兮有斐君子終不可喧兮如切如磋者道學也如琢如磨者自修也瑟兮僴兮者恂栗也赫兮喧兮者威儀也有斐君子終不可喧兮者道盛德至善民之不能忘也詩衛風淇澳之篇淇水名澳隈也猗猗美盛貌興也斐文貌切以刀鋸琢以椎鑿皆裁物使成形質也磋以鑢鐋磨以沙石皆治物使其滑澤也治角骨者既切而復磋之治玉石者既琢而復磨之皆言其治之有緒而益致其精也瑟嚴密之貌僴武毅之貌赫喧宣著盛大之貌喧忘也道言也學謂講習討論之事自修者省察克治之功恂栗戰懼也威可畏也儀可象也引詩而釋之以明明德者之止於至善道學自修言所以得之之由恂栗威儀言其德容表裏之盛卒乃指其實而歎美也詩云於戲前王不忘君子賢其賢而親其親小人樂其樂而利其利此以沒世不忘也詩周頌烈文之篇於戲歎辭前王謂文武也君子謂其後賢小人謂後民也此言前王所以新民者止於至善能使天下後世無一物不得其所所以既沒世而人思慕之愈久而不忘也此兩節咏歎淫液其味深長當熟玩之或問復引淇澳之詩何也曰上言止於至善之理備矣然其所以求之之方與其得之之驗則未之及故又引此詩以發明之也夫如切如磋言其所以講於學者已精而益求其精也如琢如磨言其所以修於身者已密而益求其密也此其得止于至善之由也恂栗者嚴敬之存于中也威儀者輝光之著乎外也此其止于至善之驗也盛德以身之所得而言至善以理之所極而言切磋琢磨求其止於是而已矣曰切磋琢磨何以為學問自修之别也曰骨角脉理可尋而切磋之功易所謂始條理之事也玉石渾全堅確而琢磨之功難所謂終條理之事也曰引烈文之詩而言前王之沒世不忘何也曰賢其賢者聞而知之仰其德業之盛也親其親者子孫保之思其覆育之恩也樂其樂者含哺鼓腹而安其樂也利其利者耕田鑿井而享其利也此皆先王盛德至善之餘澤故雖已沒世而人猶思之愈久而不能忘也上文之引淇澳以明明德之得所止言之而發新民之端也此引烈文以新民之得所止言之而著明明德之效也問章句云云曰大倫有五此言其三蓋不止此䆒其精微之藴是就三者裏面窮究其藴推類以通其餘是就此推廣去如夫婦兄弟之類大學止善一章工夫都在切磋琢磨上問切磋琢磨之說曰恰似剝了一重又有一重學者做工夫消磨舊習幾時便去得盡須是只管磨礲教十分淨潔最怕如今眼前道理略理會得些便自以為是更不著力向上去如何得到至善田地衛武公是大段有學問底人抑之一詩義理精密詩中如此者甚不易得切而不磋亦未到至善處琢而不磨亦未到至善處瑟兮僴兮則誠敬存于中矣未至于赫兮喧兮威儀輝光著見于外亦未為至善此四句是此段緊切處專是說至善蓋不如此則雖善矣未得為至善也至于民之不能忘若非十分至善何以使民至是古人言語精密有條理如此以上止至善傳子曰聽訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志此謂知本猶人不異于人也情實也引夫子之言而言聖人能使無實之人不敢盡其虛誕之辭蓋我之明德既明自然有以畏服民之心志故訟不待聽而自無也觀于此言可以知本末之先後矣問云云曰聖人德盛仁熟所以自明者皆極天下之至善故能大有以畏服其民之心志而使之不敢盡其無實之詞蓋已德既明而明德自新則得其本之明效也或不能然而欲區區於分爭辨訟之間以求新民之效其亦末矣聖人所以無訟者却不在善聽訟在於意誠心正自然有以薰炙漸染大服民志故自無訟之可聽如成人有兄死而不為衰者聞子臯將至遂為衰又何嘗聽訟了致然只是有以感動人處故耳以上本末傳朱子曰傳之五章蓋釋格物致知之義而今亡矣間嘗竊取程子之意以補之曰所謂致知在格物者言欲致吾之知在即物而窮其理也蓋人心之靈莫不有知而天下之物莫不有理惟于理有未窮故其知有不盡也是以大學始教必使學者即凡天下之物莫不因其已知之理而益窮之以求至乎其極至于用力之久而一旦豁然貫通焉則衆物之表裏精粗無不到而吾心之全體大用無不明矣此謂物格此謂知之至也或問此經之序自誠意以下其義明而傳悉矣獨其所謂格物者字義不明而傳復闕焉且為最初用力之地而無復上文語緒之可尋也子乃自謂取程子之意以補之程子之言何以見其必合經意而子之言又似不盡出于程子何耶曰或問于程子曰學何為而可以有覺也程子曰學莫先于致知能致其知則思日益明至于久而後有覺爾書所謂睿作聖董子所謂勉强學問則聞見博而智益明正謂此也學而無覺則亦何以學為哉或問忠信則可勉矣而致知為難奈何程子曰誠敬固不可以不勉然天下之理不先知之亦未有能勉以行之者也故大學之序先致知而後誠意其等有不可躐者茍無聖人之聰明睿智而徒欲勉焉以踐其行事之迹則亦安能如彼之動容周旋無不中禮也哉惟其燭理之明乃能不待勉强而自樂循理爾夫人之性本無不善循理而行宜無難者惟其知之不至而但欲以力為之是以苦其難而不知其樂耳知之而至則循理為樂不循理為不樂何苦不循理以害吾樂耶昔有談虎傷人者衆莫不聞而其間一人神色獨變問其所以乃嘗傷于虎者也夫虎能傷人人孰不知然聞之有懼有不懼者知之有真有不真也學者之知道必如此人之知虎然後為至耳若曰知不善之不可為而猶或為之則亦未嘗真知而已矣此兩條者皆言格物致知所以當先而不可後之意也又有問進修之術何先者程子曰莫先于正心誠意然欲誠意必先致知而欲致知又在格物致盡也格至也凡有一物必有一理窮而至之所謂格物者也然而格物亦非一端如或讀書講明道義或論古今人物而别其是非或應接事物而處其當否皆窮理也曰格物者必物物而格之耶將止格一物而萬理皆通耶曰一物格而萬理通雖顔子亦未至此唯今日而格一物焉明日又格一物焉積習既多然後豁然有貫通處耳又曰自一身之中以至萬物之理理㑹得多自當豁然有個覺處又曰窮理者非謂必盡窮天下之理又非謂止窮得一理便到但積纍多後自當脫然有悟處又曰格物非欲盡窮天下之物但於一事上窮盡其他可以類推至於言孝則當求其所以為孝者如何若一事上窮不得且别窮一事或先其易者或先其難者各隨其淺深譬如千蹊萬徑皆可以適國但得一道而入則可以推類而通其餘矣蓋萬物各具一理而萬理同出一原此所以可推而無不通也又曰物必有理皆所當窮若天地之所以髙深鬼神之所以幽顯是也若曰天吾知其髙而已矣地吾知其深而已矣鬼神吾知其幽且顯而已矣則是已然之詞又何理之可窮哉如曰如欲為孝則當知所以為孝之道如何而為奉養之宜如何而為溫凊之節莫不窮究然後能之非獨守夫孝之一字而可得也或問觀物察己者豈因見物而反求諸已乎曰不必然也物我一理才明彼即曉此此合內外之道也語其大天地之所以髙厚語其小至一物之所以然皆學者所宜致思也曰然則先求之四端可乎曰求之情性固切於身然一草一木亦皆有理不可不察又曰致知之要當知至善之所在如父止於慈子止於孝之類若不務此而徒欲泛然以觀萬物之理則吾恐其如大軍之遊騎出太逺而無所歸也又曰格物莫若察之於身其得之尤切此十條者皆言格物致知所當用力之地與其次第功程也又曰格物窮理但立誠意以格之其遲速則在乎人之明暗耳又曰入道莫如敬未有能致知而不在敬者又曰涵養須用敬進學則在致知又曰致知在乎所養養知莫過于寡欲又曰格物者適道之始思欲格物則固已近道矣是何也以收其心而不放也此五條者又言涵養本原之功所以為格物致知之本者也凡程子之為說者不過如此其于格物致知之傳詳矣今也尋其義理既無可疑考其字義亦皆有據至以他書論之則文言所謂學聚問辨中庸所謂明善擇善孟子所謂知性知天又皆在乎固守力行之先而可以驗夫大學始教之功為有在乎此也曰然則吾子之意亦可得而悉聞之乎曰吾聞之也天道流行造化發育凡有聲色貌象而盈于天地之間者皆物也既有是物則其所以為是物者莫不各有當然之則而自不容己是皆得于天之所賦而非人之所能為也今且以其至切而近者言之則心之為物實主於身其體則有仁義禮智之性其用則有惻隱羞惡恭敬是非之情渾然在中隨感而應各有攸主而不可亂也次而及于身之所具則有口鼻耳目四肢之用又次而及于身之所接則有君臣父子夫婦長幼朋友之常是皆各有當然之則而自不容己所謂理也外而至於人則人之理不異于己也逺而至于物則物之理不異于人也極其大則天地之運古今之變不能外也盡于小則一塵之微一息之頃不能遺也是乃上帝所降之衷蒸民所秉之彛劉子所謂天地之中夫子所謂性與天道子思所謂天命之性孟子所謂仁義之心程子所謂天然自有之中張子所謂萬物之一原邵子所謂道之形體者但其氣質有清濁偏正之殊物欲有淺深厚薄之異是以人之與物賢之與愚相與懸絶而不能同耳以其理之同故以一人之心而於天下萬物之理無不能知以其禀之異故於理或有所不能窮也理有未窮故其知有不盡知有不盡則其心之所發必不能純於義理而無雜乎物欲之私此其所以意有不誠心有不正身有不修而天下國家不可得而治也昔者聖人蓋有憂之是以於其始教為之小學而使之習於誠敬則所以收其放心養其德性者已無所不用其至矣及其進乎大學則又使之即夫事物之中因其所知之理推而究之以各到乎其極則吾之知識亦得以周遍精切而無不盡也若其用力之方則或考之事為之著或察之志慮之微或求之文字之中或索之講論之際使於身心性情之德人倫日用之常以至天地鬼神之變鳥獸草木之宜自其一物之中莫不有以見其所當然而不容己與其所以然而不可易者必其表裡精粗無所不盡而又益推其類以通之至于一日脫然而貫通焉則於天下之物皆有以究其義理精微之極而吾之聰明睿智亦皆有以極其心之本體而無不盡矣此愚之所以補乎本傳闕文之意雖不能盡用程子之言然其指趣要歸則不合者鮮矣讀者其亦深考而實識之哉曰然則子之為學不求諸心而求諸迹不求之內而求之外吾恐聖賢之學不如是之淺近而支離也曰人之所以為學心與理而已矣心雖主乎一身而其體之虛靈足以管乎天下之理理雖散在萬物而其用之微妙實不外乎人之一心初不可以內外精粗而論也然或不知此心之靈而無以存之則昏昧雜擾而無以窮衆理之妙不知衆理之妙而無以窮之則偏狹固滯而無以盡此心之全此其理勢之相須蓋亦有必然者是以聖人設教使人默識此心之靈而存之于端莊靜一之中以為窮理之本使人知有衆理之妙而窮之于學問思辨之際以致盡心之功巨細相涵動靜交養初未嘗有內外精粗之擇及其真積力久而豁然貫通焉則亦有以知其渾然一致而果無內外精粗之可言矣今必以是為淺近支離而欲藏形匿影别為一種幽深恍惚艱難阻絶之論務使學者莾然措其心於文字言語之外而曰道必如此然後可以得之則是近世佛學詖淫邪遁之尤者而欲移之以亂古人明德新民之實學其亦誤矣曰近世大儒有為格物致知之說者曰格猶扞也禦也能扞禦外物而後能知至道也又有推其說者曰人生而靜其性本無不善而有為不善者外物誘之也所謂格物以致其知者亦曰扞去外物之誘而本然之善自明耳是其為說不亦善乎曰天生蒸民有物有則物之與道固未始相離也今曰禦外物而後可以知至道則是絶父子而後可以知孝慈離君臣然後可以知仁敬也是安有此理哉若曰所謂外物者不善之誘耳非指君臣父子而言也則夫外物之誘人莫甚於飲食男女之欲然推其本則固亦莫非人之所當有而不能無者也但于其間自有天理人欲之辨而不可以毫釐差耳惟其徒有是物而不能察於吾之所以行乎其間者孰為天理孰為人欲是以無以致其克復之功而物之誘於外者得以奪乎天理之本然也今不即物以窮其原而徒惡物之誘乎已乃欲一切扞而去之則是必閉口枵腹然後可以得飲食之正絶滅種類然後可以全夫婦之别也是雖裔戎無君無父之教有不能充其說者况乎聖人大中至正之道而得以此亂之哉曰自程子以格物為窮理而其學者傳之見於文字者多矣是亦有以發其師說而有助於後學者耶曰程子之說切於己而不遺于物本於行事之實而不廢文字之工極其大而不略其小究其精而不失其粗學者循是而用力焉則既不務博而蹈於支離亦不徑約而流於狂妄既不舍其積纍之漸而其所謂豁然貫通者又非見聞思慮之所及也是於說經之意入德之方其亦可謂反復詳備而無俟於發明矣若其門人雖曰祖其師說然恐其皆未足以及此也間獨惟念昔聞延平先生之教以為為學之初且當常存此心勿為他事所勝凡遇一事即當且就一事反復推尋以究其理待此一事融釋脫落然後循序少進而别窮一事如此既久積纍之多胸中自當有灑然處非文字語言之所及也詳味此言雖其規模之大條理之密若不逮於程子然其工夫之漸次意味之深切則有非他說所能及者惟嘗實用力於此者為能有以識之也曰然則所謂格物致知之學與世之所謂博物洽聞者奚以異曰此以反身窮理為主而必究其本末是非之極至彼以狥外誇多為務而不核其表裏真妄之實然必究其極是以知愈博而心愈明不核其實是以識愈多而心愈窒此正為己為人之所以分也問格物工夫未到得十分亦未害否曰學者之所以學便須是到聖賢地位不到不休方是但用工做向前去莫問程途少間自能到如何先立一個不解到得便休底規模在此程子前說當察物理不可專在性情後又言莫若得之於身為尤切皆是互相發處問立誠意以格之曰這誠意只是朴實下工夫與經文誠意不同致知是推致到極處窮究徹底直見得决如此問固有人明得此理而涵養未到却為私意所奪曰只為明得不盡若明得盡私意自然留不得若半青半黃未能透徹便是尚有查滓非所謂真知也今人行到五分便是只知得五分今日格一件明日格一件積習既多自當脫然有貫通處乃是零零碎碎凑合將來不知不覺自然醒悟其始固須用力及其得之也又却不假用力所以謂格得多後自能貫通者只謂是一理釋氏曰一月普現一切水一切水月一月攝釋氏也窺見此理濓溪通書只是說這個事問程子謂一草一木皆所當窮又有遊騎太逺之說如何曰便是此等語說得好平正不向一邉去又曰程子于此段節目甚多皆是因人資質說故有說向外處有說向內處又曰今須合程子諸說不同處看作一意乃善內事外事皆是自已合理㑹底但須是六七分去裏面理㑹三四分去外理㑹方可致知本是廣大須表裏內外周遍兼該方得格物致知彼我相對而言耳格物所以致知於這一物上窮得一分之理即我之知亦知得一分於物之理窮得二分即我之知亦知得二分物之理窮得愈多則我之知愈廣其實只是一理才明彼即曉此所以說致知在格物又不說欲致其知者先格其物蓋致知便在格物中非格之外别有致處也又曰格物之理所以致我之知上蔡說窮理只尋個甚處其說甚好正䝉是盡窮天下之理問或問云云曰所以然而不可易者是指理而言所當然而不容己者是指人心而言否曰上句只是指事而言凡事固有當然而不容己者然又當求其所以然者何故其所以然理也理如此故不可易如見赤子入井而有惻隱之心此事之所當然不可已者然其所以然者是何故必有個道理之不可易者又曰理之所當為者自不容己孟子最發明此理處如曰孩提之童無不知愛其親及其長也無不知敬其兄自是有住不得處答學者書曰格物致知是大學第一義修己治人之道無不從此而出終身要得受用豈是細事今乃欲不勞而俟其自格一何言之易耶近世學者氣軟質薄不耐持久每以欲速之心懷僥幸躐等之望又有科舉世俗之學以奪其志所以常若有所驅迫而不暇從容以及其有成也以上格物致知傳所謂誠其意者毋自欺也如惡惡臭如好好色此之謂自謙故君子必慎其獨也小人閒居為不善無所不至見君子而后厭然掩其不善而著其善人之視己如見其肺肝然則何益矣此謂誠於中形於外故君子必慎其獨也曾子曰十目所視十手所指其嚴乎富潤屋德潤身心廣體胖故君子必誠其意說己見前以上誠意傳經曰欲誠其意先致其知又曰知至而后意誠蓋心體之明有所未盡則其所發必有不能實用其力而茍焉以自欺者然或已明而不謹乎彼則其所眀又非已有而無以為進德之基故此章之指必承上章而通考之然後有以見其用力之始終其序不可亂而功不可闕如此云所謂修身在正其心者心有所忿懥則不得其正有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正心不在焉視而不見聽而不聞食而不知其味此謂修身在正其心說已見前以上正心修身傳此亦承上章以起下章蓋意誠則真無惡而實有善矣所以能存是心以檢其身然或但知誠意而不能密察此心之存否則又無以直內而修身也所謂齊其家在修其身者人之其所親愛而辟焉之其所賤惡而辟焉之其所畏敬而辟焉之其所哀矜而辟焉之其所敖惰而辟焉故好而知其惡惡而知其美者天下鮮矣辟讀為僻人謂衆人之猶於也辟猶偏也五者在人本有當然之則然常人之情惟其所向而不加察焉則必陷於一偏而身不修矣故諺有之曰人莫知其子之惡莫知其苗之碩諺俗語也溺愛者不明貪得者無厭是則偏之為害而家之所以不齊也此謂身不修不可以齊其家或問云云曰人之常情於此五者一有所向則失其好惡之平而陷於一偏是以身有不修不能齊其家耳蓋偏於愛則溺焉而不知其惡矣偏於惡則阻焉而不知其善矣是其身之所接好惡取舍之間將無一當于理者而况于閨門之內恩常掩義亦何以勝其情愛昵比之私而能有以齊之哉曰凡是五者皆身與物接所不能無今日一有所向便有偏倚而身不修則是必其接物之際此心漠然都無親踈之等尊賤之别然後得免於偏也且心既正矣則宜其身之無不修今乃猶有若是之偏何也曰不然也此章之義實承上章其立文命意大抵相似蓋以為身與事接而後或有所偏非以為一與事接而必有所偏也所謂心正而后身修亦曰心得其正而后身修亦曰心得其正乃能修身非謂此心一正則身不待檢而自修也問正心章說忿懥恐懼好樂憂患與修身章說親愛賤惡畏敬哀矜敖惰如何曰是心卓然立乎此數者之外則平正而不偏倚自外來者必不能動于中自內出者必不至溺於彼或問畏敬如何曰如家人有嚴君焉吾之所當畏敬者也然當不義則爭之若過于畏敬而從其令則陷於偏矣若夫賤惡者固當賤惡然或有長處亦當知之下文所謂好而知其惡惡而知其美天下鮮矣此是指㸃人偏處最切當問正心章既說忿懥四者矣修身章又說親愛之類是如何曰忿懥等是心與物接時事親愛等是身與物接時事問辟作僻云云曰人情自有偏處所親愛莫如父母至于父母有當幾諫處豈可以親愛而忘正救所敬畏莫如君父至于所當直言正諫豈可專持畏敬而不敢言敖惰謂如孔子不見孺悲孟子不與王歡言哀矜謂如有一般大姦大惡欲治之以其哀鳴遂恕之這便是哀矜之不得其正處問君子亦有敖惰於人者乎曰人自有茍賤可厭棄者問敖惰惡德也豈君子宜有曰讀書不可泥且當看其大意南軒答文公書曰諭及大學中人之其所親愛而辟焉處當讀作僻字反復詳之無可疑者其理則于修身齊家極為要切易傳所謂妻孥之言雖失而多從所憎之言雖善而為惡亦是意也以上修身齊家傳愚謂親愛賤惡畏敬哀矜者人之所宜有也敖惰者人之所不宜有也然一溺于偏則雖所宜有者皆失其正况於非所宜有者乎此辟之一字所以為修身齊家之深病也五者皆指人之偏處而言不可獨以敖惰為惡亦不可牽于四者之故而謂敖惰亦所宜有也所謂治國必先齊其家者其家不可教而能教人者無之故君子不出家而成教於國孝者所以事君也弟者所以事長也慈者所以使衆也身修則家可教矣孝弟慈所以修身而教于家者也然而國之所以事君事長使衆之道不外乎此此所以家齊于上而教成于下也康誥曰如保赤子心誠求之雖不中不逺矣未有學養子而後嫁者也此引書而釋之又明立教之本不假强為在識其端而推廣之耳一家仁一國興仁一家讓一國興讓一人貪戾一國作亂其機如此此謂一言僨事一人定國一人謂君也機發動所由也僨覆敗也此言教成於國之效堯舜帥天下以仁而民從之桀紂帥天下以暴而民從之其所令反其所好而民不從是故君子有諸己而后求諸人無諸己而后非諸人所藏乎身不恕而能喻諸人者未之有也此乂承上文一人定國而言有善於己然後可以責人之善無惡於己然後可以正人之惡皆推己以及人所謂恕也不如是則所令反其所好而民不從矣喻曉也故治國在齊其家通釋上文詩云桃之夭夭其葉蓁蓁之子于歸宜其家人宜其家人而后可以教國人詩周南桃夭之篇夭夭少好貌蓁蓁美盛貌興也之子猶言是子婦人謂嫁曰歸宜猶善也詩云宜兄宜弟宜兄宜弟而后可以教國人詩小雅蓼蕭篇詩云其儀不忒正是四國其為父子兄弟足法而后民法之也詩曹風鳲鳩篇忒差也此謂治國在齊其家此三引詩皆以咏嘆上文之事而又結之如此其味深長最宜潜玩或問如保赤子何也曰程子有言赤子未能自言其意而為之母者慈愛之心出于至誠則凡所以求其意者雖或不中而不至於大相逺矣豈待學而后能哉若民則非如赤子之不能自言矣而使之者反不能無失於其心則以本無慈愛之實而於此有不察耳傳之言此蓋以明夫使衆之道不過自其慈幼者而推之而慈幼之心又非外鑠而有待於强為也事君之孝事長之弟亦何以異於此哉曰仁讓言家貪戾言人何也曰善必積而后成惡雖小而可懼古人之深戒也書所謂爾惟德罔小萬邦惟慶爾惟不德罔大墜厥宗亦是意爾曰此章本言上行下效有不期然而然者今曰有諸己而后求諸人無諸己而后非諸人則是猶有待於勸勉程督而后化且己適自修而遽欲望人之皆有己方僅免而遂欲責人以必無也曰此為治其國者言之則推吾所有與民共由其條教法令之施賞善罰惡之政固有理所當然而不可己者但以所令反其所好則民不從故又推本言之欲其先成於己而有以責人固非謂其專務治己都不治人而拱手以俟其自化亦非謂其矜己之長愧人之短而脅之以必從也故先君子之言曰有諸己不必求諸人以為求諸人而無諸己則不可也無諸己不必非諸人以為非諸人而有諸己則不可也正此意也曰然則未能有善而遂不求人之善未能去惡而遂不非人之惡斯不亦恕而終身可行乎哉曰恕字之指以如心為義蓋曰如治己之心以治人如愛己之心以愛人而非茍然姑息之謂也然人之為心必嘗窮理以正之使其所以治己愛己者皆出於正然後可以即是推之以及於人而恕之為道有可言者故大學之傳最後兩章始及於此則其用力之序亦可見矣至即此章而論之則欲如治己之心以治人者又不過以强於自治為本蓋能强於自治至於有善而可以求人之善無惡而可以非人之惡然後推以及人使之亦如我之所以自治而自治焉則表端景正源潔流清而治己治人無不盡其道矣所以終身力此而無不可行之時也今乃不然而直欲以其不肖之身為標凖視吾治教所當及者一以姑息待之不相訓誥不相禁戒將使天下之人皆如己之不肖而淪胥以陷焉是乃大亂之道而豈所謂終身可行之恕哉近世名卿之言有曰人雖至愚責人則明雖有聰明恕己則昏茍能以責人之心責己恕己之心恕人則不患不至於聖賢矣此言近厚世亦多稱之者但恕字之義本以如心而得故可以施之於人而不可以施之於己今曰恕己則己知其如此矣而又曰以恕己之心恕人則是既不知自治其昏而遂推以及人使其亦將如我之昏而後己也乃欲由此以入聖賢之域豈不誤哉藉令其意但為欲反此心以施於人則亦止可以言下章愛人之事而於此章治人之意與夫中庸以人治人之說則皆有未合者蓋其為恕雖同而一以及人為主一以自治為主則二者之間毫釐之異正學者所當深察而明辨也若漢之光武亦賢君也一且以無罪黜其妻其臣郅惲不能開陳大義以救其失而姑為緩辭以慰解之是乃所謂不能三年而緦功是察放飯流啜而齒决是憚者光武乃謂惲為善恕己量主則其失又甚逺而大啓為人臣者不肯責難陳善以賊其君之罪一字之義有所不明而其禍乃至於此可不謹哉曰既結上文而復引詩者三何也曰古人言必引詩蓋取其嗟嘆咏歌優游厭飫有以感發人之善心非徒取彼之文證此之義而已也夫以此章所論齊家治國之事文具而意足矣復三引詩非能於其所論之外别有所發明也然嘗試讀之則反復吟咏之間意味深長義理通暢使人心融神㑹有不知手舞而足蹈者是則引詩之助與為多焉蓋不獨此他凡引詩云者皆以是而求之則引者之意可見而詩之為用亦得矣曰三詩亦有序乎曰首言家人次言兄弟終言四國亦刑于寡妻至于兄弟以御于家邦之意也孝者所以事君云云此道理皆是我家裡做成了天下人看看自能如此不是我推之於國心誠求之者求赤子之所欲也於民亦當求其有不能自達者此是推其慈幼之心以使衆也或問范忠宣以恕己之心恕人此語固冇病但上文先言以責人之心責己則連下句亦未害曰上句自好下句自不好蓋才說恕己便己不是若橫渠云以愛己之心愛人則盡仁以責人之心責己則盡道語便不同蓋恕己與愛己之不同知道君子發言自别此學者所以貴於知道也問所藏乎身不恕恕字還只就接物上說如何曰是就接物上見得忠只是實心直是真實無僞所應接事物也只是推這個心去直是忠方能恕若不忠便無本領了更把甚麼去及物程先生說維天之命於穆不己忠也便是實理流行乾道變化各正性命恕也便是實理及物問恁地說又與夫子忠恕相似曰只是一個忠恕豈有二樣聖人與常人忠恕也不甚相逺治國章乃責人之恕平天下章乃愛人之恕問齊家治國之道斷然是父子兄弟足法而后人法之然堯舜不能化其子而周公則上見疑於君下不能和其兄弟是如何曰聖人是論其常堯舜是處其變看他蒸蒸乂不格姦至於瞽瞍底豫便是他有以處那變處問先吏部說云云曰這是說尋常人若自家有諸己又何必求諸人無諸己又何必非諸人如孔子所謂躬自厚而薄責於人攻其惡無攻人之惡至於大學之說是有天下國家者勢不可以不責他然又須自家有然後可以求人自家無然後可以非人又曰此是退一步說猶言溫故知新可以為人師以明未能如此則不可如此非謂溫故知新便要求為人師也以上齊家治國傳所謂平天下在治其國者上老老而民興孝上長長而民興弟上恤孤而民不倍是以君子有潔矩之道也倍與背同老老所謂老吾老也興謂有所感發而興起也孤者幼而無父之稱潔度也矩所以為方也言此三者上行下效捷於影響所謂家齊而國治也亦可以見人心之所同而不可使有一夫之不獲矣是以君子必當因其所同推以度物使彼我之間各得分願則上下四旁均齊方正而天下平矣所惡於上毋以使下所惡於下毋以事上所惡於前毋以先後所惡於後毋以從前所惡於右毋以交於左所惡於左毋以交於右此之謂潔矩之道此覆解上文潔矩二字之義如不欲上之無禮於我則必以此度下之心而亦不敢以此無禮使之不欲下之不忠於我則必以此度上之心而亦不敢以此不忠事之至于前後左右無不皆然則身之所處上下四旁長短廣狹彼此如一而無不方矣彼同有是心而興起焉者又豈有一夫之不獲哉所操者約而所及者廣此平天下要道也故章內之意皆自此而推之詩云樂只君子民之父母民之所好好之民之所惡惡之此之謂民之父母詩小雅南山有臺之篇言能潔矩而以民心為己心則是愛民如子而民愛之如父母矣詩云節彼南山維石巖巖赫赫師尹民具爾瞻有國者不可以不慎辟則為天下僇矣詩小雅節南山之篇節截然髙大貌師尹周太師尹氏也具俱也辟偏也言在上者人所瞻仰不可不謹若不能潔矩而好惡狥于一己之偏則身弒國亡為天下之大僇矣詩云殷之未喪師克配上帝儀監于殷峻命不易道得衆則得國失衆則失國詩文王篇師衆也配對也道言也引詩而言此以結上文兩節之意有天下者能存此心而不失則所以潔矩而與民同欲者自不能已矣是故君子先慎乎德有德此有人有人此有土有土此有財有財此有用此承上文不可不慎而言德即所謂明德有人謂得衆有土謂得國有國則不患無財用矣德者本也財者末也外本內末爭民施奪人君以德為外以財為內則是爭鬭其民而施之以劫奪之教也蓋財者人之所同欲不能潔矩而欲專之則民亦起而爭奪矣是故財聚則民散財散則民聚外本內末故財聚爭民施奪故民散反是則有德而有人矣是故言悖而出者亦悖而入貨悖而入者亦悖而出悖逆也此以言之出入明貨之出入也自先謹乎德以下至此又因財貨以明能潔矩與不能者之得失也康誥曰惟命不于常道善則得之不善則失之矣道言也因上文引詩之意而申言之其丁寧反覆之意益深切矣楚書曰楚國無以為寶惟善以為寶楚書楚語言不寶金玉而寶善人也舅犯曰亡人無以為寶仁親以為寶舅犯晉文公舅狐偃字子犯亡人文公時為公子出亡在外也事見檀弓此兩節又明不外本而內末之意秦誓曰若有一個臣斷斷兮無他技其心休休焉其如有容焉人之有技若己有之人之彥聖其心好之不啻若自其口出實能容之以能保我子孫黎民尚亦有利哉人之有技媢疾以惡之人之彥聖而違之俾不通實不能容以不能保我子孫黎民亦曰殆哉秦誓周書斷斷誠一之貌彥美士也聖通明也尚庶幾也媢忌也違拂戾也殆危也唯仁人放流之迸諸四夷不與同中國此謂唯仁人為能愛人能惡人迸猶逐也言有此媢疾之人妨賢而病國則仁人必深惡而痛絶之以其至公無私故能得好惡之正如此也見賢而不能舉舉而不能先命也命當作慢見不善而不能退退而不能逺過也若此者知所愛惡矣而未能盡愛惡之道蓋君子而未仁者也好人之所惡惡人之所好是謂拂人之性菑必逮夫身好善而惡惡人之性也至於拂人之性則不仁之甚者也自秦誓至此又皆以申言好惡公私之極以明上文所引南山有臺節南山之意是故君子有大道必忠信以得之驕泰以失之君子以位言之道謂居其位而修己治人之術發己自盡為忠循物無違謂信驕者矜髙泰者侈肆此因上所引文王康誥之意而言章內三言得失而語益加切蓋至此而天理存亡之幾决矣生財有大道生之者衆食之者寡為之者疾用之者舒則財恆足矣吕氏曰國無遊民則生者衆矣朝無幸位則食者寡矣不奪農時則為之疾矣量入為出則用之舒矣愚按此因有土有財而言以明足國之道在乎務本而節用非必外本內末而後財可聚也自此以至終篇皆一意也仁者以財發身不仁者以身發財發猶起也仁者散財以得民不仁者亡身以殖貨未有上好仁而下不好義者也未有好義其事不終者也未有府庫財非其財者也上好仁以愛其下下好義以忠其上所以事必有終而府庫之財無悖出之患也孟獻子曰畜馬乘不察于雞豚伐氷之家不畜牛羊百乘之家不畜聚斂之臣與其有聚斂之臣寧有盜臣此謂國不以利為利以義為利也獻子魯賢大夫仲孫蔑也畜馬乘士初試為大夫者也伐氷之家卿大夫以上喪祭用氷者也百乘之家有采地者也君子寧亡己之財而不忍傷民之力故寧有盜臣而不畜聚斂之臣此謂以下釋獻子之言也長國家而務財用者必自小人矣彼為善之小人之使為國家菑害並至雖有善者亦無如之何矣此謂國不以利為利以義為利也自由也言由小人導之也此一節深明以利為利之害而重言以結之其丁寧之意切矣或問所謂民之父母何也曰君子有潔矩之道故能以己之好惡知民之好惡又能以民之好惡為己之好惡也夫好其所好而與之聚之惡其所惡而不以施焉則上之愛下真猶父母之于子矣彼民之親其上豈不亦猶子之愛其父母哉曰此引節南山之詩何也曰言在尊位者人所親仰不可不謹若人君恣己好惡不與天下同其好惡則為天下僇如桀紂幽厲也曰得衆得國失衆失國何也曰言能潔矩則民父母之而得衆得國矣不能潔矩則為天下僇而失衆失國矣所謂先慎乎德何也曰上言有國者不可不謹此言其所謹而當先者尤在于德也德即所謂明德所以謹之亦曰格物致知誠意正心以修其身而已矣曰此其深言務財用而失民何也曰有德而有人有土則因天分地不患乎無財用矣然不知本末而無潔矩之心則未有不爭鬭其民而施之以劫奪之教者也易大傳曰何以聚人曰財春秋外傳曰王人者將以導利而布之上下者也故財聚于上則民散于下矣財散于下則民歸于上矣言悖而出者亦悖而入貨悖而入者亦悖而出鄭氏以為君有逆命則民有逆詞上貪于利則下人侵畔得其㫖矣曰前既言命之不易矣此又言命之不常何也曰以天命之重而致其丁寧之意亦承上文而言之也蓋善則得之者有德而有人之謂也不善則失之者悖入而悖出之謂也然則命之不常乃人之所自為耳可不謹哉曰其引秦誓何也曰言好善之利及其子孫不好善之害流于後世亦猶潔矩與否之異也曰媢疾之人誠可惡矣然仁人惡之之深至于如此得無疾之已甚之亂耶曰小人為惡千條萬端其可惡者不但媢疾一事而已仁人不深惡乎彼而獨深惡乎此者以其有害于善人使民不得被其澤而流禍之長及于後世而未已也然非殺人於貨之盜則罪不至死故亦放流之而已然又念夫彼此之勢雖殊而苦樂之情則一今此惡人放而不逺則其為害雖得不施于此而彼所放之地其民復何罪焉故不敢以己之所惡施之于人而必逺而置之無人之境以禦魑魅而後己蓋不惟保安善人使不䝉其害亦所以禁伏凶人使不得稔其惡雖因彼之善惡而有好惡之殊然所以仁之之意亦未嘗不行乎其間也此其為禦亂之術至矣而何致亂之有曰仁人之能愛人能惡人何也曰仁人者私欲不萌而天下之公在我是以是非不謬而舉措得宜也曰好善惡惡人之性然也有拂人之性者何哉曰不仁之人阿黨媢疾有以陷溺其心是以其所好惡戾于常性如此與民之父母能好惡人者正相反使其能勝私而潔矩則不至於是矣曰忠信驕泰之所以為得失者何也曰忠信者盡己之心而不違于物潔矩之本也驕泰則恣己狥私以人從欲不得與人同好惡矣曰上文深陳財用之失民矣此復言生財之道何也曰此所謂有土而有財者也夫洪範八政食貨為先子貢問政而夫子告之亦以足食為首蓋生民之道不可一日而無者聖人豈輕之哉特以為國者以利為利則必至於剝民以自奉而有悖出之禍故深言其害以為戒耳至于崇本節用有國之常政所以厚下而足民者則固未嘗廢也吕氏之說得其㫖矣有子曰百姓足君孰與不足孟子曰無政事則財用不足正此意也然孟子所謂政事則所以告齊梁之君使之制民之産者是已豈若後世頭㑹箕斂厲民自養之云哉曰仁者以財發身不仁者以身發財何也曰仁者不私其有故財散民聚而身尊不仁者惟利是圖故捐身賈禍以崇貨也然亦即財貨而以其效言之爾非謂仁者真有以財發身之意也曰未有府庫財非其財者何也曰上好仁則下好義矣下好義則事有終矣事有終則為君者安富尊榮而府庫之財可長保矣此以財發身之效也上不好仁則下不好義下不好義則其事不終是將為天下僇之不暇而况府庫之財又豈得為吾之財乎若商紂以自焚而起巨橋鹿臺之財德宗以出走而豐瓊林大盈之積皆以身發財之效也曰其引孟獻子之言何也曰雞豚牛羊民之所蓄養以為利者也既已食君之祿而享民之奉矣則不當復為之爭此公儀子所以拔園葵去織婦而董子因有與之齒者去其角傅之翼者兩其足之喻皆潔矩之義也聚斂之臣剝民之膏血以奉上而民被其殃盜臣竊君之府庫以自私而禍不及下仁者之心至誠惻怛寧亡己之財而不忍傷民之力所以與其有聚斂之臣寧有盜臣亦潔矩之義也昔孔子以臧文仲之妾織蒲而直斥其不仁以冉求聚斂於季氏而欲鳴鼓以聲其罪以聖人之宏大兼容溫良博愛而所以責二子者疾痛深切不少假借如此其意亦可見矣曰國不以利為利以義為利何也曰以利為利則上下交征不奪不饜以義為利則不遺其親不後其君蓋惟義之安而自無所不利矣程子曰聖人以義為利義之所安即利之所在正謂此也孟子分别義利拔本塞原之意其傳蓋亦出於此云曰此其言菑害並至無如之何何也曰怨己結於民心則非一朝一夕之可解矣聖賢深探其實而極言之欲人有以審於未然而不為無及於事之悔也以此為防人猶有用桑羊孔僅宇文融楊矜陳京裴延齡之徒以敗其國者故陸宣公之言曰民者邦之本財者民之心其心傷則其本傷其本傷則枝幹凋瘁而根柢蹶拔矣吕正獻公之言曰小人聚斂以佐人上之欲人主不悟以為有利於國而不知其終為害也賞其納忠而不知其大不忠也嘉其任怨而不知其怨歸於上也嗚呼若二公之言則可謂深得此章之指者矣有國家者可不監哉潔矩章專言財用繼言用人蓋人主不能潔矩者皆由利心之起故狥己欲而不知有人此所以專言財用也人才用舍最係人心向背若能以公滅私好惡從衆則用舍當於人心矣此所以繼言用人也問上老老而民興孝下面便接是以君子有潔矩之道也似不相續如何曰這個便是相續潔矩是四面均平底道理我老敬他亦得老其老這便是潔矩長人恤孤亦然問潔矩曰上之人老老長長恤孤則下之人興孝興弟不倍此是說上行下效到潔矩處是就政事上言若但興起其善心而不有以使之得遂其心則雖能興起亦是徒然如政煩賦重不得以養其父母又安得以遂其善心須是推我之心以及於彼使之仰足以事俯足以育始得為國潔矩之大者又在於財用所以後面只管說財問前後左右何指曰譬如交代官相似前官之待我者既不善吾毋以前官之待我者待後政左右如東鄰西鄰以鄰國為壑是所惡於左而以交於右也俗語所謂將心比心如此則各得其平矣又曰所謂潔矩者如以諸侯言之上有天子下有大夫天子擾我使不得以行其孝弟我亦當察此不可有以擾其大夫亦使不得以行其孝弟又如我家與左右鄰各有一丈地左鄰侵我五尺地是不矩我必是不直他我又豈可却去侵右鄰五尺地如此亦是不矩也須是我要地步方整也教他人地步方整方得問論平天下而言財利何也曰天下所以不平者皆因此問潔矩之道是廣其仁之用否曰此乃求仁工夫此處正要著力若仁者則舉而措之不待潔矩而自無不平矣潔矩是我不欲人之加諸我吾亦欲無加諸人否曰此是二人須把三人看便見人莫不有在我之上者莫不有在我之下者如親在我之上子孫在我之下我欲子孫孝於我而我却不能孝於親我欲親慈於我我却不能慈於子孫便是一畔長一畔短不是潔矩斷斷者是潔矩媢疾者是不潔矩唯仁人能好人能惡人是大段能潔矩底見賢不能舉舉而不能先是稍能潔矩而未盡好人所惡惡人所好是大不能潔矩問未有上好仁而下不好義如何上仁下便義曰這只是一個在上便喚做仁在下便喚做義在父曰慈在子曰孝食祿之家又畜牛羊是去與民爭利便是不潔矩荀子莊子注云潔圍束也是將一物圍束以為之則也某幼時見范文所言如此他甚自喜以為先儒所未到以上治國平天下傳右專言大學按程子曰大學孔氏之遺書而初學入德之門也於今可見古人為學次第者獨賴此篇之存而論孟次之學者必由是而學焉則庶乎其不差矣朱子曰大學是修身治人底規模又曰大學總說了又逐段更說許多道理聖賢怕有些子照管不到節節覺察將去到這裏有恁地病到那裏有恁地病又曰大學一書如行程相似自某處到某處幾里識得行程須便行始得又曰此一個心須每日提撕令常惺覺頃刻放寬便隨物流轉無復收拾如今大學一書豈是看他言語正欲驗之於心如何如好好色如惡惡臭試驗之吾心好善惡惡果能如此乎閒居為不善見君子則掩其不善而著其善是果有此乎一有不至則勇猛奮躍不已方有長進處今不知如此則書自書我自我何益之有大學一書有正經有解有或問看來看去不用或問只看注解便了久之又只看正經便了又久之自有一部大學在胸中而正經亦不用矣然不用某許多工夫亦看某底不出不用聖賢許多工夫亦看聖賢底不出問敬之有異聞乎曰得一日教看大學曰我平生精力盡在此書須先通此方可讀他書又嘗曰橫渠云如中庸文字直須句句理㑹過使其言互相發今讀大學亦然某年十七八時讀中庸大學每早起須誦十遍今大學且可熟讀西山讀書記卷二十二
