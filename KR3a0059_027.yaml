body:
  text: 西山讀書記卷二十七宋真德秀撰廣大學易文言君子學以聚之說見前易大傳鳴鶴在陰其子和之我有好爵吾與爾縻之子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出乎身加乎民行發乎邇見乎遠言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不愼乎朱子曰釋中孚九二爻義子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶朱子曰此釋益上九爻義將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈朱子曰卦爻之辭亦猶是也按此自夫乾天下之至健也為一章今特别取以附於此謝安識王氏兄弟事當考語子貢問君子子曰先行其言而後從之周氏曰先行其言者行之於未言之先而後從之者言之於既行之後范氏曰子貢之患非言之艱而行之難故告之以此南軒曰君子主於行而非以言為先故其言之所發乃其力行所至言隨之也夫主於行而後言者為君子則夫易於言而行不踐者是小人之歸矣子貢非不能踐言者然未免於多言夫子恐其有時而或以言為主而行有未精也是以深警焉夫未之能踐而言與夫力行所至而言者其意味有間矣學者宜深察子曰古者言之不出恥躬之不逮也范氏曰君子之於言也不得已而後出之非言之難而行之難也人惟其不行也是以輕言之言之如其所行行之如其所言則出諸其口必不易矣南軒曰君子以行不逮言為恥故言不輕其出言之不出則勉於躬行者力可知也夫子懼學者務於言而行有弗篤則趨於薄也故言古之學者蓋如此子曰君子欲訥於言而敏於行謝氏曰放言易故欲訥力行難故欲敏胡氏曰言而能訥畜德則固喻人則信謀事則密不訥者反是行而能敏遷善則速改過則勇應務則給不敏者反是夫敏與訥雖若出於天資然可習也言煩而訥矯之行緩以敏勵之由我而已不自變其氣質學豈有功哉子張學干祿子曰多聞闕疑愼言其餘則寡尤多見闕殆愼行其餘則寡悔言寡尤行寡悔祿在其中矣吕氏曰疑者所未信殆者所未安程子曰尤罪自外至者悔理自內出者朱子曰多聞見者學之博闕疑殆者擇之精謹言行者守之約凡言在其中者皆不求而自至之辭言此以救子張之失而進之也程子曰修天爵則人爵至君子言行能謹得祿之道也子張學干祿故教之以此使定其心而不為利祿動若顔閔則無此問矣子張學干祿一章是教人不以干祿為意蓋言行所當謹非欲為干祿而然也若真能著實用功則惟患言行之有悔尤何暇有干祿之心邪南軒曰夫謹言行者非期於得祿亦非必得祿也曰祿在其中辭氣不迫而義則完矣若教之以士不可以求祿則理有所未盡亦非長善救失之方也宰豫晝寢子曰朽木不可雕也糞土之墻不可杇也於豫與何誅言其志氣昏惰教無所施也與語辭誅責也言不足責乃所以深責之子曰始吾於人也聽其言而信其行今吾於人也聽其言而觀其行於豫與改是宰豫能言而行不逮故孔子自言於豫之事而改此失亦以重警之也范氏曰君子之於學惟日孜孜斃而後已惟恐其不及也宰豫晝寢自棄孰甚焉故夫子責之胡氏曰宰豫不能以志帥氣居然而倦是宴安之氣勝警戒之志惰也古之聖賢未嘗不以怠惰荒寧為懼勤勵不息自强此孔子所以深責宰豫也聽言觀行聖人不待是而後能亦非緣此而盡疑學者特因此立教以警羣弟子使謹於言而敏於行耳子曰文莫吾猶人也躬行君子則吾未之有得朱子曰莫疑辭猶人言不能過人而尚可以及人未之有得則全未有得皆自謙之辭而足以見言行之難易緩急欲人之勉其實也謝氏曰文雖聖人無不與人同故不遜能躬行君子斯可以入聖故不居猶言君子道者三我無能焉南軒曰言文吾不與人同者至於躬行之君子則未見聖人之意欲使學者不但既其文而務勉其實也夫所謂文者威儀藝文之事可得而見者也躬行之實則在夫縝密篤至存乎人之所不見者也此顔閔之徒所以獨出於衆人與子曰君子恥其言而過其行朱子曰恥者不敢盡之意過者欲有餘之辭子張問行子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉立則見其參於前也在輿則見其倚於衡也夫然後行朱子曰其者指忠信篤敬而言參讀如毋往參焉之參言與我相參也衡軛也言其於忠信篤敬念念不忘隨其所在常若有見雖欲頃刻離之而不可得然後一行一言自然不離於忠信篤敬而蠻貊可行也子張書諸紳程子曰學要鞭辟近裏著工而已博學而篤志切問而近思言忠信行篤敬立則見其參於前在輿則見其倚於衡只此是學質美者明得盡查滓便渾化却與天地同體其次惟莊敬以持養之及其至則一也參前倚衡今人多錯說了故每流於釋氏先聖言此只是說言必忠信行必篤敬念念不忘到處常若見此兩事不離心目之間爾如言見堯於羮見舜於牆豈是以我之心還見一心别為一物而在身外耶篤者有重厚深沉之意南軒曰篤敬者敦篤於敬也言忠信則言有物行篤敬則行有常以是而行何往而不可故雖蠻貊亦可行也若夫言不忠信行不篤敬則妄而已故雖州里亦不可行參前倚衡使之常存乎忠信篤敬也存之不素而欲遽保之於既發之時難矣此子張所以書紳而不敢忘也南容三復白圭孔子以其兄之子妻之詩大雅抑之篇曰白圭之玷尚可磨也斯言之玷不可為也南容一日三復此言事見家語蓋深有意於謹言也此邦有道所以不廢邦無道所以免禍故孔子以兄子妻之范氏曰言者行之表行者言之實未有易其言而能謹於行者南容欲謹其言如此則必能謹其行矣子曰其言之不怍則為之也難朱子曰大言不慙則無必為之志而不自度其能否矣欲踐其言豈不難哉南軒曰易其言者實必不至若聽其言之而不怍則知其為之也難矣故古者言之不出恥躬之不逮而仁者之言必訒也子曰侍於君子有三愆言未及之而言謂之躁言及之而不言謂之隱未見顔色而言謂之瞽尹氏曰時然後言則無三者之過矣南軒曰此章戒人言語當適其可也中庸庸德之行庸言之謹有所不足不敢不勉有餘不敢盡言顧行行顧言君子胡不慥慥爾說見專言道篇記表記子曰君子不以辭盡人鄭氏曰不見人之言語則以為善言其餘行或時惡也故天下有道則行有枝葉天下無道則辭有枝葉行有枝葉所以益德也言有枝葉是益虛華也枝葉依幹而生言行亦由禮出是故君子於有喪者之側不能賻焉則不問其所費於有病者之側不能饋焉則不問其所欲有客不能館則不問其所舍皆辟有言而無其實故君子之接如水小人之接如醴君子淡以成小人甘以壞小雅曰盜言孔甘亂是用餤子曰君子不以口譽人則民作忠故君子問人之寒則衣之問人之饑則食之稱人之美則爵之國風曰心之憂矣於我歸說子曰口惠而實不至怨菑及其身善言而無信人所惡也是故君子與其有諾責也寧有己怨己謂不許也言諾而不與其怨大於不許緇衣故大人不倡游言游猶浮也不可用之言也可言也不可行君子弗言也可行也不可言君子弗行也則民言不危行而行不危言矣危猶髙也言不髙於行行不髙於言言行相應也詩云淑愼爾止不愆於儀子曰君子道人以言而禁人以行禁猶謹也故言必慮其所終而行必稽其所敝則民謹於言而愼於行稽猶考也議也詩云愼爾出話敬爾威儀話善言子曰長民者衣服不二從容有常以齊其民則民德一二不一也詩云彼都人士狐裘黃黃其容不改出言有章行歸於周萬民所望張子東銘曰戲言出於思也戲動作於謀也發乎聲見乎四肢謂非己心不明也欲人無己疑不能也過言非心也過動非誠也失於聲謬迷其四體謂已當然自誣也欲他人已從誣人也或者以出於心者歸咎為己戲失於思者自誣為己誠不知戒其出汝者歸咎其不出汝者長傲且遂非不智孰甚焉以上言謹言敏行之事語曾子曰吾日三省吾身為人謀而不忠乎與朋友交而不信乎傳不習乎朱子曰曽子以此三者日省其身有則改之無則加勉其自治誠切如此可謂得為學之本矣集義游氏曰此曽子之省身者而已若夫學者之所省又不止此事親有不足於孝事長有不足於敬與行或愧於心而言或浮於行與欲有所未窒而忿有所未懲與推是類而日省之則曾子之誠身庶乎可以跂及矣古之人所謂夜以計過無憾而後即安者亦曾子之意也餘已見忠信篇荀子曰君子博學而日三省乎已則智明而行無過矣此章言省身子曰躬自厚而薄責於人則遠怨矣朱子曰責己厚故身益修責人薄則人易從所以人不得而怨之南軒曰厚者敦篤也躬則自厚而責望於人則薄其所處豈不有餘裕乎然則何怨之有孟子所謂發而不中不怨勝己者反求諸己而己小人不篤之己而責於人者深未嘗須臾得其平也韓子曰古之君子責己重以周待人輕以約蓋本於此全篇皆可取今不録程子曰聖人責己感處多責人應處少又曰責上責下而中自恕己豈可任職分張子曰責己者當知無天下國家皆非之理故學至於不尤人學之至也又吳諸葛恪與陸遜書曰自漢末以來中國士大夫如許子將輩所以更相謗訕或至為禍原其本起非為大讐惟坐克己不能盡如禮而責人專以正義夫己不如禮則人不服責人以正義則人不堪內不服其行外不堪其責則不得不相怨相怨一生則小人得容其間小人得容其間則三至之言浸潤之譛紛錯交至雖至明至親者處之猶難以自定况己為隙且未能明者乎是故張陳至於血刃蕭朱不終其好學由於此而已恪之為人無足云者而其言不可廢又恪雖能言終以多怨致禍可見知之非艱而行之惟艱皆足為世戒故附於此以上皆言責己又聖賢所論有所謂檢身者成湯檢身若不及是也有所謂反身者易曰威如之吉反身之謂也又曰君子以反身修德中庸曰射有似乎君子失諸正鵠反求諸其身孟子曰行有不得則反求諸己又曰有人於此待我以橫逆則君子必自反也又曰反身而誠樂莫大焉是也有所謂正身者孔子曰苟正其身矣如正人何有所謂正己者中庸曰正己而不求於人則無怨孟子曰大人正己而物正是也有所謂克己者孔子之告顔子又楚靈王不能自克以及乾溪之難孔子曰克己復禮仁也楊子曰勝己之私之謂克是也有所謂敬身者曾子也身也者父母之遺體敢不敬乎是也又有所謂誠身者中庸不明乎善不誠乎身是也此數者其名雖異要其為修身則一各已散見諸篇今不重出易風雷益君子以見善則遷有過則改程子曰風烈則雷迅雷激則風怒二物相益者也君子觀風雷相益之象而求益於己為益之道無若見善則遷有過則改也見善能遷則可以盡天下之善有過能改則無過矣益於人者莫大於是朱子曰遷善如風之迅改過如雷之烈復初九不遠復無祗悔元吉程子曰復者陽反來復也陽君子之道故復為反善之義初剛陽來復處卦之初復之最先者也是不遠而復也失而後有復不失則何復之有唯失之不逺而復則不至於悔大善而吉也祗宜音秪抵也玉篇云適也義亦同無袛悔不至於悔也顔子無形顯之過夫子謂其庶幾乃無袛悔也過既未形而改何悔之有既未能不勉而中所欲不踰矩是有過也然其明而剛故一有不善未嘗不知既知未嘗不遽改故不至於悔乃不遠復也象曰不遠之復以修身也不遠而復者君子所以修其身之道也學問之道無他唯知其不善則速改以從善而已子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不遠復無袛悔元吉無咎者善補過也上文云吉凶者言乎其失得也悔吝者言乎其小疵也又曰憂悔吝者存乎介震無咎者存乎悔朱子曰介謂辨别之端蓋善惡已動而未形之時於此憂之則不至於悔吝矣震動也知悔則有以動其補過之心而可以無咎矣按乾九三君子終日乾乾夕惕若厲無咎傳曰三雖人位已在下體之上未離於下而尊顯者也日夕不懈而兢惕則雖處危地而無咎九四或躍在淵無咎傳曰躍不躍惟及時以就安耳聖人之動無不時也本義曰九陽四陰居上之下政革之際進退未定之時也能隨時進退則無咎坤六四括囊無咎無譽象曰括囊無咎愼不害也傳曰四居近五之位而無相得之義乃上下蔽隔之時其自處以正危疑之地也若晦藏其智如括結囊口而不露則可得無咎不然則有害需初九需于郊利用恆無咎傳曰需者以遇險故需而後進初最遠于險故為需於郊郊曠逺之地處於曠逺利在安守其常則無咎不能安常則躁動犯難豈能需於逺而無過耶師貞丈人吉無咎傳曰師之道以正為本興師動衆以毒天下而不以正民弗從也故師以貞為主其動雖正師之者必丈人則吉而無咎蓋有吉而有咎者有無咎而不吉者吉且無咎乃盡善也九二在師中吉無咎王三錫命傳曰二乃師之主專制其事者也居下專制其事唯在師則可自古命將閫外之事得專制之在師專制而得中道故吉而無咎蓋恃專則失為下之道不專則無成功之理故得中為吉六四師左次無咎傳曰師之進以强勇也四以柔居陰非能進而克捷者也知不能進退故左次左次退舍也量宜進退乃所當也故無咎比吉原筮元永貞無咎傳曰人相親比必有其道茍非其道必有咎悔故必推原占决其可比者而比之筮謂占决卜度非謂以筮龜也所比得元永貞則無咎元謂有君長之道永謂可以常久貞謂得正道上之比下必有此三者下之從上必以此三者初六有孚比之無咎傳曰初六比之始也相比之道以誠信為本中心不信而親人人誰與之故比之始必有孚誠乃無咎孚信之在中也小畜初九復自道何其咎吉傳曰初九陽爻而乾體陽在上之物又剛健之才足以上進而復與在上同志其進復於上乃其道也故云復自道復既自道何過咎之有無咎而又有吉也諸爻言無咎者如是則無咎矣故云無咎者善補過也雖使爻義本善亦不害於不如是則有咎之義初九乃由其道而行故曰何其咎六四有孚血去惕出無咎傳曰四於畜時處近君之位畜君者也若內有孚誠則五志信之從其畜也卦獨一陰畜衆陽者也諸陽之志係於四四茍欲以力畜之則一柔敵衆剛必見傷害唯盡其孚誠以應之則可以感矣故其傷害遠其危懼免也如此則可以無咎不然則不免於害矣履初九素履往無咎傳曰履不處者行之道初處至下素在下者也而陽剛之才可以上進若安其卑下之素而往則無咎詳見出處篇否九四有命無咎疇離祉傳曰四以陽剛之健居近君之位是有濟否之才而得髙位者也足以輔上濟否然當君道方否之時處逼近之地所惡在居功取忌而已若能使必出於君命威柄一歸於上則無咎而其志行矣能使事皆出於君命則可以濟時之否其疇類皆附離其福祉離麗也同人初九同人於門無咎傳曰九居同人之初而無係應是無所偏私同人之公者也故為出門同人出門謂在外在外則無私昵之偏其同博而公如此則無過咎也象曰出門同人又誰咎也傳曰出門同人於外是其所同者廣無所偏私人之同也有厚薄親踈之異過咎所由生也既無所偏黨誰其咎之大有初九無交害匪咎艱則無咎傳曰九居大有之初未至於盛處卑無應與未有驕盈之失故無交害未涉於害也大凡富有鮮不有害若能享富有而知難處則自無咎九二大車以載有攸往無咎傳曰九以陽剛居二為六五之君所倚任剛健則才勝居柔則謙順得中則無過其才如此所以能勝大有之任如大車之材强壯能勝載重物也可以任重行逺故有攸往而無咎也九四匪其彭無咎傳曰九四居大有之時已過中矣是大有之盛者也過盛則凶咎所由生故處之之道匪其彭則無咎謂能謙損不處其大盛則得無咎也四近君之髙位茍處大盛則致凶咎彭盛多之貌詩載驅云汶水湯湯行人彭彭行人盛多之狀雅大明云駟騵彭彭言武王戎馬之盛也象曰匪其彭無咎明辨晳也傳曰能不處其盛而得無咎者蓋有明辨之智也晳明智也賢智之人明辨物理當其方盛則知咎之將至故能損抑不敢至於滿極也豫上六冥豫成有渝無咎傳曰上六陰柔非有中正之德以陰居上不正也而當豫極之時以君子居斯時亦當戒懼况陰柔乎乃耽肆於豫昏迷不知反者也在豫之終故為昏冥已成者也若能有渝變則可以無咎矣在豫之中有變之義人之失茍能自變皆可以無咎故冥雖已成能變則善也聖人發此義所以勸遷善也故更不言冥之凶專言渝之無咎隨元亨利貞無咎傳曰隨之道可以致大亨也君子之道為衆所隨與己隨於人及臨事擇所隨皆隨也隨得其道則可以致大亨也凡人君之從善臣下之奉命學者之徙義臨事而從長皆隨也隨之道利在於貞正隨得其正然後能大亨而無咎失其正則有咎矣豈能亨乎九四隨有獲貞凶有孚在道以明何咎傳曰九四以陽剛之才處臣下之極若於隨有獲則雖正亦凶有獲謂得天下之心隨於己為臣之道當使恩威一出於上衆心皆隨於君若人心從已危疑之道也故凶居此地者奈何唯孚誠積於中動為合於道以明哲處之則又何咎古之人有行之者伊尹周公孔明是也皆德及於民而民隨之其得民之隨所以成其君之功致其國之安其至誠存乎中是有孚也其所施為無不中道是在道也唯其明哲故能如是復何過咎之有是以下信而上不疑位極而無逼上之嫌勢重而無專强之過非聖人大賢則不能也其次如唐之郭子儀威震主而主不疑亦由中有誠孚而處無甚失也非明哲能如是乎蠱初六幹父之蠱有子考無咎厲終吉傳曰初六雖居最下成卦由之有主之義居內在下而為主子幹父蠱也子幹父蠱之道能堪其事則為有子而其考得無咎不然則為父之纍故必惕厲則得終吉也處卑而尸尊事自當兢畏以六之才雖能巽順體柔在下無應而主幹非有能濟之義若不以克幹而言則其義甚小故專言為子幹蠱之道必克濟則不纍其父能厲則可以終吉乃備見為子幹蠱之大法也九三幹父之蠱小有悔無大咎傳曰三以剛陽之才居下之上主幹者也子幹父之蠱也以陽處剛而不中剛之過也然而在巽體雖剛過而不為無順順事親之本也又居得正故無大過以剛陽之才克幹其事雖以剛過而有小小之悔終無大過咎也然有小悔已非善事親也象曰幹父之蠱終無咎也傳曰以三之才幹父之蠱雖有小悔終無大咎也蓋剛斷能幹不失正而有順所以終無咎也臨六三甘臨無攸利既憂之無咎傳曰三居下之上臨民者也陰柔而說體以處不中正以甘說臨人者也在上而以甘說臨下失德之甚無所利也兌性既說又乘二陽之上陽方長而上進故不安而益甘既知危懼而憂之若能持謙守正至誠以自處則無咎也邪說由已能憂而改之復何咎乎象曰甘臨位不當也既憂之咎不長也傳曰陰柔之人處不中正而居下之上復乘二陽是處不當位也既能憂懼而憂之則必勉强自改故其過咎不長也六四至臨無咎四居上之下與下體相比是切臨於下臨之至也臨道尚近故以此為至四居上位而下應於剛陽之初處近君之位守正而任賢以親臨於下是以無咎所處當也象曰至臨無咎位當也傳曰居近君之位為得其任以陰處四為得其正與初相應為下賢所以無咎蓋由位之當也上六敦臨吉無咎傳曰上六坤之極順之至也而居臨之中敦厚於臨也與初二雖非正應然大率陰求於陽又其至順故志在從乎二陽尊而應卑髙而從下尊賢取善敦厚之至也故曰敦臨所以吉而無咎陰柔在上非能臨者宜有咎也以其敦厚於順剛是以吉而無咎觀九五觀我生君子無咎傳曰九五居人君之位時之治亂俗之美惡繫乎已而已觀己之生若天下之俗皆君子矣則是已之所為政化善也乃無咎矣若天下之俗未合君子之道則是已之所為政治未善不能免於咎也上九觀其生君子無咎傳曰上九以剛陽之德處於上為下之所觀而不當位是賢人君子不在於位而道德為天下所觀仰者也觀其生觀其所生也謂出於己者德業行義也既為天下所觀仰故自觀其所生若皆君子則無過咎也茍未君子則何以使人觀仰矜式是其咎也賁上九白賁無咎傳曰上九賁之極也賁飾之極則失於華僞唯能質白其賁則無過飾之咎白素也尚質素則不失其本真所謂尚質素者非無飾也不使華沒實耳象曰白賁無咎上得志也傳曰白責無咎以其在上而得志也既在上而得志處賁之極將有華僞失實之咎故戒以質素則無咎飾不可過也剝六三剝之無咎傳曰衆陰剝陽之時而三獨居剛應剛與上下之陰異矣志從於正在剝之時為無咎者也三之為可謂善矣不言吉何也曰方羣陰剝陽衆小人害君子三雖從正其勢孤弱所應在無位之地於斯時也難乎衆矣安得吉也其義為無咎耳言其無咎所以勸也象曰剝之無咎失上下也傳曰三居剝而無咎者其所處與上下諸陰不同是與其同類相失於處剝之道為無咎如東漢之吕强是也復亨出入無疾朋來無咎傳曰既復則亨也陽氣復生於下漸亨盛而生育萬物君子之道既復則漸以亨通澤於天下故復則有亨盛之理也出入無疾出入謂生長復生於內入也長進於外出也先云出語順耳陽生非自外也來於內故謂之入物之始生其氣至微故多摧折春陽之發為陰寒所折觀草木於朝暮則可見矣出入無疾謂微陽生長無害之者也既無害之而其類漸進而來則將亨盛故無咎也所謂咎在氣則為差忒在君子則為抑塞不得盡其理陽之當復雖使有疾之固不能止其復也但為阻礙耳而卦之才有無疾之義乃復道之善也一陽始生至微固未能勝羣陰而發生萬物必待諸陽之來然後能成生物之功而無差忒以朋來而無咎也三陽子丑寅之氣生成萬物衆陽之功也若君子之道既消而復豈能便勝於小人必待其朋類漸盛則能協力以勝之也六三頻復厲無咎三以陰躁處動之極復之頻數而不能固者也復貴安固頻復頻失不安於復也復善而屢失危之道也聖人開遷善之道與其復而危其屢失故云厲無咎不可以頻失而戒其復也頻失則為危屢復何咎過在失而不在復也無妄九四可貞無咎傳曰四剛陽而居乾體復無應無咎者也剛而無私豈有妄乎曰以陽居乾體若復處剛則為過矣過則妄也居四無尚剛之志也可貞與利貞不同可貞謂其所處可貞固守之利貞謂利於貞也象曰可貞無咎固有之也傳曰貞固守之則無咎也大過初六藉用白茅無咎傳曰初以陰柔巽體而處下過於畏愼者也以柔在下用茅藉物之象不措諸地而藉以茅過於愼也是以無咎茅之為物雖薄而用可重者以用之能成敬愼之道也愼守斯術而行豈有失乎大過之用也繫辭云苟措諸地而可矣藉之用茅何咎之有愼之至也夫茅之為物薄而用可重也愼斯術也以往其無所失矣言敬愼之至也茅雖至薄之物然用之可甚重以之藉薦則為重謹之道是用之重也人之過於敬謹為之非難而可以保其安而無過茍能慎斯道推而行之於事其無所失矣習坎六四樽酒簋二用缶納約自牖終無咎傳曰六四陰柔而下無助非能濟天下之險者以其在髙位故言為臣處險之道大臣當險難之時惟至誠見信於君其交固而不可間又能開明君心則可保無咎矣夫欲上之篤信惟當盡其質實而已多儀而尚飾莫如燕享之禮故以燕享喻之言當不尚浮飾唯以質實所用一樽之酒二簋之食復以瓦缶為器質之至也其質實如此又須納約自牖納約謂進結於君之道牖開通之義室之暗也故設牖所以通明自牖言自通明之處以况君心所明處詳見人臣正君篇九五坎不盈袛既平無咎傳曰九五在坎之中是不盈也盈則平而出矣祗音秪抵也於己平則無咎傳曰不平則是未平而尚在險中未得無咎也以九五剛中之才居尊位宜可以濟於險然下無助也二陷於險中未能出餘皆陰柔無濟險之才人君雖才安能獨濟天下之險居君位而不能致天下出於險則為有咎必袛既平乃得無咎離初九履錯然敬之無咎傳曰陽固好動又居下而離體陽居下則欲進離性炎上志在上麗幾於躁動其履錯然謂交錯也雖未進而跡已動矣動則失下之心而有咎也然其剛明之才若知其義而敬謹之則不至於咎也初在下無位者也明其身之進退乃所麗之道也其志既動不能敬謹則妄動是不明所麗乃有咎也象曰履錯之敬以辟咎也傳曰履錯然欲動而知敬愼不敢進所以求辟免過咎也居明而剛故知而能辟不剛明則妄動矣恆亨無咎貞吉利有攸往傳曰恆者常久也常之道可以亨通恆而能亨乃無咎也恆而不可以亨非可常之道也為有咎矣如君子之恆於善可常之道也小人恆於惡失可常之道也恆所以能亨由貞正也故云利貞晉初六晉如摧如貞吉罔孚裕無咎傳曰初居晉之下進之始也晉如升進也摧如抑退也於始進而言遂其進不遂其進惟得正則吉也罔孚者在下而始進豈遽能深見信於上茍上未能信則當安中自守雍容寬裕無急於求上之信也茍欲信之心切非汲汲以失其守則悻悻以傷於義矣皆有咎也故裕則無咎君子處進退之道也象曰晉如摧如獨行正也裕無咎未受命也傳曰無進無抑唯獨行正道也寬裕則無咎者始欲進而未當位故也君子之於進退或遲或速唯義所當未嘗不裕也聖人恐後之人不達寬裕之義居位者廢職失守以為裕故特云初六裕則無咎者始進未受命當職任故也若有官守不信於上而失其職一日不可居也然事非一概久速唯時亦容有為之兆者上九晉其角維用伐邑厲吉無咎貞吝傳曰角剛而居上之初上九以剛居卦之極故取角為象以陽居上剛之極也在晉之上進之極也剛極則有强猛之過進極則有躁急之失以剛而極於進失中之甚也無所用而可維獨用於伐邑則雖厲而吉且無咎也伐四方者治外也伐其居邑者治內也言伐邑謂內自治也人之自治剛極則守道愈固進極則遷善愈速如上九者以之自治則雖傷於厲而吉且無咎也嚴厲非安和之道而於自治則有功也暌初九悔亡喪馬勿逐自復見惡人無咎傳曰九居卦初暌之始也在暌乖之時以剛動於下有悔可知所以得亡者九四在上亦以剛陽雖無與自然同類相合同是陽爻同居下又當相應之位二陽本非相應者以在暌故合也上下相與故能亡其悔也在暌諸爻皆有應夫合則有暌本異則何暌唯初與四雖非應而同德相與故相遇馬者所以行也陽上行者也暌獨無與則不能行是喪其馬也四既與之合則能行矣是勿逐而馬復得也惡人與己乖異者也見者與相通也當暌之時雖同德者相與然小人乖異者至衆若棄絶之不幾盡天下以仇君子乎如此則失含宏之義致凶咎之道也又安能化不善而使之合乎故必見惡人則無咎也古之聖王所以能化姦凶為善良革仇敵為臣民者由弗絶也象曰見惡人以辟咎也傳曰暌離之時人情乖違求和合之且病其不能得也若以惡人而拒絶之則將衆仇於君子而禍咎至矣故必見之所以免辟怨咎也無怨咎則有可合之道本義曰如孔子之與陽貨也九二遇主於巷無咎傳曰二與五應為相與者也然在暌乖之時陰陽相勝之道衰則剛柔相戾之意勝學易者識此則知變通矣故二五雖正應當委曲以相求也二以剛中之德居下上應六五之君道合則志行成濟暌之功矣而居暌離之時其交非固當委曲求於相遇冀得其合也故曰遇主於巷必能合而後無咎君臣暌離其咎大矣巷者委曲之塗也遇者㑹逢之謂也當委曲相求期於㑹遇與之合也所謂委曲者以善道宛轉就使合而已非枉已屈道也九四暌孤遇元夫交孚厲無咎傳曰九四當暌時居非所安無應而在二陰之間是暌離孤處者也以剛陽之德當暌離之時孤立無與必以氣類相求而合是以遇元夫也夫陽稱元善也初九當暌之初遂能與同德而亡睽之悔處暌之至善者也故目之為元夫猶云善士也四則過中為暌巳甚不若初之善也四與初皆以陽處一卦之下居相應之位當暌乖之時各無應援自然同德相親故㑹遇也同德相親必須至誠相與交孚各有孚誠也上下二陽以至誠相合則何時之不能行何危之不能濟故雖處危厲而無咎也當暌離之時孤居二陰之間處不當位危且有咎也以遇元夫而交孚故得無咎也象曰交孚無咎志行也傳曰初四皆陽剛君子當暌乖之時上下以至誠相交協志同力則其志可以行不止無咎而已卦辭但言無咎夫子又從而明之云可以行其志救時之暌也六五悔亡厥宗噬膚往何咎傳曰六以陰柔當暌離之時而居尊位有悔可知然而下有九二剛陽之賢與之為應以輔翼之故得悔亡厥宗其黨也謂九二正應也噬膚噬齧其肌膚而深入之也當暌之時非入之者深豈能合也五雖陰柔之才二輔以陽剛之道而深入之則可往而有慶何過咎之有以周成之幼稚而興盛王之治以劉禪之昏弱而有中興之勢蓋由任賢明之輔而姬公孔明所以入之者深也解初六無咎傳曰六居解初患難既解之時以柔居剛以陰應陽柔而能剛之義既無患難而自處得剛柔之宜患難既解安寧無事唯自處得宜則為無咎矣方解之初宜安靜以休息之爻之辭寡所以示意象曰剛柔之際義無咎也傳曰初四相應是剛柔相際接也剛柔相際為得其宜難既解而處之剛柔得宜其義無咎也損有孚元吉無咎可貞利有攸往傳曰損減損也凡損益其過以就義理皆損之道也損之道必有孚誠謂至誠順於理也損而順理則大善而吉所損無過差可貞固常行而利有所攸往也人之所損或過或不及或當或不當皆不合正理非有孚也非有孚則無吉而有咎非可貞之道不可行也初九已事遄往無咎酌損之傳曰損之義損剛益柔損下益上也初以陽剛應於四四以陰柔居上位賴初之益者也下之益上當損己而不自以為功所益於上者事既已則速去之不居其功乃無咎也若享其成功之美非損己益上也於為下之道為有咎矣四之陰柔賴初者也故聽於初當酌度其宜而損己以益之過與不及皆不可也六四損其疾使遄有喜無咎傳曰四以陰柔居上與初之剛陽相應在損時而應剛能自損以從剛陽也損不善以從善也初之益四損其柔而益之以剛損其不善也故曰損其疾疾謂疾病不善也損於不善惟使之遄速則有喜而無咎人之損過惟患不速速則不至於深過為可喜也愚按疾病在躬人惟恐去之不速至於不善在躬則往往不速於去之是知疾之能害人而不知不善尤害人之甚者也人能去惡如去疾則知損之義矣益初九利用為大作元吉無咎傳曰初九震動之主剛陽之盛也居益之時其才足以益物雖居至下而上有六四之大臣應於己四巽順之主上能巽於君下能巽於賢才也在下者不能有為也得在上者應從之則宜以道輔於上作大益天下之事利用為大作也居下而得上之用以行其志必須所為大善而吉則無過咎不能元吉則不唯在已有咎乃纍乎上為上之咎也在至下而當大任小善不足以稱也故必元吉然後得無咎象曰元吉無咎下不厚事也傳曰在下者本不當處厚事厚事重大之事也以為在上所任所以當大事必能濟大事而致元吉乃為無咎能致元吉則在上者任之為知人已當之為勝任不然則上下皆有咎也夬九三壯於頄有凶君子夬夬獨行遇雨若濡有愠無咎傳曰當云壯於頄有凶獨行遇雨君子夬夬若濡有愠無咎夬夬當剛健之時三居下體之上雖在上而未為最上上有君而自任其剛决壯於頄者也有凶之道也獨行遇雨三與上六為正應方羣陽共决一隂之時已若以私應之故不與衆同而獨行則與上六陰陽和合故云遇雨易中言雨者皆謂陰陽和也君子道長决去小人之時而已獨與之和其非可知唯君子處斯時則能夬夬謂夬其夬果决其斷也雖其私與當遠絶之若見濡汚有愠惡之色如此則無過咎象曰君子夬夬終無咎也傳曰牽梏於私好由無决也君子義之與比决於當决故義不至於有咎也九五莧陸夬夬中行無咎傳曰五雖剛陽中正居尊位然切近於上六上六說體而卦獨一陰陽之所比也五為决陰之主而反比之其咎大矣故必决其决如莧陸然則於其中行之德為無咎也中行中道也莧陸今所謂馬齒莧是也曝之難乾感陰氣之多者也而脆易折五若如莧陸雖感於陰而决斷之易則於中行無過咎矣不然則失其中正也感陰多之物莧陸為易斷故取為象象曰中行無咎中未光也傳曰卦辭言夬夬則於中行為無咎矣象復盡其義云中未光也夫人心正意誠乃能極中正之道而充實光輝吾心有所比以義之不可而决之雖行於外不失中正之義可以無咎然於中道未得為光大也蓋人心一有所欲則離道矣夫子於此示人之意深矣萃九四大吉無咎傳曰四當萃之時上比九五之君得君臣之聚也下比下體羣陰得下民之聚也得上下之聚可謂善矣然四以陽居陰非正也雖得上下之聚必得大吉然後為無咎也大謂周遍之義無所不周然後為大無所不正然後為大吉大吉則無咎也夫上下之聚固有不由正道而得者非理枉道而得君者自古多矣非理枉道而得民者蓋亦有焉如齊之陳常魯之季氏是也然得為大吉乎得為無咎乎故九四必能大吉然後為無咎也象曰大吉無咎位不當也傳曰以其位之不當疑其所為未能盡善故云必得大吉然後為無咎也非盡善安得為大吉乎九五萃有位無咎匪孚元永貞悔亡傳曰九五居天下之尊萃天下之衆而君臨之當正其位修其德以陽剛居尊位稱其位矣為有其位矣得中正之道無過咎也如是而有不信而未歸者則當自反以修其元永貞之德則無思不服而悔亡矣元永貞者君之德民所歸也故比天下之道與萃天下之道皆在此三者王者既有其位又有其德中正無過咎而天下尚有未信服歸附者蓋其道未光大也元永貞之道未至也在修德以來之如苖民逆命帝乃誕敷文德舜德非不至也蓋有逺近昏明之異故其歸有先後既有未歸則當修德也所謂德元永貞之道也元首也長也為君德首出庶物君長羣生有尊大之義焉有主統之義焉而又常永貞固則通於神明光於四海無思不服矣乃無匪孚而其悔亡也所謂悔志之未光心之未慊也升九二孚乃利用禴無咎傳曰二居陽而在下五陰柔而居上夫以剛而事柔以陽而從陰雖有時而然非順道也以暗而臨明以剛而事柔若黽勉於事勢非誠服也上下之交不以誠其可以久乎其可以有為乎五雖陰柔然居尊位二雖剛陽事上者也當內存至誠不假文飾於外誠積於中則自不事外飾故曰利用禴謂尚誠敬也自古剛强之臣事柔弱之君未有不為矯飾者也禴祭之簡質者也云孚乃謂既孚乃宜不用文飾專以其誠感通於上也如是則得無咎以剛强之臣而事柔弱之君又當升之時非誠意相交其能免於咎乎困亨貞大人吉無咎有言不信傳曰如卦之才則困而能亨且得貞正乃大人處困之道也故能吉而無咎大人處困不唯其道自吉樂天安命乃不失其吉也况隨時善處復有裕乎有言不信當困而言人誰信之九二困於酒食朱紱方來利用享祀征凶無咎傳曰酒食人所欲而所以施惠也二以剛中之才而處困之時君子安其所遇雖窮厄險難無所動其心不恤其為困也所困者唯困於所欲耳君子之所欲者澤天下之民濟天下之困也二未得遂其欲濟其困故為困於酒食也大人君子懷其道而困於下必有得道之君求而用之然後能施其所藴二以剛中之德困於下上有九五剛中之君道同德合必來相求故云朱紱方來方且來也朱紱王者之服蔽膝也以行來為義故以蔽膝言之利用享祀享祀以至誠通神明也在困之時利用至誠如享祀然其德既誠自能感通於上自昔賢者困於幽逺而德卒升聞道卒為用唯自守至誠而已征凶無咎方困之時若不至誠安處以俟命征而求之則犯難得凶乃自取也將誰咎乎不度時而征乃不安其所為困所動也夫剛中之德自取凶悔何所怨咎革六二已日乃革之征吉無咎傳曰以六居二柔順而得中正又文明之主上有剛陽之君同德相應中正則無偏蔽文明則盡事理應上則得權勢體順則無違悖時可矣位得矣才足矣處革之至善者也然臣道不當為革之先又必待上下之信故已日乃革之也如二之才德所居之地所逢之時足以革天下之弊新天下之治當進而上輔於君以行其道則吉而無咎也不進則失可為之時為有咎也以二體柔而處當位體柔則其進緩當位則其處固變革者事之大故有此戒二得中而應剛未至失於柔也聖人因其有可戒之疑而明其義耳使賢才不失可為之時也艮其背不獲其身行其庭不見其人無咎傳曰人之所以不能安其止者動於欲也欲牽於前而求其止不可得也故艮之道當艮其背所見者在前而背乃背之是所不見也止於所不見則無欲以亂其心而止乃安不獲其身不見其身也謂忘我也無我則止矣不能無我無可止之道行其庭不見其人庭除之間至近也在背則雖至近不見謂不交於物也外物不接內欲不萌如是而止乃得止之道於止為無咎也初六艮其趾無咎利永貞傳曰六在最下趾之象動之先也艮其止止於動之初也事止於初未至失正故無咎也以柔處下當止之時也行則失其正矣故止乃無咎陰柔患其不能常也不能固也故方止之初戒以利在常永貞固則不失止之道也漸初六鴻漸于干小子厲有言無咎傳曰漸初爻皆取鴻象鴻之為物至有時而羣有序不失其時序乃為漸也干水湄水鳥止於水之湄水至近也其進可謂漸矣行而以時乃所謂漸進不失漸得其宜矣六居初至下也陰之才至弱也而上無應援以此而進常情之所憂也君子則深識逺照知義理之所安時事之所宜處之不疑小人幼子唯能見已然之事從衆人之知非能燭理也故危懼而有言蓋不知在下所以有進也用柔所以不躁也無應所以能漸也於義自無咎也若漸之初而用剛急進則失漸之義不能進而有咎必矣象曰小子之厲義無咎也傳曰雖小子以為危厲在義理實無咎也豐初九遇其配主雖旬無咎往有尚傳曰雷電皆至成豐之象明動相資致豐之道非明無以照非動無以行相須猶形影相資猶表裏初九明之初九四動之初宜相須以成其用故雖旬而相應位則相應用則相資故初謂四為配主已所配也配雖匹稱然就之者也如配天以配君子故初於四云配四於初云夷也雖旬無咎旬均也天下之相應者嘗非均敵如陰之應陽柔之從剛下之附上敵則安肯相從唯豐之初四其用則相資其應則相成故雖均是陽剛相從而無過咎也蓋非明則動無所之非動則明無所用相資而成用同舟則胡越一心共難則仇敵協力事勢使然也往而相從則能成其豐故云有尚有可嘉尚也在他卦則不相下而離隙矣象曰雖旬無咎過旬災也傳曰聖人因時而處宜隨事而順理夫勢均而不相下者當理也然有雖敵而相資者則相求也初四是也所以雖旬而無咎也與人同而力均者在乎降己以相求協力以從事若懷先己之私有加上之意則患當至矣故曰過旬災也均而先己是過旬也一求勝則不能同矣巽九二巽在床下用史巫紛若吉無咎傳曰二居巽時以陽處陰而在下過於巽者也牀人之所安巽在牀下是過於巽過所安矣人之過於卑巽非恐怯則諂說皆非正也二實剛中雖巽體而居柔為過於巽非有邪心也恭巽之過雖非正禮可以逺恥辱絶怨咎亦吉道也史巫者通誠意於神明者也紛若多也茍至誠安於謙巽能使通其誠意者多則吉而無咎謂其誠足以動人也人不察其意則以過巽為諂矣節初九不出户庭無咎傳曰户庭户外之庭門庭門內之庭初以陽在下上復有應非能節者也又當節之初故戒之謹守至於不出户庭則無咎也初能固守終或渝之不謹於初安能有卒故於節之初為戒甚嚴也小過九四無咎弗過遇之往厲必戒勿用永貞傳曰四當小過之時以剛處柔剛不過也是以無咎既弗過則得其宜矣故謂遇之謂得其道也若往則有危必當戒懼也往去柔而以剛進也勿用永貞陽性堅剛故戒以隨宜不可固守也方陰過之時陽剛失位則君子當隨時順處不可固守其常也四居髙位而無上下之交雖比五應初方陰過之時彼豈肯從陽也故往則有厲既濟初九曵其輪濡其尾無咎傳曰初以陽居下上應於四又火體其進之志鋭也然時既濟矣進不已則及於悔咎故曵其輪濡其尾乃得無咎輪所以行倒曵之使不進也獸之涉水必揭其尾否則不能濟方既濟之初能止其進乃得無咎不知已則至於咎也象曰曵其輪義無咎也傳曰既濟之初而能止其進則不至於極其義自無咎也未濟上九有孚於飲酒無咎濡其首有孚失是傳曰九以剛在上剛之極也居明之上明之極也剛極而能明則不為躁而為决明能燭理剛能斷義居未濟之極非得濟之位無可濟之理則當樂天順命而已若否終則有傾時之變也未濟則無極之理而自濟故止為未濟之極至誠安於義命而自樂則可無咎飲酒自樂也不樂其處則忿躁隕穫入於凶咎矣若從樂而耽肆過禮至濡其首亦非能安其處也豫友湯伯紀曰無咎之所以為善補過者蓋謂卦爻中有時位之難處本當有咎以其善處故免所謂轉禍為福易危為安故謂之善補過耳非真以為某卦某爻先有過而後能改也今之所取本為改過而無咎之辭取之太泛但當取豫上六臨六三復六三離初九損六四夬九五六條皆改過之親切者餘爻可削伯紀之說是矣然當難處之時而處之善乃所以無過尤學者所宜盡心故存而不削且併記其說於此云語子曰已矣乎吾未見能見其過而內自訟者也朱子曰已矣乎者恐其終不得見而嘆之也內自訟者口不言而心自咎也人有過而能自知者鮮矣知過而能自訟者尤鮮能內自訟則其悔悟深切而能改必矣夫子自恐終不得見而嘆之其警學者深矣南軒曰人惟安於所偏而狃於所習是以鮮能見其過就或覺其為過不能自訟又從而文之者多矣內自訟則無一毫蓋覆之意其於徙義進德也孰禦過則勿憚改已見為學篇蘧伯玉使人於孔子孔子與之坐而問焉曰夫子何為對曰夫子欲寡其過而未能也使者出子曰使乎使乎朱子曰夫子指伯玉也言其但欲寡過而尚未能則其省身克己常若不及之意可見矣使者之言愈自卑約而其主之賢益彰亦可謂深知君子之心而善於詞令者矣故夫子再言使乎以重美之按莊周稱伯玉行年五十而知四十九年之非又曰伯玉行年六十而六十化蓋其進德之功老而不倦是以踐履篤實光輝宣著不唯使者知之而夫子亦信之或問二十六章之說曰蘧伯玉使者之言極有味學者所宜熟玩而深省焉胡氏說亦可觀也胡氏曰未能寡過乃伯玉心事而使者知之雖伯玉克己日新之符著見於外而使者亦可謂知德而能言矣南軒曰夫欲寡過而未能非篤於進德修業莫知此味也則伯玉之賢可知聞義不能徙不善不能改已見為學篇子貢曰君子之過也如日月之食焉過也人皆見之更也人皆仰之黃氏曰其過也明白而無掩覆故人皆見其更也瑩徹而無瑕疵故人皆仰南軒曰人皆見之者君子不文飾掩蔽其過也日月之食旋而復矣無損其明也故君子改過不吝而德愈光焉子曰過而不改是謂過矣朱子曰過而能改則復於無過唯不改則其過遂成而將不及改矣孟子曰古之君子過則改之今之君子過則順之古之君子其過也如日月之食人皆見之及其更也民皆仰之今之君子豈徒順之又從而為之辭朱子曰順猶遂也更改也辭辨也更之則無損於明故民仰之順而為之辭則其過愈深矣孟子曰子路人告之以有過則喜朱子曰喜其得聞而改之其勇於自修如此程子曰子路云云可謂百世之師矣孟子曰西子䝉不潔則人皆掩鼻而過之雖有惡人齊戒沐浴則可以祀上帝周子曰人之生不幸不聞過大不幸無恥朱子曰不聞過人不告也無恥我不仁也必有恥則可教聞過則可賢有恥則能發奮而受教聞過則知所改而為賢然不可教則雖聞過而未必能改矣以此見無恥之不幸為尤大也有善不及朱子曰設問人或有善而我不能及則如之何曰不及則學焉答言當學其善而已問曰有不善問人有不善則何以處之曰不善則告之不善且勸曰庶幾有改乎斯為君子答言人有不善則告之以不善而勸其改告之者恐其不知此事之為不善也勸之者恐其不知不善之可改而為善也有善一不善二則學其一而勸其二亦答辭也言人有善惡之雜則學其善而勸其惡有語曰斯人有是之不善非大惡也則曰孰無過焉知其不能改改則為君子矣不改為惡惡者天惡之彼豈無畏耶焉知其不能改此亦答言聞人有過雖不得見而告勸之亦當答之以此冀其或聞而自改也有心悖理謂之惡無心失理謂之過故君子悉有衆善無弗愛且敬焉善無不學故悉有衆善惡無不勸故不棄一人於惡不棄一人於惡則無所不用其愛敬矣仲由喜聞過令名無窮焉今人有過不喜人規如護疾而忌醫寧滅其身而無悟也噫易夬九四程氏傳曰夫過而能改聞善而能用克己以從義唯剛明者能之學者有自言其病而未有以藥之者朱子曰知得如此是病即知不如此是藥以上皆言省躬補過之事右廣大學之五修身誠意正心前卷備之易家人利女貞程子曰家人之道利在女正女正則家道正矣夫夫婦婦而家道正獨云利女貞者夫正者身正也女正者家正也女正則男正可知矣彖曰家人女正位乎內男正位乎外男女正天地之大義也彖以卦才而言陽居五在外也陰居二處內也男女各得其正位也尊卑內外之道正合天地陰陽之大義也家人有嚴君焉父母之謂也家人之道必有所尊嚴而君長者謂父母也雖一家之小無尊嚴則孝敬衰無君長則法度廢有嚴君而後家道正家者國之則也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣父子兄弟夫婦各得其道則家道正矣推一家之道可以及天下故家正則天下定矣象曰風自火出家人君子以言有物而行有恆正家之本在正其身正身之道一言一動不可易也君子觀風自火出之象知事之由內而出故所言必有物所行必有恆也物謂事實恆謂常度法則也德業之著於外由言行之謹於內也言慎行修則身正而家治矣初九間有家悔亡初家道之始也間謂防間法度也如其有家之始能以法度為之防間則不至於悔矣治家者治乎衆人也茍不間之以法度則人情流放必至於有悔失長幼之序亂男女之别傷恩義害倫理無所不至能以法度間之於始則無是矣故悔亡也九剛明之才能間其家者也不云無悔者羣居必有悔以能間故亡耳象曰間有家志未變也間之於始家人志意未變動之前也正志未流散變動之前而間之則不傷恩不失義處家之善也是以悔亡志變而後治則所傷多矣乃有悔也六二無攸遂在中饋貞吉人之處家在骨肉父子之間大率以情勝禮以恩奪義唯剛立之人則能不以私愛失其正理故家人卦大要以剛為善初三上是也六二以陰柔之才而居柔不能治於家者也故無攸遂無所為而可也夫以英雄之才尚有溺情愛而不能自守者况柔弱之人其能勝妻子之情乎如二之才若為婦人之道則其正也以柔順處中正婦人之道也故在中饋則得其正而吉也婦人居中而主饋者也故云中饋朱子曰六二柔順中正女之正位乎內者也故其象占如此六二爻義當以本義為正程傳少差象曰六二之吉順以巽也二以陰柔居中正能順從而卑巽者也故為婦人之貞吉九三家人嗃嗃悔厲吉婦子嬉嬉終吝嗃嗃未詳字義然以文義及音意觀之與嗷嗷相類又若急速之意九三在內卦之上主治乎內者也以陽居剛而不中雖得正而過乎剛者也治內過剛則傷於嚴急故家人嗃嗃然治家過嚴不能無傷故必悔於嚴厲骨肉恩勝嚴過故悔也雖悔於嚴厲未得寬猛之中然而家道齊肅人心只畏猶為家之吉也若婦子嬉嬉則終至羞吝矣在卦非有嬉嬉之象蓋對嗃嗃而言謂與其失於放肆寧過於嚴也嬉嬉笑樂無節也自恣無節則終至敗家可羞吝也蓋嚴謹之過雖於人情不能無傷然苟法度立倫理正乃恩義之所存也若嬉嬉無度乃法度之所由廢倫理之所由亂安能保其家乎嬉嬉之甚則致敗家之凶但云吝者可吝之甚則至於凶故未遽言凶也象曰家人嗃嗃未失也婦子嬉嬉失家節也雖嗃嗃於治家之道未為甚失若婦子嬉嬉是無禮法失家之節家必亂也六四富家大吉六以巽順之體居四得其正位居得其正為安處之義巽順於事而由正道能保有其富者也居家之道能保有其富則為大吉也四髙位而獨云富者於家而言髙位家之尊也能有其富是能保其家也吉孰大焉象曰富家大吉順在位也以巽順而居正位正而巽順能保有其富者也富家之大吉也九五王假有家勿恤吉九五男而在外剛而處陽居尊而中正又其應順正於內治家之至正至善者也王假有家五君位故以王言假至也極乎有家之道也夫王者之道修身以齊家家正則天下治矣自古聖王未有不以恭已正家為本故有家之道既至則不憂勞而天下治矣勿恤而吉也五恭巳於外二正家於內內外同德可謂正矣象曰王假有家交相愛也王假有家之道者非止能使之順從而己必能致心化誠合夫愛其內助婦愛其刑家交相愛也能如是者文王之妃乎若身修法立而家未化未得為假有家之道也上九有孚威如終吉上卦之終家道之成也故極言治家之本治家之道非至誠不能也故必中有孚信則能常久而衆人自化為善不由至誠己且不能常守也况欲使人乎故家以有孚為本治家者在妻奴情愛之間慈過則無嚴恩勝則掩義故家之患常在禮法不足而瀆慢生也長失尊嚴少忘恭順而家不亂者未之有也故必有威嚴則能終吉保家之終在有孚威如二者而已故於卦終言之象曰威如之吉反身之謂也治家之道以正身為本故云反身之謂爻辭謂治家當有威嚴而夫子又復戒云當先身也威嚴不先行於己則人怨而不服故云威如而吉者能自反於身也孟子所謂身不行道不行於妻子也孝經子曰閨門之內禮具矣乎嚴父嚴兄妻子臣妾猶百姓徒役也孟子曰身不行道不行於妻子使人不以道不能行於妻子朱子曰身不行道者以行言之不行者道不行也使人不以道者以事言之不能行者令不行也周子曰家人離必起於婦人故暌次家人以二女同居而志不同行也詳見一卷人君正家篇右廣大學之六齊家西山讀書記卷二十七
