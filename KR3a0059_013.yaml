body:
  text: 西山讀書記卷十三宋真德秀撰夫婦易說卦有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯程子曰天地萬物之本夫婦人倫之始所以上經首乾坤下經首咸繼以恆也天地二物故二卦分為天地之道男女交合而成夫婦故咸與恆皆二體合為夫婦之義咸感也以說為主恆常也以正為本而說之道自有正也正之道固有說焉咸之為卦兑上艮下少女少男也男女相感之深莫如少者故二少為咸也艮體篤實止為誠慤之義男志篤實以下交女心說而上應男感之先也男先以誠感則女說而應也夫婦之道不可以不久也故受之以恆恆久也咸夫婦之道夫婦終身不變者也故咸之後受之以恆也咸少男在少女之下以男下女是男女交感之義恆長男在長女之上男尊女卑夫婦居室之常道也論交感之情則至為深切論尊卑之敘則長當謹正故兑艮為咸而震巽為恆也荀子曰易之咸見夫婦之道不可不正也君臣父子之本也咸感也以髙下下以男下女柔上而剛下聘仕之義親迎之道重始也此章論人倫之始禮記天地合而后萬物興焉夫昏禮萬世之始也取於異姓所以附逺厚别也幣必誠辭無不腆鄭氏曰誠信也腆猶厚也告之以直信直猶正也此二者所以教婦正直信也信事人也信婦德也一與之齊終身不改故夫死不嫁事猶立也齊謂共牢而食同尊卑也齊或為醮男女親迎男先於女剛柔之義也天先乎地君先乎臣其義一也先謂倡道也執摯以相見敬章别也言不敢相䙝也摯所奠雁也男女有别然後父子親父子親然後義生義生然後禮作禮作然後萬物安言人倫有别則氣性醇也無别無義禽獸之道也言聚麀之亂類也壻親御授綏親之也親之也者親之也言已親之所以使之親已也出乎大門而先男帥女女從男夫婦之義由此始也先者車居前也郊特牲昏禮者將合二姓之好上以事宗廟而下以繼後世也故君子重之是以昏禮納采問名納徵請期皆主人筵几於廟而拜迎於門外入揖讓而升聽命於廟所以敬慎重正昏禮也鄭氏曰聽命謂主人聽使者所傳壻家之命也疏曰問名者問其女之所生母之姓名父親醮子而命之迎男先於女也子承命以迎主人筵几於廟而拜迎於門外壻執雁入揖讓升堂再拜奠雁蓋親受之於父母也降出御婦車而壻授綏御輪三周先俟於門外婦至壻揖婦以入共牢而食合卺而酳所以合體同尊卑以親之也酌而無酬酢曰醮醮之禮加冠醮所以異者於寢耳壻御婦車輪三周御者代之壻自乘其車先道之歸也共牢而食合卺而酳成婦之義疏曰所以必命迎者欲使男往迎之女則從男而來是男子先迎女從後至也拜迎於門外者壻來先迎而以敵體待之也卺謂半瓢以一瓠分為兩瓢謂之卺壻之與婦各執一片以酳故云合卺而酳同尊卑謂共牢也所以合體同尊卑者欲使壻之親婦婦亦親壻所以體同為一不使尊卑有殊也敬慎重正而后親之禮之大體而所以成男女之别而立夫婦之義也男女有别而后夫婦有義夫婦有義而后父子有親父子有親而后君臣有正故曰昏禮者禮之本也言子受氣性純則孝孝則忠也疏曰所為昏禮本者昏姻得所則受氣純和生子必孝事君必忠孝則父子親忠則朝廷正昏禮為諸禮之本也夙興婦沐浴以俟見質明贊見婦於舅姑執筓棗栗腶修以見贊醴婦婦祭脯醢祭醴成婦禮也成其為婦之禮也贊醴婦當作禮舅姑入室婦以特豚饋明婦順也以饋明婦順者供養之禮主於孝順疏曰士昏故有特豚饋於舅姑若大夫以上非惟特豚而已厥明舅姑共饗婦以一獻之禮奠酬舅姑先降自西階婦降自阼階以著代也言既獻之而授之以室事也降者各還其燕寢婦見及饋饗於適寢昏禮不言厥明此言之者容大夫以上禮多或異日疏曰此以士為主亦兼明大夫故厥明饗婦若士婦見舅姑之日即舅姑饗婦不待厥明以著代者謂阼階是舅姑所升之處今婦由阼階而降是著明代舅姑之事也適寢者謂舅姑之適寢也成婦禮明婦順又申之以著代所以重責婦順焉也婦順者順于舅姑和于室人而後當于夫以成絲麻布帛之事以審守委積蓋藏室人謂女妐女叔諸婦也當猶稱也後言稱夫者不順舅姑不和室人雖有善者猶不為稱夫也疏曰以審守委積蓋藏者言以此詳審保守家之所有委積掩蓋藏聚之物也室人是在室之人非男子也女妐謂壻之姊女叔謂壻之妹諸婦謂姊姒之屬是故婦順備而后內和理內和理而後家可長久也故聖王重之是以古者婦人先嫁三月祖廟未毁教於公宫祖廟既毁教于宗室教以婦德婦言婦容婦功教成祭之牲用魚芼之以蘋藻所以成婦順也昏義鄭氏曰謂天子諸侯同姓者也嫁女必就尊者教成之教成之者女師也祖廟女所出之祖也公君也宗室宗子之家也婦德貞順也婦言辭令也婦容婉娩也婦功絲麻也祭之祭其所出之祖也魚蘋藻皆水物隂類也魚為爼實蘋藻為羮菜祭無牲牢吉事耳非正祭也其粢盛用黍云君使有司告之宗子之家若其祖廟已毁則為壇而告焉白虎通曰婦人所以有師何學事人之道也學一時足以成矣與君有緦麻之親者教於公宫三月與君無親者各教於宗廟宗婦之室國君取大夫之妾士之妻老無子而明於婦道者又祿之使教宗室五屬之女大夫士皆有宗族自於宗子之室學事人也男女非有行媒不相知名非受幣不交不親故日月以告君鄭氏曰周禮凡取判妻入子媒氏書之以告君齊戒以告鬼神昏禮凡受女之禮皆於廟為神席以告鬼神為酒食以召鄉黨僚友會賓客也以厚其别厚重慎也曲禮孟子曰丈夫生而願為之有室女子生而願為之有家不待父母之命媒妁之言鑽穴隙相窺踰牆相從則父母國人皆賤之禮娶則為妻奔則為妾子云夫禮坊民所淫章民之别使民無嫌以為民紀者也故男女無媒不交無幣不相見恐男女之無别也鄭氏曰重男女之會所以逺别之於禽獸也有幣者必有媒有媒者不必有幣以此坊民民猶有自獻其身獻謂進也疏曰謂民之女人猶有自進其身以求男者也坊記昏禮不用樂幽隂之義也樂陽氣也鄭氏曰幽深也欲使婦深思其義不以陽散之也疏曰陽是動散用樂則令婦志意動散不能深思隂靜之義以修婦道也昏禮不賀人之序也序猶化也程子曰昏禮不用樂幽隂之義也此說非是昏禮豈是幽隂但古人重此大禮嚴肅其事不用樂也昏禮不賀人之序也此則得之孔子曰嫁女之家三夜不息燭思相離也離力智反鄭氏曰思骨肉也取婦之家三日不舉樂思嗣親也重世變也疏曰所以不舉樂者思今已之取妻嗣續其親則是親之代謝所以悲哀感傷重世之改變也以上總言昏禮大意三十曰壯有室鄭氏曰妻稱室曲禮下同女子許嫁筓而字鄭氏曰以許嫁為成人三十而有室始理男事女子十有五年而筓二十而嫁有故二十三年而嫁鄭氏曰故謂父母之喪內則魯哀公問於孔子曰禮男必三十而有室女必二十有夫也豈不晚哉孔子曰夫禮言其極也不是過也男子二十冠有為人父之端女子十五許嫁有適人之道於此而往則為昏矣家語以上言昏嫁之年其下文云曰羣生閉藏乎隂而為化育之始故聖人因時以合偶男女窮天數也霜降而婦功成嫁娶者行焉冰泮而農桑起昏禮殺於此王肅曰季秋霜降嫁娶者始於此詩云將子無怒秋以為期正月農事起者採桑昏禮始殺言未止也詩云士如歸妻逮氷未泮言如欲使妻歸當及氷未泮散之時此又言嫁娶之時按詩桃夭標有梅皆以男女及時為美而齊之有狐鄭之野有蔓草皆以男女失時為刺至漢王吉則曰夫婦人倫大綱夭夀之萌世俗嫁娶太蚤未知為人父母之道而有子是以教化不明而民多夭二義皆所當知也孔子曰女有五不取逆家子者謂其逆德也何休曰廢人倫也亂家者謂其亂倫也何休曰類不正也世有刑人者謂其棄於人也有惡疾子者謂其棄於天也喪父長子謂其無受命也程子曰世人多謹於擇壻而忽於擇婦其實壻易見婦難知所繫甚重豈可忽也愚按孔子五不取即擇婦之法也婦人深居閨閫美不外著賢否未易知也亦觀其家如何爾逆家子不取是其所取必忠孝之家也亂家子不娶是其所取必禮義之族也推是類而求之其不中者鮮矣唯喪父長子一節先儒以為疑若父雖喪而母賢則其教女必有法又非所拘也今世俗擇婦不謹其失有二一曰以色二曰以財晉叔向欲取於申公巫臣氏其母曰吾聞之甚美必有甚惡昔有仍氏生女黰黑而甚美光可以鑑名曰𤣥妻樂正后䕫娶之生伯封實有豕心貪婪無饜后羿滅之䕫以是不祀夫有尤物足以移人茍非德義則必有禍叔向卒娶之遂滅羊舌氏此可為色娶者之戒文中子曰昏娶而論財夷虜之道也君子不入其鄉古者男女之族各擇德焉不以財為禮此又深譏財娶者之失也又先賢有言嫁女必求勝吾家者則女之事人也恭取婦必不若吾家者則婦之執禮也謹今之士起於寒微而驟結昏於權要鮮有不慢其夫者晉大夫董叔將娶於范氏叔向曰范氏富盍已乎欲為繫援焉他日董祁訴於范獻子曰不吾敬也獻子執而縛於庭之槐叔向過之曰子盍為我請乎叔向曰求繫既繫矣求援亦援矣欲而得之又何請焉韋昭曰董祁者范宣子之女獻子之妹也此又可為扳援貴勢而自取羞辱者之戒故附著之此章言擇婦子云取妻不取同姓以厚别也以此坊民魯春秋猶去夫人之姓曰吳其死曰孟子卒鄭氏曰吳太伯之後魯同姓昭公取焉去姬曰吳而已至其死亦略云孟子卒不書夫人某氏薨孟子蓋其字坊記衛公使其大夫求婚於季氏桓子問禮於孔子子曰同姓為宗有合族之義故繫之以姓而弗别綴之以食而弗殊王肅曰君有食族人之禮雖親盡不異之殊食多少也雖百世婚姻不得通周道然也桓子曰魯衛之先雖寡兄弟今已絶逺矣可乎孔子曰固非禮也夫上治祖禰以尊尊也下治子孫以親親也旁治昆弟所以敦睦也此先王不易之教也白虎通曰不娶同姓者重人倫防淫佚恥與禽獸同也外屬小功以上亦不得娶也以上言不娶同姓今人知同姓之不可娶而不知有姓雖異而其出同者如韓毛之類是也又外屬之有服者亦罕知避故著此義焉春秋文四年夏逆婦姜于齊胡氏曰逆皆稱女以未成婦而女者在父母家之所稱也往迎而稱婦入國不書至何哉此春秋誅意之效也禫制未終思念娶事是不志哀而居約矣方逆也而已成為婦未至也而如在國中原其意而誅之也唐德宗時張茂宗尚主未昏茂宗母卒遺表請終嘉禮帝許之起復茂宗左衛將軍諫官蔣乂諫曰古者兵革之急有墨衰從事者未聞起復尚主者帝曰人間多借吉成婚者卿何執之堅也又曰昏姻喪紀人之大倫吉凶不可瀆也委巷之家不知禮教其女孤貧無恃或有借吉從人未聞男子借吉娶婦者也帝不悅趣下嫁之期范氏曰委巷鄙慝之禮法之所當禁也乃引以為比不亦惑乎今士大夫之家以喪昏者衆矣非獨委巷為然此失禮之尤不可不戒故著此義焉此章言喪娶非禮父醮子命之曰往迎爾相承我宗事鄭氏曰子壻相助也宗事宗廟之事朂帥以敬先妣之嗣若則有常朂勉也若猶汝也勉帥道婦以敬其為先妣之嗣女之行則當有常深戒之詩曰太姒嗣徽音子曰諾惟恐弗堪不敢忘命父送女命之曰戒之敬之夙夜無違命夙起也早起夜卧命姑舅之戒命母施襟結帨曰勉之勉之夙夜無違宫事庶母及門內施鞶申之以父母之命命之曰敬恭聽宗爾父母之言夙夜無愆視諸襟鞶庶母父之妾也鞶鞶槖也所以盛帨巾言尊也愆過也諸之也示之以襟鞶者皆託戒使識之也士昏禮按夫之道在敬身以帥其婦婦之道在敬身以承其夫故父之醮子必曰勉帥以敬親之送女必曰敬之戒之夫婦之道盡於此矣孟子曰女子之嫁也母命之往送之門戒之曰往之女家必敬必戒無違夫子以順為正者妾婦之道也易坤文言隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也程子曰為下之道不居其功含晦其章美以從王事代上以終其事而不敢有其成功猶地道代天終物而成功則主於天也妻道亦然書牝雞無晨牝雞司晨惟家之索此蓋婦人用事之譬然則妻道其可自専其成乎小畜九三輿說輻夫妻反目程子曰三以陽爻居不得中而密比於四隂陽之情相求也又䁥比而不中為隂畜制者也故不能前進猶車輿說去輪輻言不能行也夫妻反目隂制於陽者也今反制陽如夫妻之反目也反目謂怒目相視不順其夫而反制之也婦人為夫寵惑既而遂反制其夫未有夫不失道而妻能制之者也故說輻反目三自為也按三自為謂其自取之也象曰夫妻反目不能正室也夫妻反目蓋由不能正其室家也三自處不以道故四得制之不使進猶夫不能正其室家故致反目也恆六五恆其德貞婦人吉夫子凶程子曰五應於二以隂柔而應陽剛居中而所應又中隂柔之正也故恆久其德則為貞也夫以順從為恆者婦人之道在婦人則為貞故吉若丈夫而以順從於人為恆則失其剛陽之正乃凶也象曰婦人貞吉從一而終夫子制義從婦凶也程子曰如五之從二在婦人則為正而吉婦人以從為正以順為德當終守於從一夫子則以義制者也從婦人之道則為凶也姤女壯勿用取女程子曰一隂始生自是而長漸以盛矣是女之將壯長也隂長則陽消女壯則男弱故戒勿用取如是之女取女者欲其柔和順從以成家道姤乃方進之隂漸壯而敵陽者是以不可取也彖曰勿用取女不可與長也取女者欲長久而成家也此漸盛之隂將消勝於陽不可與之長久也歸妹征凶無攸利程子曰歸妹者女之歸也妹少女之稱為卦震上兑下以少女從長男也男動而女說又以說而動皆男說女女從男之義卦有男女配合之義者四咸恆漸歸妹也咸男女之相感也男下女二氣感應止而說男女之情相感之象恆常也男上女下巽順而動隂陽皆相應是男女居室夫婦唱隨之常道漸女歸之得其正也男下女而各得正位止靜而巽順其進有漸男女配合得其道也歸妹女之嫁謂歸也男上女下女從男也而有說少之義以說而動動以說則不得其正矣故位皆不當以說而動動而不當故凶彖曰歸妹天地之大義也一隂一陽之謂道隂陽交感男女配合天地之常理也天地不交則萬物不興歸妹人之終始也天地不交則萬物何從而生女之歸男乃生生相續之道男女交而後有生息有生息而後其終不窮前者有終而後者有始相續不窮是人之終始也說以動所歸妹也征凶位不當也以二體釋歸妹之義男女相感說而動者少女之事故以說而動所歸者妹也所以征則凶者以諸爻皆不當位也所處皆不正何動而不凶大率以說而動安有不失正者無攸利柔乘剛也不唯位不當也又有乘剛之過三五皆乘剛男女有尊卑之序夫婦有唱隨之禮此常理也如恆是也茍不由常正之理徇情肆欲唯說是動則夫婦瀆亂男率欲而失其剛婦狃說而忘其順如歸妹之乘剛是也所以凶無所往而利也夫隂陽之配合男女之交媾理之常也然從欲而流放不由義理則淫邪無所不至傷身敗德豈人理哉歸妹之所以凶也象曰澤上有雷歸妹君子以永終知敝雷震於上澤隨而動陽動於上隂說而從女從男之象也故為歸妹君子觀男女配合生息相續之象而以永其終知有敝也永終謂生息嗣續永久其傳也知敝謂知物有敝壞而為相繼之道也女歸則有生息故有永終之義又夫婦之道當常永有終必知其有敝壞之理而戒慎之敝壞謂離隙歸妹說以動者也異乎恆之巽而動漸之止而巽也少女之說情之感動動則失正非夫婦正而可常之道久必敝壞知其必敝則當思永其終也天下之反目者皆不能永終者也不獨夫婦之道天下之事莫不有終有敝莫不有可繼可久之道觀歸妹則當思永終之戒也初九歸妹以娣跛能履征吉女之歸居下而無正應娣之象也剛陽在婦人為賢貞之德而處卑順娣之賢正者也處說居下為順義娣之卑下雖賢何所能為不過自善其身以承助其君而已如跛之能履言不能及逺也然在其分為善故以是而行則吉也象曰歸妹以娣以恆也跛能履吉相承也歸妹之義以說而動非夫婦能常之道九乃剛陽有賢貞之德雖娣之微乃能以常者也雖在下不能有所為如跛者之能履然征而吉者以其能相承助也能助其君娣之吉也九二眇能視利幽人之貞九二陽剛而得中女之賢正者也上有正應而反隂柔之質動以說者也乃女賢而配不良故二雖賢不能自遂以成其內助之功適可以善其身而小施之如眇者之能視而已言不能及逺也男女之際當以正禮五雖不正二自守其幽靜貞正乃所利也二有剛正之德幽靜之人也二之才如是而言利貞者利言宜於如是之貞非不足而為之戒也象曰利幽人之貞未變常也守其幽貞未失夫婦常正之道也世人以媟狎為常故以貞靜為變常不知乃常久之道也六三歸妹以須反歸以娣三居下之上本非賤者以失德而無正應故為欲有歸而未得其歸須待也待者未有所適也六居三不當位德不正也柔而尚剛行不順也為說之主以說求歸動非禮也上無應無受之者也無所適故須也女子之處如是人誰取之不可以為人配矣當反歸而求為娣媵則可也以不正而失其所也象曰歸妹以須未當也未當者其處其德其求歸之道皆不當故無取之者所以須也九四歸妹愆期遲歸有時九以陽居四四上體地之髙也陽剛在女子為正德賢明者也無正應未得其歸也過時未歸故云愆期女子居髙貴之地有賢明之資人情所願娶故其愆期乃為有時蓋自有待非不售也待得佳配而後行也九居四雖不當位而處柔乃婦人之道以無應故為愆期之義而聖人推理以女賢而愆期蓋有待也象曰愆期之志有待而行也所以愆期者由已而不由彼賢女人所願娶所以愆期乃其志欲有所待待得佳配而後行也六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉六五居尊位妹之貴髙者也下應於二為下嫁之象王姬下嫁自古而然至帝乙而後正婚姻之禮明男女之分雖至貴之女不得失柔巽之道有貴驕之志故易中隂尊而謙降者則曰帝乙歸妹泰六五是也貴女之歸惟謙降以從禮乃尊髙之德也不事容飾以說於人也娣媵者以容飾為事者也衣袂所以為容飾也六五尊貴之女尚禮而不尚飾故其袂不及娣之袂良也良美好也月望隂之盈也盈則敵陽矣幾望未至於盈也五之貴髙常不至於盈極則不亢其夫乃為吉也女之處尊貴之道也象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也以帝乙歸妹之道言其袂不如其娣之袂良尚禮而不尚飾也五以柔中在尊髙之位以尊髙而行中道也柔順降屈尚禮而不尚飾乃中道也上六女承筐無實士刲羊無血無攸利上六女歸之終而無應女歸之無終者也婦者所以承先祖奉祭祀不能奉祭祀則不可以為婦矣筐篚之實婦職所供也古者房中之爼葅歜之類后夫人職之諸侯之祭親割牲卿士大夫皆然割取血以祭禮云血祭盛氣也女當承事筐篚而無實無實則無以祭謂不能奉祭祀也夫婦共承宗廟婦不能奉祭祀乃夫不能承祭祀也故刲羊而無血亦無以祭也謂不可以承祭祀也婦不能奉祭祀則當離絶矣是夫婦之無終者也何所往而利哉象曰上六無實承虛筐也筐無實是空筐也空筐可以祭乎言不可以奉祭祀也女不可以承祭祀則離絶而已是女歸之無終者也禮記曰婦人從人者也幼從父兄嫁從夫夫死從子夫也者天也夫也者以知帥人者也知音智夫之言丈夫也昏義家語曰女子者順男子之教而長其理者也是故無専制之義而有三從之道幼從父兄既嫁從夫夫死從子言無再醮之端王肅曰始嫁言醮禮無再嫁之端言不改事教令不出於閨門事在供酒食而已無閫外之非儀也閫門限婦人以貞専無閫外之威儀詩云無非無儀唯酒食是儀孟子之母曰婦人之職精五飯羃五漿養舅姑縫衣裳而已故有閨門之修而無閫外之志不越境而奔喪言無擅為行無獨成參知而後動可驗而後言晝不逰庭夜行以火所以效匹婦之德也白虎通曰婦人之贄以棗栗腶修者婦人無専制之義御衆之任交接辭讓之禮職在供養饋食之間其義一也故后夫人以棗栗腶修者凡肉修隂也棗取其朝早起栗戰栗自正也魯師春姜曰夫婦人以順從為務貞慤為首故婦人事夫有五平旦纚筓而朝則有君臣之嚴沃盥饋食則有父子之敬報反而行則有兄弟之道受期必誠則有朋友之信寢席之交而後有夫婦之際春秋傳臼季使過冀見冀缺耨其妻饁之敬相待如賓與之歸言諸文公曰敬德之聚也能敬必有德德以治民君請用之臣聞出門如賓承事如祭仁之則也文公以為下軍大夫禮始於謹夫婦不敢縣於夫之揮揓不敢藏於夫之篋笥不敢共湢浴夫不在斂枕篋簟席襡器而藏之鄭氏曰不敢䙝也少事長賤事貴咸如之曲禮以上言夫婦之道詩召南鵲巢夫人之德也國君積行纍功以致爵位夫人起家而居有之德如鳲鳩可以配焉鄭氏曰夫人有均一之德如鳲鳩然而後可配國君焉維鵲有巢維鳩居之之子于歸百兩御之御五嫁反毛氏曰鳲鳩不自為巢居鵲之成巢百兩百乘也諸侯之子嫁於諸侯送御皆百乘滎陽吕氏曰維鵲有巢維鳩居之但取鳩之不自為巢而居鵲之成巢非取鵲之强而不淫知義之所在亦非取鳩有均養之德也廣漢張氏曰唯其専靜均一能端然享之是乃夫人之德也有所作為則非婦道矣維鵲有巢維鳩方之之子于歸百兩將之毛氏曰方有之也將送也維鵲有巢維鳩盈之之子于歸百兩成之毛氏曰盈滿也鄭氏曰滿者言衆媵侄婦之多朱子曰成成其禮也南國諸侯被文王之化能正心修身以齊其家其女子亦被后妃之化而有専靜純一之德故嫁於諸侯而其家人美之曰云云此詩之意猶周南之有關雎也四明袁氏講義曰序言夫人之德而詩之所稱惟曰鵲有巢而鳩居之安在其為德乎曰此乃夫人之實德也婦人無外事謙柔正靜保養其良心而已又曰此詩三章不稱其多能而以不能為貴非惡夫能也安于婦道之常而不願乎外乃所以為能也至於夫道則不然以發强剛毅為本以委靡偷安為戒為夫而柔弱則夫不夫矣為婦而剛强則婦不婦矣各有攸當故也序此詩者曰國君云云夫人云云兹其所以為夫婦之别乎采蘩夫人不失職也夫人可以奉祭祀則不失職矣楊氏曰夫人為宗廟社稷主以供祭祀為職于以采蘩于沼于沚于以用之公侯之事毛氏曰蘩皤蒿也公侯夫人執蘩菜以助祭長樂劉氏曰尊祭祀故直謂之事春秋有事于太廟大事于太廟是也于以采蘩于澗之中于以用之公侯之宫毛氏曰宫廟也被之僮僮夙夜在公被之祁祁薄言還歸毛氏曰被首飾也孔氏曰髮髢也僮僮竦敬也劉氏曰僮僮步雖移而被不動之貌朱氏曰公公所也謂宗廟之中非私室也毛氏曰祁祁舒遲也去事有儀也朱氏曰祭義曰及祭之後陶陶遂遂如將復入不欲遽去愛敬之無已也袁氏曰祭祀之事古人之所甚重人孰不奉祭祀而可以奉祭祀者實難是必洞洞屬屬精一不雜有以契夫鬼神之微則可以行此禮矣邦君之配國人所尊謂之小君而其職非有他事惟曰奉祭祀而已可以奉祭祀是為稱職不足以奉祭祀則失其職矣然則夫人者可不職思其憂乎又曰物之可薦者多矣不及其他而獨有取夫蘩豈不曰交乎神明者在誠而不在物與誠心不至雖犧牲肥腯粢盛豐備神其吐之矣又曰僮僮竦敬之貌執蘩以助祭而竦敬於宗廟之中亦足以明此心之不放逸矣雖然當祭而致敬祭畢而忘之是誠心易衰也又豈足為敬乎被之祁祁云云即祭義如將復入之意不即安於私室而猶遲遲其歸心足以御其形而不為形所役心不懈則形不倦故既祭之餘無以異于承祭之時也是之謂夫人之職草蠱大夫妻能以禮自防也喓喓草蠱躍躍阜螽未見君子憂心忡忡亦既見止亦既覯止我心則降朱氏曰喓喓聲也草蠱蝗屬躍躍躍貌阜螽蠜也忡忡猶衝衝也覯遇降下也召南之大夫行役在外其妻獨居見此二物以類相從似有隂陽之性因感時物之變而思其君子恐不得保其全而見之也陟彼南山言采其蕨未見君子憂心惙惙亦既見止亦既覯止我心則說朱氏曰非必大夫妻親出采蕨蓋言今其時矣歐陽氏曰婦人見時物之變新思其君子陟彼南山言采其薇未見君子我心傷悲亦既見止亦既覯止我心則夷朱氏曰薇似蕨而差大有芒袁氏曰人惟有一心因物而遷非此心之正也況婦人以正靜為主此心不純而以邪思亂之則婦德虧矣古之所謂賢婦者惟朝夕從事乎此心心無他念是為大本萬善之所從出也喓喓云云此鳴彼躍隂陽相求有不能自己者大夫行役於外其妻獨居感時物之變而惟君子之思能無動乎然自君子之外非有他念思得其正則亦未嘗不靜也采蕨采薇非必躬自為之觀於他人采此二物隨時而變於是乎復為君子之思此亦思之無邪者也未見君子念念不忘既見且遇而此念釋矣此詩三章曰忡忡曰惙惙曰傷悲皆憂也憂之如何人心惟危一念有失墮於人欲將何以作配於君子是則可憂也序詩曰能以禮自防其心以憂則兢兢業業遵蹈規矩而不違乎禮矣禮者人道之極也躬行於閨門之中俯仰無所愧怍可不謂賢婦乎采蘋大夫妻能循法度也能循法度則可以承先祖共祭祀矣于以采蘋南澗之濱于以采藻于彼行潦毛氏曰蘋大萍也藻聚藻也行潦流潦也王氏曰采蘋必於南澗之濱采藻必于行潦言其所薦有常物所采有常處也于以盛之維筐及筥于以湘之維錡及釜毛氏曰方曰筐員曰筥湘烹也錡釜屬有足曰錡無足曰釜王氏曰言其所用有常器也長樂劉氏曰言其誠信之至事事必躬也于以奠之宗室牖下誰其尸之有齊季女毛氏曰奠置也宗室大宗之廟也大夫士祭于宗廟奠於牖下尸主齊敬季少也蘋藻薄物也澗潦至質也筐筥錡釡陋器也少女微主也王氏曰宗室牖下言其所奠有常地也自所薦之物所采之處所用之器所奠之地皆有常而不敢變此所謂能循法度也長樂劉氏曰季女者大夫之妻也東萊吕氏曰采之盛之湘之奠之所為者非一端所厯者非一所矣煩而不厭久而不懈循其序而有常積其誠而益厚然後祭事成焉季女之少若未足以勝此而實尸此者以其有齊敬之心也大夫之妻未必果少特言茍持敬則雖少艾猶足以當大事云爾采蘩以職言舉其綱也采蘋以法度言詳其目也尊卑之辨也殷其雷勸以義也召南之大夫逺行從政不遑寧處其室家能憫其勤勞勸以義也鄭氏曰召南大夫召伯之屬殷其雷在南山之陽何斯違斯莫敢或遑振振君子歸哉歸哉毛氏曰殷雷聲也山南曰陽何此君子也違去也遑暇也振振信厚也張氏曰如鸛鳴婦嘆之義將風雨則思念行者也朱氏曰何斯斯此人也違斯斯此所也歸哉歸哉冀其畢事而還歸也閔之深而無怨辭所謂勸以義也吕氏曰再言歸哉者欲慎其歸以復命也逺行從役不辱君命然後可以言歸殷其雷在南山之側何斯違斯莫敢遑息振振君子歸哉歸哉毛氏曰息止也殷其雷在南山之下何斯違斯莫敢遑處振振君子歸哉歸哉毛氏曰處居也袁氏曰世俗之所謂歸者夫婦共處足以相歡也此詩所云非是之謂奉命而行事竟而返有以復命斯其為歸也美矣小星惠及下也夫人無妬忌之行惠及賤妾進御於君知其命有貴賤能盡其心矣吕氏曰夫人無妬忌之行而賤妾安於其命所謂上好仁而下必好義者也嘒彼小星三五在東肅肅宵征夙夜在公實命不同毛氏曰嘒微貌小星衆無名者三心五噣四時更見鄭氏曰心在東方三月時也噣在東方正月時也毛氏曰肅肅疾貌宵夜征行也鄭氏曰夙早也凡妾御於君不敢當夕朱氏曰命所賦之分也衆妾進御於君不敢當夕見星而往見星而還故因其所見以起興孔氏曰衆妾自知己賤不敢同於夫人嘒彼小星維參與昴肅肅宵征抱衾與裯實命不猶毛氏曰參伐也昴留也釋文曰二星皆西方宿衾被也裯襌被也猶若也程子曰賤妾得進御於君是其僣恣可行而分限得踰之時也乃能謹於抱衾與裯而知其命之不猶則教化至矣袁氏曰語曰不知命無以為君子天之賦分髮毫無差貴與賤殊體上與下殊位媵之不可同嫡猶臣之不可僣君也此理甚明而干名犯分者世多有之惟其不知命而已今曰實命不同實命不猶何其審於自知而無歆羡之心達於天理而無人欲之蔽歟是固有本焉國君之德足以刑于寡妻則夫人之惠必能及於賤妾故妾之知命雖夫人之賢實國君之德也江有汜美媵也勤而無怨嫡能悔過也文王之時江沱之間有嫡不以其媵備數媵遇勞而無怨嫡亦自悔也孔氏曰嫡謂妻媵謂妾古者女嫁必姪娣從謂之媵董氏曰江況嫡沱況媵今序言江沱之間失詩指矣江有汜之子歸不我以不我以其後也悔爾雅疏曰凡水決之岐流復還本水曰汜程氏曰其嫡不使備嬪妾之數以待君也汜水之分渚水之岐沱水之别當使媵妾均承其澤鄭氏曰之子謂嫡也婦人謂嫁曰歸范氏曰以之為言用也江有渚之子歸不我與不我與其後也處范氏曰處媵得其所江有沱之子歸不我過不我過其嘯也歌鄭氏曰嘯蹙口而出聲嫡既覺自悔而歌朱氏曰嘯以舒憤悶之氣言其悔時也歌則得其所處而樂矣此兼上兩章之意而言吕氏曰以如不使大臣怨乎不以之以與如暴虎馮河吾不與也之與過如過從之過不我過言不我顧也一章曰其後也悔二章曰其後也處三章曰其嘯也歌始則悔悟中則相安終則相歡言之序也愚按此詩不美嫡而美媵者蓋嫡之悔過由媵遇勞無怨之所感也臣之事君子之事親亦若是焉而已矣以上専言婦道緑衣衛莊姜傷已也妾上僣夫人失位而作是詩也緑兮衣兮緑衣黃裏心之憂矣曷維其已朱氏曰緑蒼勝黃之間色黃中央土之正色間色賤而以為衣正色貴而以為裏言皆失其所也已止也莊公惑於嬖妾夫人莊姜賢而失位故作此詩言緑衣黃裏以比賤妾尊顯而正嫡幽微使我憂之不能自己廣漢張氏曰緑衣之憂言嫡妾之亂其弊將至於不可勝言者憂在宗國也夫豈為一身之私哉緑兮衣兮緑衣黃裳心之憂矣曷維其亡朱子曰上曰衣下曰裳記曰衣正色裳間色今以緑為衣而黃者自裏轉而為裳其失所益甚矣曾氏曰亡失也不須訓為忘緑兮絲兮女所治兮我思古人俾無訧兮朱氏曰女指其君子而言也治謂理而織之也俾使訧過也言緑方為絲而女又治之以比妾方少艾而女又嬖之也然則我將如之何哉我思古人有嘗遭此而善處之者以自厲焉使不至於有過而已愚謂緑之未染也亦絲而已女治之而后為緑妾之未僣也妾而已汝嬖之而后上僣妾不能自僣由絲之不能自緑也絺兮綌兮凄其以風我思古人實獲我心朱氏曰絺綌之遇寒風猶已之過時而見棄也故思古人之善處此者真能先得我心之所求也燕燕衛莊姜送歸妾也鄭氏曰莊姜無子陳女戴媯生子名完莊姜以為己子莊公薨完立而州吁弒之戴媯於是大歸莊姜逺送之于野作詩見己志燕燕于飛差池其羽之子于歸逺送于野瞻望弗及泣涕如雨毛氏曰之子去者也歸歸宗也逺送過禮于外也郊外曰野蘇氏曰禮婦人送迎不出門逺送至野情之所不能已也孔氏曰至野與之訣别已留而彼去稍稍更逺瞻望之復不能及故念之泣涕王氏曰燕方春時以其匹至其羽相與差池其鳴一上一下故莊姜感所見以興焉廣漢張氏曰燕燕以興已與戴媯嫡妾相與之善歟獨言泣涕之情者蓋家國之事有不可勝悲者晉褚太后批桓溫廢立詔云未亡人不幸罹此百憂感念存殁心焉如割其有合於詩人之情歟燕燕于飛頡之頏之之子于歸逺于將之瞻望弗及佇立以泣毛氏曰飛而上曰頡飛而下曰頏佇立久立也鄭氏曰將亦送也燕燕于飛下上其音之子于歸逺送于南瞻望弗及實勞我心仲氏任只其心塞淵終溫且惠淑慎其身先君之思以朂寡人朱氏曰仲氏戴媯字也以恩相信曰任只語辭塞實淵深終竟溫和惠順淑善也先君謂莊公也朂勉也寡人寡德之人莊姜自稱也言戴媯之賢如此又以先君之思勉我使我常念之而不失其守也楊氏曰州吁之暴桓公之死戴媯之歸皆夫人失位不見答于先君所致也而戴媯猶以先君之思勉其夫人真可謂溫且惠矣日月衛莊姜傷已也遭州吁之難傷已不見答于先君以至困窮之詩也廣漢張氏曰緑衣方妾上僣之時故獨反已以自責而已至日月之作則在州吁弒嫡之後於是始推原其致禍之本以為由已不見答於先君之所致亦猶孟子所謂過大而不怨是愈疏也日居月諸照臨下土乃如之人兮逝不古處胡能有定寧不我顧朱氏曰日居月諸呼而訴之也莊姜不見答於莊公故呼日月而訴之言日月之照下土久矣今乃有如是之人而不以古道相處是其心志回惑亦何能有定哉而何為其獨不我顧也見棄如此而猶有望之之意焉此詩之所以為厚也日居月諸下土是冒乃如之人兮逝不相好胡能有定寧不我報王氏曰冒覆也張氏曰以禮事莊公不以恩答已寧不我報是也日居月諸出自東方乃如之人兮德音無良胡能有定俾也可忘毛氏曰日始月盛皆出東方音聲良善也朱氏曰德音美其辭無良醜其實也袁氏曰德音天所同得莊公固有是德音矣以不定之故良心轉為無良甚可惜也日居月諸東方自出父兮母兮畜我不卒胡能有定報我不述朱氏曰畜養卒終也不得於夫而嘆父母養我之不終蓋憂患疾痛之極必呼父母人之至情也吕氏曰左傳曰子叔姬妃齊昭公生舍叔姬無寵舍無威夫人見薄則冢嗣之位望亦輕此國本所以傾搖也莊公既不見答則桓公之位何能有定乎反覆言之蓋推原禍亂之由而非為己私也俾也可忘謂若思莊公恩義之薄嫡庶不定之禍誠使我可忘而我自不忍忘之也末章不欲咎莊公徒自傷父母養我不終而已報我不述言莊公所以報我不欲稱述之矣亦不欲咎莊公也按朱子以此詩為不見答時所作與序文異終風詩母子事今不録雄雉刺衛宣公也淫亂不恤國事軍旅數起大夫久役男女怨曠國人患之而作是詩朱氏曰此詩皆女怨之辭雄雉于飛泄泄其羽我之懷矣自詒伊阻朱氏曰雉野雞泄泄飛之緩也曾氏曰雄雉以喻其夫雄雉于飛雌懷安而不從之今之阻隔蓋自遺也大夫行役婦人本無可從之理其言如此乃怨思之切耳雄雉于飛下上其音展矣君子實勞我心毛氏曰展誠也朱氏曰言誠又言實所以甚言此君子之勞我心也瞻彼日月悠悠我思道之云逺曷云能來朱氏曰悠悠長也鄭氏曰視日月之行迭往迭來今君子獨久行役而不來使我心悠悠然思之曷何也何時能來望之也程氏曰日月取其迭往迭來之意又日月隂陽相配而不相見又旦暮所見動人情思總包意其間百爾君子不知德行不忮不求何用不臧朱氏曰百猶凡也忮害求貪臧善也言凡爾君子豈不知德行乎若能不忮害又不貪求則何所為而不善哉憂其逺行之犯患冀其善處而獲全也吕氏曰婦人思其君子之切而知其未得歸也於是復自解曰凡百君子我婦人不知孰為德行也但不忮害不貪求則何所用而不善雖久處軍旅之間固未害也谷風刺夫婦失道也衛人化其上淫於新昏而棄其舊室夫婦離絶國俗傷敗焉朱子曰皆述逐婦之辭也宣姜有寵而夷姜縊是以其民化之而谷風之詩作所謂一國之事係一人之本者如此習習谷風以隂以雨黽勉同心不宜有怒采葑采菲無以下體德音莫違及爾同死毛氏曰習習和舒貌東風謂之谷風隂陽和而谷風至程氏曰隂陽交和則感隂而成雨其感也隂其成也雨夫婦之道當黽勉和同不宜有怨怒也蓋和則夫婦之道成而室家正如隂陽和而成雨也鄭氏曰此二菜者蔓菁與葍之類也皆上下可食然而其根有美時有惡時采之者不可以根惡時併棄其葉喻夫婦以禮義合顔色相親不可以顔色衰棄其相與之禮程氏曰夫婦之道責其有終德音好音也當期好音無違至於偕老行道遲遲中心有違不逺伊邇薄送我畿誰謂荼苦其甘如薺宴爾新昏如兄如弟朱氏曰遲遲舒行貌違相背也畿門內也荼苦菜薺甘菜宴樂也新昏夫所更娶之妻言我之被棄行於道路遲遲不進蓋其足欲進而心有所不忍如相背然而故夫之送我乃不逺而甚邇亦至其門內而止耳又言荼雖甚苦反甘如薺以比己之見棄其苦有甚於荼而其夫方且宴樂其新昏如兄如弟而不見恤蓋婦人從一而終今雖見棄猶有望其夫之情厚之至也涇以渭濁湜湜其沚宴爾新昏不我屑以母逝我梁毋發我笱我躬不閲遑恤我後朱氏曰涇渭水名湜湜清貌沚水渚也屑潔以與逝之也梁堰石障水而空其中以通魚之往來也笱以竹為器而承梁之空以取魚者也閲容也言涇清渭濁然涇未屬渭之時雖濁而未甚見由二水既合而清濁益分婦人以自比其容貌之衰久矣又以新昏形之益見憔悴然其心固猶有可取者但以故夫之安於新昏故不以我為潔而與之耳歐陽氏曰禁其新昏毋逝我梁毋發我笱言棄妻雖去猶顧惜其家之物既而嘆曰我身不容安得恤後事乎朱氏曰知其不能禁而絶意之辭也就其深矣方之舟之就其淺矣泳之遊之何有何亡黽勉求之凡民有喪匍匐救之朱氏曰潜行曰泳浮水曰遊匍匐手足並行急遽之甚也婦人自陳其治家勤勞之事言我隨事盡其心力而為之深則方舟淺則泳遊不計其有無而强勉以求之又周睦其鄰里鄉黨莫不盡其道也不我能慉反以我為讎既阻我德賈用不售昔育恐育鞠及爾顛覆既生既育比豫於毒朱氏曰慉養阻却鞠窮也此承上章言我於女家勤勞如此女既不我養而反以我為仇讎惟其心既拒郤我之善雖勤勞如此而不見取如賈之不見售也因念其昔時相與為生惟恐其生理窮盡而及爾皆至於顛覆今既遂其生矣乃反比我於毒而棄之乎張子曰育恐謂生於恐懼之中育鞠謂生於困窮之際亦通我有㫖蓄亦以御冬宴爾新昏以我御窮有洸有潰既詒我肄不念昔者伊余來塈朱氏曰㫖美蓄聚御當也洸武貌潰怒色也肄勞塈息也此又言我之所以蓄聚美菜者蓋欲以御冬月乏無之時至於春夏則不食之矣今君子安於新昏而厭棄我是但使御其窮苦之時至於安樂則棄之也又言於我極其武怒而盡遺我以勤勞之事曾不念昔者我之來息時也追言其始見君子之時接禮之厚怨之至也泉水衛女思歸也嫁於諸侯父母終思歸寧而不得故作是詩以自見也鄭氏曰國君夫人父母在則歸寧沒則使大夫寧於兄弟楊氏曰衛女思歸發乎情也其卒也不歸止乎禮義也聖人著之於經以示後世使知適異國者父母終無歸寧之義則能自克者知所處矣毖彼泉水亦流于淇有懷于衛靡日不思孌彼諸姬聊與之謀朱子曰毖泉始出之貌衛女嫁於諸侯父母終思歸而不得故作此詩言毖然之泉水亦流于淇矣我之有懷于衛則亦無日而不思矣是以即諸姬而與之謀為歸衛之計如下兩章所云也吕氏曰諸姬非必俱嫁於此國蓋有所思而欲與親者謀乃人情之常亦非必真得相見也出宿于泲飲餞于禰女子有行逺父母兄弟問我諸姑遂及伯姊朱氏曰泲地名飲餞者古之行者必有祖道之祭祭畢處者送之飲於其側而後行也禰亦地名皆自衛來時所經之處也諸姑伯姊即所謂諸姬也言始嫁來時則固已逺其父母兄弟矣况今父母既終而復可歸哉是以問于諸姑伯姊而謀其可否云爾出宿于干飲餞于言載脂載牽還車言邁遄臻于衛不瑕有害朱氏曰干言地名適衛所經之處也脂以脂膏塗其牽使滑澤也牽車軸也不駕則脫之設之而後行也還旋也旋其嫁來之車也遄疾臻至也瑕何古音相近通用言如是則其至衛疾矣然豈不害於義理乎疑之而不敢遂之辭也我思肥泉兹之永嘆思須與漕我心悠悠駕言出逰以寫我憂朱氏曰肥泉水名須漕衛邑也悠悠思之長也寫除也既不敢歸然其思衛地不能忘也安得出逰於彼而寫其憂乎柏舟共姜自誓也衛世子共伯蚤死其妻守義父母欲奪而嫁之誓而弗許故作是詩以絶之范氏曰衰亂之世淫風大行共姜得禮之正而能守義故以首鄘風也泛彼柏舟在彼中河髧彼兩髦實維我儀之死矢靡他母也天只不諒人只毛氏曰中河河中髧兩髦之見者垂髮至眉子事父母之飾儀匹也矢誓靡無之至也至已之死而無它心諒信也鄭氏曰舟在河中猶婦人之在家是其常處兩髦之人謂共伯也實是我之匹而我不嫁也朱氏曰告其母而質之於天曰何其不信我也序所謂誓而不許者如此不及父者疑時獨母在或非父意耳泛彼柏舟在彼河側髧彼兩髦實維我特之死矢靡慝母也天只不諒人只毛氏曰特匹也慝邪也王氏曰以再嫁為慝則絶之甚矣載馳許穆夫人作也閔其宗國顛覆自傷不能救也衛懿公為狄人所滅國人分散露于漕邑許穆夫人閔衛之亡傷許之小力不能救思歸唁其兄又義不得故賦是詩也鄭氏曰滅者懿公死也露於漕邑者謂戴公也朱氏曰露謂未有宫室而露居也范氏曰先王制禮父母沒則不得歸寧者義也雖國滅君死不得往赴焉義重於亡故也載馳載驅歸唁衛侯驅馬悠悠言至于漕大夫跋涉我心則憂毛氏曰弔失國曰唁悠悠逺貌漕衛東邑草行曰跋水行曰涉范氏曰載馳載驅急也言至于漕思之也朱氏曰夫人父母不在當使大夫寧於兄弟夫人欲自歸唁其兄弟而託以不欲勞大夫之跋涉也既不我嘉不能旋反視爾不臧我思不逺既不我嘉不能旋濟視爾不臧我思不閟鄭氏曰嘉善也爾許人也臧善也吕氏曰許人既不以我歸衛為善則我亦不能還反於衛矣為許人者盍亦視爾父子兄弟之間有災患不臧其心如之何則我之思不逺矣不閟謂曉然易見初不閟也陟彼阿丘言采其虻女子善懷亦各有行許人尤之衆稚且狂毛氏曰偏髙曰阿丘虻貝母也曾氏曰善懷猶善思也鄭箋善猶多也女子之於懷思甚於男子朱氏曰善懷多憂思也猶漢書岸善崩也又曰將欲升髙望逺以舒憂想之情言采其虻以療鬱結之疾吕氏曰女子善懷亦各有行言女子雖多懷思然今之所以迫切者亦各有道他人不知則以為女子情性之常而尤之也衆稚且狂非真指許人以為稚狂蓋言我憂患如此之迫切彼方且尤我之歸意者衆人其幼稚乎其狂惑乎不然何其不相體悉不識緩急一至於是也我行其野芃芃其麥控于大邦誰因誰極大夫君子無我有尤百爾所思不如我所之毛氏曰願行衛之野麥芃芃然方盛長朱氏曰控持而告之也因如因魏莊子之因毛氏曰極至也朱氏曰言我將行其野涉芃芃之麥而控告于大邦然未知其將何所因而何所至乎雖大夫君子為我思所以處此者百方然不如使我得自盡其心之為愈也王氏曰此終欲歸唁之辭竹竿衛女思歸也適異國而不見答思而能以禮者也范氏曰夫婦之際猶君臣之交或遇或不遇命也進不見答退不得歸則如之何以禮自止而已衛之賢女唯安於義命是以雖憂而不困也籊籊竹竿以釣于淇豈不爾思逺莫致之毛氏曰籊籊長而殺也朱氏曰此言思以竹竿釣于淇水而逺不可致也泉源在左淇水在右女子有行逺父母兄弟李氏曰言舊時遊泳二水之間其樂如此今也嫁於異國而不得見也故曰云云愚謂此文雖思二水之間然念方其有行已逺父母兄弟矣今可復思歸乎此亦止乎禮義之意淇水在右泉源在左巧笑之瑳佩玉之儺毛氏曰瑳巧笑貌儺行有節度歐陽氏曰思衛女之在其國者巧笑佩玉威儀間暇樂然於二水之上念已有所不如也淇水悠悠檜楫松舟駕言出逰以寫我憂毛氏曰悠悠流貌檜柏葉松身楫所以櫂舟朱氏曰與泉水卒章同意河廣宋襄公母歸于衛思而不止故作是詩也鄭氏曰宋桓公夫人衛文公之妹生襄公而出孔氏曰夫人為先君所出其子承父之重與祖為一體母出與廟絶不可以私反故義不得也范氏曰夫人之不往義也天下豈有無母之人歟有千乘之國而不得養其母則人之不幸也為襄公者將若之何生則致其孝沒則盡其禮而已衛有婦人之詩自莊姜至於襄公之母六人焉皆止於禮義而不敢過也夫以衛之政教淫僻風俗傷敗然而女子猶知有禮而畏義如此蓋以先王之化所及也誰謂河廣一葦杭之誰謂宋遠跂豫望之鄭氏曰誰謂河水廣與一葦加之則可以渡之喻狹也今我之不渡直自不往耳非為其廣豫我也誰謂宋國逺與我跂足則可以望見之亦喻近也今我不往直以義不往耳非為其逺誰謂河廣曾不容刀誰謂宋逺曾不崇朝鄭氏曰不容刀亦喻狹小船曰刀崇終也行不終朝亦喻近伯兮刺時也言君子行役為王前驅過時而不反焉鄭氏曰衛宣公之時蔡人衛人陳人從王伐鄭范氏曰居而相離則思期而不至則憂此人之常情也文王之遣戍役周公之東征其詩皆叙其室家之情男女之思以閔之故其民說而忘死聖人能通天下之志故能成天下之務兵者毒民於死地者也孤人之子寡人之妻傷天地之和致水旱之災故聖王重之如不得已而行則告以歸期念其勤勞哀傷慘怛不啻如在已是以詩美之則言其君上之憫恤刺之則録其室家之怨思以為人情不出乎此也伯兮朅兮邦之桀兮伯也執殳為王前驅鄭氏曰伯君子字也毛氏曰朅武貌鄭氏曰桀英桀朱氏曰婦人自言其君子之才之美如是今乃執殳而為王前驅也自伯之東首如飛蓬豈無膏沐誰適為容朱氏曰蓬草名其華似柳絮聚而飛如亂髮也膏所以澤髮者沐滌首去垢也適主也言我髦亂如此非無膏沐可以為容所以不為者君子行役無所主而為之故也傳曰女為說已容其雨其雨杲杲出日願言思伯甘心首疾朱氏曰其者冀其將然之辭言冀其將雨而杲然日出以比望其君子之歸而不歸也是以不堪憂思之苦而寧甘心於首疾也焉得諼草言樹之背願言思伯使我心痗背音佩痗音每又音悔毛氏曰諼草可以忘憂背北堂也孔氏曰何處得一忘憂之草我樹之於北堂之上冀觀之以忘憂朱氏曰思得草之美者玩以忘憂然世豈有是哉則亦思之不已而心痗焉爾心痗則其病愈深非特首疾而已也女曰雞鳴刺不說德也陳古義以刺今不說德而好色也女曰雞鳴士曰昧旦子興視夜明星有爛將翺將翔弋鳬與雁朱氏曰昧晦旦明也昧旦天欲旦晦明未辨之際也明星啓明之星先日而出者也弋繳時謂以生絲繫矢而射鳬水鳥如鴨此詩人述賢夫婦相警戒之辭言女曰雞鳴以警其夫而士曰昧旦則不止於雞鳴矣婦人又語其夫曰若是則子可以起而視夜之如何意者明星已出而爛然則當翺翔而往弋取鳬雁而歸矣其相與警戒之言如此則不流于宴昵之私可知矣弋言加之與子宜之宜言飲酒與子偕老琴瑟在御莫不靜好朱子曰加中也史記所謂以弱弓微繳加諸歸雁之上是也宜和其所宜也內則所謂雁宜麥之屬是也知子之來之雜佩以贈之知子之順之雜佩以問之知子之好之雜佩以報之朱氏曰來之致其外者雜佩者左右佩玉也吕氏曰非獨玉也觹燧針管帉帨凡可佩者皆是也贈送順愛問遺也朱氏曰婦又語其夫曰我茍知子之所致而來及所親愛者則將解此雜佩以送遺報答之蓋不惟治其門內之職又欲其君子親賢友善結其歡心而無所愛于服飾之玩也張氏曰言婦人之好德甚於男子以上皆婦人之詩或踈棄擯逐而有忠厚惻怛之言或優遊暇豫而有針誡諷切之益所謂發乎情止乎禮義者具見於此然豈獨婦人所當佩服哉凡為臣子者茍能玩繹其辭指以養胸中和平之氣則邇之事父逺之事君處常盡變綽乎其有餘裕矣後世惟班婕妤自悼賦庶幾乎此其末章曰顧左右兮和顔酌羽觴兮銷憂惟人生兮一世忽已過兮若浮已獨享兮髙明處生民兮極休勉虞精兮極樂與福祿兮無期緑衣兮白華自古兮有之婕妤為趙飛燕姊弟所讒退共養長信宫而作此朱子序之以為其情雖出于幽怨而能引分以自安援古以自慰和平中正不過於慘傷其德性之美學問之力有過人者嗚呼賢哉又按柏舟之不再適蓋婦人之大節故孔子列之于鄘風之首使萬世取法焉其後有魯寡陶嬰者少寡養幼孤無强昆弟紡績為産魯人或聞其義將求焉嬰聞之恐不得免作歌明已之不更二也其歌曰悲夫黃鵠之早寡兮七年不雙宛頸獨宿兮不與衆同夜半哀鳴兮想其故雄天命早寡兮獨宿何傷寡婦念此兮泣下數行嗚呼哀哉死者不可忘飛鳥尚然兮況於貞良雖有賢雄兮終不再行魯人聞之曰斯人不可得已遂不復敢求嬰寡終身不改又梁寡髙行者梁之寡婦也其為人榮於色而美於行夫死早寡不嫁梁貴人多爭欲娶而不能得梁王聞之使相聘焉髙行曰妾聞婦人之義一往而不改以全貞信之節今忘死以趨生是不信也貪貴而忘賤是不貞也棄義而從利無以為人乃援鏡持刀自割其鼻曰妾已刑矣所以不死者不忍幼弱之重孤也於是相以報王大其義而髙其行乃復其身尊其號曰髙行陳寡孝婦者年十六而嫁未有子其夫當行戍且行時屬孝婦曰我生死未可知幸有老母無他兄弟倘不還汝肯養吾母乎婦曰諾夫果死不還婦養姑不衰居喪三年父母哀其少無子而早寡也將取而嫁之孝婦曰妾聞之信者人之幹也義者行之節也夫且行屬妾以其母既諾之夫受人之託豈可棄哉棄託不信背死不義不可也母固欲嫁之孝婦不從因欲自殺父母懼而不敢嫁養其姑二十八年姑死葬之終奉祭祀淮隂太守以聞漢文帝賜之黃金四十斤復之終身無所與號曰孝婦是三人者庶乎有柏舟之風矣諸史尚多有之今不録或問於程子曰孀婦於禮似不可取如何曰然凡取以配身也若取失節者以配身是已失節也又問或有孤孀貧窮無託者可再嫁否曰只是後世怕寒餓死故有是說然餓死事極小失節事極大程子之論可為世深戒故併著焉孔子曰婦有七出三不去不順父母出謂其逆德也無子出謂其絶世也淫僻出謂其亂族嫉妬出謂其亂家惡疾出謂其不可供粢盛多言出謂其離親竊盜出謂其反義三不去有所取無所歸一也何休取作受又云不窮窮也與共更三年之喪二也先貧賤後富貴三也按禮記諸侯出夫人夫人比至於其國以夫人之禮行至以夫人入行道以夫人之禮者棄妻致命其家乃義絶不用此為貽疏曰出夫人謂夫人有罪諸侯出之今歸本國使者將命曰寡君不敏不能從而事社稷宗廟使臣某敢告于執事主人對曰寡君固前辭不教矣前辭不教謂納采時也有司官陳器二三人有司亦官受之器皿其本所賫物也律棄妻畀所齊朱子曰上三節諸侯禮也妻出夫使人致之曰某不敏不能從而供粢盛使某也敢告于侍者主人對曰某之子不肖不敢辟誅敢不敬須以俟命使者退主人拜送之朱子曰此一節卿大夫之禮也如舅在則稱舅沒則稱兄無兄則稱夫言棄妻者父兄在則稱之命當由尊者出也唯國君不稱兄主人之辭曰某之子不肖姑姊妹亦皆稱之姑姊妹見棄亦曰某之姑某之姊若妹不肖朱子曰此兩節通禮也雜記古者於出妻之事雍容有禮如此所以重匹耦也又家語曾參後母遇之無恩而供養不衰及其妻以藜蒸不熟因出之人曰非七出也參曰藜蒸小物耳猶不用吾命況大事乎遂出之終身不娶其子元請焉參曰髙宗以後妻殺孝已尹吉甫以後妻放伯竒吾上不及髙宗中不比吉甫庸知其得免於非乎或問於程子曰妻可出乎曰妻不賢出之何害如子思亦嘗出妻今世俗乃以出妻為醜行遂不敢為古人不如此妻有不善便當出也又問古人出妻有以對姑叱狗藜蒸不熟者亦無甚惡而遂出之何也曰此古人忠厚之道古之人交絶不出惡聲君子不忍以大罪出其妻而以微罪去之以此見其忠厚之至也且如叱狗親前亦有甚大故不是處只為他平日有故因此一事出之爾或曰彼以此細故見逐安能無辭兼他人不知是否則如之何曰彼必自知其罪但已理直足矣何必求他人知然有識者當自知之也如必待彰暴其妻之不善使他人知之是亦淺丈夫而已大凡人說話多欲令彼曲我直若君子自有一個含容意思或曰古語有之出妻令可嫁出友令可交乃此意否曰是也味程子此言則古人非大故無出妻之理後世其可輕為之哉禮記子甚宜其妻父母不悅出鄭氏曰宜猶善也子不宜其妻父母曰是善事我子行夫婦之禮焉沒身不衰內則曰按此正七出之第一條也文中子曰早婚少聘教人以偷妾媵無數教人以亂言棄古禮是掌教者之罪且貴賤有等一夫一婦庶人之職也愚按古者自天子至於士庶人妻妾媵各有等降之數後世惟力是視而已此文中子所以嘆也夫正家之本由於夫婦之各正治家以禮而無寵昵之偏使嫡妾之序紊失夫之正也撫下以恩而無妬忌之失使怨曠之禍興失婦之正也得其正則家治失其正則家亂此必然之理也至於妾媵猥多未有不為家之害者內或陷子弟於惡外或生童僕之變無所不有欲正其家者於此尤不可不戒故以是章終焉西山讀書記卷十三
