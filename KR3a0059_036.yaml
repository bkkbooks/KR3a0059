body:
  text: 西山讀書記卷三十六宋真徳秀撰吾道異端之辨下揚子曰舍舟航而濟乎瀆者末矣舍五經而濟乎道者末矣棄常珍而嗜乎異饌者惡覩其識味也委大聖而好乎諸子者惡覩其嗜道也山􅠌之􅀈不可勝由矣向牆之户不可勝入矣曰惡由入曰孔氏孔氏者户也又曰述正道而稍邪哆者有矣未有述邪哆而稍正也古者楊墨塞路孟子辭而闢之廓如也後之塞路者有矣竊自比於孟子按子雲此言不可謂無意於衛道者然其論老子以言道徳為有取則未可謂知道者夫未能知道而欲以衛道自任可乎此所以見譏於程子也或問人有倚孔子之牆弦鄭衛之聲誦韓莊之書則引諸門乎曰在夷貉則引之倚門牆則麾之按此論得之故韓子取以為法焉或問道曰道也者通也無不通也或曰可以適它與曰適堯舜文王為正道非堯舜文王為它道君子正而不它狙詐之家曰狙詐之計不戰而屈人兵堯舜也書不經非書也言不經非言也言書不經多多贅矣莊楊蕩而不法墨晏儉而廢禮申韓險而無化鄒衍迃而不信多聞見而識乎正道者正識也多聞見而識乎邪道者迷識也或問儀秦學乎鬼谷術而習乎縦横言安中國者各十餘年是夫曰詐人也聖人惡諸曰孔子讀而儀秦行何如也曰甚矣鳯鳴而鷙翰也然則子貢不為與曰亂而不解子貢恥諸說而不富貴儀秦恥諸曰仲尼之道猶四瀆也經營中國終入大海他人之道者西北之流也綱紀夷貉或入於沱或淪於漢淮南說之用不如太史公之用也太史公聖人將有取焉淮南鮮取焉爾必也儒乎乍出乍入淮南也文麗用寡長卿也多愛不忍子長也仲尼多愛愛義也子長多愛愛竒也或問人言仙者有諸乎吁吾聞宓羲神農殁黄帝堯舜殂落而死文王畢孔子魯城之北獨子愛其死乎非人之所及也仙亦無益子之彚矣或曰聖人不師仙厥術異也聖人之於天下恥一物之不知仙人之於天下恥一日之不生曰生乎生乎名生而實死也或曰世無仙則焉得斯語曰語乎者非囂囂也與惟囂囂能使無為有或問仙之實曰無以為也有與無非問也問也者忠孝之問也忠臣孝子偟乎不偟有生者必有死有始者必有終自然之道也按道家養生之說出於老子如谷神章其最要也莊子云黄帝見廣成子於空同之上順下風膝行而進曰敢問治身奈何而可以長久廣成子曰善哉至道之精窈窈冥冥至道之極昏昏黙黙無視無聽抱神以静形將自正必靜必清無勞汝形無揺汝精乃可以長生此其至要之言也其後道家者流推而衍之乃有神仙飛昇之說時君之信其術者自燕昭王始秦始漢武溺之尤甚武帝蓋晩而後悟善乎谷永之論曰明於天地之性者不可惑以神怪知萬物之情者不可罔以非類諸背仁義之正道不遵五經之法言而盛稱竒怪鬼神廣崇祭祀之方求報無福之嗣及世有仙人服食不終之藥遙興輕舉登遐到景覽觀縣圃浮游蓬莱耕耘五徳朝種暮穫與山石無極黄冶變化堅氷淖溺化色五倉之術者皆姦人惑衆挾左道懐詐偽以欺㒺世主聽其言洋洋滿耳若將可遇求之盪盪如係風捕景終不可得是以明主距而不聽聖人絶而不語唯陛下距絶此類毋令姦人有所窺朝者成帝末年頗好鬼神多上書言祭祀者故永之論如此朱子以為發端數語蓋必古人遺言非永所能道也歐陽氏序黄庭經曰自古有道無僊而後世之人知有道而不得其道不知無僊而妄學仙此我之所哀也道者自然之理也生而必死亦自然之理也以自然之道養自然之生不自戕賊夭閼而盡其天年此自古聖智之所同也禹走天下乘四載治百川可謂勞其形矣而夀百年顔子蕭然卧於陋巷簞食瓢飲外不誘於物内不動於心可謂至樂矣而年不及三十斯二人者皆古之仁人也勞其形者長年安其樂者短命蓋命之長短稟之於天非人力之所為也惟不自戕賊而各盡其天年則二人之所同也此所謂以自然之道養自然之生後世貪生之徒為養生之術者無所不至至茹草木服金石吸日月之精光又有以謂此外物不足恃而反求諸内於是息慮絶欲鍊精氣勤吐納専於内守以養其神其術雖本於貪生及其至也尚或可以全形而卻疾猶愈於肆欲稱情以害其生者也謂養内之術故上智任之自然其次養内以卻疾最下妄意而貪生問神仙飛昇之說有諸程子曰若謂白日飛昇之類則無之若言居山林間保形鍊氣以延年益夀則有之譬如一爐火置之風中則易過置之於密室則難過有此理也又問揚子言聖人不師仙厥術異也聖人能為此等事否曰此是天地間一賊若非竊造化之機豈能延年使聖人肯為周孔為之矣人有語導氣者問程子曰君亦有術乎曰吾甞夏葛而冬裘飢食而渇飲節嗜欲定心氣如斯而已矣朱子詩曰盜啟元命袐竊當生死闗又曰但恐逆天理偷生詎能安是亦程子之意至其釋屈原逺遊於所謂一氣孔神兮於中夜存毋滑其魂兮彼將自然虚以待之兮無為之先則深取之以為養生之至言雖廣成子之告黄帝者曽不過是則其意亦可識矣後世方士眩惑人主如冦謙之栁泌趙歸真之屬可為世主戒者別著之晉范氏甯曰王何之罪甚於桀紂或以為太過甯曰王何滅棄典文幽沈仁義游辭浮說波蕩後生桀紂縦暴一時適足以喪身覆國豈能回百姓之觀聽哉故愚以自喪之惡小迷衆之罪大也按魏正始中何晏等祖述老莊以清談相尚至晉此風益甚晏甞立論以天地萬物皆以無為本由是士大夫皆以浮誕為美裴頠著崇有論以釋其蔽然不能救也陳頵甞遺王導書以老莊之俗傾惑朝廷速宜改張然後大業可舉導不能從一時名士如庾亮輩皆以清談為風流之宗國子祭酒袁瓌甞請立太學而士大夫習尚莊老儒術終以不振㑹稽王昱敖洗等又從而扇之雖謝安石之賢不免為習俗所移甯獨好儒學故為此論然終於晉亡而不能革至梁武帝好佛而太子又講莊老詹事何敬容歎曰西晉尚浮虚使中原淪於胡羯今江東復爾江南其為戎乎其後元帝好𤣥談於龍光殿講老子胡氏論之曰老子之言其害非釋氏比也然棄仁義捐禮樂以為道遺物離人趨於澹泊而生人之治忽矣或問曹參治齊師蓋公其相漢也以清淨文景之治大率依本黄老約躬省事薄斂緩獄不言兵而天下富老子之教亦何負與曰蓋公之語參曰治道貴清淨而民自定此在老子書中一語爾此一語非有搥提仁義滅絶禮教之失也故參用之務為休息不擾至於文景斯極功矣雖然庶矣富矣而未及於教也比之二帝三王化民成俗之道可同日語哉又況掇拾其𤣥談清論而不切於事理有如西晉至使胡羯氐羌腥薰岱華幾三百年仲尼之道豈有此禍哉彼蕭繹曽何足云然方在漂揺隉杌中不思保國之計而講老子近有簡文不知監也其亦愚蔽之甚矣又曰自何晏王弼以老莊之書訓釋大易王衍葛𤣥競相慕效専事清談糟粕五經蔑棄本實風流波蕩晉遂以亡又曰為清談者以心與迹二道與事殊形器法度皆芻狗之餘視聴言動非性命之理此其所以大失而不自知也何晏王衍自喪其身喪人之國者如出一軌後世宗師釋氏其弊又甚於清談其教源之差則亦相類耳愚按文中子有曰清談甚而晉室衰非老莊之罪也夫清談之弊正祖於老莊謂非其罪可乎近歳文士又謂自正始以風流相命賞好成俗士雖坐談空解不畏臨戎􅀈袴子弟能破百萬兵矣是清談致效而非喪邦也夫卻敵者臨戎之功而喪邦由清談所致其得失自不相掩而曰清言致效可乎此所謂反理之評不得不辨韓子原道曰博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎已無待於外之謂徳仁與義為定名道與徳為虚位故道有君子有小人而徳有凶有吉老子之小仁義非毁之也其見者小也坐井而觀天曰天小者非天小也彼以煦煦為仁孑孑為義其小之也則宜其所謂道道其所道非吾所謂道也其所謂徳徳其所徳非吾所謂徳也凡吾所謂道徳云者合仁與義言之也天下之公言也老子之所謂道徳云者去仁與義言之也一人之私言也周道衰孔子沒火於秦黄老於漢佛於晉宋魏齊梁隋之間其言道徳仁義者不入於楊則入於墨不入於老則入於佛入於彼必出乎此入者主之出者奴之入者附之出者汙之噫後之人其欲聞仁義道徳之說孰從而聽之老者曰孔子吾師之弟子也佛者曰孔子吾師之弟子也為孔子者習聞其說樂其誕而自小也亦曰吾師亦甞云耳不惟舉之於其口而又筆之於其書噫後之人雖欲聞仁義道徳之說其孰從而求之甚矣人之好怪也不求其端不訊其末惟怪之欲聞古之為民者四今之為民者六古之教者處其一今之教者處其三農之家一而食粟之家六工之家一而用器之家六賈之家一而資焉之家六奈之何民不窮且盜也古之時人之害多矣有聖人者立然后教之以相生養之道為之君為之師驅其蟲蛇禽獸而處之中土寒然後為之衣飢然後為之食木處而顛土處而病也然後為之宫室為之工以贍其器用為之賈以通其有無為之醫藥以濟其夭死為之葬埋祭祀以長其恩愛為之禮以次其先後為之樂以宣其湮鬱為之政以率其怠勌為之刑以鋤其强梗相欺也為之符璽斗斛以信之相奪也為之城郭甲兵以守之害至而為之備患生而為之防今其言曰聖人不死大盜不止剖斗折衡而民不争嗚呼其亦不思而已矣如古之無聖人人之類滅久矣何也無羽毛鱗介以居寒熱也無爪牙以争食也是故君者出令者也臣者行君之令而致之民者也民者出粟米麻絲作器皿通貨財以事其上者也君不出令則失其所以為君臣不行君之令而致之民民不出粟米麻絲作器皿通貨財以事其上則誅今其法曰必棄而君臣去而父子禁而相生養之道以求其所謂清浄寂滅者嗚呼其亦幸而出於三代之後不見黜於禹湯文武周公孔子也其亦不幸而不出於三代之前不見正於禹湯文武周公孔子也帝之與王其號名殊其所以為聖一也夏葛而冬裘渇飲而飢食其事殊其所以為智一也今其言曰曷不為太古之無事是亦責冬之裘者曰曷不為葛之之易也責飢之食者曰曷不為飲之之易也傳曰古之欲明明徳於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意然則古之所謂正心而誠意者將以有為也今也欲治其心而外天下國家滅其天常子焉而不父其父臣焉而不君其君民焉而不事其事孔子之作春秋也諸侯用夷禮則夷之夷而進於中國則中國之經曰夷狄之有君不如諸夏之亡詩曰戎狄是膺荆舒是懲今也舉夷狄之法而加之先王之教之上幾何其不胥而為夷也夫所謂先王之教者何也博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎已無待於外之謂徳其文詩書易春秋其法禮樂刑政其民士農工賈其位君臣父子師友賓主昆弟夫婦其服麻絲其居宫室其食粟米果蔬魚肉其為道易明而為教易行也是故以之為己則順而祥以之為人則愛而公以之為心則和而平以之為天下國家無所處而不當是故生則得其情死則盡其常郊焉而天神假廟焉而人鬼饗曰斯道也何道也曰斯吾所謂道也非向所謂老與佛之道也堯以是傳之舜舜以是𫝊之禹禹以是𫝊之湯湯以是𫝊之文武周公文武周公傳之孔子孔子𫝊之孟軻軻之死不得其𫝊焉荀與揚也擇焉而不精語焉而不詳由周公而上上而為君故其事行由周公而下下而為臣故其說長然則如之何其可也曰不塞不流不止不行人其人火其書廬其居明先王之道以道之鰥寡孤獨癈疾者有養也其亦庶乎其可也又與孟簡書曰䝉恵書云有人𫝊愈近少奉釋氏者妄也潮州時有一老僧號大顛頗聰明識道理逺地無可與語者故自山召至州郭留十數日實能外形骸以理自勝不為事物侵亂與之語雖不盡解要自以為難得因與來往及祭神至海上遂造其廬及來袁州留衣服為别乃人之情非崇信其法求福田利益也孔子云丘之禱久矣凡君子行已立身自有法度聖賢事業具在方冊可效可師仰不愧天俯不愧人内不愧心積善積惡殃慶自各以其類至何有去聖人之道捨先王之法而從夷狄之教以求福利也詩不云乎豈弟君子求福不回傳又曰不為威惕不為利疚假如釋氏能與人為禍祟非守道君子之所懼也況萬萬無此理且彼佛者果何人哉其行事類君子邪小人邪若君子也必不妄加禍於守道之人如小人也其身已死其鬼不靈天地神祗昭布森列非可誣也又肯令其鬼行胷臆作威福於其間哉進退無所據而信奉之亦且惑矣且愈不助釋氏而排之者其亦有說孟子云今天下不之楊則之墨楊墨交亂而聖賢之道不明則三綱淪而九法斁禮樂崩而夷狄横幾何其不為禽獸也故曰能言距楊墨者皆聖人之徒也揚子雲云古者楊墨塞路孟子辭而闢之廓如也夫楊墨行正道廢且將數百年以至於秦卒滅先王之法燒除其經坑殺學士天下遂大亂及秦滅漢興且百年尚未知修明先王之道其後始除挾書之律稍求亡書招學士經雖多得皆殘缺十亡二三故學士多老死新者不見全經不能盡知先王之事各以所見為守分離乖隔不合大公二帝三王羣聖人之道於是大壞後之學者無所尋逐以至於今泯泯也其禍出於楊墨肆行而莫之禁故也孟子雖賢聖不得位空言無施雖切何補然賴其言而今學者尚知宗孔氏崇仁義貴王賤霸而已其大經大法皆亡滅而不救壞爛而不收所謂存十一於千百安在其能廓如也然茍無孟氏則皆服左袵而言侏離矣故愈甞推尊孟氏以為功不在禹下者為此也漢已來羣儒區區修補百孔千瘡隨亂隨失其危如一髮引千鈞綿綿延延寢以微滅於是時也而唱釋老於其間鼔天下之衆而從之嗚呼其亦不仁甚矣釋老之害過於楊墨韓愈之賢不及孟子孟子不能救之於未亡之前而韓愈乃欲全之於已壞之後嗚呼其亦不量其力且見其身之危莫之救以死也雖然使其道由愈而粗傳雖滅死萬萬無恨天地鬼神臨之在上質之在傍又安得因一摧折自毁其道以從於邪也又送浮屠文暢師序曰人固有儒名而墨行者問其名則是校其行則非可以與之逰乎如有墨名而儒行者問其名則非校其行則是可以與之遊乎楊子雲稱在門墻則麾之在夷狄則進之吾取以為法焉文暢喜文章其周遊天下凡有行必請於搢紳先生以求咏歌其所志貞元十九年春將行東南栁君宗元為之請解其裝得所叙詩累百餘篇非至篤好其何能致多如是耶惜其無以聖人之道告者而徒舉浮屠之說贈焉夫文暢浮屠也如欲聞浮屠之說當自就其師而問之何故謁吾徒而來請也彼見吾君臣父子之懿文物之盛其心有慕焉拘其法而未能入故樂聞其說而請之如吾徒者宜當告之以二帝三王之道日月星辰之行天地之所以著鬼神之所以幽人物之所以蕃江河之所以流而語之不當又為浮屠之說而瀆告之也民之初生固若禽獸夷狄然聖人者立然後知宫居而粒食親親而尊尊生者養而死者藏是故道莫過乎仁義教莫大乎禮樂刑政施之於天下萬物得其宜措之於其躬體安而氣平堯以是𫝊之舜舜以是𫝊之禹禹以是𫝊之湯湯以是𫝊之文武文武以是傳之周公孔子書之於冊中國之人世守之今浮屠者孰為而孰𫝊之邪夫鳥俛而啄仰而四顧夫獸深居而簡出懼物之為己害也猶且不脫焉弱之肉强之食今吾與文暢安居而暇食優游以生死與禽獸異者寜可不知其所自耶按後漢永平八年楚王英奉黄縑白紈詣國相曰託在蕃輔過惡累積奉送縑帛以贖愆咎詔報曰楚王通黄老之微言尚浮屠之仁祠潔齋三月與神為誓何嫌何疑當有悔吝其還所贖以助伊蒲塞桑門之盛饌初帝聞西域有神其名曰佛因遣使之天竺求其道得其書及沙門以來其書大抵以虚無為宗貴慈悲不殺以為人死精神不滅隨復受形生時所行善惡皆有報應故所貴修鍊精神以至為佛善為宏濶勝大之言以勸誘愚俗精於其道者號曰沙門於是中國始傳其術圖其形像而王公貴人獨楚王英最先好之又後魏釋老志曰按漢武元狩中遣霍去病討匈奴至臯蘭過居延斬首大獲昆邪王殺休屠王將其衆五萬來降獲其金人帝以為大神列於甘泉宫金人率長丈餘不祭祀但燒香禮拜而已此則佛道流通之漸也及開西域遣張騫使大夏還傳其旁有身毒國一名天竺始聞有浮屠之教哀帝元夀元年博士弟子秦景憲受大月氏王使伊存口授浮屠經中土聞之未之信了也後孝明夜夢金人頂有白光飛行殿庭乃訪羣臣傅毅始以佛對遣使於天竺冩浮屠遺範乃與沙門攝摩騰竺法蘭東還洛陽中國有沙門及跪拜之法自此始也又得佛經四十二章及釋迦像明帝令畫工圖置清涼臺及顯節陵上經緘於蘭臺石室使之還也以白馬負經而至漢因立白馬寺於洛城雍闗西浮屠正號曰佛陁佛陁與浮屠聲相近皆西方言其來轉為二音華言譯之則曰淨覺其經大抵言生生之類皆因行業而起有過去當今未來歴三世識神常不滅凡為善惡必有報應漸積勝業陶冶麤鄙經無數形藻鍊神明乃致無生而得佛道其間階次心行等級非一皆縁淺以至深藉微而至著率在於積仁順蠲嗜慾習虚静而成通照也故其始修心則依佛法僧謂之三歸又有五戒去殺盜婬妄言飲酒奉之則生天人勝處虧犯則墜鬼畜諸苦惡生處凡有六道焉其為沙門者初修十誡曰沙彌而終於二百五十則具足成大僧婦人曰比丘凡其誡至於五百皆以浮為本隨事增數在於防心攝身正口心去貪忿癡身除殺婬盜口斷妄雜諸非正言總謂之十善道能具此謂之三業清浄凡人修行有三種其根業大差謂之三乘聲聞乗縁覺乗取其可乗運以至道為名此之人惡迹已盡但修心盪累濟物進徳初根人為小乗行四諦法中根人為中乗受十二因縁上根人為大乗則修六度雖階三乗而要由修進仁行拯度羣生乃可登佛境矣所謂佛者本號釋迦文者譯言能仁謂道充徳盛堪濟萬物也釋迦前有六佛釋迦繼六佛而成道釋迦者天竺迦維衛國王之子天竺其總稱迦維名也初釋迦以四月八日生姿相超異者三十二種生時當周莊王九年春秋魯莊公七年夏四月恒星不見夜明是也年三十成佛導化羣生四十九載乃於拘尸那城娑羅雙樹間入般湼槃湼槃譯言滅度或言常樂我浄明無遷謝及諸苦累也諸佛法身有二種義一者真實二者權應真實身謂至極之體妙絶拘累不得以方處期不可以形量限有感斯應體常湛然權應身者謂和光六道同塵萬類生滅隨時修短應物形由感生體非實有惟形雖謝真體不遷但時無妙感莫得常見耳明佛生非實生滅非實滅也既湼槃後有聲聞弟子大迦葉等五百人撰集著録阿難親承囑授多聞總持蓋能綜覈深致無所漏失乃綴文字撰載三藏十二部經如九流之異統其大歸終以三乗為本漢明帝時云云桓帝時襄楷言佛陀黄老道以諫欲令好生惡殺少嗜慾去奢泰尚無為魏明帝曽欲壞宫西佛圖沙門乃金槃盛水置於殿前以佛舍利投之於水乃有五色光起於是帝歎異之後有天竺沙門曇柯迦羅入洛宣譯誡律中國誡律之始也自洛中構白馬寺盛飾佛圗畫迹甚妙為四方式凡宫㙮制度猶依竺舊狀而重構之從一級至三五七九世人相承謂之浮圖或云佛圖晉世洛中佛圖有四十二所矣晉元康中有胡沙門支恭明譯維摩法華等經微言隠義未之能究後有沙門衛道安性聰敏日誦經萬餘言研求幽㫖既無師匠獨坐静室十二年覃思構精神悟妙賾以前所出經多有舛駁乃正其謬石勒時有佛圖澄為勒所宗澄卒後中國紛亂道安乃率門徒南逰新野欲令𤣥宗所在流布分遣弟子各趣諸方法汰詣楊州法和入蜀道安與慧逺之襄陽道安後入苻堅堅宗以師禮時西域有胡沙門鳩摩羅什思通法門道安思與講釋勸堅致羅什道安卒後羅什至長安道安所正經義與羅什譯出符㑹如一於是法㫖大著中原後魏太祖天興元年下詔曰佛法之興其來逺矣濟益之功㝠及存没勅有司於京城中飾整宫舍令信尚之徒有所舍止其後累朝彌加崇敬是時鳩摩羅什為姚興所重於長安草堂寺集義學八百人重譯經本羅什聰辨有淵思達東西方言時沙門道彤等數人與羅什共相提挈發明幽致諸大經論十有餘部更定章句辭義通明彤等皆識學洽通僧肇尤為其最羅什之撰譯僧肇常執筆定諸辭義學者宗之魏世祖初即位每引髙徳沙門與其談論於四月八日與佛像行於通衢帝御樓臨觀散花以致禮敬及得冦謙之信行其術司徒崔浩亦奉謙之道尤不信佛與帝言數加非毁帝頗信之後以伐蓋呉至長安先是長安沙門種麥寺内御騶牧馬於麥中帝入觀馬沙門飲從官酒從官入其便室見有弓矢矛楯帝怒以爲與蓋吴通謀又閱其財産得釀具及婬亂之迹浩因進說詔誅長安沙門焚破佛像及下四方行之時真君七年三月也崔浩死帝頗悔之禁稍寬弛髙宗即位詔諸州縣各聽建佛圖一所任其財用不制㑹限其欲為沙門者不問長幼聽其出家天下承風朝不及夕往時所毁圖寺仍還修矣孝文太和中數幸永寜寺設齋聽講時京城内寺新舊且百所僧尼二千餘人四方諸寺六千四百七十八僧尼七萬七千二百五十八人自魏有國至於禪代佛經流通中國凡有四百一十五部合一千九百一十九卷正光以後天下多虞工役尤甚於是所在編民相與入道假慕沙門實避調役猥濫之極自中國之有佛法未之有也略計僧尼二百萬寺三萬有餘流弊不歸一至於此識者所以嘆息也隋經籍志所叙畧同者不録其云魏黄初中中國人始依佛戒剃髮為僧晉太始中有月支沙門竺法護西遊諸國大得佛經至洛翻譯部數甚多佛法東流自此而盛姚萇時胡僧至長安數十輩惟鳩摩羅什才徳最優與曇摩羅懺等所譯經典不可勝記自是佛法流通遍於四海梁武大崇佛法於華林園中總集釋氏經典凡五千四百卷隋開皇初高祖普詔天下任聽出家仍令計口出錢營造經像而京師及諸郡都邑之處並官寫一切經置於寺内而又別寫藏於秘閣天下之人從風而靡競相景慕民間佛經多於六經數十百倍合魏隋二史志觀之則漢明以後已有佛法至晉以後始盛故韓子曰佛於晉宋齊梁魏隋之間今畧摘其要以備稽考云歐陽子本論曰佛法為中國患千餘歳世之卓然不惑而有力者莫不欲去之已甞去矣而復大集攻之暫破而愈堅撲之未滅而愈熾遂至於無可奈何是果不可去邪蓋亦未知其方也夫醫者之於疾也必推其疾之所自來而治其受病之處病之中人乗乎氣虚而入焉則善醫者不攻其疾而務養其氣氣實則病去此自然之効也故救天下之患者亦必推其患之所自來而治其受患之處佛為夷狄去中國最逺而有佛固已久矣堯舜三代之際王政修明禮義之教充於天下於此之時雖有佛無由而入及三代衰王政缺禮義廢後三百餘年而佛至乎中國由是言之佛所以為吾患者乗其缺廢之時而來此其受患之本也補其缺修其廢使王政明而禮義充則雖有佛無所施於吾民矣此亦自然之勢也昔堯舜三代之為政設為井田之法籍天下之人計其口而皆受之田凡人之力能勝耕者莫不有田而耕之斂以什一差其征賦以督其不勤使天下之人力皆盡於南畆而不暇乎其他然又懼其勞且怠而入於邪僻也於是為制牲牢酒醴以養其體弦匏俎豆以悅其耳目於其不耕休力之時而教之以禮故因其田獵而為蒐狩之禮因其嫁娶而為婚姻之禮因其死葬而為喪祭之禮因其飲食羣聚而為鄉射之禮非徒以防其亂又因而敎之使知尊卑長幼明人之大倫也故凡養生送死之道皆因其欲而為之制飾之物采而文焉所以悅之使其易趣也順其性情而節焉所以防之使其不過也然猶懼其未也又為立學以講明之故上自天子之郊下至鄉黨莫不有學擇民之聰明者而習焉使相告語而誘勸其愚惰嗚呼何其備也蓋堯舜三代之爲政如此其慮民之意甚精治民之具甚備防民之術甚周誘民之道甚篤行之以勤而被於物者洽浸之以漸而入於人者深故民之生也不盡力乎南畆則從事於禮樂之際不在其家則在乎庠序之間耳聞目見無非仁義禮樂而趣之不知其倦終身不見異物又奚暇夫外慕哉故曰雖有佛無由而入者謂有此具也及周之衰秦并天下盡去三代之法而王道中絶後之有天下者不能勉强其為治之具不備防民之術不周佛於此時乗間而出千有餘嵗之間佛之來者日益衆吾之所為者日益壞井田最先廢而兼并逰惰之姦起其後所謂蒐狩婚姻喪祭鄉射之禮凡所以教民之具相次而盡廢然後民之姦者有暇而為他其良者泯然不見禮義之及已夫姦民有餘力則思為邪僻良民不見禮義則莫知所趣佛於此時乗其隙方鼔其雄誕之說而牽之則民不得不從而歸矣又况王公大人每倡而驅之曰佛是真可歸依者然則吾民何疑而不歸焉幸而有一不惑者方艴然而怒曰佛何為者吾將操戈而逐之又曰吾將有說以排之夫千嵗之患徧於天下豈一人一日之可為民之沈酣入於骨髓非口舌之可勝然則將奈何曰莫若修其本以勝之昔戰國之時楊墨交亂孟子患之而専言仁義故仁義之說勝則楊墨之學廢漢之時百家並興董生患之而退修孔氏之道故孔子之道明而百家息此所謂修其本以勝之之效也今八尺之夫被甲荷㦸勇蓋三軍然而見佛則拜聞佛之說則有畏慕之誠者何也彼誠壯狡中心茫然無所守而然也一介之士渺然柔懦進趨畏怯然而聞有道佛者則義形於色非徒不為之屈又欲驅而絶之者何也彼無他焉學問明而禮義熟中心有所守以勝之也然則禮義者勝佛之本也今一介之士知禮義者尚能不為之屈使天下皆知禮義則勝之矣此自然之勢也又曰昔荀卿子之說以為人性本惡著書一篇以持其論予始愛之及見世人之歸佛者然後知荀卿之說繆焉甚矣人之性善也彼為佛者棄其父子絶其夫婦於人之性甚戾又有蠶食蟲蠧之弊然而民皆相率而歸焉者以佛有為善之說故也嗚呼誠使吾民曉然知禮義之為善則安知不相率而從哉奈何教之諭之之不至也佛之說熟於人耳入乎其心久矣至於禮義之事則未甞見聞今將號於衆曰禁汝之佛而為吾禮義則民將駭而走矣莫若為之以漸使其不知而趣焉可也蓋鯀之治水也鄣之故其害益暴及禹之治水也導之則其患始息蓋患深勢盛則難與敵莫若馴致而去之易也今堯舜三代之政其說尚𫝊其具皆在誠能講而修之行之以勤而浸之以漸使民皆樂而趣焉則充行乎天下而佛無所施矣𫝊曰物莫能兩大自然之勢也同時徂徠石氏亦有怪說今不録程子曰楊墨之害甚於申韓佛老之害甚於楊墨楊氏為我疑於仁墨氏兼愛疑於義申韓則淺陋易見故孟子只闢楊墨為其惑世之甚也佛老其言近理又非楊墨之比此所以為害尤甚釋氏之學於敬以直内則有之矣義以方外則未之有也故滯固者入於枯槁疏通者歸於恣肆此佛之教所以為隘也又曰佛有一箇覺之理可以謂敬以直内矣然無義以方外其直内者要之其本亦不是聖人本天釋氏本心愚謂天者指理而言心者兼乎血氣而言釋氏以精靈知覺為主故曰本心聖人以仁義禮智為主故曰本天釋氏本怖死生為利豈是公道唯務上達而無下學然則其上達處豈有是也元不相連屬但有間斷非道也孟子曰盡其心者知其性也彼所謂識心見性是也若存心養性一段事則無矣彼固曰出家獨善便於道體自不足或曰釋氏地獄之類皆是為下根之人設此怖令為善先生曰至誠貫天地人尚有不化豈有立偽教而人可化乎又曰學者於釋氏之說直須如淫聲美色以逺之不爾則駸駸然入其中矣又曰所以謂萬物一體者皆有此理只為從那裏來生生之謂易生則一時生皆具此理人則能推物則氣昏推不得不可道他物不與有也人只為自私將自家軀殻上頭起意故看得道理小了他底放這身來都在萬物中一例看大小大快活釋氏以不知此去他身上起意思奈何那身不得故却厭惡要得去盡根塵為心源不定故要得如枯木死灰然沒此理要有此理除是死也釋氏其實是愛身放不得故說許多譬如負物之蟲已載不起猶自更取物在身又如抱石沈河以其重愈沈終不道放下石頭惟嫌重也又曰佛氏不識隂陽晝夜死生古今安得謂形而上者與聖人同乎又曰釋氏之說若欲窮其說而去取之則其說未能窮固已化而為佛矣只於迹上考之其設教如是則其心果如何固難為取其心不取其迹有是心則有是跡王通言心迹之判便是亂說故不若且於迹上斷定不與聖人合其言處則吾道固已有所不合者固所不取如是立定却省易謝顯道歴舉佛說與吾儒同處問伊川伊川曰恁地同處雖多只是本領不是一齊差却又曰道之外無物物之外無道是天地之間無適而非道也即父子而父子在所親即君臣而君臣在所嚴以至為夫婦為長幼為朋友無所為而非道所以不可須臾離也然則毁人倫去四大者其分於道也逺矣又曰聖賢以死生為本分事無可懼故不論死生佛之學為怕死生故只管說不已下俗之人固多懼易以利動楊墨之害今世已無之道家之說其害終小惟佛學今人人談之彌漫滔天其害無涯舊甞問學佛者𫝊燈録幾人云千七百某曰敢道此千七百人無一達者果有一人見得聖人朝聞道夕死可矣與曽子易簀之理必不肯削髮胡服而終禪者曰此迹也何不論其心曰心迹一也豈有迹非而心是者正如兩足方行指其心曰我本不欲行他兩足自行豈有此理蓋上下本末内外都是一理方是道又曰古亦有釋氏盛時尚只是崇設像教其害至小今日之風便先言性命道徳先驅了智者才愈髙明陷溺愈深又曰今日卓然不為此學者惟范景仁與君實耳然其所執理有出於禪學之下者又曰今日釋氏盛而道家蕭索方其盛時天下之士往往自從其學自難與之力争惟當自明吾理吾理自然明則彼不必與争又曰中庸言禮儀三百威儀三千方是說優優大哉非如異教之說須得如槁木死灰以為得也或謂佛之理比孔子為徑曰天下果有徑理則仲尼豈欲使學者迂逺而難至乎故外仲尼之道而由徑則是冒險阻犯荆棘而已矣又曰釋氏說道譬之以管窺天只務直上去惟見一偏不見四旁故皆不能處事聖人之道則如在平野之中四方莫不見也又曰釋氏無實又曰佛言前後際斷純亦不已是也彼安知此哉子在川上曰逝者如斯夫不舍晝夜自漢以來儒者皆不識此義此見聖人之心純亦不已也又曰聖人致公心盡天地萬物之理各當其分佛氏總為一己之私是安得同乎聖人循理故平直易行異端造作大小費力非自然也故失之逺又曰學者之流必談禪者只是為無處撈摸故須入此又曰釋氏尊伯自言覺悟是既已達道又却須要印證則是未知也得他人道是然後無疑則是信人言語不可言自信又曰釋氏之學不可道他不知亦儘極乎髙深然要之卒歸乎自私自利之規模何以言之天地之間有生便有死有樂便有哀釋氏却言免死齊煩惱卒歸乎自私老氏之學更挾些權詐若言與之乃意在取之張之乃意在翕之又大意在愚其民而自智秦之愚黔首其術蓋亦出於此又曰聖人之言依本分至大至妙事語之若尋常此所以味長釋氏之說才見得些便驚天動地言語走作却是味短只為乍見不似聖人慣見又曰昔謂異教中疑有達者或是無歸且安於此考之卒不達若達則於其前日所處不能一朝居也觀曽子易簀之意便知其不達朝聞道夕死可矣豈能安其所未安如毁其人形絶其倫類無君臣父子之道若達則不安也只夷言左袵尚可言隨其國俗至如人道豈容有異又曰儒者其卒必入異教其勢自然如此蓋智窮力屈欲休來又知未得安穏故見人有一道理其勢須從之譬之行一大道坦然無阻則更不由徑只為逢著山水行不得有窒礙則見一邪徑欣然從之儒者所以窒礙者何也只為不致知知至至之則自無事可奪今有人處於異鄉元無安處則言某處安某處不安須就安處若已有家人言他人家為安必不肯抛彼故儒者而卒歸異教者只為於己道實無所得雖曰聞道終不曽實有之又曰佛莊之說大抵畧見道體乍見不似聖人慣見故其說走作又曰學禪者常謂天下之忙者無如市井之人答以市人雖日營利猶有休息時至忙者無如禪客何以言之禪者之行住坐卧無不在道存無不在之心便是常忙又曰學佛者多要忘是非是非安可忘得自有許多道理何事忘為夫事外無心心外無事世人只被外物所役便覺苦事多若物各付物便役物世人只為一齊在那昏惑迷暗海中拘滯執泥坑裏便事事轉動不得沒著身處問佛說性如何曰佛亦是說本善只不合將才做縁習又問說死生如何曰譬如水漚亦有些意思又曰佛言生死輪迴果否曰此事說有說無皆難須自見得聖人只一句斷盡了故對子路曰未知生焉知死又曰佛亦是西方賢者方外山林之士但為愛脅持人說利害其實為利耳其學譬如以管窺天謂他不見天不得只是不廣大又曰浮屠之說最善化誘故人多向之然其術所以化衆人也故人亦有向者有不向者如介甫之學他便只是去人主心術處加功故今日靡然而同無有異者所謂一正君而國定也此學極有害以介甫才辨施之學者誰能出其右始則且以利而從久而遂安其學今天下之新法害事處但一日除了便沒事其學化革了人心為害最甚又曰今日釋氏却未須理㑹却要先整頓介甫之學按末二條因論釋氏而及於荆舒之學以見荆舒之害尤甚於釋老故附此致堂胡氏亦曰自有載籍以來三千嵗矣為世害者固多有之大抵皆淫辭邪說楊墨一也佛釋二也老莊三也荆舒四也楊墨之學近於老佛而其術淺孟子辭而闢之既無其𫝊矣老有莊列乃翼之其說浸浸足以悅人耳目而蕩其心故其後為王何啟清虚空曠華而不實之禍比之楊墨其被廣而其流逺矣佛氏之害前已言之若夫荆舒則取佛老之似以亂孔孟之真用仁義之名以濟申商之實託理財之說以行交征之事仗人主之威以行空言之教假養材之道以收速肖之士闡趨利之便以變天下之心兼此數端其為害詎止於王何而已哉又曰昔人謂王何清談之罪甚於桀紂而未見臨川談經之禍甚於王何也張子曰釋氏妄意天性而不知範圍大用反以六根之微因縁天地明不能盡則誣天地日月為幻妄蔽其用於一身之小溺其志於空虚之大此所以語大語小流遁失中其過於大也塵芥六合其蔽於小也夢幻人世謂之窮理可乎不知窮理而謂之盡性可乎謂之無不知可乎塵芥六合謂天地為有窮也夢幻人世明不能究其所從也浮圖明鬼謂有識之死受生循環遂厭苦求免可謂知鬼乎以人生為妄見可謂知人乎天人一物輒生取舍可謂知天乎孔孟所謂天彼所謂道惑者指遊魂為變為輪迴未之思也大學當先知天徳知天徳則知聖人知鬼神今浮圖劇論要歸必謂死生流轉非得道不免謂之悟道可乎悟則有義有命均死生一天人推知書夜通隂陽體之无二自其說熾𫝊中國儒者未容窺聖學門墻已為引取淪胥其間指為大道乃其俗達之天下致善惡智愚男女臧獲人人著信使英才間氣生則溺耳目恬習之事長則師世儒崇尚之言遂冥然被驅因謂聖人可不修而至大道可不學而知故未知聖人心已謂不必求其迹未見君子志已謂不必事其文此人倫所以不察庶物所以不明治所以忽徳所以亂異言滿耳上無禮以防其偽下無學以稽其弊自古詖淫邪遁之辭翕然並興一出佛氏之門者千五百年向非獨立不懼精一自信有大過人之才何以正立其間與之較是非計得失哉上蔡謝氏曰佛之論性如儒之論心佛之論心如儒之論意循天之理便是性不可容些私意纔有意便不能與天為一又曰釋氏所謂性乃吾儒所謂天釋氏以性為日以念為雲去念見性猶披雲見日釋氏所去正吾儒之所當事者又曰問學佛者欲免輪迴超三界於意云何蔡曰是有利心私而已矣輪迴之說信然否曰此心有止而太虚決知其無盡必為輪迴推之於始何所付受其終何時間斷也且天下人物各有數矣又曰性本體也目視耳聽手舉足運見於作用者心也自孟子沒天下學者向外馳求不識自家寳藏被他佛氏窺見一班半㸃遂將擎拳豎拂底事把持在手敢自尊大輕視中國學士大夫而世人莫敢與之爭又從而信向歸依之使聖學有𫝊豈至此乎問從上諸聖皆有相𫝊處至如老子門如何謝子曰他見得錯了余問錯在甚處曰只如失道而後徳失徳而後仁失仁而後義失義而後禮是甚說話自然不可易底便喚做道體在我身上便喚做徳有如覺識痛癢便喚做仁運用處皆是當便喚做義大都只是一事那裏有許多分別莊周如何曰吾曽問莊周與佛如何伊川曰周安得比佛佛說直有髙妙處莊周氣象大故淺近如人睡初覺時乍見上下東西指天說地怎消得恁地只是家常茶飯誇逞箇甚底吾曽歴舉佛說與吾儒同處問伊川先生曰恁地同處雖多只是本領不是一齊差却問本領何故不是曰為他不窮天理只將拈匙把筯日用的便承當做大事大事任意縦横將來作用便是差處便是私處余問佛說直下便是動念即乖如何曰此是乍見孺子已前底事乍見孺子底吾儒喚做心他便喚做前塵妄想當了是見得太高吾儒要就上面體認做工夫他却一切掃除却那裏得地位進步佛家說大乗頓覺一聞便悟將乍見孺子底心一切掃除須是他顔雍已上底資質始得顔子猶要請事斯語今資質萬倍不如他却便要一切掃除怎生得且如乍見孺子底心生出來便有是自然底天理怎生掃除得去佛大概是自為私心學佛者欲脫離生死豈不是私又曰儒以名利闗為難透釋氏以聲色闗為難透釋氏不窮理以覺念為宗釋氏指性於天故蠢動含靈與我同性明道有言以吾儒觀釋氏疑於無異然而不同問儒佛之辨曰吾儒下學而上達窮理之至自然見道與天為一故孔子曰知我者其天乎以天為我也佛氏不從理求故不自信必待人證明然後信又曰儒異於禪正在下學處顔子工夫真百世軌範舍此應無入路無住宅龜山楊氏曰六經不言無心惟佛氏言之亦不言修性揚雄言之心不可無性不假修故易止言洗心盡性記言正心尊徳性孟子言存心養性佛氏和順於道徳之意蓋有之理於義則未也儒佛深處所差杪忽耳見儒者之道分明則佛在其下矣今學之徒曰儒者之道在其下是不見吾道之大也朱子曰知堯舜孔孟所𫝊之正則知異端之為害也深而息邪距詖之功大矣鄭厚折衷云秦皇漢武欲無夷狄韓愈欲無釋老孟子欲無楊墨甚哉未之思也天不惟慶雲甘雨而霜雹降焉地不惟五穀桑麻而荑稗鈎吻生焉山林河海不惟龜龍麟鳯而鴟梟豺狼蛟鼉生焉古今豈有無小人之國哉作易者其知道乎朱子辨之曰云云彼曰景風時雨戾氣旱蝗均出於天五榖桑麻與荑稗鈎吻均出於地此固然矣人生其間混然中處盡其燮理之功則有景風時雨而無戾氣旱蝗有五榖桑麻而無荑稗鈎吻此人之所以參天地贊化育而天地待之而為三才者也孟子之闢異端如宣王之攘夷狄其志亦若此而已豈秦皇漢武之比哉聖人作易以立人極其義以君子為主故為君子謀而不為小人謀觀泰否剥復名卦之意則可見矣而曰古今豈有無小人之國哉嗚呼作易者其知道乎其不知易也甚哉又答東萊書云來教謂吾道無對不當與世俗較勝負此說美矣而亦非鄙意之所安也夫道固無對者也然其中却著不得許多異端邪說直須一一剔撥出後方曉然見得箇精明純粹底無對之道若和泥合水便只著箇無對包了竊恐此無對中却多藏得病痛也孟子言楊墨之道不熄孔子之道不著而大易於君子小人之際其較量勝負尤為詳密豈其未知無對之道耶蓋無對之中有隂則有陽有善則有惡陽消則隂長君子進則小人退循環無窮初不害其為無對也孟子闢楊墨則老莊在其中矣後世佛學亦出於楊氏問佛老與楊墨之學如何先生云楊墨之說猶未足以動人墨氏謂愛無差等欲人人皆如至親此自難從故人亦未必信楊氏一向為我超然逺舉視營營於利祿者皆不足道此其為說雖甚髙然人亦難學未必盡從楊朱即老子弟子又言孟子不闢老氏不知云云後世佛氏之學亦出於楊氏其初如不愛身以濟衆生之說雖近墨氏然此說淺近未是他深處後來是達麽過來初見梁武帝武帝不曉其說只從事於因果遂去面壁九年只說人心至善即此便是不用辛苦修行又有人取老莊之說從而附益之所以其說愈精妙然只是不是耳又有所謂頑空真空之說頑空者如死灰槁木真空則能攝衆有而應變然亦只是空耳又曰佛氏乗虚入中國廣大自勝之說幻妄寂滅之論自齋戒變為義學如逺法能支道林皆義學然只是盜襲莊子之說及達麽入來又翻了許多窠臼說出禪來又髙妙於義學以為可以直超徑悟而其禍福報應之說又足以鉗制愚俗此其所以盛也唐之韓文公本朝之歐陽公以及闗洛諸公既皆闡明正道以排釋老而其言之切要如傅奕本𫝊宋景文李蔚贊東坡儲祥觀碑陳後山白鶴宫記皆足以盡見其失此數人皆未深知道而其言或出於强為是以終有不滿人意處又曰西漢時儒者說道理亦只是黄老意思如揚雄太𤣥經皆是故其自言有曰老子之言道徳吾有取焉耳後漢明帝時佛始入中國當時楚王英最好之然都不曉其說直至晉宋間其敎漸盛然當時文字亦只是將莊老之說來鋪張如逺法師諸論皆成斥盡是老莊意思直至梁㑹通間達麽入來然後一切被他掃蕩不立文字直指人心蓋當時儒者之學既廢絶不講老佛之說又如此淺陋被他窺見這个罅隙了故横說豎說如是張王沒奈他何人才聰明便被他誘引將去問釋氏之無與老氏之無何以異先生云老氏依舊有如所謂無欲觀其妙有欲觀其徼是也若釋氏則以天地為幻妄以四大為假合則是全無也又曰老氏只是要長生節病易見釋氏於天理大本處見得些分數然却認為己有而以生為寄要見得父母未生時面目既見更不認作衆人公共底須要見得為己有死後亦不失而以父母所生之身為寄寓若聖人則不然於天理大本處見得是衆人公共底便只隨他天理去更無分毫私見如此便倫理自明不是自家作為出來皆是自然如此往來屈伸我安得而私之哉又曰老氏欲保全其身底意思多釋氏又却全不以其身為事自是外面攔截曰釋氏只是勿視勿聽無那非禮工夫曰然蔡季通因曰世上事便要人做只管做他坐定做甚日月便要行天地便要運先生曰他不行不運固不是吾輩是行是運只是人運行得差如今妄喜妄怒豈不是差他却是過之今人又是不及問昔有一禪僧每日喚曰主人翁惺惺著大學或問之中亦取謝氏常惺惺法之語不知是同是異曰謝氏之說地步濶於身心事物上皆有工夫若如禪者所見只看得个主人翁便了其動而不中理者都不管矣徐子融有枯槁有性無性之論先生曰性只是理有是物斯有是理子融錯處是認心為性義與佛氏相似只是佛氏磨擦得這心極精細如一塊物事剥了一重皮又剥一重皮至剥到極盡無可剥處所以磨礲得這心精光他便認做性殊不知此正聖人之所謂心故上蔡云佛氏所謂性正聖人所謂心佛氏所謂心正聖人所謂意心只是該得這理佛氏便認知覺運動底做性如視聽言貌聖人則視有視之理聽有聽之理言有言之理動有動之理思有思之理如箕子所謂明聰從恭睿是也佛氏則只認那能視聴言動思底便是性視明也得不明也得聽聰也得不聰也得言從也得不從也得思睿也得不睿也得他都不管横來豎來它都認做性所以它最怕人說這理穿他都要除掉了此正告子生之謂性之說也問聖門說知性佛氏亦言知性有以異乎曰據公所見如何友仁曰據友仁所見及佛氏之說者此一性在心所發為意在目為見在耳為聞在口為議論在手為能持在足為運奔所謂知性者知此而已先生曰如此見得只是个無星之秤無寸之尺若聖門則在心所發為意須是誠始得在目雖見須是明始得在耳雖聞須是聰始得在口談論及在手在足之類須是皆動之以禮始得夫天生蒸民有物有則若如公所見及佛氏之說有物無則了所以與聖門有差又曰釋氏棄了道心却取人心之危者而作用之遺其精者取其粗者以為道如以仁義禮智為非性而以眼前作用為性是也此只是源頭處錯了又曰儒者以理為不生不滅釋氏以神識為不生不滅又曰聖人不說死已死了更說甚事聖人只說既生之後未死之前須是與他精細理㑹道理教是胡明仲自說得好人生物也佛不言生而言死人事可見也佛不言顯而言幽問佛黙然處如何曰是他到處曰如何與灑掃應對合曰蓋言精粗無二又曰禪只是一个保守法如麻三斤乾屎橛他道理初不在這上只是把定一心不令散亂久後光明自發所以不識字底人才悟別有一物不生不滅歐公甞言老氏貪生釋氏畏死其說亦好氣聚則生氣散則死順之而已釋氏則皆悖之者也或問佛與老莊不同處曰莊老絶滅倫理未盡至佛則人倫滅盡至禪則義理滅盡又曰佛初入中國止說修行未有許多禪厎說話天下只是這道理終是走不得如佛老便是滅人倫然自是逃不得如無父子他却拜其師為父以弟子為子長者為師兄少者為師弟但是他只䕶得箇假厎聖賢便是存得个真厎以上兼言佛老之學某人言天下無二道聖人無兩心儒釋雖不同畢竟只是一理某說道惟其天下無二道聖人無兩心所以有我厎著他厎不得有他厎著我厎不得若使天下有二道聖人有兩心則我行得我厎他行得他厎又曰釋老之書極有髙妙者句句與自家箇同但不可將來比方煞誤人事因舉佛氏之學與吾儒甚相似處如云有物先天地無形本寂寥能為萬象主不逐四時彫他是甚麽様見識今區區小儒怎生出得他手宜其為他揮下也此是法眼禪師下一派宗㫖如此今之禪家皆破其說以為有理路落窠臼礙正當知見今之禪家多是麻三斤乾屎橛之說謂之不落窠臼不墮理路妙喜之說便是如此然又有翻轉不如此說時又曰儒釋言性異處只是釋言空儒言實釋言無儒言有又曰釋言說空便不是但空裏面須有道理始得若只說道我見箇空厎不知他有箇實厎道理却做甚用得又曰釋氏合下見得一箇道理空虚不實故要得超脫盡去物累方是無漏為佛地位其他有惡趣者皆是衆生餓鬼只隨順有所修為者猶是菩薩地位未能作佛也若吾儒合下見得箇道理便實了故首尾與之不合又曰吾以心與理為一彼以心與理為二亦非固欲如此乃是見處不同彼見得心空而無理此見得心雖空而理咸備又甞言釋氏之徒為學精専曰便是其甞說吾儒這邊難得如此看他下工夫直是自日至夜無一念走作别處去如今學者一時一日之間是多少閒雜念慮如何得似他只惜他所學非所學枉了工夫若吾儒邊人下得這工夫是甚次第又曰當初佛學只是說無存養底工夫至唐六祖始教人存養當初儒學亦只是說不曽就身心上做工夫至伊川方教人就身心上做所以人謂伊川竊佛說為己使問釋氏入定道家數息曰他只要静則應接事物不差孟子便也要存夜氣然而須是理㑹旦晝所為曰吾儒何不效他恁地曰他開眼便依舊失了只是硬把捉不如吾儒非禮勿視聽言動戒謹恐懼乎不睹不聞敬以直内義以方外都一切悟後便作得偈頌悟後所見雖同然亦有深淺問神者去知之一字衆妙之門它也知得這知字之妙曰所以伊川說佛氏之言近理謂此類也它也微見得這意思要籠絡這箇道理只是他用處全差所以都間斷相接不著問其所謂知正指此心之神明作用者否曰然問佛法如何是以利心求曰要求清淨寂滅超脫世界是求一身利便又曰自伊洛君子之沒諸公亦多聞闢佛氏矣然竟說他不下者未知其失之要領耳釋氏自謂識心見性然其所以不可推行者何哉為其於性與用分為兩截也聖人之道只是率性凡修道之教無不本於此故雖功用充塞天地而未有出於性之外者釋氏非不見性及到作用處則曰無所不可為故棄君背父無所不至者由其性與用不相管也又曰天命之謂性是空無一法耶為萬理畢具邪若空則浮屠勝實則儒者是又曰儒釋不同彼見得心空而無理此見得心雖空而萬理咸備又曰又云某年十五六時亦甞學禪一日在劉病翁坐㑹一僧與之語僧退為病翁言某亦理㑹得箇昭昭靈靈厎禪某聞之意其便有妙處遂往問之見其說亦好後見李先生告之先生但云不是再三質問則曰且看聖賢言議遂取聖人書讀之一日復一日覺得聖人言語漸漸有味却且看釋氏說漸漸破綻罅漏日出西山讀書記卷三十六
