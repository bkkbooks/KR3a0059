body:
  text: 西山讀書記卷三十三宋真德秀撰處貧賤附富貴中庸素富貴行乎富貴素貧賤行乎貧賤說見後論語子貢曰貧而無諂富而無驕何如子曰可也未若貧而樂富而好禮者也朱子曰諂卑屈也驕矜肆也常人溺於貧富之中而不知所以自守故必有二者之病無諂無驕則知自守矣而未能超乎貧富之外也凡曰可者僅可而有所未盡之辭也樂則心廣體胖而忘其貧好禮則安處善樂循理亦不自知其富矣子貢貨殖蓋先貧後富而常用力於自守者故以為問而夫子答之如此蓋許其所己能而勉其所未至也子貢曰詩云如切如磋如琢如磨其斯之謂與子貢自以無諂無驕為至矣聞夫子之言又知義理之無窮雖有得焉而未可遽自足也故引是詩以明之子曰賜也始可與言詩也已矣告諸往而知來者往者其所己言者來者其所未言者也愚按此章問答其淺深髙下固不待辨說而明矣然不切則磋無所施不琢則磨無所措故學者雖不可安於小成而不求造道之致極亦不可騖於虛逺而不察切己之實病也南軒曰諂驕皆惡也無諂無驕則免於惡矣然質美者能之若夫樂與好禮則非致知力行所造日深者無此味也子曰不仁者不可以久處約不可以長處樂仁者安仁知者利仁朱子曰約困窮也利猶貪也蓋深知篤好而必欲得之也不仁之人失其本心久約必濫久樂必淫惟仁者則安其仁而無適不然知者則利於仁而不易所守蓋雖深淺之不同然皆非外物所能奪矣或問安仁利仁之可以久處約久處樂何也曰胡氏於此發明似得其本㫖者曰舜之飯糗茹草若將終身被袗衣鼓琴若固有之此安仁者之久處約長處樂也原憲環堵閔損汶上魯之季文子齊之晏平仲此利仁者之久處約長處樂也南軒曰君子之可以久處約可以長處樂安於理而已不仁者勉强而暫處則有之若差久焉則移於約樂而無所不至矣黃氏曰不仁之人失其本心久約必濫久樂必淫蓋本心者天理之公失其本心則人欲之私為之主矣徇人欲之私豈能久處約長處樂乎安仁利仁則所存者天理故安於義命所當然而物欲不能以纍其心所以處約樂之久而不為之動也按莊子原憲居魯環堵之室茨以生草蓬户不完桑以為樞而甕牖二室褐以為塞上漏下濕匡坐而絃子貢乘大馬中紺而表素軒車不容巷往見原憲原憲華冠縰履杖藜而應門子貢曰嘻先生何病原憲應之曰憲聞之無財謂之貧學而不能行謂之病今憲貧也非病也子貢逡巡而有愧色原憲笑曰夫希世而行比周而友樂以為人教以為己仁義之慝輿馬之飾憲不忍為也閔子事已見前篇春秋傳襄五年季文子卒大夫入斂公在位宰庀家器為葬備無衣帛之妾無食粟之馬無藏金玉無重器備君子是以知季文子之忠於公室也相三君矣而無私積可不謂忠乎初文子之為相仲孫他諌曰子為正卿妾不衣帛馬不食粟人以子為愛且不華國也文子曰吾亦順之然吾觀國人其父兄之食粗而衣惡者猶多而吾獨美妾馬可乎吾聞榮於德者華於國不聞以妾與馬也晏嬰字平仲資惡淫侈父卒粗衰斬苴絰帶杖菅屨食鬻居倚廬寢苫枕草其老曰非大夫之禮也曰唯卿為大夫事齊靈公莊公景公食不重味妾不衣帛公與弼殿其鄙六十弗受子尾曰富人之所欲也何獨拒之對曰慶氏之邑足欲故亡吾邑不足欲也益之以弼殿乃足欲亡無日矣不受弼殿非惡富也恐失富也按令尹子文之行與晏平仲類楚語鬭且廷見令尹子常子常與之語問蓄貨聚馬歸以語其弟曰楚其亡乎不然令尹其不免乎吾見令尹令尹問蓄聚積實如餓豺狼然殆必亡者也昔鬭子文三舍令尹無一日之積恤民之故也成王聞子文之朝不及夕也於是乎每朝設脯一束糗一筐以羞子文至於今令尹秩之成王每出子文之祿必逃王止而後復人謂子文曰人生求富而子逃之何也對曰夫從政者以庇民也民多曠者而我取富焉是勤民以自封也死無日矣我逃死非逃富也故莊王之世滅若敖氏唯子文之族在至今處鄖為楚良臣是不先恤民而後己之富乎今子常先大夫之後也而相楚君無令名於四方民之羸餒日日已甚四境盈壘道殣相望盜賊司目民無所放是之不恤而蓄聚不厭其速怨於民多矣積貨滋多蓄怨滋厚不亡何待子文姓鬭名穀於菟為楚令尹四十年繒布之衣以朝鹿裘以居子常楚大夫子囊之後名囊瓦蓋所謂不仁而不可以處樂者也故并見焉子曰富與貴是人之所欲也不以其道得之不處也貧與賤是人之所惡也不以其道得之不去也朱子曰不以其道得之謂不當得而得之然於富貴則不處於貧賤則不去君子之審富貴而安貧賤也如此南軒曰於人之所欲而不處於人之所惡而不去蓋其欲惡有大於富貴貧賤者唯道所在而已君子去仁惡乎成名言君子所以為君子以其仁也若貪富貴而厭貧賤則是自離其仁而無君子之實矣何所成其名乎君子無終食之間違仁造次必於是顛沛必於是終食者一飯之頃造次急遽茍且之時顛沛傾覆流離之際蓋君子之不去乎仁如此不但富貴貧賤取舍之間而已也言君子為仁自富貴貧賤取舍之間以至於終食造次顛沛之頃無時無處而不用其力也然取舍之分明然後存養之功密存養之功密則其取舍之分益明矣子曰士志於道而恥惡衣惡食者未足與議也朱子曰心欲求道而以口體之奉不若人為恥其識趣之卑陋甚矣何足與議於道哉程子曰志於道而心役乎外何足與議也或問恥惡衣惡食者其為未免於求飽求安之纍者乎曰此固然也然求飽與安猶有以適乎口體之實此則非以其不可衣且食也特以其不美於觀聽而自惡焉若謝氏所謂食前方丈則對客泰然蔬食菜羮則不出諸户者其識趣卑陋又在求飽與安者之下矣志於道而猶不免乎是焉則其志亦何足言哉子曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂賢哉回也說已見前按莊子孔子謂顔子曰回來家貧居卑胡不仕乎顔淵對曰不願仕回有郭外之田五十畝足以給飦粥郭內之田十畝足以為絲麻鼓琴足以自娛所學夫子之道足以自樂也回不願仕孔子愀然變容曰善哉回之意丘聞之知足者不以利自纍審自得者失之而不懼行修於內者無位而不怍丘誦之久矣今於回而後見之是丘之徒也又曰曽子居衛緼袍無裘顔色腫噲手足胼胝三日不舉火十年不製衣正冠而纓絶捉襟而肘見納履而踵決曳縰而歌商頌聲滿天地若出金石按顔曽二子樂道安貧大抵相似故附於此子曰富而可求也雖執鞭之士吾亦為之如不可求從吾所好朱子曰執鞭賤者之事設言富若可求則雖身為賤役以求之亦所不辭然有命焉非求之可得也則安於義理而已矣何必徒取辱哉蘇氏曰聖人未嘗有意於求富也豈問其可不可哉為此語者特以明其決不可求爾楊氏曰君子非惡富貴而不求以其在天無可求之道也南軒曰夫子謂富不可求非特謂命有定而不可强也正以於義不可故耳又曰所安者義而命有所不必言者矣子曰飯疏食飲水曲肱而枕之樂亦在其中矣不義而富且貴於我如浮雲朱子曰聖人之心渾然天理雖處困極而樂亦無不在焉其視不義之富貴如浮雲之無有漠然無所動於其中也程子曰非樂疏食飲水也雖疏食飲水不能改其樂也不義之富貴視之輕如浮雲然又曰須知所樂者何事或問云云曰聖人之心無時不樂如元氣流行於天地之間無一處之不到無一時之或息也豈以貧富貴賤之異有所輕重於其間哉夫子言此蓋即當時所處以明其樂之未嘗不在乎此而無所慕乎彼耳且曰亦在其中則與顔子之不改者又有間矣必曰不義而得富貴視如浮雲則是以義得之者視之亦無以異於疏食飲水而其樂無以加爾記此者列此以繼衛君之事其亦不無意乎南軒曰崇髙莫大乎富貴非可以浮雲視惟其非義則如浮雲耳茍義所當得聖賢固亦居之特所樂不存也子曰衣敝緼袍與衣狐貉者立而不恥者其由也與朱子曰敝壞也緼枲著也袍衣有著者也蓋衣之賤者狐貉以其皮為裘衣之貴者子路之志如此則能不以貧富動其心而可以進於道矣故夫子稱之不忮不求何用不臧忮害也求貪也臧善也言能不忮不求則何為不善乎此衛風雄雉之篇孔子引之以美子路也吕氏曰貧與富交强者必忮弱者必求子路終身誦之子曰是道也何足以臧終身誦之則自喜其能而不復求進於道矣故夫子復言此以警之謝氏曰恥惡衣惡食學者之大病善心不存蓋由於此子路之志如是其過人逺矣然以衆人能此則可以為善矣子路之賢宜不止此而終身誦之則非所以進於日新也故激而進之南軒曰衣敝緼袍與衣狐貉者立而不恥此不可作細事看惟不忽於卑近而實用力於斯者乃知其未易耳此非不忮不求者不能然也蓋人惟有己而有物有物故有忮有己故有求不忮不求則私意不行而善道可進將何用而不善子路聞夫子之言以為道如是足矣遂有終身誦之之意夫不忮不求非不善也而終身誦之則不足以為善矣蓋學之無窮自不忮不求而勉焉以至於聖不可知其等級固有次第也茍終身誦夫不忮不求而已則亦不過於利仁之事而有所止也聖人先後抑揚所以成德達材之道可謂至矣回也屢空見前篇子曰貧而無怨難富而無驕易朱子曰處貧難處富易人之常情然人當勉其難而不可忽其易也南軒曰富而無驕不矜於外物者能之至於貧而無怨非為內有所安者不能也或謂世固有處貧賤而無失至於一旦當富貴之地則失其本心然則難易之論有時而不然耶此蓋未知夫無怨之味也所謂處貧賤而無失者特未見其失於外耳又焉能保其中之無怨耶蓋一毫有所未平於中皆怨也故貧而無諂易貧而無怨難無怨則進於樂矣子曰君子謀道不謀食耕也餒在其中矣學也祿在其中矣君子憂道不憂貧朱子曰耕所以謀食而未必得食學所以謀道而祿在其中然其學也憂不得乎道而已非為憂貧之故而欲為是以得祿也尹氏曰君子治其本而不恤其末豈以在外者為憂樂哉記曲禮富貴而知好禮則不驕不淫貧賤而知好禮則志不懾儒行儒有不隕穫於貧賤不充詘於富貴鄭氏曰隕穫者困迫失志之貌充詘者歡喜失節之貌漢揚雄不戚戚於貧賤不汲汲於富貴孟子曰舜之飯糗茹草也若將終身焉及其為天子也被袗衣鼓琴二女果若固有之朱子曰聖人之心不以貧賤而有慕於外不以富貴而有動於中隨遇而安無預於己所性分定故也南軒曰舜於窮通之際果何有哉所欲不存樂天而安命窮而在下初無一毫之虧達而在上亦無一毫之加故無適而不自得也齊人有一妻一妾而處室者其良人出則必饜酒肉而後反其妻問所與飲食者則盡富貴也其妻告其妾曰良人出則必饜酒肉而後反問其與飲食者盡富貴也而未嘗有顯者來吾將瞷良人之所之也蚤起施從良人之所之遍國中無與立談者卒之東郭墦間之祭者乞其餘不足又顧而之他此其為饜足之道也其妻歸告其妾曰良人者所仰望而終身也今若此與其妾訕其良人而相泣於中庭而良人未之知也施施從外來驕其妻妾由君子觀之則人之所以求富貴利達者其妻妾不羞也而不相泣者幾希矣孟子言自君子而觀今之求富貴者皆若此人耳使其妻妾見之不羞而泣者少矣言可羞之甚也趙氏曰言今之求富貴者皆以枉曲之道昏夜乞哀以求之而以驕人於白日與斯人何以異哉易賁初九程氏𫝊曰君子在無位之地無所施於天下惟自賁飾其所行而已趾取在下而所以行也君子修飾之道正其所行守節處義其行不茍義或不當則舍車輿而徒行君子所賁世俗所羞世俗所羞君子所賁朱子曰此爻為舍非道之車而安於徒步之象張子曰人多言安於貧賤其實只是計窮力屈才短不能營畫耳若稍動得恐未肯安之須是誠知義理之樂於利欲也乃能天下事大患只是畏人非笑不養車馬食粗衣惡居貧賤皆恐人非笑不知當生則生當死則死今日萬鍾明日棄之今日富貴明日飢餓亦不恤惟義所在或問謝子曰公於外物一切放得下否曰實就上面做工夫來凡事須有根屋柱無根拆却便倒樹木有根雖剪枝條相次又發如人要富貴要他做甚必須有用處尋討要用處病根將來斬斷便沒事右論處貧賤家人六四富家大吉吕氏曰無好勝之心而以和易處富自然得吉何者人道惡盈而好謙六四有處富之道以其巽順而已六四以六居四是以隂居隂順也又巽體亦順也富者人之所忌當家道富盛之時最為難處既為富家又迫近九五剛暴之君正在多難之地惟六四則可免云云衛公叔文子朝而請享靈公退見史鰌而告之史鰌曰子必禍矣子富而君貧罪其及子乎文子曰然吾不先告子是吾罪也君既許我矣其若之何史鰌曰無害子臣可以免富而能臣必免於難上下同之此六四之謂也右論處富貴處患難易習坎有孚維心亨行有尚程子曰陽實在中為中有孚信維心亨維其心誠一故能亨通至誠可以通金石蹈水火何險難之不可亨也行有尚謂以誠一而行則能出險有可嘉尚謂有功也不行則常在險中矣彖曰習坎重險也水流而不盈行險而不失其正習坎謂重險也上下皆坎兩險相重也初六云坎窞是坎中之坎重險也水流而不盈陽動於險中而未出於險乃水性之流行而未盈於坎既盈則出乎坎矣行險而不失其信陽剛中實居險之中行險而不失其信者也坎中實水就下皆為信義有孚也維心亨乃以剛中也維其心可以亨通者乃以其剛中也中實為有孚之象至誠之道無所不通以剛中之道而行則可以濟險難而亨通也行有尚往有功也坎以能行為功初六入于坎窞凶初以隂柔居坎險之下柔弱無援而處不能當非能出乎險也唯益陷于險耳窞坎中之陷處己在習坎中更入坎窞其凶可知象曰習坎入坎失道凶也由習坎而更入坎窞失道也是以能出乎險乃不失道也本義曰以隂柔居重險之下其陷甚矣九二坎有險求小得二當坎險之時陷上下二隂之中乃至險之地是有險也然其剛中之才雖未能出乎險中亦可小自濟不至如初益陷入於深險是所求小得也君子處險艱而能自保者剛中而已剛則才足自衛中則動不失宜象曰求小得未出中也方為二隂所陷在至險之地以剛中之才不至陷於深險是所求小得而未能出坎中之險也六三來之坎坎險且枕入于坎窞勿用六三在坎陷之時以隂柔而居不中正其處不善進退與居皆不可者也來下則入于險之中之上則重險也退與進皆險故曰來之坎坎既進退皆險而居亦險枕謂支倚居險而支倚以處不安之甚也所處如此唯益入於深險耳故云入於坎窞如三所處之道不可用也故曰勿用本義曰以隂柔不中正而履重險之間來往皆險前險而後枕其陷益深不可用也枕倚著未安之意象曰來之坎坎終無功也進退皆險處又不安若用此道當益入于險豈能有功乎以隂柔處不中正雖平易之地尚致悔吝况處險乎險者人之所欲出也必得其道乃能去之求去而失其道其道益困窮爾故聖人戒如三所處不可用也六四九五据程說皆以為濟天下之險故不入於此上六係用徽纆置于叢棘三嵗不得凶上六以隂柔而居險之極其陷之深者也隂柔而陷之深其不能出矣故云云象曰上六失道凶三嵗也以隂柔而自處極險之地是其失道也故其凶至於三嵗也邵子曰易曰坎有孚維心亨行有尚中正行險往且有功雖危無咎能自信故也伊尹以之否象曰天地不交否君子以儉德辟難不可榮以祿天地不相交通故為否否塞之時君子道消當觀否塞之時而以儉損之德避免禍難不可榮居祿位也否者小人得志之時也君子居顯榮之地禍患必及其身故宜晦處窮約也朱子曰收斂其德不形於外以避小人之難人不得以祿位榮之大過象曰澤滅木大過君子以獨立不懼遁世無悶澤潤養於木者也乃至滅沒於木則過甚矣故為大過君子觀大過之象以立其大過人之行君子所以大過人者以其能獨立不懼遁世無悶也天下非之而不顧獨立不懼也舉世不見知而不悔遁世無悶也如此然後能自守所以為大過人也朱子曰澤滅於木大過之象不懼無悶大過之行也又曰澤在下而木在上今澤水髙漲乃至浸沒其木是為大過然木雖為水浸而木未嘗動故君子觀之而獨立不懼遁世無悶明夷為卦坤上離下明入地中也反晉成明夷故義與晉正相反晉者明盛之卦明君在上羣賢並進之時也明夷暗之卦暗君在上明者見傷之時也日入于地中見傷而昏暗也故為明夷明夷利艱貞君子當明夷之時利在知艱難而不失其貞正也在昏暗艱難之時而能不失其正所以為明為君子也彖曰明入地中明夷內文明而外柔順以䝉大難文王以之明入於地其明滅也故為明夷內卦離離文明之象外卦坤坤者柔順之象為人內有文明之德而外能柔順也昔者文王如是故曰文王以之當紂之昏暗乃是明夷之時而文王內有文明之德外柔順以事紂䝉犯大難而內不失其明聖而外足以逺禍患此文王所用之道也故曰文王以之利艱貞晦其明也內難而能正其志箕子以之明夷之時利於處艱厄而不失其貞正謂能晦藏其明也不晦其明則被禍患不守其正則非賢明箕子當紂之時身處其國切近其難故云內難然箕子能藏晦其明而自守其正志箕子所用之道也故曰箕子以之六二明夷夷於左股用拯馬壯吉六二以至明之才得中正而體順順時自處處之至善也雖君子自處之善然當隂暗小人傷明之時亦不免為其所傷但君子自處有道故不能深相傷害終能違避之耳足者所以行若股在脛足之上於行之用為不甚切左又非便用者手足之用以右為便雖蹶張用左蓋右立為本也夷於左股謂傷害其行而不甚切也雖然亦必自免有道拯用壯健之馬則獲免之速而吉也君子為隂暗所傷其自處有道故其傷不甚自拯有道故獲免之疾用拯之道不壯則被傷深矣故云馬壯則吉也二以明居隂暗之下所謂吉者得免傷害而已非謂可以為於斯時也象曰六二之吉順以則也六二得吉者以其順處而有法則也則謂中正之道能順而得中正所以處明傷之時而能保其吉也六五箕子之明夷利貞五為君位乃常也然易之取義變動隨時上六處坤之上而明夷之極隂暗傷明之極者也五切近之聖人因以五為切近至暗之人以見處之之義故不専以君位言上六隂暗傷明之極故以為明夷之主五切近傷明之主若顯其明則見傷害必矣故當如箕子之自晦藏則可以免於難箕子商之舊臣而同姓之親謂切近於紂矣若不自晦其明被禍可必矣故佯狂為奴以免於害雖晦藏其明而內守其正所謂內難而能正其志所以謂之仁與明也若箕子可謂貞矣以五隂柔故為之戒云利貞謂宜如箕子之貞固也若以君道言義亦如是人君有當含晦之時亦外晦其明而內正其志也象曰箕子之貞明不可息也箕子晦藏不失其貞固雖遭患難其明自存不可滅息也若逼禍患遂失其所守則是亡其明乃滅息也古之人如揚雄者是也蹇序卦睽者乖也乖必有難故受之以蹇蹇難也睽乖之時必有蹇難蹇所以次睽也蹇險阻之義故為蹇難為卦坎上艮下坎險也艮止也險在前而止不能進也前有險陷後有峻阻故為蹇也蹇利西南不利東北利見大人貞吉西南坤地也體順而易東北艮方艮山也體止而險在蹇難之時利於順處平易之地不利止於危險也處順易則難可紓止於險則難益甚矣蹇難之時必有聖賢之人則能濟天下之難故利見大人也濟難者必以大正之道而堅固其守故貞則吉也凡處難者必在於守貞正設使難不解不失正德是亦吉也若遇難而不能固其守入於邪濫雖使茍免亦惡德也知義命者不為也朱子曰蹇難也足不能進行之難也為卦艮下坎上見險而止故為蹇西南平易東北險阻又艮方也方在險中不宜走險又卦自小過而來陽進則往居五而得中退則入於艮而不進故其占曰利西南不利東北彖曰蹇難也險在前也蹇難也蹇之為難如乾之為健若蹇之為難則義有未足蹇有險阻之義屯亦難也困亦難也同為難而義則異屯者始難而未得通困者力之窮蹇乃險阻艱難之義各不同也險在前也坎險在前下止而不進故為蹇見險而能止知矣哉以卦才言處蹇之道也上險而下止見險而能止也犯險而進則有悔吝故美其能止為知也方蹇難之時唯能止為善故諸爻除五與二外皆以往為失來為得也蹇利西南往得中也不利東北其道窮也蹇之時利於處平易西南坤方為順易東北艮方為險阻九上居五而得中正之位是往而得平易之地故為利也五居坎險之中而謂之平易者蓋其卦本坤由五往而成坎故但取往而得中不取成坎之義也方蹇而又止危險之地則蹇益甚矣故不利東北其道窮也謂蹇之極也利見大人往有功也當位貞吉以正邦也蹇難之時非聖賢不能濟天下之蹇故利於見大人也大人當位則成濟蹇之功矣往而有功也能濟天下之蹇者惟大正之道夫子又取卦才而言蹇之諸爻除初外餘皆當正位故為貞正而吉也初六雖以隂居陽而處下亦隂之正也以如此正道正其邦可以濟於險矣蹇之時用大矣哉處蹇之時濟蹇之道其用至大故云大矣哉天下之難豈易平也非聖賢不能其用可謂大矣順時而處量力而行從平易之道由至正之理乃蹇之時用也象曰山上有水蹇君子以反身修德山之峻阻上復有水坎水為險陷之象上下險阻故為蹇也君子觀蹇難之象而以反身修德君子之遇艱險必反求諸己而益自修孟子曰行有不得者皆反求諸己故遇艱蹇必反求於身有失而致之乎是反身也有所未善則改之無歉於心則加勉乃自修其德也或曰蹇與困相似致命遂志反身修德亦一般朱子曰不然困象曰澤無水困是盡底乾燥處困之極事無可為者故只得致命遂志若山上有水蹇則猶可進步豈可以困為比只觀澤無水與山上有水二句便全不同初六往蹇來譽六居蹇之初往進則益入於蹇往蹇也當蹇之時以隂柔無援而進其蹇可知來者對往之辭上進則為往不進則為來止而不進是有見幾知時之美來則有譽也象曰往蹇來譽宜待也方蹇之初進則益蹇時之未可進也故宜見幾而止以待時可行而後行也諸爻皆蹇往而善來然則無出蹇之義乎曰在蹇而往則蹇也蹇終則變矣故上已有碩義六二王臣蹇蹇匪躬之故二以中正之德居艮體止於中正者也與五相應是中正之人為中正之君所信任故謂之王臣雖上下同德而五方在大蹇之中致力於蹇難之時其艱蹇至甚故為蹇於蹇也二雖中正以隂柔之才豈易勝其任所以蹇於蹇也志在濟君於蹇難之中其蹇蹇者非為身之故也雖使不勝志義可嘉故稱其忠藎不為己也然其才不足以濟蹇也小可濟則聖人當盛稱以為勸矣朱子曰柔順中正正應在上而在險中故蹇而又蹇以求濟之非以其身之故也不言吉凶者占者但當鞠躬盡力而已至於成敗利鈍則非所論也象曰王臣蹇蹇終無尤也雖艱厄於蹇時然其志在濟君難雖未能成功然終無過尤也聖人取其志義而謂其無尤所以勸忠藎也九三往蹇來反九三以剛居正處下體之上當蹇之時在下者皆柔必依於三是為下所仰附者也三與上為正應上隂柔而無位不足以為援故上往則蹇也來下來也反歸也三為下二隂所喜故來為反其所也稍安之地也朱子曰反就二隂得其所安象曰往蹇來反內喜之也內在下之隂也方蹇之時隂柔不能自立故皆附於九三之陽而喜愛之九之處三在蹇為得其所也處蹇而得下之心可以求安故以來為反猶春秋之言歸也六四往蹇來連往則益入於坎險之深往蹇也居蹇難之時同處艱厄者其志不謀而同也又四居上位而與在下者同有得位之正又與三相比相親者也三與初同類相當者也是與下同志衆所從附也故曰來連來則與在下之衆相連合也能與衆合得處蹇之道也朱子曰連於九三合力以濟象曰往蹇來連當位實也四當蹇之時居上位不往而來與下同志固足以得衆矣又以隂居隂為得其實以誠實與下故能連合而下之二三亦各得其實初以隂居下亦其實也當同患之時相交以實其合可知故來而連者當位以實也處蹇難非誠何以濟當位不曰正而曰實上下之交主於誠實用各有所異也九五大蹇朋來五居君位而在蹇難之中是天下之大蹇也當蹇而又在險中亦為大蹇大蹇之時而二在下以中正相應是其朋助之來也方天下之蹇而得中正之臣相輔其助豈小也得朋來而無吉何也曰未足以濟蹇也以陽剛中正之君而方在大蹇之中非得陽剛中正之臣輔之不能濟天下之蹇也二之中正固有助矣然以隂柔之助濟天下之難非所能也自古聖主濟天下之蹇未有不由賢聖之臣為之助者湯武得伊吕是也中常之君得剛明之臣而能濟大難者則有矣劉禪之孔明唐肅宗之郭子儀德宗之李晟是也雖賢明之君茍無其臣則不能濟於難也故凡六居五九居二者則多由助而有功䝉泰之類是也九居五六居二則其功多不足屯否之類是也蓋臣賢於君則輔君所不能臣不及君則贊助之而已故不能成大功也問九五何故為大蹇朱子曰五是為蹇主凡人身之蹇只一身事至大蹇須人主當之問大蹇朋來之義曰處九五尊位而居蹇之中所以為大蹇所謂遺大投艱於朕身人君當此則須屈羣䇿用羣力乃可濟也象曰大蹇朋來以中節也朋者其朋類也五有中正之德而二亦中正雖大蹇之時不失其守蹇於蹇以相應助是以其中正之節也上下中正而弗濟者臣之才不足也自古守節秉義而才不足以濟者豈少乎漢李固王允晉周顗王導之徒是也上六往蹇來碩吉利見大人六以隂柔居蹇之極冒極險而往所以蹇也不往而來從五求三得剛陽之助是以碩也蹇之道厄塞窮蹙碩大也寬裕之稱來則寬大其蹇舒矣蹇之極有出蹇之道上六以隂柔故不得出得剛陽之助可以舒卷而已在蹇極之時得舒則為吉矣非剛陽中正豈能出乎蹇也利見大人蹇極之時見大德之人則能有濟於蹇也大人謂五以相比發此義五剛陽中正而居君位大人也在五不言其濟蹇之功而上六利見之何也曰在五不言以其居坎險之中無剛陽之助故無能濟蹇之義在上六蹇極而見大德之人則能濟於蹇故為利也各爻取義不同如屯初九之志正而於六二則目之為寇也諸爻皆不言吉上獨言吉者諸爻皆得正各有所善然皆未能出於蹇故未足為吉惟上處蹇極而得寬裕乃為吉也朱子曰已在卦極往無所之益以蹇耳來就九五與之濟蹇則有碩大之功大人指九五也象曰往蹇來碩志在內也利見大人以從貴也上六應三而從五志在內也蹇既極而有助是以碩而吉也六以隂柔當蹇之極密近剛陽中正之君自然其志從附以求自濟故利見大人謂從九五之貴也所以云從貴恐人不知大人為指九五也解初六無咎六居解初患難既解之時以柔居剛以隂應陽柔而能剛之義既無患難而所處得剛柔之宜患難既解安寧無事惟自處得宜則為無咎矣方解之初宜安靜以休息之爻之詞寡所以示意困序卦升而不已必困故受之以困升者自下而上自下升上以力進也不已必困矣故升之後受之以困也困者憊之之義為卦兊上坎下水居澤上則澤中有水也乃在澤下枯涸無水之象為困之之義又兊以隂在上坎以陽居下與上六在二陽之上而九二陷於二隂之中皆隂柔掩於陽剛所以為困也君子為小人所掩蔽窮困之時也困亨貞大人吉無咎有言不信如卦之才則困而能亨且得貞正乃大人處困之道也故能吉而無咎大人處困不唯其道自吉樂天安命乃不失其吉也况隨時善處復有裕乎有言不信當困而言人誰信之朱子曰困者窮而不能自正之義坎剛為兊柔所掩九二為二隂所掩四五為上六所掩所以為困坎險兊說處險而說是身雖困而道則亨也二五剛中又有大人之象占者處困能亨則得其正矣非大人其孰能之故曰貞又曰大人者明不正之小人不能當也有言不信又戒之以當持晦默不可尚口以取困窮彖曰困剛掩也卦所以為困以剛為柔所掩蔽也陷於下而掩於上所以困也陷亦掩也剛陽君子而為隂柔小人所掩蔽君子之道困窒之時也險以說困而不失其所亨其唯君子乎以卦才言處困之道也下險而上說為處險而能說雖在困窮艱險之中樂天安義自得其說樂也時雖困也處不失義則其道自亨困而不失其所亨也能如是者其惟君子乎時當困而反亨身雖亨乃其道之困也君子大人通稱貞大人吉以剛中也困而能貞大人所以吉也蓋其以剛中之道也五與二是也非剛中則遇困而失其正矣有言不信尚口乃窮也當困而言人所不信欲以口免困乃所以致窮也以說處困故有尚口之戒象曰澤無水困君子以致命遂志澤無水困之之象也君子當困窮之時既盡其防慮之道而不得免則命也當推致其命以遂其志知命之當然也則窮塞禍患不以動其心行吾義而已茍不知命則恐懼於險難隕穫於窮厄所守亡矣安能遂其為善之志乎朱子曰致命如見危致命之義不管生死不顧身命但遂其志而已猶言置死生於度外也又曰君子道窮之時但當委置其命以遂吾之志致命猶送這命與它不復為我之有雖委致其命而志則自遂無所回屈伊川解作推致其命雖說得通然論語中致命都是委致之致見危授命亦是此意授亦致字之意言將此命授與之也初六臀困于株木入于幽谷三嵗不覿六以隂柔處於至卑又居坎險之下在困不能自濟者也必得在上剛明之人為援助則可以濟其困矣初與四為正應九四以陽而居隂為不正失剛而不中又方困於隂掩是惡能濟人之困猶株木之不能䕃覆於物株木無枝葉之木也四近君之位在他卦不為無助以居困而不能庇物故為株木臀所以居也臀困於株木謂無所庇而不得安其居居安則非困也入于幽谷隂柔之人不能安其所遇既不能安於困則益迷暗妄動入于深困幽谷深暗之所也方益入于困無自出之勢故至三嵗不覿終困者也不覿不遇其所言也朱子曰臀物之底也困于株木傷而不能安也象曰入于幽谷幽不明也幽者不明也謂益入昏暗自陷於深困也明則不至於陷矣九二困于酒食朱紱方來利用享祀征凶無咎酒食人所欲而所以施惠也二以剛中之才而處困之時君子安其所遇雖窮厄險難無所動其心不恤其為困也所困者惟困于所欲耳君子之所欲者澤天下之民濟天下之困也二未得遂其欲施其惠故為困于酒食也大人君子懷其道而困于下必得有道之君求而用之然後能施其所藴二以剛中之德困於下上有九五剛中之君道同德合必來相求故云朱紱方來方且來也朱紱王者之服蔽膝也以行來為義故以蔽膝言之利用享祀享祀以至誠通神明也在困之時利用至誠如享祀然其德既誠自能感通於上自昔賢哲困于幽逺而德卒升聞道卒為用者惟自守至誠而已征凶無咎方困之時若不至誠處以俟命往而求之則犯難得凶乃自取也將誰咎乎不度時而征乃不安其所為困所動也失剛中之德自取凶悔何所怨咎諸卦二五以隂陽相應而吉唯小畜與困乃厄於隂故同道相求小畜陽為隂所畜困陽為隂所掩也象曰困于酒食中有慶也雖困於所欲未能施惠於人然守其剛中之德必能致亨而有福慶也雖使時未亨通守其中德亦君子之道亨乃有慶也六三困于石據于蒺藜入于其宫不見其妻凶六三以隂柔不中正之質處極險而用剛居陽用剛也不善處困之甚者也石堅重難勝之物蒺藜刺不可據之物三以剛險而上進則二陽在上力不能勝堅不可犯益自困耳困于石也以不善之德居九二剛中之上其不安猶藉刺據于蒺藜也進退既皆益困欲安其所益不能矣宫其居所安也妻所安之主也知進退之不可而欲安其居則失其所安矣進退與處皆不可惟死而已其凶可知繫辭曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得而見邪二陽不可犯也而犯之以取困是非所困而困也名辱其事惡也三在二上固為據之然茍能謙柔以下之則無害矣乃用剛險以乘之則不安而取困如據蒺藜也如是死期將至所安之主可得而見乎象曰據于蒺藜乘剛也入于其宫不見其妻不祥也據于蒺藜謂乘九二之剛不安猶藉刺也不祥者不善之徵失其所安者不善之效故云不見其妻不祥也九四來徐徐困于金車吝有終惟力不足故困亨困之道必由援助當困之時上下相求理當然也四與初為正應然四不以中正處困其才不足以濟人之困初六比二二有剛中之才足以拯困則宜為初所從矣金剛也車載物者也二以剛在下載已故謂之金車四欲從初而阻於二故其來遲疑而徐徐是困于金車也己之所應疑其少已而之它將從之則猶豫不敢遽前豈不可羞吝乎有終者事之所歸者正也初四正應終必相從也寒士之妻弱國之臣各安其正而已茍擇勢而從則惡之大者不容於世矣二與四皆以陽居隂而二以剛中之才所以能濟困也居隂者尚柔也得中者不失剛柔之宜也朱子曰初六九四之正應九四處位不當不能濟物而初六方困於下又為九二所隔故其象如此然邪不勝正故其占雖為可吝而必有終也金車未詳疑坎有輪象也象曰來徐徐志在下也雖不當位有與也四應於初而隔於二志在下求故徐徐而來雖居不當位為未善然其正應相與故有終也九五劓刖困于赤紱乃徐有說利用祭祀截鼻曰劓傷於上也去足為刖傷於下也上下皆掩於隂為其傷害劓刖之象也五君位也人君之困由上下無與也赤紱臣下之服取行來之義故以紱言人君之困以天下不來也天下皆來則非困也五雖在困而有剛中之德下有九二剛中之賢道同德合徐必相應而來共濟天下之困是始困而徐有喜說也利用祭祀祭祀之事必致其至敬而後受福人君在困時宜念天下之困求天下之賢若祭祀然致其誠敬則能致天下之賢濟天下之困矣五與二同德而云上下無與何也曰隂陽相應者自然相應也如夫婦骨肉分定也五與二皆陽爻以剛中之德同而相應相求而後合者也如君臣朋友義合也方其始困安有上下之與有與則非困也故徐合而後有說也二云享祀五云祭祀大意則宜用至誠乃受福也祭祀享泛言之則可通分而言之祭天神祀地示享人鬼五君位言祭二在下言享各以其所當用也朱子曰劓刖者傷於上下既傷則赤紱無所用而反為困矣九五當困之時上為隂掩下則乘剛故有此象然剛中而說體故能遲久而有說也占具象中又利祭祀久當獲福象曰劓刖志未得也乃徐有說以中直也利用祭祀受福也始為隂掩無上下之與方困未得志之時也徐而有說以中直之道得在下之賢共濟於困也不曰中正與二合者云直乃宜也直比正意差緩盡其誠意如祭祀然以求天下之賢則能亨天下之困而享受其福慶也上六困于葛藟于臲卼曰動悔有悔征吉物極則反事極則變困既極矣理當變也葛藟纒束之物臲卼危動之狀六處困之極為困所纒束而居最髙危之地困于葛藟與臲卼也動悔動輒有悔無所不困也有悔咎前之失也曰自謂也若能曰如是動皆得悔當變前之所為有悔也能悔則往而得吉也困極而征則出於困矣故吉三以隂在下卦之上而凶上居一卦之上而無凶何也曰三居剛而處險困而用剛險故凶上以柔居說唯為困極耳困極則有變困之道也困與屯之上皆以無應居卦終屯則泣而漣如困則有悔征吉屯險極而困說體故也以說順進可以離乎困也朱子曰以隂柔處困極故有困于葛藟于臲卼曰動悔之象然物窮則變故其占曰若能有悔則可以征而吉矣象曰困于葛藟未當也動悔有悔吉行也為困所纒而不能變未得其道也是處之未當也知動則得悔遂有悔而去之可出於困是其行而吉也南軒困齊記云在易之繫辭三陳九卦意義深切至於困則曰困德之辨也又曰困窮而通又曰困以寡怨嗚呼聖人發明處困之義備盡於此是可不盡心以體之乎夫窮達者在外者也理義者在我者也在外者存於時命而在我者無斯須而可離世之惑者於其存於時命者乃欲以人力而强移於其不可離者則違之而忘反居得則患失患失則覬得或能行於其所易而不能行於其所難能自保於安逸之時而有變於危窮之際是皆非其心之正也窮達亂之也君子則不然其心日夕皇皇然惟知在我者禮義之安而行寧恤其它故其處困也致命而已於天何怨順義而已於人何尤而反諸其躬則益念其所未至惟恐思之不精益勉其所未能惟恐行之不力是君子之處困抑其進德修業之時也如斯而後庶幾為不負聖人之訓歟李公晦困齊說云困之義大矣在易以德言曰困亨貞大人吉又曰困德之辨是也在論語中庸以學言曰困而學之又曰或困而知之是也困之為卦二五皆剛而得中為賢人君子德成於內之象而外為三隂所掩蓄而不獲施言而不見信可謂困矣然遁世無悶不見是而無悶其身可屈而其志不可奪安於義命頽乎其處順也然明雖困於人而幽可感於神卦爻它皆無所利而獨利祭祀豈不以人不能知而鬼神獨知之乎是謂以德言憤未唘悱未發思之而未明行之而未得困於心衡於慮若躋峻絶陵險阻為力甚勞而望道甚逺惟竭其勉力以赴之俯焉孳孳夙夜匪懈則晦斯光窒斯通習與性成而聖賢同歸矣故曰及其知之一也是謂以學言某人名某人讀書之室曰困自為之銘復俾豫題其後豫謝不敏而不獲乃為之言曰學然後成德德成矣無入而不自得焉困不困豈足道哉蓋以德言者謂困於外者也身困而道亨致命以遂其志無所用吾力之謂也以學言者謂困於內者也任重而道逺弗慮胡獲弗為胡成竭吾才以從之之謂也二者固有辨矣孟子曰人之有德慧術知者常存乎疢疾謂困之進人也因其困於外而益以進於內是亦以學言也嗚呼亦懋其學而要其德之成而已未濟上九有孚于飲酒無咎濡其首有孚失是九以剛在上剛之極也居明之上明之極也剛極而能明則不為躁而為決明能燭理剛能斷義居未濟之極非得濟之位無可濟之理則當樂天順命而已若否終則有傾時之變也未濟則無極而自濟之理故止為未濟之極至誠安於義命則可無咎飲酒自樂也不樂其處則忿躁隕穫入於凶咎矣若從樂而耽肆過禮至濡其首亦非能安其處也有孚自信於中也失是失其宜也如是則於有孚為失也人之處患難知其無可奈何而放意不反者豈安於義命者哉象曰飲酒濡首亦不知節也飲酒至於濡首不知節之甚也所以至如是不能安義命也能安則不失其常矣按易諸卦凡言利涉大川皆取濟險涉難之義今附於此需有孚光亨貞吉利涉大川𫝊曰需者須待也以二體言之乾之剛健上進而遇險未能進也故為需待之義以卦才言之五居君位為需之主有剛健中正之德而誠信充實於中中實有孚也有孚則能光明而亨通則貞正而吉也以此而需何所不濟雖險無難矣故利涉大川彖曰利涉大川往有功也𫝊曰既有孚而貞正雖涉險阻往則有功也同人于野亨利涉大川利君子貞𫝊曰野謂曠野取逺與外人之義夫同人者以天下大同之道則聖賢大公之心也常人之同者以其私意所合乃昵比之情耳故必于野謂不以昵近情之所私而於郊野曠逺之地既不係所私乃至公大同之道無逺不同也其亨可知能與天下大同是天下皆同之也天下皆同何險阻之不可濟何艱危之不可亨故利涉大川彖曰同人于野亨利涉大川乾行也𫝊曰至誠無私可以蹈險難者乾之行也無私天德也謙初六謙謙君子用涉大川吉𫝊曰初六以柔順處謙又居一卦之下為自處卑下之至謙而又謙也故曰謙謙能如是君子也自處至謙衆所共與也雖用涉險難亦無患害况居平易乎何所不吉也蠱元亨利涉大川𫝊曰既蠱則有復治之理自古治必因亂亂必開治理自然也如卦之才以治蠱則能致元亨也蠱之大者濟時之艱難險阻也故利涉大川彖曰利涉大川往有事也𫝊曰方天下壞亂之際宜艱險以往而濟之是往有所事也大畜利貞不家食吉利涉大川𫝊曰莫大於天而在山中艮在上而止乾於下皆藴至大之象也在人為學術道德充積於內乃所畜之大也人之藴畜宜得正道故云利貞若夫異端偏學所蓄至多而不正者固有矣既道德充積於內宜在上位以享大祿施為於天下則不獨一身之吉天下之吉也故不家食則吉所畜既大宜施之於時濟天下之艱險乃大畜之用也故利涉大川彖曰利涉大川應乎天也𫝊曰所以能涉大川者以應乎天也六五下應乾之中爻乃應乾而行也所行能應乎天無艱險之不可濟况其它乎頤上九由頤厲吉利涉大川𫝊曰上九以剛陽之德居師傅之任六五之君柔順從於己賴己之養是當天下之任天下由之以養也以人臣而當是任必常懷危厲則吉也如伊尹周公何嘗不憂勤兢畏故得終吉夫以君之才不足而倚賴於己身當天下大任宜竭其才力濟天下之艱危成天下之治安故曰利涉大川益利有攸往利涉大川𫝊曰益者益天下之道也故利有攸往益之道可以濟險難利涉大川也彖曰利涉大川木道乃行𫝊曰益之為道於平常無事之際其益猶小當艱危險難則所益至大故利涉大川也於濟艱難乃益道大行之時也益誤作木或以為上巽下震故云木道非也渙亨王假有廟利涉大川利貞𫝊曰渙離散也人之離散由乎中人心離則散矣治乎散亦本於中能收合人心則散可聚也故卦之義皆主於中利貞合渙散之道在乎正固也此章不解利涉一句恐脫誤彖曰利涉大川乘木有功也𫝊曰治渙之道當濟於險難而卦有乘木濟川之象上巽木也下坎水大川也利涉險以濟渙也木在水上乘木之象乘木所以涉川也涉則有濟渙之功矣中孚豚魚吉利涉大川利貞𫝊曰豚躁魚冥物之難感者也孚信能感於豚魚則無不至矣所以吉也忠信可以蹈水火况涉川乎守信之道在乎堅正故利於貞也彖曰利涉大川乘木舟虛也𫝊曰以中孚涉險難其利如乘木濟川而以虛舟也虛舟則無沈覆之患卦虛中為虛舟之象易之興也其于中古乎作易者其有憂患乎朱子曰夏商之末易道中微文王拘於羑里而繫彖辭易道復興是故履德之基也履禮也上天下澤分定不易必謹乎此然後其德有以為基而立也謙德之柄也謙者自卑而尊人又為禮者之所當執持而不可失者也復德之本也恆德之固也損德之修也益德之裕也困德之辨也井德之地也巽德之制也九卦皆反身修德以處憂患之事也而有序焉基所以立柄所以持復者心不外而善端存恆者守不變而常且久懲忿窒欲以修身遷善改過以長善困以自驗其力井以不變其所然後能巽順於理以制事變履和而至謙尊而光復小而辨於物恆雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隱此如書之九德禮非强世然事皆至極謙以自卑而尊且光復陽微而不亂於羣隂恆處雜而常德不厭損欲先難習熟則易益但充長而不造作困身困而道亨井不動而及物巽稱物之宜而潛隱不露履以和行謙以制禮復以自知恆以一德損以逺害益以興利困以寡怨井以辨義巽以行權寡怨謂少所怨尤辨義謂安而能慮此章三陳九卦以明處憂患之道履德之基是要以踐履為本謙德之柄只是要謙退若處患難而矯亢自髙取禍必矣復德之本如孟子所謂自反困德之辨困而通則可辨其是困而不通則可辨其非損是懲忿窒欲益是修德益令廣大巽只是低心下意要制事須是將心入巽裏面去順它道理方能制事方能行權三陳九卦初無它意觀上面其有憂患一句便見得是聖人說處憂患之道聖人去這裏偶然看見這幾卦有這個道理所以就這個說去若論到底睽蹇皆是憂患底事何故却不說以此知聖人只是偶然去這裏見得有此理便就這裏說去聖人視易如雲行水流初無定相不可確定問如何止取九卦先生曰聖人論處憂患偶及此卦爾天下道理只在聖人口頭開口便是道理偶說此九卦意思自是易中儘有處憂患底卦非謂九卦之外皆非所以處憂患也若以困為處憂患底卦則屯蹇非處憂患而何觀聖人之經正不當如此後世拘於象數者乃以為九陽數聖人之舉九卦蓋合此數尤泥而不通矣問巽何以為德之制曰巽為資斧多作斷制之象損先難後易謂損之初在我亦有所勉强在人亦有所難堪久之當事理順人心這裏方易益長裕而不設謂充長自家之德教寬裕而已困而寡怨是得其處困之道故無所怨於天無所尤於人井是不動之物然其水却流行出去利物井以辨義本義謂安而能慮蓋守得自家先定方能辨事之是非若自家心先不定事到面前安能辨其義問巽稱而隱曰以巽以行權觀之則稱字宜音去聲為稱物之義又問巽有優遊巽入之義權是仁精義熟於事能優游以入之意曰巽是入細底意稱而隱是巽順恰好底道理有隱而不能稱量者有能稱量而不能隱伏不露形迹者皆非巽之道問隱字何訓曰隱不見也如風之動物無物不入但見其動而不見其形權之用亦猶是也問井德之地曰井有本故澤及於物而井未嘗動故曰居其所而遷如人有德而後能施以及人然其德性未嘗動也惟井居其所然水却流行出去而不窮猶人心有持守不動而應變於外則不窮也巽以行權謂見得道理精熟後於物之精微委曲處無所不入所以云云問權是逶迤委折以順理否曰然巽有入之義如風之入物只是巽便能入義理之中無細不入愚按損先難而後易蓋忿心易發而難制欲心易開而難塞故其始也懲之窒之為甚難然天理既明人欲自熄其為力又有所不難者故曰後易益長裕而不設益主利物而言長裕者謂充廣吾寬裕之德則其利益自然及物不待安排做作也故曰不設九卦之義更當各就全卦反覆觀之以求其所謂處憂患者庶乎得之又此章之下云易之為書也不逺云云又明於憂患與故則易之一書無非明於憂患又不特九卦為然也易之興也其當殷之末世周之盛德耶當文王與紂之事耶是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要無咎此之謂易之道也朱子曰危懼故得平安輕易則必傾覆易之道也愚按危平易傾二語最為切至處憂患者其深味之衛靈公問陳孔子行在陳絶糧從者病莫能興見前按史記楚使人聘孔子用於楚則陳蔡大夫危矣於是乃相與發徒役圍孔子於野不得行絶糧從者病莫能興孔子講誦絃歌不衰子路愠見曰君子亦有窮乎孔子曰君子固窮小人窮斯濫矣孔子知弟子有愠心乃召子路而問曰詩云匪兕匪虎率彼曠野吾道非耶吾何為於此子路曰意者吾未仁耶人之不吾信也孔子曰有是乎由使仁者而必信安有王子比干子路出子貢入見曰夫子之道至大也故天下莫能容夫子盍少貶焉孔子曰賜良農能稼而不能為穡良工能巧而不能為順君子能其道綱而紀之統而理之而不能為容今爾不修爾道而求為容賜而志不逺子貢出顔回入見曰夫子之道大故天下莫能容雖然夫子推而行之不容何病不容然後見君子夫道之不修也是吾醜也夫道既已大修而不用有國者之醜也不容何病不容然後見君子孔子欣然而笑曰有是哉顔氏之子使爾多財吾為爾宰於是使子貢至楚楚昭王興師迎孔子然後得免孟子曰舜發於畎畝之中傅說舉於版築之間膠鬲舉於魚鹽之中管夷吾舉於士孫叔敖舉於海百里奚舉於市故天將降大任於是人也必先苦其心志勞其筋骨餓其體膚空乏其身行拂亂其所為所以動心忍性增益其所不能朱子曰降大任使之任大事也若舜以下是也空窮也乏絶也拂戾也言使為不遂多背戾也動心忍性謂竦動其心堅忍其性也然所謂性亦指氣稟食色而言耳程子曰若要熟也須從這裏過人恆過然後能改困於心衡於慮而後作徵於色發於聲而後喻中人之性常於有過然後能改蓋不能謹於平日故必事勢窮蹙以至困於心衡於慮然後能奮發而興起不能燭於幾微故必事理暴著以至驗於人之色發於人之聲然後能警悟而通曉也入則無法家拂士出則無敵國外患者國恆亡此言國亦然也法家法度之世臣也拂士輔拂之賢士也然後知生於憂患而死於安樂也以上文觀之則知人之生全出於憂患而死亡由於安樂矣尹氏曰言困窮拂鬱能堅人之志而熟人之仁以安樂失之者多矣南軒曰天將以大任之於後而憂患先之以成其德此豈人之所為哉所謂莫之為而為者天也其所遭若是而所成就若是乃天也此六人者雖有聖賢淺深之異然始也經履之艱而卒焉能勝其任則一也以舜之生知非有待於處憂患以成其德也舉舜之起於畎畝以見聖人亦由側微而興耳若在它人因憂患以成德則如下所云是已夫苦其心志勞其筋骨餓其體膚空乏其身行拂亂其所欲為是使之動心忍性而已動心言其心有所感動也忍性言忍其性之偏也動心則善端日萌而良心可存忍性則氣稟日化而天性可復此所謂增益其所不能也人恆過然後能改言凡人常見其有過而後能改過夫其漠然不察其有則過將日滋何改之有知用力則知吾過之多而改之惟恐不暇矣困於心謂有所攖拂於心衡於慮謂有所鬱塞於慮必如是而後有作作者油然有所興起於中也徵於色發於聲謂憂患憤悱發見於聲色必如是而後喻喻者言盎然默識其理之所在也作也喻也身親乃能知之非言語所可盡也則又推而言之以謂為國者亦然入則無法家拂士出則無敵國外患者國恆亡蓋泰然自以為是自以為莫豫毒則驕怠日長至於滅亡而不悟矣大抵治亂興亡常分於敬肆之間使在內而每聞逆耳之規在外而每有覬覦之患則戒懼之心存是心存則國可為也然後知生於憂患而死於安樂生言生之道也在身而身泰施之天下國家無往而不為福也死言死之道也天命絶於其躬而敗於乃家凶於乃國者也然繼體之君公侯之裔生而處安樂之地無憂患之可歷則將如何何必也念安樂之可畏思天命之無常戒謹恐懼不敢有其安樂是乃困心衡慮之方生之道也然則所謂死於安樂者非安樂之能死之也以其溺於安樂而自絶焉耳故在君子則雖處安樂而生理未嘗不遂在小人則雖處憂患而亦未嘗不死於憂患所謂小人窮斯濫矣是也孟子曰人之有德慧術知者恆存乎疢疾朱子曰德慧者德之慧術知者術之知疢疾猶灾患也言人必有疢疾則能動心忍性增益其所不能也獨孤臣孽子其操心也危其慮患也深故達孤臣逺臣孽子庶子皆不得於君親而常有疢疾者也達謂達於事理即所謂德慧術知也南軒曰疢疾謂憂患也蓋人平居無事之時漠然不省者多矣惟夫疢疾加焉則動心忍性有以感發故德慧術知由此而生以孤臣孽子觀之可見孤臣孽子操心危慮患深危故専一而不敢肆深故精審而不敢忽専精之極故於事理能有所通達也然所謂德慧術知蓋有小大所謂達者亦有淺深要之由憂患而有所發則一也然則處安樂之地者誦斯言可不思夫逸豫之溺人而深求所以戒懼乎當憂患之際者誦斯言可不念其為進德修業之要而自勉勵乎程子曰蹇便是處蹇之道困便是處困之道道無時不可行張子曰富貴利澤厚吾之生也貧賤憂戚庸玉汝於成也右言處患難之道處死生論語子曰志士仁人無求生以害仁有殺生以成仁說見前卷言仁篇朱子曰志士仁人所以不求生以害仁者乃其心中自有打不過處不忍就彼以害此且非為恐虧其所以生者而後殺身以成仁也所謂成仁者亦但以遂其良心之所安而已非欲全其所以生而後為之也此解中常有一種意思不以仁義忠孝為吾心之不能已者而以為畏天命謹天職欲全其所以生者而後為之則是本心之外别有一念計及此等利害重輕而後為之也誠使真能舍生取義亦出於計較之私而無慤實自盡之意矣大率全所以生等說自它人旁觀者言之以為我能如此則可若挾是心以為善則已不妥帖况自言之豈不益可笑乎吕覽所載直躬證父一而載取名事正類此爾按朱子此段係答南軒論殺身成仁之義子畏於匡顔淵後子曰吾以女為死矣曰子在回何敢死朱子曰後謂相失在後何敢死謂不赴鬭而必死也胡氏曰先王之制民生於三事之如一惟其所在則致死焉况顔氏之於孔子恩義兼盡又非他人之為師弟子者而已即孔子不幸而遇難回必捐生以赴之矣幸而不死則必上告天子下告方伯請討以復讎不但已也夫子而在則回何為而不愛其死以犯匡人之鋒乎或問顔回親在不得為夫子死者如何曰胡氏曰程子嘗言之矣閭巷之人辭親逺適則同患難有相死之理况朋友乎况弟子之於師乎當預行而先斷不可臨事而始謀也子路問成人子曰云云已見前卷禮樂論曰今之成人者何必然見利思義見危授命久要不忘平生之言亦可以為成人矣朱子曰授命謂不愛其生持以與人也子張曰士見危致命見得思義已見前心思篇子路曰桓公殺公子糾召忽死之管仲不死曰未仁乎子曰桓公糾合諸侯不以兵車管仲之力也如其仁如其仁子貢曰管仲非仁者與桓公殺公子糾不能死又相之子曰管仲相桓公霸諸侯一匡天下民到於今受其賜微管仲吾其被髮左袵矣豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也說已見前言仁篇其論管仲王魏處當熟考若由也不得其死然全章見前卷聖賢氣象篇尹氏曰子路剛强有不得其死之理故因以戒之其後子路卒死於孔悝之難南軒曰孔悝被劫子路死之誠不可以不死謂之不得其死不可也然其從孔悝則有為之死之理始擇之未善也則不幾於不得其死乎若比干則可謂得其死者矣然則求生以害仁者謂之不得其生可也子路雖不得其死而與是類固不可同日而語矣按史記仲由𫝊初衛靈公有寵姬曰南子靈公太子蒯聵得過南子懼誅出奔及靈公卒而欲立公子郢郢不肯曰亡人太子之子輒在於是衛立輒為君是為出公出公立十二年其父蒯聵在外不得入子路為衛大夫孔悝之邑宰蒯聵乃與孔悝作亂謀入孔悝家遂與其徒襲攻出公奔魯而蒯聵入立是為莊公方孔悝作亂子路在外聞之而馳往遇子羔出衛城門謂子路曰出公去矣而門已閉子可還矣毋輕受其禍子路曰食其食者不避其難子羔卒去有使者入城城門開子路隨而入造蒯聵蒯聵與孔悝登臺子路曰君焉用孔悝請得而殺之蒯聵弗聽於是子路欲燔臺蒯聵懼乃下石乞壺黶攻子路擊斷子路之纓子路曰君子死而冠不免遂結纓而死孔子聞衛亂曰嗟乎由死矣已而果死問由之死疑其甚不明於大義豈有子而拒父如是之逆而可以仕之乎朱子曰然仲由之死誠未為至當然其誤不在致死之時乃在於委贄之始又曰子路只見下一截不見上一截孔悝之事它知是食焉不避其難而不知食出公之食為不當也東坡嘗論及此矣問是初仕衛時便不是否曰然問子路之死是否曰非是輒如何主豈可仕也孔悝亦自是個不好底人子路但見得可仕於大夫而不知輒之國非可仕之國問孔門弟子多仕於列國大夫是如何曰當時仕進只有此一門舍此無從可仕所以顔閔寧不仕耳子路死孔悝之難未為不是只是當初仕孔悝時錯了至此不得其死衛君不正冉有子貢便能疑而問知有思量便不去事他若子路粗率全不信聖人說話必也正名亦是教子路不要仕衛他更說夫子之迂云云春秋宋督弒其君與夷及其大夫孔父公羊𫝊曰宋督將弒殤公孔父生而存則殤公不得而弒也於是先攻孔父之家殤公知孔父死已必死趨而救之皆死焉孔父正色而立於朝則人莫敢過而致難於其君者孔父可謂義形於色矣胡氏曰按左𫝊宋殤公立十年十一戰民不堪命孔父為司馬無能改於其德非所謂格君心之非者然君弒死於其難處命不渝亦可以無愧矣父者名也著其節而書及不失其官而書大夫是春秋之所賢也賢而名之何也故侍讀劉敞以謂既名其君於上則不得字其臣於下此君前臣名禮之大節也督將弒殤公孔父生而存則不可得而弒於是乎先攻孔父而後及其君能為有無亦庶幾焉凡亂臣賊子畜無君之心者必先剪其所忌而後動於惡不能剪其所忌則有終其身而不敢動也華督欲弒君而憚孔父劉安欲叛漢而憚汲直曹操欲禪位而憚孔融此數君子者義形於色皆足以衛宗社而杜邪心奸臣所以憚也不有君子其能國乎春秋賢孔父示後世人主崇奬節義之臣乃天下之大間有國之急務乎宋萬弒其君捷及其大夫仇牧公羊𫝊曰萬搏閔公絶其脰仇牧聞君弒趨而至遇之於門手劒而叱之萬臂殺仇牧碎其首齒著於門闔仇牧可謂不畏强禦矣胡氏曰君弒而大夫死於其難春秋書之者其所取也大夫死於弒君之難而有不書者故知孔父牧息皆所取也夫仇牧可謂不畏强禦矣然徒殺其身不能執賊無益於事也亦足取乎食焉不避其難義也徒殺其身不能執賊亦足為求利焉而逃其難者之訓矣何名為無益哉夫審事物之重輕者權也權重輕而處之得其宜者義也太宰督亦死於閔公之難削而不書者身有罪也惠伯死於子惡之難亦削而不書者非君命也召忽死於子糾之難孔子比於匹夫匹婦之諒自經於溝瀆而莫之知者所事不正也崔杼弒君晏平仲曰人有君而人弒之吾焉得死之而焉得亡之君子不以是罪晏子者齊莊公不為社稷死而晏子非其私昵之臣也若仇牧荀息立乎人之本朝執國之政而君見弒不以其私也雖欲弗死焉得而勿死聖人書而弗削以為求利焉而逃其難者之勸也惟此義不行然後有視棄其君猶土梗辨髦曽莫之省而三綱絶矣晉里克弒其君卓及其大夫荀息晉語晉獻公伐驪戎左氏𫝊初獻公使荀息傅奚齊公疾召之曰以是藐諸孤辱在大夫其若之何稽首而對曰臣竭其股肱之力加之以忠貞其濟君之靈也不濟則以死繼之公曰何謂忠貞對曰公家之利知無不為忠也送往事居耦俱無猜貞也及里克將殺奚齊先告荀息曰三怨將作秦晉輔之子將何如荀息曰將死之里克曰無益也荀息曰吾與先君言矣不可以二能欲復言而愛身乎雖無益也將焉辟之且人之欲善誰不如我我欲無二而能謂人已乎冬十月里克殺奚齊于次書曰殺其君之子未葬也荀息將死之人曰不如立卓子而輔之荀息立公子卓以葬十一月里克殺公子卓于朝荀息死之君子曰詩所謂白圭之玷尚可磨也斯言之玷不可為也荀息有焉胡氏曰荀息者奚齊卓子之傅也君弒而死於難書及所以著其節書大夫不失其官也於荀息何取焉若息者可謂不食其言矣或曰息既從君於昏不食其言庸足取乎世衰道微人愛其情私相疑二以成傾危之俗至於刑牲㰱血要質鬼神猶不能固其約也孰有可以託六尺之孤寄百里之命臨大節而不可奪如息者哉自古皆有死民無信不立故聖人以信易食而君子以信易生息不食言其可少乎左氏𫝊晉懷公命無從亡人期期而不至無赦狐突之子毛及偃從重耳在秦弗召冬懷公執狐突曰子來則免對曰子之能仕父教之忠古之制也䇿名委質二乃辟也今臣之子名在重耳有年數矣若又召之教之二也父教子二何以事君刑之不濫君之明也臣之願也淫刑以逞誰則無罪臣聞命矣乃殺之楚子圍宋晉使解楊如宋使無降楚曰晉師悉起將至矣鄭人囚而獻諸楚楚子厚賂之使反其言不許三而許之登諸樓車使呼宋人而告之遂致其君命楚子將殺之使與之言曰爾既許不穀而反之何故非我無信女則棄之速即爾刑對曰臣聞之君能制命為義臣能承命為信信載義而行之為利謀不失利以衛社稷民之主也義無二信欲為義者不行兩信信無二命欲行信者不受二命君之賂臣不知命也受命以出有死無霣霣廢隊也又可賂乎臣之許君以成命也成其君命死而成命臣之祿也寡君有信臣已不廢命下臣獲考考成也死有何求楚子舍之以歸左氏宣公十五年按漢吳楚之難有中大夫者事適類此楊幸而免中大夫者不幸死焉而其姓名又不幸不見於世悲夫按朱子儀禮經𫝊臣禮篇死節者孔父也仇牧也荀息也狐突也解楊也𢎞演也王蠋也又載晏子一條以見有不當死而不死者其義備矣今自解楊以上已各具録𢎞演王蠋晏子事今附注於此又原繁以為臣無二心狼瞫以死明勇齊太史昆弟以死守官豫讓必報其君之仇皆臣節之大者併附見焉又以泄冶一條繫於末以見國亂君昏有當去而不當死者庶幾臣道之常與變皆曲盡云衛懿公有臣曰𢎞演逺使未還翟人攻衛及懿公於滎澤殺之盡食其肉獨舍其肝𢎞演至報使於肝畢呼天而啼盡哀而止曰臣請為襮襮表也因自殺先出其腹內懿公之肝桓公聞之曰衛之亡也以無道也今有臣若此不可不存於是復立衛於楚丘𢎞演可謂忠矣殺身出生以徇其君非徙徇其君也又令衛之宗廟復立祭祀不絶可謂有功矣樂毅破齊聞晝邑人王蠋賢令軍中環晝邑三十里無入使人請蠋蠋謝不往燕人曰不來吾且屠晝邑蠋曰忠臣不事二君烈女不更二夫齊王不用吾諌故退而耕於野國破君亡吾不能存而又欲劫之以兵吾與其不義而生不若死遂經其頸於樹枝自奮絶脰而死齊崔杼弒其君光晏子立于崔氏之門外聞難而來其人曰死乎曰獨吾君也哉吾死也言已與衆臣無異曰行乎曰吾罪也乎哉吾亡也自謂無罪曰歸乎曰君死安歸言安可以歸君民者豈以陵民社稷是主臣君者豈為其口實社稷是養言君不徒居民上臣不徒衣祿皆為社稷故君為社稷死則死之為社稷亡則亡之謂以公義死亡若為己死而為己亡非其私昵誰能任之私昵所親愛也非所親昵無為當其禍且人有君而弒之吾焉得死之而焉得亡之言已非正卿見待無異於衆臣故不得死其難也將庸何歸門唘而入枕尸股而哭興三踊而出左氏襄二十五年鄭厲公入殺傅瑕使謂原繁曰傅瑕二言有二心於已周有常刑既伏其罪矣納我而無二心者吾皆許之上大夫之事吾願與伯父圖之且寡人出伯父無裏言入又不念寡人寡人憾焉對曰先君桓公命我先人典司宗祏社稷有主而外其心其何二如之茍主社稷國內之民其誰不為臣臣無二心天之制也子儀在位十四年矣而謀召君者庸非二乎莊公之子猶有八人若皆以官爵行賂勸二而可以濟事君其若之何臣聞命矣乃縊而死莊十四年戰於殽也晉梁𢎞御戎萊駒為右戰之明日晉襄公縛秦囚使萊駒以戈斬之囚呼萊駒失戈狼瞫取戈以斬囚禽之以從公乘遂以為右箕之役先軫黜之而立續簡伯狼瞫怒其友曰盍死之瞫曰吾未獲死所其友曰吾與女為難瞫曰周志有之勇則害上不登於明堂死而不義非勇也共用之謂勇吾以勇求右無勇而黜亦其所也謂上不我知黜而宜乃知我矣子姑待之及彭衙既陳以其屬馳秦師死焉晉師從之大敗秦師君子謂狼瞫於是乎君子詩曰君子如怒亂庶遄沮又曰王赫斯怒爰整其旅怒不作亂而以從師可謂君子矣文二年太史書曰崔杼弒其君崔子殺之其弟嗣書而死者二人其弟又書乃舍之南史氏聞太史盡死執簡以往聞既書矣乃還襄二十五年韓魏趙氏殺智伯分其田趙襄子漆智伯之頭以為飲器智伯之臣豫讓欲為之報仇乃詐為刑人挾匕首入襄子宫中塗厠襄子如厠心動索之獲豫讓左右欲殺之襄子曰智伯死無後而此人欲為報仇真義士也吾謹避之耳乃舍之豫讓又漆身為癩吞炭為啞行乞於市其妻不識也行見其友其友識之為之泣曰以子之才臣事趙孟必得近幸子乃為所欲為顧不易耶何乃自苦如此求以報仇不亦難乎豫讓乃應之曰不可既已委質為臣而又求殺之是二心也且為先知報後知為故君賊新君大亂君臣之義吾弗為之矣凡吾所以為此者所以明君臣之義雖難不避也襄子出豫讓伏於橋下襄子至橋馬驚索之得豫讓遂殺之胡氏曰君子為名譽而為善則其善必不誠人臣為利祿而效忠則其忠必不盡雖然滔滔皆是也之人也殆庶乎美觀而不足於夷考矣使智伯有後而豫子奮不顧身為之報仇其心未可知也智伯無後矣氣勢無所可倚矣富貴無所可求矣子孫無所可託矣而讓也不忘國士之遇以死許之至三而愈篤則無所為而為之者故曰真義士也此非特可以為委質事人之人無所為而為善雖大學之道不是過矣襄子知其如此獨無勉而旌之乎終於殺之何以為人臣而不懷二心者之勸哉前史列讓於俠士淺之乎知讓矣陳殺其大夫泄冶左氏𫝊陳靈公與孔寧儀行父通於夏姬皆衷其衵服以戲於朝泄冶諌曰公卿宣淫民無效焉且聞不令君其納之公曰吾能改矣公告二子二子請殺之公弗禁遂殺泄冶孔子曰詩云民之多辟無自立辟其泄冶之謂乎胡氏曰稱國以殺者君與用事大臣同殺之也稱其大夫則不失其官守而殺之者有専輒之罪矣泄冶無罪而書名何也冶以諌殺身者也殺諌臣者必有亡國弒君之禍故書其名為徵舒弒君楚子滅陳之端以垂後戒此所謂義係於名而書其名者也比干諌而死子曰商有三仁焉泄冶諌而死何獨無褒辭夫語默死生當其可而止泄冶之盡言無隱不愧乎史魚之直矣方諸比干自靖自獻于先王則未可同日而語也冶雖效忠其猶在宋子哀魯叔肸之後乎故仕於昏亂之朝若異姓者如子哀潔身而去可也其貴戚耶不食其祿如叔肸善矣宣九年陳夏徵舒弒其君平國胡氏曰陳靈公之無道也而稱大夫之名氏以弒何也禍莫大於拒諌而殺直臣忠莫顯於身見殺而其言驗泄冶所為不憚斧鉞盡言於其君者正謂靈公君臣通於夏徵舒之家恐其及禍不忍坐觀故昧死言之靈公不能納又從而殺之卒以見弒而亡其國此萬世之大戒也特書徵舒之名氏以見泄冶忠言之驗靈公見弒之由使有國者必以逺色修身包容枉直開納諌靜為心也宣十年春秋文十四年宋子哀來奔左氏𫝊宋髙哀為蕭封人以為卿不義宋公而出遂來奔書曰宋子哀來歸貴之也杜氏曰貴其不食汙君之祿辟禍速也胡氏曰易曰幾者動之微吉之先見者也君子見幾而作不俟終日宋子哀有焉昔微子去紂列於三仁之首子哀不立於危亂之邦而春秋書字謂能貴愛其身以存道也若偷生辟禍而去國出奔亦何取之有按十六年宋人弒其君杵臼胡氏曰此襄夫人使甸殺之也而書宋人者昭公無道國人之所欲弒也蕩意諸亦死職春秋削之不得班於孔父仇牧荀息何也三子間其君而見殺春秋之所取也意諸知國人將弒其君而不能止知昭公之將見弒而不能正坐待其及而死之奚得與死於其職者比乎聖人所以獨取髙哀之去而書字以褒之也宣十有七年公弟叔肸卒穀梁𫝊其曰叔肸賢之也其賢之何也宣弒而非之也非之則胡為不去也曰兄弟也何去而之與之財則曰我足矣織履而食終身不食宣公之食君子以是為通恩也以取貴乎春秋胡氏曰論情可以明親親言義可以厲不軌所以取貴乎春秋書曰公弟而稱字以表之也按二人之節誠可為居亂邦之法故因泄冶事附此國語欒共子曰民生於三事之如一父生之師教之君食之非父不生非食不長非教不知生之族也故一事之惟其所在則致死焉在君父為君父在師為師報生以死報賜以力人之道也孟子曰魚我所欲也熊掌亦我所欲也二者不可得兼舍魚而取熊掌者也生我所欲也義亦我所欲也二者不可得兼舍生而取義者也全文見審輕重篇太史公曰死有重於泰山或輕於鴻毛程子曰感慨殺身者易從容就義者難又曰能盡飲食言語之道則可以盡去就之道能盡去就之道則可以盡死生之道飲食言語去就死生小大之勢一也故君子之學自微而顯自小而卑問使孔子遇害顔子死之否乎曰豈特顔子之於孔子若二人同行遇難固可相死也又問親在則如之何曰且譬如二人搏虎一人力盡一人須當同去用力如執干戈衛社稷到急處逃去言我有親是大不義也當此時豈問有親無親但當預先謂我有親不可行則止豈到臨時却規避也禮言親在不許友以死者此言亦在人用得蓋有親在可許友以死者如二人同行之類是也有不可許友以死者如戰國遊俠為親不在乃為人復讎甚非理也易離九三日昃之離不鼓缶而歌則大耋之嗟凶𫝊曰八純卦皆有二體之義乾內外皆健坤上下皆順震威震相繼巽上下順坎重險相習離二明繼照艮內外皆止兊彼已相說離之義在人事最大九三居下體之終是前明將盡後當繼之時人之始終時之革易也故為日昃之離日下昃之明也昃則將沒矣以理言之盛必有衰始必有終常道也達者順理為樂缶常用之器也鼓缶而歌樂其常也不能如是則以大耋為嗟憂乃為凶也大耋傾沒也人之終盡達者則知其常理樂天而已遇常皆樂如鼓缶而歌不達者則恐懼有將盡之悲乃大耋之嗟為其凶也此處死生之道也右言處死生之道自志士仁人章以下皆言處死生之變惟離九三章言處死生之常皆學者所當知也若曽子曰吾知免夫又曰吾得正而斃焉子張曰君子曰終小人曰死吾今日其庶幾乎此皆所謂處死生之常者也程子嘗言堯夫臨終時只是諧謔須臾而去以聖人觀之則亦未是蓋猶有意也比之常人甚懸絶矣又諸公恐喧它盡出外說話它皆聞得以它人觀之便以為怪此只是心虛而明故聽得問堯夫未病時不如此何也曰只是病後氣將絶心無念慮不昏便如此又問釋氏臨終便先知死何也曰只是一箇不動心釋氏平生只學這個事將這個做一件大事學者不必學它只燭理明自能之如堯夫豈嘗學也孔子未知生焉知死人多言孔子不告子路此乃深告之也曰原始要終故知死生之說人能原始知得生理便能要終知得死理若不明理便雖千萬般安排者亦不濟事伊川先生病革門人有往視之者曰先生平生所學正要此時用先生曰道著用便不是未出寢門而先生沒安義命論語子畏於匡曰文王既沒文不在兹乎天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如豫何言天欲未喪斯文則匡人其奈我何言不能違天害己也詳見前卷桓魋章亦此意子曰莫我知也夫子貢曰何為其莫知子也子曰不怨天不尤人下學而上達知我者其天乎朱子曰不得於天而不怨天不得於人而不尤人但知下學而自然上達此但言反已自修循序漸進耳無以甚異於人而致其知也然深味其語意則見其中自有人不及知而天獨知之之妙蓋在孔門惟子貢之智幾足以及此故特語以發之惜乎其猶有所未達也程子曰下學人事便是上達然習而不察則亦不能以上達矣或問云云學者學夫人之事形而下者也而其事之理則固天之理也形而上者也釋曰窮通榮辱天也用舍豫奪人也常人之情不得其所欲則怨天而尤人蓋揚己之善而歸過於天人也下學者所學日用常行之事也上達者道德性命之理也常人之情置事於淺近索理於渺茫足以惑人之耳目而以為能此所以人知之也聖人渾然天理窮通榮辱用舍豫奪皆理之不能無者順而受之又何怨尤之有人事之中便是天理又何必捨人事而求之於渺茫哉如是則慊然若不見其所長者然天理流行而聖人與之無間如此所以人不知而天知之也公伯寮訴子路於季孫子服景伯以告曰夫子固有惑志於公伯寮吾力猶能肆諸市朝朱子曰夫子指季孫言其有疑於寮之言也肆陳尸也言欲誅寮子曰道之將行也與命也道之將廢也與命也公伯寮其如命何謝氏曰雖寮之訴行亦命也其實寮無如之何愚謂言此以曉景伯安子路而警伯寮耳聖人於利害之際則不待決於命而後泰然也或問公伯寮學於孔門而所為若是何也曰胡氏以為寮非孔子弟子特季氏之黨耳若逰於孔門則豈至于陷其朋友哉曰子路非王佐之才家臣非卿相之任其為用舍無足言矣而孔子以道之興廢係焉何也曰此隳三都出藏甲之時也道之興廢固於是乎在耳曰或以命為天理何也曰命者天理流行付與萬物之謂也然其形而上者謂之理形而下者謂之氣自其理而言之則元亨利貞之德具於一時而萬古不易自其氣之渾而言則消息盈虛之變如循環之無端而不可窮也萬物受命於天以生而得其理之體故仁義禮智之德根於心而為性其既生也則隨其氣之運故廢興厚薄之變唯所遇而莫逃此章之所謂命蓋指氣之所運為言以天理釋之則於二者之分亦不察矣南軒曰莫之致而至者命也道之廢興一斷以命公伯寮何所預於其間哉不曰已而直曰道之將行與廢方之孟子豫不遇魯侯之論亦可以見聖賢氣象之分子曰不知命無以為君子也程子曰知命者知有命而信之也人不知命則見害必避見利必趨何以為君子胡氏曰一定而不可易者命也人不知命常求其所不可得避其所不可免所以喪其所守而為小人也南軒曰此所謂命謂窮通得喪之有定也不知命則將僥幸而茍且何以為君子乎知命則志定然後其所當為者可得而為矣中庸君子素其位而行不願乎其外朱子曰素猶見在也言君子但因見在所居之位而行其所當為無慕乎其外之心也素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難君子無入而不自得焉此言素其位而行也在上位不陵下在下位不援上正己而不求於人則無怨上不怨天下不尤人此言不願乎其外故君子居易以俟命小人行險以僥幸易平地也居易素位而行也僥求也幸謂不當得而得者吕氏曰達則兼善天下得志則澤加於民素富貴行乎富貴者也窮則獨善其身不得志則修身見於世素貧賤行乎貧賤者也言忠信行篤敬雖蠻貊之邦行矣素夷狄行乎夷狄者也文王內文明而外柔順以䝉大難箕子內難而能正其志素患難行乎患難者也又曰心逸日休行其所無事如子從父命無所往而不受是之謂俟命游氏曰素其位而行者即其位而道行乎其中如其素然也舜之飯糗茹草若將終身然此非素貧賤而行乎貧賤者不能然也及其為天子被袗衣鼓琴若固有之此非素富貴而行乎富貴者不能然也飯糗袗衣其位雖不同而此道之行一也至於夷狄患難亦若此而已道無不行則無入而不自得矣又曰君子為能盡理故居易以俟命居易未必不得故窮通皆好小人反是故行險以僥幸行險未必不失也故窮通皆醜孟子魯平公將出嬖人臧倉者請曰他日君出則必命有司所之今乘輿已駕矣有司未知所之敢請公曰將見孟子曰何哉君所為輕身以先於匹夫者以為賢乎禮義由賢者出而孟子之後喪踰前喪君無見焉公曰諾樂正子入見曰君奚為不見孟軻也曰或告寡人曰孟子之後喪踰前喪是以不往見也曰何哉君所謂踰者前以士後以大夫前以三鼎而後以五鼎與曰否謂棺槨衣衾之美也曰非所謂踰也貧富不同也樂正子見孟子曰克告於君君為來見也嬖人有臧倉者沮君君是以不果來也曰行或使之止或尼之行止非人所能也吾之不遇魯侯天也臧氏之子焉能使豫不遇哉朱子曰此章言聖賢之出處關時運之盛衰乃天命之所為非人力之可及南軒曰臧倉知平公之所以欲見孟子者為其有禮義也則指摘其禮義之愆使平公之意自解小人之情狀蓋如此臧倉所以必沮平公者蓋知孟子之言信用則已不得以安於君側故也原平公之始將見孟子非見善之明也特以樂正子之言而起敬耳使其見之果明信之必篤何至用臧倉一言而遽止乎樂正子則從而辨之謂喪禮稱家之有無前後貧富之不同則棺槨衣衾之美何怪其有異乎然平公之心既已蔽必有莫如之何也孟子所以答樂正子者和氣不迫而理亦無不盡矣夫魯侯之欲行以樂正子使之也而其中止者以臧倉之尼之也雖或使或尼然其行止實非人之所能為豫之不遇者蓋天而已使天而欲平治天下則豈臧倉所得而沮之乎蓋莫之為而為者天也衆人違之君子順之聖人純焉故孟子謂吾之不遇魯侯天也而孔子謂天之未喪斯文也匡人其如豫何玩其詞氣亦可見聖賢之分矣孟子去齊充虞路問曰夫子若有不豫色然前日虞聞諸夫子曰君子不怨天不尤人朱子曰路問於路中問也豫恱也尤過也此二句實孔子之言蓋孟子嘗稱之以教人耳曰彼一時此一時也彼前日此今日五百年必有王者興其間必有名世者自堯舜至湯自湯至文武皆五百餘年而聖人出名世謂其人德業聞望可名於一世者為之輔佐若臯陶稷契伊尹萊朱太公望散宜生之屬由周而來七百有餘嵗矣以其數則過矣以其時考之則可矣周謂文武之間數謂五百年之期時謂亂極思治可以有為之日於是而不得一有所為此孟子所以不能無不豫也夫天未欲平治天下也如欲平治天下當今之世舍我其誰也吾何為不豫哉言當此之時而使我不遇於齊是天未欲平治天下也然天意未可知而其責又在我我何為不豫哉然則孟子雖若有不豫然者而實未嘗不豫也蓋聖賢憂世之志樂天之誠有並行而不悖者於此見矣南軒曰充虞蓋亦察孟子顔色之間若有不豫之意而淺心所窺遂有不怨天不尤人之問也而不知孟子之心蓋疑王道之久曠憂生民之不被其澤是以若有不豫色然也曰彼一時此一時也蓋疑辭也謂彼亦一時此亦一時何彼時王者之數興其尤闕者不過五百年而名世間出者亦有之矣而乃今七百有餘嵗王政不行焉言不應若是其久曠也此孟子所以疑所以憂而未能釋也若夫在孟子之進退去就則何疑何憂之有哉天未欲平治天下故我之道未可行使天而欲平治天下則舍我孰與為之者則何不豫之有由前所言在君子不得不疑不得不憂由後所言在君子夫何疑夫何憂故王通謂樂天知命吾何憂窮理盡性吾何疑又曰天下皆憂吾不得不憂天下皆疑吾不得不疑蓋近此意而心迹之論則非也雖然孔子所謂天之未喪斯文也匡人其如豫何與孟子如天未欲平治天下之語反覆玩味之則亦可見聖賢之分矣孟子曰求則得之舍則失之是求有益於得也求在我者也朱子曰在我者謂仁義禮智凡性之所有者求之有道得之有命是求無益於得也求在外者也有道言不可妄求有命言不可必得在外謂富貴利達凡外物皆是趙氏曰言為仁由己富貴在天如不可求從吾所好南軒曰富貴利達衆人謂已有求之之道然不知其有命焉固有求而得之者矣是亦有命而非求之能有益也蓋亦有可求而不得者多矣以此可見其無益於得也然則亦可以已矣邵子曰修身人也遇不遇天也得失不動心所以順天也行險徼幸是逆天也求之者人也得之與否天也得失不動心所以順天也强取必得是逆天理也逆天理者患禍必至又曰凡處失在得之先則得亦不喜若處得在失之先則失難處矣必至於隕穫程子曰賢者惟知義而已命在其中中人以下乃以命處義如言求之有道得之有命是求無益於得知命之不可求故自處以不求若賢者則求之以道得之以義不必言命一本云聖人言命蓋為中人以上者設非為上智言中人以上於得失之際不能無惑故有命之說然後能安若上智之人更不言命惟安於義借使求則得之然非義則不求此樂天者之事也上智之人安於義中人以上安於命乃若聞命而不能安之者又其每下者也人之於患難只有一箇處置盡人謀之後却須泰然處之有人遇一事則心心念念不肯捨畢竟何益若不㑹處置了放下便是無義無命也子貢之髙識曷嘗規於貨利哉特於豐約之間不能無留情爾且貧富有命彼乃留情於其間多見其不知道也故聖人謂之不受命有志於道者要當去此心而後可語也門人有居太學而欲歸應鄉舉者問其故曰蔡人鮮習禮記決科之利也先生曰汝之是心已不可入於堯舜之道矣云云孔子曰不知命無以為君子也茍不知命見患難必避遇得喪必動見利必趨何以為君子問家貧親老應舉求仕不免有得失之纍何修可以免此程子曰此只是志不勝氣若志勝自無此纍家貧親老須用祿仕然得之不得為有命曰在已固可為親奈何曰為己為親也只是一事若不得其如命何云云孟子既知天安用尤臧氏問竒州之行知其由來乃族子與故人爾先生曰族子至愚不足責故人至厚不敢疑云云謝氏曰知命雖淺事也要信得及將來做田地就上面做工夫若信不及風吹草動便生恐懼憂喜枉做却閒工夫枉用却閒心力信得命及便養得氣不折挫余初及第年嵗前夢入內庭不見神宗而太子涕泣及釋褐時神宗晏駕哲廟嗣位如此事直不把來草草看萬事真實有命人內計較不得吾平生未嘗卜卦在書局亦不謁執政或勸之吾對曰它安能陶鑄我自有命在有以仕宦為人羅織為憂者龜山楊氏曰顧吾所自為者何如耳茍自為者皆合道理而無愧然而不免焉者命也不以道理為可憑依而徒懼其不免則無義無命矣又言人只為不知命故才有些事便自勞攘若知得徹便於事無不安孔子曰天生德於豫桓魋其如豫何使孔子不免於難是亦天也桓魋其如何哉孟子分明為臧倉所毁不遇而以為非臧氏子之力蓋知命也列子曰桓公非能用讐不得不用管仲非能舉賢不得不舉此說得之右論安義命審輕重論語齊景公有馬千駟死之日民無德而稱焉伯夷叔齊餓於首陽之下民到於今稱之其斯之謂與孟子曰魚我所欲也熊掌亦我所欲也二者不可得兼舍魚而取熊掌者也生亦我所欲也義亦我所欲也二者不可得兼舍生而取義者也朱子曰魚與熊掌皆美味而熊掌尤美也生亦我所欲所欲有甚於生者故不為茍得也死亦我所惡所惡有甚於死者故患有所不辟也釋所以舍生取義之意得得生也欲生惡死者雖衆人利害之常情而欲惡有甚於生死者乃秉彞義理之良心是以欲生而不為茍得惡死而有所不避也如使人之所欲莫甚於生則凡可以得生者何不用也使人之所惡莫甚於死則凡可以避患者何不為也設使人無秉彜之良心而但有利害之私情則凡可以偷生免死者皆將不顧禮義而為之矣由是則生而有不用也由是則可以辟患而有不為也由其必有秉彛之良心是以其能舍生取義如此是故所欲有甚於生者所惡有甚於死者非獨賢者有是心也人皆有之賢者能勿喪耳羞惡之心人皆有之但衆人汨於利欲而忘之惟賢者能存之而不喪耳一簞食一豆羮得之則生弗得則死呼爾而與之行道之人弗受蹴爾而與之乞人不屑也豆木器也呼咄啐之貌行道之人路中凡人也蹴踐踏也乞人丐乞之人也不屑不以為潔也言雖欲食之急而猶惡無禮有寧死而不食者是其羞惡之本心欲惡有甚於生死者人皆有之也萬鍾則不辨禮義而受之萬鍾於我何加焉為宫室之美妻妾之奉所識窮乏者得我與萬鍾於我何加言於我身無所增益也所識窮乏者得我謂所知識之窮乏者感我之惠也上言人皆有羞惡之心此言衆人所以喪之由此三者蓋理義之心雖曰固有而物欲之蔽亦人所易昏也鄉為身死而不受今為宫室之美為之鄉為身死而不受今為妻妾之奉為之鄉為身死而不受今為所識窮乏者得我而為之是亦不可以已乎此之謂失其本心言三者身外之物其得失比生死為甚輕鄉為身死猶不肯受呼蹴之食今乃為此三者而受無禮義之萬鍾是豈不可以止乎本心謂羞惡之心此章言羞惡之心人所固有或能決死生於危迫之際而不免計豐約於宴安之時是以君子不可頃刻而不省察於斯焉南軒張氏曰二者不可得兼言權其輕重而取舍之也夫樂生惡死人之常情賢者亦豈與之異哉而有至於舍生而取義者非真知義之重於生其能然乎其舍生取義猶饑之食渴之飲亦為其所當然而已故曰所欲有甚於生者所惡有甚於死者所欲謂理義所惡謂非理義也欲惡如是乃為得性情之正若但知樂生惡死而已則凡可以求生可以辟患者無所不為天理滅而流於禽獸之歸矣又曰呼爾而不受蹴爾而不屑此其羞惡之心也人之困窮其欲未肆故其端尚在至於為萬鍾所係則有不復顧者矣曰萬鍾於我何加焉人能深味斯言而得其㫖則亦可見外物之無足慕矣西山讀書記卷三十三
