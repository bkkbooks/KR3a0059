body:
  text: 西山讀書記卷四宋真德秀撰志書旅獒玩人喪德玩物喪志志以道寧言以道接蘇氏曰玩物則志以物移故喪志喪則中亂故志以道寧愚按玩有戲狎意有耽著意凡人於物所不可無若耽玩不舍則喪志矣非獨聲色貨利為然雖書史圖畫之清玩而著之其害亦然若謝氏記誦之博程子猶以此譏之惟以道養志則志不為物所移故曰志以道寧子曰三軍可奪帥也匹夫不可奪志也侯氏曰三軍之勇在人匹夫之志在已故帥可奪而志不可奪如可奪則不可謂之志矣南軒曰此所謂志謂守其道而不渝如虞人非其招不往之類是也若守認私意而不知徙義則是失其所主謂之任意則可非志也孟子士尚志别見右專言志志氣公孫丑問曰夫子加齊之卿相得行道焉雖由此霸王不異矣如此則動心否乎孟子曰否我四十不動心朱子曰丑蓋設問孟子若得位而行道則雖由此而成霸王之業亦不足怪任大責重如此亦有所恐懼疑惑而動其心乎四十強仕君子道明德立之時孔子四十而不惑亦不動心之謂曰若是則夫子過孟賁逺矣曰是不難告子先我不動心孟賁勇士告子名不害孟賁血氣之勇丑蓋借之以贊孟子不動心之難孟子言告子未為知道乃能先我不動心此亦未足為難也曰不動心有道乎曰有程子曰心有主則能不動矣北宫黝之養勇也不膚撓不目逃思以一毫挫於人若撻之於市朝不受於褐寬博亦不受於萬乘之君視刺萬乘之君若刺褐夫無嚴諸侯惡聲至必反之黝蓋刺客之流以必勝為主而能不動者也孟施舍之所養勇也曰視不勝猶勝也量敵而後進慮勝而後會是畏三軍者也舍豈能為必勝哉能無懼而已矣舍蓋力戰之士以無懼為主而能不動者也孟施舍似曾子北宫黝似子夏夫二子之勇未知其孰賢然而孟施舍守約也黝務敵人舍專守己子夏篤信聖人曾子反求諸已故二子之與曽子子夏雖非等倫然論其氣象則各有所似賢猶勝也約要也言論二子之勇則未知誰勝論其所守則舍比於黝為得其要也昔者曾子謂子襄曰子好勇乎吾嘗聞大勇於夫子矣自反而不縮雖褐寬博吾不惴焉自反而縮雖千萬人吾往矣此言曾子之勇也子襄曾子弟子也夫子孔子也縮直也檀弓曰古者冠縮縫又曰棺束縮二衡三惴恐懼之也往往而敵之也孟施舍之守氣又不如曾子之守約也言孟施舍雖似曾子然其所守乃一身之氣又不如曾子之反身循理所守尤得其要也孟子之不動心其原蓋出於此守約云者言其所守之得其要爾非以約為一物而可守也蓋黝舍皆守氣以養勇然以黝比舍則舍之守為得其要至以舍而比曾子則曾子所守尤得其要也曰敢問夫子之不動心與告子之不動心可得聞與告子曰不得於言勿求於心不得於心勿求於氣不得於心勿求於氣可不得於言勿求於心不可夫志氣之帥也氣體之充也夫志至焉氣次焉故曰持其志無暴其氣此一節公孫丑之問孟子誦告子之言又斷以己意而告之也告子謂於言有所不逹則當舍置其言而不必反求其理於心於心有所不安則當力制其心而不必更求其助於氣此所以固守其心而不動之速也孟子既誦其言而斷之曰彼謂不得於心而勿求於氣者急於本而緩於末猶之可也謂不得於言而勿求於心則既失於外而遂遺其內其不可也必矣然凡曰可者亦僅可而有所未盡之辭耳若論其極則志固心之所之而為氣之將帥然氣亦人之所以充滿於身而為志之卒徒者也故志固為至極而氣即次之人固當敬守其志然亦不可不致養其氣蓋其內外本末交相培養此則孟子之心所以未嘗必其不動而自然不動之大略也言雖發乎口而實出於心內有蔽陷離窮之病則外有詖淫邪遁之失不得於言而每求於心則其察理日益精矣孟子所以知言養氣為不動心之本者用此道也而告子反之是徒知言之發於外而不知其出於中亦義外之意也其害理深矣故孟子斷然以為不可既曰志至焉氣次焉又曰持其志無暴其氣者何也曰志一則動氣氣一則動志也今夫蹶者趨者是氣也而反動其心孟子言志之所向專一則氣固從之然氣之所在專一則志亦反為之動所以既持其志又必無暴其氣也程子曰志動氣者什九氣動志者什一集義程子曰持其志無暴其氣內外交相養也又曰氣一則動志非獨蹶趨藥也酒也亦是然志動氣多氣動志少雖氣亦能動志然亦在持其志而已敢問夫子惡乎長曰我知言我善養吾浩然之氣知言者盡心知性凡天下之言無不有以究極其理而識其是非得失之所以然也浩然盛大流行之貌氣郎所謂體之充者本自浩然失養故餒惟孟子為能善養以復其初也蓋惟知言則有以明夫道義而於天下之事無所疑養氣則有以配夫道義於天下之事無所懼此其所以當大任而不動心也敢問何謂浩然之氣曰難言也程子曰觀此一言則孟子實有是氣可知矣其為氣也至大至剛以直養而無害則塞於天地之間至大初無限量至剛不可屈撓蓋天地之正氣而人得以生者其體段本如是也惟其自反而縮則得其所養而又無所作為以害之則其本體不虧而充塞無間矣程子曰天人一也更不分別浩然之氣乃吾氣也養而無害則塞乎天地一為私意所蔽則歉然而餒知其小也謝氏曰浩然之氣須於心得其正時識取又曰浩然是無虧欠時集義程子曰內直則其氣浩然養之至則為大人又曰石曼卿詩云樂意相關禽對語生香不斷樹交花此語形容得浩然之氣又曰主一無適敬以直內便有浩然之氣其為氣也配義與道無是餒也配者合而有助之意義者人心之裁制道者天理之自然餒飢乏而氣不充體也言人能養成此氣則其氣合乎道義而為之助使其行之勇決無所疑憚若無此氣則其一時所為雖未必不出於道義然其體有所不充則亦不免於疑懼而不足以有為矣是集義所生者非義襲而取之也行有不慊於心則餒矣我故曰告子未嘗知義以其外之也集義猶言積善蓋欲事事皆合於義也襲掩取也如齊侯襲莒之襲言氣雖可配乎道義而其養之之始乃由事皆合義自反常直是以無所愧怍而此氣自然發生於中非由只行一事偶合於義便可掩襲於外而得之也慊快也足也言所行一有不合於義而自反不直則不足於心而其體有所不充矣然則義豈在外哉告子不知此理乃曰仁內義外而不復以義為事則必不能集義以生浩然之氣矣上文不得於言勿求於心即義外之意必有事焉而勿正心勿忘勿助長也無若宋人然宋人有閔其苗之不長而揠之者芒芒然歸謂其人曰今日病矣豫助苗長矣其子趨而往視之苗則稿矣天下之不助苗長者寡矣以為無益而舍之者不耘苗者也助之長者揠苗者也非徒無益而又害之必有事焉而勿正趙氏程子以七字為句近世或并下文心字讀之者亦通必有事焉有所事也如有事於顓臾之有事正預期也春秋傳曰戰不正勝是也如作正心義亦同此與大學之所謂正心者語意自不同也此言養氣者必以集義為事而勿預期其效其或未充則但當勿忘其所有事而不可作為以助其長乃集義養氣之節度也揠拔也芒芒無知之貌其人家人也病疲倦也舍之而不耘者忘其所有事揠而助之長者正之不得而妄有作為者也然不耘則失養而已揠則反以害之無是二者則氣得其養而無所害矣如告子不能集義而欲強制其心則必不能免於正助之病其於所謂浩然者蓋不惟不善養而又反害之矣孟子是義精理明天下之物不足以動其心不是把捉得定北宫黝孟施舍所以不動者皆強制於外不是存養之致故又舉曾子之言云自反縮與不縮所以動與不動只在方寸之間若仰不愧俯不怍看如何大利害皆不足以易之若有一毫不直則此心便索告子不動心是硬把定問氣體之充與下面浩然之氣兩箇氣字大意似同而精微密察處略似有異前面氣字若專主形於外者而言後面氣字若專主發於外者而言先生曰氣無二義但浩然之氣乃指其本來體段而言謂體之充者泛言之耳然亦非外此而別有浩然之氣也持其志無暴其氣是兩邉做工夫古人在車則聞鸞和行則有佩玉凡此皆所以無暴其氣今人既無此不知如何而為無暴曰凡人多動作多笑語做力所不及底事皆是暴其氣學者要須事事節約莫教過當此便是養氣之道問遺書曰志一動則動氣氣一動則動志外書曰志專一則動氣氣專一則動志二説孰是曰此必一日之語學者同聽之而所記有淺深志一動則動氣氣一動則動志此言志動氣動又添入一動字了故不若後説所記得其本旨蓋曰志專一則固可以動其氣而氣專一亦可以動其志也知言養氣雖是兩事其實相關正如致知格物正心誠意之類知言便是窮理不先窮理見得是非如何養得氣浩然之氣清明不足以言之才説浩然便有箇廣大剛果意思如長江大河浩浩然而來也富貴貧賤威武不能淫移屈之類皆低不可以語此問浩然之氣即是人所受於天地之正氣否先生曰然又問與血氣如何曰只是一氣義理附於其中則為浩然之氣若不由義而發則只是血氣養成浩然之氣則與天地為一更無限量天下莫強於道義當然是義總名是道以道義為主有此浩然之氣去助他方始勇敢果決以進如君有過臣諌之是義也然有冒死而不顧者便是有浩然之氣去助此義如合説此話却恧縮不敢言便是氣餒便是欿然之氣問合而有助助字之訓如何先生曰道義是虛底物本自孤單得這氣貼起來便自張主無所不逹李先生曰配是襯貼起來李復潏水集有一段説浩然之氣只是要仰不愧俯不怍便自然無怯懼其言雖粗却盡此章之意又曰浩然之氣孔子有兩句説盡了曰內省不疚夫何憂何懼所謂以直養而無害乃自反而縮之意集義只是事事皆直俯仰不愧便是浩然之氣只將自家身體看到無私曲處自然有此氣象所以上蔡説於心得其正時識取伊川將至大至剛以直與坤卦直方大同説不必如此且只將孟子自看便見孟子説得粗易却説得細至大至剛者乃氣之本體如此但人不能養之而反害之故其大者小剛者弱耳志動氣是源頭濁下流亦濁氣動志却是下流壅而不泄反濁了上面至大至剛以直趙臺卿已如此解直養之説伊川嫌其以一物養一物故欲從趙注舊嘗用之後來反覆推究却是至大至剛作一句以直養而無害作一句者為得孟子之意蓋聖賢立言首尾必相應如云自反而縮便有直養意思李端伯所記明道語未必不親切但伊川又自主張得別故有此議論今欲從明道之説集義是歲月之功襲取是一朝一夕之事從而掩取終非己有至大至剛氣之本體以直養而無害是用功處塞乎天地乃其效也天地之氣無處不到無處不透雖金石不能遏人便是稟得這箇氣無欠闕所以程子曰天人一也更不分別浩然之氣乃吾氣也云云古人臨之以死生禍福而不變敢去罵賊敢去殉國是他養得這氣大了故無所懼人之氣當於平時存養有素故遇事之際以氣助其道義而行之若於氣上存養有所不足遇事之際便有十分道理亦畏怯而不敢為如朝廷欲去一小人我道理既直有甚怕他不敢動著知其為小人而不敢去只是這氣衰其氣如此便是合下無工夫氣只是一個氣但從義理中出來者即浩然之氣從血肉身中出來者為血氣之氣耳道則是物我公共自然之理義則吾心之能斷制者所用以處此理者也世有理直而不能自明者正為無氣耳譬如利物可以斬割須有力者乃能用之若自無力利物何為孟子許多論氣處只在集義所生一句上或問集義曰只是無事不求箇是而已集義只是件件事要合冝自然積得多有人不因集義合下來便恁地剛勇如何曰此是粗氣便是北宫黝孟施舍之勇底亦終有餒時問貫之看浩然之氣處如何曰見集義意思是要得安穩如講究書中道理便也要見得安穩曰此又是窮理不是集義集義行底工夫窮理是做知言工夫能窮理然後能知言配義與道者大抵以坤配乾必以乾為主以妻配夫必以夫為主以氣配道義必竟以道義為主而氣隨之是氣常隨著道義必有事焉而勿正却以鳶飛魚躍言之此莫是順天理自然之意否曰孟子之説只是就養氣上説程子説得又高須是看孟子了又看程説便見得孟子只説勿忘勿助長程先生之言於其中自有一個自然底氣象或問必有事焉而勿正曰正是等待之意如一邉集義一邉在此等待那氣生今日等不見明日又等不見等來等去便却去助長侯師聖説而勿正心伊川舉禪語為説曰事則不無擬心則差當時於此言下便有省悟某甚疑此語引得不相似必有事是須有事於此勿正心是不須恁地等待今説擬心則差是如何言須擬之而後言行須擬之而後動方可中節不成不擬不議只恁地去此語似禪某不敢取有事有事於集義也勿正謂勿預期等待他聽其自充也集義如藥頭必有事勿正心勿忘勿助長如製度必有事焉勿正心勿忘勿助長是養氣中一節目不要等待不要催促何謂知言曰詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知其所窮生於其心害於其政發於其政害於其事聖人復起必從吾言矣此公孫丑復問而孟子答之也詖偏陂也淫放蕩也邪邪僻也遁逃避也四者相因言之病也蔽遮隔也陷沉溺也離叛去也窮困屈也四者亦相因則心之失也人之有言皆本於心其心明乎正理而無蔽然後其言平正通逹而無病茍為不然則必有四者之病矣即其言之病而知其心之失又知其害於政事之決然而不可易者如此非心通於道而無疑於天下之理其孰能之彼告子者不得於言而不肯求之於心至為義外之説則自不免四者之病其何以知天下之言而無所疑哉程子曰心通乎道然後能辨是非如持權衡以較輕重孟子所謂知言是也又曰孟子知言正如人在堂上方能辨堂下人曲直若猶未免雜於堂下衆人之中則不能辨決矣集注四十強仕君子道明德立之時孔子四十而不惑亦不動心之謂李貫之曰愚謂明則不疑立則不懼然未有不明而能立者故知言養氣雖二者並進而其序必以知言為先孔子不惑亦不疑之謂不惑則自不動矣又程子曰天人一也浩然之氣即吾氣也集注曰至大云云蓋天地之正氣而人得以生者體段本如是李貫之謂程子又嘗云氣有不善性則無不善今諸先生之説止言人之稟氣莫非天地之正氣而不復言夫昏明強弱之不齊豈其説猶有未備邪黃勉齋答以為有天地之性有氣質之性形而後有氣質之性然天地之性亦未嘗不存孟子言養性於氣質之中養天地之性孟子言養氣於氣質之中養天地之氣孟子言養吾浩然之氣則是本來完足其曰集義所生亦猶火始然泉始逹擴而充之耳非昔也惡而今也善昔也無而今也有云云公晦答則謂孟子言性只謂天地之性而不及氣質之性孟子言氣止謂天地之氣而不及氣質之氣蓋極本窮源之論也自本源而論之性無有不善氣無有不正能明乎是能養乎是而又力行以求至乎是則吾性即天地之性而氣質之性有不善者亦化而為善矣吾氣即天地之氣而氣質之氣雖未正者亦轉而為正矣此孟子之本指也又貫之問石曼卿詩云云公晦答謂此與濓溪忩前草不除云與自家意思一般者非程子體道之深不能及此極可玩味也又程子曰敬以直內便有浩然之氣張子曰惟直內則浩然之氣當處生李貫之疑其太快以為欠却集義工夫公晦答曰程張二説皆未及集義然茍能一日用力於此則心廣體胖氣象自别試自驗之可見但孟子之意却主集義而言耳若一事合義亦當處便生如此積纍以至於成集字可細味也貫之又疑謝氏説曰浩然之氣須於心得其正時識取人於朝夕之間豈無心得其正之時然使其未有集義之功則充塞天地之氣象豈可想像而識公晦答曰謝氏云云非謂衆人昏荒放肆之中為能識而得之也學者自事其心一旦靜定義理昭著從此體認見得分明遂持養而充廣之則盛大流行之體可馴致矣以上數條頗有發明今附此右兼言志氣氣孔子曰君子有三戒少之時血氣未定戒之在色及其壯也血氣方剛戒之在鬬及其老也血氣既衰戒之在得朱子曰血氣形之所恃以生者血隂而氣陽也隨時知戒以理勝之則不為血氣所使也范氏曰聖人同於人者血氣也異於人者志氣也血氣有時而衰志氣則無時而衰也少未定壯而剛老而衰者血氣也戒於色戒於鬬戒於得者志氣也君子養其志氣故不為血氣所動是以年彌髙而德彌邵也荀子治氣養心之術血氣剛強則柔之以調和智慮漸深則一之以易良勇膽猛戾則輔之以道順齊給便利則節之以動止狹隘褊小則廓之以廣大卑濕重遲貪利則抗之以髙志庸衆駑散則劫之以師友怠慢僄棄則照之以禍災愚欵端慤則合之以禮樂通之以思索按荀子之言不皆純粹匡衡治性大意略同而其疵反少己見氣質篇程子曰義理與血氣常相勝只看消長分數多少為君子小人之别義理所得漸多自然知得血氣消散得漸少消盡為大賢氣有善不善性則無不善也人之所以不知善者氣昏而塞之爾孟子所以養氣者養之至則清明者全而昏塞之患去矣人患乎懾怯者蓋氣不充不素養故也驕氣盈吝氣歉解論語使驕且吝章朱子曰愚謂驕吝雖有盈歉之殊然其勢常相因蓋驕者吝之枝葉吝者驕之根本故嘗驗之天下之人未有驕而不吝未有吝而不驕者也南軒曰驕者氣盈挾其有也吝者氣歉懷不足也害德者固多端而二者其總目與蓋役於血氣者不失之盈則失之歉耳張子曰戲謔不惟害事志亦為氣所流不戲謔亦持氣之一端按韓子與張籍書曰昔者夫子猶有所戲詩曰善戲謔兮不為虐兮記曰張而不弛文武不能也惡害其為道哉而張子乃云爾何邪蓋牛刀之言夫子特以發子遊而非正言爾故曰戲衛武公之戲曰善曰不為虐則和而有節可知百日之蠟一日之澤蓋是日也恣民之宴樂以休其勞非文武自為戲也若張子則持志養氣之功嚴惟恐戲言戲動以害之故既為東銘又發此語學者試以身體之當戲謔時志能不為氣所流否然後知張子真藥石之言未可以夫子武公自諉也上蔡謝氏曰氣動其心和其氣所以和其心也五峯胡氏曰氣感於物發如奔霆狂不可制惟明者能自反勇者能自斷問謙卑自牧之義南軒張氏曰牧如牧羊使之馴服方可以言謙今人往往反以驕矜為養氣此特客氣非浩然之氣也右專言氣意論語子絶四毋意毋必毋固毋我朱子曰絶無之盡者毋史記作無是也意私意也必期必也固執滯也我私己也四者相為終始起於意遂於必留於固而成於我也蓋意必常在事前固我常在事後至於我又生意則物欲牽引循環不窮矣程子曰此毋字非禁止之辭聖人絶此四者何用禁止張子曰四者有一焉則與天地不相似楊氏曰非知足以知聖人詳視而默識之不足以記此或問聖人從容中道而有所絶有所毋何邪曰絶非屏絶之絶蓋曰無之盡云爾毋無古通用故論語作毋而史記作無然經傳多以無為有無之稱毋為禁止之辭則當以史記為正曰四者之説其詳奈何曰無意者渾然天理不任私意無必者隨事順理不先期必也無固者過而不留無所凝滯也無我者大同於物不私一身也問云云先生曰須知四者之相因凡人作事必先起意不問理之是非必欲其成而後已事既成又復執滯不化是之謂固三者只成就得一箇我及至我之根源愈大少間三者又從這裏生出我生意意又生必必又生固又歸宿於我正如元亨利貞元了亨亨了又利利了又貞循環不已但有善不善之分爾問意必固我伊川以發而當者理也發而不當者私意也此語是否曰不是如此所謂毋意者是不任己意只看道理如何見道理當如此便順理做將去自家無些子私心所以謂之毋意若才有些安排布置底心便是任私意縱使發而偶然當理也只是私意未説到當理在伊川之語想是被門人錯記了不可知南軒曰夫子之於四者非待有所禁止蓋自無有耳絶云者所以見其無之甚也至於在學者而言於是四者必用工以克去之四者亡而後天理得大學所謂誠其意者毋自欺也詳見後誠意章按前章言毋意此章言誠意正當參觀龜山楊氏曰所謂毋意者毋私意而已若誠意則不可無南軒曰伊川解毋意惟曰無私意釋氏則和誠意亦無按近世有宗江西之學者亦曰心如太空意如浮雲故以大學誠意為非聖人之言正如釋氏之失也程子曰意與志異志是所存處意是發動處如先意承志自不同也或問橫渠言志陽而意隂志剛而意柔南軒張氏曰外書云云尋常人多於發動處差且休論放僻邪侈一日間是多少間思想此便是欲若聖人則意純是理故無所不通而有感應之妙如今且靜坐收拾身心然後可以為學不然雖講誦何益又曰王介甫言志者心之所之伊川謂心之所存為志謂所之則有是有非存則主宰在我矣意乃心之所之也曰意曰欲曰思則有是有非矣愚按朱子論志多從王氏之説南軒則從程子之説學者當詳味之張子曰不得已當為而為之雖殺人皆義也有心而為之雖善皆意也正己而物正大人也正己而正物猶不免有意之纍也有意為善利之也假之也無意為善性之也由之也有意在善且為未盡况有意於未善乎仲尼絶四自始學至成德竭兩端之教也朱子曰橫渠之意謂聖人以此四者禁止學者使勿為故云云志陽而意隂志剛而意柔志公而意私朱子曰志者心之所之是一直去底意又是志之經營往來底凡營為謀度皆意也所以橫渠云志公而意私問情比意如何曰情又是意底骨子志與意皆屬情情字較大志公而意私然則志果皆善而意果皆惡乎曰以志意對言則誠如橫渠之説亦猶隂與陽對則陽為剛為善為君子隂為柔為惡為小人此其隂陽之大分也若析而言之則陽之中自有善有惡隂之中亦有善有惡周子所謂剛陽善惡中是也以志言之則孔子所謂不可奪志孟子所謂持志尚志固善也若論語所謂季孫之惑志左氏所謂崔子之大志公子圍之異志南蒯之逺志榖梁氏所謂魯惠公之邪志孟子所謂其志將以求食也非惡乎以意言之若孔子之毋意固非善矣大學之所謂誠意則意獨非善乎故學記離經辨志朱子謂辨其為義為利為君子為小人也以此言之則志非皆善而意非皆惡也灼然矣右專言意兼言志意附思書禹拜曰都帝豫何言豫思日孜孜臯陶曰都慎厥身修思永觀聖賢之以思為事如此學者其可廢思哉説命髙宗恭默思道夢帝賚豫良弼程子曰高宗至誠思得賢相寤寐不忘故眹兆先見於夢此理之常問高宗往求説耶説來入夢邪曰譬如懸鏡於此有物必照亦非鏡往照物亦非物來入鏡大抵人心虛明善則先知不善亦先知之范太史曰中庸曰誠則形形則著揚雄曰人心其神矣乎高宗之夢蓋誠之形而心之神也愚謂恭默思道一句最冝深玩非獨人主宅憂之際當然學者平居求道亦所當然惟深味之乃有見爾或謂高宗因思而夢説得無近怪矣乎曰積誠之極可與天通此感應之常理耳古之孝子固有得鯉於層冰得筍於深冬者人皆以為孝誠所格何獨於夢説而疑之耶叔孫穆子之夢豎牛事亦類此但高宗誠其思故夢亦誠叔孫邪其思故夢亦邪爾洪範二五事一曰貌二曰言三曰視四曰聽五曰思思曰睿孔氏曰思通於微睿作聖於事無不通謂之聖南豐曾氏曰思者所以充人之材以至於其極聖者人之極也孟子曰或相倍蓰而無算者不能盡其材者也弗思耳矣蓋思之於人也如此然而或曰不思而得者何也蓋自誠而明者不思而得堯舜性之者也自明而誠者思之弗得弗措也湯武身之者也程子曰思曰睿思慮久後睿自然生若於一事上思未得且别換一事思之不可專守著一事蓋人之知識於這裏蔽著雖強思亦不通也又曰思曰睿致思如掘井初有混水久後稍引動得清者出來人思慮始皆溷濁久自明快大傳易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此朱子曰易指蓍卦無思無為言其無心也寂然者感之體感通者寂之用人心之妙其動靜亦如此寂感本是説易諸家後來就人上説亦通問寂感曰寂然是體感是用當其寂然時理固在此必感而後發如仁感為惻隱未感時只是仁義感為羞惡未感時只是義問胡氏説此多指心作已發曰不然縱使已發感之體固在所謂動中未嘗不靜如此則流行發見而卓然不可移今只指作已發一齊無本了終日只得奔波急迫而已易無思也無為也寂然不動忠也敬也立大本也感而遂通天下之故恕也義也行逹道也易曰無思也無為也寂然不動感而遂通天下之故其寂然者無時而不感其感通者無時而不寂是乃天命之全體人心之至正所謂體用一源流行而不息者也疑若不可以時處分矣然於其未發也見其感通之體於其已發也見其寂然之用亦各有當而實未嘗分焉故程子曰中者言寂然不動者也和者言感而遂通者也然中和以性情言者也寂感以心言者也中和蓋所以為寂感也咸九四貞吉悔亡憧憧往來朋從爾思程子曰感者人之動也故皆就人身取象拇初六取在下而動之微腓六二取先動股九三取其隨九四無所取且言感之道不言感其心感乃心也四在中而居上當心之位故為感之主而言感之道貞正則吉而悔亡感不以正則有悔也又四説體居隂而應初故戒於貞感之道無所不通有所私蔽則害於感通乃有悔也聖人感天下之心如寒暑雨㿩無不通無不應者亦貞而已矣貞者虛中無我之謂也夫貞一則無感而不通若往來憧憧然用其私心以感物則思之所及者有能感而動所不及者不能感也是其朋類則從其思也以有係之私心既主於一隅一事豈能無所不通乎子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮程子曰夫子因咸卦論感通之道夫以思慮之私心感物所感狹矣天下之理一也途雖殊而其歸則同慮雖百而其致則一雖物有萬殊事有萬變統之以一則無能違也故貞其意則窮天下無不感通焉故曰天下何思何慮用其思慮之私心豈能無所不感也楊氏曰憧憧往來朋從爾思夫思能緣其類而已不能周也所謂朋從者以類而應故也故孔子曰天下何思何慮夫感猶鏡也居其所而物自以形來則所鑒者廣若執鏡隨物以度其形其照幾何或曰無思所以體道有思所以應世此為不能易之義也易所謂正思者以謂無所事乎思云爾故其於天下之故一誠通之而已今人不能誠是以有思又曰不能無思此何理哉朱子曰此引咸九四爻辭而釋之言理本無二而殊途百慮莫非自然何以思慮為哉必思而從則所從者亦狹矣日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歲成焉往者屈也來者信也屈信相感而利生焉程子曰此以往來屈信明感應之理屈則有信信則有屈所謂感應也故日月相推而明生寒暑相推而歲成功用由是而成故曰屈信相感而利生焉感動也有感必有應凡動皆為感感則必有應所應復為感所感復有應所以不已也朱子曰言往來屈信皆感應自然之常理如憧憧焉則入於私矣所以必思而後有從也尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也過此以往未之或知也窮神知化德之盛也程子曰前云屈信之理矣復取物以明之尺蠖之行先屈而後信蓋不屈則無信信而後有屈觀尺蠖則知感應之理也龍蛇蟄藏所以存息其身而後能奮迅也不蟄則不能奮矣動息相感乃屈信也君子濳心精微之義所以致其用也濳心精微積也致用施也積與施乃屈信也利用安身以崇德也承上文致用而言利其施用安處其身所以崇大其德業也所為合理則事正而身安聖人能事盡於此矣故云過此以往未之或知也朱子曰因言屈信往來之理而又推以言學亦有自然之機也精研其義至於入神屈之至也然乃所以為出而致用之本利其施用無適不安信之極也然乃所以為入而崇德之資內外交相養互相發也過此以往云云下學之事盡力於精義利用而交養互發之機自不能已自是以上則亦無所用其力矣至於窮神知化乃德盛仁熟而自致耳然不知者往而屈也自致者來而伸也是亦感應自然之理而已張子曰氣有隂陽推行有漸為化合一不測謂神天下何思何慮一句便先打破那箇思字却説箇同歸殊途一致百慮又再説天下何思何慮謂何用如此憧憧往來而為此朋從之思也日月寒暑之往來尺蠖龍蛇之屈伸皆是自然底道理今之為學亦只是如此精義入神用力於內所以致用於外利用安身求利於外乃所以崇德於內只是如此做將去雖至於窮神知化地位亦只是德盛所致何思何慮之有問思慮難一如何曰若見得道理分曉自無間雜思慮人之所以思慮紛擾者只為未見得實理若實見得此理更何待思慮天下何思何慮不知有甚事可思慮也按上蔡對程子曰天下何思何慮子曰是則是有此理實却發得太早在説了却云恰好著工夫上蔡以為善鍛錬人豈非何思何慮非學者所可遽及要必由思以入歟又張子曰精義入神事豫吾內求利吾外也利用安身素利吾外致養吾內也窮神知化乃養盛自至非思勉之能強故崇德而外君子未之或知也其論至矣學者當深味之艮象曰兼山艮君子以思不出其位程子曰上下皆山故為兼山君子觀艮止之象而思安所止不出其位也位者所處之分也萬事各有其所得其所則止而安若當行而止當速而久或過或不及皆出其位也况踰分非據乎曾子曰君子思不出其位朱子曰此艮卦之象辭也曾子蓋嘗稱之范氏曰物各止其所而天下之理得矣故君子所思不出其位而君臣上下大小各得其職也南軒曰位非獨職位之稱大而君臣父子微而一事一物之間當其時與其地所思有所止無所越皆為不出其位也非有主於其中者能然乎詩魯頌駉思無疆思馬斯臧無疆言其思之深廣無窮也臧善也思無期思馬斯才無期言其思之久也才材力也思無斁思馬斯作斁厭也作奮起也思無邪思馬斯徂思無邪誠也徂行也子曰詩三百一言以蔽之曰思無邪吕氏曰僖公修牧馬之政以誠心行之故言思無疆思無期思無斁思無邪馬之所以臧才作徂者其效也與衛風秉心塞淵騋牝三千之意同古之賢君誠心行善政皆若此不獨牧馬而已朱子曰程子云云蓋行無邪未是誠思無邪乃可為誠也又曰思無邪是表裏皆無毫髮之不正世人固有修飾於外而其中未必能純一惟至於思亦無邪斯可謂之誠子曰學而不思則罔思而不學則殆朱子曰不求諸心故昏而無得不習其事故危而不安程子曰博學審問慎思明辨篤行五者廢其一非學也問云云曰學是學其事如讀書便是學須緩緩精思其中義理方得且如做此事亦是學須思量此事道理是如何只恁下頭做不思這事道理則昧而無得若只空思索又不倚所做事上體察則心終是不安穩須是事與思互相發明子曰吾嘗終日不食終夜不寢以思無益不如學也朱子曰此為思而不學者言之蓋勞心以必求不若遜志而自得以其事與前章相關故附焉季文子三思而後行子聞之曰再斯可矣程子曰為惡之人未嘗知有思有思則為善矣然至於再則已審三則私意起而反惑矣故夫子譏之朱子曰按季文子慮事如此可謂詳審而冝無過舉矣而宣公篡立文子乃不能討反為之使齊而納賂焉豈非程子所謂私意起而反惑之驗歟是以君子務窮理而貴果斷不徒多思之為尚或問云云天下之事以義理斷之則是非可否再思而已審以私意揣之則利害得喪萬變而無窮思止於再者聖人之以義制事而不汨於利害之私也唐棣之華偏其反而豈不爾思室是逺而朱子曰此逸詩也於六義屬興上兩句無意義但以起下兩句之辭耳其所謂爾亦不知其何所指也子曰未之思也夫何逺之有夫子借其言而反之蓋仁逺乎哉之意程子曰聖人未嘗言易以驕人之志亦未嘗言難以沮人之進但曰未之思也夫何逺之有此言極有涵蓄意味深逺南軒曰此夫子所刪去之詩以詩語之未安也故刪而不取詳味夫子斯言辭則抑揚意蓋無窮也夫道以為易知乎則精微之際未易擇也以為難知乎則其天然之理本自不隱也曰易則學者將忽而不之究曰難則學者將怠而不之進曰未之思也夫何逺之有而顯微之義循求之序亦涵蓄而備盡矣孔子曰君子有九思視思明聽思聰色思溫貌思恭言思忠事思敬疑思問忿思難見得思義程子曰九思各專其一謝氏曰未至於從容中道無時而不省察也雖有不存焉寡矣此之謂思誠朱子曰視無所蔽則明聽無所壅則聰色見於面者貌舉身而言思問則疑不蓄思難則忿必懲思義則得不茍或問九思曰公且道色與貌可以要得他溫恭若是視聽如何要得聰明曰這只是誠了自會如此曰若如公説又却都沒些事聖人教人意思不如此有物必有則一個物有一個道理况耳目聰明得之於天本來自合如此只為私意蔽惑而失其理聖人教人不是理會一件其餘自會好須是逐一做工夫內外夾持起來恁地積纍成熟便會無些子滲漏且道如何視明聽聰只是就視聽上理會視逺惟明聽德惟聰如有一件可喜物在眼前便要看他便被他蔽了須是知得此物不當視便是見得逺不蔽於眼前近底故曰視逺惟明仁義忠信之言將耳常常聽著不好説話莫教入耳故曰聽德惟聰南軒曰九思當乎此則思入乎此天理之所由擴人欲之所由遏也然而是九者要當養之於未發之前而持之於既發之後若但欲察之於流而收之於暫則多見其紛擾而無力矣子張曰士見危致命見得思義祭思敬喪思哀其可已矣朱子曰四者立身之大節一有不至則餘無足觀南軒曰見危則致命見得則思義能決擇於義利之際也祭則思敬喪則思哀篤於本也愚按見危致命獨不言思蓋臨難而死士節之常有所不必思故也切問近思見言仁篇中庸不思而得思之弗得弗措孟子思誠並見言誠篇程子曰學原於思又曰思方有感悟處問張旭學草書見擔夫與公主爭道及公孫大娘舞劒而後悟筆法是心常思念至此而感發否曰然須是思方有感悟處若不思怎生得如此然可惜其留心於書若移此心於道何所不至問不深思則不能造於道不深思而得者其得易失然而學者有無思無慮而得者何也曰以無思無慮而得之者乃所以深思而得之也以無思無慮為不思而自以為得者未之有也或問何以窒欲曰思問云云莫是言欲心一萌當思禮義以勝之否朱子曰然又問思與敬如何曰人於敬上未有用力處且自思入庶幾有箇把攬處思一字於學者煞有力詳見治情篇或問思慮雖多果出於正亦無害否曰且如宗廟主敬朝廷主莊軍旅主嚴此是也如發不以時紛然無度雖正亦邪要息思慮便是不息思慮或問云云朱子曰思慮息不得只敬便自然無人有學未至而言至者循其言亦可以入道管子曰思之思之又重思之思之而不通鬼神將通之非鬼神之力也精氣之極也循此言可以及道管子初不及此楊氏曰思可以作聖而君子於貌言視聽必有思焉謂有思皆邪可乎繫辭曰易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此夫自至神而下蓋未能無思也惟無思為足以感通天下之故而謂無思土木也可乎此非窮神知化未足與議也胡珵舉蘇氏説以問先生答之如此按蘇氏語曰孔子曰思無邪凡有思皆邪也而無思則土木也孰能使有思而非邪無思而非土木乎夫無思之思端正莊栗如臨君師未嘗一念放逸然卒無所思詳蘇氏本意蓋謂凡人有思則易入於邪無思則又如木土必也有思而非邪無思而非木土然後為善其語意未為差失非如龜山所云故朱子亦取焉又荀子曰空石之中有人焉善射而好思耳目之欲接則敗其思蚊虻之聲聞則挫其精是以闢耳目之欲而逺蚊虻之聲間居靜思則通思仁若是可謂微乎與孟子奕射意略同然其語近於莊列故不足取右專言思念慮書多方乃惟爾商後王逸厥逸圖厥政不蠲蒸天惟降時喪惟聖罔念作狂惟狂克念作聖天惟五年須暇之子孫誕作民主罔可念聽吕氏曰言紂雖當亡天尚以先哲王之故未忍遽絶而待其改也紂固無能改之事而有可改之理聖狂罔克之機所謂可改之理也聖者通明之稱雖曰通明不念則狂雖曰狂惑能念則通其機在念不念之間爾伊訓曰弗慮胡獲弗為胡成説命慮善以動動惟厥時論語子曰人無逺慮必有近憂蘇氏曰人之所履者容足之外皆為無用之地而不可廢也故慮不在千里之外則患在几席之下朱子取之南軒曰慮之不逺其憂即至故曰近憂易於履霜即曰堅氷至以見其憂之近也慮患於履霜之初則有以弭其憂矣大學慮而後能得見本篇右兼言念慮情記禮運何謂人情喜怒哀懼愛惡欲七者不學而能鄭氏曰按昭二十五年左傳天有六氣在人為六情謂喜怒哀樂好惡此之喜怒哀惡與彼同也此云欲則彼云樂也此云愛則彼云好也謂六情之外增一懼而為七熊氏曰懼則怒中之小別以見怒而怖懼耳六氣謂隂陽風雨晦明也按彼傳云喜生於風怒生於雨哀生於晦樂生於明好生於陽惡生於隂其義可知也問七情喜愛欲發於陽怒哀惡懼發於隂否朱子曰然問怒如何屬隂曰怒畢竟屬義義屬隂怒與惡皆羞惡之發所以屬隂愛與欲相似欲又較深問欲屬水喜屬火愛屬木惡與怒屬金哀與懼亦屬水否曰然問七情中愛與欲何以别曰愛是泛愛那物欲則有意於必得哀與懼是從惻隱發蓋懼亦是怵惕之甚者但七情不可分配四端七情自於四端便貫通了問欲與欲字有何分别答曰無心欲字虛有心欲字實春秋傳子太叔曰民有好惡喜怒哀樂生於六氣是故審則冝類以制六志哀有哭泣樂有歌舞喜有施舍怒有戰鬬喜生於好怒生於惡是故審行信令禍福賞罰以制死生生好物也死惡物也好物樂也惡物哀也哀樂不失乃能協於天地之性是以長久杜氏曰為禮以制好惡喜怒哀樂六志使不過節按此云六志不云六情情者性之所發志者心之所之皆指動處而言故朱子曰志與意皆屬情孟子四端見後五常篇朱子曰四者情也又曰四端理之發七情氣所發右專言情治情書太甲王拜手稽首曰豫小子不明于德自底不類欲敗度縱敗禮以速戾于厥躬愚謂德者得之於天者也不類猶不肖也天性本善人自昧之則反善而為惡與天不相似矣欲者嗜好也縱者放肆也奉身當有度嗜好無節則敗度矣修身當有禮縱肆不恭則敗禮矣二字乃太甲前日受病之源故至此首以自責周武王杖銘曰惡乎危于忿疐惡乎失道於嗜欲惡乎相忘於富貴愚謂此銘蓋因杖以自警杖所以扶危者也忿疐不戒亦能危身猶舍杖而傾跌也杖遵道而行者也嗜欲不戒違背正理猶行道而迷錯也杖徒行所用富貴而車馬則忘乎杖矣猶貧賤而戒懼富貴而驕肆則忘乎戒懼矣危字句斷下同易象曰山下有澤損君子以懲忿窒欲程子曰修己之道所當損者唯忿與欲朱子曰觀山之象以懲忿觀澤之象以窒欲欲如汙澤然其中穢濁解汙染人須當填塞了問觀山之象以懲忿如何曰人怒時自是恁突兀起來故孫權云令人氣湧如山又云懲忿如摧山窒欲如填壑左昭二十五年宋公享昭子明日宴飲酒樂宋公使昭子右坐語相泣也樂祁佐退而告人曰今兹君與叔孫其皆死乎吾聞之哀樂而樂哀皆喪心也心之精爽是謂魂魄魂魄去之何以能久昭子叔孫婼也杜氏曰哀樂可樂而哀也樂哀可哀而樂也子曰吾未見剛者或對曰申棖子曰棖也欲焉得剛程子曰人有欲則無剛剛則不屈於欲謝氏曰剛與欲正相反能勝物之謂剛故長伸於萬物之上為物掩之謂欲故常屈於萬物之下顔回不遷怒憲問克伐怨欲不行並見後司馬牛問君子子曰君子不憂不懼曰不憂不懼斯謂之君子矣乎子曰內省不疚夫何憂何懼朱子曰由其平日無愧於心故能內省不疚而自無憂懼朝氏曰不憂不懼由乎德全而無疵故無入而不自得非實有憂懼而強排遣之也南軒曰聖人之所謂不憂不懼者以夫內自省察無所愧病故得其樂而物莫之攖也能進於是非君子乎曾子之守約蓋以此也使司馬牛而知所從事則勉之於己不然徒膠擾於憂懼之域何益哉子曰唯仁者能好人能惡人又好仁惡不仁者並見言仁篇子貢曰君子亦有惡乎曰有惡惡稱人之惡者惡居下流而訕上者惡勇而無禮者惡果敢而窒者朱子曰訕毁也窒不通也稱人惡則無仁厚之意下訕上則無忠敬之心勇無禮則為亂果而窒則妄作故夫子惡之曰賜也亦有惡乎惡徼以為知者惡不孫以為勇者惡訐以為直者惡徼以下子貢之言也徼伺察也訐謂攻發人之隂私楊氏曰仁者無不愛則君子疑若無惡矣子貢之有是心也故問焉以質其是非侯氏曰聖賢之所惡如此所謂唯仁人能惡人也子曰惡紫之奪朱也惡鄭聲之亂雅樂也惡利口之覆邦家者朱子曰朱正色紫間色雅正也利口捷給覆傾敗也范氏曰天下之理正而勝者常少不正而勝者常多利口之人以是為非以非為是以賢為不肖以不肖為賢人君茍悅而信之則國家之覆也不難矣曲禮曰敖不可長欲不可從志不可滿樂不可極鄭氏曰四者慢逰之道桀紂所以自禍也樂記曰君子樂得其道小人樂得其欲以道制欲則樂而不亂以欲忘道則惑而不樂孟子曰無為其所不為無欲其所不欲如此而已矣李氏曰有所不為不欲人皆有是心也至於私意一萌而不能以禮義制之則為所不為欲所不欲者多矣能反是心則所謂擴充其羞惡之心者而義不勝用矣孟子曰養心莫善於寡欲其為人也寡欲雖有不存焉者寡矣其為人也多欲雖有存焉者寡矣朱子曰欲如口鼻耳目四肢之欲雖人之不能無然多而不節未有不失其本心者學者所當深戒也程子曰所欲不必深溺只有所向便是欲集義程子曰孟子言養心莫善於寡欲欲寡則心自誠荀子言養心莫善於誠既誠矣又何養此已不識誠又不知所以養致知在所養養知莫過於寡欲吕氏曰欲者感物而動也治心之道莫善於少欲少欲則耳目之官不蔽於物而心常寧矣心常寧則定而不亂明而不暗道之所由生德之所自成也不存者梏亡之謂也寡欲之人則無梏亡之患矣其為人也多欲則好動而無節妄作而失常善端所由喪而天理虧焉故雖有存焉寡矣是故心者性之用也可以成性可以失性得其養則道進而德長所以成性失其養則反道敗德所以失性云云又曰天下之難持者莫如心天下之易染者莫如欲南軒曰有所向則為欲多欲則百慮紛紜其心外馳尚何所存乎寡欲則思慮淡血氣平其心虛寧而不存者寡矣雖然天資寡欲之人其不存焉者固寡然不知存其存則亦莫之能充也若學者以寡欲為要則當存養擴充由寡欲以至無欲則其清明高逺者為無窮矣周子曰聖可學乎曰可有要乎曰有請問焉曰一為要一者無欲也無欲則靜虛動直靜虛則明明則通動直則公公則溥明通公溥其庶矣乎朱子曰此章之旨最為要切然其辭義明白不煩訓解學者能深玩而力行之則有以知無極之真兩儀四象之本皆不外乎此心而日用間自無别用力處矣又嘗為養心説曰孟子曰養心莫善於寡欲其為人也寡欲雖有不存焉者寡矣豫謂養心者不止於寡而存耳蓋寡焉以至於無無則誠立明通誠立賢也明通聖也朱子曰誠立謂實體安固明通則實用流行立如三十而立之立通則不惑知命而鄉乎耳順矣一者無欲今試看無欲之時心豈不一人只為有欲此心便千頭萬緒太極圖説無欲故靜己見前論語仁者靜孔氏注曰無欲故靜周子意亦有所本歟程子曰聖人未嘗無喜也象喜亦喜聖人未嘗無怒也一怒而安天下之民聖人未嘗無哀也哀此惸獨聖人未嘗無懼也臨事而懼聖人未嘗無愛也仁民而愛物聖人未嘗無欲也我欲仁斯仁至矣但其中節則謂之和治怒為難治懼亦難克己可以治怒明理可以治懼甚哉欲之害人也人之為不善欲誘之也誘之而弗知則至於滅天理而不反故目欲色耳欲聲以至鼻之於香口之於味四肢之於安佚皆然此皆有以使之也然則何以窒其欲曰思而已矣學者莫過於思惟思乃能窒欲又曰曾子三省窒欲之道也周公至公無私進退以道無利欲之蔽故雖在危疑之地安步舒泰赤舄几几然也此詩狼跋注也上文云狼獸之貪者猛於求欲故陷於機穽羅縶前跋後躓進退困險詩人取之以言夫狼之所以致禍如是者以其有貪欲故也云云范氏曰神龍或潛或飛能大能小其變化不測然得而畜之若犬羊然有欲故也凡有欲之類莫不可制焉聖人無欲故天地萬物不能易也人雖不能無欲然當有以制之無以制之而惟欲之從則人道廢而入於禽獸矣以道制欲則能順命又能於怒時遽忘其怒而觀理之是非全文已見前問聖人恐無怒容否朱子曰當怒時亦必形於色如治人之罪却為笑容則不可曰如此則恐涉忿厲之氣否曰天之怒雷霆亦震但當怒而怒便中節事過便消了更不積人於天理昏者只為嗜欲亂著它莊子言其嗜欲深者其天機淺此言却最是如舜之誅四凶怒在四凶舜何與焉蓋因其人有可怒之事而怒之聖人之心本無怒也全文云問顔子不遷怒語録有怒甲不怒乙之説是否朱子曰是曰若此則甚易何待顔子而後能曰只被説得淺了諸君便道易此莫是最難須是理會得因何不遷怒云云譬如明鏡好物來時便見是好惡物來時便見是惡鏡何嘗有好惡也世之人固有怒於室而色於市且如怒一人對那人説話能無怒色否有能怒一人而不怒别人者能忍得如此已是煞知義理若聖人因物而未嘗有怒此莫是甚難君子役物小人役於物見人可喜可怒之事自己著一分陪奉他此亦勞矣聖人之心如止水程子傳易履九二象曰幽人貞吉中不自亂也履道在於安靜其中恬正則所履安裕中若躁動豈能安其所履故必幽人則能堅固而吉蓋其中安靜不以利欲自亂也豫六二介于石不終日貞吉逸豫之道説則失正故豫之諸爻多不得正唯六二一爻處中正又無應為自守之象當豫之時獨能以中正自守可謂特立之操是其節介如石之堅也人之于豫樂心説之故遲遲遂至於耽戀不能已也二以中正自守其介如石其去之速不俟終日故貞正而吉也處豫不可安且久也久則溺矣隨出門交有功傳人心所從多所親愛者常人之情愛之則見其是惡之則見其非故妻孥之言雖失而多從所憎之言雖善為惡也茍以親愛而隨之則是私情所與豈合正理故出門而交則有功也遁九四好遁君子吉小人否四與初為正應是所好愛者也君子雖有所好愛義茍當遁則去而不疑所謂克己復禮以道制欲是以吉也小人則不能以義處昵於所好牽於所私至於陷辱其身而不能已故在小人則否也否不善也頥初九舍爾靈龜觀我朵頥凶爾謂初也舍爾之靈龜乃觀我而朵頥龜能咽息不食靈龜喻其明智而可以不求養於外也才雖如是然以陽居動體而在頥之時求頥人所欲也上應於四不能自守志在上行説所欲而求頥者也心既動則其自失必矣迷欲而失己以陽而從隂則何所不至是以凶也朵頥為朵動其頥頷人見食而欲之則動頥埀涎故以為象象曰觀我朵頥亦不足貴也九動體朵頥謂其説隂而志動既為欲所動則雖有剛健明智之才終必自失故其才亦不足貴也人之貴乎剛者為其能立而不屈於欲也貴乎明者為其能照而不失於正也既惑所欲而失其正何剛明之有為可賤也損二簋可用享損者損過而就中損浮末而就本實也天下之害無不由末之勝也峻宇雕墻本於宫室酒池肉林本於飲食淫酷殘忍本於刑罰窮兵黷武本於征討凡人欲之過者皆本於奉養其流之逺則為害矣先王制其本者天理也後人流於末者人欲也損之義損人欲以復天理而已益上九莫益之或擊之立心勿恆凶利者衆人所同欲也專欲益已其害大矣欲之甚則昏蔽而忘義理求之極則侵奪而致怨仇故夫子曰放於利而行多怨孟子謂先利則不奪不饜聖賢之深戒也九以剛而求益之極衆人所共惡故無益之者而或攻擊之矣立心勿恆凶聖人戒人存心不可專利云勿恆如是凶之道也又曰理者天下之至公利者衆人所同欲茍公其心不失其正理則與衆同利無侵於人人亦欲與之若切於求利蔽於自私求自益以損於人則人亦與之力爭矣艮其背不獲其身行其庭不見其人無咎人之所以不能安其止者動於欲也欲牽於前而求其止不可得也故艮之道當艮其背所見者在前而背乃背之是所不見也止於所不見則無欲以亂其心而止乃安不獲其身不見其身也謂忘我也無我則止矣不能無我無可止之道行其庭不見其人庭除之間至近也在背則雖至近不見謂不交於物也外物不接內欲不萌如是而止乃得止之道為無咎也朱子曰人之四肢皆能動惟背不動有止之象艮其背是止於其所當止之地不獲其身行其庭不見其人萬物各止其所便都只是理也不見有己也不見有人都只見道理歸妹無攸利柔乘剛也男女有尊卑之序夫婦有唱隨之禮此常理也如恆是也茍不由常正之道徇情肆欲唯説是動則夫婦瀆亂男牽欲而失其剛婦狃説而忘其順如歸妹之乘剛是也所以凶無所往而利也夫隂陽之配合男女之交媾理之常也然從欲而流放不由義理則淫邪無所不至傷身敗德豈人理哉歸妹之所以凶也又曰大率以説而動安有不失正者張子曰湛一氣之本攻取氣之欲口腹於飲食鼻口於臭味皆攻取之性也知德者屬饜而已不以嗜欲纍其心不以小害大末喪本焉爾朱子曰湛一是未感物時湛然純一此是氣之本攻取如目之欲色耳之欲聲便是氣之欲仁之難成久矣人人失其所好蓋人人有利欲之心與學正相背馳故學者要寡欲莫非天也陽明勝則德性用隂濁勝則物欲行領惡而全好者其惟學乎朱子曰云云只將自家意思體驗便見得人心虛靜自然清明才為物欲所蔽便隂隂地黑暗了此隂濁之所以勝也上逹反天理下逹徇人欲鄭衛之音悲哀令人意思留連又生怠惰之意從而致驕淫之心雖珍玩竒貨其始感人也亦不若是切從而生無限嗜好故孔子曰必放之亦是聖人經歷過但聖人能不為物所移耳上蔡謝氏曰任意喜怒都是人欲須察見天理涵養始得又曰天理與人欲相對有一分人欲即滅一分天理存一分天理即勝一分人欲其全文曰所謂格物窮理須是識得天理始得所謂天理者乃自然底道理無毫髮杜撰今人乍見孺子將入於井皆有怵惕惻隱之心方乍見時其心怵惕所謂天理也要譽於鄉黨朋友內交於孺子父母惡其聲而然即人欲耳云云人欲才肆天理滅矣任私用意杜撰做事所謂人欲肆也故莊子曰去智與故循天之理若在聖人分上即説循字不得或問謝子於勢利如何曰打透此關十餘年矣當初大段做工夫揀難捨底棄却後來漸漸輕至今日於器用之類置之只為合用更無健羡底心又問公於外間一切放得下否曰實就上面做工夫來凡事須有根屋柱無根拆却便倒樹木有根雖剪枝條相次又發如人要富貴要他做甚必須有用處尋討要用處病根將來斬斷便沒事按上蔡後二段語乃去人欲存天理切實工夫故附此武夷胡氏曰克己可以治怒順理可以忘怒春秋文八年公孫敖奔莒傳曰按左氏公孫敖奔莒從己氏也男女人之大欲存焉寡欲者養心之要欲而不行可以為難矣然欲生於色而縱於淫色出於性目之所視有同美焉不可掩也淫出於氣不持其志則放辟趨蹶無不為矣夫以志徇氣肆行人欲而不能為之帥至於棄其家國出奔而不顧此天下之大戒也春秋謹書其事於敖與何誅使後人為鑒必持其志修身窒欲之方也欲生於色淫出於氣本上蔡語治心修身以飲食男女為切要從古聖賢於此用工其可忽乎又曰人於一切世味淡薄方好不要有富貴相孟子謂堂高數仞食前方丈我得志不為學者須先除去此等常自激昂便不到得墜墮西山李氏曰欲為聖賢之事必須去世俗之欲致堂胡氏曰惟酒無量不及亂亂者內昏其心志外喪其威儀甚則班伯所謂淫亂之原皆在於酒是也聖人飲無定量亦無亂態蓋從心所欲不踰矩是以如此學者未能然當知戒可也五峰胡氏曰物欲不行則志氣清明而應變無失朱子曰凡徇人欲自是危險莊子所謂其熱焦火其寒凝氷愚按近世詩人有險心遊萬仞躁欲生五兵之句亦此意南軒張氏敬簡堂記曰若何而能敬克其所以害敬者則敬立矣害敬者莫甚於人欲自容貌顔色詞氣之間而察之天理人欲絲毫之分耳遏止其欲而順保其理則敬在其中引而逹之擴而充之則將有常惺惺法而服膺勿失矣南軒張氏曰人欲橫流強止遏之未有不奔潰湍決者此鯀治水也水之性無有不下禹能順而治之行其所無事也自然平治人之良心豈無發見之時引而伸之涵養而擴充之天理明人欲自消先生臨終再三誦曰春融天理之妙蟬蛻人欲之私可以觀所養矣右言治情之道西山讀書記卷四
