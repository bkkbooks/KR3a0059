body:
  text: 西山讀書記目録儒家類卷一天命之性卷二氣質之性性命命性情心性性情心卷三心卷四志志氣氣意思念慮情治情卷五元亨利貞仁義禮智信卷六仁上卷七仁下卷八義義利禮智信卷九仁義仁禮仁智仁孝智仁禮勇卷十禮義禮樂智禮智聖禮義信信義禮德禮忠信善信順信卷十一父子卷十二君臣卷十三夫婦卷十四長幼朋友卷十五道德德行德業卷十六才德道德中卷十七一極誠卷十八敬上卷十九敬下卷二十學卷二十一師道教法小學大學小學卷二十二大學卷二十三易要指書要指詩要指卷二十四禮要指春秋要指語孟要指詩禮樂六經之教六經之指卷二十五讀書之序讀書之法廣大學一廣大學二廣大學三卷二十六廣大學四卷二十七廣大學五廣大學六卷二十八堯舜禹湯文武傳授孔子顔曾傳授卷二十九孔門諸子之學卷三十子思孟子傳授荀楊董文中子之學韓子之學周子二程子傳授卷三十一邵子張子之學程張門人之學朱子傳授張氏呂氏之學卷三十二聖賢氣象君子善人有恆之分君子小人之分卷三十三處貧賤處富貴處患難處死生安義命審輕重卷三十四進退仕隱辭受卷三十五吾道異端之辨上卷三十六吾道異端之辨下卷三十七隂陽天地之形體卷三十八天地之道天地之心乾坤五行卷三十九日月星辰雷霆風雨之屬卷四十鬼神臣等謹案西山讀書記四十卷宋真德秀撰陳振孫書録解題謂西山讀書記有甲乙丙丁甲言情理中述治道末言出處大抵本經史格言而述以己意今但有甲三十七卷丁二卷乙丙未見故載於文獻通考者僅三十九卷今世所傳明時舊刋本甲丁二記卷數與書録解題合中多乙記二十二卷前有開慶元年德秀門人湯漢序稱讀書記惟甲乙丙為成書甲乙二記先刋行乙記上即大學衍義久進於朝其下未及繕寫而德秀沒漢從其子仁夫鈔得釐為二十二卷而刋之福州據此則丙記原書本闕乙記為湯漢所續刋振孫惟見初行之本故止於甲丁二記也甲記自論天命之性至論鬼神各分標目前有綱目一篇具詳論次先後之㫖乙記載虞夏以來名臣賢相事業略仿編年之體前亦有綱目一篇謂訖於五閏而書中至唐李德裕而止蓋撰次未完者丁記上卷皆論出處大義下卷分處貧賤處患難處生死安義命審輕重諸目與上卷互相發明德秀大學衍義羽翼聖經推闡已無遺藴此書乃分類詮録以為下學上達之本故自身心性命天地五行以及先儒授受源流無不臚析名言緒論徴引極多皆有裨於研究至於致治之法衍義所未及詳者則於乙記中備著其事俾古今興衰治忽之故犁然可睹足便觀覽體用兼該之學於此更可見一斑矣乾隆四十二年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀西山讀書記原序西山先生讀書記惟甲乙丁為成書甲丁二記近年三山學官已刋行乙記上則大學衍義是也其下卷未及繕寫而先生沒藁藏於家學者罕見之漢來建安請於先生之嗣子仁夫右司傳鈔以來手自校定釐為二十二卷將欲刋之倉臺適福之郡文學吳塵編蠧簡久蟄屋壁乃今出而流布使夫有志於尊主庇民者讀是書蚤正而素講一日當大任据千載而施四事真儒之效庶幾復見於天下是則先生佐王之學與天地相終始豈非其平日至大至公之心也哉綱目訖於五季而藁本僅至李文饒止今不敢輒補之又元藁間有附注别說者乃漢一時所見先生未及有所去取今皆削之觀於初藁者其無所疑云峕開慶改元十月初吉門人番陽湯漢謹書讀書記綱目性命者義理之源故以為編之首性之發為情而心則統乎性情者也故性之次曰心曰情此三者一編之綱領也其目則曰仁義禮智信者天命之性也父子君臣夫婦長幼朋友者率性之道也故五常之次五典繼之人所共由之謂道得之於己之謂德其實非有二也故五典之次道德繼之曰中曰一曰極曰誠胥是道也而異其名故以次於道德之後士之求道入德將何所自始亦曰學而已矣敬者學之本根故列於學之首其泛言學次之曰師道曰教法又次之曰小學曰大學又次之以聖賢為師而辨君子小人之所以分與吾道異端之所以異皆學之事故以次於大學之後隂陽造化之理其略已見前性命篇其未備者復列於此以為編之終焉門人番陽湯漢再識
