body:
  text: 西山讀書記卷十宋真徳秀撰禮義書仲虺之誥以義制事以禮制心此仲虺稱湯之詞記冠儀凡人之所以為人者禮義也禮義之始在於正容體齊顔色順辭令容體正顔色齊辭令順而後禮義備以正君臣親父子和長幼君臣正父子親長幼和而後禮義立孟子曰非禮之禮非義之義大人弗為朱子曰察理不精則有二者之蔽大人則隨事而順理因時而制宜豈為是哉南軒曰非禮之禮非義之義謂其事雖本是禮義而施之不當一過其則則為非禮義矣故程子曰恭本為禮過於恭是非禮之禮也以物與人為義過於與是非義之義矣推是類可見矣盖禮義本於天而著於人心各有其則而不可過乃天下之公而非有我之所得私也一以己意加之則是私情而已故其事雖以禮義而君子謂之非禮之禮非義之義也夫義路也禮門也惟君子能由是路出入是門也言非禮義謂之自暴見前仁義篇張子曰天之生物便有尊卑大小之象人順之而已此所以為禮也學者有專以禮出於人而不知禮本於天之自然告子專以義為外而不知所以行義由内也皆非也當合内外之道右兼言禮義禮樂周禮大司徒以五禮防萬民之偽而教之中以六樂防萬民之情而教之和鄭氏曰禮所以節正民之侈偽使其行得中鄭司農云五禮謂吉凶賔軍嘉樂所以蕩正民之情思使其心應和也司農云六樂謂雲門咸池大韶大夏大濩大武大宗伯以天産作隂徳以中禮防之以地產作陽徳以和樂防之按此義在周禮最為難通者也先鄭氏以隂徳為男女之情既未適當而康成則曰天産者動物謂六性之屬地產者殖物謂九榖之屬隂徳隂氣在人者隂氣虚純之則劣故食動物作之使動過則傷性制中禮以節之陽徳陽氣在人者陽氣盈純之則躁故食殖物作之使靜過則傷性制和樂以節之如是然後隂陽平性情和而能育其類後鄭之說如此正義從之亦未見其必然更詳之以禮樂合天地之化百物之產以事鬼神以諧萬民以致百物禮濟虚樂損盈並行則四者乃得其和能生非類曰化生其種曰產正義曰言四者謂天地之化百物之產共為一以事鬼神為二諧萬民為三以致百物為四知化產為一者以其化與產氣類相似故為一也子曰先進於禮樂野人也後進於禮樂君子也朱子曰先進後進猶言前輩後輩野人謂郊外之民君子謂賢士大夫也程子曰先進於禮樂文質得宜今反謂之質朴而以為野人後進之於禮樂文過其質今反謂之彬彬而以為君子葢周末文勝故時人之言如此不自知其過於文也如用之則吾從先進用之謂用禮樂孔子既述時人之言又自言其如此葢欲損過以就中也孔子窮而在下所用禮樂固是從周若達而在上須更損益南軒曰文勝而過質則於禮樂之實反有害故聖人思反本而有從先進之言程子曰若用於時救文之弊則吾從先進小過之義也或曰然則從周之說奈何葢文莫備於周大體固當從周而其末流文勝之弊則不可以不正也從先進與從周各有義耳子曰禮云禮云玉帛云乎哉樂云樂云鐘皷云乎哉朱子曰敬而將之以玉帛則為禮和而發之以鐘皷則為樂遺其本而專事其末則豈禮樂之謂哉程子曰禮只是一箇序樂只是一箇和只此兩字含蓄多少義理天下無一物無禮樂且如置此兩椅一不正便是無序無序便乖乖便不和又如盜賊至為不道然亦有禮樂葢必有總屬必相聽順乃能為盜不然則叛亂無統不能一日相聚而為盜也禮樂無處無之學者須要識得黄氏曰程子朱子曰言樂則同主於和至於言禮則朱子主於敬程子主於序二說不同何也曰不但敬與序之不同雖言和則同而所以為和亦不同也集註之敬與和主人心而言也程子之序與和主事理而言也然有人心之敬與和則見於事理者始有序而和矣記凡三王教世子必以禮樂樂所以修内也禮所以修外也禮樂交錯於中發形於外是故其成也懌恭敬而温文正義曰樂是喜樂之事喜樂從内而生和諧性情故云所以修内也禮是恭敬之事恭敬是正其容體故云所以修外也樂雖由中從中而見外禮雖由外從外而入中是中之與外皆有禮樂故云禮樂交錯於中發形於外也樂由陽來者也禮由隂作者也隂陽和而萬物得先王之制禮樂也非以極口腹耳目之欲也將以教民平好惡而反人道之正也上文云樂之隆非極音也食饗之禮非致味也清廟之瑟朱弦而疏越壹唱而三嘆有遺音者矣大饗之禮尚𤣥酒而爼腥魚大羮不和有遺味者矣云云正義曰以𤣥酒腥魚大羮非極口腹也以朱弦疏越非極耳目也人生而靜天之性也感於物而動性之欲也物至知知然後好惡形焉好惡無節於内知誘於外不能反躬天理滅矣鄭氏曰理猶性也物之感人無窮人之好惡無節則是物至而人化物也人化物也者滅天理而窮人欲也於是有悖逆詐偽之心有淫泆作亂之事是故强者脇弱衆者暴寡知者詐愚勇者苦怯疾病不養老幼孤獨不得其所此大亂之道也是故先王之制禮樂人為之節衰麻哭泣所以節喪紀也鐘皷干戚所以和安樂也昏姻冠笄所以别男女也射鄉食饗所以正交接也禮節民心樂和民聲政以行之刑以防之禮樂刑政四達而不悖則王道備矣樂者為同禮者為異同則相親異則相敬樂勝則流禮勝則離合情飾貌者禮樂之事也鄭氏曰欲其並行斌斌然正義曰樂主和統同禮主序辨異又恒相須也勝猶過也若樂過和同而無禮則尊卑混一而鮮區别禮過殊隔而無和樂則親屬離析而無復骨肉之愛唯須禮樂兼有所以為美故語云禮之用和為貴是也樂由中出鄭氏曰和在心也禮自外作敬在貌也樂由中出故靜禮自外作故文文猶動也大樂必易大禮必簡樂至則無怨禮至則不爭揖讓而治天下者禮樂之謂也大樂與天地同和大禮與天地同節鄭氏曰言順天地之氣與其數和故百物不失不失其性節故祀天祭地成物有功報焉明則有禮樂教人者也幽則有鬼神助天地成物者正義曰天地氣和而生萬物大樂之體順隂陽律吕生養萬物是與天地同和也天地之形各有髙下大小為限節大禮辨尊卑貴賤與天地相似是與天地同節也易上繫曰精氣為物遊魂為變是故知鬼神之情狀註云精氣謂七八遊魂謂九六遊魂謂之鬼物終所歸精氣謂之神物生所信言木火之神生物東南金水之鬼終物西北詳見後卷問明則有禮樂幽則有鬼神程子曰鬼神只是一箇造化天尊地卑乾坤定矣鼓之以雷霆潤之以風雨是也問云云朱子曰禮主減樂主盈鬼神亦只是屈伸之理禮樂鬼神一理在聖人制作處便是禮樂在造化處便是鬼神如此則四海之内合敬同愛矣禮者殊事合敬者也樂者異文合愛者也禮樂之情同故明王以相沿也沿猶因述也正義曰尊卑有别是殊事俱行於禮是合敬也宫商别調是異文無不歡愛是合愛也禮樂之狀質文雖異樂情主和禮情主敬致治是同以其致治情同故明王所以相因述也故鐘皷管磬羽籥干戚樂之器也屈伸俯仰綴兆舒疾樂之文也簠簋爼豆制度文章禮之器也升降上下周還裼襲禮之文也鄭氏曰綴謂酇舞者之位兆其外營域也正義曰綴者舞者行位相連綴也周謂行禮周曲回旋也裼謂袒上衣而露裼也襲謂掩上衣也禮盛者尚質故襲不盛者尚文故裼故知禮樂之情者能作識禮樂之文者能述作者之謂聖述者之謂明明聖者述作之謂也樂者天地之和也禮者天地之序也和故百物皆化序故羣物皆别鄭氏曰化猶生也别謂形體異也樂由天作禮以地制言法天地也朱子曰樂由天作屬陽故有運動底意禮以地制如田地不可移易過制則亂過作則暴明於天地然後能興禮樂也正義曰此一節申明禮樂從天地而來王者必明于天地然後能興禮樂樂者調暢隂陽是天地之和也禮明貴賤是天地之序也樂主於陽是法天而作禮主於隂是法地而制論倫無患樂之情也欣喜歡愛樂之官也倫猶類也患害也官猶事也中正無邪禮之質也莊敬恭順禮之制也質猶本也若夫禮樂之施於金石越於聲音用於宗廟社稷事乎山川鬼神則此所與民同也言情官質制先王所專也正義曰論倫云云者樂主和同論說等倫無相毁害是樂之情也言樂之本情欲使倫等和同無相損害也欣愛云云者賀瑒曰八音宜諧使物歡欣此樂之事迹也在心則倫類無害故為樂情在貌則欣喜歡愛故為樂事也中心云云者謂内心中正無有邪僻是禮之本質也莊敬云云者外貌莊敬恭慎是禮之節制也所安皆樂故可以為樂此禮樂之本也劉向請興辟雍胡氏論之曰向之論美矣而未循其本也孔子曰人而不仁如禮何人而不仁如樂何不仁之人心非已有視聽舉履皆迷其當而何以為禮樂云云彼庠序之羣處雅頌之聲音揖讓之威儀特其具耳無本而有其具則舉此教人祗益趨於虚偽之域不若不行之愈也天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉春作夏長仁也秋斂冬藏義也仁近於樂義近於禮言樂法陽而生禮法隂而成樂者敦和率神而從天禮者别宜居鬼而從地敦和樂貴同也率循也從順也别宜禮尚異也鬼神謂先聖先賢故聖人作樂以應天制禮以配地禮樂明備天地官矣正義曰此一節申明禮樂配於天地若禮樂備具則天地之事各得其宜天髙地下不同故人倫尊卑有異其間萬物各散殊塗禮者别尊卑定萬物是禮之法制行矣天地萬物流動不息合㑹齊同而變化者也樂者調和氣性合徳化育是樂興也樂主和同故云興禮主異故云行仁主仁愛樂主和同故仁近於樂義主斷割禮主節限故義近於禮或問天髙地下二段朱子因歎此數句意思極好非孟子以下所能作其文如中庸左傳子太叔亦論此夫禮天之經地之義民之行云云只是說得麤文意不溜亮不如此說之純粹通暢他只是說人做這箇去合天之度數如云為六畜五牲三犧以奉五味云云之類都是做這箇去合那天都無自然之理如云天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉皆是自然合當如此愚按易曰上天下澤履君子以辨上下定民志此禮之制因乎自然之序也又曰雷出地奮豫先王以作樂崇徳殷薦上帝以配祖考此樂之作因乎自然之和也天髙而居上地卑而居下生物萬類有大有小分散而差殊聖人因之制為之禮君父在上臣子在下即天髙地下之象昆弟夫婦師友賔主下及於輿臺皂𨽻等級分明不相混亂即萬物散殊之象此禮制之所自行也隂陽五行之氣流行於天地之間未嘗止息相摩相盪若雷霆之鼓動風雨之散潤二氣和合故能化生而不窮聖人因之作為之樂有五聲有十二律角徴陽也宫羽隂也六律陽也六吕隂也混合無間而樂成焉故能與天地之和相應此樂之所由興也知乎此然後識禮樂之原矣春作夏長氣之伸也陽之屬也秋斂冬藏氣之屈也隂之屬也樂本陽主乎流動故曰敦和率神而從天禮本隂主乎凝定故曰别宜居鬼而從地所謂鬼神者屈伸而已註疏以聖人賢人之神主之恐非天尊地卑君臣定矣卑髙已陳貴賤位矣動靜有常小大殊矣方以類聚物以羣分則性命不同矣在天成象在地成形如此則禮者天地之别也鄭氏曰卑髙謂山澤也位矣尊卑之位象山澤也動靜隂陽用事小大萬物也大者常存小者隨陽出入方謂行蟲也物謂殖生者也性之言生也命生之長短也象光輝也形體貌也地氣上齊天氣下降隂陽相摩天地相蕩鼓之以雷霆奮之以風雨動之以四時煖之以日月而百化興焉如此則樂者天地之和也齊讀為躋升也摩猶迫也蕩猶動也奮迅也百化百物化生也正義曰地氣上躋者齊升也謂地氣上升天氣下降者謂降下與地氣交合隂陽相摩者摩謂迫切天地相蕩者蕩動也言天地之氣相感動鼓之以雷霆者雖以氣生而物未發故用雷霆以鼓動之奮之以風雨者萬物得風雨奮迅而出也動之以四時者言萬物生長隨四時而動也煖之以日月者萬物之生必須日月煖照之自鼓之以雷霆至煖之以日月皆以天地相蕩細别言之耳朱子嘗舉此章再三嘆息愚按此章葢詳析前章之㫖自天尊地卑至貴賤位矣是言天髙地下之義也自動靜有常至在地成形是言萬物散殊之義也地氣上躋至百化興焉是言流而不息合同而化之義也合二章而觀其理煥然矣動靜言物之性有動者有靜者方以類聚猶燥濕之異趨物以羣分猶飛走之殊類凡皆為散殊而言註疏之說恐非樂著大始而禮居成物著之言處也大始百物之始生也著不息者天也著不動者地也著猶明白也息猶休止也一動一靜者天地之間也間謂百物也故聖人曰禮樂云言禮樂之法天地也樂靜而禮動其並用事則亦天地之間爾正義曰此一節盛說禮樂之大樂象於天天為生物之始著猶處也是樂處大始禮法於地言禮以禀天氣以成於物故曰禮居成物著謂顯著言顯著明白運生不息者是天也故乾象曰天行健顯著養物不移動者地也故坤彖曰安貞吉言樂法於天動而不息禮象於地靜而不動也一動一靜天地之間也者動者或一物飛走蠢動感天之陽氣也靜者或一物安伏而止靜感地之隂氣也天地之間也者言此一動一靜在天地之間所有百物也愚按此章亦推廣前章之㫖樂著大始禮居成物註疏得之但禮以禀天氣以成於物一句辭義不明似有舛誤當云禮法於地地禀天之氣以成物故云禮居成物樂著大始註訓著為處著不息云云則訓著為明白愚謂三著字皆當訓處而音同著尊之著著之為言處也葢處乎上而不息者天也處乎下而不動者地也此天地之定體前章所謂天地之序也而隂陽二氣一動一靜循環於兩間者此天地之妙用前章所謂天地之和是也葢必有自然之序然後有自然之和故聖人曰禮樂云而不曰樂禮周子所謂禮先而樂後程子所謂無序則不和皆此意也夫豢豕為酒非以為禍也而獄訟益繁則酒之流生禍也鄭氏曰以糓食犬豕為豢為作也言豢豕為酒本以立祀養賢而小人飲之善酗以致獄訟是故先王因為酒禮壹獻之禮賔主百拜終日飲酒而不得醉焉此先王之所以備酒禍也壹獻士飲酒之禮百拜以喻多故酒食者所以合歡也樂者所以象徳也禮者所以綴淫也是故先王有大事必有禮以哀之有大福必有禮以樂之哀樂之分皆以禮終分扶簡反大事謂死喪也樂也者聖人之所樂而可以善民心其感人深其移風易俗故先王著其教焉著立也謂立司樂以下使教國子正義曰士之饗禮唯有一獻言所獻酒少也從初至末賔主相答而有百拜言拜數多也是意在於敬不在酒也終日飲云云謂饗禮也以其恭敬示飲而已故不得醉也綴止也人君制禮以教天下所以綴止淫邪也其感人云云者言樂本從民心而來故感動人深也愚按有喪事而無禮則哀必過有大福而無禮則樂必淫哀樂之分皆以禮終所以約其情使合於中也禮之為用大矣哉君子曰禮樂不可斯須去身致樂以治心則易直子諒之心油然而生矣鄭氏曰油然新生好貌也易直子諒之心生則樂樂則安安則乆乆則天天則神天則不言而信神則不怒而威致樂以治心者也致禮以治躬則莊敬莊敬則嚴威中心斯須不和不樂而鄙詐之心入之矣鄙詐入之謂利欲生外貌斯須不莊不敬而易慢之心入之矣故樂也者動於内者也禮也者動於外者也樂極和禮極順内和而外順則民瞻其顔色而弗與爭也望其容貌而民不生易慢也故徳輝動於内而民莫不承聽理發諸外而民莫不承順故曰致禮樂之道舉而措之天下無難矣朱子曰易直子諒韓詩作易直慈良為是又曰聖賢之教無一言一句不是入徳門户如所謂禮樂不可斯須去身者尤為深切真當佩服存省以終其身也或問鄙詐易慢非心之本然也今曰鄙詐之心易慢之心何邪愚謂中心不和不樂則鄙詐入而為之主外貌不莊不敬則易慢入而為之主既為主乎内非心而何樂也者動於内者也禮也者動於外者也故禮主其減樂主其盈禮減而進以進為文樂盈而反以反為文鄭氏曰進謂自勉强也反謂自抑止也文猶美也善也禮減而不進則銷樂盈而不反則放故禮有報而樂有反放淫於聲樂不能止也報讀為褒褒猶進也禮得其報則樂樂得其反則安禮之報樂之反其義一也程子曰禮樂進反之間便得性情之正朱子曰禮如凡事儉約如收斂恭敬便是減須當著力向前去做便是進故以進為文樂如歌詠和樂便是盈須當有箇節制和而不流便是反故以反為文禮減而却進前去樂盈而却反退來便是得性情之正禮以謙遜退貶為尚故主減然非人情之所樂故須勉强做將去方得樂以發揚蹈厲為尚故主盈然樂只管充滿而不反則又不可故須反方得主減者當進須力行將去主盈者當反須回顧身心樂也者施也禮也者報也鄭氏曰樂出而不反禮有往來樂樂其所自生而禮反其所自始樂章徳禮報情反始也自由也正義曰樂也者云云言作樂之時衆庶皆聽之而無反報之意但有恩施而已禮也者云云禮尚往來受人禮事必當報之也樂樂其云言王者正樂歡樂其已之所由生若武王民樂其武徳武王由武功而生王業即以武為樂名以受施處立名無報反之義也而禮反云云言王者制禮必追反其所由始祖若周由后稷為始祖即追祭后稷報其王業之由是禮有報也樂章徳云云者樂但施恩不望其報是樂章明其盛徳也禮者報也言行禮者他人有恩於己己則報有情但先祖既為始於子孫則反報其初始以人意言之則謂之報情以父祖子孫言之則謂之反始其實一也樂也者情之不可變者也禮也者理之不可易者也樂統同禮辨異鄭氏曰同同和合也異異尊卑也禮樂之說管乎人情矣管猶包也窮本知變樂之情也著誠去偽禮之經也禮樂偩天地之情達神明之徳降興上下之神而凝是精粗之體領父子君臣之節偩猶依象也降下也興猶出也凝成也精粗謂萬物大小焉領猶理治也是故大人舉禮樂則天地將為昭焉言天地將為之昭明也正義曰樂也者云云樂出於心聽之則歡悅是情之不可變也禮也者云云禮見於貌行之則恭敬理事也言事之不可改易也樂出於心故曰情禮在於貌故云理樂統同云云統領也言樂主相親是主領其同禮殊别貴賤是分别其異也禮樂所說義理包管於人情也窮本云云者樂本出於人心心哀則哀心樂則樂是可以窮原極本也若心惡不可變惡為善是知變也著誠云云者誠謂誠信也偽謂虚詐也言顯著誠信退去虚偽是禮之常也若人内心虚詐則外貌敖狠唯禮知之故云云也偩猶依象也禮出於地尊卑有序是偩依地之情也樂出於天逺近和合是偩依天之情也禮樂出於人心與神明和㑹故云云也降興云云者興猶出也禮樂原與天地相合用之以祭故能降出上下之神謂降上而及下也凝猶成也是謂正也精粗謂萬物大小也言禮樂之所成就正其萬物大小之形體也領猶理治也言禮樂理治父子君臣之限節而樂主於和聽之則上下相親禮定貴賤長幼是禮能領父子君臣也仲尼燕居子張子貢言游侍縱言及於禮云云子曰禮者何也即事之治也君子有其事必有其治治國而無禮譬猶瞽之無相與倀倀乎其何之譬如終夜有求於幽室之中非燭何見若無禮則手足無所措耳目無所加進退揖讓無所制是故以之居處長幼失其别閨門三族失其和朝廷官爵失其序鬼神失其饗喪紀失其哀如此則無以祖洽於衆也鄭氏曰凡言失者無禮故也言失禮無以為衆倡如無以合和衆子曰慎聽之女三人者吾語女禮猶有九焉大饗有四焉茍知此矣雖在畎畝之中事之聖人已兩君相見揖讓而入門入門而縣興揖讓而升堂升堂而樂闋下管象武夏籥序興陳其薦爼序其禮樂備其百官如此而后君子知仁焉行中規還中矩和鸞中采齊客出以雍徹以振羽是故君子無物而不在禮矣入門而金作示情也升歌清廟示徳也下而管象示事也是故古之君子不必親相與言也以禮樂相示而已鄭氏曰大饗謂饗諸侯來朝者也四者謂金再作升歌清廟下管象也事之謂立置於位也聖人已者是聖人也縣興金作也金再作者獻主君又作也下謂堂下也象武武舞也夏籥文舞也序更也堂下吹管舞文武之樂更起也知仁焉知禮樂所存也采齊雍振羽皆樂章也振羽振鷺及雍金作示情也賔主人各以情相示也金性内明象人情也示徳相示以徳也清廟頌文王之徳示事相示以事武象武王之大事也正儀曰四者謂賔初入門而縣興揖讓而升堂主人獻賔賔飲訖而樂闋是一也賔酢主人金奏作主人飲畢而樂闋是二也至工入升堂歌清廟是三也歌畢堂下管象武是四也行中規至徹以振羽是大饗四禮之外加此五事總為九也按雖在畎畆之中事之聖人已鄭氏云事之謂立置於位聖人已者是聖人也正義推說謂茍能知此四事雖在畎畆衆人奉之立置於位戴以為君本㫖恐不如此近世慈湖楊氏有閒居解此一節云畎畆之中無兩君相見之禮也而即兩君相見之禮也無金聲之樂也而即金聲之樂也無管象夏籥也而管象夏籥之音舞未嘗不日奏於其前而昧者不知也又曰學道者率以言而離黙而近此兩君相見之禮不親相與言也以禮樂相示而已禮樂即吾之言也内外一物動靜一體離物我裂語黙判本末者不足以語此也楊氏之說頗有意味姑附此以俟講論君子知仁鄭氏曰知禮樂所存愚謂兩君相見禮樂並興敬而文和而節於此可以知其禮樂之妙故曰知仁焉葢禮樂之中有仁而仁不在禮樂之外也子張問政子曰師乎前吾語汝乎君子明於禮樂舉而措之而已子張復問子曰師爾以為必備几筵升降酌獻酬酢然後謂之禮乎爾以為必行綴兆興羽籥作鐘皷然後謂之樂乎言而履之禮也行而樂之樂也君子力此二者以南面而立夫是以天下太平也孔子閒居子夏侍子夏曰敢問詩云凱弟君子民之父母何如斯可謂民之父母矣孔子曰夫民之父母乎必達於禮樂之原以致五至而行三無以横於天下四方有敗必先知之此之謂民之父母矣鄭氏曰原猶本也横充也敗謂禍災敢問何謂五至曰志之所至詩亦至焉詩之所至禮亦至焉禮之所至樂亦至焉樂之所至哀亦至焉哀樂相生是故正明目而視之不可得而見也傾耳而聽之不可得而聞也志氣塞乎天地此之謂五至敢問何謂三無曰無聲之樂無體之禮無服之喪此之謂三無敢問何詩近之曰夙夜其命宥宻無聲之樂也威儀逮逮不可選也無體之禮也凡民有喪匍匐救之無服之喪也君子之服之也猶有五起焉無聲之樂氣志不違無體之禮威儀遲遲無服之喪内恕孔悲無聲之樂氣志既得無體之禮威儀翼翼無服之喪施及四國無聲之樂氣志既從無體之禮上下和同無服之喪以畜萬邦無聲之樂日聞四方無體之禮日就月將無服之喪純徳孔明無聲之樂氣志既起無體之禮施及四海無服之喪施於孫子鄭氏曰詩讀其為基聲之誤也基謀也密靜也言人君夙夜謀為政教以安民則安樂之此非有鐘皷之聲也逮逮安和之貌言君之威儀安和逮逮然則民傚之此非有升降揖遜之禮也救之賙卹之言君於民有喪有以賙卹之則民傚之此非有衰絰之服五起謂君子習讀此詩起此之義其說有五也正義曰此五節從輕漸至於重周子曰禮理也樂和也朱子曰禮隂也樂陽也隂陽理而後和君君臣臣父父子子兄兄弟弟夫夫婦婦萬物各得其理然後和故禮先而樂後此定之以中正仁義而主靜之意程子論敬則自然和樂亦此理也學者不知持敬而務為和樂鮮不流於慢者朱子曰禮樂固必相須然所謂樂者亦不過謂胸中無事而自和樂爾非是著意放開一路而欲其和樂也然欲胸中無事非敬不能故程子曰敬則自然和樂而周子亦以為禮先而樂後此可見也致堂胡氏曰仁者所行皆理故可以為禮所安皆樂故可以為樂此禮樂之本也劉向請興辟雍胡氏論之曰向之論美矣而未循其本也孔子曰人而不仁如禮何人而不仁如樂何不仁之人心非已有視聽舉履皆迷其當而何以為禮樂云云彼庠序之羣處雅頌之聲音揖遜之威儀特其具耳無本而有其具則舉此教人益趨于虚偽之域不若不行之愈也右兼言禮樂智禮易大傳子曰易其至矣乎夫易聖人所以崇徳而廣業也知崇禮卑崇效天卑法地天地設位而易行乎其中矣成性存存道義之門朱子曰窮理則知崇如天而徳崇循理則禮卑如地而業廣知是知處禮是行處知儘要髙行却自近起知崇是智識超邁禮卑是須就切實處行知識髙便是象天行切實便是法地大學所說格物致知是知崇之事所說誠意正心修身是禮卑之事地至卑無物不載所謂徳言盛禮言卑是要極卑故無物事無箇禮雖至微至細底事皆當畏謹惟恐失之這便是禮卑處曲禮曰毋不敬自上東階先左足上西階先右足羮之有菜者用挾無菜者不用挾正謂此也知崇者徳之所以崇禮卑者業之所以廣才有些子不到處這業便是有欠闕便不廣了地雖極卑無有欠闕故廣知識貴乎髙明踐履貴乎著實知既已明須是放低著實做去顏子以能問於不能以多問於寡有若無實若虚犯而不校曽子三省其身惟恐謀之不忠交之不信傳之不習其智之崇如彼而禮之卑如此豈有一毫自滿自是强辯取勝之心乎成性只是一箇渾淪之性存而不失便是道義之門成性與成之者性只些子不同成之者性便從上說來言成這个物成性是說己成底性如成徳成說相似成性如言明徳如堯徳相似成性猶言見成底性這性元自好了但知崇禮卑則成性便存存成性不曽作壊底存謂常在這裏横渠言纎惡必除善斯成性矣其言成性猶言踐形性說不是性是本然已成之性豈待習而後成邪此說與孔子之意不相似右兼言智禮智聖孟子曰伯夷聖之清者也伊尹聖之任者也栁下惠聖之和者也孔子聖之時者也張子曰無所雜者清之極無所異者和之極勉而清非聖人之清勉而和非聖人之和所謂聖者不勉不思而至焉者也孔氏曰任者以天下為己責愚謂孔子仕止乆速各當其可葢兼三子之所以聖者而時出之非如三子之可以一徳名也或疑伊尹出處合乎孔子而不得為聖之時何也程子曰終是有任底意思在孔子之謂集大成集大成也者金聲而玉振之也金聲也者始條理也玉振之也者終條理也始條理者智之事也終條理者聖之事也此言孔子集三聖之事而為一大聖之事猶作樂者集衆音之小成而為一大成也成者樂之一終書所謂簫韶九成是也金鐘屬聲宣也如聲罪致討之聲玉磬也振收也如振河海而不洩之振始始之也終終之也條理猶言脉絡指衆音而言也知者知之所及聖者徳之所就也葢樂有八音金石絲竹匏土革木若獨奏一音則其一音自為始終而為一小成猶三子之所知偏於一而其所就亦偏於一也八音之中金石為重故特為衆音之綱紀又金始振而玉終詘然也故並奏八音則於其未作而先擊鎛鐘以宣其聲俟其既闋而後擊特磬以收其韻宣以始之收以終之二者之間脉絡通貫無所不備則合衆小成而為一大成猶孔子之知無不盡而徳無不全也金聲玉振始終條理疑古樂經之言故倪寛云惟天子建中和之極兼總條貫金聲而玉振之亦此意也智譬則巧也聖譬則力也由射於百步之外也其至爾力也其中非爾力也中去聲此復以射之巧力發明智聖二字之義見孔子巧力俱全而聖智兼備三子則力有餘而巧不足是以一節雖至於聖而知不足以及乎時中也此章言三子之行各極其一偏孔子之道兼全於衆理所以偏者由其蔽於始是以缺於終所以全者由其知之至是以行之盡三子猶春夏秋冬之各一其時孔子則太和元氣之流行於四時也右兼言智聖禮義信樊遲請學稼子曰吾不如老農請學為圃曰吾不如老圃樊遲出子曰小人哉樊須也上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情夫如是則四方之民襁負其子而至矣焉用稼朱子曰禮義信大人之事也情實也敬服用情葢皆以其類而應南軒曰小人云者為其所見者小人之事耳夫上之所好下之所從也上好禮則篤於恭讓故民視之而莫不尊敬焉上好義則動而得宜故民心為之厭服焉上好信則誠意所孚故民亦用其情而無敢欺焉感應之機固不逺也葢好徳者人之公心視遲之欲下從農圃之事以得民者其亦逺矣右兼言禮義信信禮義有子曰信近於義言可復也恭近於禮逺恥辱也因不失其親亦可宗也朱子曰信約信也義者事之宜也復踐言也恭致敬也禮節文也因猶依也宗猶主也言約信而合其宜則言必可踐矣致恭而中其節則能逺恥辱矣所依者不失其可親之人則亦可以宗而主之矣此言人之言行交際皆當謹之於始而慮其所終不然則因仍茍且之間將有不勝其自失之悔矣或問約信而合其宜則言必可踐何也曰人之約信因欲其言之必可踐也然其始也或不度其宜焉則所言將有不可踐者矣以為義有不可而遂不踐則失其信以為信之所在而必踐焉則害於義二者無一可也若約信之始而必求其近於義焉則其言無不可踐而無二者之失矣或曰然則葉公所謂復言非信者何耶曰此特為人之不顧義理輕言而必復者發以開其自新之路耳若信之名則正以其復言而得之也今不察其言不近義之差於前而責其必復其言之失於後顧與信之所以得名者而亂之則是矯枉過其真矣或者乃引之以釋此句以為信不近義則言有不可復者是乃使人不度於義而輕發其言以開誕謾欺偽之萌其弊且將無所不至非聖賢所以垂世立教之㫖也曰為恭而中節則能逺恥辱何也曰致敬於人固欲其逺於恥辱然不合於節文則或過或不及皆所以自取恥辱惟致恭而必求其近於禮焉則其可逺恥辱也必矣或曰先儒又有以為恭而近禮然後君子行之以逺恥辱若非禮之恭則寧身被困辱而不為也其說何如曰此其意善矣然亦非有子之意也有子之意本為謹其言行以防後患於未然之前所謂言必慮其所終行必稽其所敝者也豈使人不戒於初而徐計之於己然之後崎嶇反側如或者之言也哉曰因不失其所親則為可宗何也曰此章前有孝弟謹信而親仁之說厚重忠信而友勝己之說後又有不求安飽敏行謹言而就正有道之說其與此章之意亦相表裏也因猶依也宗猶主也言人欲有所依必度其人之賢而後依之則在我不失其所親而彼亦可以為宗主矣問云云曰須是合下要約時便審令近義要去致敬那人合當拜却長揖則為不及於禮禮數不及人必怒之豈不為辱合當與那人相揖却去拜他便是過於禮禮數過當被人不答豈不可恥所依者不失其可親之人亦可以宗而主之一般人來薦我合下須知得那人如何便當謹所擇若失其可親之人而宗之將來必生出悔吝陳了翁曽受蔡卞之薦後來擺脫不得乃是所因失其所當親者也與人交際當謹之於始若其人下來不可宗主則今日便莫要親他宗主也所宗者可以乆而宗主之如孔子於衛主顏讎由則是可親之人若主癰疽瘠環則是不可親之人愚按因不失其親如擇師友結昏姻之屬皆是右兼言信義禮徳禮易大傳勞謙君子有終吉子曰勞而不伐有功而不徳厚之至也語以其功下人者也徳言盛禮言恭謙也者致恭以存其位者也朱子曰釋謙九三爻義言徳欲其盛禮欲其恭也右兼言徳禮忠信易乾九三子曰君子進徳修業忠信所以進徳也修辭立其誠所以居業也程子曰内積忠信所以進徳也擇言篤志所以居業也朱子曰徳是就心上說業是就事上說忠信是心中真實修辭立其誠是說處真實忠信進徳修辭立誠與敬以直内義以方外分屬乾坤葢取健順之體修辭立誠有剛健主立之體敬義便有靜順之體忠信所以進徳是乾健工夫葢是剛健粹精日進而不自己如活龍然精形氣焰自有不可及者直内方外是坤順工夫葢是固執持守依文按本做將去故以為學者事伊川說内積忠信見得積在此而未見於事之意内積忠信是實心擇言篤志是實事問忠信所以進徳本義云忠信主於心者無一念之不實則是成徳恐非進徳之事曰忠信者無一毫之不實如捕風捉影更無下工處何由進須是表裏皆實無一毫之偽然後有以為進徳之地徳方日新矣問乾之忠信與他書所謂忠信正猶夫子之忠恕與子思所謂違道不逺之忠恕相似曰不然此非有等級也但地頭各别耳正如伊川所謂無妄之謂誠不欺其次也不欺也是誠但是次於無妄耳問易之忠信莫只是實理曰此說實理未得只是實心有實心則進徳自無窮已實心便是學者之關中河内必先有此而後可以有為若無此則若存若亡而已烏能有得進者日新而不已居者一定而不易忠信只是實若無實如何㑹進如播種相似須是實有種子下在地中方㑹日日發生若把个空殻下在裏面如何㑹發生忠信所以為實者且如孝須實是孝方始那孝之徳一日進一日如弟須實是弟方始那弟之徳一日進一日若不實却自無根了如何㑹進立其誠誠依舊是上面忠信居業是常常如此不少間斷徳是得之於身業是見之於事徳則欲日進業要終始不易問修辭也是舉一端曰言者行之表故就言上說忠信心也修辭事也然藴於心者所以見于事修於事者所以養其心此聖人之學所以内外兩進而非判然兩事也或人以修辭名齋其意主於為文朱子告之曰易之文言於乾九三實明學之始終而其所謂忠信所以進徳者欲吾之心實明是理而真好惡之若好好色而惡惡臭也所謂修辭立誠以居業者欲吾之謹夫所發以致其實而尤先於言語之易放而修治之其曰修辭豈作事之謂哉今或者以修辭而名左右之齋吾固未知其所謂然設若盡如本㫖則猶恐此事當在忠信進徳之後而未可以遽及若以為文辭而已則恐其於朝乾夕惕之意又益逺而不相似也曽子曰吾日三省吾身為人謀而不忠乎與朋友交而不信乎傳不習乎朱子曰盡已之謂忠以實之謂信餘見後卷或問程子所謂盡己之謂忠以實之謂信何也曰盡己之心而無隠所謂忠也以其出乎内者而言也以事之實而無違所謂信也以其騐乎外者而言也然未有忠而不信未有信而不出於忠者故又曰發已自盡謂忠循物無違謂信表裏之謂也亦此之謂而加宻焉耳曰程子又謂忠信者以人言之要之則實理何也曰信之為信實有之理也凡性之所謂仁義禮智皆實有而無妄者也所謂實理者是也其見於用則出於心而自盡者謂之忠以其物而無違者謂之信而凡四端之發皆必以是為主焉所謂以人言之者是也葢五行之氣各居一方而王一時惟土無不在故居中央而分王於四季是乃天理之本然而人之所禀以生者莫不象之此人之所以克肖天地而為萬物之靈也忠信一也但發於心而自盡則為忠驗於理而不違則為信忠是信之本信是忠之發忠信只是一事而相為内外始終本末存於己為忠見於物為信發已自盡謂凡出于己者必自竭盡而不使其有茍簡不盡之意循物無違謂信謂言語之發循其物之真實而無所背戾如大則言大小則言小循於物而無所違爾子曰君子不重則不威學則不固見為學章主忠信朱子曰人不忠信則事皆無實為惡則易為善則難故學者必以是為主焉程子曰人道惟在忠信不誠則無物而且出入無時莫知其鄉者人心也若無忠信豈復有物乎無友不如己者過則勿憚改並見後篇游氏曰忠信所以進徳也如甘之受和白之受采故善學者其心以忠信為主不言則已言則必忠信也故其言為徳言不行則已行則必忠信也故其行為徳行止而思動而為無時而不在是焉則安往而非進徳哉故為仁不主於忠信則仁出於姑息為義不主於忠信則義必出於矯抗操是心以往則禮必出於足恭智必出於行險安往而非敗徳哉而何進徳之有焉譬之欲立數仞之墻而浮埃積沫以為基亦沒世不能立矣故主忠信者學者之要言也子張問崇徳辨惑子曰主忠信徙義崇徳也朱子曰主忠信則本立徙義則日新禮記忠信之人可以學禮詳已見前君子有大道必忠信以得之驕㤗以失之詳見後大學篇右兼言忠信善信浩生不害問曰樂正子何人也孟子曰善人也信人也何謂善何謂信曰可欲之謂善朱子曰天下之理其善者必可欲其惡者必可惡其為人也可欲而不可惡則可謂善人矣有諸已之謂信凡所謂善者皆實有之如惡惡臭如好好色是則可謂信人矣張子曰志仁無惡之謂善誠善於身之謂信充實之謂美力行其善至於充滿而積實則美在其中而無待於外矣充實而有光輝之謂大和順積中而英華發外美在其中而暢於四肢發於事業則徳業至盛而不可加矣大而化之之謂聖大而能化使其大者冺然無復可見之迹則不思不勉從容中道而非人力之所能為矣張子曰大可為也化不可為也在熟之而已矣聖而不可知之謂神程子曰聖不可知謂聖之至妙人所不能測非聖人之上又有一等神人也樂正子二之中四之下也葢在善信之間觀其從于子敖則其有諸己者或未實也張子曰顏淵樂正子皆知好仁矣樂正子志仁無惡而不致於學所以但為善人信人而已顏子好學不倦合仁與智具體聖人獨未至聖人之止耳程子曰士之所難者在有諸己而已能有諸己則居之安資之深而美且大可以馴致矣徒知可欲之善而若存若亡焉則能不受變於俗者鮮矣尹氏曰自可欲之善至於聖而不可知之神上下一理擴而充之至于神則不可得而名之矣善人只是一箇渾然好人都是可欲更無些可嫌處問可欲之善曰為君仁為臣敬為父慈為子孝是也有諸己之謂信謂真箇有此善若不有諸己則不可謂之信有諸己韓文公所謂足乎己無待於外之謂徳是也有待於外底如伊川所謂富人多寶貧子借看之喻是也程子曰乾聖人之分也可欲之善屬焉坤賢人之分有諸己之信屬焉一是自然一是做工夫積習而至又曰善信美大聖神是六等人可欲之謂善是說資禀好欲是别人以為可欲有諸己之謂信是說學南軒曰云云人雖本有是善而為氣習所蔽莫之能有惟其存之乆而後能實有之未有之如他人之物有諸己而後為己物也自是而不已焉則進乎充實之地充實者充盛篤實也美者美在其中也美之所積者厚則光輝之所發者充塞而不可揜矣故謂之大然猶有大之可名至於大而化則大不足以名之程子謂未化者所操尺度以量物用之尚未免於有差至於化則己即是尺度尺度即已葢成乎天者也若夫神則是聖人之妙人不可得而測者不疾而速不行而至是也非聖之外復有所謂神也問大而化之之謂聖横渠謂大可為也化不可為也在熟之而已矣此則與易之擬議以成其變化同或說大猶有迹化謂使充實光輝者冺然無形迹之可見竊疑與釋氏銷礙入空之說相似不知如何先生答曰孟子說化字與易之變化不同後說得之然非銷礙入空之謂更分别之自可見矣此章言善信美大聖神凡六等今獨摘善信二字為題者葢善信者美大聖神之本而美大以上皆善信之積故也右兼言善信順信易曰自天祐之吉無不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利也朱子曰釋大有上九爻義右兼言順信西山讀書記卷十
