body:
  text: 西山讀書記卷四十宋真德秀撰鬼神書大禹謨帝曰朕志先定詢謀僉同鬼神其依龜筮協從葉氏曰卜筮以稽疑而曰朕志先定詢謀僉同鬼神其依此所以先天而天弗違也而况于人乎况于鬼神乎按六經之言鬼神始於此其所言最宜深味又益贊於禹曰至誠感神矧兹有苗蘇氏曰以誠感物曰諴伊訓曰古有夏先后方懋厥德罔有天災山川鬼神亦莫不寧又太甲曰先王顧諟天之明命以承上下神祗又申誥于王曰鬼神無常享享于克誠金縢既克商二年王有疾弗豫二公曰我其為王穆卜周公曰未可以戚我先王公乃自以為功為三壇同墠為壇于南方北面周公立焉植璧秉圭乃告太王王季文王蘇氏曰二公欲卜于廟周公曰未可以憂我先王周公欲自以身禱之故以此言拒二公也或問周公之金滕不有命乎程子曰周公誠心欲代其兄豈問命耶又曰至誠可以感造化吕氏曰周公之卜但自為其禮二公之卜乃動朝廷耳何也如王與大夫盡辨之類先王之心豈不戚哉蔡氏曰周公卻二公之卜而乃自以為功者蓋二公不過卜武王之安否爾而周公愛兄之切危國之至忠誠懇懇於祖父之前如下文所云者有不得盡焉此其所以自以為功也又二公穆卜則必禱於宗廟用朝廷之禮如此則上下喧騰而人心搖動故周公不於宗廟而特為壇墠以自禱也史乃册祝曰惟爾元孫某遘厲虐疾若爾三王是有丕子之責于天以旦代某之身豫仁若考能多材多藝能事鬼神乃元孫不若旦多材多藝不能事鬼神乃命于帝庭敷佑四方用能定爾子孫于下地四方之民罔不祇畏嗚呼無墜天之降寶命我先王亦永有依歸朱子曰若爾三王有丕子之責于天以旦代某之身此一段先儒都解錯了只有朝以道説得好他解丕子之責如史傳中責其侍子之責蓋云上帝責三王之侍子侍子指武王也上帝責其來服事左右故周公乞代其死云以旦代某之身豫仁若考能多材多藝能事鬼神乃元孫不若旦多材多藝不能事鬼神用能定爾子孫于下地四方之民罔不祇畏言三王若有侍子之責于天則不如以我代之我多材多藝能事上帝武王不若我多材多藝不能事鬼神不如且留他在世上定爾之子孫與四方之民文意如此伊川却疑周公不應自説多材多藝不是如此他只是要代武王之死爾今我即命于元龜爾其許我我其以璧與圭歸俟爾命爾不許我我乃屏璧與圭乃卜三龜一習吉啓籥見書乃并是吉公曰體王其罔害豫小子新命于三王惟永終是圖兹攸俟能念豫一人孔氏曰習因也以三王之龜卜一相因而吉三兆既同吉開籥見占兆書乃亦并是吉公視兆曰如此體兆王其無􅊣言必愈矣唐孔氏曰周禮太卜三兆之下云其經兆之體皆百有二十其頌皆千有二百占兆之書則彼頌是也周禮占人凡卜筮君占體大夫占色史占墨卜人占拆鄭氏以周公曰體為證謂尊者視兆象而已卑者以次詳其餘但周公汲汲欲王之愈必當親視灼龜省繇不惟占體而已張氏曰周公為武王故占體非僣也體與詩體無咎言之體同吕氏曰古者敬神凡卜筮之物皆不敢褻既畢則藏之非周公特留為後來自解之計也蔡氏曰言王疾其無所􅊣我新受三王之命而永終是圖矣兹攸俟者即上文所謂歸俟一人武王也言三王能念我武王使之安也吕刑乃命重黎絶地天通罔有降格唐孔氏曰楚語昭王問於觀射父曰周書所謂重黎實使天地不通何也若無我民將登天乎對曰非此之謂也古者民神不雜少昊氏之衰也九黎亂德家為巫史民神同位禍災荐臻顓帝受之乃使南正重司天以屬神北正黎司地以屬民使復其舊無侵瀆是謂絶地天通其後三苗復九黎之德堯復育重黎之後不忘舊者使復典之堯典云乃命羲和即所謂育重黎之後也故知重即羲黎即和楚語司天屬神司地屬民令神與天在上民與地在下定上下之分使民神不雜則祭享有度災厲不生蘇氏曰虢之亡也有神降于莘即此類劉氏曰人者天地之心也人道治則天地適其位清濁安其常隂陽辨其序人道不治則上下交亂矣其名雖不變其變雖不雜其氣雖不改然其政擾矣故古之治天下者必有神明之官以序天地凡親上者本乎天者也親下者本乎地者也是以神之事皆屬天民之事皆屬地毋以民亂神毋以神惑民則天地之道得矣天子祭天諸侯祭土卿大夫祭五祀士祭其先天子七廟諸侯五廟大夫三士二天子有禘有祫有享有薦諸侯祫而不禘卿大夫享而不祫庶人薦而不享故貴賤有禮上下有等而不相逾今庶人而得祭天地與山川祀非其鬼男不耕女不蠶而相隨以事神為俗無父子之親無君臣之節下者乃為巫祝略計天下常百萬人可謂治民乎楊氏曰分北三苗在舜時皇帝乃舜也張氏曰傳曰國將興聽于民將亡聽于神三苗之俗以詛盟為事是聽命於神也姦人將假此以作亂如漢末張角謀反一日同起兵三十六萬號為黃巾此假鬼神以惑衆者也吕氏曰上之人以公平為政則善惡分明善者得福惡者得禍苗民不問罪否故民歸之神怪妖誕之中或訴之天或詛之鬼故有非其鬼而祭者是以命重黎分别幽顯天子祭天地諸侯祭方嶽庶人則祭祖考而已大抵治世神怪所以不興者只為善惡分明自然不求之神至於亂世反是周禮大宗伯之職掌建邦之天神人鬼地示之禮以佐王建保邦國注疏曰天氣常伸謂之神地道常默以示人謂之祗周禮以祗作示字蓋天垂象所以曰天神地成形所以曰地示又問三者之異曰氣之清明者為神如日月星辰之類是也此變化不可測祗本示字以有迹之可觀山河草木是也比天象又益著至人則死為鬼矣後魏冦謙之奏作靜輪宫必令其髙不聞雞犬聲上接天神崔浩勸魏主從之胡氏論之曰夫天之為天非若地之有形也自地而上無非天者昔人以積氣名其象以倚蓋名其形皆非知天者也莊周氏曰天之蒼蒼其正色耶言天無色也無色則無形無聲無臭皆舉矣日月星辰之繫乎天皆氣機自運莫使之然而自然者無所託也若其有託則是以形相屬一麗乎形能不壞乎子貢曰天不可階而升謂無形也仲尼之言天地山川也皆以自微至著明之地則始於撮土山則始於拳石水則始於一勺是皆可見之物也惟天曰天斯昭昭之多夫昭昭果何物哉及其無窮也日月星辰繫焉萬物覆焉而不離於昭昭之多昔人言天未有親切顯白如仲尼者非窮理不足以知天非盡性不足以事天天果逺乎哉故自賦豫而言則曰天命自稟受而言則曰天性自無息而言則曰天道自不忒而言則曰天理自主宰而言則曰天心自遍覆而言則曰天體自法度而言則曰天文自可推而言則曰天數自甚美而言則曰天休自可法而言則曰天則自應感而言則曰天變自不可犯而言則曰天威天豈逺乎哉故號呼雖不同惟窮理盡性則知其非二物也故詩書易春秋語孟之言皆無天神之目惟牧野誓師告皇天后土名山大川曰惟爾有神則神不専主乎天矣至周禮乃有所謂天神者此漢儒駁雜之言也夫人死曰鬼以鬼享者其平生貌象聲色性情嗜好其子孫所嘗見而可想也天神地示豈有貌象聲色性情嗜好之可想乎昧者不知天於是以事人鬼之心而億度之浸淫於黃老浮屠氏虛荒誕幻之説謂天之上又有天焉其多至於三十有三而宫室侍衛衣服皆擬諸人主所用而加以宏濶勝麗之致於是人主之侈肆迷謬者謂已玄聖與天神接或聆其語言或覩其儀觀或受其詔告符契則又大興土木崇飾棟宇偶而事之周遍四海謂以神道設教而愚黔首莫不因方士簧鼓譸張侈其心意而至此也夫子而不知父不足以為子帝王繼天而為之子可以不知天乎知天然後能繼天而居其位故成湯數夏桀之罪曰矯誣上天以布命于下天子而矯命猶人臣而矯詔也可乎哉後魏不恤民力因東山之髙又崇臺萬仞焉天也者方髙方逺無所至極而其神終不得而見也冦謙之無足云者崔浩自謂智如子房而稽古過之其所聽信而敬從者乃爾豈不貽笑後世也哉按胡氏之論大概得之然周禮天神地示之名皆以理言未可訾其非也張子説見後春秋傳莊三十二年秋七月有神降于莘惠王問諸內史過曰是何故也對曰國之將興明神降之監其德也將亡神又降之觀其惡也故有得神以興亦有以亡虞夏商周皆有之王曰若之何對曰以其物享焉其至之日亦其物也杜氏曰享祭也若以甲乙日至祭先脾玉用蒼服上青以此類祭之王從之內史過往聞虢請命反曰虢必亡矣虐而聽於神神居莘六月虢公使祝應宗區史嚚享焉神賜之土田祝太祝宗宗人史太史應區嚚皆名史嚚曰虢其亡乎吾聞之國將興聽于民將亡聽于神神聰明正直而一者也依人而行惟德是與虢多涼德其何土之能得鄭人相驚以伯有曰伯有至矣則皆走不知所往鑄刑書之嵗二月或夢伯有介而行曰壬子余將殺帶也明年壬寅余又將殺段也及壬子駟帶卒國人益懼齊燕平之月壬寅公孫段卒國人愈懼其明日子産立公孫及良止以撫之乃止泄子孔之子襄十九年鄭殺子孔良止伯有子也立以為大夫使有宗廟子太叔問其故子産曰鬼有所歸乃不為厲吾為之歸也及子産適晉趙景子問焉曰伯有猶能為鬼乎子産曰能人生始化為魄既生魄陽曰魂用物多則魂魄強是以有精爽至於神明匹夫匹婦強死其魂魄猶能馮依于人以為淫厲况良霄我先君穆公之胄子良之孫子耳之子敝邑之卿從政三世矣鄭雖無腆抑諺曰蕞爾國而三世執其政柄其用物也𢎞矣其取精也多矣其族又大所馮厚矣而強死能為鬼不亦宜乎程子曰伯有為厲事别是一理朱子曰謂非死生之常理也又曰左傳説魄先魂而有蓋以付形之初言之必先有此體象方有陽氣來附他又曰伊川云云蓋其人氣未當盡而強死自是能為厲子産為之立後便有所歸遂不為厲亦可謂知鬼神之情狀矣又曰子産此語窮理煞精又問伊川云云亦自有這般底然亦是不得其死故氣未散久之亦不能不散如漳州近年有婦人殺夫密埋之後為祟事才發覺當時便不為祟心之精爽是謂魂魄見前心篇易大傳原始反終故知死生之説精氣為物遊魂為變是故知鬼神之情狀程子曰世言鬼神之事雖知其無然不能無疑懼何也曰此只是自疑耳曰如何可以曉悟其理曰理會得精氣為物遊魂為變與原始要終之説便能知也須是於原字上用工夫或曰遊魂為變是變化之變否曰既是變則存者亡堅者腐更無物也鬼神之道只恁説與賢雖會得亦信不過須是自得也又問易言知鬼神情狀果有情狀否曰有之又曰既有情狀必有鬼神矣曰易説鬼神便是造化朱子曰原者推之於前反者要之於後隂精陽氣聚而成物神之伸也魂遊魄降散而為變鬼之歸也問鬼神生死曰精氣為物遊魂為變便是生死底道理未達先生曰精氣凝則為神散則為鬼又問精氣凝時此理便在氣上否曰天理流行發育萬物雖是一齊都有畢竟是理為主然氣則有清濁清者為氣濁者為質清者屬陽濁者屬隂知覺運動陽之為也骨肉毛血隂之為也氣曰魂體曰魄又曰精氣為物是合精與氣而成物氣魂而精魄也變則是魂魄相離雖獨説遊魂而不言魄而離魄之意自可見矣問云云曰此是一箇合一箇離精氣合則魂魄凝結而為物離則陽已散而隂無所歸故為變精隂也氣陽也問尹子解遊魂一句為鬼神如何曰此只是聚散聚而為物者神也散而為變者鬼也鬼神便有隂陽之分橫渠説精氣自無而有遊魂自有而無其説亦分曉然精屬隂氣屬陽又自有錯綜底道理因言魂魄鬼神之説曰只今生人便自一半是神一半是鬼但未死以前則神為主已死之後則鬼為主蔡氏曰鬼神者二氣之良能不可得而測也以其聚而為物觀之則神之情狀可知以其遊而為變者觀之則鬼之情狀可知愚按世俗於始終聚散之理及佛氏輪回之説類有疑焉今以諸老先生言論附於此程子曰屈伸往來只是理不必將既屈之氣復為方伸之氣又謂天地間如大洪爐何物銷鑠不盡此於聚散之常理既盡之矣然其散也有緩有速故致堂胡氏曰爝火一噓即滅慧火經風乃滅咸陽宫殿火三月乃滅即其比也此於子産論伯有相符而朱子謂人死終歸於散然亦未便散盡故祭祀有感格之理然已散者不可復聚釋氏却謂人為鬼鬼復為人人如此則天地間常只是許多人來來去去更不由造化生生必無是理也又曰氣久必散人説神仙一代説一項漢世説安期生其後不復説唐以來説鍾吕今又不復説看得來他亦只是養得分外夀考終久亦不能不散問禮記魂氣歸於天與橫渠形潰反原之説如何曰魂氣歸於天是消散了正如火煙騰上有散而已論理是大槩如此然亦有死而未遽散者亦有寃恨而未散者然亦不皆如此問下武詩三后在天先生傳云在天言其既沒而其精神上合於天是如何曰便是又有此理問恐只是此理上合於天耳曰既有此理便有此氣或曰聖人稟得清明純粹之氣又能全而不失故其沒也其氣上合於天曰也是如此這又微妙難説要人自看得世間道理有正當易見者又有變化無常不可窺測者如此看方活合數説而觀之則聚散之理其概可推矣又鮑若雨問佛氏輪回之説凡為善者死則復生為善人為惡者死則變為禽獸之類竊恐有此理何則凡稟沖氣以生者未始不同聖人先得人之所同者而踐履之故能保合太和至死其氣冥會於中和之所造化之中自然有復生為人之理惡者平居作惡而沖氣已喪至死其氣則會於謬戾之所造化之中自然有為禽獸之理故曰恐有此理也程子答曰未知生焉知死知生則知死矣知原始則能要終矣而胡氏於隋皇秦主不願復生帝王家其辨論甚詳大略謂佛之言曰衆生各因淫欲而正性命使世人皆離此以證無生其不能然則愛為根本死於此生於彼或人而為畜畜而為人輪轉相續無有窮已故人貴修行精練不殺禽獸免於報身隨念之善即生樂處欲驗其不然者請有以質之羽毛鱗介與夫喘耎肖翹之物在天地間抑有定數乎抑無定數乎若無定數則安知人死為畜畜死為人也若有定數則自古及今人與禽獸相為死生不過此數以大較論之人殺禽獸不可為少矣禽獸能殺人者無幾矣是當禽獸日加多充滿於宇內人日加少遂至於無人然後以報復之事信矣而有不然者太平之際人得其食海內之戶以千萬計於時動物亦不可勝用上下給足若禽獸為人則禽獸宜凋耗而反加繁多喪亂之後人失其養或至千里人煙稀絶於時庶類亦不能獨茂求之難考若人為禽獸則禽獸宜繁多而反以凋耗此以目覩實事而質之者一也人之寐也氣不離形識知固在也而不能於寐之中自知其寐也其將寐也雖大聖人亦不能卓然知寐與寤之分際也死之異於寐也以方寤之時或呼之或觸之瞿然而覺也死則不能矣呼之觸之瞿然而覺然其寐之熟也則晦昧冥漠與死者無異又况於氣既離形如光之脫火知識泯滅不可復陽乃曰吾有一念由吾所積皎皎然隨善惡所感而有所如此哉此又以聚散實理而質之者二也假使由是以思之則輪轉之有無亦可識矣或曰自賈誼明以迹言人死為物非始於釋氏也亦不足信乎曰賈生所言亦由莊子論臭腐神竒之云言人死則與朽壞之類等耳而朱子則曰死則氣散泯然無迹是其常也有託生者是偶然聚得不散又去湊著那生氣亦能再生然非其常也問人死為禽獸恐無此理然嘗見永春人家生一子耳上有豬毛豬皮者何也曰此不足怪但是稟得豬氣耳此又輪回之辨也學者其致思焉神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火説萬物者莫説乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也朱子曰神者妙萬物而言者也盈天地之間皆神又曰神是理之發用而隨氣以出入者故易曰云云若將神字全作氣看則誤矣論語子曰非其鬼而祭之諂也朱子曰非其鬼謂非其所當祭之鬼諂求媚也南軒曰祀典自天子至於庶人各有其分而不可踰蓋天理也有是理則有鬼神若於非所當祭而祭焉既無其理何享之有原其心之所萌不過為諂而已祭如在祭神如神在程子曰祭祭先祖也祭神祭外神也祭先主於孝祭神主於敬范氏曰有其誠則有其神無其誠則無其神子不語怪力亂神朱子曰怪異勇力悖亂之事非理之正固聖人所不語鬼神造化之迹雖非不正然非窮理之至有未易明者故亦不輕以語人也謝氏曰聖人語常而不語怪語德而不語力語治而不語亂語人而不語神南軒曰聖人一語一默之間莫不有教存焉語怪則亂常語力則妨德語亂則害治語神則惑聽故聖人之言未嘗及此雖然就是四者之中鬼神之情狀亦豈不言之乎特明其理使人求之於心若其事則常言之也子疾病子路請禱子曰有諸子路對曰有之誄曰禱爾於上下神祗子曰丘之禱久矣朱子曰上下謂天地天曰神地曰祗禱者悔過遷善以祈神之佑也無其理則不必禱既曰有之則聖人未嘗有過無善可遷其素行固已合於神明故曰丘之禱久矣或問行禱五祀著於禮經今子路請之而夫子不從何也曰以理言之則聖人之言盡矣以事言之則禱者臣子至情迫切之所為而非病者之所與聞也病而與聞乎禱則是不安其死而諂於鬼神以茍須臾之生君子豈為是哉曰然則聖人之言乃不及此而直以為無事於禱何也曰是蓋有難言者然以理言則既兼舉之矣蓋祈禱卜筮之屬皆聖人之所作至於夫子而後教人一決諸理而不屑屑於冥漠不可知之間其所以建立人極之功於是為備觀諸易之十翼可以見矣外此則胡氏之説得之胡氏曰禱雖為禮非正禮也而忠臣孝子一至之情有不可廢者故聖人之立制猶盟詛之類爾然君子不自為也唯君父則可而又必於其病焉若非其鬼則是淫祀而已又安取福乎子路所謂上下神祗者殆非大夫之所得禱也以此推之後世祀典之失又豈可勝言哉又曰上下神祗與人一理夫子道參天地誠洞幽顯仰無所愧俯無所怍豈疾病而後禱哉季路問事鬼神子曰未能事人焉能事鬼敢問死曰未知生焉知死朱子曰問事鬼神蓋求所以奉祭祀之意而死者人所必有不可不知皆切問也然非誠敬足以事人則必不能事神非原始而知所以生則必不能反終而知所以死蓋幽明始終初無二理但學之有序不可躐等故夫子告之如此程子曰晝夜者死生之道也知生之道則知死之道盡事人之道則盡事鬼之道死生人鬼一而二二而一者也或言夫子不告子路不知此乃所以深告之也朱子又曰事君親盡誠敬之心即移此心以事鬼神則祭如在祭神如神在人受天所賦自然完具無欠闕須是得這道理無欠闕到那死時乃是生理已盡亦安於死而無愧又曰事人事鬼以心言知生知死以理言又曰事人須是誠敬事鬼亦要如此事人如出則事公卿入則事父兄事其所當事者事鬼亦然茍非其鬼而事之則諂矣問云云曰若曰氣聚則生氣散則死才説破人便都理會得然須知道人生有多少道理自稟五常之性以來所以父子有親君臣有義須要一一盡得這生底道理則死底道理皆可知矣張子所謂存吾順事沒吾寧也又曰鬼神事自是難理會底且就日用緊切處做工夫少間自有見處樊遲問知子曰務民之義敬鬼神而逺之可謂知矣朱子曰専用力於人道之所宜而不惑於鬼神之不可知知者之事也程子曰人多信鬼神惑也而不信者又不能敬能敬能逺可謂知矣或問鬼神者非祀典之正耶則聖人使人敬之何耶以為祀典之正耶則又使人逺之何也曰聖人所謂鬼神無不正也逺者以其處幽故嚴之而不瀆爾若其非正則聖人豈復謂之鬼神哉在上則明禮以正之在下則守義以絶之固不使人敬而逺之亦不使人褻而慢之也問敬鬼神而逺之如天地山川之神與夫祖先此固當敬至如世間一種泛然鬼神亦當敬否曰所謂敬鬼神是敬正當底鬼神敬而逺之是不可褻瀆不可媚如卜筮用龜此亦不免如臧文仲山節藻梲以藏之便是媚便是不知記禮運夫禮必本於太一分而為天地轉而為隂陽變而為四時列而為鬼神正義曰鬼神謂生成萬物之鬼神也四時變化生成萬物皆鬼神之功餘見前禮篇樂記明則有禮樂幽則有鬼神鄭氏曰助天地成物者也五帝德説黃帝曰死而足畏其神百年春秋傳曰若敖氏之鬼然則聖人之精氣謂之神賢知之精氣謂之鬼正義曰易上繫辭云精氣為物遊魂為變注云精氣謂七八遊魂謂九六遊魂謂之鬼物終所歸精氣謂之神物生所信也言木火之神生物東南金水之鬼終物西北又云繫辭鬼神謂七八九六自然之鬼神又聖人賢人鬼神與自然之鬼神俱能助天地而成物故鄭氏援引之也程子曰鬼神只是一箇造化天尊地卑乾坤定矣鼓之以雷霆潤之以風雨是也問漢時如鄭康成注二禮但云鬼神是氣至佛入中國人鬼始亂朱子曰然人皆鬼神之會已見性命篇中庸子曰鬼神之為德其盛矣乎程子曰鬼神二氣之良能也朱子曰以二氣言則鬼者隂之靈神者陽之靈也以一氣言則至而伸者為神反而歸者為鬼其實一物而已為德猶言性情功效以二氣言則隂為鬼陽為神以一氣言則方伸之氣亦有伸有屈其方伸者神之神其既屈者神之鬼既屈之氣亦有屈有伸其屈者鬼之鬼其來格者鬼之神天地人物皆然不離此氣之往來屈伸合散而已視之而弗見聽之而弗聞體物而不可遺鬼神無形與聲然物之終始莫非隂陽合散之所為是其為物之體而物所不能遺也其言體物猶易所謂幹事使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右齊之為言齊也所以齊不齊而致其齊也明猶潔也洋洋流動充滿之意能使人畏敬奉承而發見昭著如此乃其體物而不可遺之驗也孔子曰其氣發揚於上為昭明焄蒿悽愴此百物之精也神之著也正謂此爾詩曰神之格思不可度思矧可射思詩大雅抑之篇格來也矧况也射厭也言厭怠而不敬也思語辭夫微之顯誠之不可掩如此夫誠者真實無妄之謂隂陽合散無非實者故其發見之不可掩如此或問鬼神之説其詳奈何曰鬼神之義孔子所以告宰豫者見於祭義之篇其説已詳而鄭氏釋之亦已明矣其以口鼻之噓呼者為魂耳目之精明者為魄蓋指血氣之類以明之程子張子更以隂陽造化為説則其意又廣而天地萬物之屈伸往來皆在其中矣蓋陽魂為神隂魄為鬼是以其在人也隂陽合則魄凝魂聚而有生隂陽判則魂升為神魄降為鬼而死矣易大傳所謂精氣為物遊魂為變故知鬼神之情狀者正以明此而書所謂殂落者亦以其升降為言耳若又以其往來者言之則來者方伸而為神往者既屈而為鬼蓋二氣之分實一氣之運故陽主伸隂主屈而錯綜以言亦各得其義焉學者熟玩而精察之如謝氏所謂做題目入思議者則庶乎有以識之矣曰子之以幹事明體物何也曰天下之物莫非鬼神之所為也故鬼神為物之體而物無不待是而有者然曰為物之體則物先乎氣必曰體物然後見其氣先乎物而言順耳幹猶木之有幹必先有此而後枝葉有所附而生焉貞之幹事亦猶是也問體物而不可遺是有此物便有鬼神凡天下萬物萬事皆不能外夫鬼神否曰不是有此物便有此鬼神乃是有此鬼神方有此物及至有此物又不能違夫鬼神也體物而不可遺用拽轉看將鬼神做主將物做賓方看得出是鬼神去體那物鬼神却是主也前輩以體察之體言者非問中庸初説體物云云只是就隂陽上説末後又却以祭祀言之是如何曰此是就其親切著見者言之也若不如此説人必將風雷山澤做一般鬼神看將廟中祭享者又做一般鬼神看故即其親切著見者言之欲人會之為一也問章句云性情功效性情乃鬼神之情狀不審所謂功效者何謂曰能使天下之人齊明盛服以承祭祀便是功效又曰二氣之分即一氣之運所謂一動一靜互為其根分隂分陽兩儀立焉者也在人者以分言之則精為隂而氣為陽故魄為鬼而魂為神以運言之則消為隂而息為陽故伸為神而歸為鬼然魂性動故當其伸時非無魄也而必以魂為主魄性靜故方其歸也非無魂也而必以魄為主則亦初無二理矣問或問中取鄭氏説云口鼻之噓吸者為魂耳目之精明者為魄先生謂此蓋指血氣之類以明之口鼻噓吸以氣言耳目之精明以血言目之精明固可以血言耳之精明何故亦以血言自醫家以耳屬腎精氣盛則聽聰精氣耗則耳瞶矣問祭天地山川而用牲幣酒醴者只是表吾心之誠耶抑其有氣來格也曰若道無神來享時自家祭甚底肅然在上令人奉承敬畏是甚物若謂其有雲車風馬擁從而來則又誕矣祭義宰我曰吾聞鬼神之名不知其所謂子曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也鄭氏曰氣謂噓吸出入者也耳目之聰明為魄合鬼神而祭之聖人之教致之也正義曰氣也者神之盛也者言神是人生存之氣氣者是人之盛極也魄也者鬼之盛也者言人之形魄者鬼之盛極也合鬼與神教之至也者言人死神上於天鬼降於地聖王合此鬼神以祭之是聖王設教致其如此也疏曰氣謂噓吸出入也者謂氣在口噓吸出入此氣之體無性識也但性識依氣而生有氣則有識無氣則無識則識從氣生耳目之聰明為魄者魄體也若無耳目形體不得為聰明合鬼神而祭之聖人之教致之者人之死其神與形體分散各别聖人以生存之時神形和合今雖身死聚合鬼神似若生人而祭之是聖人設教興致之令其如此愚按教之至也蓋謂聖人制此禮使為子孫者知祖考雖死其魂與魄猶可合一盡其精誠以求之有感格之理其所以教人也至矣不必以全為致也衆生必死死必歸土此之謂鬼骨肉斃于下隂為野土隂讀為蔭言人之骨肉蔭于地下為土壤其氣發揚于上為昭明焄蒿悽愴此百物之精也神之著也焄謂香臭也蒿謂氣蒸出貌上言衆生必言百物明其與人同也不如人貴耳正義曰此釋人氣為神言人生時形體與氣合共為生其死則形與氣分其氣之精魂發揚升於上為神靈光明也焄蒿悽愴者言百物之氣或香或臭蒸而上出其氣蒿然也悽愴者謂精神竦然使人聞之情有悽有愴也百物之精也者人氣揚於上神靈光明人之精氣為焄蒿悽愴却與百物同但情識為多故特謂之神神之著也者發揚昭明是人神之顯著因物之精制為之極明命鬼神以為黔首則百衆以畏萬民以服明命猶尊名也尊極於鬼神不可復加也黔首謂民也為民作法使民亦事其祖禰鬼神民所畏也正義曰因物之精制為之極者言聖人因人與物死之精靈造為尊極之稱明命鬼神以為黔首則者明猶尊也命猶名也黔首謂萬民也則法也尊名人及萬物之精謂之鬼神以為萬民法則也百衆以畏萬民以服者百衆謂百官衆庶萬民謂天下衆民既尊之以鬼神下皆畏敬之故云云也疏曰鬼神者是人物之魂魄若直名魂魄其名不尊故尊而名之為鬼神益加敬畏之也所以名鬼神為極者言物中尊極莫過鬼神言以外他名不可復加也此經鬼神本民神故下文築為宫室設為宗祧其實此鬼神亦兼山川五祀百物之屬故禮運云列于鬼神注云謂祖廟山川五祀之屬樂記云幽則有鬼神注云助天地成物者是百物之魄謂之鬼對則精靈為魂形體為魄故昭七年左傳云人生始化為鬼既生魄陽曰魂是形為魄氣為魂若散而言之魄亦性識識與魄無異故昭二十五年左傳曰心之精爽是謂魂魄又襄二十九年左傳云天奪伯有魄又對而言之天曰神地曰祗人曰鬼散而言之通曰鬼神聖人以是為未足也築為宫室設為宗祧以别親疏逺邇教民反古復始不忘其所由生也衆之服自此故聽且速也正義曰古謂先祖追而祭之是反古也始謂初始父母始生己今追祭祀是復始也二端既立報以二禮建設朝事燔燎羶薌覸以蕭光以報氣也此教衆反始也薦黍稷羞肝肺首心覸以俠甒加以鬱鬯以報魄也教民相愛上下用情禮之至也二端氣魄謂其盛也更有尊名云鬼神也二禮謂朝踐饋熟之禮也朝事謂薦羶腥時也薦黍稷所謂饋食也羶當為馨燔燎馨香覸以蕭光取牲祭脂也光猶氣也有虞氏祭首夏后氏祭心殷祭肝周祭肺覸以俠甒謂雜以兩甒醴酒也相愛用情謂此以人道祭之也報氣以氣報魄以實各有其類正義曰報以二禮者謂報此氣魄以二種祭禮報氣謂朝踐之節也報魄謂饋熟之節也建設朝事燔燎羶薌覸以蕭光以報氣也者此明朝踐報氣之義也朝事謂早朝祭事燔燎謂取膟膋燎於爐炭羶謂馨香覸以蕭光覵雜也光謂氣也謂燔膟膋兼爇蕭蒿是雜以蕭氣此等三祭是以報氣也薦黍稷者謂饋熟時薦此黍稷羞肝肺首心者羞進也謂薦黍稷時進肝與肺首與心殷祭以肝周祭以肺有虞氏以首夏后氏以心皆謂薦此黍稷之時兼此物祭也覵以俠甒者俠甒謂祭黍稷之時雜以兩甒醴酒加以鬱鬯者言非但薦熟是報魄言祭初所加鬱鬯亦是報魄也以魄在地下鬱鬯灌地雖是祭初亦是報魄不當薦熟之時故云加也以報魄也者薦黍以下皆是報祭形魄之氣教民相愛上下用情者言此饋熟之時皆以飲食實味遍於燕飲是教民相愛上以恩賜逮下下受上恩賜故上下用情禮之至也至謂至極也謂報氣報魄二禮備足禮之至極也首本也報氣以氣者以氣是虛還以馨香虛氣報之報魄以實者以魄是實還以黍稷實物報之各本其事類也君子反古復始不忘其所由生也是以致其敬發其情竭力從事以報其親不敢弗盡也從事謂修薦可以祭者也按郊特牲曰周人尚臭灌用鬯臭鬱合鬯臭隂達於淵泉灌以圭璋用玉氣也既灌然後迎牲致隂氣也蕭合黍稷臭陽達於牆屋故既奠然後炳蕭合羶薌凡祭慎諸此魂氣歸於天形魄歸於地故祭求諸隂陽之義也殷人先求諸陽周人先求諸隂又曰祭黍稷加財祭齊加明水報隂也取膟膋燔燎升首報陽也正義曰灌用鬯臭者臭謂鬯氣也未殺牲先酌鬯酒灌地以求神是尚臭也鬱合鬯者鬱鬱金草也鬯謂鬯酒煮鬱金草和之其氣芬芳調鬯也臭隂達於淵泉者用鬱鬯灌地是用臭氣求隂達於淵泉也灌以圭璋用玉氣也者以圭璋為瓚之柄也瓚所以㪺鬯也既灌然後迎牲者先求神後迎牲也致隂氣也者解所以先灌是求諸隂也先致氣於隂故云致隂氣也蕭合黍稷者周人後求陽也取蕭草及牲脂膋合黍稷燔之也此謂饋食時也臭陽達于牆屋者謂以蕭合黍稷之臭氣求陽達於牆屋也故既奠然後􅌊蕭合羶薌者明上􅌊蕭之時節也既奠謂薦熟時也於薦熟時祝先酌酒奠於鉶羮之南訖尸未入於是又取香蒿染以腸間脂合黍稷燒之於宫中此又求諸陽之義也又禮運曰以嘉魂魄是謂合莫鄭氏曰莫虛無也亦合鬼與神之義故附此問祭義云云朱子曰神氣屬陽故謂之人精魄屬隂故謂之鬼然方其生也隂之理已附其中矣又曰昭明焄蒿悽愴此百物之精也神之著也如鬼神之露光處是昭明其氣蒸上處是焄蒿使人精神悚動處是悽愴如武帝致李夫人其風肅然是也問草木土石有魄而無魂否曰精氣為物若以精氣言則是有精氣方有魂魄草木土石不可以魂魄論但出底氣便是魂精便是魄譬如燒香煙便是魂漿便是魄魂者魄之光焰魄者魂之根蒂又問體魄有分别如耳目是體聰眀是魄曰然魂者氣之神魄者體之神淮南子注謂魂陽神也魄隂神也此説好又問人生始化日魄如何是始化曰是胎中初略成形時又曰夫子答宰我鬼神説處甚好人死時魂氣歸於天魄氣歸於地所以古人祭祀燎以求諸陽灌以求諸隂問其氣發揚於上云云曰人氣本上騰這下面盡則只管騰上去如火之煙薪盡則煙騰問終久必消了曰然又曰鬼神不過隂陽消長而已亭毒化育風雨晦明皆是在人則精是魄氣是魂精氣聚而為物而無鬼神又曰先儒言口臭之噓吸為魂耳目之聰眀為魄也只説得大概更有個母子這便是坎離水火暖氣便是魂冷氣便是魄魂便是氣之神魄便是精之神會思量計度底是魂會記當底是魄又曰見於目而眀耳而聰者是魄之用老氏曰載營魄營是晶熒之義魄是一個晶光堅凝之物釋氏云地水火風其説曰人之死也風火先散則不能為祟蓋魂先散而魄尚存只是消磨未盡少間自塌了若地水先散而風火尚遲則能為祟蓋魂氣尚存爾又曰無魂則魄不能以自存今人多思慮役役魂都與魄相離了老氏便只要守得相合所謂致虛極守靜篤全然守在這處不得動又曰魂散則魄便自沈今人説虎死則眼光落地便是如此又曰萇𢎞死三年而化為碧此所謂魄也如虎威之類𢎞以忠死故其氣凝結如此又曰髙氏注淮南子曰魂是陽之神魄是隂之神所謂神者以其上乎形氣也人所以生精氣聚也人只稟得許多氣須有盡時醫家所謂不升降是也人病將死熱氣上出所謂魂升下氣漸冷所謂魄降也問聖人凡言鬼神皆只是以理之屈伸者言鬼者屈也神者伸也屈者往也伸者來也屈伸往來之謂也至言鬼神禍福吉凶等事亦只是以理言蓋人與鬼神天地同此理無有不善人能順理則吉逆理則凶其於禍福亦然此豈謂天地鬼神一一下降於人哉如書稱天道福善禍淫易言鬼神害盈福謙亦只是這意思蓋盈者逆理者也自當時得害謙者順理者也自應獲福自是道理合如此安有所謂鬼神降之哉然嘗讀祭義有曰氣曰精曰昭明又似有物何也曰如子所論是無鬼神也鬼神固是以理言然亦不可謂無氣所以先王祭祀或以燔燎或以鬱鬯以其有氣故以氣求至如禍福吉凶之事則子言是也問氣魄曰魄屬鬼氣屬神析木煙出是氣漸潤底是魄人之語言動作是氣屬神精血是魄屬鬼發用底皆屬神是氣定底皆屬隂是魄知識底是神記事底是魄人初生時氣多魄少後來魄漸盛既老魄又少所以耳聾目昏精力不強記事不定山林川谷丘陵能出雲為風雨見怪物皆曰神有天下者祭百神諸侯在其地則祭之亡其地則不祭正義曰風雨雲露並益於人故皆曰神而得祭也大凡生于天地之間者皆曰命其萬物死皆曰折人死曰鬼此五代之所不變也鄭氏曰折棄敗之言也鬼之言歸也五代謂黃帝堯舜禹湯周問如名山大川能興雲致雨何也程子曰是氣蒸成耳又問既有氣莫須有神否曰只氣便是神也今人不知此理才有水旱便去廟中祈福不知雨露從何而出却於廟中求邪名山大川能興雲致雨却不説著却於土木人身上求之可乎程子曰以功用謂之鬼神以妙用謂之神又曰鬼神造化之迹也問云云朱子曰風雨霜露四時代謝又問此是迹可得而見又曰視之而不見聽之而不聞何也曰説道無又有説道有又無物之生成非鬼神而何然又去那裏見得至於洋洋乎如在其上是又有也又曰天地之間只是此一氣耳來者為神往者為鬼譬如一身生者為神死者為鬼問功用妙用曰鬼神者有屈伸往來之迹如寒來暑往日往月來春生夏長秋收冬藏皆鬼神之功用此其可見者也忽然而來忽來而往方如此又如彼使人不可測知此鬼神之妙用也又曰其發見而見於功用者謂之鬼神至於不測者便謂之神所謂神也者妙萬物而為言妙處便是神又曰功用有迹底妙用是無迹底妙用是其所以然者又曰功用兼精粗而言是説造化妙用以其精者言其妙不可測天地間如消底是鬼息底是神生底為神死底為鬼以四時言之春夏便為神秋冬便為鬼又如晝便是神夜便是鬼以氣息言之呼是神吸是鬼又曰風雨露雷日月晝夜此鬼神之迹也此是公平正直鬼神若所謂嘯於梁觸於胸此則不正邪暗或有或無或去或來或聚或散者又曰古之戰場往往有鬼彼皆強死固宜未散問此亦是造化之迹乎曰若論正理則如樹上忽生花葉空中忽然有雷電風雨此便是造化之迹但人所常見故不之怪忽聞鬼嘯忽見鬼火則便以為怪不知此亦造化之迹但不是正理故以為怪異耳如家語云夔虛罔象之屬皆是氣之乖戾雜揉所生亦非理之所無也但既非理之常故謂之怪孔子所以不語也鬼者往而不反之義釋氏道家之論鬼神可笑之尤者也道家尤甚以至説人身上耳目口鼻皆有神世間有鬼神憑依言語者蓋屢見之未可全不信此亦有理莫見乎隱莫顯乎微而已今之輕信鬼怪異説者止是不先燭理若於事上求之安有盡期亦用力於學而已土地之神社稷而已范文甫將赴河清尉問到官三日例須謁廟如何曰正者謁之如社稷先聖是也其他古先賢哲亦當謁之又問城隍如何曰城隍不與云云又問恐駭衆爾曰昔狄仁傑毁江浙間淫祠千四百處所存惟吳泰伯伍子胥爾今人做不得以謂時不同是誠不然只是狄仁傑耳當時子胥廟存之亦無謂除神祠然後人為善邵子曰鬼神無形而有用其情狀可得而知也於用則可見之矣若人之耳目鼻口手足草木之枝葉華實顔色皆鬼神之所為也福善禍淫主之者誰耶聰眀正直有之者誰耶不疾而速不行而至任之者誰耶皆鬼神之情狀也邵子曰管子云流行於天地之間者謂之鬼神鬼神者太極之英氣正理行乎兩間為天地之用者也氣其狀也理其情也氣形盛則魂魄盛氣形衰則魂魄亦從而衰矣又曰魂隨氣而變魄隨形而止故形在則魄存形化則魄散張子曰鬼神二氣之良能也朱子曰伊川謂鬼神者造化之迹却不如橫渠所謂二氣之良能蓋程子之説固好但只渾淪在這裏張子之説分明便見有個隂陽在問良能之義曰只是二氣之自然者耳問何謂良能曰屈伸往來是二氣自然能如此問伸是神屈是鬼否曰氣之方來皆屬陽是神氣之反皆屬隂是鬼又曰自日午以前是神午以後是鬼自初一以後是神十六以後是鬼問日月對言之日是神月是鬼否曰亦是草木方發生來是神凋落是鬼人自少至壯是神衰老是鬼鼻息呼是神吸是鬼問程説所謂天尊地卑乾坤定矣鼓之以雷霆潤之以風雨曰天地造化皆是鬼神古人所以祭風伯雨師曰風雷鼓動是神收斂處是鬼否曰是按上蔡謝氏曰橫渠説得來别這箇便是天地間妙用須是將來做題目入思議始得講説不濟事良能與妙用之義當合而思之故附於此物之初生氣日至而滋息物生既盈氣日反而遊散至之謂神以其伸也反之謂鬼以其歸也問滋息是生息之息是止息之息朱子曰止是生息又曰人自方生而天地之氣只管增添在身上漸長漸大至極盛了又漸衰耗以至於散天道不窮寒暑已衆動不窮屈伸已鬼神之實不越乎兩端而已矣鬼神往來屈伸之義故天曰神地曰示人曰鬼神示者歸之始歸往者來之終朱子曰鬼神屈伸也如風雨雷電初發時神也及至風止雨過雷住電息則鬼也問云云曰説文示字以有所示為義故視字從示天之氣生而不息故曰神地顯然示人故曰示又曰天曰神地曰示者蓋其氣未嘗或息也人鬼則其氣有所歸矣或問鬼神曰鬼神只是氣屈伸往來者氣也天地間無非氣人之氣與天地之氣常相接無間斷人自不見人心才動便達於氣便與這屈伸往來者相感通問來而伸者為神往而屈者為鬼凡隂陽魂魄之噓吸皆然不獨死者為鬼生者為神故橫渠云神示者歸之始歸往者來之終曰然問既屈之中又自有屈伸曰祭祀致得鬼神來格便是就既屈之氣又能伸也問魂氣則能既屈而伸若魄既死既不能復伸矣曰也能伸蓋來則俱來如祭祀報氣報魄求之四方上下便是皆有感格之理凡可狀皆有也凡有皆象也凡象皆氣也氣之性本虛而神則神與性乃氣所固有此鬼神所以體物而不可遺也藍田吕氏曰鬼神者二氣之往來耳物感雖微無不通於二氣故人有是心雖自謂隱微心未嘗不動動則固已感於氣矣鬼神安有不見乎范氏曰有其誠則有是神無其誠則無其神上蔡謝氏曰動而不已其神乎滯而有迹其鬼乎往來不息者神也摧仆歸根者鬼也致生之故其鬼神致死之故其鬼不神何也人以為神則神以為不神則不神矣知死而致生之不智知死而致死之不仁聖人所為神明之也又或問死生之死謝氏曰人死時氣盡也曰有鬼神否曰余當時亦曽問明道先生明道曰待向汝道無來汝怎生信得及待向汝道有來汝但去尋討看此便是答底語朱子曰鬼神上蔡説得好如曰可者使人格之不使人致死之可者是合當祭如祖宗父母這須著盡誠感格之不要人便做死人看待他不可者使人逺之不使人致生之不可者是不當祭如間神野鬼便要人逺之不要人做生人看待他我不管他便無了鬼神天地間之妙用祖考精神即我之精神問先王祭享鬼神則甚曰是他意思别三日齊五日戒求諸隂陽四方上下蓋是要集自家精神所以格有廟必於渙與萃言之雖然如是以為有亦不可以為無亦不可這裏有妙理於若有若無之間斷制得去始得曰如此却是鶻突也曰不是鶻突自家要有便有自家要無便無始得鬼神在虛空中辟塞間觸目皆是為他是天地間妙用云云朱子曰古人到祭祀處便招呼得來問祖先已死以何而來曰只是以我之氣承接其氣便是有來底道理問人之禱天地山川是以我之有感彼之有子孫之祭先祖是以我之有感彼之無先生曰神祗之氣常屈伸而不已人鬼之氣則消散而無餘矣其消散亦有久逺之異祭祀之感格或求之隂或求之陽各從其類求則俱來然非有一物積於空虛之中以待子孫之求也但主祭祀者既是他一氣之流轉則盡其誠敬感格之時此氣固寓此也又問祖考精神便是自家精神故齊戒祭祀則可以求格若旁親外親之屬則其精神非彼之精神矣豈於此但以感之而不以氣乎先生曰但所祭者其精神魂魄無不感通蓋本從一源中流出初無間隔雖天地山川鬼神亦然也人死雖是魂魄各散哭之魄又較定須是招魂來復這魄要他相合聖人教人子孫常常祭祀是要聚得他問上蔡云云先生曰有其誠則有其神無其誠則無其神便是合有底我若誠則有之不誠則無便是合有底當有合無底當無上蔡而今都説得粗了這合當道合有底從而有之則有即合無底自是無了便從而無之今却只説道有便有道無便無則不可問性即是理不可以聚散言聚而生散而死者氣而已所謂精神魂魄有知有覺者氣也故聚則有散則無若理則亘古今常存不復有聚散消長也曰只是這箇天地隂陽之氣人與物皆得之氣聚則為人散則為鬼然其氣雖已散這個隂陽天地之理生生而不窮祖考之精神魂魄雖已散子孫之精神魂魄自相屬故祭祀之禮盡其誠敬便可以致得祖考之魂魄這箇自是難説看既散後一似都無了能盡其誠敬便有感格亦緣是理常只在這裏也又曰人之氣傳於子孫猶木之氣傳於實也此實之傳不泯則其生木雖枯毁無餘而氣之在此固自若也問人之死也不知魂魄便散否曰固是散又問子孫之祭祀却有感格者如何曰畢竟子孫是祖先之氣他氣雖散他根却在這裏盡其誠敬則亦能感召得他氣聚在此如水波樣後水非前水後波非前波然却通只是一水波子孫之氣與祖考之氣亦是如此那箇當下自散了然他根却在這裏根既在此又却能引聚得他那氣在此此事難説只要人自看得問先生答廖子晦書曰氣之既化者既散而無有矣而根於理而日生者則固浩然而無窮也故上蔡謂我之精神即祖考之精神蓋謂此也問根於理而日生者浩然而無窮此是説天地氣化之氣否曰此氣只一般周禮所謂天神地祗人鬼雖有三樣其實只一般若説有子孫底引得他氣來不成無子孫底他氣便絶他血氣雖不流傳他那今亦自浩然日生無窮如禮書諸侯因國之祭祭其國之無主後者如齊太公封於齊便用祭其爽鳩氏季萴逄伯陵蒲姑氏之屬蓋他先主此國來禮合祭他然聖人制禮繼其國者則合祭之非在其國者便不當祭便是理合如此道理合如此便有此氣如晉侯夢康叔云相奪豫享蓋晉後都帝丘夏后相亦都帝丘則都其國自合當祭不祭者宜其如此又如晉侯夢黃熊入寢門以為鯀之神亦是此類不成説有子孫底方有感格之理便使其無子孫其氣亦未嘗亡也如今祭勾芒他更是逺然既合當祭他便有氣脈在要之通天地人只是這一氣所以説洋洋乎如在其上如在其左右虛空逼塞無非此理自要人看得活難以言曉也問鬼神中有謂祖宗是天地間一箇統氣因子孫祭享而聚散曰他這説便是上蔡所謂道要有時便有若無時便無是皆由乎人矣鬼神是箇有底物事祖宗亦只是同此一氣但有箇總腦處子孫這身在祖宗之氣便在此他是有個血脈貫通所以神不歆非類不祀非族只是為這氣不相關如天子祭天地諸侯祭山川大夫祭五祀雖不是我祖宗然天子者天地之主諸侯者山川之主大夫者五祀之主我主得他他氣便總統在我身上便是個相關處問祭古聖賢何如曰聖賢道在萬世功在萬世今行聖賢之道傳聖賢之心便是負荷這物事此氣便與相通如釋奠列許多籩豆設許多禮儀不是謾為之耳按以上數條因祖考推而及於天地山川聖賢之祀故附焉問魂魄隂陽之義朱子曰魂如火魄如水又問鬼神便是精神魂魄之義曰然且就這一身看自會笑語有許多聰明知識這是如何得恁地虛空之中忽然有風雨有雷電這是如何恁地這都是隂陽相感都是鬼神看得到此見這一身只有一個軀殼在這裏內外無非天地隂陽之氣所以橫渠云天地之塞吾其體天地之帥吾其性只是一箇道理古人之心正故其神亦正後世人心不正故所感無由而正問今愚民於村落創立一神祠合聚以祈禱之其神便靈何也曰衆心之所輻輳便有生氣所以祭神必用血肉者蓋欲藉他之生氣耳如古人釁廟釁竈之意皆然輔廣曰人心聚處便有神故古人郊則天神格廟則人鬼享亦是此理曰固是理云云因言古人祭山川只是設壇壝以行禮祭時便有祭了便無故不褻瀆後世却先立一箇廟貌在此所以反致惑亂人心幸求非望無所不至因言今日淫祠之非禮與釋氏所以能服鬼神之類曰人心茍正表裏洞達無纎毫私意可以對越上帝則鬼神焉得不服故曰思慮未起鬼神莫知又曰一心定而鬼神服問道理有正則有邪有非則有是鬼神之事亦然世間有不正之鬼神謂其無此理則不可曰老子謂以道益天下者其鬼不神若王道修明則此等不正之氣銷矣有此物則有此鬼神蓋莫非隂陽之所為也問鬼者隂之靈神者陽之靈司命中霤竈與門行人之所用者有動有靜有行有止故亦有隂陽鬼神之理古人所以祀之然否曰云云五祀之神若細分之則戶竈屬陽門行屬隂中霤兼統隂陽就一事之中又自有隂陽也南軒張氏曰鬼神之説合而言之來而不測謂之神往而不返謂之鬼分而言之天地山川風雷之屬凡氣之可接者皆曰神祖考祀饗於廟曰鬼就人物而言之聚而生為神散而死為鬼又就一身上言之魂氣為神體魄為鬼凡六經所稱蓋不越是數端然一言以蔽之莫非造化之迹而語其德則誠而已昔者季路蓋嘗問事鬼神之説矣夫子之所以告之者將使之致知力行而自得之故示其理而不詳語也至於後世異説熾行譸張為幻卒莫致詰流俗眩於怪誕怵於恐畏胥靡而從之聖學不明雖襲儒衣冠號為英才敏識亦往往習熟崇尚而不以為異至於其説之窮則曰焉知天地間無有是事委諸茫昧而已耳信夫事之妄而不察夫理之真於是鬼神之説淪於空虛而所為交於幽明者皆失其理禮壞而樂廢人心不正浮偽日滋其間所謂因其説而為善者亦莫非私利之流亂德害教孰此為甚故本朝河南二程子橫渠張子與學者反覆講論而不置夫豈好辨哉蓋有所不得已也若夫程子發明感通之妙張子推極聚散之藴所以示來世深矣學者誠能致知以窮其理則不為衆説所咻克己以去其私則不為血氣所動於其有無是非之故毫分縷析了然於中各有攸當而不亂然後昔人事鬼神之精意可得而求德可立而經可正也不然辨之不明守之不固眩於外而怵於內一理之蔽則為一事之礙一念之差則為一物之誘聞見雖多亦鮮不為異説所溺矣右論鬼神魂魄附西山讀書記卷四十
