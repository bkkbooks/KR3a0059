body:
  text: 西山讀書記卷五宋真徳秀撰元亨利貞易乾元亨利貞朱子曰六畫者伏羲所畫之卦也一者竒也陽之數也乾者健也陽之性也本註乾字三畫卦之名也下者内卦也上者外卦也經文乾字六畫卦之名也伏羲仰觀俯察見隂陽有竒偶之數故畫一竒以象陽畫一偶以象隂見一隂一陽有各生一隂一陽之象故自下而上再倍而三以成八卦見陽之性健而其成形之大者為天故三竒之卦名之曰乾而擬之于天也三畫已具八卦已成則又三倍其畫以成六畫而于八卦之上各加八卦以成六十四卦也此卦六畫皆竒上下皆乾則陽之純而健之至也故乾之名天之象皆不易焉元亨利貞文王所繋之辭以斷一卦之吉凶所謂彖辭者也元大也亨通也利宜也貞正而固也文王以為乾道大通而至正故於筮得此卦而六爻皆不變者言其占當得大通而必利在正固然後可以保其終也程子曰元者萬物之始亨者萬物之長利者萬物之遂貞者萬物之成唯乾坤有此四徳彖曰大哉乾元萬物資始乃統天此專以天道明乾義又析元亨利貞為四徳以發明之而此一節首釋元義也大哉歎辭元大也始也乾元天徳之大始故萬物之生皆資之以為始也又為四徳之首而貫乎天徳之始終故曰統天雲行雨施品物流形此釋乾之亨也大明終始六位時成時乘六龍以御天始即元也終即貞也不終則无始不貞則无以為元也此言聖人大明乾道之終始則見卦之六位各以時成而乘此六陽以行天道是乃聖人之元亨也乾道變化各正性命保合太和乃利貞變者化之漸化者變之成物所受為性天所賦為命太和隂陽會合冲和之氣也各正者得於有生之初保合者全於有生之後此言乾道變化無所不利而萬物各得其性命以自全以釋利貞之義也首出庶物萬國咸寧聖人在上髙出庶物猶乾道之變化也萬國各得其所而咸寧猶萬物之各正性命而保合太和也此言聖人之利貞也盖嘗合而論之元者物之始生亨者物之暢茂利則向於實也貞則實之成也實之既成則其根蒂脫落可復種而生矣此四徳之所以循環而無端也然而四者之間生氣流行初無間斷此元之所以包四徳而統天也其以聖人而言則孔子之意盖以此卦為聖人得天位行天道而致太和之治也問乾元統天闕者所以用形如何曰亦是但只説得乾健不息闕意在元字上六龍只是六爻龍只是譬喻此六爻之義潛見飛躍以時而動便是乘六龍便是御天乾道闕元亨各正性命它那元亨時雖正了然未成形質到這裏方成如百糓堅實了方喚做正性命闕乾道闕只如萬物當那變化發生之始此是元也各正性命物之生理截然各足不偏即是亨矣能保合以全其太和之性則利貞之義也文言曰元者善之長也亨者嘉之會也利者義之和也貞者事之幹也元者生物之始天地之徳莫先於此故於時為春於人則為仁而衆善之長也亨者生物之通物至於此莫不嘉羙故於時為夏於人則為禮而衆善之會也利者生物之遂物各得宜不相妨害故於時為秋於人則為義而得其分之和貞者生物之成實理具備隨在各足故於時為冬於人則為智而為衆事之幹幹木之身而枝葉所依以立者也問元者善之長曰元亨利貞皆善也而元乃為四者之長是善端初發見處也問亨者嘉之會曰嘉美也會是齊集底意思許多嘉羙一時鬭湊到此故謂之嘉會問程子曰物各得所為利只是當然便安否曰然只萬物各得其分便是徇義截然不可犯似不和分别後萬物各正其所却是和不和生於不義義則無不和和則無不利矣貞者事之幹伊川説貞字只以為正恐未足以盡貞之義須是説正而固貞取以配冬者以其固也孟子以知斯二者弗去為智之實弗去乃貞固之意文王本説元亨利貞為大亨利貞夫子以為四徳故曰元亨利貞譬諸榖可見榖之生萌芽是元苗是亨穟是利成實是貞榖之實又復能生循環無窮元亨利貞理也有這四段氣也有這四段理便在氣中兩箇不曽相離元亨利貞無斷處貞了又元今日子時前便是昨日亥時温底是元熱底是亨凉底是利寒底是貞以天道言之為元亨利貞以四時言之為春夏秋冬以人道言之為仁義禮智以氣侯言之為温涼燥濕以方言之為東西南北乾元萬物資始坤元萬物資生元者天地生物之端元者生意亨則生意之長利則生意之遂貞則生意之成以上皆總論四徳之義也又程子曰四徳之元猶五常之仁偏言則一事専言則包四者又曰萬物之生意最可觀此元者善之長也斯所謂仁也朱子曰元只是初底意思如木之萌如草之芽在人則惻然有隠是也又曰要理會得仁當就初處看故元亨利貞而元為四徳之首春夏秋冬而春為一嵗之首由是而為夏由是而為秋為冬皆自此生出所以謂仁包四徳者只縁四箇是一箇以元亨利貞言之只是一箇元却有元之元元之亨元之利元之貞上四箇元字便是包四徳下一箇元字便是主一事又有亨之元利之元貞之元曉得此意則仁包四者尤明白亨之元者夏四月初是也利之元者秋七月初是也貞之元者冬十月初是也程先生亦謂觀雞雛可以見仁者亦是看其初生意思也又曰樂記言易直子諒之心韓詩外傳作慈良却是人之初心自是慈愛良善此便是元者善之長如孟子説惻隠之心皆是這般心聖賢教人先要求此心正為是萬善之總處又曰性中有此四者聖門却只以求仁為急者縁仁却是四者之先若常存得温厚底意思在這裏到宣著發揮時便自然㑹宣著發揮到剛斷時自然剛斷到収斂時自然収斂此仁之所以包四者也或問此恐如五行之木若不是先有箇木便亦生下面四箇不得曰若無木便無火無火便無土無土便無金無金便無水又曰仁字如人釀酒酒方㣲發時帶些温氣便是仁到發得極熱時便是禮到得熱時便是義到得成酒後却與水一般便是智又如一日之間蚤間天氣清明便是仁午間極熱便是禮晩下漸凉便是義到夜半全然收斂無些形迹便是智只如此看甚分明或問萬物之生意最可觀此元者善之長也斯所謂仁也此只是先生所謂初之意否曰萬物之生天命流行自始至終無非此理但初生之際淳粹未散尤易見耳只如元亨利貞皆是善而元則為善之長亨利貞皆在那裏來仁義禮智亦皆善也而仁則為萬善之首義禮智皆從這裏出耳或問天地生物氣象如温厚和粹即天地生物之仁否曰這是從生處説來如所謂大哉乾元萬物資始至哉坤元萬物資生那元字便是生物之仁資始是得其氣資生是成其形到得亨便是彰著利便是結聚貞便是収斂既無形迹又須復生至如夜半子時此物雖存猶未動在到寅卯時便生己午便著申酉便結亥子丑便實及至寅又生他這箇只管運轉一嵗有一嵗之運一月有一月之運一日有一日之運一時有一時之運雖一息之㣲亦有四箇段子恁地運轉但元則是始初未至於著如所謂怵惕惻隠存於人心自恁惻隠地未至大段發出又曰仁之包四徳猶冢宰之統六官又曰得此生意以有生然後有義禮智以先後言之則仁在先以小大言之則仁為大又曰四時之氣温凉寒熱凉與寒既不能生物夏氣又熱亦非生物之時惟春氣温厚乃天地生物之心到夏是生氣之長秋是生氣之斂冬是生氣之藏若春無生物之意後面三時都無了此仁之所以包義禮智也又曰闕言元者仁也仁人心也固有此禮然不知仁如何闕先生曰天下之理原其所自未有不善易傳曰闕非先成者也得而後有失非得何以有失也闕曰當來得之於天者只是箇仁所以為心之本體却自仁中分四界子一界子上是仁之仁一界子上是仁之義一界子上是仁之禮一界子上是仁之智一个物事四脚撐在裏面惟仁兼統之人心中只有此四者萬物萬事皆此中出又曰春生夏長秋収冬藏雖分四時生意未嘗不貫縱霜雪之惨亦是生意凡此又專論元包四徳之首也君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事以仁為體則無一物不在所愛之中故足以長人嘉其所㑹則無不合禮使物各得其所利則義無不和貞固者知正之所在而固守之所謂知而弗去者也故足以為事之幹元亨利貞是一箇道理之大綱領須時復將來子細研究元者善之長以下四句説天徳之自然君子體仁足以長人以下四句説人事之當然元只是善之長萬物生理皆始於此衆善百行皆統於此故於時為春於人為仁亨是嘉之㑹嘉羙也㑹猶齊也嘉會衆羙之㑹猶言齊好也春時發生萬物未大故齊到夏洪纎髙下各各暢茂其在人則禮儀三百威儀三千事事物物大大小小一齊到恰好處所謂動容周旋皆中禮故於時為夏於人為禮利者為義之和萬物至此各遂其性事理至此無不得宜故於時為秋於人為義貞乃事之幹萬物至此収斂誠實事理至此無不的正故於時為冬於人為智此天徳之自然其在君子所當從事於此者則必體仁乃足以長人云云體仁與體物相似人在仁裏做骨子故謂之體仁仁是道理須着這人方始體得他比而效之之説未是體猶所謂公而以人體之之體處得事事是謂之嘉㑹一事不是則非嘉會矣嘉㑹者嘉其所會一一以禮文節之使之無不中節是嘉其所會也義者事之宜也利物則合乎事之宜不利物則非義矣老蘇論此謂惨殺為義必以利和之如武王伐紂是義也若徒義則不足以得天下之心必散財發粟而後可以和其義如此則義在利之外分成兩截矣義之為義只是一箇宜其初則甚嚴如男正位乎外女正位乎内直是有内外之辨君尊於上臣卑於下截然不可犯似若不和然使之各得其宜則其和也孰大於此只是義中便有和既曰利者義之和即説利物足以和義盖不如是不足以和其義欲為事而非貞固則植立不起貞而不固則非貞貞如版築之有幹乾四徳元最重貞次之非元則無以生非貞則無以終非終則無以為始不始則不能成終如此循環無窮所謂大眀終始也智所以藏仁義禮惟是知恁地方能恁地亦猶元亨利之理藏於貞春生夏長秋成之意藏於冬也君子行此四徳者故曰乾元亨利貞非君子之至健無以行此故曰乾元亨利貞此一節與春秋傳所載穆姜之言不異疑古者已有此語乾元者始而亨者也始則必亨理勢然也利貞者性情也収斂歸藏乃見性情之實始而亨是生出去利貞是収斂聚方見性情元亨是動發用在外利貞是静而伏藏於内性情如言本體元亨是發用處利貞是収斂歸本體處盖春便生夏便長茂條達秋便有収斂攝聚意思到冬方成天地之心别無可做只是生物而已謂如一樹春榮夏敷至秋乃實至冬乃成雖有先成實者若未冬便種不成直待受得氣足將欲相離之際將千實來種便是千樹如碩果不食是也方其自小而大各有生意到冬時疑若無生意矣不知却収斂在下毎實各具生理便見生生不窮之意周子曰元亨誠之通利貞誠之復註見前性命篇問元亨是春夏利貞是秋冬秋冬生氣既散何以謂之収斂朱子曰其氣已散收斂者乃其理耳曰冬間地下氣暖便也是氣収斂在内曰上面氣自散了下面暖底乃是生來却不是已散之氣復為生氣誠之通是造化流行未有成立之時所謂繼之者善誠之復是萬物已得此理而皆有所歸藏之時所謂成之者性在人則感而遂通者誠之通寂然不動者誠之復元亨誠之通動也利貞誠之復静也元者動之端也本乎静貞者静之質也著乎動一動一静循環無端而貞也者萬物之所以成終而成始者也故人雖不能不動而立人極者必主於静惟主於静故其著於動也無不中節而不失其本然之體矣來書所謂通復二字甚密亦有未切處繼之者善造化流行萬物方資以始而未實也成之者性物生已實造化與物各藏其用而無所為也在人則感物而動者通也寂然不動者復也以此推之則圖象隠然不待言而喻矣南軒張氏曰誠通誠復之論其至矣乎聖人與天地同用通而復復而通一往一來至誠之無内外而天地之無終窮也君子修之所以戒慎恐懼之嚴者正以須臾不在乎是則窒其通迷其復而遏天命之流行故爾此非用力之深者孰能體之右兼言元亨利貞仁義禮智信孟子曰人皆有不忍人之心朱子曰天地以生物為心而所生之物因各得夫天地生物之心以為心所以人皆有不忍人之心也先王有不忍人之心斯有不忍人之政矣以不忍人之心行不忍人之政治天下可運之掌上言衆人雖有不忍人之心然物欲害之存焉者寡故不能察識而推之政事之間惟聖人全體此心隨感而應故其所行無非不忍人之政也所以謂人皆有不忍人之心者今人乍見孺子將入於井皆有怵惕惻隠之心非所以内交於孺子之父母也非所以要譽於鄉黨朋友也非惡其聲而然也乍猶忽也怵惕驚動貌惻傷之切也隠痛之深也即所謂不忍人之心也内結要求聲名也言乍見之時便有此心隨見而發非由此三者而然也程子曰滿腔子是惻隠之心謝氏曰人須是識其真心方乍見孺子入井之時其心怵惕乃真心也非思而得非勉而中天理之自然也内交要譽惡其聲而然即人欲之私矣由是觀之無惻隠之心非人也無羞惡之心非人也無辭讓之心非人也無是非之心非人也羞恥己之不善也惡憎人之不善也辭解使去己也讓推以與人也是知其善而以為是也非知其惡而以為非也人之所以為心不外乎是四者故因論惻隠而悉數之言人若無此則不得謂之人所以明其必有也惻隠之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也惻隠羞惡辭讓是非情也仁義禮智性也心統性情者也端緒也因其情之發而性之本然可得而見猶有物在中而緒見於外也集義程子曰惻隠屬愛乃情也非性也因其惻隠知其有仁人之有是四端也猶其有四體也有是四端而自謂不能者自賊者也謂其君不能者賊其君者也四體四肢人之所必有者也自謂不能者物欲蔽之耳凡有四端於我者知皆擴而充之矣若火之始然泉之始達茍能充之足以保四海茍不充之不足以事父母擴推廣之意充滿也四端在我隨處發見知皆即此推廣而充滿其本然之量則其日新又新將有不能自己者矣能由此而遂充之則四海雖逺亦吾度内無難保者不能充之則雖事之至近而不能矣此章所論人之性情心之體用本然全具而各有條理如此學者於此反求黙識而擴充之則天之所以與我者可以無不盡矣程子曰人皆有是心惟君子為能擴而充之不能然者皆自棄也然其充與不充亦在我而已矣又曰四端不言信者既有誠心為四端則信在其中矣今按四端之信猶五行之土無定位無成名無専氣而水火金木無不待是以生者故土於四行無不在於四時則寄王焉其理亦猶是也天地生人物須是和氣方生人自和氣中出所以有不忍人之心問滿腔子是惻隠之心曰只是滿這軀殻都是惻隠之心纔觸着便是這個出來大感則大應小感則小應仁是根惻隠是萌芽親親仁民愛物便是推廣到枝葉處玉山講義天之生物各付一性性非有物只是一個道理之在我者耳故性之所以為體只是仁義禮智信五字天下道理無不出於此韓文公云人之所以為性者五其説最為得之却為後世之言性者多雜佛老而言所以將性字作知覺心意看了非聖賢説性字本㫖也五者之中所謂信者是箇真實無妄底道理如仁義禮智皆真實無妄者也故信字更不須説只仁義禮智四字於中各有分别不可不辨盖仁則是箇温和慈愛底道理義則是箇斷制裁割底道理禮則是箇恭敬撙節底道理智則是箇分别是非底道理凡此四者具於人心乃是性之本體方其未發漠然無形象之可見及其發而為用則仁者為惻隠義者為羞惡禮者為恭敬智者為是非隨事發見各有苗脉不相淆亂所謂情也故孟子曰惻隠之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也謂之端者猶有物在中而不可見必因其端緒發見於外然後可得而尋也盖一心之中仁義禮智各有界限而其性情體用又自各有分别須是見得分眀然後就此四者之中又見得仁義兩字是箇大界限如天地造化四序流行而其實不過於一隂一陽而已於此見得分明然後就此又見得仁字是个生底意思通貫周流於四者之中仁固仁之本體也義則仁之斷制也禮則仁之節文也智則仁之分别也正如春之生氣貫徹四時春則生之生也夏則生之長也秋則生之収也冬則生之藏也故程子謂四徳之元猶五常之仁偏言則一事専言則包四者正謂此也孔子只言仁以其專言者言之也故但言仁而義禮智皆在其中孟子兼言義以其偏言者言之也然亦不是於孔子所言之外添入一箇義字但於一理之中分别出來耳其又兼言禮智亦是如此盖禮是仁之著智是義之藏而仁之一字未嘗不流行乎四者之中也若論體用亦有兩説盖以仁存於心而義形於外言之則曰仁人心也義猶路也而以仁義相為體用若以仁對惻隠義對羞惡而言則就其一理之中又以未發已發相為體用若認得熟看得透則玲瓏穿穴縱横顛倒無處不通而日用之間行著習察無不是着工夫處矣四端説曰性是太極渾然之體本不可以名字言但其中含具萬理而綱領之大者有四故命之曰仁義禮智孔門未嘗備言至孟子而始終備言之者盖孔子之時性善之理素明雖不詳其條而説自具至孟子之時異説蠭起往往以性為不善孟子懼是理之不明而思有以明之茍但曰渾然全體則恐其為無星之稱無寸之尺而終不足以曉天下於是别而言之界為四破而四端之説於是乎立盖四端之未發也性雖寂然不動而其中自有條理自有間架不是儱侗都無一物所以外邊纔感中間便應如赤子入井之事感則仁之理便應而惻隠之心於是乎形如過廟過朝之事感則禮之理便應而恭敬之心於是乎形盖由其中間衆理渾具各各分明故外邊所遇隨感而應所以四端之發各有面貌之不同是以孟子析而為四以示學者使知渾然全體之中而燦然有條如此則性之善可知矣然四端之未發也所謂渾然全體之理無聲臭之可言無形象之可見何以知其燦然有條若此盖是理可驗乃就他發處驗得凡物必有本根而後有枝葉見其枝葉而知其必有本根性之理雖無形而端緒之發則可騐故由其惻隠所以必知其有仁由其羞惡所以必知其有義由其恭敬所以必知其有禮由其是非所以必知其有智使其本無是理於内則何以有是端於外所以有是端於外必知有是理在内而不可誣也故孟子言乃若其情則可以為善矣乃所謂善也是則孟子之言性善盖亦適其情而逆知之耳仁義禮智既得見他界限分明又須知四者之中仁義是箇對立底關楗盖仁仁也而禮者則仁之著義義也而智者則義之藏猶春夏秋冬雖為四時而春夏皆陽之屬也秋冬皆隂之屬也故曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義是知天地之道不兩則不能以立故端之有四而立者有兩耳仁義雖對立而成兩然仁實貫通乎四者之中盖偏言則一事專言則包四者故仁者仁之本體禮者仁之節文義者仁之斷制智者仁之分别猶春夏秋冬雖不同而同出於春春則春之生也夏則春之長也秋則春之収也冬則春之藏也自四而兩自兩而一則統之有終㑹之有元矣故曰五行一隂陽隂陽一太極是天地之理固然也仁包四端而智居四端之末者盖冬者藏也所以始萬物而終萬物者也智有藏之義焉有始終之義焉且惻隠羞惡恭敬是三者皆有可為智但分别其為是為非耳是以謂之藏也又惻隠羞惡恭敬皆是一面底道理而是非則有兩面既别其所是又别其所非是終始萬物之象也故仁義為四端之首而智則能成終成始猶元雖四徳之長然元不生於元而生於貞盖天地之化不翕聚則不能發散理固然也仁智交際之間乃萬化之機軸此理循環不窮脗合無間程子所謂動静無端隂陽無始者此也問仁兼四端意思曰上蔡見明道舉史書成誦明道謂其玩物喪志上蔡汗流浹背面發赤色明道云此便是惻隠之心且道上蔡聞過慚惶自是羞惡之心如何却説惻隠惟是有惻隠之心方㑹動動了始有羞惡有恭敬有是非動處便是惻隠若不㑹動却不成人天地生生之理這些動意未嘗止息惻隠之心首末皆惻隠三者則首是惻隠末是羞惡辭讓是非性不可言所以言性善者只看他四端之善則可以見其性之善如見其水之清則知其源頭必清矣四端情也性則理也發者情也其本則性也如見影知形之意仁義禮智本體自無形影要捉摸不着只得將發動處㸔程子曰因其惻隠知其有仁説得最分明親切也不道惻隠便是仁也不道舍了惻隠别有一箇仁譬如草木因其萌芽知其下面有根也不道萌芽便是又不道舍了萌芽别取一箇根説仁義便如隂陽説四端便如四時分四端八字便如分八節問心中湛然清明與天地相流通此是仁否先生云湛然清明時是仁義禮智統㑹處今人説仁都把做空洞底㸔却不得當此時仁義禮智之苗脉已在裏許只是未發動及有箇合親愛底事來便發出惻隠之心有箇可厭惡事來便發出羞惡之心禮智亦然四端固是良心茍不加存養則發不中節便是私心或問未發之際不知如何曰未發之際便是中便是敬以直内便是心之本體又問未發之際欲加識别使四者各有落着如何曰如何識别只存得此道理在這裏便恁地涵養將去既熟則其發見自不差又曰未發之時此心之體寂然不動無可分别只得混沌養將去若必欲其求所謂四者之端則既思便是已發矣問仁何以能包四者曰人只是這一箇心就這裏面分為四者且以惻隠論之本只是這惻隠底心遇當辭讓則為辭讓不安處便為羞惡分别處便為是非若無一箇動底醒底在裏面便也不知羞惡不知是非譬如天地只是一箇春氣是發生之心春氣長得過便是夏収歛便是秋消縮盡便是冬明年又從春處起渾然只是一箇發生之氣問四端之端集注以為端緒或説端乃尾如何曰以體用言之有體而後有用故端亦可謂之尾若以終始言之則四端是始發處故亦可以端緒言之二説各有所指自不相礙也四端乃孔子所未發人只道孟子有闢楊墨之功不知他就人心上發明大功如此闢楊墨是打邊境之功發明四端乃安社稷之功四者皆我所固有其初發也毫毛如也及推廣將去充滿其量則廣大無窮問人心陷溺之久四端蔽於利欲之私初用功亦未免間斷曰固是然義理之心纔勝則利欲之念便消如惻隠之心勝則殘虐之意自消羞惡之心勝則貪冒無恥之意自消恭敬之心勝則驕惰之意自消是非之心勝則含胡茍且㝠頑昏謬之意自消孟子四端處極好思量玩味只反身而自騐其明昧深淺如何惻隠之心仁也羞惡之心義也見前性命篇當與此章參觀孟子曰矢人豈不仁於函人哉矢人惟恐不傷人函人惟恐傷人巫匠亦然故術不可不慎也朱子曰函甲也惻隠之心人皆有之是矢人之心本非不如函人之仁也巫者為人祈祝利人之生匠者作為棺槨利人之死孔子曰里仁為羙擇不處仁焉得智夫仁天之尊爵也人之安宅也莫之禦而不仁是不智也里有仁厚之俗者猶以為美人擇所以自處而不於仁安得為智乎此孔子之言也仁義禮智皆天所與之良貴而仁者天地生物之心得之最先而兼統四者所謂元者善之長也故曰尊爵在人則為本心全體之徳有天理自然之安無人欲陷溺之危人當常在其中而不可須臾離者也故曰安宅此又孟子釋孔子之意以為仁道之大如此而自不為之豈非不智之甚乎不仁不智無禮無義人役也人役而恥為役由弓人而恥為弓矢人而恥為矢也以不仁故不智不智故不知禮義之所在如恥之莫如為仁此亦因人愧恥之心而引之使志於仁也不言智禮義者仁該全體能為仁則三者在其中矣仁者如射射者正己而後發發而不中不怨勝己者反求諸己而已矣為仁由己而由人乎哉南軒張氏曰矢人與函人巫與匠俱人也而其所欲之異者以其操術然也故夫人自處於不仁為忌忮為殘忍至於嗜殺人而不顧夫豈獨異於人哉惟其所處每在乎人欲之中安習滋長以至於此其性本同而其習有霄壤之異可不畏歟孟子曰仁之實事親是也義之實從兄是也朱子曰仁主於愛而愛莫切於事親義主於敬而敬莫先於從兄故仁義之道其用至廣而其實不越於事親從兄之間盖良心之發最為切近而精實者有子以孝弟為為仁之本其意亦猶此也智之實知斯二者弗去是也禮之實節文斯二者是也樂之實樂斯二者樂則生矣生則惡可已也惡可已則不知足之蹈之手之舞之斯二者指事親從兄而言知而弗去則見之明而守之固矣節文謂品節文章樂則生矣謂和順從容無所勉强事親從兄之意油然自生如草木之有生意也既有生意則其暢茂條達自有不可遏者所謂惡可已也其又盛則至於手舞足蹈而不自知矣此章言事親從兄良心真切天下之道皆原於此然必知之明而守之固然後節之密而樂之深也南軒張氏曰仁義具於人之性而其實則見於事親從兄之間盖仁故能愛愛莫大於愛親義者宜也宜之所施莫宜於從兄也擴而充之仁義盖不可勝用而實事親從兄之心也故知者知此弗去者也禮者節文此者也樂者樂此者也豈有外此者哉知必云弗去者盖曰知之而有時乎去之非真知至也知之至則弗肯去之矣有其禮斯有其節有其實斯有其文凡三千三百皆所以節文乎此者也有以節文則内外進矣至於樂則非自得之深涵養之熟者無此味也樂則生矣生不息之道盖其中心油然有不自知其然也生則惡可已言其自不可已則手之所舞足之所蹈莫非是矣至此則仁義之心粹然於内而周流乎事事物物之間矣孟子曰廣土衆民君子欲之所樂不存焉朱子曰地闢民聚澤可逺施故君子欲之然未足以為樂也中天下而立定四海之民君子樂之所性不存焉其道大行無一夫不被其澤故君子樂之然其所得于天者則不在是也君子所性雖大行不加焉雖窮居不損焉分定故也分者所得於天之全體故不以窮逹而有異君子所性仁義禮智根於心其生色也睟然見於面盎於背施於四體四體不言而喻上言所性之分與所欲所樂不同此乃言其蘊也仁義禮智性之四徳也根本也生發見也睟然清和潤澤之貌盎豐厚盈溢之意施於四體謂見於動作威儀之間也喻曉也四體不言而喻言四體不待吾言而自能曉吾意也盖氣禀清明無物欲之累則性之四徳根本於心其積之盛則發而著見於外者不待言而無不順也程子曰睟面盎背皆積盛所致然四體不言而喻唯有徳者能之行道固君子之所樂但其用其舍於我之性分本不相闗進而大行退而窮居於我性分之内初無加損問君子所性曰此是説生來承受之性仁義禮智根於心便見得四端著在心上相離不得纔有些子私意便剗斷了那根便無生意其色睟然都從那根上發出來性字從心見得先有這心便有許多道理在裏四體不言而喻若曰不待安排而自然中節耳南軒張氏曰四者具於性而根於心猶木之著本水之發源由是而生生不息焉仁義禮智根於心而生色於外充盛著見自不可揜故其睟然之和見於面盎於背施於四體四體不言而喻涵養擴充積久而熟天理融會動容周旋無非此理而内外一也不言而喻言其自然由於此而無待防檢耳董子曰仁義禮智信五常之道王者所宜修飭也此因武帝何修何飭之問而言其意雖甚正惜其剖析未明使帝知若何而為仁若何而為義其修飭之方又孰先孰後也其後帝策公孫𢎞問仁義禮智四者之宜當安設施而𢎞之對乃曰仁者愛也義者宜也禮者所履也智者術之源也致利除害兼愛無私謂之仁明是非立可否謂之義進退有度尊卑有分謂之禮擅殺生之柄通壅塞之塗權輕重之數論得失之道逺近情偽必見於上謂之術凡此四者治之本道之用也皆當設施不可廢也𢎞於仁義禮皆指用以為體既不足以明義理之源而智之一字則直以術言之其為人主心術之害尤大且四者即道也而曰道之用不知何者復為道之體乎大抵後世之言道者往往指以為虛無之物而不知其為至實之理故其舛謬如此𢎞不足責也愚獨以剖析未明為仲舒惜云周子曰誠無為幾善惡徳愛曰仁宜曰義理曰禮通曰智守曰信朱子曰道之得於身者謂之徳其别有是五者之用而因以名其體焉誠即太極幾者隂陽之象五者五行之性也當寂然不動時便是誠無為有感而動即有善惡幾是動處大凡人性不能不動但要頓放得是於其所動處頓放得是時便是徳愛曰仁宜曰義頓放得不是時便一切反是人性豈能不動但須於中分得天理人欲時方是性焉安焉之謂聖性者獨得於天安者本全於己聖者大而化之之稱不待學問强勉而誠無不立幾無不明徳無不備者也復焉執焉之謂賢復者反而至之執者保而持之賢者才徳過人之稱此思誠研幾以成其徳而能守之者也發㣲不可見充周不可窮之謂神發之㣲妙而不可見充之周徧而不可窮則聖人之妙用而不可知者也幾者動之㣲是欲動未動之間便有善惡須就這處理會若至于發著之甚則亦不濟事矣所以聖賢説戒慎乎其所不覩恐懼乎其所不聞盖幾㣲之際大是切要誠是實理無所作為便是天命之謂性喜怒哀樂未發之謂中幾者動之㣲㣲動之初是非善惡於此可見一念之生不是善便是惡徳者有此五者而已仁義禮智信者徳之體曰愛曰宜曰理曰通曰守者徳之用幾善幾惡便是心之所發處有个善有个惡徳便只是善底為聖為賢只是這材料做問既言誠無為恐其下未可便着善惡字先生曰當其未感五性具備豈有不善及其應事纔有照管不到處這便見惡古之聖賢戰戰兢兢過了一生正謂此也顔子有不善未嘗不知亦是如此通書多説幾太極圖却不説曰五性感動動而未分者是直卿云主静審幾謹動三者循環與孟子夜氣旦晝所為相似問周子曰誠無為幾善惡此明人心未發之體而指其已發之端盖欲學者致察於萌動之㣲知所决擇而去取之以不失乎本心之體而已或疑之以謂有類於胡子同體異用之云者遂妄以意揣量為圖如后善惡雖相對當分賓主天理人欲雖分𣲖必有宗孽自誠之動而之善則如木之自本而幹自幹而末上下相達者則道心之發見天理之流行此心之本主而誠之正宗也其或旁榮側秀若寄生疣贅者此雖亦誠之動則人心之發見而私欲之流行所謂惡也非心之固有盖客寓也非誠之正宗盖庶孽也茍決之不早擇之不精則客或乘主孽或代宗矣學者能於萌動幾㣲之間而察其所發之向背凡其直出者為天理旁出者為人欲直出者為善旁出者為惡直出者固有旁出者横生直出者有本旁出者無源直出者順旁出者逆直出者正旁出者邪而吾於直出者利導之旁出者遏絶之功力既至則此心之發自然出於一途而保有天命矣於此可以見未發之前有善無惡而程子所謂不是性中元有此兩物相對而出者盖謂此也若以善惡為東西相對彼此角立則是天理人欲同出一源未發之前已具此兩端所謂天命之性亦甚汙雜矣此胡氏同體異用之説也先生曰此説得之而圖有病今已略改正矣動而正曰道動之所以正以其合乎衆所共由之道也用而和曰徳用之所以和以其得道於身而無所待於外也匪仁匪義匪禮匪智匪信悉邪也所謂道者五常而已非此則其動也邪矣邪動辱也甚焉害也無得於道則其用不和矣故君子慎動動必以正則和在其中矣動而得其正理便是道若動而不正則不是道和亦只是順理用而和順也便是得此理於身若用而不和順則此理不得於身故下云匪仁匪義匪禮匪智匪信悉邪也只是此理故又曰君子慎動聖人之道仁義中正而已矣朱子曰中即禮正即智圖解備矣守之貴天徳在我何貴如之行之利順理而行何往不利廓之配天地充其本然並立之全體而已矣豈不簡易豈為難知道體本然故易簡人所固有故易知不守不行不廓耳言為之則是而歎學者自失其幾也十室之邑人人提耳而教且不及况天下之廣兆民之衆哉曰純其心而已矣朱子曰純者不雜之謂心謂人君之心仁義禮智四者動静言貌視聴無違之謂純仁義禮智五行之徳也動静隂陽之用而言貌視聴五行之事也徳不言信事不言思者欲其不違則固以思為主而必求四者之實矣程子曰孟子以四端為四體仁木之氣象也惻隠之心春之氣象也羞惡秋之氣象也推之四端皆然其全文云上取諸身百理具備背在上故為陽胸在下故為隂天有五行人有五藏心火也着些天地間風氣乘之便須發燥肝木也着些天地間風氣乘之便須發怒推之五藏皆然孟子將四端便為四體仁便是箇木氣象惻隠之心便是一箇生物春底氣象羞惡之心便是一箇秋底氣象只有一箇斷割底氣象便是義也推之四端皆然此箇事又着箇甚安排得也此箇道理雖牛馬血氣之類亦然都恁備具只是流形不同各隨形氣後便昏了他氣如子愛其母母愛其子亦有木底氣象又豈無羞惡之心如避害就利别所愛惡一一理完更如獮猴尤似人故於獸中最為智巧童昏之人見解不及者多矣然而為人氣最清可以輔相裁成天地設位聖人成能直行乎天地之中所以為三才凡有血氣之類者皆具五常但不知充而已矣仁義禮智信五者性也仁者全體四者四肢仁體也義宜也禮别也智知也信實也仁者公也人此者也義者宜也權量輕重之極禮者别也定分信者有此者也萬物皆有性此五常性也若夫惻隠之類皆情也凡動者謂之情性者自然完具信只是有此故四端不言信張子曰仁統天下之善禮嘉天下之會義公天下之利信一天下之動仁不得義則不行不得禮則不立不得信則不能守此致一之道也朱子曰程子所謂性中只有仁義禮智曷嘗有孝弟來盖父子之親兄弟之愛在性中只謂之仁君臣之分朋友之交在性中只謂之義推此言之曰禮曰智無不然者盖天地萬物之理無不出於此四者仁義禮智自天之生人便有此四者指罏而言曰如此罏便自有此四角天有四時地有四方日有旦晝昏夜天下道理千枝萬葉千緒萬端都是這四者做出來四者之用自各有許多模様元亨利貞仁義禮智金木水火春夏秋冬以此四者時時涵泳其味無窮本語云以此四者時時涵泳玩味儘好仁義禮智性之大目皆是形而上者形上從仁義禮智中出惻隠之心仁也愛父母愛兄弟愛鄉黨愛朋友故舊各有等差即義也禮亦然其全文云仁是發出來底及至發出來有截然不可亂處便是義如水流動處是性流為江河匯為池沼便是義如惻隠之心是仁愛父母愛兄弟愛鄉黨愛朋友故舊有許多等差便是義且如敬只是一箇敬君敬長敬賢便有許多般様禮也只是如此如天子七廟諸侯五廟大夫三適士二這便是禮其或七或五或三或二之不同便是義禮是理之節文義是理之所宜處吕與叔説天命之謂性云自斬至緦喪服異等而九族之情無所憾自王公至皂𨽻儀章異制而上下之分莫敢爭自是天性合如此一堂有十房父子到得父各慈其子子各孝其父而人不嫌者是合如此其慈其孝便是仁各親其親各子其子這箇理義這箇各事離不得流出來便是仁仁一動義禮智便隨在這裏不是要仁使時義却留在後面少間放出來其實一箇道理論着界分便有許多分别按此云仁是發出來底盖持其用而言仁字專言之則混然而難名必以仁義禮智四者兼舉而並觀則其意味情狀互相形比乃為易見盖人之性皆出於天而天之氣化必以五行為用故仁義禮智信之性即水火金木土之理也木仁金義火禮水智各有所主獨土無位而為四行之實故信亦無位而為四徳之實也仁義禮智信同具於性而其體渾然莫得而見至於遇物而動然後見其惻隠羞惡辭讓是非之用而仁義禮智之端於此形焉乃所謂情而程子以謂陽氣發處者此也但此四者同在一處之中而仁乃生物之主故雖居四者之一而四者不能外焉此易傳所以有偏言則一事專言則包四者之説固非獨以仁為性之統體而謂三者必已發而後見也大抵仁義禮智性也惻隠羞惡辭讓是非情也心則統乎性情者也以此觀之則區域分别而不害其同脉絡貫通而不害其别庶乎其得之矣張無垢謂當惻隠時體其仁朱子曰孟子論四端只欲人擴而充之則仁義禮智不可勝用不言當此之時别起一念以體其為何物也下云無垢此言猶是禪學意思只要想像認得此箇精靈而不求之踐履之實若曰一面擴充一面體認是一心而兩用之亦不勝其煩且擾矣朱子曰健順之體即性也合而言之則曰健順分而言之則曰仁義禮智仁禮健而義智順也李貫之曰天之運五行其實隂陽而已人之性五常其實健順而已仁之油然生意不可遏禮之燦然明晰不可亂健之為也義不拂夫可否之宜智不昧夫是非之别順之為也若夫信則體是理而不易者健也循是理而無所違者順也勉齋黄氏以為此義極精命辭尤確故附於此右兼言仁義禮智信西山讀書記卷五
