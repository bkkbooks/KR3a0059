body:
  text: 西山讀書記卷二十宋真德秀撰學書說命說曰王人求多聞時惟建事學于古訓乃有獲事不師古以克永世匪說攸聞王氏曰學道將以見之行事也非獨知之而已呂氏曰人君學問之博非以為觀美而已經綸天下之大業彌綸天下之大化此所謂建事也蔡氏曰古訓者古先聖王之訓載修身治天下之道二典三謨之類是也不師古訓而能長治久安者非說所聞甚言其無此理惟學遜志務時敏厥修乃來允懷于兹道積于厥躬惟斆學半念終始典于學厥德修罔覺張氏曰子路其言不遜為夫子之所哂則聖門之學以遜志為入路也呂氏曰為學必先虛心下氣乃能受天下之善自古聖賢為學無不自遜志始既能遜志又必不怠以充養而擴大之然後已之所修進進日益如井之泉愈汲愈來來者源源自生之意也然知此理者多持此念者少信能念兹在兹然後道聚於其身學者讀聖賢之書聞師友之教豈不欲從事惟不能篤行所以乍出入乍信疑苟信之篤無一毫僞心則所謂允懷也是心常存無所間斷則道自然參㑹貫通聚而不散是所謂積也惟斆學半此交修之義也大抵教人與受教者其功各半師舉一隅學者當以三隅反聖人之教引而不發上一半固賴提指之力下一半必自用功可也自古聖賢著書垂謨載之方冊其教止及於半其工夫之半學者必自加講求之力說之言及此蓋恐髙宗全倚之也孫氏曰厥德修罔覺董子所謂日加益而不自知也蔡氏曰始之自學學也終之教人亦學也一念終始常在於學則德之所修有不知其然者矣或曰斆於為學之道半之半須自得此說極為新巧但古人論學語皆平正的實不應此語獨爾險巧此蓋後世釋教機權誤以論聖賢之學也愚按蔡說與學記合然呂說亦有意味蓋說雖教高宗以為學之道然所發明者特半之而已自餘則高宗自用其功可也故曰念終始典于學未見為釋氏機權姑並存之又按不言始終而曰終始者學無止法也詩敬之日就月將學有緝熙于光明上文曰維豫小子不聰敬止云云蓋敬之敬之至日監在兹者羣臣進戒之詞也而王之答羣臣乃曰我不聰而未能敬也然願學焉庶幾日有所就月有所進續而明之以至於光明也玩此二語則成王之用力於學者可知矣髙宗成王皆王者之學然大學之道自天子至於庶人一而已矣曰遜志曰時敏曰允懷曰就將曰緝熙學者而不由此未有能進者也故以冠於本篇之首易乾九二君子學以聚之問以辨之寬以居之仁以行之程子曰學聚問辨進德也寬居仁行修業也易曰見龍在田利見大人君德也朱子曰蓋由四者以成大人之德也愚按乾天德也聖人之事也猶必以學成之學之不可已者如是九二曰庸言之信庸行之謹間邪存其誠善世而不伐德博而化九三曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也皆學之事也大畜象曰天在山中大畜君子以多識前言往行以畜其德程子曰人之蘊畜由學而大餘已見前或謂學至於不識不知乃為極致朱子曰詩人此語乃形容文王若學者必從知識入易曰多識大學曰致知論語子曰學而時習之不亦說乎朱子曰學之為言效也人性皆善而覺有先後後覺者必效先覺者之所為乃可以明善而復其初也習鳥數飛也學之不已如鳥數飛也說喜意也既學而又時時習之則所學者熟而中心喜說其進自不能已矣程子曰習重習也時復思繹浹洽於中則說也又曰學將以行之也時習之則所學者在我故說謝氏曰時習者無時而不習坐如尸坐時習也立如齊立時習也有朋自遠方來不亦樂乎朋同類也自遠方來則近者可知程子曰以善及人而信從者衆故可樂又曰說在心樂主發散在外人不知而不愠不亦君子乎尹氏曰學在己知不知在人何慍之有程子曰雖樂於及人不見是而無悶乃所謂君子愚謂及人而樂者順而易不知而不愠者逆而難非信之篤養之厚而得之深不足以與此故唯成德者能之然德之所以成亦曰學之正習之熟說之深而不已焉耳程子曰樂由說而後得非樂不足以語君子或問學之為效何也曰所謂學者有所效於彼而求其成於我之謂也以已之未知而效夫知者以求其知以已之未能而效夫能者以求其能皆學之事也曰學而時習何以說也曰人而不學則無以知其所以為人之理無以能其所以為人之事固不足以謂之人矣然學矣而不習則表裏扞格而無致其學之之道習矣而不時則工夫間斷而無以成其習之之功是以雖曰知之而枯燥生澀無可嗜之味雖曰能之而危殆杌隉無可即之安如是而求有以勝夫氣禀物欲之私亦何自而能得哉是以聖人之教使人既學矣而於其所學又必時時習之則其心與理相涵而所知者益精身與事相安而所能者益熟此其中心油然悅懌之味雖芻豢之甘於口亦不足以喻其美此學之始也曰以善及人而信從者衆若何而可樂耶曰聞之張子曰性者萬物之一原非有我之得私也惟大人為能盡其道故立必俱立知必周知愛必兼愛成不獨成彼自蔽塞而不能順吾理者則亦末如之何矣嘗以是言觀之而朋來之樂其指可知然吾之善未充而無以取信於彼雖欲求以告之亦將不吾顧矣惟其有以充諸身而形諸外則彼之望風而覿德者自將敬信服從之不暇蓋近者既至則逺者畢來以學於吾之所學而求以復其初凡吾之所得而悅諸心者彼亦將有以得而悅之而無物我之間是其歡欣交通融怡和樂之意所以盈於內而達於外者又豈手舞足蹈之可言哉是學之中也曰人不知而不愠何以為君子也曰常人之情人不知而不能不愠者有待於外也若聖門之學則其本心正以為己而已初非為是以求人之知也人知之人不知之亦何加損於我哉然人雖或聞此矣而信之有不篤養之有不厚守之有不固則居之不安而臨事未必果能真不動也今也人不見知而處之泰然略無纎介含怒不平之意非成德之士信之篤而養之厚守之固而居之安其孰能之故必如是而得夫君子之名茍自是日進而不已焉則不怨不尤下學上達以馴致於聖人亦不難矣此學之終也或曰學有大小此所謂學其大學耶曰不然也學而習習而說凡學皆然不以大小而有間也且灑掃應對之事正門人小子所宜先者而大學之基也聖人豈略之哉曰程子之於習有兩義焉何也曰重復思繹者以知者言也所學在我者以能者言也學之為道不越乎兩端矣曰時習之所以說諸說孰近曰夫習而熟熟而悅脉絡貫通最為親切程子所謂浹洽者是也曰朋來之樂奈何曰惟以程子之言求之然後見夫樂之實且其以善及人而信從者衆之云本九字爾而無一字之虛設也非見之明而驗之實其孰能與於此曰說樂皆出此心而程子有內外之辨何也曰程子非以樂為在外也以為積滿於中而發越乎外耳說則方得於內而未能達乎外也不愠之說孰為得曰程子得之至論其所以然者則尹氏為尤切使人之始學即知是說以立其心則庶乎其無慕於外矣南軒曰人有所當知有所當能皆天理也惟夫人未之知未之能也則貴於學焉學之為言效也效夫善而勉之於已也學貴於時習者重復溫繹其所巳知巳能者也蓋不習不時則其趣不熟其守不固荒疏危怠雖暫得之亦且失之矣惟夫學焉而時習之則浹洽貫通其說有不可既焉有朋自逺方來志同者應講習相滋其樂孰尚樂之義比於說為發舒也雖然朋來固可樂而人之不知亦不愠也蓋為仁由已亦豈與於知不知乎按二先生釋朋來而樂之義不同嘗參之詳說曰學既有得同類之人自遠而至已之所得有以及於人者廣人之所得有以裕於已者多則不但中心自說而已則朱子初說亦取人已相資之意而卒從程說者蓋巳之學僅有得焉能使同類之逺至必其善以及人然後從之者多子曰弟子入則孝出則弟謹而信泛愛衆而親仁行有餘力則以學文朱子曰謹者行之有常也信者言之有實也文謂詩書六藝之文程子曰為弟子之職力有餘則學文不修其職而先文非為巳之學也尹氏曰德行本也文藝末也窮其本末知所先後可以入德矣洪氏曰未有餘力而學文則文滅其質有餘力而不學文則質勝而野愚謂力行而不學文則無以考聖賢之成法識事理之當然而所行或出於私意非但失之於野而已南軒曰聖人之言貫徹上下此章雖言為弟為子之職始學者之事然充而極之為賢為聖蓋不外是也子夏曰賢賢易色事父母能竭其力事君能致其身與朋友交言而有信雖曰未學吾必謂之學矣朱子曰賢人之賢而易其好色之心好善有誠也致猶委也委致其身謂不有其身也四者皆人倫之大者而行之必盡其誠學求如是而已故子夏言有能如是之人苟非生質之美必其務學之至雖或以為未嘗為學我必謂之已學矣游氏曰三代之學皆所以明人倫也能是四者則於人倫厚矣學之為道何以加此子夏以文學名而其言如此則古人之所謂學者可知矣故學而一篇大抵皆在於務本吳氏曰子夏之言其意善矣然詞氣之間抑揚太過其流之弊將或至於廢學必若上章夫子之言然後為無弊也或問賢賢而言易色何也曰孔子兩言未見好德如好色而中庸亦以逺色為好賢之事則古人之言其以德色相為消長者舊矣南軒曰子夏之意非謂能如是則不待夫學也蓋所以貴乎學者在此而不在彼欲學者務其本也首言賢賢易色夫能親賢固學之先務也不曰不學而曰未學辭蓋涵蓄矣子曰君子不重則不威學則不固朱子曰重厚重威威嚴固堅固也輕乎外者必不能堅乎內故不厚重則無威嚴而所學亦不堅固也主忠信說已見前無友不如已者無毋通禁止辭也友所以輔仁不如已則無益而有損過則勿憚改勿亦禁止之辭憚畏難也自治不勇則惡日長故有過則當速改不可畏難而茍安也程子曰學問之道無他也知其不善則速改以從善而已程子曰君子自修之道當如是也游氏曰君子之道以威重為質而學以成之學之道必以忠信為主而以勝已者輔之然或吝於改過則賢者未必樂告以善道故以過勿憚改終焉南軒曰學以重為先重者視聽言動之際不敢以易也夫然則暴慢逺而德性尊其思必專其行必果其守必篤學之所以固也不然則無以持其外而非心易以入雖得之必失之主忠信主字有力蓋斯須而不忠信則思慮言行皆無所據依同於無物主乎忠信則立於實地德所以進也取友當求勝已者曾已之不如則惰志而德害矣過勿憚改言見過則速改也人所以不能改者以憚之故耳夫重者嚴於外者也忠信者存乎中者也存乎中所以制其外嚴於外所以保其中也而資友以輔之改過以成之君子之學不外於是而已矣子曰君子食無求飽居無求安敏於事而慎於言就有道而正焉可謂好學也已朱子曰不求安飽者志有在而不暇及也敏於事者勉其所不足謹於言者不敢盡其所有餘也然猶不敢自是而必就有道之人以正其是非則可謂好學矣凡言道者皆事物當然之理人之所共由者也尹氏曰君子之學能是四者可謂篤志力行者矣然不取正於有道未免有差如楊墨學仁義而差者也其流至於無父無君謂之好學可乎學者先須有根夲方有可求正者須是自去講學得七八分一就有道求正只一二語言便可剖判臨時旋學也難南軒曰於食與居則不求飽與安於言行則敏而謹是人也物欲不行而惟理義之是趨焉斯不謂之好學乎然必終之以就正有道者蓋世固有不拘物欲而勉於言行者然其所學毫釐之差則其弊有不可勝言者故必就夫有道而正然後謂之好學也正者正吾之偏也同世而親其人異世而求之書其為就正一也子曰學而不思則罔思而不學則殆朱子說已見前南軒曰自灑掃應對進退而往無非學也然徒學而不能思則無所發明罔然而已思者研窮其理之所以然徒思而不務學則無可據之地危殆不安矣二者不可不兩進也學而思則德益崇思而學則業益廣蓋其所學乃其思之所形而其所思即其學之所存也用工若此內外進矣子貢問曰孔文子何以謂之文也子曰敏而好學不恥下問是以謂之文也朱子曰凡人性敏者多不好學位髙者多恥下問故諡法有以勤學好問為文者蓋亦人所難也孔圉得諡為文以此而已蘇氏曰孔文子使太叔疾出其妻而妻之疾通於初妻之娣文子怒將攻之訪於仲尼仲尼不對命駕而行疾奔宋文子使疾弟遺室孔姞其為人如此而諡曰文此子貢之所以疑而問也孔子不沒其善言能如此亦足以為文矣非經天緯地之文也哀公問弟子孰為好學孔子對曰有顔回者好學不遷怒不二過不幸短命死矣今也則亡未聞好學者也朱子曰遷移也二復也怒於甲者不移於乙過於前者不復於後顔子克己之功至於如此可謂真好學矣程子曰顔子之怒在物不在已故不遷有不善未嘗不知知之未嘗復行不二過也又曰喜怒在事則理之當喜怒者也不在血氣則不遷若舜之誅四凶也可怒在彼已何與焉如鑑之照物妍媸在彼隨物應之而已何遷之有又曰如顔子地位豈有不善所謂不善只是微有差失才差失便能知之才知之便更不萌作張子曰慊於已者不使萌於再或曰詩書六藝七十子非不習而通也而夫子獨稱顔子為好學顔子之所好果何學歟程子曰學以至乎聖人之道也學之道奈何曰天地儲精得五行之秀者為人其本也真而靜其未發也五性具焉曰仁義禮智信形既生矣外物觸其形而動於中矣其中動而七情出焉曰喜怒哀懼愛惡欲情既熾而益蕩其性鑿矣故學者約其情使合於中正其心養其性而已然必先明諸心知所往然後力行以求至焉若顔子之非禮勿視聽言動不遷怒二過者則其好之篤而學之得其道也然其未至於聖人者守之也非化之也假之以年則不日而化矣今人乃謂聖本生知非學可至而所以為學者不過記誦文辭之間其亦異乎顔子之學矣或問韓子不二過之說何如曰愚嘗聞之師矣曰顔子之不二過者念慮小差隨即冰釋不復形於心術之間也若如韓子之言則是心常有過而直遏閉之使不形於事爾亦何足以為顔子乎蓋其所論過字則是而所以為不二者則非學者不可不審而别之也顔子到這裏直是渾然更無些子渣滓不遷怒如鑑懸水止不二過如氷解凍釋如三月不違又是已前事到這裏已自渾淪都是天理問云云曰此是顔子好學之效驗如此却不是只學此二事顔子學處專在非禮勿視聽言動上至此純熟乃能如此問張子謂顔子不二過是慊於已者不使萌於再夫子只說知之未嘗復行不是說其過不再萌於心某疑張子之言尤更精密至於程子說更不萌作則兼說行字矣先生曰萌作只是萌動蓋孔子且恁大綱說至程子張子又要人理㑹得分曉故復如此說到精極處明諸心知所往窮理之事也力行求至踐履之事也南軒曰怒之所以遷者以起怒於已故也起怒於已故溢於氣徴於色發於辭橫於胸中而不能化移於他物而莫之止就有能知怒之不當遷者方其怒甲也而視乙其辭氣終未能以遽化是皆起怒於已故耳君子非無怒也怒其逆於理而已理之所在如鑑付形各適其可已何與乎然則奚遷之有過之所以二者以其所以為過之根未除也人每患不見其過孰能見其過而遏止之其心一或有懈則其端復乘間而萌矣君子非無過也隱微之間有所少慊則謂之過惟其涵養純熟天理昭融於過之所形未嘗不知消而去之如日之銷冰無復餘迹然則奚二之有是二者蓋克己復禮之功也如是而後謂之好學則孔門之所謂學者蓋可知矣有志於道者其可不以是為標的乎黃氏曰顔子不遷不二蓋其存養之深省察之明克治之力持守之堅故其未怒之初鑑空衡平既怒之後氷消霧釋方過之萌瑕類莫逃既知之後根株悉拔此其所以為好學而集注以為克己之功也子曰知之者不如好之者好之者不如樂之者尹氏曰知之者知有此道也好之者好而未得也樂之者有所得而樂之也南軒曰譬之五穀知者知其可食者也好者食而嗜之者也樂者嗜之而飽者也知而不能好則是知之未至也好之而未及於樂則是好之未至也此古之學者所以自強而不息者與子曰君子博學於文約之以禮亦可以弗畔矣夫朱子曰君子學欲其博故於文無不考守欲其要故其動必以禮如此則可以不背於道矣程子曰博學於文而不約之以禮必至於汗漫博學矣又能守禮而由於規矩則亦可以不畔道矣博文而不約之以禮便是無歸宿處聖人教人有序未有不先於博者博學是致知約禮是踐履之實聖人之教學者之學不越於二事博文乃道問學之事是欲盡知天下事物之理約禮乃尊德性之事是欲常存吾心固有之理兩事須是互相發明約禮工夫深則博文之工夫愈明博文工夫至則約禮之工夫愈密博文所以驗諸事約禮所以體諸身博文如講明義理禮樂射御之數一一都去理㑹若是約則只守一箇禮日用間合禮者便是非禮者便不是南軒曰博學於文廣聞見也約之以禮守規矩也聞見雖多而不能約以規矩則操履不實亦豈得不違畔乎故必博文而約禮然後可以弗畔若顔子之所謂博文約禮則又深乎是言蓋有輕重也黃氏曰博約之義博謂泛而取之以極其廣約謂反而求之以極其要且如仁字凡洙泗所言皆不可不講是博學於文也及其反而求之以求其要則不過存此心而已子曰三年學不至於穀不易得也朱子曰榖祿也至疑當作志為學之久而不求祿如此之人不易得也楊氏曰雖子張之賢猶以干祿為問况其下者乎然則三年學而不至於榖宜不易得也南軒曰榖者取其成實之意故以訓善之成實焉三年學矣而不至於善則亦難得之矣蓋學者能用其力則必有月異而歲不同者苟惟鹵莽滅裂嵗月悠悠望其有成則亦難矣聖人斯言所以勉學者使之自強循循不已自有所至預期歲月而逆計所成則又為求獲之私心矣按二先生釋榖之義不同正宜參玩子曰篤信好學守死善道朱子曰篤厚而力也不篤信則不能好學然篤信而不好學則所信或非其正不守死則不能以善其道然守死而不足以善其道則亦徒死而已蓋守死者篤信之效善道者好學之功四者更相為用而不可一闕也危邦不入亂邦不居天下有道則見無道則隱說見前卷下同邦有道貧且賤焉恥也邦無道富且貴焉恥也南軒曰此言士之自處當如是也然篤信好學其本歟惟信之篤而後能好之好之然後能守之不移也子曰學如不及猶恐失之朱子曰言人之為學既如有所不及矣而其心猶竦然惟恐其或失之警學者當如是也程子曰學如不及猶恐失之不得放過才說姑待明日便不可也南軒曰學者常懷不及之心猶恐人心之或放况於自足自恕者乎以一善自居以一知自喜是自足者也今日不為而曰姑待明日小事放過而曰為其大者是自恕者也此皆人欲之所由長本心之所由失者也子曰可與共學未可與適道可與適道未可與立可與立未可與權說已見前子路使子羔為費宰朱子曰子路為季氏宰而舉之也子曰賊夫人之子賊害也言子羔質美而未學遽使治民適以害之子路曰有民人焉有社稷焉何必讀書然後為學言治民事神皆所以為學子曰是故惡夫佞者治民事神固學者事然必學之已成然後可仕以行其學若初未嘗學而使之即仕以為學其不至於慢神而虐民者幾希矣子路之言非其本意但理屈詞窮而取辦於口以禦人耳故夫子不斥其非而特惡其佞也范氏曰古者學而後入政未聞以政學者也蓋道之本在於修身而後及於治人其說具於方册讀而知之然後能行何可以不讀書也子路乃欲使子羔以政為學失先後本末之序矣不知其過而以口給禦人故夫子惡其佞也南軒曰子羔學未充而遽使為宰其本不立而置於事物酬酢之地將反戕賊其心矣故民人社稷固無非學而學固不獨在書籍之間然學必貴於讀書者以夫多識前言往行古之人所以蓄德者實有賴乎是德立於己而後可以言無適而非學也至於上聖生知之流宜莫待乎讀書矣而夫子每以好古為言蓋聖雖生知而亦必由是以成之也如子路之言將使學者以聰明為可恃而無復敦篤潜泳之功其甚至於廢古而任意為弊有不可勝言者故夫子責之之深也按范氏引學而後入政云云出左氏傳鄭子皮欲使尹何為邑子産曰少未知可否子皮曰使夫往而學焉子産曰不可子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其為美錦不亦多乎僑聞學而後入政未聞以政學也若果行此必有所害譬如田獵射御貫則能獲禽若未能登車射御則敗績厭覆是懼何暇思獲子皮曰善哉子産之言與此章頗類故附焉子曰古之學者為己今之學者為人程子曰為己欲得之於己也為人欲見知於人也程子曰古之學者為己其終至於成物今之學者為人其終至於喪已朱子曰聖賢論學者用心得失之際其說多矣然未有如此言之切而要者於此明辨而日省之則庶乎其不昧於所從矣若不為己看做甚事都只是為别人雖做得好亦不關己問曰這須要自看如一日之間小事大事只是道我合當做便如此做這便是無所為且如讀書只是自家合如此讀合如此理㑹身已才說要人知便是有所為大學或問云大抵以學者而視天下之事以為己事之當然而為之則雖甲兵錢穀籩豆有司之事皆為己也以其可以求知於世而為之則雖割股廬墓弊車羸馬亦為人耳善乎張子敬夫之言曰為己者無所為而然也此其語意之深切蓋有前賢所未發者云云學古齊針相古先民學以為己今也不然為人而已為己之學先成其身君臣之義父子之仁聚辨居行無怠無忽至足之餘澤及萬物為人之學燁然春華誦數是力纂組是夸結駟懷金煌煌煒煒世俗之榮君子之鄙惟是二者其端則微渺綿弗紊胡越其歸孔子曰生而知之者上也學而知之者次也困而學之又其次也困而不學民斯為下矣朱子曰困謂有所不通言人之氣質不同大約有此四等楊氏曰生知學知以至困學雖其質不同然及其知之一也故君子惟學之為貴困而不學然後為下南軒曰困而學如已放而求已失者也學道愛人章别見子曰由也汝聞六言六蔽矣乎對曰未也居吾語汝好仁不好學其蔽也愚好知不好學其蔽也蕩好信不好學其蔽也賊好直不好學其蔽也絞好勇不好學其蔽也亂好剛不好學其蔽也狂朱子曰蔽遮掩也六言皆美德然徒好之而不學以明其理則各有所蔽愚若可陷可罔之類蕩謂窮高極逺而無所止賊謂傷害於物勇者剛之發剛者勇之體狂躁率也范氏曰子路勇於為善其失之者未能好學以明之也故告之以此曰勇曰剛曰信曰直又皆所以救其偏也南軒曰學所以明善也不知學則徒慕其名而莫知善之所以為善矣好仁不好學則徒欲博愛而不明所施之先後故其蔽愚好知不好學則用其聰明而不知約之所在故其蔽蕩好信不好學則守其小諒而不知義之所存故其蔽賊好直不好學則務徑情而不知含蓄故其蔽絞絞者訐而已好勇不好學則犯難而不知止故其蔽亂好剛而不好學則務勝而不知反故其蔽狂是六者本為達德善行然而不好學則非所以為德行而反以自蔽學如行大道日闢而通不學如守暗室終窒而閉矣子夏曰日知其所亡月無忘其所能可謂好學也已矣朱子曰亡無也謂己之所未有尹氏曰好學者日新而不失南軒曰致其知而不舍故其知日新保其有而不違故其有常存日知其所亡謂日知其所未有也博學篤志章已見言仁篇子夏曰百工居肆以成其事君子學以致其道朱子曰肆謂官府造作之處致極也工不居肆則遷於異物而業不精君子不學則奪於外誘而志不篤尹氏曰學所以致其道也百工居肆必務成其事君子之於學可不知所務哉今按二說相須其義始備子夏曰仕而優則學學而優則仕朱子曰優有餘力也仕與學理同而事異故當其事者必先有以盡其事而後可以及其餘然仕而學則所以資其仕者益深學而仕則所以驗其學者益廣或問云云曰仕優則學為己仕而言也蓋時必有仕而未學如原伯魯者故有是言學優而仕為未仕者言也蓋未有以明乎修己治人之道則未可以仕耳子産於子皮有製錦之譏而夫子亦悅漆雕之對惡子路之佞程子以少年登髙科席勢為美官為不幸其意亦猶是耳子夏此章以先後之次推之其本意蓋如此而推其餘意則又以明夫仕未優而學則不免有背公徇私之失學已優而不仕則未免有愛身忘物之纍當時恐或兼有此意也背公徇私四字恐未安南軒曰大學之道在明明德在新民成已成物無二致也古之人學以終其身故仕優則學學優則仕終始於學而無窮已也愚按或問引原伯魯事出左氏傳昭十八年葬曹平公往者見周原伯魯焉與語不說學以語閔子馬閔子馬曰周其亂乎夫必多有是說而後及其大人大人患失而惑又曰可以無學無學則苟而可於是乎下陵上替能無亂乎夫學殖也不學將落原氏其亡乎子曰譬如為山未成一簣止吾止也譬如平地雖覆一簣進吾往也朱子曰簣土籠也書曰為山九仞功虧一簣夫子之言蓋出於此言山成而止少一簣其止者吾自止耳平地而方覆一簣其進者吾自往耳蓋學者自強不息則積少成多中道而止則前功盡棄其止其往皆在我而不在人也子曰苗而不秀者有矣夫秀而不實者有矣夫朱子曰榖之始生曰苗吐華曰秀成榖者實蓋學而不至於成有如此者是以君子貴自勉也南軒曰養苗者不失其耘耔無逆其生理雨露之滋日夜之養有始有卒而後可以臻厥成或舍而弗耘或揠而助長以至於一暴十寒則苗而不秀秀而不實矣學何以異於是有其質而不學苗而不秀者也學而不能有諸已秀而不實者也夫仁亦在乎熟之矣子曰後生可畏焉知來者之不如今也四十五十而無聞焉斯亦不足畏也已朱子曰孔子言後生年富力强足以積學而有待其勢可畏安知其後來不如我之今日乎然或不能自勉至於老而無聞則亦已矣自少而進者安知其不至於極乎是可畏也南軒曰後生可畏以其進之不可量也然茍至於四十五十於道無所聞則其不能激昻自進可知因循至是則無足畏者矣辭氣抑揚之間學者所宜深味也雖然有至於四十五十而知好學如中庸所謂困知勉行者聖人猶有望焉若後生雖有美質而悠悠嵗月則夫所謂四十五十者將轉盼而至可不懼哉又曰年四十而見惡焉其終也已朱子曰四十成德之時見惡於人則止於此而已勉人及時遷善改過也南軒曰見惡者有不善而見惡於人也此又甚於無聞者方其壯時不能用力以矯勵則終於淪棄可知矣此警懼學者使之激昂自進於早也自時習章至此皆聖人教人以為學之道十五志學以下則聖人自言其學故析而二之然其自言即所以教人又初非有二也子曰吾十有五而志于學朱子曰古者十五而入大學心之所之謂之志此所謂學即大學之道也志乎此則念念在此而為之不厭矣三十而立有以自立則守之固而無所事志矣四十而不惑於事物之所當然皆無所疑則知之明而無所事守矣五十而知天命說已見前六十而耳順聲入心通無所違逆知之之至不思而得也七十而從心所欲不踰矩隨其心之所欲而自不過於法度安而行之不勉而中也程子曰孔子生而知之也言亦由學而至所以勉進後人也立能自立於斯道也不惑則無所疑矣知天命窮理盡性也耳順所聞皆通也從心所欲不踰矩則不勉而中矣又曰孔子自言其進德之序如此者聖人未必然但為學者立法使之盈科而後進成章而後達耳胡氏曰聖人之教亦多術然其要使人不失其本心而已欲得此心者惟志乎聖人而示之學循其序而進焉至於一疵不存萬理明盡之後則其日用之間本心瑩然隨所意欲莫非至理蓋心即體欲即用體即道用即義聲為律而身為度矣又曰聖人言此一以示學者當優游㴠泳不可躐等而進一以示學者當日就月將不可半途而廢也愚謂聖人生知安行固無積纍之漸然其心未嘗自謂已至此也是其日用之間必有獨覺其進而人不及知者故因其近似以自名欲學者以是為則而自勉非心實自聖而姑為是退託也後凡言謙詞之屬意皆放此志是心之深處如今學者誰為不學只是不可謂之志學如果能志於學自住不得子曰十室之邑必有忠信如丘者焉不如丘之好學也朱子曰十室小邑也忠信如聖人生質之美者也夫子生知而未嘗不好學故言此以勉人言美質易得至道難聞學之至則可以為聖人不學則不免為鄉人而已可不勉哉胡氏曰十室之邑尚有忠信如孔子者况以天下之大萬民之衆千嵗之逺其可以學而入聖者宜亦多矣然自孟子以後以至於今讀書學問者不絶於世而求如曾閔者不能以一二數則以不知孔子所好之學而好之爾子曰述而不作信而好古竊比於我老彭朱子曰述傳舊而已作則創始也故作非聖人不能而述則賢者可及竊比尊之之辭我親之之辭老彭商賢大夫見大戴禮蓋信古而傳述者也孔子刪詩書定禮樂贊周易修春秋皆傳先王之舊而未嘗有所作也故其自言如此蓋不惟不敢當作者之聖而亦不敢顯然自附於古之賢人蓋其德愈盛而心愈下不自知其辭之謙也然當是時作者略備夫子蓋集羣聖之大成而折衷之其事雖述而功則倍於作矣此又不可不知也子曰默而識之學而不厭誨人不倦何有於我哉朱子曰識音志又如字識記也默識謂不言而存諸心也一說識知也不言而心解也前說近是何有於我言何者能有於我三者已非聖人之極致而猶不敢當則謙之辭也南軒曰默而識之言不暇論說默識夫理之所當然也在已則學不厭施諸人則誨不倦成已成物之無息也子曰德之不修學之不講聞義不能徙不善不能改是吾憂也尹氏曰德必修而後成學必講而後明見善能徙改過不吝此四者日新之要也苟未能之聖人猶憂况學者乎朱子曰講學自是講學修德自是修德如致知格物是講學誠意正心修身是修德博學審問慎思明辨是講學篤行是修德問德之不修曰如有害人之心便是仁之不修有穿窬之心便是義之不修葉公問孔子於子路子路不對朱子曰葉公楚葉縣尹沈諸梁字子高僭稱公也葉公不知孔子必有非所問而問者故子路不對抑亦以聖人之德實有未易名言者與子曰女奚不曰其為人也發憤忘食樂以忘憂不知老之將至云爾未得則發憤而忘食已得則樂之而忘憂以是二者俯焉日有孳孳而不知年數之不足但自言其好學之篤耳然深味之則見其全體至極純亦不已之妙有非聖人不能及者蓋凡夫子之自言類如此學者宜致思焉為學須要剛毅果决悠悠不濟事且如發憤忘食樂以忘憂是甚麼精神是甚麼骨力子曰我非生而知之者好古敏以求之者也朱子曰生而知之者氣質清明義理昭著不待學而知也尹氏曰孔子以生知之聖每云好學者非惟勉人也蓋生而可知者義理耳若夫禮樂名物古今事變亦必待學而後有以驗其實也南軒曰好古而又敏求也門人見夫子之聖謂生而知之不可跂及也故夫子以是告之使果能好古敏以求之則聖人亦豈不可希哉玩味辭氣其循循善誘可謂至矣子曰蓋有不知而作之者我無是也多聞擇其善者而從之多見而識之知之次也朱子曰不知而作不知其理而妄作也孔子自言未嘗妄作蓋亦謙辭然亦可見其無所不知也識記也所從不可不擇記則善惡皆當存之以備參考如此者雖未能實知其理亦可以次于知之者也南軒曰天下之事莫不有所以然不知其然而作焉皆妄而已聖人之言動無非天理也其有不知而作者乎雖然知未易至也故又言知之次者使學者有所持循由其序而至焉多聞擇善而從多見而識其善由聞見而求其善雖未及乎知之至然知之次也擇焉而益詳識焉而不已則其知豈不日新乎愚按多見而識一句二先生所釋不同以文義求之南軒似優達巷黨人曰大哉孔子博學而無所成名朱子曰達巷黨名其人姓名不傳博學而無所成名蓋美其學之博而惜其不成一藝之名也子聞之謂門弟子曰吾何執執御乎執射乎吾執御矣執專執也射御皆一藝而御為人僕所執尤卑言欲使我何所執以成名乎然則吾將執御矣聞人譽已承之以謙也尹氏曰聖人道全而德備不可以偏長目之也達巷黨人見孔子之大意其所學者博而惜其不以一善自得名於世蓋慕聖人而不知者也故孔子云云南軒曰達巷黨人大孔子之博學而疑其不能以偏成也夫豈知本末精粗一以貫之之道哉故夫子但舉一藝自居而又於藝之中復居其次者以見夫道之無所不在善觀聖人則於此亦可以得之不然則愈失之也其言則謙而不居其意則完備矣子曰莫我知也夫朱子曰此夫子自嘆以發子貢之問也子貢曰何為其莫知子也子曰不怨天不尤人下學而上達知我者其天乎不得於天而不怨天不合於人而不尤人但知下學而自然上達此但自言其反已自修循序漸進耳無以甚異於人而致其知也然深味其語意則其中自有人不及知而天獨知之之妙蓋在孔門惟子貢之智幾足以及此故特語以發之惜乎其猶有所未達也程子曰不怨天不尤人在理當如此又曰下學上達意在言表又曰學者須守下學上達之語乃學之要蓋凡下學人事便是上達天理然習而不察則亦不能以上達矣朱子語録下學者事也上達者理也理只在事中若真能盡得下學之事則上達之理便在此釋氏只說上達更不理㑹下學然既無下學如何上達問聖人亦有下學否曰聖人雖是生知何嘗不學如入太廟每事問吾十有五而志於學便是學也一物之中皆具一理就那物中見得個理便是上達如大而化之之謂聖聖而不可知之謂神然亦不離乎人倫日用之中但人不能盡所謂學耳果能學安有不達者下學是立腳只在這裏上達是見識自然超詣到得上達便只是這下學元不相離子曰賜也女以豫為多學而識之者與對曰然非與曰非也豫一以貫之說見前曽子忠恕章子曰吾嘗終日不食終夜不寢以思無益不如學也朱子曰此為思而不學者言之蓋勞心以必求不如遜志而自得也李氏曰夫子非思而不學者特垂訓以教人爾南軒曰學原於思思固所以為學也然思至於忘寢與食而不以學濟之則亦為無益也以思而不學則無益耳聖人固不為無益之思也即已而言所以教也仲尼焉學章見後傳授篇按論語一書凡教學者以修身治人之道無非學也今特取其正言學者入此編學者不當以是為拘也記學記玉不琢不成器人不學不知道學然後知不足教然後知困知不足然後能自反也知困然後能自強也故曰教學相長也說命曰斆學半其此之謂乎善學者師逸而功倍又從而庸之不善學者師勤而功半又從而怨之善問者如攻堅木先其易者而後其節目及其久也相說以解不善問者反此鄭氏曰言先易後難以漸入善待問者如撞鍾叩之以小者則小鳴叩之以大者則大鳴待其從容然後盡其聲不善答問者反此從讀如舂舂容謂重撞擊也始者一聲而已學者既開其端意進而復問乃極說之如撞鍾之成聲矣朱子曰注說非是從容正謂聲之餘韻從容而將盡者也言必答盡所問之意然後止也此皆進學之道也中庸君子尊德性而道問學全文見道體篇張子曰今日只將尊德性道問學為心目自求於問學者有所背否於德性有所懈否此義亦是博文約禮下學上達以此警䇿一年安得不長每日須求多少為益知所亡改得少不善此德性上之益讀書求義理編書須理㑹有歸著勿徒寫過又多識前言往行此學問上益也勿使有俄頃閒度逐日似此三年庶幾有進朱子曰尊德性而道問學博我以文約我以禮兩邊做工夫都不偏若於道理上看未精便須於尊德性上用功若德性上有不是便須於講學上著力三者並行庶互相發明可到廣大輝光博學審問已見前孟子曰君子深造之以道欲其自得之也自得之則居之安居之安則資之深資之深則取之左右逢其原故君子欲其自得之也朱子曰造詣也深造之者進而不已之意道則進為之方也資猶藉也左右身之兩旁言至近而非一處也逢猶值也原本也水之來處也言君子務於深造而必以其道者欲其有所持循以俟夫默識心通自然而得之於己也自得於己則所以處之者安固而不搖處之安固則所藉者深逺而無盡所藉既深則日用之間取之至近無所往而不值其所資之本也程子曰學不言而自得者乃自得也有安排布置者皆非自得也然必潜心積慮優遊厭飫於其間然後可以有得若急迫求之則是私己而已終不足以得之也南軒曰學貴於自得不自得則無以有諸已自得而後為己物也以其德性之知非他人之所與非聰明智力之所可及故曰自得深造之以道者言其涵泳之深也工夫篤至而後能有得不然則為臆度而已非自得也臆度者猶在此而想彼自得則此便是彼更無二也蓋所得未真實則中心必有欿然不安者自得則如水之必寒火之必熱不可得而易故居之安居之安則資乎此而所進日深矣資者憑藉據依之謂蓋居之既安則自得之味愈無窮也故曰資之深資之深則萬理素定於此事至物來隨而應之周流運用無非大端之所存故曰取之左右逢其原於是重言之曰君子欲其自得之也其示人至矣夫未之有得則何所居無所居則又何所資而取哉故自得其本也然欲其自得則有道矣非深造之以道不可也孟子曰博學而詳說之將以反說約也朱子曰言所以博學於文而詳說其理者非欲以誇多而鬭靡也欲其融㑹貫通有以反而說到至約之地耳蓋學非欲其徒博而亦不可以徑約也南軒曰天下之理常存於至約然求約有道其惟博學而詳說歟稽之前古考之當今以至於禮儀三百威儀三千朝夕從事而學焉所謂博也極天下之理講明問辨而不置焉所謂詳也博學詳說則心廣義精而所謂約者可得於言意之表矣故吾之博學詳說是將以反之於己而說約也學不博說不詳而曰我知約者是特陋而已矣若博學詳說而志不在於求約則是外馳其心務廣而貪多耳非所謂學也孟子曰有為者譬若掘井掘井九軔而不及泉猶為棄井也朱子曰八尺為仞言鑿井雖深然未及泉而止猶為自棄其井也呂侍講曰仁不如堯孝不如舜學不如孔子終未入於聖人之域終未至於大道未免為半途而廢自棄前功也南軒曰天下之事為之貴乎有成云云今夫士之為仁義固當循循不已以極其至若用力雖勞未有所臻而畫焉則亦不得為成人而已荀子曰學惡乎始惡乎終曰其數則始乎誦經終乎讀禮其義則始乎為士終乎為聖人真積力久則入學至乎沒而後止也君子之學也入乎耳著乎心布乎四體形乎動靜小人之學也入乎耳出乎口口耳之間財四寸耳程子曰學未至而其言至者循其言亦可以入道荀子曰真積力久乃入荀卿元不知此君子知夫不全不粹之不足以為美也故誦數以貫之思索以通之為其人以處之除其害者以持養之朱子曰司馬公答學者書說為學之法舉荀子四句云云此說亦好誦數云者想是古人誦書亦說遍數貫字訓熟如習貫自然之貫又訓通誦得熟方能通曉若誦不熟亦無可得思索學者固學為聖人也非學為無方之民也揚子曰視聽言貌思性所有也學則正否則邪首句云學所以修性也今删去習乎習以習非之勝是也况習是之勝非乎學者亦審其是而已矣或曰焉知是而習之曰視日月而知衆星之小也仰聖人而知衆說之小也學之為王者事其已久矣堯舜禹湯文武汲汲仲尼皇皇愚按世人多言帝王之學與儒者不同此不知學者之言也凡學便當講求王者之事大學書自格物致知至於治國平天下天子至庶人皆所當學豈以位為間哉揚子此言有可取者故録之學者所以求為君子也求而不得者有矣夫未有不求而得者也大人之學為道也小人之學為利也百川學海而至於海丘陵學山而不至於山是故惡夫畫也周子曰聖希天賢希聖士希賢伊尹顔淵大賢也伊尹恥其君不為堯舜一夫不得其所若撻於市顔淵不遷怒不二過朱子曰皆賢人之事也志伊尹之所志學顔淵之所學此言士希賢也過則聖及則賢不及亦不失於令名三者隨其用力之淺深以為所至之近逺不失令名以其有為善之實也胡氏曰周子患人以發䇿决科榮身肥家希世取寵為事也故曰志伊尹之所志患人以廣聞見工文詞矜智能慕空寂為事也故曰學顔子之所學人能志此志而學此學則知此書之包括至大而其用無窮矣聖人之道入乎耳存乎心藴之為德行行之為事業彼以文辭而已者陋矣程子曰聖賢之言不得已也蓋有是言則是理明無是言則天下之理有闕焉如彼耒耜陶冶一不制則生人之道有不足矣聖賢之言雖欲已得乎然其包函盡天下之理亦甚約也後之人始執卷則以文章為先平生所為動多於聖人然有之無所補無之無所闕乃無用之贅言也不止贅而已既不得其要則離真失正反害於道必矣問作文害道否曰害也凡為文不專意則不工若專意則志局於此又安能與天地同其大也書曰玩物喪志為文亦玩物也呂與叔有詩曰學如元凱方成癖文似相如殆類俳獨立孔門無一事只輸顔子得心齊此詩甚好古之學者惟務養情性其它則不學今為文者專務章句悅人耳目既務悅人非俳優而何曰古者學為文否曰人見六經便以謂聖人亦作文不知聖人亦隱發胸中之藴自成文耳所謂有德者必有言也曰遊夏稱文學何也曰游夏亦何嘗秉筆學為詞章也且如觀乎天文以察時變觀乎人文以化成天下此豈詞章之文也上蔡謝氏曰學者先學文鮮有能至道至如博覽泛觀亦自為害故明道先生教豫嘗曰賢讀書切勿尋行數墨朱子曰古之聖賢其文可謂盛矣然初豈有意於為如是之文哉有是實於中則必有是文於外如天有是氣則必有日月星辰之光耀地有是形則必有山川草木之行列聖賢之心既有是精明純粹之實以旁薄充塞乎其內則其著見於外者亦必自然條理分明光輝發越而不可掩蓋不必託於言語著於簡册而後謂之文但自一身接於萬事凡其語默動靜人所可得而見者無適而非文也姑舉其最而言則易之卦畫詩之詠歌書之記言春秋之述事與夫禮之威儀樂之節奏皆已列為六經而垂萬世其文之盛後世固莫能及然其所以盛而不可及者豈無所自來而世亦莫之識也又嘗以書答以詩來者云諸詩亦佳但此等亦是枉費工夫不切自已底事若論為學治己治人有多少事在如天文地理禮樂制度軍旅刑法皆是著實有用事業無非自己本分內事古人六藝之教所以游其心者正在於此其與空言以校工拙於篇牘之間者其損益相萬矣程子曰古之學者一今之學者三異端不與焉一曰文章之學二曰訓詁之學三曰儒者之學欲趨道舍儒者之學不可言學便以道為志言人便以聖為志上文云莫說道將第一等遜與别人且做第二等才如此說便是自棄雖與不能居仁由義者等差不同其自棄一也云云楊氏曰學者學聖賢之所為也欲為聖賢之所為須是聞聖賢所得之道若只要博通今古為文章作忠信願慤不為非義之士而已則古來如此等人不少然以為聞道則不可學而不聞道猶不學也志學之士當知天下無不可為之理無不可見之道思之宜深無使心支而易昏守之宜篤無使力淺而易奪要當以身體之以心驗之則天地之心日陳露於目前古人之大體已在我矣不然是未免口耳之學古之學者以聖人為師其學有不至故其德有差焉人見聖人之難為也故凡學以聖人為可至必以為狂而切笑之夫聖人固未易至若舍聖人而學是將何所取則乎以聖人為師猶學射而立的然的立於彼然後射者可視之而求中若其中不中則在人而已不立之的以何為凖胡氏曰有志於學當以聖人為則有志於天下當以宰相自期朱子曰學者大要立志所謂志者只是直截要學堯舜孟子道性善言必稱堯舜此是真實道理世子自楚反復見孟子孟子曰世子疑吾言乎夫道一而已矣這些道理更無走作只是一個性善可至堯舜下文引成覸顔子公明儀所言便見得人人皆可為也學者立志須教勇猛自當有進志不足以有為此學者之大病又曰世俗之學所以與聖賢不同者亦不難見聖賢直是真個去做說正心直要心正說誠意直要意誠修身齊家皆非空言今之學者說正心誠意修身不過將聖賢許多說話吟咏諷誦而已或掇拾言語綴緝時文如此為學却於自家身上有何交涉今之朋友固有樂聞聖賢之學而終不能去世俗之陋者無他只是志不立爾學者大要立志才學便要做聖人是也又按程子曰人之為學忌先立標凖若循循不已自有所至矣朱子謂以聖為志而忌立標凖者必有事焉而勿正也循循不已而自有所至者心勿忘勿助長也此義又當參玩云君子之學必日新日新者日進也不日新者必日退未有不進而不退者唯聖人之道無所進退以其所造者極也又曰今之為學者如登山麓方其迤邐莫不闊步及到嶮處便止須是要剛决果敢以進知之必好之好之必求之求之必得之古人此個學是終身事果能顛沛造次必於是豈有不得道理又曰人之學不進只是不勇胡氏曰學者須要一日進如一日一年進如一年朱子曰為學須是痛切懇惻去做工夫使饑忘食渴忘飲始得又曰須磨厲精神去理㑹天下事非燕安暇豫之可得又曰陽氣發處金石亦透精神一到何事不成今之學者全不曾發憤又曰進取得失之念放輕却將聖賢格言處研窮考究若悠悠地似做不做如捕風捉影有甚長進今日是這樣人明日也是這樣人學者須是直前做去莫起計獲之心又曰為學須自覺得今是而昨非日改而月化方是長進問人氣力怯懦於學有妨否曰為學在立志不干氣稟怯弱事又曰立志要如饑渴之於飲食才有悠悠便是志不立古之學者優遊饜飫有先後次序今之學者只作一場話說務髙而已常愛杜元凱語若江海之浸膏澤之潤渙然冰釋怡然理順然後為得也今之學者往往以游夏為小不足學然游夏一言一事總是實後之學者好髙如人游心於千里之外然自身却只在此朱子曰學者之志固不可不以遠大自期然觀孔門之教則其所從言者至為卑近不過孝弟忠信持守誦習之間而於所謂學問之全體初不察察言也若其髙弟弟子亦多僅得其一體夫以夫子之聖諸子之賢其於道之全體豈不能一言盡之以相授受而顧為是拘拘者以狹道之傳畫人之志何哉蓋道之全體雖髙且大而其實未嘗不貫乎日用隱微切近之間苟悅其高而忽於近慕於大而略於細則無漸次經由之實而徒有懸想跂望之勞亦終不能以自達矣故聖人之教循循有序不過使人反而求之至近至小之中博之以文以開其講學之端約之以禮以嚴其踐履之實使之得寸則守其寸得尺則守其尺如是久之日滋月益然後道之全體乃有所鄉望而漸可識有所循習而漸可能耳又曰為學乃終身事業非可索於咄嗟指顧之間者但當循序講明著實持守不令日用之間少有間斷如是久久當自得之不當較計功程如世之出舉錢商子本者之營營也又答學者書云示喻足見所存之逺大然以某所聞聖賢之學則見其心之所存不離乎日用尋常之近小而其逺者大者自不待於他求初不若是其荒忽放浪而無所歸宿也故曰下學而上達又曰學問之道無他求其放心而已矣此聖賢終身事業某也少嘗有志焉今老且死尚恨未能有以得其倣佛也又曰必欲實為學亦當有以自致其力於日用之間存心養氣讀書窮理積其精誠循序漸進然後可得决非躐等坐馳之所能至也南軒亦曰聖門之學循循有序非若異端驚夸籠罩自謂一超徑詣卒為窮大而無所據也近世一種學者之弊渺茫臆度更無講學之功其意見只類一超徑詣之說非惟自誤亦且誤人不可不察學者須是務實不要近名有意近名則為僞也大本已失更學何事為名與為利清濁雖不同然其利心則一也又曰夫子疾沒世而名不稱焉者疾沒身無善可稱云爾非謂疾無名也名者可以厲中人君子所存非所汲汲朱子與人書曰聞深以好名為戒此固然矣然偏持此論將恐亷隅毁頓其弊有甚於好名者故先聖云君子疾沒世而名不稱焉又曰君子求諸已詳味此言不偏不倚表裏該備此其所以為聖人之言歟學者要當於此玩心則勿忘勿助長之間天理卓然事事物物無非至當矣愚按程子之言至矣朱子之論尤學者所宜知故附此科舉不慮妨功惟慮奪志朱子曰科舉之學誤人知見壞人心術其技愈精其害愈甚又曰今學者之病最是先學作文干祿使心不寧靜不暇深究義理故於古今之學義利之間不復能察其界限分别之際而無以知其輕重取舍之所宜所以誦數雖博文詞雖工而祗以重為此心之害要須反此然後可以議為學之方耳又告學者云若賢者以此言為不繆則願以定省應接之餘功收拾思慮完養精神暫置其所已學者勿令淘湧鼓發狂閙却於此處深察前所謂古今之學義利之間粒剖銖分勿令交互則其輕重取舍之極自當判然於胸中不待矯拂而趣操自分聖學之門庭始可以漸而推尋矣此是學者立心第一義此志已定然後修己治人之方乃可决擇而修持爾又曰向來人讀書為科舉計已自是末了如今又全不讀書而應舉又末之末者若以今世之所習雖使貴窮公相也只是個沒見識底人若依古聖賢所教做去雖極貧賤身自躬耕而胸次亦自浩然視彼汚濁卑下之徒曾犬彘之不若邵子曰至理之學非至誠則不至學不際天人不足謂之學學不至於樂不可謂之學或問才難何謂也曰臨大事然後見才之難也何獨言才曰才者天之良質也學者所以成其才也曰古人有不由學問而能立功業者何必學曰周勃霍光能成大事惟其無學故未盡善也人無學則不能燭理不能燭理則固執而不通問才由天資可學至否胡文定公曰豈有見理而不能處事又曰或問伊川量可學否曰學進則識進識進則量進學在不止故王通云沒身而已張子曰為學大益在自求變化氣質不爾皆為人之弊卒無所發明不得見聖人之奧呂與叔論變化氣質已見言誠篇或問氣質之偏如何救得朱子曰要緊只是看教大底道理分明偏處自見得如暗室求物把火來便照見若只管去摸索費盡心力只是不見得大底道理分明有病痛處也自㑹變移不自知自不消得費力又曰如其窄狹則當涵泳廣大氣象如其頽墮則當涵泳振作氣象為學當看自家有何病痛如覺語言多便用簡默意思疏濶便加細密覺得輕浮淺易便須深沉重厚程先生所謂矯輕警惰蓋如此南軒與方疇書曰人之性善然自非上智生知其氣禀不能無偏學也者所以化其偏而若其善也氣稟之偏其始甚微惟夫習而不察日以滋長非用力之深末由返也故傳稱強矯強矯云者揉而正之也顧毋恃夫天資之美必深察其所偏致知力行勉自矯焉異時相見當觀氣質變化之淺深而知學力之進否也又曰氣質雖美而有限天理至微而難眀伊欲化其有限而著其難明其惟學而已矣學也者所以成身也無以成其身則拘於氣質而不能以自通雖曰有是善而其不善者固多矣抑其所謂善者亦未免日淪於私意而不自知也就其中雖間有所禀持異於衆者其事業終有盡日月為可惜何者天理不明本不立故爾又與薛士龍書曰每念時事若此良由士大夫鮮克務學之故蓋天理之微為難存氣習之偏為難矯譬諸射者在此有秋毫之未盡則於彼有尺尋之差矣又與朱文公書曰兩從其甫詩問日用間事使人歎服者固多然其間於氣禀偏處未能盡變於舊自他人謂為豪氣底事自學者論之只是氣禀病痛元晦所講要學顔子却不於此等偏處下自克之功豈不害事顧以平時視為細故者作大病醫療異時相見當觀變化氣質之功又云來者多言酒酣氣張悲歌慷慨如此等類恐皆平時血氣之習未能消磨者不可作小病看每念人心易偏氣習難化君子多因好事上不覺乘快偏了若曰偏則均為偏耳又曰山中諸詩紆餘淡泊諷之不能已但覺其間猶時有未和平之語此非是語病正恐發處氣稟所偏尚微有存也東萊呂氏曰人之為學最當於矯揉氣質上做工夫如懦者當強急者當緩視其偏而用力焉又曰近思為學必須於平日氣稟資質上驗之如滯固者疏通顧慮者坦蕩智巧者易直苟未如此轉變要是未得力爾又曰𢎞毅二字最好今寬緩者必不能毅發强者必不能𢎞又曰大抵稟付偏處便消磨得九分觸事遇物此一分依前張主要通體融化得盡乃可學者大不宜志小氣輕志小則易足易足則無由進氣輕則以未知為已知未學為已學義理之學亦須深沉方有造非淺易輕浮之可得也又曰須放心寬快公平以求之乃可見道况德性自廣大易曰窮神知化德之盛也豈淺心可得又曰學不能推究事理只是心粗如顔子未至於聖人處猶是心粗朱子曰學者輕於著書皆是氣識淺薄便作得如此所謂聖雖學作兮所貴者資便儇皎厲兮去道逺而蓋此理醲厚非便儇皎厲不克負荷者所能當子張謂執德不𢎞人多以寬說𢎞字大無意味蓋𢎞字有深沉重厚之意橫渠謂義理深沉方有造此說極佳又曰心粗一事學者之通病橫渠云顔子未至於聖猶是心粗一息不存即為粗病要在精思明辨使理明義精而涵養操存無須臾離無毫髮間則天理常存人欲消去其庶幾矣哉愚按張子三說本各一義今乃合而一之者蓋欲以淺易輕浮粗五字自戒而以深沉寬快公平精密自勉故也人多以老成則不肯下問故終身不知又為人以道義先覺處之不可復謂有所不知故亦不肯下問從不肯問遂生百端欺妄人我寧終身不知義理有疑則濯去舊見以來新意凡致思到說不得處始復審思明辨乃為善學若告子則到說不得處遂已更不復求博學以文者只欲得習坎心亨蓋人經歷險阻艱難然後其心亨通呂氏曰學者不欲進則已欲進則不可以有成心有成心則不可與進於道矣故成心存則自處以不疑成心亡則知所疑矣小疑則必小進大疑則必大進蓋疑者不安於故而進於新者也與叔五峰胡氏曰學欲博不欲雜欲約不欲陋學貴大成不貴小用朱子聖賢千言萬語只是使人反其固有而復其性耳上文云為己之學於他人無一毫干預又曰學問是自家合做底不知學問是缺缺了自家底今人把學問來做外面添底事看了學者自強不息則積少成多中道而止則前功盡棄聖賢之學本末精粗無不備學者須將身心作根柢又曰佛家一向撤去許多事只理㑹自身已其教雖不是其意却是要自理㑹所以它那下常有人今世儒者能守經者理㑹講解而已看史傳者計較利害而已那個是要理㑹身已從自家身已上做去不理㑹自身已說甚别人長短又曰為學最要在身心其次便是做事此是的實緊切處問學者講明義理之外亦須理㑹時政凡事當一一講明使先有一定之說庶臨事不至墻面先生曰學者若得胸中義理明從此去量度事物自然泛應曲當人若有堯舜聰明自做得堯舜事業若要一一理㑹則事變無窮難以並料隨機應變不可預定今之世文人才士開口便說國家利害把筆便述時政得失終濟得甚事只是講明義理以淑人心使世間識義理之人多何患政治之不舉耶學無非事事無非學為學雖有聰明之資必須作遲鈍之功始得下云既是遲鈍之資却做聰明底樣工夫如何得又曰今之學者本是困知勉行底資質却要學他生知安行底工夫便是生知安行底資質亦用下困知勉行工夫况是困知勉行底資質文章細事耳猶用力始工况學道乃天下至大至難之事而未嘗用旬月之功得乎本文云先生喻學者曰老蘇自言其初學為文之時取論語孟子韓子及其他聖賢之文兀然端坐終日以讀之者十八年方其始也入其中而恍然以疑觀於其外而駭然以驚及其久也讀之益精而其胸中豁然以明若人之言固當然者然猶未敢自出其言也積時既久胸中之言日益多不能自制試出而書之已而再三讀之渾渾乎覺其來之易矣豫謂老蘇但欲學古人說話聲響極為細事乃肯用功如此故其成就亦非常人所及如韓栁亦是如此其答李翊韋中立書可見然皆只是要作好文章令人稱賞而已究竟何預已事却用了許多歲月費了許多精神甚可惜也今人說要學道乃至天下第一至大至難之事却全然不曾著力蓋未有能用旬月工夫熟讀一卷書者及至見人泛然發問臨時凑合不曾舉得一兩行經傳成文不曾照得一兩處首尾相貫其能言者不過以己私意敷演立說與聖賢本意義理實處了無干涉何况望其更能反求諸已真實見得真實行得耶如此求師徒費腳力不如歸家杜門依老蘇法以二三年為期正襟危坐將大學論語孟子中庸及詩書禮記程張諸書分明易曉處反復讀之更就己身心上存養玩索著實行履有個入處方好求師證其所得而訂其謬誤是乃所謂就有道而正焉者而學之成也可冀矣又曰釋氏有清草堂者其始學時若無所入有告之曰子不見猫之捕鼠乎四足踞地首尾一直目睛不瞬心無他念惟其不動動則鼠無所逃矣清用其言乃有所入彼之學雖與吾異然其所以得之者則無彼此之殊學者宜以是自警愚按朱子二說皆欲人下真實專一之功既借喻於文人又託類於釋氏其可謂為人深切者矣故合為一以玩味之南軒張氏曰講學而明理則執天下之物不固而應天下之變不膠吾於天下之物無所惡而物無以纍我皆為吾役者也吾於天下之事無所厭而事無以汨我皆吾心之妙用也全文云天下之物衆矣紛綸膠轕日更於前可喜可怒可慕可愕所以蕩耳目而動心志者何可以勝計而吾以藐然之身當之知誘於外一失其所止則遷於物大人者統役萬物者也而顧乃為物役其可乎哉是以貴於講學也天下之事變亦不一矣幾微之形節奏之㑹毫髮呼吸之間得失利害有霄壤之勢吾朝夕與之接一有所滯塞則昧幾而失節其發也不審則其應也必盩一事之隳萬事之所由隳也豈不可懼乎是以貴夫講學也夫惟云云豈不有餘裕乎然所謂講學者寧他求哉致其知而已知者吾所固有也本之六經以發其藴泛觀千載以極其變即事即物身親格之超然㑹夫大宗則德進業廣有其地矣右專言學西山讀書記卷二十
