body:
  text: 西山讀書記卷二十三宋真德秀撰易要指大傳天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之朱子曰此四者聖人作易之所由也程子曰孔子感麟而作春秋麟不出春秋豈不作大抵須有發端處如畫八卦因見河圖洛書果無圖書八卦亦須作文因見賣兔者曰聖人見河圖洛書而畫八卦然何必圖書只有此兔亦可作八卦數便此中可起古聖人只取神物之至者耳朱子曰伏羲觀烏獸之文與地之宜那時未有文字只是仰觀俯察而已想見古人心細雖以鳥獸羽毛之微也盡察得有陰陽今人心粗如何見得或曰伊川見兔曰察此亦可以畫卦便是此義曰就這一端上亦可以見凡草木鳥獸無不有陰陽古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身遠取諸物於是始作八卦以通神明之德以類萬物之情朱子曰王昭素云與地之間諸本多有天字俯仰遠近所取不一然不過以驗陰陽消息兩端而已神明之德如健順動止之性萬物之情如雷風山澤之象易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業朱子曰一每生二自然之理也易者陰陽之變太極者其理也兩儀者始為一畫以分陰陽四象者次為二畫以分太少八卦者次為三畫而三才之象始備此數言者實聖人作易自然之次第有不假絲毫智力而成者易有太極太極者象數未形而其理已具之稱形器已具而其理無朕之目周子曰無極而太極邵子曰道為太極又曰心為太極此之謂也是生太極兩儀之判始生一奇一耦而為一畫者二是為兩儀其數則陽一而陰二在河圖洛書則奇偶是也周子所謂太極動而生陽動極而靜靜而生陰靜極復動一動一靜互為其根分陰分陽兩儀立焉邵子所謂一分為二者皆謂此也兩儀生四象兩儀之上各生一奇一偶而為二畫者四是謂四象其位則太陽一少陰二少陽三太陰四其數則太陽九少陰八少陽七太陰六周子所謂水火木金邵子所謂二分為四者皆謂此也四象生八卦四象之上各生一奇一偶而為三畫者八於是三才略具而有八卦之名矣其位則乾一兌二離三震四巽五坎六艮七坤八周禮所謂三易經卦皆八大傳所謂八卦成列邵子所謂四分為八者皆指此而言也大傳又言包犧畫卦所取如此則易非獨以河洛而作也蓋聖人於此仰觀俯察逺求近取固有以超然而默契於其心矣故自兩儀之未分也渾然太極而兩儀四象六十四卦之理已粲然於其中自太極而分兩儀則太極固太極也兩儀固兩儀也自兩儀而分四象則兩儀又為太極而四象又為兩儀矣自是而推由四而八由八而十六由十六而三十二由三十二而六十四以至於百千萬億之無窮雖其見於摹畫者若有先後而出於人為然其已定之形已成之勢則固已具於渾然之中而不容毫髮思慮作為於其間程子所謂加一倍法可謂一言以蔽之而邵子所謂畫前有易者又可見其真不妄矣世儒於此或不之察往往以為聖人作易蓋極其心思探索之巧而得之甚者至謂凡卦之畫必由蓍而後得其誤益以甚矣八卦之上各生一奇一偶而為四畫者十六於經無見邵子所謂八分而為十六者是也又為兩儀之上各加八卦又為八卦之上各加兩儀也四畫之上各生一奇一偶而為五畫者三十二邵子所謂十六分為三十二者是也又為四象之上各加八卦又為八卦之上各加四象也五畫之上各生一奇一偶而為六畫者六十四則兼三才而兩之而八卦之乘八卦亦周於是六十四卦之名立而易道大成矣周禮所謂三易之别皆六十有四大傳所謂因而重之爻在其中矣邵子所謂三十二分為六十四者是也闔闢往來乃易之道易有太極則承上文而言所以闔闢往來而無窮者以其有是理耳有是理則天地設位而易行乎其中矣兩生四四生八至於八則三變相因而三才可見故聖人因之為八卦以形變易之妙而定吉凶至此然後可以言書爾所謂易有太極者未可以書言也語子曰加我數年五十以學易可以無大過矣朱子曰劉聘君見元城劉公自言嘗讀他論加作假五十作卒蓋加假聲相近而誤讀卒與五十字相似而誤分也按此章之言史記作假我數年若是我於易則彬彬矣加正作假而無五十字蓋是時孔子年已幾七十矣五十字誤無疑也學易則明乎吉凶消長之理進退存亡之道故可以無大過蓋聖人深見易道之無窮而言此以教人使知其不可不學而又不可以易而學也所謂大過如當潛不潛當見不見當飛不飛皆過也周子曰元亨誠之通利貞誠之復大哉易也性命之源乎全文見四德篇朱子曰易者交錯代換之名卦爻之立由是而已天地之間陰陽交錯而實理流行一付一受於其中亦猶是也又曰聖人之精畫卦以示聖人之藴因卦以發卦不畫聖人之精不可得而見微卦聖人之藴殆不可悉得而聞朱子曰精者精微之意畫前之易至精之理也伏羲畫卦專以明此而已藴謂凡卦之所有如吉凶消長之理進退存亡之道至廣之業也有卦則因以形矣易何止五經之源其天地鬼神之奧乎陰陽有自然之變卦畫有自然之體此易之為書所以為文字之祖義理之宗也然不止此蓋凡管於陰陽者雖天地之大鬼神之幽其理莫不具於卦畫之中此聖人之藴必於此而寄之也程子傳序曰易變易也隨時變易以從道也其為書也廣大悉備將以順性情之理通幽明之故盡事物之情而示開物成務之道也聖人之憂患後世可謂至矣去古雖逺遺經尚存然而前儒失意以傳言後學誦言而忘味自秦而下蓋無傳矣豫生千載之後悼斯文之湮晦將俾後人沿流而求源此傳之所以作也易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占吉凶消長之理進退存亡之道備於辭推辭考卦可以知變象與占在其中矣君子居則觀其象而玩其辭動則觀其變而玩其占得於辭不逹其意者有矣未有不得於辭而能通其意者也至微者理也至著者象也體用一源顯微無間觀㑹通以行其典禮則辭無所不備故善學者求言必自近易於近者非知言者也豫所傳者辭也由辭以得意則在乎人焉延平李氏曰頃年聞沈元用問尹和靖伊川易傳何處是切要尹云體用一源顯微無間此是最切要處尹說固好然須是看得六十四卦三百八十四爻都有下落方始說得此語若學者未曽仔細理會便與他如此說豈不誤他朱子自謂聞此竦然始知前日空言無實全不濟事自此讀書益知詳細云問藉溪見譙天授問易天授令先看見乃謂之象一句藉溪未悟他日又問天授曰公豈不見象之在道猶易之有太極耶此意如何曰如此教人只好聽耳使某教之必先教他將六十四卦熟讀方可及此二說相類故附見來書云易之義本起於數謂義起於數非也有理而後有象有象而後有數易因象以明理由理而知數得其義則象數在其中矣理無形也故因象以明理理既見乎辭矣則可由辭以觀象故曰云云必欲窮象之隱微盡數之毫忽乃尋流逐末術家之所尚非儒者之務也答張閎中上文云易傳未傳自量精力未衰尚覬有少進爾覺耄則傳矣書雖未出學未嘗不傳苐患無受之者爾遺事云其後寢疾始以授尹焞張繹又曰易傳序云觀會通以行典禮如堯舜揖遜湯武征伐皆是典禮處只是常事又曰求言必自近易於近者非知言者也此伊川喫力為人處看易須著四日看一卦一日看卦辭彖象兩日看六爻一日統看方仔細又曰讀易之法先讀正經不曉則將彖象繫辭來解又曰知時識勢學易之大方也又曰大畜初二乾體剛健而不足以進四五陰柔而能止時之盛衰勢之强弱學易者所宜深識也易中只言反復往來上下易須是默識心通只窮文義徒費力作易自天地幽明至于昆蟲草木微物無不合觀易須看時然後觀逐爻之才一爻之間常包函數意聖人常取其重者為之辭亦有易中言之已多取其未嘗言者亦不必重事又有且言其時不及其爻之才皆臨時參考讀易須先識卦體如乾有元亨利貞缺却個便不是乾須要認得凡六爻人人有用聖人自有聖人用賢人自有賢人用衆人自有衆人用學者自有學者用君有君用臣有臣用無所不通因問坤卦是人臣之事人君有用處否先生曰是何無用如厚德載物人君安可不用又問胡先生解九四作太子恐不是卦義先生曰亦不妨只看如何用當儲二則做儲二使九四近君便作儲二亦不害但不要拘一若執一事則三百八十四爻只作得三百八十四件事便休也又曰介甫以武王觀兵為九四大無義理兼觀兵之說亦自無此事云云易聖人所以立道窮神則無易矣易要玩索乾坤古無此二字作易者特立此二字以明難明之道乾坤毁則無以見易須以意明之以此形容天地間事安有識得易後不知退藏於密密者用之源聖人妙處聖人用意深處全在繫辭又曰繫辭本欲明易若不先求卦義則看繫辭不得一本云繫辭所以解易須看了易方看得繫辭易八卦之位元不曽有人說先儒以謂乾位西北坤位西南言乾坤任六子而自處於無為之地此大故無義理風雷山澤之類便是天地之用豈天地外别有六子如人生六子則各任以事而父母自間風雷之類於天地間如人身之有耳目手足便是人之用也豈可謂耳目手足皆用而身無為乎按康節邵氏云至哉文王之作易也其得天地之用乎故乾坤交而為泰坎離交而為既濟也乾生於子坤生於午坎終於寅離終於申以應天之時也置乾於西北退坤於西南長子用事而長女代母坎離得位兌艮為耦以應地之方也王者之法其盡於此矣按此謂文王後天之易也程子之論與邵子不同今附此以俟參考程子又嘗曰今人讀易皆不識易為何物不過就上穿鑿而已若誦之不熟就上增一德亦不覺多减一德亦不覺少其譬如不識此几子若减一隻腳亦不知是少添一隻腳亦不知是多若識則自添减不得也又瑩中嘗愛文中子或問學易子曰終日乾乾可也此語最盡文王所以聖亦只是箇不已先生曰凡說經義如只管節節推上去可知是盡終日乾乾未盡得易據此句只做得九三使若謂乾乾是不已不已又是道漸漸推去則自然是盡只是理本如此又曰凡看書各有門庭詩易春秋不可逐句看尚書論語可以逐句看邵子曰君子於易玩象玩數玩辭玩意張氏曰此教人學易之法夫易者聖人長君子消小人之具也及其長也闢之於未然及其消也闔之於未然一消一長一闔一闢渾渾然無迹非天下之至神其孰能與於此復次剝明治生於亂乎姤次夬明亂生於治乎時哉時哉未有剝而不復未有夬而不姤者防乎其防邦家其長子孫其昌是以聖人貴未然之防是謂易之大綱知易者不必引用講解是謂知易孟子著書未嘗及易其間易道存焉但人見之者鮮耳人能用易是為知易如孟子可謂善用易者也又曰老子知易之體者也未詳易三百八十四爻真天文也楊氏曰夫易求之吾身斯可見矣又曰人人有易不知自求只於文字上用功欲何作用問易曰乾坤其易之門耶所謂門莫是學易自此入否曰不然易與乾坤豈有二物孰為內外謂之乾坤者因其健順而命之爾乾坤即易易即乾坤故孔子曰乾坤毁無以見易蓋無乾坤則不見易非易則無乾坤謂乾坤為易之門者陰陽之氣有動靜屈伸爾一動一靜或屈或伸闔闢之象也故孔子曰闔户謂之坤闢户謂之乾所謂門者如此夫氣之闔闢往來豈有窮哉有闔有闢變由是生其變無常非易而何夫易云云豈應外求橫渠於正䝉中曾略說破云乾坤之闔闢出入消長之象也非見得徹言不能及此云云朱子曰易字義只是陰陽莊生曰易以道陰陽亦不為無見又曰龜山過黃亭詹季魯家季魯問易龜山取紙畫圈墨塗其半云這便是易此說極好易只是一陰一陽做出許多般樣又曰易字有二義有變易有交易問正義云易者變化之總號代換之殊稱乃陰陽二氣生生不息之理此數語亦說得好先生云云天地之間别有甚事只是陰與陽兩個字看是甚麼物事都離不得只就身上體看才開眼不是陰便是陽密拶拶在這裏不是仁便是義不是剛便是柔只自家要做向前便是陽才收退便是陰意思才動便是陽才靜便是陰未消别看只是一動一靜便是陰陽伏羲只因此畫卦以示人易中之辭大抵陽吉而陰凶問亦有陽凶而陰吉者蓋有當為有不當為若當為而不為不當為而為之雖陽亦凶夫子讀易與常人不同是其胸中洞見陰陽剛柔吉凶消長進退存亡之理其贊易即就胸中寫出此理易中多言利貞貞吉利永貞之類皆是要人守正易大概欲人恐懼修省如讀坤之初六須知履霜堅氷之漸要人恐懼修省問易如何讀曰虗心以求其義而不執己見他書亦然上古之書莫尊於易中古以後之書莫大於春秋然此二書皆未易學今人才學此便入於鑿若讀此二書且當求其大義易尊陽抑陰進君子而退小人明消息盈虗之理春秋則尊王賤霸內中國而外夷狄明君臣上下之分所謂大義也橫渠云易為君子謀不為小人謀甚善然易中亦有時為小人謀如包承小人吉大人否亨言小人當否之時能包承君子則吉但此雖為小人謀乃所以為君子謀也易本為卜筮而作古人淳質初無文義故畫卦爻以開物成務故曰夫易何為而作也夫易開物成務冒天下之道如斯而已矣此易之大意如此又曰聖人作易本為欲定天下之志斷天下之疑而已非欲因此說道理也如人占得這爻便要人知得這爻之象是吉是凶吉便為之凶便不為如此則理自在其中如剝之上九碩果不食君子得輿小人剝廬其象如此謂一陽在上如碩大之果不及食而獨留於其上如君子在上而小人皆載於下則是君子之得輿也然小人雖載君子而乃欲自下而剝之則是自剝其廬耳蓋惟君子乃能覆蓋小人小人必賴君子以保其身今小人欲剝君子則君子亡君子亡則小人亦無所容其身如自剝其廬也且看自古小人欲害君子到害得盡後國破家亡小人曽有存活得者否故象曰君子得輿民所載也小人剝廬終不可用也若人占得此爻則為君子之所為者必吉而為小人之所為者必凶矣其象如此而理在其中却不是因欲說道理而後說象也問易云聖人作易之初蓋是仰觀俯察見得盈乎天地之間無非一陰一陽之理有是理則有是象有是象則其數便自在這裏非特河圖洛書為然蓋所謂數者秖是氣之分限節度處得陽必奇得陰必偶凡物皆然而圖書為特著耳於是聖人因之而畫卦其始也只是畫一奇以象陽畫一偶以象陰而已但才有兩則便有四才有四則便有八又從而再倍之便是十六蓋自其無朕之中而無窮之數已具不待安排而其勢有不容己者卦畫既立便有吉凶在裏蓋是陰陽往來交錯於其間其時則有消長之不同長者便為主消者便為客事則有當否之或異當者便為善否者便為惡即其主客善惡之辨而吉凶見矣故曰八卦定吉凶吉凶既决定而無差則以之立事而大業自此生矣此聖人作易教民占筮而以開天下之愚以定天下之志以成天下之事者如此但自伏羲而上只有六畫而未有文字可傳到得文王周公乃繫之以辭故曰聖人設卦觀象繫辭焉而明吉凶蓋是卦之未畫也因觀天地自然之法象而畫及其既畫也一卦自有一卦之象謂象有箇形似也故聖人即其象而命之名以爻之進退而言則如剝復之類以其形之肖似而言則如鼎井之類此是伏羲即卦體之全而立箇名如此及文王觀卦體之象而為之彖辭周公視卦爻之變而為之爻辭而吉凶之象益著矣大率天下之道只是善惡而已但所居之位不同所處之時既異而其幾甚微只為天下之人不能曉會所以聖人因此占筮之法以曉人使人居則觀象玩辭動則觀變玩占不迷於是非得失之塗所以是書夏商周皆用之其所言雖不同其辭雖不可盡見然皆太卜之官掌之以為占筮之用有所謂繇辭者左氏所載尤可見古人用易處蓋其所謂象者皆是假此衆人共曉之物以形容此事之理使人知所取舍而已故自伏羲而文王周公雖自略而詳所謂占筮之用則一蓋即那占筮之中而所以處置是事之理便在那裏了故其法若粗淺而隨人賢愚皆得其用蓋是文王雖有定象有定辭皆是虗說此箇地頭合是如此處置初不粘著物上故一卦一爻足盡無窮之事不可只以一事指定說他裏面也有指一事說處如利建侯利用祭祀之類其他皆不是指一事說此可見易之為用無所不該無所不遍但看人如何用之耳到得夫子方始純以理言雖未必是羲文本意而事上說理亦是如此但不可便以夫子之說為文王之說又曰聖人作易本是使人卜筮以决所行之可否而因之以教人為善如嚴君平所謂與人子言依於孝與人臣言依於忠者故卦爻之辭只是因依象類虗設於此以待扣而决者便以所值之辭决所疑之事似若假之神明而亦必有是理而後有是辭理無不正故其丁寧告戒之詞皆依於正又曰讀易之法竊疑卦爻之詞本為卜筮者斷吉凶而因以訓戒至彖象文言之作始因其吉凶訓戒之意而推說其義理以明之後人但見孔子所說義理而不復推本文王周公之本意因指卜筮為不足言而其所以言易者遂逺於日用之實類皆牽合委曲偏主一事而言無復包含該貫曲暢旁通之妙若但如此則聖人當時自可别作一書明諸義理以詔後世何用假托卦象為此艱深隱晦之詞乎故今欲凡讀一卦一爻便如占筮所得虗心以求其詞義之所指以為吉凶可否之决然後考其象之所以然者求其理之所以然者然後推於事使上自王公下至民庶所以修身治國皆有可用私竊以為如此求之似得三聖遺意又曰聖人因卦爻以垂戒多是利於正未有不正而利者如云夕惕若厲無咎若占得這爻必是朝乾夕愓戒謹恐懼可以無咎若不如此便有咎又云直方大不習無不利若占得這爻須是將自己身體看是直是方是大去做某事必得其利若自家未是直不曽方不曽大則無所往而得其利此是本爻辭如此到孔子又添說敬以直內義以方外本來只是卜筮聖人為之辭以曉人便說許多道理在上今學易非必待遇事而占方有所戒只平居玩味看所說道理於自家所處地位合是如何故云居則觀其象而玩其辭動則觀其變而玩其占又曰學易者須將易各自看伏羲易自作伏羲易看是時未有一辭也文王易自作文王易看周公易自作周公易看孔子易自作孔子易看必欲牽合作一意看不得又本義文有天地自然之易有伏羲之易有文王周公之易有孔子之易自伏羲以上皆無文字只有圖書最宜詳玩可見作易本原精微之意文王以下方有文字讀者宜各就本文消息不可便以孔子之說為文王之說也又曰易中言占者有其德則其中如是言無其德而得是占者却是反說如南蒯得黃裳元吉疑吉矣而蒯果敗者蓋卦辭明言黃裳元吉無黃裳之德則不吉也如奢侈之人而得共儉則吉之占明不共儉者是占為不吉也他皆倣此如此看自然意思活愚按魯穆姜筮得隨卦與南蒯得黃裳之義同又曰易只是個空底物事未有是事預說是理故包括得盡許多道理看人做甚事皆撞著他又曰易無思也無為也易是個無情底物事故寂然不動占之者吉凶善惡隨事著見乃感而遂通又曰易如一個鏡相似看甚物來都能照得如所謂潛龍只是有個潛龍之象自天子至於庶人看甚人來都使得孔子說作龍德而隱不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔潛龍也便是就事上指殺說了然會看底雖孔子說也活也無不通不會看底雖文王周公說底也死了須知得他是假託說是包含說假託謂不惹著那事包含是說個影象在這裏無所不包按朱子以易本為卜筮作故本義一書專以明此同時諸賢雖有異論而不能奪也故詳載其說使學者知先生本意云以上易之要指又程子曰易有百餘家難為遍觀如素未識文義且須看王弼胡先生王荆公三家理會得文義且要熟讀然後却有用心處又曰王弼注易元不見道但以老莊之意解說而已尹氏曰伊川於易傳潛心甚久未嘗容易下一字朱子曰伊川先生晚年所見甚實更無一句懸空說話今觀易傳可見又曰伯恭謂易傳理到語精平易的當立言無毫髮遺恨此乃名言又曰易傳明白無難看但伊川以天下許多道理散入六十四卦中若作易看即無意味惟將來作事看即字字句句有用處又曰易傳須先讀他書理會得義理了方有個入路見其精密處蓋其所言義理極妙初學者未使著不識其味如遺書之類人看著却有啓發處非是易傳不好但不當使未合看者看須是己知義理者得此便可磨礲入細此書於學者非啓發工夫乃磨礲工夫焞曰先生踐履盡是易其作傳只是寫成書要指孔氏書序曰孔子討論墳典斷自唐虞以下訖於周芟夷繁亂剪截浮辭舉其宏綱撮其樞要足以垂世立教典謨訓誥誓命之文凡百篇所以恢𢎞至道示人主以軌範也帝王之制坦然明白可舉而行三千之徒並受其義程子曰觀書須要見二帝三王之道如二典即求堯所以治民舜所以事君朱子曰看二典之書堯舜所以卷舒作用直如此熟張子曰尚書難讀蓋難得胸臆如此之大只欲解義則無難也朱子曰尚書初讀若於己不相關熟而誦之乃知堯舜禹湯文武之事無非切己者又曰二典三謨等篇義理明白句句皆實理下云堯之所以為君舜之所以為臣臯陶契益伊傅輩所言所行最好綢繆玩味體貼向自家身上來其味自别又曰伊尹告太甲五篇說得極切其所以治心修身處雖為人主言然初無貴賤之别又曰伊尹許多語句句是天理又嘗問學者曰尚書如何看曰須要考厯代之變先生曰世變難看唐虞三代事浩天闊逺何處測度不若求聖人之心如堯則考其所以治民舜則考其所以事君且如湯誓曰豫畏上帝不敢不正熟讀豈不見湯之心愚謂武王曰豫弗順天厥罪惟鈞是亦湯之心也東萊吕氏曰書者堯舜禹湯文武臯䕫稷契伊尹周公之精神心術盡寓其中觀書不求其心之所在夫何益欲求古人之心盡吾之心然後可以見古人之心以上書之要指朱子曰書有古文有今文古文乃壁中之書今文乃伏生口傳易讀書皆古文却是伏生口傳者難讀又曰書有兩體有極分曉者有極難曉者如盤庚大誥多方多士之類恐是當時召來而面命之自是當時一類說話至於湯誥微子之命君陳諸篇則是當時修其辭命所以百姓皆曉者有今時老師宿儒之所不曉者未必當時之人不識其詞義也又曰典謨諸書恐是曽經史官潤色來周誥諸篇恐是似今榜文曉諭方言俚語隨地隨時各自不同又曰尚書有不必解者有須著意解者有略須解者有不可解者如仲虺太甲諸篇只是熟讀義理自分明何俟於解如洪範則須著意解典謨諸篇辭稍雅典亦略須解若如盤庚諸篇已難解而康誥之屬則已不可解矣昔日吕伯恭相見語之以此渠云亦無可闕處因語之曰如此則是讀未熟後二年相見云誠如此語孔安國傳恐是魏晉間人作與毛公詩傳大不同序文亦不類漢文章書小序亦非孔子作與詩小序同問書解東坡為上否曰然又曰大綱好亦有得有失東萊改本書說無闕疑處又曰伯恭說書傷於巧愚按五十八篇之書無一語不及天無一語不主敬詩要指詩大序曰詩者志之所之也在心為志發言為詩朱子曰心有所之謂之志而詩所以言志也情動於中而形於言言之不足故嗟嘆之嗟嘆之不足故永歌之永歌之不足不知手之舞之足之蹈之也情者性之感於物而動者也喜怒憂懼愛惡欲謂之七情形見永長也情發於聲聲成文謂之音治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困聲不止於言凡嗟嘆永歌皆是也成文謂其清濁髙下疾徐疏數之節相應而和也然情之所感不同則音之所成亦異矣故正得失動天地感鬼神莫近於詩事有得失詩因其實而諷詠之使人有所創艾興起至其和平怨怒之極又足以逹於陰陽之氣而致祥召災蓋其出於自然不假人力是以入人深而見功速非他教之所及也先王以是經夫婦成孝敬厚人倫美教化移風俗先王指文武周公成王是指風雅頌之正經經常也女正位乎內男正位乎外夫婦之常也孝者子之所以事父敬者臣之所以事君詩之始作多發於男女之間而逹於父子君臣之際故先王以詩為教使人興於善而戒其失所以道夫婦之常而成父子君臣之道也三綱既正則人倫厚教化美而風俗移矣故詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌此一條本出於周禮大師之官蓋三百篇之綱領管轄也風雅頌者聲樂部分之名也風則十五國風雅則大小雅頌則三頌也賦比興則所以製作風雅頌之體也賦者直陳其事如葛覃卷耳之類是也比者以彼狀此如螽斯緑衣之類是也興者託物興詞如關雎兔罝之類是也蓋衆作雖多而其聲音之節製作之體不外乎此故太師之教國子必使之以是六者三經而三緯之則凡詩之節奏指歸皆將不待講說而直可吟咏以得之矣六者之序以其篇次風則為先而風則有賦比興矣故三者次之而雅頌又次之蓋亦以是三者為之也然比興之中螽斯專於比而緑衣兼於興兔罝專於興而關睢兼於比此其例中又自有不同者學者又不可以不知也上以風化下下以風刺上主文而譎諫言之者無罪聞之者足以戒故曰風風者民俗歌謠之詩如物被風而有聲又因其聲以動物也上以風化下者詩之美惡其風皆出於上而被於下也下以風刺上者上之化有不善則在下之人又歌詠其風以譏其上也凡以風刺上者皆不主於政事而主於文詞不以正諫而託意以諫若風之被物彼此無心而能有所動也至於王道衰禮義廢政教失國異政家殊俗而變風變雅作矣先儒舊說二南二十五篇為正風鹿鳴至菁莪二十二篇為正小雅文王至卷阿十八篇為正大雅皆文武成王時詩周公所定樂歌之詞弼至豳十三國為變風六月至何草不黃五十八篇為變小雅民勞至召旻十三篇為變大雅皆康昭以後所作故其為說如此國異政家殊俗者天子不能統諸侯故國國自為政諸侯不能統大夫故家家自為俗然正變之說經無明文今姑從之國史明乎得失之迹傷人倫之廢哀刑政之苛吟咏情性以風其上達於事變而懷其舊俗者也詩之作或出於公卿大夫或出於匹夫匹婦蓋非一人而序以為專出於國史則誤矣說者欲蓋其失乃云國史紬繹詩人性情而歌詠之以風其上則不惟文理不通而考之周禮太史之屬掌書而不掌詩其誦詩以諌乃大師之屬瞽矇之職也故春秋傳曰史為書瞽為詩說者之云兩失之矣故變風發乎情止乎禮義發乎情民之性也止乎禮義先王之澤也情者性之動而禮義者性之德也動而不失其德則以先王之澤入人者深至是而猶有不忘者也然此言亦其大概有如此者其放逸而不止乎禮義者固已多矣是以一國之事繫一人之本謂之風所謂上以風化下言天下之事形四方之風謂之雅雅者正也言王政之所由廢興也政有大小故有小雅焉有大雅焉形者體而象之之謂小雅皆王政之小事大雅則言王政之大體也頌者美盛德之形容以其成功告於神明者也告古毒反頌皆天子所制郊廟之樂歌頌容古字通故其取義如此是謂四始詩之至也史記曰關睢之亂以為風始鹿鳴為小雅始文王為大雅始清廟為頌始所謂四始也詩之所以為詩者至是無餘藴矣後世雖有作者其孰能加於此乎邵子曰刪詩之後不復有詩矣蓋此謂也語子曰詩三百一言以蔽之曰思無邪朱子曰詩三百十一篇言三百者舉大數也蔽猶蓋也思無邪魯頌駉篇之辭凡詩之言善者可以感發人之善心惡者可以懲創人之逸志其用歸於使人得其性情之正而已然其言微婉且或各因一事而發求其直指全體則未有若此之明且盡者故夫子言詩三百篇而惟此一言足以盡蓋其義其示人之意亦深切矣程子曰思無邪誠也范氏曰學者必務知要知要則能守約守約則足以盡博矣經禮三百曲禮三千亦可以一言蔽之曰毋不敬子貢曰貧而無諂富而無驕何如子曰可也未若貧而樂富而好禮者也子貢曰詩云如切如磋如琢如磨其斯之謂與子曰賜也始可與言詩已矣告諸往而知來者說已見前子夏問曰巧笑倩兮美目盼兮素以為絢兮何謂也子曰繪事後素曰禮後乎子曰起豫者商也始可與言詩已矣朱子曰禮必以忠信為質猶繪事以粉素為先起猶發也起豫言能起發我之志意謝氏曰子貢因論學而知詩子夏因論詩而知學故皆可與言詩楊氏曰甘受和白受采忠信之人可以學禮茍無其質禮不虗行此繪事後素之說也孔子曰繪事後素而子夏曰禮後乎可謂能繼其志矣非得之言意之表者能之乎商賜可與言詩者以此若夫玩心於章句之末則其為詩也固而已矣所謂起豫則亦相長之義也南軒曰凡禮之生生於質也無其質則禮安從施夫素雖待於絢然素所以有絢也無其質則何絢之有曰繪事後素者謂質為之先而文為後也子夏於此知禮之為後可謂能默會於語言之外矣子曰關雎樂而不淫哀而不傷朱子曰淫者樂之過而失其正者也傷者哀之過而害於和者也關雎之詩言后妃之德宜配君子求之未得則不能無寤寐反側之憂求而得之則宜其有琴瑟鐘鼓之樂蓋其憂雖深而不害於和其樂雖盛而不失於正故夫子稱之如此欲學者玩其辭審其音而有以識其性情之正也南軒曰哀樂情之為也而其理具於性樂而至於淫哀而至於傷則是情之流而性之汨矣樂而不淫哀而不傷發不踰則性情之正也非養之有素者其能然乎關睢之詩樂得淑女以配君子至於琴瑟友之鐘鼓樂之所謂樂而不淫也哀窈窕思賢才至於寤寐思服展轉反側所謂哀而不傷也玩其詞義可不深體於性情之際乎子曰誦詩三百授之以政不逹使於四方不能專對雖多亦奚以為朱子曰專獨也詩本人情該物理可以驗風俗之盛衰見政治之得失其言溫厚和平長於諷諭故誦之者必達於政而能言也程子曰窮經將以致用也世之誦詩者果能從政而專對乎然則其所學者章句之末耳此學者之大患也集義程子曰今人不會讀書如誦詩三百云云須是未讀詩時授之以政不達使於四方不能專對既讀詩後便達於政能專對四方始是讀詩未讀周南召南時一似面墻到讀後便不面墻方是有驗大抵讀書只此便是法子曰小子何莫學夫詩詩可以興朱子曰感發志意可以觀考見得失可以羣和而不流可以怨怨而不怒邇之事父逺之事君人倫之道詩無不備二者舉重而言多識於鳥獸草木之名其緒餘又足以資多識學詩之法此章盡之讀是經者所宜盡心也謝氏曰詩吟咏情性善感發人使人易直子諒之心易以生故可以興得性情之正無所固滯則閲理自明故可以觀心平氣和於物無競故可以羣優游不迫雖怨而不怒也無鄙倍心故可以怨黃氏曰可以觀謂可以考見己之得失也子謂伯魚曰女為周南召南矣乎人而不為周南召南其猶正墻面而立也與朱子曰為猶學也周南召南詩首篇名所言皆修身齊家之事正墻面而立言即其至近之地而一物無所見一步不可行或問二南何以為詩之首篇也曰周南之詩言文王后妃閨門之化召南之詩言諸侯之國夫人大夫妻被文王后妃之化而成德之事蓋文王治岐而化行於江漢之域自北而南故其樂章以召南名之用之鄉人用之邦國以教天下後世誠意正心修身齊家之道蓋詩之正風也孟子曰咸丘䝉問曰舜之不臣堯則吾既得聞命矣詩云普天之下莫非王土率土之濱莫非王臣而舜既為天子矣敢問瞽瞍之非臣如何曰是詩也非是之謂也勞於王事而不得養父母也曰此莫非王事我獨賢勞也故說詩者不以文害辭不以辭害志以意逆志是為得之如以辭而已矣雲漢之詩曰周餘黎民靡有子遺信斯言也是周無遺民也朱子曰言說詩之法不可以一字而害一句之義不可以一句而害設辭之志當以己意迎取作者之志乃可得之若但以其辭而已則如雲漢所言是周之民真無遺種矣惟以意逆之則知作詩者之志在於憂旱而非真無遺民也程子曰舉一字是文成句是辭公孫丑問曰髙子曰小辨小人之詩也孟子曰何以言之曰怨曰固哉髙叟之為詩也有人於此越人關弓而射之則已談笑而道之無他疏之也其兄關弓而射之則已垂涕泣而道之無他戚之也小辨之怨親親也親親仁也固矣夫髙叟之為詩也曰凱風何以不怨曰凱風親之過小者也小辨親之過大者也親之過大而不怨是愈疏也親之過小而怨是不可磯也愈疏不孝也不可磯亦不孝也孔子曰舜其至孝矣五十而慕說已見前程子曰詩者言之述也言之不足而長言之此詠歌之所由興也其發於誠感之深至於不知手之舞之足之蹈之故其入於人也亦深古之人幼而聞歌誦之聲長而識美刺之意故人之學由詩而興後世老師宿儒尚不知詩之義後學豈能興起乎二南之詩蓋聖人取之以為天下國家之法使邦家鄉人皆得歌詠之也有天下國家者未有不自齊家始故先言后妃次言夫人又次言大夫妻而古人有能修之身以化在位者文王是也故繼之以文王之詩周南召南如乾坤古者家有孰黨有庠故人未有不入學者三老坐於里門出入察其長幼揖遜之序如今所傳之詩人人諷誦莫非止於禮義之言今人雖白首未嘗知有詩至於里俗之言皆不可聞皆繫其習也以古所習安得不善以今所習安得不惡學者不可以不看詩看詩便使人長一格作詩者未必皆聖賢當時所取者取其意思止於禮義而已其言未必盡善如比其君以狡童之類是也朱子亦曰變風止乎禮義如泉水載馳之類固止乎禮義如桑中有甚禮義大序只說得那好底張子曰置心平易然後可以言詩涵泳從容則忽不自知而自解頥矣若以文害辭以辭害意則幾何而不為髙叟之固哉求詩者貴平易不要崎嶇蓋詩人之情性溫厚平易老成今以崎嶇求之其心先狹隘無由可見詩人之志平易故無艱嶮之言大率所言皆目前事而義理存乎其中以平易求之則思逺以廣愈艱嶮則愈淺近矣知詩者莫如孟子以意逆志讀詩之法也謝氏曰學詩須先識得六義體面而諷咏以得之朱子曰六義之說見於周禮大序其辨甚明其用可識而自鄭氏以來諸儒相襲不惟不能知其所用反行異說以汨陳之惟謝氏此說為庶幾得其用爾問詩備六義之㫖先生曰六義次序孔氏得之但六字之㫖極為明白只因鄭氏不曉周禮籥章之文妄以七月一詩分為三體故諸儒多從其說牽合附會紊亂顛錯費盡安排只扶合鄭氏曲解周禮一章而於詩之文義意㫖了無所益故鄙意不敢從之只且直依白文解義既免得紛紜枉費心力而六義又都有用處不為虗設蓋使讀詩者知是此義便作此義推求極為省力今人說得空有無限道理而無一㸃意味只為不曉此耳周禮以六詩教國子亦是使之明此義例推求詩意庶其易曉若如今說即是未通經時無所助於發明既通經後徒然增此贅說教國子者何必以是為先而詩之為義又豈止於六而已耶籥章之豳雅豳頌恐大田良耜諸篇當之不然即是别有此詩而亡之如王氏說又不然即是以此七月一篇吹成三調詞同而音異耳若如鄭說即兩章為豳風猶或可成音節至於四章半為豳雅三章半為豳頌不知成何曲拍耳又曰讀詩全在諷詠之功諷詠得熟則六義將自分明須使篇篇有個下落始得問詩中比興先生曰詩中比處少風雅頌只是今詩中風雅頌不須說每詩皆有如賦則是鋪陳其事七月流火九月授衣是也興處極多如鶴鳴詩却全是比分明是七個謎子淠彼涇舟蒸徒楫之周王于邁六師及之分明是比出深味意思便見得相似問關雎先生曰此是興詩興起也引物以起吾意如雎鳩是摰而有别之物荇菜是潔净和柔之物引此起興猶不甚逺其他亦有全不相類者雖皆是興只借他物以起吾意耳與關睢又略不同也問倬彼雲漢為章於天何以見作人之義先生曰倬彼雲漢則為章於天矣周王壽考則何不作人乎為此等語言自有個血脉流通處但涵泳久之自然見得條暢浹洽不必多引外來道理言語却壅滯詩人活底意思也周王既是夀考豈不作成人材此事已自分明更著個倬彼雲漢為章於天喚起來便愈見活潑潑地此六義所謂興也興乃興起之義凡言興皆當以此例觀之易以言不盡意而立象以盡意蓋亦如此君子之於詩非徒誦其言又將以考其情性非徒考其情性又將以考先王之澤蓋法度禮樂雖亡於此猶能併得其深微之意而傳之故其為言率皆樂而不淫憂而不困怨而不怒哀而不愁如緑衣傷己之詩也其言不過曰我思古人㑭無訧兮擊鼓怨上之詩也其言不過曰土國城漕我獨南行至軍旅數起大夫久役止曰自詒伊阻行役無期度思其危難以風焉不過曰茍無饑渴而已若夫言天下之事美盛德之形容固不待言而可知也其與憂愁思慮之作孰能優游不迫也孔子所以有取焉作詩者如此讀詩者其可以邪心讀之乎詩須諷咏以得之古詩即今之歌曲今之歌曲往往能使人感動至學詩却不然只為泥章句故也明道先生善言詩他又渾不曽章解句釋但優游玩咏吟哦上下便使人有得處瞻彼日月悠悠我思道之云逺曷云能來思之切矣終曰百爾君子不知德行不忮不求何用不臧歸於正也又云伯淳常談詩並不下一字訓詁有時只轉却一兩字㸃平掇地念過便教人省悟又因言鳶飛魚躍云云曰今人學詩將章句橫在肚裏怎生得脫灑去龜山楊氏曰今之說詩者多亦文害辭非徒以文害也又有甚者析字之偏旁以取義豈復有詩孟子引天生蒸民有物有則民之秉彛好是懿德其釋詩也於其本文加四字耳而語自分明與今之說詩者異矣詩全在體會仲素問詩如何看曰云云且如關雎之詩詩人以興后妃之德蓋如是也須當想像關雎為何物知其為摰而有别之禽則又想象關關為何聲知關關之聲為和而適則又想像在河之洲是何所在知河之洲為幽閒逺人之地則知如是之禽其鳴聲如是而又居幽閒逺人之地則后妃之德可以意曉矣是之謂體㑹惟體會得則看時有味又曰狼跋之詩曰公孫碩膚赤舄几几周公之遇謗何其安閒不迫也學詩者不在語言文字當想其氣味則詩意得矣問詩如何以興朱子曰讀詩見其不美者令人羞惡見其美者令人興起柏舟之詩曰靜言思之不能奮飛緑衣之詩曰我思古人實獲我心此可謂止乎禮義所謂可以怨即是喜怒哀樂發而皆中節處推此以觀則子之不得於父臣之不得於君朋友之不相信皆當以此意處之如屈原之懷石赴水賈誼言厯九州而相其君何必懷此都也便都過當了古人胸中發出意思自好看著三百篇詩則後世之詩多不足觀矣又曰古人情意溫厚寬和道得言語自恁地好讀詩之法只是熟讀涵泳自然和氣從胸中流出其妙處不可得而言不待安排措置務自立說也只恁平讀著意思自足須是打疊得這心光蕩蕩地不立一個字只管虗心讀它少問自然推出那個道理所以說以此洗心便是以這道理盡洗出那心裏物事渾然都是道理又曰大凡讀書先曉得文義了只是常常熟讀如看詩不須得著意去裏訓解但只平平地涵泳自好因舉池之竭矣不云自頻泉之竭矣不云自中四句吟咏者久之又嘗聽學者說鴟梟詩先生曰詩不是恁地看此只是論詩鴟梟之詩豈不知是周公遭變而作須是將來節節看取如明道先生善詩曰瞻彼日月悠悠我思思之切也百爾君子不知德行歸於正也只如此說段段脉絡分明此方是詩今意如鴟梟鴟梟既取我子一章乃說鳥自言既取我子矣又毁我室毋乃害我太甚邪逮天之未陰雨徹彼桑土言我為國家勤勞如此預備牢固宜無敢侮者今乃毁之以至於豫尾翛翛矣豫口卒荼矣風雨乃飄搖安得不哀鳴疾呼而告訴乎詩只是如此看便見得一篇之意又有問抑詩之序曰先生曰此序有得有失蓋其本例以為非美非刺則詩無所為而作又見此詩之次在宣王前故以為刺厲王又以國語有左史之言故又以為亦以自警以詩考之其曰刺厲王者失之而曰自警者得之也曰刺厲王所以為失者史記衛武公即位於宣王之三十六年不與厲王同時一也詩以小子目其君而爾汝之無人臣之禮與其所謂敬威儀謹出詞者自相背戾二也厲王無道貪虐為甚詩不以此針其膏肓而徒以威儀詞令為諄切之戒緩急失宜三也詩辭倨慢雖仁厚之主有所不能容厲王之暴何以堪之四也或以史記之年不合而以為追刺者則詩所謂聽用我謀庶無大悔非所望於既往之人五也曰自警所以為得者國語云云一也詩曰謹爾侯度二也又曰曰喪厥國三也又曰亦聿既耄四也詩意所指與淇澳所美賓筵所悔相表裏五也二說之得失其佐驗明白如此必去其失而取其得然後此詩之義明人之序者乃合而一之則其失者固已失之而其得者亦未為全得也然此猶即其詩之外而言之若但即其詩之本文而各以其一說反覆讀之則其訓義之顯晦踈密意味之厚薄淺深可以不待考證而判然於胸中矣此又讀詩之簡要真訣學者不可以不知也又曰讀詩正在於吟咏諷誦其委曲折旋之意正如自家作此詩相似自然能感發人之善心今人讀詩只將三兩句包了中間委曲周旋之意並不曾理會只是自將己意去包籠他濟得甚事且如女曰雞鳴士曰昧旦子興視夜明星有爛女曰雞既鳴矣可以興矣士曰尚昧旦也子興視夜則明星尚爛然也不成又去睡於是將翺將翔而弋鳬與鴈觀他意思如此好所以有感發人之善心底意真個有不知手之舞之足之蹈之始得問關雎疑周公所作曰凡言風者皆民間歌謠採詩者得之而聖人因以為樂以見風化流行淪肌洽髓而發於聲氣者如此而謂之風正以其自然而然如風之動物而成聲耳如關睢之詩正是當時之人被文王大姒德化之深心膽肝腸一時換了自然不覺形於歌詠如此故當作樂之時列於篇首以見一時之盛為萬世之法尤是感人妙處若云周公所作即國風雅頌無一篇是出於民言只與後世差官撰樂章相似都無些子發見活底意思亦何以致移風易俗之效邪又曰關雎之詩看得來是妾媵為之所以形容得寤寐反側之事外人不能及此詩體不同固有鋪陳其事而不加一詞而意自見者然必其事之可言若清人之詩是也至於桑中溱洧之篇則雅人莊士有難言之者矣孔子之稱思無邪也以為詩三百篇勸善懲惡雖其要歸不出於正然未有若此言之約而盡者耳非以作詩之人所思皆無邪也今必曰彼以無邪之思鋪陳淫亂之事而閔惜懲創之意自見於言外則曷若曰彼雖以有邪之思作之而我以無邪之思讀之則彼之自狀其醜者乃所以為吾警懼懲創之資邪而況曲為訓說而求其無邪於彼不若反而得之於我之易也巧為辨數而歸無邪於彼不若反而責之於我之切也若夫雅也鄭也衛也求之諸篇固各有其目矣雅則大雅若干篇是也鄭則鄭風若干篇是也是則自衛反魯以來未之有改而風雅之篇說者又有正變之别焉至於桑中小序政散民流而不可止之文與樂記合則是詩之為桑間又不為無所據者今必曰三百篇皆雅而鄭風不為鄭弼鄘衛之風不為衛桑中不為桑間亡國之音則其篇帙混亂邪正錯揉非復孔子之舊矣且於小序之無稽可笑者猶篤信之而於其有據者反不之信此又何耶夫二南正風房中之樂也鄉樂也二雅之正雅朝廷之樂也商周之頌宗廟之樂也是或見於序又或出於傳記皆有可考至於變雅則固已無施於事而變風又特里巷之歌其領在樂官者以為可以識時變觀土風而賢於四夷之樂耳今必曰三百篇皆祭祀朝聘之所用則未知桑中當薦何等之鬼神溱洧當接何等之賓客耶蓋古者天子巡守命大師陳詩以觀民風固不可問其美惡而悉存以訓也然其與先王雅頌之正篇帙不同施用亦異如前所陳則固不無於龎雜矣今於雅鄭之實察之既不詳於龎雜之名畏之又太甚顧乃引夫淫放之鄙詞而文以風刺之美說必欲强而置諸先王雅頌之列是乃反為龎雜之甚而不自知也夫以胡樂與鄭衛合奏猶曰不可而況強以桑中溱洧為雅樂又欲合於鹿鳴文王清廟之什而奏之宗廟之中朝廷之上乎其以二詩為猶止於中聲者太史公所謂孔子皆絃歌之以求合於韶武之㫖其誤蓋亦如此然古樂既亡無所考正則吾不敢必為之說獨以其理與其詞推之有以知其必不然耳又以為近於勸百諷一而止乎禮義則又信大序之過者夫有所謂諷者若漢廣知不可而不求大車有所畏而不敢則猶有所謂禮義之止也若桑中溱洧則吾不知其何詞之諷而何禮義之止乎哉若曰孔子嘗欲放鄭聲矣不當於此而又收之以備六籍也此則曽南豐於戰國䇿劉元城於三不足之論皆嘗言之又豈俟吾言而後白也哉因讀桑中之說而惜前論之不及竟又痛伯恭父之不可作也因書其後又曰桑中一詩乃淫奔者所自作序之首句以為刺奔誤矣其下云云者乃復得之樂記之說己略見本篇而或者以為刺詩之體固有鋪陳其事不加一辭而閔惜懲創之意自見於言外者此類是也豈必譙讓質責然後為刺也哉此說不然夫詩之為刺固有不加一辭而意自見者清人猗嗟之屬是已然嘗試玩之則其所賦之之人猶在所賦之外而詞意之間猶有賓主之分也豈有將欲刺人之惡乃反自為彼人之言以陷其身於所刺之中而不自知也哉其必不然也明矣又況此等之人安於為惡其於此等之詩計其平日固已自其口出而無慚矣又何待吾之鋪陳而後始知其所為之如此亦豈畏吾之閔惜而遂幡然遽有懲創之心耶以是為刺不惟無益殆恐不免於鼓之舞之而反以勸其惡也或者又曰詩三百篇皆雅樂也祭祀朝聘之所用也桑間濮上之音鄭衛之樂也世俗之所用也雅鄭不同部其來尚矣且夫子答顔淵之問於鄭聲亟欲放而絶之豈其刪詩乃録淫奔者之辭而使之合奏於雅樂之中乎亦不然也雅者二雅是也鄭者緇衣以下二十一篇是也衛者弼鄘衛三十九篇是也桑間衛之一篇桑中之詩是也二南雅頌祭祀朝聘之所用也鄭衛桑濮里巷狹邪之所歌也夫子之於鄭衛蓋深絶其聲於樂以為法而嚴立其詞於詩以為戒如聖人固不語亂而春秋所記無非亂臣賊子之事蓋不如是無以見當時風俗事變之實而垂鑒戒於後世故不得已而存之所謂道並行而不相悖者也按東萊吕氏曰桑中溱洧諸篇幾於勸矣夫子取之何也曰詩之體不同有直刺之者新臺之類是也有微諷之者君子偕老之類是也有鋪陳其事不加一辭而意自見者比類是也或曰後世狹邪之樂府冒之以此詩之序豈不可乎曰仲尼謂詩三百一言以蔽之曰思無邪詩人以無邪之思作之學者亦以無邪之思觀之閔惜懲創之意隱然自見於言外矣或曰樂記所謂桑間濮上之音安知非即此篇乎曰詩雅樂也祭祀朝聘之所用也桑間濮上之音鄭衛之樂也世俗之所用也雅鄭不同部其來尚矣戰國之際魏文侯與子夏言古樂新樂齊宣王與孟子言古樂蓋皆别而言之雖今之世太常教坊各有司局初不相亂況上而春秋之世寧有編鄭衛樂曲於雅音中之理乎桑中溱洧諸篇作於周道之衰其聲雖已降於煩促而猶止於中聲荀卿獨能知之其辭雖近於諷一勸百然猶止於禮義大序獨能知之仲尼録之於經所以謹世變之始也借使仲尼之前雅鄭果嘗龎雜自衛反魯正樂之時所當正者無大於此矣唐明皇令胡部與鄭衛之聲合奏談俗樂者尚非之曽謂仲尼反使雅鄭合奏乎論語答顔淵之問乃孔子治天下之大綱也於鄭聲亟欲放之豈有刪詩示萬世反收鄭聲以備六藝乎東萊之說如此故朱子辨之學者正當參玩也以上詩之要指朱子曰詩大序是後人作其間有病句小序極有難曉處多是附會如魚藻詩見有王在鎬之言便以為君子思古之武王似此類甚多詳見集傳又曰伊川有詩解數篇說小雅以後極佳又曰程先生詩傳取義太多詩人平易恐不如此亦曰子由詩解好處多歐公本義亦善東萊說詩太巧古人意思自寬平何嘗如此纎細拘迫又曰看詩須并叶韻讀古人文自是叶音詩譜韻乃吳棫才老作西山讀書記卷二十三
