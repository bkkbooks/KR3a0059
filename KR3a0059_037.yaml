body:
  text: 西山讀書記卷三十七宋真德秀撰隂陽易大𫝊一隂一陽之謂道按程子朱子之說以為隂陽氣也所以一隂一陽者道也道即所謂太極已詳具性命篇今不重出蓋自一而二則為隂陽以形體言之則曰天地以性情言之則曰乾坤自二而五則曰五行著而為象則為日月星辰形為功用則為雷霆風雨之屬總而名之則曰鬼神自人身言之則曰魂魄無往而非隂陽也故今所輯一曰隂陽二曰天地三曰乾坤四曰五行五曰日月星辰六曰雷霆風雨七曰鬼神而附以魂魄云立天之道已見仁義篇隂陽不測之謂神張子曰一物兩體氣也一故神兩在故不測兩故化推行乎一又曰氣有隂陽推行有漸為化合一不測為神問云云朱子曰橫渠說得極好一故神橫渠親注云兩在故不測只是這一物却周行乎事物之間如所謂隂陽屈伸往來上下以至行乎十百千萬之中無非這一箇物事所謂兩在故不測兩故化注云推行於一凡天下之事一不能化惟兩而後能化且如一隂一陽始能化生萬物雖是如此亦是推行於此一耳此說極精須當細玩又曰神化二字雖程子說亦不甚分明惟橫渠推出來推行有漸為化合一不測為神又曰一故神兩在故不測兩故化言兩在者或在隂或在陽在隂時全體都是隂在陽時全體都是陽化是逐一挨將去底一日復一日一月復一月節節挨將去便成一年這是化直卿云一故神猶一動一靜互為其根兩故化猶動極而靜靜極復動又曰陽化而為隂只恁消縮去無痕迹故謂之化隂變而為陽其勢浸長便覺有形迹著見故謂之變禮月令孟春是月也天氣下降地氣上騰天地和同草木萌動正義曰天地之氣謂之隂陽一年之中或升或降故聖人作易各分為六爻以象十二月陽氣之升從十一月為始陽氣漸升隂氣漸下至四月六陽皆升六隂皆伏至五月一隂初升隂氣漸升陽氣漸伏至十月六隂盡升六陽盡伏然則天氣下降地氣上騰五月至十月也地氣下降天氣上騰十一月至四月也是五月云天氣下降地氣上騰者陽氣五月之時為隂從下起而上排陽氣第六陽氣上極反退至十月之時六陽盡退皆伏於下至十一月陽之一爻始動地中至十二月陽漸升而微未能生物正月三陽既上成為乾卦乾體在下三隂為坤坤體在上乾為天坤為地天居地下故云天氣下降地在天上故云地氣上騰是陽氣五月初降至正月為天體而在坤下也十一月一陽初生而上排隂隂之上六漸退反歸於下至四月隂爻伏盡六陽在上五月一隂生六月二隂生隂氣尚微成物未具七月三隂生而成坤體坤體在下三陽為乾而體在上則是地氣在下天氣在上故正月為泰泰通也天地交通七月為否否塞也言天地隔塞所以十月云地氣下降天氣上騰者以十月之時純隂用事地氣凝凍寒氣逼物地氣又在下故曰地氣下降於時六陽從上退盡無復用事天體在上不近於物似若陽歸於天故云天氣上騰其實十月天氣反歸地下若審察於此無可疑者矣愚按正義大槩得之然隂氣漸下等語則未然程子屈伸往來之論盡之見後章仲春是月也生氣方盛陽氣發泄句者畢出萌者盡逹不可以內鄭氏曰時可宣出不可收斂也句屈生者芒而直曰萌仲夏之月日長至隂陽爭死生分鄭氏曰爭者陽方盛隂欲起也分猶半也君子齊戒處必掩身毋躁止聲色毋或進薄滋味毋致和節嗜欲定心氣百官靜事毋刑以定晏隂之所成晏安也仲秋是月也殺氣浸盛陽氣日衰水始涸孟冬是月也命有司曰天氣上騰地氣下降天地不通閉塞而成冬正義曰若以易卦言之七月三陽在上則天氣上騰三隂在下則地氣下降於十月云云者易含萬象言非一槩周流六虛事無定體若以氣象言之則十月為天氣上騰地氣下降若以氣應言之則從五月地氣上騰至十月地氣六隂俱升天氣六陽並謝天體在上陽歸於虗無故云上騰地氣六隂用事地體在下隂氣下連於地故云地氣下降各取其義不相妨也仲冬之月日短至隂陽爭諸生蕩鄭氏曰爭者隂方盛陽欲起也蕩謂物動將萌芽也君子齊戒處必掩身身欲寧去聲色禁嗜欲安形性事欲靜以待隂陽之所定朱子感興詩曰朱光遍炎宇微隂眇重淵寒威開九野陽德昭窮泉文明昧謹獨昏迷有開先幾微諒難忽善端本綿綿掩身事齊戒及此防未然閉關息商旅絶彼柔道牽楚辭天問篇明明暗暗惟時何為隂陽三合何本何化朱子曰明暗即謂晝夜之分也時是也榖梁子曰獨隂不生獨陽不生獨天不生三合然後生此問蓋曰明必有明之者暗必有暗之者是何物之所為乎隂也陽也天也三者之合何者為本何者為化乎今答之曰天地之化隂陽而已一動一靜一晦一明一往一來一寒一暑皆隂陽之所為而非有為之者也然榖梁言天而不以地對則所謂天者理而已矣成湯所謂上帝降衷子思所謂天命之性是也是為隂陽之本而其兩端循環不已者為之化焉周子曰無極而太極動而生陽動極而靜靜而生隂靜極復動一動一靜互為其根分隂分陽兩儀立焉正謂此也然所謂太極亦曰理而已矣董子曰天道之大者在隂陽陽為德隂為刑刑主殺而德主生是故陽常居大夏而以生育長養為事隂常居大冬而積於空虗不用之處以此見天之任德不任刑也天使陽出布施於上而主嵗功使隂入伏於下而時出佐陽陽不得隂之助亦不能成嵗功陽以成嵗為名此天意也王者承天意以從事故任德教而不任刑刑者不可任以治世猶隂之不可任以成嵗也為政而任刑不順於天故先王莫之肯為也按仲舒此論欲以止武帝好殺之心可謂善矣然謂隂居大冬而積於空虗不用之地則未然也夫元亨利貞四德之循環春夏秋冬四時之更代造化生生之意未嘗不流行其間冬雖主藏然一嵗發育之功實胚胎乎此收斂於冬固所以為春生之地也特閉藏無迹人不得而見耳謂之空虗不用則非也周子曰無極而太極全文及陽生萬物成萬物章已見前動而無靜靜而無動物也朱子曰有形則滯於一隅動而無動靜而無靜神也神則不離於形而不囿於形矣動而無動靜而無靜非不動不靜也動中有靜靜中有動物則不通神妙萬物水隂根陽火陽根隂水隂也而生於一則本乎陽也火陽也而生於二則本乎隂也所謂神妙萬物者如此五行隂陽隂陽太極承上文而言自五而一也四時運行萬物始終四時即五行也反上文而言自五而萬也混兮闢兮其無窮兮混合也自五而一動而靜陽而隂也闢開也自五而萬靜而動隂而陽也一合一開如循環之無端而天地之造化無窮矣所謂神者初不離乎物如天地物也天之收斂豈專乎動地之發生豈專乎靜此即神也問自五而一自五而萬之說則是太極常在貞上恐未穩先生然之混言太極闢言為隂陽五行以後故末句曰其無窮兮言既闢之後為隂陽五行為萬物無窮盡也易坤卦程子𫝊曰隂從陽者也待唱而和乾之用陽之為也坤之用隂之為也形而上曰天地之道形而下曰隂陽之功初六履霜堅氷至傳曰隂始生于下至微也聖人於隂之始生以其將長則為之戒隂之始凝而為霜履霜則當知隂漸盛而至堅氷矣獨小人始雖甚微不可使長長則至於盛也上六龍戰於野傳曰隂從陽者也然盛極則抗而爭文言隂疑於陽必戰為其嫌於無陽也故稱龍焉傳曰陽大隂小隂必從陽隂既盛極與陽偕矣是疑於陽也不相從則必戰卦雖純隂恐疑無陽故稱龍見其與陽戰也問坤卦純隂不為無陽之說如何朱子曰雖是十月為坤十一月為復然自小雪後其下一畫便有三十分之一分陽生至冬至方足得一爻成爾然十月謂之陽月蓋嫌於無陽也自垢至坤亦然又曰陽無驟生之理如冬至前半月中氣是小雪陽已生三十分之一分到得冬至前幾日已生到二十七八分到至日方足成一畫不是前日都無今日一旦便都復了大抵剝盡處便生莊子曰造化密移疇克知故列子亦謂運轉亡已天地密移疇覺之哉凡一氣不頓進一形不頓虧隂陽之浸消浸盛人身之自少至老亦莫不然屯傳曰隂陽不交則為否始交而未暢則為屯小畜密雲不雨自我西郊傳曰雲隂陽之氣二氣交而和則畜固而成雨陽唱而隂和順也故和若隂先陽唱不順也故不和不和則不能成雨雲之畜聚雖密而不成雨者自西郊故也泰傳曰坤隂在上乾陽居下天地隂陽之氣相交而和則萬物生成故為通泰又小往大來吉亨𫝊曰小謂隂大謂陽往往之於外來來居於內也陽氣下降隂氣上交也隂陽和暢則萬物生遂天地之泰也以人事言之大則君上小則臣下君推誠以任下臣盡誠以事君上下之志通朝廷之泰也陽為君子隂為小人君子來處於內小人往處於外天下之泰也否傳曰天處上地處下是天地隔絶不相交通所以為否臨至於八月有凶傳曰二陽方長於下陽道嚮盛之時聖人豫為之戒曰陽雖方盛至於八月則其道消矣是有凶也大率聖人為戒必於方盛之時方盛而慮衰則可以防其滿極而圖其長久若既衰而後戒亦無及矣八月謂陽生之八月陽始生於復自復至遁凡八月自建子至建未也二隂生而陽消矣故彖曰消不久也在隂陽之氣言之則消長如循環不可易也以人事言之則陽為君子隂為小人方君子道長之時聖人為之戒使知極則有凶之理而虞備之常不至於滿極則無凶也剝傳曰卦五隂而一陽隂始自下生漸長至於盛極羣隂消剝於陽故為剝也又彖𫝊曰剝謂剝落也柔變剛也柔長而剛剝也夏至一隂生而漸長一隂長則一陽消至於建戍則極而成剝是隂柔變陽剛也隂小人之道方長盛而剝消於陽故君子不利有所往也上九碩果不食傳曰諸陽消剝已盡獨有上九一爻尚存如碩大之果不見食將有復生之理上九亦變則純隂矣然陽無可盡之理變於上則生於下無間可容息也聖人發明此理以見陽與君子之道不可亡也或曰剝盡則為純坤豈復有陽乎曰以卦配月則坤當十月以氣消長言則陽剝為坤陽來為復陽未嘗盡也剝盡於上則復生於下矣故十月謂之陽月恐疑其無陽也隂亦然聖人不言耳復傳曰序卦物不可以終盡剝窮上反下故受之以復物無剝盡之理故剝極則復來隂極則陽生陽剝極於上而復生於下窮上而反下也復所以次剝也為卦一陽生五隂之下隂極而陽復也嵗十月隂盛既極冬至則一陽復生於地中故為復也陽君子之道陽消極而復反君子之道消極而復長也故為反善之義又出入旡疾朋來旡咎傳曰物之始生其氣至微故多摧折陽春之發為隂寒所折觀草木於朝暮則可見矣出入無疾謂微陽生長無害之者也既無害之而其類漸進則將亨盛故旡咎也一陽始生至微故未能勝羣隂而發生萬物必待諸陽之來然後能成生物之功而無差忒以朋來而旡咎也三陽子丑寅之氣生成萬物衆陽之功也若君子之道既消而復豈能便勝於小人必待其朋類盛則能協力以勝之也反復其道七日來復𫝊曰謂消長之道反復迭至陽之消至七日而來復姤陽之始消也七變而成復故云七日謂七更也復其見天地之心乎傳曰一陽復於下乃天地生物之心先儒皆以靜為見天地之心蓋不知動之端乃天地之心也非知道者孰能識之象傳曰雷在地中陽始復之時也陽始生於下而甚微安靜而後能長先王順天道當至日陽之始生安靜以養之故閉關使商旅不得行人君不省視四方觀復之象而順天道也在一人之身亦然當安靜以養其陽也夬傳曰五陽在下長而將極一隂在上消而將盡衆陽上進决去一隂所以為夬也夬者剛决之象衆陽進而决去一隂君子道長小人消衰將盡之時也姤女壯勿用取女傳曰一隂始生自是而長漸以盛矣是女之將壯也隂長則陽消女壯則男弱故戒勿用取如是之女取女者欲其柔和順從以成家道姤乃方進之隂漸壯而敵陽者是以不可取也女漸壯則失男女之正家道敗矣姤雖一隂甚微然有漸壯之道所以戒也勿用取女不可與長也傳曰一隂始生漸長而盛隂盛則陽衰矣取女者欲長久而成家也此漸盛之隂將消勝於陽不可與之長久也凡女子小人外國勢茍漸盛何可與久也故戒勿用取如是之女初六繫於金柅至羸豕孚蹢躅傳曰姤隂始生而將長之卦一隂生則長而漸盛隂長則陽消小人道長也制之當於其微而未盛之時柅止車之物金為之堅强之至也止之以金柅而又繫之止之固也固止使不得進則陽剛貞正之道吉也使之進往則漸盛而害於物是見凶也羸豕孚蹢躅聖人重為之戒言隂雖甚微不可忽也豕隂躁之物故以為况羸弱之豕雖未能强猛然其中心在乎蹢躅蹢躅跳躑也隂微而在下可謂羸矣然其中心常在於消陽也君子小人異道小人雖微弱之時未嘗無害君子之心防於微則無能為矣象曰繫於金柅柔道牽也𫝊曰牽者引而進也隂始生而漸進柔道方牽也繫之於金柅所以止其進也不使進則不能消正道乃貞吉也天地隂陽之運升降盈縮未嘗少息陽常盈隂常虧一盈虧參差不齊而萬變生焉故曰物之不齊物之情也莊周固欲齊之可乎一本云命之曰易便有理若安排定則更有甚理天地隂陽之變但如二扇磨升降盈虛剛柔初未嘗停息陽常盈隂常虧故便不齊譬如磨既行齒都不齊既不齊便生出萬變故物之不齊物之情也而莊周彊要齊物然而終不齊也冬寒夏暑隂陽也所以運動變化者神也神無方故易無體萬物莫不有對一隂一陽一善一惡陽長則隂消善增則惡减乾陽也不動則不剛其靜也專專一其動也直直遂不專一則不能直遂坤隂也不靜則不柔其靜也翕翕聚不翕聚則不能發散地氣不上騰則天氣不下降天氣降而至於地地中生物者皆天氣也惟無成而代有終者地之道也五德之論有理天地間無一物無此五者一日有一日之隂陽一嵗有一嵗之隂陽近取諸身百理皆具屈伸往來之義只於鼻息見之屈伸往來只是理不必將既屈之氣復為方伸之氣生生之理自然不息如復言七日來復其間元不斷續陽已復生物極必返其理須如此有生必有死有始必有終又一本云凡物之散其氣遂盡無復歸本原之理天地間如洪罏雖生物銷鑠亦盡况既散之氣豈有復在天地造化又焉用此既散之氣其造化者自是生氣至如海水潮日出則水涸是潮退也其涸者已無也月出則潮水生非却是將已涸之水為潮此是氣之始終開闔便是易一開一闔謂之變問自十一月至正月方三陽是陽氣自地下而升否朱子曰然只是陽氣既升之後相將欲絶便有隂生隂氣既盡便有陽生其已升之氣便散所謂消息是理其來無窮又曰天地間只是一氣自今年冬至到明年冬至是氣之一周把來折做兩截前面底便是陽後面底便是隂又折做兩截便是四時天地間只有六層陽氣到地面時地下便冷了只是這六位陽長到底那第一位極了無去處上面即是漸次消去上面消去些箇時下面便生些箇那便是隂只是箇噓吸噓是陽吸是隂隂陽消長之際無截然斷絶之理全文云冬至一陽生而每遇至後則倍寒何也云云故常相攙掩過如天將曉復黑亦是理也大抵終始萬物莫盛乎艮此理儘神妙須研窮乃知隂陽於天地間雖無截然為隂為陽之理須去參錯然一箇升降生殺之分不可無也又曰早梅冬至以前發方一陽未生然則發生者何也其榮其枯此萬物一箇隂陽升降大節也然逐枝自有一箇榮枯分限不齊此各有一乾坤也萬是箇消息惟其消息此所以不窮至如松柏亦不是不雕只是後雕雕得不覺怎少得消息方夏生長時却有夏枯者則冬寒之際有發生之物何足怪也程子一日遊許之西湖在石壇上坐少頃足踏處便濕舉起曰便是天地升降道理又一日見火邊然湯鼎曰此便是隂陽消長之義早梅松柏石壇湯鼎皆因物理而推隂陽故併記於此邵子曰陽無十故無後隂無一故無首陽者道之用隂者道之體陽用隂隂用陽以陽為用則尊隂以隂為用則尊陽張子曰道體常盡變陽動而變故為道之用隂靜而常故為道之體陽動隂靜陽尊隂卑至於隨時變通則陽中有隂隂中有陽迭相為用故陽用隂隂用陽以陽為用則尊隂以隂為用則尊陽也陽盡隂純坤為主矣隂盡陽純乾為主矣隂幾於道故以况道也既曰陽者道之用隂者道之體矣又曰隂幾於道故以况道何也太極包乎隂陽未動之初至靜而虛當以隂名靜為體而動為用體近本而用近末故隂幾於道也且太極在一年則純坤用事一陽將復之時在聖人之心則退藏於密寂然不動之際自始終而言則退藏於密者乃萬動之終寂然不動者為萬動之始正如六隂方純一陽已復一靜一動間不容髮冬雖收藏之終實是施生之始有體則用隨之也易曰元亨利貞記曰喜怒哀樂之未發謂之中發而皆中節謂之和元而亨利必歸於貞貞然後返於元未發而中發乃能和和然後不喪其中無極之前隂含陽也有象之後陽分隂也張氏曰無極之前隂含陽也坤則主之其冬至之時乎靜極而動動而生陽自復至乾動極而靜在天正中隂又生焉有象之後陽分隂也乾則主之其夏至之時乎動極而靜靜而生隂自姤至坤靜極而動始在地正中陽又生焉此章當考隂事太半陽一而隂二也問治世少而亂世多君子少而小人多何耶曰豈不知陽一而隂二乎陽不能獨立必待隂而後立故陽以隂而為基隂不能自見必待陽而後見故隂以陽為唱陽知其始而享其成隂效其法而終其勞本一氣也生則為陽消則為隂二者一而已矣朱子亦曰隂陽只是一氣陽之退便是隂之生不是陽退了又别有一箇隂生又曰隂陽做一箇看亦得做兩箇看亦得做兩箇看是分隂分陽兩儀出焉做一箇看只是一箇消長又曰隂陽論推行底只是一箇對峙底則是兩箇如日月之類皆是兩箇推行底如一動一靜互為其根對峙底如分隂分陽兩儀立焉一作流行對峙亦通陽主闢而出隂主翕而入隂對陽為二然陽來則生陽去則死天地萬物生死主於陽則歸之於一也張氏曰陽對隂為二如君之有臣夫之有婦名雖並立勢不相完所以乾九坤六陽能兼隂隂不能兼陽天地之氣運北而南則治南而北則亂亂久則復北而南矣天道人事皆然推之歷代可見消長之理也張氏曰天地之運自子至卯為隂中之陽自卯至子為陽中之陽自午至酉為陽中之隂自酉至子為隂中之隂隂中之陽君子之道已長而小人猶盛亂而將治也陽中之隂小人之道已長而君子猶盛治而將亂也陽中之陽極治之運也隂中之隂極亂之運也先天圖自泰厯蠱而至否自否厯隨而至泰即南北之運數也天四象若錯綜而用之日月天之隂陽水火地之隂陽星辰天之剛柔土石地之剛柔張氏曰天有四象地有四象立天之道曰隂與陽故日為陽中陽月為陽中隂星為隂中陽辰為隂中隂立地之道曰柔與剛故水為柔中柔火為柔中剛土為剛中柔石為剛中剛此本象也若錯綜而用之則天亦有柔剛地亦有隂陽日為陽月為隂星為剛辰為柔天有地也水為隂火為陽土為柔石為剛地有天也有溫泉而無寒火隂能從陽而陽不能從隂也張氏曰水受火則溫火受水有滅而已不能從隂也所以泰則小人皆為泰否則君子有死而已不能從小人而為否也火溫水益之也水滅火害之也故泰則為君子養小人否則小人傷君子問小人可絶乎曰不可君子禀陽正氣而生小人禀隂邪氣而生無隂則陽不成無小人則君子亦不成惟以盛衰乎其間也陽六分則隂四分隂六分則陽四分陽隂相半則各五分矣由是知君子小人之時有盛衰也治世則君子六分君子六分則小人四分小人固不勝君子矣亂世則反是陽能知而隂不能知陽能見而隂不能見也能知能見者為有故陽性有而隂性無也陽有所不偏而隂無所不偏也陽有去而隂常居也無不偏而常居者為實故陽體虛而隂體實也張氏曰陽以神為性隂以氣為性神者靈也氣者質也故陽有知見而隂無知見是以月無光假日以為光魄無識資魂以為識所謂陽性有而隂性無者非無也可以謂之無也陽以氣為質隂以形為體氣者虛也形者實也自用而言實有不偏虛無不周實有消亡虛無去住若自體言則氣先盡而形常餘氣內聚而形外包所以光焰冷而灰炭存華葉乾而根荄在故曰陽體虛而隂體實也冬至之後為呼夏至之後為吸此天地一嵗之呼吸也張氏曰冬至之後陽長隂消舒萬物以出故為呼夏至之後隂長陽消斂萬物以入故為吸若自日言則子以後為呼午以後為吸寂然不動反本復靜坤之時也感而遂通天下之故陽動於中間不容髮復之時也張子曰隂陽之精互藏其宅則各得其所安故日月之形萬古不變若隂陽之氣則循環迭至聚散相蕩升降相求絪緼相揉蓋相兼相制欲一之而不能此其所以屈伸無方運行不息莫或使之不曰性命之理謂之何哉陽之德主於遂隂之德主於閉人之有息蓋剛柔相摩乾坤闔闢之象也氣坱然太虛升降飛揚未嘗止息此虛實動靜之機隂陽剛柔之始浮而上者陽之清降而下者隂之濁其感通聚散為風雨為雪霜萬品之流形山川之融結糟粕煨燼無非教也問氣坱然太虛升降飛揚未嘗止息朱子曰此張子所謂空虛即氣也蓋天在四畔地居其中减得一尺地遂有一尺氣但人不見耳升降飛揚所以生人物者未嘗止息但人不見爾如望氣者凡氣之灾祥皆能見之如龍成五色之類游氣紛擾合而成質者生人物之萬殊其隂陽兩端循環不已者立天地之大義朱子曰游氣紛擾當橫看隂陽兩端當直看晝夜運而無息者便是隂陽之兩端其四邊散出紛擾者便是游氣以生人物之萬殊某嘗言正如麵磨相似其四邊只管層層撒出天地之氣運轉無已只管層層撒出人物其中有粗有細故人物有偏有正有精有粗問橫渠云云此是言一氣混沌之初天地未判之時為復亘古今如此曰只是統說只今便如此問升降者是隂陽之兩端飛揚者是游氣之紛擾否曰此只是說隂陽之兩端下文此虛實動靜之機隂陽剛柔之始此正說隂陽兩端到得其感通結聚為風雨為雪霜萬品之流形山川之融結以下却正是說游氣紛擾問虛實動靜之機隂陽剛柔之始兩句欲云虛實動靜乘此氣以為機隂陽剛柔資此氣以為始可否曰此兩句只一般實與動便是陽虛與靜便是隂但虛實動靜是言其用隂陽剛柔是言其體而已問始字之義如何曰只是說如箇生物底母子相似萬物都從這裏生出去上文說升降飛揚未嘗止息便含這虛實動靜兩句在裏面了所以虛實動靜隂陽剛柔者便是這升降飛揚者為之非兩般也問無非教也都是道理在上面發見否曰然因引禮記中天地至教聖人至德一段與孔子豫欲無言一段天地與聖人都一般精底都從那粗底上發見道理都從上流行雖至粗底物無非是道理發見天地與聖人皆然問隂陽游氣之辨曰游氣是生物底隂陽譬如扇子扇出風便是游氣循環不已者乾道變化也合而成質者各正性命也譬如樹木其根本猶大義散而生花結實一向發生去是人物之萬殊隂陽循環如磨游氣紛擾如磨中出者易曰剛柔相摩八卦相蕩鼓之以雷霆潤之以風雨日月運行一寒一暑此隂陽之循環也乾道成男坤道成女此游氣之紛擾也問游氣隂陽曰游是散殊比如一箇水車一上一下兩邊只管衮轉這便是循環不已立天地之大義底一上一下只管衮轉中間帶得水灌溉得所在便是生人物之萬殊天地之間一氣只管運轉不知不覺生出一箇人不知不覺又生出一箇物即它這箇輪轉便是生物時節游氣隂陽隂陽即氣也豈隂陽之外又復有游氣耶所謂游氣者指其所以賦與萬物一物各得一箇性命便有一箇形質皆此氣合而成之也雖是如此而所謂隂陽兩端成片衮衮將出來者固自若也亦猶論太極物物皆有之而太極之體未嘗不存也朱子曰天地間無兩立之理非隂勝陽即陽勝隂無物不然寒暑晝夜君子小人天理人欲皆是又曰無一物不有隂陽乾坤至於至微至細草木鳥獸皆然又曰古者伏羲觀鳥獸之文與地之宜那時未有文字只是仰觀俯察而已想聖人心細雖以鳥獸羽毛之微也盡察得有隂陽今人心粗如何察得因言鯉魚上有三十六鱗隂數龍脊上有八十一鱗陽數又龜背上文中間五段者五行也兩邉各有四段者八卦也周圍二十四段者二十四氣也箇箇如此又如草木之有雌雄銀杏桐楮牝牡麻竹之類皆然又樹木向陽處則堅實其背隂處必虛軟天地之間無往而非隂陽一動一靜一語一默皆是隂陽之理坤初六履霜堅氷至本義曰夫隂陽者造化之本不能相無而消長有常亦非人所能損益也然陽主生隂主殺則其類有淑慝之分焉故聖人作易於其不能相無者既以健順仁義之屬明之而無所偏主至其消長之際淑慝之分則未嘗不致其扶陽抑隂之意焉蓋所以贊化育而參天地者其㫖深矣天地之道浸故隂陽勝隂符經之說善矣天地間不陡頓恁地浸者漸也天地之道漸漸消長事之未定者屬乎陽其已定者屬隂凡說兩端處皆有隂陽如開物成務開物是陽成務是隂致知力行致知是陽力行是隂周子之書屢發此意推之可見陽主進而隂主退陽主息而隂主消進而息者其氣强消而退者其氣弱此隂陽之所以為剛柔也陽剛溫厚居東南主春夏而以作長為事隂柔嚴凝居西北主秋冬而以斂藏為事作長為生斂藏為殺此剛柔之所以為仁義也以此觀之則隂陽剛柔仁義之位豈不曉然而彼楊子所謂於仁也柔於義也剛者乃自其用處末流言之蓋亦所謂陽中之隂隂中之陽固不妨自為一義但不可雜乎此而論之爾此因建安袁氏樞圖論發此其第一書云來論謂東南以一隂已生而為隂柔之位西北以一陽已生而為陽剛之位則是陽之盛於春夏者不得謂陽隂之盛於秋冬者不得為隂而反以死生之微者為主也謂一隂生於東南一陽生於西北則是隂不生於正南午位之姤而淫於東陽不生於正北子位之復而旅於西也謂巽以一隂之生而位乎東南則乾者豈一陽之生而位於西北乎云云巽以三畫言之雖為一隂之生而其所以位之東南者初非有取乎其義至於乾又三陽之全體而初無一陽已生之義可得而取也凡此崎嶇反側終不可通不若直以陽剛為仁隂柔為義之明白而簡易也蓋如此則發生為仁肅殺為義其理甚順肅殺雖似乎剛然實天地收斂退藏之氣自不妨其隂柔也子位一陽雖生而未出乎地至寅位泰卦則三陽之生方出地上而溫厚之氣從此始焉已位乾卦六陽雖極而溫厚之氣未終故午位一隂雖生而未害於陽必至未位遁卦而後溫厚之氣始盡也其午位隂已始而嚴凝之氣及申方始亥位六隂雖極而嚴凝之氣至丑方盡義亦放此蓋地中之氣難見而地上之氣易識故周人以建子為正雖得天統而孔子之論為邦乃以夏時為正蓋取其隂陽始終之著明也又曰來論謂坤之上六其位在亥陽氣已生乾之上九其位在已隂氣已生以剝上九碩果不食十月為陽月之義推之則剝卦上九之陽方盡而變為純坤之時坤卦下又已有陽氣生於其中矣但一日之內一晝之中方長得三十分之一必積之一月然後始滿一畫而為復方是一陽之生耳夬之一隂為乾為姤義亦同此蓋論其始生之微固已可名於隂陽然便以此為隂陽之限則其方盛者未替而所占不廣卦內六分之五方生者甚微而所占未及卦內六分之一所以未可截自此處而分隂陽也天地之化包括無外運行無窮然其所以為實不越乎一隂一陽而已其動靜屈伸往來闔闢升降浮沉之性雖未嘗一日不相反然亦不可以一日而相無也聖人作易以通神明之德類萬物之情其所以為說者亦若是焉爾然及其推之人事而擬諸其形容則常以陽為君子而引翼扶持惟恐其不盛隂為小人而排擯抑黜惟恐其不衰何哉蓋陽之德剛隂之德柔剛者常公而柔者常私剛者常明而柔者常暗剛者未嘗不正而柔者未嘗不邪剛者未嘗不大而柔者未嘗不小公明正大之人用於世則天下䝉其福私暗邪僻之人得其志則天下受其禍此理之必然也非獨於易為然凡聖賢之言雜出於𫝊記者亦未有不好剛而惡柔者若夫子所謂剛毅近仁而又嘗深以未見剛者為嘆蓋專以是為君子之德也右論隂陽天地之形體易天行健正義曰行者運動之稱健者强壯之名乾是衆健之訓萬物壯健皆有衰怠惟天運動日過一度未嘗休息故云云也問云云朱子曰惟胡安定說得好因舉其說曰天者乾之形乾者天之用天形蒼然南樞入地下三十六度北樞出地上三十六度狀如倚杵其用則一晝一夜行九十餘萬里人一呼一吸為一息一息之間天行七八十餘里人一晝一夜有三萬三千六百餘息故天行九十餘萬里天之行健可知因言天之氣運轉不息故知得地在中間又曰尚書璣衡疏載三蕃渾天說一段極精密今按其說云天之形狀如鳥卵天包地外猶卵之裹黃圓如彈丸故曰渾天言其形體渾渾然也其術以為天半覆地上半在地下其天居地上見有二百八十二度半强地下亦然北極出地上三十六度南極入地下亦三十六度而嵩髙在當天之中極南五十五度當嵩高之上又其南十二度為夏至之日道又其南二十四度為春秋分之日道又其南二十四度為冬至之日道南下去地三十一度而已是夏至日北去極六十七度春秋分去極九十一度冬至去極一百一十五度此其大率也南北極持其兩端其天與日月星宿斜而回轉此必古有其法遭秦而滅又論語北辰居其所而衆星拱之或問北辰之謂天樞何也曰天圓而動包乎地外地方而靜處乎天中故天之形半覆乎地上半繞乎地下而左旋不息其樞紐不動之處則在夫南地之端焉謂之極者猶屋脊之謂極也然南極低入地三十六度故周回七十二度常隱不見北極髙出地三十六度故周回七十二度常見不隱北極之星正在常見不隱七十二度之中常居其所而不動其旁則經星隨天左旋日月五緯右轉更迭隱見皆若環繞而歸向之知此則知天樞之說而聖人所以取譬者亦可見矣南北極天之樞紐只有此處不動如磨心然此是天之中至極處如人之臍蒂也楚詞天問圜則九重孰營度之惟兹何功孰初作之圜與圓同度待洛反圜謂天形之圓也則法也九陽數之極所謂九天也斡維焉繫天極焉加八柱何當東南何虧斡一作輨說文曰轂端㳫則是車轂之內以金為輨而受軸者也維繫物之縻也天極謂南北極天之樞紐常不動處譬則車之軸也蓋萬物之運者其轂必有所繫然後軸有所加故問此天之斡維繫於何所而天極之軸何所加乎河圖言崑崙者地之中也地下有八柱互相牽制名山大川孔穴相通素問曰天不足西北地不滿東南注云中原地形西北高東南下今百川滿凑東之滄海則東西南北高下可知故又問八柱何所當值東南何獨虧闕乎九天之際安放安屬隅隈多有誰知其數九天即所謂圜則九重者際邊也放至也屬附也隅陬也右三章六問今答之曰或問乎邵子曰天何依曰依乎地地何附曰附乎天天地何所依附曰自相依附天依形地附氣其形也有涯其氣也無涯詳味此言屈子之問昭然若發矇矣但天之形圓如彈丸朝夜運轉其南北兩端後髙前下乃其樞軸不動之處其運轉者亦無形質但如徑風之旋當晝則自左旋而向右向夕則自前降而歸後當夜則自右轉而復左將旦則自後升而趨前旋轉無窮升降不息是謂天體而實非有體也地則氣之查滓聚成形質者但以其束於徑風旋轉之中故得以兀然浮空甚久而不墜耳黃帝問於岐伯曰地有慿乎岐伯曰大氣舉之亦謂此也其曰九重則自地之外氣之旋轉益逺益大益清益剛究陽之數而至於九則極清極剛而無復有涯矣豈有營度而造作之者先以斡維繫於一處而後以軸加之以柱承之而後天地乃定位哉且曰其氣無涯則其邊際放屬隅隈多少固無得而言者亦不待辨說而可知其妄矣東南之虧乃專以地形言之初無預乎天也天何所㳫十二焉分日月安屬列星安敶㳫合也此問天與地合㑹於何所十二辰誰所分别乎敶列也言日月衆星安所繫屬誰敶列也上章所問天何所屬并地而言此所問乃為天地相接之處何所㳫也今答之曰天周地外其說已見上矣非㳫乎地之上也十二云者自子至亥十二辰也左𫝊曰日月所㑹是謂辰注云一嵗日月十二㑹所㑹為辰十一月辰在星紀十二月辰在元枵之類是也然此特在天之位耳若以地而言之則南面而立其前後左右亦有四方十二辰之位焉但在地之位一定不易而在天之象運轉不停惟天之鶉火加於地之二位乃與地合而得天運之正耳蓋周天三百六十五度四分度之一周布二十八宿以著天體而定四方之位以天繞位則一晝一夜適周一匝而又超一度日月五星亦隨天以繞地而惟日之行一日一周無餘無缺其餘則各有遲速之先焉然其懸也固非綴屬而居其運也亦非推挽而行但當其氣之盛處精神光輝自然發越而又各自有次第耳列子曰天積氣耳日月星辰亦積氣中之有光曜者張衡靈憲曰星也者體生於地精成於天列居錯峙各有攸屬此言皆得之矣程子曰地之外豈無天今所謂地者特天中一物耳凡有氣莫非天有形莫非地邵子曰天何依曰依乎地全文見上注伊川先生見康節先生伊川指食卓而問曰此卓安在地上不知天地安在甚處康節為之極論其理以至六合之外伊川嘆曰平生惟見周茂叔論至此朱子曰康節此說古今厯家所未及輔廣云伊川謂自古言數者至康節先生方說到理上曰然揚子雲亦略知之然不及康節之精天圓而地方天南高而北下是以望之如倚蓋然地東南下西北高是以東南多水西北多山天覆地地載天天地相函故天上有地地上有天張氏曰古之言天有三家曰宣夜曰蓋天曰運天宣夜之學人謂絶無師法蓋天之學惟唐一行知其與渾天不異蓋天之法如繪像止得其半渾天之法如塑像能得其全堯之歷象日星蓋天法也舜之璿璣玉衡渾天法也渾法密於蓋天創意者尚略述作者愈詳也宣夜人雖非之竊謂作者不無所見但無述者失其本㫖爾郤萌記曰日月衆星自然浮生虛空之中其行其止皆須氣焉虞喜曰天確乎在上有常安之形數語皆有意義而恨不究乎終始蓋河圖之數戴九履一一起於下是為坎水天象之始也九窮於上是為乾金天象之成也故坎水柔動而乾金堅凝動脉滋生而腦精安靜虞喜謂常安之形者北極不動之義天之頂也郤萌謂日星浮於虛空行必須氣此則東西運轉氣即天虛即氣也先生曰望之如倚蓋此兼取蓋天之說也其曰地東南下西北髙者天圓如虛毬地斜隔其中西北之髙戴乎天頂故北極出地才三十六度愈降而及東南履乎天末故南極入地才三十六度東南多水西北多山其髙卑可見矣地勢本傾峻以其體大故人居其上而弗覺西北附實東南面虛人倚北而嚮南是以天潜乎北而顯乎南水發乎西而流於東也天包地地載天天地相函以立於太虛之中而能終古不壞雖其理至妙不可測度要之不過虛實相依動靜相養不即不離非一非二故在天成象則在地成形仰天有文則俯地有理人能窮此可以逹性命之原知死生之說矣天可以理盡而不可以形盡渾天之術以形盡天可乎胡氏曰夫天之為天非若地之有形也自地而上無非天也後魏冦謙之作宫欲令其髙不聞雞犬之聲而後可以上接天神崔浩信之胡氏論曰云云昔人以積氣名其象以倚蓋名其形皆非知天者也莊周氏曰天之蒼蒼其正色邪言天無色也無色則無形無聲無臭皆舉矣日月星辰之繫乎天非若山川草木之奠乎地也著明森布躔度行止皆氣機自運莫使之然而然者無所託也若其有託則是以形相屬一麗乎形能不壞乎故子貢曰天不可階而升謂無形也仲尼之言天地山川也皆以自微至著明之地則始於撮土山則始於拳石水則始於一勺是皆可見之物也惟天曰天斯昭昭之多夫昭昭果何物哉及其無窮也日月星辰繫焉萬物覆焉而不離於昭昭之多昔人言天未有顯白如仲尼者也非窮理不足以知天非盡性不足以事天天豈逺乎哉按楊倞注荀子亦曰天無實形地之上空虛者皆天也張子曰地物也天神也物無踰神之理顧有地斯有天若其配然爾朱子曰天包乎地天之氣又行乎地之中故橫渠云地對天不過天以氣而依地之形地以形而附天之氣天包乎地地特天中之一物爾朱子又云天地初間只是隂陽之氣這一箇氣運行磨來運去磨得急了拶許多查滓在裏靣無出處便結成地在中央氣之清者便為天為日月為星辰只在外常周環運轉地只在中央不動不是在下又曰天地始初混沌未分時想得只有水火二者水之滓腳便成地今登高而望羣山皆為波浪之狀便是水泛如此初耎後凝問想如潮水湧起沙相似曰然水之極濁便成地火之極精便成風霆雷電日星之屬問天有質否抑只是氣曰只是箇旋風下耎上堅道家謂之剛風人嘗說天九重分九處為號非也只是旋有九耳但下面氣濁較暗上面至高處則至清至明又曰地言其全體土乃地之形質又曰地者氣之查滓者也所以道輕清為天重濁為地問邵子論六合之外恐無外否曰理無內外六合之形須有內外日東升西沉又從東升這上面許多下面亦許多豈不是六合之內厯家算氣只算到日月星辰運行處上去更算不得安得是無內外老子曰天地之間其猶槖籥乎虛而不屈動而愈出槖籥今之鞴扇耳乾一而實故以質言而曰大坤二而虛故以量言而曰廣或問本義云云如何曰此解極分曉蓋曰以形言之則天包地外地在天中所以說天之質大以理與氣言之則地却包著天天之氣却蓋在地之中地蓋承受得天之氣所以說地之量廣天為陽其數奇從裏面便實出來流行發生只是一箇物事所以說乾一而實地雖是堅實然却虛所以天之氣流行乎地之中皆從闕所以說坤二而虛又問地形如肺形質雖實而中本虛闕其中無所障礙雖金石也透過去地便承受闕曰然要之天形如一箇鼓鞴天便是那鼓鞴闕包得許多氣開闔消長今歷家用律管候氣闕也分寸不差便是這氣都在地中透上來如闕地九寸以葭灰實其中至之日氣至灰去是也右言天地之形體程子所謂以形體言謂之天是也西山讀書記卷三十七
