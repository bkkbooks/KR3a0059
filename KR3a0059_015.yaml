body:
  text: 西山讀書記卷十五宋真德秀撰道易大傳形而上者謂之道形而下者謂之器程子曰形而上為道形而下為器須著如此說器亦道道亦器坤傳曰形而上者天地之道形而下者隂陽之功朱子曰卦爻隂陽皆形而下者其理則道也形而上者無形無象是理形而下者有情有象是器然有此器則有此理有此理則有此器未嘗相離却不是於形器之外别有所謂理又曰形而上底虛渾是道理形而下底實便是器這箇分别得精切明道說惟此語截得上下最分眀問如何以形言曰此言最的當設若以有形無形言之便是物與理相間斷了器亦道道亦器有分别而不相離也指器為道固不得離器於道亦不得形而上者指理而言形而下者指事物而言事事物物皆有其理事物可見而其理難知即事即物便要見此理大學之道不曰窮理而曰格物只是使人就實處窮竟形而上者是理才有作用便是形而下者問隂陽如何是形而下者曰一物便有隂陽寒暖生殺皆見得事物雖大皆形而下者理雖小皆形而上者天地形而下者乾坤形而上者天地乾坤之形殼乾坤天地之性情論語子曰朝聞道夕死可矣朱子曰道者事物當然之理茍得聞之則生順死安無復遺憾矣朝夕所以甚言其時之近程子曰言人不可以不知道茍得聞道雖死可也又曰皆實理也人知而信者為難死生亦大矣非誠有所得豈以夕死為可乎或問朝聞夕死得無近於釋氏之說乎曰吾之所謂道者君臣父子夫婦昆弟朋友當然之實理也彼之所謂道則以此為幻為妄而絶滅之以求其所謂清靜寂滅者也人事當然之實理乃人之所以為人而不可以不聞者故聞之而夕死亦可以無所憾若彼之所謂清靜寂滅者則初無所效於人生之日用其急於聞之者特懼夫死之將至而欲倚是以敵之耳是以為吾之說者行法俟命而不求知死為彼之說者坐忘立脫變見萬端而卒無補於世教之萬分也故程子於此專以實見實理義重於生與夫知所以為人者為說其㫖亦深切矣南軒曰所謂聞道者蓋涵養體察積習精深而自得於實理非若異端驚怪恍惚超悟直入之論也按集義程子曰聞道知所以為人也夕死可矣是不虛生也又曰茍有朝聞道夕死可矣之志則不肯一日安於所不安何止一日須臾不能如曽子易簀須要如此乃安人不能若此者只為不見實理實理者實見得是實見得非見是理得之於心自别若耳聞此道者心實不見若見得必不肯安於此又曰古人有捐軀隕命者若不實見得則烏能如此須是實見得生不重於義生不安於死也故有殺身成仁者只是成就一箇是而已程子之說如此朱子所取其略也子曰參乎吾道一以貫之曽子曰唯朱子曰參乎者呼曽子之名而告之貫通也唯者應之速而無疑者也聖人之心渾然一理而泛應曲當用各不同曽子於其用處蓋已隨事精察而力行之但未知其體之一耳夫子知其真積力久將有所得是以呼而告之而曽子果能默契其㫖即應之速而無疑也子出門人問曰何謂也曽子曰夫子之道忠恕而已矣盡已之謂忠推已之謂恕而已矣者竭盡而無餘之辭也夫子之一理渾然泛應曲當譬則天地之至誠無息而萬物各得其所也自此之外固無餘法而亦無待於推矣曽子有見於此而難言之故借學者盡己推己之目以著明之欲人之易曉也蓋至誠無息者道之體也萬殊之所以一本也萬物各得其所者道之用也一本之所以萬殊也以此觀之一以貫之之實可見矣或曰中心為忠如心為恕於義亦通程子曰以己及物仁也推己及物恕也違道不逺是也忠恕一以貫之忠者天道恕者人道忠者無妄恕者所以行乎忠也忠者體恕者用大本達道也此與違道不逺異者動以天爾又曰維天之命於穆不已忠也乾道變化各正性命恕也又曰聖人教人各因其才吾道一以貫之唯曽子為能達此孔子所以告之也曽子告門人曰夫子之道忠恕而已矣亦猶夫子之告曽子也中庸所謂忠恕違道不逺斯乃下學上達之義又曰忠恕違道不逺施諸己而不願亦勿施於人此又掠下教人忠是根本恕是枚葉一者忠也以貫之者恕也體一而用殊忠是一箇忠做得百千萬般箇恕出來一以貫之只是萬事一理伊川謂仁義亦得蓋仁是統體義是分别存於內為忠見於外為恕忠是無一毫自欺處恕是稱物平施處忠因恕見恕由忠出天地是無心底忠恕聖人是無為底忠恕學者是求做底忠恕或問云忠恕只是無私心不責人曰自有六經以來不曽說不責人是恕若中庸也只是說施諸己而不願亦勿施於人而已何嘗說不責人不成只取我好别人不好更不管他論語只說躬自厚而薄責於人謂之薄者如言不以己之所能必人之如已隨材責任耳何至舉而弃之曽子忠恕本是學者事曽子特借來形容夫子一貫道理忠便是一恕便是貫有這忠了便做出許多恕來聖人極誠無妄便是忠曰聖人之之忠即是誠否曰是聖人之恕即是仁曰是曰在學者言之則忠近誠恕近仁曽子零碎處盡曉得了夫子便告之曰參乎吾道一以貫之他便應之曰唯貫如散錢一是索子夫子固是一以貫之學者能盡已而又推此以及物亦是以一貫之所以不同者夫子以天學者用力動以天者天只是自然問忠是竭盡其中心無一毫不盡恕是推中心之所欲以與人所不欲不以與人曰是如此夫子之所以告曽子時無他只緣他曉得千條萬目他人連箇千條萬目尚自曉不得如何識得一貫曽子件件曽做來所以知若不曽躬行踐履如何曉得忠是洞然眀白無有不盡恕是知得為君推其仁以待下為臣推其敬以事君忠者誠實不欺之名聖人將此放頓在萬物上故名之曰恕忠恕本末是說一貫緣聖人告以一貫之說故曽子借此二字以眀之忠恕是學者事如欲子之孝於我必當先孝於親欲弟之弟於我必當先敬其兄如欲人之不慢於我我須先不慢於人欲人不欺於我我須先不欺於人聖人一貫是無作為底忠恕是有作為底將箇有作為底眀箇無作為底聖人則動以天賢人動以人聖人不待推然學者但能盡已以推之於人推之既熟久之自能見聖人不待推之意譬如一泓水聖人是自然流出灌溉百物其他人須是推出來灌溉學者是這箇忠恕聖人亦只是這箇忠恕但聖人熟學者生聖人自胸中流出學者須著勉强維天之命於穆不已乾道變化各正性命是天之忠恕純亦不已萬物各得其所是聖人之忠恕施諸已而不願亦勿施於人是學者之忠恕忠一本恕萬殊一本是統㑹處萬殊是流行處在天道言之一本是元氣之於萬物有昆蟲草本之不同而只是一氣之所生萬殊則是昆蟲草木之所得而生一箇自是一箇模樣在人事言之則一理之於萬事萬物有若臣父子兄弟朋友動息灑掃應對之不同而只是此理之所貫萬殊則是君臣父子兄弟朋友之所當於其道者一箇自是一箇道理其實只是一本問如心為恕曰如比也比自家心推將去仁之與恕只爭些子自然底是仁比而推之便是恕問忠恕程子以推廣得去則天地變化草木蕃推廣不去則天地閉賢人隱如何曰亦只推己以及物推得去則物我貫通自有箇生生無窮底意思便有天地草木蕃氣象天地只是這樣道理若推不去物我隔絶欲利於己不利於人欲己之富欲人之貧欲己之夀欲人之夭似這氣象全然閉塞隔絶了便似天地閉賢人隱曽子平日功用得九分九釐九毫都見得了只爭得這些子一聞夫子警省之便透徹了也又問未唯之前如何曰未唯之前見一事各是一箇理及既唯之後千萬箇理只是一箇理夫子言一貫曽子言忠恕子思言小德川流大德敦化張子言理一分殊只是一箇忠恕則一而在聖人在學者則不能無異正猶孟子言由仁義行與行仁義之别爾曽子專為發眀聖人一貫之㫖所謂由忠恕行者也子思專為指示學者入德之方所謂行忠恕者也所指既殊不得不以為二然其所以為忠恕則其本體蓋未嘗不同也問程子以忠為天道恕為人道莫是謂忠者聖人之在己與天同運而恕者所以待人之道否曰聖人待己待人亦無二理天人之别但以體用之殊耳問伊川曰忠者天道恕者人道所謂天道人道初非以優劣言自其渾然一本言之則謂之天道自其與物接者言之則謂之人道耳曰然此與誠者天之道誠之者人之道語意自不同南軒曰聖人之心於天下之理無所不該雖內外本末隱顯之致各有其分然未嘗不一以貫之也故程子曰如百尺木自根本至毫末皆一貫夫子之告曽子當其可耳曽子蓋默識之故答門人之問獨舉忠恕為言可以見曽子自得之深也夫忠為體恕為用實有是體則實有是用用之周乎物是其體之流行發見而已體用一源也豈非一貫之妙歟聖人全乎此天之道也曽子所稱夫子忠恕是己賢者求盡乎此人之道也子思所稱忠恕是也又孔子之告子貢亦曰豫一以貫之正文見後篇今以先儒注釋之語附此庶互相發云朱子曰一貫說見前篇然彼以行言而此以知言也謝氏曰聖人之道大矣人不能遍觀而盡識宜其以為多學而識之者也然聖人豈務博者哉如天之於衆形匪物物刻而雕之也故曰豫一以貫之德輶如毛毛猶有倫上天之載無聲無臭至矣尹氏曰孔子之於曽子不待其問而直告之以此曽子復深喻之曰唯若子貢則先發其疑而後告之而子貢終亦不能如曽子之唯也二子所學之淺深於此可見愚按夫子之於子貢屢有以發之而他人不與焉則顏曽以下諸子所學之淺深又可見矣或問云云聖人生知不待多學子貢以己觀夫子故以為亦多學也夫子以一貫告之此雖聖人之事然因己以告子貢使知夫學者雖不可以不多學然必有所謂一以貫之然後為至耳蓋子貢之學固博矣然意其特於一事一物之中各有以知其理之當然而未能知夫萬理之為一理而廓然無所不通也若是者雖有以知夫衆理之所在而泛然莫為之統其處事接物之間有以處其所嘗學者而於其所未嘗學者則不能有以通也故其聞一則止能知二非以臆度而言則亦不能以屢中聖人以此告之使之知所謂理者本一理也以是而貫通之則天下事物之多皆不外乎是而無不通矣問謝氏謂如天於衆形非物物刻而雕之如何曰天只是一氣流行萬物自生自長自形自色豈是逐一粧㸃得如此聖人只是一箇大本大原裏發出視自然眀聽自然聰色自然溫貌自然恭在父子則為仁在君臣則為義從大本中流出便成許多道理只是這箇一便貫將去所主是忠發出去無非是恕又曰曽子是事實上做出子貢是就識見上得來曽子從實處見一直透上去子貢雖是知得較似滯在知識上曽子是就源頭上面流下來子貢是就下面推上去南軒曰賜之學博矣夫子欲約之也故告以豫一以貫之使極夫體之所該用之所宗不至泛而無統也夫子之告子貢與告曽子理則一而告之之意則異也於參也所以達其至於賜也所以迪其歸二子所造蓋有淺深故所以告之之意不同然在教之當其可則一也問眀道曰維天之命於穆不已不其忠乎天地變化草木蕃不其恕乎伊川曰乾道變化各正性命恕也侯子曰伊川說得尤有功天授萬物之謂命春生之冬藏之歲歲如是天未嘗一歲誤萬物也可謂忠矣萬物洪纎髙下長短各得其欲可謂恕矣某謂二先生之言不見有差殊其在萬物得其所以蕃生便是正性命不知侯子何以分輕重兼謂維天之命為天授萬物者恐此天命只是天理伊川所謂在天為命不必須是授之萬物始謂之命故又謂春生冬藏歲歲如是未嘗誤萬物為忠恐此亦只是恕蓋已發者也南軒答曰眀道之言意固完具但伊川所舉各正性命之語為更有功忠體也恕用也體之而用未嘗不存其中用之所形體亦未嘗不具也以此語玩味則見伊川言尤有功處侯子所說忠字恐未為得二先生之意天命且於理上推原未可只去一元之氣上看愚按學者或有以一貫萬為一貫者如此則是以巳之一貫彼之萬雖聖人亦未免於有意且裂道與一而為二也其可乎學者當味聖人之言曰吾道一以貫之而不曰以一貫之斯得之矣子曰誰能出不由户何莫由斯道也朱子曰言人不能出不由戶何故乃不由此道耶怪而嘆之之辭洪氏曰人知出必由戶而不知行必由道非道逺人人自逺爾或問云云曰何莫之云猶曰何莫學夫詩耳若直以出不能不由戶譬夫行之不能不由道則世之悖理犯義而不由於道者為不少矣又何說以該之耶子在川上曰逝者如斯夫不舍晝夜朱子曰天地之化往者過來者續無一息之停乃道體之本然也然其可指而易見者莫如川流故於此發以示人欲學者時時省察而無毫髮之間斷也程子曰此道體也天運而不已日往則月來寒往則暑來水流而不息物生而不窮皆與道為體運乎晝夜未嘗已也是以君子法之自强不息及其至也純亦不已焉又曰自漢以來儒者皆不識此義此見聖人之心純亦不已也純亦不已乃天德也有天德便可語王道其要只在謹獨問集注云此道體之本然也後又曰皆與道為體向見先生說道無形體却是這物事盛載那道出來故可見與道為體言與之為體也這體字較粗如此則與本然之體微不同曰也便在裏面只是前面體字說得來較闊連本末精粗都包在裏面後面與道為體之體又說出那道之深切底骨子恐人說物自物道自道所以指物以見道其實這許多物事凑合來便都是道之體道體便在這許多物事上只是水上較親切易見問張思叔說此是無窮程子曰一箇無窮如何便了得何也曰固是無窮然須看因甚恁地無窮須見得所以無窮處始得問有天德便可語王道曰有天德則便是天理便做得王道無天德則是私意計較所以做王道不成因云舊曽作觀瀾閣詞有曰因常流之不息悟有本之無窮又曰天德流行之妙若有私欲以間之便如水被障塞不得滔滔地去問程子曰其要只在謹獨如何曰能謹獨則無間斷而其理不窮若不謹獨便有人欲來參入裏面便間斷了如何㑹得如川流底意問程子云自漢諸儒皆不識此義如何曰此事却了孔孟却猶是佛老見得些模樣後來儒者於此全無相著如何教他不做大曰只為佛老從心上起工夫其學雖不然却有本儒者只從言語文字上做有知此事是合理㑹者亦只做一場說話過了所以輸與他先生曰彼所謂心上工夫本不是然却勝似今儒者多公此說却是范氏說與道為體四字甚精蓋物生水流非道之體乃與道為體南軒曰此不息之體也自天地日月以至於草本之微其生道何莫不然體無乎而不具也君子之自强不息所以體之也聖人之心純亦不已則與之非二體矣川流蓋其著見易察者故因以眀之子曰人能𢎞道非道𢎞人朱子曰𢎞廓而大之也人外無道道外無人然人心有覺而道體無為故人能大其道道不能大其人也張子曰心能盡性人能洪道也性不知檢其心非道洪人也或問云云曰人即道之所在道即所以為人之理不可殊觀但人有知思則可以大其所有之理道無方體則豈能大其所託之人哉黃氏曰人能𢎞道當自勉以力求非道𢎞人不可安坐而求得中庸道也者不可須臾離也可離非道也朱子曰道者日用事物當然之理皆性之德而具於心無物不有無時不然所以不可須臾離也若其可離則為外物而非道矣按輯略程子曰一物不該非中也一事不為非中也一息不存非中也何哉為其偏而已矣故曰道也者不可須臾離也可離非道也修此道者戒愼乎其所不睹恐懼乎其所不聞而已由是而不息焉則上天之載無聲無臭可以馴致也又曰道之外無物物之外無道是天地之間無適而非道也即父子而父子在所親即君臣而君臣在所敬以至為夫婦為長幼為朋友無所為而非道此道之所以不可須臾離也呂氏曰率性之謂道則四端之在我者人倫之在彼者皆吾性命之理受乎天地之中所以立人之道不可須臾離也絶類離倫無意乎君臣父子者過而離乎此者也賊恩害義不知有君臣父子者不及而離乎此者也雖過不及有差而皆不可以行於世故曰可離非道也楊氏曰夫盈天地之間孰非道乎道而可離則道有在矣譬之四方有定位焉適東則離乎西適南則離乎北斯則可離也若夫無適而非道則烏得而離邪故寒而衣飢而食日出而作晦而息耳目之視聽手足之舉履無非道也此百姓所以日用而不知伊尹耕於有莘之野以樂堯舜之道夫堯舜之道豈有物可玩而樂之乎即耕於有莘之野是已此農夫田父之所日用者而伊尹之樂有在乎是若伊尹所謂知之者也朱子曰楊氏無適非道之云則善矣然其言似亦有未盡蓋衣食作息視聽舉履皆物也其所以如此之義理凖則乃道也若曰所謂道者不外乎物而人在天地之間不能違道而獨立是以無適而不有義理之凖則不可頃刻去之而不由則是中庸之㫖也若便指物以為道而曰人不能頃刻而離此百姓特日用而不知耳則是不唯昧於形而上下之别而墮於釋氏作用是性之失且使學者誤謂道無不在雖欲離之而不可得吾既知之則雖猖狂妄行亦無適而不為道則其為害將有不可勝言者不但文義之失而已也所謂不可離者謂道也若便以日用之間舉止動作便是道則無適而非道無時而非道然則君子何用戒謹恐懼耶為其不可離須是依道而行始得按此章當與性道教戒愼恐懼致中和二章參玩君子之道費而隱朱子曰費用之廣也隱體之微也夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉天地之大也人猶有所憾故君子語大天下莫能載焉語小天下莫能破焉君子之道近自夫婦居室之間逺而至於聖人天地之所不能盡其大無外其小無內可謂費矣然其理之所以然則隱而莫之見也蓋可知可能者道中之一事及其至而聖人不知不能則舉全體而言聖人固有所不能盡也侯氏曰聖人所不知如孔子問禮問官之類所不能如堯舜病博施之類愚謂人所憾於天地如覆載生成之偏及寒暑災祥之不得其正者詩云鳶飛戾天魚躍于淵言其上下察也詩大雅早麓之篇鳶鴟類戾至也察著也子思引此詩以眀化育流行上下昭著莫非此理之用所謂費也然其所以然者則非見聞所及所謂隱也故程子曰此一節子思喫緊為人處活潑潑地學者其致思焉君子之道造端乎夫婦及其至也察乎天地結上文輯略程子曰費日用處問聖人亦何有不能不知也天下之理聖人豈有不盡者蓋於事有所不遍知不遍能也至纎悉委曲處如農圃百工之事孔子亦豈能知哉又曰此一段與必有事焉而勿正心之意同活潑潑地㑹得時活潑潑地㑹不得只是㺯精神又曰鳶飛戾天向上更有天在魚躍于淵向下更有地在謝氏曰鳶飛戾天魚躍于淵非是極其上下而言蓋真箇見得如此此正是子思喫緊道與人處若從此解悟便可入堯舜氣象又曰鳶飛云云無些私意上下察以眀道體無所不在非指鳶魚而言若指鳶魚則上面更有天下面更有地在知勿忘勿助長則知此知此則知夫子與㸃之意又曰鳶飛云云猶韓愈所謂魚川泳而鳥雲飛上下自然各得其所也詩人之意言如此氣象周王作人似之子思之意言上下察也猶孟子所謂必有事焉而勿正察見天理不用私意也故結上文云君子語大天下莫能載語小天下莫能破今人學詩將章句橫在肚裏怎生得脫灑去或問云云朱子曰道之用廣而其體則微密而不可見所謂費而隱也即其近而言之則男女居室人道之常雖愚不肖亦能知而行之極其逺而言之則天下之大事理之多聖人亦容有不盡知盡能者也然非獨聖人有所不知不能也天能生覆而不能形載地能形載而不能生覆至於氣化流行則隂陽寒暑吉凶災祥不能盡得其正者尤多此所以天地之大而人猶有憾也夫自夫婦之愚不肖所能知行至於聖人天地之所不能盡道蓋無所不在也故君子之語道也其大至於天地聖人之所不能盡而道無不包則天下莫能載矣其小至於愚夫愚婦之所能知能行而道無不體則天下莫能破矣道之在天下其用之廣如此可謂費矣而其所用之體則不離乎此而有非視聽之所及者此所以為費而隱也子思之言至此極矣然猶以為不足以盡其意故又引詩以眀之曰鳶飛戾天魚躍于淵所以言道之體用上下昭著而無所不在也造端乎夫婦極其近小而言也察乎天地極其逺大而言也蓋夫婦之際隱微之間尤見道之不可離處知其造端於此則其所以戒謹恐懼之實無不至矣曰然則程子所謂鳶飛魚躍子思喫緊為人處與必有事焉而勿正心之意同活潑潑地者何也曰道之流行發見於天地之間無所不在在上則鳶之飛而戾于天者此也在下則魚之躍而出乎淵者此也其在人則日用之間人倫之際夫婦之所知所能而聖人之所不知不能者亦此也此其流行發見於上下之間者可謂著矣子思於此指而言之惟欲學者於此默而識之則為有以洞見道體之妙而無疑而程子以為子思喫緊為人處者正以示人之意為莫切於此也其曰與必有事焉而勿正心之意同活潑潑地則又以眀道之體用流行發見充塞天地亘古亘今雖未嘗有一毫之空闕一息之間斷然其在人而見諸日用之間者則初不外乎此心故必此心之存而後有以自覺也必有事焉而勿正心活潑潑地亦曰此心之存而全體呈露妙用顯行無所滯礙云爾非必仰而視乎鳶之飛俯而觀乎魚之躍然後可以得之也抑孟子此言固為精密但為學者集義養氣而發耳至於程子借以為言則又以發眀學者洞見道體之妙非但如孟子之意而已也蓋此一言雖若二事然其實則必有事焉半詞之間已盡其意善用力者茍能於此超然默㑹則道體之妙已躍如矣何待下句而後足於言耶聖人特恐學者用力之過而反為所纍故更以下自解之欲其雖有所事而不為所纍爾非謂必有事焉又當别設此念以為正心之防也曰然則其所謂活潑潑地者毋乃釋氏之遺意耶曰此但俚俗之常談釋氏蓋嘗言之而吾亦言之爾彼固不得而專也況吾之所言雖與彼同而所以形容實與彼異若出於吾之所謂則夫道之體用固無不在然鳶而必戾于天魚而必躍于淵是君君臣臣父父子子各止其所而不可亂也若出于彼之所謂則鳶可以躍淵而魚可以戾天矣是安可同日而語哉謝氏既曰非是極其上下而言又曰非指鳶魚而言蓋曰子思之引此詩姑借二物以眀道體無所不在之實非以是為窮其上下之極而形其無所不包之量也又非以是二物專為形其無所不在之體而欲學者之必觀乎此也此其發眀程子之意蓋有非一時同門之士所得聞者而别以夫子與㸃之意眀之則其為說益以密矣但所謂察見天理者恐非本文之訓而於程氏之意亦未免小失之耳問形而上下與費而隱如何曰形而上下者就物上說費而隱者就道上說夫婦之愚可以與知焉若據先儒解當初何不道行道之人何不道衆人之愚何為說夫婦是必有意至者非極至之至蓋道無不包若盡論之聖人豈能纎悉盡知伊川之說是問語小天下莫能破是極其小而言之今以一髮之微尚有可破而為二者所謂莫能破則足以見其小曰然鳶飛可見魚躍可見而所以飛所以躍果何物也中庸不言隱者隱在費之中鳶飛魚躍之說蓋是分眀見得道體隨事發見處察者著也非審察之察詩中之意本不為此中庸只是借此兩句形容道體鳶飛魚躍費也必有一箇什麼物使得他如此此便是隱問鳶飛魚躍如何與他勿忘勿助長之意同曰孟子本言得粗程子却說得細只是用其語如程子之說却不曽說勿字蓋謂都沒耳其曰正當處者謂天理流行處故謝氏亦以此論曽㸃事其所謂勿忘勿助長者亦非立此在四邊做防檢不得犯著蓋謂俱無此而皆天理之流行耳問鳶有鳶之性魚有魚之性其飛其躍天機自完便是天理流行發見之妙處故子思姑舉此一二眀道之無所不在否曰是活潑潑地所謂活者只是不滯於一隅問中庸言造端乎夫婦何也先生曰夫婦者人倫中之至親且密者夫人所為蓋有不可告其父兄而悉以告其妻子者問費隱章都是說費却不說隱莫是所謂隱者只在費中否曰惟是不說乃所以見得隱在其中舊人多分畫將聖人不知不能處做隱下面都說不去且如鳶飛戾天魚躍于淵亦何嘗隱來子曰道不逺人人之為道而逺人不可以為道朱子曰道者率性而已固衆人之所能知能行者也故常不逺於人若為道者厭其卑近以為不足為而反務為髙逺難行之事則非所以為道矣詩云伐柯伐柯其則不逺執柯以伐柯睨而視之猶以為逺故君子以人治人改而止詩豳風伐柯之篇柯斧柄則法也睨邪視也言人執柯伐木以為柯者彼柯長短之法在此柯耳然猶有彼此之别故伐者視之猶以為逺也若以人治人則所以為人之道各在當人之身初無彼此之别故君子之治人也即以其人之道還治其人之身其人能改即止不治蓋責之以其所能知能行非欲其逺人以為道也張子所謂以衆人望人則易從是也忠恕違道不逺施諸已而不願亦勿施於人盡己之心為忠推已及人為恕違去也言自此至彼相去不逺非背而去之之謂也道即其不逺人者是也施諸已而不願亦勿施於人忠恕之事也以巳之心度人之心未嘗不同則道之不逺於人者可見故巳之所不欲則勿以施之於人亦不逺人以為道之事張子所謂以愛己之心愛人則盡仁是也君子之道四丘未能一焉所求乎子以事父未能也所求乎臣以事君未能也所求乎弟以事兄未能也所求乎朋友先施之未能也庸德之行庸言之謹有所不足不敢不勉有餘不敢盡言顧行行顧言君子胡不慥慥爾求猶責也道不逺人凡己之所以責人者皆道之所當然也故反之以自責而自修焉庸平常也行者踐其實謹者擇其可德不足而勉則行益力言有餘而訒則謹益至謹之至則言顧行矣行之力則行顧言矣慥慥篤實貌言君子之言行如此豈不慥慥乎贊美之也凡此皆不逺人以為道之事也張子所謂以責人之心責巳則盡道是也集略程子曰以巳及物忠也推己及物恕也違道不逺是也詳見一貫章又曰忠恕兩字要除一箇不得或問恕字學者可用力否曰恕字甚大然不可獨用須得忠以為體不忠何以能恕看忠恕兩字自見得相為用處張子曰所求乎君子之道四是實未能道何嘗有盡聖人人也人則有限是誠不能盡道也聖人之心則直欲盡道事則安能盡又曰以責人之心責巳則盡道所謂君子之道四丘未能一焉者也以愛己之心愛人則盡仁所謂施諸已而不願亦勿施於人者也以衆人望人則易從所謂以人治人改而止者也此君子所以責巳責人愛人之三術也問忠恕謝氏曰猶形影也無忠做恕不出來或問子以為以人治人為以彼人之道還治彼人善矣又謂責其所能知能行而引張子之說以實之則無乃流於姑息之論而所謂人之道者不得為道之全也耶曰上章固言之矣夫婦之所能知能行者道也聖人之所不知不能而天地猶有憾者亦道也然自人而言則夫婦之所能知能行者人之所切於身而不可須臾離者也至於天地聖人所不能及則其求之當有漸次而或非日用之所急矣然則責人而先其切於身之不可離者後其有漸而不急者是乃行逺自邇登髙自卑之序使其由是而不已焉則人道之全亦將可以馴致今必以是為姑息而遽欲盡道以責於人吾見其失先後之序違緩急之宜人之受責者將至於有所不堪而道之無窮則終非一人一日之所能盡也是亦兩失之而已曰諸說如何曰諸家說論語者多引此章以明一以貫之之義說此章者又引論語以釋違道不逺之意一矛一盾終不相謀而牽合不置學者蓋深病之及深考乎程子之言有所謂動以天者然後知二者之為忠恕雖同實異非其知德之深知言之至其孰能判然如此而無疑哉然盡已推己乃忠恕之所以名而正為此章違道不逺之事若動以天而一以貫之則不待盡已而至誠者自無息不待推已而萬物已各得其所矣曽子之言蓋指其不可名之妙而借其可名之粗以眀之學者默識於言意之表則亦足以互相發眀而不害其為同也違道不逺如齊師違榖之違蓋曰自此而去以至於穀才七里耳孟子所云夜氣不足以存則其違禽獸不逺耳非謂昔本禽獸而今始違之也亦曰自此而去以入於禽獸不逺耳蓋所謂道者當然之理而已根於人心而見諸行事不待勉而能也然唯盡巳之心而推以及人可以得其當然之實而施無不當不然則求之愈逺而愈不近矣此所以自是忠恕而往以至於道獨為不逺非背而去之之謂也程子又謂事上之道莫若忠待下之道莫若恕此則不可曉者若姑以所重言之則似亦不為無理若究其極則忠之與恕初不相離程子所謂要除一箇除不得而謝氏以為猶形影者意可見矣今析為二事而兩用之則是果有無恕之忠無忠之恕而所以事上接下者皆出於强為而不由乎中矣是於程子他說殊不相似意其記録之或誤不然則一時有為言之而非正為忠恕發也若程子所謂天地之不恕亦曰天地之化生生不窮特以氣機闔闢有通有塞故當其通也天地變化草木蕃則有似於恕當其塞也天地閉而賢人隱則有似於不恕耳其曰不恕非若人之蔽於私欲而實有忮害之心也謝氏推眀其說乃謂天地之有不恕乃因人而然則其說有未究者蓋若以為人不致中則天地有時而不位人不致和則萬物有時而不育是謂天地之氣因人之不恕而有似於不恕則可若曰天地因人之不恕而實有不恕之心則是彼為人者既以忮心失恕而自絶於天矣為天地者反效其所為以自己其於穆之命也豈不誤哉楊氏謂以人為道則與道二而逺於道故戒人不可以為道如執柯以伐柯則與柯二故晲而視之猶以為逺則其違經背理又有甚焉使經而曰人而為道則逺人故君子不可以為道則其說信矣今經文如此而其說乃如彼既於文義有所不通而推其意又將使道為無用之物人無入道之門而聖人之教人以為道者反為誤人而有害於道是安有此理哉侯氏四者未能之說獨以為若止謂恕巳以及人則是聖人將使天下皆無父子君臣矣此則諸家皆所不及蓋近世果有不得其讀而輒為之說曰此君子以一已之難克而知天下皆可恕之人也嗚呼此非所謂將使天下皆無父子君臣者乎侯氏之言於是乎驗矣未改以前是失人道既改則便是復得人道更何用治他能改即是善矣更何待别求善天下只是一箇善惡不善即惡不惡即善只改底便是善所求乎子以事父未能也須要如舜之事父方盡得子之道若有一毫不盡便是道理有所缺闕便非子之道矣所求乎臣以事君未能也須要如舜周公之事君若有一毫不盡便非臣之道矣無不是如此只緣道理當然自是住不得論著忠恕名義自合依子思忠恕違道不逺是也曽子所說却是移上一階說聖人之忠恕其實只一箇忠恕須自看教有許多等級分眀或問到得忠恕已是道如何云違道不逺曰仁是道忠恕正是學者著力下工夫處問忠恕即道也而曰違道不逺何耶曰道是自然底人能忠恕則去道不逺也按此章當與前一貫章參玩則忠恕之義盡矣大哉聖人之道朱子曰包下文兩節而言洋洋乎發育萬物峻極于天峻髙大也此言道之極于至大而無外也優優大哉禮儀三百威儀三千優優充足有餘之意禮儀經禮也威儀曲禮也此言道之入於至小而無間也待其人而後行總結上兩節故曰苟不至德至道不凝焉至德謂其人至道指上兩節而言也凝聚也成也輯略程子曰中庸言禮儀三百威儀三千方是說優優大哉又却非如異教之說須得如枯木死灰以為得也張子曰禮儀三百威儀三千無一物之非仁也故君子尊德性而道問學致廣大而盡精微極髙眀而道中庸溫故而知新敦厚以崇禮尊者恭敬奉持之意德性者吾所受於天之正理也溫猶燖溫之溫謂故學之矣復時習之也敦加厚也尊德性所以存心而極乎道體之大也道問學所以致知而盡乎道體之細也二者修德凝道之大端也不以一毫私意自蔽不以一毫私欲自纍涵泳乎其所已知敦篤乎其所已能此皆存心之屬也析理則不使有毫釐之差處事則不使有過不及之謬理義則日知其所未知節文則日謹其所未謹此皆致知之屬也蓋非存心無以致知而存心者又不可以不致知故此五句大小相資首尾相應聖賢所示入德之方莫詳於此學者宜盡心焉道者自然之名德者人之所得故禮者道體之節文必其人之有德然後乃行之也溫故知新敦厚崇禮諸說但以二句相對眀其不可偏廢大意固然細分之則溫故然後有以知新而溫故又不可不知新敦厚然後有以崇禮而敦厚又不可不崇禮此諸說之所遺也大抵此五句承章首道體大小而言故一句之內皆具大小二意云云聖人之道峻極于天只是充塞天地底意思禮儀三百威儀三千優優大哉皆是天道流行發見為用處禮儀三百威儀三千一事不可缺闕才闕一事便是於全體有虧佛氏之學只說道無不存無適非道只此便了若有一二事不著亦不妨廣大似所謂理一精微似所謂分殊聖人事事著實禮樂刑政文為制度觸處都是體用動靜互換無端都無少許空闕處問致廣大章句以為不以一毫私意自蔽極髙眀是不以一毫私欲自纍何也曰此心本廣大若有一毫私意蔽之便狹小此心本髙眀若有一毫私欲纍之便卑汚若能不以私意自蔽則其心廣闊都無此疆彼界底意思自然能致廣大不以私欲自纍則其心峻潔決無浮下昏冥底意思自然能極髙眀因舉張子曰陽眀勝則德性用隂濁勝則物欲行問尊德性而道問學行意在先擇善而固執之知意又在先如何曰此便是互相為用處大哉聖人之道云云是言道之大處禮儀威儀是言道之細處只章首便分兩節來故下文五句又相因尊德性至敦厚此上一截便是渾淪處道問學至崇禮此是下一截便是詳密處道體之大者直是難守細處又難窮究若有上一截而無下截只道是我渾淪更不務致知則茫然無覺若有下一截而無上截只管要纎悉皆知更不去行則又空無所倚有一般人實是篤厚淳朴然或箕踞不以為非便是不崇禮只管去理㑹禮文而不篤厚則又無以居之所以忠信之人可以學禮便是敦厚以崇禮底意道體之大無窮而於其間文理密察有不可以毫釐差者此聖賢之語道所以既言發育萬物峻極于天以形容其至大而又必曰禮儀三百威儀三千以該悉其至微而其指示學者修德凝道之功所以既曰致其廣大而又必曰盡其精微也近世之言道者則不然其論大抵樂渾全而忌剖析喜髙妙而略細微其於所謂廣大者則似之而於精微則不察則其所謂廣大者亦未易以議其全體之真也古之君子尊德性矣而必曰道問學致廣大矣而必曰盡精微極髙眀矣而必曰道中庸溫故知新矣而必曰敦厚崇禮蓋不如是則所學所守必有偏而不備之處惟其如是故居上不驕為下不倍有道足以興無道足以容而無一偏之蔽也或謂尊德性至崇禮六句不必以存心致知為分蓋道之在天下至大而無外至小而無間尊德性者存心養性之功道學問者致知格物之事能存心養性矣而未能格物以致知則其於道必有不盡者下四句亦然雖大而窮理未精不足以盡道造理雖髙而行事未合乎中不足以盡道已學而用功不繼質厚而守禮不嚴皆不足以盡道故必內外本末粗細顯微交致其功然後於道體之大者無不到其細者亦無所遺至德謂此五者不如是則至道不凝也此說與章句少異姑存之南軒記時習之室曰中庸曰茍不至德至道不凝德道至於凝則斯能有之矣惟至德可以凝道古之人禮儀三百威儀三千君臣父子夫婦朋友之際灑掃應對獻酬交酢以至於坐立寢食之間無一而不在德焉至纎至悉也所以成其天理而已蓋毫釐之間不至則毫釐之間天理不在故學而時習之無時而不習也念念不忘天理也此所以至德以凝道也及其久也融然無間渙然和順而內外精粗上下本末功用一貫無餘力矣按此雖為時習而言然於此章之義有所發眀故附焉曹交問曰人皆可以為堯舜有諸孟子曰然趙氏曰曹交曹君之弟也人皆可以為堯舜疑古語或孟子所嘗言也交聞文王十尺湯九尺今交九尺四寸以長食粟而已如何則可曹交問也食粟而已言無他材能也曰奚有於是亦為之而已矣有人於此力不能勝一匹雛則為無力人矣今曰舉百鈞則為有力人矣然則舉烏獲之任是亦為烏獲而已矣夫人豈以不勝為患哉弗為耳匹字本作鴄鴨也從省作匹禮記說匹為鶩是也烏獲古之有力人也能舉移千鈞徐行後長者謂之弟疾行先長者謂之不弟夫徐行者豈人所不能哉所不為也堯舜之道孝弟而已矣陳氏曰孝弟者人之良知良能自然之性也堯舜人倫之至亦率是性而已豈能加毫末於是哉楊氏曰堯舜之道大矣而所以為之乃在夫行止疾徐之間非有甚髙難行之事也百姓蓋日用而不知耳子服堯之服誦堯之言行堯之行是堯而已矣子服桀之服誦桀之言行桀之行是桀而已矣言為善為惡皆在我而已詳曹交之問淺陋粗率必其進見之時禮貌衣冠言動之間多不循理故孟子告之如此兩節云曰交得見於鄒君可以假館願留而受業於門假館而後受業又可見其求道之不篤曰夫道若大路然豈難知哉人病不求耳子歸而求之有餘師言道不難知若歸而求之事親敬長之間則性分之內萬理皆備隨處發見無不可師不必留此而受業也曹交事長之禮既不至求道之心又不篤故孟子教之以孝弟而不容其受業蓋孔子餘力學文之意亦不屑之教誨也問云云曰楊氏之說有曰佛者龎藴有神通并妙用運水及般柴此乃自得之言最為達理但其言周遮便要通徹亦須把來做一件事若孟子之言則無適不然矣愚竊惑之夫釋氏之言偶與聖賢相似者多矣但其本不同則雖相似而實相反也蓋如此章孟子之言均是行也而一疾一徐其間便有堯桀之異是乃物則民彞自然之實理而豈人之所能為哉若釋氏之言則但能運水般柴則雖倒行逆施亦無所適而不可矣何必徐行而後可以為堯哉蓋其學以空為真以理為障而以縱橫作用為竒特故與吾儒之論正相南北至於如此今不察焉而以達理自得稱之至語其病則以為特在於周遮著意而已如此則是凡為佛者去此二病而遂與吾學不殊也程子有言以吾觀於釋氏句句同事事合然以其本之不正是以卒無一事之同正謂此爾或問於胡文定公曰禪者以拈槌竪拂為妙用如何公曰以此為用用而不妙須是動容周旋中禮始是妙用處求之楊氏之言其得失可見矣右專言道德易大畜彖曰大畜剛健篤實輝光日新其德程子曰以卦之才德而言也乾體剛健艮體篤實人之才剛健篤實則所蓄能大充實而有輝光畜之不已則其德日新乾四德見前諸卦象之言德者皆别見恆九三不恆其德或承之羞貞吝程子曰三陽爻居陽位處得其位是其常處也乃志從於上六不唯隂陽相應風復從雷於恆處而不處不恆之人也其德不當則羞辱或承之謂有時而至也貞吝固守不恆以為恆豈不可羞吝乎象曰不恆其德無所容也人既無常何所容處論語子曰南人有言曰人而無恆不可以作巫醫善夫朱子曰南人南國之人恆常久也巫所以交鬼神醫所以寄死生故雖賤役而尤不可以無常孔子稱其言而善之不恆其德或承之羞子曰不占而已矣南軒曰謂理之必然不待占而可知也子曰德不孤必有鄰朱子曰鄰猶親也德不孤立必以類應故有德者必有其類從之如居之有鄰也南軒曰德立於已則衆善從之其為不孤蓋理之必然如善言之集良朋之來皆所謂有鄰也語其至則天下歸仁亦是也易敬義立而德不孤又是一義見本篇子曰由知德者鮮矣朱子曰德謂義理之得於巳者非巳有之不能知其意味之實也南軒曰知德者鮮以其踐履之未至故不能真知其味夫子以此告子路使之勉進於德而不以聰眀彊力為可恃也子張問崇德辨惑子曰主忠信徙義崇德也朱子曰主忠信則本立徙義則日新愛之欲其生惡之欲其死既欲其生又欲其死是惑也愛惡人之常情也然人之生死有命非可得而欲也以愛惡而欲其生死則惑矣既欲其生又欲其死則惑之甚也楊氏曰堂堂乎張也難與並為仁矣則非誠善補過不蔽於私者故告之如此或問崇德辨惑何以有是目而子張樊遲皆以為問也曰胡氏以為或古有是言或世有是名聖人標而出之使諸弟子隨其所欲知思其所未達以為入道之門戶也其說得之矣曰主忠信徙義之所以為崇德何也曰主忠信則其徙義也有地而可據能徙義則其主忠信也有用而日新內外本末交相培養此德之所以日積而益髙也曰愛之欲其生惡之欲其死既欲其生又欲其死所以為惑者何也曰溺於愛惡之私而以彼之死生定分為可以隨已之所欲且又不能自定而一生一死交戰於胸中虛用其力於所不能必之地而實無所損益於彼也可不謂之惑乎南軒曰崇德辨惑修身之切務也以忠信為主而見義則徙焉則本立而日新德之所以崇也不主忠信則無徙義之實不能徙義則所主亦有時而失其理矣二者蓋相須也愚按欲生欲死必有所為而言所以針子張之失也樊遲從遊於舞雩之下曰敢問崇德修慝辨惑胡氏曰慝之字從心從匿蓋惡之匿於心者修者治而去之子曰善哉問朱子曰善其切於為巳先事後得非崇德與攻其惡無攻人之惡非修慝與一朝之忿忘其身以及其親非惑與先事後得猶言先難後獲也為所當為而不計其功則德日積而不自知矣專於治已而不責人則已之惡無所慝矣知一朝之忿為甚微而禍及其親為甚大則有以辨惑而懲其忿矣樊遲粗鄙近利故告之以此三者皆所以救其失也范氏曰先事後得上義而下利也人唯有利欲之心故德不崇唯不自省已過而知人之過故慝不修感物而易動者莫如忿忘其身以及其親惑之甚者也惑之甚者必起於細微能辨之於早則不至於大惑矣故懲忿所以辨惑也南軒曰先其所事而不計其得此德所以崇也若先有求得之心反傷於德矣愚按范氏以利欲為得與先難後獲異而集注兼取之蓋並存兩說也子曰鄉原德之賊也朱子曰鄉者鄙俗之意原與願同荀子原慤注作願是也鄉原者鄉人之願者也蓋其同流合汚以媚於世故在鄉人之中獨以原稱夫子以其似德而反亂乎德故以為德之賊而深惡之萬章問曰孔子在陳曰盍歸乎來吾黨之士狂簡進取不忘其初孔子在陳何思魯之狂士盍何不也狂簡謂志大而略於事進取謂求望髙逺不忘其初謂不能改其舊也此語與論語少異孟子曰孔子不得中道而與之必也狂狷乎狂者進取狷者有所不為也孔子豈不欲中道哉不可必得故思其次也論語道作行狷作狷有所不為者知耻自好不為不善之人也敢問何如斯可謂狂矣曰如琴張曽晳牧皮者孔子之所謂狂矣琴張名牢字子張子桑戶死琴張臨其喪而歌季武子死曽晳倚其門而歌牧皮未詳何以謂之狂也曰其志嘐嘐然曰古之人古之人夷考其行而不掩焉者也嘐嘐志大言大也重言古之人見其動輒稱之不一稱而已也夷平也掩覆也言平考其行而不能覆其言也程子曰曽晳言志而夫子與之蓋與聖人之志同便是堯舜氣象也特行有不掩焉耳此所謂狂也狂者又不可得欲得不屑不潔之士而與之是狷也是又其次也此因上文所引遂解所以思得狷者之意狂有志者也狷有守者也有志者能進於道有守者不失其身屑潔也孔子曰過我門而不入我室我不憾焉者其惟鄉原乎鄉原德之賊也曰何如斯可謂之鄉原矣曰何以是嘐嘐也言不顧行行不顧言則曰古之人古之人行何為踽踽涼涼生斯世也為斯世也善斯可矣閹然媚於世也者是鄉原也踽踽獨行不進之貌涼涼薄也不見親厚於人也鄉原譏狂者曰何用如此嘐嘐然行不掩其言而徒每事必稱古人邪又譏狷者曰何必如此踽踽涼涼無所親厚哉人既生於此世則但當為此世之人使當世之人皆以為善則可矣此鄉原之志也閹如奄人之奄閉藏之意也媚求悅於人也孟子言此深自閉藏以求親媚於世是鄉原之行也萬章曰一鄉皆稱原人焉無所往而不為原人孔子以為德之賊何哉曰非之無舉也刺之無刺也同乎流俗合乎汙世居之似忠信行之似亷潔衆皆悅之自以為是而不可與入堯舜之道故曰德之賊也呂侍講曰言此等之人欲非之則無可舉欲刺之則無可刺也流俗者風俗頽靡如水之下流衆莫不然也汙濁也非忠信而似忠信非亷潔而似亷潔孔子曰惡似而非者惡莠恐其亂苗也惡佞恐其亂義也惡利口恐其亂信也惡鄭聲恐其亂樂也惡紫恐其亂朱也惡鄉原恐其亂德也孟子又引孔子之言以眀之莠似苖之草也佞才智之稱其言似義而非義也利口多言而不實者也鄭聲淫樂也樂正樂也紫間色朱正色也鄉原不狂不狷人皆以為善有似乎中道而實非也故恐其亂德君子反經而已矣經正則庶民興庶民興斯無邪慝矣反復也經常也萬世不易之常道也興興起於善也邪慝如鄉原之屬是也世衰道微大經不正故人人得為異說以濟其私而邪慝並起不可勝正君子於此亦復其常道而已常道既復則民興於善而是非眀白無所回互雖有邪慝不足以惑之矣南軒曰道以中為貴然中道而立為難故非極髙眀則不能以道中庸孔子固欲中道者而與之惟其難得故思其次狂者所知進於髙逺狷者所守執之堅介嘐嘐然曰古之人古之人以古之聖賢為慕者以其知足以及之也至於考其所行則有未能掩其言者以其言之髙行有所未能踐故耳中庸所謂知者過之其狂者歟賢者過之其狷者歟云云鄉原自以為是惟其自以為是此其所以終為鄉原不可反也堯舜之道大中至正天理之存乎人心者也此所謂善也若鄉原之所謂善則出於一巳之私竊中庸之名而已異端之於正道如黑之與白本不足以賊德其如道之不眀世俗之見易以惑溺故以為德之賊也云云經者天下之常理中之見於庸者也君臣父子兄弟朋友敕而惇之而其倫有序仁義禮智推而達之而其道不窮所謂經也惟人背而去之莫知所止故君子反經以為民極經正則民興於善而邪慝自不能作此中庸之所以為至也帝王之所以治孔子之所以教不越於反經而已矣黃氏曰德者務合乎理者也鄉原求媚於世則不必皆合乎理而委曲遷就似乎理而實非理使人之為善者莫知乎理之正是天下之正理反為鄉原所害也如亷潔理之正也鄉原不欲為亷潔以異俗故亦同乎汙俗而外為說以自蓋使人視之似亷潔而實非亷潔而反以害亷潔之正也故貪夫不足以害亷惟假亷者乃所以害夫亷夫子所以深惡之也子曰道聽而塗說德之棄也朱子曰雖聞善言不為己有是自棄其德也王氏曰君子多識前言往行以畜其德道聽塗說則棄之矣南軒曰聞善者存而體之則其德畜聚若徒以資談說而已則於德何有哉是棄之也子曰巧言亂德小不忍則亂大謀朱子曰巧言變亂是非聽之使人喪其所守小不忍如婦人之仁匹夫之勇皆是蓋婦人之仁不能忍其愛匹夫之勇不能忍其暴其為不忍一也子夏曰大德不踰間小德出入可也朱子曰大德小德猶言大節小節間闌也所以止物之出入言能先立乎大者則小節雖或未盡合理亦無害也吳氏曰此章之言不能無弊學者詳之吳氏謂此章不能無弊學者正不可以此自恕一以小差為無害則於大節必將有枉尋而直尺者矣問伊川謂小德如援溺之事如何曰援溺事却是大處嫂溺不援是豺狼這處是當做更有甚麼出入子夏之說自有病只是他力量有行不及處然既是有力不及處不免有些子小小事放過者已是不是豈可謂之可也蓋子夏為人不及其質亦弱夫子亦每提他如女為君子儒無為小人儒無欲速無見小利之類南軒曰大德大體也小德萬目也君子所存大體固有定至其酬酢之際用權以取中初無一定之勢然未嘗不同歸焉如可以取可以無取可以與可以無與之類是也然而斯言以大德不踰間為本必大德不踰間而後小德可以出入蓋未嘗不在其間之中故曰可也不然本之不立而謂出入為可是小人之無忌憚而已南軒說甚善然非子夏本意姑存之中庸小德川流大德敦化此天地之所以為大也朱子曰小德者全體之分大德者萬殊之本川流者如川之流脈絡分眀而往不息也敦化者敦厚其化根本盛大而出無窮也此言天地之道以天地言之則髙下散殊者小德之川流於穆不已者大德之敦化以聖人言之則物各付物者小德之川流純亦不已者大德之敦化也大德是那敦化底小德是流出那敦化底這便如忠恕忠便是做那恕底恕便是流出那忠來底如中和中便是大德敦化和便是小德川流自古亘今都只是這一個道理聖人做出許多禮樂法度功勳事業只是這個道理做出來輯略程子曰川流是日用處大德是存主處如俗言敦本之意又曰大德敦化於化育處敦本也小德川流日用處也此言仲尼與天地合德張子曰接物處皆是小德統㑹處便是大德樂記禮樂皆得謂之有德德者得也鄉飲酒義德也者得於身也故曰古之學術道者將以得於身也程子曰得之於身謂之有德自然見面盎背四體不言而喻豈待勉强也又曰德者得也須是實到這裡方得以上言德所指不同其實一也宜參繹之書臯陶曰都亦行有九德亦言其人有德乃言曰載采采禹曰何臯陶曰寬而栗柔而立願而恭亂而敬擾而毅直而溫簡而亷剛而塞强而義彰厥有常吉哉程子曰九德最好張氏曰自寬至强皆天資自栗至義皆學力任性以行非過則不及以學輔之則為有用之德愚按此所謂氣質之性也蘇氏曰橫流而濟曰亂故才過人可以濟大難者曰亂亂臣十人是也又曰德惟一動罔不吉故常於是德然後為吉也林氏曰一德之常如霍光可謂有濟亂之才矣而在漢武左右小心謹敬出入殿門進止有常處郎僕射竊識視之不失尺寸者二十餘年此亂而敬之有常者武帝彰而用之遂能擁昭立宣況於九德咸事其效宜何如哉陳氏曰常者德之所安也人固有勉强矯拂亦足以欺人者能矯拂於暫而不能矯拂於久能矯拂於一時而不能矯拂於歲月惟其安而非有所勉强矯拂者乃德之常也至於常則不變矣朝夕如此窮達如此變故如此而其德曽不少變人主得斯人而彰顯之國之福也蔡氏曰寬而栗云云而轉語辭正言而反應者所以眀其德之不偏皆指其成德之自然非以彼濟此之謂愚按張氏以學力言蔡氏以成德言二說不同蓋嘗思之德不待學而成者生知安行者也自非聖人其氣質必有所偏學以治之然後能復其性之全故舜命䕫典樂以教胄子直而溫寬而栗剛而無虐簡而無傲正此意也又九德之訓諸家各有得失今取其長合為一說蓋寬洪者易失於疏闊必以縝密濟之栗木性之最密者也柔順者易流於委靡必以植立濟之謹願者未必能恭肅有辨治之才者未必能敬謹馴順之人少果毅徑直之人少溫和簡者多務大體未必事亷隅剛者或出血氣未必能篤實强者見事勇為未必能合義學以成德則無一偏之失柔而立剛而塞雖各為一德然寬也願也擾也簡也皆近柔故以栗以恭以毅以亷濟之皆剛之屬也亂也直也强也皆近剛故以敬以溫以義濟之皆柔之屬也此臯陶為禹陳知人之法也日宣三德夙夜浚眀有家日嚴祇敬六德亮采有邦翕受敷施蔡氏曰宣眀也三德六德者九德之中有其三有其六也浚治也亮亦眀也有家大夫也有邦諸侯也浚眀亮采皆言邦家政事眀治之義氣象則有大小之不同三德而為大夫六德而為諸侯以德之多寡職之大小槩言之夫九德有其三固不可有怠心必日宣而充廣之而使之益以著九德有其六尤不可有忽心必日嚴而祇敬之而使之益以謹也翕合也德之多寡雖有不同人君惟能合而受之布而用之如此則九德之人咸事其事而浚乂皆在其官以天下之才任天下之治唐虞之朝下無遺才而上無廢事者良以此也師師相師法也言百僚皆相師法而百工皆及時以趨事也百僚百工皆謂百官言其人之相師則曰百僚言其人之趨事則曰百工其實一也撫順也五辰四時也木火金水王於四時而土則寄旺於四季也凝成也言百工趨時而衆功皆成也書立政曰古之人迪惟有夏乃有室大競籲尊上帝迪知忱恂于九德之行蘇氏曰夏后氏之世王室所以大强者以求賢為事天之實也林氏曰迪知其忱恂是其心誠安於此而無所矯僞於其間故可以信其誠有是德不然則有以聲音笑貌而為之者矣蔡氏曰迪知者蹈知而非茍知也忱恂者誠信而非輕信也以上論九德伊尹作咸有一德呂氏曰自古以來聖賢入道各有自得處在堯舜禹謂之執中在伊尹謂之一德在孔子謂之忠恕在子思謂之中庸在孟子謂之仁義皆所以發眀前聖所未眀處太甲悔過既力故伊尹以入道極處告之曰惟尹躬暨湯咸有一德又曰終始惟一時乃日新又曰德惟一動罔不吉德二三動罔不凶無垢張氏曰一者天理故無往而不吉二三者人欲故無往而不凶又曰德無常師主善為師善無常主協于克一朱子曰伊尹告太甲許多語言句句是天理橫渠曰德主天下之善善原天下之一說得極好蓋從一中流出者無有不善所以伊尹曰常厥德曰庸德曰一德常也庸也一也只是一理又曰此四句三節一節緊似一節德且是大體說有吉德有凶德必主于善始為吉耳善亦且是大體說惟是協于克一是乃為善蓋善因一而後定也德以事言善以理言一以心言大抵此篇精神全在幾個一字上此心才一便終始不變而有常協字雖訓合乃是以此合彼之合非已相合之合與禮記協于分藝書協時月正日之協同義蓋若揆度參驗之意耳南軒曰自虞書精一之外惟此語最親切又曰德者善之總稱善者德之實行一者其本原統語其運則無息語其體則并包而無遺也咸有一德此章言一德書洪範六三德一曰正直二曰剛克三曰柔克平康正直彊弗友剛克燮友柔克沉潛剛克髙眀柔克蘇氏曰不剛不柔曰正直張氏曰三德即皇極之見於用者呂氏曰正直言皇極本體剛柔言皇極之用愚按平康正直三句孔氏謂世平安用正直治之世强禦不順以剛治之世和順以柔治之此說為善所謂因時而施之者也杜氏曰沉潛猶滯溺也髙眀猶亢爽也言各當以剛柔勝其本性乃能成全此說為近所謂因人而施之者也上三句以時言下二句以人言蓋治其過不及而歸之中者君師之職故曰乂用三德沉潛髙眀本皆美質但深沉者易偏于柔故濟之以剛杜氏滯溺之訓恐非先儒於此章多異說自孔安國從左氏傳以髙眀為天沉潛為地謂地雖柔亦有剛克能出金石天為剛德亦有柔克不干四時喻臣當執剛以正君君當執柔以綱臣不知此疇曰乂用則皆治人之事若君臣以剛柔相濟則治巳之事矣故今獨取杜氏之說而蔡氏有曰平康正直無事乎矯拂者也彊弗友剛克以剛克剛也燮友柔克以柔克柔也沉潛剛克以剛克柔也髙眀柔克以柔克剛也平直之用一而剛柔之用四也聖人撫世酬物因時制宜三德迭用陽以舒之隂以斂之執其兩端用其中於民所以納天下民俗於皇極者蓋如此其說亦善故附見焉呂刑惟敬五刑以成三德又左氏昭十二年南蒯將叛筮遇坤之比曰黃裳元吉以為大吉也示子服惠伯曰即欲有事何如惠伯曰吾嘗學此矣忠信之事則可不然必敗外强內溫忠也和以率貞信也故曰黃裳元吉黃中之色也裳下之飾也元善之長也中不忠不得其色下不共不得其飾事不善不得其極外內唱和為忠率事以供為共供養三德為善非此三者弗當杜氏曰三德謂正直剛克柔克也東萊呂氏曰正義云剛則抑之柔則進之以志意供給長養使合於中道今姑從之此章言三德中庸言三達德已見前右專言德德行書旅􅋙其末曰嗚呼夙夜罔或不勤不矜細行終纍大德為山九仞功虧一簣孔氏曰輕忽小物積害毁大故君子謹其微王氏曰大德細行之積也愚按武王大聖人也西旅貢􅋙初未之受召公恐其恃大德而忽細行以獻􅋙之受為無損故豫戒之如此蓋積行而成德猶纍土而成山一行失則全體皆失亦猶一簣虧而全功俱虧也彼以聖人而猶致其謹今人未有寸善則曰吾知顧其大不暇恤其細可乎哉周禮大司徒以鄉三物教萬民而賓興之一曰六德知仁聖義忠和二曰六行孝友睦姻任恤鄭氏曰知眀於事仁愛人以及物聖通而先識義能斷時宜忠言以中心和不剛不柔善於父母為孝善於兄弟為友睦親於九族姻親於外親任信於友道恤賑於憂貧者三曰六藝禮樂射御書數愚按三物之教先以德行而次以六藝即孔子行有餘力則以學文之意又程子答學者問書忠和作中和蓋大司徒下文云云教之中教之和不應此獨為忠故也師氏以三德教國子一曰至德以為道本二曰敏德以為行本三曰孝德以知逆惡教三行一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長鄭氏曰德行內外之稱在心為德施之為行朱子曰至德者誠意正心端本清原之事道則天人性命之理事物當然之則修身齊家治國平天下之術也敏德者强志力行崇德廣業之事行則理之所當為有可見之迹也孝德者尊祖愛親不忘其所由生之事知逆惡則以得於已者篤實深固有以真知彼之逆惡而自不忍為者也又曰至德云云眀道先生以之敏德云云司馬溫公以之孝德云云則趙無愧徐節孝之徒是也凡此三者雖曰各以其材品之髙下資質之所宜而教之然亦未有專務其一而可以為成人者也是以列而言之以見其相須為用而不可偏廢之意其又曰教三行何也曰德也者得於心而無所勉者也行則其所行之法而已不本之以其德則無所自得而行不能以自修不實之以其行則無所持循而德不能以自進是以既教之以三德而必以三行繼之則雖其至末至粗亦無不盡而德之修也不自覺矣或曰三德之教大學之學也三行之教小學之學也愚按孝德者躬行孝道而實有得焉者也惟其實有是德故於事親之道有一毫之未順則知其為逆有一毫之未善則知其為惡凜凜焉唯恐其犯之也世之不孝其親者豈自知其為逆惡哉知之則不肯為之矣然所謂逆惡者非必如法令所指五逆十惡之類也於事親之道茍有所違背焉皆逆且惡也為人子者其可忽諸易象曰山下出泉䝉君子以果行育德程子曰山下出泉出而遇險未有所之䝉之象也若人䝉稚未知所適也君子觀䝉之象以果行育德觀其出而未能通行則以果決其所行觀其始出未有所向則以養育其眀德南軒䝉齊銘曰下坎上艮其卦曰䝉其䝉伊何源泉在中泉之始行其行未達雖則未達而理孰遏君子體之于以果行黽勉在中動畏天命泉之始萌其勢則止止乃日澄源源曷已君子體之于以育德篤敬不逾靜保天則惟養於中大本攸立惟敏於外達道攸飭內外交修相須以成久而有常則能日新又曰䝉之義蓋謂泉始出而遇險未有所之如人䝉稚未有所適貴於果行育德充而達之也育德之義尤當深體愚按䝉象之義南軒得之蓋泉之始出也涓涓之微壅於沙石豈能遽達哉惟其果決必行雖險不避故終能流而成川然使其源之不深則其行雖果而易以竭艮之象山也其德止也山惟其靜止故泉源之出者無窮有止而後有行也君子觀䝉之象果其行如水之必行育其德如水之有本則其體盛大而其用周流矣夫德者行之自出行者德之所形體用之謂也有體而後有用所養者厚則其應不窮中庸曰溥博淵泉而時出之又曰小德川流大德敦化皆此義也象曰水洊至習坎君子以常德行習教事程子曰坎為水水流仍洊而至兩坎相習水流仍洊之象也水自涓滴至于尋丈至于江海洊習而不驟者也其因勢就下信而有常故君子觀坎水之象取其有常則常久其德行人之德行不常則僞也故當如水之有常取其洊習相受則以習熟其教令之事夫發政行教必使民熟於聞聽然後能從故三令五申之若驟告未喻遽責其從雖嚴刑以驅之不能也故常如水之洊習朱子曰治已治人皆必重習然後熟而安之象曰澤上有水節君子以制數度議德行程子曰澤之容水有限過則盈溢是有節故為節也君子觀節之象以制立數度凡物之大小輕重髙下之質皆有數度所以為節也數多寡度法制議德行者存諸中為德發於外為行人之德行當義則中節議謂商度求中節也乾文言曰君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也此釋潛龍勿用之義程子曰德之成其事可見者行也德成而後可施於用初方潛隱未見其行未成未成未著也是以弗用德行恆易恆簡見後乾坤篇右兼言德行德業易大傳乾以易知坤以簡能易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業朱子曰乾健而動即其所知便能始物而無所難故以為易而知大始坤順而靜凡其所能皆從乎乾而不自作故以為簡而作成物人之所為如乾之易則其心眀白而人易知如坤之簡則其事要約而人易從易知則與之同心者多故有親易從則與之協力者衆故有功有親則一於內故可久有功則兼於外故可大德謂得於已者業謂成於事者上言乾坤之德不同此言人法乾坤之道至此則可以為賢矣顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉朱子曰顯謂自內而外也仁謂造化之功德之發也藏謂自外而內也用謂機緘之妙業之本也程子曰天地無心而成化聖人有心而無為富有之謂大業日新之謂盛德張子曰富有者大無外日新者久無窮朱子曰盛德大業以下都是說易之理不是指聖人先說個富有方說日新此與說宇宙相似先是有這物事方始相連相續去愚按此雖言易之理然易也天地也聖人也一而已矣生物無窮天地之大業也運行不息天地之盛德也功及萬世聖人之大業也終始日新聖人之盛德也學者有志於進德修業者亦必以天地聖人為法蓋非富有不可以言大業非日新不可以言盛德故别而著之於此子曰易其至矣乎夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地朱子曰窮理則知崇如天而德崇循理則禮卑如地而業廣乾文言九三曰君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣程子曰三居下之上而君德已著將何為哉唯進德修業而已內積忠信所以進德也擇言篤志所以居業也知至至之致知也求知所至而後至之知之在先故可與幾所謂始條理者知之事也知終終之力行也既知所終則力進而終之守之在後故可與存義所謂終條理者聖之事也此學之始終也君子之義如是故知處上下之道而無驕憂不懈而知懼雖在危地而無咎也朱子曰忠信主於心者無一念之不誠也修辭見於事者無一言之不實也雖有忠信之心然非修辭立誠則無以居之知至至之進德之事知終終之居業之事所以終日乾乾而夕猶惕若者以此故也可上可下不驕不憂所謂無咎也知至是要知所至之地至之便是已到那地知終是知得合如此終之便須下終底工夫幾是知之初方見得事幾便須是至之存義是守得定方存得這義上至字是至處下至字是到那至處知終是終處終之是終之而不去蓋求必終于是而守之不去也九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也故無咎程子曰或躍或處上下無常或進或退去就從宜非為邪枉非離羣類進德修業欲及時耳時行時止不可常也故云或深淵龍之所安也在淵謂躍就所安之義或疑辭隨時而未可必也君子之順時猶影之隨形可離非道也朱子曰內卦以德學言外卦以時位言進德修業九三備矣此則欲其及時而進也愚按乾卦皆聖人事而九三九四皆以進德修業為言蓋德不進則退業不修則壞故堯競競舜業業周公坐而待旦孔子終日不食凡以此也然則學者奈何其不自力哉右兼言德業西山讀書記卷十五
