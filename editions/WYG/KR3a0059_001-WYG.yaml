body:
  text: 西山讀書記卷一宋眞德秀撰天命之性書湯誥曰惟皇上帝降衷于下民若有恒性克綏厥猷惟后此成湯誥萬邦之詞孔氏曰皇大也衷善也順人有常之性能安立其道則惟在於君唐孔氏曰天生蒸民與之五常之性使有仁義禮智信是天降善於民也程子曰以形體謂之天以主宰謂之帝朱子曰自天而言謂之降衷自人受此衷而言則謂之性其要在降字上猷即道道者性之發用處又曰衷字只是無過不及之中是恰好底道理天生人物各有一至當恰好底道理降與爾與程子所謂天然自有之中劉子所謂民受天地之中相似昔人云衷善也却未親切林氏曰天能降衷于民不能使民保其常性而勿失故為之君而付之以教命之任師矌曰天生民而立之君使司牧之勿使失性者謂勿使失其所降之衷也民既有降衷之性至於循其固有之性以安其所謂道者是乃君之事故曰云云湯欲言桀之暴虐夫民以亡天下則以此言為先盖推本上天所為立君乂民之意與仲虺之誥惟天生民有欲無主乃亂之言相為終始蔡氏曰天之降命而具仁義禮智信之理無所偏倚所謂衷也人之禀命而得仁義禮智信之理與心俱生所謂性也循其理之自然而有仁義禮智信之行所謂道也以降衷而言則無有偏倚順其自然固有常性矣以禀受而言則不無清濁純雜之異故必待君師之作而後能使之安於其道故曰克綏厥猷惟后夫天生民有欲以情言也上帝降衷下民以性言也仲虺即情以言人之欲成湯原性以明人之善盖互相發云愚按六經言性始見於此又伊川曰兹乃不義習與性成是又兼習而言與湯言降衷之性亦互相發也聖賢之言衷曰降衷命曰降命才曰降才深味降之一言真若天之與人交相付受明命赫然不離心目之間也可不敬哉蔡氏說若有恒性與諸說異恐未安安於其道謂父安於慈子安於孝之類詩蒸民之首章曰天生蒸民有物有則民之秉彜好是懿德此尹吉甫美宣王之詩朱子曰天生衆民有是物必有是則五官百骸九竅五藏而達於父子君臣夫婦長幼無非物也而莫不有法焉如視之明聴之聰貌之恭言之順君臣有義父子有親之類是也是乃民所執之常性故於其情無不好此美徳者昔孔子讀詩至此而贊之曰為此詩者其知道乎而孟子引之以證性善之說其指深矣按朱子此語本之龜山楊氏而小異盖楊氏曰視聴言動必由禮焉此一身之則為君止於仁為臣止於敬為子止於孝為父止於慈此君臣父子之則愚謂有物有則乃天理之自然今曰必由禮止於仁則人道之當然矣故朱子不盡取也朱子又曰物指形氣則乃理也物之理方為則若便以物為則非也而南軒張氏有曰夫有是物必有是則茍失其則實已非矣其得謂是名哉故凡言君不君臣不臣父不父子不子皆以失其則故也人生於天地之中其所以名為人者以天之降衷善無不備也失其所以為人之道則雖名為人也而實何如哉其言深有警焉故附於此春秋左氏傳劉康公曰民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也程子曰民受天地之中以生天命之謂性也問受中與程子天然自有之中是一意否朱子曰只是一意盖指大本之中也又問劉子所謂中即周子所謂太極否曰只一般但名不同中是恰好處又曰這幾个字自古聖賢上下數千年喚得都一般必竟是聖賢𫝊授不斷故能如此至春秋時其傳猶未泯如劉康公論人受中以生其窮理甚精愚按民受天地之中以生故凡動作禮義威儀皆有自然之準則過之非中也不及亦非中也所以然者以其有定命也命出於天一定而不可易雖欲違之得乎動作以身言禮義以理言威儀以著於外者言易大傳一隂一陽之謂道朱子曰隂陽迭運者氣也其理則所謂道程子曰離隂陽便無道隂陽氣也所以隂陽者是道也氣形而下者道形而上者又曰道非隂陽也所以一隂一陽者道也如一闔一闢謂之變繼之者善也成之者性也道具於隂而行於陽繼言其發也善謂化育之功陽之事也成言其具也性謂物之所受言物生則有性而各具是道也隂之事也問性具仁義禮智曰性猶是說成之者性只一隂一陽之道可知做人做物已具是四者矣問一隂一陽之謂道便是太極否曰隂陽只是隂陽道便是太極繼之者善元亨也成之者性利貞也繼是接續綿綿不息之意成是凝成有主之意問云云曰以一日言之則晝陽而夜隂以一月言之則望前為陽望後為隂以一嵗言之則春夏為陽秋冬為隂從古至今恁地滚將去只是這箇隂陽是孰使之然也乃道也此氣之動為人為物渾是一箇道理故未生人物以前此理本善所以謂繼之者善氣質既定為人為物所以謂成之者性大哉乾元萬物資始乃繼之者善也乾道變化各正性命此成之者性也繼之者善自隂陽變化而言成之者性自人物禀受而言隂陽變化流行而未始有窮陽之動也人物禀受一定而不可易隂之靜也天地變化不為無隂然物之未形則屬乎陽物正其性不為無陽然形氣已定則屬乎隂張忠定公云云事未著字以前屬陽著字以後屬隂似窺見此意繼之者善繼字是動之頭若只一闔一闢而無繼便是合殺了問繼是動静之間否曰是静之終動之始也問孔子言性與天道不可得而聞而孟子教人纔開口便說性善是如何曰孟子亦大槩說性善至於性之所以善亦少曾說必如孔子所謂一隂一陽之謂道繼之者善也成之者性也方是說性與天道耳孝經子曰天地之性人為貴董子曰人受命於天固超然異於羣生入有父子兄弟之親出有君臣上下之誼㑹聚相遇則有耆老長幼之施燦然有文以相接驩然有恩以相愛此人之所以貴也生五糓以食之桑麻以衣之六畜以養之服牛乗馬圏豹檻虎是其得天之靈貴於物也故孔子曰天地之性人為貴明於天性知自貴於物知自貴於物然後知仁誼知仁誼然後重禮節重禮節然後安處善安處善然後樂循理樂循理謂之君子故孔子曰不知命無以為君子此之謂也龜山楊氏曰人禀五行之秀氣而靈於萬物者也故曰天地之性人為貴然人之下愚卒至於同乎物者豈賦予之異哉失其性而自賊之過也西山李氏曰人之性即天地之性也愚按荀子曰水火有氣而無生草木有生而無知禽獸有知而無義人有氣有生有知亦且有義故最為天下之貴也其論似矣至其論性則以為惡論禮則以為偽何其自相戾耶中庸天命之謂性率性之謂道修道之謂教朱子曰命猶令也性即理也天以隂陽五行化生萬物氣以成形而理亦賦焉猶命令也於是人物之生因各得其所賦之理以為健順五常之德所謂性也率循也道猶路也人物各循其性之自然則其日用事物之間莫不各有當行之路是則所謂道也修品節之也性道雖同而氣禀或異故不能無過不及之差聖人因人物之當行者而品節之以為法於天下則謂之教若禮樂刑政之屬是也盖人之所以為人道之所以為道聖人之所以為教原其所自無一不本於天而備於我學者知之則其於學知所用力而自不能已矣或問云云何也曰天命之謂性言天之所以命乎人者是則人之所以為性也盖天之所以賦與萬物而不能自已者命也吾之得乎是命以生而莫非全體者性也故以命言之則曰元亨利貞而四時五行庶類萬化莫不由是以出以性言之則曰仁義禮智而四端五典萬事萬物之理無不統於其間盖在天在人雖有性命之分而其理則未嘗不一在人在物雖有氣禀之異而其理則未嘗不同此吾之性所以純粹至善而非若荀楊韓子之所云也率性之謂道言循其所得乎天以生者則事事物物莫不自然各有當行之路是則所謂道也盖天命之性仁義禮智而已循其仁之性則自父子之親以至於仁民愛物皆道也循其義之性則自君臣之分以至於敬長尊賢亦道也循其禮之性則恭敬辭讓之節文皆道也循其智之性則是非邪正之分别皆道也盖所謂性者無一理之不具故所謂道者不待外求而無所不備所謂性者無一物之不得故所謂道者不假人為而無所不周雖鳥獸草木之生僅得形氣之偏而不能有以貫通乎全體然其知覺運動榮悴開落亦皆循其性而各有自然之理焉至於虎狼之父子蜂蟻之君臣豺獺之報本雌雄之有别則其形氣之所偏又反有以存其義理之所得尤可以見天命之本然初無間隔而所謂道者亦未嘗不在是也是豈有待於人為而亦豈人之所得為哉修道之謂教言聖人因是道而品節之以立法垂訓於天下是則所謂教也盖天命之性率性之道皆理之自然而人物之所同得者也人雖得其形氣之正然其清濁厚薄之禀亦有不能不異者是以賢智者或失之過愚不肖者或失之不及而得於此者亦或不能無失於彼是以私意人欲或生其間而於所謂性者不免有所昏蔽錯雜而無以全其所受之正性有不全則於所謂道者因亦有所乖戾舛逆而無以適於所行之宜惟聖人之心清明純粹天理渾然無所虧闕故能因其道之所在而為之品節防範以立教於天下使夫過不及者有以取中焉盖有以辨其親疎之殺而使之各盡其情則仁之為教立矣有以别其貴賤之等而使之各盡其分則義之為教行矣為之制度文為使之有以守而不失則禮之為教得矣為之開導禁止使之有以别而不差則智之為教明矣夫如是是以人無知愚事無大小皆得有所持循據守以去其人欲之私而復乎天理之正推而至於天下之物則亦順其所欲違其所惡因其材具之宜以致其用制其取用之節以遂其生皆有政事之施焉此則聖人所以材成之道而致其彌縫輔贊之功然亦未始外乎人之所受乎天者而强為之也問天命謂性之命與死生有命之命不同何也曰死生有命之命是帶氣言之氣便有禀得多少厚薄之不同天命謂性之命是統乎理言之然天之所命不離乎氣但中庸此句乃是以理言天命之謂性者是就人身中指出這个是天命之性不雜氣禀者而言天命之謂性是專言理若云兼言氣便說率性之謂道不去如太極雖不離乎隂陽亦不雜乎隂陽按輯畧程子曰上天之載無聲無臭其體則謂之易其理則謂之道其用則謂之神其命於人則謂之性率性則謂之道修道則謂之教生之謂性與天地之性同乎性字不可一槩論生之謂性止訓所禀受也天命之謂性此言性之理也今人言性柔緩性剛急皆生來如此此訓所禀受也若性之理則無不善曰天者自然之理也又曰道即性也若道外尋性性外尋道便不是又曰仁也者人也合而言之道也率性之謂道也又曰率性之謂道率循也若言道不先立下名義則茫茫然何處下手何處着心又曰天命之謂性率性之謂道者天降是於下萬物流形各正性命者是所謂性也循其性而不失是所謂道也此亦通人物而言循性者馬則為馬之性又不做牛底性牛則為牛底性又不為馬底性此所謂率性也人在天地之間與萬物同流天幾時分别是人是物修道之謂教此則專主人事呂氏曰中者天道也天徳也降而在人人禀而受之是之謂性書曰惟皇上帝降衷於下民傳曰民受天地之中以生此人性之所以必善故曰天命之謂性性與天道本無有異但人雖受天地之中以生而梏於蕞爾之形體常有私意小智撓乎其間故與天地不相似所發遂至於出入不齊而不中節如使所得於天者不喪則豈不中節乎故良心所發莫非道也在我者惻隱羞惡辭讓是非皆道也在彼者君臣父子夫婦昆弟朋友之交皆道也在物之分則有彼此之殊在性之分則合乎内外一體而已是皆人心所同然乃吾性之所固有隨喜怒哀樂之所發則愛必有差等敬必有節文所感重者其應也亦重所感輕者其應也亦輕自斬衰至緦喪服異等而九族之情無所憾自王公至皂𨽻儀章異制而上下之分莫敢爭非出於性之所有安能致是乎故曰率性之謂道游氏曰天之命萬物者道也而性者具道以生也因其性之固然而無容私焉則道在我矣此率性之謂道也若出於人為則非道矣楊氏曰天命之謂性人欲非性也率性之謂道離性非道也性天命也命天理也道則性命之理而已孟子道性善盖原於此謂性有不善者誣天也性無不善則不可加損也無俟乎修焉率之而已揚雄謂學以修性非知性者也故孔子曰盡性子思曰率性曰尊徳性孟子曰知性養性未嘗言修也然則道其可修乎曰道者日用而不知也先王為之防範使過不及者取中焉所以教也謂之修者盖亦品節之而已又曰性命道三者一體而異名初無二致也故在天曰命在人曰性率性而行曰道特所從言之異耳又曰人性上不可添一物堯法之所以為萬世法只是率性而已所謂率性循天理是也外邊用計用數假饒立得功業只是人欲之私與聖賢作處天地懸隔朱子曰程子之論率性正就私意人欲未萌之處指其自然發見各有條理者而言以見道之所以得名非指修為而言也呂氏良心所發以下至安能致是一節亦甚精宻但謂人雖受天地之中以生而梏於形體又為私意小知所撓故與天地不相似而發不中節必有以不失其所受乎天者然後爲道則所謂道者又在修為之後而反由教以得之非復子思程子所指人欲未萌自然發見之意矣游氏所謂無容私焉則道在我楊氏所謂率之而已者似亦皆有呂氏之病也此率字不是用力伊川謂合而言之道也是此義率性之謂道只是循性去皆是道呂氏說以人行道若然則未行之前便不是道乎性是箇渾淪物道是性中分派條理隨分派條理去皆是道如穿牛鼻絡馬首皆是隨他所通處仁義禮智物豈不有但偏耳隨他所通處道亦無不在性與道相對則性是體道是用道便是在裏面做出底道理程子謂通人物而言馬則為馬之性馬不做牛底性牛則為牛之性又不做馬底性物物各有箇理即此便是道總而言之又只是一箇理否曰是或引伊川循之而不失語以問者勉齋黄氏曰如此則循性不是道而不失方是道也又引類而循之順而修之以為程子之密㫖又謂因其良心之所發順而循之者為道終亦未免循之而不失之意循之而不失病在不失順而循之其病在順須要見得性也者人物不能不循循而見之常行之間便是道初非有意於不失亦非有意於順若是有意便是人為纔是人為便不是自然底道理怵惕惻隱是愛赤子之道所以有是道者是循其性而自然有是道則良心所發便是循性今曰因其良心之所發順而循之則良心所發不是循性又何自而發耶待其既發而循之則是率情不是率性矣愚按朱子論率性之義盖本程子之說而黄氏又辨不失二字為有病又益精矣或謂朱子於告子生之謂性章深言人物之異而於此章乃兼人物而言何也曰生之謂性以氣言者也天命之謂性以理言者也以氣言之則人物所禀之不同以理言之則天之所命一而已矣然則人物各循其性斯謂之道則虎狼之搏噬馬牛之踶觸亦道耶曰子思之所謂率性云者循其天命之性也虎狼之慈仁馬牛之健順是也若夫搏噬踶觸則氣禀之所為而非天命之本然矣豈獨物為然凡人之為善者皆循天命之性也而為不善則發乎氣禀之性矣以是而觀則此章兼人物而言尚何疑哉禮運人者其天地之徳隂陽之交鬼神之㑹五行之秀氣也鄭氏曰言人兼此氣性純也孔氏疏曰天以覆為徳地以載為徳人感覆載為生是天地之徳也隂陽則天地據其氣謂之隂陽據其形謂之天地獨陽不生獨隂不成二氣相交乃生故云隂陽之交也鬼謂形體神謂精靈祭義云氣也者神之盛也魄也者鬼之盛也必形體精靈相㑹然後物生故曰鬼神之㑹也人感五行秀異之氣故有仁義禮智信是五行之秀氣也故人者天地之德隂陽之交是其氣也鬼神之㑹五行之秀是其性也愚按天地之徳盖指乾坤健順而言此天地之理人之所得以為性者也隂陽鬼神五行皆指氣而言流行天地之間而人之所得以為形者也然氣之流行理實寓焉非氣之外有所謂理也但理無不善氣則有清濁昏明之不同耳疏以天地之徳為氣鬼神五行為性恐非又曰故人者天地之心也五行之端也鄭氏曰此言兼氣性之效也正義曰天地髙逺在上臨下四方人居其中央動静應天地天地有人如人腹内有心動静應人也故云天地之心王肅曰人於天地之間如五藏之有心人乃生之最靈其心五藏之最聖也端猶首也萬物悉由五行而生而人最得其妙氣明仁義禮智信為五行之首也邵子曰人居天地之中心居人之中張氏衍義曰人者天地之太極故居天地之中天地待之以為主亦賴之以為用心者人之太極故居人之中人待之以為主亦賴之以為用按邵張之言本非為此設而其義略同故附此滕文公為世子將之楚過宋而見孟子孟子道性善言必稱堯舜朱子曰道言也性者人所禀於天以生之理也渾然至善未嘗有惡人與堯舜初無少異但衆人汨於私欲而失之堯舜則無私欲之蔽而能充其性爾故孟子與世子言每道性善而必稱堯舜以實之欲其知仁義不假外求聖人可學而至而不懈於用力也程子曰性即理也天下之理原其所自未嘗不善喜怒哀樂未發何嘗不善發而中節即無往而不善發不中節然後為不善故凡言善惡皆先善而後惡言吉凶皆先吉而後凶言是非皆先是而後非世子自楚反復見孟子孟子曰世子疑吾言乎夫道一而已矣時人不知性之本善而以聖賢為不可幾及故世子於孟子之言不能無疑而復來求見盖恐别有卑近易行之說也孟子知之故但告之如此以明古今聖愚本同一性前言已盡無復有他說也成覵謂齊景公曰彼丈夫也我丈夫也吾何畏彼哉顔淵曰舜何人也予何人也有為者亦若是公明儀曰文王我師也周公豈欺我哉孟子既告世子以道無二致而復引此三言以明之欲世子篤信力行以師聖賢不復當求他說也今滕絶長補短將五十里也猶可以為善國書曰若藥不􅉂眩厥疾不瘳言滕國雖小猶足為治但恐安於卑近不能自克則不足以去惡而為善也孟子言性始見於此而詳具於告子之篇然黙識而旁通之則七篇之中無非此意其所以擴前聖之未發而有功於聖人之門程子之言信矣告子曰性猶把柳也義猶桮棬也以人性為仁義猶以把柳為桮棬朱子曰性者人生所禀之天理也告子言人性本無仁義必矯揉而後成如荀子性惡之說也孟子曰子能順把柳之性而以為桮棬乎將戕賊把柳而後以為桮棬也如將戕賊把柳而以為桮棬則亦將戕賊人以為仁義與率天下之人而禍仁義者必子之言夫言如此則天下之人皆以仁義為害性而不肯為是因子之言而為仁義之禍也南軒張氏曰有太極則有兩儀故立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義仁義者性之所有而萬善之宗也人之有仁義乃其性之本然自親親而推之至於仁不可勝用自長長而推之至於義不可勝用皆順其所素有而非外之也若逆乎仁義則為失其性矣而告子乃以把柳為喻其言曰以人性為仁義則失之甚矣盖仁義性也而曰以人性為仁義則性别為一物以人為矯揉而為仁義其失豈不甚乎或謂把柳之可為桮棬亦性也朱子曰把柳之性固可以為桮棬然須斬伐裁截矯揉而後可成故孟子曰戕賊把柳而後可以為桮棬若把柳可為而楩楠不可為又是第二重義理不當引以為說愚按程子曰服牛乗馬皆因其性而為之胡不乗牛而服馬理不可也或人之說盖本於此然把柳之為桮棬尚須人力仁義之性本於自然不待着力此朱子所以不取之也其義精矣告子曰性猶湍水也決諸東方則東流決諸西方則西流人性之無分於善不善也猶水之無分於東西也朱子曰告子因前說而小變之近於揚子善惡混之說孟子曰水信無分於東西無分於上下乎人性之善也猶水之就下也人無有不善水無有不下今夫水搏而躍之可使過顙激而行之可使在山是豈水之性哉其勢則然也人之可使為不善其性亦猶是也此章言性本善故順之而無不善本無惡故反之而後為惡非本無定體而可以無所不為也或問告子揚子之說如何曰告子以為性無善惡揚子以為性有善惡其言雖同而所以言則亦不無少異也告子曰生之謂性朱子曰生指人物之所以知覺運動者而言告子論性前後四章語雖不同然其大意不外乎此與近世佛氏所謂作用是性者畧相似孟子曰生之謂性也猶白之謂白與曰然白羽之白也猶白雪之白白雪之白猶白玉之白與曰然白羽以下孟子再問而告子以為然則是謂凡有生者同是一性矣然則犬之性猶牛之性牛之性猶人之性與孟子又言若果如此則犬牛與人皆有知覺皆能運動其性皆無以異矣於是告子自知其非而不能對也今按性者人之所得於天之理也生者人之所得於天之氣也性形而上者也氣形而下者也人物之生莫不有是性亦莫不有是氣然以氣言之則知覺運動人與物初不異也以理言之則仁義禮智之禀豈物之所得而全哉告子不知性之為性而以所謂氣者當之是以把柳湍水之喻食色無善無不善之說縱横繆戾紛紜舛錯而此章之誤乃其本根所以然者盖徒知知覺運動之蠢然者人與物同而不知仁義禮智之粹然者人與物異也孟子以是折之其義精矣人物之生天賦之以此理未嘗不同但人物之禀受自有異爾如一江水杓取只得一杓碗取只得一碗至於一桶一缸各隨器量不同故理亦隨以異物亦具有五行只是得五行之偏者耳論萬物之一原則理同而氣異觀萬物之異體則氣猶相近而理絶不同氣相近如知寒煖識饑飽好生惡死趨利避害人與物都一般理不同如蜂蟻之君臣只是義上有一㸃子明虎狼之父子只是仁上有一㸃子明其他更推不去問人物皆禀天地之理以為性皆受天地之氣以為形若人禀之不同固是氣有昏明厚薄之異若在物言之不知是所禀之理便有不全耶亦是緣氣禀之昏蔽故如此耶曰惟其所受之氣只有許多故其理亦只有許多如犬馬形氣如此故只㑹得如此事又問物物具一太極則是理無不全也曰以理言之則無不全以氣言之則不能無偏性如日光人物所受之不同如隙竅之受先有大小也人與物都一般者理也所以不同者心也人心虛靈包得許多道理過故無不通雖有氣質昏底亦可克治使明萬物之心便包許多道理不過大本論之其理則一纔禀於氣便有不同問動物有知植物無知何也曰動物有血氣故能知植物雖不可言知然一般生意亦可見若戕賊之便枮悴不悅懌亦似有知者問理是人物同得於天者如物之無情者亦有理否曰固是有理如舟只可行之於水車只可行之於陸孟子言人之所以異於禽獸者幾希庶民去之君子存之不知人何故與禽獸異又言犬之性猶牛之性牛之性猶人之性與不知人何故與牛犬異此兩處似欠一轉語須著說是形氣不同故性亦少異始得恐孟子見得人性同處自是分曉直截却於此似未甚察問氣有清濁而理則同如何曰理如寳珠在聖賢則如置在清水中其輝光自然發見在愚不肖則如置在濁水中須是澄去泥沙則光方可見至如萬物亦有此理只為氣昏塞如置寳珠於濁泥中不復可見生之謂性生之理謂性孟子以理言性告子以氣言性問告子云云曰合下便是錯了他只是說生來精神魂魄凡動用處是性正如禪家說作用是性只說得箇形而下者故孟子闢之釋氏云作用是性在目曰見在耳曰聞在鼻齅香在口談論在手執捉在足運奔即告子生之謂性之說也且如手執捉若執刀妄亂殺人亦可謂性乎龜山舉龎居士云神通妙用運水搬柴以比徐行後長不知徐行後長方謂之弟疾行先長則為不弟如曰運水搬柴即是妙用則徐行疾行皆可謂之弟耶告子說生之謂性二程都說他說得是只下面接得不是若如此說却如釋氏言作用是性乃是說氣質之性非性善之性按程子曰告子云生之謂性凡天地所生之物須是謂之性皆謂之性則可於中却分别牛之性馬之性是他便只道一般如釋氏說蠢動含靈皆有佛性如此則不可盖不以生之謂性為非故朱子云云其義益精矣告子曰食色性也仁内也非外也義外也非内也朱子曰告子以人之知覺運動者為性故言人之甘食悅色者即其性故仁愛之心生於内而事物之宜由乎外學者但當用力於仁而不必求合於義也孟子曰何以謂仁内義外也曰彼長而我長之非有長於我也猶彼白而我白之從其白於外也故謂之外也曰異於白馬之白也無以異於白人之白也不識長馬之長也無以異於長人之長與且謂長者義乎長之者義乎張氏曰上異於二字宜衍李氏曰或有闕文焉今按白馬白人所謂彼白而我白之也長馬長人所謂彼長而我長之也白馬白人不異而長馬長人不同是乃所謂義也義不在彼之長而在我長之之心則義之非外明矣曰吾弟則愛之秦人之弟則不愛也是以我為悅者也故謂之内長楚人之長亦長吾之長是以長為悅者也故謂之外也言愛主於我故仁在内敬主於長故義在外曰耆秦人之炙無以異於耆吾炙夫物則亦有然者也然則耆炙亦有外與言長之耆之皆出於心也林氏曰告子以食色為性故因其所明者而通之自篇首至此四章告子之辨屢屈而屢變其說以求勝卒不聞其能自反而有所疑也此正其所謂不得於言勿求於心者所以卒於鹵莽而不得其正也飲食男女固出於性然告子以生為性則以性為止於是矣因此又生仁内義外之說正與佛者之言以作用為性義理為障者相類然孟子不攻其食色之云者使誠知義之非外則性之不止於食色其有以察之矣告子不知理之為性乃即人之身而指其能知覺運動者以當之所謂生者是也始而見其但能知覺運動非教不成故有把柳之譬既屈於孟子之言而病其說之偏於惡也則又繼而為湍水之喻以見其但能知覺運動而非有善惡之分又以孟子為未喻己之意也則又於生之謂性章極其立論之本意而索言之至於孟子折之則其說又窮而終莫悟其非也其以食色為言盖猶生之云爾而公都子之所引又湍水之餘論也以是考之凡告子之論性其不外乎生之一字明矣但前此未有深究其弊者往往隨其所向各為一說以與之辨而不察其所以失之端獨在於此是以其說雖多而迄無一定之論也告子只知有人心不知有道心故有食色性也及義外之說南軒張氏曰食色固出於性然莫不有則焉今告子乃舉物而遺其則是固出於性無分於善不善之類也其說行則天理不明而人欲莫之遏矣至於仁内義外之説其失又甚焉彼以為長之在人如白之在彼曾不知白之為色一定而不變而長之所宜則隨事而不同也若一槩而論則馬之長將亦無以異於人之長而可乎長雖在彼而長之者在我盖長之之理素具於此非因彼而有也有是性則具是理其輕重親疎小大逺近之宜固森然於秉彜之中而不可亂事物至於前者雖有萬之不同而有物必有則泛應曲酬各得其當皆吾素有之義而非外取之此天所命也惟夫昧於天命而以天下之公理為有我之得私而始有義外之說孟子告之曰且謂長者義乎長之者義乎使思夫長之之為義則知義之非外矣而告子猶惑焉謂愛吾弟而不愛秦人之弟是以我為悅故曰仁内也長吾長而亦長楚人之長是以長為悅故曰義外也曾不知所以長之者非在我而何出哉故孟子復以嗜炙喻之同為炙也而所以嗜之則在我然則以其在彼之同而謂嗜炙之為外可乎雖然長吾之長義也長楚人之長亦義也長則同而待吾兄與待楚人固有間矣其分之殊豈人之所能為哉觀告子義外之說固為不知義矣則其所謂仁内者亦烏知仁之所以為仁者哉彼徒以愛為仁而不知愛之施有差等固義之所存也徒以長為義而不知所以長者固仁之體也不知仁義而以論性宜乎莫適其指歸也孟季子問公都子曰何以謂義内也曰行吾敬故謂之内也朱子曰所敬之人雖在外然知其當敬而行吾心之敬以敬之則不在外也鄉人長於伯兄一歲則誰敬曰敬兄酌則誰先曰先酌鄉人所敬在此所長在彼果在外非由内也此皆季子問公都子答而季子又言如此則敬長之心果不由中出也公都子不能答以告孟子孟子曰敬叔父乎敬弟乎彼將曰敬叔父曰弟為尸則誰敬彼將曰敬弟子曰惡在其敬叔父也彼將曰在位故也子亦曰在位故也庸敬在兄斯須之敬在鄉人尸祭祀所主以象神雖子弟為之然敬之當如祖考也在位弟在尸位鄉人在賓客之位也庸常也斯須暫時也言因時制宜皆由中出也季子聞之曰敬叔父則敬敬弟則敬果在外非由内也公都子曰冬日則飲湯夏日則飲水然則飲食亦在外也此亦上章耆炙之意范氏曰二章問答大指畧同皆反復譬喻以曉當世使明仁義之在内則知人性善而皆可為堯舜矣南軒張氏曰季子不知性故於義内之說有疑焉公都子答以行吾敬故謂之内亦未為失也盖敬之所施各有攸當是乃義也然公都子未能本於性而論故聞季子先酌鄉人之論則無以對之盖庸敬於兄義也以鄉人之長酌而先之亦義也可敬雖在彼而敬之者在我故孟子以弟為尸為比夫兄之當敬鄉人之酌當先與夫為尸者之當敬皆其理之素定而不易者也然則其為在内也明矣而季子猶惑焉盖以叔父與弟為在外而不知其義之存於内内外之本一也公都子盖有發於孟子之言故以冬日飲湯夏日飲水譬之盖冬之飲必湯夏之飲必水是乃義也而豈外乎哉公都子曰告子曰性無善無不善也朱子曰此亦生之謂性食色性也之意蘇氏胡氏之說盖如此或曰性可以為善可以為不善是故文武興則民好善幽厲興則民好暴此即湍水之說或曰有性善有性不善是故以堯為君而有象以瞽瞍為父而有舜以紂為兄之子且以為君而有微子啓王子比干韓子性有三品之說盖如此今曰性善然則彼皆非與孟子曰乃若其情則可以為善矣乃所謂善也情者性之動也人之情本但可以為善而不可以為惡則性之本善可知矣若夫為不善非才之罪也才猶材質人之能也人有是性則有是才性既善則才亦善人之為不善乃物欲陷溺而然非其才之罪也惻隱之心人皆有之羞惡之心人皆有之恭敬之心人皆有之是非之心人皆有之惻隱之心仁也羞惡之心義也恭敬之心禮也是非之心智也仁義禮智非由外鑠我也我固有之也弗思耳矣故曰求則得之舍則失之或相倍蓰而無算者不能盡其才者也言四者之心人所固有但人自不思而求之耳所以善惡相去之逺由不求不思而不能擴充以盡其才也前篇言是四者為仁義禮智之端而此不言端者彼欲其擴而充之此直因用以著其本體故言有不同耳詩曰天生蒸民有物有則民之秉彜好是懿徳孔子曰為此詩者其知道乎故有物必有則民之秉彜也故好是懿徳有物必有法如有耳目則有聰明之徳有父子則有慈孝之心是民所秉執之常性也故人之情無不好此懿徳者以此觀之則人性之善可見而公都子所問之三說皆不辨而自明矣程子曰性即理也理則堯舜至於塗人一也才禀於氣氣有清濁禀其清者為賢禀其濁者為愚學而知之則氣無清濁皆可至於善而復性之本湯武身之是也孔子所言下愚不移者則自暴自棄之人也今按程子所說才字與孟子本文小異盖孟子專以其發於性者言之故以為才無不善程子兼指其禀於氣者言之則人之才固有昏明强弱之不同矣所謂氣質之性是也二說雖殊各有所當然以事理考之程子為宻盖氣質所禀雖有不善而不害性之本善性雖本善而不可以無省察矯揉之功學者所當深玩也告子曰性無善無不善非惟無不善并善亦無之謂性中無惡則可謂無善則性果何物性既善才亦可為善今乃至於為不善非是才如是乃是我使才如此故曰非才之罪問孟子言情才皆善如何曰情本自善其發也未有染汙何嘗不善才只是資質亦無不善譬物之白者未染時只是白也人皆有許多才聖人却做許多事我不能做得些子出故孟子謂或倍蓰而無算者不能盡其才者也不能盡其才謂發得畧好便自阻隔了不順他道理做去論情可為善因曰李翺論復性則是滅情以復性則非情如何可滅此乃釋氏之說陷於其中不自知理純而氣雜理精一故純氣粗故雜胡氏說性不可以善言本然之性其尊無對纔說善時便與惡對非本然之性矣孟子道性善非是說性之善只是贊歎之辭某嘗辨之本然之性固渾然至善無惡可對此天之賦予然也然行之在人則有善有惡行得善者即本然之性豈可謂善者非本然之性乎若如其言有本然之性又有善惡相對之性則是有兩性矣其得於天者此性也行得善者亦此性也只是纔有箇行得善底便有箇不善底所以善惡須着對說不是元有箇惡在裏與之為對只是行得錯底便流入於惡爾然文定之說又得於龜山龜山得之東林揔老揔極聰明龜山嘗問孟子道性善是否揔曰是又問性豈可以善惡言揔曰本然之性不與惡對㧾之言本未有病盖本然之性是本無惡及至文定父子遂分成兩截說善底不是性若善底非本然之性却那處得這善來既以善為贊歎之詞便是性本善矣若非性善何贊歎之有二蘇論性亦是如此嘗言孟子道性善猶云火之能熟物也荀卿言性惡猶云火之能焚物也龜山反其說而辨之曰火之所以能熟物者以其能焚故耳若火不能焚物何從熟蘇氏論性自堯舜至孔子不得已而命之且寄之曰中曰一未嘗分善惡言也自孟子道性善而一與中始支矣更不㸔道理只認說得行底便是諸胡之說亦然知言論性曰不可以善惡辨不可以是非分既無善惡又無是非則是告子湍水之說爾問知言萬事萬物性之質也如何曰此未有害最是好惡性也大錯五峯言天命不囿於善不可以人欲對天理固無對然有人欲即天理便不得不與人欲相為消長善亦本無對然既有惡則善便不得不與惡對為盛衰且謂天命不囿於物可也謂其不囿於善則不知天之所以為天矣謂惡不足以言性可也謂善不足以言性則不知善之所從來矣好善而惡惡人之性也為有善惡故有好惡君子順其性小人拂其性五峯言好惡性也君子好惡以道小人好惡以欲是好人之所惡惡人之所好亦是性也而可乎或問天理人欲同體異用同行異情之說如何先生曰當然之理人合恁地底便是體故仁義禮智為體如五峯之說則仁與不仁義與不義禮與無禮智與無智皆是性非小失也性中只有天理無人欲謂之同體可乎若如此則是性可以為善亦可以為惡也同行異情盖亦有之如口之於味目之於色耳之於聲鼻之於臭四肢之於安佚聖人與常人皆如此是同行也然聖人之情不溺於此所以與常人異耳龜山云天命之謂性人欲非性也胡氏不取其說是以人欲為性矣此其甚差者也又白雲郭氏言性善之善非善惡之善先生謂極本窮源之善與善惡末流之善非有二也但以其發與未發言之有不同耳盖未發之前只有此善而其發為善惡之善者亦此善也既發之後乃有不善以雜焉而其所謂善者即極本窮源之發耳南軒張氏曰善者性也能為善者才也孟子曰形色天性也惟聖人然後可以踐形朱子曰人之有形有色無不各有自然之理所謂天性也踐如踐言之踐盖衆人有是形而不能盡其理故無以踐其形惟聖人有是形而又能盡其理然後可以踐其形而無歉也程子曰此言聖人盡得人道而能充其形也盖人得天地正氣而生與萬物不同既為人須盡得人理然後稱其名衆人有之而不知賢人踐之而未盡能充其形惟聖人也楊氏曰天生蒸民有物有則物者形色也則者性也各盡其則則可以踐形也南軒張氏曰有是形者皆可以踐形其曰可以者猶言事親若曾子可也言至於聖人而適得為能踐其形也然則有是形者皆可以為聖人其不為聖人者以其不能踐之故耳周子曰無極而太極朱子曰上天之載無聲無臭而實造化之樞紐品彚之根柢也故曰無極而太極非太極之外復有無極也大傳云大極者何也即兩儀四象八卦之理具於三者之先而蘊於三者之内者也正以其究竟至極無名可名故特謂之太極猶曰舉天下之極無加此云耳大傳既云形而上者謂之道矣而又曰一隂一陽之謂道此豈直以一隂一陽為形而上者哉正所以見一隂一陽雖屬形器然其所以一隂一陽是乃道體之所為也故語道體之至極則謂之太極語太極之流行則謂之道雖有二名初無兩體周子所以謂之無極正以其無方所無形狀以為在無物之前而未嘗不立於有物之後以為在隂陽之外而未嘗不行乎隂陽之中以為通貫全體無乎不在則又初無聲臭影響之可言也今乃深詆無極之不然則是直以太極為有形狀有方所矣以其無器與形而具天地萬物之理故曰無極而太極以其具天地萬物之理而無器與形故曰太極本無極天地之間只有動靜兩端循環不已更無餘事此之謂易而其動其靜則必有所以動靜之理焉是則所謂太極者也聖人既指其實而名之周子又為圖以象之其所以發明表著可謂無餘蘊矣原極之所以得名盖取樞極之義聖人謂之太極者所以指夫天地萬物之根也周子因之而又謂之無極者所以著夫無聲無臭之妙也然曰無極而太極太極本無極則非無極之後别生太極而太極之上先有無極也又曰五行隂陽隂陽太極則非太極之後别生二五而二五之上先有太極也以至於成男成女化生萬物而無極之妙盖未始不在是焉此一圖之綱領大易之遺意與老子所謂物生於有有生於無而以造化為真有始終者正南北矣又云老氏之言有無以有無為二周子之言有無以有無為一太極只是天地萬物之理在天地則天地中有太極在萬物則萬物中各有太極未有天地之先畢竟先有此理或云太極便是人心之至理先生曰事事物物皆有箇極是道理之極至或曰如君之仁臣之敬便是先生曰此是一事一物之極總天地萬物之理便是太極無極是有理而無形如性何嘗有形太極只是極至周子恐人道太極有形故曰無極是無形之中有箇至極之理太極不是别為一物即隂陽而在隂陽即五行而在五行即萬物而在萬物只是一箇理而已太極是箇極好至善底道理無極而太極人都想像有箇光明閃鑠底物在那裏却不知本是說無這物事只有箇理能如此動靜而已上天之載云云是就有中說無無極而太極是就無中說有南軒張氏曰太極所以形性之妙也若只曰性而不曰太極則只去未發上認之不見功用曰太極則性之妙都見矣體用一源顯㣲無間其太極之蘊歟無極而太極猶言莫之為而為太極動而生陽動極而静静而生隂静極復動一動一静互為其根分隂分陽兩儀立焉太極之有動静是天命之流行也其動也誠之通也繼之者善萬物之所資以始者也其静也誠之復也成之者性萬物各正其性命也動極而静静極復動一動一静互為其根命之所以流行而不已也動而生陽静而生隂分陰分陽兩儀立焉分之所以一定而不移也盖太極者本然之妙也動静者所乗之機也太極形而上之道隂陽形而下之器也是以自其著者而觀之則動静不同時隂陽不同位而太極無不在焉自其㣲者而觀之則冲漠無朕而動静隂陽之理已悉具於其中矣雖然推之於前而不見其始之合引之於後而不見其終之離也故程子曰動静無端隂陽無始非知道者孰能識之問太極動而生陽静而生隂見得理先而氣後曰二者有則俱有問未有一物之時如何曰是有天下公共之理未有一物不具是理問太極之有動静是静先動後否曰一動一靜循環無端無静不成動無動不成静譬如鼻息無時不嘘無時不吸吸盡則生噓噓盡則生吸理自如此太極動而生陽是且從動處說起其實動前是静静前又是動如晝而夜夜而晝晝前已有夜夜前已有晝動静無端隂陽無始本不可以先後言然就中間截斷言之則亦不得不言其有先後也如太極動而生陽則其未斷之前固已嘗静矣静極復動則已静之後固必有動矣就此㸔又有先後也當初元無一物只有此理有此理便㑹動而生陽静而生隂静極復動動極復静循環流轉其實理無窮氣亦與之無窮自有天地便只是這物事在這裏流轉一日有一日之運一月有一月之運一嵗有一嵗之運都只是這箇物事衮衮將去如水車相似一箇起一箇倒一箇上一箇下如人不語則嘿不嘿則語中間更無空缺處太極動而生陽静而生隂不是動後方生陽盖才動便屬陽静便屬隂隂陽動静以大體言則春夏是動屬陽秋冬是静屬隂就一日言之晝陽而動夜隂而静就一時一刻言之無時而不動静無時而無隂陽曰隂陽無處無之横㸔竪㸔皆可見横㸔則左陽而右陰竪㸔則上陽而下隂仰手則為陽覆手則為隂向明處為陽背明處為隂正䝉云隂陽之氣循環迭至聚散相盪升降相求絪蘊相揉相兼相制欲一之不能盖謂是也動而生陽元未有物且是如此動盪所謂化育流行也静而生隂隂主凝然後萬物各正性命太極未動之前便是隂静隂静之中自有陽之根陽動之中又有隂之根動所以必静者根乎隂故也静所以必動者根乎陽故也問如何是所乗之機曰理撘於氣而行太極理也動静氣也氣行則理亦行二者常相依而未嘗相離也圖解云動静者所乗之機識者謂此語最精盖太極是理隂陽是氣理無形而氣有迹氣既有動静則所載之理亦安得無動静隂陽有个流行底有个定位底一動一静互為其根是流行底寒暑往来是也分隂分陽兩儀立焉是定位底天地四方是也易有兩義一是變易便是流行底一是交易便是對待底問太極是理理不可以動静言惟動而生陽静而生隂理寓於氣不能無動静所乗之機乗載之乗其動静者乃乗載在氣上不覺動了静静了又動先生曰然自見在事物觀之則隂陽函太極推其本則太極生隂陽南軒張氏曰太極函動静之理者也有體必有用太極之動始而亨也動極而静利而貞也動静之端立則隂陽之形著矣一動一静互為其根動為静之根而静復為動之根非動之能生静静之能生動動而静静而動兩端相感太極之道然也故曰一闔一闢謂之變往来不窮謂之通語其體則無極而太極㝠漠無朕而動静隂陽之理無不具於其中循其用則動静之為隂陽者闔闢往来變化萬物而太極之體各全其形器之内此易之所以為易也陽變隂合而生水火木金土五氣順布四時行焉有太極則一動一静而兩儀分有隂陽則一變一合而五行具然五行者質具於地而氣行於天者也以質而語其生之序則曰水火木金土而水木陽也火金隂也以氣而語其行之序則曰木火土金水而木火陽也金水隂也又統而言之則氣陽而質隂也又錯而言之則動陽而静隂也盖五行之變至於不可勝窮然無適而非隂陽之道至其所以為隂陽者則又無適而非太極之本然也水陰根陽火陽根隂錯綜而生其端乃天一生水地二生火天三生木地四生金其運行處則水生木木生火火生土土生金金又生水循環相生陽變隂合初生水火水火氣也流動閃爍其體尚虛其成形猶未定次生木金則確然有定形矣問陽變隂合如何曰陽動而隂隨之五行一隂陽也隂陽一太極也太極本無極也五行之生也各一其性五行具則造化發育之具無不備矣故又即此而推本之以明其渾然一體莫非無極之妙而無極之妙亦未嘗不各具於一物之中也盖五行異質四時異氣而皆不能外乎隂陽隂陽異位動静異時而皆不能離乎太極至其所以為太極者又初無聲臭之可言是性之本體然也天下豈有性外之物哉然五行之生隨其氣質而所禀不同所謂各一其性也各一其性則渾然太極之全體無不各具於一物之中而性之無所不在又可見矣無極之真二五之精妙合而凝乾道成男坤道成女二氣交感化生萬物萬物生生而變化無窮焉夫天下無性外之物而性無不在此無極二五所以混融而無間者也所謂妙合者也真以理言無妄之謂也精以氣言不二之名也凝者聚也氣聚而成形也盖性為之主而隂陽五行為之經緯錯綜又各以類凝聚而成形焉陽而健者成男則父之道也隂而順者成女則母之道也是人物之始以氣化而生者也氣聚成形則形交氣感遂以形化而人物生生變化無窮矣自男女而觀之則男女各一其性而男女一太極也自萬物而觀之則萬物各一其性而萬物一太極也盖合而言之萬物統體一太極也分而言之一物各具一太極也太極便是性動静隂陽是心水火木金土是仁義禮智信化生萬物是萬事又云無極之真二五之精妙合而凝此數句甚妙是氣與理合而成性也南軒張氏曰非無極之真為一物與二五之精相合也言無極之真未嘗不存其中也愚按氣化形化本程子說當考惟人也得其秀而最靈形既生矣神發知矣五性感動而善惡分萬事出矣人物之生莫不有太極之道焉然隂陽五行氣質交運而人之所禀獨得其秀故其心為最靈而有以不失其性之全所謂天地之心而人之極也然形生於隂神發於陽五常之性感物而動而五性之殊分為萬事矣問五行之生各一其性五性感動而善惡分此性字是其氣禀言之否曰性離氣禀不得有氣禀性方存在裏面無氣則性亦無所寄矣聖人定之以中正仁義聖人之道仁義中正而已矣而主靜無欲故靜立人極焉此言聖人全動靜之徳而常本於靜也盖人禀隂陽五行之秀氣以生而聖人之生又得其秀之秀者是以其行之也中其處之也正其發之也仁其裁之也義盖一動一静莫不有以全夫太極之道而無所虧焉則向之欲動情勝利害相攻者於此乎定矣然静者誠之復而性之貞也茍非此心寂然無欲而靜則亦何以酧酢事物之變而一天下之動哉故聖人中正仁義動靜周流而其動也必主乎静此其所以成位乎中而天地日月四時鬼神有所不能違也盖必體立而後用有以行故程子論乾坤動静而曰不專一則不能直遂不翕聚則不能發散亦此意爾問何故不言禮智而言中正曰中正字尤切又曰中正二字較有力中者禮之極正者智之極伊川解貞字謂正而固也一正字未盡必兼固字所謂智之實知斯二者弗去是也知是端的真知恁地便是正弗去便是固所以正字較親切知是非之正為智故通書以正為智主静者主正與義也正義便是利貞中是亨仁是元問聖人定之以中正仁義曰本無先後此四字配金木水火而言中有禮底道理正有智底道理如乾之元亨利貞元即仁亨即中利即義貞即正皆是此理至於主静是以正與義為體中與仁為用聖人只是主静自有動底道理中正仁義四者常在這裏流轉然常靠着箇静做本若無夜則做得晝不分曉若無秋冬則做得春夏不長茂如人終日應接須少休歇便精神較健如生物而無冬只管一向生去元氣也有竭時中仁是動正義是静通書都是恁地說如云禮先而樂後且如四時有秋冬收歛則春夏方能生長若只管生長將去却有甚了期便有許多元氣故復見天地之心這便是静後見得動恁地好主静㸔夜氣一章可見問無欲故静曰欲動情勝則不能静聖人定之以中正仁義而主静正是要人静定其心自作主宰程子又恐只管静去遂與事物不交渉却說个敬云敬則自虛静須是如此做工夫愚按自五性感動而善惡分萬亊出人心之太極始不能自保矣於是聖人定之以中正仁義而主静所以立在人之太極此中庸所謂修道之教也中正者太極之全仁義者太極之分程子嘗謂中者天下之大本天地間亭亭當當直上直下之正理此盖以形性之本體故愚敢以中正為太極之全也聖人之道其體配太極其用配隂陽以此立道垂教而使天下之人一惟中正仁義是趨而向之擾擾不齊者於是乎定矣本文言中正仁義者太極隂陽也本註言仁義中正者隂陽太極也體用互舉其㫖明矣然仁義性也謂之用可乎盖自性情言之則仁義其體而四端其用也自太極言之則仁義為五行之性而屬乎用矣君子修之吉小人悖之凶聖人太極之全體一動一静無適而非中正仁義之極盖不假修為而自然也未至此而修之君子之所以吉也不知此而悖之小人之所以凶也修之悖之亦在乎敬肆之間而已矣敬則欲寡而理明寡之又寡以至於無則静虛動直而聖可學矣故曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義又曰原始反終故知死生之說隂陽成象天道之所以立也剛柔成質地道之所以立也仁義成徳人道之所以立也道一而已隨事著見故有三才之别而於其中又各有體用之分焉其實則一太極也陽也剛也仁也物之始也隂也柔也義也物之終也能原其始而知所以生則反其終而知所以死矣此天地之間綱紀造化流行古今不言之妙聖人作易其大意盖不出此故引之以證其說大哉易也斯其至矣易之為書廣大悉備然語其至極則此圖盡之其㫖豈不深哉抑嘗聞之程子昆弟之學於周子也周子手是圖以授之程子之言性與天道多出於此然卒未嘗明以此圖示人是則必有微意焉學者亦不可不知也通書曰誠者聖人之本朱子曰誠者至實而無妄之謂天所賦物所受之正理也人皆有之而聖人之所以聖者無他焉以其獨能全此而已此書與太極圖相表裏誠即所謂太極也大哉乾元萬物資始誠之源也乾道變化各正性命誠斯立焉純粹至善者也故曰一隂一陽之謂道繼之者善也成之者性也元亨誠之通利貞誠之復大哉易也性命之源乎言乾道之元萬物所取以為始者乃實理流出以賦於人之本如水之有源即圖之陽動也乾道變化而萬物各得受其所賦之正則實理於是而各為一物之主矣即圖之隂静也純不雜也粹無疵也言天之所賦物之所受皆天理之本然無不善之雜也隂陽氣也形而下者也所以一隂一陽者理也形而上者也道即理之謂也繼之者氣之方出而未有所成之謂也善則理之方行而未有所立之名也陽之屬也誠之源也成則物之已成性則理之已立者也隂之屬也誠之立也元始亨通利遂貞正乾之四徳也通者方出而賦於物善之繼也復者各得而藏於已性之成也此於圖已為五行之性矣又曰二氣五行化生萬物五殊二實二本則一是萬為一一實萬分萬一各正小大有定朱子曰二氣五行天之所以賦授萬物而生之者也自其末以緣本則五行之異本二氣之實二氣之實又本一理之極是合萬物而言之為一太極而已也自其本而之末則一理之實而萬物分之以為體故萬物之中各有一太極而小大之物莫不各有一定之分也問如此說則是太極有分裂乎曰本只是一太極而萬物各有禀受又自各全其一太極爾如月在天只一而已及散在江湖則隨處而見不可謂月分也又云所謂分以為體不是割成片去只如月映萬川相似程子曰性即理也全文見孟子道性善註朱子曰伊川此語自孔孟後無人見得到此便是千萬世說性之根基真有功於聖門昔人言性惡善惡混都是不曾識性性只是天理天理又那得有惡理是天地間公共之理人禀得便為我所有性是天成許多道理張子曰乾稱父坤稱母予兹藐焉乃混然中處朱子曰天陽也以至健而位乎上父道也地隂也以至順而位乎下母道也人禀氣於天賦質於地以藐然之身混合無間而位乎中子道也然不曰天地而曰乾坤者天地其形體也乾坤其性情也乾者健而無息之謂萬物之所資以始者也坤者順而有常之謂萬物之所資以生者也是乃天地之所以為天地而父母乎萬物者故啟而言之故天地之塞吾其體天地之帥吾其性乾陽坤隂此天地之氣塞乎兩間而人物所資以為體者也故曰天地之塞吾其體乾健坤順此天地之志為氣之帥而人物所得以為性者也故曰天地之帥吾其性深察乎此則父乾母坤混然中處之實可見矣問西銘之義曰𦂳要血脉盡在其體其性二句民吾同胞物吾與也人物並生於天地之間其所質以為體者皆天地之塞其所得以為性者皆天地之帥也然體有偏正之殊故其於性也不無明暗之異惟人也得其形氣之正是以其心最靈而有以通乎性命之全體於並生之中又為同類而最貴焉故曰同胞則其視之也皆如已之兄弟矣物則得夫形氣之偏而不能通乎性命之全故與我不同類而不若人之貴然原其體性之所自是亦本之天地而未嘗不同也故曰吾與則其視之也亦如已之儕輩矣惟同胞也故以天下為一人如下文之云惟吾與也故凡有形於天地之間者若動若植有情無情莫不有以若其性遂其宜焉此儒者之道所以必至於参天地贊化育然後為功用之全而非有所强於外也西銘全文見傳道篇今摘其首章論體性之所自出者載於此昔游先生見西銘即渙然不逆於心曰此中庸之理也明道先生稱其能求之語言之外近世學者或未喻其㫖愚謂中庸綱領在性道教三言而終篇之義無非教人以全天命之性西銘綱領亦止在其體其性之二言也西山讀書記卷一
