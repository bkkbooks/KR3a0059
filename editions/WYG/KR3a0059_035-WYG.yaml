body:
  text: 西山讀書記卷三十五宋真徳秀撰吾道異端之辨上子夏曰雖小道必有可觀者焉致逺恐泥是以君子不為也朱子曰小道如農圃醫卜之類泥不通也楊氏曰百家衆技猶耳目口鼻皆有所明而不能相通非無可觀也致逺則泥矣故君子不為也或問何以言小道之為農圃之屬也曰小者對大之名正心修身以治人道之大者也専一家之業以治於人道之小者也然皆用於世而不可無者其始固皆聖人之作而各有一物之理焉是以必有可觀也然能於此者或不能於彼而皆不可以達於君子之大道是以致逺恐泥而君子不為也黄氏曰小道之不可以致逺者聖人之道自修身而齊家治國而平天下與夫參天地贊化育無適而不通也農圃醫卜之屬施之目前淺近不為無益然求其為聖人之道無所不通則不可也許行欲以並耕而治天下此孟子所以譏其相率而為偽也或曰安知所謂小道者不指楊墨佛老之類而言邪曰小道合聖人之道而小者也異端者遠聖人之道而異者也小者猶可以施之近異者則不可以頃刻而施也楊墨老佛之無父無君又何待致逺而後不通哉所謂正牆面而立跬步而不可行者也有為神農之言者許行自楚之滕踵門而告文公曰逺方之人聞君行仁政願受一㕓而為氓文公與之處其徒數十人皆衣褐捆屨織席以為食朱子曰神農氏始為耒耜教民稼穡者也為其言者史遷所謂農家者流也程子曰許行所謂神農之言乃後世稱述上古之事失其義理者耳猶隂陽醫方稱黄帝之說也陳良之徒陳相與其弟辛負耒耜而自宋之滕曰聞君行聖人之政是亦聖人也願為聖人氓陳良楚之儒者陳相見許行而大悅盡棄其學而學焉陳相見孟子道許行之言曰滕君則誠賢君也雖然未聞道也賢者與民並耕而食饔飧而治今也滕有倉廩府庫則是厲民而以自養也惡得賢孟子曰許子必種粟而後食乎曰然許子必織布而後衣乎曰否許子衣褐許子冠乎曰冠曰奚冠曰冠素曰自織之與曰否以粟易之曰許子奚為不自織曰害於耕曰許子以釡甑爨以鐡耕乎曰然自為之與曰否以粟易之以粟易械器者不為厲陶冶陶冶亦以其械器易粟者豈為厲農夫哉且許子何不為陶冶舍皆取諸其宫中而用之何為紛紛然與百工交易何許子之不憚煩曰百工之事固不可耕且為也然則治天下獨可耕且為與有大人之事有小人之事且一人之身而百工之所為備如必自為而後用之是率天下而路也故曰或勞心或勞力勞心者治人勞力者治於人治於人者食人治人者食於人天下之通義也君子無小人則饑小人無君子則亂以此相易正猶農夫陶冶以粟與械器相易乃所以相濟而非所以相病也治天下者豈必耕且為哉當堯之時天下猶未平洪水横流汜濫於天下草木暢茂禽獸繁殖五榖不登禽獸逼人獸蹄鳥跡之道交於中國堯獨憂之舉舜而敷治焉舜使益掌火益烈山澤而焚之禽獸逃匿禹疏九河瀹濟漯而注諸海決汝漢排淮泗而注之江然後中國可得而食也當是時也禹八年於外三過其門而不入雖欲耕得乎后稷敎民稼穡樹藝五穀五榖熟而民人育人之有道也飽食煖衣逸居而無教則近於禽獸聖人有憂之使契為司徒敎以人倫父子有親君臣有義夫婦有别長㓜有序朋友有信放勲曰勞之來之匡之直之輔之翼之使自得之又從而振徳之聖人之憂民如此而暇耕乎人之有道言皆有秉彞之性也然無教則亦放逸怠惰而失之故聖人設官而教以人倫亦因其固有者而道之耳書曰天叙五典勅我五典五惇哉此之謂也徳猶恵也堯言勞者勞之來者來之邪者正之枉者直之輔以立之翼以行之使自得其性矣又從而提撕警覺以加恵焉不使其放逸怠惰而或失之蓋命契之辭也堯以不得舜為已憂舜以不得禹臯陶為已憂夫以百畆之不易為已憂者農夫也分人以財謂之恵教人以善謂之忠為天下得人者謂之仁是故以天下與人易為天下得人難孔子曰大哉堯之為君惟天為大惟堯則之蕩蕩乎民無能名焉君哉舜也巍巍乎有天下而不與焉堯舜之治天下豈無所用其心哉亦不用於耕耳吾聞用夏變夷者未聞變於夷者也陳良楚産也悅周公仲尼之道北學於中國北方之學者未能或之先也彼所謂豪傑之士也子之兄弟事之數十年師死而遂倍之豪傑才徳出衆之稱言其能自拔於流俗也倍與背同言陳良用夏變夷陳相變於夷也昔者孔子沒三年之外門人治任將歸入揖於子貢相嚮而哭皆失聲然後歸子貢反築室於塲獨居三年然後歸他日子夏子張子㳺以有若似聖人欲以所事孔子事之彊曽子曽子曰不可江漢以濯之秋陽以暴之皜皜乎不可尚已江漢水多言濯之潔也秋日燥烈言暴之乾也皜皜潔白貌尚加也言夫子道徳明著光輝潔白非有若所能彷彿也今也南蠻鴃舌之人非先王之道子倍子之師而學之亦異於曽子矣吾聞出於幽谷遷於喬木者未聞下喬木而入於幽谷者魯頌曰戎狄是膺荆舒是懲周公方且膺之子是之學亦為不善變矣從許子之道則市賈不貳國中無偽雖使五尺之童適市莫之或欺布帛長短同則賈相若麻縷絲絮輕重同則賈相若五穀多寡同則賈相若屨大小同則賈相若曰夫物之不齊物之情也或相倍蓰或相什伯或相千萬子比而同之是亂天下也巨屨小屨同賈人豈為之哉從許子之道相率而為偽者也惡能治國家南軒曰許行之說初若淺近而乃盛行於時其所以能動人者蓋其人亦清苦髙介之士逺慕古初而燭理不明見世有神農之說不知其為後世𫝊習之謬則從而祖述之以謂農者天下之本善為治者必使斯民盡力於農而人君必力耕以先之不當使民勞而已逸以為是乃以道治天下而非後世所及此其說若髙而有以惑人者也樊遲請學稼微夫子救之蓋亦幾陷於此矣夫帝王之道如長江大逵無往而不達者以其述天之理故耳異端之說如斷港荒蹊卒歸於不可行者以其私意之所為故耳又曰陳相言許行之說以謂使其說行其效可使天下反於淳朴凡天下之物皆可齊也嗟乎豈有此理哉有天地則有萬物其巨細多寡髙下美惡之不齊乃物之情而實天之理也物各付物止於其所吾何加損於其間哉故莊周之齊物强欲以理齊之猶為賊夫道况乎許子遂欲一天下之物而泯其一定之分其蔽豈不甚矣哉孟子曰夫物之不齊物之情也斯兩言也足以發明天理之大不但可以闢許行而莊周之說併可坐見其偏矣故曰從許子之道相率而為偽者也强使巨者細多者寡髙者下美者惡豈非相率而為偽乎墨者夷之因徐辟而求見孟子孟子曰吾固願見今吾尚病病愈我且往見夷子不來朱子曰墨者治墨翟之道者徐辟孟子弟子孟子稱疾疑亦托辭以觀其意之誠否他日又求見孟子孟子曰吾今則可以見矣不直則道不見我且直之吾聞夷子墨者墨之治喪也以薄為其道也夷子思以易天下豈以為非是而不貴也然而夷子葬其親厚則是以所賤事親也又求見則其意已誠矣故因徐辟以質之如此直盡言以相正也莊子曰墨子生不歌死無服桐棺三寸而無椁是墨之治喪以薄為道也易天下謂移易天下之風俗也夷子學於墨氏而不從其教其心必有所不安者故孟子因以詰之徐子以告夷子夷子曰儒者之道古之人若保赤子此言何謂也之則以為愛無差等施由親始徐子以告孟子孟子曰夫夷子信以為人之親其兄之子為若親其鄰之赤子乎彼有取爾也赤子匍匐將入井非赤子之罪也且天之生物也使之一本而夷子二本故也若保赤子周書康誥篇文此儒者之言也夷子引之蓋欲援儒而入於墨以拒孟子之非已又曰愛無差等施由親始則推墨而附於儒以釋已所以厚葬其親之意皆所謂遁辭也孟子言人之愛其兄子與鄰之子本有差等書之取譬本為小民無知而犯法如赤子無知而入井耳且人物之生必各本於父母而無二乃自然之理若天使之然也故其愛由此立而推以及人自有差等今如夷子之言則是視其父母本無異於路人但其施之之序姑自此始耳非二本而何哉然其於先後之間猶知所擇則又其本心之明有終不得而息者此其所以卒能受命而自覺其非也蓋上世甞有不葬其親者其親死則舉而委之於壑他日過之狐狸食之蠅蚋姑嘬之其顙有泚睨而不視夫泚也非為人泚中心達於面目蓋歸反虆梩而掩之掩之誠是也則孝子仁人之掩其親亦必有道矣因夷子厚𦵏其親而言此以深明一本之意上世謂太古也委棄也壑山水所趨也蚋蚊屬姑語助聲或曰螻蛄也嘬攢共食之也顙額也泚然汗出之貌睨邪視也視正視也不能不視而又不忍正視哀痛迫切不能為心之甚也非為人泚言非為他人見之而然也所謂一本者於此見之尤為親切蓋惟至親故如此在他人則雖有不忍之心而其哀痛迫切不至若此之甚矣反覆也虆土籠也梩土轝也於是歸而掩覆其親之尸此葬埋之禮所由起也此掩其親者若所當然則孝子仁人所以掩其親者必有其道而不以薄為貴矣徐子以告夷子夷子憮然為間曰命之矣憮然茫然自失貌間者有頃之間也命猶教也言孟子已教我矣蓋因其本心之明以攻其所學之蔽是以吾之言易入而彼之惑易解也南軒曰仁莫大於愛親其達之天下皆是心所推也故其差等輕重莫不有别焉此仁義之道所以相為體用也若夫愛無差等則是無義也無義則亦害夫仁之體矣以失其所以為本之一故也故孟子於墨氏之說所以深闢之而發二本之論也公都子曰外人皆稱夫子好辨敢問何也孟子曰予豈好辨哉予不得已也天下之生久矣一治一亂朱子曰生謂生民也一治一亂氣化盛衰人事得失反復相尋理之常也當堯之時水逆行汜濫於中國蛇龍居之民無所定下者為巢上者為營窟書曰洚水警余洚水者洪水也洚水洚洞無涯之水也警戒也此一亂也使禹治之禹掘地而注之海驅蛇龍而放之菹水由地中行江淮河漢是也險阻既逺鳥獸之害人者消然後人得平土而居之此一治也堯舜既没聖人之道衰暴君代作壊宫室以為汙池民無所安息棄田以為園囿使民不得衣食邪說暴行又作園囿汙池沛澤多而禽獸至及紂之身天下又大亂自堯舜沒至此治亂非一及紂而又一大亂也周公相武王誅紂伐奄三年討其君驅飛亷於海隅而戮之滅國者五十驅虎豹犀象而逺之天下大悅書曰不顯哉文王謨丕承哉武王烈佑啟我後人咸以正無缺此一治也世衰道微邪說暴行有作臣弑其君者有之子弑其父者有之此周室東遷之後又一亂也孔子懼作春秋春秋天子之事也是故孔子曰知我者其惟春秋乎罪我者其惟春秋乎孔子作春秋以討亂賊則致治之法垂於萬世是亦一治也聖王不作諸侯放恣處士横議楊朱墨翟之言盈天下天下之言不歸楊則歸墨楊氏為我是無君也墨氏兼愛是無父也無父無君是禽獸也公明儀曰庖有肥肉廏有肥馬民有饑色野有餓莩此率獸而食人也楊墨之道不息孔子之道不著是邪說誣民充塞仁義也仁義充塞則率獸食人人將相食楊朱但知愛身而不復知有致身之義故無君墨子愛無差等而視其至親無異衆人故無父無父無君則人道滅絶是亦禽獸而已充塞仁義謂邪說遍滿妨於仁義也孟子引公明儀之言以明楊墨道行則人皆無父無君以陷於禽獸而大亂將起是亦率獸食人而人又相食也此又一亂也吾為此懼閑先聖之道距楊墨放淫辭邪說者不得作作於其心害於其事作於其事害於其政聖人復起不易吾言矣閑衛也放驅而遠之也作起也事所行政大體也孟子雖不得志於時然楊墨之害自是滅息而君臣父子之道賴以不墜是亦一治程子曰楊墨之害甚於申韓蓋楊氏為我疑於義墨氏兼愛疑於仁申韓則淺陋易見故孟子止闢楊墨為其惑世之甚也昔者禹抑洪水而天下平周公兼夷狄驅猛獸而百姓寜孔子成春秋而亂臣賊子懼詩云戎狄是膺荆舒是懲則莫我敢承無父無君是周公所膺也我亦欲正人心息邪說距詖行放淫辭以承三聖者豈好辨哉予不得已也承繼也三聖禹周公孔子也蓋邪說横流壞人心術甚於洪水猛獸之災慘於夷狄簒弑之禍故孟子深懼而力救之再言豈好辨哉予不得已也所以深致意焉然非知道之君子孰能真知其所以不得已之故哉能言距楊墨者聖人之徒也言茍能有為此距楊墨之說者則其所趨正矣雖未必知道是亦聖人之徒也孟子既答公都子之問而意有未盡故復言此蓋邪說害正人人得而攻之不必聖賢如春秋之法亂臣賊子人人得而討之不必士師也聖人救世立法之意其切如此若以此意推之則不能攻討而又唱為不必攻討之說者其為邪詖之徒亂賊之黨可知矣尹氏曰學者於是非之原毫釐有差則害及於生民禍及於後世故孟子辨邪說如是之嚴而自以為承三聖之功也當是時方且以好辨目之是以常人之心而度聖賢之心也南軒曰為我兼愛特其見之偏耳而比之遽及於禽獸者蓋為我則自私自私則害義而君臣之分遂可廢也兼愛則無本無本則害仁而父子之親遂可夷也人之異乎庶物以其有君臣父子也無父無君則與禽獸有異乎哉愚按莊子以曽史楊墨並譏者凡數焉曽子孔門之髙弟史魚亦孔子所與莊生非孔子者也其譏之宜矣併及於楊墨者以其兼愛之似仁為我之似義故也孟子莊子同於非楊墨而其意不同蓋莊子直以為仁義孟子則以其似仁義而實非仁義此所以為不同也論語子曰攻乎異端斯害也已范氏曰攻専治也故治木石金玉之工曰攻異端非聖人之道而别為一端如楊墨是也其率天下至於無父無君専治而欲精之為害甚矣或問有以攻為攻擊之攻言異端不必深排但當反經而已者如何朱子曰不務反經而徒與之角其無涯之辨固所以自蔽然熟視異端之害而不一言以正之則亦何以祛習俗之蔽而反之於經哉蓋正道異端如水火之相勝彼盛則此衰此强則彼弱反經固所當務而不可以徒反異端固不必辨然亦有不可不辨者熟觀孟子所以答公都子好辨之問者則可見矣或問諸說如何如張子謂孔子不闢異端其考之亦不詳矣當時所謂異端固未有以見其為誰氏姑以楊墨論之如墨氏之無父則悖徳悖禮之訓固已深闢之楊氏之無君則潔身亂倫之戒又已深闢之矣愚按孔子之言雖非為楊墨發然此兩言實深中二氏之病此義常明則楊墨之禍自熄矣孟子曰楊子取為我拔一毛而利天下不為也墨子兼愛摩頂放踵利天下為之全文見前孟子曰逃墨必歸於楊逃楊必歸於儒歸斯受之而已矣朱子曰墨氏務外而不情楊氏太簡而近實故其反正之漸大略如此歸斯受之者閔其陷溺之久而取其悔悟之新也今之與楊墨辨者如追放豚既入其苙又從而招之放豚放逸之豕豚也苙䦨也招􅇢也羈其足也言彼既來歸而又追究其既往之失也此章見聖賢之於異端拒之甚嚴而於其來歸待之甚恕拒之嚴故人知彼說之為邪待之恕故人知此道之可反仁之至義之盡也問逃墨歸楊云云曰楊墨皆是邪說無大輕重但墨氏之說尤出於矯偽不近人情而難行故孟子之言如此非以楊氏為可取也程子曰儒者濳心正道不容有差其始甚微其終則不可救如師也過商也不及於聖人中道師只是過於厚些商只是不及些然而厚則漸至於兼愛不及則便至於為我其過不及同出於儒者其末遂至楊墨至如楊墨亦未至於無父無君孟子推之便至於此蓋其差必至於是也吕氏大事記曰齊宣王喜文學㳺說之士鄒衍之徒七十六人皆賜列第為上大夫不治而議論是以齊稷下學士盛者數百千人是時諸子並起秦漢以後所謂六家九流特其略耳孟子荀卿列𫝊曰騶衍作怪迂之變終始大聖之篇稱引天地剖判以來五徳轉移治各有宜其語閎大不經王公大人初見其術懼然顧化淳于髠齊人博聞强記學無所主慎到趙人田駢接子齊人環淵楚人皆學黄老之術騶奭者齊諸騶子亦頗采騶衍之術文具難施公孫龍為堅白同異之辨魏有李悝盡地力之教楚有尸子長盧阿之吁子焉自騶衍與齊之稷下先生淳于髠慎到環淵接子田駢之徒各著書言治亂之事以干世主豈可勝道哉莊子天下篇曰古之人其備乎配神明醇天地育萬物和天下澤及百姓明於本數係於末度六通四闢小大精粗其運無乎不在其明而在數度者舊法世傳之史尚多有之其在詩書禮樂者鄒魯之士縉紳先生多能明之詩以導志書以導事禮以導行樂以導和易以導隂陽春秋以導名分其數散於天下而設於中國者百家之學或稱而道之天下大亂道徳不一天下多得一察焉以自好譬如耳目鼻口皆有所明不能相通天下之人各為其所欲焉以自為方悲夫百家往而不反必不合矣後世學者不見天地之純古人之大體道術將為天下裂司馬子長與莊生所談皆當深味也愚按莊生所述諸子墨翟禽滑釐其一也宋鈃尹文其二也彭䝉田駢慎到其三也闗尹老􅆅其四也莊周其五也恵施其六也異端之盛莫甚於此時而孟子獨深辨楊墨者或曰楊墨之禍仁義固也必若何而後為仁義耶曰孟子甞言之矣曰君子親親而仁民仁民而愛物是也蓋自親親而推之於民物是其理之一也明乎理之一則心無不傳而非楊氏之為我矣親親與仁民不同仁民與愛物不同是其分之殊也明乎分之殊則其施有序而非墨氏之兼愛矣聖賢正大之學異端私邪之見其霄壤也學者徒知孟子之闢楊墨而不知此章乃闢楊墨之本故附見焉詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知其所窮程子曰詖辭偏蔽淫辭陷溺邪辭信其說至於耽惑遁辭生於不正窮著便遁此四者楊墨皆有愚按此亦闢異端之詞故附著於此全章見志氣篇景春曰公孫衍張儀豈不誠大丈夫哉一怒而諸侯懼安居而天下熄朱子曰景春人姓名公孫衍張儀皆魏人怒則說諸侯使相攻伐故諸侯懼也孟子曰是焉得為大丈夫乎子未學禮乎丈夫之冠也父命之女子之嫁也母命之往送之門戒之曰往之女家必敬必戒無違夫子以順為正者妾婦之道也加冠於首曰冠女家夫家也婦人内夫家以嫁為歸也夫子夫也女子從人以順為正道也蓋言二子阿諛茍容竊取權勢乃妾婦順從之道耳非丈夫之事也居天下之廣居立天下之正位行天下之大道得志與民由之不得志獨行其道富貴不能淫貧賤不能移威武不能屈此之謂大丈夫廣居仁也正位禮也大道義也與民由之推其所得於人也獨行其道守其所得於己也淫蕩其心也移變其節也屈挫其志也何叔京曰戰國之時聖賢道否天下不復見其徳業之盛但見姦巧之徒得志横行氣燄可畏遂以為大丈夫不知由君子觀之是乃妾婦之道耳何足道哉愚按此章闢縦横家又宋鈃章闢遊說之徒見仁義篇孟子曰求也為季氏宰無能改於其徳而賦粟倍他日孔子曰求非我徒也小子鳴鼓而攻之可也求孔子弟子冉求季氏魯卿宰家臣賦猶取也取民之粟倍於他日也小子弟子也鳴鼔而攻之聲其罪而責之也由此觀之君不行仁政而富之皆棄於孔子者也況於為之强戰爭地以戰殺人盈野爭城以戰殺人盈城此所謂率土地而食人肉罪不容於死為去聲林氏曰富其君者奪民之財耳而夫子猶惡之況為土地之故而殺人使其肝腦塗地則是率土地而食人之肉其罪之大雖至於死猶不足以容之也故善戰者服上刑連諸侯者次之辟草萊任土地者次之辟與闢同善戰如孫臏吴起之徒連結諸侯如蘇秦張儀之類辟開墾也任土地謂分土授民使任耕稼之責如李悝盡地力商鞅開阡陌之類也愚按此章兼闢兵縦横農三家魯欲使慎子為將軍朱子曰慎子魯臣孟子曰不教民而用之謂之殃民殃民者不容於堯舜之世教民者教之禮義使知入事父兄出事長上也用之使之戰也一戰勝齊遂有南陽然且不可是時魯蓋欲使慎子伐齊取南陽也故孟子言就使慎子善戰有功如此且猶不可慎子勃然不悅曰此則滑釐所不識也滑釐慎子名曰吾明告子天子之地方千里不千里不足以待諸侯諸侯之地方百里不百里不足以守宗廟之典籍待諸侯謂待其朝覲聘問之禮宗廟典籍祭祀㑹同之常禮也周公之封於魯為方百里也地非不足而儉於百里大公之封於齊也亦為方百里也地非不足也而儉於百里二公有大勲勞於天下而其封國不過百里儉止而不過之意也今魯方百里者五子以為有王者作則魯在所損乎在所益乎魯地之大皆并吞小國而得之有王者作則必在所損矣徒取諸彼以與此然且仁者不為況於殺人以求之乎徒空也言不殺人而取之也君子之事君也務引其君於當道志於仁而已當道謂事合於理志仁謂心在於仁孟子曰今之事君者曰我能為君闢土地充府庫今之所謂良臣古之所謂民賊也君不鄉道不志於仁而求富之是富桀也為去聲辟與闢同鄉與向同下皆同辟開墾也我能為君約與國戰必克今之所謂良臣古之所謂民賊也君不鄉道不志於仁而求為之强戰是輔桀也約要結也與國和好相與之國也由今之道無變今之俗雖與之天下不能一朝居也言必争奪而至於危亡也愚按此二章専闢兵家孟子曰有人曰我善為陳我善為戰大罪也陳去聲制行伍曰陳交兵曰戰國君好仁天下無敵焉好去聲南面而征北狄怨東面而征西夷怨曰奚為後我此引湯之事以明之解見前篇武王之伐殷也革車三百兩虎賁三千人兩去聲賁音奔又以武王之事明之也兩車數一車兩輪也千書序作百王曰無畏寜爾也非敵百姓也若崩厥角稽首書泰誓文與此小異孟子之意當云王謂商人曰無畏我也我來伐紂本為安寜爾非敵商之百姓也於是商人稽首至地如角之崩也征之為言正也各欲正已也焉用戰焉於䖍反民為暴君所虐皆欲仁者來正已之國也太史公曰世之學老子者則絀儒學儒學亦絀老子道不同不相為謀史記老子列𫝊老子姓李氏名耳字伯陽諡曰􅅨周守藏室之史孔子適周將問禮於老子老子曰吾聞之良賈深藏若虚君子盛徳容貌若愚去子之驕氣與多慾態色與淫志是皆無益於子之身吾所以告子若是而已老子修道徳其學以自隠無名為務著書言道徳之意五千餘言莫知其所終莊子名周甞為䝉漆園吏與梁恵王齊宣王同時其學無所不闚然其要本歸於老子之言故其著書十餘萬言大抵皆寓言也作漁父盜跖胠箧以詆訾孔子之徒以明老子術畏累虚亢桑子之屬皆空語無事實然善屬書離辭指事類情用剽剥儒墨雖當世宿學不能自解免也其言洸洋自􅔤以適已故自王公大人不能器之終身不仕以快其志焉按莊子之稱老􅅨闗尹曰以本為精以末為粗澹然獨與神明居以懦弱謙下為表以空虚不毁萬物為實又曰在巳無居形物自著其動若水其静若鏡其應若響未甞先人而常隨人又曰人皆取先己獨取後曰受天下之垢人皆取實己獨取虛無藏也故有餘又曰闗尹老􅅨古之博大真人哉其自稱則曰寂漠無形變化無常又曰以謬悠之說荒唐之言無端厓之辭時恣縱而不儻不以觭見之也以天下為沈濁不可與莊語以巵言為曼衍以重言為真以寓言為廣獨與天地精神往來而不敖睨於萬物上與造物者遊而下與外死生無終始者為交老莊之學即此可見其大略矣楊子曰老子之言道徳吾有取焉耳搥提仁義絶滅禮學吾無取焉耳程子曰楊子看老子謂言道徳則有取云云則無取若以老子剖斗折衡聖人不死大盜不止為救時反本之言為可取却尚可恕如老子言失道而後徳失徳而後仁失仁而後義失義而後禮則自不識道已不成言語却言其言道徳有取則是楊子已不見道又曰今語道徳須要寂滅湛静形使如槁木心使如死灰豈有直做墻壁木石而謂之道所貴乎智周天地萬物而不遺又幾時要如死灰所貴乎動容周旋中禮又幾時要如槁木又曰物之不齊物之情也莊周彊要齊物然而物終不齊也堯夫有言泥空終是著齊物到頭争問莊子齊物論如何曰莊子之意欲齊物理物理從來齊何待莊子而後齊若齊物形物形從來不齊如何齊得又曰莊生形容道體之語儘有好處老子谷神不死一章最佳又曰莊言遊方之内遊方之外方何甞有内外如此則是道有隔斷内外各是一處也豈有此理龜山楊氏曰聖人以為尋常事者莊周則夸言之莊周之博乃禪家呵佛罵祖之類是也如逍遥遊養生主曲譬廣喻張大其說論其要則逍遙遊一篇乃子思所謂無入而不自得而養生主一篇乃孟子所謂行其所無事而已朱子曰老子之術須自家占得十分穏便方肯做才有一毫於己不便便不肯做又曰老子之術沖嗇不肯役精神又曰老子之學只要退步柔伏不與你爭才有一毫主張計較思慮之心這氣便麤了故曰致虚極守静篤又曰專氣致柔能如嬰兒乎又曰知其雄守其雌為天下谿知其白守其黑為天下谷所謂谷只是低下處讓你在高處他只要在卑下處全不與你爭只是他用出術數來便不可當如曰以正治國以竒用兵以無事取天下他取天下便是用此道如張子房之術全是如此嶢闗之戰啗秦將以利與之連和即回兵殺之與項羽約和已講解了即勸髙祖追之漢家始終治天下全是得此術又曰老子也見得此个道理只是怕與事物交涉故其言有曰豫兮若冬涉川猶兮若畏四鄰儼乎其若客老子說話大抵如此只是欲得退步占却不要與事物接如治人事天莫若嗇迫之而後動不得已而後應皆是這様意思故為其學者多流於術數如申韓之徒皆是也其後則兵家亦祖其說如隂符經之類是也問老氏柔能勝剛弱能勝强之說曰它便揀便宜底先占了若這下則剛柔寬猛各有用問老子云夫禮忠信之薄而亂之首孔子又却問禮於他不知何故曰他曉得禮之曲折只是他說這个無緊要底物事不將為事某初間疑有兩个老􅅨横渠亦意其如此今看得來不是如此他曽為柱下史故禮自是理㑹得所以與孔子說得如此好只是他又說這个物事不用得亦可一似聖人用禮時反若多事所以如此說禮運中謀用是作而兵由此起等語便自有這个意思又曰易不言有無老子言有生於無便不是又曰一便生二二便生四老子却說二生三便是不理㑹得又曰莊周都理㑹得只是不把做事觀其第四篇人間世及漁父篇以後多是說孔子與諸人語只是不肯學孔子所謂知者過之者也如說易以道隂陽春秋以道名分等語後來人如何下得它直是似快刀利斧劈截將去字字有著落問莊子較之老子較平帖些曰莊子跌蕩老子收斂莊子却將許多道理掀翻說不拘繩墨又曰莊周列禦冦亦似曽㸃底意思他也不是専學老子吾儒書他都看來不知如何被他晫見這箇物事便放蕩去了又曰列莊本楊朱之學故其書多引其語莊子說子之於親也命也不可解於心至臣之於君則曰義也無所逃於天地之間是他看得那君臣之義却似是逃不得不奈何須著臣服他更無一箇自然相胥為一體處可怪故孟子以為無君此類是也又曰莊子云各有儀則之謂性此謂各有儀則如有物有則比之諸家差善又曰天其運乎地其處乎日月其爭於所乎孰主張是孰綱維是孰居無事推而行是意者其有機緘而不得已邪意者其運轉而不能自立邪雲者為雨乎雨者為雲乎孰隆施是孰居無事淫樂而勸是莊子這數語甚好是他見得方說到此其才髙如老子天下篇言詩以導志書以導事禮以導行樂以導和易以導隂陽春秋以導名分若見不分曉焉敢如此道要之他病我雖理㑹得只是不做又曰人說孟子闢楊墨不闢老氏却不知道家修養之說只是為已獨自一身便了更不管别人便是楊氏為我之學大事記周安王四年書鄭人列禦冦為李耳之學著書𫝊於世耳楚人與孔子同時楊朱亦師耳與宋人墨翟春秋後各以其學行天下吕氏曰耳老子也孔子甞問禮焉今載於曽子問者與五千言殊不類蓋告孔子者其所職著於書者自其所見也列子多引黄帝書蓋古之微言𫝊久而差者也𤣥牝一章今見於老子此戰國秦漢以來所以多喜並言黄帝老子而謂之黄老也孔子定書而始堯典其有以哉以列子所載楊朱遇老子老子中道而歎一章觀之則朱受學於老子不疑朱之言見於列子者固多後人所附益為我之說亦畧可見也史謂墨翟並孔子時又或曰其後雖不可考然楊墨之說肆行於天下必在春秋後蓋異端之說非王教盡廢不能行也按曽子問曰古者師行必以遷廟主行乎孔子曰天子巡狩以遷廟主行載於齊車言必有尊也今也取七廟之主以行則失之矣當七廟五廟無虚主虚主者唯天子崩諸侯薨與去其國與祫祭於祖為無主耳吾聞諸老􅅨曰天子崩國君薨則祝取羣廟之主而藏諸祖廟禮也卒哭成事而后主各反其廟君去其國太宰取羣廟之主以從禮也祫祭於祖則祝迎四廟之主主出廟入廟必蹕老􅅨云曽子問曰葬引至於堩日有食之則有變乎且不乎孔子曰昔者吾從老􅅨助葬於巷黨及堩日有食之老􅅨曰丘止柩就道右止哭以聽變既明反而後行曰禮也反葬而丘問之曰夫柩不可以反者也日有食之不知其已之遲數則豈如行哉老􅅨曰諸侯朝天子見日而行逮日而舍奠大夫使見日而行逮日而舍夫柩不蚤出不莫宿見星而行者唯罪人欲奔父母之喪者乎日有食之安知其不見星也且君子行禮不以人之親痁患吾聞諸老􅅨云子夏問曰三年之喪卒哭金革之事無避也者禮與初有司與孔子曰夏后氏三年之喪既殯而致事殷人既葬而致事記曰君子不奪人之親亦不可奪親也此之謂乎子夏曰金革之事無避也者非與孔子曰吾聞諸老􅅨曰昔者魯公伯禽有為為之也今以三年之喪從其利者吾不知也此吕氏所謂與五千言異者列子引黄帝書有曰谷神不死是謂𤣥牝𤣥牝之門是謂天地之根綿綿若存用之不勤此章亦見老子又引黄帝書曰形動不生形而生影聲動不生聲而生響無動不生無而生有形必終者也天地終乎與我偕終終進乎不知也張湛曰聚則成形散則為終此世之所謂終始也然則聚者以形實為始以離散為終散者以虚漠為始以形實為終故迭相為終始而理實無終無始者也又黄帝書曰精神入其門骨骸反其根我尚奚存其大指與老莊相若而朱子又謂佛氏所謂四大各散幻身何在蓋本此意楊朱之語多見於列子其遇老子一章云楊朱南之沛老􅅨西逰於秦邀於郊至梁而遇老子老子中道仰天而嘆曰始以汝為可教今不可教也楊朱不答至舍進涫潄巾櫛脫履户外膝行而前曰向者弟子欲請夫子夫子辭行不間是以不敢今夫子間矣請問其過老子曰而睢睢旴旴而誰與居大白若辱盛徳若不足楊朱蹵然變容曰敬聞命矣其往也舍者迎將其家公執席妻執巾櫛舍者避席煬者避竈其反也舍者與之爭席矣楊朱之宋宿於逆旅逆旅人有妾二人其一人美其一人惡惡者貴而美者賤楊子問其故逆旅小子對曰其美者自美吾不知其美也其惡者自惡吾不知其惡也楊子曰弟子記之行賢而去自賢之行安往而不愛故天下有常勝之道有不常勝之道常勝之道曰柔不常勝之道曰彊又曰百年夀之大齊得百年者千無一焉設有一者孩抱以逮昏老幾居其半矣夜眠之所弭晝覺之所遺又幾居其半矣痛疾哀苦亡失憂懼又幾居其半矣量十數年之中逌然而自得亡介焉之慮者亦亡一時之中爾夫人之生奚為哉奚樂哉為美厚爾為聲色爾而美厚復爾不常厭足聲色不可常玩聞乃復為刑賞之所禁勸名法之所追遣遑遑爾競一時之虚譽規死後之餘榮偊偊爾慎耳目之視聽惜身意之是非徒失當年之至樂不能自肆於一時重囚桎梏何以異哉太古之人知生之暫來知死之暫往故從心而動不違自然所好當身之娱非所去也故不為名所勸從性而行不逆萬物所好死後之名非所取也故不為形所及名譽先後年命多少非所量也又曰伯成子髙不以一毫利物舍國而隱耕大禹不以一身自利一體偏枯古之人損一毫利天下不與也悉天下奉一身不取也人人不損一毫人人不利天下天下治矣禽子問楊朱曰去子體之一毛以濟一世汝為之乎楊子曰世固非一毛之所濟禽子曰假濟為之乎楊子弗應禽子出語孟孫陽孟孫陽曰子不達夫子之心吾請言之有侵若肌膚獲萬金者若為之乎曰為之孟孫陽曰有斷若一節得一國子為之乎禽子黙然有間孟孫陽曰一毛微於肌膚肌膚微於一節省矣然則積一毫以成肌膚積肌膚以成一節一毛固一體萬分中之一物奈何輕之乎禽子曰吾不能所答子然則以子之言問老􅅨闗尹則子言當矣以吾言問大禹墨翟則吾言當矣孟孫陽因顧與其徒說他事楊朱曰天下之美歸之舜禹周孔天下之惡歸之桀紂然而舜耕於河陽陶於雷澤四體不得暫安口腹不得美厚父母之所不愛弟妹之所不親及受堯之禪年已長智已衰戚戚然以至於死此天人之窮毒者也禹荒土功過門不入身體偏枯手足胼胝及受舜禪卑宫室美黻冕戚戚然以至於死此天人之憂苦者也周公攝天子之政四國流言居東三年誅兄放弟僅免其身戚戚然以至於死此天人之危懼者也孔子明帝王之道應時君之聘伐樹於宋削迹於衛窮於商周圍於陳蔡受屈於季氏見辱於陽虎戚戚然以至於死此天民之遑遽者也凡彼四聖者生無一日之歡死有萬世之名名者固非實之所取也桀藉累世之資居南面之尊恣耳目之所娱窮意慮之所為熙熙然以至於死此天民之蕩逸者也紂亦藉累世之資居南面之尊肆情於傾宫縱欲於長夜不以禮義自苦熙熙然以至於死此天民之放縦者也彼二凶也生有從欲之歡死被愚暴之名實者固非名之所與也彼四聖雖美之所歸苦以至終同歸於死矣彼二凶雖惡之所歸樂以至終亦同歸於死矣其他言論尚多大抵皆邪說詖論也吕氏所謂為我之說亦略可見其不信夫太史公曰申子卑卑施之於名實韓子引繩墨切事情明是非其極慘礉少恩皆原於道徳之意而老子深逺矣𫝊云申不害京人也故鄭之賤臣學術以干韓昭侯昭侯用為相内修政敎外應諸侯國治兵强無侵韓者申子之學本於黄老而主刑名著書二篇號曰申子韓非者韓之諸公子也喜刑名法術之學而其歸本於黄老與李斯俱事荀卿斯自以為不如非非見韓之削弱數以書諫韓王韓王不能用於是韓非疾治國不務修明其法制執勢以御其臣下富國强兵而以求人任賢反舉浮淫之蠧加之於功實之上以為儒者用文亂法而俠者以武犯禁寛則寵名譽之人急則用介胄之士今者所養非所用所用非所養悲亷直不容於邪枉之臣觀往者得失之變故作孤憤五蠧内外儲說林說難十餘萬言然韓非知說之難終死於秦不能自脫申子韓子皆得𫝊於後世宛丘張氏曰吾甞論黄老之道徳遣去情累而其末流為智術刑名何哉夫惟静者見物之情而無為者知物之闕而中其情者智術之所從出也仁義生於恩恩闕不遣也無情之至至闕蘓氏之說畧同而張尤精闕者道之用朱子曰老子說話都是闕他看得天下事變熟了都於反處做起且如人剛强咆哮跳躑之不已其勢必有時而屈故它只務為弱人纔弱便蓄得那精剛完全及其發也自然不可當故張文濳說老子恬静故能知變然其勢必至於忍心無情視天下之人皆如土偶其心冷冰冰地便是殺人也不䘏故其流入於變詐刑名太史公將老子與申韓同𫝊非是强安排源流實是如此吕氏曰按新序申子之書號曰術商鞅之書號曰法太史公謂非喜刑名法術之學則兼治之也六經孔孟之敎與人之公心合故治世宗之申商韓非之說與人之私情合故末世宗之彼各有所合也董子對䇿曰春秋大一統者天地之常經古今之通誼也今師異道人異論百家殊方指意不同是以上亡以持一統法制數變下不知所守臣愚以為諸不在六藝之科孔子之術者皆絶其道勿使並進邪辟之說滅息然後統紀可一而法度可明民知所從矣武帝紀建元元年丞相綰奏所舉賢良或治申商韓非蘇秦張儀之言亂國政請皆罷奏可吕氏曰此行仲舒之言也衛綰特使之書奏耳建白大義豈綰所能辨哉武帝年未二十而知所決擇如此可謂英主矣然轅固以老而見棄莊助以容悅而見録仲舒雖殷勤三䇿而不能引以自近也以舉賢良一事考之武帝終身之得失皆可推矣按仲舒本𫝊自武帝立魏其武安為相而隆儒矣及仲舒對䇿推明孔氏抑黜百家皆自仲舒發之胡氏曰仲舒推明春秋之義以隆仲尼之教道術有統異端滅息民到於今賴之其功不在孟子之下漢唐大儒皆莫能及又遷固二史並稱魏其武安俱好儒術推轂趙綰為御史大夫王臧為郎中令迎魯申公欲設明堂云云竇太后好黄老言而魏其武安趙綰王臧等隆重儒術貶道家言太后滋不悅及建元二年御史大夫綰請母奏事東宫太后大怒得綰臧之過以讓上上因廢明堂事下綰臧吏皆自殺而免丞相太尉申公亦疾免以歸及外戚傳曰竇太后好黄帝老子言景帝及諸竇不得不讀老子尊其術其後太后崩武安侯田蚡為丞相絀黄老之言復申刑名百家之禁於時學儒者以百數吕氏曰武帝即位之初罷申韓蘇張之言尊尚黄老以竇太后之故至是始禁之太史公曰自曹參薦蓋公明黄老而賈生晁錯明申韓蓋漢初以來黄老申韓迭用於世攷其源流皆有𫝊授張留侯得之黄石公而參得諸蓋公蓋公亦皆有所本蓋河上丈人敎安期生安期生𫝊之毛翕公毛翕公𫝊之樂瑕公樂瑕公𫝊之樂臣公樂臣公𫝊之蓋公蓋公當時擢國師此黄老源流之可見者也晁錯學申商刑名於軹張恢生所與洛陽宋孟及劉帶同師此申商之源流可見者也曹參丞相之學賈傅之學亦必有所𫝊授特史失之耳又以文帝清淨其性與黄老合景帝深刻其性與申韓合故道家刑名盛行於時而儒術闇昩不明微仲舒發其端則六經之教終為二家所揜矣然武帝雖曰罷黜百家然張杜之徒以深文峻法進則刑名家未甞不用也嚴助朱買臣以談說親幸則縱横家之得志如故也至其顛倒沒溺於神仙方士之說幾終其身而不悟是又黄老之末流耳名雖崇儒而所得者則公孫𢎞輩是又何益於治亂之數哉又太史公自序太史公學天官於唐都受易於楊何習道論於黄子太史公仕於建元元封之間愍學者之不達其意而師悖乃論六家之要指曰易大𫝊天下一致而百慮同歸而殊塗夫隂陽儒墨名法道徳此務為治者也直所從言之異路有省不省耳隂陽之術大祥而衆忌諱使人拘而多所畏然其序四時之大順不可失也儒者博而寡要勞而少功是以其事難盡從然其序君臣父子之禮列夫婦長㓜之別不可易也墨者儉而難遵是以其事不可徧循然其彊本節用不可廢也法家嚴而少恩然其正君臣上下之分不可改也名家使人儉而善失真然其正名實不可不察也道家使人精神専一動合無形贍足萬物其為術也因隂陽之大順采儒墨之善撮名法之要與時遷移應物變化立俗施事無所不宜㫖約而易操事少而功多儒者則不然以為人主天下之儀表也主唱而臣和主先而臣隨如此則主勞而臣逸至於大道之要去健羨絀聰明釋此而任術夫神大用則竭形大勞則敝形神蚤衰欲與天地長久非所聞也夫隂陽四時八位十二度二十四節各有教令順之者昌逆之者亡未必然也故曰使人拘而多畏夫春生夏長秋收冬藏此天道之大經也弗順則無以為天下紀綱故曰四時之大順不可失也夫儒者以六藝為法六藝經𫝊以千萬數累世不能通其學當年不能究其禮故曰博而寡要勞而少功若夫列君臣上下之禮序夫婦長㓜之別雖百家弗能易也墨者亦尚堯舜言其徳行曰髙堂三尺土階三等茅茨不剪采椽不斵飯土簋啜土刑糲梁之食藜藿之羮夏日葛衣冬日鹿裘其送死桐棺三寸舉音不盡其哀教喪禮必以此為萬民之率使天下法若此則尊卑無別也夫世異時移事業不必同故曰儉而難遵要曰彊本節用則人給家足之道也此墨子之所長雖百家不能廢也法家不別親疎不殊貴賤一斷於法則親親尊尊之恩絶矣可以行一時之計而不可長用也故曰嚴而少恩若尊主卑臣明分職不得相踰越雖百家不能改也名家苛察繳繞使人不得反其意剽決於名時失人情故曰使人儉而善失真若夫控名責實參伍不失此不可不察也道家無為又曰無不為其實易行其辭難知其術以虚無為本以因循為用無成勢無常形故能究萬物之情不為物先不為物後故能為萬物主有法無法因時為業有度無度因物興舍故曰聖人不巧時變是守虚者道之常也因者君之綱也羣臣並至使各自明也其實中其聲者謂之端實不中其聲者謂之􅑆􅑆言不聽姦乃不生賢不肖自分白黑乃形在所欲用耳何事不成乃合大道混混冥冥光耀天下復反無名凡人所生者神也所託者形也神大用則竭形大勞則敝形神離則死死者不可復生離者不可復合故聖人重之由是觀之神者生之本也形者生之具也不先定其神形而曰我有以治天下何由哉太史公之論如此宜班固以先黄老後六經為譏也其視仲舒有間矣按此上兼論諸子之學又劉歆序諸子分為九流曰儒曰道曰隂陽曰法曰名曰墨曰縦横曰雜曰農以為九家者其言雖殊譬如水火相滅亦相生仁義相反而皆相成也若能修六藝之術而觀此九家之言舍短取長則可以通萬方之畧矣胡氏論之曰歆言九流猶仁義之相反而相成也夫仁以親親義以尊尊施之雖有等衰發端則非異道故事父孝則忠可移於君求忠臣必於孝子未聞相反之理也曰法則慘刻曰名則苛嬈曰墨則二本曰縦横則妾婦之道是皆五經之棄也其歸豈足安乎儒家者流固修六藝矣列儒於九家而曰修六藝之術以觀九家之言則修六藝者無所名家謂誰氏耶何其言之多舛也歆資性穎利而不端學該博而不正方之仲舒豈直什百而已哉西山讀書記卷三十五
