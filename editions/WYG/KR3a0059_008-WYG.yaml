body:
  text: 西山讀書記卷八宋真德秀撰義論語子曰君子之於天下也無適也無莫也義之與比朱子曰適專主也春秋傳曰吾誰適從是也莫不肯也比從也謝氏曰適可也莫不可也無可無不可茍無道以主之不幾於猖狂自恣乎此佛老之學所以自謂心無所往而能應變而卒得罪於聖人之門也聖人之學不然於無可無不可之間有義存焉然則君子之心果有所倚乎南軒曰適莫兩端也適則有所必莫則無所主蓋不失於此則失之於彼鮮不倚於一偏也夫義者人之正路倚於一偏則莫能遵於正路矣惟君子之心無適也而亦無莫也其於天下惟義之視而已蓋天下事事物物皆有義焉存於中而形於外也無適無莫而義之與比非窮理之明克己之至者安能及此若夫異端之學則初欲爲無適莫而不知有義存焉如狥其私意以爲可否而其無適無莫者乃所以爲有適有莫而卒墮於一偏也黄氏曰於天下言天下之事無不然如出處去就以至立政用人之類皆在其中惟義之從而已不可先懷適莫之念也知此則漸進於絶四之地矣子曰非其鬼而祭之諂也見義不爲無勇也朱子曰知而不爲是無勇也問見義不爲無勇這亦不爲無所見但爲之不力所以爲無勇曰固是見得是義而爲之不力亦是見得未明若已見得分明則行之自有力這般處着兩下並看問云云莫是連上句否曰不須連上句自說凡事見得是義便着做不獨說祭祀也子路曰君子尚勇乎子曰君子義以爲上君子有勇而無義爲亂小人有勇而無義爲盜朱子曰君子小人以位言也尹氏曰義以爲尚則其勇也大矣子路好勇故夫子以此救其失也胡氏曰疑此子路初見孔子時問答也孟子曰大人者言不必信行不必果惟義所在朱子曰必猶期也大人言行不先期於信果但義之所在則必從之卒亦未嘗不信果也尹氏曰主於義則信果在其中矣主於信果則未必合義王勉曰若不合於義而不信不果則妄人爾南軒曰言行固欲信果然有必之之心則非也必乃私也故言必欲信而不知義將至於守其所不可復者私意相與而非所謂信也行必欲果而不知義將至於爲其所不可爲者直情徑行而非所謂果也故君子不必夫果與信而獨精吾義焉耳事事物物皆有義存焉而著於吾心茍能體是心而推之則義可得而精也義精則有所不言言莫非義而無不信之言矣有所不行行莫非義而無不果之行矣孟子集義外已别見程子曰在物爲理處物爲義又曰中理在事義在心又曰義之精者須是自求得之如此則善求義也問義還因事而見否曰非也性中自有或曰無狀可見曰說有便是見但人自不見昭昭然在天地之中也且如性何須待有物方指爲性性自在也子所言見者事吾所言見者理如曰不見而章是也朱子曰義字若一利劒然凡事物到前便分剖去義如利刄相似胸中許多勞勞攘攘到此一齊割斷了右專言義義利子曰君子喻於義小人喻於利朱子曰喻猶曉也義者天理之所宜利者人情之所欲程子曰君子之於義猶小人之於利惟其深喻是以篤好楊氏曰君子有舍生而取義者以利言之則人之所欲無甚於生所惡無甚於死孰肯舍生而取義哉其所喻者義而已不知利之爲利故也小人反是或問喻字之義曰蓋心解通達則其幾微曲折無不盡矣曰然則君子小人之所喻者各爲一事邪將一事之中具此兩端而各隨人之所見邪曰是皆有之但君子深通於此而小人酷曉於彼耳曰對義言之則利爲不善對害言之則利非不善君子之所爲固非欲其不利何獨以喻利爲小人乎曰胡氏言之悉矣胡氏曰義固所以利也易所謂利者義之和者是也然自利爲之則反致不奪不饜之害自義言之則蒙就義之利而逺於利之害矣孟子之告梁王意猶是也義利猶首尾然義者宜也君子見得這事合當如此那事合當如彼但裁處其宜爲之則何不利之有君子只理㑹義一截利處更不理㑹小人只理㑹利一截義處更不問蓋君子之心虛明洞徹見得義分明小人只管計較雖絲毫底利也自理㑹得君子只知得當做與不當做當做處便是合當如此小人則只計較利害如此則利如此則害君子則更不顧利害只看天理如何問云云曰這只就眼前看只如做官須是廉勤自君子爲之只是道合如此自小人爲之只道如此做得人說好可以求知於人君子喻於義小人喻於利只是這一事上君子只見得是義小人只見得是利如伯夷見飴曰可以養老盜跖見之曰可以沃戸樞蓋小人於利他見這一物便思量做一物用他計較精密更有非君子所能知者縁他氣稟中有許多汙穢惡濁底物所以才見那物事便出來應他君子之於義亦是如此或曰伊川云惟其深喻是以篤好若作惟其篤好是以深喻亦得曰陸子靜說正如此按陸氏白鹿講義曰此章以義利判君子小人辭旨曉白然讀之者茍不切己觀省亦恐未能有益也竊謂學者於此當辨其志人之所喻由其所習所習由其所志志乎義則所習者必在於義所習在義斯喻於義矣志乎利則所習者必在於利所習在利斯喻於利矣故學者之志不可不辨也見利思義已見前孟子首章見後仁義篇大學利義見本篇孟子伯夷伊尹於孔子若是班乎曰否自有生民以來未有孔子也然則有同與曰有得百里之地而君之皆能以朝諸侯有天下行一不義殺一不辜而得天下皆不爲也是則同朱子曰行一不義殺一不辜而得天下有所不爲心之正也聖人之所以爲聖人其本根節目之大者惟在於此於此不同則亦不足以爲聖人矣孟子曰雞鳴而起孳孳爲善者舜之徒也雞鳴而起孳孳爲利者蹠之徒也欲知舜與蹠之分無他利與善之間也程子曰言間者謂相去不逺所爭毫末爾善與利公私而已矣才出於善便以利言也楊氏曰舜蹠之相去逺矣而其分乃在善利之間而已是豈可以不謹然講之不熟見之不明未有不以利爲義者又學者所當深察也董子曰皇皇於求財利常恐乏匱者庻人之意也皇皇求仁義常恐不能化民者大夫之意也程子曰聖人以義爲利義安處便爲利全文云利不獨財利之利凡有利心便不可如作一事須尋自家穩便處皆利心也云云如釋氏之學皆本於利故便不是又曰利害者天下之常情人皆知趨利而避害聖人則更不論利害惟看義當爲與不當爲便是命在其中也大凡出義則入利出利則入義天下之事惟義利而已矣陰爲小人利爲不善不可一槩論陰助陽以成物者君子也其害陽者小人也利和義者善也其害義者不善也凡順理無害處即是利問利貞之利與以利爲本之利同否曰凡字只有一箇用有不同只看如何用云云君子未嘗不欲利然孟子言何必曰利者蓋只以利爲利便有害又曰故者以利爲本故是本如此也才不利便害性利只是順天下只是一个利孟子與周易所言一般只爲後人趨着利便有弊故孟子拔本塞源不肯言利其不信孟子者却是不合非利其信者又直道不得近利人無利直是生不得安得無利且譬如椅子人坐此便安是利也如求安不已又要褥子以求温煖無所不爲然後奪之於君父此趨利之弊也利只是一箇利只爲人用得别龜山楊氏曰人能於得處知辨義理亦自難得故孔子以見利思義爲成人而以見得思義稱士或謂人無利心然後爲君子龜山曰以此自爲可也以此責人恐不勝責矣云云王氏有言利者陰也陰當隠伏義者陽也陽當宣著其源發於仲舒此正王氏心術之蔽觀其所爲雖名爲義其實利也謂王安石上蔡謝氏曰以天下爲心者雖有未善亦義心也求濟一身之欲者雖有善亦利心也蓋其平日處心積慮如此君子小人之所由分也南軒張氏曰學者潛心孔孟必求其門而入愚以爲莫先於明義利之辨蓋聖賢無所爲而然也無所爲而然者命之所以不已性之所以不偏而教之所以無窮也凡有所爲而然者皆人欲之私而非天理之所存此義利之分也自未知省察者言之終日之間鮮不爲利矣非但名位貨殖而後爲利也意之所向一渉於有所爲雖有淺深之不同而其爲狥己自私則一而已如孟子所謂内交要譽惡其聲之類是也是心日滋則善端遏塞欲邇聖賢之門墻以求自得豈非却行而望及前人乎學者當立志以爲先持敬以爲本而精察於動靜之間毫釐之差審其爲霄壤之判則有以用吾力矣學然後知不足平時未覺吾利欲之多也灼然有見於義利之辨將日救過之不給由是而不舍則趣益深理益明而不可以已也孔子曰古之學者爲己今之學者爲人爲人者無適而非利爲己者無適而非義曰利雖在己之事皆爲人也曰義則施諸人者亦莫非爲己也嗟乎義利之辨大矣豈特學者治己之所當先施之天下國家一也王者所以建立邦本垂裕無疆以義故也而霸者所以陷溺人心貽毒後世以利故也朱子曰義也者無所爲而然者也此言蓋可謂廣前聖之所未發而同於性善養氣之功者歟道二義與利而已矣義者亘古今通天下之正逵而利者犯荆棘入險阻之私逕也又按朱子曰義利之際固當深明而力辨然伊洛發明未接物時主敬一段工夫更須精進乃佳不爾或無所據以審夫義利之分也此說尤學者所當知故附此右兼言義利禮書天叙有典勅我五典五惇哉天秩有禮自我五禮有庸哉程子曰書言天叙天秩天有是理聖人循而行之所謂道也張子曰生有先後所以爲天叙小大髙下相並而相形焉是謂天叙天之生物也有序物之既形也有秩知序然後經正知秩然後禮行朱子曰這箇典禮自是天理之當然欠他一毫不得添他一毫不得惟是聖人之心與天合一故行出這禮無一不與天合其間曲折厚薄淺深莫不恰好這都不是聖人自撰出都是天理决定合着如此後之人未得似聖人之心只得將聖人已行底聖人所傳於後世底依這樣子做做得合時便是合天理之自然易曰雷在天上大壯君子以非禮弗履程子曰雷震於天上大而壯也君子觀大壯之象以行其壯君子之大壯者莫如克己復禮古人曰自勝之謂强中庸於和而不流中立而不倚皆曰强哉矯赴湯火蹈白刃武夫之勇皆能也至於克己復禮則非君子之大壯不可能也故曰君子以非禮弗履春秋傳晉叔向曰忠信禮之器也卑讓禮之宗也昭二年叔弓聘於晉報宣子也晉侯使郊勞辭曰寡君使弓來繼舊好固曰女無敢爲賓徹命於執事敝邑𢎞矣敢辱郊使請辭致館辭曰寡君命下臣來繼舊好好合使成臣之禄也敢辱大館叔向曰子叔子知禮哉吾聞之曰云云辭不忘國忠信也先國後己卑讓也詩云敬慎威儀以近有德夫子近德矣叔弓叔老子宣子韓起也晉女叔齊曰禮所以守其國行其政令無失其民者也昭五年公如晉自郊勞至於贈賄無失禮晉侯謂女叔齊曰魯侯不亦善於禮乎對曰魯侯焉知禮公曰何爲對曰是儀也不可謂禮云云今政令在家不能取也有子家羈弗能用也奸大國之盟陵虐小國利人之難不知其私公室四分民食於他思莫在公不圖其終爲國君難將及身不恤其所禮之本末將於是乎在而屑屑焉習儀以亟言善於禮不亦逺乎君子謂叔侯於是乎知禮子大叔曰夫禮天之經也地之義也民之行也天地之經而民實則之昭二十五年子大叔見趙簡子簡子問揖讓周旋之禮焉對曰是儀也非禮也簡子曰敢問何謂禮對曰吉也聞諸先大夫子産曰云云則天之明日月星辰天之明也因地之性高下剛柔地之性也生其六氣謂陰陽風雨晦明用其五行氣爲五味發爲五色章爲五聲淫則昏亂民失其性滋味聲色過則傷性是故爲禮以奉之制禮以奉其性爲六畜五牲三犧以奉五味爲九文六采五章以奉五色爲九歌八風七音六律以奉五聲爲君臣上下以則地義君臣有尊卑法地有髙下爲夫婦外内以經二物夫治外婦治内各治其物爲父子兄弟姑姊甥舅婚媾姻亞以象天明六親和睦以奉嚴父若衆星之拱辰極也妻父曰昏重昏曰媾壻父曰姻兩壻相謂曰亞爲政事庸力行務以從四時在君爲政在民爲事民功曰庸治功曰力行其德教務其時要禮之本也爲刑罰威獄使民畏忌以類其震耀殺戮雷霆電曜天之威也聖人作刑戮以象類之爲温慈惠和以効天之生殖長養民有好惡喜怒哀樂生於六氣此六者皆稟陰陽風雨晦明之氣是故審則宜類以制六志爲禮以制六志使不可過節哀有哭泣樂有歌舞喜有施舍怒有戰鬭喜生於好怒生於惡是故審行信令禍福賞罰以制死生生好物也死惡物也好物樂也惡物哀也哀樂不失乃能協於天地之性是以長久簡子曰甚哉禮之大也對曰禮上下之紀天地之經緯也經緯錯居以相成者民之所以生也是以先王上之簡子曰鞅也請終身守此言也正義曰禮是儀之心儀是禮之貌本其心謂之禮察其貌謂之儀行禮必爲儀爲儀未是禮故云儀非禮也鄭𤣥禮序云禮者體也履也統之於心曰體踐而行之曰履自夫禮至因地之性言禮本法天地也自生其六氣至民失其性言天用氣味聲色以養人不得過其度也是故爲禮以下言聖王制禮以奉天性不使過其度也人稟天地之性而生動作皆象天地其所踐履謂之爲行但人有賢不肖行有過不及聖人制爲中法名之曰禮故禮是民之行也人之本性自然法象天地聖人還復法象天地而制禮教之是禮由天地而來故仲尼說孝子産說禮天地民三者並言之傳稱天有六氣此言生其六氣謂天生之也用其五行謂天用之也上天用此五行以養人五行之氣入人口爲五味發見於目爲五色章徹於耳爲五聲味以養口色以養目聲以養耳此三者雖復用以養人人用不得過度過度則爲昏亂使人失其常性故須爲禮以節之味色聲本於五行又六氣所生口欲嘗味目欲觀色耳欲聽聲此自然之性也欲之不已則失其性聖人全其性故爲禮以奉養其性使不失也晏子曰禮之可以爲國也久矣與天地並君令臣恭父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣恭而不貳父慈而教子孝而箴兄愛而友弟敬而順夫和而義妻柔而正姑慈而從婦聽而婉禮之善物也昭二十六年齊侯與晏子坐於路寢公嘆曰美哉室其誰有此乎晏子曰敢問何謂也公曰吾以爲在德對曰如君之言其陳氏乎陳氏雖無大德而有施於民民歌舞之矣後世若少惰陳氏而不亡則國其國也公曰善哉其可若何對曰惟禮可以已之在禮家施不及國民不遷農不移工賈不變士不濫官不滔大夫不收公利公曰善哉我不能矣吾今而後知禮之可以爲國也對曰云云公曰善哉寡人今而後聞此禮之上也對曰先王所稟於天地以爲其民也是以先王上之正義曰大夫稱家國人是君之所有大夫不得妄施遺之以樹己私惠陳氏施及國人是違禮也又曰洪範曰惟辟作福惟辟作威言作福作威君之利也大夫不得聚收公利自作福也陳氏作福以招國人之心施民作福是收公利也孟僖子曰禮人之榦也無禮無以立昭七年公至自楚孟僖子病不能相禮乃講學之苟能禮者從之將死召其大夫曰云云吾聞孔丘聖人之後也我若獲沒必屬說與何忌於夫子使事之而學禮焉有子曰禮之用和爲貴先王之道斯爲美小大由之朱子曰禮者天理之節文人事之儀則也和者從容不迫之意蓋禮之爲體雖嚴而皆出於自然之理故其爲用必從容不迫乃爲可貴云云有所不行知和而和不以禮節之亦不可行也徒知和之爲貴而一於和不復以禮節之則亦非禮之本然所以流蕩忘反而亦不可行也程子曰禮勝則離故禮之用和爲貴樂勝則流故有所不行范氏曰凡禮之體主於敬而其用則以和爲貴敬者禮之所以立也和者樂之所由生也若有子可謂達禮樂之本矣愚謂嚴而泰和而節此理之自然禮之全體也毫釐有差則失其中正而各倚於一偏其不可行均矣或問禮之有和何也曰禮之所以有是品節之詳者皆出於人心自然之節非以人之所不欲者强之也故行之雖或甚苦而自有不失其和者若不本於此而徒勉强於儀貌之間則是徒禮而無和矣云云黄直卿言内則一篇於事父母之禮亦嚴矣然下氣怡色則和可知也玉藻鄉黨所載臣之事君禮亦嚴矣然二爵言言三爵油油君在與與則和可知也先生曰如此則和與禮成二物矣須是見得禮便是和乃可如入公門鞠躬如不容可謂至嚴矣然甘心爲之而無厭倦之意者乃所以爲和也至嚴之中便有至和處不可分作兩截看禮之用和是禮中之和知和而和已離却禮禮中自有和須是知得當如此則行之自然到和處因舉龜山與薛宗博說㑹職事茶事薛曰禮起聖人之僞今日㑹茶莫不消得如此龜山曰只此打不過處便見得禮非聖人之僞禮之用和爲貴只爲不如此則心有不安故行之自和耳禮之和處便是禮之樂樂之有節處便是樂之禮禮主於敬而其用以和爲貴然如何得他敬而和著意做不得才著意嚴敬便拘迫而不安要放寛些又流蕩而無節須是真箇識得禮之自然處則事事物物上都有自然之節文雖欲不如此不可得故雖嚴而未嘗不和雖和而未嘗不嚴也南軒曰禮主乎敬而其用則以和然有敬而後有和和者樂也禮樂相須而成故禮必以和爲貴禮樂分而言之則爲體爲用相須相成合而言之本一而已也林放問禮之本朱子曰放見世之爲禮專事繁文而疑其本之不在是也故以爲問子曰大哉問孔子以時方逐末而放獨有志於本故大其問蓋得其本而禮之全體無不在其中矣禮與其奢也寧儉喪與其易也寧戚易治也孟子曰易其田疇在喪禮則節文習熟而無哀痛慘怛之實者也戚則一於哀而文不足耳禮貴得中奢易則過於文儉戚則不及而質二者皆未合理然凡物之理必先有質而後有文則質乃禮之本也范氏曰夫祭與其敬不足而禮有餘也不若禮不足而敬有餘也喪與其哀不足而禮有餘也不若禮不足而哀有餘也禮失之奢喪失之易皆不能反本而隨其末故也禮奢而備不若儉而不備之愈也喪易而文不若戚而不文之愈也儉者物之質戚者心之誠故爲禮之本楊氏曰禮始諸飲食故汙尊抔飲爲之簠簋籩豆罍爵之餙所以文之也則其本儉而已喪不可以徑情而直行爲之衰麻哭踊之數所以節之也則其本戚而已周衰世方以文滅質而林放獨能問禮之本故夫子大之而告之以此問林放問禮并以喪告之何也曰喪亦是禮黄氏曰夫子於禮但言其從周未見其從質也今乃以儉與戚爲可尚何也聖人因俗之弊感放之意而爲是言也然其辭必曰與其奢寧儉與其易寧戚則本非以儉戚爲可尚特與其流於文弊則寧如此耳其言之抑揚得其中正如此所以爲無弊也子入太廟每事問或曰孰謂鄹人之子知禮乎入太廟每事問子聞之曰是禮也朱子曰敬謹之至乃所以爲禮也尹氏曰禮者敬而已矣雖知亦問謹之至也其爲敬莫大於此謂之不知禮者豈足以知孔子哉子貢欲去告朔之餼羊朱子曰告朔之禮古者天子常以季冬頒來歲十二月之朔於諸侯諸侯受而藏之祖廟月朔則以特羊告廟請而行之餼生牲也魯自文公始不視朔而有司猶供此羊故子貢欲去之子曰賜也爾愛其羊我愛其禮愛猶惜也子貢蓋惜其無實而妄費然禮雖廢羊存猶得以識之而可復焉若并去其羊則此禮遂亡矣孔子所以惜之楊氏曰告朔諸侯所以稟命於君親禮之大者魯不視朔矣然羊存則告朔之名未冺而其實因可舉此夫子所以惜之也子曰管仲之器小哉朱子曰言其不知聖賢大學之道故局量褊淺規模卑狹不能正身修德以致主於王道或曰管仲儉乎曰管氏有三歸官事不攝焉得儉然則管仲知禮乎曰邦君樹塞門管氏亦樹塞門邦君爲兩君之好有反坫管氏亦有反坫管氏而知禮孰不知禮此皆諸侯之禮而管仲僣之不知禮也愚謂孔子譏管仲之器小其旨深矣或人不知而疑其儉故斥其奢以明其非儉或又疑其知禮故又斥其僣以明其不知禮蓋雖不復明言小器之所以然而其所以小者於此亦可見矣故程子曰奢而犯禮其器之小可知蓋器大則自知禮而無此失矣此言當深味也子曰君子博學於文約之以禮亦可以弗畔矣夫朱子曰君子學欲其博故於文無不考守欲其要故其動必以禮如此則可以不畔道矣程子曰博學於文而不約之以禮必至於汗漫博學矣又能守禮而由於規矩則亦可以不畔道矣博文約禮聖門之要法博文所以驗諸事約禮所以體諸身約之以禮禮字便作理字看不得正是持守有節文處克己復禮之說亦然博文約禮者之初須作兩般理㑹而各盡其力則久之見得功効却能交相爲助而打成一片若合下便要兩相倚靠互相推托則彼此擔閣都不成次第矣然所謂博非泛然考質雜記掇拾異聞以夸多取勝之謂此又不可不知子曰恭而無禮則勞慎而無禮則葸勇而無禮則亂直而無禮則絞朱子曰葸畏懼貌絞急切也無禮則無節文故有四者之弊南軒曰恭慎勇直皆善道也然無禮以主之則過其節而有弊反害之也蓋禮者存乎人心有節而不可過者也夫恭而無禮則自爲罷勞慎而無禮則徒爲畏懼勇而無禮則流於陵犯直而無禮則傷於訐切其弊如此豈所貴於恭慎勇直者哉蓋有禮以節之則莫非天理之本然無以節之則亦人爲之私而已是故君子以約諸己爲要也子曰麻冕禮也今也純儉吾從衆拜下禮也今拜乎上泰也雖違衆吾從下朱子曰臣與君行禮當拜於堂下君辭之乃升成拜泰驕慢也程子曰君子處世事之無害於義者從俗可也害於義則不可從也南軒曰聖人於斯世豈有意於從違哉皆道之所在焉耳於其儉則不嫌於從俗於其泰則不避於違衆聖人之意蓋可見矣曲禮夫禮者所以定親疎决嫌疑别同異明是非也禮不妄說人鄭氏曰爲近佞媚也君子說之不以道則不說也不辭費爲傷信君子先行其言而後從之禮不踰節不侵侮不好狎爲傷敬也修身踐言謂之善行踐履也言履而行之行修言道禮之質也言道言合於道質猶本也禮爲之文飾耳道德仁義非禮不成教訓正俗非禮不備分爭辨訟非禮不决君臣上下父子兄弟非禮不定官學事師非禮不親班朝治軍莅官行法非禮威嚴不行禱祠祭祀供給鬼神非禮不誠不莊是以君子恭敬撙節退讓以明禮吕氏曰兼天下而體之之謂仁理之所當然之謂義由是而之焉之謂道有仁義於己之謂德節文乎仁義之謂禮仁義道德皆其心之所同有於是而行之雖不中不逺矣然無節無文則過與不及害之以至於道之不明不行此所以非禮不成也云云君子恭敬所以明禮之實撙節所以明禮之文退讓所以明禮之用愚按兼天下而體之謂仁未妥人有禮則安無禮則危故曰禮者不可不學也夫禮者自卑而尊人雖負販者必有尊也而況富貴乎鄭氏曰負販者輕恌志利宜若無禮然富貴而知好禮則不驕不淫貧賤而知好禮則志不懾愚謂富貴者以禮自檢故無驕淫之過貧賤者以禮自安故無懾怯之病禮運孔子曰夫禮先王以承天之道以治人之情故失之者死得之者生詩曰相䑕有體人而無禮人而無禮胡不遄死故聖人耐以天下爲一家以中國爲一人者非意之也必知其情辟於其義明於其利達於其患然後能爲之何謂人情喜怒哀懼愛惡欲七者弗學而能何謂人義父慈子孝兄良弟弟夫義婦聽長惠幼順君仁臣忠十者謂之人義講信修睦謂之人利爭奪相殺謂之人患故聖人之所以治人七情修十義講信修睦尚慈讓去爭奪舍禮何以治之飲食男女人之大欲存焉死亡貧苦人之大惡存焉故欲惡者心之大端也人藏其心不可測度也美惡皆在其心不見其色也欲一以窮之舍禮何以哉夫禮必本於太一分而爲天地轉而爲陰陽變而爲四時列而爲鬼神其降曰命正義曰必本於太一者謂天地未分混沌之元氣也極大曰太未分曰一其氣既極大而未分故曰太一也禮理既與太一而齊故制禮者用至善之大理以爲教本是本於太一也分而爲天地者混沌元氣既分輕清爲天在上重濁爲地在下而制禮者法之以立尊卑之位也轉而爲陰陽者天地二形既分而天之氣運轉爲陽地之氣運轉爲陰而制禮者貴左以象陽貴右以象陰也變而爲四時者陽氣則變爲春夏陰氣則變爲秋冬而制禮者吉禮則有四時之生凶禮則有恩禮節權是法四時也列而爲鬼神者鬼神謂生成萬物鬼神也四時變化生成萬物皆鬼神之功聖人制禮則陳列鬼神之功以爲教也其降曰命者降下也言聖人制禮皆仰法太一以下之事而下之以爲教命也按正義以至善之大理言太一其義甚精蓋太一者即太極之異名以其未分故曰一以其極至故曰極故惟聖人之爲知禮之不可以己也故壞國喪家亡人必先去其禮禮器先王之立禮也有本有文忠信禮之本也義理禮之文也無本不立無文不行禮釋回增美質措則正施則行其在人也如竹箭之有筠也如松栢之有心也二者居天下之大端矣故貫四時而不改柯易葉故君子有禮則外諧而内無怨故物無不懷仁鬼神饗德祀帝於郊敬之至也宗廟之祭仁之至也喪禮忠之至也備服器仁之至也賓客之用幣義之至也故君子欲觀仁義之道禮其本也君子曰甘受和白受采忠信之人可以學禮茍無忠信之人則禮不虛道是以得其人之爲貴也禮時爲大順次之體次之宜次之稱次之堯授舜舜授禹湯放桀武王伐紂時也鄭氏曰言聖人制禮所先後君子之行禮也不可不慎也衆之紀也紀散而衆亂禮也者猶體也體不備君子謂之不成人設之不當猶不備也禮有大有小有顯有微大者不可損小者不可益顯者不可揜微者不可大也故經禮三百曲禮三千其致一也未有入室而不由戸者禮坊記禮者因人之情而爲之節文以爲民坊者也禮經解禮之於正國也猶衡之於輕重也繩墨之於曲直也規矩之於方圜也故衡誠縣不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圜君子審禮不可誣以姦詐是故隆禮由禮謂之有方之士不隆禮不由禮謂之無方之民夫禮禁亂之所由生猶坊止水之所自來也故以舊坊爲無所用而壞之者必有水敗以舊禮爲無所用而去之者必有亂患故昏姻之禮廢則夫婦之道苦而淫辟之罪多矣鄉飲酒之禮廢則長幼之序失而爭鬭之獄繁矣喪祭之禮廢則臣子之恩薄而倍死忘生者衆矣聘覲之禮廢則君臣之位失諸侯之行惡而倍畔侵陵之敗起矣故禮之教化也微其止邪也於未形使人日徙善逺罪而不自知也是以先王隆之也任人有問屋廬子曰禮與食孰重曰禮重朱子曰任國名屋廬子名連孟子弟子也色與禮孰重任人復問曰禮重曰以禮食則飢而死不以禮食則得食必以禮乎親迎則不得妻不親迎則得妻必親迎乎屋廬子不能對明日之鄒以告孟子孟子曰於答是也何有何有不難也不揣其本而齊其末方寸之木可使髙於岑樓本謂下末謂上方寸之木至卑喻食色岑樓樓之髙銳似山者至髙喻禮若不取其下之平而升寸木於岑樓之上則寸木反髙而岑樓反卑矣金重於羽者豈謂一鉤金與一輿羽之謂哉鉤帶鉤也金本重而帶鉤小故輕喻禮有輕於食色者羽本輕而一輿多故重喻食色有重於禮者取食之重者與禮之輕者而比之奚翅食重取色之重者與禮之輕者而比之奚翅色重翅與啻同禮食親迎禮之輕者也饑而死以滅其性不得妻而廢人倫食色之重者也奚翅猶言何但言其相去懸絶不但有輕重之差而已往應之曰紾兄之臂而奪之食則得食不紾則不得食則將紾之乎踰東家牆而摟其處子則得妻不摟則不得妻則將摟之乎紾戾也摟牽也處子處女也此二者禮與食色皆其重者而以之相較則禮爲尤重也此章言義理事物其輕重固有大分然於其中又各自有輕重之别聖賢於此錯綜斟酌毫髮不差固不肯枉尺而直尋亦未嘗膠柱而調瑟所以斷之一視於理之當然而已矣荀子曰人生而有欲欲而不得則不能無求求而無度量分界則不能不爭爭則亂亂則窮先王惡其亂也故制禮義以分之以養人之欲給人之求使欲必不窮於物物必不屈於欲兩者相待而長也禮者人道之極也凡禮事生飾歡也送死飾哀也師旅飾威也是百王之所同古今之所一也按荀子書有禮論其論禮之本末甚備至其論性則以禮爲聖人之僞豈不謬哉有人勞程子曰先生謹於禮四五十年亦甚勞且苦矣先生曰吾日履安地何勞苦之有他人日踐危地乃勞苦也或勸先生以加禮貴近先生曰何不見責以盡禮而責之以加禮禮盡則已豈有加也張子曰學者且須觀禮蓋禮者滋養人德性又使人有常業守得定非禮勿言非禮勿動即是養心之術又曰某所以使學者先學禮者只爲學禮則便除去世俗一切惡習熟纒繞譬之延蔓之物解纒繞即上去茍能除去惡習則自然脫灑也進人之速無如禮學程子曰子厚以禮教學者善使學者先有所據守也右專言禮智易臨六五知臨大君之宜吉程子曰五以柔中順體居尊位而下應於二剛中之臣是能倚任於二不勞而治以知臨下者也夫以一人之身臨乎天下之廣若區區自任豈能周於萬事故自任其知者適足爲不知唯能取天下之善任天下之聰明則無所不周是不自任其知則其知大矣中庸子曰舜其大知也與舜好問而好察邇言隠惡而揚善執其兩端用其中於民其斯以爲舜乎朱子曰舜之所以爲智以其不自用而取諸人也孟子曰天下之言性也則故而已矣故者以利爲本朱子曰性者人物所得以生之理也故者其已然之迹若所謂天下之故者也利猶順也語其自然之勢也言事物之理雖若無形而難知然其發見之已然則必有迹之可見故天下之言性者但言其故則理自明猶所謂善言天者必有驗於人也如人之善水之下非有所造作矯揉而然也若人之爲惡水之在山則非自然之故矣所惡於智者爲其鑿也如智者若禹之行水也則無惡於智矣禹之行水也行其所無事也如智者亦行其所無事則智亦大矣程子曰智出於人之性人之爲智或入於巧僞而老莊之徒遂欲棄智是豈性之罪也哉善乎孟子之言所惡於智者爲其鑿也朱子曰天下之理本皆順利小智之人務爲穿鑿所以失之禹之行水則因其自然之勢而導之未嘗以私智穿鑿而有所事是以水得其潤下之性而不爲害也天之髙也星辰之逺也茍求其故千歳之日至可坐而致也天雖髙星辰雖逺茍求其已然之迹則其運有常雖千歲之久其日至之度可坐而得況於事物之近若因其故而求之豈有不得其理者而何以穿鑿爲哉必言日至者造厯者以上古十一月甲子朔夜半冬至爲厯元也程子曰此章專爲智而發愚謂事物之理莫非自然順而循之則爲大智若用小智而鑿以自私則害於性而反爲不智程子之言可謂深得其指矣南軒曰所惡於智者爲其鑿也鑿者以人爲爲之也無是理而强爲之故謂之鑿鑿者失其性失其性則不可推而行無所利矣此所以惡夫智也是蓋以其私智爲智而非所謂智矣蓋就下者水之性也水之性非禹之所得爲禹能知而順之非智乎事事物物其理之素具者皆若水之就下然也智者之於事物皆若禹之於水則智不亦大矣乎所謂行其所無事也謂由其所當然未嘗致纎毫之力也天雖髙星辰雖逺而其故皆可得而求蓋莫非循自然之理也求其故則千歲之日至亦可坐而致也而況他乎故夫上世聖人所以建立人紀裁成萬化其事業爲無窮然在聖人亦何加毫末於此皆天下之性所當然而聖人特以利之耳右專言智信易中孚豚魚吉利渉大川利貞程子曰中孚爲卦澤上有風風行澤上而感於水中爲中孚之象感謂感而動也内外皆實而中虛爲中孚之象又二五皆陽中實亦爲孚義在二體則中實在全體則中虛中虛信之本中實信之質又曰豚躁魚㝠物之難感者也孚信能感於豚魚則無不至矣忠信可以蹈水火況渉川乎守信之道在乎堅正故利於貞也彖曰中孚柔在内而剛得中二柔在内中虛爲誠之象二剛得上下體之中中實爲孚之象卦所以爲中孚也說而巽孚乃化邦也以二體言卦之用也上巽下說爲上至誠以順巽於下下有孚以說從其上如是其孚乃能化於邦國也若人不說從或違咈事理豈能化天下乎豚魚吉信及豚魚也信能及於豚魚信道至矣所以吉也利渉大川乗木舟虛也以中孚渉險難其利如乗木濟川而以虛舟也舟虛則無沉覆之患卦虛中爲舟虛之象中孚以利貞乃應乎天也中孚而貞則應乎天矣天之道孚貞而已九五有孚攣如无咎五居君位人君之道當以至誠感通天下使天下之心信之固結如拘攣然則爲无咎也象曰有孚攣如位正當也五居君位之尊由中正之道能使天下信之如拘攣之固乃稱其位人君之道當如是按易之言孚不止中孚一卦今取諸卦言孚處并程子傳義附於此需有孚光亨貞吉利渉大川傳曰需者須待也以卦才言之五居君位爲需之主有剛健中正之德而誠信充實於中中實有孚也有孚則光明而能亨通得貞正而吉也以此而需何所不濟雖險無難矣故利渉大川訟有孚窒惕中吉終凶傳曰訟之道必有其孚實中無其實乃是誣妄凶之道也卦之中實爲有孚之象訟者與人爭辨而待决於人雖有孚亦須窒塞未通不窒則已明無訟矣事既未辨吉凶未可知也故有畏惕中吉得中則吉也終凶終極其事則凶也比初六有孚比之无咎有孚盈缶終來有他吉傳曰初六比之始也相比之道以誠信爲本中心不信而親人人誰與之故比之始必有孚誠乃无咎也孚信之在中也誠信充實於内若物之盈滿於正中也缶質素之器言若缶之盈實其中外不加文飾則終能來有他吉也他外也誠信中實雖他外皆當感而來從孚信比之本也小畜六四有孚血去惕出无咎傳曰四於畜時處近君之位畜君者也若内有孚誠則五志信之從其畜也卦獨一陰畜衆陽者也諸陽之志係於四四茍欲以力畜之則一柔敵衆剛必見傷害唯盡其孚誠以應之則可以感之矣故其傷害逺其危懼免如此則无咎此以柔畜剛之道也以人君之威嚴而微細之臣有能畜止其欲者蓋有孚信以感之也九五有孚攣如富以其鄰傳曰小畜衆陽爲陰所畜之時也五以中正居尊位而有孚信則其類皆應之矣故曰攣如謂牽攣相從也五必援挽與之相濟是富以其鄰也大有六五厥孚交如威如吉傳曰六五當大有之時居君位虛中爲孚信之象人君執柔守中而以孚信接於下則下亦盡其信誠以事於上上下孚信相交也以柔居尊位當大有之時人心安易若專尚柔順則陵慢生矣故必威如則吉象曰厥孚交如信以發志也傳曰下之志從乎上者也上以孚信接於下則下亦以誠信事乎上故厥孚交如由上有孚信以發其下孚信之志下之從上猶響之應聲也隨九四隨有獲貞凶有孚在道以明何咎傳曰九四以陽剛之才處臣位之極若於隨有獲則雖正亦凶有獲謂得天下之心隨於己爲臣之道當使恩威一出於上衆心皆隨於君若人心從已危疑之道也故凶居此地者奈何唯孚誠積於中動爲合於道以明哲處之則又何咎觀盥而不薦有孚顒若傳曰君子居上爲天下之表儀必極其莊敬則下觀仰而化也故爲天下之觀當如宗廟之祭始盥之時不可如既薦之後則下民盡其至誠顒然瞻仰之矣習坎有孚維心亨行有尚傳曰陽實在中爲中有孚信維心亨維其心誠一故能亨通至誠可以通金石蹈水火何險難之不可亨也行有尚謂以誠一而行則能出險有可嘉尚謂有功也不行則常在險中矣彖曰習坎重險也水流而不盈行險而不失其信傳曰習坎謂重險也上下皆坎兩險相重也水流而不盈陽動於險中而未出於險乃水性之流行而未盈於坎既盈則出乎坎矣行險而不失其信陽剛中實居險之中行險而不失其信者也坎中實水就下皆爲信義有孚也維心亨乃以剛中也傳曰維其心可以亨通者乃以其剛中也中實爲有孚之象至誠之道何所不通以剛中之道而行則可濟險難而亨通也家人上九有孚威如終吉傳曰治家之道非至誠不能也故必中有孚信則能常久而衆人自化爲善不由至誠己且不能常守也況欲使人乎故治家以有孚爲本家之患常在禮法不足而凟慢生故必有威嚴則終吉保家之終在有孚威如二者而已睽九四睽孤遇元夫交孚厲无咎傳曰九四當睽時居非所安無應而在二陰之間是暌離孤處者也以剛陽之德當暌離之時孤立無與必以氣類相求而合是以遇元夫也夫陽稱元善也初九當暌之初遂能與同德而一暌之悔處暌之至善者也故目之爲元夫猶云善士也四則過中爲暌已甚不若初之善也四與初皆以陽處一卦之下居相應之位當暌乖之時各無應援自然同德相親故㑹遇也同德相遇必須至誠相與交孚各有孚誠也上下二陽以至誠相合則何時之不能行何危之不可濟故雖處危厲而无咎也當暌離之時孤處二陰之間處不當位危且有咎也以遇元夫而交孚故得无咎也象曰交孚无咎志行也傳曰初四皆陽剛君子當暌乖之時上下以至誠相交協志同力則其志可以行不止无咎而已卦辭但言无咎夫子又從而明之云可以行其志救時之暌也蓋君子陽剛之才而至誠相輔何所不能濟也損有孚元吉无咎可利貞有攸往傳曰損减損也凡損抑其過以就義理皆損之道也損之道必有孚誠謂至誠順於理也損而順理則大善而吉所損無過差可貞固常行而利有攸往人之所損或過或不及或不常皆不合正理非有孚也非有孚則无吉而有咎非可貞之道不可行也益六三益之用凶事无咎有孚中行告公用圭傳曰三居下體之上在民上者也居陽應剛處動之極居民上而剛决果於爲益者也果於爲益用之於凶事則无咎凶事謂患難非常之事三居下之上在下當承稟於上安得自任擅爲益乎唯於患難非常之事則可量宜應卒奮不顧身力庇其民故无咎也下專自任上必忌疾雖當凶難義在可爲然必有其孚誠而所爲合於中道則誠意通於上而上信與之矣專爲而無爲上愛民之至誠固不可也雖有誠意而所爲不合中道亦不可也圭者通信之物凡祭祀朝聘用圭玉所以通達誠信也有誠孚而得中道則能使上信之是猶告公上用圭玉也其孚能通達於上矣九五有孚惠心勿問元吉有孚惠我德傳曰五剛陽中正居尊位又得六二之中正相應以行其益何所不利以陽實在中有孚之象也以九五之德之才之位而中心至誠在惠益於物其至善大吉不問可知故云勿問元吉有孚惠我德人君至誠益於天下天下之人無不至誠愛戴以君之德澤爲恩惠也象曰有孚惠心勿問之矣惠我德大得志也傳曰人君有至誠惠益天下之心其元吉不假言也天下至誠懷吾德以爲惠是其道大行人君之志得矣夬揚于王庭孚號有厲傳曰小人方盛之時君子之道未勝安能顯然以正道决去之故含晦俟時漸圖消之之道今既小人衰微君子道盛當顯行之於王朝使人明知善惡故揚於王庭孚信之在中誠意也號者命衆之詞君子之道雖長盛而不敢忘戒備故至誠以命衆使知尚有危道雖以此之甚盛而彼之甚衰若易而無備則有不虞之悔是尚有危理必有戒懼之心則無患也聖人設戒之意深矣彖曰孚號有厲其危乃光也傳曰盡誠信以命其衆而知有危懼則君子之道乃无咎而光大也萃初六有孚不終乃亂乃萃若號一握爲笑勿恤往无咎傳曰初與四爲正應本有孚以相從者也然當萃時三陰聚處柔無守正之節若舍正應而從其類乃有孚而不終也乃亂惑亂其心也乃萃與其同類聚也初若守正不從號呼以求正應則一握笑之矣一握俗語一團也謂衆以爲笑也若能勿恤而往從剛陽之正應則無過咎不然則入小人之羣矣六二引吉无咎孚乃利用禴傳曰初陰柔又非中正恐不能終其孚故因其才而爲之戒二雖陰柔而得中正故雖戒而其辭微引吉无咎引者相牽也人之交相求則合相持則離二與三爲正應當萃者也而相逺又在羣陰之間必相牽引則得其萃矣五居尊位有中正之德二亦以中正之道往與之萃乃君臣和合也其所共致豈可量也是以吉而无咎无咎者善補過也二與五不相引則過矣孚乃利用禴孚信之在中誠之謂也禴祭之簡薄者菲薄而祭不尚備物直以誠意交於神明也孚乃者謂有其孚則可不用文飾專以至誠交於上也以禴言者謂薦其誠而已上下相聚而尚飾焉是未誠也蓋其中實者不致飾於外用禴之義也孚信者萃之本也不獨君臣之義在誠而已升九二孚乃利用禴无咎傳曰二陽剛而在下五陰柔而居上夫以剛事柔以陽從陰雖有時而然非順道也以暗而臨明以剛而事弱若黽勉於事勢非誠服也上下之交不以誠其可以久乎其可以有爲乎五雖陰柔然居尊位二雖剛陽事上者也當内存至誠不假文飾於外誠積於中則自不事外飾故曰利用禴言尚誠敬也自古剛强之臣事柔弱之君未有不爲矯飾者也禴祭之簡質者也云孚乃者謂既孚乃宜不用文飾專以其誠感通於上已如是則得无咎象曰九二之孚有喜也傳曰二能以孚誠事上則不獨爲臣之道无咎而已可以行剛中之道澤及天下是有喜也井上六井收勿幕有孚元吉傳曰井以上出爲用居井之上井道大成也收汲取也幕蔽覆也取而不蔽其利無窮井之施廣矣大矣有孚有常而不變也夫井之用博施而有常大善之吉也革已日乃孚傳曰革者變其故也變其故則人未能遽信故必已日然後人心信從彖曰已日乃孚革而信之傳曰事之變革人心豈能盡信必終日而後孚在上者於改爲之際當詳告申令至於己日使人信之人心不信雖强之行不能成也九三征凶貞厲革言三就有孚傳曰九三以剛陽爲下之上又居離之上而不得中躁動於革者也在下而躁於變革以是而行則有凶也然居下之上事茍當革豈可不爲也在乎守貞正而懷危懼順從公論則可行之不疑革言謂當革之論就成也舍也審察當革之言至於三而皆合則可信也言慎重之至能如是則必得至當乃有孚也已可信而衆所信也如此則可以革矣九四悔亡有孚改命吉傳曰九四當革之時也事之可悔而後革之革而當其悔乃亡也革之既當唯在處之以至誠故有孚則改命吉改命改爲也既事當而弊革行之以誠上信而下順其吉可知象曰改命之吉信志也傳曰改命而吉以上下信其志也誠既至則上下信矣革之道以上下之信爲本不當不孚則不信當而不信猶不可行況不當乎九五大人虎變未占有孚傳曰以大人中正之道亦又革之炳然昭著不待占决知其至當而天下必信也豐六二豐其蔀日中見斗往得疑疾有孚發若吉傳曰明動相資乃能成豐二爲明之主可謂明者也而五在正應之地陰柔不正非能動者也至明之才以所應不足與而不能成其豐故曰見斗斗昏見者也蔀周匝之義用障蔽之物掩晦於明者也五以陰柔而居君位日中盛明之時乃見斗猶豐大之時乃遇柔弱之主二雖至明所遇乃柔暗不正之君既不能下求於己若往求之則反得疑猜忌疾然則如之何則可夫君子之事上也不得其心則盡其至誠以感發其志意而已茍誠意既動則雖昏蒙可開也雖柔弱可輔也雖不正可正也古人之事庸君常主而克行其道者已之誠意上達而君見信之篤耳管仲之相威公孔明之輔後主是也象曰有孚發若信以發志也傳曰有孚發若謂以己之孚信感發上之心志也兌九二孚兌吉悔亡傳曰二承比陰柔陰柔小人也說之則當有悔二剛中之德孚信内充雖比小人自守不失君子和而不同說而不失剛中故吉而悔亡象曰孚兌之吉信志也傳曰心之所存爲志二剛實居中孚信存於中也志存誠信豈至說小人而自失乎是以吉也九五孚于剥有厲傳曰九五得尊位而處中正盡說道之善矣而聖人復設有厲之戒盡堯舜之盛未嘗無戒也戒所當戒而已雖聖賢在上天下未嘗無小人然不敢肆其惡聖人亦說其能勉而革面也彼小人者未嘗不知聖賢之可說也如四凶處堯朝隠惡而順命是也聖人非不知其終惡也取其畏罪而强仁耳五若誠心信小人之假善爲實善而不知其包藏則危道也小人者備之不至則害於善聖人爲戒之意深矣剥者消陽之名陰消陽者也蓋指上六故孚于剥則危也以五在說之時密比於上六故爲之戒雖舜之聖且畏巧言令色安得不戒也說之惑人易入而可懼也如此象曰孚于剥位正當也傳曰戒孚于剥者以五所處之位而正當戒也密比陰柔有相說之道故戒在信之也中孚己見前未濟上九有孚于飲酒无咎濡其首有孚失是傳曰九以剛在上剛之極也居明之上明之極也剛極而能明則不爲躁而爲决明能燭理則能斷義居未濟之極非得濟之位無可濟之理則當樂天順命而已至誠安於義命而自樂則可无咎飲酒自樂也不樂其處則忿躁隕穫入於凶咎矣若從樂而躭肆過禮至濡其首亦非能安其處也有孚自信於中也失是失其宜也如是則於有孚爲失也人之處患難知其無可奈何而放意不反者豈安於義命者哉按程傳論孚信之義無一不切於用者其間雖論人君之事然在人臣亦無不可用者皆當熟玩而服膺焉子曰人而無信不知其可也大車無輗小車無軏其何以行之哉楊氏曰車無輗軏則無以引重而致逺人之於信猶是也故立則見其參於前在輿則見其倚於衡夫然後行舍是則不行於州里況天下乎程子曰信不足以盡誠猶愛不足以盡仁右專言信西山讀書記卷八
