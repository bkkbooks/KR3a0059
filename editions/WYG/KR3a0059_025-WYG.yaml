body:
  text: 西山讀書記卷二十五宋真德秀撰讀書之序中庸辟如行逺必自邇辟如登髙必自卑程子曰初學入徳之門無如大學其它莫如論語孟子又曰學者且先讀語孟更讀一經然後㸔春秋先識得箇義理方可㸔春秋以何為凖無如中庸朱子亦曰先㸔大學次語孟次中庸果然下工夫句句字字涵泳切已㸔得透徹一生受用不盡只怕人不下工夫雖多讀古人書無益書止是明得道理却要人做出書中所說聖賢工夫來若果看此數書它書可見而决矣又曰大學者中庸之户庭中庸者大學之閫奥又曰學問須以大學為先論語孟子次中庸中庸工夫宻規模大又曰論孟中庸待大學通貫浹洽無可得㸔後方㸔乃佳又曰為學之序為已而後可以及人逹理然後可以制事故程子教人先讀語孟次及諸經然後觀史其序不可亂也若恐其徒務空言但當就論孟經書中教以躬行之意庻不相逺至於左氏奏䟽之言則皆時事利害而非學者切身之急務也其為空言亦益甚矣而欲使之從事其間而得躬行之實不亦背馳之甚乎按此荅東萊書時東萊方令學者讀左氏及諸賢奏䟽又曰讀大學語孟中庸四書然後㸔詩書禮易與春秋皆未易㸔又曰孟子曰博學而詳說之將以反說約也故必先觀論孟大學中庸以考聖賢之意讀史以考存亡治亂之迹讀諸子百家以見其駁雜之病其節目自有次序不可以越過近日學者欲約而不於博求之不知不求於博何以考騐其約又有專於博上求之而不反其約今日考一制度明日又考一制度空於無用處作工夫其病又甚於約而不博者以上論讀書之序讀書之法程子曰經所以載道也器所以適用也學經而不知道治器而不適用奚益哉又曰聖人之道坦如大路學者病不得其門耳得其門無逺之不可到也求入其門不由於經乎今之治經者亦衆矣然而買櫝還珠之蔽人人皆是經所以載道也誦其言辭解其訓詁而不及道乃無用之糟粕耳覬足下由經以求道勉之又勉異日見卓爾有立於前然後不知手之舞而足之蹈不加勉而不能自止矣按此伊川與人帖也若不能存養只是說話延平李氏曰讀書者知其所言莫非吾事而即吾身以求之則凡聖賢所至而吾未至者皆可勉而進矣若直以文字求之悅其詞義以資誦說其不為玩物䘮志者幾希朱子亦曰學須做自家底便見切已今人讀書只要科舉用已及第則為雜文用其髙者則為古文用皆做外靣㸔又曰人惟有私意聖賢所以留千言萬語以掃滌人私意又曰學者當以聖賢之言反求諸身一一體察或人請諸經之疑先生既答之復曰今雖盡與公說公盡曉得不於自家心地上做工夫亦不濟事又曰讀書不可只專就紙上求理義須反來就自家身上推䆒秦漢以後無人說到此亦只是一向去書册上求不就自家身上理㑹自家見未到聖人先説在那裏自家只借他言語來就身上推䆒始得又曰開卷便有與聖賢不相似處豈可不自鞭䇿又曰讀書無為己之意只欲以資口耳作文字即意思浮淺㸔它義理不出又曰聖人言語須是實體於身灼然行得方是讀書豈可以言語解過一遍便休又曰孟子言學問之道惟在求其放心而程子所言心要在腔子裏今一向耽着文字令此心全體都奔在册子上更不知有已便是箇無知覺不識痛癢之人雖讀得書亦何益於吾事耶尹焞問為學之方曰為學須是讀書觀書不必多要知其約多觀而不知其約書肆耳須是將聖人言語玩味入心記著然後力去行之自有所得某緣少時讀書貪多如今多忘了又曰讀書要玩味朱子亦曰讀書着玩味方見得義理從文字中迸出又曰博雜極害事伯恭曰前只向雜博處用功却於要約處不曽子細研䆒如閫範之作指意極佳然讀書只如此亦有何意味耶先逹所以深懲玩物䘮志之弊者正為是耳范醇夫一生作此等功夫想見將聖賢之言却只忙中草草㸔過抄節一畨便是事了元不曽子細玩味所以從先生許乆見處全不精明是豈不可戒也耶又曰講學貴於實見義理要在熟讀精思潛心玩味不可貪多務得渉獵敷衍便為䆒竟也又曰為學不可以不讀書而讀書之法又當熟讀沈思反覆㴠泳銖積寸累乆自見功不惟理明心亦自定若欲徒為渉臘而求此理之明又欲别求方便以期此心之定其亦難矣又曰讀書須是將本文熟讀且咀嚼有味若有理㑹不得處然後將注解㸔方是有益又曰觀書静着心寛着意思沉􅅗反覆將乆自㑹曉得去又因說讀書云韓退之所謂沉􅅗乎訓義反覆乎句讀須有沉潛反覆之功方得又曰觀書不可只觀𦂳要處閑慢處都要周匝若能沉􅅗專一㸔得文字只此便是治心養性之法凡觀書不可以相類泥其義不爾則字字相梗當觀其文勢上下之意如充實之謂美與詩之美不同朱子亦曰凡讀書須㸔上下之意是如何不可泥㸔一字如揚子於仁也柔於義也剛到易中又將剛來配仁柔來配義如孟子學不厭智也教不倦仁也到中庸又謂成已仁也成物智也此等須是各隨本文意㸔便自不相疑凡觀書先須曉其文義然後可求其意未有文義不曉而見意者也又曰學者不泥文義又全背却速去理㑹文義者又滯泥不通如子濯孺子為將之事孟子只取其不背師之意人須就上面理㑹事君之道如何也又如萬章問舜完廪浚井事孟子只答它大意人須要理浚井如何出得來完廪又怎生下得來若此之學徒費心力凡讀文字如七年一世百年之事皆當思其如何作為乃有益張子曰書以維持此心又曰讀書則此心常在讀書少則無由考校得義精盖書以維持此心一時放下則一時德性有懈讀書則此心常在不讀書則終㸔義理不見書須成誦精思多在夜中或静坐得之不記則思不起但通貫得大原後書亦易記所以觀書者釋己之疑明己之未達每見每加新益則學進矣於不疑處有疑方是進朱子曰近與學者講論尤覺横渠成誦之說最為㨗徑盖未論㸔得義理如何且是收得此心有歸着處不至走作然亦須是專一精研使一書通透爛熟都無記不起處方可别換一書乃為有益又云所讀之書經文注脚記得首尾通貫浹洽方有可玩繹處不然泛觀雜論徒費日用决無所益也學者信書且須信論語孟子詩書無舛雜禮雖雜出諸儒亦若無害義處如中庸大學出於聖門無可疑者禮記則是諸儒雜記至如禮文不可不信己之言禮未必勝於諸儒如有前後所出不同且闕之記有疑義亦且闕之就有道而正焉六經須循環理㑹義理儘無窮待自家長得一格則又見得别如中庸文字輩直須句句理㑹過使其言互相發明又曰某觀中庸義二十年每觀每有義已長得一格六經循環年欲一觀觀書以静為心但只是物不入心然人豈能常静須有以制其亂書多閱而好忘者只為理未精耳理精則須記了無去處也仲尼一以貫之盖只着一義理都貫却楊氏曰六經之義驗之於心而然施之行事而順然後為得驗之於心而不然施之於行事而未順則非所謂經義今之治經者工無用之文徼幸科第而已果何益哉以身體之以心驗之從容嘿㑹於燕閒静一之中超然自得於書言象之表語仲素曰某嘗有數句教學者讀書之法云云又與人書曰至道之歸固非筆舌能盡也要以身體之云云則庻乎其至矣反是皆口耳誦數之學也讀書須先㸔古人立意所發明者何事不可只於言上求之如萬章問象日以殺舜為事孟子答舜所以處之之道其意在説聖人無偽此則不可不知若從枝葉上理㑹如象欲使二嫂治朕棲之語此豈可信堯在上豈容有此學者須有所疑乃能進德然須用力深方有疑今之士讀書為學盖自以為無可疑者故其學莫能相尚如孔子門人所疑皆後世所謂不必疑者也子貢問政子曰足食足兵民信之矣子貢疑所可去答之以去兵於食與信猶有疑焉故能發孔子民無信不立之說若今人問政使之足食足兵何疑之有樊遲問仁子曰愛人問知子曰知人是甚明白而遲猶曰未達故孔子以舉直錯諸枉能使枉者直教之由是而行之於智之道不其庻矣乎然遲退而見子夏猶申問舉直錯諸枉之義於是又得舜舉臯陶湯舉伊尹之事為證故仁智兼盡其説如使今之學者方得其初問之荅便不復疑矣盖嘗謂古人以為疑者今人不知疑也學何以進又曰讀書須有疑然後能進今人讀書元不知疑所以不及古人如子夏問巧笑倩兮美目盼兮直推至於禮後問宰我於三年之䘮猶有疑問何也曰此其所以為宰我也凡學於孔子者皆欲窮䆒到無疑處方已三年之䘮在他人於此不敢發言宰我疑以朞斷故必求質於聖人雖被深責所不辭也西山李氏曰學者讀書須是於無味處當致思焉至於群疑並興寢食俱廢乃能驟進朱子曰驟進二字最下得好須是如此若進得些子或進或退若存若亡不濟事如用兵相戰爭得些兒小子一二十里地也不濟事須大㨗一畨方是善勝為學之要亦是如此又曰讀書無疑者須教有疑有疑者却要無疑到這裏方是長進又曰讀書始讀未知有疑其次則漸漸有疑中則節節是疑過了這一畨後疑漸漸减以至融㑹貫通都無疑方始是學延平李氏嘗語問者曰講學切在深濳縝宻然後氣味深長蹊徑不差若概以理一而不察夫分之殊此學者所以流於疑似亂真之説而不自知也朱子教人讀書之法有曰正身危坐緩視㣲吟虚心涵咏切己省察又曰立志不定如何讀書又曰人要讀書須是先收拾身心令稍安静然後開卷方有所益若只如此馳騖紛擾則方寸之間自與道理全不相近如何㸔得文字今亦不必多言但且閉門端坐半月十日却來觀書自當信此言之不妄也又曰今世之人心不在軀殻裏如何讀得聖人之書又曰昔陳烈先生苦無記性一日讀孟子學問之道無他求其放心而已矣忽悟曰我心不曽收得如何記得書遂閉門静坐百餘日以收放心却去讀書遂一覧無遺又問讀書須是有精力或云亦須是聰明先生曰雖有聰明亦須是静方運得精神縁静則心虚道理方㸔得出又曰今人㸔文字多是以昏怠去㸔所以不子細故學者且於静處收拾教意思在裏然後虚心去㸔則其義理未有不明者也又曰讀書閑暇宜於静室安坐庶幾心平氣和可以思索義理又曰收歛精神方可商量讀書人常讀書庻幾可以管攝此心使之常存須是存心與讀書為一事方得又曰觀書一舉兩得這邉又存得心那邉理又到又曰本心䧟溺之乆義理浸灌未透且宜讀書窮理常不間斷則物欲之心自不能勝而本心之義理自安且固矣問讀諸經之法曰亦無法只是虗心平讀去又曰㸔文字須是虗心莫先立己意又云虗心切己虗心則見道理明切己自然要體認得出又答學者曰所喻讀書未能有疑此初學之通患盖縁平日讀書只為科舉之計貪多務得不暇子細慣得意思長時忙廹今當以此為戒洗滌净盡别立規模將合㸔文字擇其尤精而最急者且㸔一書一日隨力㸔一兩段俟一段已曉方換一段一書皆畢方換一書先要虗心平氣熟讀精思令一字一句皆有下落諸家注解一一通貫然後可以較其是非以求聖賢之本意雖已得之亦更反復玩味令其義理浹洽於中淪肌浹髓然後乃可言學耳又曰讀書須虚心静慮依傍文義推尋句脉㸔定此句指意是説何事略用今人言語襯貼替換一兩字説得古人意思出來先教自家心裏分明歴落如與古人對面説話彼此對荅無一言一字不相肯可此外别無閑雜説話方是得箇入處若棄却本文肆為浮説都忘了從初因甚話頭説得到此此最學者大病也又曰觀書當虗心平氣以徐觀義理之所在如其可取雖世俗庸人之言有所不廢如有可疑雖或傳以為聖賢之言亦須更加審擇自然意味平和道理明白脚踏實地讀書之法無它只是篤志虗心反復詳玩為有功耳近見學者多是率然穿鑿便為定論或即信所傳聞不復稽考所以日誦聖賢之書而不識聖賢之意其所誦説只是㨿自家見識撰成爾如此豈復能有所進學者貪作工夫便㸔得義理不精讀書須是子細逐句逐字要見去着若用工麤鹵不務精思只道無可疑理㑹未到不知有疑爾譬如飲食從容咀嚼其味必長大嚼大咽終不知味也又曰讀書只恁逐段子細㸔積累去到一生讀多少書若務貪多則反不曾讀得又曰其始也自謂百事能其終也一事不能此言人讀書不專一而貪多廣閲之弊也問通書云㸔雞雛可以觀仁如何曰既通道理後這般箇乆乆自知之記曰善問者如攻堅木先其易者而後其節目所以游先生問隂陽不測之謂神而程子荅之曰公是揀難底問是疑後問故昨日與公説讀書須㸔一句後又㸔一句讀一章後又讀一章正如格物格一物後又格一物見這箇物事道理既多則難者道理自然識得又曰知讀書有漸甚善但亦須且讀一書先其近而易知者字字考驗句句推詳上句了然後及下句前段了然後及後段乃能真實該徧無所不通使自家意思與古聖賢冺然無間乃為真讀書爾又曰㸔此一書且須專此一書便待此邉冷如水那邉熱如火亦不可捨此而觀彼泛觀博取不若熟讀而精思又曰學者只是要熟工夫純一而已矣讀時熟玩味時熟又曰書須熟讀所謂書只是一般然讀十遍時與讀一遍時終别讀百遍時與讀十遍又自不同也又曰讀書不精深只是不專一又曰讀書須純一如㸔了一般未了又要涉一般都不濟事某向時讀書方讀上句不知有下句讀上章不知有下章又曰讀論語如無孟子讀前一段如無後一段不然方讀此又思彼擾擾於中這般人不惟無得於書胷中如此做事全不得讀書須心在簡册上方可研䆒義理本文云讀書須將心貼在書册上逐句逐字㸔得各有着落方始好商量又曰㸔文字須此心在上靣若心下不在便是不曾㸔相似所謂視之而不見聽之而不聞問着心讀書有時半板前心在書上半板後忽然思量它事口雖讀心自在别處如何得心只在書上先生曰此最不可所謂不誠無物雖讀猶不讀也又曰大凡讀書須是要身心都入在這一叚裏靣更不問外靣有何事方見得一叚道理出如博學而篤志切問而近思如何却説仁在其中盖自家能常常存得此心莫教走作則理自然在其中今人却一邊去㸔文字一邉去思量外事只是枉費了工夫不如放下了文字待打疊教意思静了却去㸔又曰蓄之極則通㸔文字且自用工夫先己切至方可舉所疑與朋友講論假無朋友乆之亦能自見得盖蓄積者多忽然爆開便自然通此所謂何天之衢亨也盖蓄極則通大凡讀書少㸔熟讀一也不必鑚研立説但反覆體驗二也埋頭理㑹不必求效三也三者學者當守此讀書須是徧布周滿某嘗以為寜詳毋略寜下毋高寜拙毋巧寜近毋逺古人文章大率平説而意自長觀書且須觀其平易正當處又曰㸔文字且先㸔明白易曉者又曰觀書當平心以觀之大抵㸔書不可穿鑿㸔從分明去處不可尋從隠僻去處凡文字諸家説異同處最可觀熹舊日讀書專於異同處觀之又曰凡㸔文字諸家説有異同處最可觀謂如甲説如此且撏扯住甲窮盡其詞乙説如此且撏扯住乙窮盡其詞兩家之説既盡又參攷而窮究之必有一真是者出矣又曰學者觀書病在只要向前不肯退歩㸔愈向前愈㸔得不分曉不若退步却㸔得審大概病在執着不肯放下正如聽訟心先有主張乙底意思便只見得甲底不是先有主張甲底意思便只見乙底不是不若姑置甲乙之説徐徐觀之方能辨其曲直學者有二患一是自主己意一是有先入之説本文云横渠言濯去舊見以來新意此説甚當若不濯去舊見何處得新意來今學者有二種病一是主自家意思一是舊有先入之説雖欲擺脱亦被他自來相尋又曰讀書若有所見未必便是不可便執着且放在一邉益更讀書以來新見若執着一見到此心便被此見遮蔽了譬如一片凈㓗田地若上靣纔安一物便須有遮蔽了處聖人七通八逹事事説到極致處學者須是多讀書使互相發明事事窮到極致處所謂本諸身徴諸庻民考諸三王而不繆建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑直到這個田地方是語云執德不𢎞易云寛以居之聖人多説個廣大寛大之意學者要須體之讀書不可不先立一程限如農之有畔為學亦然又曰嚴立功程寛着意思乆之自當有味不可求欲速之功也觀書當㸔大意又㸔句語中何字是切要孟子謂仁義禮智根於心只根字甚有意如此用心義理自出文字大節目痛理㑹三五處後當迎刄而解學者之患在於輕浮不沉着痛快為學者計當就日用間致其下學之功讀書窮理則細立課程耐煩着實而勿速解操存持守則隨時隨處省覺收歛而勿計近功全文云人無英氣固安於卑陋而不足以語上其或有之而無以制之則又反為所使而不肯遜志于學此學者之通患所以古人設教自洒掃應對進退之節禮樂射御書數之文必皆使之抑心下首以從事於其間而不敢忽然後可以消磨其飛揚倔强之氣而為入德之階今既皆無此矣則唯有讀書一事尚可以為攝伏身心之助然不知循序而致謹焉則亦未有益也故今為學者計云云如此積累做得三五年工夫庻幾心意漸馴根本粗立而有可㨿之地不然終恐為氣所使而不得有所就也或問左傳疑義曰子不求之於六經語孟之中而用功於左傳有甚義理縱有能幾何只㸔聖人所説無不是這個大本如云天高地下萬物散殊而禮制行矣流而不息合同而化而樂興焉不然子思何故説個天命之謂性率性之謂道脩道之謂教此三句是怎生如此説是乃天地萬物之大本大根萬化皆從此出人若能體察得力見得聖賢所説道理皆從自己胷中流出不假他求又曰人須是於這大原本上㸔得透自然胷中開闊見世間事皆𤨏𤨏不足道矣理明後雖讀申韓書亦有得尹氏門人有言尹和靖教學者云耳順心得如誦己言用功既至誦聖賢言語即已言語觀書當如猛將用兵酷吏治獄直是鏖戰一陳直到推䆒到底始得又按朱子教人讀書有曰讀書已是第二義盖人之生道理合下皆完具所以要讀書者是未曽經歴見得許多聖人是經歴見得許多所以冩在世上與人㸔而今讀書只是要見得許多道理及理㑹得了又皆是自家合下元有底不是外靣旋添得來又曰讀書如理亂髪理髮須逐條理教條直又曰讀書須逐句逐字理㑹教通透又曰㸔文字且逐條㸔多是一事不須牽合問孟子言羞惡之心義之端也又曰義之實從兄是也不知羞惡與從兄之意如何相似曰不要如此㸔且理會一處上義理教通透了方可别看如今理㑹一處未得却又牽一處來滚同説着少間愈無理㑹處聖賢說話各有指歸且與他逐句逐字上理㑹將去又曰讀書須細㸔見意思通融後都不見注解但見有正經幾個字方好又曰讀書理㑹得通徹是當了則終生更不用再理㑹後靣只須把出來温尋㴠泳若不逐件理㑹則雖讀到老依舊是生底如不曾讀一般曾裘父詩話中載東坡教人讀書小簡先生取以示學者曰讀書要當如是按裘父詩話載東坡與王郎書云少年為學者每一書皆作數次讀之富如入海百貨皆有人之精力不能兼收盡取但得其所欲求者爾故願學者每次作一意求之如欲求古今興亡治亂聖賢作用且只作此意求之勿生餘念又别作一次求事迹文物之類亦如之他皆倣此若學成八靣受敵與涉獵者不可同日而語又山谷與李幾仲帖云不審諸經諸史何者最熟大率學者喜博而常病不精汎濫百書不若精於一也有餘力然後及諸書則渉獵諸篇亦得其精盖以我觀書則處處得益以書博我則釋卷而茫然先生深喜之以為有補於學者南軒張氏讀書樓之銘曰洪惟元聖研幾極深出言為經以逹天心天心煌煌聖謨洋洋有赫其傳惠我無疆嗟哉學子生乎千載孰謂聖逺遺經猶在孰不讀書而昧厥㫖章句是鑿文采是事矧其所懐惟以禄利茫乎四馳其曷予塈嗟哉學子當知讀書匪有所為惟求厥初厥初惟何爾所固然因書而發爾知其全維誦維歌維䆒維復維以泳游勿肆勿梏維平乃心以㑹其理切于乃躬以察以體積功既深有􅂱其明逈然意表大體斯呈聖豈予欺實發予機俾予自知以永于為若火始然若泉始逹推之自茲進孰予遏若登泰山益髙益崇維理無形維經無窮嗟哉學子盍敬念茲以是讀書則或庻幾以上論讀書之法又元城劉氏嘗舉司馬公讀三國志曹操遺令事以語客客曰非温公識見不能及此劉氏曰此無他也乃一誠字爾老先生讀書必具衣冠正坐莊色不敢懈怠惟以誠意讀之誠之者可以開金石况此虚偽之事一㸔即解散也愚按朱子歛襟危坐即此意故附見焉程子曰聖人之言其逺如天其近如地上文云凡解文字坦易其心自見理理只是人理甚分明如一條平坦路道詩曰周道如砥其直如矢此之謂也或曰聖人之言恐不可以淺近㸔曰聖人之言自有近處自有深逺處如近處乍生强要鑿教深逺楊子曰聖人之言逺如天賢人之言近如地某與改之云云朱子亦曰聖賢之言有髙逺處有平實處又曰今之談經者徃徃有四者之病本卑也而抗之使髙本淺也而鑿之使深本近也而推之使逺本明也而必使至於晦此今日談經之大患又曰聖賢立言本自平易而平易之中其㫖無窮今必推之使髙鑿之使深是未必真能髙深而固已離其本指䘮其平易無窮之味矣解經不同無害但要切處不可不同好著書則多言多言則害道程子勸楊時勿好著書云云學者要當察此楊氏曰解經欲得理通而語簡舊嘗解易簡而天下之理得云行其所無事不亦易乎一以貫之不亦簡乎如是則天下之理得矣又言行其所無事一以貫之方是一個自然之理朱子曰解經但可畧釋文義名物而使學者自求之乃為有益先生謂南軒孟子解文不過數語而所解者文過數倍將使學者求經而先坐困於吾説非先賢談經之體且如易傳已為太詳然必先釋字義次釋文義然後推本而索言之其淺深近逺詳宻有序不如是之忽遽繁雜也云云漢儒善説經不過只説訓詁使人以此玩索經文訓詁經文不相離異只作一道㸔直是意味深長先生謂近世説經者多是推衍文義自做一片文字非惟屋下架屋説得意味淡薄且是使人㸔者將註與經作兩項工夫做了下稍㸔得支離至於本㫖全不相照云云經書有不可解處只得闕若一向去解便是繆處讀書先有立説之心此念已外馳矣解經當如破的以上論解經之法自易要指至此皆格物致知之事程子所謂讀書講明義理者也故以為廣大學之首右廣大學之一語子謂子産有君子之道四焉其行已也恭其事上也敬其養民也惠其使民也義朱子曰子産鄭大夫公孫僑恭謙遜也敬謹恪也惠愛利也使民義如都鄙有章上下有服田有封洫廬井有伍之類呉氏曰數其事而責之者其所善者多也臧文仲不仁者三不知者三是也數其事而稱之者猶有所未至也子産有君子之道四焉是也今或以一言盖一人一事盖一時皆非也或問是四事者亦有序耶曰行已恭則其事上也敬非有容悦之私意于民惠後使之以義焉則民雖勞而不怨矣問子産莫短於才否曰孔子稱之如此安得短於材而為政不專於寛有非理者須以法治之孟子所言惠不知為政盖指其一耳南軒曰子産此四者為得君子之道然君子之道其目亦多矣子産有此四者而已其它固未盡得也聖人與人為善故特舉其所長焉子曰伯夷叔齊不念舊惡怨是用希伯夷叔齊孤竹君之二子孟子稱其不立於惡人之朝不與惡人言與鄉人立其冠不正望望然去之若將凂焉其介如此宜若無所容矣然其所惡之人能改即止故人亦不甚怨之也程子曰不念舊惡此清者之量又曰二子之心非夫子孰能知之或問夷齊之有舊惡何也曰蘇氏盖嘗言之然無所考未敢斷以為必然也蘇氏曰夷齊之事逺矣傳失其辭意其出也父子之間有間言焉若申生之事與不若是則又何惡之可念哉問云云曰此與不遷怒相似其所惡者因其人之可惡惡之而所惡不在我及其能改又只見它善處聖賢之心皆是如此南軒曰以夷齊平日之節觀之疑其狹隘而不容矣今夫子乃稱之如此何其宏裕也盖於其所為亦安夫天理之所當然而其胷中休休然初無一毫間於其間也若有一毫介於其間則是私意之所執而豈夷齊之心哉味夫子此言庻幾可以識之矣怨是用希者己無所怨於人而人亦無所怨於己也子曰孰謂㣲生髙直或乞醯焉乞諸其鄰而與之朱子曰㣲生姓髙名魯人素有直名者醯醋也人來乞時其家無有故乞諸鄰家以與之夫子言此譏其曲意狥物掠美市恩不得為直也程子曰㣲生髙所枉雖小害直為大范氏曰是曰是非曰非有謂有無謂無曰直聖人觀人於其一介之取予而千駟萬鐘從可知焉故以微事斷之所以教人不可不謹也或問微生乞醯之説或有謂直非中庸之行微生之事夫子盖美之者然乎曰為是説者新則新矣然即其言以觀之有以知其無正大之情也夫醯非難得之物或乞於我而我無之則直答以無而已彼將去而求之它人豈患其不得哉設其有急難之用而不知可得之處則告之可也求之而不得焉則往助其求可也今微生高之乞諸鄰也必不告以求之之意其與之也必不告以得之之所其掠美行私左右異態如此夫子尚何美之云哉善乎沂國王文正公之言曰恩欲已出怨使誰當至哉斯言其亦異乎微生之用心矣且直之為言自古聖賢未有以為非美德者特惡其過而失於較計而己今槩以直為非中庸之行吾不知其何取而為斯言耶然則斯人之所謂中庸者乃胡廣之中庸而非子思之中庸必矣問張子韶説乞醯不是不直曰此無它只是要人回互委曲以為直爾此鄉原之漸不可不謹南軒曰順理之謂直計較作為有纎毫之枉則害於直矣故夫子舉此以明直之理子曰巧言令色足恭左丘明恥之丘亦恥之匿怨而友其人左丘明恥之丘亦恥之朱子曰足過也程子曰左丘明古之聞人也謝氏曰二者之可恥有甚於穿窬也左丘明耻之其所養可知矣夫子自言丘亦恥之盖竊比老彭之意又以深戒學者使察乎此而立心以直也或問左丘明非傳春秋者耶曰未可知也啖趙陸氏辨之於纂例詳矣先友鄧著作考之氏姓書曰此人盖左丘姓而明名傳春秋者乃左氏耳鄧名世字元亞云足是加添之意能恭則禮已盡矣若又去上靣添些便是私欲巧言令色足恭與匿怨皆不誠實者也人而不誠實何所不至所以可恥與上文乞醯之義相似南軒曰是在衆人習以為常而未知為耻惟君子學以為己不忍須臾自欺故以為耻焉觀諸此則丘明為人誠實可知言已亦恥之以明丘明所恥之為得又可以味聖人與人為善其辭氣温厚如此子曰孟之反不伐奔而殿將入門䇿其馬曰非敢後也馬不進也朱子曰孟之反魯大夫名側胡氏曰反即莊周所稱孟子反者是也伐誇功也奔敗走也軍後曰殿䇿鞭也戰敗而還以後為功反奔而殿故以此言自揜其功也事在哀公十一年謝氏曰人能操無欲上人之心則人欲日消天理日明而凡可以矜己誇人者皆無足道矣然不知學者欲上人之心無時而忘也若孟之反可以為法矣南軒曰為學之害矜伐居多聖人取孟之反所以教門人也子謂衛公子荆善居室始有曰茍合矣少有曰茍完矣富有曰茍美矣朱子曰荆衛大夫茍聊且粗畧之意合聚也完備也言其循序而有節不以欲速盡美累其心楊氏曰務為全美則累物而驕吝之心生公子荆皆曰茍而已則不以外物為心其欲易足故也或問八章之説曰胡氏之説為備胡氏曰自合進而完自完進而美非善乎其事不能彌光於前而公子荆知此非所存心者直謂之茍且而已既見其不以殖産自能又見其不以多財自累富而無驕滿而弗溢非賢而能之乎此可為居室之法或問子産子曰惠人也朱子曰子産之政不專於寛然其心則一以愛人為主故孔子以為惠人盖舉其重而言也問子西曰彼哉彼哉子西楚公子申能遜楚國立昭王而改紀其政亦賢大夫也然不能革其僭王之號昭王欲用孔子又沮止之其後卒召白公以致禍亂則其為人可知矣彼哉者外之之詞問管仲曰人也奪伯氏駢邑三百飯䟽食沒齒無怨言人也猶言此人也伯氏齊大夫駢邑地名齒年也盖桓公奪伯氏之邑以與管仲伯氏自知己罪而心服管仲之功故窮約以終身而無怨言荀卿所謂與之書社三百而富人莫之敢拒者即此事也或問管仲子産孰優曰管仲之德不勝其才子産之才不勝其德然於聖人之學則概乎其未有聞也或問十章之説曰胡氏之説為詳胡氏曰鄭小國也介乎晉楚子産為政黜汰侈崇恭儉作封洫鑄刑書惜幣爭承皆以豊財足用禁奸保民其用法雖深為政雖嚴而卒歸於愛故夫子以惠人蔽之及其卒也聞之出涕而曰古之遺愛也然孟子以為惠而不知為政禮記以為能食民而不能教者盖先王之政之教子産誠有所未及也諸家皆不論子西為何人獨呉氏為能考之呉氏曰當時有三子西鄭駟夏楚宜申公子申也駟夏未嘗當國無大可稱宜申謀亂被誅相去又逺宜皆所不論者獨公子申與孔子同時又讓國昭王欲用孔子而子西止之其後又召白公以致楚亂則其為人可知矣問管仲人也范楊皆以為盡人道如何曰恐未然古注謂猶詩言所謂伊人莊子所謂之人也若作盡人道説除管仲是個人他人便不是人管仲也未盡得人道在愚按古注范楊之説皆似未安意人字之上猶有一字若子産惠人之類而逸之與子曰孟公綽為趙魏老則優不可以為滕薛大夫朱子曰公綽魯大夫趙魏晉卿之家老家臣之長大家勢重而無諸侯之事家老望尊而無官守之責優有餘也滕薛二國名大夫任國政者滕薛國小政煩大夫位髙責重然則公綽盖亷静寡欲而短於才者也楊氏曰知之弗豫枉其才而用之則為棄人矣此君子所以患不知人也言此則孔子之用人可知矣南軒曰老者行義為人所尊之稱趙魏老當時號為家事治者公綽之不欲其德可取也故以為趙魏老則優若滕薛則小國也大夫之職煩勞意者公綽之才有所不足故不可為耳大抵用人之方貴在處之得其當而已黄氏曰君子不器則無施而不可也未至於不器則各有所長而不能相通世之議論人物者但見其長厚則曰此賢也然賢而不能任事則亦未足為全德夫子之於公綽云云其言可謂公且平矣子問公叔文子於公明賈曰信乎夫子不言不笑不取乎朱子曰公叔文子衛大夫公孫枝也公明姓賈名亦衛人文子為人其詳不可知然必亷静之士故當時以三者稱之公明賈對曰以告者過也夫子時然後言人不厭其言樂然後笑人不厭其笑義然後取人不厭其取子曰其然豈其然乎厭者苦其多而惡之之辭事適其可則人不厭而不覺其有是矣是以稱之或過而以其不言不笑不取也然此言也非禮義充溢於中得時措之宜者不能文子雖賢疑未及此但君子與人為善不欲正言其非也故曰其然豈其然乎盖疑之也或問公叔文子得不言不笑不取之名而公明賈以為時然後言笑取何也曰蘇氏曰凡事之因物而中理者人不知其有是也飲食未嘗無五味也而人不知者以其適宜而中度也飲食而知其有五味必其過者也此文子得不言不笑不取之名也而公明賈以是稱之也夫子之疑之何也曰呉氏曰文子請享靈公也史鰌曰子富君貧禍必及矣觀此則文子之言豈能皆當而其取豈能皆善乎南軒曰公叔文子意者簡黙厚重之士故人之稱之如此聖人質之於其門人將以察其然也公明賈之言善矣然非文子之所及也盖如賈所言非和順積中發而中節莫能不直謂不然而為之疑辭曰其然豈其然乎聖人辭氣含洪忠厚如此子曰臧武仲以防求為後於魯雖曰不要君吾不信也朱子曰防地名武仲所封邑也要有挾而求也武仲得罪奔邾如防使請立後而避邑以求若不得請則將㨿邑以叛是要君也范氏曰要君者無上罪之大者武仲之邑受之於君得罪出奔則立後在君非己所得專也而㨿邑以請由其好智而不好學也楊氏曰武仲卑辭請後其跡非要君者而意實要之夫子之言亦春秋誅意之法南軒曰尹氏云㨿邑以請非要君而何不知義者將以武仲之存先祀為賢也故夫子正之子曰晉文公譎而不正齊桓公正而不譎朱子曰晉文公名重耳齊桓公名小白譎詭也二公皆諸侯盟主攘夷狄以尊周室者也雖其以力假仁心皆不正然桓公伐楚仗義執言不由詭道猶為彼善於此文公則伐衛以致楚而隂謀以取勝其譎甚矣二君它事亦多類此故夫子言此以發其隠晉文用兵便是戰國孫呉氣習南軒曰詳觀召陵討罪之舉城濮怒楚之戰則可見矣二君皆以功利為心為三王之罪人則同然就其中行事之迹又有譎正之異公叔文子之臣大夫僎與文子同升諸公朱子曰臣家臣公公朝謂薦之與己同進為公朝之臣也子聞之曰可以為文矣文者順理而成章之謂諡法亦有所謂錫民爵位曰文者洪氏曰家臣之賤而引之使與己並有三善焉知人一也忘己二也事君三也南軒曰志在上賢而無媢疾之心以斯一善其謚以文可也子言衛靈公之無道也康子曰夫如是奚而不䘮朱子曰䘮失位也孔子曰仲叔圉治賔客祝鮀治宗廟王孫賈治軍旅夫如是奚其䘮仲叔圉即孔文子也三人皆衛臣雖未必賢而其才可用靈公用之又各當其才尹氏曰衛靈公之無道宜䘮也而能用此三人猶足以保其國而况有道之君能用天下之賢才者乎詩曰無競維人四方其訓之南軒曰以衛靈公之無道然所用得其才猶足以無䘮雖然僅能維持使之勿䘮而己若身正於上而用得其人則孰禦焉子曰臧文仲其竊位者與知柳下惠之賢而不與立也朱子曰竊位言不稱其位而有愧於心如盗得而隂㨿之也柳下惠魯大夫展獲字禽食邑柳下諡曰惠與立謂與之並立於朝范氏曰臧文仲為政于魯若不知賢是不明也知而不舉是蔽賢也不明之罪小蔽賢之罪大故孔子以為不仁又以為竊位按論語所論人物如管仲晏平仲臧文仲令尹子文陳文子季文子寗武子子桑伯子史魚柳下惠各已見前論今不重出而春秋褒貶尤衆又當即全經而考焉非此所能盡録也學者觀聖人論人之得失皆當反而觀己之得失然後為有補云孟子匡章曰陳仲子豈不誠亷士哉居於陵三日不食耳無聞目無見也井上有李螬食實者過半矣匍匐往將食之三咽然後耳有聞目有見朱子曰匡章陳仲子皆齊人亷有分辨不茍取也於陵地名螬蠐螬蟲也匍匐言無力不能行也咽吞也孟子曰於齊國之士吾必以仲子為巨擘焉雖然仲子惡能亷充仲子之操則蚓而後可者也巨擘大指也言齊人中有仲子如衆小指中有大指也充推而滿之也操所守也蚓丘蚓也言仲子未得為亷也必若滿其所守之志則惟丘蚓之無求於世然後可以為亷耳夫蚓上食槁壤下飲黄泉仲子所居之室伯夷之所築與抑亦盗跖之所築與所食之粟伯夷之所樹與抑亦盗跖之所樹與是未可知也槁壤亁土也黄泉濁水也抑發語辭也言蚓無求於人而自足而仲子未免居室食粟若所從來或有非義則是未能如蚓之亷也曰是何傷哉彼身織屨妻辟纑以易之也辟績也纑練麻也曰仲子齊之世家也兄戴蓋禄萬鐘以兄之禄為不義之禄而不食也以兄之室為不義之室而不居也辟兄離母處於於陵他日歸則有饋其兄生鵝者已頻顣曰惡用是鶃鶃者為哉他日其母殺是䳘也與之食之其兄自外至曰是鶃鶃之肉也出而哇之世家世卿之家兄名戴食采於蓋其入萬鐘也歸自於陵歸也己仲子也鶃鶃䳘聲也頻顣而言以其兄受饋為不義也哇吐之也以母則不食以妻則食之以兄之室則弗居以於陵則居之是尚為能充其類也乎若仲子者蚓而後充其操者也言仲子以母之食兄之室為不義而不食不居其操守如此至於妻所易之粟於陵所居之室既未必伯夷之所為則亦不義之類耳今仲子於此則不食不居於彼則食之居之豈為能充滿其操守之類者乎必其無求自足如蚯蚓然乃為能充滿其志而得為亷耳然豈人之所可為哉范氏曰天之所生地之所養惟人為大人之所以為大者以其有人倫也仲子避兄離母無親戚君臣上下是無人倫也豈有無人倫而可為亷哉南軒曰於陵仲子於所當享有所不安引而避之而其窮至於無以食而食井上之螬李在當時或稱其亷謂其能不以一介取諸人也曽不知伊尹之不以一介與人不以一介取諸人以非其義非其道之故耳若於其所當居而不居則反害於道義矣仲子齊之世家也兄戴蓋禄萬鐘仲子茍以為不當虗享其禄食則當與其兄共思社稷之計光輔其主治其國家保其民人則齊國有無窮之業而仲子之家亦有無窮之聞斯為稱焉耳今乃昧正大之見為狹陋之思以食粟受鵝為不義而不知避兄離母之為非徒欲潔身以為清而不知廢大倫之為惡小亷妨大徳私意害公義原仲子本心亦豈不知母子之性重於其妻兄之居為愈於於陵乎惟其私意所萌亂夫倫類至此極也衆人惑於其迹以其清苦髙介而取之而不知原其所萌若是其差殊也嗟乎世之貪冒茍得肆而為惡者多矣而孟子於仲子之徒獨闢之之深者盖世之為惡者其失易見而仲子之徒其過為難知也惟其難知故可以惑世俗而禍仁義孟子反復闢之盖有以也公都子曰匡章通國皆稱不孝焉夫子與之遊又從而禮貎之敢問何也朱子曰匡章齊人通國盡一國之人也禮貎敬之也孟子曰世俗所謂不孝者五惰其四支不顧父母之養一不孝也博奕好飲酒不顧父母之養二不孝也好貨財私妻子不顧父母之養三不孝也從耳目之欲以為父母戮四不孝也好勇闘狠以危父母五不孝也章子有一於是乎戮羞辱也狠忿戾也夫章子子父責善而不相遇也遇合也相責以善而不相合故為父所逐也責善朋友之道也父子責善賊恩之大者賊害也朋友當相責以善父子行之則害天性之恩也夫章子豈不欲有夫妻子母之屬哉為得罪於父不得近出妻屏子終身不養焉其設心以為不若是是則罪之大者是則章子已矣言章子非不欲身有夫妻之配子有子母之属但為身不得近於父故不敢受妻子之養以自責罰其心以為不如此則其罪益大也此章之㫖於衆所惡而必察焉可以見聖賢至公至仁之心矣楊氏曰章子之行孟子非取之也特哀其志而不與之絶耳南軒曰常人之私情樂聞人之過責人惟恐不深而不復察其理君子恕以待人油然公平各以其分而是非無不得矣匡章之事亦可謂處乎其不幸者也衆人皆歸之以不孝之名而孟子獨明其不然者察其理故耳盖諌於其父而父不受以至於怒而屏之以君子之法論之章特未知夫有隠而無犯與夫號泣而從之之義耳夫其所謂有隠而無犯與夫號泣而從者其婉愉委曲為如何非致其深愛者不能也章之諌也無乃不能察其親之意而或過於辭色歟是以為責善而賊恩也夫至於責善而賊恩則非惟不能正救其事而反以傷其父子之天性其所處固不為無過然謂之不孝則抑甚矣盖章本心亦庻幾欲其父之為善耳而處之或過反以致其怒而章又以為既得罪於父則己亦不當安夫妻子之養則從而黜屏其妻子謂不若是則己之罪益大也其深自咎責之意可見矣夫察章之事既異乎世俗之所謂不孝而原章之心則又以得罪于父為不遑安則章亦庻幾其可進于善者而豈當棄絶于君子之門哉若章得罪於父而不知懼則是以忿戾之氣行于其間而可罪矣然則君子之觀人也豈茍云乎哉夫齊國之士皆以仲子為亷通國皆稱匡章為不孝而孟子獨明其不然世俗之毁譽如無本之水非君子孰能察之按孟子論人物如伯夷柳下惠伊尹之類已散見諸篇若仲子事合見出處篇匡章事亦合在父子篇以其察世俗之毁譽而斷之以至公之理深得論人之法故備載焉若荀楊以下評論人物未必皆當故略之問四凶堯不誅而舜誅之何也程子曰四凶皆大才也在堯之時未嘗為惡堯安得而誅之及舉舜加其上然後始有不平之心而肆其惡故舜誅之耳曰堯不知四凶乎曰惟堯知之知其惡而不去何也曰在堯之時非特不為惡亦頼以為用或言髙宗於傅說文王於太公盖已素知之矣恐群臣未信故託夣卜以神之曰此偽也聖人豈偽乎問伯夷叩馬諌武王義不食周粟有諸曰叩馬則不可知非武王誠有之也夫是之謂隘君尊臣卑天下之常理也伯夷知守常理而不知聖人之變故隘不食粟盖不食其禄非餓而不食也史記所載諌詞皆非也韓退之頌伯夷甚好然說得伯夷隘處要知伯夷心須是聖人語曰不念舊惡怨是用希此甚說得伯夷心也問伐國不問仁人何也曰未知其所以伐如何若武王伐紂則皆仁人也柳下惠之時諸侯以土地之故糜爛其民皆不義之伐宜仁人不忍言也問宋襄公不鼓不成列如何曰此愚也既與他戰又郤不鼔不成列必待他成列圗个甚問漢文多灾異漢宣多祥瑞何也曰譬之小人多行不義人不之責至君子才有一事則議論便生此一理也白者易汙此又一理也詩中幽王大惡為小異宣王小惡為大異此又一理也東漢之士尚名節只為不明理若使明理則皆大賢也趙苞為邉守虜奪其母招之以城降苞遽戰而殺其母非也以君之城降而求生其母固非也然亦當求所以生母之方奈何遽戰乎不得已身降之可也王陵母在楚而使質以招陵陵降可也徐庶得之矣問三國之興孰為正曰蜀志在復漢則正也唐太宗為藩臣佐父取天下一功臣耳而可奪元良之位乎終唐之世三綱不正太宗啟之又曰太宗人知其為英主不曽有人識其惡余同文曰如肅宗即位靈武分明是簒也又曰唐有天下如貞觀開元間雖號治平然亦有夷狄之風三綱不正無父子君臣夫婦其原起於太宗故其後世子孫皆不可使𤣥宗使肅宗便簒肅宗使永王璘便反君不君臣不臣故曰藩鎮不賔權臣䟦扈陵夷至于五代之亂朱子曰鬻拳乃一粗厲之人其意則忠而其事皆非不足法也按左氏傳以鬻拳為愛君曰諌以自納於刑刑而不忘納君於善是豈所以為人臣法歟故朱子辨其不然然范寗亦議其非矣樂毅亦一戰國之士何嘗是王者之師問樂毅伐齊文中子以為善藏其用東坡則責其不合妄效王者事業以取敗二者說孰是朱子曰不然此只是田單㑹守遂無如之何耳毅其初是合秦魏之師又因怨湣王之暴故一舉下齊七十餘城及涽王使人心之怒已解它又恐三國夾分它功急發遣了以燕之力亦只做得恁地况田單忠義死節堅守二城自是不可攻非不欲取盖力不能耳云云毅在當時亦恣意鹵掠正與孟子所謂毁其宗廟遷其重器同愚按夏侯𤣥以來稱許皆大過至是無餘藴矣鹵掠事見毅與燕惠王書云珠玉財寳車甲珍器盡収入於燕是也漢髙祖私意分數尚少唐太宗一切假借仁義以行其私漢髙祖急于攻楚所以致太公之歸廣武之㑹項羽所以不殺沛公者盖是時漢強而楚小弱使髙祖屈意干事楚則有懼斃而已惟其云云項籍亦能曉此知殺太公為不可不若歸之可以致漢之歡心若分羮之說則大不可漢文帝資質雖美然安於此而已如云卑之無甚髙論今人可行之類是也先王之道情願不要去做只循循自守武帝之病固多然天資髙志向大惜其無真儒輔佐不能勝其多欲之私耳然輪臺之悔終是資髙故能如此嘗因言太子仁柔不能用武帝曰若太子又如朕所為是襲亡秦之迹可見當時自知其非向若能以仲舒為相汲黯為御史大夫豈不善邪邵平髙于四皓或問霍光不負社稷而有許后之事馬援以口過戒子孫而他日有裹屍之禍朱子曰采葑采菲無以下體取人之善為己師法不當如是論也漢儒董仲舒最平正劉向博洽而淺然皆不見聖人大道賈誼司馬遷皆駁雜大意是言權謀功利時以仁義揜覆之然終救不得漢儒專以災異䜟緯之屬為學問如徐孺子之徒多能此反以義理之學為外學如鍾離意傳所載脩夫子廟事說夫子若㑹覆射者甚可恠也問黄憲豈得似顔子曰其資質終是美又問若得聖人為之依歸如何曰又未知其志向何若顔子豈徒一柔善之人觀其敢問為邦而孔子教以四代禮樂其聰明絶人可見矣人知曹操之為漢賊而不知孫權亦漢賊也若權有意興復漢室當與先主并心合謀以正曹氏之罪奈何先主稍能自立即摧而仆之如襲取關羽之類是也權自知與操同是竊㨿土地之人若先主可成必滅曹氏且復㓕吳矣權之奸謀盖不可掩平日所與先主交通姑為自全計爾問羊陸之事曰此敵國相傾之謀耳非善意也觀陸抗正是彰其徳於祜之言斯可見矣如石勒脩祖父母墓亦相類嵇紹蕩隂之忠固可取亦不足以贖事讎之過二者正不相掩也陶淵明古之逸民唐起事由於私侍故閨門失禮之事不以為異唐史賛太宗功徳兼隆盖謂除隋之亂是功致治之美是徳自道學不明故言功徳者如此揆以聖門之法則此二事不過是功未可謂之徳顔魯公是有忠義而無意智之人當時去那裏見使者來不知是賊便兩拜後來知得方罵愚按顔公始以節制之權遜賀蘭進明不居功之意甚矣而不知進明之不可恃晩為盧把所忌不知引去以全明哲保身之道皆於智有所不足朱子之評當矣南軒張氏曰責己須要備人有片善皆當取之古人之學只是為己如晏平仲其事君臨政未必皆是然善與人交聖人便取之子産有君子之道四焉其不合道處想多只是四者便是吾之師責己而取人不惟飬吾之徳亦所以與人為善問髙祖規模宏逺何事可驗曰約法三章用董公仁義之說此二事可驗漢武謂多欲不宜君國子民此言當矣帝雖能言而自亦多欲然此言不可以人廢于定國為廷尉天下無寃民史氏將誰欺趙盖楊韓之死皆在定國之手寃莫大焉大凡看史不可被史官謾過人言東漢之亡黨錮趣之也曽不知東漢若無數君子其亡也尤速譬如羸病者之服丹一旦死則歸罪於丹不知其所以能延數日之命者丹之功也問趙苞當初不當為邉守曰然當擇於初至是無可為者非不忠則不孝矣又曰温嶠當時只當終老北方不當棄母劉𤣥徳言濟大事以人為本今人歸吾吾何忍棄去大哉言乎足以得人之心矣因言𤣥徳胸襟是大不同向在淮上有歸正人來或欲不受因舉此言謂此等皆吾之赤子久相隔絶不得見其父母幸而有路歸來父母閉户而拒之可乎孟宗當與立傳又曰孫翊之妻能報夫之讎又不汙其身可謂智仁勇三者兼全矣史傳中煞有好人埋没而不顯者如吳主下詔方事之殷國家多難凡在職遭䘮而奔赴者置之大辟吳令孟宗䘮母奔䘮已而拘之聽刑賴陸遜等力陳其素具减一等如此等人是甚力量當云云雖是一事關係甚大又如孫翊之妻云云李太白從永王璘非必有意於璘之爵䘵也亦是踈快忽過耳若杜子美則無此自語孟論人物至此亦格物致知之事程子所謂辨論古今人物而别其是非者也然諸老先生所論多已見諸篇其評將相大臣事業又當悉入乙記至若司馬公通鑑范氏唐鑑致堂胡氏讀史管見及龜山史論了齋史約與南軒諸老先生史論當即全書而觀之故今獨取程子以下數條列之於此以為廣大學之一條云世間常有一種邪説與正説相對如唐肅宗時議䧟賊官罪李勉議當以九等定刑而當時却恐堅河比叛臣之心不知所以正叛臣之罪也又如渡江之初衆論欲先追駕而後即位而黄潛善汪伯彦則唱為先即位之論正論常見危邪説常見安使吾人平日閒暇講䆒必不到得錯只恐利害倉卒之際錯了路岐某觀昔賢多是於利害倉卒之際錯了是故學不可不講氣不可不養右廣大學之二亦格物致知之事程子所謂講論古今人物而辨其是非也孟子桃應問曰舜為天子臯陶為士瞽瞍殺人則如之何朱子曰桃應孟子弟子也其意以為舜雖愛父而不可以私害公臯陶雖執法而不可以刑天子之父故設此問以觀聖賢用心之所極非以為真有此事也孟子曰執之而已矣言臯陶之心知有法而己不知有天子之父也然則舜不禁與桃應問也曰夫舜惡得而禁之夫有所受之也言臯陶之法有所傳授非所敢私雖天子之命亦不得而廢之也然則舜如之何桃應又問曰舜視棄天下猶棄敝蹝也竊負而逃遵海濵而處終身訢然樂而忘天下蹝草屨也遵循也言舜之心知有父而己不知有天下也孟子嘗言舜棄天下猶草芥而惟順於父母可以解憂與此意互相發此章言為士者但知有法而不知天子父之尊為子者但知有父而不知天下之為大盖其所以為心者莫非天理之極人倫之至學者察此而有得焉則不待較計論量而天下無難處之事矣南軒曰善發明舜之心者其惟孟子乎若以後世利害之見論之則謂天下方歸戴於舜而賴其治舜乃舎而去之得無廢已成之業而孤天下之望乎此不知天理之言也聖人之所以為治者循天理而已若汨於利害而失天理之所存則雖舜何以治天下哉或者以舜竊負為狂是未之思也又以為臯陶既執瞽瞍舜烏得而竊之是又未之思也臯陶執瞽瞍於前而使舜得以申竊負之義於後是乃天理時中全夫君臣父子之義者也㣲孟子孰能推之按程子以應接事物而處其當否為格物致知之一事然所謂處事之方不過本之以義理而參之以時與勢而已湯之以義制事易之義以方外中庸之時中是也各已散見諸篇今獨取孟子一章列之於此盖其事乃天下之至難而聖賢處之曲盡其道此即處事之大法也又朱子嘗謂正其誼不謀其利明其道不計其功乃處事之要學者誠能每事以義為的而權其輕重可否之宜不雜以世俗利害之私則庻乎應酧事物有餘裕矣右廣大學之三亦格物致知之事程子所謂應接事物而處其當否也西山讀書記卷二十五
