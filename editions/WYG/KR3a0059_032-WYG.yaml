body:
  text: 西山讀書記巻三十二宋真徳秀撰聖賢氣象詩狼跋美周公也狼跋其胡載疐其尾公孫碩膚赤舄几几鄭氏曰公周公也程氏曰遜者遜而弗居也毛氏曰碩大膚美也王氏曰几人所馮以為安几几安也程氏曰周公攝政居危疑之地雖成王不知四海流言終不能損其聖徳者以其忠誠在於王家無貪欲之私心也狼獸之貪者猛於求欲故陷於機穽羅縶前跋後疐進退困險詩人取之以言夫狼之所以致禍難危困如是者以其有貪欲故也若周公者至公不私進退以道無私欲之蔽以謙遜自處不有其尊不矜其徳故雖在危疑之地安然舒泰赤舄几几然也又曰周公之處已也䕫䕫然存恭畏之心其存誠也蕩蕩然無顧慮之意所以不失其聖也范氏曰其徳備者其容亦盛赤舄几几則其餘可見矣朱氏曰赤舄冕服之舄也几几安重貌周公雖遭疑謗然所以處之不失其常故詩人美之言狼跋其胡則疐其尾矣公遭流言之變而其安肆自得乃如此蓋其道隆徳盛而安土樂天有不足言者所以遭大變而不失其常也明道對神宗言王安石之學不是上愕然曰何故對曰臣常讀詩言周公之徳曰公孫碩膚赤舄几几周公盛徳形容如是之盛如王安石其身猶不能自治何足以及此龜山集載上問王安石是聖人否餘同淇奥美武公之徳也瞻彼淇奥緑竹猗猗毛氏曰美盛貌有匪君子匪文章貌如切如磋治骨曰切象曰磋如琢如磨治玉曰琢石曰磨瑟兮僴兮瑟矜莊貌僴寛大貌赫兮喧兮赫有明徳赫赫然喧威儀容止宣著也有匪君子終不可諼兮諼忘也瞻彼淇奥緑竹青青有匪君子充耳琇瑩充耳瑱也琇瑩美石㑹弁如星弁皮弁㑹縫中飾以玉采瞻彼淇奥緑竹如簀宻比如簀有匪君子如金如錫如圭如璧毛氏曰金錫鍊而精圭璧性有質程氏曰成質之美如金錫圭璧然寛兮綽兮程氏曰寛𢎞裕綽開豁也猗重較兮朱子曰重較卿士之車也善戯謔兮不為虐兮程氏曰言其樂易而以禮自防節不至於過是不為虐也烝民仲山甫之徳柔嘉維則令儀令色小心翼翼古訓是式威儀是力朱氏曰柔嘉維則不過其則也過其則為弱不得謂之柔嘉矣令儀令色小心翼翼言其表裏柔嘉也古訓是式威儀是力言其學問進脩也論語子禽問於子貢曰夫子至於是邦也必聞其政求之與抑與之與子貢曰夫子温良恭儉讓以得之夫子之求之也其諸異乎人之求之與朱子曰温和厚也良易直也恭莊敬也儉節制也讓謙遜也五者夫子之盛徳光輝接於人者也言夫子未嘗求之但其徳容如是故時君敬信自以其政就而問之耳非若他人必求之而後得也聖人過化存神之妙未易窺測然卽此而觀則其徳盛禮恭而不願乎外亦可見矣學者所當濳心而勉學也謝氏曰學者觀於聖人威儀之間亦可以進徳矣若子貢亦可謂善觀聖人矣亦可謂善言徳行矣今去聖人千五百年以此五者想見其形容尚能使後人興起而況於親炙之者乎南軒曰夫子至是邦必聞其政而未有能委國而授之以政者蓋見聖人之儀刑而樂告之者秉彛好徳之良心也而私欲害之是以終不能用耳顔淵季路侍子曰盍各言爾志子路曰願車馬衣輕裘與朋友共敝之而無憾顔淵曰願無伐善無施勞朱子曰伐誇也善謂有能施亦張大之意勞謂有功易曰勞而不伐是也或曰勞勞事也勞事非已所欲故亦不欲施之於人亦通子路曰願聞子之志子曰老者安之朋友信之少者懐之老者養之以安朋友與之以信少者懐之以恩一說安之安我也信之信我也懐之懐我也亦通程子曰夫子安仁顔淵不違仁子路求仁又曰子路顔淵孔子之志皆與物共者也但有大小之差耳又曰子路勇於義者觀其志豈可以勢利拘之哉亞於浴沂者也顔子不自私已故無伐善知同於人故無施勞其志可謂大矣然未免出於有意也至於夫子則如天地之化工付與萬物而已不勞焉此聖人之所為也今夫覊靮以御馬而不以制牛人皆知覊靮之作在乎人而不知覊靮之生由於馬聖人之化亦猶是也先觀二子之言後觀聖人之言分明天地氣象凡看論語非但欲理㑹文字須要識得聖人氣象南軒曰人之不仁病於有已故雖衣服車馬之間此意未嘗不存焉子路蓋欲先去其私於車馬之間者其志可謂篤而用工亦實矣至於顔子則幾於廓然大公而無物我之間矣然猶所謂誠之者人之道也至於孔子則純乎天矣物各付物止於其分而無不得焉此誠者天之道也然而學者有志於求仁則子路之事亦不可忽要當如此用力然後顔子之事可以馴致若慕高逺而忽卑近則亦妄意躐等終身無所成就而已耳子之燕居申申如也夭夭如也朱子曰燕居閒暇無事之時楊氏曰申申其容舒也夭夭其色愉也程子曰此弟子善形容聖人處也為申申字說不盡故更著夭夭字今人燕居之時不怠惰放肆必太嚴厲嚴厲時著此四字不得怠惰放肆時亦著此四字不得唯聖人便自有中和之氣南軒曰聖人聲氣容色之所形盛徳之至不勉而中也黄氏曰記此語者足以見聖人渾然天理與時偕行一弛一張皆有當然之則初豈有心為之哉子食於有䘮者之側未嘗飽也朱子曰臨䘮哀不能甘也子於是日哭則不歌哭謂弔哭一日之内餘哀未忘自不能歌也謝氏曰學者於此二者可見聖人情性之正也能識聖人之情性然後可以學道南軒曰臨䘮則哀食何由飽哭者哀之至歌者樂之至二者不容相襲學者法聖人而勉之亦足以養忠厚之心也子與人歌而善必使反之而後和之朱子曰反復也必使復歌者欲得其詳而取其善也而後和之者喜得其詳而與其善也此見聖人氣象從容誠意懇至而其謙遜審宻不掩人善又如此蓋一事之微而衆善之集有不可勝旣者焉讀者宜詳味之子温而厲威而不猛恭而安朱子曰厲嚴肅也人之徳性本無不備而氣質所賦鮮有不偏惟聖人全體渾然隂陽合徳故其中和之氣見於容貌之間者如此門人熟察而詳記之亦可見其用心之宻矣抑非知足以知聖人而善言徳行不能記故程子以為曽子之言學者所宜反復而玩味也陳司敗問昭公知禮乎孔子曰知禮孔子退揖巫馬期而進之曰吾聞君子不黨君子亦黨乎君取於吳為同姓謂之吳孟子君而知禮孰不知禮巫馬期以告子曰丘也幸茍有過人必知之朱子曰孔子不可自謂諱君之惡又不可以娶同姓為知禮故受以為過而不辭吳氏曰魯蓋夫子父母之國昭公魯之先君也司敗又未嘗顯言其事而遽以知禮為問其對之宜如此也及司敗以為有黨而夫子受以為過蓋夫子之盛徳無所不可也然其受以為過也亦不正言其所以過初若不知孟子之事者可以為萬世之法矣南軒曰他國之大夫問吾國之君知禮與否則但可告之以知禮而已及巫馬期以司敗之言告則又豈可謂取同姓為知禮哉若言為君隠之意則淺露已甚而失前對之本意矣故但引已之過而已然而取同姓之為非禮其義固已在其中矣聖人辭氣之間其天地造化歟愚按聖人之言如元氣之運渾然無迹而春生秋殺嘿寓其中如對王孫賈媚竈之問答陽貨懐寶迷邦之誚皆此類也雖非學者所可望而及然優游諷詠涵浸而不已則其所以轉移變化於㝠㝠之中者其益可勝計哉子見齊衰者冕衣裳者與瞽者見之雖少必作過之必趨范氏曰聖人之心哀有䘮尊有爵矜不成人其作與趨蓋有不期然而然者尹氏曰此聖人之誠心内外一者也南軒曰愛敬生於中而形於外惟聖人為能有常而無失於齊衰哀有䘮也於冕衣裳貴達尊也於瞽者矜困窮也推之則帝王所以治天下之綱要亦在是也鄉黨孔子於鄉黨恂恂如也似不能言者程子曰鄉黨一篇形容聖人動容周旋甚好使學者宛然如見聖人楊氏曰聖人之所謂道者不離乎日用之間也故夫子之平日一動一靜門人皆審視而詳記之尹氏曰甚矣孔門諸子之耆學也於聖人之容色言動無不謹書而備録之以貽後世今讀其書即其事宛然如聖人之在目也雖然聖人豈拘拘而為之者哉蓋盛徳之至動容周旋自中乎禮耳學者欲潛心於聖人宜於此求焉朱子曰恂恂信實之貌似不能言者謙卑遜順不以賢知先人也鄉黨父兄宗族之所在故孔子居之其容貌辭氣如此南軒曰此篇所記於夫子言語容貌衣服飲食之際可謂察之精矣門人亦善學聖人哉蓋聖人之道如是其高深也茫然測度懼夫泛而無入徳之地也故即其顯見之實而盡心焉存而味之則而象之於此有得則内外並進體用不離而其高深者可以馴致矣其在宗廟朝廷便便言唯謹爾便便辯也宗廟禮法之所在朝廷政事之所出言不可以不明辯故必詳問而極言之但謹而不放爾此一節記孔子在鄉黨宗廟朝廷言貌之不同朝與下大夫言侃侃如也與上大夫言誾誾如也此君未視朝時也侃侃剛直也誾誾和悅而諍也君在踧踖如也與與如也君在視朝也踧踖恭敬不寧之貌與與威儀中適之貌張子曰與與不忘向君也亦通此一節記孔子在朝廷事上接下之不同也君召使擯色勃如也足躩如也擯主國之君所使出接賓者勃變色貌躩盤辟貌皆敬君命故也揖所與立左右手衣前後襜如也與立謂同擯者也揖左人則左其手揖右人則右其手襜整貌趨進翼如也疾趨而進張拱端好如鳥舒翼賓退必復命曰賓不顧矣紓君敬也此一節記孔子為君擯相之容黄氏曰色勃足躩被命之初也揖也趨進也行禮之際也賓退禮畢之後也皆天理之節文所當然也至於揖之左右衣之前後手之翼如皆禮文之至末者聖人於此動容周旋無不中禮盛徳之至從心所欲不踰矩也門人弟子亦必審觀而詳記之可謂善學者矣入公門鞠躬如也如不容鞠躬曲身也公門高大而若不容敬之至也立不中門行不履閾中門中於門也謂當棖闑之間君出入處也謝氏曰立中門則當尊行履閾則不恪過位色勃如也足躩如也其言似不足者位君之虚位謂門屏之間人君宁立之處所謂宁也君雖不在過之必敬不敢以虛位而慢之也言不敢肆也南軒曰君不在焉而莊敬也如此則其事君之誠可知矣攝齊升堂鞠躬如也屏氣似不息者禮將升堂兩手摳衣使去地尺恐躡之而傾跌失容也屏藏也息鼻息出入者也近至尊氣容肅也出降一等逞顔色怡怡如也没階趨進翼如也復其位踧踖如也等階之級也逞放也漸逺所尊舒氣解顔怡怡和悅也没階下盡階也趨走就位也復位踧踖敬之餘也此一節記孔子在朝之容執圭鞠躬如也如不勝上如揖下如授勃如戰色足蹜蹜如有循圭諸侯命圭聘問鄰國則使大夫執以通信如不勝執主器執輕如不克敬慎之至也上如揖下如授謂執圭平衡手與心齊高不過揖卑不過授也戰色戰而懼也蹜蹜舉足促狹也如有循記所謂舉前曳踵言行不離地如縁物也享禮有容色享獻也旣聘而享用圭璧有庭實有容色和也儀禮曰發氣滿容私覿愉愉如也私覿以私禮見也愉愉則又和矣此一節記孔子為君聘於鄰國之禮也君子不以紺緅飾紺深青楊赤色齊服也緅絳色三年之䘮以飾練服飾領縁也紅紫不以為褻服紅紫間色不正且近於婦人女子之服也褻服私居服也言此則不以為朝祭之服可知當暑袗絺綌必表而出之欲其不見體也詩所謂蒙彼縐絺是也緇衣羔裘素衣麑裘黄衣狐裘褻裘長短右袂狐貉之厚以居去䘮無所不佩非帷裳必殺之羔裘𤣥冠不以弔吉月必朝服而朝吉月月朔也孔子在魯致仕時如此此一節記孔子衣服之制齊必有明衣布齊必沐浴浴竟卽著明衣所以明潔其體也以布為之此下脫前章寢衣一簡必有寢衣長一身有半齊主於敬不可解衣而寢又不可著明衣而寢故别有寢衣其半蓋以覆足從程子說移附此齊必變食居必遷坐變食謂不飲酒不茹葷遷坐易常處也此一節記孔子謹齊之事楊氏曰齊所以交神故致潔變常以盡敬食不厭精膾不厭細食精則能養人膾麤則能害人不厭言以是為善非謂必欲如是也食饐而餲魚餒而肉敗不食色惡不食臭惡不食失飪不食不時不食饐飯傷熱濕也餲味變也魚爛曰餒肉腐曰敗色惡臭惡未敗而色臭變也飪烹調生熟之節也不時五榖不成果實未熟之類此數者皆足以傷人故不食割不正不食不得其醬不食割肉不方正者不食造次不離於正也漢陸續之母切肉未嘗不方斷葱以寸為度蓋其質美與此暗合也食肉用醬各有所宜不得則不食惡其不備也此二者無害於人但不以嗜味而茍食耳肉雖多不使勝食氣惟酒無量不及亂食以榖為主故不使肉勝食氣酒以為人合歡故不為量但以醉為節而不及亂耳程子曰不及亂者非唯不使亂心志雖血氣亦不可使亂但浹洽而已可也沽酒市脯不食沽市皆買也恐不精潔或傷人也與不嘗康子之藥同意不撤薑食薑通神明去穢惡故不撤不多食適可而止無貪心也祭於公不宿肉祭肉不出三日出三日不食之矣助祭於公所得胙肉歸卽頒賜不俟經宿者不留神惠也家之祭肉則不過三日皆以分賜蓋過三日則肉必敗而人不食之是褻鬼神之餘也食不語寢不言答述曰語自言曰言范氏曰聖人存心不他當食而食當寢而寢言語非其時也楊氏曰肺為氣主而聲出焉寢食則氣窒而不通語言恐傷之也雖疏食菜羮𤓰祭必齊如也齊嚴敬貌孔子雖薄物必祭其祭必敬聖人之誠也此一節記孔子飲食之節謝氏曰聖人飲食如此非極口腹之欲然聖人之所不食窮口腹者或反食之欲心勝而不暇擇也胡氏曰亂者内昏其心志外䘮其威儀甚則班伯所謂滛亂之原皆在於酒是也聖人飲無定量亦無亂態蓋從心所欲而不踰矩是以如此學者未能然則如晉元帝可也帝初鎮江東以酒廢事王導以為言帝命酌飲觴覆之於此遂絶黄氏曰飲食以養生故欲其精然亦能傷生故惡其敗至於失節違禮縱欲敗徳無不致其謹焉聖人一念之微莫非天理學者不可以不戒也席不正不坐謝氏曰聖人心安於正故於位之不正者雖小不處鄉人飲酒杖者出斯出矣杖者老人也六十杖於鄉未出不敢先旣出不敢後鄉人儺朝服而立於阼階無所不用其誠敬也或曰恐其驚先祖五祀之神欲其依已而安也此一節記孔子居鄉之事問人於他邦再拜而送之拜送使者如親見之敬也康子饋藥拜而受之曰丘未達不敢嘗楊氏曰大夫有賜拜而受之禮也未達不敢嘗謹疾也必告之直也此一節記孔子與人交之誠意廐焚子退朝曰傷人乎不問馬非不愛馬然恐傷人之意多故未暇問蓋貴人賤畜理當如此君賜食必正席先嘗之君賜腥必熟而薦之君賜生必畜之正席先嘗如對君也腥生肉熟而薦之祖考榮君賜也畜之者仁君之惠無故不敢殺也侍食於君君祭先飯不祭而先飯若為君嘗食然不敢當客禮也疾君視之東首加朝服拖紳東首以受生氣也病臥不能著衣束帶又不可以褻服見君故加朝服於身又引大帶於上也君命召不俟駕行矣急趨君命行出而駕車隨之此一節記孔子事君之禮入太廟每事問朋友死無所歸曰於我殯朋友之饋雖車馬非祭肉不拜朋友有通財之義故雖車馬之重不拜祭肉則拜者敬其祖考同於已親也此一節記孔子交朋友之道寢不尸居不容范氏曰惰慢之氣不設於身體雖舒布其四體而未嘗肆耳居不容非惰也但不若奉祭祀見賓客而已申申夭夭是也見齊衰者雖狎必變見冕者與瞽者雖褻必以貌狎謂素親狎褻謂燕見貌禮貌凶服者式之式負版者式車前横木有所敬則俯而慿之負版持邦國圖籍者式此二者哀有喪重民數也有盛饌必變色而作敬主人之禮非以其饌也迅雷風烈必變迅速也烈猛也必變者所以敬天之怒記曰若有疾風迅雷甚雨則必變雖夜必興衣服冠而坐升車必正立執綏綏挽以上車之索也范氏曰正立執綏則心體無不正而誠意肅恭矣蓋君子莊敬無所不在升車則見於此也車中不内顧不疾言不親指此一節記孔子升車之容閔子侍側誾誾如也子路行行如也冉有子貢侃侃如也子樂朱子曰誾侃義見鄉黨行行剛強之貌子樂者樂得英才而敎育之若由也不得其死然尹氏曰子路剛強有不得其死之理故因以戒之其後子路卒死於衛孔悝之難或問誾誾侃侃於前篇之訓其亦通已乎曰誾誾者外和内剛徳氣深厚所謂和說而諍者也侃侃則和順不足而剛直稍外見矣前篇之訓樂故侃侃直而果故行行有諸中形於外莫揜也按鄉黨注引許氏說文侃侃剛直也誾誾和說而諍或問二字之訓不同說文為得何也曰太史公稱魯道之衰洙泗之間齗齗如也亦作誾誾說者以為爭譲之意而晉人亦有侃侃正色之語蓋以音義求之亦宜如此說文之訓所以為得也誾誾之為中正義有不盡衎衎而樂自作衎不作侃也後漢書云誾誾衎衎得禮之容寢黙抑心非朝廷福其意亦以爭辯剛直為是而有此言但侃字誤作衎爾朱張二先生誾侃之訓不同更當詳玩子路曽晳冉有公西華侍坐子曰以吾一日長乎爾毋吾以也居則曰不吾知也如或知爾則何以哉子路率爾而對曰千乘之國攝乎大國之間加之以師旅因之以饑饉由也為之比及三年可使有勇且知方也夫子哂之朱子曰率爾輕遽之貌方向也謂向義也民向義則能親其上死其長矣哂微笑也求爾何如對曰方六七十如五六十求也為之比及三年可使足民如其禮樂以俟君子赤爾何如對曰非曰能之願學焉宗廟之事如㑹同端章甫願為小相焉宗廟之事謂祭祀諸侯時見曰㑹衆頫曰同端𤣥端服章甫禮冠相賛君之禮者㸃爾何如鼔瑟希鏗爾舍瑟而作對曰異乎三子者之撰希間歇也作起也撰具也子曰何傷乎亦各言其志也曰莫春者春服旣成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸夫子喟然嘆曰吾與㸃也曽㸃之學蓋有以見夫人欲盡處天理流行隨處充滿無少欠闕故其動靜之際從容如此而其言志則又不過即其所居之位樂其日用之常初無舍己為人之意而其胸次悠然直與天地萬物上下同流各得其所之妙隠然自見於言外視三子之規規於事為之末者氣象不侔矣故夫子嘆息而深許之三子者出曽晳後曽晳曰夫三子者之言何如子曰亦各言其志也已矣曰夫子何哂由也曰為國以禮其言不讓是故哂之唯求則非邦也與安見方六七十如五六十而非邦也者唯赤則非邦也與宗廟㑹同非諸侯而何赤也為之小孰能為之大程子曰古之學者優柔厭飫有先後之序如子路冉有公西赤言志如此夫子許之亦以此自是實事後之學者好高如人游心千里之外然自身却只在此又曰孔子與㸃蓋與聖人之志同便是堯舜氣象也誠異乎三子之撰特行有不掩焉耳此所謂狂也子路等所見者小子路只為不達為國以禮道理是以哂之若達却便是這氣象也又曰三子皆欲得國而治之故孔子不取曽㸃狂者也未必能為聖人之事而能知夫子之志故曰浴乎沂風乎舞雩詠而歸言樂而得其所也孔子之志在於老者安之朋友信之少者懐之使萬物各遂其性曽㸃知之故孔子喟然歎曰吾與㸃也又曰曽㸃漆雕開已見大意集義謝氏論佛學之失曰為他不窮天理只將拈匙把筯日用底便承當做大事大事任意縱横將來作用便是差處便是私處問作用何故是私曰把來作用做弄便是做兩般看當了是將此事横在肚裏一如子路冉有相似便被他曽㸃將冷眼看他只管獨對春風吟詠肚裏渾没些能解豈不快活又問堯舜湯武做底事業豈不是作用曰他做底事業只是與天理合一幾曽做作横在肚裏他見做出許多掀天動地蓋世底功業如太空中一㸃雲相似他把做甚麽又引呂氏詩云函丈從容問且酬展才無不至諸侯可憐曽㸃惟鳴瑟獨對春風詠不休謝氏之說集註不取今附此或問夫子何以與㸃也曰方三子之競言所志也㸃獨鼓瑟於其間漠然若無所聞者及夫子問之然後瑟音少間乃徐舍瑟而起對焉而悠然遜避若終不肯見所為者及夫子慰而安之然後不得已而發其言焉而其志之所存又未嘗少出其位蓋澹然若將終身焉者此夫子所以與之也曰何以言其與天地萬物各得其所也曰夫暮春之日生物暢茂之時也春服旣成人體和適之候也冠者五六人童子六七人少長有序而和也沂上舞雩魯國之勝處也旣浴而風又詠而歸樂而得其所也夫以所居之位而言其樂若止於一身然以其心論之則固藹然天地生萬物之心聖人對時育物之事也夫又安有物我内外之間哉程子以為與聖人之志同便是堯舜氣象正謂此爾或曰曽晳胸中無一毫能事列子御風之事近之其說然乎曰聖賢之心所以異於佛老者正以無意必固我之累而所謂天地生物之心對時育物之事者未始一息而停也若但曰曠然無所倚著而不察乎此此則亦何以異於虚無寂滅之學而豈聖人之事哉曽㸃之志如鳳凰翔于千仞之上故曰異乎三子之撰只看他鼔瑟希鏗爾舍瑟而作從容優裕悠然自得處無不是這個道理人之一身便是天地只縁人為人欲隔了自看此理意思不見曽㸃却超然看破這意思曽㸃於道見其逺者大者而視其近與小者皆不足為故其言超然無一毫作為之意唯欲樂其所樂以終身焉耳先生令門人說曽㸃之志門人以為只是樂其性分而已日用間見得天理流行才著一毫私意去安排便不得曰不是不要著私意去安排這道理自是天生自然私意自著不得更待誰去安排與聖人安老懐少信朋友底意思相似惟曽㸃見得到這裏聖人便做得到這裏人只是說曽㸃狂看夫子特與之之意須是大段高縁他資質明敏洞然自得見斯道之體看天下甚麽事能動得他他大綱如莊子明道先生亦稱莊子云有大底意思又云莊生形容道體儘有好處曽㸃見得大意然裏面工夫却疎略明道亦云莊子無禮無本問曽㸃浴沂氣象與顔子樂底意思相近否曰顔子恬靜無許多事曽㸃是自恁地說顔子是孔子稱他樂他不曽自說我樂問吾與㸃處程子謂便是堯舜氣象如何曰曽㸃却只是見得未必能做堯舜事看其見到處直有堯舜氣象如莊子亦見得堯舜分曉或問天王之用心何如便說得天徳而出寧日月照而四時行若晝夜之有經雲行而雨施以是知他見得堯舜氣象出曽㸃見識儘高見得此理洞然只是未曽下得工夫㸃參父子正相反以㸃如此高明參却魯鈍一向低頭捱將去直到一貫方始透徹此時見識方到曽㸃地位然而規模氣象又别此一段唯上蔡見分曉蓋三子只就事上見得此道理曽㸃只去自己心性上見得箇中庸道理使曽㸃做三子事未必做得然曽㸃見處雖堯舜事業亦不過以此為之而已諸子皆有安排期必之意曽㸃只以平日所樂處言之曽㸃見得道理大所以堯舜事業優為之視三子規規於事為之末固有間矣是他見得聖人氣象如此雖超然事物之外而實不離乎事物之中是個無事無為底道理却做有事有為底功業此所謂大本所謂忠所謂一者是也㸃操得柄􅀈據著源頭諸子則從支流上做工夫諸子底小他底大觀季武子死曽㸃倚門而歌便有些莊老底意思曽㸃言志云云蓋其見道分明無所係累從容和樂欲與萬物各得其所之意莫不藹然見於詞氣之間明道謂與聖人之志同便是堯舜氣象者正指此而言之也嚴時亨問曽晳一章夫子旣語以居則曰不吾知也如或知爾則何以哉正是使之盡言一旦進用何以自見及三子自述其才之所能堪志之所欲為夫子皆不許之而獨與曽㸃看來三子所言皆是實事曽㸃雖答言志之問實未嘗言其志之所欲為有似逍遥物外不屑當世之務者而聖人與此而不與彼何也嘗因是而思之為學與為治本來只是一統事他日之所用不外乎今日所存三子却分作兩截看如治軍旅治財賦治禮樂與凡天下之事皆學者所當理㑹無一件是少得底然須先理㑹自家身心使自得無欲常常神清氣定涵養直到清明在躬志氣如神則天下無不可為之事程子所謂不得以天下事物撓已已立後自能了當得天下事物者是矣夫子嘗因孟武伯之問而言由可治賦求可為宰赤可與賓客言固已深知其才所能辦而獨不許其仁夫仁者體無不具用無不該豈但止於一才一藝而已使三子不自安於所已能孜孜惟求仁是務而好之樂之則何睱規規於事為之末縁他有這能解横在胸中常恐無以自見故心欲得國而治之一旦夫子之問有以觸其機即各述所能凡聖門平日所以講切自身受用處全不之及將為學為治作兩截看了所以氣象不宏事業不能到得至處如曽㸃浴沂風雩自得其樂却與夫子飯蔬食飲水樂在其中顔子陋巷簞瓢不改其樂襟懐相似大抵士之未用須知舉天下之物不足以易吾天理自然之安方是本分學者曽㸃言志乃是素其位而行不願乎其外無入而不自得者故程子以為樂而得其所也孟子謂廣土衆民君子欲之所樂不存焉中天下而立定四海之民君子樂之所性不存焉君子所性雖大行不加焉雖窮居不損焉分定故也孟子所謂所性即孔子顔子曽㸃之所樂顔子惟所樂如此故夫子以四代禮樂許之浴沂風雩識者所以知堯舜事業曽㸃優為之也如子路食於孔悝求也為季氏聚歛後來成就止於如此正為他不知平日所養便是建功立業之本未到無入不自得處夫子之不與其有以知之矣所見如此不背馳否朱子答曰此段說得極有本末學者立志要當如此然其用力却有次第已為希遜言之矣按先生答歐陽希遜云學者當循下學上達之序若一向求曽晳見解未有不流於釋老者也南軒曰三子之對非偶然而言蓋體察其力之所至而言其實也言三年而可使如此者其先後條貫素定於胸中而知其然也向使用力不素驟聞聖人之問非茫乎無所措則泛然肆其說矣至於曽晳則又異乎是其鼓瑟舍瑟之間已可見其從容不廹之意矣言暮春之時與數子者浴沂舞雩吟詠而歸蓋其中心和樂無所係累油然欲與萬物俱得其所玩味辭氣温乎如春陽之無不被也故程子以為此即是堯舜氣象而亦夫子老安少懐之意也晳之志若此非其見道之明涵泳有素其能然乎然而未免於行有不揜焉則以其於顔氏工夫有所未盡耳黄氏曰觀夫子逝如斯之言欲無言之意是亦歎曽㸃之意也又曰夫子以是與㸃矣獨不以是教門人何也曰夫子未嘗不以是教門人也誨之以務内語之以求仁無非使之存此心之天理也又曰晳之不免為狂何也曰天下之理固根於人心而未嘗不形見於事物為學之方固當存養於徳性而亦不可不省察乎實行夫是以精粗不遺而表裏相應内外交養而動靜如一然後可以為聖學之全功㸃之質甚高志甚大然深厚沉潜淳實中正之意有未足則見高而遺卑見大而略小此所以不及乎顔曽也師冕見及階子曰階也及席子曰席也皆坐子告之曰某在斯某在斯師冕出子張問曰與師言之道與朱子曰聖門學者於夫子之一言一動無不存心省察如此子曰然固相師之道也相助也古者瞽必有相其道如此蓋聖人於此非作意而為之但盡其道而已尹氏曰聖人處己為人其心一致無不盡其誠故也有志於學者求聖人之心於斯可見矣范氏曰聖人不侮鰥寡不虐無告可見於此推之天下無一物不得其所矣或問卒章之說曰張敬夫推之尤詳曰道無往而不存聖人之動靜語黙無往而非道蓋各止於其所而已師冕之見及階則告之階及席則告之席旣坐則歴告之以在坐者蓋待瞽者之道當然耳子張竊窺而有問焉夫子以為固相師之道辭則近而意無不盡矣事事物物莫不有其道蓋所當然者天之所為也夫以一日之間起居則有起居之道飲食則有飲食之道見是人則有待是人之道遇是事則有處是事之道不可須㬰離也一失所宜則廢是道矣是故君子戰兢自持顛沛必於是造次必於是惟懼其失之也夫惟天下之至誠一以貫之道之所在如影隨形蓋無往而非是也謝先生為朱震子發說論語首舉子見齊衰者與冕衣裳者與瞽者見之雖少必作過之必趨又舉師冕見及階子曰階也及席子曰席也皆坐子曰某在斯某在斯子張問曰與師言之道與曰固相師之道也夫聖人之道無微顯無内外由洒掃應對進退而上達天道本末一以貫之一部論語只恁地看子夏曰君子有三變望之儼然即之也温聽其言也厲朱子曰儼然者貌之莊温者色之和厲者辭之確程子曰他人儼然則不温温則不厲惟孔子全之謝氏曰此非有意於變蓋並行而不相悖也如良玉温潤而栗然南軒曰其為三變豈君子之強為之哉禮樂無斯須而去身故其成就發見如此孟子曰仁義禮智根於心其生色也睟然見於面盎於背施於四體四體不言而喻程子曰言四者本於心而生色也孟子非自及此焉能道到此又曰人必有仁義之心然後仁義之氣睟然達於外故曰不得於心勿求於氣可也程子曰仲尼元氣也顔子春生也孟子并秋殺盡見仲尼無所不包顔子示不違如愚之學於後世有自然之和氣不言而化者也孟子則露其材蓋亦自然而已仲尼天地也顔子和風慶雲也孟子泰山巖巖之氣象也觀其言皆可見之矣仲尼無跡顔子微有跡孟子其跡著謝氏曰顔子具體而微所謂具體者合下來有恁地氣象但未彰著耳孟子強勇以身任道壁立萬仞誰敢正覷著非孟子恁地手脚也撑拄此事不去雖然猶有大底氣象未能消磨得盡不然藐大人等語言不說出來孔子曰事君盡禮人以為謟當時諸國君相怎生當得他聖人恁地禮數是他只管行禮又不與你計較長短與上大夫言便誾誾與下大夫言便侃侃冕者瞽者見之便作過之便趨蓋其徳全盛自然到此不是勉強做出來與孟子全别豫章黄氏曰周茂叔胸中灑落如光風霽月延平先生李氏以為善形容有道者氣象朱子曰濓溪清和孔經甫祭文曰公年壯盛玉色金聲從容和毅一座皆傾墓誌亦謂其精宻嚴恕氣象可想矣又曰所謂灑落者只是形容一個不疑所行清明高逺之意若有一毫私吝心何處更有此等氣象耶能如此看有道者胸懐表表亦自可見伊川先生曰明道先生資禀旣異而充養有道純粹如精金温潤如良玉寛而有制和而不流忠誠貫於金石孝悌通於神明視其色其接物也如春陽之温聽其言其入人也如時雨之潤胸懐洞然徹視無間測其藴則浩乎若滄溟之無際極其徳美言蓋不足以形容先生行己内主於敬而行之以恕見善若出諸己不欲勿施於人居廣居而行大道言有物而動有常謝氏曰明道先生坐如泥塑人接人則渾如一團和氣又云學者須是襟懐擺脫得開始得明道在鄠縣時有詩云雲淡風輕近午天望花隨栁過前川旁人不識予心樂將謂偷閒學少年看他襟懐直是好與曽㸃底事一般侯師聖云朱公掞見明道于汝歸謂人曰光庭在春風中坐了一個月游楊初見伊川伊川瞑目而坐二子侍立旣覺顧謂曰賢軰尚在此乎日旣晩且休矣及出門門外之雪深一尺其嚴厲如此晩年乃更平易蓋其學已到至處但於聖人氣象差少從容爾明道則已從容惜其早死不及用也使及用於元祐間則不至有今日事矣劉安禮云明道先生徳性充完粹和之氣盎於面背樂易多恕終日怡悅立之從先生三十年未嘗見其忿厲之容右論聖賢氣象程子嘗言學者不學聖人則己欲學之須熟玩味聖人之氣象故近思録亦立此篇今放之然近思所録併及其道徳學行此則専取其儀形辭氣之可以想像而興起者若道徳學行則别見云論語子曰君子不器朱子曰器者各適其用而不能相通成徳之士體無不具故用無不周非特為一才一藝而已南軒曰器者拘於一用凡人可以器言者皆以其才而論之也器雖有小大然其拘於才而有限則一也若君子則進於徳進於徳則器質變化而才有弗器者矣不亦君子乎先行其言而後從之與訥言敏行章已見前子曰君子無所爭必也射乎揖讓而升下而飲其爭也君子朱子曰揖讓而升者大射之禮耦進三揖而後升堂也下而飲謂射畢揖降以俟衆耦皆降勝者乃揖不勝者升取觶立飲也言君子恭遜不與人爭惟於射而後有爭然其爭也雍容揖遜乃如此則其爭也君子而非小人之爭矣南軒曰爭生於有己君子克己者也是以無所爭惟射疑於可爭而君子之於射於以正己而觀徳耳揖讓而升揖讓而下揖讓而飲其雍容辭遜自反而下人之意蓋如此然則君子其爭乎於射而不爭則他可知矣司馬牛問君子與君子人與章已見前子曰質勝文則野文勝質則史文質彬彬然後君子朱子曰野人言鄙略也史掌文書多聞習事而誠或不足也彬彬猶班班物相雜而適均之貌言學者當損有餘補不足至於成徳則不期然而然矣楊氏曰文質不可以相勝然質之勝文猶之甘可以受和白可以受采也文勝而至於滅質則其本亡矣雖有文將安施乎然則與其史也寧野南軒曰以二者論之若未得中而有所偏勝與其失而為府史無亦寧為野人之野乎棘子成曰君子質而已矣何以文為子貢曰惜乎夫子之說君子也駟不及舌文猶質也質猶文也虎豹之鞟猶犬羊之鞟朱子曰鞟皮去毛者也言文質等耳不可相無若必盡去其文而獨存其質則君子小人無以辨矣夫棘子成矯當時之弊固失之過而子貢矯子成之弊又無本末輕重之差胥失之矣或問棘子成之言與夫子之答林放何異而子貢非之若是耶曰夫子之言權衡審宻而詞氣和平蓋未始以文為可盡去也若子成則詞氣矯激而取舍過中矣其流之弊將至於棄禮蔑法如西晉君子之為者故子貢惜其言而力正之也曰何以言子貢之言之有病也曰子成之說偏矣而子貢於文質之間又一視之而無本末輕重緩急之差焉則又矯子成之失而過中者也立言之難如此自非聖人孰能無所偏倚而常適其平也哉恥言過行及君子道者三子路問君子義以為質章並見前子曰君子病無能焉不病人之不已知也南軒曰病無能者病夫履行之無其實子曰君子疾没世而名不稱焉范氏曰君子學以為己不求人知然没世而名不稱焉則無為善之實可知矣南軒曰有是實則有是名名者所以命其實終其身而無實之可名君子病諸非謂求名於人也子曰君子矜而不爭羣而不黨朱子曰莊以持己曰矜然無乖戾之心故不爭和以處衆曰羣然無阿比之意故不黨南軒曰矜莊以自持則易以不和而失於爭羣居而相與則易以有比而失於黨君子非與人異也處己嚴而不失其和故矜而不爭君子非與人同也待物平而不失其公故羣而不黨惟敬者為能處此而弗失也子曰君子不以言舉人不以人廢言南軒曰以言舉人則行不踐者進矣此固不可也然則雖使小人言之而善亦不害其為善言也以人廢之則善言棄矣故君子云云公心無蔽也子曰君子貞而不諒朱子曰貞正而固也諒則不擇是非而必於信或問貞諒之别曰處義旣精不期固而自固者貞也不擇邪正惟知必信而不易者諒也南軒曰貞者貞於義也諒者執於小信也貞於義則信在其中若但執其小信而於義有蔽則失其正而反害於信矣蓋貞於義者公理所存而執小信者私意之守而已君子有三戒三畏與九思三變章並見前五美章以上言君子之道子張問善人之道子曰不踐迹亦不入於室朱子曰善人質美而未學者也程子曰踐迹如言循途守轍善人雖不必踐舊迹而自不為惡然亦不能入聖人之室也張子曰善人欲仁而未志於學者也欲仁故雖不踐成法亦不陷於惡有諸己也由不學故無自而入聖人之室或問善人者未能有諸已乎南軒曰不能有之則安得善然所謂有諸己者蓋亦有淺深善人謂其不能有諸己則不可然謂其盡夫有諸己之道則未也此章言善人之道子張問士何如斯可謂之達矣朱子曰達者謂徳孚於人而行無不得之謂子曰何哉爾所謂達者子張務外夫子蓋己知其發問之意故反詰之將以發其病而藥之也子張對曰在邦必聞在家必聞言名譽著聞也子曰是聞也非達也聞與達相似而不同乃誠偽之所以分學者不可不審也故夫子旣明辨之而下文又詳言之夫達也者質直而好義察言而觀色慮以下人在邦必達在家必達内主忠信而所行合宜審於接物而卑以自牧皆自修於内不求人知之事然徳修於己而人信之則所行自無窒礙矣夫聞也者色取仁而行違居之不疑在邦必聞在家必聞善其顔色以取於仁而行實背之又自以為是而無所忌憚此不務實而専求名者故虛譽雖隆而實徳則病矣程子曰學者須是務實不要近名有意近名大本已失更學何事為名而學則是偽也今之學者大抵為名為名與為利雖清濁不同然其利心則一也尹氏曰子張之學病在乎不務實故孔子告之皆篤實之事充乎内而發乎外者也聞只是求聞於人達却有實有實方能達色取仁而行違居之不疑正是指子張病痛處問察言而觀色曰此是實要做工夫察人之言觀人之色乃是要騐吾之言是與不是今有人自任己意說將去更不看人之意是信受他是不信受他如此則只是自高更不能謙下於人實去做工夫大抵人之為學須自低下做將去才自高了便不濟事這一項都是詳細収歛工夫如色取仁居之不疑只是麄謾將去此章大意一箇是名一箇是實呂氏謂徳孚於人者必達矯行求名者必聞此說却好質與直是兩件質是質朴直是無偏曲南軒曰聖人論達蓋為己篤實工夫若有求聞之意則其心外馳矣色取仁者其色則有取於仁其行則違如内交要譽惡其聲之類一毫萌於中皆所謂行違也雖然使其有所不安於心則庻乎可使之反者惟其居之不疑則終為不仁而已矣又曰聞與達異聞謂人知之達謂道行於邦家也子貢問曰何如斯可謂之士矣子曰行己有恥使於四方不辱君命可謂士矣朱子曰此其志有所不為而其材足以有為者也子貢能言故以使事告之蓋為使之難不獨貴於能言而已曰敢問其次曰宗族稱孝焉鄉黨稱弟焉此本立而材不足者故為其次曰敢問其次曰言必信行必果硜硜然小人哉抑亦可以為次矣果必行也硜小石之堅確者小人言其識量之淺狹也此其本末皆無足觀然亦不害於自守也故聖人猶有取焉下此則市井之人不復可為士矣曰今之從政者何如子曰噫斗筲之人何足算也算亦作筭今之從政蓋如魯三家之屬噫心不平聲斗量名容十升筲竹器容斗二升斗筲之人言鄙細也算數也子貢之問每下故夫子以是警之程子曰子貢之意蓋欲為皎皎之行聞於人者夫子告之皆篤實自得之事晁氏曰尊義於己不窮於外士之上也僅能有義於己而未能不窮於外士之次也孝弟親於宗族鄉黨特行己有恥之事或問行己有恥為使不辱亦何足以為高而夫子以為士之上何邪曰是二者泛而觀之雖若僅免於羞辱然嘗反諸身而度之則能充其實者正不易得程子所謂篤實自得者正謂此也曰硜硜小人而亦可以為士何也曰彼其識量雖淺而非惡也至其所守雖規規於信果之小節然與夫誕謾茍賤之人則不可同年而語矣此與不得中行而取狂狷同意故下章言之子路問何如斯可謂之士章見前子曰士而懐居不足以為士矣朱子曰居謂意所便安也南軒曰懐居者志不立其何以為士乎愚按懐居與小人懐土之義同周有八士伯達伯适仲突仲忽叔夜叔夏季隨季騧楊氏曰盡為士之道子張曰士見危致命章見前孟子曰待文王而後興者凡民也若夫豪傑之士雖無文王猶興朱子曰興者感動奮發之意豪傑有過人之才知者也蓋降衷秉彛人所同得惟上智之材無物欲之蔽為能無待於教而自能感發以有為也士尚志章見前以上言為士之道子路問成人子曰若臧武仲之知公綽之不欲卞莊子之勇冉求之藝文之以禮樂亦可以為成人矣朱子曰成人猶言全人言兼此四子之長則知足以窮理亷足以養心勇足以力行藝足以泛應而又節之以禮和之以樂使徳成於中而文見乎外則材全徳備渾然不見一善成名之迹中正和樂粹然無復偏倚駁雜之蔽而其為人也亦成矣然亦之為言非其至者蓋就子路之所可及而語之也若論其至則非聖人之盡人道不足以語此曰今之成人者何必然見利思義見危授命乆要不忘平生之言亦可以為成人矣復加曰字者旣答而復言也授命言不愛其生持以與人也久要舊約也平生平日也有是忠信之實則雖其才知禮樂有所未備亦可以為成人之次也程子曰知之明信之篤行之果天下之達徳也若孔子所謂成人亦不出此三者武仲知也公綽仁也卞莊子勇也冉求藝也須是合此四人之能文之以禮樂亦可以為成人矣然而論其大成則不止於此若今之成人有忠信而不及於禮樂則又其次者也又曰臧武仲之知非正也若文之以禮樂則無不正矣又曰語成人之名非聖人孰能之孟子曰惟聖人然後可以踐形如此方可以稱成人之名胡氏曰今之成人以下乃子路之言蓋不復聞斯行之之勇而有終身誦之之固矣未詳是否或問四子之事曰武仲則春秋傳詳矣公綽他無所見而前章所稱亦可以得其為人卞莊子事見新序曰莊子養母戰而三北及母死齊伐魯莊子赴闘三獲甲首以獻曰此塞三北遂赴齊師殺十人而死冉求之藝則夫子固嘗稱之矣曰必兼四子之長而又必文之以禮樂然後可以為成人何也曰四子各有所長而不能相兼又無禮樂以文之故知者至於要君勇者至於輕死藝者至於聚歛而不欲者又或不能於小國之大夫也亦難以為成人矣故孔子言必兼此四人之能而又文之以禮樂則集其所長去其所短而後可以為成人也洪氏以為特以四人為言者四人皆魯人而莊子於子路皆卞人冉求又朋友也舉其近而易知者胡氏以為言卞莊子蓋以況子路耳言有是一能而不能兼衆之長與成於禮樂焉則亦不足為成人矣恐亦有此意也曰今之成人以下或以為子路之言何如曰未可知也然姑存之以備參考可也胡氏曰此子路之所己能也夫子方進子路於成人之域豈又取其己能者而重奬之哉蓋子路晩節末路不復聞斯行之之勇而有終身誦之之固是以自名其善而為此辭與未見其止者異矣文之以禮樂此一句最重上面四人所長且把做個樸素子唯文之以禮樂始得南軒曰文之以禮樂道問學之事也又言其次者聖人所以引而進也見利思義無茍得也見危授命無茍避也久要不忘不食其言也是雖未有過人之才而亦篤實忠信之士也故在今日亦可謂成人此亦思狂狷之意此章言成人子曰聖人吾不得而見之矣得見君子者斯可矣善人吾不得而見之矣得見有恒者斯可矣亡而為有虛而為盈約而為泰難乎有恒矣朱子曰亡讀為無三者皆虛夸之事凡若此者必不能守其常也或問云云曰吳氏曽氏說亦得之吳氏曰君子蓋有賢良而又有作用者特不及聖人耳若善人則粗能嗣守成緒不至於為惡而已非若君子之能有為也曽氏曰當夫子時聖人固不可得而見豈無君子善人有常者乎而夫子云然者蓋其人少而思見之也及其見則又悅而進之曰君子哉若人凡此類當得意而忘言善人明乎善者也有常雖未明乎善亦必有一節終身不易者若本無一長而為有之狀未能充實而為盈之狀貧約而為泰之狀此亦妄人而已矣孟子所謂雨集溝澮皆盈其涸可立而待也烏能久矣曰有亡虛實約泰之分奈何曰無絶無也虛則未滿之名耳二者兼内外學之所至事之所能而言約之與泰則貧富貴賤之稱耳為之云者作為如是之形作為如是之事者也為而無以繼則雖欲為有常不可得矣釋曰亡為有虚為盈約為泰三者夸大欺妄之意不實之謂也人惟實也則始終如一故能有常今其人不實如此又豈敢望其有常哉夫子稱聖人君子有恒不可得見而卒反乎此又以明夫有恒者之亦不可見也言舉世皆虚浮之徒豈敢望其有常而得見之哉嘆風俗之益薄也南軒曰聖人君子以學言善人有恒者以質言聖人者肖天地者也君子者具其體而未能充盡者也故聖人不得而見得見君子斯可矣善人資禀醇篤無惡之稱有恒者則能謹守常分而已故善人不得而見得見有恒者斯可矣雖然以善人之質而進學不已聖蓋可幾有恒者力加勉焉亦足以有至也若夫以無而為有以虚而為實在約以為泰則是驕矜浮虚不務實者其能以有恒乎未能言恒況可言學乎此章言聖人君子善人有恒之分子曰君子周而不比小人比而不周朱子曰周普徧也比偏黨也皆與人親厚之意但周公而比私耳君子小人所為不同如隂陽晝夜每每相反然究其所以分則在公私之際毫釐之差耳故聖人於周比和同驕泰之屬常對舉而互言之欲學者察乎兩間而審其取舍之幾也南軒曰君子小人之分公私之間而已周則不比比則不周天理人欲不並立也君子内恕以及人其於親踈逺近賢愚處之無不得其分蓋其施無不溥焉所謂周也若小人則有所偏係而失其正其所親䁥皆私情耳所謂比也子曰君子懐徳小人懐土君子懐刑小人懐惠朱子曰懐思念也懐徳謂存其固有之善懐土謂溺其所處之安懐刑謂畏法懐惠謂貪利君子小人趣向不同公私之間而已尹氏曰樂善惡不善所以為君子茍安務得所以為小人或問君子小人安知不以位言耶曰以例求之凡言君子小人而相須者則君民之謂如愛人易使之類是也言君子小人而相反者則善惡之謂也如周比和同之類是也此蓋以相反為言云云又問懐刑之說以為惡不善何也曰樂善惡不善猶曰好仁惡不仁也必以刑為言則猶管仲所謂畏威如疾之謂耳南軒曰懐徳懐刑好善惡惡之公心也懐土懐恵茍安務得之私意也喻義喻利章己見前子曰君子坦蕩蕩小人長戚戚朱子曰坦平蕩蕩寛廣貌程子曰君子循理故常舒泰小人役於物欲故多憂戚程子曰君子坦蕩蕩心廣體胖南軒曰正己而不求於人故坦蕩蕩狥欲而不反諸己故長戚戚坦蕩非謂放懐自適無所憂慮之謂也謂求之在己而無必於外故常舒泰云耳子曰君子成人之美不成人之惡小人反是朱子曰成者誘掖奬勸以成其事也君子小人旣有厚薄之殊而其所好又有善惡之異故其用心不同如此南軒曰君子充其忠愛之心於人之美其樂之如在己也從而扶持之又從而勸相之惟欲其美之成也於人之惡則從而正救之正救之不可則哀矜之惟恐其惡之成也若小人則以刻薄為心幸人之有過而疾人之勝己非徒坐視其入於惡又從而濟之非徒欲其美之不成又從而毁之君子小人之操存未嘗不相反也子曰君子和而不同小人同而不和朱子曰和者無乖戾之心同者有阿比之意尹氏曰君子尚義故有不同小人尚利安得而和或問云云曰諸說皆祖晏子之意然晏子之言乃就事而言而此章之意則直指君子小人之情狀而言似不可引以為證也蓋此所論君子之和者乃以其同寅恊恭而無乖爭忌刻之意其不同者乃以其守正循理而無阿黨朋比之風若小人則反是焉此二者外雖相似而内實相反乃君子小人情狀之隠微自古至今如出一轍非聖人不能究極而發明之也且以本朝諸公論之韓富范公上前議論不同或至失色而卒未嘗失和氣王呂章曽蔡氏父子同惡相濟而其䆒也無所不至焉亦足以驗聖言之不可易也如此說則君子之心無可否同異之私而惟欲必歸於是若晏子之說則是必於立異然後可以為和而不同也是非矯枉過直之論哉然其為齊景公梁丘據而發明切中其病耳子曰君子易事而難悅也悅之不以道不悅也及其使人也器之小人難事而易悅也悅之雖不以道悅也及其使人也求備焉朱子曰器之謂隨其材器而使之也君子之心公而恕小人之心私而刻天理人欲之間每相反而已矣南軒曰易事者平恕之心難悅者正大之情子曰君子泰而不驕小人驕而不泰朱子曰君子循理故安舒而不矜肆小人逞欲故反是南軒曰泰者心廣而體胖驕者意盈而氣盛曰驕則何由泰泰則奚驕之有然而能不驕矣而未之泰者則亦有之蓋雖能制其私而涵養未至未免乎拘迫者也君子而不仁章已見前子曰君子上達小人下達朱子曰君子循天理故日進乎高明小人狥人欲故日究於汚下按張子曰上達循天理下達狥人欲朱子之說本此南軒曰上達反本下達趨末皆云達者如喻義喻利同言喻固窮窮斯濫章見前子曰君子求諸己小人求諸人謝氏曰君子無不反求諸己小人反是此君子小人所以分也楊氏曰君子雖不病人之不己知然亦疾没世而名不稱也雖疾没世而名不稱然所以求者亦反諸己而已小人求諸人故違道干譽無所不至二者文不相蒙而意實相足亦記言者之意按此章在病人不已知與疾沒世名不稱之次故楊氏云云朱子有說見學篇子曰君子不可小知而可大受也小人不可大受而可小知也朱子曰此言觀人之法知我知之也受彼所受也蓋君子于細事未必可觀而材徳足以任重小人雖器量淺狹而未必無一長可取吳氏曰方舜之耕稼時視之猶人也一旦受堯之天下若素有之小人有立談之間其材可知者至委以國則未有不敗南軒曰君子所存者大故不可以小者測知而可以當其大者小人局於狹小其長易見故不可以任大而可以小知之大受如學者之學聖人有為者之當大任也右論君子小人之分學所以學為君子者也故先之以君子之道次之以善人之道又次之以士之道與成人之道然後及君子小人之分學者誠能深玩乎此則其願為君子而不願為小人也必矣西山讀書記卷三十二
