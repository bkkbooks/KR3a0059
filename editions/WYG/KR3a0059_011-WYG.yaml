body:
  text: 西山讀書記卷十一宋真徳秀撰父子書舜典慎徽五典五典克從書臯陶謨天敘有典勑我五典五惇哉天秩有禮自我五禮有庸哉孔氏曰敘次勑正惇厚秩序也張子曰生有先後所以為天敘小大高下相並而相形焉是謂天秩知序然後經正知秩然後禮行蘇氏曰父義母慈兄友弟恭子孝皆出於民性之自然為此敘者非天乎我特從而正之使益厚耳此論當矣其論五禮則以鳥獸悲歡言之是雜以情言也今不取又按五禮孔子以為公侯伯子男先儒又以為吉凶軍賔嘉近世蔡氏曰敘者君臣父子夫婦兄弟朋友之倫敘秩者尊卑貴賤等級隆殺之品秩於義為得孝經子曰父子之道天性君臣之義父母生之續莫大焉君親臨之厚莫重焉故不愛其親而愛他人者謂之悖徳不敬其親而敬他人者謂之悖禮朱子曰君臣之義下當有錯簡愚按此章蓋謂父子之道本於天性之自然父子之道即君臣之義也父母生我者也我則嗣續乎父母者天性之恩孰大焉君之臨臣父之臨子所以治而教之也其厚乎我孰重焉合君親而並言以見父子君臣其義一也世以父子為天君臣為人者誤矣下文獨言親者蓋指天性之最切者知愛敬乎親則知愛敬乎君矣孟子曰人之所不學而能者其良能也所不慮而知者其良知也朱子曰良者本然之善也程子曰良知良能皆無所由乃出於天不係於人孩提之童無不知愛其親也及其長也無不知敬其兄也孩提二三嵗之間知孩笑可提抱者也愛親敬長所謂良知良能者也親親仁也敬長義也無他達之天下也言親親敬長雖一人之私然逹之天下無不同者所以為仁義也南軒張氏曰良云者有本然之義有善之義蓋其本然者無非善也不學而能不慮而知則無一毫人為加乎其間天之所為而性之所有也孩提知愛其親及長知敬其兄此其知豈待於慮乎其能豈待於學乎此所謂良知良能也然下文獨言知者蓋知常在先也愛敬者良心之大端蓋親親為仁敬長為義人道不越是而已能存是心而達之則仁義之道不可勝窮矣愚按達之天下二先生之説少異當詳之莊子孔子曰天下有大戒二命也義也子之愛親命也不可解於心臣之事君義也無適而非君也無所逃於天地之間朱子曰莊周云云古今以為名言然以予觀之父子之仁君臣之義莫非天賦之本然民彛之固有彼乃獨以父子為自然而謂君臣之相屬特出於事勢之不得已夫豈然哉一按莊子之引孔子蓋假設之詞又朱子曰程子所謂性中只有仁義禮智曷嘗有孝弟來蓋父子之親兄弟之愛在性中只謂之仁君臣之分朋友之交在性中只謂之義推此言之曰禮曰智無不然者愚按仁義禮智信之性古人謂之五常君臣父子夫婦昆弟朋友之道古人亦謂之五常以性之體而言則曰仁義禮智信以性之用而言則曰君臣之義父子之仁夫婦之别長幼之序朋友之信其實則一而已天下豈有性外之理哉後世儒者乃曰立君臣等上下使父子有禮六親有紀非天之所為乃人之所設而近世復有以為事君父兄出於聖人之所使而制為拜跪之禮以率之者其昧於本原不亦甚哉以上言天性之本然晏子曰君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣共而不貳父慈而教子孝而箴兄愛而友弟敬而順夫和而義妻柔而正姑慈而從婦聽而婉禮之善物也愚按令者出令者也不能出令則非君矣然必不違於理然後可行臣之事君以共為本又必秉心誠一然後可貴令而違則有悖入之患共而貳則有飾貌之偽父慈而不能教則陷子於敗子孝而不能箴則陷父於惡兄能愛弟矣又必有切磋之益如朋友然弟能敬兄矣然禮勝則離故以順濟之夫本剛故貴以和若柔懦暗弱反受制於婦人不得謂之和矣故又主之以義妻本於柔必守之以正而後無邪僻之失從謂姑從其婦聽謂婦聽於姑自父子至夫婦皆二徳相濟惟姑一於慈而從婦一於聽而婉婦姑相與外此則他道也此十者於禮為至善晏子之言真有闗於世教哉禮運父慈子孝兄良弟弟夫義婦聽長惠幼順君仁臣忠十者謂之人義中庸天下之達道五所以行之者三曰君臣也父子也夫婦也昆弟也朋友之交也五者天下之達道也知仁勇三者天下之達徳也所以行之者一也朱子曰達道者天下古今所共由之路即書所謂五典孟子所謂父子有親君臣有義夫婦有别長幼有序朋友有信是也知所以知此也仁所以體此也勇所以强此也謂之達徳者天下古今所同得之理也一則誠而已矣達道雖人所共由然無是三徳則無以行之達徳雖人所同得然一有不誠則人欲間之而徳非其徳矣程子曰所謂誠者正是誠實此三者三者之外更别無誠大學為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信朱子曰父所以慈子所以孝蓋父子本同一氣只是一人之身分成兩箇其恩愛相屬自有不期然而然者其他大倫皆然皆天理使之如此豈容强為哉以上通論孔子曰君子之事親孝故忠可移於君事兄弟故順可移於長居家理故治可移於官是故行成於内而名立於後世矣此章言事親事兄子夏曰賢賢易色事父母能竭其力事君能致其身與朋友交言而有信雖曰未學吾必謂之學矣朱子曰賢人之賢而易其好色之心好善有誠也致猶委也委致其身謂不有其身也四者皆人倫之大者而行之必盡其誠學求如是而已故子夏言有能如是之人茍非生質之美必其務學之至雖或以為未嘗學我必謂之已學也此章兼言事君親交朋友欒共子曰民生於三亊之如一父生之師教之君食之非父不生非食不長非教不知生之族也故一事之唯其所在則致死焉報生以死報賜以力人之道也按國語晉武公伐翼殺哀侯止欒共子曰茍無死吾以子見天子令子為上卿制晉國之政辭曰成聞之云云臣敢以私利廢人之道君何以訓矣遂鬭而死韋氏曰欒共子晉哀侯大夫共叔成也如一服勤至死也族類也一事之事之如一也在君父為君父在師為師賜惠也愚按生之族也謂君之養已師之教已與生我之恩同類也報生以死謂君父師報賜以力謂他人之有賜於我者曲禮曰事親有隱而無犯左右就養無方服勤至死致喪三年鄭氏曰隱謂恐傷親意情有不盡無犯顔而諫左右謂扶持之方猶常也子則然勤勞辱之事致謂戚容稱其服也凡此以恩為制事君有犯而無隱左右就養有方服勤至死方喪三年無隱君臣尚義雖盡情以諫可也有方不可侵官方喪資於事父凡此以義為制事師無犯無隱左右就養無方服勤至死心喪三年無犯無隱言雖盡情猶微而婉心喪戚容如父而無服凡此以恩義之間為制以上言事父君師父之讎弗與共戴天鄭氏曰父者子之天殺已之父與共戴天非孝子也行求殺之乃止兄弟之讎弗反兵恒執殺之備交遊之讎弗同國讎不吾避則殺之交遊或為朋友又周禮調人凡和難父之讎辟諸海外兄弟之讎辟諸千里之外從父兄弟之讎不同國國君之讎眂父師長之讎眂兄弟主友之讎眂從父兄弟鄭氏曰和之使辟於此不得就而仇之主大夫君也蓋調人掌司萬民之難而諧和之故有讎者使之相避是又一義也檀弓子夏問於孔子曰居父母之讎如之何夫子曰寢苫枕干不仕鄭氏曰雖除喪居處猶若喪也弗與共天下也遇諸市朝不反兵而鬬言雖適市朝不釋兵曰請問居昆弟之仇如之何曰仕弗與共國銜君命而使雖遇不鬬為負而廢君命曰請問居從父昆弟之仇如之何曰不為魁主人能則執兵而陪其後魁猶首也以上言復君父昆弟之讎程子曰學者先須識仁仁者渾然與物同體義禮智皆仁也下文云識得此理以誠敬存之而已不須防檢不須窮索若心懈則有防心茍不懈何防之有理有未得故須窮索存久自明安待窮索此道與物無對大不足以明之天地之用皆我之用孟子言萬物皆備於我須反身而誠乃為大樂若反身不誠則猶是二物有對以已合彼終未有之又安得樂訂頑意思乃備言此體以此意存之更有何事必有事焉而勿正心勿忘勿助長未嘗致纎毫之力此其存之之道若存得便合有得蓋良知良能元不喪失以昔日習心未除故須存養此心久則可奪舊習此理至約惟患不能守既能體之而樂亦不患不能守也朱子曰明道學者須先識仁一段説話極好只是説得太廣學者難入程子曰觀雞雛可以觀仁或問云云何也朱子曰凡物皆可觀此偶見雞雛而言耳小小之物生理悉具問雞雛如何是仁道夫曰先生嘗謂初與嫩底便是先生曰如此看較分明蓋當是時飲啄自如未有所謂爭鬭侵陵之患只此便是仁也切脈最可體仁人問何也朱子曰脈理周流於一身仁之理亦是恁地孝經仲尼閒居曽子侍坐子曰參先王有至徳要道以順天下民用和睦上下無怨女知之乎曽子避席曰參不敏何足以知之子曰夫孝徳之本教之所由生也復坐吾語女身體髮膚受之父母不敢毁傷孝之始也立身行道揚名於後世以顯父母孝之終也夫孝始於事親中於事君終於立身愛親者不敢惡於人敬親者不敢慢於人愛敬盡於事親而徳教加於百姓刑於四海蓋天子之孝也在上不驕高而不危制節謹度滿而不溢高而不危所以長守貴滿而不溢所以長守富富貴不離其身然後能保其社稷而和其人民蓋諸侯之孝也非先王之法服不敢服非先王之法言不敢道非先王之徳行不敢行是故非法不言非道不行口無擇言身無擇行言滿天下無口過行滿天下無怨惡三者備矣然後能守其宗廟蓋卿大夫之孝也資於事父以事母而愛同資於事父以亊君而敬同故母取其愛而君取其敬兼之者父也故以孝事君則忠以敬事長則順忠順不失以事其上然後能保其爵禄而守其祭祀蓋士之孝也用天之道分地之利謹身節用以養父母此庻人之孝也故自天子以下至於庻人孝無終始而患不及者未之有也朱子曰此一節夫子曽子問答之言而曽氏門人之所記也疑所謂孝經者其本文止如此其下則雜引傳記以釋經文乃孝經之傳也經之首統論孝終始中乃敷陳天子諸侯卿大夫士庻人之孝而其末結之曰故自天子以下至於庻人孝無終始而患不及者未之有也其首尾相應次第相承文勢連續脈絡通貫同是一時之言無可疑者而後人妄分以為六七章又増子曰及引詩書之文以雜乎其間使其文意分斷間隔而讀者不復得見聖言全體大義故今合為一章而刪去子曰者二引書者一引詩者四凡六十一字以復經文之舊云子曰孝子之事親也居則致其敬養則致其樂病則致其憂喪則致其哀祭則致其嚴五者備矣然後能事親事親者居上不驕為下不亂在醜不爭居上而驕則亡為下而亂則刑在醜而争則兵此三者不除雖日用三牲之養猶為不孝也愚謂子之事親一毫有所未盡皆不可以言致故五者皆以致言致者用力而極其至也與中庸致中和之致同驕亂爭三者皆惡徳有一焉皆足以危辱其親為人子不能謹行至於危辱其親則其不孝大矣共養之末奚足道哉論語孟懿子問孝子曰無違樊遲御子告之曰孟孫問孝於我我對曰無違樊遲曰何謂也子曰生事之以禮死葬之以禮祭之以禮朱子曰無違謂不背於理生事葬祭事親之始終具矣禮即理之節文也人之事親自始至終一於禮而不茍其尊親也至矣是時三家僭禮故夫子以是警之然語意渾然又若不專為三家發者所以為聖人之言也胡氏曰人之欲孝其親心雖無窮而分則有限得為而不為與不得為而為之均於不孝所謂以禮者為其所得為而已矣孟武伯問孝子曰父母惟其疾之憂朱子曰言父母愛子之心無所不至惟恐其有疾病常以為憂也人子體此而以父母之心為心則凡所以守其身者不容於不謹矣豈不可以為孝乎子游問孝子曰今之孝者是謂能養至於犬馬皆能有養不敬何以别乎朱子曰甚言不敬之罪所以深警之也或問父母至尊親犬馬至卑賤聖人之言豈若是其不倫乎曰此設戒之言也故特以其尊卑懸絶之甚者明之所以深警夫能養而不敬者之罪也坊記子云小人皆能養其親君子不敬何以辨子夏問孝子曰色難有事弟子服其勞有酒食先生饌曽是以為孝乎朱子曰事親之際惟色為難服勞奉養未足為孝程子曰告懿子告衆人者也告武伯者以其人多可憂之事子游能養而或失於敬子夏能直義而或少温潤之色各因其材之高下與其所失而告之故不同也孔子曰父母在不遠遊遊必有方朱子曰逺遊則去親遠而為日久定省曠而音問疎不惟已之思親不置亦恐親之念我不忘也遊必有方如已告云之東則不敢更適西欲親知己之所在而無憂召已則必至而無失也范氏曰子能以父母之心為心則孝矣内則曰親在出不易方復不過時禮記凡為人子之禮冬温而夏凊昏定而晨省在醜夷不争正義曰朋儕等輩喜争勝負亡身及親故誡之以不争示民不敢專也為人子者出必告反必面鄭氏曰告面同爾反言面者從外来宜知親之顔色安否所遊必有常所習必有業恒言不稱老廣敬為人子者居不主奥坐不中席行不中道立不中門謂與父同宫者也不敢當其尊處室中西南隅謂之奥道有左右中門謂棖闑之中央正義曰奥者室内西南隅也室嚮南戸近東南角則西南隅隱奥無事常推尊者於閑樂無事之處故尊者居必主奥也既尊者所居則人子不宜處之也共坐則席端為上獨坐則席中為尊尊者宜獨不與人共則坐常居中故卑者坐不得居中也尊者常正路而行卑者故不得也中央有闑闑旁有棖棖闑之中尊者所行故人子不得當之而行又曰凡上四事皆謂與父同宮者若命士以上父子異宮則不禁所以爾者有命既尊各有臣僕子孫應敬已故也食饗不為槩槩量也不制待賔客饌具之所有正義曰由尊者所裁子不得限量多少祭祀不為尸尊者之處為其失子道然則尸卜筮無父者聽於無聲視於無形常若親之將有教使然不登高不臨深不茍訾不茍笑為其近危辱也孝子不服闇不登危懼辱親也父母存不許友以死為忘親也死為報讎不有私財坊記云父母在不敢有其身不敢私其財示民有上下也父母在饋獻不及車馬父召無諾玉藻父命呼唯而不諾手執業則投之食在口則吐之走而不趨子云父母在不言老言孝不言慈閨門之内戲而不嘆鄭氏曰孝上施言慈則嫌下流也戲謂人子言笑者也孟子曰舜五十而不失孺慕之心歎謂有憂戚之聲愚按言孝不言慈謂人子以孝自勉而不敢以慈望其親故言不及之戲而不歎老萊子是也孝子之有深愛者必有和氣有和氣者必有愉色有愉色者必有婉容朱子曰愛根於心故其形見於外如此孝子如執玉如奉盈洞洞屬屬然如弗勝如將失之上言愛下言敬故曰愛敬盡於事親嚴威儼恪非所以事親也四者容貌非事親之體事親當和順卑柔曽子曰孝子之事親也樂其心不違其志樂其耳目安其寢處以其飲食忠養之是故父母之所愛亦愛之父母之所敬亦敬之至於犬馬盡然而况於人乎鄭氏曰上言其近親者下言親所愛敬者張子曰親之故舊所喜者當極力招致以悦其親凡於父母賔客之奉必極力營辦不計家之有無又須使親不知其勉强勞苦茍使見其為而不易則亦不安矣孔子曰仁人之事親也如事天事天如事親鄭氏曰事親事天孝敬同也孟子曰曽子養曽晳必有酒肉將徹必請所與問有餘必曰有曽晳死曽元養曽子必有酒肉將徹不請所與問有餘曰亡矣將以復進也此所謂養口體者也若曽子則可謂養志也事親若曽子者可也程子曰事親若曽子可也未嘗以曽子之孝為有餘也蓋子之身所能為者皆所當為也以上言事親大意后皇命冢宰降徳於衆兆民子事父母司馬氏曰孫事祖父母同雞初鳴咸盥漱朱子曰咸皆也盥謂洗手漱謂漱口櫛縰筓緫拂髦冠緌纓櫛梳也縰黑繒韜髮而結之也筓者横施於髻中以固髮也緫裂練繒以束髮也拂謂振去塵也髦用髮為之象幼時鬢纓者結之頷下以固冠結之餘者散而下垂謂之緌端韠紳搢笏端𤣥端士服也庻人深衣韠蔽膝也以韋為之與裳同色上繫之革帯紳大帯也搢猶扱也扱笏於紳笏所以記事也温公曰今用帽子衫帶左右佩用紛帨刀礪觹燧之屬備尊者使令也偪屨著綦偪行縢也綦屨繫也屨頭施繫以為行戒婦事舅姑温公曰孫婦亦同如事父母雞初鳴咸盥漱櫛縰筓緫衣紳左右佩用衿纓綦屨衿其鴆反衿猶結也婦人有纓示繫屬也温公曰今田冠子背子以適父母舅姑之所及所下氣怡聲問衣燠寒疾痛疴癢而敬抑搔之怡悦也疴疥也抑按也搔摩也温公曰丈夫唱喏婦人道萬福問侍者夜安否則侍者以告晨興復問則侍者以告此即禮之晨昏也顔延之曰父子之嚴不可以狎骨肉之愛不可以簡簡則慈孝不接狎則怠慢生焉由命士以上父子異宫此不狎之道也抑搔癢痛懸衾篋枕此不簡之教也出入則或先或後而敬扶持之先後隨時便也進盥少者奉槃長者奉水請沃盥盥卒授巾槃承盥水者巾以帨手問所欲而敬進之柔色以温之父母舅姑必嘗之而後退温於運反所欲如饘粥酒醴飲食之類温藉也承尊者必和顔色温公曰父母舅姑起子供藥物婦具晨羞尊長舉箸子婦乃各退就食注曰藥物乃闗身之切務人子當親自檢數調煮供進不可但委婢僕脫若有誤即其禍不測晨羞俗謂㸃心易曰在中饋詩云惟酒食是議凡烹調飲膳婦人之職也近年婦女驕倨皆不肯入庖厨今縱不親執刀匕亦當檢校監視務令精潔男女未冠筓者雞初鳴咸盥漱櫛縰拂髦總角衿纓皆佩容臭昧爽而朝總角收髮結之容臭香物也以纓佩之為迫尊者給小使也昧爽欲明未明之時問何食飲矣若已食則退若未食則佐長者視具具饌也凡内外雞初鳴咸盥漱衣服歛枕簟灑掃室堂及庭布席各從其事父母舅姑將坐奉席請何鄉將袵長者奉席請何趾少者執牀與坐此總論子婦之外僕𨽻之等袵即席也將袵謂更卧處順尊者所安也御者舉几歛席與簟縣衾篋枕歛簟而襡之襡音獨早旦親起侍御之人舉几以進使馮之篋謂以篋貯之襡謂以襡韜之須卧而鋪之也父母舅姑之衣衾簟席枕几不傳杖屨祗敬之勿敢近敦牟巵匜非餕莫敢用與恒食飲非餕莫之敢飲食敦音對牟木侯反巵音支匜羊支反餕音俊傳移也謂此數者每日置之有常處子與婦不得輒移置他處杖屨服御之重者彌須恭敬勿敢迫近也敦今盃盂也牟土釜也今以木為器象土釜之形巵酒器也匜盛酒漿之器餕尊長食餘也與及也恒常也旦夕之常食也在父母舅姑之所有命之應唯敬對進退周旋慎齊升降出入揖遊不敢􅎪噫􅅉咳欠伸跛踦睇視不敢唾洟寒不敢襲癢不敢搔不有敬事不敢袒裼不渉不撅􅎪於月反噫於界反􅅉音帝咳苦愛反洟音替撅居衛反􅎪嘔逆之聲咳嗽聲也氣乏則欠體疲則伸睇視傾視也洟鼻液也敬事如習射之類袒露臂也裼去上衣也習射則袒裼若以勞倦而袒裼則為不敬也撅揭衣也惟渉水可撅若不渉水而撅則為不敬也䙝衣衾不見裏父母唾洟不見少事長賤事貴共帥時帥循也時是也以上言事親節文子婦孝者敬者父母舅姑之命勿逆勿怠若飲食之雖不嗜必嘗而待加之衣服雖不欲必服而待待者待父母復命而後去之也加之事人代之己雖不欲姑與之而姑使之而後復之姑且也言尊者以事授己而又使人代己之勞己雖不欲其妨己業且與為之待其休解而後復業於己身舅没則姑老冡婦所祭祀賔客每事必請於姑婦雖受傳猶不敢專行也介婦請於冡婦以其代姑之事介婦衆婦舅姑使冡婦無怠雖有勤勞不敢怠倦不友無禮於介婦衆婦無禮冡婦不友之也善兄弟為友姊姒猶兄弟也朱子曰友當作敢字之誤也言不敢恃舅姑之命而無禮於介婦也舅姑若使介婦毋敢敵耦於冡婦雖有勤勞不敢相較計今按下文三句亦是不敢並行不敢並命不敢並坐下冡婦也並命並有教令之命凡婦不命適私室不敢退婦待舅姑者也婦將有事大小必請於舅姑子婦無私貨無私畜無私器不敢私假不敢私與家事統於尊也婦或賜之飲食衣服布帛佩帨茝蘭則受而獻之舅姑舅姑受之則喜如新受賜若反賜之則辭不得命如更受賜藏以待乏待姑舅之乏婦若有私親兄弟將與之則必復請其故賜而後與之以上兼言婦事舅姑之禮曽子曰孝有三大孝尊親其次弗辱其下能養公明儀問於曽子曰夫子可以為孝乎曽子曰是何言與是何言與君子所謂孝者先意承志諭父母於道參直養者也安得為孝乎唐孔氏曰先意謂父母將欲發意孝子則預前逆知父母之意而為之承志父母已萌其志孝子則須體貼父母之志而承之諭父母於道曉諭父母歸於正道也愚按孝者順徳本無優劣其尊親不辱能養則分天子諸侯卿大夫士庶人而言也故又云先事曉諭置父母於道皆人子之所當自致其餘次第放此子曰事父母幾諫見志不從又敬不違勞而不怨曾子曰敢問從父之令可謂孝乎子曰是何言與是何言與昔者天子有爭臣七人雖無道不失天下諸侯有爭臣五人雖無道不失其國大夫有爭臣三人雖無道不失其家士有爭友則身不離於令名父有爭子則身不陷於不義故當不義則子不可以弗爭於父臣不可以弗爭於君故當不義則爭之從父之令又焉得為孝乎愚按無道而不失天下國家者蓋有爭臣爭子則於失道必爭之雖失而旋復所以免於危亡也與禮記曾子曰父母愛之喜而弗忘父母惡之懼而無怨父母有過諫而不逆父母有過下氣怡色柔聲以諫諫若不入起敬起孝鄭氏曰子事父母有隱無犯起猶更也説則復諫不説與其得罪於鄉黨州閭寧熟諫朱子曰謂殷勤純熟而諫得罪謂使父母得罪父母怒不説而撻之流血不敢疾怨起敬起孝子之事親也三諫而不聽則號泣而隨之以上言諫過葉公語孔子曰吾黨有直躬者其父攘羊而子證之孔子曰吾黨之直者異於是父為子隱子為父隱直在其中矣朱子曰父子相隱天理人情之至也故不求為直而直在其中謝氏曰順理為直父為子隱子不為父隱於理順邪瞽瞍殺人舜竊負而逃遵海濵而處當是時愛親之心勝其於直不直何暇計哉邢氏引律大功以上得相容隱告言祖父者入十惡以為得此意善乎其推言之也子云善則稱親過則稱已則民作孝坊記以上言隱過易蠱初六幹父之蠱有子考無咎厲終吉程子曰初六雖居最下成卦由之有主之義居内在下而為主子幹父蠱也子幹父蠱之道能堪其事則為有子而其考得無咎不然則為父之累故必惕厲則得終吉也處卑而尸尊事自當惕厲以六之才雖能巽順體乃陰柔在下無應而主幹非有能濟之義若以不克幹而言則其義甚小故專言為子幹蠱之道必克濟則不累其父能厲則可以終吉乃備見為子幹蠱之大法也象曰幹父之蠱意承考也子幹父蠱之道意在承當於父之事也故祗敬其事以置父於無咎之地常懐惕厲則終得其吉也盡誠於父事吉之道也九二幹母之蠱不可貞九二以剛陽為六五所應是以剛陽之才在下而幹夫在上陰柔之事也故取子幹母為義二巽體而處柔順義為多幹母之蠱之道也夫子之於母當以柔巽輔道之使得於義不順而致敗蠱則子之罪也從容將順豈無道乎以婦人言之則陰柔可知若伸已剛陽之道遽然矯拂則傷恩所害大矣亦安能入乎在乎屈已下意巽順將承使之身正事治而已故曰不可貞謂不可貞固盡其剛直之道如是乃中道也以剛陽之臣輔柔弱之君義亦相近象曰幹母之蠱得中道也九三幹父之蠱小有悔無大咎三以陽剛之才居下之上主幹者也子幹父之蠱以陽處剛而不中剛之過也然而在巽體雖剛過而不為無順順事親之本也又居得正故無大過以剛陽之才克幹其事雖以剛過而有小小之悔終無大過咎也然有小悔已非善事親矣象曰幹父之蠱終无咎也以上言幹蠱書堯典師錫帝曰有鰥在下曰虞舜帝曰俞予聞如何岳曰瞽子父頑母嚚象傲克諧以孝烝烝乂不格姦東萊吕氏曰四岳稱舜可以當天下之實獨以家庭中言之何也蓋舜瞽瞍之子父既頑母既嚚象復傲自居死亡之地而舜克諧以孝方其始也怨怒忌克乖爭凌犯一家之中無所不有克諧之後悉變為和順雍穆之風烝烝二字舜之工夫在此烝烝者有薫灌之意詩曰烝之浮浮如甑之炊炊然薪燃不斷火薪相續則自然烝烝以至於熟舜處頑父嚚母傲象之間茍非孝誠薰灌工夫源源安能至於不格姦之地孔氏曰仁覆閔下謂之旻天言舜為父母所疾日號泣于旻天及父母克己自責不責於人載事也䕫䕫悚懼貌舜負罪引惡敬以事見于父悚懼齊莊父亦信順之言能以至誠感頑父大禹謨益贊于禹曰帝初于歴山往于田日號泣于旻天于父母負罪引慝祗載見瞽瞍䕫䕫齋慄瞽亦允若孟子曰天下大悦而將歸已視天下悦而歸已猶草芥也惟舜為然不得乎親不可以為人不順乎親不可以為子朱子曰言舜視天下之歸已如草芥而惟欲得其親而順之也得者曲為承順以得其心之悦而已順則有以諭之於道心與之一而未始有違尤人所難能也為人蓋泛言之為子則愈宻矣舜盡事親之道而瞽瞍底豫瞽瞍底豫而天下化瞽瞍底豫而天下之為父子者定此之謂大孝瞽瞍至頑嘗欲殺舜至是而底豫焉書所謂不格姦亦允若是也蓋舜至此而有以順乎親矣是以天下之為人子者知天下無不可事之親顧吾所以事之者未若舜耳於是莫不勉勉而為孝至於其親亦底豫焉則天下為父者亦莫不慈所謂化也子孝父慈各止其所而無不安其位之意所謂定也為法於天下可傳於後世非止一身一家之孝而已此所以為大孝李氏曰舜之所以能使瞽瞍底豫者盡事親之道共為子職不見父母之非而已昔羅仲素語此云只為天下無不是底父母了翁聞而善之曰唯如此而後天下之為父子者定彼臣弑其君子弑其父者常始於見其有不是處耳萬章問曰舜往于田號泣于旻天何為其號泣也孟子曰怨慕也萬章曰父母愛之喜而不忘父母惡之勞而不怨然則舜怨乎曰長息問於公明髙曰舜往于田則吾既得聞命矣號泣于旻天于父母則吾不知也公明高曰是非爾所知也夫公明髙以孝子之心為不若是恝我竭力耕田共為子職而已矣父母之不我愛於我何哉于父母言呼父母而泣也恝無愁之貌於我何哉自責不知己有何罪耳非怨父母也楊氏曰非孟子深知舜之心不能為此言蓋舜唯恐不順於父母未嘗自以為孝也若自以為孝則非孝矣帝使其子九男二女百官牛羊倉廩備以事舜於􅅵畝之中天下之士多就之者帝將胥天下而遷之焉為不順於父母如窮人無所歸天下之士悦之人之所欲也而不足以解憂好色人之所欲妻帝之二女而不足以解憂富人之所欲富有天下而不足以解憂貴人之所欲貴為天子而不足以解憂人悦之好色富貴無足以解憂者惟順於父母可以解憂人少則慕父母知好色則慕少艾有妻子則慕妻子仕則慕君不得於君則熱中大孝終身慕父母五十而慕者予於大舜見之矣言常人之情因物有遷惟聖人為能不失其本心也言五十者舜攝政時年五十五十而慕則其終身慕可知矣此章言舜不以得衆人之所欲為己樂而以不順乎親之心為己憂非聖人之盡性其孰能之子曰孝哉閔子騫人不間於其父母昆弟之言胡氏曰父母兄弟稱其孝友人皆信之無異詞者蓋其孝友之實有以積於中而著於外故夫子嘆而美之韓詩外傳子騫早喪母父娶後妻生三子疾惡子騫以蘆花衣之父察知之欲逐後母子騫啓曰母在一子寒母去三子單父喜之而止母悔改之後至均平遂成慈母以上言事難事之親曽閔以孝並稱於聖門曽子之父晳亦幾難事者也鋤𤓰誤傷而撻以大杖蓋可見矣而曾子援琴而鼓唯恐傷親之心也斯其所以為孝歟然孔子小杖則受大杖則走之言尤人子所當知也伯竒亦類此韓文公履霜操曰兒罪當笞逐兒何為蓋得伯竒之心者張子西銘曰勇於從而順令者伯竒也其指尤深為人子者不幸而事難事之親則於大舜曽閔伯竒之事可不勉而師之乎凱風美孝子也衞之淫風流行雖有七子之母猶不能安其室故美七子能盡其孝道以慰其母心而成其志爾凱風自南吹彼棘心棘心夭夭母氏劬勞毛氏曰興也南風謂之凱風樂夏之長養棘難長養者夭夭盛貌孔氏曰凱樂也風性樂養萬物王氏曰棘心至於夭夭則風之為力多矣此母氏劬勞之譬朱子曰此詩以凱風比母棘心比子之幼時蓋曰母生衆子幼而育之其劬勞甚矣本其始而言以起自責之端也凱風自南吹彼棘薪母氏聖善我無令人興也毛氏曰棘棗也可以為薪聖叡也鄭氏曰令善也朱子曰棘可以為薪則成矣然非美才故以興子之壯大而無善也長樂劉氏曰自言七子之中有一令善之人則母亦不舍之而去也爰有寒泉在浚之下有子七人母氏勞苦興也毛氏曰浚衛邑也陳氏曰寒泉在浚之下邑人賴之以生養今子七人反不能養一母而使母勞苦求嫁也朱子曰母以淫風流行不能自守而諸子自責但以不能事母使母勞苦為詞婉詞幾諫不顯其親之惡可謂孝矣睍睆黄鳥載好其音有子七人莫慰母心朱子曰興也睍睆清和圓轉之意言黄鳥猶能好其音以悦人而我七子獨不能慰悦母心哉曽氏曰凱風盛於夏時黄鳥鳴於夏木寒泉亦夏所宜寒泉能使人甘之有子而使母勞苦黄鳥能使人樂之有子而莫慰母心愚按此又處事親之變而能盡其道者也故以次於前章之後公孫丑問曰髙子曰小弁小人之詩也孟子曰何以言之曰怨朱子曰髙子齊人也小弁小雅篇名周幽王娶申后生太子宜臼又得褒姒生伯服而黜申后廢宜臼於是宜臼之傅為作此詩以叙其哀痛迫切之情按小弁詩所謂民莫不榖我獨于罹何辜于天我罪伊何靡瞻匪父靡依匪母不屬于毛不離于裏凡皆怨辭也曰固哉髙叟之為詩也有人於此越人闗弓而射之則已談笑而道之無他疏之也其兄闗弓而射之則已埀涕泣而道之無他戚之也小弁之怨親親也親親仁也固矣夫髙叟之為詩也曰凱風何以不怨曰凱風親之過小者也小弁親之過大者也親之過大而不怨是愈疏也親之過小而怨是不可磯也愈疏不孝也不可磯亦不孝也磯水激石也不可磯言㣲激之而遽怒也孔子曰舜其至孝矣五十而慕言舜猶怨慕小弁之怨不為不孝趙氏曰生之膝下一體而分喘息呼吸氣通於親當親而疏怨慕號天是以小弁之怨未足為愆也或問五十而慕何必舜武夷胡氏曰所謂慕者不變其初心也初心者赤子之心也為舜父母日欲殺舜與他人父母不同故獨言舜耳此一節文當與前章參玩云又晉獻公將廢太子申生里克諫不聽太子曰吾其廢乎里克曰子懼不孝不懼不得立修已而不責人則免於難君子曰善處父子之間季武子立其愛子悼子而以長子公鉏為馬正公鉏愠而不出閔子馬見之曰子無然禍福無門唯人所召為人子者患不孝不患無所敬共父命何常之有若能孝敬富倍季氏可也姦囘不軌禍倍下民可也公鉏然之敬共朝夕恪居官次季孫果喜而厚之為人子者不幸而處愛憎興廢之間則於里克閔子馬之言可不念之哉子曰父母之年不可不知也一則以喜一則以懼南軒曰以年之盛衰察氣之强弱亦人子盡其心於親之一事也曽子曰親戚不悦不敢外交近者不親不敢求逺小者不審不敢言大故人之生也百嵗之中有疾病焉有老幼焉故君子思其不可復者而先施焉親戚既没雖欲孝誰為孝年既耆艾雖欲悌誰為悌故孝有不及悌有不時病加於小愈禍生於懈惰孝衰於妻子察此四者慎終如始詩曰靡不有初鮮克有終楊子曰父母子之天地與事父母自知不足者其舜乎不得而久者事親之謂也孝子愛日以上三章大指畧同皆欲及時以致養禮記父母有疾冠者不櫛行不翔言不惰琴瑟不御食肉不至變味飲酒不至變貌笑不至矧怒不至詈疾止復故矧齒本也曲禮下同君有疾飲藥臣先嘗之親有疾飲藥子先嘗之醫不三世不服其藥親癠色容不盛此孝子之疏節也鄭氏曰言未足為至孝也愚按此特末節而猶不能盡其為不孝可知以上言侍疾又按春秋昭十九年夏五月戊辰許世子止弑其君買胡氏曰左傳許悼公瘧飲世子止之藥卒書曰弑其君者止不嘗藥也古者醫不三世不服其藥夫子之所謹者三疾居其一季康子饋藥子曰丘未達不敢嘗敬謹其身如此也而於君父可忽乎君有疾飲藥臣先嘗之父有疾飲藥子先嘗之蓋言謹也止不擇醫而輕用其藥藥不先嘗而誤進於君是有忽君父之心而不慎矣此簒弑之萌堅氷之漸而春秋之所謹也故加以大惡而不得辭此春秋除惡於㣲之意也又曽幾言許世子弑君事如律造御舟誤不牢合御藥誤不如本方皆死胡氏曰極是程子曰事親者不可以不知醫司馬氏曰凡父母舅姑有疾子婦無故不離側親調嘗藥餌而供之父母有疾子色不滿容不戲笑不宴游捨置餘事專以迎醫檢方製藥為務顔氏家訓曰父母有疾子拜醫以求藥蓋以醫者親之存亡所繫豈可忽也陟岵孝子行役思念父母也國迫而數侵削役乎大國父母兄弟離散而作是詩也陟彼岾兮瞻望父兮父曰嗟予子行役夙夜無已上慎旃哉猶來無止陳氏曰岵也屺也岡也皆山之髙處可以瞻望孔氏曰我欲行之時父教戒我曰嗟我子從軍行役之時當早起夜寐無得已止蘇氏曰上猶尚也孝子登髙以望其父而不見則思其將行之戒以自慰朱子曰尚庻幾慎之哉猶可以來歸無止於彼而不來蓋生則必歸死則止而不來矣陟彼屺兮瞻望母兮母曰嗟予季行役夙夜無寐上慎旃哉猶來無棄毛氏曰季少子也無寐無耆寐王氏曰尤愛憐少子者婦人之情呂氏曰母尚恩故曰無棄言無棄母而不歸也陟彼岡兮瞻望兄兮兄曰嗟予弟行役夙夜必偕上慎旃哉猶來無死蘇氏曰必與同役者偕無獨行也魏風鴇羽刺時也昭公之後大亂五世君子下從征役不得養其父母而作是詩也肅肅鴇羽集于苞栩王事靡盬不能蓺稷黍父母何怙悠悠蒼天曷其有所毛氏曰肅肅鴇羽聲也鴇之性不樹止也又曰鴇似雁而大無後趾集止也孔氏曰物叢生曰苞毛氏曰叢也孔氏曰栩柞櫟也其子為皂可以染毛氏曰盬不攻緻也孔氏曰盬與蠱字異義同左氏於文皿蟲為蠱糓之飛亦為蠱然則蠱害器以敗糓者皆謂之蠱是盬不堅牢不攻緻之意也蓺樹也稷黍禾屬毛氏曰怙恃也鄭氏曰曷何也君子久從征役以王事之靡盬致子職有缺不能播種五糓我父母何所怙恃而得養悠悠蒼天何時使我得其所乎不得已則告天也肅肅鴇翼集于苞棘王事靡盬不能蓺黍稷父母何食悠悠蒼天曷其有極蘇氏曰極止也范氏曰曷其有極言勞役之無已也肅肅鴇行集于苞桑王事靡盬不能蓺稻梁父母何嘗悠悠蒼天曷其有常蘇氏曰行列也朱氏曰嘗食也范氏曰思得休息以反其常也唐風北山大夫刺幽王也役使不均已勞于王事而不得養其父母焉其一章曰陟彼北山言采其把偕偕士子朝夕從事王事靡盬憂我父母李氏曰把枸把也毛氏曰偕偕彊壯貌朱氏曰大夫從役陟彼北山采把而食也毛氏曰士子有王事者也鄭氏曰朝夕從事言不得休息朱氏曰言以王事而貽親憂也二章以下皆言役使不均之意今不録蓼莪刺幽王也民人勞苦孝子不得終養爾李氏曰凱風母不安其室之詩也小弁太子見棄之詩也蓼莪孝子不得終養之詩也故其咎責怨慕哀痛如此茍不為母所棄為父所逐不困於行役而得終養則其歡欣可知矣觀詩者當以此類求之蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞毛氏曰蓼蓼長大貌歐陽氏曰周人苦於勞役不得養其父母者見彼蓼蓼然長大者非莪即蒿皆草木之㣲者其茂盛如此曰天地生育之功也思我之生也父母之養育我者亦劬勞矣而我不得終養以報也呂氏曰莪蒿不能離天地之生育猶人子不能報父母之劬勞也孟郊詩云誰言寸草心報得三春暉蓼蓼者莪匪莪伊蔚哀哀父母生我勞瘁鄭氏曰瘁病也缾之罄矣維罍之耻鮮民之生不如死之久矣無父何怙無母何恃出則銜恤入則靡至毛氏曰缾小而罍大王氏曰缾譬則民也罍譬則君也缾之罄則罍之耻民之窮則君之羞呂氏曰鮮猶窮獨之義言窮獨而從役其生不如死也孔氏曰所以然者以無父何所依怙無母何所倚恃也劉氏曰出則銜無窮之憂曾氏曰入則靡至無所歸投也孔氏曰已無父母則中心銜憂旋來入門則堂宇空曠不復覩見是其所以悲恨也父兮生我母兮鞠我拊我畜我長我育我顧我復我出入腹我欲報之徳昊天罔極毛氏曰鞠養也孔氏曰拊拊循也朱氏曰畜亦養也鄭氏曰育覆育也顧旋視也復反覆也腹懷抱也父兮生我者本其生氣也李氏曰拊我畜我而下皆重言生育之恩也朱氏曰父母之恩如此欲報之以徳而父母之恩如天之無窮不知所以為報也南山烈烈飄風發發民莫不糓我獨何害王氏曰烈烈氣之寒毛氏曰發發疾貌鄭氏曰糓善也蘇氏曰虐政之病人如大寒之視南山而聞飄風王氏曰民莫不糓我獨何害傷已獨不得終養也朱氏曰我獨何為遭此害也南山律律飄風弗弗民莫不糓我獨不卒王氏曰南山之勢律律蓋崒律之謂也毛氏曰律律猶烈烈也弗弗猶發發也鄭氏曰卒終也我獨不得終養父母重自哀傷也以上四詩皆為行役不得養親而作然陟岵鴇羽北山親猶在也若蓼莪則父母已終無所復及矣故其辭悲痛特甚焉晉王裒以父不得其死隱居教授廬於墓側攀栢悲號樹為之枯讀詩至哀哀父母生我劬勞未嘗不三復流涕門人受業者為廢蓼莪之篇詩之感人蓋如此古之君子迫於王事不得盡力於其親故形之歌咏極其慘愴後世兵民既分自非行伍之士無長征逺戍者優游親側足以自竭顧乃有不知劬勞之當報者亦獨何哉誦此詩者可以悚然知媿矣孝經子曰孝子之喪親也哭不偯唐𤣥宗注曰氣竭而息聲不委曲禮無容言不文服美不安聞樂不樂食㫖不甘此哀慼之情也三日而食教民無以死傷生毁不滅性此聖人之政也喪不過三年示民有終也為之棺槨衣衾而舉之陳其簠簋而哀慼之擗踊哭泣哀以送之卜其宅兆而安厝之為之宗廟以鬼饗之春秋祭祀以時思之生事愛敬死事哀慼生民之本盡矣死生之義備矣孝子之事親終矣宰我問三年之喪期已久矣朱子曰期周年也君子三年不為禮禮必壞三年不為樂樂必崩恐居喪不習而崩壊也舊糓既没新糓既升鑚燧改火期可已矣没盡也升登也燧取火之木也改火春取榆柳之火夏取棗杏之火夏季取桑柘之火秋取柞楢之火冬取槐檀之火亦一年而週也已止也言期年則天運一週時物皆變喪至此可止也尹氏曰短喪之説下愚且耻言之宰我親學聖人之門而以是為問者有所疑於心而不敢强焉爾子曰食夫稻衣夫錦於女安乎曰安禮父母之喪既殯食粥麤衰既塟疏食水飲受以成布期而小祥始食菜菓練冠縓縁要絰不除無食稻衣錦之理夫子欲宰我反求諸心自得其所以不忍者故問之以此而宰我不察也女安則為之夫君子之居喪食㫖不甘聞樂不樂居處不安故不為也今女安則為之此夫子之言也㫖亦甘也初言女安則為之絶之之辭又發其不忍之端以警其不察而再言女安則為之以深責之也宰我出子曰予之不仁也子生三年然後免於父母之懷夫三年之喪天下之通喪也予也有三年之愛於其父母乎宰我既出夫子懼其真以為可安而遂行之故深探其本而斥之言由其不仁故愛親之薄如此也懷抱也又言君子所以不忍於親而喪必三年之故使之聞之或能反求而終得其本心也范氏曰喪雖止於三年然賢者之情則無窮也特以聖人為之中制而不敢過故必俯而就之非以三年之喪為足以報其親也所謂三年然後免於父母之懷特以責在我之無恩欲其有以跂而及之爾曾子曰吾聞諸夫子人未有自致者也必也親喪乎南軒曰人於他事未能自盡於親喪豈可不自盡乎若於此不能自盡則何事能盡若於此能自盡則於其他亦推是心而已禮記始死充充如有窮既殯瞿瞿如有求而弗得既塟皇皇如有望而弗至鄭氏曰皆憂懼在心之貌檀弓顔丁善居喪始死皇皇焉如有求而弗得及殯望望焉如有從而弗及既塟慨然如不及其反而息縣子曰三年之喪如斬期之喪如剡鄭氏曰言其痛之惻怛有淺深也雜記孔子曰少連大連善居喪三日不怠三月不懈期悲哀三年憂東夷之子也鄭氏曰言其生於夷狄而知禮也愚謂夫子言此所以警中國之不知禮者雜記高子臯之執親之喪也泣血三年未嘗見齒君子以為難檀弓曾申問於曾子曰哭父母有常聲乎曰中路嬰兒失其母焉何常聲之有雜記弁人有其母死而孺子泣者孔子曰哀則哀矣而難為繼也夫禮為可傳也為可繼也檀弓曾子謂子思曰伋吾執親之喪也水漿不入口者七日子思曰先王之制禮也過之者俯而就之不至焉者跂而及之故君子之執親之喪也水漿之不入口者三日杖而后能起樂正子春之母死五日而不食曰吾悔之自吾母而不用吾情吾烏乎用吾情檀弓居喪之禮毁瘠不形視聴不衰鄭氏曰為其廢喪事形謂骨立升降不由阼階出入不當門隧常若親存隧道也居喪之禮頭有創則沐身有瘍則浴有疾則飲酒食肉疾止復初不勝喪乃比於不慈不孝喪食雖惡必充飢飢而廢事非禮也飽而忘哀亦非禮也視不明聴不聰行不正不知哀君子病之雜記毁而死君子謂之無子同上喪不慮居為無廟也毁不危身為無後也檀弓皆為親非為己也合前後數章而觀則居喪之道可知矣子思曰喪三日而殯凡附於身者必誠必信勿之有悔焉耳三月而塟凡附於棺者必誠必信勿之有悔焉耳鄭氏曰言其日月欲以盡心修備之附於身謂衣衾附於棺謂明器之屬檀弓下同子游問喪具夫子曰稱家之有無子游曰有無惡乎齊夫子曰有毋過乎禮茍亡矣斂首足形還塟鄭氏曰形體還之言便也言已斂塟不待三月縣棺而封人豈有非之者哉不設碑繂不備禮樂當為窀穸下棺也子路曰傷哉貧也生無以為養死無以為禮也孔子曰啜菽飲水盡其歡斯之謂孝斂首足形還塟而無槨稱其財斯之謂禮孟子曰養生者不足以當大事惟送死可以當大事朱子曰事生固當愛敬然亦人道之常耳至於送死則人道之大變孝子之事親舍是無以用其力矣故尤以為大事而必誠必信不使少有後日之悔也孟子自齊塟於魯反於齊止於嬴充虞請曰前日不知虞之不肖使虞敦匠事嚴虞不敢請今願竊有請也木若以美然曰古者棺椁無度中古棺七寸椁稱之自天子達於庶人非直為觀美也然後盡於人心不得不可以為悦無財不可以為悦得之為有財古之人皆用之吾何為獨不然且比化者無使土親膚於人心獨無恔乎朱子曰比猶為也化者死者也恔快也言為死者不使土近其肌膚豈不快然無所恨乎吾聞之也君子不以天下儉其親送終之禮所當得而不自盡是為天下愛惜此物而薄於吾親也又魯平公將見孟子嬖人臧倉者曰禮義由賢者出孟子之後喪踰前喪君無見焉公曰諾樂正子入見曰君奚為不見孟軻也曰或告寡人曰孟子之後喪踰前喪是以不往見也曰何哉君所謂踰者前以士後以大夫前以三鼎而後以五鼎與曰否謂棺椁衣衾之美也曰非所謂踰也貧富不同也今按子思必誠必信以下數章及孟子此章之指則聖賢之於其親心無不盡而其禮則以貧富有無為别學者觀此知所取法矣按司馬氏論塟曰孝經云卜其宅兆而安厝之謂卜地决其吉凶耳非若今隂陽家相其山岡風水也國子高曰塟者藏也又曰死則擇不食之地而塟我焉明無地不可塟也古者天子七月諸侯五月大夫三月士踰月而塟蓋以會塟者逺近有差不得不然也然禮文多云三月而塟蓋舉其中制而言之按春秋己丑塟敬嬴雨不克塟庚寅日中而克塟丁巳塟定公雨不克塟壬午日下昃乃塟何嘗擇年月日時也塟於北方北首何嘗擇地也今世俗信塟師之説以為子孫之貧富貴賤賢愚夀夭盡繫於此議論紛紜不决至有終身不塟累世不塟者使殯塟實能致人禍福為子孫者豈忍暴露其親而自求利耶悖禮傷義無過於此然孝子之心慮患深逺恐淺則為人所指深則濕潤速朽故必擇土厚水深之地而塟之所擇必數處者以備卜之不吉故也或曰世人久未塟者非盡以陰陽拘忌之故亦以貧故也予曰孔子有云斂首足形還塟而無椁稱其財之謂禮又子游問喪具孔子云云昔亷范千里負喪郭原平自賣營墓豈待豐富而後塟哉在禮未塟不變服食粥居倚廬寢苫枕塊蓋閔親之未有所歸故寢食不安奈何舍之出仕食稻衣錦不知其何以為心哉而程子則曰卜其宅兆卜其地之美惡也地美則其神靈安其子孫盛然則曷謂地之美者土色之光潤草木之茂盛乃其驗也而拘忌者或以擇地之方位决日之吉凶甚者不以奉先為計而專以利後為慮尤非孝子安厝之用心也惟五患者不得不謹須使異日不為道路不為城郭不為溝池不為貴勢所奪不為耕犂所及一本所謂五患者溝渠道路避村落逺井窑合二先生之言觀之以安親為心則地不可以不擇其擇也不可以太拘擇焉而不至於太拘則塟不患其不時矣然世人多遷延不塟者以昆若弟各懷自利之心而野師俗巫又從而誰惑之甚至偏納其賂而結之以私已愚而無知者安受其欺而弗悟也夫某山强則某支富某山弱則某支貧非惟禮義所不當問雖近世隂陽家書亦有深排其説者惟野師俗巫則張皇煽惑以為取利之資擇地者必先破此謬説而後無太拘之患為人子者所當深察也南史何子平以兵饑未塟其母者八年晝夜號哭常如袒括之日事在小學之書當攷親喪外除日月已竟而哀未忘兄弟之喪内除日月未竟而哀已殺雜記免喪之外行於道路見似目瞿聞名心瞿弔死而問疾顔色戚容必有以異於人也如此而後可以服三年之喪其餘則直道而行之是也雜記似謂容貌似其父母也孟獻子禫縣而不樂比御而不入夫子曰獻子加於人一等矣入謂復寢檀弓下同伯魚之母死期而猶哭夫子聞之曰誰與哭者門人曰鯉也夫子曰其甚也伯魚聞之遂除之子夏既除喪而見予之琴和之而不和彈之而不成聲作而曰哀未忘也先王制禮而不敢過也子張既除喪而見予之琴和之而和彈之而成聲作而曰先王制禮不敢不至焉檀弓見謂見孔子魯人有朝祥而莫歌者子路笑之夫子曰由爾責於人終無已夫三年之喪亦已久矣夫子路出夫子曰又多乎哉踰月則其善也以上言喪塟祥除其制度節文别見父没而不能讀父之書手澤存焉爾母没而杯圏不能飲焉口澤之氣存焉爾鄭氏曰孝子見親之器物在側不忍用也曾晳嗜羊棗而曾子不忍食羊棗朱子曰曾子以父嗜之父没之後食必思親故不忍食也公孫丑問曰膾炙與羊棗孰美孟子曰膾炙哉公孫丑曰然則曾子何為食膾炙而不食羊棗曰膾炙所同也羊棗所獨也諱名不諱姓姓所同也名所獨也南軒張氏曰曾子不忍食羊棗之意愛敬之篤不死其親者也親之所嗜見之而不忍食焉推是一端則凡其日用之間所以感發於其親者多矣常人於其親日逺而日忘矣惟君子則不然親雖日逺而其心不可泯也故雖事事物物之間親心之所存吾亦存之未嘗忘而況於其言行乎此之謂不死其親或曰屈到嗜芰於其終也命家老我死必薦芰而屈建命去之然則非邪蓋於親之所嗜而不忍食此其愛親之心也至於祭祀則有常物事親之禮不可以素建不敢以私意事其親而祭之以禮未為失也然使建也而能體曾子不食羊棗之意則其不薦也義固當然其精㣲曲折之間必更有以處者觀其命去之之辭則傷於大勁而於親愛亦未免為有害也子曰父在觀其志父没觀其行三年無改於父之道可謂孝矣朱子曰父在子不得自專而志則可知父没然後其行可見故觀此足以知其人之善惡然又必三年無改於父之道乃見其孝不然則所行雖善亦不足為孝矣尹氏曰如其道雖終身無改可也如其非道何待三年然則三年無改者孝子之心有所不忍故也游氏曰三年無改亦謂在所當改而可以未改者耳或問此章之指猶有可取者乎曰晁氏洪氏之説亦善晁氏曰三年無改於父之道此觀行之一節也洪氏曰父没雖可以行其志然改父之道於三年之中則無愛親之心而其行亦不足觀矣曰所取尹游之説何也曰尹氏得其用心之本游氏得其制事之宜二説相須為不可易矣曰必若尹游之説則夫子之説得無有不盡者乎曰為人子者本以守父之道不忍有改為之心至其所遇之不同則隨其輕重而以義制之耳三年而改者意其有為而言也其不可改則終身不改固不待言其不可以待三年者則又非常之變亦不可以預言矣善讀者推類而求之或終身不改或三年而改或甚不得已則不待三年而改顧其所遇之如何但不忍之心則不可無耳或曰昔謝方明承前代人不易其政其必宜改則以漸變之使無迹可尋為人子者不幸而父之道有當必改者以是為法而隱忍遷就於理義之中不亦可乎曰吾嘗聞之師曰以為此其意則固善矣然用心每每如此即駸駸然所失多矣若不得已但當至誠哀痛以改之而已何必隱忍遷就之云乎至哉此言足以儆學者用心之㣲矣南軒曰舊説以為父在能觀其志而承順之父没觀其行而繼述之此説文理為順按二先生之説不同姑兩存之曾子曰吾聞諸夫子孟莊子之孝也其他可能也其不改父之臣與父之政是難能也朱子曰孟莊子魯大夫名速其父獻子名蔑獻子有賢徳而莊子能用其臣守其政其他孝行雖有可稱皆不若此事之為難或問鄧子之説如何曰鄧氏之言曰獻子歴相三君五十年魯人謂之社稷之臣則其臣必賢其政必善矣莊子年少嗣立又與季孫宿同朝宿父文子忠於公室宿皆不能守而改之莊子乃獨能不改其父之臣與父之政而終身焉是孔子之所謂難也若父之臣與父之政有不善則是成其父之惡耳惡得為孝哉子云君子弛其親之過而敬其美鄭氏曰弛猶棄忘也孝子不藏識父母之過論語曰三年無改於父之道可謂孝矣不以已善駁親之過坊記以上言無改父道之孝按書蔡仲之命爾尚蓋前人之愆惟忠惟孝人子不幸如大禹之承鯀蔡仲之承蔡叔又當思所以蓋之故治水功成而鯀配夏郊率徳改行而蔡仲世祀豈非孝之大乎後世如沈充叛臣也其子勁以死節著李義府姦臣也其子湛以忠義聞若勁與湛可謂能蓋其父之愆矣又糓梁傳孝子成父之美不成父之惡故魏顆從治命君子是之魯隠與桓春秋弗取是亦不可不知也論語祭如在祭神如神在程子曰祭祭先祖也祭神祭外神也祭先主於孝祭神主於敬朱子曰此門人記孔子祭祀之誠意子曰吾不與祭如不祭朱子曰又記孔子之言以明之言已當祭之時或有故不得與而使他人攝之則不得致其如在之誠故雖已祭而此心歉然如未嘗祭也范氏曰君子之祭七日戒三日齋必見其所祭者誠之至也是故郊則天神格廟則人鬼享皆由已以致之也有其誠則有其神無其誠則無其神可不謹乎吾不與祭如不祭誠為實禮為虛也曾子曰慎終追逺民徳歸厚矣朱子曰慎終者喪盡其禮追逺者祭盡其誠民徳歸厚謂下民化之其徳亦歸於厚也禮記曰霜露既降君子履之必有悽愴之心非其寒之謂也春雨露既濡君子履之必有怵惕之心如將見之鄭氏曰皆謂感時念親也霜露既降禮説在秋此無秋蓋脱爾祭義下同致齋於内散齋於外齋之日思其居處思其笑語思其志意思其所樂思其所嗜齋三日乃見其所為齋者程子曰凡祭必齋齋之日思其居處思其笑語此孝子平日思親之心非齋也齋不容有思有思則非齋三日見其所為齋者此非聖人語齋者湛然純一方能與鬼神接能事鬼神此是上一等人祭之日入室僾然必有見乎其位僾然㣲見貌周還出戸謂專設時肅然必有聞乎其容聲出戸而聴愾然必有聞乎其嘆息之聲無戸者闔戸若食間則有出戸而聴之是故先王之孝也色不忘乎目聲不絶乎耳心志嗜欲不忘乎心致愛則存致慤則著著存不忘乎心夫安得不敬乎君子生則敬養死則敬享思終身弗辱也唯聖人為能饗帝唯孝子為能饗親鄭氏曰謂祭之能使之饗也饗者鄉也鄉之然後能饗焉言中心鄉之乃能使其祭見饗文王之祭也事死者如事生思死者如不欲生忌日必哀稱諱如見親祀之忠也如見親之所愛如欲色然其文王與鄭氏曰思死者如不欲生言思親之深也如欲色者以時人於色厚假以喻之詩云明發不寐有懷二人文王之詩也祭之明日明發不寐饗而致之又從而思之祭之日樂與哀半饗之必樂已至必哀坐不寐謂夜而至旦也祭之日謂繹日也言繹之夜不寐也二人謂父母孝子將祭慮事不可以不豫比時具物不可以不備虚中以治之比時猶先時虛中不兼念餘事宫室既修墻屋既設百物既備夫婦齋戒沐浴盛服奉承而進之洞洞乎屬屬乎如弗勝如將失之其孝敬之心至也與薦其樽俎序其禮樂備其百官奉承而進之於是諭其志意以其恍惚以與神明交庶或饗之庻或饗之孝子之志也諭謂使祝祝饗及侑尸也或猶有也想見其彷彿来孝子之祭也盡其慤而慤焉盡其信而信焉盡其敬而敬焉盡其禮而不過失焉進退必敬如親聴命則或使之也如居父母之前將受命而使之孝子之祭可知也其立之也敬以詘詘充詘形容喜貌也其進之也敬以愉謂進血腥其薦之也敬以欲薦之謂進熟欲婉順貌退而立如將受命已徹而退敬齊之色不絶於面父母既没必求仁者之粟以祀之此之謂能終孝子將祭祀必有齊莊之心以慮事以具服物以修宫室以治百事及祭之日顔色必温行必恐如懼不及愛然鄭氏曰如懼不及見所愛然其奠之也容貌必温身必詘如語焉而未之然如有所以語親而未見答宿者皆出其立卑静以正如將弗見然宿者皆出謂賔助祭者事畢出去也如將弗見然祭事畢而不知親所在思念之深如不見出也及祭之後陶陶遂遂如將復入然思念既深如覩親將復入也陶陶遂遂相隨行之貌是故慤善不違身耳目不違心思慮不違親結諸心形諸色而術省之孝子之志也術為當作述夫祭者非物自外至也自中出生於心也心怵而奉之以禮是故唯賢者能盡祭之義賢者之祭也必受其福非世之所謂福也福者備也備者百順之名也無所不順之謂備言内盡於己而外順於道也忠臣以事其君孝子以事其親其本一也祭統下同孝子之事親也有三道焉生則養没則喪喪畢則祭養則觀其順也喪則觀其哀也祭則觀其敬而時也盡此三道者孝子之行也既内自盡又外求助昏禮是也故國君取夫人之辭曰請君之玉女與寡人共有敝邑事宗廟社稷此求助之本也夫祭也者必夫婦親之所以備外内之官也及時將祭君子乃齊齊之為言齊也齊不齊以致齊也防其邪物訖其嗜欲耳不聴樂故記曰齊者不樂言不敢散其志也心不茍慮必依於道手足不茍動必依於禮是故君子之齊也專致其精明之徳也故散齊七日以定之致齊三日以齊之定之之謂齊齊者精明之至也然後可以交於神明也君子之祭也必身親涖之有故則使人可也張子曰事親奉祭豈可使人為之君子將營宫室宗廟為先廏庫為次居室為後凡家造祭器為先犧賦為次養器為後無田禄者不設祭器有田禄者先為祭服君子雖貧不粥祭器雖寒不衣祭服為宫室不斬於丘木曲禮鄭氏曰廣敬鬼神也粥賣也丘壠也又按程子曰冠昏喪祭禮之大者今人都不理會豺獺皆知報本今士大夫多忽此厚於奉養而薄於先祖甚不可也某嘗修六禮大畧家必有廟廟必有主月朔必薦新時祭用仲月冬至祭始祖立春祭先祖季秋祭禰忌日迎主祭於正寢凡事死者皆當厚於生者人家得此數件雖㓜者可使漸知禮義大夫祭器不假祭器未成不造燕器王制以上言祭享大意其始死之奠與虞袝練祥時祀之儀别見又程子家治喪不用浮屠在洛亦有化之者司馬氏闢之尤嚴然彼之教得行由吾之禮先廢使今之居喪者始死有奠朔有殷奠虞祔祥禫皆有祭既足以盡人子追慕之情則於世俗之禮且將不暇為之矣不復祭禮而徒曰勿用浮屠使居喪者倀倀然無以報其親未見其可也君子有終身之喪忌日之謂也忌日不用非不祥也言夫日志有所至而不敢盡其私也祭義鄭氏曰忌日親亡之日忌日者不用舉他事如有時日之禁也近世大儒有忌日以黲巾墨衰受弔者或疑之答曰禮不云君子有終身之喪乎前世名家嫁女其篋中有墨衰一稱以為忌日慰舅姑之服皆可法也又程子曰人無父母生日當倍悲痛更安忍置酒張樂以為樂若具慶者可矣愚謂人子之於生日茍無父母當以忌日之禮自處唐太宗以萬乘之主能行之况學者而可昧此乎故附於忌日之下曾子有疾召門弟子曰啓予足啓予手詩云戰戰兢兢如臨深淵如履薄氷而今而後吾知免夫小子朱子曰曾子平日以為身體髮膚受之父母不敢毁傷故於此使弟子開其衾而視之戰戰恐懼兢兢戒慎臨淵恐墜履氷恐陷也曾子以其所保之全者示門人而言其所以保之之難如此至於將死而後知其得免於毁傷也程子曰君子曰終小人曰死君子保其身以没為終其事也故曾子以全歸為免矣尹氏曰父母全而生之子全而歸之曾子之啓手足為是故也范氏曰身體猶不可虧也况虧其行以辱其親乎曾子奉持遺體無時不戒慎恐懼直至啓手足之時方得自免這箇身已直是頃刻不可自安如所謂孝非止尋常奉事而已念慮之㣲有毫髮差錯便是悖理傷道便是不孝只看一日之間内而思慮外而應接事物這箇心畧不檢㸃便差失了至危者無如人心所以曾子常常恁地戰戰兢兢如臨深淵如履薄氷朱子語禮記曰父母雖没將為善思貽父母令名必果將為不善思貽父母羞辱必不果内則曾子曰身也者父母之遺體也行父母之遺體敢不敬乎居處不莊非孝也事君不忠非孝也涖官不敬非孝也朋友不信非孝也戰陳不勇非孝也五者不遂烖及於親敢不敬乎亨熟羶薌嘗而薦之非孝也養也君子所謂孝也者國人稱願然曰幸哉有子如此所謂孝也已衆之本教曰孝其行曰養養可能也敬為難敬可能也安為難安可能也卒為難父母既没慎行其身不遺父母惡名可謂能終矣祭義下同南軒張氏曰必如曾子全而歸之然後可謂之能終而世之昧者顧以富貴利達為足以顯其親曾不知枉道茍得戕賊天性莫此之甚而負乘播惡恥加遺體若撻市朝其得失為何如哉是則行身以其道則雖處貧賤而其所為事親者未嘗不得不以其道則雖窮富極貴而所為辱親者益以滋甚矣樂正子春下堂而傷其足數月不出猶有憂色門弟子曰夫子之足瘳矣數月不出猶有憂色何也樂正子春曰善如爾之問也善如爾之問也吾聞諸曾子曾子聞諸夫子曰天之所生地之所養無人為大父母全而生之子全而歸之可謂孝矣不虧其體不辱其身可謂全矣故君子頃歩而不敢忘孝也今予忘孝之道予是以有憂色也壹舉足而不敢忘父母是故道而不徑舟而不游不敢以先父母之遺體行殆壹出言而不敢忘父母是故惡言不出於口忿言不反於身不辱其身不羞其親可謂孝矣程子曰士大夫受職尚期盡其職事况受身於父母安可不盡其道按此亦歸全之義孟子曰事孰為大事親為大守孰為大守身為大不失其身而能事其親者吾聞之矣失其身而能事其親者吾未之聞也朱子曰守身持守其身使不陷於不義也一失其身則虧體辱親雖日用三牲之養亦不足以為孝矣孰不為事事親事之本也孰不為守守身守之本也事親孝則孝可移於君順可移於長身正則家齊國治而天下平孟子曰世俗所謂不孝者五惰其四肢不顧父母之養一不孝也博奕好飲酒不顧父母之養二不孝也好貨財私妻子不顧父母之養三不孝也從耳目之欲以為父母戮四不孝也好勇鬬狠以危父母五不孝也以上言謹身乃孝之終也或問父母既終如何行孝武夷胡氏曰何嘗一歩離其言有味故附此曾子曰樹木以時伐焉禽獸以時殺焉夫子曰斷一樹殺一獸不以其時非孝也此章又以一事未善皆非所以為孝孝又非但謹身而已公孫丑曰君子之不教子何也朱子曰不親教也孟子曰勢不行也教者必以正以正不行繼之以怒繼之以怒則反夷矣夫子教我以正夫子未出於正也則是父子相夷也父子相夷則惡矣夷傷也教子者本為愛其子也繼之以怒則反傷其子矣父既傷其子子之心又責其父曰夫子教我以正道而夫子之身未必自行正道則是子又傷其父也古者易子而教之易子而教所以全父子之恩而亦不失其為教父子之間不責善責善則離離則不祥莫大焉王氏曰父有爭子何也所謂爭者非責善也當不義則争之而已矣父之於子也如何曰當不義則亦戒之而已矣又曰章子子父責善而不相遇也匡章齊人上文公都子曰匡章通國皆稱不孝焉夫子與之遊又從而禮貌之敢問何也孟子曰世俗所謂不孝者五云云章子有一於是乎責善朋友之道也父子責善賊恩之大者賊害也朋友當相責以善父子行之則害天性之恩也此章言父子不責善子之諫父已見前幾諫等章父之不教子獨見於此然則子有未善一付之師友而父不問焉可乎曰父未嘗不教子也鯉趨而過庭孔子告之以學詩學禮此非教而何特不深責以善耳然君子之教以身不以言故公明宣學於曾子三年不讀書曾子曰宣而居參之門三年不學何也公明宣曰安敢不學宣見天子居庭親在叱咤之聲未嘗至於犬馬宣説之學而未能宣見夫子之應賔客恭儉而不懈惰宣説之學而未能宣見夫子之居朝廷嚴臨下而不毁傷宣説之學而未能宣安敢不學而居夫子之門乎古之君子其以身教也如此豈必諄諄然命之而後謂之教耶夫子教我以正而夫子未出於正此正以言教不以身教之罪也説苑曰父母正則子孫孝慈孔子家兒不識怒曾子家兒不識罵為人父者其可不知此義邪右明父子之親西山讀書記卷十一
