body:
  text: 西山讀書記卷三十一宋真德秀撰邵子之學程子曰先生少時自雄其才慷慨有大志既學力慕高逺謂先王之事為可必致及其學益老德益邵玩心高明觀天地之運化隂陽之消長以逹乎萬物之變然後頽然其順浩然其歸在洛㡬三十年始也蓬蓽環堵不蔽風雨躬㸑以飬其父母居之裕如講學于家未嘗強以語人而就問者日衆鄉里化之逺近尊之士人之道洛者有不之公府而必之先生之廬先生德氣粹然望之可知其賢然不事表襮不設防畛正而不諒通而不汚清明坦夷洞徹中外接人無貴賤親疎之間羣居燕飲笑語終日不取甚異於人顧吾所樂如何耳其與人言必依於孝弟忠信樂道人之善而未嘗及其惡故賢者悦其德不賢者服其化所以厚風俗成人材者先生之功多矣昔七十子學於仲尼其傳可見者曽子子思而子思之所以授孟子耳其餘門人各以材之所宜為學雖同尊聖人所因而入者門户則衆矣况後此千嵗師道不立學者莫知其從来獨先生之學為有傳也先生得之於李挺之挺之得之於穆伯長推其源流逺有端緒今穆李之言及其行事槩可見而先生醇一不雜汪洋髙大乃其所自得者多矣然而名其學者豈所謂門户之衆各有所因而入者與語成德者昔難其居若先生之道就所至而論之則可謂安且成矣先生有書十二卷曰皇極經世古詩二千篇題曰擊壤集銘曰嗚呼先生志豪力雄濶歩長趨凌髙厲空探幽索隠曲暢旁通在古或難先生從容又門人張崏為行狀畧曰先生治易書詩春秋之學窮意言象數之藴明皇帝王霸之道著書十餘萬言研精極思三十年觀天地之消長推日月之盈縮考隂陽之度數察剛柔之形體故經之以元紀之以㑹參之以運終之以世又斷自唐虞訖于五代本諸天道質以人事興廢治亂靡所不載其辭約其義廣其書著其㫖隱嗚呼美矣至矣天下之能事畢矣先生少事北海李之才挺之挺之聞道於汶陽穆脩伯長伯長以上雖有其聞未之詳也先生既受其學又遊河汾之曲以至淮海之濵渉於濟汶逹於梁宋茍有逹者必訪以道無常師焉廼退居其城廬於百源之上大覃思於易經夜不設寝口不再食三年而學以大成程子曰某接人多矣不雜者三人張子厚邵堯夫司馬君實又曰堯夫放曠又曰堯夫猶空中樓閣又曰堯夫豪傑之士根本不帖帖地又曰堯夫有詩云頻頻到口微成醉拍拍滿懐都是春又曰梧桐月向懐中照楊栁風来面上吹不止風月言皆有理又曰卷舒萬古興亡手出入幾重雲水身若荘周大抵寓言要入他放蕩之場堯夫却皆有理自以為皆有理故要得從心妄行總不妨堯夫又得詩云聖人喫𦂳些兒事其言太急廹此道理平鋪地放著裏何必如此又曰堯夫之學先從理上推意言象數言天下之理須出於四者我得此大者則萬事由我無有不定然未必有術要之亦難以治天下國家其為人則直是無禮不恭又曰堯夫詩雪月風花未品題他便把這些事便與堯舜三代一般此等語自孟子後無人曽敢如此道来須信畫前元有易自從刪後更無詩這個意思元古未有人道来邵子嘗謂程子曰子雖聰明然天下事亦衆矣子能盡知耶子曰天下之事頥所不知者固多然堯夫所謂不知者何事是時適雷起堯夫曰子知雷起處乎子曰頥知之堯夫不知也堯夫愕然曰何謂也子曰既知之安用數推之以其不知故待推而後知堯夫曰子以為起於何處子曰起於起處堯夫瞿然稱善晁以道嘗以書問康節之數於伊川伊川答書云頥與堯夫同里巷居三十年餘世間事無所不問惟未嘗一字及數程子言堯夫疾革言試與觀化一遭子厚言觀化他人便觀得自家又何如觀得化嘗觀堯夫詩意纔做得識道理却於儒術未見所得又曰堯夫臨終時只是諧謔須臾而去以聖人觀之則亦未是葢猶有意也比之常人甚懸絶也問堯夫先知死何也曰只是一個不動心釋氏平生只學這個事将這個做一件大事學者不必學他但燭理明自能之只如邵堯夫事他自如此亦豈嘗學朱子曰周子從理處觀邵子從數上觀皆只是此理又曰從着理上看則君處大數目是細碎又曰太極不如先天之大先天不如太極之精先天乃伏羲本圖非康節自作雖無言語而所該甚廣凡今易中一字一義無不自其中流出者太極却是濓溪自作發明易中大槩綱領意思而已故論其格局則太極不如先天之大而詳論其義理則先天不如太極之精而約葢合一規模不同而太極終在先天範圍之内又不若彼之自然不假思慮安排也若以數言之則先天之數自一而二自二而四自四而八以為八卦太極之數亦自一而二剛柔自二而四剛善剛惡柔善柔惡遂加其一以為五行而遂百及於萬物葢物理本同而象數亦無二致但推得有大小詳畧可伊川之學於大體瑩澈而小節目猶有疏䖏康節能盡得事物之變而大體乃有未粹問康節善談易見得透徹曰然伊川却輕之嘗有簡與横渠云堯夫説易好聽今夜試来聽它説某嘗謂此便見伊川不及孔子處只觀孔子便不如此邵子曰性者道之形體心者性之郛郭較之横渠心統性情説得尤宻真不易之論詳已見心性篇又邵子名言多已見前而先天之説朱子學易啟䝉盡之此不復録程子稱康節空中樓閣言看得四通八逹或言康節心胸如此快活廣大安得如之曰它是甚麽様工夫問近日學者有厭拘檢樂舒放惡精詳喜簡便者自謂慕堯夫為人如何曰邵子這道理豈易及哉它胸襟中有這個學能包括宇宙終始古今如何不做得大放下得今人却恃個甚後敢如此因誦其詩曰日月星辰髙照耀皇王帝伯大鋪舒可謂人豪矣又言看康節為人須極㑹處置事為它神閑氣定不動聲氣須處置得别葢它氣質本来清明又養得来純厚又不曽枉用了心它用心都在𦂳要上為它静極了看得天下事理精明嘗於百原深山中闢書齋獨處其中王勝之嘗乘月訪之必見其燈下正襟危坐雖夜深亦如之若不是飬得至静之極如何見得道理到此又曰它看見天下之事才上手来便成四截其先後緩急莫不有定動中機㑹事到靣前便處置得下康節甚喜子房以為子房善藏其用以老子為得易之體孟子為得易之用合二者而用之想見善處事問康節嘗有荘老之説如何曰便是它有些子這個曰如此莫於道理有異否曰他常説老子云云孟子云云體用自分作兩截二程謂其不雜以今觀之亦恐未然曰他説風花雪月莫是曾㸃意思否曰也是見得眼前這個好曰意其有與自家意思一般之意曰也是它有這些子若不然却淺陋了問堯夫之學似揚雄如何曰數同某看康節易了却看别人底不得他説那太極生兩儀兩儀生四象又都無甚𤣥妙只是從来更無人識又曰太元擬易方州部家皆自三數推之方為之首一以生三為三方三生九為九州九生二十七為二十七部九九乘之斯為八十一家首之以八十一所以凖六十四卦賛之以七百二十九所以凖三百八十四爻無非三數推之康節之數只是加倍之法康節其初想只是得太極生兩儀兩儀生四象心只管在那上轉乆之理自透徹想見一舉眼便成四片其法四之外又有四焉凡物才過到二之半時便煩惱了葢已漸趍於衰也謂如是花方菩蕾則知其将盛既開則知其将衰其理不過如此理在數内數又在理内康節是見得一個盛衰消長之理故能知之若説它知得甚事如歐陽叔弼定諡之類此知康節之淺者也或問康節數學曰且未須理㑹數自是有此理有生便有死有盛必有衰且如一朶花含蘂時是将開略放時是正盛爛熳時是衰謝又如看人即其氣之盛衰便可以知其生死葢其學本於明理故明道謂其觀天地之運化然後頽乎其順浩然其歸若曰渠能知未来事則與世間占覆之術何異其去道逺矣其知康節者末矣葢它玩得此理熟了事物到靣前便見更不待思量又云康節以四起數疊疊推去自易以後無人做得一物如此整齊包括得盡想他毎見一物便成四片了但才到二分以上便怕乾卦方終便知有個姤卦来葢縁他於起處推将来至交接處看得分曉廣云先生前日説康節之學與周子程子少異處莫正在此否若是聖人則處乾時自有個處乾底道理處姤時自有個處姤底道理否先生曰然或誦康節詩云若論先天一事無後天方要着工夫先生問如何是一事無對曰出於自然不用安排廣云一事無處是太極先生曰嘗謂太極是個藏頭底物事重重推将去更無盡期廣云先生所謂迎之而不見首隨之而不見其後是也邵子天地定位否泰反類一詩正是發明先天方圖之義先天圖傳自希夷希夷又自有所傳葢方士技術用以脩煉參同契所言是也問舊無垢引心賛云廓然心鏡大無倫盡此規模有㡬人我性即天天即性莫於微處起經綸不知如何曰是殆非康節之詩也林少頴云蘇内翰作次第是子發也問何以辨曰若是真實見得必不恁地張皇如康節云天向一中分造化人從心上起經綸多少平易實見得者自别又問一中分造化曰本是一個而消息盈虚便生隂陽事事物物皆恁地有消便有息有盈便有虚有個面便有個背道夫曰這便是自然非人力之所能為者曰這便是生兩儀之理邵堯夫詩雪月風花未品題此言事物皆有造化康節曰思慮未起鬼神莫知不由乎我更由乎誰此間有術者人来問事心下黙念則他説相應不念則説不應問姓㡬畫口中黙數則它説便着不數者説不着先生誦康節詩曰施為欲似千鈞弩磨礪當如百煉金或問千鈞弩如何曰只是不妄發康節之學其骨髓在皇極經世其花草便是詩直卿云其詩多説閑静樂底意思太煞把做事了先生曰這個未説聖人只顔子之樂亦不恁地張子之學張子西銘乾稱父坤稱母予兹藐焉乃混然中處朱子曰天陽也以至健而位乎上父道也地隂也以至順而位乎下母道也人稟氣於天賦形於地以藐然之身混合無間而位乎中子道也然不曰天地而曰乾坤者天地其形體也乾坤其性情也乾者徤而無息之謂萬物之所資以始者也坤者順而有常之謂萬物之所資以生者也是乃天地之所以為天地而父母乎萬物者故指而言之故天地之塞吾其體天地之帥吾其性乾陽坤隂此天地之氣塞乎兩間而人物之所資以為體者也故曰天地之塞吾其體乾徤坤順此天地之志為氣之帥而人物之所得以為性者也故曰天地之帥吾其性深察乎此則父乾母坤混然中處之實可見矣民吾同胞物吾與也人物並生於天地之間其所資以為體者皆天地之塞其所得以為性者皆天地之帥也然體有偏正之殊故其於性也不無明暗之異惟人也得其形氣之正是以其心最靈而有以通乎性命之全體於並生之中又為同類而最貴焉故曰同胞則其視之也皆如己之兄弟矣物則得夫形氣之偏而不能通乎性命之全故與我不同類而不若人之貴然原其體性之所自是亦本之天地而未嘗不同也故曰吾與則其視之也亦如已之儕軰矣惟同胞也故以天下為一家中國為一人如下文之云惟吾與也故凡有形於天地之間者若動若植有情無情莫不有以若其性遂其宜焉此儒者之道所以必至於參天地賛化育然後為功用之全而非有所強於外也大君者吾父母宗子其大臣宗子之家相也尊高年所以長其長慈孤弱所以㓜吾㓜聖其合徳賢其秀者也凡天下疲癃殘疾惸獨鰥寡皆吾兄弟之顛連而無告者也乾父坤母而人生其中則凡天下之人皆天地之子矣然繼承天地統理人物則大君而已故為父母之宗子輔佐大君綱紀衆事則大臣而已故為宗子之家相天下之老一也故凡尊天下之髙年者乃所以長吾之長天下之㓜一也故凡慈天下之孤弱者乃所以㓜吾之㓜聖人與天地合其德是兄弟之合德乎父母者也賢者才德過於常人是兄弟之秀出乎等夷者也是皆以天地之子言之則凡天下之疲癃殘疾惸獨鰥寡非吾兄弟之無告者而何哉于時保之子之翼也樂且不憂純乎孝者也畏天以自保者猶其敬親之至也樂天而不憂者猶其愛親之純也違曰悖德害仁曰賊濟惡者不才其踐形惟肖者也不循天理而狥人欲者不愛其親而愛他人也故謂之悖德戕滅天理自絶本根者賊殺其親大逆無道也故謂之賊長惡不悛不可教訓者世濟其凶増其惡名也故謂之不才若夫盡人之性而有以充人之形則與天地相似而不違矣故謂之肖知化則善述其事窮神則善繼其志孝子善繼人之志善述人之事者也聖人知變化之道則所行者無非天地之事矣通神明之德則所存者無非天地之心矣此二者皆樂天踐形之事也不愧屋漏為無忝存心養性為匪懈孝經引詩曰無忝爾所生故事天者仰不愧俯不怍則不忝乎天地矣又曰夙夜匪懈故事天者存其心飬其性則不懈乎事天矣此二者畏天之事而君子所以求踐夫形者也惡㫖酒崇伯子之顧飬育英才潁封人之錫類好飲酒而不顧父母之飬者不孝也故遏人欲如禹之惡㫖酒則所以顧天之飬者至矣性者萬物之一源非有我之得私也故育英材如潁考叔之及荘公則所以永錫爾類者廣矣不弛勞而底豫舜其功也無所逃而待烹申生其㳟也舜盡事親之道而瞽瞍底豫其功大矣故事天者盡事天之道而天心豫焉則亦天之舜也申生無所逃而待烹其恭至矣故事天者天夀不貳而脩身以俟之則亦天之申生也體其受而歸全者參乎勇於從而順令者伯竒也父母全而生之子全而歸之若曾子之啟手啓足則體其所受乎親者而歸其全也况天之所以與我者無一善之不備亦全而生之也故事天者能體其所受於天者而全歸之則亦天之曾子矣子於父母東西南北唯令之從若伯竒之履霜中野則勇於從而順令也况天之所以命我者吉凶禍福非有人欲之私故事天者能勇於從而順受其正則亦天之伯竒矣富貴福澤将厚吾之生也貧賤憂戚庸玉女於成也富貴福澤所以大奉於我而使吾之為善也輕貧賤憂戚所以拂亂於我而使吾之為志也篤天地之於人父母之於子其設心豈有異哉故君子之事天也以周公之富而不至於驕以顔子之貧而不改其樂其事親也愛之則喜而弗忘惡之則懼而無怨其心亦一而已矣存吾順事沒吾寧也孝子之身存則其事親也不違其志而已沒則安而無所愧於親也仁人之身存則其事天也不逆其理而已沒則安而無所愧於天也葢所謂朝聞夕死吾得正而斃焉者故張子之銘以是終焉論曰天地之間理一而已矣然乾道成男坤道成女二氣交感化生萬物則其大小之分親疎之等至於十百千萬而不能齊也不有聖賢者出孰能合其異而反其同哉西銘之作意葢如此程子以為明理一而分殊可謂一言以蔽之矣葢以乾為父坤為母有生之類無物不然所謂理一也而人物之生血脉之屬各親其親各子其子則其分亦安得而不殊哉一統而萬殊則雖天下一家中國一人而不流於兼愛之蔽萬殊而一貫則雖親疎異情貴賤異等而不梏於為我之私此西銘之大指也觀其推親親之厚以大無我之公因事親之誠以明事天之道葢無適而非所謂分立而推理一者夫豈專以民吾同胞長長㓜㓜為理一而必黙識於言意之表然後知其分之殊哉且所謂稱物平施者正謂稱物之宜以平吾之施云爾若無稱物之義則亦何以知夫所施之平哉龜山第二書葢欲發明此意然言不盡而理有飾也故愚得因其説而遂言之如此同志之士幸相與折衷焉某既為此觧後得尹氏書云楊中立答伊川先生論西銘書有釋然無惑之語先生讀之曰楊時也未釋然乃知此論所疑第一書之説先生葢亦未之許也然龜山語録有曰西銘理一而分殊知其理一所以為仁知其分殊所以為義所謂分殊猶孟子言親親而仁民仁民而愛物其分不同故所施不能無差等耳或曰如是則體用果離而二矣曰用未嘗離體也以人觀之四支百骸具於一身者體也至其用處則首不可以加屨足不可以納冠葢即體而言而分已在其中矣此論分别異同各有歸趣大非答書之比豈其年髙德盛而所見始益精與因復表而出之以明答書之説誠有未釋然者而龜山所見葢不終於此而已也問西銘曰更須子細看他説理一而分殊而今道天地不是父母父母不是天地不得分明是一理乾道成男坤道成女則凡天下之男皆乾之氣凡天下之女皆坤之氣從這裏便徹上徹下都即是一個氣西銘自首至末皆是理一分殊乾父坤母固是一理分而言之便見乾坤自乾坤父母自父母又問自惡㫖酒至勇於從而順令此六聖賢事可見理一分殊乎曰惡㫖酒育英才是事天顧飬及錫類則是事親每一句皆存兩義推類可見問天地之塞如何是塞先生曰塞與帥字皆張子用字之妙處塞乃孟子塞天地之間體乃孟子氣體之充者有一毫不滿不足之處則非塞矣帥即志氣之帥而有主宰之意西銘一篇正在天地之塞吾其體天地之帥吾其性兩句乾為父坤為母便是理一而分殊予兹藐焉混然中處便是分殊而理一西銘有個劈下来底道理有個横截斷底道理直卿疑之竊意當時語意似謂每句直下而觀則事天事親之理皆在焉全篇中斷而觀之則上專是事天下專是事親各有攸屬問向日曾以西銘仁孝之理請問先生令截斷横看後来見得孝是發見之先仁是天德之全事親如事天即是孝自此推之事天如事親即仁矣老吾老㓜吾㓜自老老㓜㓜之心推之至於疲癃殘疾皆如吾兄弟顛連而無告方始盡故以敬親之心不欺闇室不愧屋漏以敬其天以愛親之心樂天循理無所不順以安其天方始盡性竊意横渠大意只是如此不知是否曰他不是説孝是将孝来形容這仁事親底道理便是事天底様子人且逐日自把身心来體察一遍便見得吾身便是天地之塞吾性便是天地之帥許多人物生於天地之間同此一氣同此一性便是吾兄弟黨與大小等級之不同便是親疎逺近之分故敬天當如敬親無所不順天之生我安頓得好令我富貴崇髙便如父母愛我當喜而不忘安頓得不好令我貧賤憂戚便如父母欲成就我當勞而不怨徐子融曰先生謂事親是事天底様子只此一句説盡西銘之意矣知化則善述其事窮神則善繼其志這志便是那天地之帥吾其性底志為人子便要述得父之事繼得父之志如此方是事親如事天便要述得天之事繼得天之志方是事天若是違了此道理便是天之悖德之子若害了這仁便是天之賊子若是濟惡不悛便是天之不才之子若能踐形便是天地克肖之子這意思血脉都是從天地之塞吾其體天地之帥吾其性説𦂳要都是這兩句若不是這兩句則天自是天我自是我有何干渉吾其體吾其性有我去承當之理問西銘説潁封人之錫類申生其恭二子皆不能無失處豈能盡得孝道先生曰西銘本不是説孝只是説事天但推事親之心以事天耳二子就此處論之誠是如此葢事親却未免有失處若天道純然則無失之處只是推此心以奉事之耳問西銘無逃而待烹申生未盡子道何故取之先生曰天不到得似獻公也人有妄天則無妄若教自家死便是理合如此只得聽受之問西銘只是言仁孝繼志述事曰是以父母比乾坤主意不是説孝只是以人所易曉者明其所難曉者耳白雲郭氏云西銘專為理言不為分設某謂西銘之書横渠所以示人至為深切而伊川又以理一分殊賛之言雖至約而理則無餘矣葢乾之為父坤之為母所謂理一者也然乾坤者天下之父母也父母者一身之父母則其分不得不殊矣故以民為同胞物為吾與者自其天下之父母者言之所謂理一者也然謂之民則非真以為吾之同胞謂之物則非真以為我之同類矣此自其一身之父母者言之所謂分殊者也又以其曰同胞曰吾與曰宗子曰家相曰老曰㓜曰聖曰賢曰顛連而無告則於其中間又有如是差等之殊哉但其所謂理一者貫乎分殊之中而未始相離爾此天地自然古今不易之理夫子始發明之非一時救弊之言姑以彊此而弱彼也又云西銘止以假塗非終身之學某謂西銘之言指吾體性之所自来以明父乾母坤之實極樂天踐形窮神知化之妙以至於無一行之不慊而沒身焉故伊川以為充得盡時便是聖人恐非專為始學者一時所見而發也西銘它無所附故載於此愚按張子之學只在西銘一篇程子曰西銘之書推理以存義擴前聖所未發與孟子性善飬氣之論同功楊時致書伊川曰西銘言體而不及用恐其流遂至於兼愛先生答之曰云云豈墨氏之比哉西銘明理一而分殊墨氏則二本而無分分殊之蔽私勝而失仁無分之罪兼愛而無義分立而推理一以止私勝之流仁之方也無别而迷兼愛以至於無父之極義之賊也子比而同之過矣且彼正欲使人推而行之本為用也反為無用不亦異乎餘已見前朱子説西銘原道之宗祖也自孟子後葢未見此書又曰訂頑之言極醇無雜秦漢學者所未到又曰訂頑一篇意極完備乃仁之體也學者其體此意令有諸已其地位已髙到此地位自别有見處不可窮髙極逺恐於道無補也又曰訂頑立心便逹天德又曰游酢得西銘讀之即渙然不逆於心曰此中庸之理也能求之語言之外者也又因論𢎞毅曰西銘言𢎞之道又曰觀子厚西銘能飬浩然之氣者也又曰西銘某得此意只是須得子厚如此筆力它人無縁做得孟子以後未有人及此文字省多少言語要之仁孝之理備於此須臾而不於此則是不仁不孝也問西銘如何曰此横渠文之粹者也曰充得盡時如何曰聖人也横渠能充盡否曰言有多端有有德之言有造道之言有德之言説自已事如聖人説聖人事也造道之言則智足以知此如賢人説聖人事也横渠道儘髙自孟子後儒者都無它見識子厚以禮教學者最善使學者先有所㨿守以上皆程子稱道之言而其答書則曰所論大槩有苦心極力之象而無寛裕温柔之氣非明睿所照而考察至此故意屢偏而言多窒小出入時有之明所照者如目所覩纎微盡識之矣考索至者如揣料於物見彷彿可能無差乎更望完飬思慮涵泳義理它日自當條暢又嘗曰子厚謹嚴才謹嚴便有廹切意象無寛舒之氣藍田吕氏曰先生志氣不群當康定用兵時年十八慨然以功名自許上書謁范文正公一見知其逺器欲成就之反責之曰儒者自有名教何事於兵因勸讀中庸先生讀其書雖愛之猶未以為足也於是又訪諸釋老之書累年盡究其説知無所得反而求之六經嘉祐初見洛陽程伯淳正叔昆弟於京師共語道學之要先生渙然自信曰吾道自足何事旁求乃盡棄異學淳如也一本作盡棄其學學焉遺書伊川曰表叔平生議論謂某兄弟有同處則可若謂學於某兄弟無是事故後本云云朱子㨿以為定尹彦明云横渠昔在京師坐虎皮説周易聽從甚衆一夕二程至論易次日横渠徹去虎皮曰吾平日為諸公説者皆亂道有二程近到深明易道吾所弗及汝軰可師之晩自崇文移疾西歸終日危坐一室左右簡編俯而讀仰而思有得則識之或中夜起坐取燭以書其志道精思未始須臾息亦未嘗須臾忘也學者有問多告以知禮成性變化氣質之道學必如聖人而後已聞者莫不動心有進而自得之者窮神知化一天人立大本斥異學自孟子以来未之有也嘗謂門人曰吾學既得於心則脩其辭命辭命無差然後斷事斷事無失吾乃沛然精義入神者豫而已矣熈寧九年秋集所立言謂之正䝉出示門人曰此書予歴年致思之所得其言殆與前聖合大要發端示人而已其觸類廣之則吾将有待於學者吕與叔撰行状龜山楊氏曰西銘止是發明事天之理所謂事天者循天理而已又曰西銘只是要學者求仁而已朱子曰横渠用工親切程氏規模廣大學者用工要當如此横渠之於程子猶伯夷伊尹之於孔子問横渠似孟子否曰横渠嚴宻孟子宏濶横渠之學是苦心得之乃是致曲與伊川異又曰某自十四五時得程張二家之書讀之至今四十餘年但覺其義之深指之逺而近世紛紛所謂文章議論者殆不足復過眼信乎孟氏以来一人而已然非用力之深者亦無以信其必然也舊嘗擇其言之近者别為一書名近思録云又曰横渠云言有教動有法晝有為宵有得瞬有飬息有存此語極好君子終日乾乾不可食息間亦不必終日讀書或静坐存飬亦是天地之生物以四時運動春生夏長同是不息及至秋冬凋落亦只藏於其中故明年復生若使至秋冬已絶則来春無縁復有生意學者常喚令此心不死則日有進以上論張子之學按張子有言為天地立心為生民立極為前聖繼絶學為萬世開太平又曰此道自孟子後千有餘嵗若天不欲此道復明則不使今人有知者既使人有知者則必有復明之理此皆先生以道自任之意故附焉張戬字天棋横渠先生之弟篤實寛裕儼然正色雖喜愠不形於色然與人居温厚之意乆而益親終日言未嘗及於利樂道人之善而不及其惡樂進已之德而不事無益之言其清不以能病人其和不以物奪志常鷄鳴而起勉勉矯強任道力行每若不及德大容物沛然有餘常自省小過差必語人曰我知之矣公等察之後此不復為矣横渠嘗語人曰吾弟德性之美吾有所不如其不自暇而勇於不屈在孔門之列宜與子夏後先晩講學而逹又曰吾弟全器也然語道而合乃自今始吕希哲字原明始從安定胡先生於太學與程先生頥居並舎察程先生學問淵源非它人比首以師禮事之而明道先生横渠兄弟皆與公遊由是知見日益廣大然公未嘗專主一説不私一門務畧去枝葉一意涵飬直截徑㨗以造聖人為説書二年日夕勸導人主以脩身為本脩身以正心誠意為主心正意誠天下自化不假它術身不能脩左右之人且不能喻况天下乎公之行已務自省察校量以自進益晩年嘗言十餘年前在楚州橋壊墮水中時覺心動數年前大病已稍勝前今次疾病全不動矣其自力如此公閑居日讀易一爻遍考古今諸儒之説黙坐沉思隨事觧釋夜則與子孫評論古今商確得失乆之而罷公少從諸老先生學晩更從髙僧宗本脩顒遊盡究其道然後知佛之道與吾聖人合嘗説攻其惡無攻人之惡葢自攻其惡日夜且自㸃檢絲毫不盡即有慊於心矣豈有工夫㸃檢它人耶范祖禹字淳夫嘗與伊川論唐事及為唐鑑盡用先生之意先生謂門人曰淳夫乃能相信如此元祐中客有見伊川者几案無它書惟唐鑑一部先生謂客曰三代以来無此議論又嘗稱淳夫色温而氣和尤可以開陳是非導人主之意又尹彦明問淳夫之為人先生曰其人如玉朱光庭字公掞初授學於安定先生教以為學之本主於忠信公終身力行之又從二程先生於洛陽其所聞以格物致知為進道之門正心誠意為入德之方公服行之造次不忘嘗謂百世以俟聖人而不惑者惟孔孟為然故力排異端以扶聖道劉絢字質夫自髫齡即事明道先生程氏兄弟受學焉君所授有本末所知造淵微知所止矣孜孜焉不知其它也天性孝悌樂善而不為異端所惑故其履也安内日加重而無交戰之病故其行也果明道嘗謂人曰它人之學敏則有矣未易保也斯人之至吾無疑焉君之為人氣和而體荘持論不茍合跬歩不忘學既病與其友李端伯言曰每瞀悶時正坐端意氣即下平居持飬豈可忽乎自㓜治春秋其學祖於程氏專以孔孟之言斷經意既卒伊川以文哭之曰聖學不傳乆矣吾生百世之後将明斯道興斯學於既絶力小任重而不懼其難者亦有冀矣以謂茍能使知之者廣則用力者衆何難之不易也遊吾門者衆矣而信之篤得之多行之果守之固若子者㡬希方頼子致力以相輔而不幸遽亡使吾悲傳學之難則所以惜子者豈止遊從之情哉侯師聖嘗稱曰明道平和簡易惟劉絢庶㡬近之李籲字端伯程子稱其才識頴悟又嘗言明道語録只有李籲本無錯他人只依説時不敢改動或脱忘一二字便大别籲却得其意不拘言語徃徃録得都是其卒也伊川以文祭之曰自予兄弟倡鳴道學世方驚疑能使學者視效而信從子與劉質夫為有力焉予謂二子可以大受期之逺到半年之間相繼以亡使予憂事道者鮮悲傳學之難天於斯文何其艱哉吕與叔亦哭之曰子之胸中閎肆開發求之孔門如賜也逹吕大鈞字和叔為人質厚剛正以聖門事業為己任所知信而力可及則身遂行之不復疑畏故識者方之季路而君之所趍葢亦未見其止也葢大學之廢絶乆矣自扶風張先生唱之而後進蔽於俗尚其才俊者急於進取昏塞者艱於領觧由是寂寥無有知者君於先生為同年友及聞先生學於是心悦誠服執弟子禮請無倦乆而益親自是學者靡然知所向矣先生之學大抵以誠明為本以禮樂為行衆人則姑誦其言而未知其所以進於是焉君即若蹈大路朝夕從事不啻飢渇之營飲食也濳心玩理望聖賢之致尅期可到而日用躬行必取先生之法度以為宗範自身及家自家及鄉人旁及親戚朋友皆紀其行而述其事方諫議憂自始䘮至於塟祭倣古儀所得為者而居䘮之節鉅細規矩於禮又推之祭祀冠婚飲酒相見慶弔之事皆不混習俗粲然有文以相接人咸安而愛之君少時贍學給聞無所不該一日聞先生説遷其素志而前日之學博而以約明渙然氷釋矣故比他人功敏而得之者尤多范㢲表其墓曰惟君明善至學性之所得者盡之心心之所知者踐之身又曰君性純厚易直強明正亮所行不二於心所知不二於行其學以孔子下學上逹之心立其志以孟子集義之功養其德以顔子克已復禮之用厲其行其要歸之誠明不息不為衆人沮之而疑小辯奪之而屈勢利刼之而回知力窮之而止其自任以聖賢之重如此吕大臨字與叔初學於横渠之門横渠卒乃求見二先生而卒業焉伊川稱其六月中来緱氏常窺之必見其儼然危坐可謂敦篤矣元祐中范祖禹薦其脩身好學行如古人為可稱官不及用兄大忠字進伯程子嘗曰進伯老而好學理㑹直是到底又曰和叔任道其風力甚勁然深潜縝宻有所不逮於與叔又嘗言和叔至誠相信又言與叔守横渠學甚固每横渠無説處皆相從才有説了更不肯回蘇昞字季明亦横渠門人而卒業於程氏者吕大忠嘗薦於朝謂其德性純茂強學篤志行年四十不求仕進從故崇文校書張載學為門人之秀自布衣召為博士後坐上書邪黨竄謫胡安國譏其越職上書必有非所宜言者謝良佐字顯道初見明道明道語人曰此秀才展拓得開将来可望明道一日謂之曰爾軰在此相從只是學某言語故其學心口不相應盍若行之請問焉曰且静坐伊川每見人静坐便歎其善學明道又謂謝子雖小魯直是誠篤理㑹事有不透其顙有泚憤悱如此顯道初以記問為學自負該博對明道舉書史不遺一字明道曰賢却記得許多可謂玩物䘮志謝聞此語汗流浹背靣發赤明道却云只此便是惻隱之心及看明道讀史又却逐行看過不差謝甚不服後来省悟却将此事做話頭接引博學之士謝子與伊川别一年徃見之伊川問做甚得工夫謝曰也只去個矜字子細檢㸃得来病痛盡在這裏若按伏得這個罪過方有向進處伊川首肯之因語坐同志者曰此人為學切問近思者也伊川又嘗問近日事如何謝曰天下何思何慮伊川曰是則是有此理賢發得太早在伊川直是會鍛鍊得人説了又却道恰好著工夫也游定夫嘗問公於外物一切放得下否謝曰實在上面做工夫来凡事須有根屋柱無根拆着便倒樹木有根雖剪枝條相次又發如人要富貴要他做甚必須有用處尋討要用處病根将来斬斷便沒事或問子於勢利如何曰打透此闗十餘年矣當初大故做工夫揀難捨底弃却後来漸漸輕至今於器物之類置之只為合要用却無徤羡底心又曰舊多恐懼常於危階上習又嘗作課簿記日用言動視聽是禮與非禮者又言萬事真實有命人力計較不得故平生未嘗干人在書局亦不謁政㦯勸之曰它安能陶鑄我自有命在學者稱之曰上蔡先生云游酢字定夫伊川以事至京師一見謂其資可與適道是時明道知扶溝縣事先生兄弟方以倡明道學為己任設庠序聚邑人子弟教之召公職學事公欣然徃從之得其微言於是盡棄其學而學焉其後得邑河清游定夫徃見之伊川謂定夫曰游君德器粹然問學日進政事亦絶人逺甚於師門見稱如此先生志其墓亦曰公自㓜不群讀書一過目輙成誦比壮益自力心傳目到不為世儒之習誠於中形諸外儀容辭令粲然有文望之知其成德君子云楊時字中立宋嘉祐中有河南二程先生得孟子不傳之學於遺經以倡天下而升堂觀奥號稱髙弟在南方則廣平游定夫上蔡謝顯道與公三人是也公天資夷曠濟以問學充飬有道德器早成積於中者純粹而閎深見於外者簡易而平淡閒居和樂色笑可親臨事截䖏不動聲氣與之遊者雖群居終日嗒然不語飲人以和而鄙薄之態自不形也推本孟子性善之説發明中庸大學之道有欲知方者為指其攸趣無所隱也學者稱之曰龜山先生云伊川自涪歸見學者凋落多從異學獨楊謝不變因歎曰學者昏流於夷狄惟有楊謝二君長進又嘗曰楊時於新學極精今日一有所問能盡知其短而持之介甫之學大抵支離伯淳嘗與楊時讀了數篇其後盡能推類以通之上蔡言舊在二先生之門者伯淳最愛中立正叔最愛定夫二人氣象亦相似劉安節字元承天資近道而敏於學問嘗從當世賢而有道者遊始以致知格物發其材沉涵熟復存心飬性乆之於是有得常曰堯舜之道不過孝悌天下之理有一無二乃若異端則有間矣所治二州專以仁義教化平易近民民有訟委曲訓戒之俾毋再犯㦯問於上蔡曰劉子進乎曰未見它有進處問所以不進者何曰只為未有根因指庭前荼䕷曰此花只為有根故一年長盛如一年尹焞字彦明年二十師事伊川應進士舉答䇿問議誅元祐黨人先生曰噫尚可以干禄為哉不對而出告於程子曰吾不復應進士舉矣子曰子有母在先生歸告其母母曰吾知汝以為善飬不知汝以禄飬於是先生退不復就舉程子聞之曰賢哉母也大觀中新學日興有言者曰程頥倡為異端尹焞張繹為之左右先生遂不欲仕而聲聞益盛學益成同門之士皆尊畏之程子曰我死而不失其正者尹氏子也靖康以布衣召未㡬力辭授和靖處士以歸虜陷洛陽先生之家死於賊先生死復蘇竄長安山中劉豫僣位使人来招先生先生夜逃去徒歩渡渭乆之止於涪紹興五年有從臣言先生之道遂以崇政説書召後為從臣以争和議去先生荘正仁實不欺闇室其於聖人六經之言可順心得如出諸已初見伊川令看敬字請益伊川曰主一則是敬其後看得親切祈寛問如何是主一先生曰敬有甚形影只收歛身心便是主一又言見伊川後半年方得大學西銘看伊川教人專以敬以直内為本先生能力行之嘗問伊川不習無不利時更無睹當更無計較也耶伊川深以為然且曰不易見得如此且更涵飬莫要輕説嘗同張思叔見伊川伊川問二子於某之言如何尹曰聞先生之言言下領意焞不如繹能終守先生之學繹不如焞伊川然之伊川嘗稱彦明必有用於世張繹字思叔初見道楷禪師有祝髪從之之意時周恭叔官洛中謂之曰它日程先生歸可從之學無為空祝髪也及伊川歸自涪陵思叔始見先生時從學者甚衆先生獨許思叔因讀孟子志士不忘在溝壑勇士不忘䘮其元始有自得處伊川嘗言晩得二士謂思叔及尹焞也馬伸字時中崇寧中禁元祐學奸人用事出其黨為諸路學使專紏其事伊川之門學者無幾雖宿素從遊間以趍利叛去公方自吏部求為西京司法曹事鋭然為親依之計至則因張繹求見先生辭焉公曰使伸得聞道雖死何憾况不至於死乎先生聞而歎曰此真有志者遂引而進之自爾出入凡三年公暇雖風雨必一造焉靖康初為御史張邦昌僣位公移書責之且勸迎立康王而退就北靣之列髙宗立進殿中以論汪黄誤國謫濮州監酒死公居常稱曰志士不忘在溝壑勇士不忘䘮其元今日何時溝壑乃吾死所也故其臨事奮不顧身如此公平居晨興必整衣冠端坐讀中庸一過然後出視事常曰志在行道使吾以富貴為心則為富貴所累使吾以妻子為念則為妻子所累是道不可行也故其在廣陵隨身行李一擔而圖書半之侯師聖字仲良明道伊川舅氏也胡文定稱其安於覊苦守節不移講論經術通貫不窮商畧時事纎微皆察尹和靖曰伊川嘗謂侯子議論只好隔壁聽王蘋字信伯楊文靖嘗稱同門後来成就莫踰信伯者胡文定亦稱其學有師承識通世務云問程門誰真得其傳朱子曰也不盡見得如劉質夫張思叔軰又不見它文字看程門諸公力量見識比之康節横渠皆不及又曰吕與叔之文煞實説得好處如千兵萬馬飽滿伉壮上蔡雖有過當處亦説得透龜山文字却弱似是合下㑹得易某嘗謂看文字須似法家深刻方窮究得盡問尹和靖立朝議論曰和靖不觀它書只是持守得好它語録中説涵飬持守處分外親切有些朝廷文字多是門人代作又問龜山立朝却有許多議論曰龜山雜博是讀多少文字問云云曰以某觀之二先生衣鉢似無傳之者又問上蔡議論莫太過曰上蔡好於事上理會理却有過處又問和靖專於主敬集義處少曰和靖主敬把得定亦多近傍理又曰張思叔敏似和靖伊川稱其朴茂然亦狭無展拓氣象又曰伊川之門謝上蔡自禪門来其説亦有差張思叔最後進然深惜其早世使天予之年殆不可量又曰程門弟子親炙伊川亦自多錯葢合下見得不盡㦯後来放倒葢此理無形體故易差有百般滲漏問伊川門人如此其衆何故後来更無一人見得親切或云游楊亦不乆親炙曰也是諸人有首無尾不曾盡心在上靣各去奔走仕宦所以不能理㑹得透如邵康節從頭至尾極終身之力而後得之雖其不能無偏然就它這道理所謂安而成矣如濓溪資禀便較髙他也去仕宦只它這所學自是從合下直到後来所以有成某看来這道理若不是􅂸生盡死去理㑹終不觧得又曰游楊謝三君子初皆學禪後来餘禪猶在故學之者多流於禪游先生大是禪學必是程先生當初説得太髙了它門只曉見上一截少下靣着實工夫故流弊至此或謂龜山恐不如此曰只論語序便可見又曰吕與叔惜乎不夀程子稱其深潜縝宻可見資質好又能涵飬某若只如吕之年亦不見得到此田地又曰吕與叔本是個剛底氣質涵飬得到如此故聖人以剛為君子柔為小人若剛矣須除去剛之病全其為剛之德相次可以為學若不剛終是不能成又曰吕與叔論顔子等處極好又云未發之前心體昭昭具在伊川不破此説克已銘不合以已與物對説又曰上蔡髙邁卓絶言論宏肆善開發人其語雖不能無過然却是確實做工夫来問人之病痛不一各隨所偏處去上蔡才髙所以病痛在矜字曰此説是也然謝氏謂去得矜字後来矜依舊未去説道理好楊楊地又曰上蔡觀復齋記中説道理皆是禪學意思觀它説復與伊川異似以静處如云見此消息不下工夫之類乃是謂儒佛本同而所以不同但是下截耳龜山亦如此某謂明道云以吾觀於佛疑於無異然而不同又曰如今人説道愛從髙妙處説便入禪去自上蔡以来已然又曰龜山天資髙朴實簡易然所見定更不窮究少年未見伊川時先本看荘列等文字後来此念熟了不覺時發出来游先生尤甚羅仲素亦時有此意又曰胡文定作龜山墓誌云其似栁下惠看来是如此又曰尹和靖在程門直是十分鈍底被它只就一個敬字上做工夫終做得成又曰和靖持守有餘而格物未至故所見不精明無活法又曰和靖日看光明經一部門人問之曰母命不敢違也此便是平日闕却諭父母於道一節便致得如此以上論程張門人之學按二程之學龜山得之而南傳之豫章羅氏羅氏傳之延平李氏李氏傳之朱氏此其一𣲖也上蔡傳之武夷胡氏胡氏傳其子五峯五峯傳之南軒張氏此又一𣲖也若周恭叔劉元承得之為永嘉之學其源亦同自出然惟朱張之傳最得其宗故今先叙胡氏父子及羅李二氏之學於伊洛門人之後而又特表朱子以繼周程之統緒而張氏吕氏附見焉千載源流於是乎可考矣胡安國字康侯少入太學同舎有頴昌靳裁之嘗聞西洛程氏之學與公論經史大義公以是學日強識日明紹聖登第時䇿問大約欲復熈豐之政公推言大學格物致知正心誠意以平天下之道詞㡬萬言考官得之定為第一宰執以䇿中無詆元祐語欲降其第上親擢為第三紹興初為上言春秋乃仲尼親筆實經世大典義精理奥尤難窺測今方思濟艱難豈於理戎禦侮之際虚費光隂耽味文采而已乎陛下必欲削平僣暴恢復寶圖使亂臣賊子懼而不作莫若潜心仲尼之經則南靣之術盡在是矣除兼侍讀專以春秋進講初王荆公盡屏先儒以為淺陋獨用已意著三經新説離析字畫偏旁謂之道德性命之學於春秋聖人行事之實漫不能曉則詆以為斷爛朝報直廢弃之不列於學官下逮崇寧防禁益甚故家遺俗㦯存三傳舊本見者撫歎或遂指以為春秋而仲尼經世之心㡬於熄矣公自壮年即有服膺之志嘗曰六籍惟此書出於先聖之手乃使人主不得聞講説學士不得相傳習亂倫滅理用夷變夏殆由此乎於是潜心刻意裒古今諸儒於著述無慮百家片言之善采拾靡遺害義切深必加辨正或去或取無一毫好惡之偏葢凖則之以語孟權衡之以五經證㨿之以歷代之史窮研玩味游泳沈酣者三十年及得伊川先生所作傳其間精義十餘條若合符節益以自信探索愈勤至是年六十有一而書始就慨然歎曰此傳心之要典也葢於克已脩德之方尊君父討亂賊攘夷狄存天理正人心之術未嘗不屢書而致詳焉公負傑出絶異之資見善必為為必要其成知惡必去去必絶其根自㓜少時㔾有出塵之趣登科後同年宴集飲酒過量是後終身不復醉常好奕碁先令人責之曰得一第德業竟止是奕邪是後不復奕學官父師同僚多勸之買妾事既集慨然歎曰吾親侍飬千里之外曾是以為急遽寢其議亦終身不復買妾也在長沙日按行属部過衡嶽愛其雄秀欲一登覧已戒行矣俄而思曰非職事所在也即止辭受取舎一介之微必度於義恬静簡嘿寡於言動雖在宴閒獨處未嘗有怠容慢色語孟五經諸史周而復始至老未嘗釋手每晨昏子弟定省必問何所業有合意則曰士當志於聖人勿臨深以為髙見怠慢不䖍必嚬蹙曰流光可惜将為小人之歸矣子弟㦯近出燕集雖夜已深猶未寝必俟其歸驗其醉否且問其所集何客所論何事有益無益以是為常士子有自逺来學者公隨其資性而接之大抵以立志為先忠信為本以致知為窮理之漸以敬為持飬之要每誦曾子之言曰君子之愛人也以德小人之愛人也以姑息故不以辭色假借子弟及學者亦未嘗降志孫言茍為唯諾以祈人之悦也壮年嘗觀釋氏書後遂屏絶嘗答贑川曽㡬書曰窮理盡性乃聖門事業物物而察知之始也一以貫之知之至也来書以五典四端每事充擴亦未免物物致察非一以貫之之要是欲不舉足而登太山也四端固有非外鑠五典天叙不可違充四端惇五典則性成而倫盡矣釋氏雖有了心之説然其未了者為其不先窮理反以為障而於用處不復究竟也故其説流遁莫可致詰接物應事顛倒差繆不堪㸃檢聖門之學則以致知為始窮理為要知至理得不迷本心如日方中萬象必見則不疑所行而内外合也故自脩身至於天下國家無所䖏而不當矣来書又謂充良知良能而至於盡與宗門要妙兩不相妨何必捨彼而取此夫良知良能愛親敬長之本心也儒者則擴而充之逹於天下釋氏則以為前塵為妄想批根㧞本而殄滅之正相反也而以為不相妨何哉公於出處由道㨿義以心之所安為主其欲出也非由勸勉其欲去也不可挽留朱震被召以出處問公公曰世間惟講學論政則當切切詢究至於行已大致去就語黙之㡬如人飲食其飢飽寒温必自斟酌不可决之於人亦非人所能决也安國出處自崇寧以来皆内斷於心雖定夫顯道諸丈人行皆不以此謀之也定夫者游察院酢也顯道者謝學士良佐也與楊時中立皆二程先生之髙弟公不及二程之門而三君子皆以斯文之任期公謝公嘗語朱震曰胡康侯正如大冬嚴雪百草萎死而松柏挺然獨秀也使其困厄如此乃天将降大任焉耳公尚論古人則以諸葛武侯為首於本朝卿相則以韓忠獻公為冠慕用鄉仰言必稱之性本剛急及其老也氣宇粹温儀貌雍穆於和樂中有毅然不可犯之象於嚴正中有薰然可親近之意年浸髙矣加以疾病而謹飭於禮無異家世至貧轉徙流寓遂至空乏然貧之一字於親故間非惟口所不道故亦手所不書嘗戒子弟曰對人言貧者其意将何求自登第逮休致凡四十年其在實歴之日不登六載雖數以罪去而愛君之心逺而愈篤每被召即置家事不問或通夕不寝思所以告吾君者然宦情如寄所好不在焉侯仲良曰視不義富貴如浮雲者當今天下惟公一人耳子宏字仁仲自㓜志於大道嘗見楊中立先生於京師又從侯師聖先生於荆門而卒傳文靖公之學優游南山之下餘二十年玩心神明不舎晝夜力行所知親切至到析太極精微之藴窮皇王制作之端綜事物於一源貫古今於一息指人欲之偏以見天理之全即形而下者而發無聲無臭之妙使學者驗端倪之不逺而造髙深之無極先生之於斯道可謂見之明而擴之至矣其為知言一書誠道學之樞要制治之蓍龜也其言有曰誠成天下之性性立天下之有情效天下之動心妙性情之德又曰誠者命之道乎中者性之道乎仁者心之道乎惟仁者為能盡性至命學者能精察於視聽言動之間而知心之所以為妙則性命之理葢可黙識矣此南軒張氏所作知言序也朱子於前二章極稱歎之而於性無善惡則辨其不然皆㔾見首篇矣又嘗曰五峰善思然思過處亦有之東莱云知言勝似正䝉朱子曰葢後出者巧也問文定却是卓然有立所謂非文王猶興者曰固是資質好然在太學多聞先生師友之訓所以能然其學問多得頴昌靳裁之啟發又曰文定之學後来得之上蔡者為多又曰五峯臨終謂虞德美曰聖門工夫要處只在個敬此為名論李侗字愿中世所謂延平先生也少遊鄉校有聲㔾而聞郡人羅仲素得河洛之學於龜山楊文靖公之門遂徃學焉羅公清介絶俗雖里人鮮克知之見先生從遊受業或頗非笑先生若不聞從之累年受春秋中庸語孟之説從容潜玩有㑹於心盡得其所傳之奥羅公少然可亟稱許焉於是退而屏居山里結茅水竹之間謝絶世故餘四十年簞瓢屢空怡然自適中間郡将學官聞其名而招致之或遣子弟從遊受學州郡士人有以矜式焉云云初龜山先生唱道東南士之遊其門者甚衆然語其潜思力行任重詣極如羅公葢一人而已先生既從之學講誦之餘危坐終日以驗夫喜怒哀樂未發之前氣象為何如而求所謂中者若是葢乆之而知天下之大本真有在乎是也葢天下之理無不由是而出既得其本則凡出於此者雖品節萬殊曲折萬變莫不該攝洞貫以次融釋而各有條理如川流脉絡之不可亂大而天地之所以髙厚細而品彚之所以化育以至於經訓之微言日用之小物折之於此無一不得其衷焉由是操存益固涵飬益熟精明純一觸處洞然泛應曲酬發必中節云云後學答問窮夜不倦隨人淺深誘之各不同而要以反身自得而可以入聖賢之域故其言曰學問之道不在多言但黙坐澄心體認天理若真有所見雖一毫私欲之發亦退聽矣乆乆用力於此庶㡬漸明講學始有力耳又曰學者之病在於未有洒然氷觧凍釋處縱有力持守不過茍免顯然悔尤而已若此者恐未足道也又曰今人之學與古人異如孔門諸子群居終日交相切磨又得夫子為之依歸日用之間觀感而化者多矣恐於融釋脱落處非言説所及也不然子貢何以言夫子之言性與天道不可得而聞也耶嘗以黄太史之稱濓溪周夫子胸中洒落如光風霽月云者為善形容有道者氣象嘗諷誦之而顧謂學者曰存此於胸中庶㡬遇事廓然而義理少進矣其語中庸曰聖門之傳是書其所以開悟後學無遺䇿矣然所謂喜怒哀樂未發謂之中者又一篇之指要也若徒記誦而已則亦奚以為哉必也體之於身實見是理若顔子之歎卓然見其為一物而不違乎心目之間然後擴充而徃無所不通則庶乎可以言中庸矣其語春秋曰春秋一事各是發明一例如觀山水徙歩而形勢不同不可拘以一法然所以難言者葢以常人之心推測聖人未到聖人灑然處豈能無失耶其於語孟他經無不貫逹茍有疑問答之必極其趣葢嘗曰讀書者知其所言莫非吾事而即吾身以求之則凡聖賢所至而吾所未至者皆可勉而進矣若直以文字求之悦其辭義以資誦説其不為玩物䘮志者㡬希以故未嘗為講觧文書然其辨析精微毫釐畢察嘗語問者曰講學功在深潜縝宻然後氣味滋長蹊徑不差若槩以理一而不察乎其分之殊此學者所以流於疑似亂真之説而不自知也其開端示人大要類此先友鄧廸天啟謂愿中如氷壺秋月表裏澄徹識者賞其知言云此朱子所為行状也問延平先生言行曰他却不曾著書充飬得極好凡為學不過是恁地涵飬将去初無異義只是先生睟靣盎背自然不可及又曰李延平初亦是豪邁底人到後来也得琢磨之力問延平先生静坐之説聞先生頗不以為然如何曰此亦難説静坐理㑹道理自不妨只是討要静坐則不可若理㑹得道理明透自然是静嘗見李先生説舊見羅先生説春秋頗覺不甚好不知到羅浮極静後又理㑹得如何某心嘗疑之以今觀之是如此葢心下熱閙如何看得道理出問李先生謂常存此心勿為事物所勝曰李先生涵飬得自是别真所謂不為事物所勝者古人云終日無疾言遽色先生直是如此問李先生行状云終日危坐以驗夫喜怒哀樂之前氣象為如何而求其所謂中者與伊川之説若不相似曰這處是舊日下得語太重今以伊川之語格之則其下工夫處亦是有些子偏只是被李先生静得極了便自見得是有個覺處問延平欲於未發之前觀其氣象此與楊氏體於未發之前者異同如何曰這個亦有些病那體驗字是有個思慮了便是已發若觀時恁著意看便也是已發問此體驗是著意觀乆恁平常否曰此是以不觀觀之又曰李先生説人心中大段惡念却易制伏最是那不大段計利害乍徃乍来底念慮相續不斷難為驅除今㸔得来是如此朱子𫝊授勉齋黄氏曰先生自少厲志聖賢之學自韋齋得中原文獻之傳聞河洛之學推明聖賢遺意日誦大學中庸以用力於致知誠意之地先生蚤嵗已知其説而心好之韋齋病且亟屬曰籍溪胡原仲白水劉致中屏山劉彦沖三人吾友也學有淵源吾所敬畏吾即死汝徃事之而惟其言之聽則吾死不恨矣先生既孤則奉以告三君子而禀學焉時年十有四慨然有求道之志博求之經傳徧交當世有識之士雖釋老之學亦必究其歸趣訂其是非延平李先生學於豫章羅先生羅先生學於龜山楊先生延平於韋齋為同門友先生歸自同安不逺數百里徒歩徃從之延平稱之曰樂善好義鮮與倫比又曰頴悟絶人力行可畏其所論難體認切至自是從遊累年精思實體而學之所造者益深矣其為學也窮理以致其知反躬以踐其實居敬者所以成始成終也謂致知不以敬則昏惑紛擾無以察義理之歸躬行不以敬則怠惰放肆無以致義理之實持敬之方莫先主一既為之箴以自警又筆之書以為小學大學皆本於此終日儼然端坐一室討論典訓未嘗少輟自吾一心一身以至萬事萬物莫不有理存此心於齊荘静一之中窮此理於學問思辨之際皆有以見其所當然而不容㔾與其所以然而不可易然充其知而見於行者未嘗不反之於身也不睹不聞之前所以戒懼者愈嚴愈敬隐微幽獨之際所以省察者愈精愈宻思慮未萌而知覺不昧事物既接而品節不差無所容乎人欲之私而有以全乎天理之正不安於偏見不急於小成而道之正統在是矣其為道也有太極而隂陽分有隂陽而五行具禀隂陽之氣以生則太極之理各具於其中天所賦為命人所受為性感於物為情統性情為心根於性則為仁義禮智之德發於情則為惻隐羞惡辭遜是非之端形於身則為手足耳目口鼻之用見於事則為君臣父子夫婦兄弟朋友之常求諸人則人之理不異於㔾參諸物則物之理不異於人貫徹古今充塞宇宙無一息之間斷無一毫之空闕莫不析之極其精而不亂然後合之盡其大而無餘先生之於道可謂建諸天地而不悖質諸聖賢而無疑矣故其得於已而為德也以一心而窮造化之原盡性情之妙逹聖賢之藴以一身而體天地之運備事物之理任綱常之責明足以察其微剛足以任其重𢎞足以致其廣毅足以極其常其存之也虚而静其發之也果而確其用之也應事接物而不窮其守之也歴變履險而不易本末精粗不見其或遺表裏初終不見其㦯異至其飬深積厚矜持者純熟嚴厲者和平心不待操而存義不待索而精猶以為義理無窮嵗月有限常慊然有不足之意葢有日新又新不能自已者而非後學之所可擬議也其可見之行則脩諸身者其色荘其言厲其行舒而恭其坐端而直其閒居也未明而起深衣幅巾方履拜於家廟以及先聖退坐書室几案必正書籍器用必整其飲食也羮食行列有定位匕箸舉措有定所倦而休也瞑目端坐休而起也整歩徐行中夜而寝既寝而寤則擁衾而坐或至逹旦威儀容止之則自少至老祁寒盛暑造次顛沛未嘗有須臾之離也行於家者奉親極其孝撫下極其慈閨庭之間内外斬斬恩義之篤怡怡如也其祭祀也事無纎鉅必誠必敬小不如儀則終日不樂已祭無違禮則油然而喜死䘮之際哀戚備至飲食衰絰各稱其情賔客徃来無不延遇稱家有無常盡其歡於親故雖疎逺必致其愛於鄉閭雖微賤必致其恭吉凶慶弔禮無所遺賙䘏問遺恩無所闕其自奉則衣取蔽體食取充腹居止取足以障風雨人不能堪而處之裕如也若其措諸事業則州縣之施設立朝之言論經綸規畫正大宏偉亦可槩見雖逹而行道不能施之一時然退而明道足以傳之萬代謂聖賢道統之傳散在方冊聖經之㫖不明則道統之傳始晦於是竭其精力以研窮聖賢之經訓於大學中庸則補其闕遺别其次第綱領條目粲然復明於論語孟子則深原當時答問之意使讀而味之者如親見聖賢而面命之於易與詩則求其本義攻其末失深得古人遺意於數千載之上凡數經者見之傳注其闗於天命之微人心之奥入德之門造道之閾者既已極深研㡬探賾索隐發其㫖趣而無所遺矣至於一字未安一辭未備亦必沉潜反覆或逹旦不寐或累日不倦必求于至當而後已故章㫖字義至微至細莫不理明辭順易知易行於書則疑今文之艱澁反不若古文之平易於春秋則疑聖心之正大决不類傳注之穿鑿於禮則病王安石廢罷儀禮而傳記獨存於樂則憫後世律尺既亡而清濁無㨿是數經者亦嘗討論本末雖未能著為成書然其大㫖固已獨得之矣若歴代史記則又考論西周以来至於五代取司馬公編年之書繩以春秋紀事之法綱舉而不繁目張而不紊國家之理亂君臣之得失如指諸掌周程張邵之書所以繼孔孟道統之傳歴時未乆微言大義鬱而不章為之裒集發明而後得以盛行於世太極先天圖精微廣博不可涯涘為之觧剥條畫而後天地本原聖賢藴奥不至於泯沒程張門人祖述其學所得有淺深所見有疏宻先生既為之區别以悉取其所長至或識見小偏流於異端者亦必研窮剖析而不沒其所短南軒張公東萊吕公同出其時先生以其志同道合樂與之友至或識見少異亦必講磨辨難以一其歸至若求道而過者病傳注誦習之煩以為不立文字可以識心見性不假脩為可以造道入德守虚靈之識而昧天理之真借儒者之言以文老佛之説學者利其簡便詆訾聖賢捐棄經典猖狂呌呶側僻固陋自以為悟立論愈下者則又崇奨漢唐比附三代以便其計功謀利之私二説並立髙者䧟於空無下者溺於卑陋其害豈淺淺哉先生力排之俾不至亂吾道以惑天下於是學者靡然向之先生教人以大學語孟中庸為入道之序而後及諸經以為不先乎大學則無以提綱挈領而盡語孟之精微不參之以論孟則無以融㑹貫通而極中庸之㫖趣然不㑹其極於中庸則又何以建立大本經綸大經而讀天下之書論天下之事哉其於讀書也又必使之辨其音釋正其章句玩其辭求其義研精覃思以究其所難知平心易氣以聽其所自得然為己務實辨别義利毋自欺謹其獨之戒未嘗不三致意焉葢亦欲學者窮理反身而持之以敬也従遊之士迭誦所習以質其疑意有未諭則委曲告之而未嘗倦問有未切則反覆戒之而未嘗隱務學篤則喜見於言進道難則憂形於色講論經典啇略古今率至夜半雖疾病支離至諸生問辨則脱然沉痾之去體一日不講學則惕然常以為憂摳衣而来逺自川蜀文辭之傳流及海外至於夷虜亦知慕其道竊問其起居窮鄉晩出家蓄其書私淑諸人者不可勝數先生既沒學者傳其書信其道者益衆亦足以見理義之感於人者深矣繼徃聖将微之緒啟前賢未發之機辨諸儒之得失闢異端之訛謬明天理正人心事業之大又孰有加於此者至若天文地志律厯兵機亦皆洞究淵微文辭字畫騷人才士疲精竭神常病其難至先生未嘗用意而亦皆動中規繩可為世法是非姿稟之異學行之篤安能事事物物各當其理各造其極哉學脩而道立德成而行尊見之事業者又如此秦漢以来迂儒曲學既皆不足以望其藩墻而近代諸儒有志乎孔孟周程之學者亦豈能以造其閫域哉嗚呼是殆天所以相斯文焉篤生哲人以大斯道之傳也黄氏又曰道之正統待人而後傳自周以来任傳道之責得統之正者不過數人而能使斯道章章較著者一二人而止耳由孔子而後曾子子思繼其微至孟子而始著由孟子而後周程張子繼其絶至先生而始著葢千有餘年之間孔孟之徒所以推明是道者既已煨燼殘闕離析穿鑿而微言㡬絶矣周程張子崛起於斯文湮塞之餘人心蠧壊之後扶持植立厥功偉然未及百年蹖駁尤甚先生出而自周以来聖賢相傳之道一旦豁然如大明中天昭晰呈露則摭其言行又可畧歟輙探同志之議敬述世系爵里出處言論與夫學問道德行業人之所共知者而又私竊以道統之著者終之以俟知德者考焉按先生語録多自言為學工夫今附此問嘗讀孟子求放心章今每覺心中有三病云云曰若論求此心放失有千般萬様病何止於三然亦别無道理醫治只在專一果能專一則静静則明明則自無遮蔽既無遮蔽須自有舒泰寛展處這也未嘗如此且收歛此心專一漸漸自㑹熟熟了自有此意㸔来百事只在熟且如百工技藝也只要熟熟則精精則巧又問先生徃時初學亦覺心有不專一否曰某初為學初無見成模様這邊也去理㑹尋討那邊也去理㑹尋討向時諸前軰每人各是一般説話後来見李先生較説得有下落説得較縝宻若㸔如今自是有見成下工夫處㸔来須是先理㑹箇安著處譬如人治生也須先理㑹箇屋子安着身已方始如何積累漸漸須做成家計若先来未有安着身已處雖經營畢竟不濟事為學者不先存此心雖説要去理㑹東東西西都自無安着處孟子所以云收放心亦不是説只收放心便了收放心且收歛得箇根基方可以做工夫若但知收放心不做工夫則如近日江西所説只是守箇死物事又曰某不敢自昧實以銖累寸積而得之又曰已前㸔得心只是虚蕩地而今㸔得来湛然空明時那萬理便在裏靣向前㸔得似一張白紙今㸔得那紙上都是字又曰某舊時持論亦好髙近来漸漸移近下漸漸覺實今日學者不長進只是心不在焉嘗記少年時在同安夜聞鐘鼓聲聽其一聲未絶而此心已自走作因此警懼乃知為學須是專心致志又言人有一正念自是分曉又從旁别生一小念漸漸放濶去不可不察又曰延平先生嘗云人之念慮若是於顯然過惡萌動此却易見易除却怕於匹似閑底事爆起来纒繞思念将去不能除此尤害事某向来亦是如此又嘗論科舉云非是科舉累人自是人累科舉若髙見逺識之士讀聖賢之書據吾所見而為文以應之得失利害置之度外雖日日應舉亦不累也某於科舉自小便見得輕初亦非有所見而輕之也又言初師屏山籍溪學於文定又好佛老以文定之學為論治道則可而道未至然於佛老亦未有見屏山少年能為舉業官莆田接㙮下一僧能入定數日後乃見了老歸家讀誦儒書以為與佛合故作聖傳論其後屏山先亡籍溪在某自見於此道未有所得乃見延平因論象山之學子静説話常是兩頭明中間暗㦯問暗是如何曰是它那不説破處他所以不説破處便是禪鴛鴦綉出從君㸔莫把金針度與人他禪家自愛如此某年十五六時亦嘗留心於此一日在劉病翁所㑹一僧與之語其僧只相應和了説也不説是不是却與劉説某也理㑹得箇昭昭靈靈底禪劉後説與某某遂疑此心更有要妙處在遂去叩問也見他説得也煞好及去赴試時便用他意思去胡説是時文字不似而今細宻由人麄説試官為某説動了遂得舉後赴同安任時年二十四至此始見李先生與他説李先生只説不是某却倒疑李先生理㑹此未得再三質問李先生為人簡重却不甚㑹説只教㸔聖賢言語某遂将那禪来權倚閣起意中道禪亦自在且将聖人書来讀讀来讀去一日復一日覺得聖賢言語漸漸有味却回頭㸔釋氏之説漸漸破綻罅漏百出又曰某少時未有知亦曾學禪只李先生極言其不是後来考竟却是這邊味長才這邊長得一寸那邊便縮了一寸到今銷鑠無餘矣又曰舊嘗以論心論性處皆類聚㸔㸔熟乆則自見又曰讀書須純一如㸔一般未了又要般渉都不濟事某向時讀書方其讀上句則不知有下句方其讀上章則不知有下章讀中庸則祗讀中庸讀論語則祗讀論語一日之間祗㸔一二章将諸家説㸔合與不合凡讀書到冷淡無味處尤當着力推考又曰舊見李先生説理㑹文字須令一件融釋了後方更理㑹一件融釋二字下得極好此亦伊川所謂今日格一件明日又格一件格得多後自脱然有貫通處此亦是它眞曾經歴来便説得如此分明今若一件未能融釋而又欲理㑹一件則第二件又不了推之萬事事不了何益又曰讀書貪多最是大病下稍都理㑹不得若到閑時無書讀時得一件書㸔更子細某向為同安簿滿到泉州候批書在客邸借文字只借得一冊孟子将来子細讀方尋得本意見㸔他初問如此問又如此答待再問又恁地答其文雖若不同自有意脉都相貫通句句語意都有下落又曰凡㸔文字諸家説異同處最可觀某舊日㸔文字專㸔異同處如謝上蔡之説如彼楊龜山之説如此何者為得何者為失所以為得者是如何所以為失者是如何又曰㸔道理若只恁地説過一遍便了則都不濟事須是常常把来思量始得延平先生嘗言道理須是日中理㑹夜裡却去静處坐地思量方始有得某依此説去做真个是不同又曰某所以讀書自覺得力者只是不先立論且尋句内意隨文觧義曰某少時讀四書甚辛苦諸公今讀時却又較易做工夫了又曰某向来㸔大學猶病於未子細如今愈㸔方見得精切因説前軰諸先生長者説話於大體處固無可議若㸔其他細碎處大有工夫未到又曰某於大學用工甚多温公作通鑑言臣平生精力盡在此書某於大學亦然論孟中庸却不費力又曰某舊時㸔文字甚費心力如論孟諸家觧有一箱每㸔一段必各就諸説上推尋意脉各見得著落然後斷其是非是底都抄出一兩字好亦抄出雖未如今集注簡静然大綱已定今集注只就那上冊来但人不着心守見成就只草草㸔了今試将精義来參㸔兩段所以去取底是如何便自見得因與朋友言及易曰易非學者之急務也某平生也費了些精神理㑹易與詩然其得力則未若語孟之多因説讀詩惟是諷誦之功上蔡亦云詩須是謳吟諷誦以得之某舊時讀詩也只先去㸔許多注觧少間却被惑亂後来讀至半了却只将詩来諷誦至四五十過已漸漸得詩之意却去㸔注觧便覺減了五分以上工夫更從而諷誦四五十過則胸中判然矣因説如今讀書多是不曾理㑹一處通透了少間却多牽引前靣疑難来説此最學者大病問胡氏春秋止説歸忠孝處便為經義不知果得孔子意否荅曰否嘗説詩書是隔一重兩重説易春秋是隔三重四重説春秋義例易爻象雖是聖人立下今説者用之各信巳見然於人倫大綱皆通但未知㑹得聖人當初本説否且不如讓渠如此説且存取大意得三綱五常不至廢墜足矣今欲直得聖人本意不差未須理㑹他經先須於論語孟子中專意㸔他切不可忙虚心觀之不須先自立見識徐徐以俟之莫立課程某二十年前得上蔡語録觀之初用銀朱畫出合處及再觀則不同矣乃用粉筆三觀則又用墨筆數過之後則全與元㸔時不同矣因言讀書用功之難諸公覺得大故淺近不曾着心某舊時用心甚苦思量這道理如過危木橋子相去只在毫髪之間才失脚便跌落下去用心極苦五十嵗已後覺得心力短㸔見道理只争絲髪之間只是心力已不上所以大學中庸語孟諸文字皆是五十嵗已前做了五十嵗已後長進得甚不多又曰大抵讀書須是虚心方得它聖人説一字是一字自家只平着心去秤停他都不使得一毫杜撰只順他去某向時也杜撰説得終不濟事如今方見得分明方見得聖人一言一字不吾欺只今六十一嵗方理㑹得恁地若或去年死也則杜了自今夏来覺見得纔是聖人説話也不少一箇字也不多一箇字恰恰地好都不用些穿鑿荘子云吾與之虚而委蛇既虚了又要隨他曲折恁地去又曰某覺得今年方無疑又曰某當初講學也豈意到這裏幸而天假之年許多道理在這裏今年頗覺勝似去年去年勝似前年敬子舉先生所謂傳命之脉及佛氏傳心傳髓之説曰便是要自家意思與它為一若心不在上靣書自是書人自是人如何㸔得出孔子曰吾十有五而志於學只十五嵗時便斷斷然以聖人為志矣又按李方子為文公年譜今剟其要附此先生字元晦屏山祝辭曰木晦於根春容燁敷人晦於身神明内腴昔者曽子稱其友曰有若無實若虚不斥厥名而傳於書雖百世之逺揣其氣象知顔氏如愚自諸子言志回欲無伐一宣於聲終身弗越陋巷闇然其光烈烈從事於兹惟參也無慚貫通雖一省身則三夾輔孔門翺翔兩驂學的欲正吾知斯之為指南惟先吏部文儒之粹彪炳育珍又華其繼来兹講磨融融熹熹真聦廓開如源之方駃古人不云乎純亦不㔾子德不日新則時予之耻勿謂此耳充之益充借曰合矣宜飬於䝉言而思毖動而思躓凛凛惴惴惟曽顔是畏先生㓜有異禀五嵗入小學始誦孝經即了其大義書八字於其上曰若不如此便不成人間從群兒嬉遊獨以沙列八卦象詳觀側玩又嘗指日問於吏部曰日何所附曰附於天又問天何所附吏部竒之先生為屏山劉先生墓表有曰先生病時某以童子侍疾一日請問平昔入道次第先生欣然告之曰吾少未聞道官莆田時以疾病始接佛老子之徒聞其所謂清静寂滅者而心悦之以為道在是矣比歸讀吾書而有契焉然後知吾道之大其體用之全乃如是抑吾於易得入德之門焉所謂不逺復者乃吾之三字符也汝尚勉之又為胡籍溪先生墓表曰先生受學於譙公之言曰心為物漬則不能有見惟學乃可明耳於是慨然有得曰所謂學者豈克已工夫也邪由是自信不疑篤志力行以沒其身先生早嵗所聞於二君子者如此初先生學靡常師出入於經傳泛濫於釋老者亦既有年及見延平洞明要道頓悟異端之非盡能掊擊其失由是專精致誠剖微窮深晝夜不懈至忘寝食而道統之傳始有所歸矣先生常言自見李先生為學始就平實乃知向日從事於釋氏之説皆非又云初見延平説得無限道理也曽去學禪李先生曰公恁地懸空理㑹得許多道理而面前事却理㑹不下道亦無他𤣥妙只在日用間着實實做工夫處便自見得其後来方曉他説故今日不至于無理㑹耳延平與其友羅博文宗禮書曰元晦進學甚力樂善畏義吾黨鮮有晩得此人商量所疑甚慰又云此人極頴悟力行可畏講學極造其微處論辨某因此追求有所省渠所論難處皆是操戈入室須從原頭體認来所以好説話某嘗於羅先生得入處後無朋友㡬放倒了得渠如此極有益渠初從謙開善處下工夫来故皆就裡靣體認今既論難見儒者啟脉極能指其差微之處自見羅先生来未見如此者又云此子别無它事一味潛心於此初講學時頗為道理所縳今漸能融釋於日用處一意下工夫若如此漸然則體用合矣此道理全在日用處熟若静處有而動用處無則非矣隆興初元先生将趨命召過延平先生問所宜言延平謂今日三綱不正義利不分故中國之道衰而夷狄盛人皆趍利不顧義故主勢孤先生用其首説以對乾道三年八月如湖南見南軒先生二先生講論之語無所考見按南軒贈行詩有曰遺經得紬繹心事兩綢繆超然㑹太極眼底無全牛先生荅曰昔我抱氷炭從君識乾坤始知太極藴要妙難具論謂有寧有迹謂無復何存惟兹酬酢處特達見本根萬化自此流千聖同茲源以二詩觀之則其徃復而深相契者太極之㫖也四年編程氏遺書成初二程子之門人各有所録雜出並行間頗為後人竄易至是序次有倫去取精審學者始有定從而程子之道復明於世六年先生居䘮盡禮既𦵏日居墓側旦望則歸奠几筵葢自始死至祥禫㕘酌古今咸盡其變因成䘮𦵏祭禮又推之于冠昏共為一編命曰家禮然未嘗為學者道之其後亦多損益未暇更定云八年編次語孟精義成初學者讀二書未知折衷至是書出始知道之有統學之有宗因而興起者甚衆是年資治通鑑綱目成初司馬公既編成通鑑又著目録又著舉要厯胡文定公又著舉要補遺先生因二公四書别為義例表嵗以首年而因年以著統大書以提要而分註以備言大略綱倣春秋而兼採群史之長目倣左氏而稽合諸儒之粹自有通鑑以来未有此書其後再加更定未畢然大經大法則已粲然矣是年西銘觧義成九年太極圖傳通書觧成是年編次程氏外書成淳熈二年東莱吕公自東陽来留止寒泉精舎旬日相與掇周子程子張子書闗大體而切日用者彚次成十四篇盖凡學者所以求端用力處已治人之要與夫辨異端觀聖賢之大畧皆粗見其梗槩號近思録先生嘗語學者曰四子六經之階梯近思録四子之階梯以言為學者當自此而入也四年論語孟子集註或問成初先生既編次語孟集義又約其精粹妙得本㫖者為集註又疏其所以去取之意為或問然恐學者轉而趍薄故或問之書未嘗出以示人然辨析毫釐無微不顯真讀書之龜鑑也是年詩集傳成詩自毛鄭以来皆以小序為主其與經文舛戾則妄穿鑿為説前後諸儒莫能釐正先生獨以經文為主而訂其序之是非復為一編附於經後以還其舊云六年在南康軍作白鹿書院約聖賢教人為學之大端條列以示學者七年南軒先生張公終於江陵明年麗澤先生吕公終於婺先生皆有文以哭之十一年先生還自浙東見其士習馳騖於外每語學者且觀孟子道性善及求放心兩章務收歛凝定以致克已求仁之功而深斥其所學之誤以為舎六經語孟而尊史遷舎窮理盡性而窮世變舎治心修身而喜事功大為學者心術之害極力為吕祖謙軰言之又答陳亮書箴其義利䨇行王霸並用之説先生嘗謂海内學術之弊不過兩説江西頓悟永康事功若不極力争辨此道無由得明十三年易學啟䝉成而序之易經自文王前皆為卜筮至夫子作十翼專用義理發揮經言而未行於世遭秦煨燼易以卜筮故獨得全迄漢魏流為方伎之學王弼始刋落象數釋以清談諸儒因之至我朝伊川程子始發孔子之微言而卦爻之本則未及焉康節邵子傳伏羲先天圖葢得其本而亦未及於卜筮也先生逺推羲文之意作易本義又懼學者未明厥指乃作啟䝉四篇以為言易不本象數既支離散漫而無所根著其本象數者又不知法象之自然未免穿鑿傅㑹故其篇目以本圖書原卦畫明蓍䇿考變占為次凡掛揲及變爻皆盡破古今諸儒之失而易經始還其舊學者不可不知也十四年編次小學書成初先生既發揮大學以開悟學者又懼其失序無本而不足以有進也乃輯此書以訓䝉士使培其根以逹其支云十五年始出太極通書西銘二書觧義以授學者十六年始序大學中庸章句二書之成乆矣不輟修改至是以稳惬於心而始序之紹熈元年在潭州刋四經四子書成奉以告諸先聖易取古文分經傳為十二篇其説曰易經為卜筮而作皆因吉凶以示訓戒故其言雖約而所包甚廣夫子作傳亦畧舉其一端以見凡例而已然而諸儒分經合傳之後學者便文取義徃徃未及玩心全經而遽執傳之一端以為定説於是一卦一爻僅為一事而易之為用反有所局而無以通乎天下之故若是者某葢病之詩書皆取序合為一篇寘諸經後其論書曰漢儒以伏生之書為今文而謂安國之書為古文以今考之則今文多艱澁而古文反平易或者以為今文自伏生女子口授晁錯時失之則先秦古書所引之文皆已如此或者以為記録之實語難工而潤色之雅詞易好則暗誦者不應偏得所難而考文者反專得其所易是皆有不可知者至諸序之文或頗與經不合而安國之序又絶不類西京文字亦皆可疑讀者姑務沉潜反復乎其所易而不必穿鑿傅㑹於其所難可也春秋則出左氏經文别為一書以踵三經之後四子則謂程子之教人必先使之用力乎大學論語中庸孟子之書然後及乎六經葢其難易逺近大小之序固如此而不可亂也然讀者不先於孟子而遽及中庸則非所以為入道之漸五年自長沙召為侍講首論經常權變之道次以學之所得為上言之其詞曰人之有是生也天固與之以仁義禮智之性而叙其君臣父子之倫制乎事物當然之則矣以其氣質之有偏物慾之有蔽也是以或昧其性而亂其倫敗其則而不知反必其學以開之然後有以正心修身而為齊家治國之本此人之所以不可不學而其所以學者初非記誦詞章之謂而亦非有聖愚貴賤之殊也以是而言則臣之所嘗用力固有可為陛下言者請遂陳之葢為學之道莫先於窮理而窮理之要必在於讀書讀書之决莫貴於循序而致精而致精之本則又在於居敬而持志此不易之理也夫天下之事莫不有理為君臣者有君臣之理為父子者有父子之理為夫婦為兄弟為朋友以至于出入起居應事接物之際亦莫不各有理焉有以窮之則自君臣之大以至事物之微莫不知其所以然而亡纎芥之疑善則從之惡則去之而無毫髪之累此為學所以莫先於窮理也至論天下之理則要妙精微各有攸當亘古亘今不可移易唯古之聖人為能盡之而其所行所言無不可為天下後世不易之大法其餘則順之者為君子而吉背之者為小人而凶吉之大者則能保四海而可以為法凶之甚者則不能保其身而可以為戒是其粲然之跡必然之效蓋莫不具於經訓史冊之中欲窮天下之理而不即是以求之則是正墻靣而立爾此窮理所以必在乎讀書也若夫讀書則不好之者固怠忽間斷而無所成矣其好之者又不免夫貪多而務廣徃徃未啟其端而遽欲探其終未究夫此而忽已志乎彼是以雖復終日勤勞不得休息而意緒怱怱常若有所奔趍廹逐而無從容涵泳之樂是又安能深信自得常乆不厭以異於彼之怠忽間斷而無所成者哉孔子所謂欲速則不逹孟子所謂進鋭者退速正謂此也誠能鍳此而有以反之則心潜於一乆而不移而所讀之書文意連接血脉貫通自然漸漬浹洽心與理㑹而善之為勸者深惡之為戒者切矣此循序致精所以為讀書之法也若夫致精之本則在於心而心之為物至虚至靈神妙不測常為一身之主以提萬事之綱而不可有頃刻之不存者也一不自覺而馳騖飛揚以狥物慾於軀殻之外則一身無主萬事無綱雖其俯仰顧盻之間蓋已不自覺其身之所在而况能反復聖言參考事物以求義理至當之歸乎孔子所謂君子不重則不威學則不固孟子所謂學問之道無他求其放心而已矣者正謂此也誠能嚴恭寅畏常存此心使其終日儼然不為物欲之所侵亂則以之讀書以之觀理将無所徃而不通以之應事以之接物将無所處而不當矣此居敬持志所以又為讀書之本也此數語者皆愚臣平生為學艱難辛苦已試之效竊意聖賢復生所以教人不過如此不獨布衣韋帶之士所當從事蓋推帝王之學殆無以易之特以近年以来風俗薄陋士大夫間聞此等語例皆指為道學必排去之而後已是以食芹之美無路自通每抱遺經徒切慨嘆今者乃遇皇帝陛下始初清明無他嗜好獨於問學孜孜不倦而臣當此時特䝉引對故敢忘其固陋而輙以為獻伏望聖明深賜省鍳試以其説騐之於身蚤寤晨興無忘今日之志而自強不息以緝熙于光明使時嘉靖邦國如商髙宗興衰撥亂如周宣王以著明人主講學之效卓然為萬世帝王之標凖則臣雖退伏田野與世長辭與有榮矣先生每講務積誠意以感悟上心每勉上以求放心為之本未㡬䜛説得行先生遂去國歸塗過玉山為其令司馬䢍講四端之㫖學者傳焉是冬竹林精舎成率諸生行釋菜之禮以告成事其文曰後學朱某敢昭告於先聖至聖文宣王㳟惟道統逺自羲軒集厥大成允属元聖述古垂訓萬世作程三千其徒化若時雨惟顔曾氏傳得其宗逮思及孟益以光大自時厥後口耳失真千有餘年乃曰有繼周程授受萬理一原曰邵曰張爰及司馬學雖殊轍道則同歸俾我後人如夜復旦某以凡陋少䝉義方中靡常師晩親有道載鑚載仰雖未有聞頼天之靈幸無失墜逮兹退老同好鼎来落此一邱群居伊始探原推本敢昧厥初奠以告䖍庶其昭格陟降庭止惠我光明傳之方来永永無斁今以吉日恭修釋菜之禮以先師兖國公顔氏郕侯曾氏沂水侯孔氏鄒國公孟氏濓溪周先生明道程先生伊川程先生康節邵先生横渠張先生温國司馬文正公延平李先生從祀慶元六年三月先生有疾己未夜為諸生説太極圖庚寅夜復説西銘且言為學之要惟事事審求其是决去其非積集乆之心與理一自然所發皆無私曲聖人應萬事天地生萬物直而已矣辛酉改大學誠意章午刻疾甚不能興癸亥諸生問疾先生勉以相倡率下堅苦工夫牢固著足方有進歩處甲子命移寝中堂諸生復入問疾因請曰先生之疾革矣萬一不諱當用書儀乎先生揺首然則當用儀禮乎亦揺首然則以儀禮書儀參用之乃頷之就枕誤觸巾目門人使正之揮婦人無得近諸生揖而退良乆恬然而逝是日大風㧞木洪流崩山哲人之萎豈小變哉李方子曰先生之道之至原其所以臻斯域者無他焉亦曰主敬以立其本窮理以致其知反躬以踐其實而敬者又貫通乎二者之間所以成終而成始也故其主敬也一其内以制乎外齊其外以飬乎内内則無貳無適寂然不動以為酬酢萬變之主外則儼然肅然終日若對神明而有以保固其中心之所存及其乆也静虚動直中一外融而人不見其持守之力則篤敬之驗也其窮理也虚其心平其氣字求其訓句索其㫖未得乎前則不敢求乎後未通乎此則不敢志乎彼使之意定理明而無躁易凌躐之患心專慮一而無貪多欲速之蔽始以熟讀使其言皆若出於吾之口繼以精思使其意皆若出於吾之心自表而究裏自流而遡源索其精微若别黒白辨其節目若數一二而又反復以涵泳之切已以體察之必若先儒所謂沛然若江海之浸膏澤之潤渙然氷釋怡然理順而後為有得焉若乃立論以驅率聖言鑿説以妄求新意或援引以相紏紛或假借以相混惑麄心浮氣意象匆匆常若有所廹逐而未嘗徘徊顧戀如不忍去以待其浹洽貫通之功深以為學者之大病不痛絶乎此則終無入徳之期葢自孔孟以降千五百年之間讀書者衆矣未有窮理若此其精者也其反躬也不覩不聞之前所以戒懼者愈嚴愈敬隱微幽獨之際所以省察者愈精愈宻思慮未萌而知覺不昧事物既接而品節不差視聽言動非禮不為意必固我與迹俱冺無所容乎人欲之私而有以全乎天理之正蓋語黙云為之際周旋出入之頃無徃而非斯道之流行矣合是三者而一以貫之其惟敬乎先生天資英邁視世之所屑者不啻如草芥翛然獨與道俱卓然獨與道立固已迥出庶物之表及夫理明義精飬深積盛充而為德行發而為事業人之視之但見其渾灝磅礴不可涯涘而莫知為之者雖門人弟子親炙之乆固亦莫得而形容也姑以蠡測管窺者言之則修諸身者其色荘其言厲其行舒而恭其坐端而直其閒居也未明而起幅巾深衣大帶方履拜於家廟以及先聖退坐書室几席必正書籍噐用必整其飲食也羮食行列有定位匕箸舉措有定所倦而休也瞑目端坐休而起也整歩徐行中夜而寝既寝而寤則擁衾而坐或至逹旦威儀容止之則自少至老祁寒盛暑造次顛沛未嘗有須臾之離也行於家者奉親極其孝撫下極其慈閨庭之間内外斬斬恩義之篤怡怡如也其祭祀也事無纎鉅必誠必敬小不如儀則終日不樂已祭無違禮則油然而安死䘮之祭哀戚備至飲食衰絰各稱其情賔客徃来無不延遇稱家有無常盡其歡於親故雖踈逺必致其愛於鄉閭雖微賤必致其恭吉凶慶吊禮無所遺賙䘏問遺恩無所闕其自奉則衣取蔽體食取充腹居止取足以障風雨人不能堪而處之裕如也至於入以事君則必思堯舜其君出以治民則必欲堯舜其民言論風㫖之所傳政教條令之所布固皆可為世法而其考諸先聖而不謬建諸天地而不悖百世以俟聖人而不惑者則以訂正群書立為凖則使學者有所據依循守以入於堯舜之道此其勲烈之尤彰明盛大者語孟二書世所誦習為之説者亦多而析理未精釋言未備大學中庸自程子始表章之然大學次序不倫闕遺未補中庸雖為完篇而章句渾淪讀者亦莫知其條理之燦然也先生蒐輯先儒之説而斷以已意彚别區分文從字順妙得聖人之本㫖昭示斯道之標的又使學者先讀大學以立其規模次及語孟以盡其藴奥而後㑹其歸於中庸尺度權衡之既定由是以窮諸經訂群史以及百氏之書則将無理之不可精無事之不可處矣又嘗集小學書使學者得以先正其操履集近思録使學者得以先識其門庭羽翼四子以相左右蓋此六書者學者之飲食裘葛凖繩規矩不可以須㬰離也聖人復起不易斯言矣其於易也推卦畫之本體辨三聖之㫖歸專主筮占而實該萬變以還㓗净精微之舊其於詩也深玩辭氣而得詩人之本意盡削小序以破後儒之臆説妄言美刺悉就芟夷以復温柔篤厚之教其於禮也則以儀禮為經而取禮記及諸經史書所載有及於禮者皆以附於本經之下具列註疏諸儒之説補其闕遺兩析其疑晦雖書不克就而宏綱大要固已舉矣謂書之出於口授者多艱澁得於壁藏者反平易學者當沉潜反復於其易而不必穿鑿附㑹於其難謂春秋正義明道尊王賤霸尊君抑臣内夏外夷乃其大義而以爵氏名字日月土地為褒貶之例若法家之深刻乃傳者之鑿説謂周官徧布周宻周公運用天理熟爛之書學者既通四子又讀一經而遂學焉則所以治國平天下者思過半矣謂通鑑編年之體近古因就繩以䇿牘之法以綱提其要以目紀其詳綱倣春秋而兼採羣史之長目倣左氏而稽合諸儒之粹褒貶大義凛乎烈日秋霜而繁簡相發又足與史家之矩範謂諸子百家其言多詭於聖人獨韓子論性專指五常最為得之因為之考訂其集之同異以傳於世而屈原忠憤千古莫白亦頗為發明其㫖樂律乆亡清濁無據亦嘗討論本末探測幽渺雖未及著為成書而其大㫖固㔾獨得之矣若夫析世學之謬辨異教之非𢷬其巢穴而砭其隱微使學者由於大中至正之則而不躓於荆棘獲穽之塗摧陥肅清之功固非近世諸儒所能髣髴其萬一也自夫子設教洙泗以博文約禮授學者顔子曾子子思孟子相與守之未嘗失墜其後正學失傳士各以意為學其騖於後治者既以聞見積累自矜而流於泛濫駁雜之歸其溺於徑約者又謂不立文字可以識心見性而陷於曠蕩空虚之域學者則知所傳矣亦或悦於持敬之約而憚於觀理之煩先生身任道統而廣覧載籍先秦古書既加攷索歴代史記國朝典章以及古今儒生學士之作靡不徧觀取其所同而削其不合稽其實用而剪其煩蕪參伍辨證以扶經訓而詰其舛差秋毫不得遁焉數千年間世道學術議論文詞之變皆若身親歴於其間而耳接目覩焉者大本大根固已上逹有遂柯葉散殊亦皆隨其所至究其所窮條分派别經緯萬端本末鉅細包羅嚢括無所遺漏故所釋諸書悉有依據不為臆度料想之説外至天文地志律厯兵機邊鄙屯防戰守經畫至纎至悉靡不洞究下至文章字畵亦皆髙絶一世蓋其包涵停蓄溥博淵泉故其出之者自若是無窮也學者據經辨疑隨問隨析固著極其精要暇而論難古今其應如響愈扣愈深亹亹不絶及詳味而細察之則亦融貫於一理而已矣嘗有言曰學者聖道未見固必即書以窮理茍有見焉亦當博考諸書有所證驗而後實有所裨􅂇而後安不然則德孤而與枯槁寂滅者無以異矣潜心大業何有哉矧自周衰教失禮樂飬德之具一切盡廢而所以維持此心者惟有書耳詎可轥轢經傳遽指為糟粕而不觀乎要在以心體之以身踐之而勿以空言視之而已矣以是存心以是克已仁豈逺乎哉至於晩嵗德尊言立猶以義理無窮嵗月有限慊然有不足之意洙泗以還博文約禮兩極其至者先生一人而已先生教人規模廣大而科級甚嚴循循有序不容躐等凌節而進至於切已務實辨别義利毋自欺謹其獨之戒未嘗不丁寧懇到提耳而極言之每誦南軒張公無所為而然之語必三嘆焉學者即其所誦而質其疑意有未喻則委曲告之而未嘗倦問有未切則反覆戒之而未嘗隱務學篤則喜見于言進道難則憂形于色講論商畧率至夜半雖疾病支離至諸生問辨則脱然沉痾之去體一日不講學則惕然常以為憂晩見學者繳繞於文義之間深慮斯道之無傳始頗指示本體使深思而自得之其望於學者益切矣嗚呼道之在天下未嘗亡也而統之相傳茍非其人則不得而與自孟子沒千有餘年而後周程張子出焉歴時未乆浸失其真及先生出而後合濓洛之正傳紹魯鄒之墜緒前聖後賢之道該徧全備其亦可謂盛矣蓋昔者易更三古而混於八索詩書煩亂禮樂散亡而莫克正也夫子從而贊之定之刪之正之又作春秋六經始備以為萬世道德之宗主秦火之餘六經既已爛脱諸儒各以已見妄穿鑿為説未嘗有知道者也周程張子其道明矣然於經言未暇釐正一時從遊之士或昧其㫖遁而入于異端者有矣先生於是考訂訛謬探索深微總裁大典勒成一家之言仰包粹古之載籍下採近世之獻文集其大成以定萬世之法然後斯道大明如日中天有目者皆可睹也夫子之統得先生而正夫子之道得先生而明起斯文於将墜覺来裔於無窮雖與天壤俱弊可也張氏吕氏之學朱子記南軒張氏之事曰某嘗竊病聖門之學不傳而道術遂為天下裂士之醇慤者拘於記誦其敏秀者衒於詞章既皆不足以發明天理而見諸人事於是言理者歸於老佛而論事者騖於管商則於理事之正反皆有以病之而去道益逺矣中間河洛之間兩程夫子得其不傳之緒而推明之然今不能百年而學者又失其指近嵗乃幸得吾友敬夫焉而天下之士乃有以知理之未始不該於事而事之未始不根於理也公諱某字敬夫故丞相魏國忠獻公之嗣子也生有異質穎悟夙成忠獻公愛之自其㓜學而所以教者莫非忠孝仁義之實既長又命徃從南嶽胡公仁仲先生問河南程氏學先生一見知其大噐即以所聞孔門論仁親切之指告之公退而思若有得也以書質焉而先生報之曰聖門有人吾道幸矣公以是益自奮厲直以古之聖賢自期作希顔録一篇蚤夜觀省以自警䇿所造既深逺矣而猶未敢自以為足則又取友四方益務求其學之所未至葢玩索講評踐行體騐反覆不置者十有餘年然後昔之所造深者益深逺者益逺而反以得乎簡易平實之地其於天下之理蓋皆瞭然心目之間而實有以見其不能已者是以决之勇行之力而守之固其所以篤於君親一於道義而沒世不忘者初非有所勉慕而強為也又曰公為人坦蕩明白表裏洞然詣理既精信道又篤其樂於聞過而勇於徙義則又奮厲明决無毫髪滯吝意以至病疾垂死而口不絶吟於天理人欲之間則平日可知也故其德日新業日廣而所以見於論説行事之間者上下信之至於如此雖小人以其好惡之私或能壅害於一時然至於公論之乆長蓋亦莫得而揜之也公之教人必使之先有以察乎義利之間而後明理居敬以造其極其剖析開明傾倒切至必竭兩端而後已所為郡必葺其學於静江又特盛暇日召諸生告語不倦民以事至廷中者亦必隨事教戒而於孝悌忠信睦婣任恤之意尤孜孜焉世俗鬼神老佛之説所至必屏絶之獨於社稷山川古先聖賢之奉為兢兢雖法令所無亦以義起其水旱禱祠無不應也平生所著書唯論語説最後出而洙泗言仁諸葛忠武侯傳為成書其他如書詩孟子太極圖説經世編年之屬則猶欲稍更定焉而未及也然其提綱挈領所以開悟後學使不迷於所鄉其功則已多矣蓋其嘗言有曰學莫先於義利之辨而義也者本心之所當為而不能自已非有所為而為之者也一有所為而後為之則皆人欲之私而非天理之所存矣嗚呼至哉言也其亦可謂擴前聖之所未發而同於性善飬氣之功者歟南軒事未畢東莱事附註未有所考右叙聖賢𫝊授源𣲖西山讀書記卷三十一
