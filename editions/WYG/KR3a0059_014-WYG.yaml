body:
  text: 西山讀書記卷十四宋真徳秀撰長幼常棣燕兄弟也閔管蔡之失道故作常棣焉常棣之華鄂不韡韡凡今之人莫如兄弟毛氏曰常棣棣也鄂猶鄂鄂然言外發也韡韡光眀也朱氏曰不猶豈不也此燕兄弟之樂歌故言常棣之華則其鄂然外見者豈不韡韡乎凡今之人則豈有如兄弟者乎孔氏曰爾雅釋毛傳以為常棣之木衆華俱發實韡韡而光眀以興兄弟衆多而相和睦豈不强盛而有光輝乎鄭氏曰承華者鄂也不當作柎柎鄂足也鄂足得華之光眀則韡韡然盛興者喻弟以敬事兄兄以愛覆弟恩義之顯亦韡韡程氏曰常棣今所謂玉李花鄂相承甚力故以喻兄弟又曰韡韡鮮華壮盛之貌不作柎亦可如字亦可以花蕚相依生相親力相承興人之莫如兄弟也王氏曰花蕚之相恃不可須臾離者以天属故也其相承覆相恃而不可離如此死喪之威兄弟孔懐原隰裒矣兄弟求矣毛氏曰威畏也懐思也裒聚也求矣言求兄弟也鄭氏曰死生可畏怖之事維兄弟之親甚相思念程氏曰此章叙兄弟相賴之事人當死生患難之可畏則思兄弟之助方困窮離散羣聚於郊野之時則求所親以相依恃王氏曰不得保其常居而裒於原隰之中此與人同患難之時也當是時人各顧其親則非兄弟孰肯以相求哉呂氏曰疎其所親而親其所疎此失其本心者也故此詩反覆言朋友之不如兄弟葢亦示之以親疎之分使之反循其本也本心既得則由親而及疎秩然有序兄弟之親既篤而朋友之義亦敦矣初非薄於朋友也茍雜施而不孫雖曰厚於朋友如無源之水朝滿夕除豈可保哉或曰人之在難朋友亦可以坐視歟曰毎有良朋況也永嘆則非不憂憫也但視兄弟之急難為差耳詩人之辭各有抑揚然常棣周公作也聖人之言小大髙下皆宜而前後左右不相悖脊令在原兄弟急難每有良朋況也永嘆毛氏曰脊令雝渠也飛則鳴行則摇不能自舍耳急難言兄弟之相救於急難也鄭氏曰每有雖也良善也毛氏曰況兹也永長也程氏曰此章言兄弟相須之急猶脊令首尾相應急難之際其相應如是也鄭氏曰當急難之時雖有善友來兹對之長嘆而已范氏曰兄弟無不相死之義朋友之於患難義有不得相救也則況也永嘆而已王氏曰古者朋友之喪視兄弟視兄弟則急難冦讎何為而不豫曰莫不有君而為之臣莫不有父而為之子莫不有師而為之弟子莫不有兄弟而為之兄弟則吾急難冦讐之所當致力也愽矣又推而致之朋友則吾有所不暇而無禮以節之則吾之憂無窮而人之責無已葢古之道如此而後世之士猶有以恩望朋友而至於離絶者然則世之致力於朋友者非歟曰勢足以振之力足以周之而無傷於義則鄰里鄉黨不可以不勉而況於朋友乎兄弟䦧于墻外禦其務每有良朋烝也無戎毛氏曰䦧狠也鄭氏曰禦禁務侮也兄弟雖内䦧而外禦也朱氏曰烝發語聲毛氏曰戎相也范氏曰兄弟内䦧而猶外禦不敗親也外禦則他人不與故雖朋友猶無相也王氏曰狠於内非令兄弟也然及其禦侮則雖有良朋曽不如不令兄弟之為可恃朱氏曰此章正為管蔡之事而發以眀兄弟恩情之篤也呂與叔解䦧為窺伺謂冦至而兄弟同力以相死也此意亦甚美矣然以文義及一篇全指觀之則未安也蓋此詩首章畧言至親莫如兄弟之意次章乃以意外不測之事言之以眀兄弟之情其切如此三章但言急難則淺於死喪矣至於此章則又以其情義之甚薄而猶有所不能已者言之其序若曰死喪不能相救急難尤相助又不幸而至於或有小忿猶當共禦外侮其所以責之者可謂益輕以約而所以著夫兄弟之義者益深且切矣至於又不能然乃或無事而相忘則兄弟眞為路人矣故下章始深責之然其詞氣和平怨而不怒讀者猶或以為當然而未之悟也其後兩章乃始極道兄弟至親雖有籩豆室家之樂然非兄弟則無與同之以備見兄弟之恩異形同氣死生苦樂無適而不相須之意卒章又申告之使之反覆窮極驗其信然可謂委曲漸次說盡人情矣然其詞意髙深初若簡質闊疏而不切於事者故說者有所不察又以小忿為嫌而曲其說以避之於是一篇之意無復統紀而失聖人之意逺矣喪亂既平既安且寧雖有兄弟不如友生歐陽氏曰此乃責之之辭蘇氏曰人居平安之世不知兄弟之可恃而以至親相責望則兄弟常多過失易以生怨故有以朋友為賢於兄弟者朱氏曰上章言患難之時兄弟相救非朋友可比此章遂言安寧之後乃有視兄弟不如友生者悖理之甚也儐爾籩豆飲酒之飫兄弟既具和樂且孺毛氏曰儐陳也蘇氏曰飫饜也程氏曰孺親慕之義小兒親慕父母謂之孺子此章勸其相燕樂養恩義陳爾籩豆飲樂飫足兄弟既皆來當和樂而相親慕也朱子曰陳籩豆以醉飽而兄弟有不具焉則無與共享其樂矣妻子好合如鼔瑟琴兄弟既翕和樂且湛鄭氏曰如鼔瑟琴之聲相和合也程氏曰此章言兄弟相樂則其妻子好合其和如琴瑟兄弟既志意翕合故其和樂久而不厭朱氏曰言妻子好合如瑟琴之和而兄弟有不合焉則無以久其樂矣宜爾室家樂爾妻孥是究是圖亶其然乎毛氏曰孥子也圖謀也亶信也程氏曰言能如是親睦其兄弟則能宜其室家樂其妻孥窮究是理圖念是事信其然乎否孔氏曰宗族同心人無侵侮然後宜汝之室家保樂汝之妻子矣兄弟不和忿䦧自起外見侵侮内不能救則不能保其大小室家危焉汝於是深思之於是善謀之信其然否乎蘇氏曰小人思慮不遠常以為兄弟之於我無所損益不知兄弟之相親乃所以宜爾室家樂爾妻孥患其淺陋不信故使之深思逺圖乃知其信否呂氏曰告人以兄弟之當親未有不以為然者也不誠知其然則所知者特其名而已凡學蓋莫不然二子乗舟思伋夀也衞宣公之二子争相為死國人傷而思之二子乗舟汎汎其景願言思子中心養養毛氏曰宣公為伋取齊女而美公奪之生夀及朔朔與其母愬伋於公公令伋之齊使賊先待於隘而殺之夀知之以告伋使去之伋曰君命也不可以逃夀竊其節而先往賊殺之伋至曰君命殺我夀有何罪賊又殺之孔氏曰汎汎然見其影之去鄭氏曰願念也毛氏曰養養然憂不知所定蘇氏曰自衛適齊必渉河國人傷其往而不返汎汎然徒見其影欲救之不可得是以思之養養然二子乗舟汎汎其逝願言思子不瑕有害毛氏曰逝往也王氏曰死非其所不得為無瑕䧟父於不義不得為無害雖然其心豈有他哉故詩人恕之曰不瑕有害唯其能不瑕有害也是以恕之云爾太史公曰余讀世家言至於宣公之子以婦見誅弟夀争死以相讓此與晉太子申生不敢眀驪姬之過同俱惡傷父之志然卒死亡何其悲也或父子相殺兄弟相戮亦獨何哉愚按自古處兄弟之變者舜也周公也至於讓國以為仁殺身以為義則有若夷齊伋夀焉學者觀聖賢待兄弟之道知大舜不以象將殺己為怨而忘親愛之心則怨之小者當如何知周公不以管蔡畔周而遂疑忌宗室則變之小者當如何利莫大於得國觀夷齊之相遜則區區土田金幣何足校害莫大於殺身觀伋夀之更相為死則利害得喪之微尤不足言矣大舜周公之聖夷齊伋夀之賢亦人而已爾均是人也聖賢之於親親若是其厚而我乃丼心以薄自處不亦甚可媿乎葛藟王族刺平王也周室道衰棄其九族焉緜緜葛藟在河之滸終逺兄弟謂他人父謂他人父亦莫我顧毛氏曰緜緜長而不絶之貌左傳曰葛藟猶能芘其本根胡氏曰周南云葛之覃兮施於中谷又云南有樛木葛藟纍之大雅云莫莫葛藟施于條枚然則葛也藟也必生於山谷丘野之地延蔓於草木條枚之上不生於河滸水厓生不得其地則失物之性也王氏曰謂他人父謂他人母謂他人昆所謂不愛其親而愛他人李氏曰王既以他人為父亦無顧我之意我九族也緜緜葛藟在河之涘終逺兄弟謂他人母謂他人母亦莫我有鄭氏曰有言不有也左傳曰不有寡君緜緜葛藟在河之漘終逺兄弟謂他人昆謂他人昆亦莫我聞毛氏曰昆兄也李氏曰不與我相聞知也杕杜刺時也君不能親其宗族骨肉離散獨居而無兄弟將為沃所并爾有杕之杜其葉湑湑獨行踽踽豈無他人不如我同父嗟行之人胡不比焉人無兄弟胡不佽焉毛氏曰杕特生貎杜赤棠也王氏曰湑湑潤澤也毛氏曰踽踽無所親也范氏曰比親也毛氏曰佽助也有杕之杜其葉菁菁獨行睘睘豈無他人不如我同姓嗟行之人胡不比焉人無兄弟胡不佽焉毛氏曰菁菁盛也睘睘無所依也呂氏曰杜雖特生然此詩方云其葉湑湑其葉菁菁即非以比晉君不親宗族也蓋言晉公室枝葉凋落曽杕杜之不如也獨行踽踽言孤立無親豈無他人不如我同父言他人之不足恃嗟行之人胡不比焉人無兄弟胡不佽焉言茍以他人為可恃則嗟彼行道之人胡不自相親比也凡人無兄弟者胡不外求佽助也蓋深曉晉君以行道之人必不相親比茍非兄弟必不相佽助信乎豈無他人不如我同父以上二詩所刺正與常棣相反學者以此二詩與常棣參玩則可以見成周之所以興與平王之不能復振晉昭之所以敗亡其得失蓋原於此然豈獨有國者所當戒哉凡為人未有不頼同氣挾持而能有立者司馬氏家範曰吐谷渾阿豺有子二十人病且死謂曰汝曹各奉吾一箭將玩之俄命其弟慕利延曰汝取一箭折之慕利延折之曰汝取十九箭折之慕利延不能折阿豺曰汝曹知否單者易折衆則難摧戮力一心然後社稷可固彼異域也猶知宗族相保以為安況華夏乎程子曰今人多不知兄弟之愛且如閭閻小人得一食必先以食父母夫何故以父母之口重於己之口也得一衣必先以衣父母夫何故以父母之體重於己之體也至於犬馬亦然待父母之犬馬必異乎己之犬馬也獨愛父母之子輕於己之子甚者至若仇敵舉世皆然惑之甚矣顔之推曰兄弟者分形連氣之人也方其幼也父母左提右挈前襟後裾食則同案衣則傳服學則連業遊則共方雖有悖亂之人不能不相愛也及其壮也各妻其妻各子其子雖有篤厚之人不能不少衰也娣姒之比兄弟則疎薄矣今使疎薄之人而節量親厚之恩猶方底而圓蓋必不合矣惟友愛深至不為傍人之所移者免夫又桺仲塗曰皇考治家孝且嚴旦望弟婦等拜堂下畢即上手低面聽我皇考訓戒曰人家兄弟無不義者盡因娶婦入門異姓相聚争長競短漸漬日聞偏愛私藏以至悖戾分門割戸患若賊讐皆汝婦人所作男子剛腸者幾人能不為婦言所惑者鮮矣若等寧有是耶退則惴惴不敢出一語為不孝事開輩頼之獲全其家云按程子之言孰不知之而鮮克蹈之者雖薄俗漸染使然其所以離間骨肉之親者未有不由婦言是聽者也故以顔桺之說附焉或曰事兄盡禮不得兄之歡心如何曰但當起敬起孝盡至誠不求伸已可也曰接弟之道如何曰盡孝愛之道而已張子曰斯干詩云兄及弟矣式相好矣無相猶矣猶似也人情大抵施不報則輟故恩不能終兄弟之間各盡其己之所宜施者無學其不相報而廢恩也君臣父子朋友之間亦莫不用此道盡已而已朱子曰按此於文義或未必然然意則善矣舊說猶謀也言居是室者兄弟相好而無相謀也故朱子云云以上言兄弟問視巳子與兄子有間否曰聖人立法曰兄弟之子猶子也是欲視之猶子也問第五倫視其子之疾與兄子之疾不同自謂之私如何曰不特安寢與不安寢只十起與不起便是私也父子之愛本是公才著些心做便是私也又問云云曰云云又問天性自有輕重疑若有間然曰只為今人以私心看了孔子曰父子之道天性也此只就孝上說故言父子若君臣兄弟賓主朋友之類亦豈不是天性只為今人小看却不推其本所由來故爾己之子與兄之子所争幾何是同出於父者也只為兄弟異形故以兄弟為手足人多以異形故親己之子異於兄弟之子甚不是也又問孔子以公冶長不及南容故以兄之子妻南容以己之子妻公冶何也曰此亦以己之私心看聖人也凡人避嫌者皆内不足也聖人自是至公何更避嫌凡嫁女必量才求配若孔子事或是年不相若或時有先後皆不可知以孔子為避嫌則大不是避嫌雖賢者且不為況聖人乎此章言兄弟之子與己子不異故附於此禮記適子庶子祗事宗子宗婦鄭氏曰祗敬也宗子大宗疏曰適子謂父及祖之適子是大宗也庶子謂適子之弟宗子謂大宗子宗婦謂大宗子之妻雖富貴不敢以富貴入宗子之家雖衆車徒舍於外以寡約入入謂入宗子家子弟猶歸器衣服裘衾車馬則必獻其上而後敢服用其次也猶若也子弟若有功徳以物見饋賜當以善者與宗子也若非所獻則不敢以入於宗子之門不敢以富貴加於父兄宗族謂非宗子之爵所當服也加猶髙也内則魯人有同姓死而弗弔者人曰在禮當免不免當弔不弔有司罰之如之何子之無弔也曰吾以其疎逺也子思聞之曰無思之甚也昔者季孫問於夫子曰百世之宗有絶道乎子曰繼之以姓義無絶也故同姓為宗合族為屬雖國子之尊不廢其親所以崇愛也是以綴之以食序列昭穆萬世婚姻不通忠篤之道然也國子諸侯卿大夫之子孔叢子范文正公之為參政也嘗告諸子曰吾呉中宗族甚衆於吾固有親疎然吾祖宗視之則均是子孫固無親疎也茍祖宗之意無親疎則飢寒者吾安得不卹也自祖宗來積徳百餘年而始發於吾得至大官若獨享富貴而不卹宗族異日何以見祖宗於地下今何顏入家廟乎於是恩例俸賜常均於族人并置義田宅云程子曰凡人家法須令每月族人逺來則為一㑹以合族雖無事亦當每月一為之古人有花樹韋家宗㑹法可取也然族人毎有吉凶嫁娶之類更當相與為禮使骨肉之意常相通骨肉之疎者只為不相見情不相接耳蘇氏族譜序曰今之相視如塗人者其初兄弟也兄弟其初一人之身也其推說亦善故附於此以上言宗族禮記年長以倍則父事之鄭氏曰謂年二十於四十者十年以長則兄事之五年以長則肩隨之肩隨與之並行而差退也羣居五人則長者必異席席以四人為節因宜有所尊曲禮父之齒隨行兄之齒雁行朋友不相踰廣敬也輕任并重任分頒白者不提挈皆謂以與父等者王制幼子常視母誑童子不衣裘裳立必正方不傾聽長者與之提攜則兩手奉長者之手視與示同習其扶持尊者提挈謂牽行疏曰為兒長大方當供養扶持長者故先使學之令習便也負劒辟咡詔之則掩口而對辟匹亦反咡如志反口耳之間曰咡負謂負之於背劒謂挾之於旁辟咡詔之謂傾頭與語口旁曰咡使之掩口而對習其鄉尊者屏氣矣疏曰劒謂挾於脇下如帶劒也長者負兒之時傾頭與語必掩口而對恐氣觸人也張子曰古之小兒便能敬事長者與之提攜則兩手奉長者之手問之掩口而對蓋稍不敬事便不忠信故敎小兒且須安詳恭敬曲禮尊長於己踰等不敢問其年踰等父兄黨也問年則已恭遜之心不全燕見不將命見賢遍反私燕而見不使擯者將傳其命不敢用賓主之禮來則若子弟然遇於道見則面尊者若見己己則面見若尊者不見己己則隠不敢煩動尊者也不請所之不問所往也喪俟事不犆弔犆音特亦不敢故煩動也事朝夕哭時侍坐弗使不執琴瑟不畫地手無容不翣也尊長或使彈琴指畫則為之可也手無容不弄手也翣扇也雖熱亦不敢搖扇也此皆端慤所以為敬也寢則坐而將命坐跪也命有所傳辭若尊者臥而侍者傳辭當跪前不可以立恐臨尊也侍射則約矢矢箭也凡射必計耦先設箭在中庭上耦前取一次下耦又進取一如是更進各得四箭而升堂揷三於要而手執一若卑者侍射則不敢更拾進取但一時并取四矢故云約矢侍投則擁矢投投壺也擁抱也矢投壺箭也尊者委四矢於地一一取以投卑者不敢委於地悉執之勝則洗而以請若敵射及投壺竟司射命酌而勝者弟子酌酒不勝者飲之若卑者得勝則不敢直酌但當洗爵而請問何所行觴也客亦如之客射若投壺不勝主人亦洗而請之如卑侍之法所以優賓也今按此二句皆是卑者與尊者為耦而射及投壺若巳勝而司射命酌則不敢使他弟子酌酒以罰尊者必自洗爵而請行觴若耦勝則亦不敢煩他弟子酌而飲已必自洗爵而請自飲也註疏說恐非是不角角謂觥罰爵也於尊長與客飲如獻酧之爵不敢用角也不擢馬擢去也謂徹也已徹馬嫌勝故專之疏曰凡投壺每一勝輒立一馬至三馬而成勝但頻勝三馬難得若一朋得二馬一朋得一馬於是二馬之朋徹取一馬者足以為三馬以成定勝也今若卑者朋雖得二馬亦不敢徹尊長馬足成已勝也少儀以上總言事長之禮凡為長者糞之禮必加帚於箕上為去聲掃席前曰糞如是得兩手奉箕恭也謂初執而往時也弟子職曰執箕膺擖厥中有帚以袂拘而退其塵不及長者謂埽時也以袂擁帚之前埽而卻行之疏曰拘障也當埽時卻退以一手捉帚又舉一手衣袂以拘障於帚前且埽且退故曰拘而退以箕自鄉而扱之鄉與嚮同扱音吸扱讀曰吸謂收糞時也箕去棄物以鄉尊者則不恭奉席如橋衡奉芳勇反橋居廟反横奉之令左昂右低如有首尾然橋井上㮮橰衡上低昻疏曰衡横也如橋之横也席舒則有首尾故公食禮云卷自末末即尾也已卷則無首尾此奉之左昻右低故如有首尾也請席何鄉請袵何趾順尊者所安也袵臥席也坐問鄉臥問趾因於隂陽疏曰坐是陽鄉亦陽臥是隂趾亦隂也席南鄉北鄉以西方為上東鄉西鄉以南方為上布席無常此其順之也上謂席端也坐在陽則上左坐在隂則上右曲禮見父之執不謂之進不敢進不謂之退不敢退不問不敢對敬父同志如事父曲禮謀於長者必操几杖以從之從猶就也疏曰几杖俱是養尊之物故於謀議之時將就也長者問不辭讓而對非禮也當謝不敏若曽子之為曲禮從於先生不越路而與人言尊不二也先生老人敎學者遭先生於道趨而進正立拱手為有敎使疏曰拱手見師而起敬故疾趨而進就之也又不敢斥問先生所為故正立拱手而聽先生之敎先生與之言則對不與之言則趨而退為其不欲與己並行從長者而上丘陵則必鄉長者所視為逺視不察有所問曲禮將即席容母怍怍謂顏色變也疏曰此謂弟子講問初來之法即就也兩手摳衣去齊尺齊音咨齊裳下緝也謂就席之時以兩手提裳令下緝去地一尺許恐轉足踐之衣母撥足母蹶撥發揚貌蹶行遽貌先生書策琴瑟在前坐而遷之戒勿越廣敬也在前謂當行之前坐亦跪也遷移也越踰也虚坐盡後盡津忍反疏曰虚空也空謂非飲食坐也玉藻云徒坐不盡席亦是也食坐盡前為汙席疏曰古者地鋪席而爼豆皆陳於席前之地若坐近後則濺汙席故盡前也玉藻云讀書食則齊豆去席尺亦是也坐必安執爾顔安謂不動執猶守也久坐好異長者不及母儳言儳任鑒反儳猶暫也非類雜疏曰長者正論甲事未及乙事少者不得輒以乙事暫然雜之今按說文云儳互不齊也儳言儳長者之先而言也正爾容聽必恭正謂矜莊也聽先生之言不恭敬則心不存而易忘母勦說勦初交反勦猶擥也謂取人之說以為己說母雷同雷之發聲物無不同時應者人之言當各由己不當然也必則古昔稱先王雖不雷同又不得專輒言必有依據母踐屨母踖席摳衣趨隅必愼唯諾趨隅升席必由下也愼唯諾者不先舉見問乃應侍坐於先生先生問焉終則對不敢錯亂尊長之言請業則起請益則起尊師重道也起若今摳衣前請也業謂篇卷也益謂受說不解了欲師更眀說之子路問政子曰先之勞之請益曰無倦父召無諾先生召無諾唯而起應辭唯恭於諾疏曰唯􅀈也諾則似緩慢侍坐於所尊敬母餘席言先生坐一席己坐一席必盡其所近尊者之席端無使有餘蓋欲得親近若扶持備顧問且擬有後來者闕其下以待之見同等不起不為私敬疏曰同等後來者任其坐於下也燭至起異晝夜也食至起為饌變也上客起敬尊者疏曰尊者見之起故侍者宜從之而起然食與燭至起則尊者不起但侍者起也燭不見跋跋本也燭盡則去之嫌若燼多有厭倦意疏曰本把處也古者未有蠟燭惟呼火炬為燭尊客之前不叱狗主人於尊客之前不敢倦嫌若風去之疏曰卑客亦然舉尊為甚讓食不唾嫌有穢惡侍坐於君子問更端則起而對離席而對敬異事也君子必令復坐疏曰更端謂嚮語已畢更問他事侍於君子不顧望而對非禮也禮尚謙也不顧望若子路率爾而對疏曰若指問一人則一人直對若普問衆人則當顧望坐中恐有勝己者不得率爾先對也長者賜少者賤者不敢辭不敢亢禮也賤者僮僕之屬侍坐於君子若有告者曰少間願有復也則左右屏而待間音閑註同復白也言欲須少空間有所白也屏猶退也隠也疏曰卑者正侍君子而有人來告云欲侍君子少間無事時有所白則侍者當自退避之不得迫也毋側聽毋噭應毋淫視毋怠荒遊毋倨立毋跛坐毋箕寢毋伏歛髮毋髢冠毋免勞毋袒暑毋褰裳毋側聽嫌探人之私也側聽耳屬於垣毋噭應以下皆為其不敬噭號呼之聲也淫視流動邪睇不正也怠荒身體放縱不自拘歛也遊行倨慢也跛偏任也立當雙足並立不得挈舉一足一足蹋地也箕謂舒展兩足狀如箕舌也伏覆也髢髲也毋垂餘如髲也免去褰袪也曲禮侍坐於君子請見不請退君子欠伸運笏澤劒首還屨問日之蚤莫雖請退可也不請退者云止不敢自由欠伸以下皆解倦之狀伸頻伸也運澤皆玩弄也金器弄之易以汗澤疏曰運動也澤光澤也玩弄劒首則生光澤還轉也尊者脫屨於戸内屨常在側少儀侍坐於長者屨不上於堂屨賤空則不陳於尊者之側疏曰長者在堂則侍坐者脫屨於階下不得上堂若長者在室則侍坐者得著屨上堂而不得入室解屨不敢當階為妨後升者疏曰内則云屨著綦鄭云綦屨繫也將升堂則解之也就屨跪而舉之屏於側謂獨退也就猶著也屏亦不當階鄉長者而屨跪而遷屨俯而納屨謂長者送之也不得屛遷就近而已俯俛也納内也遷或為還今按注云長者送之恐非是但謂雖降階出戸猶鄉長者不敢背耳曲禮排闔說屨於戸内者一人而已矣闔音合說吐活反雖衆敵猶有所尊有尊長在則否在在内也後來之衆皆說屨於戸外以上云云言洒掃應對進退之節當與後小學篇參觀燕侍食於君子則先飯而後已飯扶晩反小飯同所以勸也疏曰先飯若甞食然後己若勸食然毋放飯毋流歠小飯而亟之亟疾也備噦噎若見問也數噍毋為口容數色角反噍在笑反又作嚼數噍謂數數嚼之口容弄口也客自徹辭焉則止主人辭其徹疏曰徹謂徹俎主人辭則客止少儀侍食於先生異爵者後祭先飯謙也玉藻侍食於長者主人親饋則拜而食長者食耳雖賤不得執食興辭拜而已示敬也主人不親饋則不拜而食亦以稱禮之施耳曲禮凡食果實者後君子隂陽所成非人事也火食者先君子備火齊不得故先嘗之也食棗桃李弗致於核核行隔反恭也弗致者謂不置於地𤓰祭上環食中棄所操上環頭忖也忖亦作刌寸本反疏曰食𤓰亦祭先圃也環者横斷形如環也上環是疐間下環是脫華處也今按頭忖謂疐頭所切一環也以其所生之本味最丼美又先斷而不汙故以為祭中者中環也亦甘且潔故以奉尊者所操下環為手所持處以其味薄而不潔故棄之而不食也玉藻侍飲於長者酒進則起拜受於尊所降席拜受敬也燕飲之禮鄉尊疏曰陳尊之所貴賤不同若諸侯燕及大射鄉飲酒及鄉大夫燕各見本篇今燕禮鄉飲酒皆無拜受於尊所之文疑是文不具耳近尊嚮長者故往於尊所嚮長者而拜也長者辭少者反席而飲長者舉未釂少者不敢飲不敢先尊者盡爵曰釂燕禮曰公卒爵而後飲也疏曰飲酒尊卑異爵故燕禮公執膳爵受賜爵者執散爵又曰受賜爵者以爵就席坐公卒爵然後飲與此禮合而士相見禮云若君賜之爵則下席再拜稽首受爵升席祭卒爵而俟君卒爵然後受虚爵玉藻云君若賜之爵則越席再拜稽首受登席祭之飲卒爵而俟君卒爵然後授虚爵皆先言卒爵者此據燕飲正禮玉藻及士相見禮謂私燕之禮故不同也御同於長者雖貳不辭謂侍食於長者饌具與之同也貳謂重殽膳也本為長者而設故不辭其多耳偶坐不辭偶匹也或彼為客設饌而召己匹坐以食曲禮以上言侍食之禮右言長幼之序按舜命司徒以敷五敎其四不曰兄弟而曰長幼蓋宗族鄉黨皆有長焉非但同氣而已故今所敘先兄弟次宗族次先生長者云朋友易兌之象曰麗澤兌君子以朋友講習程子曰麗澤二澤相附麗也兩澤相麗交相浸潤互有滋益之象故君子觀其象而以朋友講習朋友講習互相益也先儒謂天下之可說莫若朋友講習然當明相益之象詩伐木燕朋友故舊也自天子至於庶人未有不須友以成者親親以睦友賢不棄不遺故舊則民徳歸厚矣孔氏曰朋是同門之稱友是同志之名故舊即昔日之朋友也朋友新故通名故舊唯施久逺舊則不可更擇新交則非賢不友故變朋友曰友賢也親親以睦指上棠棣友賢不棄不遺故舊即此篇是也伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木嚶其鳴矣求其友聲相彼鳥矣猶求友聲矧伊人矣不求友生神之聽之終和且平毛氏曰丁丁伐木聲朱氏曰嚶嚶鳥聲之和郭璞曰兩鳥鳴張氏曰神之聽之終和且平此為求友生程氏曰和謂相好平謂不變張氏曰詩人多相因之詞如伐木而感鳥鳴蓋因此以興焉故也故下章皆以伐木言之程氏曰山中伐木非一人能獨為必與同志者共之既同其事則相親好成朋友之義伐木之人必有此義況士君子乎故賦伐木之人敘其情推其義以勸朋友之道燕朋友故舊則歌之所以風天下朋友故舊篤則民徳厚矣繼言鳥鳴嚶嚶又以物情興朋友之好嚶嚶相應和之和聲鳥聲相應和自幽谷升喬木相追隨嚶然其鳴蓋求其應友聲謂應聲猶人之朋友相從也視鳥如是豈人而不求友乎朋友之信恆久不渝可質於神眀丘氏曰伐木者其聲丁丁然空谷響應出於自然喻朋友故舊聲類之相從亦如此也蘇氏曰事之甚小而須友者伐木也物之無知而不離其羣者鳥也鳥出于谷而升于木以木為安而不獨有也故嚶然而鳴以求其友況於事之大於伐木而人之有知者哉伐木許許釃酒有藇既有肥羜以速諸父寧適不來微我弗顧於粲洒埽陳饋八簋既有肥牡以速諸舅寧適不來微我有咎程氏曰許許衆人共力聲朱氏曰淮南子云舉大木者呼邪許蓋舉重勸力之歌也毛氏曰以筐曰釃以草曰湑藇美貌羜未成羊也鄭氏曰速召也朱氏曰諸父朋友之同姓而尊者也諸舅朋友之異姓而尊者也孔氏曰稱之以父與舅親親之辭也鄭氏曰寧適不來寧召之適自不來也毛氏曰微無也朱氏曰顧念也於歎辭毛氏曰粲鮮明貌孔氏曰粲然洒埽其室庭陳飲食之饋毛氏曰天子八簋孔氏曰簋盛黍稷之器長樂劉氏曰簋八則籩豆倍之天子燕禮之數也孔氏曰肥牡肥羜之牡者毛氏曰咎過也李氏曰上章既言伐木丁丁鳥鳴嚶嚶下章但言伐木許許省文也朱氏曰言具酒食以樂朋友如此寧使彼有故而適不來而無使我恩意之不至也孔子曰所求乎朋友先施之未能也此可謂先施矣伐木于阪釃酒有衍籩豆有踐兄弟無逺民之失徳乾餱以愆有酒湑我無酒酤我坎坎皷我蹲蹲舞我迨我暇矣飲此湑矣蘇氏曰衍多也鄭氏曰踐陳列貌朱氏曰兄弟朋友之同儕者無逺皆在也先諸舅而後兄弟者尊卑之等也乾餱食之薄者也愆過也湑亦釃也酤買也坎坎擊皷聲蹲蹲舞貌迨及也言人之所以至於失朋友之義者非必有大故或但以乾餱之薄不以分人而至於有愆耳故我於朋友不計有無但及間暇則飲酒以相樂也谷風刺幽王也天下俗薄朋友道絶焉長樂劉氏曰天子之於天下無他職也厚其人倫皇建厥極人君之所以夙夜者也是故朋友道絶則琢磨之義不行人不㑹其有極而歸其有極矣於是君得以遂其不君臣得以遂其不臣父得以遂其不父子得以遂其不子以至兄弟夫婦皆失其道由琢磨之義不行而習以成俗莫知以為恥也乃至人倫悖亂亡國喪身而弗可救非天子之責歟其曰刺之不亦宜乎吕氏曰急則相求緩則相棄恩厚不知怨小必記皆小人之交也天下俗薄朋友道絶則莫小人之交習習谷風維風及雨將恐將懼惟予與女將安將樂女轉棄予鄭氏曰習習和調之貌東風謂谷風將且也孔氏曰谷風生長之風取其朋友相長益毛氏曰風雨相感朋友相須鄭氏曰風而雨則潤澤行孔氏曰潤澤是雨之事也但雨得風乃行則潤澤亦由風故易曰潤之以風雨是風雨共為潤丘氏曰危難恐懼則相親愛曰惟予與汝謂與己厚孔氏曰纔得且安且樂汝便轉更棄我乎毛氏曰朋友趨利窮達相棄呂氏曰朋友之義出於天其相求本非以利害也故窮達若一不知其義則利害而已耳離合安可常哉玩習習谷風維風及雨之辭其義益可識矣習習谷風維風及頽將恐將懼寘予于懐將安將樂棄予如遺毛氏曰頽風之焚輪者孔氏曰釋天云焚輪謂之頽扶搖謂之猋孫炎曰迴風從上下曰頽迴風從下上曰猋鄭氏曰寘置也毛氏曰風薄相扶而上喻朋友相須而成孔氏曰頽風從上而下力薄不能更升谷風與相遇之風并力乃相扶而上以喻朋友相率而成鄭氏曰寘我于懐言至親已也如遺者如人行道遺忘物忽然不省存也呂氏曰叔向見司馬侯之子撫而泣之曰自此其父之死吾蔑與比而事君矣昔者此其父始之我終之我始之夫子終之無不可所謂維風及頽此其一端也習習谷風維山崔嵬無草不死無木不萎忘我大徳思我小怨毛氏曰崔嵬山巓朱氏曰習習谷風維山崔嵬言其所被者廣然猶無不死之草不萎之木況於朋友豈可以忘大徳而思小怨劉氏曰天地之功有所不足奈何忘我大徳思我小怨呂氏曰生物之恩及於崔嵬之山不知以為徳一草一木偶然死絶則怨其恩之不足此忘我大徳思我小怨也鄭氏曰大徳切磋以道相成之謂也子貢問友子曰忠告而善道之不可則止毋自辱焉朱子曰友所以輔仁故盡其心以告之善其說以道之然以義合者也故不可則止若以數而見疏則自辱矣或問云云曰善道云者心平氣和理眀意盡或從容深厚或親切簡當使聞者不忤而樂於聽從之謂也朋友數斯疏矣已見君臣篇曽子曰君子以文㑹友以友輔仁朱子說見言仁篇南軒曰朋友講習與夫攝以威儀莫非文也為仁固由已而亦資朋友輔成之輔之者左右翼助之意蓋非惟切磋之益其從容浹洽相觀而善所輔為多孔子曰益者三友損者三友友直友諒友多聞益矣友便辟友善柔友便佞損矣朱子曰友直則聞其過友諒則進於誠友多聞則進於眀便習熟也便辟謂習於威儀而不直善柔謂工於媚說而不諒便佞謂習於口語而無見聞之實三者損益正相反也尹氏曰自天子至於庶人未有不須友以成者而其損益有如是者可不謹哉或問三友之說盡於集註之說而已乎曰是亦釋其文之正意云爾若推而言之則是三者之於人皆有薰陶漸漬之意焉皆有嚴憚畏謹之益焉皆有興起慕効之益焉不但如彼之所言而已也曰損者之友其相反奈何曰便辟則無責善之誠矣善柔則無固守之節矣便佞則無貫通之實矣南軒曰友者所以輔成已徳也直者有過必告諒者忠信相與多聞者知識可資是三者友之則使人常懐進修而不敢自足焉得不日益乎便辟便佞謂便於辟與佞者善柔謂善為柔者辟則容止足恭柔則每事卑屈佞則巧言為悅是三者友之則使人日趨於驕惰焉得不日損乎自天子以至於庶人皆當謹乎此也愚按集註謂便辟直之反善柔諒之反便佞多聞之反南軒則不然正宜參玩子夏之門人問交於子張子張曰子夏云何對曰子夏曰可者與之其不可者拒之子張曰異乎吾所聞君子尊賢而容衆嘉善而矜不能我之大賢與於人何所不容我之不賢與人將拒我如之何其拒人也朱子曰子夏之言迫狹子張譏之是也但其所言亦有過髙之病蓋大賢雖無所不容然大故亦所當絶不賢固不可以拒人然損友亦所當逺學者不可不察或問三章之說曰二子之言各有所偏執以聖人之中道則初學大畧當如子夏之言然於不可者亦疎之而已拒之則害乎交際之道成徳大畧當如子張之說然於其有大故者亦不得而不絶也以是處之其庶㡬乎南軒曰包注友交當如子夏泛交當如子張其說是蓋交有淺深二子論交各為一義不可廢也若但與之泛然交際而已則固當尊賢而容衆嘉善而矜不能若與之為朋友之交則當與其可者而拒其不可也但拒之之辭微過耳然而在學者之分則子張之言未若子夏之嚴也而遽非子夏之說且曰我之大賢與於人何所不容其言若以成徳自居者此亦其堂堂氣象也與朋友死無所歸於我殯朋友之饋雖車馬非祭肉不拜朱子曰朋友有通財之義故雖車馬之重不拜祭肉則拜者敬其祖考同於己親也此一節記孔子交朋友之義逢䝉學射於羿盡羿之道思天下惟羿為愈己於是殺羿孟子曰是亦羿有罪焉公眀儀曰宜若無罪焉曰薄乎云爾惡得無罪朱子曰羿有窮后羿也逢䝉羿之家衆也羿善射簒夏自立後為家衆所殺愈猶勝也薄言其罪差薄耳鄭人使子濯孺子侵衞衞使庾公之斯追之子濯孺子曰今日我疾作不可以執弓吾死矣夫問其僕曰追我者誰也其僕曰庾公之斯也曰吾生矣其僕曰庾公之斯衞之善射者也夫子曰吾生何謂也曰庾公之斯學射於尹公之他尹公之他學射於我夫尹公之他端人也其取友必端矣庾公之斯至曰夫子何為不執弓曰今日我疾作不可以執弓曰小人學射於尹公之他尹公之他學射於夫子我不忍以夫子之道反害夫子雖然今日之事君事也我不敢廢抽矢扣輪去其金發乗矢而後反之語助也僕御也尹公他亦衞人也端正也孺子以尹公正人知其取友必正故度庾公必不害己小人庾公自稱也金鏃也扣輪出鏃令不害人乃以射也乗矢四矢也孟子言使羿如子濯孺子得尹公他而敎之則必無逢䝉之禍然夷羿簒弑之賊䝉乃逆儔庾斯雖全私恩亦廢公義其事皆無足論者孟子蓋特以取友而言耳萬章問曰敢問友孟子曰不挾長不挾貴不挾兄弟而友友也者友其徳也不可以有挾也挾者兼有而恃之之稱孟獻子百乗之家也有友五人焉樂正裘牧仲其三人則予忘之矣獻子之與此五人者友也無獻子之家者也此五人者亦有獻子之家則不與之友矣孟獻子魯之賢大夫仲孫蔑也張子曰獻子忘其勢五人者忘人之勢不資其勢而利其有然後能忘人之勢若五人者有獻子之家則反為獻子之所賤矣非惟百乗之家為然也雖小國之君亦有之費惠公曰吾於子思則師之矣吾於顏般則友之矣王順長息則事我者也惠公費邑之君也師所尊也友所敬也事我者所使也非惟小國之君為然也雖大國之君亦有之晉平公之於亥唐也入云則入坐云則坐食云則食雖疏食菜羮未嘗不飽蓋不敢不飽也然終於此而已矣弗與共天位也弗與治天職也弗與食天禄也士之尊賢者也非王公之尊賢也亥唐晉賢人也平公造之唐言入公乃入言坐乃坐言食乃食也疏食糲飯也不敢不飽敬賢者之命也范氏曰位曰天位職曰天職禄曰天禄言天所以待賢人使治天民非人君所得專者也舜尚見帝帝館甥於貳室亦饗舜迭為賓主是天子而友匹夫也尚上也舜上而見於帝堯也舘舍也禮妻父曰外舅謂我舅者吾謂之甥堯以女妻舜故謂之甥貳室副宫也堯館舜於副宫而就饗其食用下敬上謂之貴貴用上敬下謂之尊賢貴貴尊賢其義一也貴貴尊賢皆事之宜者然當時但知貴貴而不知尊賢故孟子曰其義一也此言朋友人倫之一所以輔仁故以天子友匹夫而不為詘以匹夫友天子而不為僭此堯舜所以為人倫之至而孟子言必稱之也孟子謂萬章曰一鄉之善士斯友一鄉之善士一國之善士斯友一國之善士天下之善士斯友天下之善士朱子曰言己之善蓋於一鄉然後能盡友一鄉之善士推而至於一國天下皆然隨其髙下以為廣狹也以友天下之善士為未足又尚論古之人頌其詩讀其書不知其人可乎是以論其世也是尚友也尚上同言進而上也頌誦通論其世論其當世行事之迹也言既觀其言則不可以不知其為人之實是以又考其行也夫能友天下之善士其所友衆矣猶以為未足又進而取於古人是能進其取友之道而非止為一世之士矣有問於程子者曰吾與人居視其有過而不告則心有所不安告之而人不受則奈何曰與之處而不告非忠也要使誠意之交通在於未言之前則言出而人信矣又曰責善之道要使誠有餘而言不足則於人有益而在我者無自辱矣張子曰人之有朋友不為燕安所以輔佐其仁今之朋友擇其善柔以相與拍肩執袂以為氣合一言不合怒氣相加朋友之際欲其相下不倦故於朋友之間主其敬者日相親與得效最速又曰有潛心於道忽忽為他慮引去者此氣也舊習纒繞未能脫洒畢竟無益但樂於舊習耳是故古人欲得朋友與琴瑟簡編常使心在於此惟聖人知朋友之取益為多故樂得朋友之求朱子曰人之大倫其别有五自昔聖賢皆以為天之所敘而非人之所能為也然以今考之則惟父子兄弟為天屬而以人合者居其三焉是則若有可疑者然夫婦者天屬之所由以續者也君臣者天屬之所賴以全者也朋友者天屬之所賴以正者也是則所以紀綱人道建立人極不可一日而偏廢雖或以人而合其實皆天理之自然有不得不合者此其所以為天之所敘而非人之所能為者也然是三者之於人或能具其形矣而不能保其生或能保其生矣而不能存其理必欲君臣父子兄弟夫婦之間交盡其道而無悖焉非有朋友以責其善輔其仁其孰能使之然哉故朋友之於人倫其勢若輕而所繫為甚重其分若疎而所闗為至親其名若小而所職為甚大此古之聖人修道立敎所以必重乎此而不敢忽也然自世敎不眀君臣父子兄弟夫婦之間既皆莫有盡其道者而朋友之倫廢闕為尤甚世之君子雖或深病其然未必深知其所以然也予嘗思之父子也兄弟也天屬之親也非其乖離之極固不能輕以相棄而夫婦君臣之際又有雜出於情物事勢而不能自己者以故雖或不盡其道猶得以相牽聨比合而不至於盡壊至於朋友則其親不足以相維其情不足以相固其勢不足以相攝而為之者初未嘗知其理之所從職之所任其重有如此也且其於君臣父子兄弟夫婦之間猶或未嘗求盡其道則固無所藉於責善輔仁之益此其所以恩疎而義薄輕合而易離亦無怪其相視漠然如行路之人也夫人倫有五而其理則一朋友者又其所藉以維持是理而不使至於悖焉者也由夫四者之不求盡其道而朋友以無用廢則朋友之道盡廢而責善輔仁之職不舉彼夫四者又安得獨力而久存哉嗚呼其亦可為寒心也已非夫彊學力行之君子則孰能深察而亟反之哉始予讀王深甫告友之篇感其言若有補於世敎者徐而考之則病其推之不及於天理之自然顧以夫婦君臣一出於情勢之偶合至於朋友則亦不求其端直以為聖人彊而附於四者之間也誠如是也則其殘壊廢絶是乃理分之當然無足深嘆而其至是亦晩矣王囘深父告友見文鑑今不録右論朋友之交自易以下每條各一義故其凡别與父子君臣諸篇不同西山讀書記卷十四
