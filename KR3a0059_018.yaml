body:
  text: 西山讀書記卷十八宋真德秀撰敬上書曰若稽古帝堯曰放勳欽明文思安安允恭克讓光被四表格于上下朱子曰欽恭敬也安安無所勉強之貌言其德性之美皆出自然而非勉強所謂性之者也允信也克能也常人德非性有物欲害之故有強為恭而不實欲為讓而不能者惟堯性之是以信恭而能讓也欽明文思安安本其德性而言也允恭克讓以其行實而言也至于被四表格上下著見之盛如此也孔子曰惟天為大惟堯則之故書帝王之德莫盛于堯而其贊堯之德莫備于此且又首以欽之一字為言此書中開卷第一義也學者深味而有得焉則一經之全體不外是矣愚按堯之德以欽為首而其行以恭為先學者之學聖人此其凖的也曰若稽古帝舜曰重華協于帝濬哲文明溫恭允塞玄德升聞乃命以位朱子曰溫恭者和粹而恭敬也又益之贊禹曰帝初于歷山往于田日號泣于旻天于父母負罪引慝祗載見瞽瞍夔夔齋栗瞽亦允若説者謂夔夔悚栗之貌此事親之敬語曰無為而治者其舜也與夫何為哉恭已正南面而已矣此臨民之敬孟子曰不以舜之所以事堯者事君不敬其君者也此事君之敬合數章而觀則舜之無不敬也可見矣又按堯舜之於敬也不特修已而巳其於事亦莫不然二典所記其命羲和曰欽若昊天敬授人時其分命曰寅賔曰寅餞曰敬致命鯀以治水曰往欽哉釐降二女亦曰欽哉此堯之敬見於事者也命禹以慎乃有位命臯陶以恤刑命契以敷教咨伯以典禮不曰欽則曰敬不曰敬則曰寅而於其末也復曰咨汝二十二人欽哉惟時亮天功此舜之敬見於事者也內而修一身外而治萬事一皆以敬為主若乃警戒無虞罔失法度益之所以進戒也無教逸欲有邦兢兢業業一日二日萬幾達于上下敬哉有土臯陶之所以陳謨也至於敕天之歌臣以欽哉勉其君君以欽哉警其臣胥訓胥告惟敬之一言此所以為萬世帝王之法曰若稽古大禹曰文命敷于四海袛承于帝曰后克艱厥后臣克艱厥臣政乃乂黎民敏德朱子曰史臣言禹既布其文教于四海矣於是陳其謨以敬承于舜如下文所云也曰以下即禹祗承于帝之言艱難也禹言君而不敢易其為君之道臣而不敢易其為臣之職夙夜祗懼各務盡其所當為者則其政事修治而民亦觀感速化於善矣此禹事君之敬又禹貢曰祗台德先不距朕行朱子以為禹平水土定田賦建諸侯治已定功已成矣當此之時惟敬德以先天下則天下自不能違越我之所行也此禹率民之敬至孟子曰啓賢能敬承繼禹之道啓惟能敬是以繼禹之業太康失邦其昆弟述禹之戒以作歌曰為人上者奈何不敬太康惟不敬是以墜禹之緒詩商頌湯降不遲聖敬日躋昭格遲遲上帝是祗毛氏曰躋升也朱子曰湯之生也應期而降適當其時其聖敬又日躋升以至昭假於天遲遲久也言其純亦不已也又湯誥曰兹朕未知獲戾于上下栗栗危懼若將隕于深淵玩此數言則聖敬日躋之實可見矣朱子曰成湯工夫全在敬字上詩文王之四章曰穆穆文王於緝熙敬止王氏曰穆穆敬也朱子曰緝繼續也熙光明也亦不已之意又大明曰維此文王小心翼翼思齊曰雍雍在宫肅肅在廟皆足以見緝熙敬止之氣象書武王以箕子歸作洪範次二曰敬用五事一曰貌二曰言三曰視四曰聽五曰思貌曰恭言曰從視曰明聽曰聰思曰睿恭作肅從作乂明作哲聰作謀睿作聖孔氏曰五事在身用之必敬乃善愚按貌言視聽思各有攸主而總以敬之一言何哉蓋敬者五事之主也敬不存於中則形於貌者必輕且慢無由而能恭發於言者必易以肆無由而能從視聽蔽於物何由而明且聰思睿汨於多端何由而通於微故敬則五事皆得不敬則五事皆失程子曰聰明睿智皆由此出信哉又按三代聖王以敬為修身立政之本故伊尹告太甲曰嗣王祗厥身念哉又曰欽厥止率乃祖攸行周公之戒成王一則曰嚴恭寅畏天命自度二則曰治民祗懼不敢荒寧三則曰克自抑畏四則曰皇自敬德而召公之誥一則曰嗚呼奈何弗敬二則曰王其疾敬德三則曰王敬作所不可不敬德四則曰惟不敬厥德乃早墜厥命伊周召公皆古聖賢而所以啓迪其君者如出一口又考之書昏迷不恭侮慢自賢禹之所以征有苖也威侮五行怠棄三正啓之所以伐有扈也狎侮五常荒怠弗敬謂已有天命謂敬不足行武王之所以誅獨夫受也蓋敬則為堯舜為禹湯為文武不敬則為有苖為有扈為獨夫受聖狂之所以分治亂之所由判未有不出乎此者洛誥公功肅將祗歡此成王留周公之詞其下文曰公無困哉我惟無斁其康事舊説謂周公之功至大而能肅以自將故天下之人敬而樂之也愚按本文無天下意蓋言公之功如此而以肅自將以敬自樂肅將者嚴毅之容著於外祗歡者和樂之意發於中聖人盛德之氣象可以想見也又按康誥諸書皆周公作其戒康叔曰痌瘝乃身敬哉其稱微子曰恪慎曰肅恭其告召公曰克敬告殷多士亦曰克敬聖人之修身教人無二道也論語恭而安此門人形容夫子之辭全文見氣象篇程子曰衆人安則不恭恭則不安橫渠嘗言吾十五年學個恭而安不成明道曰可知是學不成有多少病在謝氏曰凡恭謹必勉強不安肆安肆必放縱不恭恭如勿忘安如勿助長正當勿忘勿助長之間子細體認取或問持敬覺不甚安朱子曰初學如何便得安除是孔子方恭而安初要持敬也須勉強但覺見有些子放去便收斂提掇起敬便在這裏常常相接久後自熟以上敘堯舜禹湯文武周公孔子之敬朱子曰聖人相傳只一敬字堯曰欽明舜曰溫恭湯曰日躋又嘗歎敬字工夫之妙聖學之所以成始而成終者皆在此感興詩云放勳始欽明南面亦恭已大哉精一傳萬世立人紀猗歟嘆日躋穆穆歌敬止戒獒光武烈待旦起周禮恭惟千載心秋月照寒水魯叟何常師刪述存聖軌又按孔子之告顔淵以非禮勿視聽言動而回也請事斯語焉此敬也曾子戰戰兢兢臨深履薄以終其身亦敬也後之學者欲遡聖學之淵源者其必自曾顔始春秋傳臼季曰敬者德之聚也能敬必有德愚按詩書言敬之外惟此為最的且又在洙泗之前故記於此全文已見夫婦篇子路問君子子曰修己以敬曰如斯而已乎曰修己以安人曰如斯而已乎曰修己以安百姓修己以安百姓堯舜其猶病諸朱子曰修己以敬夫子之言至矣盡矣而子路少之故再以其充積之盛自然及物者告之無他道也程子曰君子修己以敬篤恭而天下平唯上下一於恭敬則天地自位萬物自育氣無不和而四靈畢至矣此體信達順之道聰明睿智者由是出以事天饗帝致堂胡氏曰可願莫如善敬立則百善從宜逺莫如邪敬立則百邪息故敬也者存心之要法檢身之切務也欲持敬者奈何曰程子有言主一之謂敬無適之謂一如執大圭如奉槃水如震霆之在上也淵谷之在下也師保之在前也鬼神之在左右也是則持敬之道問聰明睿智皆由此出莫是自敬出否朱子曰心常恭敬則常光明問程子云云曰敬則自是聰明人之所以不聰不明者止緣身心惰慢便昏塞了敬則虛靜自然通達因問周子云靜虛則明明則通是此意否曰意亦相似又問云云曰聰明睿智如何不由敬出且以一國之君觀之此心才不專靜則姦聲佞辭雜進而不察何以為聰冶容亂色交蔽而不辨何以為明睿智皆出於心心既無主則應事接物何由思慮得宜所以此心常要肅然虛明然後物不能惑南軒張氏曰修己之道不越乎敬而已敬之道盡則所為修己者亦無不盡而所以安人安百姓者皆在其中矣蓋一於篤敬則推之家以及於天下者皆是理也及其至也天地位焉萬物育焉兆民雖衆其有不得其所安者乎是則修己以敬一語理無不盡者孝經子曰禮者敬而已矣敬其父則子説敬其君則臣説敬一人而千萬人説所敬者寡而説者衆此之謂要道愚按禮之節文三千三百可謂繁矣而為之本者敬而已矣茍無其本則儀章度數豈能以自行哉敬非求人之説而其效有所必至用力約而為功博故曰要道孔門言敬惟此二章獨言餘皆兼言各見後樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可棄也朱子曰恭主容敬主事恭見於外敬主乎中之夷狄不可棄勉其固守而勿失也程子曰此是徹上徹下語聖人元無二語充之則睟面盎背推而逹之則篤恭而天下平矣問暢論敬曰正其衣冠端坐儼然自有一般氣象某嘗以其説行之果如其説此是敬否謝氏曰不如就事上尋便分明事思敬居處恭執事敬若只靜坐時有之却只是坐如尸也子夏曰君子敬而無失與人恭而有禮四海之內皆兄弟也君子何患乎無兄弟也上文司馬牛憂曰人皆有兄弟我獨亡子夏曰商聞之矣死生有命富貴在天云云朱子曰既安於命又當修其在已者故又言苟能持已以敬而不間斷接人以恭而有節文則天下之人皆愛敬之如兄弟矣程氏曰敬是持已恭是接人與人恭而有禮言接人當如此也近世淺薄以相歡狎為相與以無圭角為相親愛如此者安能久須是恭敬君臣朋友皆當以禮為主也以上兼言恭敬按朱子曰敬者恭之主於中者也恭者敬之發於外者也自學者言則恭不如敬之力自成德言則敬不若恭之安因言恭敬二字如忠信或云敬主於中恭發於外先生曰凡言發於外比似主於中者較大蓋必充積盛滿而後發於外然主於中者却是本不可不知敬字硬恭字軟愚謂敬字有堅強意恭字有柔巽意禮緇衣心莊則體舒心肅則容敬東萊吕氏曰敬之一字固難形容古人所謂云云此兩語當深體也愚按經傳之言莊多矣曰臨之以莊曰莊以蒞之曰色容莊似皆主容貌而言獨此曰心莊蓋未有無諸中而形諸外者以此語推之則所謂臨之以莊莊以蒞之皆兼內外而言非獨色莊而已也肅與莊何别曰莊謂嚴而重肅謂靜而恭氣象固不同也心嚴重則體安舒心輕肆則體躁擾以身驗之斯可見矣禮表記君子莊敬日強安肆日偷君子不以一日使其躬儳焉如不終日鄭氏曰儳焉可輕賤貌伊川先生最愛此語蓋常人之情才放肆則日就曠蕩才檢束則日就規矩或問人之燕居形體怠惰心不慢焉否程子曰安有箕倨而心不慢者以上兼言莊敬易坤六二文言君子敬以直內義以方外敬義立而德不孤程子曰君子主敬以直其內守義以方其外敬立而內直義形而外方義形於外非在外也又曰切要之道無如敬以直內忠信進德修辭立誠乾道也敬以直內義以方外坤道也問人有專務敬以直內不務方外如何曰有諸中必形於外惟恐不直內內直則外必方操則存舍則亡操之之道敬以直內也尹彥明嘗言先生教人只是專令敬以直內若用此理則百事不敢輕為不敢妄作不愧屋漏矣習之既久自然有得君子敬以直內微生髙所枉者小而害者大李籲問每嘗遇事即能知操存之意無事時如何存養得熟曰古之人耳之於樂目之於禮左右起居盤盂几杖有銘有戒動息皆有所養今皆廢此獨有理義之養心耳但存此涵養意久則自熟矣敬以直內是涵養意以敬直內則不直矣必有事焉而勿正則直矣釋氏之學敬以直內則有之義以方外則未之有也又曰持固為禪學他有個覺之理可以敬以直內矣然無義以方外其直內者要之其本亦不是敬以直內義以方外合內外之道敬義夾持直上達天德自此問必有事焉當用敬否程子曰敬是涵養一事必有事焉須用集義若但知有敬不知集義却是都無事也又問義莫是中理否曰中理在事義在心問敬義何别曰敬只是持已之道義便有是有非順理而行是為義也且如欲為孝不成只守著一孝字須知所以為孝之道所以侍奉當何如溫凊當何如然後能盡孝道敬以直內有主於內則虛自然無非僻之侵朱子曰敬有死底敬有活底敬只守主一之敬若遇事不濟之以義辨其是非則不活若熟後敬便有義義便有敬靜以察其敬與否動以察其義與否敬義夾持循環無端則內外透徹涵養須用敬處事須是集義敬是立己之本義是處事截然方正各得其宜問敬義夾持之意曰最下得此兩字好敬主乎中義防於外二者相夾持要放下霎時不得只得直上去故便逹天德又曰表裏夾持更無東西走作去處上面只有個天德又曰敬義內外交相養夾定在這裏莫教一箇有些去失如此則下不染於物欲只得上達天德又曰夾持者內外並進之謂直上者進進不已之謂敬以直內是持守工夫義以方外是講學工夫敬義非兩截事釋氏只要空聖人只要實釋氏所謂敬以直內只是空豁豁地更無一物却不會方外聖人所謂敬以直內則湛然虛明萬理具足敬以直內是要無些偏邪敬義云云此在坤六二爻論六二之德聖人本意謂人占得此爻若直方大則不習無不利夫子從而發明以敬解直義解方又須敬義皆立然後德不孤將不孤解大字然敬無義不得義無敬亦不得只一件便是孤若是敬義立施之事君則忠事親則孝交朋則信皆不待習而無不利也問云云曰敬以直內是無纎毫私意胸中洞然徹上徹下表裏如一義以方外是見得是處決定恁地不是處決定不恁地截然方正此須實做工夫始得若只恁説過依舊不濟事若實是做工夫只此八箇字一生用之不窮朱子於書之堂左曰敬右曰義蓋嘗讀易而得其兩言曰敬以直內義以方外以為為學之要無以易此而未知所以用力之方也及讀中庸見其所論修道之謂而必以戒慎恐懼為始然後得夫持敬之本又讀大學見其所論明德之序必以格物致知為先然後得夫所以明義之端既而觀夫二者之功一動一靜交相為用又有合乎周子太極之論然後又知天下之理幽明巨細逺近淺深無不貫于二者樂而玩之固將終吾身而不厭又何暇夫外慕哉因以名吾二齋云問養氣章孟子所謂有事者集義而已至於程子之論則每以有事於敬為言何哉曰孟子之學以義為養氣之本程子之學以敬為入德之門此其言之所以異也然義非敬則不能以自集故孟子雖言集義而必先之以持志敬非義不能以自存故程子雖言持敬而於其門人有事於敬之問未嘗不以集義為言也丹書曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶凡事不強則枉不敬則不正枉者滅廢敬者萬世大戴禮武王踐阼三日召師尚父而問焉曰黃帝顓帝之道存乎師尚父曰在丹書王欲聞之則齋矣齋三日王端冕師尚父亦端冕奉書而入負屏而立王下堂南面而立師尚父曰先王之道不北面王行西折而南東面而立師尚父西面道書之言云云王聞書之言惕若恐懼而為戒書於席之四端為銘焉於几於鑑於盥槃於楹於杖於帶於履屨於觴豆於户牖於劒弓矛為銘焉席前左端之銘曰安樂必敬前右端之銘曰無行可悔問丹書朱子曰敬便堅立怠便放倒以理從事是義不以理從事是欲這敬義是體用與坤卦説同以上兼言敬義仲弓問子桑伯子子曰可也簡仲弓曰居敬而行簡以臨其民不亦可乎居簡而行簡無乃太簡乎子曰雍之言然朱子曰言自處以敬則中有主而自治嚴如是而行簡以臨民則事不煩而民不擾所以為可若先自處以簡則中無主而自治迹矣而所行又簡豈不失之太簡而無法度之可守乎家語記伯子不衣冠而處夫子譏其欲同人道於牛馬然則伯子蓋太簡者而仲弓疑夫子之過許與程子曰子桑伯子之簡雖可取而未盡善故夫子云可也仲弓因言內主於敬而簡則為要直內存乎簡而簡則為迹略可謂得其旨矣又曰居敬則心中無物故所行自簡居簡則先有心於簡而多一簡字矣故曰太簡或問居敬居簡之不同何也曰持身以敬則心不放逸而義理著明故其所以見於事者自然操得其要而無煩擾之患若所以處身者既務於簡而所以行之者又一切以簡為事則是義理凖則既不素明於內而紀綱法度又無所持循於外太簡之弊將有不可勝言者矣南軒張氏曰主一之謂敬敬則專而不雜序而不亂常而不迫其行自然簡也若夫居簡則是以簡之一字橫在胸中反害於敬而失行簡之本矣敬簡堂記曰心宰萬物而敬者又心之道所以生也生則萬理森然而萬事之綱總攝於此凡至乎吾前者吾則因其然而酬酢之故動雖微而吾固經緯乎吉之先事雖大而吾處之若起居飲食之常雖雜然並陳而釐分縷析條理不紊無他其綱既立如鑑之形物各止其分而不與之俱往也此所謂敬而行簡者與此章兼言敬簡仲弓問仁子曰出門如見大賔使民如承大祭已所不欲勿施於人在邦無怨在家無怨仲弓曰雍雖不敏請事斯語矣朱子曰敬以持已恕以及物則私意無所容而心德全矣詳見言仁篇程子曰孔子言仁只説出門如見大賔使民如承大祭看其氣象便須心廣體胖動容周旋中禮唯慎獨便是守之之法或問出門使民之時如此可也未出門使民之時如之何曰此儼若思時也有諸中而後見於外觀其出門使民之時其敬如此則前乎此者敬可知矣非因出門使民然後有此敬也集義伊川曰大賔大祭只是敬也才不敬便私欲萬端害於仁矣遊氏曰出門如見大賔則無時而不敬使民如承大祭則無事而不敬朱子敬恕齋銘曰出門如賔承事如祭以是存心其敢失墜已所不欲勿施於人以是行之與物為春胡世之人恣已窮物惟我所便謂彼奚恤孰能反是斂焉厥躬于羮于牆仲尼子弓內順於家外同於邦無小無大罔時怨恫為仁之功曰此其極敬哉恕哉永永無斁南軒曰出門云云蓋平日之涵養一於敬故其出門使民之際皆是心也已所云云恕者為仁之方也凡人有欲而不得則怨若夫平易公正欲不存焉則已無所怨於人和平之效人亦何所怨於已哉故曰云云按無怨之義二先生所指不同朱説前見南軒謂人已俱無所怨其味尤長此章兼言敬恕孔門論敬具前數條外其他所論如道千乘之國必曰敬事而信為禮不敬則與臨喪不哀並言之稱子産曰其行已也恭其事上也敬稱晏平仲曰善與人交久而敬之行必曰篤敬事必曰思敬至若不言敬而實主於敬者又不與焉故朱子曰敬乃聖門之綱領詎不信矣詩思齋之三章曰雍雍在宫肅肅在廟不顯亦臨無射亦保此美文王之詞歐陽氏曰不以人所不見而怠常端莊若有所臨朱子曰不顯幽隱之處也雖居幽隱亦若有臨之者雖無厭射亦常有所守焉言其純亦不已如是愚按臨如上帝臨女之臨無射非謂人厭射之也蓋在已雖無厭倦之意而兢兢保守惟恐其或至於厭倦也抑之七章曰視爾友君子輯柔爾顔不遐有愆相在爾室尚不愧于屋漏無曰不顯莫豫云覯神之格思不可度思矧可射思此衛武公自警之詞朱子曰屋漏室西北隅也言視爾友敬君子之時和柔爾之顔色其戒懼之意常若自省曰豈不至於有過乎蓋常人之情其修於顯者無不如此然視爾獨居於室之時亦當庶幾不愧於屋漏然後可爾無曰此非顯明之處而莫豫見也當知鬼神之妙無物不體其至於是有不可得而測者不顯亦臨猶懼有失况可厭射而不敬乎此言不但修之于外又當戒慎恐懼乎其所不睹不聞也子思子曰君子不動而敬不言而信又曰夫微之顯誠之不可掩如此夫此正心誠意之極功而武公及之則亦聖賢之徒矣楚語左史倚相曰昔衛武公年數九十五矣猶針警於國曰自卿以下至於師長士茍在朝者無謂我老髦而舍我必恭恪於朝夕以交戒我在輿有旅賁之臣位寧有官師之典倚几有誦訓之諫居寢有􅉏御之針臨事有瞽史之道宴居有師之誦史不失書矇不失誦以訓御之於是作懿戒以自警及其沒也謂之睿聖武公韋昭曰懿讀為抑即此篇也董氏曰侯芭言武公行年九十有五猶使人日誦是詩而不離於其側然則序説為刺厲王者誤矣中庸道也者不可須臾離也可離非道也是故君子戒慎乎其所不睹恐懼乎其所不聞朱子曰道者日用事物當行之理皆性之德而具於心無物不有無時不然所以不可須臾離也若其可離則為外物而非道矣是以君子之心常存敬畏雖不見聞亦不敢忽所以存天理之本然而不使離於須臾之頃也莫見乎隱莫顯乎微故君子慎其獨也隱暗處也微細事也獨者人所不知而已所獨知之地也言幽暗之中細微之事迹雖未形而幾則已動人雖不知而已獨知之則是天下之事無有著見明顯而過於此者是以君子既常戒懼而於此尤加謹焉所以遏人欲於將萌而不使其潛滋暗長於隱微之中以至離道之遠也或問既曰道也者云云又曰莫見乎隱云云何也曰此因論率性之道以明由教而入者其始當如此也蓋兩事也其先言道不可離而君子必戒慎恐懼其所不睹不聞者所以言道之無所不在無時不然學者當無須臾毫忽之不謹而周防之以全其本然之體也又言莫見乎隱莫顯乎微而君子必謹其獨者所以言隱微之間人所不見而已獨知之則其事之纎悉無不顯著又有甚於他人之知者學者尤當隨其念之方萌而致察焉以謹其善惡之幾也蓋所謂道者率性而已性無不有故道無不在大而父子君臣小而動靜食息不假人力之為而莫不各有當然不易之理所謂道也是乃天下人物之所共由充塞天地貫徹古今而取諸至近則常不外乎吾之一心循之則治失之則亂蓋無須臾之頃可得而暫離也若其可以暫合暫離而於事無所損益則是人力私智之所為者而非率性之謂矣聖人之所修以為教者因其不可離者而品節之也君子之所由以為學者因其不可離者而持守之也是以日用之間須臾之頃持守工夫一有不至則所謂不可離者雖未嘗不在我而人欲間之則亦判然二物而不相管矣是則雖曰有人之形而其違禽獸也何逺哉是以君子戒慎乎其目之所不及見恐懼乎其耳之所不及聞瞭然心目之間常若見其不可離者而不敢有須臾之間以流於人欲之私而陷於禽獸之域若書之言防怨而曰不見是圖禮之言事親而曰聽於無聲視於無形蓋不待其徵於色發於聲然後有以用其力也夫既已如此矣則又以謂道固無所不在無時不然而幽隱之間細微之事乃他人之所不見不聞而已之所獨見獨聞是皆常情所忽以為可以欺天罔人而不必謹者而不知吾心之靈皎如日月既已知之則其毫髮之間無所潛遁又有甚於他人之知矣又况既有是心伏藏之久則其見於聲音容貌之間發於行事施為之實必有暴著而不可掩者又何止於念慮之差而已也是以君子既戒懼乎耳目之所不及則此心常明不為物蔽而於此尤不敢不致其謹焉必使其幾微之際無一毫人欲之萌而純乎義理之發則下學之功盡善全美而無須臾之間矣二者相須皆反躬為已遏人欲存天理之實事蓋體道之功莫有先於此者亦莫有切於此者故子思子首以為言以見君子之學必由此而入也曰諸家之説皆以戒慎恐懼即為慎獨之意子乃分之以為兩事無乃破碎支離之甚邪曰既言道不可離則是無適而不在矣而又言莫見乎隱莫顯乎微則是切要之處尤在於隱微也既言戒慎不睹恐懼不聞則是無處而不慎矣又言慎獨則是其所慎者尤在於獨也是固不容於不異矣若其同為一事則其為言又何必若是之重復邪且此書卒章潛雖伏矣不愧屋漏亦兩言之正與此相首尾而程子有不愧屋漏與慎獨是持養氣象之言其於二者之間特加與字是固已分為兩事當時聽者有未察耳曰子又安知不睹不聞之不為獨乎曰其所不睹不聞者已之所不睹不聞也獨者人之所不睹不聞也如曰是兩條者皆為慎獨之意則是持守之功無所施於平常之地而專在幽隱之間也其繁復偏滯亦甚矣戒慎不睹恐懼不聞即是道不可離處所不聞不見非是合眼掩耳便是喜怒哀樂未發時凡事皆未萌芽自家便先恁地戒慎恐懼常要提起此心使在這裏便是防於未然不見是圖底意思戒慎恐懼不須説得太重只是常常提撕認得那箇物事常常存得不失了今人只見他説得此四箇字重便作臨事驚恐看如臨深淵如履薄氷曾子也只是順這道理常常恁地把捉去若不用戒慎恐懼而此理常流通者惟天地與聖人耳聖人不勉而中不思而得從容中道亦只是此心常存理常明故能如此嘗謂人無有極則處便是堯舜周孔不成説我是從容中道不要戒慎恐懼他那工夫亦自未嘗得息戒慎恐懼所以養其未發只聳然提起在這裏或問恐懼是已思否曰思又别思是思索了或問即是持敬否曰亦是問伊川鬼神憑依語言為莫見乎隱莫顯乎微如何曰隱微之事在人心不可得而知却被他説出來豈非莫見乎隱莫顯乎微蓋鬼神只是氣心中實有是事則感於氣者自然發見昭著如此黃灝云戒懼是純體做工夫慎獨是又於其中緊切處加工夫猶一經一緯而成帛先生以為然問能存天理了則下面謹獨似多了一截先先曰雖是存得天理臨發時也須點檢這便是密處若只説存天理更不慎獨却是只用致中不用致和也又問致中是未動之前然謂之戒懼却是已動先生曰公莫看得太重伊川所謂道箇敬字也不大段用得力孟子曰操則存操亦不是著力把持只是操一操便在這裏戒慎恐懼是事之未形處慎獨是幾之將然處方不睹不聞之時不惟人所不知自家亦未有所知若所謂獨即人所不知而已所獨知極是要戒懼自來人説不睹不聞與慎獨只是一意無分别便不是戒謹不睹恐懼不聞非謂於睹聞之時不戒懼也言雖不睹不聞之際亦致其謹則睹聞之際其謹可知此乃統同説承上道不可須臾離則是無時不戒懼也然下文慎獨既專就已發上説則此段正是未發時工夫只得説不睹不聞也莫見乎隱莫顯乎微故君子必慎其獨上既統同説了此又就中有一念萌動處雖至隱微人所不知而已所獨知尤當致謹如一片止水中間忽有一點動處此最緊要著工夫處先就睹聞處做了然後却就不睹不聞處用工方能細密今人於睹聞處原不曾有工夫却便去不睹不聞處做可知是不成按此當與性道教中和二章通觀詩曰衣錦尚絅惡其文之著也故君子之道暗然而日章小人之道的然而日亡君子之道淡而不厭簡而文溫而理知逺之近知風之自知微之顯可與入德矣朱子曰此以下學立心之始言之而下文又推之以至其極也詩國風衛碩人鄭之丰皆作衣錦褧衣褧絅同襌衣也尚加也古之學者為已故其立心如此尚絅故暗然衣錦故有日章之實淡簡溫絅之襲於外也不厭而文且理焉錦之美在中也小人反是則無實以繼之是以的然而日亡也逺之近見於彼者由於此也風之自著乎外者本乎內也微之顯有諸內者形諸外也有為已之心而又知此三者則知所謹而可入德矣故下文引詩言謹獨之事詩云潛雖伏矣亦孔之昭故君子內省不疚無惡於志君子之所不可及者其惟人之所不見乎詩小雅正月之篇承上文言莫見乎隱莫顯乎微也疚病也無惡於志猶言無愧於心此君子謹獨之事也詩云相在爾室尚不愧於屋漏故君子不動而敬不言而信詩大雅抑之篇相視也屋漏室西北隅也承上文又言君子之戒謹恐懼無時不然不待言動而後敬信則其為已之功益加密矣故下文引詩并言其效詩曰奏假無言時靡有爭是故君子不賞而民勸不怒而民威於鈇鉞詩商頌烈祖之篇奏進也承上文而遂及其效言進而感格於神明之際極其誠敬無有言説而人自化之也威畏也鈇莝斫刀也鉞斧也詩曰不顯惟德百辟其刑之是故君子篤恭而天下平詩周頌烈文之篇不顯猶言豈不顯也此借引以為幽深玄逺之意承上文言天子有不顯之德而諸侯法之則其德愈深而效愈逺矣篤恭言不顯其敬也篤恭而天下平此乃聖人至德淵微自然之應中庸之極功也詩云豫懷明德不大聲以色子曰聲色之於以化民末也詩曰德輶如毛毛猶有倫上天之載無聲無臭至矣詩大雅皇矣之篇引之以明上文所謂不顯之德者正以其不大聲與色也又引孔子之言以為聲色乃化民之末務今但言不大之而已則猶有聲色者存是未足以形容不顯之妙不若蒸民之詩所言德輶如毛則庶乎可以形容矣而又自以為謂之毛則猶有可比者是亦未盡其妙不若文王之詩所言上天之載無聲無臭然後乃為不顯之至耳蓋聲臭有氣無形在物最為微妙而猶曰無之故惟此可以形容不顯篤恭之妙非此德之外又别有是三等然後為至也或問卒章之説曰承上三章仲尼至聖至誠既言聖人之德而極其盛矣子思懼夫學者求之于髙逺玄妙之域輕自大而反失之也故反於其至近者而言之以示入德之方欲學者先用心於內不求人知然後可以慎獨誠身而馴致乎其極也君子篤恭而天下平而其所以平者無聲臭之可尋此至誠盛德自然之效而中庸之極功也故以是而終篇焉此章凡八引詩自衣錦尚絅以至不顯惟德凡五條始學成德踈密淺深之序也自不大聲色以至無聲無臭凡三條皆所以贊夫不顯之德也又曰思量來衣錦尚絅之意大段好如今學者不長進都緣不知此理須是暗然而日章問知風之自曰凡事自有箇來處問知微之顯曰只是收斂向內工夫漸密便見得近之可逺風之自微之顯又曰中庸末章只是説收斂近裏如此則工夫細密而今人只是不收向裏心便粗了然而細密中却自有光明發出來中庸一篇始只是一中間却事事有末後却復歸結於一問不顯曰按詩中例是言豈不顯也今借引此詩真作不顯説是箇幽深玄逺之意是不顯之顯此假自衣錦尚絅漸漸收斂到後面一段密似一段直到聖而不可知處輯略程子曰學始於不欺暗室又曰不愧屋漏便是箇持定氣象又曰不愧屋漏則心安而體舒南軒張氏曰中庸一篇聖學之淵源也體用隱顯成已成物備矣學者欲從事乎此必知所從入而後可以馴致焉其所從入奈何子思以不睹不聞之訓著於篇首又於篇終發明尚絅之義而推極夫篤恭之效其示來世深切著明矣以上皆言戒慎恐懼與慎獨之義皆敬之事而用功之至要也大學慎獨己見誠意章程子曰有天德則可語王道其要只在慎獨邵子曰凡人之善惡形於言發於行人始得而知之但萌諸心發於慮鬼神已得而知之矣此君子所以慎獨也龜山楊氏曰道無顯微之間慎其獨所以對越在天也詩曰勿二勿虞上帝臨女道鄉鄒氏曰慎獨最為入道之要所謂獨者非獨間居靜處而已萌於心之謂獨能於此著力無由有過舉故中庸以此言為篇首按鄒氏之言慎獨最有深味子曰君子有三畏畏天命畏大人畏聖人之言朱子曰畏者嚴憚之意天命者天所賦之正理也知其可畏則其戒慎恐懼自有不能已者而付畀之重可以不失矣大人聖言皆天命所當畏知畏天命則不得不畏之矣小人不知天命而不畏也狎大人侮聖人之言侮戲玩也不知天命故不識義理而無所忌憚如此南軒曰畏天命奉順而不敢逆也畏大人尊嚴而弗敢易也畏聖言佩服而惟恐違也然而是三者皆主於畏天命又小旻詩有云不敢暴虎不敢馮河人知其一莫知其他戰戰兢兢如臨深淵如履薄氷毛氏曰不敬小人之危殆也左氏昭元年晉樂王鮒曰小旻之卒章吾取之杜氏注曰義取非唯暴虎馮河之可畏不敬小人亦危殆王鮒取此義故不敢譏議公子圍荀子亦云人不肖而不敬則是狎虎也狎虎則危災及其身以此義參之不獨大人之當敬雖小人亦不可不敬也荀卿乃有愛而敬畏而敬之别其意謂於君子則心敬小人則貌敬豈其然邪書曰德盛不狎侮蓋德盛者自不為狎侮非以危殆為可畏也孔子曰君子無小大無衆寡無敢慢深味斯言則荀氏之醇疵可見矣此章專言畏董銖子重問敬宜何訓朱子曰是不得而訓也惟畏庶幾近之勉齋黃氏則云嘗聞之師曰敬之為義惟畏足以盡之蓋嘗深思其故則不易之論也敬者人心畏悚之名也故字之從人從敬則曰警從言從敬則曰警從手從敬則曰擎無非畏悚戒懼之意先儒有以主一無適言者有以常惺惺言者皆足以發明主敬之意而訓義親切使人體而易知則未有易畏之一字也按黃氏説與子重所記不同而朱子所跋薛畏翁畫贊亦曰惟畏可以近之實先生親筆則曰近者為當况畏於敬雖最切然其字有二義若所謂祗畏抑畏寅畏則皆敬之意也至所謂畏怯畏懦之屬又安得為敬乎是又不容無辨又管仲曰畏威如疾民之上也從懷如流民之下也見懷思威民之中也朱子曰畏威如畏疾病此民之上行從心之欲如水流行此民之下行見可懷而思可畏此民之中行此章列於小學故取焉易大過初六藉用白茅無咎子曰茍錯諸地而可矣藉之用茅何咎之有愼之至也夫茅之為物薄而用可重愼斯術也以往其無所失矣程子曰初以隂柔巽體而處下過於畏慎者也以柔在下用茅藉物之象茍錯諸地而藉以茅過於愼也茅之為物雖薄而用可重者以用之能成傲慢之道也愼守斯術而行豈有失乎人之過於敬慎為之非難而可以保其安而無過茍能慎于斯道推而行之於事其何所失耶子之所慎齋戰疾朱子曰齋之為言齊也將祭而齊其思慮之不齊者以交於神明也誠之至與不至神之饗與不饗皆決於此戰則衆之死生國之存亡繫焉疾又吾身之所以死生存亡者皆不可以不謹也尹氏曰夫子無所不謹弟子記其大者耳以上專言慎亦敬之事又言行君子之所以動天地也可不慎乎曲禮曰毋不敬儼若思安定辭安民哉鄭氏曰禮主於敬儼矜莊貌人之坐思貌必儼然問敬之貌如何朱子曰於儼若思時可以見敬之貌又曰平居須是儼然若思藍田吕氏曰毋不敬者正其心也儼若思者正其貌也安定辭者正其言也三者正矣則無所往而非正所謂正已而物正者也天下至大取諸修身而無不足故曰安民哉此禮之本故曲禮首章言之愚按吕氏之説至矣然嘗推演其義以為毋不敬者兼動靜而言儼若思則靜時之敬安定辭則動時之敬儼然端坐若有所思是靜中涵動意言辭之發安而且定是動中涵靜意雖非曲禮本旨然玩之自有深味云孔子曰君子無不敬也敬身為大程子曰毋不敬可以對越上帝又曰思無邪毋不敬只此二語循而行之安得有差凡有差者皆曰不正不敬也問寢不尸曰毋不敬也又曰忘敬而後無不敬范氏曰經禮三百曲禮三千一言以蔽之曰毋不敬愚按毋不正者其綱也見於事親事君事長與夫威儀容止起居動作者其目也事親以下見五典篇威儀以下今具列于后書顧命思夫人自亂于威儀爾無以釗冒貢于非幾東萊吕氏曰斯言也蓋成王平日至親至切之學至是始發其祕也周公精微之傳成王得之將終方以示羣臣孔子精微之傳曾子得之將終方以示孟敬子皆近在於威儀容貌顔色辭氣之際然則周孔豈惟同道其用工之次第品目亦莫不同也人受天地之中以生是以有動作威儀之則蓋莫非天命也躁輕縱緩自踰其則特人自亂之耳天秩何嘗亂哉曰夫人自亂於威儀遡其語意之深長可見其觀之逺也威儀失則豈特形於事見於行然後當戒一俯一仰毫釐有間即非天命已冒進于非之幾矣曰爾無以釗冒貢于非幾味其誥語之嚴密可見其察之精也用力于聖學者其可不請事斯語乎詩柏舟之三章曰威儀棣棣不可選也鄭氏曰棣棣富而間習也東萊吕氏曰不可選也言威儀間習自有常度不可選擇以避禍也翟方進謂馮參以王舅見廢不得在公卿位今五侯至尊貴也與之並列宜少詘節卑體視有所宗而君盛修容貌以威嚴臨之此非所以下五侯而自益也參性好禮儀不改其常度淇澳之一章曰瑟兮僴兮赫兮喧兮有匪君子終不可諼兮大學曰瑟兮僴兮者恂栗也赫兮喧兮者威儀也朱子曰瑟嚴密之貌僴武毅之貌赫喧宣著盛大之貌諼忘也恂栗戰懼也威可畏也儀可象也又曰恂栗者嚴敬之存於中也威儀者輝光之著於外也問大學解瑟為嚴密是就心言抑就行言曰是就心言曰心如何是密處曰只是不粗踈恁地縝密僴武毅貌言能剛強卓立不怠惰闒颯問恂栗何以知其為戰懼曰莊子云木處則恂栗危懼問僴者武毅之貌而恂栗則戰懼之貌不知人當戰懼時果有武毅之意否曰人而懷戰懼之心則必齋莊嚴肅又烏可犯古人直是如此嚴整然後有那威儀赫喧著見相鼠曰相鼠有皮人而無儀人而無儀不死何為相鼠有齒人而無止人而無止不死何俟相鼠有體人而無禮人而無禮胡不遄死相視也止容止也遄速也愚謂人生之所以貴者必其有威儀容止之敬有揖遜周旋之禮異乎庶物故也若其無此而豢養於天地之間直賊夫糧食而已不如速死之愈也相鼠之為物至小且賤為人所憎所以深言無禮儀之不可也鳲鳩之一章曰鳲鳩在桑其子七兮淑人君子其儀一兮其儀一兮心如結兮南軒張氏曰結云者實而不他也蓋謹其威儀於外而後其心可得而一心一而後威儀有度而人有所取正此所謂由乎中以制於外制於外所以保其中也其三章曰鳲鳩在桑其子在棘淑人君子其儀不忒其儀不忒正是四國朱子曰忒差忒也其心一則儀不忒則足以正四國矣大學傳曰其為父子兄弟足法而後民法之也抑之一章曰抑抑威儀維德之隅鄭氏曰抑抑靜密也隅廉也孔氏曰隅者角也廉者稜也角必有稜故曰隅廉王氏曰德譬則宫城也儀譬則隅也視其隅則宫城之中可知有諸中必形諸外故也此詩以威儀為主乃自古修身者之所同蓋至切至近莫過乎此也又二章曰敬慎威儀維民之則又五章曰慎爾出話敬爾威儀無不柔嘉則法也柔者遜順之辭嘉善也又八章曰淑慎爾止不愆于儀不僭不賊鮮不為則又九章曰溫溫恭人維德之基張子曰君子不必避他人之言以為太柔太弱至于瞻視亦有節視有髙下視髙則氣髙視下則心柔故視國君者不離紳帶之中學者先須去其客氣其為人剛行終不肯進蓋目人之所常用且心常記之己之敬傲必見於視下其視者欲柔其心也柔其心則聽言敬且信學者先須溫柔溫柔則可以進學詩曰溫溫恭人維德之基蓋其所益之多蒸民之二章曰仲山甫之德柔嘉維則令儀令色小心翼翼古訓是式威儀是力東萊吕氏曰柔嘉維則不過其則也過其則斯為弱不得謂之柔嘉矣又論語巧言令色章謝氏解曰巧言令色知之亦難禮曰情欲信辭欲巧詩稱仲山甫之德曰令儀令色然禮所謂辭欲巧亦鮮仁乎仲山甫之德亦鮮仁乎至於聖人所謂孫以出之辭亦巧矣逞顔色怡怡如也色亦令矣豈以好其言語善其顔色直以為鮮仁也哉至於小人蓋嘗訐以為直矣言何嘗巧雖內荏而色厲色何嘗令然則何者為巧言何者為令色若能知出辭氣可逺鄙倍則知之矣此宜學者深思而力索不可以言語道也朱子曰容貌辭氣之間正學者持養用力之地然有意於巧令以悅人之觀聽則心馳於外而鮮仁矣若是就此持養發禁躁妄動必溫恭只要體當自家直內方外之實事乃是為己之功求仁之要復何病乎故夫子告顔淵以克己復禮之目不過視聽言動之間而曾子將死之善言亦不外乎容貌顔色辭氣三者而已夫子所謂孫以出之辭欲巧者亦其一事也仲山甫之德柔嘉維則令儀令色則大賢成德之行而進乎此者夫子之逞顔色怡怡如也乃聖人動容周旋中禮之事又非仲山甫之所及矣至於小人訐以為直色厲而內荏則雖與巧言令色者不同然考其矯情飾偽之心則實巧言令色之尤者聖人惡之上蔡於此不肯明言其所以然者將使學者深求而自得之也然今學者反求之於𡨕漠不可知之中失之愈深故詳論之使學者無淫思力索之苦而有以審夫用力之幾焉曾子有疾孟敬子問之曾子言曰君子所貴乎道者三動容貌斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣籩豆之事則有司存朱子曰言道雖無所不在然君子所重者在此三事而已是皆修身之要為政之本學者所當操存省察而不可造次顛沛之違者也若夫籩豆之事器數之末道之全體固無不該然其分則有司之守而非君子之所重矣程子曰動容貌舉一身而言也周旋中禮暴慢斯逺矣正顔色則不妄斯近信矣出辭氣正由中出斯逺鄙倍矣三者正身而不外求故曰籩豆之事則有司存尹氏曰養於中則見於外曾子蓋以修己為為政之本若乃器用事物之細則有司存焉集義吕氏曰貌也色也言也皆以道正之則心正而身修矣謝氏曰人之應事不過容貌辭氣顔色三事特係所養如何耳動也正也出也君子自牧處故暴慢鄙倍不生於心逺自逺也信以實之謂也與禮樂不斯須去身之意同朱子曰程子之言簡約明白意趣深逺深得乎曾子未發之意尹氏之言溫厚易直有得於平日涵養之源謝氏之言發強剛毅有得於臨事持守之要吕氏之言深潛縝密有得於涵養持守之則學者合是三者而用力焉無使偏廢則日用之間動靜語默無非妙用而曾子之意程子之言亦不外是矣不莊不敬則其動容貌也非暴則慢惟恭敬有素則動容貌斯逺暴慢矣內無誠實則其正顔色者色莊而已惟誠實有素則正顔色斯近信矣涵養不熟則其出辭氣也必至鄙倍惟涵養有素則出辭氣斯逺鄙倍矣曾氏亦以為君子於是持養既久而熟晬面盎背不設施而自爾也故皆以斯言之此説當矣暴是粗厲慢是放肆蓋人之容貌少得和平不暴則慢暴是剛急之過慢是寬柔之過鄙是凡淺倍是背理今人議論有見得雖不甚差只是淺近此是鄙又有説得甚髙而實背于理此是倍問曾子云云其要在正動出之際曰曾子工夫更在三字之前此特語其效驗處耳問云云曰曾子之意只是説人之用力有此三處此大而彼小此急而彼緩耳籩豆之事固是末節然亦非全然忽略不以為意但當付之有司使供其事而非吾所當切切留意者爾君子正其衣冠尊其瞻視儼然人望而畏之斯不亦威而不猛乎南軒張氏曰正衣冠尊瞻視臨之以莊也持身嚴故人望而自畏之而非以威加人也故威而不猛若有使人畏己之心則猛而反害於威矣西山讀書記卷十八
