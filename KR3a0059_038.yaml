body:
  text: 西山讀書記卷三十八宋真德秀撰天地之道書大禹謨益贊于禹曰滿招損謙受益時乃天道臯陶謨天敘有典勑我五典五惇哉天秩有禮自我五禮有庸哉同寅協恭和衷哉天命有德五服五章哉天討有罪五刑五用哉程子曰天敘天秩天有此理聖人循而行之所謂道也上蔡謝氏曰所謂天者理而已天命有德便五服五章天討有罪便五刑五用渾不是杜撰做作來學者直須明天理為是自然底道理移易不得識得天理然後能為天之所為泰誓天有顯道厥類惟彰張氏曰天有顯道者福善禍淫之道顯然在人耳目也蓋禍福之來莫不各以其類至為善者應之以福為惡者應之以禍其類甚明易謙亨天道下濟而光明地道卑而上行程子曰濟當為際此明謙而能亨之義天之道以其氣下際故能生育萬物其道光明下際謂下交也地之道以其處卑所以其氣上行交於天皆以卑降而亨也天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也程子曰以天行而言盈者則虧謙者則益日月隂陽是也以地勢而言盈滿則傾變而反陷卑下者流注而益增也鬼神謂造化之迹盈滿者禍害之謙損者福佑之凡過而損不足而益者皆是也人情疾惡盈滿而好與謙巽謙者人之至德故聖人詳言所以戒盈而勸謙也恆天地之道恆久而不已也程子曰天地之所以不已蓋有恆久之道人能恆於可恆之道則合天地之理也天地之道貞觀者也日月之道貞明者也程子曰天地常埀象以示人故曰貞觀日月常明而不息故曰貞明朱子曰貞正也常也觀示也王孫賈問曰與其媚於奧寧媚於竈何謂也子曰不然獲罪於天無所禱也朱子曰天即理也其尊無對非奧竈之可比也逆理則獲罪於天矣言但當順理非特不當媚竈亦不可媚奧也胡氏曰天即理也理無不在在人則人心之昭昭者是也南軒曰胸中所存一有不直則為獲罪於天矣天地之道可一言而盡也其為物不二則其生物不測朱子曰天地之道可一言而盡不過曰誠而已不二所以誠也誠故不息而生物之多有莫知其所以然者天地之道博也厚也高也明也悠也久也言天地之道誠一不二故能各極其盛而有生物之功誠者天之道見前程子曰天者自然之理也生生之謂昜是天之所以為道也天只是以生為道天命猶天道也以其用言也則謂之命命者造化之謂也在人則為人道介甫言堯行天道以治人舜行人道以事天介甫自不識天字云云問福善禍淫如何曰此自然之理善則有福淫則有禍又問天道如何曰只是理理即天道也且如説皇天震怒豈真是有人在上震怒只是理如此天專言之則道也天且弗違是也問程昜云云又曰天地者道也不知天地即道耶抑天地是形所以為天地乃道耶朱子曰天地只以形言先天而天弗違者如禮雖先王未之有而可以義起之類蓋雖天之所未為而吾意之所為自與道契天亦不能違也後天而奉天時如天敘有典天秩有禮之類雖天之所已為而理之所在吾亦奉行之耳蓋大人無私以道為體故也朱子曰天者理而已矣孟子集注畏天樂天章右言天地之道此即程子所謂專言之則道也然所謂天道者凡人性之所固有事理之所當然皆是也豈必指言曰天然後謂之天道哉程子朱子所謂天者自然之理天者理而已矣皆昔者聖賢所未發學者即斯言而深味之無餘藴矣天地之心昜復其見天地之心乎程子曰一陽復於下乃天地生物之心也先儒皆言靜為見天地之心蓋不知動之端乃天地之心也非知道者孰能識之又曰人説復其見天地之心皆以謂至靜能見天地之心非也復之下一畫便是動也安得謂之靜自古儒者皆言靜見天地之心惟某言動而見天地之心或曰莫是於動上求靜否曰固是然最難又曰復其見天地之心一言以蔽之天地以生物為心又曰復者反本也本有而去之今來復乃見天地之心也乃天理也此賢人之事也又曰復卦非天地之心復則見天地之心聖人旡復故未嘗見其心朱子曰積隂之下一陽復生天地之心幾於息滅而至此乃復可見在人則為靜極而動惡極而善本心幾息而復見之端也問一陽復於下乃天地生萬物之心也先儒皆以靜見天地之心唯程子言動之端乃天地之心竊謂十月純坤不為無陽天地生物之心未嘗少息但未動爾因動而生物之心始可見曰十月陽氣收斂一時關閉得盡天地生物之心固未嘗息但無端倪可見惟一陽動則生意始發露出乃始可見端緒也言動之頭緒於此方見得天地之心也因問在人則喜怒哀樂未發之前而所謂中節之體已各完具但未發則寂然而已不可見也待因事感動而惻隱羞惡之端始覺非因動而漸有此也曰然問云云先生曰天地所以運行不息者做個甚事只是生物而已物生於春長於夏至秋萬物咸遂如收斂結實是漸欲離其本之時也及其成則物之成實者各具生理所謂碩果不食是已夫具生理者固各繼其生而物之歸根復命猶自若也如説天地以生物為心斯可見矣又問既言心性則天命之謂性命字有心底意否曰然流行運用是心問伊川以動之端為天地之心曰動亦不是天地之心只是見天地之心如十月豈得無天地之心天地之心流行只自若但十月萬物收斂寂無蹤迹到一陽動處生物之心始可見問伊川云云曰此須就卦上看上坤下震坤靜震動十月純坤當貞之時萬物收斂寂無形迹到此一陽復生便是動然不直下動字却云動之端端是從此起雖動而物未生未到大動處凡發生萬物却是從此起豈不是天地之心邵康節詩曰冬至子之半天心無改移一陽初動處萬物未生時康節此詩最好某於復卦本義亦載此詩蓋立冬是十月初小雪是十月中大雪是十一月初冬至是十一月中小寒是十二月初大寒是十二月中冬至子之半即十一月之半也人言夜半子時冬至蓋夜半以前一半屬子時今推五行者多不之知然數每從這處起略不差移此所以為天心然當是時一陽方動萬物未生未有聲臭氣味之可聞可見所以謂元酒味方淡大音聲正希也問王輔嗣説寂然至無乃天地心如何曰彼説非也若靜處説無不知下面一畫作甚麼在天地則為隂陽在人則為善惡不善處便是隂動處便屬陽上五隂下一陽是當沉迷蔽固之時忽然一夕省覺便是陽動處問云云曰此只是就隂陽動靜闔闢消長處而言如云利貞者性情也一元之氣亨通發散品物流形天地之心盡發見在品物上但叢雜難看及到利貞時萬物悉已收斂那時只有個天地性情丹青著見故云利貞者性情也正與復其見天地之心相似康節云一陽初動處萬物未生時蓋萬物生時此心非不見也但天地之心悉布散叢雜無非此理呈露到多了難見若會看者能於此觀之則所見無非天地之心惟是復時萬物皆未生只有一個天地之心昭然著見在這裏較易看也聖人無復故未嘗見其心者蓋天地之氣所以有陽之復者以其有隂故也衆人之心所以有善之復者以其有惡故也若聖人之心則天理渾然初無間斷人孰得以窺其心之起滅耶若靜而復動則亦有之但不可以善惡而為言耳天地之心動方見聖人之心應事接物方見問寂然至靜之中一念之動此便是復否先生曰此説不盡復有兩樣有善惡之復有動靜之復二者不同須要各看得分曉終日營營與物並馳忽然有惻隱等心發見此善惡之為隂陽也若寂然至靜之中有一念之動此動靜之為隂陽也二者各自不同伊川與濓溪説復字亦差不同濓溪就坤上説就回來處説如云利貞者誠之復誠心復其不善之動而已矣皆是就歸來處説伊川却正就動處説如元亨利貞濓溪就利貞上説復字伊川就元字頭説復字以卦爻之義推之則伊川之説為正然二先生所説道理只一般非有所異只是所指地頭不同王弼之説與濓溪同又曰此須通隂陽動靜善惡論之見得各是一理而此意無所不通始盡其曲折矣學者工夫則只如易傳所見知其不善則速改以從善此是要約處若須要識得端倪而心體可識則是添却一事天地以生物為心者也雖氣有闔闢物有盈虛而天地之心則亘古亘今未始有毫釐之間斷故陽極外而復生於內聖人以為復其可以見天地之心焉蓋其復者氣也其所以復者則有自來矣向非天地之心生生不息則陽之極也一絶而不復續矣尚何以復生於內而為闔闢之無窮乎此則所謂動之端者乃一陽之所動動非徒指夫一陽之已動者而為言也復卦贊曰萬物職職其生不窮孰其尸之造化為工隂闢陽開一靜一動於穆無疆全體大用奚獨於斯潛陽壯隂而曰昭哉此天地心蓋翕無餘斯闢之始生意闖然具此全美其在於人曰性之仁斂藏方寸包羅無垠有茁其萌有惻其隱於以充之四海其準曰惟今兹眇綿之間是用齋戒掩身閉關仰止羲圖稽經協傳敢贊一詞以詔亡倦咸天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣程子曰天地二氣交感而化生萬物聖人至誠以感億兆之心而天下和平天下之心所以和乎自聖人感之也觀天地交感化生萬物之理與聖人感人心致和平之道則天地萬物之情可見矣感通之理知道者默而觀之可也恆日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恆而天地萬物之情可見矣程子曰觀其所恆謂觀日月之久照四時之久成聖人之道所以能常久之理觀此則天地之情理可見矣天地常久之道天下常久之理非知道者孰能識之大壯利貞大者正也正大而天地之情可見矣程子曰大者既壯則利於貞正正而大者道也極正大之理則天地之情可見矣天地之道常久而不已者至大至正也正大之理學者默識心通可也萃觀其所聚而天地萬物之情可見矣文中子曰圓者動方者靜其見天地之心乎未詳程子曰詩書中凡以主宰言者皆曰帝有以包涵遍覆之意言者則曰天天地無心而成化聖人有心而無為問鼓萬物而不與聖人同憂曰明道先生兩句極好天地無心而成化聖人有心而無為無心便是不憂成化便是鼓萬物天地鼓萬物亦何常有心來天地之常以其心普萬物而無心聖人之常以其情順萬事而無情全文見前邵子曰天地之心者生萬物之本也天地之情者情狀也與鬼神之情狀同也張氏曰天地無心緣感而生故於坤則寂然不動於復則感而遂通復之一陽天道之所以生物也咸之男女人道之所以生民也於復言天地之心者以無心而為心也變感為咸者有心而欲其無心也云云張子曰天無心心皆在人之心一人私見固不足盡至於衆心所同即是義理揔之則便是天故曰天曰帝者皆民之情然也或問天地之心天地之理理即道理言心即主宰言否朱子曰心固以主宰言然所謂主宰者即理而已非心之外有所謂理理之外有所謂心也又問心字與帝字相似否曰仁字似天字心字似帝字天地以生萬物為心者也道夫言向者先生令思天地有心無心切謂天地無心仁便是天地之心若使其有心必有思慮有營為天地曷嘗有思慮來然其所以四時行百物生者蓋以其合當如此便如此不待思維此所以為天之道曰如此則易所謂復其見天地之心正大而天地之情可見又如何如公所説只説得他無心處爾若果無心則須牛生出馬桃樹上發李他心又却自定程子曰以主宰謂之帝以性情謂之乾他這名義自定心便是他箇主宰處所以謂天地以生物為心中間欽夫以為某不合如此説某謂天地别無勾當只是以生物為心一元之氣運轉流通略無停間只是生出許多萬物而已問程子謂天地無心而成化聖人有心而無為曰這是説天地無心處且如四時行百物生天地何所容心至於聖人則順理而已復何為哉所以明道云天地之常以其心普萬物而無心聖人之常以其情順萬事而無情説得最好問普萬物莫是以心周遍而無私否曰天地以此心普及萬物人得之遂為人之心物得之遂為物之心只是一個天地之心爾今須要知得他有心處又要見得他無心處只恁定説不得問所謂上帝降衷於民天將降大任於人天佑民作之君天生物因其才而篤作善降百祥作不善降百殃凡此等類是蒼蒼在上者其有主宰如是邪抑天無心只是推原其理如此耶曰此數段只一意這箇也只是理如此問天地之帥吾其性先生解以乾健坤順為天地之志天地安得有志曰復其見天地之心天地之情可見安得謂天地無心情乎程先生説天地以生物為心最好此乃無心之心也又曰天地自有箇無心之心又如謂惟皇上帝降衷於下民天道福善禍淫這便自分明有箇人在裏主宰相似又問如何見天地之情曰人正大便也是天地之情正大天地只是正大未嘗有些子邪處未嘗有些子小處又曰且如今人言藥性寒性熱藥何嘗有性只是他所主恁地又曰天地以生物為心譬如飯甑蒸飯從裏面蒸上到上面又下來只管在裏面衮便蒸得熟天地即是包得許多氣在這裏無出處衮一番便生一番物他别無可勾當只得生物不似人便有許多應接所謂為心者如云天命豈是諄諄然命之所謂為心豈是切切然做又曰天包著地無所作為只知生物而已亘古亘今生生不窮人物則得此生物之心以為心所以箇箇肖他右言天地之心此程子所謂主宰之謂帝也語曰簡在帝心書曰帝乃震怒而傳記亦有人心天意之説夫天本無心安得有意况於怒乎以其福善禍淫不少差忒若有意於怒焉耳朱子所謂無心之心學者所宜深體也乾坤易大哉乾元萬物資始乃統天朱子曰此專以天道明乾義大哉歎詞元大也始也乾元天德之大始故萬物之生皆資之以為始也又為四德之首而貫乎天德之始終故曰統天至哉坤元萬物資生乃順承天此以地道明坤之義而首言元也至極也比大義差緩始者氣之始生者形之始順承天施地之道也天行健君子以自強不息朱子曰天乾卦之象也凡重卦皆取重義此獨不然者天一而已但言天行則見其一日一周而明日又一周若重復之象非至健不能也君子法之不以人欲害其天德之剛則自強而不息矣地勢坤君子以厚德載物地坤之象亦一而已故不言重而言其勢之順則見其高下相因之無窮至順極厚而無所不載也乾知太始坤作成物朱子曰知猶主也乾主生物而坤主成物知猶當也如今知州知縣之類太始即生物之始乾始物而坤成之也乾以易知坤以簡能乾健而動即其所知便能始物而無所難故為以易而知太始坤順而靜凡其所能皆從乎陽而不自作故為以簡而能成物問乾坤易簡之理曰易簡只以健順可見且以人論之有人甚健遇事時自然覺易易只是不難又如人稟得性順及其作事便自然簡簡只是不煩問易簡曰只是健順如人之健者做事自易順承者自簡靜而不繁只看下繫確然隤然自分曉易者自做得一半簡者承之乾以易知蓋惟乾健其所施為自是容易觀造化生長則可見只是這氣一過時萬物皆生可見其易要生便生更無凝滯要做便做更無等待非健不能也惟其健所以易雖天下至險亦安然行之如履平地乾坤只是一箇健順之理人之性無不具此雖千萬人吾往矣便是健雖褐寬博吾不惴焉便是順如剛果奮發謙恭退遜亦是但要施之得其當施之不當便不是乾坤之理且如孝子事親須是下氣怡色若用健便是悖逆不孝事君須是犯顔敢諫若用順便是阿諛順旨中庸説君子而時中時中之道施之得宜便是成象之謂乾效法謂之坤朱子曰效呈也法謂造化之詳密而可見者效如曲禮效馬效羊之效言呈出許多物事大槩乾只是做得形象到坤漸次詳密資始資生於此可見效如陳效之效今人言效力之類法是有一定已成之物可以形狀見者成象之謂乾此造化方有些顯露處效法之謂坤以法言之則大段詳密矣效有陳獻底意思乾坤只是理理本無心自人而觀猶必待乾之成象而後坤能效法然理自如此本無相待成象之謂乾謂風霆雨露日星只是箇象夫乾其靜也専其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉程子曰不専一則不能直遂不翕聚則不能發散朱子曰乾坤各有動靜於其四德見之乾一而實坤二而虛餘已見前廣如河廣漢廣之廣闔户謂之坤闢户謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神朱子曰闔闢動靜之機也先言坤者由靜而動也乾坤變通者化育之功也見象形器者生物之序也法者聖人修道之所為而神者百姓自然之日用也問闔闢一段只是一箇物事以其闔謂之坤以其闢謂之乾以其闔闢謂之變以其不窮謂之通發見而未形謂之象成形謂之器聖人修禮立教謂之法百姓日用謂之神曰然又曰利用出入便是人生日用都離他不得又曰民之於易隨取而各足易之於民周遍而不窮所以謂之神所以謂之活潑潑地便是這處夫乾確然示人易矣夫坤隤然示人簡矣朱子曰確然健貌隤然順貌乾坤其易之門耶乾陽物也坤隂物也夫乾天下之至健也德行恆易以知險夫坤天下之至順也德行恆簡以知阻朱子曰至健則所行無難故易至順則所行不煩故簡然其於事皆有以知其難而不敢以易處之也是以其有憂患則健者如自高臨下而知其險順者如自下趨上而知其阻蓋雖易而能知險則不陷於險矣既簡而又知阻則不困於阻矣所以能危能懼而無易者之傾也按此併上文危平易傾説乾坤簡易知險知阻而曰知險阻便不去了惟其簡易所以知險阻而不去敬子云今行險僥幸之人雖知險阻而猶冒昧以進惟乾坤德行本自簡易所以知險阻此假専以憂患之際而言且如健當憂患之際則知險之不可乘順當憂患之際便知阻之不可越此乃處憂患之道當如此如上文説危者使平易者使傾下文説能説諸心能研諸慮皆因憂患説大要乾坤只是循理而已他若知得前有險之不可乘而不去則不陷於險知得前有阻之不可冒而不去則不困於阻若人不循理以私意行乎其間其過乎剛者雖知險之不可乘却硬要乘則陷於險矣雖知阻之不可越却硬要越則困於阻矣只是順理便無事又問在人固是如此以天地言之則如何曰在天地自是無險阻這只是大綱説箇乾坤底意思是如此或問見得乾是至健不息之物經歷艱險處多雖有險處皆不足為其病自然足以進之而無難否曰不然易之書本意正要人知險而不進不然是悖義至健順了凡有險阻只認冒進而無難如此大非聖人作易之意觀上文云易之興也其當殷之末世周之盛德耶當文王與紂之事耶是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要旡咎此之謂易之道也看此語但是恐懼危險便不敢輕進之意乾之道便是如此又説知險知阻之義曰舊因登山而知之自上而下則所向為險自下而上則所向為阻蓋乾則自上而下坤則自下而上健則遇險亦易順則遇阻亦簡然易則可以濟險而簡亦有可涉阻之理乾元者始而亨者也朱子曰始則必亨理勢然矣利貞者性情也收斂歸藏乃見性情之實乾始能以美利利天下不言所利大矣哉始者元而亨也利天下者利也不言所利貞也或曰坤利牝馬則言所利矣大哉乾乎剛健中正純粹精也剛以體言健兼用言中者其行無過不及正者其心不偏四者乾之德也純者不雜於隂柔粹者不雜於邪惡蓋剛健中正之至極而精者又純粹之至極也或疑剛乾無柔不得言中正者不然也天地之間本一氣之流行而有動靜耳以其流行之統體而言則但謂之乾而無所不包矣以其動靜分之然後有隂陽剛柔之别也坤至柔而動剛至靜而德方朱子曰剛方釋牝馬之貞也方謂生物有常後得主而有常含萬物而化光坤道其順乎承天而時行程子曰坤道至柔而其動則剛坤體至靜而其德則方動剛故應乾不違德方故生物有常隂之道不倡而和故居後為得而主利成萬物坤之常也乾健也坤順也朱子曰此言卦之性情乾為馬坤為牛乾為首坤為腹乾天也故稱乎父坤地也故稱乎母乾為天為圜為君為父坤為地為母程子曰乾者天也天者天之形體乾者天之性情乾健也健而無息之謂乾問以性情謂之乾朱子曰是天之性情如此火性情熱水性情寒天之性情則是箇健故不息惟健乃能不息其理是自然有此乾坤是性情天地是皮殼其實只是一箇道理問云云曰性情二字常相參在此情是性之發非性何以有情乾健也動靜皆健坤順也動靜皆順靜是性動是情乾之體為性健之用是情靜也専便是性動也直便是情理無形也故假象以顯義乾以龍為象龍之為物靈變不測故以象乾道變化陽氣消息聖人進退坤以牝馬為象者以其柔順而健行也乾健坤順坤亦健乎曰非健何以配乾未有乾行而坤止也朱子曰徐煥云天之行健一息不停而坤不能順動以應其行則造化之功或幾乎息矣此語亦無病朱子曰隂陽形而下者乾坤形而上者資乾以始即資坤以生不爭得霎時乾底亨時坤底便亨坤之所生資乾之所始者徐煥云萬物資乾以始而有氣資坤以生而有形氣至而生生即坤元此説亦通乾是自然而然坤便有用力處乾道奮發而有為坤道靜重而有守右言乾坤此程子所謂性情也五行書井誓王曰有扈氏威侮五行怠棄三正天用勦絶其命孔氏曰五行之德王者相承所取法正義曰五行水火金木土也分行四時各有其德王者所共取法而有扈氏獨侮慢之所以為大罪也且五行在人為仁義禮智信威侮五行亦為侮慢此五常而不行也有扈與夏同姓恃親而不恭天子廢君臣之義失相親之恩五常之道盡矣是威侮五行也書洪範王訪於箕子箕子乃言曰我聞在昔鯀堙洪水汨陳其五行帝乃震怒不畀洪範九疇彛倫攸斁鯀則殛死禹乃嗣興天乃錫禹洪範九疇彛倫攸敘孔氏疏曰水是五行之一水性下流鯀反塞之水失其道則五行陳列皆亂初一曰五行一曰水二曰火三曰木四曰金五曰土孔氏曰皆其生數也水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘正義曰謂之行者在天則五氣流行在地世所行用也繫辭曰天一地二天三地四天五地六天七地八天九地十此即五行生成之數天一生水地二生火天三生木地四生金天五生土如此則陽無匹隂無耦故地六成水天七成火地八成木天九成金地十成土於是隂陽各有匹耦而物得成焉繫辭又曰天數五地數五五位相得而各有合此所以成變化而行鬼神謂此也又數之所起起於隂陽隂陽往來在於日道十一月冬至日南極陽來而隂往冬水位也以一陽生為水數五月夏至日北極隂進而陽退夏火位也當以一隂生為水數但隂不名竒數必以偶故以六月二隂生為火數也是故易説乾貞於十一月子坤貞於六月未而皆左行由此也冬至以及於夏至當為陽來正月為春木位也三陽已生故三為木數夏至以及冬至當為隂進八月為秋金位也四隂已生故四為金數三月春之季四季土位也五陽已生故五為土數此其生數之由也又萬物之本有生於無著生於微及其成形亦以微著為次五行之體水最微為一火漸著為二木形實為三金體固為四土質大為五大劉與顧氏皆以為水火木金得土數而成故水成數六火成數七木成數八金成數九土成數十義亦然也水純隂故潤下趨隂火純陽故炎上趨陽木金隂陽相雜故可曲直改更王氏曰五者往來天地之間而不窮是以謂行五行之數以竒生者成而偶以偶生者成而竒故萬物之變至於無窮蘇氏曰水至隂也必待天一加之而後生者隂不得陽不得蒸而成也火至炎也必待地二加之而後生者陽不得隂則無所傅而見也五者皆然莫不生於隂陽之相加陽加隂而為水為木為土隂加陽而為火為金茍不相加則雖有隂陽之資而無五行之用易大傳天一地二天三地四天五地六天七地八天九地十程子曰此簡宜在天數五之前同附此朱子曰此言天地之數陽竒隂偶即所謂河圖者也天數五注五竒也地數五注五耦也五位相得而各有合古注天地之數各五五數相配以合成金木水火土天數二十有五五竒合為二十五地數三十五偶合為三十凡天地之數五十有五所以成變化而行鬼神正義曰天數五者謂一三五七九也地數五者謂二四六八十也五位相得而各有合者若天一與地六相得合為水地二與天七相得合為火天三與地八相得合為木地四與天九相得合為金天五與地十相得合為土也天數二十有五者總合五竒之數地數三十者總合五偶之數也凡天地之數五十有五者是天地二數相合為五十五此乃天地隂陽竒偶之數所以成變化而行鬼神者變化以此而成鬼神以此而行也朱子曰天數五者一三五七九皆竒也地數五者二四六八十皆耦也相得謂一與二三與四五與六七與八九與十各以竒耦為類而自相得有合謂一與六二與七三與八四與九五與十皆兩相合二十有五五竒之積也三十者五耦之積也變化謂一生水而六成之二生火而七成之三生木而八成之四生金而九成之五生土而十成之鬼神謂凡竒耦生成之屈伸往來者記月令孟春之月其數八鄭氏曰數者五行佐天地生成萬物之次也易曰天一地二天三地四天五地六天七地八天九地十而五行自水始火次之木次之金次之土為後木生數三成數八但言八者舉其成數孟夏之月其數七火生數二成數七但言七者亦舉其成數孟秋之月其數九金生數四成數九云云同上孟冬之月其數六水生數一成數六云云同上正義曰生物者謂木火七八之數也成物者謂金水九六之數也則春夏生物也秋冬成物也故易繫辭云精氣為物遊魂為變注云精氣謂七八遊魂謂九六則是七八生物九六終物也引易曰以下者謂下繫文也天陽地隂陽數竒隂數耦陽所以竒者陽謂氣氣則渾沌為一無分别之象故其數竒隂數所以耦者隂為形形則有彼此之殊故其數耦也孟春之月先立春三日太史謁之天子曰某日立春盛德在木正義曰天以覆蓋生民為德四時各有盛時春則為生天之生育盛德在於木位故云云立夏盛德在火中央土火休而盛德則土也正義曰夫四時五行同是天地所生而四時是氣五行是物氣是輕虛所以麗天物體質礙所以屬地四時係天年有三百六十日則春夏秋冬各分居九十日五行分配四時布於三百六十日間以木配春以火配夏以金配秋以水配冬以土則每時輒寄王十八日雖每分寄而位本未宜處於季夏之末金火之間故在此陳之也立秋盛德在金立冬盛德在水按太史以此告天子者蓋欲其體天順時以布政也故下文曰命相布德和令行慶施惠此助春之生氣也餘時各因所宜夏則行賞封諸侯習合禮樂所以助長氣也秋則命將帥選士厲兵所以順肅殺之氣冬則賞死事恤孤寡説者謂孤寡即死事者之妻子也阿黨無所掩蔽是又因殺氣之盛而及此欲忠義者之不徒死刑戮者之不濫死也秦人自以為水德而一於用慘急之政是未嘗知有月令也其亡宜哉周子曰陽變隂合而生水火木金土及根隂根陽之説皆見前篇程子曰坎水也一始於中有生之最先者也鑽木取火人謂火生於木非也兩木相戞用力極則陽生今以石相軋則有火非特木也蓋天地間無一物無隂陽邵子曰陽先隂故水先成隂後陽故火後成隂陽相生也體性相須也故陽去則隂竭隂盡則陽滅張氏曰天一生水陽生隂也地二生火隂生陽也太極既判之後則陽分隂未判之前則隂含陽人生之初精藏血中始化曰魄陽生隂也既生魄陽曰魂隂生陽也隂陽相生故體性相資精魄者體質也神魂者性用也虛實相依動靜相養所以隂盡則陽滅陽去則隂竭金火相守則流水木相得則然從其類也張氏曰火克金故相守則金流木生火故相得則木然金流則夫剛而婦柔木然則子盛而母衰隂性趨下故金流則就濕陽性趨上故火然則就燥各從其類也愚按莊子曰木與木相摩則然金與火相守則流邵子之言似本於此莊子下文又云利害相摩生火甚多衆人焚和此又指人心之火亦名言也但其所謂水中有火乃焚大槐又曰月固不勝火其義未詳水者火之地火者水之氣黑者白之地玄者暑之氣張氏曰虛以實為基陽以隂為地凡物之生必先有隂而後陽施焉故隂為道體水氣生陽則為火寒氣生陽則為暑黑氣生陽則為白猶魄氣生陽則為魂也或曰黑安能變白乎曰夜之變晝鉛之變粉非黑而白乎黑者玄也玄之變白者天一之水也火生於無水生於有張氏曰火生於無神也水生於有精也火內暗而外明故離陽在外火之用用外也水外暗而內明故坎陽在內水之用用內也張氏曰火用外目之象也水用內耳之象也火以內為體外為用水以外為體內為用陽者用也朱子亦曰隂以陽為質陽以隂為質水內明而外暗火內暗而外明橫渠曰隂陽之精互藏其宅正此意也按日火外景金水內景本淮南子之説蓋清明者內景濁明者外景清明金水也濁明火日也道家謂日火揚光於外故日有蝕火有滅金水潛光於內故無窮以此為養生之法收視反觀潛神不曜此理固妙只於治道初不相關若吾儒之道則當明而明離晉是也當晦而晦明夷是也張子曰中央土寄王之説非也五行之氣分王四時土固多於四者然其運行之氣則均人見金木水火分王四時獨不見土之所主是以有寄王之説然於中央在季夏之末者以易言之八卦之作坤在西南西南致養之道在離兑之間離兑即金火也是以在季夏之末問四時取火何為季夏又取一畨朱子曰土旺於未月故取之土寄旺四季每季皆十八日是土計七十二日其他四行分四時亦各得七十二日共成三百六十日也愚按張朱二先生所論不同正宜參玩又勉齋黃氏有火生金之説謂推其能尅是以能生學者疑之又蔡氏嘗言非土生金也木火之反即為金矣蓋春夏氣之舒秋冬氣之斂陽之極則反而生隂季公晦深辨其不然今不能盡憶姑附見於此火日外光能直而施金水內光能闢而受受者隨才各得施者所應無窮神與形天與地之道歟木曰曲直能既曲而反申也金曰從革一從革而不能自反也水火氣也故炎上潤下與隂陽升降土不能得而制焉木金者土之華實也其性有水火之雜故木之為物水清則生火燃而不離也蓋得土之浮華於水火之交也金之為物得火之精于土之燥得水之精于土之濡故水火相待而不害爍之反流而不耗蓋得土之精實於水火之際也土者物之所以成始而成終也地之質也化之終也水火之所以升降物兼體而不遺也朱子曰五行之説正蒙中説得最好一字不可增減問五行之體質屬土否曰正蒙只説金與木之體質屬土木與火却不屬土問火附木而生莫亦屬土否曰火自箇虛空中物問只溫熱之氣便是火否曰然冰者隂凝而陽未勝也火者陽麗而隂未盡也火之炎人之蒸有影無形能散而不能受光者其氣陽也陽陷於隂為水附於隂為火朱子曰氣之精英者為神金木水火土非神所以為金木水火土者神也在人則為理所以為仁義禮智信者是也金木水火土雖曰五行各一其性然一物又各具五行之理火中虛暗離中之隂也水中虛明坎中之陽也又曰火中有黑陽中隂也水外黑而中明者隂中之陽也故水謂之陽火謂之隂亦得右言五行西山讀書記卷三十八
