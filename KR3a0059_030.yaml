body:
  text: 西山讀書記卷三十宋真德秀撰子思孟子傳授孟子曰曽子子思同道又曰曽子子思易地則皆然全文見中道篇韓子曰孔子之道大而能博門弟子不能遍觀而盡識也故學焉而皆得其性之所近其後離散分處諸侯之國又各以其所能授弟子源逺而末益分惟孟軻師子思而子思之學出於曽子自孔子沒獨孟軻氏之傳得其宗故求觀聖人之道必自孟子始程子曰孔子沒而曽子之道日益光大傳孔子之道者曽子而已曽子傳之子思子思傳之孟子至孟子而聖人之道益尊又曰傳經為難如聖人之後才百年傳之已差聖人之學若非子思孟子則幾乎息矣道何嘗息只是人不由之道非亡也幽厲不由也楊氏曰中庸深處多見於孟子其所傳也與又曰天命之謂性孟子道性善蓋原於此愚嘗因是考之七篇之書其出乎中庸者非一其曰四端云者則未發之中中節之和也蓋仁義禮知性也所謂大本也惻隱羞惡辭遜是非情也所謂達道也其曰禹稷顔子同道孔子仕止久速者則君子而時中也其曰鄉願亂德者則小人而無忌憚也其曰子莫執中者時中之反也其曰曽子北宫黝之勇者南北方之强也其曰仁之實事親義之實從兄禮之實節文斯二者則仁者人也親親為大義者宜也尊賢為大親親之殺尊賢之等禮所生也其曰堯舜性之湯武反之則自誠明之謂性自明誠之謂教也其曰天下國家之本在身則為天下國家有九經也至於誠者天之道思誠者人之道一章之義悉本於中庸尤足以見淵源之所自朱子曰中庸何為而作也子思子憂道學之失其傳而作也蓋自上古聖神繼天立極而道統之傳有自來矣其見於經則允執厥中者堯之所以授舜也人心惟危道心惟微惟精惟一允執厥中者舜之所以授禹也堯之一言至矣盡矣舜復益之以三言者所以明夫堯之一言必如是而后可庶幾也其後聖賢相承若成湯文武之為君臯陶伊傅周召之為臣皆以此接夫道統之傳若吾夫子雖不得位而所以繼往聖開來學其功反有賢於堯舜者當是時見而知之者惟顔氏曽氏之傳得其宗及曽氏之再傳而復得夫子之孫子思則去聖逺而異端起矣子思懼夫愈久而愈失其真也於是推本堯舜以來相傳之意質以平日所聞父師之言更互演繹作為此書以詔後之學者其曰天命率性則道心之謂也其曰擇善固執則精一之謂也世之相後千有餘年而其言之不異若合符節歷選前聖之書所以提挈綱維開示蘊奧未有若是之明且盡者也自是又再𫝊以得孟氏為能推明是書以承先聖之統及其沒而遂失其𫝊焉則吾道所寄不越乎言語文字之間而異端之說日新月盛以至於老佛之徒出則彌近理而大亂真矣然而尚幸此書之不泯故程夫子兄弟出得有所考以續夫千載不𫝊之緒得有所據以斥二家似是之非蓋子思之功於是為大而微程夫子則亦莫能因其語以得其心也此中庸章句序今剟著於此孟子所謂存心收放心乃致中也至於充廣其仁義之心則致和也又孟子思誠章朱子曰此章述中庸孔子之言見思誠為修身之本而明善又為誠身之本乃子思所聞於曽子而孟子所受於子思者亦與大學相表裏云又孟子盡心知性章朱子曰以大學之序言之知性則物格之謂盡心則知至之謂以上總論子思孟子傳授朱子又嘗曰聖人之德自無不備其次則顔子煞是純全然比之聖人便有少未定處若仲弓則偏於淳篤却少顔子剛明之意如曽子則大段剛毅終是有立腳處所以獨得其傳到子思也恁地剛毅惟是這般人方立得定子思事别無可考只孟子所稱一兩節可見孟子𫝊授揚子曰孟子知言之要知德之奧非茍知之亦允蹈之或曰子小諸子孟子非諸子乎曰諸子者以其異於孔子者乎孟子異乎不異韓子曰孟子之功不在禹下上文曰古者楊墨塞路孟子辭而闢之廓如也夫楊墨行正道廢孟子雖賢聖不得位空言無施雖切何補然賴其言而今之學者尚知宗孔氏崇仁義貴王賤伯而己其大經大法皆亡滅而不救壞爛而不收所謂存什一於千百安在其能廓如也然向無孟氏則皆服左衽而言侏離矣故愈嘗推尊孟氏以為功不在禹下者為此也眉山蘇氏亦云孟子曰禹抑洪水孔子作春秋而豫距楊墨以是配禹也夫禹之功與天地並而孔孟以空言配之不已夸乎自春秋作而亂臣賊子懼孟子言行而楊墨之道廢天下以為是固然而不知其功孟子既沒有申商韓非之學違道而趍利殘民以厚主其說至陋也而士以是罔其上上之人僥幸一切之功靡然從之而世無大人先生如孔子孟子者推其本末權其禍福之輕重以救其惑故其學遂行秦以是喪天下陵夷至於勝廣劉項之禍死者十八九天下蕭然洪水之患蓋不至此也方秦之未得志也使復有一孟子則申韓為空言作於其心害於其事作於其事害於其政者必不若是烈也使楊墨得志於天下其禍豈減於申韓哉由此言之雖以孟子配禹可也程子曰孟子有大功於後世者以其言性善也孟子性善養氣之論皆前聖所未發又曰孟子有功聖門不可勝言仲尼只說一箇仁孟子開口便說仁義仲尼只說一箇志孟子便說許多養氣出來只此二字其功甚多或問孟子可謂聖人否曰未敢便謂已是聖人然其學已到至處朱子曰至字恐當作聖孟子曰可以仕則仕可以止則止可以久則久可以速則速孔子聖之時者也故知易者莫如孟子又曰詩亡然後春秋作又曰春秋無義戰又曰春秋天子之事故知春秋者莫如孟子尹氏曰以此而言則趙氏謂孟子長於詩書而已豈知孟子者哉顔子陋巷自樂以有孔子在焉若孟子之時世既無人安得不以道自任上文云學者全要識時若不識時不足以言學朱子曰使顔子之時上無孔子則彼其所以明道而救世者要必有道決不退然安坐陋巷之中以獨善其身而已故孟子曰禹稷顔子易地則皆然惟孟子見此道理顔子去聖人只毫髮間孟子大賢亞聖之次也上文曰孟子有些英氣才有英氣便有圭角如顔子便渾厚不同云云或曰英氣見於甚處曰但以孔子之言比之便可見且如冰與水精非不光比之玉自有溫潤含蓄氣象無許多光耀也朱子曰孔子只言忠信篤敬孟子便發出性善直是漏泄又曰孔子之言多只泛說做工夫如居處恭執事敬言忠信行篤敬之類未說是要人理會甚麼待學者自做得工夫透徹却就其中見得體段是如此孟子則恐人理㑹不得又䟎進一著說如惻隱之心與學問之道求放心之類說得漸漸親切以上專言孟子傳授史記孟子受業子思之門人或曰人衍字也道既通遊事齊宣王宣王不能用適梁梁惠王不果所言則見以為迂濶而逺於事情當是之時秦用商鞅楚魏用吳起齊用孫子田忌天下方務於合從連衡以攻伐為賢而孟軻乃述唐虞三代之德是以所如者不合退而與萬章之徒序詩書述仲尼之意作孟子七篇韓子曰孟軻之書非軻自著軻既沒其徒萬章公孫丑相與記軻所言焉耳朱子云按二說不同史記近是荀揚之學韓子曰孟氏醇乎醇者也荀與揚大醇而小疵上文云始吾讀孟軻書然後知孔子之道尊聖人之道易行王易王霸易霸也以為孔子之徒沒尊聖人者孟氏而已晚得揚雄書益尊信孟氏因雄書而孟氏益尊則雄者亦聖人之徒歟及得荀氏書又知有荀氏者考其辭時若不粹要其歸與孔子異者鮮矣抑猶在軻雄之間乎程子曰揚子無自得者也故其言蔓衍而不斷優柔而不決其論則曰人之性善惡混荀子悖聖人者也故列孟子於十二子而謂人之性惡性果惡邪聖人何能反其性以至於斯邪又曰荀卿才髙其過多揚雄才短其過少韓子稱其大醇非也若二子可謂大駮矣又曰退之言孟子醇乎醇此言極好非見得孟子意亦道不到其言荀揚大醇小疵則非也荀子極偏駮只一句性惡大本已失揚子雖過少然已自不識性更說甚道又曰韓愈云孟子醇乎醇又曰荀與揚擇不精語不詳若不是他見得豈千餘年後更能斷得如此分明又曰荀子云始乎為士終乎為聖人今學者才讀書便望至聖賢然中間至之之方更有多少荀子雖能如此說却以禮義為僞性為不善它自情性尚理會不得怎生到得聖人又曰揚雄規矩窄狹道即性也言性已錯更何所得按荀子性惡篇曰人之性惡其善者僞也古者聖人以人之性惡以為偏險而不至悖亂而不治是以為之起禮義制法度以矯飾人之情性而正之以擾化人之情性而道之使皆出於理合於道者也今人化師法積文學道禮義者為君子從性情安恣睢慢禮義者為小人以此觀之人之性惡明矣孟子曰人之性善是不然問者曰人之性惡則禮義惡生曰凡禮義者生於聖人之僞非生於人之性也其非十二子篇曰略法先王而不知其統猶然而材劇志大聞見雜博案往舊造說謂之五行甚僻違而無類幽隱而無說閉約而無解案飾其辭而袛敬之曰此真先君子之言也子思唱之孟軻和之世俗之溝猶瞀儒嚾嚾然不知其非也遂受而傳之以為仲尼子游為兹厚於後世是則子思孟軻之罪也十二子者它嚻魏牟也陳仲史鰌也墨翟宋鈃也慎到田駢也惠施鄧析也子思孟子之道即堯舜禹湯文武周公孔子之道也而以厠於十子之間其與前章性惡之云皆其言之甚駮而獲罪於聖人之門者也故具列於此眉山蘇氏曰昔者常怪李斯事荀卿既而焚滅其書大變古先聖王之法於其師之道不啻若寇讎及今觀荀卿之書然後知李斯之所以事秦者皆出於荀卿而不足怪也荀卿者喜為異說而不讓敢為髙論而不顧者也子思孟軻世之所謂賢人君子也荀卿獨曰亂天下者子思孟軻也天下之人如此其衆也仁人義士如此其多也荀卿獨曰人性惡桀紂性也堯舜僞也由是觀之意其為人必也剛愎不遜而自許大過彼李斯者又特甚者耳今夫小人之為不善猶必有所顧忌是以夏商之亡桀紂之殘暴而先王之法度禮樂刑政猶未至於絶滅而不可考者桀紂猶有所存而不敢盡廢也彼李斯者獨能奮而不顧焚燒夫子之六經烹滅三代之諸侯破壞周公之井田此亦必有所恃者矣彼見其師歷詆天下之賢人自是其愚以為古先聖王皆無足法者不知荀卿特以快一時之論而荀卿亦不知其禍之至於斯也蘇氏之言有可取者故附見焉荀子曰真積力久則入循其言可以入道然荀子初不及此聖人之言逺如天近如地其逺也若不可得而及其近也亦可得而行揚子曰聖人之言逺如天賢者之言近如地非也太𤣥中首曰陽氣潛萌於黃宫信無不在乎中養初一藏心於淵美厥靈根測曰藏心於淵神不外也揚子雲之學蓋嘗至此地位也朱子曰荀子說能定而後能應又曰君子大心則天而道小心則畏義而節皆好語也問荀子資質亦是剛明底人曰然只是粗又問揚子比荀子却細曰揚子說到深處只是入老莊窠穴中去如清靜寂寞之說與太元中藏心於淵亦是莊老意問揚子避礙之說如何曰大槩也似只是語言有病問莫是避字有病否曰然少間處事不看道理當如何便先有個依違閃避之心矣揚子為人思沈會去思索如陰陽消長之妙它直是去推求然太元亦拙底工夫蓋天地間只有一箇奇耦奇陽耦陰春少陽夏太陽秋少陰冬太陰自二而四自四而八只恁推去都走不得揚子却添作三事事要作三截又且有氣無朔有日星而無歲月恐不是道理其學似本老氏如清靜淵默等語皆是老氏意思以上兼言荀揚之學又程子曰漢儒之中愚必以揚子為賢然出處之間不能無過也其言曰明哲煌煌旁燭無疆遜於不虞以保天命遜於不虞則有之旁燭無疆則未也古之所謂言遜者迫不得已如劇秦美新之類非得已者乎又曰世之議子雲者多疑其投閣之事以法言觀之蓋未必有又天祿閣世傳以為髙百尺疑不可投然子雲之罪特不在此黽勉於莽賢之間畏死而不敢去是安得為大丈夫哉又曰揚子出處使人難說若孟子斷不肯為朱子通鑑綱目書莽大夫揚雄死有以書來問者朱子答曰雄與王舜之徒所以事莽者雖異而其為事莽則同故竊取趙盾許止之例而概以莽臣書之所以著萬世臣子之戒明雖無臣賊之心但畏死貪生而有其迹則亦不免於誅絶之罪此正春秋謹嚴之法也愚按出處士君子之大節學之所講孰先於此此既失矣何以學為哉程朱之論甚當使子雲而在亦當為法受惡金陵王氏乃謂其與孔子無可無不可合金陵之見如此使其遇莽亦將事之耶此邪說之尤故不可不辨董子之學程子曰公儀子董仲舒之才之卲也使見善不明用心不剛疇克爾愚按公儀子惟有拔葵一事見於史而仲舒對策亦及之曰皇皇求財利常恐匱乏者庶人之意也皇皇求仁義常恐不能化民者大夫之意也程子以其明於義利之辨故並稱程子曰正其誼不謀其利明其道不計其功此董生所以度越諸子又曰仲舒此言可以為法矣漢儒如毛萇董仲舒最得聖賢之意然見道不甚分明胡氏曰董仲舒名儒也多得春秋要義所對切中當世之病如罷黜百家表章六經其功不在孟子下何謂緩而不切乎劉蕡雖直非其班也朱子曰仲舒識得本源如云正心修身可以治國平天下如說仁義禮樂皆其具此等說話皆好若陸宣公之論事却精密苐恐本源處不如仲舒問漢儒何以溺心訓詁而不及理曰漢初諸儒專治訓詁如教人只言某字訓某字令自尋義理而已至西漢末年漸有求得親切者終是不會見全體問何以謂之全體曰全體須徹頭徹尾見得方是如匡衡論時政亦及治性情之說及到得它入手做時又只修得些宗廟禮而已翼奉言見道知王治之象見經知人道之務亦好又却教人主以陰陽日辰之類辨君子小人惟仲舒三篇說得稍親切然終不脫漢氣味問賈誼與仲舒如何曰誼有戰國縱衡之風仲舒儒者但見得不逺問仲舒見道不分明處曰如命者天之令性者生之質情者人之欲命非聖人不行性非教化不成情非制度不節似不識性善模樣又曰明於天性知自貴於物云云又似得性善模樣終是說得間界不分明端的又問性者生之質曰不然性者生之理氣者生之質已有形狀南軒張氏曰賈生英俊之才若董仲舒則知學者也治安之策可謂通達世務然未免激發暴露之氣天人之對雖若緩而不切然反復誦味淵源純粹蓋有餘意以其自學問涵養中來也讀其奏篇則二子氣象如在目中而其平生出處語默亦可驗於此愚按仲舒醇正近理之言見稱於諸老先生外如曰强勉學問則聞見博而智益明强勉行道則德日起而大有功又引曽子尊聞行知之說此二條最有功於學者蓋學道之要致知力行而已虞書之精一論語之知及仁守中庸之博學篤行皆是也秦漢以下未有識之者而仲舒能言之此豈諸儒所可及哉其曰道之大原出於天則天命率性之意尤所謂知其本源者至謂有國者不可不知春秋其言亦有補於世本傳稱其進退容止非禮不行兩相驕主正身率下方公孫洪以阿意容恱取相位仲舒獨終始守正卒老於家以其質之美守之固使得從遊於聖人之門淵源所漸當無慙於游夏矣惜其生於絶學之後雖潛心大業終未能窺大道之全至或流於灾異之術吁可歎哉以上論董子之學文中子之學程子曰王通者隱德君子也當時有少言語後來為人傅會不可謂全書論其粹處殆非荀揚所及若續經之類皆非其作又曰中說後有人綴緝之一本云文中子本是一隱君子世人往往得其議論傅會成書其間極有格言荀揚說不到處又有一件事半截好半截不好如魏徵問聖人有憂乎曰天下皆憂吾獨得不憂問疑曰天下皆疑吾獨得不疑徵退謂董常曰樂天知命吾何憂窮理盡性吾何疑此言極好下半截却云徵所問者迹也吾告汝者心也心迹之判久矣便不是又曰有是心則有是迹王通云云非也又曰文中子言古之學者聚道不知道如何聚得又曰文中子書以明內齊外為家人之義古今善之非取象之意也所謂齊乎巽言物潔齊於巽方非巽有齊義也如戰乎乾乾非有戰義也司馬補傳曰文中子王通字仲淹幼明悟好學受書於東海李育受詩於會稽夏琠受禮於河東關朗受樂於北平霍汲受易於族父仲華仁壽三年通始冠西入長安獻太平十二策帝召見歎美之然不能用罷歸尋復徵之煬帝即位又徵之皆稱疾不至專以教授為事弟子自逺方至者甚衆乃著禮論樂論續書續詩元經贊易謂之王氏六經楊素重其才行勸之仕通曰汾水之曲有先人弊廬足以庇風雨薄田足以具饘粥願明公正身以統天下使時和年豐通也受賜多矣不願仕也或譖通於素曰彼實慢公公何敬焉素以問通通曰使公可慢則僕得矣不可慢則僕失矣得失在僕公何預焉賀若弼嘗示之射發無不中通曰美哉藝也君子志道據德依仁然後游於藝也弼不恱而去通曰夫子矜而愎難乎免於今之世矣蘇威好蓄古器通曰昔之好古者聚道今之好古者聚物劉炫問易通曰聖人之於易也沒身而已矣况吾儕乎有仲長子光者隱於河渚嘗曰在險而運奇不若宅平而無為通以為知言曰名愈消德愈長身愈退道愈進若人知之矣薛收問恩不害義儉不傷禮何如通曰是漢文之所難也廢肉刑害於義省之可也衣弋綈傷於禮中焉可也王孝逸曰天下皆爭利而棄義若之何通曰捨其所棄不亦君子乎或問人善通知其善則稱之不善則對曰未嘗與交也賈瓊問息謗通曰無辨問止怨曰不爭故其鄉人皆化之無爭者賈瓊問群居之道通曰同不害正異不傷物古之有道者內不失真外不殊俗故全也賈瓊請絶人事通曰不可瓊曰然則奚若通曰莊以待之信以應之來者勿拒去者勿追泛如也則可通謂姚義能交或曰簡通曰兹所以能也又曰廣通曰廣而不濫兹又所以為能又謂薛收善接小人逺而不踈近而不狎頽如也通嘗曰封禪非古也其秦漢之侈心乎又曰美哉周公之志深矣乎安家所以寧天下存我所以厚蒼生也又曰易樂者必多哀輕施者必好奪又曰無赦之國其刑必平重斂之國其財必削又曰廉者常樂無求貪者常憂不足又曰我未見誹而喜聞譽而懼者又曰昏而論財夷虜之道也又曰居近而識逺處今而知古其惟學乎又曰輕譽茍毁好憎尚怒小人哉又曰聞謗而怒者讒之階也見譽而喜者佞之媒也絶階去媒讒佞逺矣謂北山黃公善醫先飲食起居而後針藥謂汾陰侯生善筮先人事而後爻象大業十年尚書召通蜀郡司户十一年以著作郎國子博士徵皆不至十四年病終於家門人諡曰文中評曰此皆通之世家及中說云爾余竊謂先生之六經不可勝學也而又奚續焉續之庸能出於其外乎出則非經矣茍無出而續之則贅也奚盆哉或曰彼商周以往此漢魏以還也曰漢魏以還遷固之徒記之詳矣奚待於續經然後人知之必也好大而欺愚乎則必不愚者孰肯從之哉今其六經皆亡而中說亦出於其家雖云門人薛收姚義所記然余觀其書竊疑唐室既興凝與福疇輩依並時從而附益之也何則其所稱朋友門人皆隋唐之際將相名臣如蘇威楊素賀若弼李德林李靖竇威房𤣥齡杜如晦王圭魏徵陳叔達薛收之徒考諸舊史無人語及通名者隋史唐初為也亦未嘗載其名於儒林隱逸之間豈諸公皆忘師棄舊之人乎何獨其家以為名世之聖人而外人皆莫之知也福疇又云凝為監察御史劾奏侯君集有反狀太宗不信之但黜為姑蘇令大夫杜淹奏凝直言非辜長孫無忌與君集善由是與淹有隙王氏兄弟皆抑不用時陳叔達方撰隋史畏無忌不為文中子立傳按叔達前宰相與無忌位任相將何故畏之至沒其師之名使無聞於世乎且魏徵實總隋史縱叔達曲避權戚徵肯聽之乎此余所以疑也仲淹以貞觀二年卒十四年君集平髙昌還而下獄由是怨望十七年謀反誅此其前後參差不實之尤著者也如通對李靖聖人之道曰無所由亦不至於彼彼道之方也必無至乎又對魏徵以聖人有憂疑退語董常以聖人無憂疑曰心迹之判久矣皆流入於釋老者矣夫聖人之道始於正心修身齊家治國至於安萬邦和黎民格天地遂萬物功施當時法垂後世安在其無所至乎聖人所為者皆發於至誠而後功業被於四海至誠心也功業迹也奚為而判哉如通所言是聖人作為以欺天下也其可哉又曰佛聖人也西方之教也中國則泥又曰詩書盛而秦世滅非仲尼之罪也虛𤣥長而晉室亂非老莊之罪也齊戒修而梁國亡非釋迦之罪也茍為聖人矣則推而放諸南海而準推而放諸北海而準烏有可行於西方而不可行於中國哉茍非聖人矣則泥於中國獨不泥於西方邪秦焚詩書之文詩書之道盛於天下秦安得滅乎莊老貴虛無而賤禮法故王衍阮籍之徒乘其風而鼓之飾談論恣情欲以至九州覆沒釋迦稱前生之因果棄今日之仁義故梁武帝承其流而信之嚴齊戒弛政刑至於百姓塗炭發端唱導謂非二家之罪而誰哉此皆議論不合於聖人者也唐世為學之士傳道其書者蓋寡獨李翺以比太公家教及司空圗皮日休始推重之宋興栁開孫何振而張之遂大行於世至有真以為聖人可繼孔子者余讀其書想其為人誠好學篤行之儒惜也其自任太重而其子弟譽之太過使後之人莫之敢信也余恐世人譏其僭而纍其美故采其行事於理可通而所言切於事情者著於篇以補隋史之闕愚按司馬氏補傳之外其言有曰人不里居田不井授終茍道也雖舜禹不能理矣又曰罪莫大於好進禍莫大於多言痛莫大於不聞過辱莫大於不知恥又曰我未見謙而有怨亢而無辱欲慝其德而不章也又曰棄德背義而患人之不已親好疑尚詐而患人之不已信則有之矣又曰處貧賤而不懾可以富貴矣童僕稱其恩可以從政矣交遊稱其信可以立功矣又曰多言者不可與逺謀多動者不可與久處又曰疑滯者智之蝥也忿怒者仁之螣也纎吝者義之蠧也又曰古之從仕者養人今之從仕者養已又曰古之仕也以行其道今之仕也以逞其欲又曰恭則物服慤則有成平則物化李密問王霸之略子曰不以天下易一民之命問英雄子曰自知者英自勝者雄問勇曰必也義乎密出子曰亂天下者必是夫也幸灾而免禍愛强而好勝神明不與也李密見子而論兵子曰禮信仁義則吾論之孤虛詐力吾不與也楚公問用師之道子曰行之以仁義曰若之何決勝子曰莫如仁義過此敗之招也楚難作使使召子子不往謂使者曰為我謝楚公天下崩亂非至公血誠不能安茍使其道無為禍化凡此亦名言也其散見於諸篇者不與焉至於其行則有若所記子躬耕或問曰不亦勞乎子曰一夫不耕或受其饑且庶人之職也亡職者罪無所逃天地之間吾得逃乎子之家六經畢備朝服祭器不假曰三綱五常可自出也子之言必有方應而不唱唱必有大端鄉人有喪子必先往反必後鄉人有水土之役則具畚鍤以往曰吾非從大夫之後也子見耕者必揖而勞之銅川夫人有病子不交睫者三月人問者送迎之必泣以拜銅川府君之喪勺飲不入口者三日方春鄉社子必與執事謝其勞而相其役子居家雖孩孺必狎其使人也雖童僕必斂容子之居常湛如也言必恕動必義與人欵曲以待其㑹子不相形不禱疾不上非義越公以食經遺子不受曰羮藜含糗無所用也答之以酒誥及洪範三德文中子之行大略具是合言行而觀其亦可謂隱德君子矣程子之評其當矣夫朱子曰道之在天下未嘗亡而其明晦通塞之不同則如晝夜寒暑之相反故二帝三王之治詩書六藝之文後世莫能及之蓋非功效語言之不類乃其本心事實之不侔也雖然維天之命於穆不已彼所謂道者則固未嘗亡矣而大學之教所謂明德新民止於至善者又已具有明法若可階而升焉後之讀其書考其事者誠能深思熟讀以探其本謹守力行以踐其事至於一旦豁然而晦者明塞者通則古人之不可及者固已倐然而在我矣夫豈患其終不及哉茍為不然而但為模放假竊之計則不惟精粗懸絶終無可似之理政使似之然於其道亦何足以有所發明此有志為己之士所以不屑而有所不暇為也王仲淹生乎百世之下讀古聖賢之書而粗識其用則於道之未嘗亡者蓋有意焉而於明德新民之學亦不可謂無其志矣然未嘗深探其本而盡力於其實以求必得夫至善者而止之顧乃挾其窺覘想像之倣佛而謂聖之所以聖賢之所以賢與其所以修身所以治人而及夫天下國家者舉皆不越乎此是以見隋文而陳十二策則既不自量其力之不足以為伊周又不知其君之不可以為湯武且不待其招而往不待其問而告則又輕其道以求售焉及其不遇而歸其年蓋亦未為晚也若能於此及之於身以益求其所未至使明德之方新民之具皆足以得其至善而止之則異時得君行道安知其卒不逮於古人政使不幸終無所遇至於甚不得已而筆之於書亦必有以發經言之餘藴而開後學於無窮顧乃不知出此而不勝其好名欲速之心汲汲乎日以著書立言為己任則其用心為己外矣及其無以自託乃復捃拾兩漢以來文字言語之陋功名事業之卑而求其天資之偶合與其竊取而近似者依倣六經次第采輯因以牽挽其人强而躋之二帝三王之列今其遺編雖不可見然考之中說而得其規模之大略則彼之贊易是豈足以知先天後天之相為體用而髙文武皇之制是豈有精一執中之傳曹劉顔謝之詩豈有物則秉彞之訓叔孫通公孫述曹褒荀勉之禮樂又孰與伯夷后䕫周公之懿至於宋魏以來一南一北校功度德蓋未有以相君臣也則其天命人心之向背統緒繼承之偏正亦何足論而欲攘臂其間奪彼豫此以自列於孔子之春秋哉蓋既不自知其學之不足以為周孔又不知兩漢之不足以為三王而徒欲以是區區者比而效之於形似影響之間傲然自謂足以承千聖而詔百王矣而不知其適以是而自納於吳楚僭王之誅使夫後世知道之君子雖或有取於其言而終不能無恨於此是亦可悲也已至於假卜筮象論語而强引唐初文武名臣以為弟子是乃福郊福疇之所為而非仲淹之雅意然推原本始乃其平日好髙自大之心有以啓之則亦不得為無罪矣或曰然則仲淹之學固不得為孟子之倫矣其視荀卿韓氏亦有可得而優劣者耶曰荀卿之學雜於申商子雲之學本於黃老而其著書之意蓋亦姑託空文以自見耳非如仲淹之學頗近於正而粗有可用之實也至於退之原道諸篇則於道之本原若有非荀揚仲淹之所及者然考其平生意鄉之所在終不免於文士浮華放浪之習時俗富貴利達之求而其覽觀古今之變將以措諸事業者恐亦未若仲淹之致懇惻而有條理也是以豫於仲淹獨深惜之而有所不暇於三子是亦春秋責備賢者之遺意也可勝歎哉又曰賈誼根本只從戰國中來漢儒惟董仲舒其學甚正非諸人比然最好處只有正義明道兩語下此諸子皆不足道張良諸葛亮固正只是太粗王通也有好處然無本原工夫却要將秦漢以下文飾做箇三代便自要比孔子不知如何比得如續書要載漢以來詔令他那詔令發明得甚麼義理只有髙帝時詔令稍好然已不純如曰肯從我游者吾能尊顯之此豈所以待天下之士三代之書誥詔令皆是根源學問發明義理所以粲然可為後世法秦漢以下詔令濟得甚事它不曽將心子細去讀聖人書只是依他箇模子見聖人作六經我亦學他作六經便說可以比並聖人不知如何比並某嘗說自孔孟沒後諸儒不曽細讀聖人之書曉得聖人之㫖只是自說一至當道理說得似若可觀只是非聖人之意問董子文中子如何曰仲舒本領純正班固所謂醇儒極是至於天下國家事業恐施展未必如仲淹識見髙明如說治體處極髙了但於本領處如古人明德新民止至善處皆不理㑹要知文中論治體處髙似仲舒而本領不及爽似仲舒而醇不及又曰文中子有志於天下亦識得三代制度較之房魏諸公又稍有些本領只本原上工夫都不理㑹若究其議論本原只自老莊中來問文中子好處與不好處曰見得道理透後從髙視下一目瞭然今要去揣摩不得又曰七制之主必因其續書中㑹采七君事迹以為書名之曰七制如二典然今無可考大率多是依倣而作如以董常為顔子則是以孔子自居又曰天下皆憂吾獨得不憂天下皆疑吾獨得不疑又曰樂天知命吾何憂窮理盡性吾何疑蓋有當憂疑者有不當憂疑者然皆心也文中子以為有心迹之判故伊川非之又曰惟其無一己之憂疑故能憂疑以天下惟其憂疑以天下故無一己之憂疑又曰觀聖人之出處須看他至誠懇切處及灑然無纍處文中子云云此說是又曰文中子言論大綱雜霸如說安家存我都是為自私張本文中子不曽有說見道體處按中說薛收問仁子曰五常之始也問智子曰五常之用也問禮子曰五常之中也可以行矣先王以是南面而坐嚮明而化也問義子曰五常之斷也問信子曰五常之終也問性子曰五常之本也問理子曰五常之分也問道子曰五常之所一也問器子曰五常之偏授於是乎不一也君子器乎哉否也以此數條推之則仲淹之於道體見有未明故其言有未粹易曰元者善之長也程子曰四德之元猶五常之仁偏言則一事專言則包四者然則仁之為仁蓋貫乎五常之始終今獨以始言之是知有偏言之仁而未知有專言之仁也以性言之則仁義禮智皆體也發而為惻隱羞惡辭遜是非則用也今曰智為五常之用焉則仁義信皆體而智獨為用也豈其然乎至若以禮為五常之中未知其取居中之義乎抑取無過不及之義也以居中為言則初無意義若曰無過不及則凡合乎義理之正者皆中也又非獨禮為然矣信於五常無乎不在猶土之王四時也獨以終言可乎惟義者五常之斷一語若曰義在五常之中主於斷制差為近之而以性為五常之本則失之尤甚者也韓子曰人之所以為性者五曰仁曰禮曰信曰義曰智則所謂性者五常而已今曰性為五常之本是性非五常特其本焉爾其各言之未當大抵若是蓋仲淹之學詳於世變而略於情性故其於道之用似有見焉而體則未也朱子之評豈不勝哉以上論文中子之學韓子之學程子曰韓退之晚年為文所得甚多學本是修德有德然後有言退之因學文日求其所未至遂有所得韓愈亦近世豪傑之士如原道中語言雖有病然自孟子而後能將許大見識尋求者才見此人又曰孟子而後却只有原道一篇大意儘近理問遺書言韓愈近世豪傑揚子雲豈得如愈後卷又曰揚子之學實韓子之學華華則學道淺二說似相抵牾朱子曰只以言性論之則揚子善惡混之說所見僅足以比告子耳若退之見得到處却甚峻絶性分三品正是說氣質之性至程門說破氣字方有去著此退之所以不易及而第二說未得其實也韓文不可漫觀晚年所見尤髙又嘗曰退之直是㑹道言語內不足者急於人知沛然有餘厥聞四馳大抵為名者只是內不足內足者自無意於名又曰退之文王操曰臣罪當誅兮天王聖明道得文王心出來又曰退之頌伯夷甚好然只說得伯夷介處要知伯夷之心須是聖人語曰不念舊惡怨是用希此甚說得伯夷心也揚雄韓愈說性皆說著才因言性無不善才有善不善云云又論博愛之謂仁非是已見言仁篇朱子曰自古罕有人說得端的惟退之原道庶幾近之却說見大體又曰原性言所以為性者五說得甚實詳見性情篇韓公之學見於原道者雖有以識夫大用之流行而於本然之全體則疑其有所未睹且於日用之間亦未見其有以存養省察而體之於身也是以雖其自任者不為不重而其平生用力深處終不離乎文字言語之工至其好樂之私又未能卓然自拔於流俗所與遊者不過一時文士其於僧道則亦僅得毛千暢觀靈惠之流是其身心內外所立所資不越乎此亦何所據以為息邪距詖之本而充其所以自任之心是以一旦放逐憔悴亡聊之中無復平日飲博過從之樂方且鬱鬱不能自遣而卒然見夫瘴海之濱異端之學乃有能以義理自勝不為事物侵亂之人與之語雖不盡解亦豈不足以蕩滌情纍而暫空其滯礙之懷乎然則凡其稱譽大顛之言自不必諱而於公所謂不求其福不畏其禍不學其道者初亦不相妨也雖然使公於此能因彼稊稗之有秋而悟我黍稷之未熟一旦翻然反求諸身以盡聖賢之藴則所謂以理自勝不為外物侵亂者將無復羡於彼而吾之所以自任者益恢乎其有餘地矣豈不偉哉此朱子考異孟簡書注云韓公於道知其用之周於萬事而未知其體之具於吾心知其可行於天下而未知其本之當先於吾之一身也是以其言常詳於外而略於內其志常極於逺大而其行未必能謹於細微雖知文與道有輕重之殊而終未能審其緩急輕重之序以決取舍雖知汲汲以行道濟時抑邪與正為事而或未免雜乎貪位慕祿之私大學八條起於格物致知終於平天下所以教人為學次第至為纎悉漢魏以來諸儒之論未聞有及之者至唐韓子乃能援以為說庶幾其有聞矣然其言極於正心誠意而無致知格物云者則是不探其端而驟語其次亦未免於擇焉不精語焉不詳之病矣何乃以是而議荀揚哉韓子於道見其大體規模極分明但未能究其所從來而體察操履處皆不細密其排佛老亦據其所見而言之爾程先生說西銘原道之宗祖此言可以推其淺深也又令門人評王韓優劣學者多主退之曰文中子根腳雖淺却是以天下為心分明是要見諸事業天下事皆入思慮來退之雖見得道之大用是如此然却無實用功處問揚子韓子優劣曰各自有長處韓公見得大意已分明但不曾子細理㑹如原道之類不易得也揚子之學似本於老氏如清靜淵默之語皆是韓公綱領正却無它這箇近老子底說話又曰原道中說得仁義道德極好但是他不去踐履玩味故見得不精密問退之文士何以從祀曰有闢佛老之功問伊川謂西銘乃原道宗祖如何曰西銘從上面說來原道言率性之謂道西銘併天命之謂性說了問如定名虛位之說如何曰後人多譏議之某謂如此說亦無害蓋此仁也此義也便是定名此仁之道仁之德此義之道義之德則道德乃總名是虛位也且須知它此語為老子說老子謂失道而後德失德而後仁失仁而後義失義而後禮失禮而後智所以原道云吾之所謂道德合仁與義言之也須知此意方看得又問退之謂軻死不得其傳程子取之屏山以為孤聖道絶後學如何曰屏山只要說釋子道流皆得其傳爾屏山本釋學問博愛之謂仁如何曰說得却差仁義兩句皆用將作體看事事合宜者為義仁者愛之理若曰博愛曰行而宜之則皆用矣又曰以博愛為仁則未博愛之前將無仁乎問由是而之焉之謂道曰此是說行底非是說道體問足乎已無待於外之謂德曰此是說行道而有得於身者非是說自然得之於天者問孟子謂楊墨之害不息孔子之道不著韓公推尊孟子闢楊墨之功而讀墨一篇乃云云何也曰韓公第一義是學文第二義方去窮理所以看得不親切如云其行已不敢有愧於道他本只是學文但行已不敢有愧於道耳把這箇做第二義愚按唐史本傳云其原道原性師說等數十篇皆奧衍閎深與孟軻揚雄相表裏而佐佑六經云又曰自晉迄隋老佛顯行諸儒倚天下正議助為怪神愈獨喟然引聖爭四代之惑雖蒙訕笑跲而復舊始若未之信卒大顯於時昔孟軻拒楊墨去孔子才二百年愈排二家乃去千餘載撥衰反正功與齊而力倍之所以過况雄為不少矣自愈沒其言大行學者仰之如泰山北斗云史氏之稱愈者如此而程朱二先生議論乃或是非相半蓋史氏存乎奬善而二先生講學明道則雖毫厘必致其察此所以不同歟又神道碑云公遺命喪葬無不如禮俗習夷狄畫寫浮圗日以七數之及拘陰陽所謂吉凶一無汙我朱子曰按此可知公之平生謹守禮法排斥異教自信之篤至死不變可以為後世法以上論韓子之學周子二程子𫝊授程子曰昔受學於周茂叔令尋仲尼顔子樂處所樂何事又曰自再見周茂叔後吟風弄月而歸有吾與㸃也之意又曰周茂叔忩前草不除去問之曰與自家意思一般又曰觀天地生物氣象周茂叔謂看一部華嚴經不如看一艮卦注言各止其所也邵康節謂伊川極論天地萬物之理以及六合之外伊川歎曰平生唯見周茂叔論至此伊川為太中家傳曰公在䖍時嘗假倅南安獄掾周惇頤年甚少公視其氣貌非常人與語果為學知道者因與為友河間劉立之敘明道事曰先生從汝南周惇頤問學窮性命之理朱子曰濂溪在當時人見其政事精絶則以為宦業過人見其有山林之志則以為襟懷灑落有仙風道氣無有知其學者惟程太中知之宜其生兩程子也胡氏曰周子啓程子以不傳之妙其功蓋在孔孟之間人見其書之約而不知其道之大也見其文之質而不知其義之精也見其言之淡而不知其味之長也五峯序通書曰通書四十一章周子之所述也周子名某字茂叔舂陵人推其道學所自或曰傳太極圗於穆修也修傳先天圗於种放放傳於陳摶此殆其學之一師歟非其至者也云云朱子曰先生之學其妙具於太極一圗通書之言皆發此圗之藴而程先生兄弟語及性命之際亦未嘗不因其說觀通書之誠動靜理性命等章及程氏書李仲通銘程邵公志顔子好學論等篇則可見矣潘清逸志先生之墓敘所著書特以作太極圗為稱首然則此圗當為先生書首不疑也然先生既手以授二程本因附書後傳者見其如此遂誤以圗為書之卒章不復釐正使先生立象盡意之微指暗而不明而驟讀通書者亦復不知有所總攝此則諸本之失也又嘗讀朱內翰震進易說表謂此圗之傳自陳摶种放穆修而來而五峯胡宏作通書序又以為先生非止為种穆之學者此特其學之一師耳非其至者也夫以先生之學之妙不出此圗以為得之於人則決非种穆所及以為非其至者則先生之學又何以加於此圗哉是以竊嘗疑之及得志文考之然後知其果先生所自作而非有受於人者二公蓋皆未嘗見此志而云云耳然胡公所論通書之指曰人見其書之約云云人有真能立伊尹之志修顔子之學則知此書之言包括至大而聖門之事業無窮矣此則不可易之至論讀此書者所宜知也又曰今人多疑濂溪之學出於希夷某曰濂溪書具存如太極圗希夷如何有此說朱子曰河圗出而八卦畫洛書呈而九疇敘孔子於斯文之興喪亦未嘗不推之於天若濂溪先生者其天之所畀而得乎斯道之傳者與不然何其絶之久而續之易晦之甚而明之亟也蓋自周衰孟軻氏沒而此道之傳不屬更秦及漢歷晉隋唐以至於我有宋聖祖受命五星集奎實開文明之運然後氣之漓者純判者合清明之禀得以全付乎人而先生出焉不繇師傳默契道體建圗屬書根極領要當時見而知之有程氏遂擴大而推明之使夫天理之微人倫之著事物之衆鬼神之幽莫不洞然畢貫於一而周公孔子孟氏之傳煥然復明於世有志之士得以探討服行而不失其正如出於三代之前者嗚呼盛哉非天所畀其孰能與於此江州書堂記自鄒孟氏沒而聖人之道不傳世俗所謂儒者之學內則局於章句文辭之習外則雜於老子釋氏之言而其所以修己治人者遂一出於私智人為之鑿若此者蓋千有餘年於今矣濂溪先生奮乎百世之下乃始深探聖賢之奧疏觀造化之原而獨心得之立象著書闡發幽祕辭義雖約而天人性命之微修己治人之要莫不畢舉河南兩程先生既親見之而得其傳於是其學遂行於世士之講於其說者始得以脫於俗學之陋異端之惑三先生有功於當世於是為不小矣袁州祠記先生之言其髙極乎無極太極之妙而實不離乎日用之間其幽探乎陰陽五行造化之賾而其實不離乎仁義禮智剛柔善惡之際其體用之一原顯微之無間秦漢以下誠未有臻斯理者而其實則不外乎六經論語中庸大學七篇之所傳也蓋其所謂太極云者合天地萬物之理而一名之耳以其無器與形而天地萬物之理無不在是故曰無極而太極以其具天地萬物之理而無器與形故曰太極本無極也是豈離乎生民日用之常而自為一物哉其為陰陽五行造化之賾者固此理也其為仁義禮智剛柔善惡者亦此理也性此理而安焉者聖也復此理而執焉者賢也自堯舜以來至于孔孟其所以相傳之說豈有一言以易此哉顧孟氏既沒而諸儒之智不足以及此是以世之學者茫然莫知所適髙則放於虛無寂滅之外卑則溺於雜博華靡之中自以為道固如是莫或知其非也及先生出始發明之以傳於程氏而其流遂及於天下之學者於是始知聖賢之所以相傳之實乃出於此而有以用其力焉此先生之教所以繼往聖開來學而大有功於斯世也隆興祠記秦漢以來道不明於天下而士不知所以為學言天者遺人而無用語人者不及天而無本專下學者不知上達而滯於形器必上達者不務下學而溺於空虛優於治已者或不足以及人而隨世以就功名者又未必自其本而推之也是以天理不明而人欲熾道學不傳而異端起人挾其私智以馳騖於一世宋興有濂溪先生者作然後天理明而道學之傳復續蓋有以闡夫太極陰陽五行之奧而天下之為中正仁義者得以知其所自來言聖學之有要而下學者知勝私復禮之可以馴致於上達明天下之有本而言治者知誠心端身之可以舉而措之於天下其所以上接洙泗千歲之統下啓河洛百世之傳者脈絡分明而規模宏逺矣歷選諸儒授受之次以論其興復開創汛掃平一之功未有髙焉者也韶州祠記通書者濂溪夫子之所作也夫子自少即以學行有聞於世而莫或知其師傳之所自獨以河南兩程夫子嘗受學焉而得孔孟不傳之正統則其淵源因可槩見然所以指夫仲尼顔子之樂而發其吟風弄月之趣者亦不可得而悉聞矣所著之書又多放失獨此一篇本號易通與太極圗說並出程氏以傳於世而其為說實相表裏大抵推一理二氣五行之分合以紀綱道體之精微決道義文辭祿利之取舍以振起俗學之卑陋至論所以入德之方經世之具又皆親切簡要不為空言顧其宏綱大用既非秦漢以來諸儒所及而其條理之密意味之深又非今世學者所能驟而窺也是以程氏既沒而傳者鮮焉其知之者不過以為用意髙逺而已通書序朱子既為太極圗說則録以寄廣漢張敬夫以書來曰先生所與門人講論問答之言見於書者詳矣其於西銘蓋屢言之至此圗則未嘗一言及也謂其必有微意是則固然然所謂微意者果何謂邪熹竊以為此圗立象盡意剖析幽微周子蓋不得已而作也觀其手授之意蓋以為惟程子為能當之至程子而不言則疑其未有能受之者爾夫既未能默識於言意之表則馳心空妙入耳出口其弊必有不勝言者觀其答張閎中論易傳成書深患無受之者及東銘見録中論橫渠清虛一大之說使人向别處走不若且只道敬則其意亦可見矣若西銘則推人以證之天即近以明逺於學者日用最為親切非若此書詳於性命之原而略於進為之目有不可以驟而語者也孔子雅言詩書執禮而於易則鮮及焉其意亦猶此耳問先生謂程子不以太極圗授門人蓋以未有能受之者孔門亦未嘗以此語顔曽如何曰焉知其不曽說曰觀顔曽做工夫處只是切已做將去曰此亦何嘗不切已皆非在外乃我所固有也曰言此徒長人臆度料想之見曰理㑹不得者固如此若理㑹得者莫非在我便可受用何臆度之有問太極圗自一而二自二而四即推至於萬物易則自一而二自二而四自四而八自八而十六自十六而三十二自三十二而六十四然後萬物之理備西銘則止言陰陽洪範則止言五行或略或詳皆不同何也先生曰理一也人所見有詳略爾然道理亦未嘗不相值也大凡看道理要見得大頭腦處分明下面節節只是此箇道理散為萬殊如孔子教人只是逐件事說箇道理未嘗說出大頭腦處然四方八面合聚凑來也自見得箇大頭腦若孟子便已指出示人至周公說出太極已是大段分明指出矣且如惻隱之端從出處推上去則是此心之仁仁即所謂四德之元元即太極之動處如此節節推上去亦自見得總腦處若看得太極處分明則盡見得天下許多道理皆自此出事事物物皆有此箇道理元無虧缺也近世諸公知濂溪者甚淺如吕氏童蒙訓稱其用意髙逺夫通書太極之說所以明天理之根源究萬物之終始豈用意而為之又何逺近髙下之可道哉通書文雖髙簡而體實淵慤且其所論不出乎陰陽變化修己治人之事未嘗劇談無物之先文字之外也通書中數數拈出幾字要當如此瞥地即自然有箇省力處濂溪之圗雖簡古淵深未易究測然其大指不過語諸學者講學致思以窮天地萬物之理而勝其私以復焉其施則善於家而達於天下其具則復古禮變今樂政以養民而刑以肅之也是乃所謂伊尹之志顔子之學而程氏傳之以覺斯人者周子留下太極圗若無通書却教人如何曉得故太極圗得通書而後明南軒張氏曰自孔孟沒其微言僅存於簡編更秦火之餘漢世儒者號為窮經學古不過求之訓詁章句間於其文義時有所益然大本之不求聖賢之心鬱而不彰而又有專從事文辭者其去古益以逺經生文士岐為二途及夫措之當世施於事為則又出於功利之末智力之所營若無與于書者於是有異端者乘間而入橫流於中國儒而言道德性命者不入於老則入於釋間有希世傑出之賢攘臂排之而其說復未足以盡吾儒之指歸故不足以抑其瀾而或反以激其勢嗟乎言學而莫適其序言治而不本於學言道德性命而流入於虛誕吾儒之學其果如是乎哉及吾先生起于逺方乃超然有所自得於其心本乎易之太極中庸之誠以極乎天地萬物之變化其教人使之志伊尹之志學顔子之學推之於治先王之禮樂刑政可舉而行如指諸掌於是河南二程先生兄弟從而得其說推明究極之廣大精微殆無餘藴學者始知夫孔孟之所以教蓋在此而不在乎他學可以至於聖治不可以無本而道德性命初不外乎日用之實詖淫邪遁之說皆無以自隱其形然則先生發端之功顧不大哉道州祠記又曰自秦漢以來言治者汨於五伯功利之習求道者淪於異端空虛之說而於先王發政施仁之實聖人天理人倫之教莫克推尋而講明之故言治若無預於學而求道者反不涉於事孔孟之書僅傳而學者莫得其門而入生民不克睹乎三代之盛可勝歎哉惟先生崛起千載之後獨得微指於殘編斷簡之中推本太極以及乎陰陽五行之流布人物之所以生化於是知人之為至靈而性之為至善萬物有其宗萬事循其則舉而措之則可見先王之所以為治者皆非私智之所出孔孟之意於以復明至於二程先生則又推而極之凡聖人之所以教人與學者之所以用工本末始終精析該備於是五伯功利之習無以亂其正異端空虛之說無以申其誣求道者有其序而言治者有所本其有功於聖門而流澤於後世顧不大矣哉又曰自孟子沒聖學失傳歷世久逺其間儒者非不知尊敬孔孟而誦習六經所得則不越於訓詁文義間而止矣於所謂聖人之心所以本諸天地而措諸天下與來世者蓋鮮克涉其籓而况睹其大全者哉惟先生出乎千載之後而有得於太極之妙今其圗與書具存道學有傳實在乎此二程先生始嘗受學於先生而其自得之深充養之至精粹純密更益光大聖門之大全至是發明無遺憾矣夫以孔孟之心至三先生而後傳則三先生所為傳心之懿在學者可不深求而力體之乎又曰自聖學不明語道者不睹夫大全卑則割裂而無統髙則汗漫而不精是以性命之說不參諸事物之際而經世之務僅出於私意小智之為豈不可歎哉惟先生生乎千有餘載之後超然獨得夫大易之傳所謂太極圗乃其綱領也推明動靜之一源以見生化之不窮天命流行之體無乎不在文理密察本末該貫非闡微極幽莫能識其指歸也然而學者若何而進於是哉亦曰敬而已矣誠能起居食息主一而不舍則其德性之知必有卓然不可掩於體察之際者而後先生之藴可得而窮太極可得而識矣程子曰周公沒聖人之道不行孟軻死聖人之學不傳道不行百世無善治學不傳千載無真儒無善治士猶得以明夫善治之道以淑諸人以傳諸後無真儒則天下貿貿焉莫知所之人欲肆而天理滅矣先生生乎千四百年之後得不傳之學於遺經以興起斯文為己任辨異端闢邪說使聖人之道煥然復明於世蓋自孟子之後一人而已然學者於道不知所向則不知斯人之為功不知所至則孰知斯名之稱情也哉以上伊川作明道墓表又曰先生為學自十五六時聞汝南周茂叔論道遂厭科舉之業慨然有求道之志未知其要泛濫於諸家出入於老釋者幾十年返求諸六經而後得之明於庶物察於人倫知盡性至命必本於孝悌窮神知化由通於禮樂辨異端似是之非開百代未明之惑秦漢而下未有臻斯理也謂孟子沒而聖學不傳以興起斯文為己任其言曰道之不明異端害之也昔之害近而易知今之害深而難辨昔之惑人也乘其迷暗今之入人也因其髙明自謂之窮神知化而不足以開物成務言為無不周遍實則外於倫理窮深極微而不可以入堯舜之道天下之學非淺陋固滯則必入於此自道之不明也邪誕妖異之說競起塗生民之耳目溺天下於汙濁雖髙明才智膠於見聞醉生夢死不自覺也是皆正路之蓁蕪聖門之蔽塞闢之而後可以入道先生進將覺斯人退將明之書不幸早世皆未及也其辨析精微稍見於世者學者之所傳爾先生之門學者多矣先生之言平易易知賢愚皆獲其益如群飲於河各充其量先生教人自致知至於知止誠意至於平天下灑掃應對至於窮理盡性循循有序病世之學者舍近而趨逺處下而窺髙所以輕自大而卒無得也以上伊川作明道行狀伊川嘗謂張繹曰我昔狀明道先生之行我之道蓋與明道同異時欲知我者求之於此文可也又曰明道之葬門人朋友為文以述其道學者甚衆人各用其所知蓋不同也而以為孟子之後傳聖人之道者一人而已是則同劉安禮曰自孟軻沒聖學失傳先生傑然自立於千載之後芟闢榛穢開示本源聖人之庭户曉然可入學士大夫始知所向朱光庭曰先生之學以誠為本仰觀乎天清明穹窿日月之運行陰陽之變化所以然者誠而已俯察乎地廣博持載山川之融結草木之蕃殖所以然者誠而已人居天地之間參合無間純亦不已者其在兹乎蓋誠者天德也聖人自誠而明其靜也淵渟其動也神速天地之所以位萬物之所以育何莫由斯道也先生得聖人之誠者也自孟子以來千有餘歲先王大道得先生而後傳其補助天地之功可謂盛矣范祖禹曰自孟子沒中庸之道不傳後世之士不循其本而用心於末故不可與入堯舜之道先生以獨智自得去聖人千有餘載發其門鍵直睹堂奧一天地之理盡萬物之變真學者之師也游酢曰天地之心其太一之體歟天地之化其太和之運乎確然髙明萬物覆焉隤然博厚萬物載焉非以其一歟陽自此舒陰自此凝消息滿虛莫見其形非以其和歟夫子之德其融心滌慮默契於此歟不然何穆穆不已渾渾無涯而能言之士莫足以頌其美歟吕大臨曰先生負特立之才知大學之要博聞強記躬行力究察倫明物極其所止渙然心釋洞見道體其造於約也雖事變之感不一應之以是心而無窮雖天下之理至衆知反之吾身而自足其致於一也異端並立而不能移聖人復起而不與易其養之成也和氣充浹見於聲容然望之崇深不敢慢也遇事優為從容不迫然誠心懇惻弗之措也其自任之重寧學聖人而未至不欲以一善成名寧以一物不被澤為已病不欲以一時之利為已功其自信之篤也吾志可行不茍潔其去就吾義所安雖小官有所不屑武夷胡氏曰程氏之文於易則因理以明象而知體用之一源於春秋則見諸行事而知聖人之大用於諸經語孟則發其微指而知求仁之方入德之序程氏之行其行已接物則忠誠動於州里其事親從兄則孝悌顯於家庭其辭受取舍非其道義則一介不以取與諸人雖祿之千鍾不顧也紹興間諫官陳公輔言伊川之學不正公上章辨之曰伏見元祐之初宰臣司馬光吕公著秉政當國急於得人首薦河南處士程頤以為言必忠信動遵禮義實儒者之髙蹈聖世之逸民乞加召命擢以不次遂自韋布超居講筵而臺諫朱光庭等又奏頤道德純備學問淵博有經天緯地之才有制禮作樂之具實天民之先覺聖代之真儒也而頤之見知於當世至矣自頤之司勸講不為辨辭解釋文義所以積其誠意感通聖心者固不得而聞也及當官而行舉動必由乎禮奉身而去進退必合於義其修身行法規矩準繩獨出諸儒之表門人髙弟莫或繼焉雖崇寧間曲加防禁學者向之私相傳習不可遏也其後頤之門人如諫議楊時右史劉安節舍人許景衡殿院馬伸待制吳給等稍稍進用於是傳者浸廣士大夫爭相淬勵而其間志於利祿者託其說以自售學者莫能判其真僞矣壬子年臣至行闕有仲辨者言伊川之學近日盛行士大夫將轉為伊川矣臣語之曰伊川之學不絶如線可謂孤立而以為盛行何也豈以其說滿門人人傳寫耳納口出而以為盛乎自是服儒冠者以伊川門人自相標榜識者憂之士大夫所學各有黨與互相排擊自此起矣紹興五年省試舉人陳狀乞不用元祐人朱震等考試蓋從於新學者耳目見聞皆已習熟安於其說不肯遽變而傳河洛之學者又多失其本真妄自尊大無以屈服士人之心故衆論洶洶深加詆誚夫有為伊洛之學者皆欲屏絶其徒而乃上及於伊川臣竊以為過矣夫聖人之道所以垂訓萬世無非中庸非有甚髙難行之說離世異俗之行此誠不可易之至論也然中庸之義不明久矣自頤兄弟始發明之然後其義可思而得也不然則或謂髙明所以處已中庸所以接物本末上下析為兩途而其義不明矣士大夫之學宜以孔孟為師此亦不可易之至論也然孔孟之道不傳久矣自頤兄弟始發明之而後其道可學而至也不然則或以六經語孟之書資口耳取世資以干祿愈不得其門而入矣今欲使學者蹈中庸師孔孟而禁使不得從頤之學是入室而不由户也不亦誤乎夫頤之文云云然則狂言怪語淫說鄙諭豈其文也哉頤之行云云其餘則亦與人同耳然幅巾大袖髙視濶步豈其行也哉云云五峯胡氏曰程氏兄弟唱久絶之學於今日其功比於孔子作春秋孟子闢楊墨朱子曰先生之學以大學論語中庸孟子為標指而達於六經使人讀書窮理以誠其意正其心修其身自家而國以及於天下其道坦而明其說簡而通其行端而實蓋將有以振百代之沉迷而內之聖賢之域黃州二程先生祠記曰天聖中洛人程公珦初任為黃陂尉秩滿不能去而遂家焉實以明道元年壬申生子曰皓又以明年癸酉生子曰頤其後十有餘年當慶歷丙戌丁亥之間攝二南安乃得獄掾周公某而與之游於是二子因受學焉慨然有求道之志得孔孟不傳之緒於遺經遂以其學為諸儒倡今所謂明道先生伊川先生者也云云明道德性寬大規模廣濶伊川氣質剛方文理密察其道雖同而造德各異故明道嘗為條例司官不以為浼而伊川所作行狀乃獨不載其事明道猶謂青苗可且放過而伊川乃於西監一狀校計如此可謂不同矣但明道所處乃大賢以上事學者未至而輕議之恐失所守伊川所處雖髙然實中人可以跂及學者只當以此為法則庶乎其寡過矣明道之言發明極致通透灑落善開發人伊川之言即事明理質慤精深尤耐咀嚼然明道之言一見便好久看愈好所以賢愚皆獲其益伊川之言乍見未好久看方好故非久於玩索者不能識其味此其自任所以有成人材尊師道之不同又曰明道渾然天成不犯人力伊川功夫造極可奪天功又曰明道當初想明得煞容易便無那查滓只一再見濂溪當時又不似而今有許多言語出來不是它天資髙見得易如何便明得問遺書中載明道語便自然灑落明快曰自是他見得容易伊川易傳却只管修改晚年方出其書若使明道作自無許多事伊川說話如今看來中間寧無小小不同只是大綱統體說得極善如性即理也一句直是自孔子後惟是伊川說得盡這一句便是千萬世說性之根基問明道可比顔子伊川可比孟子否曰明道可比顔子孟子才髙恐伊川未到然伊川收束檢制處孟子却不能及又曰此道更前後聖賢其說始備自堯舜以下若不生孔子後人去何處討分曉孔子後若無孟子亦未分明後數千載乃始得程先生兄弟出來發明此理今看來漢唐以下諸儒說道理直是說夢只有箇韓文公依稀說得略似耳南軒張氏曰讀諸先生之書惟覺二程先生完全精粹愈讀愈無窮不可不詳味也又曰伊川之言看得似平易而研究其味無斁二先生所以教學者不越於居敬窮理二事取其書反覆讀之則可以見蓋居敬有力則其所窮者愈精窮理浸明則其所居益有地二者蓋互相發也二先生其猶一氣之周流乎何其理之該而不偏辭之平而有味也讀遺書易傳它書真難讀也上文云諸君子往往因有所見便自處之髙執之固後來精義更不可入故未免有病若云云以上兼論周子二程子傳授又伊川嘗言某於易傳已自成書但逐旋修改期以七十其書可出春秋待劉絢文字到却用功亦不多也今人解詩全無意思却待出些文字中庸書却已成今農夫祁寒暑雨深耕易耨播種五榖吾得而食之今百工技藝作為器用吾得而用之甲胄之士被堅執鋭以守土宇吾得而安之却閒過了日月即是天地間一蠧也功澤又不及别事又做不得惟有補緝聖人遺書庶幾有補爾陳長方見尹子於姑蘇問中庸解子曰先生自以為不滿意焚之矣又先生自涪陵歸易傳已成未嘗示門人弟子請益有及易書者方命小奴取書篋以出身自發之以示門弟子非所請不敢多閲門弟子請問易傳事一字之疑先生必再三命之蓋其潛心甚久未嘗容易下一字又先生云吾四十以前讀誦五十以前研究其義六十以前反覆紬繹六十以後著書著書不得已又南方學者從伊川既久有歸者或問曰學者久從學於門誰是最有得者伊川曰豈敢便道有得處且只是指與他箇岐徑令他尋將去不錯了已是忒大㬠若是自得尤難其人謂之得者便是已有也若論隨力量而有見處則不無其人也又胡文定公言昔嘗見鄒志完論近世人物因問程明道如何志完曰此人得志使萬物各得其所又問伊川如何曰却不得比明道為有不通處後再論河南二先生學術志完却曰伊川見處極髙因問何以言之曰昔鮮于侁曽問顔子在陋巷不改其樂不知所樂者何事伊川却問曰尋常道顔子所樂者何侁曰不過是說顔子所樂者道伊川曰若有道可樂便不是顔子以此知伊川見處極髙又曰浩昔在潁昌有趙鈞國者自洛中來浩問曽見先生有何語鈞國曰先生語學者曰除却神祠廟宇人始知為善古人觀象作服便是為善之具按以上數章皆足以見程子之學術故附焉西山讀書記卷三十
