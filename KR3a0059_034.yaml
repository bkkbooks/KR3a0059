body:
  text: 西山讀書記卷三十四上宋真德秀撰進退附仕進繫辭君子之道或出或處易乾文言初九曰潛龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔潛龍也程子曰初九陽之微龍德之潛隱乃聖賢之在側陋也守其道不隨世而變晦其行不求知於時自信自樂見可而動知難而避其守堅不可奪潛龍之德也又曰樂行憂違皆道也非己私也又曰潛龍勿用陽氣潛藏方陽微潛藏之時君子亦當晦隱未可用也又曰君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也坤六四括囊無咎無譽四居近五之位而無相得之義乃上下閉隔之時其自處以正危疑之地也若晦藏其知如括結囊口而不露則可得無咎不然則有害也既晦藏則無譽矣象曰括囊旡咎慎不害也能慎如此則無害也文言曰天地變化草木蕃天地閉賢人隱易曰括囊旡咎旡譽蓋言謹也天地交感則變化萬物草木蕃盛君臣相際而道亨天地閉隔則萬物不遂君臣道絶賢者隱遁四於閉隔之時括囊晦藏則雖無令譽可得無咎言當謹自守也屯初九磐桓利居貞程子曰初以陽爻在下乃剛明之才居屯難之世居下位者也未能便往濟屯故磐桓也方屯之初不磐桓而遽進則犯難矣故宜居正而守其志凡人處屯難則鮮能守正茍無貞固之守則將失義安能濟時之屯乎象曰雖磐桓志行正也賢人在下時茍未利雖磐桓未能遂往濟時之屯然有濟屯之志與濟屯之用志行其正也六二屯如邅如乘馬班如匪冦婚媾女子貞不字十年乃字二以隂柔居屯之世雖正應在上而逼於初剛故屯難邅回如辭也乘馬欲行也欲從正應而復班如不能進也班分布之義下馬為班與馬異處也二當屯世雖不能自濟而居中得正有應在上不失義者也然逼近於初隂乃陽所求柔者剛所陵柔當屯時固難自濟又為剛陽所逼故為難也設匪逼於寇難則往求於婚媾也婚媾正應也寇非理而至者二守中正不茍合於初所以不字茍貞固不易至於十年屯極必通乃獲正應而字育矣以女子隂柔茍能守其志節久必獲通况君子守道不回乎初為賢眀剛正之人而為寇以侵逼於人何也曰此自遽二以柔近剛而為義更不計初之德如何也易之取義如此朱子曰字嫁也禮曰女子許嫁筓而字象曰六二之難乘剛也十年乃字反常也六二居屯之時而又乘剛為剛陽所逼是其患難也至於十年則難久必通矣乃得反其常與正應合也十數之終也六三即鹿無虞惟入於林中君子幾不如舍往吝六三以隂柔居剛柔既不能安屯居剛而不中正則妄動雖貪於所求既不足以自濟又無應援將安之乎如即鹿而無虞人也入山林者必有虞人以導之無導之者惟陷入於林莽中君子見事之幾微不若舍而勿逐往則徒取窮吝而已象曰即鹿無虞以從禽也君子舍之往吝窮也事不可而妄動以從欲也無虞而即鹿以貪禽也當屯之時不可動而動猶無虞而即鹿以有從禽之心也君子則見幾而舍之不從若往則可吝而困窮也䝉亨匪我求童䝉童䝉求我初筮告再三瀆瀆則不告利貞䝉有開發之理亨之義也卦求時中乃致亨之道六五為䝉之主而九二發䝉者也我謂二也五居尊位有柔順之德而方在童䝉與二為正應而中德又同能用二之道以發其䝉也二以剛中之德在下為君所信向當以道自守待君至誠求己而後應之則能用其道匪我求於童䝉乃童䝉來求於我也筮占决也初筮告謂至誠一意以求己則告之再三則瀆慢矣故不告也發䝉之道利以貞正又二雖剛中然居隂故宜有戒匪我求童䝉童䝉求我志應也二以剛明之賢處於下五以童䝉居上非是二求於五蓋五之志應於二也賢者在下豈可自進以求於君茍自求之必無能信用之理古之人所以必待人君致敬盡禮而後往者非欲自為尊大蓋其尊德樂道不如是不足與有為也需彖曰需須也險在前也剛健而不陷其義不困窮矣需之義須也以險在於前未可遽進故需待而行也以乾之剛健而能需待不輕動故不陷於險其義不至於困窮也剛健之人其動必躁乃能需待而動處之至善者也故夫子贊之曰其義不困窮矣象曰雲上於天需君子以飲食宴樂雲氣蒸而上升於天必待隂陽和洽然後成雨雲方上於天未成雨也故為須待之義隂陽之氣交感而未成雨澤猶君子蓄其才德而未施於用也君子觀雲上於天需而為雨之象懷其道德安以待時飲食以飬其氣體宴樂以和其心志所謂居易以俟命也吕氏曰易𫝊云飲食以養其氣體宴樂以和其心志二句極有意味蓋君子於未遇之時㴠養成就一旦有用則無施不可此非口體之養而已也愚謂氣體不克則有憔悴而已爾心志不和則有忿躁而已爾若是者且不能保其生况能俟命以有為乎借使有為以憔悴之質忿躁之心安能負荷天下之重而平享天下之事乎有志於需者當深玩也初九需於郊利用恆旡咎需者以遇險故需而後進初最逺於險故為需於郊郊曠逺之地也處於曠逺利在安守其常則無咎也不能安守其常則躁動犯難豈能需於逺而旡過也象曰需於郊不犯難行也利用恆旡咎未失常也處曠逺者不犯冒險難而行也陽之為物剛健上進者也初豈需待於曠逺之地不犯險難而進復宜安處不失其常則可以無咎矣雖不進而志動者不能安其常也君子之需時也安靜自守志雖有需而恬然若將終身焉乃能用常也九二需於沙小有言終吉沙為水水近則有沙二去險漸近故為需於沙漸近於險難雖未至於患害己小有言矣言語之傷至小者也二以剛陽之才居柔守中寬裕自處需之善也雖去險漸近而未至於險故小有言語之傷而無大害終得其吉也象曰需於沙衍在中也雖小有言以吉終也衍寬綽也二雖近險而以寬綽居中故雖小有言語及之終得其吉善處者也九三需於泥致冦至泥逼於水也既進逼於險當致冦難之至也三剛而不中又居健體之上有進動之象故致冦也茍非敬順則致喪敗矣象曰需於泥災在外也自我致冦敬慎不敗也三切逼上體之險故云災在外也三之致冦由已進而逼之故云自我冦自己致若能敬慎量宜而進則無喪敗也需之時需而後進也其義在相時而動非戒其不得而進也直使敬慎無失其宜耳比吉原筮元永貞無咎比吉道也人相親比自為吉道故雜卦云比樂師憂人相親比必有其道茍非其道則有悔吝故必推原占决其可比者而比之筮謂占决卜度非謂以筮龜也所比得元永貞則無咎元謂有君長之道永謂可以常久貞謂得正道上之比下必有此三者下之從上必求此三者則無咎也六二比之自內貞吉二與五為正應也皆得中正以中正之道相比者也二處於內自內謂由己也擇才而用雖在乎上而以身許國必由於己巳以得君道合而進乃得正而吉也以中正之道應上之求乃自內也不自失也汲汲以求比者非君子自重之道乃自失也象曰比之自內不自失也守己中正之道以待上之求乃不自失也易之為戒嚴密二雖中正質柔體順故有貞吉自失之戒戒之自守以待上之求無乃涉後凶乎曰士之修已乃求上之道降志辱身非自重之道也故伊尹武侯救天下之心非不切必待禮至然後出也履初九素履往無咎履不處者行之義初處至下素在下者也而陽剛之才可以上進若安其卑下之素而往則無咎矣夫人不能自安於貧賤之素則其進也乃貪躁而動求去乎貧賤耳非欲有為也既得其進驕溢必矣故往則有咎賢者則安履其素其處也樂其進也將有為也故得其進則有為而無不善乃守其素履者也象曰素履之往獨行願也安履其素而往者非為利也獨行其志願耳獨専也若欲貴之心與行道之心交戰於中豈能安履其素也九二履道坦坦幽人貞吉九二居柔寬裕得中其所履坦坦然平易之道也雖所履得坦易之道亦必幽靜安居之人處之則能貞固而吉也九二陽志上進故有幽人之戒象曰幽人貞吉中不自亂也履道在於安靜其中恬正則所履安裕中若躁動豈能安其所履故必幽人則能堅固而吉蓋其中心安靜不以利欲自亂也泰初九拔茅茹以其彚征吉初以陽爻居下是以剛明之才而在下者也時之否則君子退而窮處時既泰則志在上進也君子之進必以其朋類相牽援如茅之根然拔其一則牽連而起矣茹根之相牽連者故以為象彚類也賢者以其類進同志以行其道是以吉也君子之進必以其類不惟志在相先樂於與善實乃相賴以濟故君子小人未有能獨立不賴朋類之助者也自古君子得位則天下之賢萃於朝廷同志協力以成天下之泰小人在位則不肖者並進然後其黨勝而天下否矣蓋各從其類也象曰拔茅征吉志在外也時將泰則羣賢皆欲上進三陽之志欲進同也故取茅茹彚征之象志在外上進也朱子曰征行之吉也郭璞洞林讀至彚字絶句下卦放此否初六拔茅茹以其彚貞吉亨泰與否皆取茅為象者以羣陽羣隂同在下有牽連之象也泰之時則以同征為吉否之時則以同貞為亨始以內小人外君子為否之義復以初六否而在下為君子之道易隨時取義變動無常否之時在下者君子也否之三隂上皆有應在否隔之時隔絶不相通故無應義初六能與其類貞固其節則處否之吉而其道之亨也當否而能進者小人也君子則伸道免禍而已君子進退未嘗不與其類同也象曰拔茅貞吉志在君也爻以六自守於下眀君子處下之道象復推眀以盡君子之心君子固守其節以處下者非樂於不進獨善也以其道方否不可進故安之耳心固未嘗不在天下也其志嘗在得君而進以康濟天下故曰志在君也朱子曰三隂在下當否之時小人連類而進之象而初之惡則未形也故戒其貞則吉而亨蓋能如是則變而為君子矣案朱子之說與程𫝊不同姑附此六二包承小人吉大人否亨六二其質則隂柔其居則中正以隂柔小人而言則方否於下志所包蓄者在承順乎上以求濟其否為身之利小人之吉也大人當否則以道自處豈肯枉己屈道承順於上惟自守其否而已身之否乃其道之亨也或曰上下不交何所承乎曰正則否矣小人順上之心未嘗無也象曰大人否亨不亂羣也大人於否之時守其正節不雜亂於小人之羣類身雖否而道之亨也故曰否亨不以道而身亨乃道否也不云君子而云大人能如是則其道大也朱子曰隂柔而中正小人而能包容承順乎君子之象小人之吉道也大人則當安守其否而後道亨蓋不可以彼包承於我而自失其守也或問楊氏包承小人之說然乎曰易之說未有云爾者而楊氏獨屢言之若使大人處否而包承乎小人以得亨利則亦不足以為大人矣是說之行將啓後世為茍容幸免之弊懼非所以為訓也蠱上九不事王侯髙尚其事上九居蠱之終旡係於下處事之外旡所事之地也以剛眀之才無應援而處無事之地是賢人君子不偶於時而髙潔自守不纍於世務者也故云不事王侯髙尚其事古之人有行之者伊尹太公望之始曽子子思之徒是也不屈道以狥時既不得施設於天下則自善其身尊髙敦尚其事守其志節而已士之自髙尚非一道有懷抱道德不偶於時而髙潔自守者有知止足之道退而自保者有量力度分安於下求者有清介自守不屑天下之事獨潔其身者所處雖有得失小大之殊皆自髙尚其事者也象所謂志可則者進退合道者也觀六四觀國之光利用賔於王觀莫眀於近五以剛陽中正居尊位聖賢之君也四切近之觀見其道故云觀國之光觀見國之盛德光輝也不指君之身而云國者在人君而言豈止觀其行於一身當觀天下之政化則人君之道德可見矣四雖隂柔而巽體居正切近於五觀見而能順從者也利用賔於王夫聖明在上則懷抱才德之人皆願進於朝廷輔戴之以康濟天下四既觀見人君之德國家之治光華盛美所宜賔於王朝效其智力上輔於君以施澤天下故云利用賔於王也古者有賢德之人則人君賔禮之故士之仕進於王朝則謂之賔象曰觀國之光尚賔也君子懷負才業志在乎兼善天下然有卷懷自守者蓋時無眀君莫能用其道不得已也豈君子之志哉故孟子曰中天下而立定四海之民君子樂之既觀見國之盛德光華如人所謂非常之遇所以志願登進王朝以行其道故云觀國之光尚賔也尚謂志尚其志意願慕賔於王朝也剝不利有攸往剝者羣隂長盛消剝於陽之時衆小人剝喪於君子故君子不利有所往惟當巽言晦迹隨時消息以免小人之害也彖曰剝剝也柔變剛也不利有攸往小人長也剝剝也謂剝落也柔變剛也柔長而剛剝也夏至一隂生而漸長一隂長則一陽消至於建戍則成剝是隂柔變陽剛也隂小人之道方長盛而剝消於陽以變剛故君子不利有攸往也朱子曰剝落也五隂在下而方生一陽在上而將盛隂盛長而陽消落九月之卦也隂盛陽衰小人壯而君子病又內坤外艮有順時而止之象順而止之觀象也君子尚消息盈虛天行也君子當剝之時知不可有所往順時而止乃能觀剝之象也卦有順止之象乃處剝之道君子當觀而體之君子尚消息盈虛天行也君子存心消息盈虛之理而能順之乃合乎天行也理有消衰有息長有盈滿有虛損順之則吉逆之則凶君子隨時敦尚所以事天也咸六二咸其腓凶居吉二以隂在下與五為應故設咸腓之戒腓足肚行則先動足乃舉之非如腓之自動也二若不守道待上之求而如腓自動則躁妄自失所以凶也安其居而不動以待上之求則得進退之道而吉也二中正之人以其在咸而應五故為此戒復云居吉若安其分不自動則吉也象曰雖凶居吉順不害也二居中得正所應又中正其才本善以其在咸之時質柔而上應故戒以先動求君則凶居以自守則吉象復眀之云非戒之不得相感惟順理則不害謂守道不先動也遁遁退也避也去之之謂也為卦天下有山天在上之物陽性上進山髙起之物形雖髙起體乃止物有上陵之象而止不進天乃上進而去之下陵而上去是相違遁故為遁去之義二隂相生於下隂長將盛陽消而退小人漸盛君子退而避之故為遁也遁亨小利貞遁者隂長陽消君子遁藏之時也君子退藏以神其道道不屈則為亨故遁所以有亨也在事亦有由遁避而亨者雖小人道長之時君子知幾逺避固善也然事有不齊與時消息無必同也隂為方長而未至於甚盛君子尚有遲遲致力之道不可大貞而尚利小貞也朱子曰遁退避也為卦二隂浸長陽當退避故為遁六月之卦也陽雖當遁然九五當位而下有六二之應若猶可以有為但二隂浸長於下則其勢不可以不遁故其占為君子能遁則身雖退而道亨小人則利於守正不可以浸長之故而浸迫於陽也小謂隂柔小人也二先生之說不同正當參考彖曰遁亨遁而亨也小人道長之時君子遁退乃其道之亨也君子遁藏所以伸道也此言處遁之道自剛當位而應以下則論時與卦才尚有可為之理也剛當位而應與時行也雖遁之時君子處之未有必遁之義五以剛陽之德處中正之位又與下六二以中正相應雖隂長之時如卦之才尚當隨時消息茍可以致其力無不至誠自盡以扶持其道未必於遁藏而不為故曰與時行也小利貞浸而長也遁之時義大矣哉遁者隂之始長君子知微故當深戒而聖人之意未便遽已也故有與時行小利貞之教聖人之於天下雖知道之將廢豈肯坐視而不救必區區致力於未拯之間强此之衰艱彼之進茍得為之孔孟之所屑為也王允謝安之於漢晉是也初六遁尾厲勿用有攸往它卦以下為初遁者往遁在前也前者先進故初乃為尾尾在後之物也遁而在後不及者也是以危也初以柔處微既已後矣不可往也往則危矣微者易於晦藏往既可危不若不往之無災也象曰遁尾之厲不往何災也見幾先遁固為善也遁而為尾危之道也往既有危不若不往而晦藏可免於災處微故也古人處微下隱亂世而不去者多矣朱子曰遁而在後尾之象危之道也占者不可以有所往但晦處靜俟則可以免災耳九四好遁君子吉小人否四與初為正應是所好愛者也君子雖有所好愛義茍當遁則去而不疑所謂克己復禮以道制欲是以吉也小人則不能以義處昵於所好牽於所私至於陷辱其身不能已故在小人則否也否不善也四乾體能剛斷者聖人以其處隂而有係故設小人之戒恐其失於正也象曰君子好遁小人否也君子雖有好而能遁不失於義小人則不能勝其私意而至於不善也九五嘉遁貞吉九五中正遁之嘉美者也處得中正之道時止時行乃所謂嘉美也故為貞正而吉九五非無係應然與二皆以中正自處是其心志及乎動止莫非中正而無私係之失所以為嘉也在彖則概言遁時故云與時行小利貞尚有濟遁之意於爻之至五遁將極矣故惟以中正處遁言之遁非人君之事故不主君位言然人君之所避逺乃遁也亦在乎中正而已象曰嘉遁貞吉以正志也志正則動必由正所以為遁之嘉也居中得正而應中正是其志正也所以為吉人之遁也止也惟在正其志而已矣上九肥遁無不利肥者充大寬裕之意遁者惟飄然逺逝旡所係滯之為善上九乾體剛斷在卦之外矣又下無所係是遁之逺而無纍可謂寬綽有餘裕也遁者困窮之時也善處則為肥矣其遁如此何所不利象曰肥遁旡不利旡所疑也其遁之逺無所凝滯也蓋在外則已逺無應則旡纍故為剛决無疑也晉初六晉如摧如貞吉罔孚裕無咎初居晉之下進之始也晉如升進也摧如抑退也於始進而言遂其退不遂其進惟得正則吉也罔孚者在下而始進豈遽能深見信於上雖上未見信則當安中自守雍容寬裕無急於求上之信也茍欲進之心切非汲汲以失其守則悻悻以傷於義矣皆有咎也故裕則無咎君子處進退之道也眀夷初九眀夷于飛垂其翼君子於行三日不食有攸往主人有言初九眀體而居眀夷之初見傷之始也九陽眀上升者也故取飛象昏暗在上傷陽之眀使不得上進是於飛而傷其翼也翼見傷故垂朵凡小人之害君子害其所以行者君子於行三日不食君子眀照見事之微雖始有見傷之端未顯也君子則能見之矣故行去避之君子於行謂去其祿位而退藏也三日不食言困窮之極也事未顯而處甚艱非見幾之眀不能也夫知幾者君子之獨見非衆人所能識也故眀夷之始其見傷未顯而去之則世俗孰不疑怪故有所往適則主人有言然君子不以世俗之見而遲疑其行也若俟衆人盡識則傷已及而不能去矣此薛方所以為眀而揚雄所以不獲其去也或曰傷至於垂翼傷已眀矣何得衆人猶未識也曰初傷之始也云垂其翼謂傷其所以飛耳其事尚未顯也君子見幾故亟去之世俗之人未能見也故異而非之如穆生之去楚申公白公且非之况世俗之人乎但譏其責小禮而不知穆生之去避胥靡之禍也當其言曰不去楚人將鉗我於市雖在懦者亦以為過甚之言也又如袁閎於黨事未起之前名德之士方鋒起而獨潛土室故人以為狂卒免黨錮之禍而人有言胡足怪也象曰君子於行義不食也君子遁藏而困窮義當然也惟義之當然故安處而無悶雖不食可也蹇初六往蹇來譽六居蹇之初往進則益入於蹇往蹇也當蹇之時以隂柔無援而進其蹇可知來者對往之辭上進則為往不進則為來止而不進是有見幾知時之美來則有譽也象曰往蹇來譽宜待也方蹇之初進則益蹇時之未可進也故宜見幾而止以待時可行而後行也諸爻皆蹇往而善來然則無出蹇之義乎曰在蹇而往則蹇也蹇終則變矣故上六有碩義艮九三艮其限列其夤厲薰心止道貴乎得宜行止不能以時而定於一其堅强如此則處世乖戾與物暌絶其危甚矣人之固止一隅而舉世莫與宜者則艱蹇忿畏焚燒其中豈有安裕之理厲薰心謂不安其勢薰爍其中心也象曰艮其限危薰心也謂其固止不能進退危懼之慮常薰爍其中心也上九敦艮吉九以剛實居上而又成艮之主在艮之終止之至堅篤者也敦篤實也居止之極故不過而為敦人之正難於久終故節或移於晚守或失於終事或廢於久人之所同患也九能敦厚於終止道之至善所以吉也六爻之德惟此為吉象曰敦艮之吉以厚終也天下之事惟終守之為難能敦於止有終者也上之吉以其能厚於終也論語憲問恥子曰邦有道榖邦無道榖恥也朱子曰邦有道不能有為邦無道不能獨善而但知食祿皆可恥也子曰邦有道危言危行邦無道危行言孫尹氏曰君子之持身不可變也至於言則有時而不敢盡以避禍也然則為國者使士言孫豈不殆哉洪氏曰危非矯激也直道而已孫非阿諛也逺害而已吳氏曰言孫者亦非失其正也特少致其委曲如夫子之對陽貨云耳子謂南容邦有道不廢邦無道免於刑戮以其兄之子妻之朱子曰以其謹於言行故能見用於治朝免禍於亂世也子曰寧武子邦有道則知邦無道則愚其知可及也其愚不可及也朱子曰寧武子衛大夫名俞按春秋𫝊武子仕衛當文公成公之時文公有道而武子無事可見此其知之可及也成公無道至於失國而武子周旋其間盡心竭力不避艱險凡其所處皆知巧之士所深避而不肯為者而能卒保其身以濟其君此其愚之不可及也程子曰邦無道能沉晦以免患故曰不可及亦有不當愚者比干是也寧武子事見春秋左氏𫝊僖二十有八年晉侯伐衛夏晉楚戰於城濮楚師敗績衛侯聞楚師敗懼出奔楚使元咺奉叔武以受盟六月晉人復衛侯寧武子與衛人盟於城濮國人聞此盟也而後不二衛侯先期入寧子先叔武將沐聞君至喜捉髮走出前騎射而殺之元咺出奔晉冬衛侯與元咺訟寧武子為輔針莊子為坐士榮為大士衛侯不勝殺士榮刖針莊子謂寧俞忠而免之執衛侯歸之於京師置諸深室寧武子職納槖饘焉三十年晉侯使醫衍鴆衛侯寧俞貨醫使薄其鴆不死秋乃釋衛侯季氏使閔子騫為費宰閔子騫曰善為我辭焉如有復我者則吾必在汶上矣朱子曰閔子不欲臣季氏令使者善為已辭程子曰仲尼之門能不仕大夫之家者閔子曽子數人而已謝氏曰學者能少知內外之分皆可以樂道而忘人之勢况閔子得聖人為之依歸彼其視季氏不義之富貴不啻犬彘又從而臣之豈其心哉在聖人則有不然者蓋居亂邦見惡人在聖人則可自聖人以下剛則必取禍柔則必取辱閔子豈不能早見而豫待之乎如由也不得其死求也為季氏附益夫豈其本心哉蓋既無先見之知又無克亂之才故也然則閔子其賢乎或問謝氏之說粗厲咸奮若不近聖賢氣象者而吾獨有取焉亦以其足以立懦夫之志而已子曰篤信好學守死善道朱子曰篤厚而力也不篤信則不能好學然篤信而不好學則所信或非其正不守死則不能以善其道然守死而不足以善其道則亦徒死而已蓋守死者篤信之效善道者好學之功危邦不入亂邦不居天下有道則見無道則隱君子見危授命則仕危邦者無可去之義在外則不入可也亂邦未危而刑政紀綱紊矣故潔其身而去之天下舉一世而言無道則隱其身而不見也此惟篤信好學守死善道者能之邦有道貧且賤焉恥也邦無道富且貴焉恥也世治而無可行之道世亂而無能守之節碌碌庸人不足以為士矣可恥之甚也朝氏曰有學有守而去就之義潔出處之分眀然後為君子之全德也子曰賢者辟世朱子曰天下無道若伯夷太公是也其次辟地去亂國適治邦其次辟色禮貌衰而去其次辟言有違言而後去也程子曰四者雖以大小次第言之然非有優劣也所遇不同耳黃氏曰四者固非有優劣然賢者之處世豈不能超然髙舉見幾而作乃至發見於言色而後辟之耶曰出處之義自非一端隨其所居之位而量其所處之宜可也衛靈公顧蜚雁則辟色矣問陳則辟言矣豈夫子於此為劣乎此所以不可以優劣言也子路宿於石門晨門曰奚自子路曰自孔氏曰是知其不可而為之者與朱子曰石門地名晨門掌晨啓門蓋賢人隱於抱關者也自從也問其何所從來也胡氏曰晨門知世之不可而不為故以是譏孔子然不知聖人之視天下無不可為之時也黃氏曰晨門見己而不見聖人故以是為言然無孔子之聖則寧為晨門而自處於抱關擊柝也其言聖人則非其自處其身則是亦可謂賢也已南軒曰聖人非不知道之不可行而皇皇於斯世者天地生物之心也彼雖知世之不可以為而不知道之不可以已子擊磬於衛有荷蕢而過孔氏之門者曰有心哉擊磬乎磬樂器荷擔也蕢草器也此荷蕢者亦隱士也聖人之心未嘗忘天下此人聞其磬聲而知之則亦非常人矣既而曰鄙哉硜硜乎莫已知也斯己而已矣深則厲淺則揭莫已之已音紀餘音以硜硜石聲亦専確之意以衣涉水曰厲攝衣涉水曰揭此兩句衛風匏有苦葉之詩也譏孔子人不知己而不止不能適淺深之宜子曰果哉末之難矣果哉歎其果於忘世也末無也聖人心同天地視天下猶一家中國猶一人不能一日忘也故聞荷蕢之言而歎其果於忘世且言人之出處若但如此則亦無所難矣南軒難作去聲謂其言之果無得與辨論矣衛靈公問陳於孔子孔子對曰爼豆之事則嘗聞之矣軍旅之事未之學也明日遂行在陳絶糧從者病莫能興子路愠見曰君子亦有窮乎子曰君子固窮小人窮斯濫矣朱子曰言君子固有窮時不若小人窮則放溢為非程子曰固窮者固守其窮亦通愚謂聖人當行而行無所顧慮處困而亨無所怨悔於此可見學者宜深味之或問衛靈公問陳而夫子遽行何也曰為國以禮戰陳之事非人君所宜問也况靈公無道夫子固知之矣特以其禮際之善庶幾可與言者是以往來於衛為日最久而所以啓告之者亦已詳矣乃於夫子之言一無所入至是而猶問陳焉則其志可知矣故對以未學去之然不徒曰未學而已猶以爼豆之事告之則夫子之去蓋亦未有必然之意使靈公於此有以發悟於心而改事焉則夫子之行孰謂其不可留哉故史記又云明日與孔子語見蜚雁仰視之色不在孔子孔子遂行則是孔子之行又以禮際之不善而决不専於問陳一事也夫子既行而靈公卒衛國大亂爼豆之對其㫖逺哉南軒曰夫自春秋之時言之諸國以强弱為勝負軍旅之事宜在所先而爼豆之事疑若不急者矣曽不知國之所以為國者以夫天叙天秩實維持之也為國者志存乎典禮則孝順和睦之風興協力一心尊君親上其强孰禦焉不然三綱淪廢人有離心國誰與立軍旅雖精果何所用哉隱居以求其志行義以逹其道吾聞其語矣未見其人也朱子曰求其志守其所達之道也達其道行其所求之志也蓋伊尹太公之流可以當之當時若顔子亦庶乎此然隱而未見又不幸而早死故夫子言然隱居以求志行義以達道則其退也所以安其義之所安其進也所以推其志於天下矣蓋其所達之道即其所求之志也此大人之事故曰未見其人也子曰直哉史魚邦有道如矢邦無道如矢朱子曰史官名魚衛大夫名鰌如矢言直也史魚自以不能進賢退不肖既死猶以尸諌故夫子稱其直事見家語君子哉蘧伯玉邦有道則仕邦無道則可卷而懷之伯玉出處合於聖人之道故曰君子卷收也懷藏也如於孫林父寧殖放弒之謀不對而出亦其事也楊氏曰史魚之直未盡君子之道若蘧伯玉然後可免於亂世若史魚之如矢則雖欲卷而懷之有不可得也或問尸諌之說曰按家語衛靈公不用蘧伯玉而任彌子瑕史魚諌不從將卒命其子曰吾生不能正君死無以成禮宜置尸牖下其子從之靈公吊而問之子以父言告公曰是寡人之過也遂命殯於客位而進伯玉退子瑕此其說也有以伯玉得明哲保身之道而史魚所不及者非也伯玉所以如此蓋其德性深厚循理而行自然中節初非規規然務為緘默而預為可以卷懷之計初非専為明哲保身之計也君子之出處一於義而已非有計較利害之心也然一不中節而失於矯訐之過則在已固為未合於義且雖曰愛君而或反陷其君以殺臣之罪其所以不敢過於為直亦不専為保身計也南軒曰史魚可以謂之直而已然能伸而不能屈未盡君子之道若蘧伯玉之可卷而懷則能因時而屈伸矣故謂之君子然比於用則行舍則藏者則猶有卷懷之意未及乎潛龍之隱見也陽貨欲見孔子孔子不見歸孔子豚孔子時其亡也而往拜之遇諸塗朱子曰陽貨季氏家臣名虎嘗囚季桓子而専國政欲令孔子來見己而孔子不往貨以禮大夫有賜於士不得受於其家則往拜其門故瞰孔子之亡而歸之豚欲令孔子來拜而見之也謂孔子曰來豫與爾言曰懷其寶而迷其邦可謂仁乎曰不可好從事而亟失時可謂知乎曰不可日月逝矣嵗不我與孔子曰諾吾將仕矣懷寶迷邦謂懷藏道德不救國之迷亂亟數也失時謂不及事幾之㑹將者且然而未必之時貨語皆譏孔子而諷使速仕孔子固未嘗如此而亦非不欲仕也但不仕於貨耳故直據理答之不復與辨若不諭其意者陽貨之欲見孔子雖其善意然不過欲使助已為亂耳故孔子不見者義也其往拜者禮也必時其亡而往者欲其稱也遇諸塗而不避者不終絶也隨問而對者理之直也對而不辨者言之孫而亦無所詘也楊氏曰揚雄謂孔子於陽貨也敬所不敬為詘身以信道非知孔子者蓋道外無身身外無道身詘矣而可以信道吾未之信也或問首章之說曰觀夫子所以告微生畝與夫辨長沮桀溺之語則聖人之自言未嘗不正其理而明辨之也至於告陽貨則隨其所問應答如響而略無自明之意則亦見陽貨之暴有不足告而姑孫辭以答之然味其㫖則亦無非義理之正與其中心之實然者則是初亦未嘗詘也胡張之說善矣胡氏曰揚氏謂孔子於陽貨為詘身以信道雄之意蓋以身與道為二物也是以其自為也黽勉賢莽之間而擬論語周易以自附於夫子豈不謬哉張敬夫曰聖人之待惡人言雖孫而理未嘗枉若他人孫言則或至於害理直理則或至於犯害惟聖人則從容酬酢而自然中節也黃氏曰日月逝矣嵗不我與此陽貨之言集注所謂諷使速仕亦謂是也其語意蓋謂夫子已老可以有為之日月已過矣嵗運而往其去甚速豈復與我而為我少緩乎是亦諷使速仕也學者於此章固當因是以得聖人待惡人之道又當知聖人之言動從容中節如此者蓋道全德偹義精仁熟如化工生物皆自然而然有志於學者不可以不勉也按夫子之見陽貨蓋待小人之道也今以易論語孟子數條附此遁象曰天下有山遁君子以逺小人不惡而嚴𫝊曰天下有山山下趨而乃止天上進而相違是遁避之之象君子觀其象以避逺乎小人逺小人之道若以惡聲厲色適足以致其怨忿惟在乎矜莊威嚴使知敬畏則自然逺矣朱子曰天體無窮山髙有限遁之象也嚴者君子自守之常而小人自不能近睽初九見惡人無咎𫝊曰當睽之時雖同德者相與然小人乖異者衆若棄絶之不幾盡天下以仇君子乎如此則失含洪之義致凶咎之道也又豈能化不善而使之合乎故必見惡人則無咎也古之聖王所以化奸凶為善良革仇敵為臣民者由弗絶也朱子曰必見惡人然後可以辟咎若孔子之於陽貨也論語王孫賈問曰與其媚於奧寧媚於竈何謂也子曰不然獲罪於天無所禱也朱子曰王孫賈衛大夫媚親順也室西南隅為奧竈者五祀之一夏所祭也凡祭五祀皆先設主而祭於其所然後迎尸而祭於奧略如祭宗廟之儀如祀竈則設主於竈陘祭畢而更設饌於奧以迎尸也故時俗之語因以奧有常尊而非祭之主竈雖卑賤而當時用事喻自結於君不如阿附權臣也賈衛之權臣故以諷孔子孔子云云蓋天即理也其尊無對非奧竈之可比也逆理則獲罪於天矣豈媚於奧竈所能禱而免乎謝氏曰聖人之言遜而不迫使王孫賈而知此意不為無益使其不知亦非所以取禍子見南子子路不恱夫子矢之曰子所否者天厭之天厭之朱子曰南子衛靈公之夫人有淫行孔子至衛南子請見孔子辭謝不得已而見之蓋古者仕於其國有見其小君之禮而子路以夫子見此淫亂之人為辱故不恱矢誓也所誓辭也如云所不與崔慶者之類否謂不合於禮不由其道也厭棄絶也聖人道大德全無可不可其見惡人固謂在我有可見之禮則彼之不善我何與焉然此豈子路所能測哉故重言以誓之欲其姑信此而深思以得之也或問夫子之見南子何也曰按史記孔子至衛南子使人謂孔子曰四方之君子不辱欲與寡君為兄弟者必見寡小君寡小君願見孔子辭謝不得已而見之也曰仕於其國而見其小君禮與曰是於禮無所見榖梁子蓋以為大夫不見夫人而何休獨有郊迎執贄之說不知其何所考也然禮家又謂楊侯殺繆侯而竊其夫人故大饗廢夫人之禮而使人攝焉則是大夫雖或有見小君之禮疑亦久已不行於世而靈公南子特舉之耳曰南子既非正嫡且以淫亂聞於諸侯而是禮也又非當時之所當行者則夫子曷為而不辭也曰南子之行則醜矣然其願見蓋亦有善意焉且衛君既以為夫人而已將仕於其國則所謂禮從宜使從俗者其亦有所不得已焉者矣又况聖人道隆德盛雖磨而不磷雖涅而不緇亦何為拘拘翦翦於此而避一見之嫌乎曰子路之不悅也不告以可見之理而誓之何也曰曽氏言之得矣曽氏曰見南子過物之行子路不悅非常談所能曉故誓之如此孟子為卿於齊出弔於滕王使蓋大夫王歡為輔行王歡朝暮見反齊滕之路未嘗與之言行事也公孫丑曰齊卿之位不為小矣齊滕之路不為近矣反之而未嘗與言行事何也曰夫既或治之豫何言哉朱子曰王歡齊嬖臣也輔行副使也歡蓋攝卿以行故曰齊卿夫既或治之言有司已治之矣孟子之待小人不惡而嚴如此樂正子從於子敖之齊孟子謂樂正子曰子之從於子敖來徒餔啜也我不意子學古之道而以餔啜也子敖歡字言其不擇所從但求食耳此乃正其罪而切責之公行子有子之喪右師往弔入門有進而與右師言者有就右師之位而與右師言者孟子不與右師言右師不悅曰諸君子皆與歡言孟子獨不與歡言是簡歡也孟子聞之曰禮朝廷不歷位而相與言不踰階而相揖也我欲行禮子敖以我為簡不亦異乎公行子齊大夫右師王歡也朱子曰是時齊卿大夫以君命弔各有位次若周禮凡有爵者之喪禮則職喪涖其政令序其事故云朝廷也云云南軒曰王歡齊之嬖卿也有進而與言者有就位而與言者蓋以其嬖於君而謁之也孟子獨不與言者道固然也右師不悅而以為簡己者蓋孟子為時之所尊歡雖小人亦幸其少假辭色是以望望於此而以不我顧為簡也孟子獨舉朝廷之禮以為言何其正大而不迫與蓋君子之動無非禮也朝廷不歷位而相與言不踰階而相揖此禮也君子行禮故常履安地而有餘裕他人不由禮則自陷於險艱而已所謂逺小人不惡而嚴者豈有它哉亦曰禮而已矣禮之所在何有於我哉或者勸伊川先生以加禮貴近先生曰獨不勸以盡禮而勸以加禮乎禮盡處豈容有加此孟子之意也唐王毛仲置酒聞宋璟之名而欲致之明皇敕使璟往至則北望再拜謝恩而稱疾以退璟亦可謂正矣然毛仲君之厮役也往赴其集義何居乎若璟聞命而引義以陳則為盡善矣愚按遁暌之義既殊孔孟之行亦異然德未至於聖學未可與權則遁之逺小人孟子之待王歡其正法也昔有問和靖先生曰子見南子子路不悅何也先生曰聖人所為賢人自不能測又問不知先生見南子否曰不敢見曰何故不見曰待某磨不磷涅不緇雖佛肸召亦往况南子乎由是觀之孟子可謂善學孔子者矣後世惟宋廣平之於楊思勉伊川先生之於張茂則皆庶幾有孟子之風焉士大夫居官立朝不免與近習接者當以此為法不然則未有不陷焉者也又易夬九三壯於頄有凶君子夬夬獨行遇雨若濡有愠無咎夫子以溫嶠之於王敦譬之此又别為一義雖非平時待小人之正法然處變而不失其正亦學者所當知其詳見於本義公山弗擾以費畔召子欲往朱子曰弗擾季氏宰與陽虎共執桓子據邑以叛子路不悅曰末之也已何必公山氏之之也末無也言道既不行無所往矣何必公山氏之往乎子曰夫召我者而豈徒哉如有用我者吾其為東周乎豈徒哉言必用我也為東周言興周道於東方程子曰聖人以天下無不可有為之人亦無不可改過之人故欲往然而終不往者知其必不能改故也或問云云曰蘇氏得之蘇氏曰孔子之不助畔人天下所知畔而召孔子其志必不在於惡矣故孔子因其有善心而收之不自絶而已弗擾之不能為東周亦眀矣然而用孔子則有可以為東周之道故子欲往者以其有是道也卒不往者知其必不能也張敬夫曰弗擾不禀命於君而叛其大夫逆也欲以是克亂是以亂易亂而又加甚爾後世亂臣賊子所以借虛名而為篡奪之計者多出於此夫子豈以是而欲往耶佛肸召子欲往朱子曰佛肸晉大夫趙氏之中牟宰也子路曰昔者由也聞諸夫子曰親於其身為不善者君子不入也佛肸以中牟叛子之往也如之何子路恐佛肸之凂夫子故問此以止夫子之行親猶自也不入不入其黨也子曰然有是言也不曰堅乎磨而不磷不曰白乎涅而不緇磷薄也涅染緇皂物言人之不善不能凂已楊氏曰磨不磷涅不緇而後無可無不可堅白不足而欲自試於磨涅其不磷緇也幾希吾豈匏瓜也哉焉能繫而不食匏瓠也匏瓜繫於一處而不能飲食人則不如是也張敬夫曰子路昔者之所聞君子守身之常法夫子今日之所言聖人體道之大權也然夫子於公山佛肸之召皆欲往者以天下無不可變之人無不可為之事也其卒不往者知其人之終不可變而事之終不可為耳一則生物之仁一則知人之智也或問云云曰張敬夫推眀楊氏之說其意亦善子路蓋不悅公山之召矣及此而後有言者則以中心所疑雖聞聖人之言而自反終未能安故問以辨之而不敢釋亦可謂善學矣然其不悅者蓋以已觀聖人而未知以聖人觀聖人耳黃氏曰匏瓜繫而不食蓋言匏瓜蠢然一物繫則不能動不食則無所知吾乃人類在天地間能動作有思慮自當見之於用而有益於人豈微物之比哉世之奔走以糊其口於四方者往往借是言以自况失聖人之㫖矣微子去之箕子為之奴比干諌而死朱子曰微箕二國名子爵也微子紂庶兄箕子比干紂諸父微子見紂無道去之以存宗祀箕子比干皆諌紂殺比干囚箕子以為奴箕子因佯狂而受辱孔子曰殷有三仁焉三人之行不同而同出於至誠惻怛之意故不拂乎愛之理而有以全其心之德也楊氏曰此三人者各得其本心故同謂之仁或問三子之心同出於至誠惻怛則可見矣抑何以知其所處之各適其可耶曰按史記殷周紀宋世家所記此事先後皆不同帷殷紀以為微子先去比干乃諌而死然後箕子佯狂為奴為紂所囚者近是蓋微子帝乙元子當以先王宗祀為重義當早去又决知紂之不可諌也故遂去之而不以為嫌比干少師義當力諌雖知其不可諌而不可已也故遂以諌死而不以為悔箕子見比干之死則知己之不可諌且不忍復死以纍其上也見微子之去則知己之不必去且不忍復去以背其君也故佯狂為奴而不以為辱此可以見三仁之所當為易地皆然矣或以為箕子以天畀九疇未傳而不敢死則其為說迂矣同謂之仁者以其皆無私而各當理也無私故得心之體而無違當理故得心之用而不失此其所以全心之德而謂之仁與曰然則史記三子之事與夫子言先後可同何也曰史所書者事之實此所記者以事之難易為先後耳南軒曰三人者皆當其時當其位處之而盡其道者也其立紂之朝所以維持宗社之心至矣而有不得已焉則各自靖以獻於先王詳味微子一篇則可見三子之所為深切至到者矣孔子皆稱為仁以其至誠惻怛克盡其道也柳下惠為士師三黜人曰子未可以去乎曰直道而事人焉往而不三黜枉道而事人何必去父母之邦朱子曰士師獄官黜退也柳下惠三黜不去而其辭氣雍容如此可謂和矣然其不能枉道之意則有確乎其不可拔者是則所謂必以其道而不自失焉者也胡氏曰此必有孔子斷之之言而亡之矣或問柳下惠仕而屢黜黜而復仕至於三黜而又不去焉何也曰進不隱賢必以其道不以三公易其介所以屢黜而至於三也降志辱身援而止之而止雖袒裼裸裎於我側不以為凂所以黜而復仕既三黜而遂不去也或曰惠知直道之必黜而不去然則其將枉道以事人乎曰不然也惠之意若曰我但能直道事人則固不必去魯而適他國矣若能枉道以事人則亦不必去魯而適他國也其言若泛然無所指蓋和者之氣象如此而其道則固自信其不能枉道而事人矣是以三黜之後雖不屑去然亦意其遂不復仕故孔子得以列之於逸民之目黃氏曰列二章於篇首以見古人出處不同亦各有義然後著孔子之事以見聖人之出處也齊景公待孔子曰若季氏則吾不能以季孟之間待之曰吾老矣不能用也孔子行朱子曰魯三卿季氏最貴孟氏為下卿孔子去之事見世家然此言必非面語孔子蓋自以告其臣而孔子聞之耳程子曰季氏强臣君待之之禮極隆然非所以待孔子也以季孟之間待之則禮亦至矣然復曰吾老矣不能用也故孔子去之蓋不繫待之輕重特以不用而去爾齊人歸女樂季桓子受之三日不朝孔子行朱子曰季桓子魯大夫名斯按史記定公十四年孔子為魯司冦攝行相事齊人懼歸女樂以沮之尹氏曰受女樂而怠於政事如此其簡賢棄禮不足與有為可知矣夫子所以行也所謂見幾而作不俟終日者與范氏曰此篇記仁賢之出處而折𠂻以聖人之行所以眀中庸之道也或問史記載孔子之去魯也有彼婦之口可以出走之歌今尹氏直以為知魯之君相無敬賢之心而去何耶曰齊人之謀固欲以是沮孔子矣蓋欲以女子為間於魯之君相使之先有以熒惑其耳目感移其心志遂乘間而進說以沮敗其所為甚則或遂中以不測之禍而不虞孔子之覺之早去之速也然孔子之覺之也直以其無敬賢之心知其不足與有為耳而其禍之將至者則固亦不外乎此也尹氏之言不及其他其有得於孔子之初心與南軒曰去讒逺色賤貨而貴德所以勸尊賢也今好色而忘敬賢之心則道之不行可知矣是以去之楚狂接輿歌而過孔子曰鳳兮鳳兮何德之衰往者不可諌來者猶可追已而已而今之從政者殆而朱子曰接輿楚人佯狂辟世夫子時將適楚故接輿歌而過其車前也鳳有道則見無道則隱接輿以比孔子而譏其不能隱為德衰也來者可追言及今尚可隱去已止也而語助辭殆危也接輿蓋知尊孔子而趨不同者也孔子下欲與之言趨而辟之不得與之言孔子下車蓋欲告之以出處之意接輿自以為是故不欲聞而辟之也長沮桀溺耦而耕孔子過之使子路問津焉朱子曰二人隱者耦並耕也時孔子自楚反乎蔡津濟渡處長沮曰夫執輿者為誰子路曰為孔丘曰是魯孔丘與曰是也曰是知津矣問於桀溺桀溺曰子為誰曰為仲由曰是魯孔丘之徒與對曰然曰㴞㴞者天下皆是也而誰以易之且而與其從辟人之士也豈若從辟世之士哉耰而不輟朱子曰㴞㴞流而不反之意以猶與也言天下皆亂將誰與變易之而汝也辟人謂孔子辟世桀溺自謂耰覆種也亦不告以津處子路行以告夫子憮然曰鳥獸不可與同羣吾非斯人之徒與而誰與天下有道丘不與易也憮然猶悵然惜其不喻已意也言所當與同羣者斯人而已豈可絶人逃世以為潔哉天下若已平治則我無用變易之正為天下無道故欲以道易之耳程子曰聖人不敢有忘天下之心故其言如此也張子曰聖人之仁不以無道必天下而棄之也子路從而後遇丈人以杖荷蓧子路問曰子見夫子乎丈人曰四體不勤五榖不分孰為夫子植其杖而藝朱子曰丈人亦隱者蓧竹器分辨也五榖不分猶言不辨菽麥爾責其不事農業而從師逺逰也植立之也藝去草也子路拱而立知其隱者敬之也止子路宿殺雞為黍而食之見其二子焉眀日子路行以告子曰隱者也使子路反見之至則行矣孔子使子路反見之蓋欲告之以君臣之義而丈人意子路必將復來故先去之以滅其跡亦接輿之意也子路曰不仕無義長幼之節不可廢也君臣之義如之何其廢之欲潔其身而亂大倫君子之仕也行其義也道之不行已知之矣子路述夫子之意如此蓋丈人之接子路甚倨而子路益恭丈人因見其二子焉則於長幼之節固知其不可廢矣故因其所眀以曉之倫序也人之大倫有五父子有親君臣有義夫婦有别長幼有序朋友有信是也仕所以行君臣之義故雖知道之不行而不可廢然謂之義則事之可否身之去就亦自有不可茍者是以雖不潔身以亂倫亦非忘義以狥祿也福州有國初時寫本路下有反子二字以此為子路反而夫子言之也未知是否范氏曰隱者為髙故往而不反仕者為通故溺而不止不與鳥獸同羣則决性命之情以叨富貴此二者皆惑也是以依乎中庸者為難惟聖人不廢君臣之義而必以其正所以或出或處而終不離於道也或問知道之不行而徒仕可乎曰仕所以行義則有可不可矣義合而從則道固不患於不行不合而去則道雖不行而義亦未嘗廢也是以君子雖知道之不行而未嘗不仕然亦未嘗懷私狥祿而茍一時之安也由此觀之道義之未嘗相離也亦可見矣黃氏曰列接輿以下三章於孔子行之後以明夫子雖不合而去然亦未嘗恝然忘斯世也此所以為聖人之出處也與然即三章而讀之見夫接輿沮溺荷蓧丈人此四子者若律以聖人之中道則誠不為無病然味其言觀其容止以想見其為人其清風髙節猶令人起敬起慕恨不見其面而端拜之彼於聖人猶有所不滿於心如此則其視世之貪利慕祿而不知止者真不啻若犬彘求欲為之奴𨽻而不可得也是亦豈非當世之賢而特立者與以子路之行行而拱立於丈人之側若子弟然豈非其真可敬也歟故嘗謂若四人者惟夫子然後可以議其不合於聖人之道未至於夫子者皆未可以妄議也貪利慕祿之徒求以自便其私亦借四子而詆之欲以見其不可以不仕多見其不知量也逸民伯夷叔齊虞仲夷逸朱張栁下惠少連朱子曰逸遺也逸民者無位之稱虞仲即仲雍與太伯同竄荆蠻者夷逸朱張不見經𫝊少連東夷人子曰不降其志不辱其身伯夷叔齊與謂栁下惠少連降志辱身矣言中倫行中慮其斯而已矣栁下惠事見上倫義理之次第也慮思慮也中慮言有意義合人心少連事不可考然記稱其善居喪三日不怠三月不懈期悲哀三年憂則行之中慮亦可見矣謂虞仲夷逸隱居放言身中清廢中權仲雍居吳斷髮文身裸以為飾隱居獨善合乎道之清放言自廢合乎道之權我則異於是無可無不可孟子曰孔子可以仕則仕可以止則止可以久則久可以速則速所謂無可無不可也謝氏曰七人隱遁不汙則同其立心造行則異伯夷叔齊天子不得臣諸侯不得友蓋已遁世離羣矣下聖人一等此其最髙與栁下惠少連雖降志而不枉已雖辱身而不求合其心有不屑也故言能中倫行能中慮虞仲夷逸隱居放言則言不合先王之法者多矣然清而不汙也權而適宜也與方外之士害義傷教而亂大倫者殊科是以均謂之逸民尹氏曰七人各守其一節孔子則無可無不可此所以常適其可而異於逸民之徒也揚雄曰觀乎聖人則見賢人是以孟子語夷惠亦必以孔子斷之南軒曰無可者不以可為主也無不可者不以不可為主也其曰無者言其不有於中也然則夫子之心果何如哉當可則可當不可則不可故仕止久速無不得其可其惟天乎其惟聖人乎若夷齊之心則未免有不可若栁下惠少連則未免有可故孟子願學孔子而已記內則四十始仕方物出謀發慮道合則服從不可則去愚按內則一書古者學校教人之法也自其始學之初即知此義是以出而從仕也道合則從不合則去無貪位慕祿之私焉其視後世學校之教専以利祿誘人者異矣少儀事君者量而后入不入而后量凡乞假於人為人從事者亦然然故上無怨而下逺罪也子曰事君難進而易退則位有序易進而難退則亂也鄭氏曰亂謂賢否不别故君子三揖而進一辭而退以逺亂也子曰事君三違而不出境則利祿也人雖曰不要君不信也孟子謂蚳蛙曰子之辭靈丘而請士師似也為其可以言也今既數月矣未可以言與朱子曰可以言謂士師近王可以諌刑罰之不中者蚳蛙諌於王而不用致為臣而去齊人曰所以為蚳蛙則善矣所以自為則吾不知也公都子以告曰吾聞之也有官守者不得其職則去有言責者不得其言則去我無官守我無言責也則吾進退豈不綽綽然有餘裕哉朱子曰官守以官為守者言責以言為責者綽綽寬貌裕寬意也孟子居賓師之位未嘗受祿故其進退之際寬裕如此尹氏曰進退久速當於理而已南軒曰所居之時雖同而所處之地有異則其進退語默各有攸當不可得而齊也蚳蛙之在靈丘其職未可以言也而請士師庶幾乎欲有補於君也士師掌國之刑罰而立於朝王有失德朝有闕政士師所當言也故孟子以數月為淹久而欲其言蚳蛙於是諌於王言不用而去之庶幾得為臣之義矣齊人以為孟子所以為蚳蛙者固善而孟子久於齊曷不諌乎若諌而不聼曷不遂去之乎蓋齊人未知義之所在也夫有官守者其守在官不得其職則當去有言責者其責在言不得其言可不去乎若孟子則異於此矣居賓師之位無官守言責之拘故得以從容不迫陳善閉邪以俟其改故曰則吾進退豈不綽綽然有餘裕哉言可以徐處乎進退之宜也然卒致為臣而歸何也蓋其誠意備至啓告曲盡而王終莫之悟也則有不得已焉者而三宿出晝猶庶幾王之改之亦可謂從容矣蓋進退久速無非義之所存也孟子去齊宿於晝有欲為王留行者坐而言不應隱几而卧客不恱曰弟子齊宿而後敢言夫子卧而不聽請勿復敢見矣曰坐我眀語子昔者魯繆公無人乎子思之側則不能安子思泄栁申詳無人乎繆公之側則不能安其身子為長者慮而不及子思子絶長者乎長者絶子乎朱子曰繆公尊禮子思常使人候伺道達誠意於其側乃能安而留之也泄栁申詳繆公尊之不如子思然二子義不茍合非有賢者在其君之左右維持調護之則亦不能安其身矣長者孟子自稱也言齊王不使子來而子自欲為王留我是所以為我謀者不及繆公留子思之事而先絶我也云云南軒曰孟子與子思之所以自處者其道一也孟子去齊尹士語人曰不識王之不可以為湯武則是不眀也識其不可然且至則是干澤也千里而見王不遇故去三宿而後出晝是何濡滯也士則兹不恱髙子以告曰夫尹士惡知豫哉千里而見王是豫所欲也不遇故去豈豫所欲哉豫不得已也豫三宿而出晝於豫心猶以為速王庶幾改之王如改諸則必反豫夫出晝而王不豫追也豫然後浩然有歸志豫雖然豈舍王哉王猶足用為善王如用豫則豈徒齊民安天下之民舉安王庶幾改之豫日望之朱子曰浩然如水之流而不可止也楊氏曰齊王天資朴實如好貨好色皆以直告而不隱故足以為善豫豈若是小丈夫然哉諌於其君而不受則怒悻悻然見於其面去則窮日之力而後宿哉尹士聞之曰士誠小人也此章見聖賢行道濟時汲汲之本心愛君澤民惓惓之餘意李氏曰於此見君子憂則違之之情而荷蕢者所以為果也南軒曰詳味孟子答髙子之辭何其溫厚而不迫也云云歷考宣王之為人猶為不敢飾詐者故其未能領孟子之意也則曰吾惛不能進於是問以好樂則變乎色曰寡人非能好先王之樂好貨好色好勇自以為疾言之而不諱故孟子有望焉以為王如用豫則豈徒齊民安將天下之民舉安蓋其安天下之道已素定於胸中設施次第固有條理而其本則在於格君心故拳拳有望於王之改之也王一改悟而孟子之道可行齊民可安齊民安則天下之民將舉安矣其序固爾也又曰豫日望之孟子非不知道之行否有命而拳拳不已者吉凶與民同患之心乎孟子去齊充虞路問曰夫子若有不豫色然前日虞聞諸夫子曰君子不怨天不尤人曰此一時彼一時也五百年必有王者興其間必有名世者由周而來七百有餘嵗矣以其數則過矣以其時考之則可矣朱子曰數謂五百年之期時謂亂極思治可以有為之日於是而不得一有所為此孟子之所以不能無不豫也夫天未欲平治天下也如欲平治天下當今之世舍我其誰也吾何為不豫哉言當此之時而使我不遇於齊是天未欲平治天下也然天意未可知而其具又在我我何為不豫哉然則孟子雖若有不豫然者而實未嘗不豫也蓋聖賢憂世之志樂天之誠有並行而不悖者於此見矣南軒曰孔子所謂天之未喪斯文也匡人其如豫何與孟子如天未欲平治之語反復玩味之則亦可見聖賢之分矣孟子去齊居休公孫丑問曰仕而不受祿古之道乎曰非也於崇吾得見王退而有去志不欲變故不受也繼而有師命不可以請久於齊非我志也孔氏曰仕而受祿禮之所在禮有時而變公孫丑欲以一端裁之不亦誤乎南軒曰孟子雖庶幾宣王之可與有為吾道之可以行而其可去之幾未嘗不先覺兹聖賢之所以為志也又曰一見而有去志則察王之神必有不能受者然其庶幾足用為善則又以其質朴有可取也陳代曰不見諸侯宜若小然今一見之大則以王小則以霸且志曰枉尺而直尋宜若可為也孟子曰昔齊景公田招虞人以旌不至將殺之志士不忘在溝壑勇士不忘喪其元孔子奚取焉取非其招不往也如不待其招而往何哉朱子曰夫虞人招之不以其物尚守死不往况君子豈可以不待其招而自往見之耶且夫枉尺而直尋者以利言也如以利則枉尋直尺而利亦可為與此以下正其所稱枉尺直尋之非夫所謂枉小而所伸者大則為之者計其利耳一有計利之心則雖枉多伸少而有利亦為之耶甚言其不可也昔者趙簡子使王良與嬖奚乘終日而不獲一禽嬖奚反命曰天下之賤工也或以告王良良曰請復之彊而後可一朝而獲十禽嬖奚反命曰天下之良工也簡子曰我使掌與女乘謂王良良不可曰吾為之範我馳驅終日不獲一為之詭遇一朝而獲十詩云不失其馳舍矢如破我不貫與小人乘請辭御者且羞與射者比比而得禽獸雖若丘陵弗為也如枉道而從彼何也且子過矣枉已者未有能直人者也或曰居今之世出處去就不必一一中節欲其一一中節則道不得行矣楊氏曰何其不自重也枉已其能直人乎古之人寧道之不行而不輕其去就是以孔孟雖在戰國之時而進必以正以至終不得行而死也使不恤其去就而可以行道孔孟當先為之矣孔孟豈不欲道之行哉南軒曰孟子非不欲道之行而不見諸侯者正以不如是則為枉其道而無以行故也陳代不知此比之枉尺而直尋意謂枉已之事小而王霸之業則大故也此蓋自春秋以來一時風俗習於霸者計較功利之說而有是言也又曰招虞人當以皮冠而景公招之以旌虞人守其官義不敢往義有重於死故也義之所在事無巨細茍愛一身之死而隳天命之正則凡可避死者無不為而弒父與君之所由生也充虞人之心行一不義殺一不辜而得天下不為之心也人紀之所由以立也是以夫子取之又曰比而得禽獸雖若丘陵弗為學者要當立此志而後可以之守身也景春曰公孫衍張儀豈不誠大丈夫哉一怒而諸侯懼安居而天下熄孟子曰是焉得為大丈夫乎子未學禮乎丈夫之冠也父命之女子之嫁也母命之往送之門戒之曰往之女家必敬必戒無違夫子以順為正者妾婦之道也居天下之廣居立天下之正位行天下之大道得志與民由之不得志獨行其道富貴不能淫貧賤不能移威武不能屈此之謂大丈夫朱子曰廣居仁也正位禮也大道義也與民由之推其所得於人也獨行其道守其所得於已也淫蕩其心也移變其節也屈挫其志也何叔京曰戰國之時君子道否天下不復見其德業之盛但見奸巧之徒得志橫行氣焰可畏遂以為大丈夫不知由君子觀之是乃妾婦之道爾何足道哉南軒曰廓然大同物我無蔽所謂居廣居也視聽言動必以其理所謂立正位也簡易平直行無所事所謂行大道也得志與民由之與之共由乎此也不得志獨行其道雖不得志此道未嘗不行於已也周霄問曰古之君子仕乎孟子曰仕𫝊曰孔子三月無君則皇皇如也出疆必載質公明儀曰古之人三月無君則弔三月無君則弔不以急乎曰仕之失位也猶諸侯之失國家也禮曰諸侯耕助以供粢盛夫人蠶繅以為衣服犧牲不成粢盛不潔衣服不備不敢以祭惟士無田則亦不祭牲殺器皿衣服不備不敢以祭則不敢以宴亦不足弔乎出疆必載質何也曰士之仕也猶農夫之耕也農夫豈為出疆舍其耒耜哉曰晉國亦仕國也未嘗聞仕如此其急仕如此其急也君子之難仕何也曰丈夫生而願為之有室女子生而願為之有家父母之心人皆有之不待父母之命媒妁之言鑽穴隙相窺踰墻相從則父母國人皆賤之古之人未嘗不欲仕也又惡不由其道不由其道而往者與鑽穴隙之類也朱子曰言為父母者非不願其男女之有室家而亦惡其不由道蓋君子雖不潔身以亂倫而亦不狥利而忘義也南軒曰士之欲士亦其常理也然而必也守道以待時可進而後進爾若謂仕為急而不由其道以求之則與兒女子之鑽穴窺者何異公孫丑曰不見諸侯何義孟子曰古者不為臣不見朱子曰不為臣謂未仕於其國者此不見諸侯之義也段干木踰垣而辟之泄栁閉門而不內是皆已甚迫斯可以見矣陽貨欲見孔子而惡無禮大夫有賜於士不得受於其家則往拜其門陽貨瞰孔子之亡也而饋孔子蒸豚孔子亦瞰其亡也而往拜之當是時陽貨先豈得不見曽子曰脅肩諂笑病於夏畦子路曰未同而言觀其色赧赧然非由之所知也由是觀之則君子之所養可知已矣脅肩竦體諂笑强笑皆小人側媚之態夏畦夏月治畦之人也言為此者其勞過於夏畦之人也未同而言與人未合而强與之言也赧赧慙而面赤之貌言非已所知甚惡之之辭也孟子言由此二言觀之則二子所養可知必不肯不俟其禮之至而輒往見之也此章言聖人禮義之中正過之者傷於迫切而不洪不及者淪於汙賤而可恥孟子曰無罪而殺士則大夫可以去無罪而戮民則士可以徙朱子曰言君子當見幾而作禍已迫則不能去矣萬章問曰人有言伊尹以割烹要湯有諸孟子曰否不然伊尹耕於有莘之野而樂堯舜之道焉非其義也非其道也祿之以天下弗顧也繫馬千駟弗視也非其義也非其道也一介不以與人一介不以取諸人湯使人以幣聘之囂囂然曰我何以湯之幣聘為哉我豈若處畎畝之中由是以樂堯舜之道哉湯三使往聘之既而幡然改曰與我處畎畝之中由是以樂堯舜之道吾豈若使是君為堯舜之君哉吾豈若使是民為堯舜之民哉吾豈若於吾身親見之哉天之生此民也使先知覺後知使先覺覺後覺也豫天民之先覺者也豫將以斯道覺斯民也思天下之民匹夫匹婦有不被堯舜之澤者若已推而納之溝中其自任以天下之重如此故就湯而說之以伐夏救民吾未聞枉已而正人者也况辱已以正天下者乎聖人之行不同也或逺或近或去或不去歸潔其身而已矣朱子曰辱已甚於枉已正天下難於正人若伊尹以割烹要湯辱已甚矣何以正天下乎吾聞其以堯舜之道要湯未聞以割烹也林氏曰以堯舜之道要湯者非實以是要之也道在此而湯之聘自來耳猶子貢言夫子之求之異乎人之求之也問集注中說曽㸃有樂此終身之語如何曰觀舜居深山之中伊尹耕於有莘之野豈不是樂以終身後來事業亦偶然爾若先有一毫安排等待之心便成病痛矣萬章問曰或謂孔子於衛主癰疽於齊主寺人瘠環有諸乎孟子曰否不然也好事者為之也於衛主顔讐由彌子之妻與子路之妻兄弟也彌子謂子路曰孔子主我衛卿可得也子路以告孔子曰有命孔子進以禮退以義得之不得曰有命而主癰疽與寺人瘠環是無義無命也顔讐由衛之賢大夫也史記作顔濁鄒彌子衛靈公幸臣彌子瑕也徐氏曰禮主於辭遜故進以禮義主於斷制故退以義難進而易退者也在我者有禮義而已得之不得則有命存焉孔子不悅於魯衛遭宋桓司馬將要而殺之微服而過宋是時孔子當厄主司城貞子為陳侯周臣吾聞觀近臣以其所為主觀逺臣以其所主若孔子主癰疽與侍人瘠環何以為孔子君子小人各從其類故觀其所為主與其所主者而其人可知南軒曰孔子進以禮退以義非聖人擇禮義而為進退聖人進退無非禮義禮義之所在固命之所存也萬章問曰或曰百里奚自鬻於秦養牲者五羊之皮食牛以要秦穆公信乎孟子曰否不然好事者為之也百里奚虞人也晉人以垂棘之璧與屈産之乘假道於虞以伐虢宫之竒諌百里奚不諌知虞公之不可諌而去之秦年已七十矣曽不知以食牛干秦穆公之為汗也可謂智乎不可諌而不諌可謂不智乎知虞公之將亡而先去之不可謂不智也時舉於秦知穆公之可與有行也而相之可謂不智乎相秦而顯其君於天下可𫝊於後世不賢而能之乎自鬻以成其君鄉黨自好者不為而謂賢者為之乎范氏曰古之聖賢未遇之時鄙賤之事不恥為之如百里奚為人養牲無足怪也惟是人君不致敬盡禮則不可得而見豈有先自汗辱以要其君哉莊周曰百里奚爵祿不入於心故飯牛而牛肥穆公忘其賤而與之政亦可謂知百里奚矣伊尹百里奚之事皆聖賢出處之大節故孟子不得不辨尹氏曰當時好事者之論大率類此蓋以其不正之心度聖賢也朱子曰此事當孟子時已無所據孟子直以事理反復推之而知其必不然耳孟子曰伯夷目不視惡色耳不聽惡聲非其君不事非其民不使治則進亂則退橫政之所出橫民之所止不忍居也思與鄉人處如以朝衣朝冠坐於塗炭也當紂之時居北海之濵以待天下之清也故聞伯夷之風者頑夫亷懦夫有立志伊尹曰何事非君何使非民治亦進亂亦進曰天之生斯民也使先知覺後知使先覺覺後覺豫天民之先覺者也豫將以此道覺此民也思天下之民匹夫匹婦有不與被堯舜之澤者若已推而納之溝中其自任以天下之重也栁下惠不羞汙君不辭小官進不隱賢必以其道遺佚而不怨厄窮而不憫與鄉人處由由然不忍去也爾為爾我為我雖袒裼裸裎於我側爾焉能凂我哉故聞栁下惠之風者鄙夫寬薄夫敦孔子之去齊接淅而行去魯曰遲遲吾行也去父母國之道也可以速而速可以久而久可以處而處可以仕而仕孔子也或曰孔子去魯不脫冕而行豈得為遲楊氏曰孔子欲去之意久矣不欲茍去故遲遲其行也膰肉不至則得以微罪行矣故不脫冕而行非速也孟子曰伯夷聖之清者也伊尹聖之任者也栁下惠聖之和者也孔子聖之時者也張子曰無所雜者清之極無所異者和之極勉而清非聖人之清勉而和非聖人之和所謂聖者不勉不思而至焉者也孔氏曰任者以天下為己責也愚謂孔子仕止久速各當其可蓋兼三子之所以聖者而時出之非如三子之可以一德名也或疑伊尹出處合乎孔子而不得為聖之時何也程子曰終是任底意思在集大成以下巳見聖知篇萬章曰敢問不見諸侯何義也孟子曰在國曰市井之臣在野曰草莽之臣皆謂庶人庶人不𫝊質為臣不敢見於諸侯禮也萬章曰庶人召之役則往役君欲見之召之則不往見之何也曰往役義也往見不義也朱子曰往役者庶人之職不往見者士之禮且君之欲見之也何為也哉曰為其多聞也為其賢也曰為其多聞也則天子不召師而况諸侯乎為其賢也則吾未聞欲見賢而召之也繆公亟見於子思曰古千乘之國以友士何如子思不悅曰古之人有言曰事之云乎豈曰友之云乎子思之不悅也豈不曰以位則子君也我臣也何敢與君友也以德則子事我者也奚可以與我友千乘之君求與之友而不可得也而况可召與齊景公田招虞人以旌不至將殺之志士不忘在溝壑勇士不忘喪其元孔子奚取焉取非其招不往也曰敢問招虞人何以曰以皮冠庶人以旃士以旗大夫以旌以大夫之招招虞人虞人死不敢往以士之招招庶人庶人豈敢往哉况乎以不賢人之招招賢人乎欲見賢人而不以其道猶欲其入而閉之門也夫義路也禮門也惟君子能由是路出入是門也詩云周道如砥其直如矢君子所履小人所視萬章曰孔子君命召不俟駕而行然則孔子非與曰孔子當仕有官職而以其官召之也孔子方仕而任職君以其官名召之故不俟駕而行徐氏曰孔子孟子易地則皆然此章言不見諸侯之義最為詳悉更合陳代公孫丑所問者而觀之其說乃盡南軒曰禮義人性之所有譬之路與門有足者皆可以由可以出入也而君子獨能之者衆人迷於物欲君子存其良心故也淳于髠曰先名實者為人也後名實者自為也夫子在三卿之中名實未加於上下而去之仁者固如是乎朱子曰名聲譽也實事功也言以名實為先而為之者是有志於救民也以名實為後而不為者是欲獨善其身者也名實未加於上下言上未能正其君下未能濟其民也孟子曰居下位不以賢事不肖者伯夷也五就湯五就桀者伊尹也不惡汙君不辭小官者栁下惠也三子者不同道其趨一也一者何也曰仁也君子亦仁而已矣何必同仁者無私心而合天理之謂楊氏曰伊尹之就湯以三聘之勤其就桀也湯進之也湯豈有伐桀之意哉其進伊尹以事之也欲其悔過遷善而已伊尹既就湯則以湯之心為心矣及其終也人歸之天命之不得已而伐之耳若湯初求伊尹即有伐桀之心而伊尹遂相之以伐桀是以取天下為心也以取天下為心豈聖人之心哉曰魯繆公之時公儀子為政子栁子思為臣魯之削也滋甚若是乎賢者之無益於國也髠譏孟子雖不去亦未必能有為也曰虞不用百里奚而亡秦穆公用之而霸不用賢則亡削何可得與曰昔者王豹處於淇而河西善謳綿駒處於高唐而齊右善歌華周杞梁之妻善哭其夫而變國俗有諸內必形諸外為其事而無其功者髠未嘗覩之也是故無賢者也有則髠必識之曰孔子為魯司冦不用從而祭燔肉不至不稅冕而行不知者以為為肉也其知者以為為無禮也乃孔子則欲以微罪行不欲為茍去君子之所為衆人固不識也按史記孔子為魯司冦攝行相事齊人聞而懼於是以女樂遺魯君季桓子與魯君往觀之怠於政事子路曰夫子可以行矣孔子曰魯今且郊如致膰於大夫則吾猶可以止桓子卒受齊女樂郊又不致膰爼於大夫孔子遂行孟子言以為為肉者固不足道以為為無禮則亦未為深知孔子者蓋聖人於父母之國不欲顯其君相之失又不欲無故而茍去故不以女樂去而以燔肉行其見幾明决而用意忠厚固非衆人所能識也然則孟子所為豈髠之所能識哉尹氏曰淳于髠未嘗知仁亦未嘗知賢者也宜其言如是陳子曰古之君子何如則仕孟子曰所就三所去三迎之致敬以有禮則就之禮貌未衰言弗行也則去之朱子曰所謂見行可之仕若孔子於季桓子是也受女樂而不朝則去之其次雖未行其言也迎之致敬以有禮則就之禮貌衰則去之所謂際可之仕若孔子於衛靈公是也故與公遊於囿公仰視蜚雁則去之其下朝不食夕不食飢餓不能出門户君聞之曰吾大者不能行其道又不能從其言也使飢餓於我土地吾耻之周之亦可受也免死而已矣所謂公養之仕也君之於民固有周之之義况此又有悔過之言所以可受然未至於飢餓不能出門户則猶不受也其曰免死而已則其所受亦有節矣南軒曰此三者足以盡君子去就之分舍此三者則皆為以利動而非義之所存矣孟子謂宋句踐曰子好遊乎吾語子遊朱子曰遊遊說也人知之亦囂囂人不知亦囂囂趙氏曰囂囂自得無欲之貌曰何如斯可以囂囂矣曰尊德樂義則可以囂囂矣德謂所得之善尊之則有以自重而不慕乎人爵之榮義謂所守之正樂之則有以自安而不徇乎外物之誘故士窮不失義達不離道言不以貧賤而移不以富貴而淫此尊德樂義見於行事之實也窮不失義故士得已焉逹不離道故民不失望焉得已言不失已也民不失望言人素望其興道致治而今果如所望也古之人得志澤加於民不得志修身見於世窮則獨善其身達則兼善天下見謂名實之顯著也此又言士得巳民不失望之實此章言內重而外輕則無往而不善南軒曰宋句踐之好遊謂遊於世如歷聘之類意句踐之為人狥名而外求者孟子語之以遊使求之於吾身而已云云道言體義言用互相明耳云云其曰修身見於世者言修其德而其德名自不可掩非君子之修身欲以自見於世程子曰漢儒之中吾必以揚子為賢然於出處之際不能無過也其言曰明哲煌煌旁燭無疆遜於不虞以保天命遜於不虞則有之旁燭無疆則未也光武之興使雄不死能免誅乎古之所謂言遜者迫不得已如劇秦美新之類非得已者乎又二章大意相同張子曰顔淵從師進德於孔子之門孟子命世修業於戰國之際此所以潜見之不同朱子曰人當有以自樂則用舍行藏隨所適安之和靖先生曰如霽則行如潦則止此言有味也朱子曰君子行身自有法義固不求於茍異亦不期於必同至於行道濟時用舍行藏又非人力所能必致者聖賢之教厯厯可考如賢者所論是乃謀利計功之意非所願聞也聖賢教人不過講學修身以全其所受於天者出為世用則隨其大小推吾之所有以及人至於用與不用合與不合則直任之蓋未嘗以是必於人亦未嘗以是變於巳以此自信誓將終身由之而不自知其力之果足以有至焉否也今觀來教其觀於當世之變詳矣然鰓鰓然常憂其不合而必於求合之意其責君子也已詳其狥小人也已甚是雖憂世之心甚深而古之聖賢非不憂世者其規模氣象似或不如此也孟子曰人病舍其田而藝人之田所求於人者重而所以自任者輕其論狂狷鄉願之得失以及君子反經之意尤所謂深切而著明者孔子亦曰古之學者為已今之學者為人有志之士深省乎此亦足以判然無疑於舜跖之間矣西山讀書記卷三十四上欽定四庫全書薈要西山讀書記卷三十四下宋真德秀撰辭受書大禹謨禹拜稽首固辭論語子華使於齊冉子為其母請粟子曰與之釜請益曰與之庾冉子與之粟五秉子曰赤之適齊也乘肥馬衣輕裘吾聞之也君子周急不繼富原思為之宰與之粟九百辭子曰毋以與爾鄰里鄉黨乎朱子曰毋禁止辭言常祿不當辭有餘自可推之以周貧乏蓋鄰里鄉黨有相周之義程子曰夫子之使子華子華之為夫子使義也而冉子乃為之請聖人寬容不欲直拒人故與之少所以示不當與也請益而與之亦少所以示不當益也求未逹而自與之多則已過矣故夫子非之蓋赤茍至乏則夫子必自周之不待請矣原思為宰則有常祿思辭其多故又教以分諸鄰里之貧者蓋亦莫非義也張子曰於斯二者可見聖人之用財矣南軒曰聖人於子華謂周急不繼富於原思謂毋以與爾鄰里鄉黨蓋取豫辭受莫不有其則焉天之理也聖人從容而不過賢者審處而不違若以私意加焉則失其權度或與其所不當與雖賢於吝然未免為傷惠或辭其所不當辭雖賢於貪亦未免為有害於廉矣黃氏曰冉子之與粟不害其為惠原思之辭粟不害其為亷自常人觀之皆善行也聖人處事如化工生物洪纎髙下各適其宜又豈但可見其用財而已哉孟子陳臻問曰前日於齊王餽兼金一百而不受於宋餽七十鎰而受於薛餽五十鎰而受前日之不受是則今日之受非也今日之受是則前日之不受非也夫子必居一於此矣孟子曰皆是也當在宋也豫將有逺行行者必以贐辭曰餽贐豫何為不受當在薛也豫有戒心辭曰聞戒故為兵餽之豫何為不受若於齊則未有處也無處而餽之是貨之也焉有君子而可以貨取乎尹氏曰言君子之辭受取豫惟當於理而已南軒曰凡人所以遲回於辭受之際者以為外物所動故也蓋於其所不當受而受其動於物固也若於所當受而不受是亦為物所動而已矣何則以其蔽於理而見物之大也若夫聖賢從容不迫惟義之安而外物何有乎故以舜受堯之天下而不為泰亦曰義當然爾若於義也無居則雖簞食豆羮不可取也簞食豆羮之與天下其大小固有間矣物則有大小而義之所在則一也孟子致為臣而歸王就見孟子曰前日願見而不可得得侍同朝甚喜今又棄寡人而歸不識可以繼此而得見乎對曰不敢請耳固所願也他日王謂時子曰我欲中國而授孟子室養弟子以萬鍾使諸大夫國人皆有所矜式子盍為我言之時子因陳子而以告孟子陳子以時子之言告孟子孟子曰然夫時子惡知其不可也如使豫欲富辭十萬而受萬是為欲富乎季孫曰異哉子叔疑使己為政不用則亦已矣又使其子弟為卿人亦孰不欲富貴而獨於富貴之中有私龍斷焉古之為市者以其所有易其所無者有司者治之耳有賤丈夫焉必求龍斷而登之以左右望而罔市利人皆以為賤故從而征之征商自此賤丈夫始矣程子曰齊王所以處孟子者未為不可孟子亦非不肯為國人矜式者但齊王實非欲尊孟子乃欲以利誘之故孟子拒而不受南軒曰孟子之意以為不用己則已矣而又欲養弟子以卿之祿則是王之處已也以利而非為道之故吾之受之亦利之而已茍以利則何異於龍斷之夫乎人孰不欲富貴此言人情之常也謂賢者獨不欲則豈人情哉聖賢固欲道之行也而動必以義義所不安則處貧賤而終身可也其可以利誘乎嗟乎義利之幾君子之所深謹而去就之所由分也後世為人臣者不明斯義故為之君者謂利祿之果可以得士而士之所以求於我者亦不過乎此於是而有輕下自驕之心正猶征商之法因龍斷之夫而立耳夫惟君子守義而不茍就所以明為人臣之義也彭更問曰後車數十乘從者數百人以傳食於諸侯不以泰乎孟子曰非其道則一簞食不可受於人如其道則舜受堯之天下不以為泰子以為泰乎曰否士無事而食不可也曰子不通功易事以羡補不足則農有餘粟女有餘布子如通之則梓匠輪輿皆得食於子於此有人焉入則孝出則悌守先王之道以待後之學者而不得食於子子何尊梓匠輪輿而輕為仁義者哉曰梓匠輪輿其志將以求食也君子之為道也其志亦將以求食與曰子何以其志為哉其有功於子可食而食之矣且子食志乎食功乎曰食志曰有人於此毁瓦畫墁其志將以求食也則子食之乎曰否曰然則子非食志也食功也南軒曰孟子當戰國之時以身任道其歷聘諸國後車數十乘從者數百人夫豈尊已而自大乎哉亦時義所當然有不得而避也彭更之徒疑傳食以為泰是以世俗利害貴賤之見觀聖賢也孟子之所以告之者蓋常道耳夫非其道則一簞食不可受於人如其道則舜受堯之天下而不以為泰所謂其道者天理之所安也故伯夷叔齊不食周粟之心即舜禹受天下之心也而孟子後車數十乘從者數百人以傳食於諸侯之心即顔子一簞食一瓢飲在陋巷之心也皆以其道故也以為士無事而食不可觀更之意亦許行之類與孟子又從而曉之以為使子而不通功易事則農之餘粟女之餘布無所用之而人之饑寒者亦多矣此固不可也子而通功易事則梓匠輪輿固得以其技而食於子矣今有賢者而反不得食於子是子以梓匠輪輿為有用而尊之以仁義者為無用而輕之也匡章曰陳仲子豈不誠亷士哉居於陵三日不食耳無聞目無見也井上有李螬食實者過半矣匍匐往將食之三咽然後耳有聞目有見匡章陳仲子皆齊人廉有分辨不茍取也孟子曰於齊國之士吾必以仲子為巨擘焉雖然仲子惡能廉充仲子之操則蚓而後可者也巨擘大指也言齊人中有仲子如衆小指中有大指也充推而滿之也操所守也蚓丘蚓也言仲子未得為亷也必若滿其所守之志則惟丘蚓之無求於世然後可以為廉耳夫蚓上食槁壤下飲黃泉仲子所居之室伯夷之所築與抑亦盜跖之所築與所食之粟伯夷之所樹與抑亦盜跖之所樹與是未可知也槁壤乾土也黃泉濁水也抑發語辭也言蚓無求於人而自足而仲子未免居室食粟若所從來或有非義則是未能如蚓之亷也曰是何傷哉彼身織屨妻辟纑以易之也辟績也纑練麻也曰仲子齊之世家也兄戴蓋祿萬鍾以兄之祿為不義之祿而不食也以兄之室為不義之室而不居也辟兄離母處於於陵他日歸則有饋其兄生鵝者已頻顣曰惡用是鶂鶂者為哉他日其母殺是鵝也與之食之其兄自外至曰是鶂鶂之肉也出而哇之世家世卿之家兄名戴食采於蓋其入萬鍾也歸自於陵歸也已仲子也鶂鶂鵝聲也頻顣而言以其兄受饋為不義也哇吐之也以母則不食以妻則食之以兄之室則弗居以於陵則居之是尚為能充其類也乎若仲子者蚓而後充其操者也言仲子以母之食兄之室為不義而不食不居其操守如此至於妻所易之粟於陵所居之室既未必伯夷之所為則亦不義之類耳今仲子於此則不食不居於彼則食之居之豈為能充滿其操守之類者乎必其無求自足如丘蚓然乃為能滿其志而得為亷耳然豈人之所可為哉范氏曰天之所生地之所養惟人為大人之所以為大者以其有人倫也仲子辟兄離母無親戚君臣上下是無人倫也豈有無人倫而可以為亷哉南軒曰於陵仲子於其所當享有所不安引而避之而其窮至於無以食而食井上之螬李在當時或稱其亷雖其能不以一介取諸人也曽不知伊尹之不以一介與人不以一介取諸人以非其義非其道之故耳若於其所當居而不居則反害於道義矣仲子齊之世家兄戴蓋祿萬鍾仲子茍以為不當虗享其祿食則當與其兄共思社稷之計光輔其主治其國家保其民人則齊國有無窮之業而仲子之家亦有無窮之聞斯為稱焉耳今乃昧正大之見為狹陋之思以食粟受鵝為不義而不知避兄離母之為非徒欲潔身以為清而不知廢人倫之為惡小亷妨大德私意害公義原仲子本心亦豈不知母子之性重於其妻兄之居為愈於於陵乎惟其私意所萌亂夫倫類至此極也衆人惑於其迹以其清居髙介而取之而不知原其所萌若是其差殊也嗟乎世之貪冒茍得肆而為惡者多矣而孟子於仲子之徒獨闢之之深者蓋世之為惡者其失易見而仲子之徒其過為難知也惟其難知故可以惑世俗而禍仁義孟子反覆闢之蓋有以也孟子曰可以取可以無取取傷亷可以與可以無與與傷惠可以死可以無死死傷勇林氏曰公西華受五秉之粟是傷亷也冉子與之是傷惠也子路之死於衛是傷勇也朱子曰先言可以者略見而自許之辭後言可以無者深察而自疑之辭南軒曰取與死生之義有灼然易判者亦有在可否之間者在可否之間非精義者菒之能擇也蓋其幾間不容息一或有偏則失之矣是以君子貴乎存養存之有素則其理不昧養之有素則物莫能奪夫然故當事幾之來有以處之而得其當也孟子於齊餽兼金而受其於宋疑可受而不受蓋以其無取而餽之則為傷亷故耳孔子於公西華之使冉子為之請粟疑可與也而不與蓋以周急不繼富而與之則傷惠故耳至於比干諫而死箕子疑亦可死也而佯狂以避蓋以父師之義死之則為傷勇故也然在賢者則於可不可之間能擇而處之在聖人則動無非義更不言擇矣雖然取之為傷亷固也然與為傷惠死為傷勇何哉蓋所謂惠與勇者以其義之所在故耳若義所不存雖似惠似勇而反害於惠勇之實且於所不當然而然則於其所當然者廢矣豈不為有害乎萬章問曰敢問交際何心也孟子曰恭也曰卻之卻之為不恭何哉曰尊者賜之曰其所取之者義乎不義乎而後受之以是為不恭故弗卻也曰請無以辭卻之以心卻之曰其取諸民之不義也而以他辭無受不可乎曰其交也以道其接也以禮斯孔子受之矣朱子曰萬章以為彼既得之不義則其餽不可受但無以言語間而卻之直以心度其不義而托於他辭以卻之如此可否耶交以道如餽贐聞戒周其饑餓之類接以禮謂辭命恭敬之節孔子受之如受陽貨蒸豚之類也萬章曰今有禦人於國門之外者其交也以道其餽也以禮斯可受禦與曰不可康誥曰殺越人于貨閔不畏死凡民罔不憝是不待教而誅者也殷受夏周受殷所不辭也於今為烈如之何其受之曰今之諸侯取之於民也猶禦也茍善其禮際矣斯君子受之敢問何說也曰子以為有王者作將比今之諸侯而誅之乎其教之不改而後誅之乎夫謂非其有而取之者盜也充類至義之盡也孔子之仕於魯也魯人獵較孔子亦獵較獵較猶可而况受其賜乎言今諸侯之取於民固多不義然有王者起必不連合而盡誅之必教之不悛而後誅之則其與禦人之盜不待教而誅者不同矣夫禦人於國門之外與非其有而取之二者固皆不義之類然必禦人乃為真盜其謂非有而取為盜者乃推其類至於義之至精至密之處而極言之耳非便以為真盜也然則今之諸侯雖曰取非其有而豈可遽以同於禦人之盜也哉又引孔子之事以明世俗所尚猶或可從况受其賜何為不可乎獵較未詳趙氏以為田獵相較奪禽獸以祭孔子不違所以小同於俗也張氏以為獵而較所獲之多少也二說未知孰是曰然則孔子之仕也非事道與曰事道也事道奚獵較也曰孔子先簿正祭器不以四方之食供簿正曰奚不去也曰為之兆也兆足以行矣而不行而後去是以未嘗有所終三年淹也兆猶卜之兆蓋事之端也孔子所以不去者亦欲小試行道之端以示於人使知吾道之果可行也若其端既可行而人不能遂行之然後不得已而必去之蓋其去雖不輕而亦未嘗不决是以未嘗終三年留於一國也孔子有見行可之仕有際可之仕有公養之仕於季桓子見行可之仕也於衛靈公際可之仕也於衛孝公公養之仕也見行可見其道之可行也際可接遇以禮也公養國君養賢之禮也季桓子魯卿季孫斯也衛靈公衛侯元也孝公春秋史記皆無之疑出公輒也因孔子仕魯而言其仕有此三者故於魯則兆足以行矣而不行然後去而於衛之事則又受其交際問饋而不郤之一驗也尹氏曰不聞孟子之義則自好者為於陵仲子而已聖賢辭受進退惟義所在南軒曰讀孟子此章所以答萬章者反覆曲折可謂義之精矣問交際何心則曰恭蓋交際之道主乎恭也問卻之何以為不恭則以謂尊者有賜若念其取之義與不義而後受則非所以敬事其尊者也吾知不虗其賜我之意而已豈暇問其所自哉若夫萬章之說以心卻之而以他辭無受則是乃不恭之心而辭何為乎然而其受也必交以道而接以禮使交之不以道而接之不以禮則固有所不受矣於齊餽兼金百鎰而不受是亦尊者之賜也然未有辭則是貨我而已其交也固非道其接也固非禮然所為不受也蓋亦非為其取之不義之故初亦無害乎交際之恭也萬章於此有疑焉謂有人於此禦人以兵而得貨然交以道餽以禮則君子固亦受與孟子謂禦人而奪貨者此所謂大憝有國者之所必禁不待教令而誅者三代之法同不必設辭而可知者居今之世其法為甚著奈何而可受其餽乎萬章謂既以為不可則今之諸侯以非道取民與此何異而君子以善其禮際而受之可乎孟子謂事固有輕重若以為有王者作將不待教而盡誅今之諸侯乎抑亦教而不改而後誅之也以理論之則必待教而不改然後誅之明矣然則其可與不待教而誅者同日而語乎夫謂非其有而取之為盜者蓋充夫非其有而取之之類以極義之所在而比之為盜則可若使以為與禦人奪貨之盜同罪則豈可哉大扺聖賢因汙隆而起變化辭受取豫皆天下正理過與不及為失其正理則均也魯之習俗必獵較而後以祭孔子仕於魯亦不違也而况於受其賜乎萬章聞是言則又疑孔子之仕所事者道而何獵較為也孟子以為孔子於宗廟之祭先簿正其祭器立之彛典不以四方之食供簿正蓋四方之食非簿正之常典故也然於獵較而供祭之事猶有所未廢蓋由簿正之事而正之其施設則有次第矣而萬章以為既不能遂盡正之則曷為不遂去孟子謂為之兆也為之兆者正本開端而為可繼者也聖人之為如天地之化不疾不徐雖曰為之兆而化育之大體已具矣在他人緩則失時速則反害蓋非溥博淵泉而時出之是以無序而不和也兆足以行而不行者蓋以其兆固可繼此以行而有所不得行焉則命也夫然後去之故亦未嘗有三年之淹焉其先後遲速皆天理也此所謂聖之時者歟於是遂論孔子之仕有三焉見行可之仕謂其兆可以行者也際可之仕謂遇聖人以禮者也公養之仕謂養聖人以道者也遇以禮而養以道者聖人亦豈得而絶之乎讀是書者涵咏而精思之亦可以窺聖賢之用而知辭受取豫之方也孟子曰仕非為貧也而有時乎為貧娶妻非為養也而有時乎為養為貧者辭尊居卑辭富居貧朱子曰貧富謂祿之厚薄蓋仕不為道已非出處之正故其所處但當如此辭尊居卑辭富居貧惡乎宜乎抱關擊柝為貧者雖不主於行道而亦不可以茍祿故惟抱關擊柝之吏位卑祿薄其職易稱為所宜居也李氏曰道不行矣為貧而仕者此其律令也若不能然則是貪位慕祿而已矣孔子嘗為委吏矣曰㑹計當而已矣嘗為乘田矣曰牛羊茁壯長而已矣此孔子之為貧而仕者也茁肥貌言以孔子大聖而嘗為賤官不以為辱者所謂為貧而仕官卑祿薄而職易稱也位卑而言髙罪也立乎人之本朝而道不行恥也以出位為罪則無行道之責以廢道為恥則非竊祿之官此為貧者之所以必辭尊富而寧處貧賤也尹氏曰言為貧者不可以居尊居尊者必欲以行道南軒曰此章言為貧而仕之義夫仕者豈為貧乎哉蓋將以行道也而亦有為貧而仕者焉是猶娶妻本為繼嗣非為養也而亦有為養而娶者焉然則為貧而仕與為養而娶是亦皆義也雖然既曰為貧矣則不當處乎尊與富居於卑與賤者可也若處其尊與富則是名為為貧而其實竊位也處其尊與富則當任其責此豈為貧之地哉是則非義矣故抱關擊柝亦以為宜者本為貧故也孔子嘗為委吏與嘗為乘田矣聖人篤誠雖居下位必敬其事曰㑹計當而已矣曰牛羊茁壯長而已矣以其職在乎是而不越也蓋位卑者言責不加焉言髙則罪矣故可以姑守其職此為貧而仕之法也若夫立人之本朝則當以行道為任道不行而竊其位君子之所恥也然則高位厚祿非所以養貧也後世不明此義假為貧之名安享寵利而居然曽不以為愧此可勝罪哉必不得已為貧而仕其抱關擊柝之為宜則可矣嗟夫觀夫子為委吏而曰㑹計當而已矣為乘田而曰牛羊茁壯長而已矣則夫子得政於天下其所當為者如何哉事有大小而心則一也亦曰止其所而已矣萬章曰士之不託諸侯何也孟子曰不敢也諸侯失國而後託於諸侯禮也士之託於諸侯非禮也萬章曰君餽之粟則受之乎曰受之受之何義也曰君之於氓也固周之曰周之則受賜之則不受何也曰不敢也敢問其不敢何也曰抱關擊柝者皆有常職以食於上無常職而賜於上者以為不恭也曰君餽之則受之不識可常繼乎曰繆公之於子思也亟問亟餽鼎肉子思不悅於卒也摽使者出諸大門之外北面稽首再拜而不受曰今而後知君之犬馬畜伋蓋自是臺無餽也悅賢不能舉又不能養也可謂悅賢乎曰敢問國君欲養君子如何斯可謂養矣曰以君命將之再拜稽首而受其後廩人繼粟庖人繼肉不以君命將之子思以為鼎肉使已僕僕爾亟拜也非養君子之道也堯之於舜也使其子九男事之二女女焉百官牛羊倉廩偹以養舜於畎畝之中後舉而加諸上位故曰王公之尊賢者也朱子曰能養能舉悅賢之至也惟堯舜為能盡之而後世之當法也南軒曰萬章所謂託於諸侯蓋以為士雖不得行其道而託祿於諸侯以自養宜若可也而孟子以為非禮以其無是理故也然周之則可以受周之與賜所以異者蓋居其國則為其民君以其饑餓而餽焉受斯可也若欲以自託而虛享其祿賜則於義何居乎名不正則失其序而不和故孔子論之至於禮樂不興而民無所措手足君子之於禮樂不斯須去身者其動未嘗不名正而言順故也曰不敢者以其無常職而受賜陷於不恭故不敢也雖然此上之所以自處者當然也在國君之待士則有養賢之禮焉故舉子思之事以告之夫子思受繆公之餽者周之而受之義也至於餽之之久而僕僕然亟拜則是徒為餽而已徒為餽則與養犬馬之道何異烏有君子而受其犬馬之畜者乎故及其久也則再拜稽首而不受蓋繆公雖有悅賢之名不能舉而用又不能以禮養之也賢者其肯處乎以禮養者繼肉是也蓋不敢以是而數厪之故使繼之而已雖然此及乎養之之禮而未及乎舉之之道也若堯之於舜則尊賢之極而養道之盡也事之以九男女之以二女百官牛羊倉廩偹而養之於畎畝之中惟恐不能當其意一旦舉而加諸上位如是而後可以謂之王公之尊賢也孟子每以堯舜之事為言者語道者必稽諸聖人所以示萬世之凖的蓋聖人人倫之至故也嗟乎為士者於辭受之際可不思夫名正而言順者乎為君者之待士又何可不深思所以養之之道乎孟子曰仲子不義與之齊國而弗受人皆信之是舍簞食豆羮之義也人莫大焉亡親戚君臣上下以其小者信其大者奚可哉朱子曰言仲子設若非義而與之齊國必不肯受齊人皆信其賢然此但小亷耳其辟兄離母不食君祿無人道之大倫罪莫大焉豈可以小亷信其大節而遂以為賢哉南軒曰簞食豆羮得之則生弗得則死呼爾而與之則不受謂斯人也一旦而遇萬鍾之祿茍惟不義則必不受也可乎蓋人之難知也以其小者信其大者固不可也於陵仲子以兄之祿為不義辟兄離母處於於陵齊髙之以謂若斯人者不義而與之齊國亦將必不受也孟子以為是舍簞食豆羮之義也蓋孟子以人倫之際察之而知其不可信也人之所以為人者莫大於人倫所謂親戚君臣上下是也今仲子廢親戚君臣上下而欲以潔其身飾小亷而妨大德其不知義固已甚矣又惡能不受不義之齊國乎古之善觀人者必於人倫之際察之而其人之得失淺深可概見矣四嶽之舉舜則曰克諧以孝而已堯之降舜以二女觀其嬪于虞而已此舜之所以聖也冀缺與其妻相待如賓而臼季知其能治民茅容殺牲先奉其母而郭林宗知其可以成德是亦善觀人者也若仲子廢大倫而徇私意以其小亷信其大節烏乎可哉孟子曰食而弗愛豕交之也愛而弗敬獸畜之也恭敬者幣之未將者也朱子曰將猶奉也詩曰承筐是將程子曰恭敬雖因威儀幣帛而後發見然幣帛之未將時已有此恭敬之心非因幣帛而後有也恭敬而無實君子不可虛拘此言當時之待賢者特以幣帛為恭敬而無其實也拘留也南軒曰此章言交際之道夫徒食之而愛心不加焉徒愛之而敬心不加焉則與豕交獸畜無以異蓋人道之相與以敬為主夫必有是恭敬而後幣帛以將之蓋恭敬者先存於幣帛未行之前者也若無是恭敬則幣帛何所施乎雖然幣帛者所以將其恭敬者也恭敬存於中而儀物實於外此君子之道又以為內外之宜文質之中也若恭敬之心雖存而無以實之於外君子亦惡夫虛拘也昔夫子解驂以賻舊館人之喪曰吾惡夫哀之無從蓋是意也夫古人於交際之道豈茍然哉蓋有燕享之禮焉有摯獻之禮焉有問遺之禮焉此皆其恭敬之所生也恭敬為之主而其節文品式森然偹具而又有貴賤貧富之不同大小多寡之或異是皆人之所為也若昧乎此不陷於豕交獸畜則或失之虛拘皆非君子之道也二先生釋恭敬無實之語不同正當參考孟子居鄒季任為任處守以幣交受之而不報處於平陸儲子為相以幣交受之而不報趙氏曰季任任君之弟任君朝㑹於鄰國季任為之居守其國也儲子齊相也不報者來見則當報之但以幣交則不必報也他日由鄒之任見季子由平陸之齊不見儲子屋廬子喜曰連得間矣朱子曰屋廬子知孟子之處此必有義理故喜得其間隙而問之問曰夫子之任見季子之齊不見儲子為其為相與言儲子但為齊相非若季子攝守君位故輕之耶曰非也書曰享多儀儀不及物曰不享惟不役志于享書洛誥篇享奉上也儀禮也物幣也役用也言雖享而禮意不及其幣則是不享矣以其不用志於言故也為其不成享也孟子釋書意如此屋廬子悅或問之屋廬子曰季子不得之鄒儲子得之平陸徐氏曰季子為君處守不得往他國以見孟子則以幣交而禮意已偹儲子為齊相可以至齊之境內而不來見則雖以幣交而禮意不及其物也孟子曰好名之人能讓千乘之國茍非其人簞食豆羮見於色朱子曰好名之人矯情干譽是以能讓千乘之國然若本非能輕富貴之人則於得失之小者反不覺其真情之發見矣蓋觀人不於其所勉而於其所忽然後可以見其所安之實也東坡所謂人能碎千金之璧而不能不失聲於破釡正此意茍非其人其人指真能讓國者非指好名之人也問曽㑹得東坡之說否曰如此則能讓千乘之國只是好名至簞食豆羮見於色却是實情也曰然其嘗把此一假對鄉為身死而不受一假蓋此假是好名之心勝大處打得過小處漏綻也動於萬鍾者是小處掩瞞得過大處發露也南軒曰孟子此章言人之度量相越有如是其逺者夫均是人也而有讓千乘之國者有與人簞食豆羮而德見於色者何其不侔也蓋其所存有厚薄而所見有廣狹之故耳夫能讓千乘之國亦可謂髙矣而孟子謂之好名之人者何哉蓋未能循天理之實然者則亦未免為徇其名而已如季札之徒是也季子之父兄所以眷眷於季子之立者為其賢者此公理而非私意也而季子三辭焉是未究夫當立之義非為季子之大也就隘俗論之可謂超然獨出矣而揆之以道蓋亦好名而蔽其實故也好名之人雖能讓國未免限於名若夫大賢以上循乎天理雖以舜禹受天下受其所當受而不為泰以泰伯之讓夷齊之讓讓其所當讓而不為好名故孔子稱舜禹則曰有天下而不與焉稱泰伯則曰民無得而稱焉稱夷齊曰求仁而得仁聖人之意蓋可見矣愚按泰伯夷齊之讓與子臧季札之讓其讓則一而所以讓則不同學者所當究見其義夷齊之事已見前卷求仁章今以泰伯子臧季札之事附見於此子曰泰伯其可謂至德也已矣三以天下讓民無得而稱焉朱子曰泰伯周太王之長子也至德謂德之至極無以復加者也三讓謂固遜也無得而稱其遜隱微無迹可見也蓋太王三子長泰伯次仲雍次季歷太王之時商道浸衰而周日强大季歷又生子昌有聖德太王因有翦商之志而泰伯不從太王遂欲傳位季歷以及昌泰伯知之即與仲雍逃之荆蠻於是太王乃立季歷傳國至昌而三分天下有其二是為文王文王崩子發立遂克商而有天下是為武王夫以泰伯之德當商周之際固足以朝諸侯有天下矣乃棄不取而又泯其迹焉則其德之至極為何如哉蓋其心即夷齊叩馬之心而事之難處有甚焉者宜夫子之歎息而贊美之也泰伯不從事見春秋傳按僖五年宫之竒曰泰伯虞仲大王之昭也泰伯不從是以不嗣杜氏注曰泰伯虞仲皆太王之子不從父命俱讓適吳或問曰何以言三讓之為固讓也曰古人辭讓以三為節一辭為禮辭再辭為固辭三辭為終辭故古注至是但言三讓而不解其目也今必求其事以實之則亦無所据矣曰何以言其讓於隱微之中也曰泰伯之讓無揖遜辭受之迹人但見其逃去不返而已不知其讓也知其讓者見其讓國而已而不知所以使文武有天下者實由於此則是以天下讓也曰其為至德何也曰讓之為德既美矣至於三則其讓誠矣以天下讓則其所讓大矣而又能隱晦其迹使民無得而稱焉則其讓也非有為名之纍矣此其德所以為至極而不可以有加也曰太王有廢長立少之意非禮也泰伯又探其邪志而成之至於父死不赴傷毁髮膚皆非賢者之事就使必於讓國而為之則亦過而不合於中庸之德矣其為至德何耶曰太王之欲立賢子聖孫為其道足以濟天下而非有愛憎之間利欲之私也是以泰伯去之而不以為狷王季受之而不以為貪父死不赴傷毁髮膚而不為不孝蓋處君臣父子之變而不失乎中庸此所以為至德也與魯隱公吳季子之事蓋不同矣曰逃去可矣何必斷髮文身哉曰先儒論之多矣蘇氏以為讓國盛德之事矣然存其實而取其名者亂之所由起故泰伯為此所以使名實俱亡而亂不作也此以利害言之固不足以得聖賢之心而其弟黃門又曰子貢言泰伯端委以治吳則固未嘗斷髮文身也且漢東海王以天下授顯宗唐宋王成器以天下授𤣥宗皆兄弟終身無間言何必斷髮文身哉此引子貢之言則其事固有不可考者然以漢唐二事例之則亦未足以盡聖賢之心也蓋使王季之心但如顯宗𤣥宗則可若有叔齊之義則亦不能以一朝居矣使泰伯而不有以深自絶焉則亦何能必致國於王季而安其位哉然顯宗𤣥宗之心其厚薄又自不同也南軒曰三讓程子曰不立一也逃之二也文身三也夫泰伯之讓誠難知也以君之元子而棄宗國以逃身本中夏而從夷狄之為不亦冒先王之大禁與而泰伯安然行之非聖人孰能明其為至德也至德謂德之至也泰伯知文王有聖德天之所命當使天下被其澤故致國於王季為文王也故曰以天下讓言其至公之心為天下而讓也變而止乎中非逹權樂天者其孰能與於此乎推其事情深逺故民無得而稱而聖人獨知其為至德也或曰泰伯之心知文王得國則周必有天下乎非是也以是存心則是利夫天下者也泰伯知文王得國則天下必被其澤也至於周之有天下則泰伯豈加毫末於此哉此又不可以不知也曹子臧者曹成公之庶子也名欣時宣公之十七年㑹諸侯伐秦而卒於師曹人使公子負芻守使欣時逆公之喪負芻殺其世子而自立諸侯來討執而歸之京師將以子臧見王而立之子臧辭曰志有之聖達節次守節下失節為君非吾節也雖不能聖敢失節乎遂逃奔宋明年曹人告於晉請歸負芻而反欣時晉侯謂子臧反吾歸而君子臧反曹伯歸子臧盡置其邑與卿而不出吳季札者吳子壽夢之幼子也兄弟四人長曰諸樊次曰餘祭次曰夷昧次曰季札季札賢父欲立之季讓不可則立諸樊諸樊既除喪復欲立季札季札辭曰曹宣公之卒也諸侯與曹人不義曹君將立子臧子臧去之以成曹君君子曰能守節君義嗣也誰敢干君有國非吾節也札雖不才願自附於子臧之義以無失節固立之棄其室而耕乃舍之諸樊十三年卒有命立餘祭欲以次必致國於季子餘祭四年卒夷昧立夷昧十七年卒吳人將以先君之命立季子季子逃去吳人乃立夷昧之子僚云云蘇氏古史曰春秋之際世不知義而以權利為貴雖齊桓晉文皆以爭國成名者也如子臧之於曹季子之於吳皆有可取之義棄而不顧而况於爭乎豫髙二子之義欲考其行事而子臧反國而致事事不復見季子事吳九十餘年觀其掛劔於墓不以死背其心葬子嬴博不以恩纍其志引兵避楚不以名害其德蓋所以養心者至矣雖祿之天下有所不受而况於吳乎彼其所養者誠重故也春秋吳子使札來聘胡氏曰札者吳之公子何以不稱公子貶也辭國而生亂者札為之也故因其來聘而貶之示法焉按吳子壽夢有子四人長曰諸樊次曰餘祭次曰夷昧札其季子也壽夢賢季札欲立以為國札辭不可然後立諸樊既除喪則致國於季子季子又辭而去之諸樊乃舍其子而立弟約以次傳必及季子故諸樊卒而餘祭立餘祭卒而夷昧立夷昧卒則季子宜受命以安社稷成父兄之志矣乃徇匹夫之介節辭位以逃夷昧之子僚既立諸樊之子光曰先君所以不與子國而與弟者凡為季子爾將從先君之命歟則季子宜有國也如不從先君之命則我宜立僚烏得為君於是使專諸刺僚而致國乎季子季子不受去之延陵終身不入吳國故曰季子辭國以生亂因其來聘而貶之示法焉或謂子貢問於孔子曰伯夷叔齊何人也曰古之賢人也怨乎曰求仁而得仁又何怨子貢以先聖賢夷齊知其惡衛輒之爭而不為也季子辭位獨不為賢而奚貶乎曰叔齊之德不越伯夷孤竹捨長而立幼私意也諸樊兄弟父子無及季札之賢者其父兄所為眷眷而欲立札公心也以其私意故夷齊讓國為得仁而先聖之所賢以其公心故季子辭位為生亂而春秋之所貶茍比而同之過矣或曰世衰道微暴行交作臣篡其君者有之子篡其父者有之季子於是焉而辭位則將使聞其風者貪夫亷爭夫讓而篡弒攘奪之禍損矣其於名教豈不有補何貶之深也曰春秋達節而不守者也昔泰伯奔吳而不反季歷嗣位而不辭武王繼統受命作周亦不以配天之業讓伯邑考官天下也彼王僚無季歷之賢武王之聖而季子為泰伯之讓豈至德乎使爭弒禍興覆師喪國其誰階之也若季子之辭位守節立名全身自牧則可矣概諸聖王之道則過矣中庸曰道之不明不行也我知之矣季子所謂賢且智過而不得其中者也使由於季歷武王之義其肯附子臧之節而不受乎惜其擇乎中庸失時措之宜爾此仲尼所以因其辭國生亂而貶之也或曰吳子使札與楚子使椒秦伯使術一例爾吳楚蠻夷之國秦介夷狄之間其禮未同於中夏故使人之來皆略之而札何以獨為貶乎曰春秋多變例聖筆有特書荆楚無大夫而屈完書族王朝下士以人通而子突書字諸侯公子以名著而季友書子母弟之無例者不登其姓名而叔肸書氏皆賢而特書者也季札讓國天下賢之若仲尼亦賢季札必依此例或以字或以氏或以公子特書之矣今乃略以名紀比於楚椒秦術之流無異稱焉是知仲尼不以其讓國為賢而貶之也噫世之君子盛稱季札之賢於讓國之際以為禮之大節不可亂也公子喜時春秋猶賢其後世於季札則何獨貶之深也曰仲尼於季子望之深矣責之偹矣惟與天地同德而達乎時中然後能與於此非聖人莫能修之豈不信夫問今人陳乞恩例於義當然否程子曰只為今士大夫道得個乞字慣動不動又是乞也因問陳乞封父祖如何曰此事體又别再三請益但云其說甚長待别時說有問先生夫人不叙封因何先生曰某當時起自草萊三辭然後受命豈有今日乃為妻求封之理先生在講筵嘗質錢用諸公因問必是俸給大假不足後乃知到任不曽請俸諸公遂牒户部戶部索前任厯子先生云某起自草萊無前任厯子舊例初入京官下狀出給料錢厯其意謂朝廷用人便當廩人繼粟庖人繼肉也遂令戶部自為出劵厯云云後來自涪陵歸復官半年不曽請俸糧料院吏人忽來索請劵狀子先生云自來不㑹寫狀子受事人不去只令子弟録與受官月日先生初受命便在假欲迤邐尋醫既而供職門人尹焞深難之謂供職非是先生曰新君即位首䝉大恩自二千里放回亦無道理不受某在先朝廷知某者也當時執政大臣皆相知故不當如此受今則皆無相知朝廷之意只是憐其貧不使饑餓於我土地某自領官朝廷厚意與受一月料錢然官則某必做不得既已受它告却不供職是與不受同且略與供職數日承順它朝廷善意了然後惟所欲龜山楊氏曰一介之與萬鍾若論利則有多少論義其理一也伊尹惟能一介知所取與故能祿之以天下弗顧繫馬千駟弗視自後世觀之則一介不以與人為太吝一介不以取人為太潔然君子之取與適於義而已與之嗇取之微雖若不足道然茍害於義又何多寡之間乎孔子於公西赤之富不恤其請於原憲之貧不許其辭此知所與者也孟子言非其道則一簞食不可受於人如其道則舜受堯之天下不以為泰此知所取者也愚謂夫子不許原憲之辭者以其為宰也非以其貧也朱子曰朝廷設官未賢故在上者不當以請託而薦人士人常有禮義亷恥故在下者不當自衒鬻而求薦平生守此愚見故為小官時不敢求薦後叨刺舉亦不敢舉削應副人情官吏亦不敢挾書求薦其在間官非無親舊在官亦未嘗敢為人作書求薦惟老成淹滯實有才德之人衆謂當與致力者乃以公論告之耳官卑祿薄雖不快意然比之一介寒士以教學仰食於人者則以為泰矣若以為不足妄有覬覦恐所得無幾而終日之悔將有不可追者西山讀書記卷三十四下
